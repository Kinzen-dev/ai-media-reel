<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Vesperwerk star">
  <!-- Vesperwerk mark: eight-point vesper star, two-facet antique gold.
       Vertical points longest, horizontal medium, diagonal shortest. -->
  <g transform="translate(100,100)">
    <!-- vertical up / down (L=92) -->
    <g>
      <polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/>
      <polygon points="0,-86 11,0 0,0" fill="#8a6526"/>
    </g>
    <g transform="rotate(180)">
      <polygon points="0,-86 -11,0 0,0" fill="#8a6526"/>
      <polygon points="0,-86 11,0 0,0" fill="#c09a4a"/>
    </g>
    <!-- horizontal (L=68) -->
    <g transform="rotate(90)">
      <polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/>
      <polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/>
    </g>
    <g transform="rotate(270)">
      <polygon points="0,-64 -9.5,0 0,0" fill="#8a6526"/>
      <polygon points="0,-64 9.5,0 0,0" fill="#c09a4a"/>
    </g>
    <!-- diagonals (L=46) -->
    <g transform="rotate(45)">
      <polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/>
      <polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/>
    </g>
    <g transform="rotate(135)">
      <polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/>
      <polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/>
    </g>
    <g transform="rotate(225)">
      <polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/>
      <polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/>
    </g>
    <g transform="rotate(315)">
      <polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/>
      <polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/>
    </g>
  </g>
</svg>
