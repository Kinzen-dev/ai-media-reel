<!-- TEMPLATE: ACID 303 | ARCHETYPE: acid-rave-flyer | REF: 90s-2020s acid house / underground rave flyer graphics, club poster design | WHEN TO USE: loud underground music / club night / drop / event hero where a black canvas packed with clashing neon warped SVG shapes, a melting smiley and distorted stacked type must scream rave-flyer energy; SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ACID 303 - Acid Rave Flyer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Anton&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     ACID 303 - underground rave flyer web hero
     Native CSS / SVG / JS only. No libs.
     All SVG fills are inline hex (never var()).
     Palette: black #050505 / acid-yellow #d8f400 / electric-green #39ff14 / magenta #ff00a8
     ============================================================ */

  :root {
    --black: #050505;
    --acid: #d8f400;
    --green: #39ff14;
    --magenta: #ff00a8;
    --ink: #f4f4ef;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--black);
    color: var(--ink);
    font-family: "Space Grotesk", system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- STAGE: first-viewport flyer ---------- */
  .stage {
    position: relative;
    width: 100%;
    min-height: 100svh;
    background:
      radial-gradient(120% 90% at 18% 12%, #15140a 0%, var(--black) 55%),
      var(--black);
    overflow: hidden;
    isolation: isolate;
  }

  /* full-bleed warped shape field */
  .field {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }
  .field svg { width: 100%; height: 100%; display: block; }

  /* moving acid blobs layer (parallax + drift) */
  .blob {
    transform-origin: center;
    transform-box: fill-box;
    will-change: transform;
  }

  /* the melting cartoon smiley */
  .smiley {
    position: absolute;
    z-index: 2;
    width: clamp(160px, 30vw, 420px);
    aspect-ratio: 1 / 1;
    top: 8%;
    right: 4%;
    filter: drop-shadow(0 0 26px rgba(216, 244, 0, .55));
    will-change: transform;
  }
  .smiley svg { width: 100%; height: 100%; overflow: visible; }
  .smiley .drip { transform-box: fill-box; transform-origin: top center; will-change: transform; }

  /* ---------- TYPE STACK ---------- */
  .type {
    position: relative;
    z-index: 5;
    padding: clamp(14px, 3vw, 40px);
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    pointer-events: none;
  }
  .type > * { pointer-events: auto; }

  .topband {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
    align-items: center;
    justify-content: space-between;
  }
  .kicker {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    letter-spacing: .42em;
    text-transform: uppercase;
    font-size: clamp(10px, 1.3vw, 14px);
    color: var(--green);
    border: 2px solid var(--green);
    padding: 7px 12px 6px;
    background: #04140a;
    transform: rotate(-2.5deg);
    box-shadow: 4px 4px 0 var(--magenta);
  }
  .kicker.alt {
    color: var(--magenta);
    border-color: var(--magenta);
    background: #170010;
    box-shadow: 4px 4px 0 var(--acid);
    transform: rotate(1.5deg);
  }

  .megatitle {
    display: flex;
    flex-direction: column;
    align-self: flex-start;
    line-height: .78;
    margin: clamp(8px, 2vh, 24px) 0;
  }
  .megatitle .line {
    font-family: "Archivo Black", "Anton", sans-serif;
    text-transform: uppercase;
    display: inline-block;
    letter-spacing: -.02em;
    white-space: nowrap;
  }
  .megatitle .l1 {
    font-size: clamp(54px, 16vw, 230px);
    color: var(--acid);
    transform: scaleY(1.18) skewX(-7deg) rotate(-1.5deg);
    transform-origin: left center;
    text-shadow:
      4px 4px 0 var(--magenta),
      8px 8px 0 #00000088;
  }
  .megatitle .l2 {
    font-size: clamp(70px, 22vw, 320px);
    color: var(--ink);
    transform: scaleY(.82) scaleX(1.06) skewX(6deg) rotate(1.2deg);
    transform-origin: left center;
    -webkit-text-stroke: 3px var(--green);
    text-stroke: 3px var(--green);
    color: transparent;
    margin-left: clamp(10px, 5vw, 90px);
  }
  .megatitle .l3 {
    font-family: "Anton", "Archivo Black", sans-serif;
    font-size: clamp(40px, 12vw, 180px);
    color: var(--magenta);
    transform: scaleY(1.34) skewX(-12deg) rotate(-3deg);
    transform-origin: left center;
    margin-left: clamp(4px, 2vw, 30px);
    text-shadow: 3px 3px 0 var(--acid);
  }

  /* warped media frame holding a reusable asset */
  .warpframe {
    position: absolute;
    z-index: 3;
    width: clamp(150px, 22vw, 300px);
    bottom: 16%;
    right: 6%;
    transform: rotate(6deg);
    pointer-events: auto;
  }
  .warpframe .clipbox {
    border: 4px solid var(--acid);
    box-shadow: 6px 6px 0 var(--magenta), 0 0 30px rgba(57,255,20,.3);
    background: #000;
    overflow: hidden;
    /* warped trapezoid */
    clip-path: polygon(4% 0, 100% 6%, 96% 100%, 0 92%);
  }
  .warpframe img {
    display: block;
    width: 100%;
    height: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    filter: saturate(1.3) contrast(1.12) hue-rotate(-6deg);
    mix-blend-mode: screen;
    opacity: .92;
  }
  .warpframe .tag {
    position: absolute;
    bottom: -14px;
    left: -10px;
    background: var(--green);
    color: #021;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 4px 9px;
    transform: rotate(-4deg);
    box-shadow: 3px 3px 0 #000;
  }

  /* bottom info row */
  .botband {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    justify-content: space-between;
    gap: 12px 22px;
  }
  .lineup {
    max-width: 56ch;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    font-size: clamp(13px, 1.6vw, 19px);
    line-height: 1.32;
    color: var(--ink);
  }
  .lineup b { color: var(--acid); }
  .lineup .sep { color: var(--magenta); padding: 0 .25em; }

  .meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
    text-align: right;
    align-items: flex-end;
  }
  .meta .when {
    font-family: "Anton", sans-serif;
    font-size: clamp(20px, 3.4vw, 46px);
    color: var(--green);
    letter-spacing: .02em;
    text-transform: uppercase;
    line-height: .95;
    transform: skewX(-6deg);
  }
  .meta .where {
    font-size: clamp(11px, 1.4vw, 15px);
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--acid);
    font-weight: 700;
  }
  .cta {
    margin-top: 6px;
    font-family: "Archivo Black", sans-serif;
    font-size: clamp(13px, 1.6vw, 18px);
    text-transform: uppercase;
    letter-spacing: .04em;
    color: #060;
    background: var(--green);
    border: none;
    padding: 11px 18px 10px;
    cursor: pointer;
    transform: rotate(-2deg);
    box-shadow: 5px 5px 0 var(--magenta);
    transition: transform .12s ease, box-shadow .12s ease;
    text-decoration: none;
    display: inline-block;
  }
  .cta:hover { transform: rotate(-2deg) translate(-2px,-2px); box-shadow: 7px 7px 0 var(--magenta); }
  .cta:focus-visible {
    outline: 3px solid var(--acid);
    outline-offset: 3px;
  }

  /* hand-scrawled detail */
  .scrawl {
    position: absolute;
    z-index: 4;
    left: 2%;
    bottom: 30%;
    width: clamp(130px, 18vw, 260px);
    transform: rotate(-9deg);
    pointer-events: none;
  }
  .scrawl svg { width: 100%; height: auto; overflow: visible; }
  .scrawl .stroke { will-change: stroke-dashoffset; }

  /* starburst price sticker (scrawl-adjacent loud badge) */
  .sticker {
    position: absolute;
    z-index: 6;
    left: clamp(8px, 4vw, 60px);
    top: 30%;
    width: clamp(96px, 13vw, 168px);
    aspect-ratio: 1/1;
    pointer-events: none;
  }
  .sticker svg { width: 100%; height: 100%; overflow: visible; }
  .sticker .burst { transform-box: fill-box; transform-origin: center; will-change: transform; }
  .sticker .lbl {
    font-family: "Archivo Black", sans-serif;
    fill: #100;
    text-transform: uppercase;
  }

  /* grain + scanline overlay for print-flyer feel */
  .grain {
    position: absolute;
    inset: 0;
    z-index: 7;
    pointer-events: none;
    opacity: .5;
    mix-blend-mode: overlay;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.05) 0 1px, transparent 1px 3px);
  }

  /* marquee scroll strip below hero */
  .strip {
    position: relative;
    z-index: 8;
    background: var(--magenta);
    border-top: 4px solid var(--acid);
    border-bottom: 4px solid var(--acid);
    overflow: hidden;
    white-space: nowrap;
  }
  .strip .track {
    display: inline-block;
    padding: 12px 0;
    font-family: "Anton", sans-serif;
    text-transform: uppercase;
    letter-spacing: .06em;
    font-size: clamp(18px, 2.4vw, 30px);
    color: #100;
    will-change: transform;
    animation: marq 18s linear infinite;
  }
  .strip .track span { padding: 0 18px; }
  .strip .track .x { color: var(--acid); }
  @keyframes marq { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* below-fold acid content block so it is a real page, not a one-screen toy */
  .more {
    position: relative;
    z-index: 8;
    padding: clamp(40px, 7vw, 90px) clamp(16px, 4vw, 60px);
    background:
      radial-gradient(80% 120% at 90% 0%, #11000c 0%, var(--black) 60%),
      var(--black);
    display: grid;
    gap: clamp(18px, 3vw, 34px);
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  }
  .card {
    border: 3px solid var(--green);
    background: #060d06;
    padding: 22px 20px 26px;
    transform: rotate(-1deg);
    box-shadow: 7px 7px 0 var(--magenta);
  }
  .card:nth-child(even) { transform: rotate(1.2deg); border-color: var(--magenta); box-shadow: 7px 7px 0 var(--acid); }
  .card h3 {
    font-family: "Archivo Black", sans-serif;
    text-transform: uppercase;
    font-size: clamp(18px, 2.4vw, 26px);
    color: var(--acid);
    margin-bottom: 8px;
    letter-spacing: -.01em;
  }
  .card:nth-child(even) h3 { color: var(--magenta); }
  .card p { font-size: 15px; line-height: 1.5; color: #cfd6c9; }

  /* ---------- MOBILE: contain the chaos, no horizontal overflow ---------- */
  @media (max-width: 640px) {
    .stage { min-height: 100svh; }
    .type { justify-content: flex-start; gap: 10px; padding-top: 16px; }
    .megatitle { margin: 4px 0; }
    .megatitle .line { white-space: normal; }
    .megatitle .l1 { font-size: clamp(46px, 19vw, 90px); }
    .megatitle .l2 { font-size: clamp(58px, 25vw, 120px); margin-left: 0; -webkit-text-stroke-width: 2px; }
    .megatitle .l3 { font-size: clamp(36px, 15vw, 80px); margin-left: 0; }
    .smiley { width: 38vw; top: 3%; right: 2%; }
    /* keep the warpframe pinned bottom-right on phone, smaller, so the title leads */
    .warpframe {
      width: 38vw;
      max-width: 200px;
      bottom: 3%;
      right: 3%;
      transform: rotate(-4deg);
    }
    .warpframe .tag { font-size: 9px; bottom: -10px; }
    .sticker { width: 24vw; top: auto; bottom: 2%; left: 3%; }
    .scrawl { width: 32vw; bottom: 30%; left: 1%; }
    .botband { flex-direction: column; align-items: flex-start; gap: 14px; }
    .meta { text-align: left; align-items: flex-start; }
    .lineup { font-size: 14px; }
  }

  @media (max-width: 380px) {
    .megatitle .l1 { font-size: 44px; }
    .megatitle .l2 { font-size: 56px; }
    .megatitle .l3 { font-size: 34px; }
  }

  /* ---------- REDUCED MOTION: freeze everything, show final state ---------- */
  @media (prefers-reduced-motion: reduce) {
    .strip .track { animation: none !important; }
    .blob, .smiley, .drip, .burst, .stroke { animation: none !important; transition: none !important; }
  }
</style>
</head>

<script>
  /* ============================================================
     Hydrate from DATA
     ============================================================ */
  (function hydrate() {
    const $ = (id) => document.getElementById(id);
    $("kicker").textContent = DATA.kicker;
    $("kickerAlt").textContent = DATA.kickerAlt;
    $("t1").textContent = DATA.title[0] || "";
    $("t2").textContent = DATA.title[1] || "";
    $("t3").textContent = DATA.title[2] || "";
    $("when").textContent = DATA.when;
    $("where").textContent = DATA.where;
    $("cta").textContent = DATA.cta;
    $("cta").setAttribute("href", DATA.ctaHref || "#");
    $("stkPrice").textContent = DATA.price;
    $("stkSub").textContent = DATA.priceSub;
    $("frameImg").src = DATA.frame.img;
    $("frameTag").textContent = DATA.frame.tag;

    // lineup
    const lp = DATA.lineup.map(a =>
      a.live ? `<b>${a.name}</b>` : a.name
    ).join('<span class="sep">/</span>');
    $("lineup").innerHTML = lp;

    // marquee (duplicated for seamless loop)
    const seg = DATA.marquee.map((w, i) =>
      `<span${i % 2 ? ' class="x"' : ''}>${w}</span><span class="x">+</span>`
    ).join("");
    $("marqA").innerHTML = seg + seg;

    // cards
    const more = $("tickets");
    DATA.cards.forEach(c => {
      const d = document.createElement("article");
      d.className = "card";
      d.innerHTML = `<h3>${c.h}</h3><p>${c.p}</p>`;
      more.appendChild(d);
    });
  })();

  /* ============================================================
     Motion: drifting acid blobs + melting wobble + smiley parallax.
     Fully gated behind prefers-reduced-motion (freeze final state).
     ============================================================ */
  (function motion() {
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)");
    const blobs = Array.from(document.querySelectorAll(".blob"));
    const drips = Array.from(document.querySelectorAll(".drip"));
    const bursts = Array.from(document.querySelectorAll(".burst"));
    const smiley = document.querySelector(".smiley");
    const stage = document.getElementById("stage");

    // seed each blob with a phase so they drift out of sync
    blobs.forEach((b, i) => { b._ph = (i * 1.37) % (Math.PI * 2); });

    let raf = null;
    let pointerX = 0, pointerY = 0;

    function frame(t) {
      const s = t * 0.001;
      // warped blob drift (translate + slow rotation by data attrs)
      for (const b of blobs) {
        const amp = parseFloat(b.dataset.amp || "20");
        const rot = parseFloat(b.dataset.rot || "0");
        const ph = b._ph;
        const dx = Math.sin(s * 0.5 + ph) * amp;
        const dy = Math.cos(s * 0.37 + ph) * amp * 0.7;
        const rz = Math.sin(s * 0.23 + ph) * rot;
        b.style.transform = `translate(${dx}px, ${dy}px) rotate(${rz}deg)`;
      }
      // melting drips wobble (squash/stretch downward)
      for (let i = 0; i < drips.length; i++) {
        const d = drips[i];
        const sy = 1 + Math.sin(s * 1.6 + i) * 0.18;
        d.style.transform = `scaleY(${sy})`;
      }
      // starburst slow spin + pulse
      for (const bu of bursts) {
        const sc = 1 + Math.sin(s * 2.2) * 0.06;
        bu.style.transform = `rotate(${s * 12}deg) scale(${sc})`;
      }
      // smiley subtle parallax toward pointer + idle bob
      if (smiley) {
        const bob = Math.sin(s * 0.9) * 8;
        smiley.style.transform =
          `translate(${pointerX * 14}px, ${pointerY * 14 + bob}px) rotate(${pointerX * 3}deg)`;
      }
      raf = requestAnimationFrame(frame);
    }

    function start() {
      if (raf == null) raf = requestAnimationFrame(frame);
    }
    function stop() {
      if (raf != null) { cancelAnimationFrame(raf); raf = null; }
    }

    function applyReduced() {
      if (reduce.matches) {
        stop();
        // freeze to a clean composed final state
        blobs.forEach(b => { b.style.transform = "none"; });
        drips.forEach(d => { d.style.transform = "none"; });
        bursts.forEach(b => { b.style.transform = "none"; });
        if (smiley) smiley.style.transform = "none";
      } else {
        start();
      }
    }

    // pointer parallax (desktop only; harmless on touch)
    window.addEventListener("pointermove", (e) => {
      pointerX = (e.clientX / window.innerWidth - 0.5) * 2;
      pointerY = (e.clientY / window.innerHeight - 0.5) * 2;
    }, { passive: true });

    // pause rAF when hero scrolled out of view (perf)
    if ("IntersectionObserver" in window) {
      const io = new IntersectionObserver((entries) => {
        for (const en of entries) {
          if (reduce.matches) continue;
          if (en.isIntersecting) start(); else stop();
        }
      }, { threshold: 0.01 });
      io.observe(stage);
    }

    reduce.addEventListener?.("change", applyReduced);
    applyReduced();
  })();
</script>
</body>
</html>
