<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Caseline Inbox - Yimwhan Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CASELINE INBOX  -  Yimwhan dental AI backoffice
   Native CSS / SVG / JS only. Desktop-first (1440). Mobile collapses.
   ============================================================ */

:root{
  /* surfaces (clean light) */
  --bg:#eef1f6;
  --pane:#ffffff;
  --pane-2:#f7f9fc;
  --pane-3:#eef2f8;
  --line:#e2e8f2;
  --line-strong:#d2dbe8;
  /* ink */
  --ink:#10151f;
  --ink-2:#3c4858;
  --ink-3:#6b7686;
  --ink-4:#97a1b1;
  /* channels */
  --line-green:#06C755;
  --line-green-soft:#e4f8ed;
  --voice-blue:#2f6df6;
  --voice-blue-soft:#e6efff;
  /* status */
  --st-ai:#0ea371;          /* AI-handled */
  --st-ai-soft:#e0f6ed;
  --st-human:#e0851b;       /* needs-human */
  --st-human-soft:#fdf0db;
  --st-booked:#7a5af5;      /* booked */
  --st-booked-soft:#eee9ff;
  --accent:#2f6df6;
  --unread:#2f6df6;
  --radius:14px;
  --radius-sm:9px;
  --shadow-pane:0 1px 2px rgba(20,30,50,.04), 0 8px 28px rgba(20,30,50,.06);
  --shadow-pop:0 12px 36px rgba(20,30,50,.16);
  --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --thai:"Noto Sans Thai","Inter",sans-serif;
  --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);
  background:
    radial-gradient(1200px 520px at 88% -8%, #ffffff 0%, rgba(255,255,255,0) 60%),
    radial-gradient(900px 480px at 6% 108%, #e7edf7 0%, rgba(231,237,247,0) 60%),
    var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
.thai{font-family:var(--thai)}

/* ---------- App shell ---------- */
.app{
  height:100vh; height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr;
  max-width:1680px;
  margin:0 auto;
}

/* ---------- Top bar ---------- */
.topbar{
  display:flex; align-items:center; gap:18px;
  padding:14px 22px;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(10px);
}
.brand{display:flex; align-items:center; gap:11px; flex:0 0 auto}
.brand-mark{
  width:34px; height:34px; border-radius:10px; flex:0 0 auto;
  background:linear-gradient(150deg,#2f6df6,#7a5af5);
  display:grid; place-items:center;
  box-shadow:0 4px 12px rgba(47,109,246,.36);
}
.brand-txt{line-height:1.05}
.brand-txt b{font-size:15px; font-weight:700; letter-spacing:-.2px; display:block}
.brand-txt span{font-size:11px; color:var(--ink-3); font-weight:500}
.brand-txt span .thai{font-weight:600; color:var(--ink-2)}

.topbar-search{
  flex:1 1 auto; max-width:440px;
  display:flex; align-items:center; gap:9px;
  background:var(--pane-2);
  border:1px solid var(--line);
  border-radius:11px;
  padding:9px 13px;
  color:var(--ink-3);
}
.topbar-search input{
  border:0; background:transparent; outline:none;
  font-family:var(--font); font-size:13.5px; color:var(--ink);
  width:100%;
}
.topbar-search input::placeholder{color:var(--ink-4)}
.topbar-search kbd{
  font-family:var(--mono); font-size:10.5px; color:var(--ink-3);
  background:var(--pane); border:1px solid var(--line-strong);
  border-radius:5px; padding:2px 6px; flex:0 0 auto;
}
.topbar-spacer{flex:1 1 auto}
.topbar-actions{display:flex; align-items:center; gap:10px; flex:0 0 auto}
.live-pill{
  display:flex; align-items:center; gap:7px;
  font-size:12px; font-weight:600; color:var(--st-ai);
  background:var(--st-ai-soft); border:1px solid #c9eddd;
  border-radius:20px; padding:6px 11px 6px 9px;
}
.live-dot{width:7px; height:7px; border-radius:50%; background:var(--st-ai)}
.pulse{position:relative}
/* pulse ring drawn with box-shadow so it never grows the dot's scroll box */
.pulse{animation:pulse 2.4s ease-out infinite}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(14,163,113,.5)}
  70%{box-shadow:0 0 0 7px rgba(14,163,113,0)}
  100%{box-shadow:0 0 0 0 rgba(14,163,113,0)}
}
.ava-me{
  width:34px;height:34px;border-radius:50%;flex:0 0 auto;
  background:linear-gradient(150deg,#f9b288,#e0851b);
  display:grid;place-items:center;color:#fff;font-weight:600;font-size:13px;
  border:2px solid #fff; box-shadow:0 2px 8px rgba(20,30,50,.14);
}

/* ---------- 3-pane body ---------- */
.panes{
  display:grid;
  grid-template-columns:340px minmax(0,1fr) 332px;
  min-height:0;
  overflow:hidden;
}

/* ============ LEFT : case list ============ */
.col-list{
  display:flex; flex-direction:column; min-height:0;
  background:var(--pane);
  border-right:1px solid var(--line);
}
.list-head{padding:16px 16px 8px}
.list-head h1{font-size:16px; font-weight:700; letter-spacing:-.3px; display:flex; align-items:center; gap:8px}
.list-head h1 .count{
  font-size:11.5px; font-weight:600; color:var(--ink-3);
  background:var(--pane-3); border-radius:20px; padding:2px 9px;
}
.tabs{display:flex; flex-wrap:wrap; gap:7px 5px; padding:8px 14px 12px; overflow-x:auto; scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto; cursor:pointer; user-select:none;
  font-size:12.5px; font-weight:600; color:var(--ink-3);
  padding:6px 12px; border-radius:9px; border:1px solid transparent;
  background:transparent; display:flex; align-items:center; gap:6px;
  transition:background .15s, color .15s, border-color .15s;
}
.tab:hover{background:var(--pane-2); color:var(--ink-2)}
.tab[aria-selected="true"]{background:var(--ink); color:#fff; border-color:var(--ink)}
.tab .tcount{
  font-size:10.5px; font-weight:600; padding:1px 6px; border-radius:10px;
  background:var(--pane-3); color:var(--ink-3);
}
.tab[aria-selected="true"] .tcount{background:rgba(255,255,255,.2); color:#fff}
.tab.has-alert .tcount{background:var(--st-human-soft); color:var(--st-human)}
.tab[aria-selected="true"].has-alert .tcount{background:rgba(255,255,255,.22); color:#fff}

.list-scroll{flex:1 1 auto; min-height:0; overflow-y:auto; padding:4px 8px 16px}
.list-scroll{scrollbar-width:thin; scrollbar-color:var(--line-strong) transparent}
.list-scroll::-webkit-scrollbar{width:8px}
.list-scroll::-webkit-scrollbar-thumb{background:var(--line-strong); border-radius:8px; border:2px solid var(--pane)}

.case{
  position:relative; cursor:pointer; user-select:none;
  display:grid; grid-template-columns:42px 1fr; gap:11px;
  padding:11px 11px 12px; border-radius:12px;
  border:1px solid transparent;
  transition:background .14s, border-color .14s;
}
.case:hover{background:var(--pane-2)}
.case[aria-selected="true"]{background:var(--voice-blue-soft); border-color:#cfe0ff}
.case[aria-selected="true"]:hover{background:var(--voice-blue-soft)}
.case-ava{
  position:relative; width:42px; height:42px; border-radius:50%;
  display:grid; place-items:center; color:#fff; font-weight:600; font-size:14px;
  font-family:var(--thai);
}
.case-chan{
  position:absolute; right:0; bottom:0;
  width:18px; height:18px; border-radius:50%;
  display:grid; place-items:center; border:2.5px solid var(--pane);
}
.case[aria-selected="true"] .case-chan{border-color:var(--voice-blue-soft)}
.case-chan.line{background:var(--line-green)}
.case-chan.voice{background:var(--voice-blue)}
.case-body{min-width:0}
.case-top{display:flex; align-items:center; gap:8px}
.case-name{font-size:14px; font-weight:600; letter-spacing:-.1px; color:var(--ink); flex:1 1 auto; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.case[data-unread="1"] .case-name{font-weight:700}
.case-time{font-size:11px; color:var(--ink-4); flex:0 0 auto; font-variant-numeric:tabular-nums}
.case-snip{
  font-size:12.5px; color:var(--ink-3); line-height:1.35; margin-top:3px;
  display:-webkit-box; -webkit-line-clamp:2; line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.case[data-unread="1"] .case-snip{color:var(--ink-2)}
.case-snip .who{color:var(--ink-4); font-weight:500}
.case-foot{display:flex; align-items:center; gap:7px; margin-top:8px}
.pill{
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:600; line-height:1;
  padding:4px 8px 4px 7px; border-radius:20px; white-space:nowrap;
}
.pill .dot{width:6px; height:6px; border-radius:50%}
.pill.ai{background:var(--st-ai-soft); color:var(--st-ai)}
.pill.ai .dot{background:var(--st-ai)}
.pill.human{background:var(--st-human-soft); color:var(--st-human)}
.pill.human .dot{background:var(--st-human)}
.pill.booked{background:var(--st-booked-soft); color:var(--st-booked)}
.pill.booked .dot{background:var(--st-booked)}
.case-unread{
  width:8px; height:8px; border-radius:50%; background:var(--unread);
  flex:0 0 auto; margin-left:auto;
  box-shadow:0 0 0 3px rgba(47,109,246,.16);
}
.case[data-unread="0"] .case-unread{display:none}

/* ============ CENTER : conversation thread ============ */
.col-thread{
  display:flex; flex-direction:column; min-height:0;
  background:
    linear-gradient(180deg, #fbfcfe 0%, #f4f7fb 100%);
}
.thread-head{
  display:flex; align-items:center; gap:13px;
  padding:13px 20px;
  border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(8px);
}
.back-btn{
  display:none; flex:0 0 auto;
  width:36px; height:36px; border-radius:10px; border:1px solid var(--line);
  background:var(--pane); cursor:pointer; place-items:center;
}
.th-ava{
  width:40px; height:40px; border-radius:50%; flex:0 0 auto;
  display:grid; place-items:center; color:#fff; font-weight:600; font-size:14px;
  font-family:var(--thai); position:relative;
}
.th-ava .case-chan{border-color:rgba(255,255,255,.95)}
.th-meta{min-width:0; flex:1 1 auto}
.th-name{font-size:15px; font-weight:700; letter-spacing:-.2px; display:flex; align-items:center; gap:8px}
.th-sub{font-size:12px; color:var(--ink-3); margin-top:2px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.th-sub .chip-mono{font-family:var(--mono); font-size:11px; color:var(--ink-2)}
.chan-tag{
  display:inline-flex; align-items:center; gap:5px;
  font-size:11px; font-weight:600; padding:3px 8px; border-radius:7px;
}
.chan-tag.line{background:var(--line-green-soft); color:#06824a}
.chan-tag.voice{background:var(--voice-blue-soft); color:#1d4fc4}
.th-head-actions{display:flex; gap:8px; flex:0 0 auto}
.icon-btn{
  width:36px; height:36px; border-radius:10px; border:1px solid var(--line);
  background:var(--pane); cursor:pointer; display:grid; place-items:center;
  color:var(--ink-3); transition:background .14s, color .14s;
}
.icon-btn:hover{background:var(--pane-2); color:var(--ink)}
.detail-toggle{display:none}

.thread-scroll{flex:1 1 auto; min-height:0; overflow-y:auto; padding:22px 26px 30px}
.thread-scroll{scrollbar-width:thin; scrollbar-color:var(--line-strong) transparent}
.thread-scroll::-webkit-scrollbar{width:9px}
.thread-scroll::-webkit-scrollbar-thumb{background:var(--line-strong); border-radius:8px; border:2px solid transparent; background-clip:padding-box}
.thread-inner{max-width:760px; margin:0 auto}

.day-div{display:flex; align-items:center; gap:12px; margin:6px 0 18px}
.day-div::before,.day-div::after{content:""; height:1px; flex:1; background:var(--line)}
.day-div span{font-size:11px; font-weight:600; color:var(--ink-4); letter-spacing:.4px; text-transform:uppercase}

/* --- call banner (voice) --- */
.call-banner{
  display:flex; align-items:center; gap:14px;
  background:var(--voice-blue-soft);
  border:1px solid #cfe0ff; border-radius:14px;
  padding:13px 16px; margin-bottom:20px;
}
.call-icon{
  width:42px; height:42px; border-radius:12px; flex:0 0 auto;
  background:var(--voice-blue); display:grid; place-items:center;
  box-shadow:0 4px 12px rgba(47,109,246,.35);
}
.call-info{flex:1 1 auto; min-width:0}
.call-info b{font-size:13.5px; font-weight:700; color:#1d4fc4; display:block}
.call-info span{font-size:12px; color:#3a63b8}
.wave{
  display:flex; align-items:center; gap:2.5px; height:34px; flex:0 0 auto;
  cursor:pointer;
}
.wave i{
  width:3px; border-radius:3px; background:var(--voice-blue); opacity:.55;
  display:block;
}
.wave i.on{opacity:1}
.call-dur{font-family:var(--mono); font-size:12px; color:#1d4fc4; font-weight:500; flex:0 0 auto}
.play-btn{
  width:34px;height:34px;border-radius:50%;border:0;flex:0 0 auto;
  background:#fff;color:var(--voice-blue);cursor:pointer;display:grid;place-items:center;
  box-shadow:0 3px 9px rgba(47,109,246,.2);
}

/* --- transcript turns (voice) --- */
.turn{display:grid; grid-template-columns:30px 1fr; gap:11px; margin-bottom:16px}
.turn-badge{
  width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
  font-size:11px;font-weight:700;flex:0 0 auto;margin-top:2px;
}
.turn.patient .turn-badge{background:var(--pane-3); color:var(--ink-2)}
.turn.ai .turn-badge{background:linear-gradient(150deg,#2f6df6,#7a5af5); color:#fff}
.turn-main{min-width:0}
.turn-who{display:flex; align-items:baseline; gap:8px; margin-bottom:3px}
.turn-who b{font-size:12.5px; font-weight:600}
.turn.ai .turn-who b{color:var(--voice-blue)}
.turn-who time{font-family:var(--mono); font-size:10.5px; color:var(--ink-4)}
.turn-txt{
  font-size:14px; line-height:1.55; color:var(--ink-2);
}
.turn.ai .turn-txt{color:var(--ink)}

/* --- LINE bubbles --- */
.bubble-row{display:flex; margin-bottom:11px; gap:9px; align-items:flex-end}
.bubble-row.ai{justify-content:flex-start}
.bubble-row.patient{justify-content:flex-end; flex-direction:row-reverse}
.bub-ava{
  width:28px;height:28px;border-radius:50%;flex:0 0 auto;
  display:grid;place-items:center;color:#fff;font-size:11px;font-weight:600;font-family:var(--thai);
  margin-bottom:18px;
}
.bub-ava.ai{background:linear-gradient(150deg,#2f6df6,#7a5af5)}
.bubble{
  max-width:74%; position:relative;
}
.bubble .txt{
  font-size:14px; line-height:1.5; padding:10px 13px;
  border-radius:16px; word-wrap:break-word;
}
.bubble-row.ai .txt{background:#fff; color:var(--ink); border:1px solid var(--line); border-bottom-left-radius:5px}
.bubble-row.patient .txt{background:var(--line-green); color:#fff; border-bottom-right-radius:5px}
.bubble time{
  font-size:10.5px; color:var(--ink-4); font-family:var(--mono);
  display:block; margin-top:4px;
}
.bubble-row.patient time{text-align:right}

/* --- inline AI action chips --- */
.act-chip{
  display:inline-flex; align-items:center; gap:9px;
  background:#fff; border:1px solid var(--line); border-radius:13px;
  padding:11px 14px; margin:6px 0 14px; max-width:440px;
  box-shadow:0 2px 10px rgba(20,30,50,.05);
}
.act-icon{
  width:34px;height:34px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;
}
.act-icon.book{background:var(--st-booked-soft)}
.act-icon.phone{background:var(--voice-blue-soft)}
.act-body b{font-size:12.5px; font-weight:700; display:block; color:var(--ink)}
.act-body span{font-size:12px; color:var(--ink-3)}
.act-body .mono{font-family:var(--mono); color:var(--ink-2); font-weight:500}
.act-tag{
  margin-left:auto; font-size:10px; font-weight:700; letter-spacing:.4px;
  color:var(--st-ai); background:var(--st-ai-soft); padding:3px 7px; border-radius:6px;
  align-self:flex-start;
}
.center-row{display:flex; justify-content:center}

/* --- composer (read-only review note) --- */
.composer{
  border-top:1px solid var(--line);
  background:rgba(255,255,255,.86);
  backdrop-filter:blur(8px);
  padding:13px 26px;
  display:flex; align-items:center; gap:11px;
}
.composer-note{
  flex:1 1 auto; display:flex; align-items:center; gap:10px;
  background:var(--pane-2); border:1px solid var(--line);
  border-radius:12px; padding:11px 14px; color:var(--ink-4); font-size:13px;
}
.composer-note input{flex:1 1 auto; border:0; background:transparent; outline:none; font-family:var(--font); font-size:13.5px; color:var(--ink)}
.composer-note input::placeholder{color:var(--ink-4)}
.takeover-btn{
  flex:0 0 auto; border:0; cursor:pointer;
  background:var(--ink); color:#fff; font-family:var(--font);
  font-size:13px; font-weight:600; padding:11px 17px; border-radius:11px;
  display:flex; align-items:center; gap:7px;
  transition:transform .12s, box-shadow .12s;
}
.takeover-btn:hover{box-shadow:0 6px 18px rgba(16,21,31,.28); transform:translateY(-1px)}

/* ============ RIGHT : detail panel ============ */
.col-detail{
  display:flex; flex-direction:column; min-height:0;
  background:var(--pane);
  border-left:1px solid var(--line);
}
.detail-scroll{flex:1 1 auto; min-height:0; overflow-y:auto}
.detail-scroll{scrollbar-width:thin; scrollbar-color:var(--line-strong) transparent}
.detail-scroll::-webkit-scrollbar{width:8px}
.detail-scroll::-webkit-scrollbar-thumb{background:var(--line-strong); border-radius:8px; border:2px solid var(--pane)}

.det-hero{
  padding:22px 20px 18px; text-align:center;
  border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, var(--pane-2), var(--pane));
}
.det-ava{
  width:62px;height:62px;border-radius:50%;margin:0 auto 11px;
  display:grid;place-items:center;color:#fff;font-weight:600;font-size:21px;font-family:var(--thai);
  box-shadow:0 6px 18px rgba(20,30,50,.16);
}
.det-name{font-size:17px; font-weight:700; letter-spacing:-.3px}
.det-name .thai{font-weight:600}
.det-sub{font-size:12.5px; color:var(--ink-3); margin-top:3px; font-family:var(--mono)}
.det-conf{
  display:inline-flex; align-items:center; gap:9px; margin-top:14px;
  background:var(--pane-2); border:1px solid var(--line); border-radius:11px;
  padding:9px 14px;
}
.conf-ring{position:relative; width:38px; height:38px; flex:0 0 auto}
.conf-ring svg{transform:rotate(-90deg)}
.conf-ring .pct{
  position:absolute; inset:0; display:grid; place-items:center;
  font-size:11px; font-weight:700; color:var(--st-ai);
}
.det-conf .lbl{text-align:left}
.det-conf .lbl b{font-size:13px; font-weight:700; display:block; color:var(--ink)}
.det-conf .lbl span{font-size:11px; color:var(--ink-3)}

.det-sect{padding:16px 20px; border-bottom:1px solid var(--line)}
.det-sect h3{
  font-size:11px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  color:var(--ink-4); margin-bottom:12px; display:flex; align-items:center; gap:7px;
}
.det-sect h3 .ai-mark{
  font-size:9px; font-weight:700; letter-spacing:.3px; color:var(--accent);
  background:var(--voice-blue-soft); padding:2px 6px; border-radius:5px; text-transform:none;
}
.field{display:flex; align-items:flex-start; gap:10px; padding:7px 0}
.field + .field{border-top:1px solid var(--pane-3)}
.field-k{font-size:12px; color:var(--ink-3); flex:0 0 116px; padding-top:1px}
.field-v{font-size:13px; color:var(--ink); font-weight:500; flex:1 1 auto; line-height:1.4}
.field-v.mono{font-family:var(--mono); font-size:12.5px}
.field-v .thai{font-weight:500}
.field-v.linked{color:var(--accent)}
.booking-card{
  background:var(--st-booked-soft); border:1px solid #ddd3ff; border-radius:11px;
  padding:12px 14px; display:flex; gap:11px; align-items:flex-start;
}
.booking-card .bk-ic{width:32px;height:32px;border-radius:9px;background:#fff;display:grid;place-items:center;flex:0 0 auto}
.booking-card b{font-size:13px; color:#5b3fd0; display:block}
.booking-card span{font-size:12px; color:#6e57c4; line-height:1.45}
.no-booking{font-size:12.5px; color:var(--ink-4); font-style:italic}

.tags{display:flex; flex-wrap:wrap; gap:6px}
.tag{
  font-size:11.5px; font-weight:500; color:var(--ink-2);
  background:var(--pane-2); border:1px solid var(--line);
  border-radius:20px; padding:4px 10px; font-family:var(--thai);
}
.tag.add{cursor:pointer; color:var(--ink-4); border-style:dashed}
.tag.add:hover{color:var(--accent); border-color:var(--accent)}

.history{position:relative; padding-left:18px}
.history::before{content:""; position:absolute; left:4px; top:5px; bottom:5px; width:2px; background:var(--line)}
.hist{position:relative; padding:5px 0}
.hist::before{content:""; position:absolute; left:-17px; top:9px; width:9px; height:9px; border-radius:50%; background:var(--pane); border:2px solid var(--line-strong)}
.hist.now::before{background:var(--accent); border-color:var(--accent)}
.hist b{font-size:12.5px; font-weight:600; display:block; color:var(--ink-2)}
.hist span{font-size:11.5px; color:var(--ink-4); font-family:var(--mono)}

.det-actions{padding:16px 20px; display:flex; flex-direction:column; gap:9px; margin-top:auto; border-top:1px solid var(--line); background:var(--pane-2)}
.btn{
  border:0; cursor:pointer; font-family:var(--font); font-size:13.5px; font-weight:600;
  padding:12px 15px; border-radius:11px; display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform .12s, box-shadow .12s, background .14s;
}
.btn:hover{transform:translateY(-1px)}
.btn-primary{background:var(--ink); color:#fff}
.btn-primary:hover{box-shadow:0 8px 20px rgba(16,21,31,.26)}
.btn-ghost{background:#fff; color:var(--ink-2); border:1px solid var(--line-strong)}
.btn-ghost:hover{background:var(--pane-3)}
.btn-resolved{background:var(--st-ai-soft); color:var(--st-ai); border:1px solid #bfe9d6}
.btn-resolved:hover{box-shadow:0 6px 16px rgba(14,163,113,.2)}

/* scrim for mobile sheets */
.scrim{
  position:fixed; inset:0; background:rgba(16,21,31,.42);
  opacity:0; pointer-events:none; transition:opacity .2s; z-index:40;
}

/* ============ RESPONSIVE ============ */
@media (max-width:1180px){
  .panes{grid-template-columns:300px minmax(0,1fr) 300px}
}
@media (max-width:980px){
  /* detail becomes a slide-over bottom-anchored panel on tablet */
  .panes{grid-template-columns:280px minmax(0,1fr)}
  .col-detail{
    position:fixed; top:0; right:0; height:100dvh; width:340px; max-width:88vw;
    z-index:50; box-shadow:var(--shadow-pop);
    transform:translateX(102%); transition:transform .26s cubic-bezier(.4,0,.2,1);
  }
  body.detail-open .col-detail{transform:translateX(0)}
  body.detail-open .scrim{opacity:1; pointer-events:auto}
  .detail-toggle{display:grid}
}
@media (max-width:640px){
  body{overflow:auto}
  .app{height:auto; min-height:100dvh; grid-template-rows:auto 1fr}
  .topbar{padding:11px 14px; gap:10px; flex-wrap:wrap; overflow:hidden}
  .brand{flex:1 1 auto; min-width:0}
  .brand-txt{min-width:0; overflow:hidden}
  .brand-txt b,.brand-txt span{white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .topbar-spacer{display:none}
  .topbar-search{order:3; flex:1 1 100%; min-width:0; max-width:100%}
  .topbar-search kbd{display:none}
  .live-pill .lp-txt{display:none}
  .live-pill{padding:7px 9px}
  .panes{
    display:block; height:auto; overflow:hidden; width:100%; max-width:100%;
  }
  .col-list,.col-thread{width:100%; max-width:100%}
  /* one pane at a time: list by default, thread when a case is open */
  .col-list{
    border-right:0; height:calc(100dvh - 60px);
  }
  body.thread-open .col-list{display:none}

  .col-thread{
    display:none;
    height:calc(100dvh - 60px);
  }
  body.thread-open .col-thread{display:flex}
  .back-btn{display:grid}
  .detail-toggle{display:grid}

  /* detail as bottom sheet */
  .col-detail{
    top:auto; bottom:0; right:0; left:0;
    width:100%; max-width:100%; height:auto; max-height:86dvh;
    border-radius:20px 20px 0 0; border-left:0; border-top:1px solid var(--line);
    transform:translateY(102%);
  }
  body.detail-open .col-detail{transform:translateY(0)}
  .det-hero{border-radius:20px 20px 0 0; position:relative}
  .sheet-grab{
    display:block; width:42px; height:5px; border-radius:5px; background:var(--line-strong);
    margin:0 auto 14px;
  }
  .thread-scroll{padding:18px 15px 24px}
  .composer{padding:11px 14px}
  .composer-note{display:none}
  .takeover-btn{flex:1 1 auto; justify-content:center}
  .thread-inner{max-width:100%}
  .bubble{max-width:82%}
  /* call banner: wrap to 2 rows so the info text reads cleanly and the
     waveform letterboxes (overflow clip) instead of squeezing the layout */
  .call-banner{flex-wrap:wrap; gap:10px 12px; padding:12px 14px}
  .call-info{flex:1 1 140px}
  .wave{flex:1 1 auto; min-width:0; overflow:hidden; order:2}
  .play-btn{order:1}
  .call-dur{order:3; margin-left:auto}
}
.sheet-grab{display:none}

/* reduced motion */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important}
  .pulse{box-shadow:none !important}
}

/* focus */
:focus-visible{outline:2.5px solid var(--accent); outline-offset:2px; border-radius:6px}
.case:focus-visible,.tab:focus-visible{outline-offset:-2px}

/* ============================================================
   RENDER
   ============================================================ */
const $ = s => document.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const isThai = s => /[฀-๿]/.test(s);
const thaiSpan = s => isThai(s) ? `<span class="thai">${esc(s)}</span>` : esc(s);

const STATUS = {
  ai:    {cls:"ai",     label:"AI-handled"},
  human: {cls:"human",  label:"Needs human"},
  booked:{cls:"booked", label:"Booked"}
};

let activeId = CASES[0].id;
let activeFilter = "all";

/* ---- LEFT: case list ---- */
function snippetLine(snip){
  const s = snip[0];
  const whoLabel = s.who === "AI" ? "AI" : s.who === "P" ? "Patient" : s.who;
  return `<span class="who">${whoLabel}:</span> ${thaiSpan(s.text)}`;
}

function chanIcon(channel){
  if(channel === "line"){
    return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M12 4C6.9 4 3 7.3 3 11.4c0 3.7 3.1 6.8 7.4 7.4.7.1.6.4.5.9l-.2 1.1c-.1.4.2.7.7.5 2.6-1.1 5.6-3 7.6-5.6 1.4-1.4 2.2-3 2.2-4.8C21.2 7.3 17.1 4 12 4Z" fill="#fff"/></svg>`;
  }
  return `<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5.5 4h2.4l1.2 3.2-1.6 1.2a9 9 0 0 0 4.1 4.1l1.2-1.6 3.2 1.2v2.4a1.6 1.6 0 0 1-1.7 1.6A12.5 12.5 0 0 1 4 5.7 1.6 1.6 0 0 1 5.5 4Z" fill="#fff"/></svg>`;
}

function renderList(){
  const list = CASES.filter(c=>{
    if(activeFilter === "all") return true;
    if(activeFilter === "human") return c.status === "human";
    return c.channel === activeFilter;
  });
  $("#caseList").innerHTML = list.map(c=>{
    const st = STATUS[c.status];
    return `
    <div class="case" role="button" tabindex="0" aria-selected="${c.id===activeId}" data-id="${c.id}" data-unread="${c.unread?1:0}">
      <div class="case-ava" style="background:${c.color}">
        ${thaiSpan(c.initials)}
        <span class="case-chan ${c.channel}" aria-hidden="true">${chanIcon(c.channel)}</span>
      </div>
      <div class="case-body">
        <div class="case-top">
          <span class="case-name">${thaiSpan(c.name)}</span>
          <span class="case-time">${esc(c.time)}</span>
        </div>
        <div class="case-snip">${snippetLine(c.snippet)}</div>
        <div class="case-foot">
          <span class="pill ${st.cls}"><span class="dot"></span>${st.label}</span>
          <span class="case-unread" aria-label="Unread"></span>
        </div>
      </div>
    </div>`;
  }).join("") || `<div style="padding:30px 16px;text-align:center;color:var(--ink-4);font-size:13px">No cases in this filter.</div>`;

  // counts
  const cnt = f => CASES.filter(c => f==="all" ? true : f==="human" ? c.status==="human" : c.channel===f).length;
  $("#tc-all").textContent = cnt("all");
  $("#tc-voice").textContent = cnt("voice");
  $("#tc-line").textContent = cnt("line");
  $("#tc-human").textContent = cnt("human");
  $("#caseCount").textContent = list.length;
}

/* ---- waveform bars (deterministic, cheap) ---- */
function waveBars(n){
  let h = "";
  for(let i=0;i<n;i++){
    const v = 6 + Math.round((Math.sin(i*0.9)*0.5+0.5)*22 + (i%3)*4);
    const on = i < Math.floor(n*0.34) ? " on" : "";
    h += `<i class="${on}" style="height:${Math.min(v,30)}px"></i>`;
  }
  return h;
}

/* ---- CENTER: thread ---- */
function renderThread(c){
  // header
  const ava = $("#thAva");
  ava.style.background = c.color;
  ava.innerHTML = `${thaiSpan(c.initials)}<span class="case-chan ${c.channel}" aria-hidden="true">${chanIcon(c.channel)}</span>`;
  $("#thName").innerHTML = `${thaiSpan(c.name)}`;
  const chanTag = c.channel === "line"
    ? `<span class="chan-tag line">${chanIcon0("line")} LINE OA</span>`
    : `<span class="chan-tag voice">${chanIcon0("voice")} Phone - voice</span>`;
  $("#thSub").innerHTML = `${chanTag}<span class="chip-mono">${esc(c.sub.phone)}</span><span>${esc(c.sub.chan)}</span>`;

  // body
  $("#threadBody").innerHTML = c.thread.map(node => renderNode(node, c)).join("");

  // takeover label by status
  const lbl = c.status === "human" ? "Take over chat" : c.status === "booked" ? "Reopen + take over" : "Take over chat";
  $("#takeoverLabel").textContent = lbl;
}

    return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M12 4C6.9 4 3 7.3 3 11.4c0 3.7 3.1 6.8 7.4 7.4.7.1.6.4.5.9l-.2 1.1c-.1.4.2.7.7.5 2.6-1.1 5.6-3 7.6-5.6 1.4-1.4 2.2-3 2.2-4.8C21.2 7.3 17.1 4 12 4Z" fill="#06824a"/></svg>`;
  }
  return `<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5.5 4h2.4l1.2 3.2-1.6 1.2a9 9 0 0 0 4.1 4.1l1.2-1.6 3.2 1.2v2.4a1.6 1.6 0 0 1-1.7 1.6A12.5 12.5 0 0 1 4 5.7 1.6 1.6 0 0 1 5.5 4Z" fill="#1d4fc4"/></svg>`;
}

function renderNode(node, c){
  switch(node.type){
    case "day":
      return `<div class="day-div"><span>${esc(node.label)}</span></div>`;

    case "call":
      return `
      <div class="call-banner" role="group" aria-label="Voice recording">
        <div class="call-icon" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 4h2.6l1.4 3.6-1.8 1.4a10.5 10.5 0 0 0 4.8 4.8l1.4-1.8L18 17.4V20a1.8 1.8 0 0 1-2 1.8A14.5 14.5 0 0 1 2.2 6 1.8 1.8 0 0 1 4 4Z" fill="#fff"/></svg>
        </div>
        <div class="call-info">
          <b>Inbound voice call</b>
          <span>Recorded - transcribed by AI - ${esc(c.call.at)}</span>
        </div>
        <button class="play-btn" aria-label="Play recording" data-play>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M8 5v14l11-7L8 5Z" fill="#2f6df6"/></svg>
        </button>
        <div class="wave" aria-hidden="true" data-wave>${waveBars(34)}</div>
        <span class="call-dur">${esc(c.call.duration)}</span>
      </div>`;

    case "turn":
      return `
      <div class="turn ${node.who}">
        <div class="turn-badge" aria-hidden="true">${node.who==="ai"?"AI":thaiSpan(c.initials)}</div>
        <div class="turn-main">
          <div class="turn-who"><b>${node.who==="ai"?"AI Assistant":esc(node.name||"Patient")}</b><time>${esc(node.time)}</time></div>
          <div class="turn-txt">${thaiSpan(node.text)}</div>
        </div>
      </div>`;

    case "bubble":
      if(node.who === "ai"){
        return `
        <div class="bubble-row ai">
          <div class="bub-ava ai" aria-hidden="true">AI</div>
          <div class="bubble">
            <div class="txt">${thaiSpan(node.text)}</div>
            <time>${esc(node.time)} - AI Assistant</time>
          </div>
        </div>`;
      }
      return `
      <div class="bubble-row patient">
        <div class="bub-ava" style="background:${c.color}" aria-hidden="true">${thaiSpan(c.initials)}</div>
        <div class="bubble">
          <div class="txt">${thaiSpan(node.text)}</div>
          <time>${esc(node.time)}</time>
        </div>
      </div>`;

    case "action":{
      const ic = node.kind === "book"
        ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="15" rx="2.5" stroke="#7a5af5" stroke-width="1.8"/><path d="M4 9h16M8 3v3M16 3v3" stroke="#7a5af5" stroke-width="1.8" stroke-linecap="round"/><path d="m9 14 2 2 4-4" stroke="#7a5af5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 4h2.6l1.4 3.6-1.8 1.4a10.5 10.5 0 0 0 4.8 4.8l1.4-1.8L18 17.4V20a1.8 1.8 0 0 1-2 1.8A14.5 14.5 0 0 1 2.2 6 1.8 1.8 0 0 1 4 4Z" stroke="#2f6df6" stroke-width="1.8" stroke-linejoin="round"/></svg>`;
      return `
      <div class="center-row">
        <div class="act-chip" role="note">
          <div class="act-icon ${node.kind}" aria-hidden="true">${ic}</div>
          <div class="act-body">
            <b>${esc(node.title)}</b>
            <span class="mono">${thaiSpan(node.detail)}</span>
          </div>
          <span class="act-tag">${esc(node.tag)}</span>
        </div>
      </div>`;
    }

    case "escalate":
      return `
      <div class="center-row">
        <div class="act-chip" role="note" style="border-color:#f5d9b0;background:#fdf6ec">
          <div class="act-icon" style="background:var(--st-human-soft)" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3 2.5 20h19L12 3Z" stroke="#e0851b" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 10v4" stroke="#e0851b" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="17" r="1.1" fill="#e0851b"/></svg>
          </div>
          <div class="act-body">
            <b>Escalated to human</b>
            <span>${thaiSpan(node.text.replace(/^AI escalated to human - /,''))}</span>
          </div>
          <span class="act-tag" style="color:var(--st-human);background:var(--st-human-soft)">NEEDS HUMAN</span>
        </div>
      </div>`;
  }
  return "";
}

/* ---- RIGHT: detail panel ---- */
function confRingColor(p){ return p>=90?"#0ea371":p>=78?"#2f6df6":"#e0851b"; }

function renderDetail(c){
  const f = c.fields;
  const ringCol = confRingColor(f.confidence);
  const r = 16, circ = 2*Math.PI*r, off = circ*(1 - f.confidence/100);

  const bookingHtml = f.booking
    ? `<div class="booking-card">
         <div class="bk-ic" aria-hidden="true"><svg width="17" height="17" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="15" rx="2.5" stroke="#7a5af5" stroke-width="1.8"/><path d="M4 9h16M8 3v3M16 3v3" stroke="#7a5af5" stroke-width="1.8" stroke-linecap="round"/></svg></div>
         <div><b>${thaiSpan(f.booking.proc)}</b><span class="thai">${esc(f.booking.when)}<br>${esc(f.booking.price)}</span></div>
       </div>`
    : `<p class="no-booking">No booking made on this case.</p>`;

  const tagsHtml = f.tags.map(t => `<span class="tag">${thaiSpan(t)}</span>`).join("")
    + `<span class="tag add">+ tag</span>`;

  const histHtml = c.history.map(h => `
    <div class="hist ${h.now?'now':''}"><b>${thaiSpan(h.label)}</b><span>${esc(h.time)}</span></div>
  `).join("");

  $("#detailBody").innerHTML = `
    <div class="det-hero">
      <span class="sheet-grab" aria-hidden="true"></span>
      <div class="det-ava" style="background:${c.color}">${thaiSpan(c.initials)}</div>
      <div class="det-name">${thaiSpan(c.name)}</div>
      <div class="det-sub">${esc(c.handle)}</div>
      <div class="det-conf" role="group" aria-label="AI confidence ${f.confidence} percent">
        <div class="conf-ring">
          <svg width="38" height="38" viewBox="0 0 38 38">
            <circle cx="19" cy="19" r="${r}" fill="none" stroke="#e8edf5" stroke-width="4"/>
            <circle cx="19" cy="19" r="${r}" fill="none" stroke="${ringCol}" stroke-width="4" stroke-linecap="round" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
          </svg>
          <span class="pct" style="color:${ringCol}">${f.confidence}</span>
        </div>
        <div class="lbl"><b>AI confidence</b><span>${f.confidence>=90?'High - auto-handled':f.confidence>=78?'Good - review optional':'Low - human review'}</span></div>
      </div>
    </div>

    <div class="det-sect">
      <h3>Extracted fields <span class="ai-mark">AI</span></h3>
      <div class="field"><span class="field-k">Patient name</span><span class="field-v">${thaiSpan(c.name)}</span></div>
      <div class="field"><span class="field-k">Contact</span><span class="field-v mono">${esc(c.handle)}</span></div>
      <div class="field"><span class="field-k">Intent</span><span class="field-v">${esc(f.intent)}</span></div>
      <div class="field"><span class="field-k">Requested</span><span class="field-v">${thaiSpan(f.procedure)}</span></div>
      <div class="field"><span class="field-k">Patient type</span><span class="field-v">${esc(f.patientType)}</span></div>
    </div>

    <div class="det-sect">
      <h3>Booking</h3>
      ${bookingHtml}
    </div>

    <div class="det-sect">
      <h3>Tags</h3>
      <div class="tags">${tagsHtml}</div>
    </div>

    <div class="det-sect">
      <h3>Patient history</h3>
      <div class="history">${histHtml}</div>
    </div>

    <div class="det-actions">
      <button class="btn btn-primary" data-act="takeover">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/><rect x="5" y="11" width="14" height="9" rx="2" stroke="#fff" stroke-width="1.8"/></svg>
        Take over
      </button>
      <button class="btn btn-resolved" data-act="resolve">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="m5 12 4 4 10-10" stroke="#0ea371" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Mark resolved
      </button>
      <button class="btn btn-ghost" data-act="assign">Assign to teammate</button>
    </div>
  `;
}

/* ---- select a case ---- */
function selectCase(id){
  activeId = id;
  const c = CASES.find(x=>x.id===id);
  if(!c) return;
  // mark read
  c.unread = false;
  // sync list selection without full rebuild for snappiness
  document.querySelectorAll(".case").forEach(el=>{
    el.setAttribute("aria-selected", el.dataset.id===id);
    if(el.dataset.id===id) el.dataset.unread = 0;
  });
  renderThread(c);
  renderDetail(c);
  // mobile: open thread view
  if(window.matchMedia("(max-width:640px)").matches){
    document.body.classList.add("thread-open");
  }
  // scroll thread to top
  const ts = document.querySelector(".thread-scroll");
  if(ts) ts.scrollTop = 0;
}

/* ---- events ---- */
function init(){
  renderList();
  selectCase(activeId);

  // case click / keyboard
  $("#caseList").addEventListener("click", e=>{
    const el = e.target.closest(".case");
    if(el) selectCase(el.dataset.id);
  });
  $("#caseList").addEventListener("keydown", e=>{
    const el = e.target.closest(".case");
    if(!el) return;
    if(e.key === "Enter" || e.key === " "){ e.preventDefault(); selectCase(el.dataset.id); }
    if(e.key === "ArrowDown" || e.key === "ArrowUp"){
      e.preventDefault();
      const cards = [...document.querySelectorAll(".case")];
      const i = cards.indexOf(el);
      const next = cards[e.key==="ArrowDown" ? Math.min(i+1,cards.length-1) : Math.max(i-1,0)];
      if(next){ next.focus(); selectCase(next.dataset.id); }
    }
  });

  // filter tabs
  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click", ()=>{
      document.querySelectorAll(".tab").forEach(t=>t.setAttribute("aria-selected","false"));
      tab.setAttribute("aria-selected","true");
      activeFilter = tab.dataset.filter;
      renderList();
      // keep current selection if still visible, else pick first visible
      const visible = [...document.querySelectorAll(".case")];
      if(!visible.some(el=>el.dataset.id===activeId) && visible[0]){
        selectCase(visible[0].dataset.id);
      } else {
        document.querySelectorAll(".case").forEach(el=>el.setAttribute("aria-selected", el.dataset.id===activeId));
      }
    });
  });

  // mobile back
  $("#backBtn").addEventListener("click", ()=> document.body.classList.remove("thread-open"));

  // detail toggle (tablet/mobile sheet)
  const openDetail = ()=> document.body.classList.add("detail-open");
  const closeDetail = ()=> document.body.classList.remove("detail-open");
  $("#detailToggle").addEventListener("click", openDetail);
  $("#scrim").addEventListener("click", closeDetail);

  // detail panel actions + takeover (event-delegated, flash feedback)
  $("#detailBody").addEventListener("click", e=>{
    const b = e.target.closest("[data-act]");
    if(!b) return;
    flash(b);
    if(b.dataset.act === "takeover" || b.dataset.act === "resolve") closeDetail();
  });
  $("#takeoverBtn").addEventListener("click", e=> flash(e.currentTarget));

  // wave / play (visual only)
  $("#threadBody").addEventListener("click", e=>{
    const p = e.target.closest("[data-play]");
    const w = e.target.closest("[data-wave]");
    if(p || w){
      const wave = document.querySelector("[data-wave]");
      if(wave) animateWave(wave);
    }
  });

  // search focus shortcut
  document.addEventListener("keydown", e=>{
    if(e.key === "/" && document.activeElement.tagName !== "INPUT"){
      e.preventDefault();
      document.querySelector(".topbar-search input").focus();
    }
    if(e.key === "Escape"){ closeDetail(); }
  });
}

let flashTimer;
function flash(btn){
  const original = btn.dataset.flashed ? null : btn.innerHTML;
  if(original !== null) btn.dataset.orig = original;
  btn.dataset.flashed = "1";
  const done = btn.querySelector("svg") ? btn.dataset.orig : btn.dataset.orig;
  btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="m5 12 4 4 10-10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Done`;
  clearTimeout(flashTimer);
  flashTimer = setTimeout(()=>{ btn.innerHTML = btn.dataset.orig; }, 1300);
}

/* lightweight wave animation, respects reduced-motion */
function animateWave(wave){
  if(window.matchMedia("(prefers-reduced-motion:reduce)").matches) return;
  const bars = [...wave.querySelectorAll("i")];
  bars.forEach(b=>b.classList.remove("on"));
  let i = 0;
  clearInterval(wave._t);
  wave._t = setInterval(()=>{
    bars.forEach((b,idx)=> b.classList.toggle("on", idx <= i));
    i++;
    if(i >= bars.length){ clearInterval(wave._t); }
  }, 38);
}

init();
</script>
</body>
</html>
