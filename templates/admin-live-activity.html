<!-- TEMPLATE: Pulse Live Activity | ARCHETYPE: admin-live-activity | REF: Stripe activity log, Vercel deployment feed, real-time ops stream | WHEN TO USE: a watch-the-AI-work admin screen - one reverse-chron real-time event stream of everything an AI assistant is doing across channels, with a left filter rail and a live LIVE bar | SWAP: edit the DATA arrays at top of <script> -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pulse - Live Activity</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     Pulse - real-time AI ops activity stream.
     Soft-dark surface, channel colors, event-type accents.
     ALL copy + events live in the DATA block at the very top of
     <script>. Swap there. Styling below is stream-first.
     ============================================================ */

  :root {
    --bg: #0f1115;
    --bg-2: #14171d;
    --rail: #12151b;
    --panel: #161a22;
    --panel-2: #1b2029;
    --line: #262c38;
    --line-soft: #1e232c;
    --ink: #eef1f7;
    --ink-2: #aab3c4;
    --ink-3: #6b7588;
    --ink-4: #4a5366;

    --sans: 'Inter', system-ui, -apple-system, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;

    /* channels */
    --line-green: #06c755;      /* LINE brand */
    --line-green-soft: rgba(6, 199, 85, 0.14);
    --voice: #7c8cff;           /* phone / voice */
    --voice-soft: rgba(124, 140, 255, 0.15);

    /* event-type accents */
    --ev-call: #7c8cff;         /* call started */
    --ev-msg: #38bdf8;          /* message received */
    --ev-book: #34d399;         /* appointment booked */
    --ev-handoff: #fbbf24;      /* handoff escalated */
    --ev-resolved: #a78bfa;     /* case resolved */
    --ev-phone: #f472b6;        /* phone captured */

    --live: #2fe08a;
    --live-glow: rgba(47, 224, 138, 0.55);

    --r: 14px;
    --r-sm: 10px;
    --r-xs: 7px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(1100px 520px at 82% -12%, rgba(124, 140, 255, 0.10), transparent 62%),
      radial-gradient(820px 480px at 4% 2%, rgba(6, 199, 85, 0.06), transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-feature-settings: "cv05" 1, "ss01" 1;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    overflow-x: hidden;
  }

  a { color: inherit; }

  /* ---------- APP SHELL ---------- */
  .app {
    max-width: 1440px;
    margin: 0 auto;
    padding: 18px 22px 56px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ====================================================
     LIVE BAR  (top)
     ==================================================== */
  .livebar {
    display: grid;
    grid-template-columns: auto 1px 1fr auto;
    align-items: center;
    gap: 20px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 14px 20px;
    box-shadow: 0 22px 60px -34px rgba(0, 0, 0, 0.92), inset 0 1px 0 rgba(255, 255, 255, 0.03);
  }

  .brand { display: flex; align-items: center; gap: 12px; }
  .brand .mark {
    width: 38px; height: 38px;
    display: grid; place-items: center;
    border-radius: 11px;
    background: radial-gradient(130% 130% at 30% 18%, #1f2533, #11151e);
    border: 1px solid var(--line);
    box-shadow: 0 0 22px -8px var(--live-glow), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .brand .name { font-weight: 800; font-size: 16px; letter-spacing: .1px; line-height: 1.1; }
  .brand .name b { color: var(--live); font-weight: 800; }
  .brand .sub {
    font-family: var(--mono); font-size: 10px; color: var(--ink-3);
    letter-spacing: 1.5px; text-transform: uppercase; margin-top: 3px;
  }

  .v-divider { width: 1px; height: 38px; background: var(--line); align-self: center; }

  /* live status block */
  .live-status { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
  .live-now {
    display: flex; align-items: center; gap: 11px;
    padding: 7px 14px 7px 11px;
    border: 1px solid rgba(47, 224, 138, 0.34);
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(47, 224, 138, 0.10), rgba(47, 224, 138, 0.03));
  }
  .live-pulse {
    position: relative;
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--live);
    box-shadow: 0 0 10px 1px var(--live-glow);
    flex: 0 0 auto;
  }
  .live-pulse::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: 50%;
    background: var(--live);
    animation: ring 1.9s ease-out infinite;
  }
  @keyframes ring {
    0%   { box-shadow: 0 0 0 0 var(--live-glow); opacity: .9; }
    70%  { box-shadow: 0 0 0 11px rgba(47, 224, 138, 0); opacity: 0; }
    100% { box-shadow: 0 0 0 0 rgba(47, 224, 138, 0); opacity: 0; }
  }
  .live-now .lbl { font-size: 12px; font-weight: 600; color: var(--ink-2); letter-spacing: .2px; }
  .live-now .lbl b { color: var(--ink); font-weight: 700; }

  .totals { display: flex; align-items: center; gap: 26px; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .num {
    font-family: var(--mono); font-size: 19px; font-weight: 600; letter-spacing: -.4px;
    color: var(--ink); line-height: 1; font-variant-numeric: tabular-nums;
  }
  .stat .num .tick { color: var(--ev-book); }
  .stat .cap { font-size: 10.5px; color: var(--ink-3); letter-spacing: .4px; text-transform: uppercase; }

  .clock {
    display: flex; flex-direction: column; align-items: flex-end; gap: 3px;
    text-align: right;
  }
  .clock .t {
    font-family: var(--mono); font-size: 14px; color: var(--ink-2);
    letter-spacing: .3px; font-variant-numeric: tabular-nums;
  }
  .clock .d { font-size: 10.5px; color: var(--ink-3); letter-spacing: .3px; }

  /* ====================================================
     MAIN GRID  (rail + stream)
     ==================================================== */
  .main {
    display: grid;
    grid-template-columns: 232px 1fr;
    gap: 16px;
    align-items: start;
  }

  /* ---------- FILTER RAIL ---------- */
  .rail {
    position: sticky; top: 18px;
    background: linear-gradient(180deg, var(--panel), var(--rail));
    border: 1px solid var(--line);
    border-radius: var(--r);
    padding: 16px 14px;
    display: flex; flex-direction: column; gap: 20px;
    box-shadow: 0 22px 60px -40px rgba(0, 0, 0, 0.9);
  }
  .rail .group-h {
    font-size: 10.5px; font-weight: 700; color: var(--ink-4);
    letter-spacing: 1.4px; text-transform: uppercase;
    padding: 0 6px; margin-bottom: 9px;
  }
  .rail .flist { display: flex; flex-direction: column; gap: 3px; }
  .frow {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 8px 10px;
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    background: transparent;
    color: var(--ink-2);
    font-family: var(--sans);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    text-align: left;
    transition: background .14s ease, color .14s ease, border-color .14s ease;
  }
  .frow:hover { background: var(--panel-2); color: var(--ink); }
  .frow:focus-visible {
    outline: 2px solid var(--voice);
    outline-offset: 2px;
  }
  .frow[aria-pressed="true"] {
    background: var(--panel-2);
    border-color: var(--line);
    color: var(--ink);
  }
  .frow .swatch {
    width: 9px; height: 9px; border-radius: 3px; flex: 0 0 auto;
    box-shadow: 0 0 8px -2px currentColor;
  }
  .frow .ico { width: 16px; height: 16px; flex: 0 0 auto; display: grid; place-items: center; }
  .frow .ft { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .frow .fc {
    font-family: var(--mono); font-size: 11px; color: var(--ink-4);
    font-variant-numeric: tabular-nums;
  }
  .frow[aria-pressed="true"] .fc { color: var(--ink-3); }

  /* ====================================================
     STREAM
     ==================================================== */
  .stream-wrap {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border: 1px solid var(--line);
    border-radius: var(--r);
    box-shadow: 0 24px 70px -44px rgba(0, 0, 0, 0.9);
    overflow: hidden;
  }
  .stream-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 13px 18px;
    border-bottom: 1px solid var(--line-soft);
    background: linear-gradient(180deg, rgba(255,255,255,.015), transparent);
  }
  .stream-head .title { display: flex; align-items: center; gap: 10px; }
  .stream-head .title h2 {
    margin: 0; font-size: 14px; font-weight: 700; letter-spacing: .1px; color: var(--ink);
  }
  .stream-head .title .live-pulse { width: 8px; height: 8px; }
  .stream-head .meta {
    font-family: var(--mono); font-size: 11px; color: var(--ink-3);
    letter-spacing: .3px; font-variant-numeric: tabular-nums;
  }
  .stream-head .meta b { color: var(--ink-2); font-weight: 600; }

  /* the live feed */
  .feed { list-style: none; margin: 0; padding: 6px 0; }

  .ev {
    position: relative;
    display: grid;
    grid-template-columns: 46px 18px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 12px 20px 12px 16px;
    border-bottom: 1px solid var(--line-soft);
  }
  .ev:last-child { border-bottom: none; }
  .ev:hover { background: rgba(255,255,255,.018); }

  /* left accent bar by event type, set via --ec */
  .ev::before {
    content: "";
    position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 3px; border-radius: 0 3px 3px 0;
    background: var(--ec, var(--ink-4));
    box-shadow: 0 0 12px -2px var(--ec, transparent);
  }

  /* channel chip */
  .ev .chan {
    width: 46px; height: 46px;
    display: grid; place-items: center;
    border-radius: var(--r-sm);
    border: 1px solid var(--line);
    position: relative;
  }
  .ev .chan.line {
    background: linear-gradient(180deg, var(--line-green-soft), rgba(6,199,85,.04));
    border-color: rgba(6, 199, 85, 0.30);
  }
  .ev .chan.voice {
    background: linear-gradient(180deg, var(--voice-soft), rgba(124,140,255,.04));
    border-color: rgba(124, 140, 255, 0.30);
  }
  .ev .chan svg { width: 22px; height: 22px; display: block; }

  /* event-type marker dot */
  .ev .marker {
    width: 18px; height: 18px;
    display: grid; place-items: center;
    position: relative;
  }
  .ev .marker .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--ec);
    box-shadow: 0 0 9px -1px var(--ec), inset 0 0 0 2px rgba(0,0,0,.2);
  }

  /* body: name + action */
  .ev .body { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .ev .row1 { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .ev .pname { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: .1px; }
  .ev .etag {
    font-size: 10.5px; font-weight: 600; letter-spacing: .3px;
    padding: 2px 8px; border-radius: 999px;
    color: var(--ec);
    background: color-mix(in srgb, var(--ec) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--ec) 34%, transparent);
    text-transform: capitalize; white-space: nowrap;
  }
  .ev .action {
    font-size: 13px; color: var(--ink-2); line-height: 1.4;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ev .action .hl { color: var(--ink); font-weight: 500; }

  /* right: timestamp + status */
  .ev .right {
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    flex: 0 0 auto;
  }
  .ev .ts {
    font-family: var(--mono); font-size: 11.5px; color: var(--ink-3);
    letter-spacing: .2px; font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  .ev .status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: .2px;
    padding: 3px 9px 3px 8px; border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--ink-2);
    white-space: nowrap;
  }
  .ev .status .sd { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex: 0 0 auto; }
  .status.active  { color: #6ee7ff; border-color: rgba(110,231,255,.30); background: rgba(110,231,255,.07); }
  .status.done    { color: #34d399; border-color: rgba(52,211,153,.30); background: rgba(52,211,153,.07); }
  .status.pending { color: #fbbf24; border-color: rgba(251,191,36,.30); background: rgba(251,191,36,.07); }
  .status.handoff { color: #fb923c; border-color: rgba(251,146,60,.30); background: rgba(251,146,60,.07); }

  /* enter animation for prepended rows */
  .ev.fresh { animation: slidein .5s cubic-bezier(.22,.61,.36,1); }
  @keyframes slidein {
    0%   { opacity: 0; transform: translateY(-12px); background: rgba(47,224,138,.10); }
    60%  { opacity: 1; }
    100% { opacity: 1; transform: translateY(0); background: transparent; }
  }
  /* a brief glow trace on the accent bar of a fresh row */
  .ev.fresh::before { animation: barflash .9s ease-out; }
  @keyframes barflash {
    0% { box-shadow: 0 0 16px 2px var(--ec); }
    100% { box-shadow: 0 0 12px -2px var(--ec); }
  }

  .stream-foot {
    padding: 12px 18px; text-align: center;
    border-top: 1px solid var(--line-soft);
    font-size: 12px; color: var(--ink-3);
  }
  .stream-foot span { font-family: var(--mono); color: var(--ink-4); }

  /* mobile chip strip (hidden on desktop) */
  .chipstrip { display: none; }

  /* ====================================================
     RESPONSIVE
     ==================================================== */
  @media (max-width: 980px) {
    .main { grid-template-columns: 1fr; gap: 12px; }
    .rail { display: none; }
    .chipstrip {
      display: flex; gap: 8px; overflow-x: auto; padding: 2px 2px 4px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .chipstrip::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--ink-2);
      font-family: var(--sans); font-size: 13px; font-weight: 500;
      cursor: pointer; white-space: nowrap;
    }
    .chip:focus-visible { outline: 2px solid var(--voice); outline-offset: 2px; }
    .chip[aria-pressed="true"] { background: var(--panel-2); color: var(--ink); border-color: var(--ink-4); }
    .chip .swatch { width: 8px; height: 8px; border-radius: 3px; }
    .chip .fc { font-family: var(--mono); font-size: 11px; color: var(--ink-4); }
  }

  @media (max-width: 720px) {
    .app { padding: 14px 13px 44px; gap: 13px; }
    .livebar {
      grid-template-columns: 1fr;
      gap: 13px; padding: 14px 16px;
    }
    .v-divider { display: none; }
    .live-status { gap: 14px; justify-content: space-between; }
    .clock { display: none; }
    .totals { gap: 18px; }
  }

  @media (max-width: 480px) {
    .ev {
      grid-template-columns: 40px 1fr;
      grid-template-areas:
        "chan body"
        "chan right";
      row-gap: 8px;
      column-gap: 12px;
      align-items: start;
      padding: 13px 14px 13px 14px;
    }
    .ev .chan { width: 40px; height: 40px; grid-area: chan; }
    .ev .marker { display: none; }
    .ev .body { grid-area: body; }
    .ev .right {
      grid-area: right;
      flex-direction: row; align-items: center; justify-content: flex-start;
      gap: 10px;
    }
    .ev .action { white-space: normal; }
    .stat .num { font-size: 17px; }
  }

  /* ====================================================
     REDUCED MOTION  (settle, no auto-prepend / pulse)
     ==================================================== */
  @media (prefers-reduced-motion: reduce) {
    .live-pulse::after { animation: none; }
    .ev.fresh { animation: none; }
    .ev.fresh::before { animation: none; }
    * { scroll-behavior: auto !important; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ============== LIVE BAR ============== -->
  <header class="livebar">
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <!-- pulse mark -->
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M2 12h4l2-7 4 14 3-9 2 4h5" stroke="#2fe08a" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="name">Pulse<b>.</b></div>
        <div class="sub">ยิ้มหวาน Dental AI</div>
      </div>
    </div>

    <div class="v-divider" aria-hidden="true"></div>

    <div class="live-status">
      <div class="live-now">
        <span class="live-pulse" aria-hidden="true"></span>
        <span class="lbl"><b id="liveCount">3</b> active right now</span>
      </div>
      <div class="totals">
        <div class="stat">
          <div class="num" id="tEvents">218</div>
          <div class="cap">Events today</div>
        </div>
        <div class="stat">
          <div class="num"><span class="tick">42</span></div>
          <div class="cap">Booked</div>
        </div>
        <div class="stat">
          <div class="num">11</div>
          <div class="cap">Handoffs</div>
        </div>
        <div class="stat">
          <div class="num">1.4<span style="font-size:12px;color:var(--ink-3)">s</span></div>
          <div class="cap">Avg reply</div>
        </div>
      </div>
    </div>

    <div class="clock">
      <div class="t" id="clock">14:32:08</div>
      <div class="d">Bangkok GMT+7</div>
    </div>
  </header>

  <div class="main">

    <!-- ============== FILTER RAIL ============== -->
    <aside class="rail" aria-label="Filters">
      <div>
        <div class="group-h">Channel</div>
        <div class="flist" id="chanFilters"></div>
      </div>
      <div>
        <div class="group-h">Event type</div>
        <div class="flist" id="typeFilters"></div>
      </div>
    </aside>

    <!-- ============== STREAM ============== -->
    <section class="stream-wrap" aria-label="Live activity stream">
      <div class="stream-head">
        <div class="title">
          <span class="live-pulse" aria-hidden="true"></span>
          <h2>Live activity</h2>
        </div>
        <div class="meta">streaming <b id="shownCount">0</b> events / newest first</div>
      </div>

      <!-- mobile chip strip -->
      <div style="padding: 10px 14px 0;">
        <div class="chipstrip" id="chipStrip" role="group" aria-label="Filters"></div>
      </div>

      <ul class="feed" id="feed" aria-live="off"></ul>

      <div class="stream-foot">end of buffer <span>// 24h retention, older archived</span></div>
    </section>

  </div>
</div>

<script>
/* ============================================================
   DATA  -  swap freely. Everything below is rendering only.
   ============================================================ */

// channel + event-type definitions (drive the filter rail + markers)
const CHANNELS = {
  line:  { label: "LINE OA",  color: "var(--line-green)" },
  voice: { label: "Phone / voice", color: "var(--voice)" }
};

const EVENT_TYPES = {
  call:     { label: "Call started",       accent: "#7c8cff", status: "active"  },
  message:  { label: "Message received",   accent: "#38bdf8", status: "active"  },
  booked:   { label: "Appointment booked", accent: "#34d399", status: "done"    },
  handoff:  { label: "Handoff escalated",  accent: "#fbbf24", status: "handoff" },
  resolved: { label: "Case resolved",      accent: "#a78bfa", status: "done"    },
  phone:    { label: "Phone captured",     accent: "#f472b6", status: "done"    }
};

// inline channel icons (hex fills only, never var())
const ICONS = {
  // LINE speech bubble
  line: '<svg viewBox="0 0 24 24" fill="none"><path d="M12 3C6.7 3 2.4 6.5 2.4 10.8c0 3.9 3.4 7.1 8 7.7.3.06.7.2.8.46.07.24.05.6.02.85l-.13.78c-.04.23-.18.9.8.49 1-.41 5.3-3.12 7.23-5.35 1.33-1.46 1.97-2.95 1.97-4.6C21.1 6.5 16.8 3 12 3Z" fill="#06c755"/><path d="M9.1 9.1v3.3M7.4 9.1H6.1v3.3h1.3M10.5 9.1v3.3l-1.4-3.3M16.9 9.1h-1.6v3.3h1.6M15.3 10.7h1.2" stroke="#0f1115" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
  // phone handset
  voice: '<svg viewBox="0 0 24 24" fill="none"><path d="M6.6 3.5 8.4 3c.5-.13 1 .13 1.2.6l.9 2.4c.18.46.04.98-.34 1.3l-1.3 1.05c.86 1.85 2.3 3.3 4.15 4.15l1.05-1.3c.32-.38.84-.52 1.3-.34l2.4.9c.47.2.73.7.6 1.2l-.5 1.8c-.12.46-.54.78-1.02.76C9.3 17.3 6.7 14.7 5.9 8.1 5.8 7.4 5.9 6.6 6.6 3.5Z" fill="#7c8cff"/></svg>'
};

/* The event corpus. Newest entries are added at the top of the stream;
   the feed renders most-recent-first. `ago` = seconds since now at load. */
const EVENTS = [
  { id: 201, ch: "voice", type: "call",     name: "คุณ สมหญิง พ.",   action: 'Inbound call - greeting <span class="hl">น้องยิ้มหวาน</span>, intent: reschedule cleaning', ago: 4 },

/* Pool the simulated live stream draws from (round-robins, recombined). */
const POOL = [
  { ch: "line",  type: "message",  name: "คุณ กิตติพงษ์ ส.",  action: 'Asked about <span class="hl">ฟอกสีฟัน</span> promo this month' },
  { ch: "voice", type: "call",     name: "คุณ รัตนา ม.",      action: 'Inbound call - confirming tomorrow <span class="hl">ขูดหินปูน</span> appointment' },
  { ch: "line",  type: "booked",   name: "คุณ วราภรณ์ ท.",    action: 'Booked <span class="hl">ตรวจสุขภาพช่องปาก</span> - Fri 4 Jul 11:00' },
  { ch: "voice", type: "phone",    name: "คุณ สมชาย ป.",      action: 'Captured callback <span class="hl">08x-xxx-7762</span>, read-back ok' },
  { ch: "line",  type: "handoff",  name: "คุณ อนุชา ร.",      action: 'Escalated - complaint about wait time, routed to manager' },
  { ch: "voice", type: "resolved", name: "คุณ เบญจวรรณ ค.",   action: 'Resolved - explained <span class="hl">หลังอุดฟัน</span> care, thread closed' },
  { ch: "line",  type: "message",  name: "คุณ ธีรเดช อ.",     action: 'Sent photo of chipped <span class="hl">ฟันหน้า</span>, asked options' },
  { ch: "voice", type: "booked",   name: "คุณ นภัสสร ว.",     action: 'Booked <span class="hl">รักษารากฟัน</span> consult - Tue 8 Jul 09:30' }
];

/* ============================================================
   RENDER
   ============================================================ */
const feedEl   = document.getElementById('feed');
const reduce   = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
let activeChan = null;   // null = all
let activeType = null;
let nextId     = 220;
const loadAt   = Date.now();

function fmtAgo(sec) {
  if (sec < 5) return "just now";
  if (sec < 60) return sec + "s ago";
  const m = Math.floor(sec / 60);
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  return h + "h ago";
}

function matches(ev) {
  if (activeChan && ev.ch !== activeChan) return false;
  if (activeType && ev.type !== activeType) return false;
  return true;
}

function rowHTML(ev, fresh) {
  const t   = EVENT_TYPES[ev.type];
  const ch  = CHANNELS[ev.ch];
  const tsSec = ev._ts != null ? Math.floor((Date.now() - ev._ts) / 1000) : ev.ago;
  return `
  <li class="ev${fresh ? ' fresh' : ''}" style="--ec:${t.accent}" data-ch="${ev.ch}" data-type="${ev.type}">
    <div class="chan ${ev.ch}" title="${ch.label}">${ICONS[ev.ch]}</div>
    <div class="marker" aria-hidden="true"><span class="dot"></span></div>
    <div class="body">
      <div class="row1">
        <span class="pname">${ev.name}</span>
        <span class="etag">${t.label}</span>
      </div>
      <div class="action">${ev.action}</div>
    </div>
    <div class="right">
      <span class="ts">${fmtAgo(tsSec)}</span>
      <span class="status ${t.status}"><span class="sd"></span>${statusLabel(t.status)}</span>
    </div>
  </li>`;
}

function statusLabel(s) {
  return { active: "Active", done: "Done", pending: "Pending", handoff: "Handoff" }[s] || s;
}

// the working list, newest first
let stream = EVENTS.map(e => ({ ...e, _ts: loadAt - e.ago * 1000 }))
                   .sort((a, b) => b._ts - a._ts);

function render() {
  const visible = stream.filter(matches);
  feedEl.innerHTML = visible.map(ev => rowHTML(ev, false)).join('');
  document.getElementById('shownCount').textContent = visible.length;
}

/* ---------- FILTER RAIL ---------- */
function countFor(predicate) { return stream.filter(predicate).length; }

function buildFilters() {
  const chanWrap = document.getElementById('chanFilters');
  const typeWrap = document.getElementById('typeFilters');
  const chipWrap = document.getElementById('chipStrip');

  // ALL channels row
  let chanHTML = filterRow('chan', null, 'All channels', null, stream.length);
  for (const key in CHANNELS) {
    chanHTML += filterRow('chan', key, CHANNELS[key].label, CHANNELS[key].color,
      countFor(e => e.ch === key), true);
  }
  chanWrap.innerHTML = chanHTML;

  let typeHTML = filterRow('type', null, 'All events', null, stream.length);
  for (const key in EVENT_TYPES) {
    typeHTML += filterRow('type', key, EVENT_TYPES[key].label, EVENT_TYPES[key].accent,
      countFor(e => e.type === key));
  }
  typeWrap.innerHTML = typeHTML;

  // mobile chip strip = all + channels + types (compact)
  let chipHTML = chipBtn('chan', null, 'All', null, stream.length);
  for (const key in CHANNELS) chipHTML += chipBtn('chan', key, CHANNELS[key].label.split(' ')[0], CHANNELS[key].color, countFor(e => e.ch === key));
  for (const key in EVENT_TYPES) chipHTML += chipBtn('type', key, EVENT_TYPES[key].label, EVENT_TYPES[key].accent, countFor(e => e.type === key));
  chipWrap.innerHTML = chipHTML;

  wireFilters();
}

function filterRow(dim, key, label, color, count, isChannel) {
  const pressed = (dim === 'chan' ? activeChan : activeType) === key;
  const sw = color ? `<span class="swatch" style="background:${color};color:${color}"></span>` : `<span class="ico" aria-hidden="true">${dimAllIcon(dim)}</span>`;
  return `<button class="frow" data-dim="${dim}" data-key="${key === null ? '' : key}" aria-pressed="${pressed}">
    ${sw}<span class="ft">${label}</span><span class="fc">${count}</span></button>`;
}

function chipBtn(dim, key, label, color, count) {
  const pressed = (dim === 'chan' ? activeChan : activeType) === key;
  const sw = color ? `<span class="swatch" style="background:${color}"></span>` : '';
  return `<button class="chip" data-dim="${dim}" data-key="${key === null ? '' : key}" aria-pressed="${pressed}">
    ${sw}<span>${label}</span><span class="fc">${count}</span></button>`;
}

function dimAllIcon(dim) {
  return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="6" r="2.4" fill="#6b7588"/><circle cx="6" cy="18" r="2.4" fill="#6b7588"/><circle cx="18" cy="6" r="2.4" fill="#6b7588"/><circle cx="18" cy="18" r="2.4" fill="#6b7588"/></svg>';
}

function wireFilters() {
  document.querySelectorAll('.frow, .chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const dim = btn.dataset.dim;
      const key = btn.dataset.key === '' ? null : btn.dataset.key;
      if (dim === 'chan') activeChan = (activeChan === key) ? null : key;
      else                activeType = (activeType === key) ? null : key;
      buildFilters();
      render();
    });
  });
}

/* ---------- LIVE CLOCK ---------- */
const clockEl = document.getElementById('clock');
function tickClock() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  clockEl.textContent = `${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}
tickClock();
setInterval(tickClock, 1000);

/* ---------- AUTO-PREPEND (gated under reduced motion) ---------- */
let poolIdx = 0;
function prependEvent() {
  const base = POOL[poolIdx % POOL.length];
  poolIdx++;
  const ev = { ...base, id: nextId++, _ts: Date.now(), ago: 0 };
  stream.unshift(ev);
  if (stream.length > 60) stream.pop();   // bound the buffer

  // update live bar totals
  const tEv = document.getElementById('tEvents');
  tEv.textContent = (parseInt(tEv.textContent, 10) + 1);

  // only inject into the DOM if it passes the active filter
  if (matches(ev)) {
    const tmp = document.createElement('tbody');
    tmp.innerHTML = rowHTML(ev, true);
    const node = tmp.firstElementChild;
    feedEl.prepend(node);
    document.getElementById('shownCount').textContent = stream.filter(matches).length;
    // trim DOM to keep it light
    while (feedEl.children.length > 40) feedEl.removeChild(feedEl.lastElementChild);
    // strip the fresh class after the animation so re-renders are clean
    setTimeout(() => node.classList.remove('fresh'), 600);
  }
}

/* refresh relative timestamps periodically. A full re-render preserves
   order + active filters; skip while a fresh row is still animating. */
function refreshTimes() {
  if (!feedEl.querySelector('.ev.fresh')) render();
}

buildFilters();
render();

// live count drifts a little to feel real (1 to 4 active)
const liveCountEl = document.getElementById('liveCount');
function driftLive() {
  const n = 1 + Math.floor(Math.random() * 4);
  liveCountEl.textContent = n;
}

if (!reduce) {
  // auto-prepend new events on a human cadence
  let pTimer = setInterval(() => {
    prependEvent();
  }, 3400);
  // gentle re-time of relative stamps + live drift
  setInterval(refreshTimes, 16000);
  setInterval(driftLive, 5200);

  // pause prepending when tab is hidden (perf + correctness)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) { clearInterval(pTimer); pTimer = null; }
    else if (!pTimer) { pTimer = setInterval(prependEvent, 3400); }
  });
}
/* Under reduced motion: no auto-prepend, no live drift. The settled
   feed and a static (non-animating) pulse ring are shown. */
</script>
