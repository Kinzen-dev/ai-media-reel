<!-- TEMPLATE: The Midnight Caller | ARCHETYPE: narrative interactive-story title card | REF: Gucci Mystery Unfolds (Awwwards SOTD Jun 2026), IVRESS Spin a Tale (FWA SOTM May 2026) | WHEN TO USE: diegetic cinematic landing that drops a visitor INTO a story role (mystery, film, game, immersive brand) instead of a SaaS hero | SWAP: edit the STORY object at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Midnight Caller</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     SWAP EVERYTHING VISIBLE BY EDITING THE STORY OBJECT IN <script>.
     This stylesheet only carries the look; copy lives in JS DATA.
     ============================================================ */
  :root {
    --scene: url("../assets/flux-car-4k.png");
    --cream: #f3e7cf;
    --cream-dim: #cbb896;
    --amber: #ffb45a;
    --amber-hot: #ffd9a0;
    --ink: #060608;
    --crimson: #c8403a;
    --glow: rgba(255, 180, 90, 0.9);
    --vh: 100vh;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--ink);
    color: var(--cream);
    font-family: "EB Garamond", Georgia, serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ============================== STAGE ============================== */
  .stage {
    position: relative;
    width: 100%;
    min-height: var(--vh);
    display: grid;
    grid-template-rows: 1fr;
    place-items: center;
    overflow: hidden;
    isolation: isolate;
  }

  /* full-bleed illustrated night scene (real asset) */
  .scene {
    position: absolute;
    inset: 0;
    background-image: var(--scene);
    background-size: cover;
    background-position: 50% 58%;
    z-index: -3;
    transform: scale(1.06);
    transition: transform 1.4s cubic-bezier(.2,.7,.2,1);
    filter: saturate(1.05) contrast(1.06) brightness(.78);
    will-change: transform;
  }
  .stage.ready .scene { transform: scale(1.02); }

  /* graded color washes: cold rain top, warm candle bloom at the object */
  .scene::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 80% at 50% 62%, rgba(255,160,70,.30), transparent 46%),
      linear-gradient(180deg, rgba(6,8,14,.72) 0%, rgba(6,8,14,.18) 32%, rgba(6,6,8,.42) 70%, rgba(4,4,6,.92) 100%),
      radial-gradient(140% 120% at 50% 40%, transparent 40%, rgba(4,4,8,.7) 100%);
    mix-blend-mode: multiply;
  }

  /* drifting rain, drawn in CSS so no extra media decode */
  .rain {
    position: absolute;
    inset: -10% 0 0 0;
    z-index: -2;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(102deg, rgba(220,230,255,.05) 0 1px, transparent 1px 7px),
      repeating-linear-gradient(98deg, rgba(220,230,255,.035) 0 1px, transparent 1px 11px);
    background-size: 180px 180px, 240px 240px;
    opacity: .6;
    animation: rain 2.4s linear infinite;
    will-change: background-position;
  }
  @keyframes rain {
    to { background-position: -90px 180px, 130px 240px; }
  }

  /* grain veil */
  .grain {
    position: absolute;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    opacity: .07;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* cinematic letterbox bars to read as a title card */
  .bar {
    position: absolute;
    left: 0; right: 0;
    height: clamp(26px, 5.5vh, 64px);
    background: linear-gradient(var(--ink), rgba(6,6,8,.0));
    z-index: 6;
    pointer-events: none;
  }
  .bar.top { top: 0; }
  .bar.bottom { bottom: 0; transform: scaleY(-1); }

  /* ============================== TITLE CARD ============================== */
  .card {
    position: relative;
    z-index: 5;
    width: min(92vw, 980px);
    padding: clamp(18px, 4vh, 40px) 0;
    text-align: center;
    display: grid;
    grid-template-rows: auto auto auto;
    justify-items: center;
    gap: clamp(14px, 3.2vh, 34px);
  }

  .imprint {
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    letter-spacing: .42em;
    text-transform: uppercase;
    font-size: clamp(.62rem, 1.5vw, .82rem);
    color: var(--cream-dim);
    opacity: 0;
    animation: rise .9s .2s both;
  }
  .imprint b { color: var(--amber); font-weight: 600; }

  .titleblock { display: grid; gap: .1em; }
  .episode {
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(.9rem, 2.2vw, 1.2rem);
    color: var(--cream-dim);
    letter-spacing: .08em;
    opacity: 0;
    animation: rise .9s .35s both;
  }
  .title {
    font-family: "Cormorant Garamond", serif;
    font-weight: 600;
    line-height: .92;
    font-size: clamp(3rem, 11vw, 8.2rem);
    color: var(--cream);
    letter-spacing: .005em;
    text-shadow: 0 2px 40px rgba(0,0,0,.6), 0 0 60px rgba(255,170,80,.12);
    opacity: 0;
    animation: rise 1.1s .5s both;
  }
  .title .em { font-style: italic; color: var(--amber-hot); }

  .logline {
    max-width: 36ch;
    font-size: clamp(1rem, 2.2vw, 1.28rem);
    line-height: 1.5;
    color: var(--cream-dim);
    font-style: italic;
    opacity: 0;
    animation: rise 1s .68s both;
  }

  /* ============================== THE GLOWING OBJECT (ringing phone) ============================== */
  .object {
    position: relative;
    width: clamp(116px, 17vw, 188px);
    aspect-ratio: 1;
    display: grid;
    place-items: center;
    margin-top: clamp(2px, 1vh, 10px);
    opacity: 0;
    animation: rise 1.1s .85s both;
  }
  .halo {
    position: absolute;
    inset: -42%;
    border-radius: 50%;
    background: radial-gradient(circle, var(--glow) 0%, rgba(255,160,70,.28) 32%, transparent 66%);
    filter: blur(4px);
    animation: breathe 3.4s ease-in-out infinite;
    z-index: 0;
  }
  .ring-wave {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(255,190,110,.55);
    animation: ping 2.6s ease-out infinite;
    z-index: 0;
  }
  .ring-wave.b { animation-delay: 1.3s; }
  .handset {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    overflow: visible;
    filter: drop-shadow(0 6px 18px rgba(0,0,0,.55));
    animation: shake 2.6s ease-in-out infinite;
    transform-origin: 50% 50%;
  }
  .handset .body { fill: #14110e; stroke: var(--amber); stroke-width: 2.4; }
  .handset .sheen { fill: var(--amber-hot); opacity: .85; }
  .handset .spark { fill: var(--amber-hot); animation: twinkle 1.3s ease-in-out infinite; }
  .handset .spark.b { animation-delay: .65s; }

  /* ============================== DIEGETIC CTA ============================== */
  .cta-wrap {
    display: grid;
    justify-items: center;
    gap: 10px;
    opacity: 0;
    animation: rise 1s 1.05s both;
  }
  .cta {
    --pad: clamp(13px, 1.9vh, 18px);
    position: relative;
    font-family: "Cormorant Garamond", serif;
    font-weight: 500;
    font-size: clamp(1.02rem, 2.1vw, 1.32rem);
    letter-spacing: .26em;
    text-transform: uppercase;
    color: var(--ink);
    background: linear-gradient(180deg, var(--amber-hot), var(--amber));
    border: none;
    padding: var(--pad) clamp(28px, 5vw, 52px);
    border-radius: 999px;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,210,150,.5), 0 10px 30px rgba(0,0,0,.5), 0 0 40px rgba(255,170,80,.35);
    transition: transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s;
    animation: pulseGlow 2.6s ease-in-out infinite;
  }
  .cta span { position: relative; z-index: 2; }
  .cta::before {
    content: "";
    position: absolute;
    top: 0; left: -120%;
    width: 60%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(255,255,255,.75), transparent);
    transform: skewX(-18deg);
    animation: sweep 3.4s ease-in-out infinite;
    z-index: 1;
  }
  .cta:hover, .cta:focus-visible {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 0 0 1px rgba(255,225,180,.9), 0 16px 40px rgba(0,0,0,.6), 0 0 64px rgba(255,180,90,.6);
  }
  .cta:focus-visible { outline: 3px solid var(--cream); outline-offset: 4px; }
  .cta:active { transform: translateY(0) scale(.99); }

  .decline {
    background: none;
    border: none;
    color: var(--cream-dim);
    font-family: "EB Garamond", serif;
    font-style: italic;
    font-size: clamp(.82rem, 1.7vw, .96rem);
    letter-spacing: .04em;
    cursor: pointer;
    opacity: .72;
    transition: opacity .25s, color .25s;
    text-decoration: underline;
    text-underline-offset: 3px;
    text-decoration-color: rgba(203,184,150,.4);
  }
  .decline:hover, .decline:focus-visible { opacity: 1; color: var(--cream); }
  .decline:focus-visible { outline: 2px solid var(--cream); outline-offset: 3px; border-radius: 3px; }

  /* ============================== CASE-FILE CHROME (corner diegesis) ============================== */
  .stamp {
    position: absolute;
    z-index: 6;
    font-family: "Cormorant Garamond", serif;
    letter-spacing: .3em;
    text-transform: uppercase;
    font-size: clamp(.56rem, 1.3vw, .72rem);
    color: var(--cream-dim);
    opacity: .82;
    pointer-events: none;
  }
  .stamp.tl { top: clamp(34px, 7vh, 76px); left: clamp(20px, 4vw, 52px); text-align: left; }
  .stamp.tr { top: clamp(34px, 7vh, 76px); right: clamp(20px, 4vw, 52px); text-align: right; }
  .stamp.bl { bottom: clamp(34px, 7vh, 76px); left: clamp(20px, 4vw, 52px); text-align: left; }
  .stamp.br { bottom: clamp(34px, 7vh, 76px); right: clamp(20px, 4vw, 52px); text-align: right; }
  .stamp .k { color: var(--amber); }
  .stamp .case {
    display: inline-block;
    border: 1px solid var(--crimson);
    color: #e8908a;
    padding: 2px 8px;
    border-radius: 3px;
    margin-top: 4px;
    transform: rotate(-3deg);
  }
  .scroll-hint {
    position: absolute;
    bottom: clamp(18px, 3.4vh, 30px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    letter-spacing: .18em;
    text-transform: uppercase;
    font-size: .66rem;
    color: var(--cream-dim);
    opacity: 0;
    animation: rise 1s 1.4s both, floaty 2.6s 1.4s ease-in-out infinite;
  }

  /* ============================== ANIMATIONS ============================== */
  @keyframes rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }
  @keyframes breathe { 0%,100% { transform: scale(.94); opacity: .7; } 50% { transform: scale(1.08); opacity: 1; } }
  @keyframes ping { 0% { transform: scale(.7); opacity: .8; } 100% { transform: scale(1.7); opacity: 0; } }
  @keyframes shake {
    0%, 58%, 100% { transform: rotate(0deg); }
    62% { transform: rotate(-9deg); }
    66% { transform: rotate(8deg); }
    70% { transform: rotate(-7deg); }
    74% { transform: rotate(6deg); }
    78% { transform: rotate(-3deg); }
    82% { transform: rotate(0deg); }
  }
  @keyframes twinkle { 0%,100% { opacity: .25; transform: scale(.8); } 50% { opacity: 1; transform: scale(1.15); } }
  @keyframes sweep { 0%, 40% { left: -120%; } 70%, 100% { left: 130%; } }
  @keyframes pulseGlow {
    0%,100% { box-shadow: 0 0 0 1px rgba(255,210,150,.5), 0 10px 30px rgba(0,0,0,.5), 0 0 36px rgba(255,170,80,.3); }
    50% { box-shadow: 0 0 0 1px rgba(255,225,180,.7), 0 10px 30px rgba(0,0,0,.5), 0 0 58px rgba(255,180,90,.55); }
  }
  @keyframes floaty { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(5px); } }

  /* answered state */
  .stage.answered .object { animation: none; }
  .stage.answered .handset { animation: none; transform: rotate(-22deg) scale(.92); transition: transform .5s; }
  .stage.answered .ring-wave { animation: none; opacity: 0; }
  .answer-line {
    position: absolute;
    z-index: 7;
    bottom: clamp(78px, 16vh, 150px);
    left: 50%;
    transform: translateX(-50%);
    width: min(86vw, 640px);
    text-align: center;
    font-family: "Cormorant Garamond", serif;
    font-style: italic;
    font-size: clamp(1.1rem, 2.6vw, 1.7rem);
    color: var(--amber-hot);
    text-shadow: 0 2px 24px rgba(0,0,0,.7);
    opacity: 0;
    pointer-events: none;
    transition: opacity .7s .25s;
  }
  .stage.answered .answer-line { opacity: 1; }

  /* ============================== MOBILE: keep scene immersive, never crop the object out ============================== */
  @media (max-width: 640px) {
    .scene { background-position: 50% 60%; }
    .card { width: 90vw; gap: clamp(12px, 2.6vh, 22px); }
    .title { font-size: clamp(2.6rem, 15vw, 4.4rem); }
    .logline { font-size: 1.02rem; max-width: 30ch; }
    .object { width: clamp(104px, 32vw, 150px); }
    .stamp.tl, .stamp.tr { font-size: .54rem; letter-spacing: .2em; }
    .stamp.bl, .stamp.br { display: none; }
    .cta { letter-spacing: .2em; padding: 14px 30px; }
  }
  @media (max-height: 700px) and (min-width: 641px) {
    .object { width: clamp(96px, 12vw, 132px); }
    .card { gap: clamp(10px, 2vh, 20px); }
  }

  /* ============================== REDUCED MOTION: freeze flicker / glow / shake, show final state ============================== */
  @media (prefers-reduced-motion: reduce) {
    .scene, .stage.ready .scene { transform: scale(1.02); transition: none; }
    .rain { animation: none; }
    .halo { animation: none; transform: scale(1.02); opacity: .9; }
    .ring-wave { animation: none; opacity: .35; }
    .handset { animation: none; }
    .handset .spark { animation: none; opacity: 1; }
    .cta { animation: none; }
    .cta::before { animation: none; display: none; }
    .imprint, .episode, .title, .logline, .object, .cta-wrap, .scroll-hint {
      animation: none; opacity: 1; transform: none;
    }
    .scroll-hint { animation: none; }
  }
</style>
</head>
<body>
  <main class="stage" id="stage" aria-label="Interactive story title card">
    <div class="scene" aria-hidden="true"></div>
    <div class="rain" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="bar top" aria-hidden="true"></div>
    <div class="bar bottom" aria-hidden="true"></div>

    <!-- corner diegesis (case file chrome) -->
    <div class="stamp tl" id="stampTL"></div>
    <div class="stamp tr" id="stampTR"></div>
    <div class="stamp bl" id="stampBL"></div>
    <div class="stamp br" id="stampBR"></div>

    <section class="card">
      <p class="imprint" id="imprint"></p>

      <div class="titleblock">
        <p class="episode" id="episode"></p>
        <h1 class="title" id="title"></h1>
      </div>

      <p class="logline" id="logline"></p>

      <!-- the glowing in-world object: a ringing handset -->
      <div class="object" id="object" aria-hidden="true">
        <div class="halo"></div>
        <div class="ring-wave"></div>
        <div class="ring-wave b"></div>
        <svg class="handset" viewBox="0 0 100 100" role="img" aria-label="A ringing telephone handset">
          <path class="body" d="M22 26
            C22 18 30 14 38 18
            L46 24 C49 26 49 31 46 34 L41 39
            C45 50 50 55 61 59 L66 54 C69 51 74 51 76 54
            L82 62 C86 70 82 78 74 78
            C46 78 22 54 22 26 Z" />
          <path class="sheen" d="M27 25 C28 20 33 19 37 21 L41 24 C39 24 35 24 33 27 C31 30 30 33 31 36 C28 33 26 29 27 25 Z" opacity=".5"/>
          <circle class="spark" cx="78" cy="20" r="2.4"/>
          <circle class="spark b" cx="86" cy="30" r="1.8"/>
          <!-- NOTE: hard hex (not var(--amber)): CSS custom properties do NOT resolve in SVG presentation attributes cross-browser -->
          <path d="M70 14 q8 -2 12 6" fill="none" stroke="#ffb45a" stroke-width="2" stroke-linecap="round" opacity=".7"/>
          <path d="M73 8 q12 0 18 10" fill="none" stroke="#ffb45a" stroke-width="1.6" stroke-linecap="round" opacity=".45"/>
        </svg>
      </div>

      <div class="cta-wrap">
        <button class="cta" id="cta" type="button"><span id="ctaLabel"></span></button>
        <button class="decline" id="decline" type="button"></button>
      </div>
    </section>

    <p class="answer-line" id="answerLine" aria-live="polite"></p>
    <p class="scroll-hint" id="scrollHint"></p>
  </main>

<script>
  /* ============================================================
     STORY DATA - edit this object to retheme the whole title card.
     Keep CTA wording strictly in-world (diegetic). No em or en dashes.
     ============================================================ */
  const STORY = {
    scene: "../assets/flux-car-4k.png", // full-bleed illustrated night scene
    scenePosition: "50% 58%",           // background-position focus point
    imprint: ["A NOIR", "VESPERWERK PICTURES", "INTERACTIVE"], // top imprint, <b> wraps the studio
    studioIndex: 1,                     // which imprint token to highlight in amber
    episode: "Case File 07",
    title: ["The ", "Midnight", " Caller"], // [pre, italic-amber, post]
    logline: "Rain on the avenue, a black coupe idling at the curb, and a telephone that will not stop ringing. Pick it up, and the night becomes yours to solve.",
    cta: "Answer the call",
    decline: "Let it ring out",
    answerLine: "“Detective. You took your time. Drive to the corner of Ninth and Vesper. Come alone.”",
    scrollHint: "The story waits below",
    stamps: {
      tl: { lines: ["CONFIDENTIAL", "PRECINCT 14"] },
      tr: { lines: ["02:47 AM", "RAIN, HEAVY"] },
      bl: { lines: ["ROLE", "LEAD DETECTIVE"], k: 1 },
      br: { case: "CASE 0079 - OPEN" }
    }
  };

  /* ---------- bind copy ---------- */
  const $ = (id) => document.getElementById(id);

  // imprint with one highlighted studio token
  $("imprint").innerHTML = STORY.imprint
    .map((t, i) => (i === STORY.studioIndex ? "<b>" + t + "</b>" : t))
    .join('<span style="opacity:.4"> &middot; </span>');

  $("episode").textContent = STORY.episode;
  $("title").innerHTML =
    STORY.title[0] + '<span class="em">' + STORY.title[1] + "</span>" + STORY.title[2];
  $("logline").textContent = STORY.logline;
  $("ctaLabel").textContent = STORY.cta;
  $("decline").textContent = STORY.decline;
  $("answerLine").textContent = STORY.answerLine;
  $("scrollHint").textContent = STORY.scrollHint + "  ↓";

  // scene swap (lets future swaps go through DATA, not CSS)
  const sceneEl = document.querySelector(".scene");
  sceneEl.style.backgroundImage = 'url("' + STORY.scene + '")';
  sceneEl.style.backgroundPosition = STORY.scenePosition;

  // stamps
  const s = STORY.stamps;
  const renderStamp = (cfg) => {
    if (!cfg) return "";
    if (cfg.case) return '<span class="case">' + cfg.case + "</span>";
    return cfg.lines
      .map((l, i) => '<div class="' + (cfg.k === i ? "k" : "") + '">' + l + "</div>")
      .join("");
  };
  $("stampTL").innerHTML = renderStamp(s.tl);
  $("stampTR").innerHTML = renderStamp(s.tr);
  $("stampBL").innerHTML = renderStamp(s.bl);
  $("stampBR").innerHTML = renderStamp(s.br);

  /* ---------- stable viewport height for mobile (avoids URL-bar jump) ---------- */
  const setVH = () => {
    document.documentElement.style.setProperty("--vh", window.innerHeight + "px");
  };
  setVH();
  window.addEventListener("resize", setVH);

  /* ---------- entrance: scale-settle of the scene ---------- */
  const stage = $("stage");
  requestAnimationFrame(() => requestAnimationFrame(() => stage.classList.add("ready")));

  /* ---------- subtle parallax on the scene (pointer only, motion-gated) ---------- */
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)");
  let raf = 0;
  function onMove(e) {
    if (reduce.matches) return;
    const cx = (e.clientX / window.innerWidth - 0.5);
    const cy = (e.clientY / window.innerHeight - 0.5);
    if (raf) cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      sceneEl.style.transform =
        "scale(1.05) translate(" + (cx * -14) + "px," + (cy * -10) + "px)";
    });
  }
  window.addEventListener("pointermove", onMove, { passive: true });
  reduce.addEventListener("change", () => {
    if (reduce.matches) {
      window.removeEventListener("pointermove", onMove);
      if (raf) cancelAnimationFrame(raf);
      sceneEl.style.transform = "scale(1.02)";
    }
  });

  /* ---------- answer the call (diegetic state change) ---------- */
  const cta = $("cta");
  cta.addEventListener("click", () => {
    stage.classList.add("answered");
    cta.setAttribute("disabled", "true");
    cta.querySelector("span").textContent = "Connected";
    $("decline").style.display = "none";
    $("answerLine").focus?.();
  });

  $("decline").addEventListener("click", () => {
    // diegetic dismiss: the ringing fades, story still beckons below
    $("object").style.transition = "opacity .8s, transform .8s";
    $("object").style.opacity = ".35";
    $("object").style.transform = "scale(.9)";
    $("decline").textContent = "It rings again later";
  });
</script>
</body>
</html>
