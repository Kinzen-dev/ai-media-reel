<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sevyr - Own your intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  /* ===================================================================
     AI AUTHORITY - enterprise-AI generative-pattern hero
     Warm off-white field + near-black ink + one warm amber accent.
     Signature: oversized bold headline over a live Voronoi/mesh field,
     trust logo strip in the first viewport. Cohere register.
     =================================================================== */

  :root {
    --paper:      #f4f1ea;   /* warm off-white field            */
    --paper-2:    #ece7dc;   /* slightly deeper paper           */
    --ink:        #161512;   /* near-black ink                  */
    --ink-soft:   #4a463d;   /* muted body ink                  */
    --ink-faint:  #8a8475;   /* faint labels                    */
    --accent:     #d4622a;   /* one warm amber accent           */
    --accent-2:   #e8853f;   /* lighter accent for the field    */
    --line:       #d8d2c4;   /* hairline rules                  */
    --cell-line:  #c9c2b1;   /* voronoi stroke on paper         */
    --max:        1440px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-feature-settings: "ss01", "cv11";
    line-height: 1.5;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }

  .wrap { width: 100%; max-width: var(--max); margin-inline: auto; padding-inline: clamp(20px, 5vw, 64px); }

  /* ---------- top bar ---------- */
  header {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--paper) 86%, transparent);
    backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .brand { display: flex; align-items: center; gap: 11px; font-weight: 800; letter-spacing: -0.02em; font-size: 19px; }
  .brand .mark {
    width: 26px; height: 26px; flex: 0 0 26px;
    display: grid; place-items: center;
  }
  .navlinks { display: flex; align-items: center; gap: 30px; }
  .navlinks a {
    font-size: 14.5px; font-weight: 500; color: var(--ink-soft);
    transition: color .18s ease;
  }
  .navlinks a:hover { color: var(--ink); }
  .nav-cta {
    font-size: 14px; font-weight: 600; color: var(--paper);
    background: var(--ink); padding: 9px 18px; border-radius: 999px;
    transition: background .18s ease, transform .18s ease;
  }
  .nav-cta:hover { background: var(--accent); transform: translateY(-1px); }
  .nav-toggle { display: none; background: none; border: 0; cursor: pointer; }

  /* ---------- hero stage ---------- */
  .hero {
    position: relative;
    min-height: calc(100svh - 64px);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* the generative field sits behind everything, full-bleed */
  .field {
    position: absolute; inset: 0; z-index: 0;
    width: 100%; height: 100%;
    display: block;
  }
  .field svg { width: 100%; height: 100%; display: block; }
  /* soft paper vignette so headline reads */
  .hero::after {
    content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background:
      radial-gradient(120% 90% at 50% 42%, transparent 0%, transparent 38%, color-mix(in srgb, var(--paper) 62%, transparent) 100%),
      linear-gradient(to bottom, transparent 60%, var(--paper) 100%);
  }

  .hero-inner {
    position: relative; z-index: 2;
    flex: 1 1 auto;
    display: flex; flex-direction: column; justify-content: center;
    width: 100%; max-width: var(--max); margin-inline: auto;
    padding-inline: clamp(20px, 5vw, 64px);
    padding-block: clamp(28px, 6vh, 70px);
  }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 9px;
    align-self: center;
    font-size: 12.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 12%, var(--paper));
    border: 1px solid color-mix(in srgb, var(--accent) 34%, transparent);
    padding: 7px 15px; border-radius: 999px;
    margin-bottom: clamp(20px, 3vh, 30px);
  }
  .eyebrow .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 22%, transparent); }

  h1 {
    text-align: center;
    font-weight: 900;
    letter-spacing: -0.045em;
    line-height: 0.92;
    font-size: clamp(54px, 12vw, 188px);
    margin-inline: auto;
    max-width: 16ch;
    text-wrap: balance;
  }
  h1 .em { color: var(--accent); position: relative; }

  .sub {
    text-align: center;
    margin: clamp(20px, 3vh, 32px) auto 0;
    max-width: 56ch;
    font-size: clamp(16px, 2.1vw, 21px);
    color: var(--ink-soft);
    font-weight: 450;
    line-height: 1.5;
  }

  .cta-row {
    display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;
    margin-top: clamp(26px, 4vh, 40px);
  }
  .btn {
    display: inline-flex; align-items: center; gap: 9px;
    font-size: 16px; font-weight: 600;
    padding: 14px 26px; border-radius: 999px;
    cursor: pointer; border: 1px solid transparent;
    transition: transform .18s ease, background .18s ease, box-shadow .18s ease, border-color .18s ease;
    will-change: transform;
  }
  .btn-primary {
    background: var(--ink); color: var(--paper);
    box-shadow: 0 10px 30px -12px color-mix(in srgb, var(--ink) 70%, transparent);
  }
  .btn-primary:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 16px 38px -12px color-mix(in srgb, var(--accent) 60%, transparent); }
  .btn-ghost {
    background: color-mix(in srgb, var(--paper) 70%, transparent);
    color: var(--ink); border-color: var(--ink);
  }
  .btn-ghost:hover { transform: translateY(-2px); background: var(--paper); }
  .btn svg { width: 17px; height: 17px; }

  /* ---------- trust strip (inside first viewport) ---------- */
  .trust {
    position: relative; z-index: 2;
    width: 100%; max-width: var(--max); margin-inline: auto;
    padding: clamp(18px, 3vh, 26px) clamp(20px, 5vw, 64px) clamp(22px, 3vh, 30px);
  }
  .trust-label {
    text-align: center; font-size: 11.5px; font-weight: 600;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint);
    margin-bottom: 16px;
  }
  .logos {
    display: flex; align-items: center; justify-content: center;
    gap: clamp(26px, 5vw, 64px); flex-wrap: wrap;
  }
  .logos .logo {
    font-size: clamp(15px, 1.9vw, 19px); font-weight: 700; letter-spacing: -0.01em;
    color: var(--ink-soft); opacity: .72;
    display: inline-flex; align-items: center; gap: 8px;
    transition: opacity .2s ease, color .2s ease;
    white-space: nowrap;
  }
  .logos .logo:hover { opacity: 1; color: var(--ink); }
  .logos .logo svg { width: 20px; height: 20px; flex: 0 0 20px; }

  /* ---------- proof band below the fold ---------- */
  .band {
    border-top: 1px solid var(--line);
    background: linear-gradient(to bottom, var(--paper), var(--paper-2));
  }
  .band-inner {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: clamp(20px, 3vw, 40px);
    padding-block: clamp(48px, 7vh, 88px);
  }
  .stat .k {
    font-size: clamp(40px, 5vw, 64px); font-weight: 900; letter-spacing: -0.04em;
    line-height: 1; color: var(--ink);
  }
  .stat .k .u { color: var(--accent); }
  .stat .d { margin-top: 12px; font-size: 15px; color: var(--ink-soft); max-width: 30ch; }

  /* ---------- capability cards ---------- */
  .caps { padding-block: clamp(56px, 9vh, 110px); }
  .caps h2 {
    font-size: clamp(30px, 4.2vw, 52px); font-weight: 800; letter-spacing: -0.035em;
    line-height: 1.02; max-width: 18ch; text-wrap: balance;
  }
  .caps .lede { margin-top: 16px; font-size: clamp(16px, 2vw, 19px); color: var(--ink-soft); max-width: 52ch; }
  .grid {
    margin-top: clamp(34px, 5vh, 56px);
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px;
  }
  .card {
    position: relative; overflow: hidden;
    background: var(--paper);
    border: 1px solid var(--line); border-radius: 18px;
    padding: 26px; min-height: 230px;
    display: flex; flex-direction: column;
    transition: transform .22s ease, border-color .22s ease, box-shadow .22s ease;
  }
  .card:hover { transform: translateY(-4px); border-color: color-mix(in srgb, var(--accent) 50%, var(--line)); box-shadow: 0 22px 50px -28px rgba(22,21,18,.4); }
  .card .ic {
    width: 46px; height: 46px; border-radius: 12px;
    display: grid; place-items: center; margin-bottom: 20px;
    background: color-mix(in srgb, var(--accent) 13%, var(--paper));
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .card .ic svg { width: 24px; height: 24px; }
  .card h3 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .card p { margin-top: 9px; font-size: 14.5px; color: var(--ink-soft); line-height: 1.55; }
  .card .tag {
    margin-top: auto; padding-top: 18px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ---------- closing CTA ---------- */
  .close {
    margin: 0 auto clamp(56px, 9vh, 110px);
    max-width: calc(var(--max) - 2 * clamp(20px, 5vw, 64px));
    background: var(--ink); color: var(--paper);
    border-radius: 24px; overflow: hidden; position: relative;
    padding: clamp(40px, 7vw, 80px);
  }
  .close .mini-field { position: absolute; inset: 0; opacity: .5; z-index: 0; }
  .close .mini-field svg { width: 100%; height: 100%; }
  .close-in { position: relative; z-index: 1; }
  .close h2 { font-size: clamp(30px, 5vw, 60px); font-weight: 900; letter-spacing: -0.04em; line-height: 0.98; max-width: 16ch; }
  .close p { margin-top: 16px; color: color-mix(in srgb, var(--paper) 76%, transparent); font-size: clamp(16px, 2vw, 19px); max-width: 52ch; }
  .close .cta-row { justify-content: flex-start; margin-top: 30px; }
  .close .btn-primary { background: var(--accent); color: #1a0f08; }
  .close .btn-primary:hover { background: var(--accent-2); }
  .close .btn-ghost { background: transparent; color: var(--paper); border-color: color-mix(in srgb, var(--paper) 50%, transparent); }
  .close .btn-ghost:hover { background: color-mix(in srgb, var(--paper) 12%, transparent); }

  footer {
    border-top: 1px solid var(--line);
    padding-block: 30px;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
    font-size: 13px; color: var(--ink-faint);
  }
  footer .brand { font-size: 15px; color: var(--ink-soft); }

  /* ---------- responsive ---------- */
  @media (max-width: 900px) {
    .band-inner { grid-template-columns: 1fr; gap: 30px; }
    .grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 760px) {
    .navlinks { display: none; }
    .nav-cta { display: none; }
    .nav-toggle { display: inline-flex; }
  }
  @media (max-width: 640px) {
    .hero { min-height: auto; }
    .hero-inner { padding-block: clamp(36px, 8vh, 56px) 18px; }
    h1 { font-size: clamp(46px, 16vw, 84px); line-height: 0.94; max-width: 12ch; }
    .sub { font-size: 16px; }
    .cta-row { flex-direction: column; align-items: stretch; }
    .btn { justify-content: center; }
    /* on a phone, keep headline + pattern + a compact 3-up logo strip */
    .logos { gap: 22px 26px; }
    .logos .logo { font-size: 15px; }
    .logos .logo:nth-child(n+5) { display: none; }
    .trust { padding-bottom: 30px; }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    /* JS also short-circuits the rAF loop; field renders one static frame */
  }
</style>
</head>
<body>

  <!-- ============================================================
       MARKUP - rendered/enhanced by the script at the bottom

  <header>
    <div class="wrap nav">
      <a class="brand" href="#" aria-label="Sevyr home">
        <span class="mark" aria-hidden="true">
          <svg viewBox="0 0 26 26" width="26" height="26" fill="none">

  <script>
  (function () {
    "use strict";

    const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* ---------- tiny icon set (inline SVG, accent stroke) ---------- */
    const ICONS = {
      shield: '<svg viewBox="0 0 24 24" fill="none" stroke="#d4622a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 3v5c0 4.5-3 7.7-7 9-4-1.3-7-4.5-7-9V6z"/><path d="M9.2 12l1.9 1.9 3.7-3.8"/></svg>',
      graph:  '<svg viewBox="0 0 24 24" fill="none" stroke="#d4622a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="7" r="2.2"/><circle cx="18" cy="7" r="2.2"/><circle cx="12" cy="17" r="2.2"/><path d="M7.8 8.4l2.6 6.9M16.2 8.4l-2.6 6.9M8 7h8"/></svg>',
      lock:   '<svg viewBox="0 0 24 24" fill="none" stroke="#d4622a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="10.5" width="15" height="9.5" rx="2"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/><circle cx="12" cy="15" r="1.3"/></svg>',
      bolt:   '<svg viewBox="0 0 24 24" fill="none" stroke="#d4622a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L4 14h7l-1 8 9-12h-7z"/></svg>',
      tune:   '<svg viewBox="0 0 24 24" fill="none" stroke="#d4622a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h10M18 7h2M4 17h2M10 17h10"/><circle cx="16" cy="7" r="2.2"/><circle cx="8" cy="17" r="2.2"/></svg>',
      plug:   '<svg viewBox="0 0 24 24" fill="none" stroke="#d4622a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2v5M15 2v5M7 7h10v3a5 5 0 0 1-10 0z"/><path d="M12 15v6"/></svg>'
    };
    const LOGO_GLYPH = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18" stroke-width="1.2"/></svg>';

    /* ---------- render from CONTENT ---------- */
    function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    document.querySelectorAll("[data-bind]").forEach(el => {
      const v = CONTENT[el.getAttribute("data-bind")];
      if (typeof v === "string") el.textContent = v;
    });
    document.querySelectorAll("[data-bind-html]").forEach(el => {
      const raw = CONTENT[el.getAttribute("data-bind-html")] || "";
      el.innerHTML = esc(raw)
        .replace(/\{em\}/g, '<span class="em">')
        .replace(/\{\/em\}/g, '</span>');
    });

    // nav
    const navEl = document.querySelector('[data-bind="nav"]');
    if (navEl) navEl.innerHTML = CONTENT.nav.map(n => `<a href="#">${esc(n)}</a>`).join("");

    // logos
    const logosEl = document.getElementById("logos");
    if (logosEl) logosEl.innerHTML = CONTENT.logos
      .map(l => `<span class="logo">${LOGO_GLYPH}${esc(l)}</span>`).join("");

    // stats
    const statsEl = document.getElementById("stats");
    if (statsEl) statsEl.innerHTML = CONTENT.stats.map(s =>
      `<div class="stat"><div class="k">${esc(s.k)}<span class="u">${esc(s.u)}</span></div><div class="d">${esc(s.d)}</div></div>`
    ).join("");

    // capability cards
    const gridEl = document.getElementById("caps-grid");
    if (gridEl) gridEl.innerHTML = CONTENT.caps.map(c =>
      `<article class="card"><div class="ic">${ICONS[c.icon]||ICONS.graph}</div>`
      + `<h3>${esc(c.title)}</h3><p>${esc(c.body)}</p><div class="tag">${esc(c.tag)}</div></article>`
    ).join("");

    /* ===================================================================
       GENERATIVE FIELD - a live Voronoi / mesh on the warm paper.
       Built as inline SVG with hardcoded hex (never var()).
       Sites drift slightly; we recompute a Delaunay-ish triangulation
       and Voronoi cells on a rAF loop. Reduced motion = one static frame.
       =================================================================== */

    const SVGNS = "http://www.w3.org/2000/svg";

    // Bowyer-Watson Delaunay triangulation (small N, fine for a hero field)
    function triangulate(points) {
      const n = points.length;
      if (n < 3) return [];
      // super triangle
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of points) { minX=Math.min(minX,p[0]); minY=Math.min(minY,p[1]); maxX=Math.max(maxX,p[0]); maxY=Math.max(maxY,p[1]); }
      const dx = (maxX-minX)*10 + 10, dy = (maxY-minY)*10 + 10, mx=(minX+maxX)/2, my=(minY+maxY)/2;
      const st = [[mx-dx, my-1], [mx, my+dy], [mx+dx, my-1]];
      const verts = points.concat(st);
      const si = n, sj = n+1, sk = n+2;

      function circum(a,b,c){
        const ax=verts[a][0],ay=verts[a][1],bx=verts[b][0],by=verts[b][1],cx=verts[c][0],cy=verts[c][1];
        const d=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
        if (Math.abs(d) < 1e-9) return null;
        const ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/d;
        const uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/d;
        const r2=(ax-ux)*(ax-ux)+(ay-uy)*(ay-uy);
        return {x:ux,y:uy,r2};
      }

      let tris = [[si,sj,sk]];
      for (let ip=0; ip<n; ip++) {
        const bad = [];
        for (const t of tris) {
          const cc = circum(t[0],t[1],t[2]);
          if (cc && (verts[ip][0]-cc.x)**2 + (verts[ip][1]-cc.y)**2 <= cc.r2 + 1e-6) bad.push(t);
        }
        const edges = [];
        for (const t of bad) {
          const e = [[t[0],t[1]],[t[1],t[2]],[t[2],t[0]]];
          for (const ed of e) {
            let shared = false;
            for (const t2 of bad) {
              if (t2===t) continue;
              const has = (a,b)=> (t2[0]===a||t2[1]===a||t2[2]===a)&&(t2[0]===b||t2[1]===b||t2[2]===b);
              if (has(ed[0],ed[1])) { shared = true; break; }
            }
            if (!shared) edges.push(ed);
          }
        }
        tris = tris.filter(t => !bad.includes(t));
        for (const ed of edges) tris.push([ed[0], ed[1], ip]);
      }
      // drop super-triangle
      return tris.filter(t => t[0]<n && t[1]<n && t[2]<n);
    }

    // Voronoi cell polygons via circumcenters of triangles around each site
    function voronoiCells(points, tris, w, h) {
      const cc = tris.map(t => {
        const ax=points[t[0]][0],ay=points[t[0]][1],bx=points[t[1]][0],by=points[t[1]][1],cx=points[t[2]][0],cy=points[t[2]][1];
        const d=2*(ax*(by-cy)+bx*(cy-ay)+cx*(ay-by));
        if (Math.abs(d)<1e-9) return null;
        const ux=((ax*ax+ay*ay)*(by-cy)+(bx*bx+by*by)*(cy-ay)+(cx*cx+cy*cy)*(ay-by))/d;
        const uy=((ax*ax+ay*ay)*(cx-bx)+(bx*bx+by*by)*(ax-cx)+(cx*cx+cy*cy)*(bx-ax))/d;
        return [ux,uy];
      });
      const byPoint = points.map(()=>[]);
      tris.forEach((t,i)=>{ if(cc[i]){ byPoint[t[0]].push(cc[i]); byPoint[t[1]].push(cc[i]); byPoint[t[2]].push(cc[i]); }});
      return byPoint.map((pts, idx) => {
        if (pts.length < 3) return null;
        const c = points[idx];
        const sorted = pts.slice().sort((p,q)=> Math.atan2(p[1]-c[1],p[0]-c[0]) - Math.atan2(q[1]-c[1],q[0]-c[0]));
        return sorted;
      });
    }

    // build the field for a given container element
    function buildField(host, opts) {
      const cfg = Object.assign({
        density: 56, jitter: 0.0009, fillCells: true, dotField: true,
        stroke: "#c9c2b1", strokeAccent: "#d4622a", cellTint: "#ece7dc",
        dotColor: "#161512", accentDot: "#d4622a", bgTop: "#f4f1ea", bgBot: "#ece7dc"
      }, opts || {});

      const rect = host.getBoundingClientRect();
      const W = Math.max(640, Math.round(rect.width || window.innerWidth));
      const H = Math.max(480, Math.round(rect.height || window.innerHeight));

      const svg = document.createElementNS(SVGNS, "svg");
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
      svg.setAttribute("preserveAspectRatio", "xMidYMid slice");

      // background gradient
      const defs = document.createElementNS(SVGNS, "defs");
      defs.innerHTML =
        `<linearGradient id="bg-${cfg.id}" x1="0" y1="0" x2="0" y2="1">
           <stop offset="0" stop-color="${cfg.bgTop}"/>
           <stop offset="1" stop-color="${cfg.bgBot}"/>
         </linearGradient>
         <radialGradient id="glow-${cfg.id}" cx="0.62" cy="0.34" r="0.6">
           <stop offset="0" stop-color="${cfg.strokeAccent}" stop-opacity="0.16"/>
           <stop offset="1" stop-color="${cfg.strokeAccent}" stop-opacity="0"/>
         </radialGradient>`;
      svg.appendChild(defs);

      const bgRect = document.createElementNS(SVGNS, "rect");
      bgRect.setAttribute("x", 0); bgRect.setAttribute("y", 0);
      bgRect.setAttribute("width", W); bgRect.setAttribute("height", H);
      bgRect.setAttribute("fill", `url(#bg-${cfg.id})`);
      svg.appendChild(bgRect);

      const glow = document.createElementNS(SVGNS, "rect");
      glow.setAttribute("x", 0); glow.setAttribute("y", 0);
      glow.setAttribute("width", W); glow.setAttribute("height", H);
      glow.setAttribute("fill", `url(#glow-${cfg.id})`);
      svg.appendChild(glow);

      const gCells = document.createElementNS(SVGNS, "g");
      const gLines = document.createElementNS(SVGNS, "g");
      const gDots  = document.createElementNS(SVGNS, "g");
      gLines.setAttribute("stroke", cfg.stroke);
      gLines.setAttribute("stroke-width", "1");
      gLines.setAttribute("fill", "none");
      gLines.setAttribute("stroke-linejoin", "round");
      svg.appendChild(gCells);
      svg.appendChild(gLines);
      svg.appendChild(gDots);

      host.innerHTML = "";
      host.appendChild(svg);

      // seed sites: poisson-ish grid with jitter, denser toward the right/top accent glow
      const sites = [];
      const cols = Math.max(6, Math.round(W / cfg.density));
      const rows = Math.max(5, Math.round(H / cfg.density));
      const cw = W / cols, ch = H / rows;
      let seedRand = 1337;
      const rnd = () => { seedRand = (seedRand*1103515245 + 12345) & 0x7fffffff; return seedRand / 0x7fffffff; };
      for (let r=-1; r<=rows+1; r++) {
        for (let c=-1; c<=cols+1; c++) {
          const x = c*cw + cw*0.5 + (rnd()-0.5)*cw*0.78;
          const y = r*ch + ch*0.5 + (rnd()-0.5)*ch*0.78;
          sites.push({ bx:x, by:y, x, y, ph: rnd()*Math.PI*2, sp: 0.6 + rnd()*0.9 });
        }
      }
      // accent sites: a few cells near the glow get the warm stroke/dot
      const accentSet = new Set();
      for (let i=0;i<sites.length;i++){
        const nx = sites[i].bx / W, ny = sites[i].by / H;
        const d = Math.hypot(nx-0.62, ny-0.34);
        if (d < 0.26 && rnd() < 0.5) accentSet.add(i);
      }

      function frame(t) {
        const pts = sites.map((s,i) => {
          if (REDUCED) return [s.bx, s.by];
          const a = (t*0.00018 + s.ph) * s.sp;
          return [ s.bx + Math.cos(a)*W*cfg.jitter*900, s.by + Math.sin(a*1.13)*H*cfg.jitter*900 ];
        });

        const tris = triangulate(pts);
        const cells = cfg.fillCells ? voronoiCells(pts, tris, W, H) : null;

        // cells (subtle alternating tint)
        if (cells) {
          let cstr = "";
          cells.forEach((poly, i) => {
            if (!poly || poly.length < 3) return;
            const d = "M" + poly.map(p => `${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(" L") + "Z";
            const accent = accentSet.has(i);
            const op = accent ? 0.10 : ((i % 3 === 0) ? 0.55 : 0.0);
            const fill = accent ? cfg.strokeAccent : cfg.cellTint;
            if (op > 0.001) cstr += `<path d="${d}" fill="${fill}" fill-opacity="${op}"/>`;
          });
          gCells.innerHTML = cstr;
        }

        // mesh lines (triangulation edges) - the "mesh" read
        let lstr = "";
        for (const tr of tris) {
          const a=pts[tr[0]], b=pts[tr[1]], c=pts[tr[2]];
          lstr += `<path d="M${a[0].toFixed(1)} ${a[1].toFixed(1)} L${b[0].toFixed(1)} ${b[1].toFixed(1)} L${c[0].toFixed(1)} ${c[1].toFixed(1)} Z"/>`;
        }
        gLines.innerHTML = lstr;

        // dot field at the sites
        if (cfg.dotField) {
          let dstr = "";
          pts.forEach((p,i) => {
            const accent = accentSet.has(i);
            const r = accent ? 2.6 : 1.5;
            const fill = accent ? cfg.accentDot : cfg.dotColor;
            const op = accent ? 0.85 : 0.32;
            dstr += `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${r}" fill="${fill}" fill-opacity="${op}"/>`;
          });
          gDots.innerHTML = dstr;
        }
      }

      frame(0);
      return frame;
    }

    // main hero field
    const heroFrame = buildField(document.getElementById("field"), {
      id: "hero", density: 58, jitter: 0.0010
    });

    // mini field inside the dark closing CTA (near-black variant)
    const miniHost = document.getElementById("mini-field");
    let miniFrame = null;
    if (miniHost) {
      miniFrame = buildField(miniHost, {
        id: "mini", density: 70, jitter: 0.0007, fillCells: false,
        stroke: "#3a352c", strokeAccent: "#d4622a",
        dotColor: "#d4622a", accentDot: "#e8853f",
        bgTop: "#161512", bgBot: "#161512"
      });
    }

    /* ---------- animation loop (skipped entirely under reduced motion) ---------- */
    if (!REDUCED) {
      // mutable ref so resize can swap in a freshly-sized hero field
      const heroRef = { fn: heroFrame };
      let running = true, raf = 0;

      function loop(t) {
        heroRef.fn(t);
        if (miniFrame) miniFrame(t);
        if (running) raf = requestAnimationFrame(loop);
        else raf = 0;
      }

      // pause the loop when the hero scrolls fully out of view to save battery
      const hero = document.querySelector(".hero");
      const io = new IntersectionObserver(([e]) => {
        running = e.isIntersecting;
        if (running && !raf) { raf = requestAnimationFrame(loop); }
      }, { threshold: 0 });
      io.observe(hero);

      raf = requestAnimationFrame(loop);

      // rebuild on resize (debounced) so the field stays crisp at the new size
      let rt;
      window.addEventListener("resize", () => {
        clearTimeout(rt);
        rt = setTimeout(() => {
          heroRef.fn = buildField(document.getElementById("field"), { id: "hero", density: 58, jitter: 0.0010 });
        }, 220);
      });
    }

    /* ---------- mobile menu toggle (lightweight) ---------- */
    const toggle = document.querySelector(".nav-toggle");
    if (toggle) toggle.addEventListener("click", () => {
      const links = document.querySelector(".navlinks");
      const open = links.style.display === "flex";
      links.style.display = open ? "" : "flex";
      links.style.position = "absolute";
      links.style.top = "64px"; links.style.left = "0"; links.style.right = "0";
      links.style.flexDirection = "column"; links.style.alignItems = "flex-start";
      links.style.gap = "0"; links.style.background = "#f4f1ea";
      links.style.borderBottom = "1px solid #d8d2c4"; links.style.padding = open ? "" : "10px 24px 18px";
    });

  })();
  </script>
</body>
</html>
