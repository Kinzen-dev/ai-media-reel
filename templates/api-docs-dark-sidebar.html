<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aperture API Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ===================== TOKENS ===================== */
:root{
  --bg:#0d0f14;
  --bg-2:#11141b;
  --bg-3:#161a22;
  --panel:#0f1218;
  --code-bg:#0a0c11;
  --line:#21262f;
  --line-soft:#1a1e26;
  --bone:#e6e4df;
  --bone-dim:#a7a8a3;
  --bone-faint:#74767a;
  --accent:#d9a441;
  --get:#1fa97a;
  --post:#2c6fad;
  --del:#c0392b;
  --patch:#d9a441;
  --put:#8d6fc7;
  --radius:9px;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --sidebar-w:280px;
  --center-w:minmax(0,1fr);
  --code-w:minmax(0,1.05fr);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{
  margin:0;
  background:var(--bg);
  color:var(--bone);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
a{color:inherit;text-decoration:none}
::selection{background:rgba(217,164,65,.28);color:#fff}

/* faint dotted grid on the page bg */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(rgba(255,255,255,.018) 1px,transparent 1px);
  background-size:22px 22px;
}

/* ===================== TOP BAR ===================== */
.topbar{
  position:sticky;top:0;z-index:60;
  height:56px;display:flex;align-items:center;gap:18px;
  padding:0 22px;
  background:rgba(13,15,20,.82);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-.01em;flex-shrink:0}
.brand .logo{
  width:24px;height:24px;border-radius:7px;flex-shrink:0;
  background:
    radial-gradient(circle at 30% 30%,var(--accent),transparent 60%),
    conic-gradient(from 200deg,var(--post),var(--get),var(--patch),var(--del),var(--post));
  box-shadow:0 0 0 1px rgba(255,255,255,.08), 0 4px 14px rgba(217,164,65,.18);
}
.brand .ver{
  font-family:var(--mono);font-size:11px;font-weight:500;color:var(--bone-faint);
  border:1px solid var(--line);border-radius:5px;padding:1px 6px;margin-left:2px;
}
.topbar .search{
  flex:1;max-width:360px;display:flex;align-items:center;gap:8px;
  height:34px;padding:0 12px;
  background:var(--bg-2);border:1px solid var(--line);border-radius:8px;
  color:var(--bone-faint);font-size:13px;cursor:text;
}
.topbar .search svg{width:14px;height:14px;opacity:.7;flex-shrink:0}
.topbar .search .k{
  margin-left:auto;font-family:var(--mono);font-size:11px;
  border:1px solid var(--line);border-radius:4px;padding:0 5px;color:var(--bone-faint);
}
.topbar .nav-r{display:flex;align-items:center;gap:20px;margin-left:auto;font-size:13.5px;color:var(--bone-dim)}
.topbar .nav-r a{transition:color .15s}
.topbar .nav-r a:hover{color:var(--bone)}
.topbar .nav-r .cta{
  color:var(--bg);background:var(--bone);font-weight:600;
  padding:6px 13px;border-radius:7px;
}
.topbar .nav-r .cta:hover{color:var(--bg);background:#fff}
.burger{
  display:none;width:36px;height:36px;border:1px solid var(--line);border-radius:8px;
  background:var(--bg-2);color:var(--bone);align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
}
.burger svg{width:18px;height:18px}

/* ===================== SHELL GRID ===================== */
.shell{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns:var(--sidebar-w) var(--center-w) var(--code-w);
  max-width:1560px;margin:0 auto;
  align-items:start;
}

/* ===================== LEFT SIDEBAR ===================== */
.sidebar{
  position:sticky;top:56px;
  height:calc(100vh - 56px);
  overflow-y:auto;
  padding:22px 14px 60px 22px;
  border-right:1px solid var(--line);
  scrollbar-width:thin;scrollbar-color:var(--line) transparent;
}
.sidebar::-webkit-scrollbar{width:8px}
.sidebar::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.side-group{margin-bottom:22px}
.side-group > .gtitle{
  font-size:11px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;
  color:var(--bone-faint);padding:0 10px 8px;
}
.side-link{
  display:flex;align-items:center;gap:9px;
  padding:6px 10px;border-radius:7px;
  font-size:13.5px;color:var(--bone-dim);
  cursor:pointer;transition:background .12s,color .12s;
  position:relative;
}
.side-link:hover{background:var(--bg-2);color:var(--bone)}
.side-link.active{background:var(--bg-3);color:var(--bone)}
.side-link.active::before{
  content:"";position:absolute;left:-22px;top:50%;transform:translateY(-50%);
  width:3px;height:16px;border-radius:0 3px 3px 0;background:var(--accent);
}
.side-link .lname{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* method badge */
.m{
  font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.04em;
  line-height:1;padding:3px 5px;border-radius:4px;flex-shrink:0;
  width:46px;text-align:center;display:inline-block;
  border:1px solid transparent;
}
.m.get{color:var(--get);background:rgba(31,169,122,.12);border-color:rgba(31,169,122,.28)}
.m.post{color:#6aa8da;background:rgba(44,111,173,.16);border-color:rgba(44,111,173,.38)}
.m.del{color:#e0685c;background:rgba(192,57,43,.14);border-color:rgba(192,57,43,.34)}
.m.patch{color:var(--patch);background:rgba(217,164,65,.13);border-color:rgba(217,164,65,.30)}
.m.put{color:#a98fd9;background:rgba(141,111,199,.14);border-color:rgba(141,111,199,.32)}

/* ===================== CENTER COLUMN ===================== */
.center{
  padding:38px 40px 120px;
  border-right:1px solid var(--line);
  min-width:0;
}
.crumbs{
  font-family:var(--mono);font-size:12px;color:var(--bone-faint);
  display:flex;gap:7px;align-items:center;margin-bottom:18px;flex-wrap:wrap;
}
.crumbs .sep{opacity:.5}
.endpoint-head{display:flex;flex-direction:column;gap:14px;margin-bottom:30px}
.endpoint-head h1{
  font-size:30px;font-weight:700;letter-spacing:-.02em;margin:0;line-height:1.15;
}
.endpoint-line{
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-family:var(--mono);font-size:13.5px;
  background:var(--bg-2);border:1px solid var(--line);border-radius:8px;
  padding:9px 12px;
}
.endpoint-line .path{color:var(--bone)}
.endpoint-line .path .seg-var{color:var(--accent)}
.endpoint-line .copy{
  margin-left:auto;color:var(--bone-faint);cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;
  transition:color .15s;
}
.endpoint-line .copy:hover{color:var(--bone)}
.endpoint-line .copy svg{width:13px;height:13px}
.lede{color:var(--bone-dim);font-size:15.5px;max-width:62ch;margin:0}

.sec-title{
  font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--bone-faint);margin:34px 0 14px;
  display:flex;align-items:center;gap:10px;
}
.sec-title::after{content:"";flex:1;height:1px;background:var(--line-soft)}

/* params table */
.params{border-top:1px solid var(--line);margin-top:4px}
.param{
  display:grid;grid-template-columns:1fr;gap:6px;
  padding:16px 2px;border-bottom:1px solid var(--line-soft);
}
.param .p-head{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.param .p-name{font-family:var(--mono);font-size:13.5px;font-weight:600;color:var(--bone)}
.param .p-type{font-family:var(--mono);font-size:12px;color:var(--get)}
.param .p-req{
  font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
  color:var(--del);background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);
  padding:1px 6px;border-radius:4px;
}
.param .p-opt{
  font-size:10.5px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;
  color:var(--bone-faint);
}
.param .p-desc{color:var(--bone-dim);font-size:14px;max-width:62ch}
.param .p-desc code{
  font-family:var(--mono);font-size:12.5px;background:var(--bg-3);
  border:1px solid var(--line);border-radius:4px;padding:1px 5px;color:var(--accent);
}

.note{
  display:flex;gap:12px;align-items:flex-start;
  background:rgba(44,111,173,.07);border:1px solid rgba(44,111,173,.28);
  border-left:3px solid var(--post);border-radius:8px;
  padding:14px 16px;margin-top:26px;font-size:14px;color:var(--bone-dim);
}
.note .ic{color:#6aa8da;flex-shrink:0;margin-top:2px}
.note .ic svg{width:16px;height:16px;display:block}
.note strong{color:var(--bone)}

/* ===================== RIGHT CODE COLUMN ===================== */
.codecol{
  position:sticky;top:56px;
  height:calc(100vh - 56px);
  overflow-y:auto;
  padding:38px 24px 80px;
  display:flex;flex-direction:column;gap:20px;
  scrollbar-width:thin;scrollbar-color:var(--line) transparent;
  background:linear-gradient(180deg,rgba(0,0,0,.18),transparent 240px);
}
.codecol::-webkit-scrollbar{width:8px}
.codecol::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

.codecard{
  border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
  background:var(--code-bg);
  box-shadow:0 18px 40px -22px rgba(0,0,0,.7);
}
.codecard .cc-head{
  display:flex;align-items:center;
  height:40px;padding:0 6px 0 14px;
  background:var(--panel);border-bottom:1px solid var(--line);
  gap:6px;
}
.codecard .cc-title{
  font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--bone-faint);margin-right:auto;
}
/* language tab strip */
.langtabs{display:flex;gap:2px}
.langtab{
  font-family:var(--mono);font-size:12px;font-weight:500;
  color:var(--bone-faint);background:transparent;border:none;cursor:pointer;
  padding:5px 11px;border-radius:6px;transition:background .12s,color .12s;
}
.langtab:hover{color:var(--bone-dim)}
.langtab.active{color:var(--bone);background:var(--bg-3)}
.cc-copy{
  width:30px;height:28px;display:flex;align-items:center;justify-content:center;
  color:var(--bone-faint);background:transparent;border:1px solid transparent;border-radius:6px;
  cursor:pointer;transition:color .15s,border-color .15s;margin-left:2px;
}
.cc-copy:hover{color:var(--bone);border-color:var(--line)}
.cc-copy svg{width:14px;height:14px}
.cc-copy.ok{color:var(--get)}

pre.code{
  margin:0;padding:16px 16px 18px;
  font-family:var(--mono);font-size:12.5px;line-height:1.65;
  color:#c9cdd4;overflow-x:auto;white-space:pre;tab-size:2;
}
pre.code::-webkit-scrollbar{height:8px}
pre.code::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
.codebody{display:none}
.codebody.active{display:block}

/* response status pill */
.resp-head{display:flex;align-items:center;gap:10px;height:40px;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line)}
.resp-head .cc-title{margin-right:auto}
.status{
  font-family:var(--mono);font-size:11px;font-weight:600;
  display:flex;align-items:center;gap:7px;color:var(--get);
}
.status .dot{width:7px;height:7px;border-radius:50%;background:var(--get);box-shadow:0 0 0 3px rgba(31,169,122,.16)}

/* syntax highlight token colors */
.tk-key{color:#d9a441}
.tk-str{color:#7ec699}
.tk-num{color:#c08fe0}
.tk-bool{color:#e0685c}
.tk-null{color:#e0685c}
.tk-punc{color:#5f6671}
.tk-cmt{color:#5a6068;font-style:italic}
.tk-cmd{color:#6aa8da}
.tk-flag{color:#d9a441}
.tk-fn{color:#6aa8da}
.tk-kw{color:#c08fe0}
.tk-var{color:#e6e4df}

/* ===================== MOBILE OVERLAY ===================== */
.scrim{
  display:none;position:fixed;inset:0;z-index:65;
  background:rgba(5,6,9,.6);backdrop-filter:blur(2px);
}

/* ===================== RESPONSIVE ===================== */
@media (max-width:1180px){
  .shell{grid-template-columns:var(--sidebar-w) 1fr}
  .codecol{
    grid-column:1 / -1;
    position:static;height:auto;
    border-top:1px solid var(--line);
    flex-direction:row;flex-wrap:wrap;
    padding:30px 30px 70px;
  }
  .codecol > *{flex:1 1 380px;min-width:0}
  .center{border-right:1px solid var(--line)}
}
@media (max-width:760px){
  :root{--sidebar-w:0px}
  body{font-size:14.5px}
  .topbar .search{display:none}
  .topbar .nav-r{display:none}
  .burger{display:flex}
  .topbar{gap:12px;padding:0 16px}
  .shell{grid-template-columns:1fr}
  .sidebar{
    position:fixed;top:56px;left:0;z-index:70;
    width:84vw;max-width:320px;height:calc(100vh - 56px);
    background:var(--bg);
    transform:translateX(-102%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    border-right:1px solid var(--line);
  }
  .sidebar.open{transform:translateX(0)}
  .scrim.show{display:block}
  .center{padding:26px 20px 60px;border-right:none}
  .endpoint-head h1{font-size:24px}
  .codecol{
    flex-direction:column;padding:24px 18px 70px;border-top:1px solid var(--line);
  }
  .codecol > *{flex:1 1 auto}
  pre.code{font-size:11.5px}
}
@media (prefers-reduced-motion:reduce){
  .sidebar{transition:none}
  *{scroll-behavior:auto !important}
}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <button class="burger" id="burger" aria-label="Open navigation">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <a class="brand" href="#">
    <span class="logo" aria-hidden="true"></span>
    Aperture
    <span class="ver">v2024.06</span>
  </a>
  <div class="search" role="search" tabindex="0" aria-label="Search the docs">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Search the reference
    <span class="k">/</span>
  </div>
  <nav class="nav-r">

<div class="scrim" id="scrim"></div>

<!-- SHELL -->
<div class="shell">

  <!-- LEFT SIDEBAR (populated by DATA) -->
  <aside class="sidebar" id="sidebar" aria-label="API endpoints"></aside>

  <!-- CENTER ENDPOINT DETAIL -->
  <main class="center" id="center"></main>

  <!-- RIGHT CODE COLUMN -->
  <section class="codecol" id="codecol" aria-label="Code samples"></section>

</div>

<script>
/* =========================================================================
   DATA  ->  edit this array to swap the whole reference. Everything below
   renders from it: sidebar groups + method badges, center params table,
   and the right-hand code samples + JSON response.
   ========================================================================= */
const DATA = {
  api: { name: "Aperture", version: "v2024.06", base: "https://api.aperture.dev/v2024-06" },

  // sidebar groups -> endpoints. `id` links the sidebar row to a full endpoint detail.
  groups: [
    {
      title: "Getting Started",
      items: [
        { id:"authentication", method:"GET",  label:"Authentication" },
        { id:"errors",         method:"GET",  label:"Errors" },
      ]
    },
    {
      title: "Bookings",
      items: [
        { id:"list-bookings",  method:"GET",    label:"List bookings" },
        { id:"create-booking", method:"POST",   label:"Create a booking", featured:true },
        { id:"get-booking",    method:"GET",    label:"Retrieve a booking" },
        { id:"update-booking", method:"PATCH",  label:"Update a booking" },
        { id:"cancel-booking", method:"DELETE", label:"Cancel a booking" },
      ]
    },
    {
      title: "Voice Calls",
      items: [
        { id:"list-calls",     method:"GET",  label:"List calls" },
        { id:"create-call",    method:"POST", label:"Place a call" },
        { id:"call-recording", method:"GET",  label:"Get recording" },
      ]
    },
    {
      title: "Webhooks",
      items: [
        { id:"list-webhooks",  method:"GET",  label:"List endpoints" },
        { id:"create-webhook", method:"POST", label:"Add an endpoint" },
        { id:"delete-webhook", method:"DELETE", label:"Remove endpoint" },
      ]
    },
  ],

  // full detail per endpoint id. The featured one renders first at scroll=0.
  endpoints: {
    "create-booking": {
      method:"POST",
      path:"/bookings",
      pathSegs:[ {t:"/bookings"} ],
      title:"Create a booking",
      crumbs:["Bookings","Create a booking"],
      lede:"Creates a booking for a clinic resource and a patient. The booking is held immediately and a confirmation is dispatched over the patient's preferred channel. Idempotency keys are supported to make retries safe.",
      params:[
        { name:"clinic_id", type:"string", req:true, desc:"The identifier of the clinic the booking belongs to. Prefixed with <code>cl_</code>." },
        { name:"service", type:"enum", req:true, desc:"One of <code>checkup</code>, <code>cleaning</code>, <code>whitening</code> or <code>consult</code>. Determines duration and price." },
        { name:"starts_at", type:"timestamp", req:true, desc:"ISO 8601 start time in the clinic's local timezone. Must fall inside published opening hours." },
        { name:"patient", type:"object", req:true, desc:"A nested object with <code>name</code>, <code>phone</code> and an optional <code>line_user_id</code> for chat confirmation." },
        { name:"channel", type:"enum", req:false, desc:"Confirmation channel. One of <code>voice</code>, <code>line</code> or <code>sms</code>. Defaults to <code>line</code>." },
        { name:"notes", type:"string", req:false, desc:"Free-form note shown to clinic staff. Limited to 500 characters." },
        { name:"metadata", type:"map", req:false, desc:"Set of up to 20 key-value pairs you can attach for your own bookkeeping." },
      ],
      note:"Pass an <strong>Idempotency-Key</strong> header to safely retry a create request without risk of a duplicate booking.",
      samples:{
        curl:`<span class="tk-cmd">curl</span> <span class="tk-flag">-X</span> POST https://api.aperture.dev/v2024-06<span class="tk-str">/bookings</span> \\
  <span class="tk-flag">-H</span> <span class="tk-str">"Authorization: Bearer sk_live_4eC39Hq..."</span> \\
  <span class="tk-flag">-H</span> <span class="tk-str">"Idempotency-Key: a1f9-0c2e"</span> \\
  <span class="tk-flag">-H</span> <span class="tk-str">"Content-Type: application/json"</span> \\
  <span class="tk-flag">-d</span> <span class="tk-str">'{
    "clinic_id": "cl_8Hk29Lm",
    "service": "checkup",
    "starts_at": "2024-06-21T09:30:00+07:00",
    "patient": { "name": "Somchai P.", "phone": "+66812345678" },
    "channel": "line"
  }'</span>`,
        js:`<span class="tk-kw">import</span> Aperture <span class="tk-kw">from</span> <span class="tk-str">"aperture"</span>;

<span class="tk-kw">const</span> client = <span class="tk-kw">new</span> <span class="tk-fn">Aperture</span>(process.env.<span class="tk-var">APERTURE_KEY</span>);

<span class="tk-kw">const</span> booking = <span class="tk-kw">await</span> client.bookings.<span class="tk-fn">create</span>({
  clinic_id: <span class="tk-str">"cl_8Hk29Lm"</span>,
  service:   <span class="tk-str">"checkup"</span>,
  starts_at: <span class="tk-str">"2024-06-21T09:30:00+07:00"</span>,
  patient:   { name: <span class="tk-str">"Somchai P."</span>, phone: <span class="tk-str">"+66812345678"</span> },
  channel:   <span class="tk-str">"line"</span>,
}, { idempotencyKey: <span class="tk-str">"a1f9-0c2e"</span> });

console.<span class="tk-fn">log</span>(booking.id);`,
        python:`<span class="tk-kw">import</span> aperture

client = aperture.<span class="tk-fn">Client</span>(api_key=os.environ[<span class="tk-str">"APERTURE_KEY"</span>])

booking = client.bookings.<span class="tk-fn">create</span>(
    clinic_id=<span class="tk-str">"cl_8Hk29Lm"</span>,

/* =========================================================================
   RENDER
   ========================================================================= */
const LANGS = [ {k:"curl",label:"cURL"}, {k:"js",label:"Node"}, {k:"python",label:"Python"} ];
const ICON = {
  copy:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`,
  check:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg>`,
  info:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`,
};

function methodClass(m){ return ({GET:"get",POST:"post",DELETE:"del",PATCH:"patch",PUT:"put"})[m] || "get"; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ---- sidebar ---- */
function renderSidebar(){
  const sb = document.getElementById("sidebar");
  let html = "";
  for (const g of DATA.groups){
    html += `<div class="side-group"><div class="gtitle">${esc(g.title)}</div>`;
    for (const it of g.items){
      html += `<a class="side-link" data-id="${it.id}" href="#${it.id}" role="link" tabindex="0">
        <span class="m ${methodClass(it.method)}">${it.method}</span>
        <span class="lname">${esc(it.label)}</span>
      </a>`;
    }
    html += `</div>`;
  }
  sb.innerHTML = html;
}

/* ---- center detail ---- */
function renderCenter(ep){
  const c = document.getElementById("center");
  const pathHtml = ep.pathSegs.map(s => s.v
      ? `<span class="seg-var">${esc(s.t)}</span>`
      : `<span>${esc(s.t)}</span>`).join("");
  const crumbs = ep.crumbs.map((x,i)=> i ? `<span class="sep">/</span><span>${esc(x)}</span>` : `<span>${esc(x)}</span>`).join("");
  let params = `<div class="params">`;
  for (const p of ep.params){
    params += `<div class="param">
      <div class="p-head">
        <span class="p-name">${esc(p.name)}</span>
        <span class="p-type">${esc(p.type)}</span>
        ${p.req ? `<span class="p-req">required</span>` : `<span class="p-opt">optional</span>`}
      </div>
      <div class="p-desc">${p.desc}</div>
    </div>`;
  }
  params += `</div>`;
  c.innerHTML = `
    <div class="crumbs">${crumbs}</div>
    <div class="endpoint-head">
      <h1>${esc(ep.title)}</h1>
      <div class="endpoint-line">
        <span class="m ${methodClass(ep.method)}">${ep.method}</span>
        <span class="path">${pathHtml}</span>
        <span class="copy" data-copy="${esc(DATA.api.base + ep.path)}" tabindex="0">${ICON.copy}Copy</span>
      </div>
      <p class="lede">${esc(ep.lede)}</p>
    </div>
    <div class="sec-title">Parameters</div>
    ${params}
    <div class="note"><span class="ic">${ICON.info}</span><div>${ep.note}</div></div>
  `;
}

/* ---- right code column ---- */
let activeLang = "curl";
function renderCode(ep){
  const col = document.getElementById("codecol");
  const tabs = LANGS.map(l => `<button class="langtab ${l.k===activeLang?"active":""}" data-lang="${l.k}">${l.label}</button>`).join("");
  const bodies = LANGS.map(l => `<div class="codebody ${l.k===activeLang?"active":""}" data-langbody="${l.k}"><pre class="code">${ep.samples[l.k]}</pre></div>`).join("");
  col.innerHTML = `
    <div class="codecard" id="reqcard">
      <div class="cc-head">
        <span class="cc-title">Request</span>
        <div class="langtabs">${tabs}</div>
        <button class="cc-copy" id="copyReq" aria-label="Copy request">${ICON.copy}</button>
      </div>
      ${bodies}
    </div>
    <div class="codecard">
      <div class="resp-head">
        <span class="cc-title">Response</span>
        <span class="status"><span class="dot"></span>${esc(ep.status)}</span>
      </div>
      <div class="codebody active"><pre class="code" id="respBody">${ep.response}</pre></div>
    </div>
  `;
  // language tab strip behaviour
  col.querySelectorAll(".langtab").forEach(btn=>{
    btn.addEventListener("click",()=>{
      activeLang = btn.dataset.lang;
      col.querySelectorAll(".langtab").forEach(b=>b.classList.toggle("active", b.dataset.lang===activeLang));
      col.querySelectorAll("[data-langbody]").forEach(b=>b.classList.toggle("active", b.dataset.langbody===activeLang));
    });
  });
  // copy request
  const copyReq = document.getElementById("copyReq");
  copyReq.addEventListener("click",()=>{
    const body = col.querySelector(".codebody.active[data-langbody] pre, [data-langbody='"+activeLang+"'] pre");
    const txt = (body||{}).textContent || ep.samples[activeLang].replace(/<[^>]+>/g,"");
    copyText(txt, copyReq);
  });
}

/* ---- copy helper ---- */
function copyText(text, el){
  const done = ()=>{ if(!el) return; el.classList.add("ok"); el.innerHTML = ICON.check; setTimeout(()=>{ el.classList.remove("ok"); el.innerHTML = ICON.copy; }, 1300); };
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(done);
  } else { done(); }
}

/* ---- select an endpoint ---- */
let current = null;
function selectEndpoint(id, push){
  const ep = DATA.endpoints[id];
  if (!ep) return;
  current = id;
  renderCenter(ep);
  renderCode(ep);
  document.querySelectorAll(".side-link").forEach(a=>a.classList.toggle("active", a.dataset.id===id));
  // re-bind crumb copy
  const cp = document.querySelector(".endpoint-line .copy");
  if (cp) cp.addEventListener("click", ()=>copyText(cp.dataset.copy, cp));
  // scroll panels to top on switch (respect reduced motion)
  const rm = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  document.querySelector(".center").scrollTo({top:0,behavior:rm?"auto":"auto"});
  if (push && history.replaceState) history.replaceState(null,"","#"+id);
  closeMobileNav();
}

/* ---- mobile nav ---- */
const sidebar = document.getElementById("sidebar");
const scrim = document.getElementById("scrim");
function openMobileNav(){ sidebar.classList.add("open"); scrim.classList.add("show"); }
function closeMobileNav(){ sidebar.classList.remove("open"); scrim.classList.remove("show"); }
document.getElementById("burger").addEventListener("click", ()=>{
  sidebar.classList.contains("open") ? closeMobileNav() : openMobileNav();
});
scrim.addEventListener("click", closeMobileNav);

/* ---- init ---- */
renderSidebar();
// sidebar interaction
document.getElementById("sidebar").addEventListener("click", e=>{
  const link = e.target.closest(".side-link");
  if (!link) return;
  e.preventDefault();
  selectEndpoint(link.dataset.id, true);
});
document.getElementById("sidebar").addEventListener("keydown", e=>{
  if (e.key==="Enter" || e.key===" "){
    const link = e.target.closest(".side-link");
    if (link){ e.preventDefault(); selectEndpoint(link.dataset.id, true); }
  }
});

// open the featured endpoint at scroll=0 (or one from the hash)
const fromHash = location.hash ? location.hash.slice(1) : null;
const featured = "create-booking";
selectEndpoint(DATA.endpoints[fromHash] ? fromHash : featured, false);

// keyboard "/" focuses search affordance
document.addEventListener("keydown", e=>{
  if (e.key==="/" && !/INPUT|TEXTAREA/.test((document.activeElement||{}).tagName||"")){
    e.preventDefault();
    document.querySelector(".topbar .search").focus();
  }
});
</script>
