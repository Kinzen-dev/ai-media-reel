<!-- TEMPLATE: Gilded Deco Owner Overview | ARCHETYPE: art-deco-backoffice | REF: 1920s-30s Art Deco, Cassandre, Chrysler Building | WHEN TO USE: owner/exec at-a-glance KPI dashboard wanting ornate gilded Art-Deco luxury (sunburst + ziggurat) instead of a flat dark card grid; SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>คลินิกทันตกรรม - ภาพรวมสำหรับเจ้าของ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   DATA-DRIVEN GILDED ART DECO DASHBOARD
   All swappable content lives in the JS DATA array (see <script>).
   Palette is Art Deco: deep navy ground, champagne gold, ivory.
   ============================================================ */
:root{
  --navy:#0f1a2b;
  --navy-2:#13223a;
  --navy-3:#0b1322;
  --gold:#c8a45c;
  --gold-soft:#d8be86;
  --gold-deep:#a07e3e;
  --ivory:#f3ecdd;
  --ivory-dim:#cbc3ae;
  --line:rgba(200,164,92,0.34);
  --line-soft:rgba(200,164,92,0.16);
  --rose:#c98b6a;
  --jade:#7fae9a;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden;}
body{
  background:var(--navy);
  background-image:
    radial-gradient(1200px 700px at 50% -10%, rgba(200,164,92,0.10), transparent 60%),
    linear-gradient(180deg, #0d1726 0%, var(--navy) 38%, var(--navy-3) 100%);
  color:var(--ivory);
  font-family:"Noto Sans Thai","Cormorant Garamond",serif;
  font-size:16px;
  line-height:1.5;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
.deco-face{font-family:"Poiret One","Noto Sans Thai",sans-serif;}
.serif{font-family:"Cormorant Garamond",serif;}

/* page frame */
.shell{
  max-width:1320px;
  margin:0 auto;
  padding:22px 26px 64px;
}
@media(max-width:640px){ .shell{padding:12px 14px 48px;} .masthead{margin-bottom:14px;} }

a{color:inherit;}
:focus-visible{
  outline:2px solid var(--gold-soft);
  outline-offset:3px;
  border-radius:3px;
}

/* ---------- top band / masthead ---------- */
.masthead{
  position:relative;
  border:1px solid var(--line);
  background:
    linear-gradient(180deg, rgba(19,34,58,0.85), rgba(11,19,34,0.92));
  overflow:hidden;
  margin-bottom:22px;
}
.masthead .frame-corner{position:absolute;width:34px;height:34px;pointer-events:none;}
.masthead .frame-corner svg{display:block;width:100%;height:100%;}
.fc-tl{top:7px;left:7px;}
.fc-tr{top:7px;right:7px;transform:scaleX(-1);}
.fc-bl{bottom:7px;left:7px;transform:scaleY(-1);}
.fc-br{bottom:7px;right:7px;transform:scale(-1,-1);}

.masthead-inner{
  position:relative;
  display:flex;
  align-items:stretch;
  gap:0;
  min-width:0;
}
.sunburst-cell{
  position:relative;
  flex:0 0 240px;
  min-width:0;
  display:flex;
  align-items:center;
  justify-content:center;
  border-right:1px solid var(--line-soft);
  overflow:hidden;
}
.sunburst-cell svg{width:200px;height:200px;display:block;}
.spin{transform-origin:50% 50%;animation:spin 90s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.masthead-mid{
  flex:1 1 auto;
  min-width:0;
  padding:26px 30px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  border-right:1px solid var(--line-soft);
}
.eyebrow{
  font-size:11px;
  letter-spacing:0.42em;
  text-transform:uppercase;
  color:var(--gold);
  margin:0 0 10px;
}
.masthead-mid h1{
  font-family:"Poiret One","Noto Sans Thai",sans-serif;
  font-weight:400;
  font-size:clamp(26px,4vw,46px);
  letter-spacing:0.14em;
  margin:0;
  color:var(--ivory);
  line-height:1.06;
  word-break:break-word;
}
.rule-pair{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px 0 8px;}
.rule-pair .hr{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);flex:1 1 auto;min-width:0;max-width:120px;}
.rule-pair .diamond{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);flex:0 0 auto;}
.subline{font-size:13px;letter-spacing:0.26em;text-transform:uppercase;color:var(--ivory-dim);margin:0;}

.masthead-right{
  flex:0 0 240px;
  min-width:0;
  padding:22px 24px;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:center;
  gap:6px;
  text-align:right;
}
.clock-day{font-size:13px;letter-spacing:0.2em;color:var(--gold);text-transform:uppercase;}
.clock-time{font-family:"Poiret One",sans-serif;font-size:34px;letter-spacing:0.08em;color:var(--ivory);line-height:1;}
.clock-meta{font-size:12px;color:var(--ivory-dim);letter-spacing:0.14em;}
.live-pill{
  display:inline-flex;align-items:center;gap:7px;
  border:1px solid var(--line);
  padding:4px 12px;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold-soft);
  margin-top:4px;
}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--jade);box-shadow:0 0 9px var(--jade);animation:pulse 2.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ---------- KPI ziggurat row ---------- */
.kpi-row{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:18px;
  margin-bottom:22px;
}
.zig{
  position:relative;
  min-width:0;
  background:linear-gradient(180deg, rgba(19,34,58,0.6), rgba(11,19,34,0.78));
  padding:0;
}
.zig-frame{position:relative;padding:22px 20px 20px;border:1px solid var(--line);}
/* ziggurat stepped top */
.zig-step{
  position:absolute;left:50%;transform:translateX(-50%);top:-1px;
  width:64%;height:9px;border:1px solid var(--line);border-bottom:none;background:rgba(200,164,92,0.05);
}
.zig-step::before{
  content:"";position:absolute;left:50%;transform:translateX(-50%);top:-10px;
  width:62%;height:9px;border:1px solid var(--line-soft);border-bottom:none;background:rgba(200,164,92,0.04);
}
.kpi-label{
  font-size:11px;letter-spacing:0.26em;text-transform:uppercase;color:var(--gold);
  margin:0 0 4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.kpi-fig{
  font-family:"Poiret One","Noto Sans Thai",sans-serif;
  font-size:clamp(34px,5vw,52px);
  letter-spacing:0.04em;
  color:var(--ivory);
  line-height:1;
  margin:4px 0 2px;
  display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;min-width:0;
}
.kpi-unit{font-size:0.42em;letter-spacing:0.16em;color:var(--gold-soft);text-transform:uppercase;}
.kpi-sub{font-size:12.5px;color:var(--ivory-dim);letter-spacing:0.04em;}
.kpi-delta{
  display:inline-flex;align-items:center;gap:5px;margin-top:9px;
  font-size:12px;letter-spacing:0.08em;
  border-top:1px solid var(--line-soft);padding-top:9px;width:100%;
}
.kpi-delta.up{color:var(--jade);}
.kpi-delta.down{color:var(--rose);}
.kpi-delta .arrow{font-family:"Poiret One",sans-serif;font-size:14px;line-height:1;}
.kpi-delta .vs{color:var(--ivory-dim);letter-spacing:0.04em;}

/* ---------- main two-column ---------- */
.grid-main{
  display:grid;
  grid-template-columns:1.5fr 1fr;
  gap:22px;
  margin-bottom:22px;
}
.panel{
  position:relative;
  border:1px solid var(--line);
  background:linear-gradient(180deg, rgba(19,34,58,0.5), rgba(11,19,34,0.72));
  padding:20px 22px 22px;
  min-width:0;
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  margin-bottom:6px;min-width:0;
}
.panel-title{
  font-family:"Poiret One","Noto Sans Thai",sans-serif;
  font-size:19px;letter-spacing:0.14em;color:var(--ivory);margin:0;
  min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.panel-tag{font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);white-space:nowrap;flex:0 0 auto;}
.deco-underline{height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin:6px 0 16px;}

/* trend chart */
.chart-wrap{position:relative;width:100%;min-width:0;}
.chart-wrap svg{display:block;width:100%;height:auto;}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:12px;font-size:12px;letter-spacing:0.06em;color:var(--ivory-dim);}
.legend span{display:inline-flex;align-items:center;gap:7px;min-width:0;}
.legend .swatch{width:16px;height:3px;flex:0 0 auto;}

/* donut split */
.split-flex{display:flex;align-items:center;gap:20px;flex-wrap:wrap;min-width:0;}
.donut-box{flex:0 0 auto;position:relative;width:170px;max-width:48vw;}
.donut-box svg{display:block;width:100%;height:auto;}
.donut-center{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;
}
.donut-center .big{font-family:"Poiret One",sans-serif;font-size:30px;color:var(--ivory);line-height:1;}
.donut-center .lbl{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-top:3px;}
.split-legend{flex:1 1 150px;min-width:0;display:flex;flex-direction:column;gap:14px;}
.split-item{min-width:0;}
.split-item .top{display:flex;align-items:baseline;justify-content:space-between;gap:8px;min-width:0;}
.split-item .name{font-size:13.5px;letter-spacing:0.1em;color:var(--ivory);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.split-item .pct{font-family:"Poiret One",sans-serif;font-size:18px;flex:0 0 auto;}
.split-item .bar{height:4px;background:rgba(200,164,92,0.12);margin-top:7px;position:relative;overflow:hidden;}
.split-item .bar i{position:absolute;left:0;top:0;bottom:0;display:block;}
.split-item .sub{font-size:11.5px;color:var(--ivory-dim);margin-top:5px;letter-spacing:0.04em;}

/* ---------- handoff list ---------- */
.handoff-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;min-width:0;}
.count-chip{
  font-family:"Poiret One",sans-serif;font-size:13px;letter-spacing:0.12em;
  border:1px solid var(--line);color:var(--gold-soft);padding:3px 11px;flex:0 0 auto;
}
.handoff-list{list-style:none;margin:0;padding:0;}
.handoff-item{
  display:flex;align-items:center;gap:14px;
  padding:13px 4px;border-bottom:1px solid var(--line-soft);min-width:0;
}
.handoff-item:last-child{border-bottom:none;}
.h-mark{
  flex:0 0 auto;width:30px;height:30px;display:flex;align-items:center;justify-content:center;
}
.h-mark svg{width:30px;height:30px;display:block;}
.h-body{flex:1 1 auto;min-width:0;}
.h-name{font-size:14.5px;color:var(--ivory);letter-spacing:0.04em;display:flex;align-items:center;gap:9px;flex-wrap:wrap;min-width:0;}
.h-name .who{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.h-reason{font-size:12.5px;color:var(--ivory-dim);margin-top:3px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.h-meta{flex:0 0 auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.h-chan{font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;border:1px solid var(--line-soft);padding:2px 8px;white-space:nowrap;}
.h-chan.voice{color:var(--gold-soft);}
.h-chan.line{color:var(--jade);}
.h-time{font-size:11.5px;color:var(--ivory-dim);letter-spacing:0.08em;white-space:nowrap;}
.h-flag{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;}
.h-flag.high{color:var(--rose);}
.h-flag.mid{color:var(--gold);}

/* footer rule */
.deco-foot{
  display:flex;align-items:center;gap:14px;margin-top:30px;color:var(--ivory-dim);
  font-size:11.5px;letter-spacing:0.22em;text-transform:uppercase;justify-content:center;flex-wrap:wrap;text-align:center;
}
.deco-foot .hr{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);flex:1 1 90px;min-width:0;max-width:200px;}
.deco-foot .dot{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);flex:0 0 auto;}

/* ---------- responsive ---------- */
@media(max-width:980px){
  .grid-main{grid-template-columns:1fr;}
  .kpi-row{grid-template-columns:repeat(2,minmax(0,1fr));}
}
@media(max-width:720px){
  .masthead-inner{flex-direction:column;}
  .sunburst-cell{flex:0 0 auto;border-right:none;border-bottom:1px solid var(--line-soft);padding:12px 0;}
  .sunburst-cell svg{width:118px;height:118px;}
  .masthead-mid{border-right:none;padding:16px 18px;}
  .masthead-mid h1{font-size:clamp(24px,7vw,34px);}
  .rule-pair{margin:10px 0 6px;}
  .masthead-right{flex:0 0 auto;align-items:center;text-align:center;border-top:1px solid var(--line-soft);padding:13px;}
  .clock-time{font-size:28px;}
  .kpi-row{margin-bottom:16px;margin-top:16px;}
}
/* phones: compact the masthead so the ziggurat KPI mechanic populates the first screen at scroll=0 */
@media(max-width:640px){
  .shell{padding-top:10px;}
  .masthead{margin-bottom:14px;}
  .sunburst-cell{padding:8px 0;}
  .sunburst-cell svg{width:92px;height:92px;}
  .masthead-mid{padding:12px 16px;}
  .eyebrow{font-size:10px;letter-spacing:0.32em;margin:0 0 6px;}
  .masthead-mid h1{font-size:clamp(22px,6.6vw,30px);}
  .rule-pair{margin:8px 0 4px;}
  .subline{font-size:11.5px;letter-spacing:0.2em;}
  .masthead-right{flex-direction:row;flex-wrap:wrap;justify-content:center;gap:6px 14px;padding:10px 13px;}
  .clock-day{font-size:11.5px;}
  .clock-time{font-size:24px;}
  .clock-meta{font-size:11px;}
  .live-pill{margin-top:0;}
  .kpi-row{margin-top:14px;margin-bottom:14px;}
}
@media(max-width:560px){
  .kpi-row{grid-template-columns:1fr;gap:14px;}
  .kpi-fig{font-size:42px;}
  .donut-box{width:150px;}
  .h-meta{display:none;}
  .h-reason{white-space:normal;}
}
@media(prefers-reduced-motion:reduce){
  .spin{animation:none !important;}
  .live-dot{animation:none !important;}
  *{scroll-behavior:auto !important;}
}
</style>
</head>
<body>
<main class="shell">

  <!-- ================= MASTHEAD ================= -->
  <header class="masthead" aria-label="ภาพรวม">
    <span class="frame-corner fc-tl" aria-hidden="true">
      <svg viewBox="0 0 34 34"><path d="M1 1 H33 M1 1 V33 M1 9 H25 M9 1 V25 M5 5 L18 5 L5 18 Z" fill="none" stroke="#c8a45c" stroke-width="1"/></svg>
    </span>
    <span class="frame-corner fc-tr" aria-hidden="true">
      <svg viewBox="0 0 34 34"><path d="M1 1 H33 M1 1 V33 M1 9 H25 M9 1 V25 M5 5 L18 5 L5 18 Z" fill="none" stroke="#c8a45c" stroke-width="1"/></svg>
    </span>
    <span class="frame-corner fc-bl" aria-hidden="true">
      <svg viewBox="0 0 34 34"><path d="M1 1 H33 M1 1 V33 M1 9 H25 M9 1 V25 M5 5 L18 5 L5 18 Z" fill="none" stroke="#c8a45c" stroke-width="1"/></svg>
    </span>
    <span class="frame-corner fc-br" aria-hidden="true">
      <svg viewBox="0 0 34 34"><path d="M1 1 H33 M1 1 V33 M1 9 H25 M9 1 V25 M5 5 L18 5 L5 18 Z" fill="none" stroke="#c8a45c" stroke-width="1"/></svg>
    </span>

    <div class="masthead-inner">
      <!-- sunburst / fan-vault motif -->
      <div class="sunburst-cell" aria-hidden="true">
        <svg viewBox="0 0 200 200" id="sunburst">
          <defs>
            <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#d8be86"/>
              <stop offset="55%" stop-color="#c8a45c"/>
              <stop offset="100%" stop-color="#a07e3e"/>
            </radialGradient>
          </defs>
          <g class="spin">
            <!-- 24 rays -->
            <g id="rays"></g>
          </g>
          <circle cx="100" cy="100" r="40" fill="none" stroke="#c8a45c" stroke-width="1"/>
          <circle cx="100" cy="100" r="33" fill="none" stroke="#c8a45c" stroke-width="0.6"/>
          <circle cx="100" cy="100" r="14" fill="url(#sunGrad)"/>
          <!-- stepped fan arcs -->
          <path d="M60 100 A40 40 0 0 1 140 100" fill="none" stroke="#d8be86" stroke-width="1"/>
          <path d="M70 100 A30 30 0 0 1 130 100" fill="none" stroke="#c8a45c" stroke-width="0.7"/>
        </svg>
      </div>

      <div class="masthead-mid">
        <p class="eyebrow" id="clinicEyebrow">YIMWHAN DENTAL - OWNER DESK</p>
        <h1 id="clinicName">คลินิกทันตกรรม ยิ้มหวาน</h1>
        <div class="rule-pair" aria-hidden="true">
          <span class="hr"></span><span class="diamond"></span><span class="hr"></span>
        </div>
        <p class="subline" id="overviewLabel">ภาพรวมประจำวัน</p>
      </div>

      <div class="masthead-right">
        <span class="clock-day" id="clockDay">วันนี้</span>
        <span class="clock-time" id="clockTime">--:--</span>
        <span class="clock-meta" id="clockDate"></span>
        <span class="live-pill"><span class="live-dot"></span> ระบบทำงานปกติ</span>
      </div>
    </div>
  </header>

  <!-- ================= KPI ZIGGURAT ROW ================= -->
  <section class="kpi-row" id="kpiRow" aria-label="ตัวชี้วัดหลัก"></section>

  <!-- ================= MAIN GRID ================= -->
  <section class="grid-main">

    <!-- TREND CHART -->
    <article class="panel">
      <div class="panel-head">
        <h2 class="panel-title">สายโทรและการจอง</h2>
        <span class="panel-tag" id="trendRange">7 วันล่าสุด</span>
      </div>
      <div class="deco-underline"></div>
      <div class="chart-wrap" id="chartWrap"></div>
      <div class="legend">
        <span><i class="swatch" style="background:#c8a45c"></i> สายโทรเข้า</span>
        <span><i class="swatch" style="background:#7fae9a"></i> นัดที่จองสำเร็จ</span>
      </div>
    </article>

    <!-- VOICE vs LINE SPLIT -->
    <article class="panel">
      <div class="panel-head">
        <h2 class="panel-title">ช่องทางที่ลูกค้าติดต่อ</h2>
        <span class="panel-tag">Voice / LINE</span>
      </div>
      <div class="deco-underline"></div>
      <div class="split-flex">
        <div class="donut-box">
          <svg viewBox="0 0 200 200" id="donut" role="img" aria-label="สัดส่วนช่องทาง">
            <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(200,164,92,0.12)" stroke-width="14"/>
            <g id="donutArcs"></g>
            <!-- deco tick ring -->
            <g id="donutTicks"></g>
            <circle cx="100" cy="100" r="58" fill="none" stroke="rgba(200,164,92,0.22)" stroke-width="0.8"/>
          </svg>
          <div class="donut-center">
            <span class="big" id="donutTotal">0</span>
            <span class="lbl">สายทั้งหมด</span>
          </div>
        </div>
        <div class="split-legend" id="splitLegend"></div>
      </div>
    </article>
  </section>

  <!-- ================= HANDOFF LIST ================= -->
  <section class="panel" aria-label="รายการที่ควรดู">
    <div class="panel-head handoff-head">
      <h2 class="panel-title">รายการที่ควรเข้าไปดู</h2>
      <span class="count-chip" id="handoffCount">0 รายการ</span>
    </div>
    <div class="deco-underline"></div>
    <ul class="handoff-list" id="handoffList"></ul>
  </section>

  <div class="deco-foot" aria-hidden="true">
    <span class="hr"></span><span class="dot"></span>
    <span>ยิ้มหวาน เดนทอล - แดชบอร์ดเจ้าของกิจการ</span>
    <span class="dot"></span><span class="hr"></span>
  </div>

</main>

<script>
/* ============================================================
   DATA  -  edit this block to re-skin the dashboard.
   Everything below renders from this single object.
   ============================================================ */
const DATA = {
  clinic: {
    eyebrow: "YIMWHAN DENTAL - OWNER DESK",
    name: "คลินิกทันตกรรม ยิ้มหวาน",
    overviewLabel: "ภาพรวมประจำวัน",
    currency: "บาท"
  },

  // KPI cards. delta is vs yesterday (positive = up).
  // dir tells whether "up" is good (true) or bad (false) for coloring.

/* ---------- gold tokens (inline hex per brief, never var()) ---------- */
const GOLD = "#c8a45c";
const GOLD_SOFT = "#d8be86";
const JADE = "#7fae9a";

/* ---------- helpers ---------- */
const $ = (id)=>document.getElementById(id);
const NS = "http://www.w3.org/2000/svg";
function el(tag, attrs){
  const n = document.createElementNS(NS, tag);
  for(const k in attrs){ n.setAttribute(k, attrs[k]); }
  return n;
}

/* ---------- sunburst rays (built in JS to keep markup lean) ---------- */
(function buildRays(){
  const g = $("rays");
  if(!g) return;
  const cx=100, cy=100;
  for(let i=0;i<24;i++){
    const a = (i/24)*Math.PI*2;
    const long = i%2===0;
    const r1 = 42;
    const r2 = long ? 96 : 72;
    const w  = long ? 5 : 2.4;
    // tapered triangular ray
    const ax = cx + Math.cos(a)*r1, ay = cy + Math.sin(a)*r1;
    const bx = cx + Math.cos(a)*r2, by = cy + Math.sin(a)*r2;
    const pa = a + Math.PI/2;
    const ox = Math.cos(pa)*(w/2), oy = Math.sin(pa)*(w/2);
    const p = el("path", {
      d:`M${ax+ox} ${ay+oy} L${bx} ${by} L${ax-ox} ${ay-oy} Z`,
      fill: long ? GOLD : "rgba(200,164,92,0.55)",
      stroke:"none"
    });
    g.appendChild(p);
  }
})();

/* ---------- masthead text ---------- */

/* ---------- clock ---------- */
(function clock(){
  const days = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
  const months = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
  function tick(){
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,"0");
    const mm = String(d.getMinutes()).padStart(2,"0");
    $("clockTime").textContent = hh+":"+mm;
    $("clockDay").textContent = "วัน"+days[d.getDay()];
    $("clockDate").textContent = d.getDate()+" "+months[d.getMonth()]+" "+(d.getFullYear()+543);
  }
  tick();
  // honor reduced motion: still update, but a 30s cadence is fine and cheap
  setInterval(tick, 30000);
})();

/* ---------- TREND CHART (gold deco line + bars) ---------- */
(function renderChart(){
  const wrap = $("chartWrap");
  const T = DATA.trend;
  const W = 600, H = 280;
  const padL = 40, padR = 16, padT = 18, padB = 34;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const maxCalls = Math.max(...T.calls) * 1.12;
  const n = T.days.length;
  const stepX = plotW / (n - 1);
  const xAt = i => padL + i*stepX;
  const yCalls = v => padT + plotH - (v/maxCalls)*plotH;
  const maxBook = Math.max(...T.bookings) * 1.12;
  const barW = Math.min(26, stepX*0.46);

  const svg = el("svg", { viewBox:`0 0 ${W} ${H}`, role:"img", "aria-label":"กราฟสายโทรและการจอง 7 วัน" });

  // gradient + glow defs
  svg.innerHTML =
    '<defs>'+
      '<linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">'+
        '<stop offset="0%" stop-color="#a07e3e"/><stop offset="50%" stop-color="#d8be86"/><stop offset="100%" stop-color="#c8a45c"/>'+
      '</linearGradient>'+
      '<linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">'+
        '<stop offset="0%" stop-color="rgba(200,164,92,0.28)"/><stop offset="100%" stop-color="rgba(200,164,92,0)"/>'+
      '</linearGradient>'+
      '<linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">'+
        '<stop offset="0%" stop-color="#9fc4b4"/><stop offset="100%" stop-color="rgba(127,174,154,0.18)"/>'+
      '</linearGradient>'+
    '</defs>';

  // gridlines (hairline gold) + y labels
  const gGrid = el("g", {});
  for(let g=0; g<=3; g++){
    const yv = maxCalls * (g/3);
    const y = yCalls(yv);
    gGrid.appendChild(el("line", { x1:padL, y1:y, x2:W-padR, y2:y, stroke:"rgba(200,164,92,0.12)", "stroke-width":"1" }));
    const t = el("text", { x:padL-8, y:y+4, "text-anchor":"end", fill:"#cbc3ae", "font-size":"11", "font-family":"Poiret One, sans-serif" });
    t.textContent = Math.round(yv);
    gGrid.appendChild(t);
  }
  svg.appendChild(gGrid);

  // bookings bars (jade)
  const gBars = el("g", {});
  T.bookings.forEach((v,i)=>{
    const h = (v/maxBook)*plotH;
    const x = xAt(i) - barW/2;
    const y = padT + plotH - h;
    gBars.appendChild(el("rect", { x:x, y:y, width:barW, height:h, fill:"url(#barGrad)", stroke:"rgba(127,174,154,0.5)", "stroke-width":"0.8" }));
    // deco notch top
    gBars.appendChild(el("line", { x1:x, y1:y, x2:x+barW, y2:y, stroke:JADE, "stroke-width":"1.4" }));
  });
  svg.appendChild(gBars);

  // calls area + line
  let areaD = `M${xAt(0)} ${padT+plotH}`;
  T.calls.forEach((v,i)=>{ areaD += ` L${xAt(i)} ${yCalls(v)}`; });
  areaD += ` L${xAt(n-1)} ${padT+plotH} Z`;
  svg.appendChild(el("path", { d:areaD, fill:"url(#areaGrad)", stroke:"none" }));

  let lineD = "";
  T.calls.forEach((v,i)=>{ lineD += (i===0?"M":"L")+xAt(i)+" "+yCalls(v)+" "; });
  const linePath = el("path", { d:lineD, fill:"none", stroke:"url(#lineGrad)", "stroke-width":"2.4", "stroke-linejoin":"round", "stroke-linecap":"round" });
  svg.appendChild(linePath);

  // deco diamond markers on calls
  T.calls.forEach((v,i)=>{
    const x=xAt(i), y=yCalls(v);
    const dm = el("path", { d:`M${x} ${y-5} L${x+5} ${y} L${x} ${y+5} L${x-5} ${y} Z`, fill:"#0f1a2b", stroke:GOLD_SOFT, "stroke-width":"1.4" });
    svg.appendChild(dm);
  });

  // x labels
  const gX = el("g", {});
  T.days.forEach((d,i)=>{
    const t = el("text", { x:xAt(i), y:H-12, "text-anchor":"middle", fill:"#cbc3ae", "font-size":"12", "font-family":"Noto Sans Thai, sans-serif", "letter-spacing":"0.04em" });
    t.textContent = d;
    gX.appendChild(t);
  });
  svg.appendChild(gX);

  // baseline gold rule
  svg.appendChild(el("line", { x1:padL, y1:padT+plotH, x2:W-padR, y2:padT+plotH, stroke:"rgba(200,164,92,0.4)", "stroke-width":"1" }));

  $("trendRange").textContent = T.range;
  wrap.appendChild(svg);

  // animate the line draw once (reduced-motion: show final state)
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  if(!reduce){
    const len = linePath.getTotalLength();
    linePath.style.strokeDasharray = len;
    linePath.style.strokeDashoffset = len;
    requestAnimationFrame(()=>{
      linePath.style.transition = "stroke-dashoffset 1.6s ease-out";
      linePath.style.strokeDashoffset = "0";
    });
  }
})();

/* ---------- DONUT (thin gold deco) + split legend ---------- */
(function renderDonut(){
  const S = DATA.split;
  const arcsG = $("donutArcs");
  const ticksG = $("donutTicks");
  const cx=100, cy=100, r=78, sw=14;
  const C = 2*Math.PI*r;
  const total = S.channels.reduce((a,c)=>a+c.value,0);
  $("donutTotal").textContent = S.total;

  let offset = 0;
  S.channels.forEach(ch=>{
    const frac = ch.value/total;
    const len = frac*C;
    const arc = el("circle", {
      cx:cx, cy:cy, r:r, fill:"none",
      stroke:ch.color, "stroke-width":sw,
      "stroke-dasharray":`${len} ${C-len}`,
      "stroke-dashoffset":`${-offset}`,
      transform:`rotate(-90 ${cx} ${cy})`,
      "stroke-linecap":"butt"
    });
    arcsG.appendChild(arc);
    offset += len;
  });

  // deco tick ring (radiating hairlines) - the ornate signature
  for(let i=0;i<48;i++){
    const a = (i/48)*Math.PI*2;
    const major = i%4===0;
    const r1 = r+8, r2 = r + (major?16:12);
    ticksG.appendChild(el("line", {
      x1:cx+Math.cos(a)*r1, y1:cy+Math.sin(a)*r1,
      x2:cx+Math.cos(a)*r2, y2:cy+Math.sin(a)*r2,
      stroke: major? GOLD : "rgba(200,164,92,0.3)", "stroke-width": major?"1.2":"0.7"
    }));
  }

  // legend
  const leg = $("splitLegend");
  S.channels.forEach(ch=>{
    const pct = Math.round((ch.value/total)*100);
    const item = document.createElement("div");
    item.className = "split-item";
    item.innerHTML =
      '<div class="top"><span class="name">'+ch.name+'</span><span class="pct" style="color:'+ch.color+'">'+pct+'%</span></div>'+
      '<div class="bar"><i style="width:'+pct+'%;background:linear-gradient(90deg,'+ch.color+',rgba(200,164,92,0.2))"></i></div>'+
      '<div class="sub">'+ch.value+' สาย - '+ch.sub+'</div>';
    leg.appendChild(item);
  });
})();
