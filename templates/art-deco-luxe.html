<!-- TEMPLATE: Art Deco Luxe | ARCHETYPE: art-deco-gilded-geometric-symmetry | REF: 1920s-30s Art Deco, Cassandre posters, Chrysler Building | WHEN TO USE: gilded luxury launch / portfolio / invitation hero where symmetry + gold-on-navy glamour sells; SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Art Deco Luxe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poiret+One&family=Cormorant+Garamond:wght@300;400;500;600&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   ART DECO LUXE  -  all gold strokes use literal hex (#c8a45c), never var(),
   so inline SVG renders identically when this file is reused stand-alone.
   ========================================================================= */
:root{
  --navy:#0f1a2b;        /* deep navy ground            */
  --navy-2:#0b1320;      /* darker vignette             */
  --gold:#c8a45c;        /* champagne gold              */
  --gold-soft:#9c8047;   /* dimmed gold rule            */
  --ivory:#f3ecdd;       /* ivory text                  */
  --ink:#06080d;         /* ink                         */
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:
    radial-gradient(120% 80% at 50% -10%, #16263c 0%, var(--navy) 45%, var(--navy-2) 100%);
  color:var(--ivory);
  font-family:"Cormorant Garamond",Georgia,serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
  min-height:100vh;
}
::selection{background:var(--gold);color:var(--ink)}

/* focus-visible -------------------------------------------------------- */
a:focus-visible,button:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--gold);
  outline-offset:3px;
}

/* =========================================================================
   STAGE  -  the first viewport. Sunburst motif centred, media cells flank
   it symmetrically so the signature reads at scroll=0 on desktop + phone.
   ========================================================================= */
.frame-outer{
  position:relative;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:clamp(14px,2.4vw,30px);
}
/* stepped ziggurat border drawn as nested hairline rules ---------------- */
.zig-border{position:absolute;inset:clamp(14px,2.4vw,30px);pointer-events:none}
.zig-border .r{position:absolute;border:1px solid var(--gold-soft);opacity:.55}
.zig-border .r1{inset:0;border-color:#c8a45c;opacity:.8}
.zig-border .r2{inset:7px}
.zig-border .r3{inset:14px;opacity:.35}
/* corner ziggurat steps */
.corner{position:absolute;width:54px;height:54px}
.corner svg{display:block}
.corner.tl{top:-1px;left:-1px}
.corner.tr{top:-1px;right:-1px;transform:scaleX(-1)}
.corner.bl{bottom:-1px;left:-1px;transform:scaleY(-1)}
.corner.br{bottom:-1px;right:-1px;transform:scale(-1,-1)}

/* top band: maker mark + hairline rule --------------------------------- */
.topband{
  width:100%;max-width:1180px;
  display:flex;align-items:center;justify-content:center;gap:18px;
  padding:clamp(10px,2vh,26px) 8px 0;
  z-index:5;
}
.topband .rule{height:1px;flex:1;max-width:240px;
  background:linear-gradient(90deg,transparent,var(--gold) 60%,var(--gold))}
.topband .rule.left{background:linear-gradient(90deg,var(--gold),var(--gold) 40%,transparent)}
.maker{
  font-family:"Cinzel",serif;font-weight:600;
  letter-spacing:.42em;font-size:clamp(10px,1.1vw,13px);
  color:var(--gold);text-transform:uppercase;white-space:nowrap;
  padding-left:.42em;
}

/* hero block ----------------------------------------------------------- */
.hero{
  width:100%;max-width:1180px;flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(10px,2.4vh,26px);
  padding:clamp(8px,2vh,22px) 8px clamp(14px,3vh,34px);
  z-index:4;
}

/* the SUNBURST / fan-vault SVG motif - the signature ------------------- */
.sunburst{
  position:relative;
  width:clamp(220px,30vw,360px);
  aspect-ratio:1/1;
  filter:drop-shadow(0 0 26px rgba(200,164,92,.30));
}
.sunburst svg{display:block;width:100%;height:100%;overflow:visible}
/* slow gilded shimmer that respects reduced-motion */
.ray-spin{transform-origin:200px 200px;animation:spin 60s linear infinite}
.ray-spin.rev{animation-duration:80s;animation-direction:reverse}
@keyframes spin{to{transform:rotate(360deg)}}

/* deco display title --------------------------------------------------- */
.title-wrap{text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.eyebrow{
  font-family:"Cinzel",serif;font-weight:500;
  letter-spacing:.5em;font-size:clamp(9px,1vw,12px);
  color:var(--gold);text-transform:uppercase;padding-left:.5em;opacity:.92;
}
.title{
  font-family:"Poiret One","Cinzel",sans-serif;
  font-weight:400;
  font-size:clamp(40px,8.4vw,118px);
  line-height:.92;
  letter-spacing:clamp(.04em,1vw,.16em);
  color:var(--ivory);
  text-transform:uppercase;
  padding-left:clamp(.04em,1vw,.16em);
  text-shadow:0 1px 0 rgba(0,0,0,.45);
}
.title .b{
  background:linear-gradient(180deg,#e9d9a8 0%,#c8a45c 52%,#8a6f3c 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:var(--gold);
}
.sub{
  font-family:"Cormorant Garamond",serif;font-weight:400;font-style:italic;
  font-size:clamp(15px,1.7vw,22px);
  color:var(--ivory);opacity:.82;
  max-width:46ch;margin-top:2px;line-height:1.4;
}
/* twin hairline rule under title with center lozenge */
.lozenge-rule{display:flex;align-items:center;gap:12px;width:min(440px,80%);margin-top:4px}
.lozenge-rule .ln{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold))}
.lozenge-rule .ln.r{background:linear-gradient(90deg,var(--gold),transparent)}
.lozenge{width:9px;height:9px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 8px rgba(200,164,92,.6)}

/* FLANKING media row - 3 ziggurat-framed cells, symmetric -------------- */
.exhibit-row{
  width:100%;max-width:1180px;
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:clamp(12px,1.6vw,22px);
  z-index:4;
}
.zig-cell{
  position:relative;
  background:linear-gradient(180deg,#0c1526,#0a111e);
  border:1px solid var(--gold-soft);
  padding:clamp(8px,1vw,12px);
  cursor:pointer;
  transition:transform .35s ease, box-shadow .35s ease, border-color .35s ease;
}
.zig-cell:hover,.zig-cell:focus-visible,.zig-cell.locked{
  border-color:var(--gold);
  box-shadow:0 0 0 1px rgba(200,164,92,.45),0 18px 40px -18px rgba(0,0,0,.8),0 0 30px -6px rgba(200,164,92,.35);
  transform:translateY(-4px);
}
/* inner stepped frame */
.zig-cell .inner-rule{position:absolute;inset:5px;border:1px solid rgba(200,164,92,.30);pointer-events:none}
.zig-cell .media-box{
  position:relative;width:100%;
  aspect-ratio:4/3;overflow:hidden;
  background:#070b12;
  display:flex;align-items:center;justify-content:center;
}
.zig-cell .media-box img,
.zig-cell .media-box video{
  width:100%;height:100%;object-fit:cover;display:block;
  filter:saturate(.92) contrast(1.03);
}
/* square assets get letterboxed (contain) so they never crop ugly */
.zig-cell.contain .media-box img,
.zig-cell.contain .media-box video{object-fit:contain;background:#070b12}
.zig-cell video{position:absolute;inset:0}
.zig-cell .poster-img{position:absolute;inset:0;z-index:1;transition:opacity .4s ease}
.zig-cell.playing .poster-img{opacity:0}
/* gold play chip */
.play-chip{
  position:absolute;z-index:3;bottom:10px;left:50%;transform:translateX(-50%);
  width:42px;height:42px;border-radius:50%;
  border:1px solid var(--gold);background:rgba(15,26,43,.78);
  display:flex;align-items:center;justify-content:center;
  transition:opacity .3s ease, transform .3s ease;
  backdrop-filter:blur(2px);
}
.zig-cell.playing .play-chip{opacity:0;pointer-events:none}
.play-chip svg{width:15px;height:15px}
/* cell caption plate */
.cell-cap{
  display:flex;align-items:baseline;justify-content:space-between;gap:8px;
  margin-top:9px;padding:0 2px;
}
.cell-cap .name{
  font-family:"Cinzel",serif;font-weight:500;letter-spacing:.18em;
  font-size:clamp(9px,.86vw,11.5px);color:var(--ivory);text-transform:uppercase;
}
.cell-cap .tag{
  font-family:"Cinzel",serif;font-weight:400;letter-spacing:.22em;
  font-size:9px;color:var(--gold);text-transform:uppercase;white-space:nowrap;
}

/* scroll cue */
.scroll-cue{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  font-family:"Cinzel",serif;letter-spacing:.4em;font-size:9px;
  color:var(--gold);text-transform:uppercase;opacity:.8;padding-bottom:4px;
}
.scroll-cue .chev{width:1px;height:18px;background:linear-gradient(180deg,var(--gold),transparent);
  animation:cue 2.4s ease-in-out infinite}
@keyframes cue{0%,100%{transform:scaleY(.5);opacity:.4}50%{transform:scaleY(1);opacity:1}}

/* =========================================================================
   LOWER GALLERY  -  symmetric grand showcase, ziggurat-framed assets
   ========================================================================= */
.gallery{
  max-width:1180px;margin:0 auto;
  padding:clamp(48px,8vh,110px) clamp(16px,4vw,40px) clamp(60px,9vh,120px);
}
.section-head{text-align:center;margin-bottom:clamp(34px,6vh,70px);display:flex;flex-direction:column;align-items:center;gap:14px}
.section-head .kicker{font-family:"Cinzel",serif;letter-spacing:.5em;font-size:clamp(9px,1vw,12px);color:var(--gold);text-transform:uppercase;padding-left:.5em}
.section-head h2{
  font-family:"Poiret One",sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(28px,5vw,64px);letter-spacing:.1em;line-height:1;color:var(--ivory);padding-left:.1em;
}
.section-head .ln-pair{display:flex;align-items:center;gap:12px;width:min(360px,70%)}
.section-head .ln-pair .ln{height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--gold))}
.section-head .ln-pair .ln.r{background:linear-gradient(90deg,var(--gold),transparent)}

.grand-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:clamp(14px,1.8vw,26px)}
/* layout spans give the deco asymmetry-within-symmetry feel */
.g-wide{grid-column:span 8}
.g-tall{grid-column:span 4}
.g-half{grid-column:span 6}
.g-third{grid-column:span 4}

.plate{
  position:relative;
  border:1px solid var(--gold-soft);
  background:linear-gradient(180deg,#0c1526,#0a111e);
  padding:clamp(9px,1vw,14px);
  overflow:hidden;
}
.plate .inner-rule{position:absolute;inset:6px;border:1px solid rgba(200,164,92,.28);pointer-events:none;z-index:2}
.plate .media-box{position:relative;width:100%;overflow:hidden;background:#070b12;display:flex;align-items:center;justify-content:center}
.plate.ratio-wide .media-box{aspect-ratio:16/9}
.plate.ratio-sq .media-box{aspect-ratio:1/1}
.plate.ratio-tall .media-box{aspect-ratio:3/4}
.plate .media-box img,.plate .media-box video{width:100%;height:100%;object-fit:cover;display:block;filter:saturate(.93) contrast(1.03)}
.plate.contain .media-box img,.plate.contain .media-box video{object-fit:contain;background:#070b12}
.plate video{position:absolute;inset:0}
.plate .poster-img{position:absolute;inset:0;z-index:1;transition:opacity .4s ease}
.plate.playing .poster-img{opacity:0}
.plate:hover,.plate:focus-visible,.plate.locked{border-color:var(--gold)}
.plate .cap{
  position:absolute;left:0;right:0;bottom:0;z-index:3;
  display:flex;justify-content:space-between;align-items:flex-end;gap:8px;
  padding:14px 14px 12px;
  background:linear-gradient(0deg,rgba(8,11,18,.92),rgba(8,11,18,.45) 55%,transparent);
}
.plate .cap .name{font-family:"Poiret One",sans-serif;text-transform:uppercase;letter-spacing:.14em;font-size:clamp(13px,1.5vw,20px);color:var(--ivory)}
.plate .cap .meta{font-family:"Cinzel",serif;letter-spacing:.22em;font-size:9px;color:var(--gold);text-transform:uppercase;white-space:nowrap;text-align:right}
.plate .play-chip{cursor:pointer}

/* audio plate (waveform) */
.audio-plate{
  border:1px solid var(--gold-soft);background:linear-gradient(180deg,#0c1526,#0a111e);
  padding:clamp(12px,1.4vw,18px);position:relative;display:flex;flex-direction:column;gap:12px;
}
.audio-plate .inner-rule{position:absolute;inset:6px;border:1px solid rgba(200,164,92,.28);pointer-events:none}
.audio-plate .wave{position:relative;z-index:1;width:100%;height:64px;display:flex;align-items:center;justify-content:center;background:#070b12;overflow:hidden}
.audio-plate .wave img{width:100%;height:100%;object-fit:cover;opacity:.85;filter:sepia(.3) saturate(1.4) hue-rotate(355deg)}
.audio-plate .arow{display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:1}
.audio-plate .aname{font-family:"Cinzel",serif;letter-spacing:.2em;font-size:11px;color:var(--ivory);text-transform:uppercase}
.audio-plate button.audio-btn{
  font-family:"Cinzel",serif;letter-spacing:.2em;font-size:10px;text-transform:uppercase;
  color:var(--ink);background:var(--gold);border:none;padding:8px 16px;cursor:pointer;
  transition:background .25s ease,transform .2s ease;
}
.audio-plate button.audio-btn:hover{background:#e0c47e;transform:translateY(-1px)}

/* footer fan */
.foot{
  text-align:center;padding:clamp(40px,7vh,90px) 20px clamp(50px,8vh,100px);
  display:flex;flex-direction:column;align-items:center;gap:18px;
  border-top:1px solid var(--gold-soft);max-width:1180px;margin:0 auto;
}
.foot .ff{width:clamp(80px,9vw,120px);opacity:.9}
.foot .fline{font-family:"Cinzel",serif;letter-spacing:.45em;font-size:clamp(10px,1.1vw,13px);color:var(--gold);text-transform:uppercase;padding-left:.45em}
.foot .fsub{font-family:"Cormorant Garamond",serif;font-style:italic;font-size:15px;color:var(--ivory);opacity:.7}

/* =========================================================================
   RESPONSIVE  -  keep the symmetry. Scale the motif, stack, never crop.
   ========================================================================= */
@media (max-width:980px){
  .grand-grid .g-wide,.grand-grid .g-tall,.grand-grid .g-half,.grand-grid .g-third{grid-column:span 12}
}
@media (max-width:640px){
  .exhibit-row{grid-template-columns:1fr;max-width:420px;gap:14px}
  /* on phone the centre cell stays centred, two siblings stack below it -> symmetry preserved vertically */
  .exhibit-row .zig-cell:nth-child(1){order:2}
  .exhibit-row .zig-cell:nth-child(2){order:1}
  .exhibit-row .zig-cell:nth-child(3){order:3}
  .sunburst{width:clamp(190px,58vw,260px)}
  .title{font-size:clamp(38px,13vw,64px)}
  .hero{gap:18px}
  .topband .rule{max-width:80px}
  .zig-cell .media-box{aspect-ratio:16/9}
  .plate.ratio-tall .media-box{aspect-ratio:16/10}
}
@media (max-width:380px){
  .maker{letter-spacing:.28em;font-size:9px}
  .sunburst{width:clamp(170px,60vw,210px)}
}

/* =========================================================================
   REDUCED MOTION  -  freeze every animation, show final state.
   ========================================================================= */
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
  .ray-spin{transform:none!important}
  html{scroll-behavior:auto}
}
</style>
</head>

<footer class="foot">
  <div class="ff" aria-hidden="true">
    <svg viewBox="0 0 120 70" width="100%">
      <g fill="none" stroke="#c8a45c" stroke-width="1.4">
        <line x1="60" y1="66" x2="60" y2="6"/>
        <line x1="60" y1="66" x2="40" y2="10"/><line x1="60" y1="66" x2="80" y2="10"/>
        <line x1="60" y1="66" x2="22" y2="22"/><line x1="60" y1="66" x2="98" y2="22"/>
        <line x1="60" y1="66" x2="8"  y2="40"/><line x1="60" y1="66" x2="112" y2="40"/>
      </g>
      <path d="M8 40 Q60 70 112 40" fill="none" stroke="#9c8047" stroke-width="1.2"/>
      <circle cx="60" cy="66" r="4" fill="#c8a45c"/>
    </svg>
  </div>
  <span class="fline" id="footLine">Fin . Atelier Vespertine . Anno MMXXVI</span>
  <span class="fsub">Built with native CSS, SVG and JS . No external libraries</span>
</footer>

<script>
/* =========================================================================
   RENDER from DATA + single-play media discipline.
   ========================================================================= */
(function(){
  // No rAF loops or inline JS transforms exist in this template: every
  // animation is pure CSS (ray spin, scroll cue) and is frozen by the
  // @media (prefers-reduced-motion:reduce) block, so honoring reduced
  // motion is fully declarative. Nothing to gate in JS.

  // ---- inject text ----
  const set=(id,txt)=>{const el=document.getElementById(id); if(el) el.textContent=txt;};
  set('brandMark',DATA.brand);
  set('eyebrowTxt',DATA.eyebrow);
  set('titleA',DATA.titleA);
  set('titleB',DATA.titleB);
  set('subTxt',DATA.sub);
  set('scrollCueTxt',DATA.scrollCue);
  set('galKicker',DATA.galleryKicker);
  set('galTitle',DATA.galleryTitle);
  set('footLine',DATA.footer);

  // ---- registry of all video elements for single-play discipline ----
  const allVideos = [];

  // play chip svg
  const playSVG = '<svg viewBox="0 0 20 20" aria-hidden="true"><polygon points="6,4 16,10 6,16" fill="#c8a45c"/></svg>';

  // build a media cell (shared by exhibit + gallery). returns DOM node.
  function buildMedia(item, opts){
    const wrapClass = opts.wrapClass;
    const ratioClass = opts.ratioClass || '';
    const containCls = item.contain ? ' contain' : '';
    const node = document.createElement(opts.tag || 'div');
    node.className = wrapClass + containCls + ' ' + ratioClass;
    node.setAttribute('tabindex','0');
    node.setAttribute('role','group');
    node.setAttribute('aria-label', (item.name||'plate') + (item.type==='video'?' (video, activate to play)':''));

    let mediaHTML = '';
    if(item.type==='image'){
      mediaHTML = '<div class="media-box"><img src="'+item.src+'" alt="'+(item.name||'')+'" loading="lazy" decoding="async"></div>';
    } else {
      // video: poster shown, real video lazy, plays only when focused/hovered/locked
      mediaHTML =
        '<div class="media-box">'+
          '<img class="poster-img" src="'+(item.poster||'')+'" alt="'+(item.name||'')+' poster" loading="lazy" decoding="async">'+
          '<video muted loop playsinline preload="none" poster="'+(item.poster||'')+'">'+
            '<source data-src="'+item.src+'" type="video/mp4">'+
          '</video>'+
          '<span class="play-chip">'+playSVG+'</span>'+
        '</div>';
    }
    node.innerHTML = '<span class="inner-rule" aria-hidden="true"></span>' + mediaHTML + (opts.captionHTML ? opts.captionHTML(item) : '');
    return node;
  }

  // lazily attach a video source then play it; pause/reset all others
  function focusVideo(targetVideo){
    allVideos.forEach(v=>{
      if(v!==targetVideo){
        v.pause();
        v.closest('.zig-cell, .plate')?.classList.remove('playing','locked');
      }
    });
    if(!targetVideo) return;
    const src = targetVideo.querySelector('source');
    if(src && !src.src){ src.src = src.dataset.src; targetVideo.load(); }
    const cont = targetVideo.closest('.zig-cell, .plate');
    cont?.classList.add('playing');
    targetVideo.play().catch(()=>{});
  }
  function blurVideo(v){
    const cont = v.closest('.zig-cell, .plate');
    if(cont && cont.classList.contains('locked')) return; // locked stays playing
    v.pause();
    cont?.classList.remove('playing');
  }

  // wire interactions on a built node containing a video
  function wireVideo(node){
    const v = node.querySelector('video');
    if(!v) return;
    allVideos.push(v);
    // hover (pointer) -> focus play
    node.addEventListener('pointerenter',()=>{ if(!matchMedia('(hover:none)').matches) focusVideo(v); });
    node.addEventListener('pointerleave',()=> blurVideo(v));
    // keyboard / touch -> toggle lock
    const toggle = ()=>{
      const cont = v.closest('.zig-cell, .plate');
      const isLocked = cont.classList.contains('locked');
      // clear other locks
      allVideos.forEach(o=>o.closest('.zig-cell, .plate')?.classList.remove('locked'));
      if(isLocked){ cont.classList.remove('locked'); blurVideo(v); }
      else { cont.classList.add('locked'); focusVideo(v); }
    };
    node.addEventListener('click', toggle);
    node.addEventListener('keydown',e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggle(); }});
  }

  // ---- EXHIBIT ROW ----
  const exRow = document.getElementById('exhibitRow');
  DATA.exhibit.forEach(item=>{
    const node = buildMedia(item,{
      wrapClass:'zig-cell',
      captionHTML:(it)=> '<div class="cell-cap"><span class="name">'+it.name+'</span><span class="tag">'+it.tag+'</span></div>'
    });
    exRow.appendChild(node);
    wireVideo(node);
  });

  // ---- GRAND GALLERY ----
  const grid = document.getElementById('grandGrid');
  const spanMap = {wide:'g-wide',half:'g-half',third:'g-third',tall:'g-tall'};
  const ratioMap = {wide:'ratio-wide',sq:'ratio-sq',tall:'ratio-tall'};
  DATA.gallery.forEach(item=>{
    const node = buildMedia(item,{
      wrapClass:'plate '+(spanMap[item.span]||'g-half'),
      ratioClass:ratioMap[item.ratio]||'ratio-wide',
      captionHTML:(it)=> '<div class="cap"><span class="name">'+it.name+'</span><span class="meta">'+it.meta+'</span></div>'
    });
    grid.appendChild(node);
    wireVideo(node);
  });

  // ---- AUDIO SALON (single-play) ----
  const audioGrid = document.getElementById('audioGrid');
  const audioEls = [];
  DATA.audio.forEach(a=>{
    const col = document.createElement('div');
    col.className = 'g-half';
    col.innerHTML =
      '<div class="audio-plate">'+
        '<span class="inner-rule" aria-hidden="true"></span>'+
        '<div class="wave"><img src="'+a.wave+'" alt="'+a.name+' waveform" loading="lazy"></div>'+
        '<div class="arow"><span class="aname">'+a.name+'</span>'+
        '<button class="audio-btn" type="button" aria-label="Play '+a.name+'">Play</button></div>'+
        '<audio preload="none"><source data-src="'+a.src+'"></audio>'+
      '</div>';
    audioGrid.appendChild(col);
    const audio = col.querySelector('audio');
    const btn = col.querySelector('.audio-btn');
    audioEls.push(audio);
    btn.addEventListener('click',()=>{
      const src = audio.querySelector('source');
      if(src && !src.src){ src.src = src.dataset.src; audio.load(); }
      if(audio.paused){
        // stop other audio + all video (shared stage discipline)
        audioEls.forEach(o=>{ if(o!==audio){o.pause(); o.currentTime=0;} });
        audioEls.forEach((o,i)=>{ if(o!==audio){ audioGrid.querySelectorAll('.audio-btn')[i].textContent='Play'; }});
        allVideos.forEach(v=>{ v.pause(); v.closest('.zig-cell, .plate')?.classList.remove('playing','locked'); });
        audio.play().catch(()=>{});
        btn.textContent='Pause';
      } else { audio.pause(); btn.textContent='Play'; }
    });
    audio.addEventListener('ended',()=>{ btn.textContent='Play'; });
  });

  // ---- IntersectionObserver: pause any locked/playing video when scrolled away ----
  if('IntersectionObserver' in window){
    const io = new IntersectionObserver(entries=>{
      entries.forEach(en=>{
        const v = en.target.querySelector('video');
        if(!v) return;
        if(!en.isIntersecting){
          en.target.classList.remove('locked');
          v.pause();
          en.target.classList.remove('playing');
        }
      });
    },{threshold:0.25});
    document.querySelectorAll('.zig-cell, .plate').forEach(n=>{ if(n.querySelector('video')) io.observe(n); });
  }

})();
</script>
</body>
