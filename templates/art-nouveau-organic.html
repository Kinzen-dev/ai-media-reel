<style>
/* ===================================================================
   PALETTE  (parchment / sage / peacock / gold / ink)
=================================================================== */
:root{
  --parchment:#f3ecdd;
  --parchment-2:#ece2cc;
  --sage:#6b7d4f;
  --sage-deep:#4f5e3a;
  --peacock:#1f6f6a;
  --peacock-deep:#13524d;
  --gold:#b08d3c;
  --gold-soft:#c9a85a;
  --ink:#2a2419;
  --ink-soft:#52483296;
  --line:#b08d3c40;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:
    radial-gradient(120% 90% at 50% 0%, #f7f1e3 0%, var(--parchment) 42%, var(--parchment-2) 100%);
  color:var(--ink);
  font-family:"EB Garamond","Cormorant Garamond",Georgia,serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* subtle aged-paper grain */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(80,60,30,.05) 1px, transparent 1px);
  background-size:3px 3px;opacity:.6;mix-blend-mode:multiply;
}

/* ===================================================================
   STAGE  /  ARCH FRAME
=================================================================== */
.stage{
  position:relative;z-index:1;
  min-height:100vh;
  width:100%;
  display:flex;flex-direction:column;align-items:center;
  padding:clamp(10px,1.6vw,20px) clamp(10px,4vw,56px) 40px;
}

/* the two living margins + medallion are drawn here */
.frame{
  position:relative;
  width:100%;
  max-width:1180px;
  margin:0 auto;
  flex:1;
  display:flex;flex-direction:column;
}

/* vertical vine columns flanking the content */
.vine{
  position:absolute;top:0;bottom:0;width:clamp(46px,8vw,116px);
  z-index:3;pointer-events:none;
}
.vine svg{width:100%;height:100%;display:block}
.vine.left{left:calc(-1 * clamp(10px,3.4vw,64px))}
.vine.right{right:calc(-1 * clamp(10px,3.4vw,64px));transform:scaleX(-1)}

/* the central botanical medallion where the two vines "meet" at the top */
.medallion{
  position:relative;z-index:4;
  width:clamp(104px,13vw,150px);
  margin:2px auto -10px;
  filter:drop-shadow(0 6px 14px rgba(40,30,12,.18));
}
.medallion svg{width:100%;height:auto;display:block}

/* a thin gold rule connecting medallion to vines (the "meeting") */
.crossbar{
  position:relative;z-index:2;
  width:min(100%,1180px);
  height:30px;margin-top:-14px;
  pointer-events:none;
}
.crossbar svg{width:100%;height:100%;display:block}

/* ===================================================================
   HEADLINE  CARTOUCHE
=================================================================== */
.titleband{
  position:relative;z-index:5;
  text-align:center;
  padding:2px clamp(40px,9vw,120px) 4px;
  margin-top:0;
}
.eyebrow{
  font-family:"Marcellus",serif;
  letter-spacing:.42em;
  text-transform:uppercase;
  font-size:clamp(10px,1.1vw,13px);
  color:var(--peacock);
  margin:0 0 .5em;
}
.eyebrow b{color:var(--gold);font-weight:400}
.headline{
  font-family:"Cormorant Garamond",serif;
  font-weight:600;
  font-style:normal;
  line-height:.9;
  letter-spacing:.005em;
  font-size:clamp(42px,6.6vw,90px);
  margin:0;
  color:var(--ink);
  /* tall + narrow feel via condensed scale */
  transform:scaleY(1.16);
  transform-origin:center top;
}
.headline .accent{
  color:var(--peacock);
  font-style:italic;
}
.subhead{
  font-family:"EB Garamond",serif;
  font-style:italic;
  font-size:clamp(14px,1.55vw,18px);
  color:var(--ink-soft);
  margin:.85em auto 0;
  max-width:42ch;
  line-height:1.45;
}
.cta{
  display:inline-flex;align-items:center;gap:.6em;
  margin-top:1em;
  font-family:"Marcellus",serif;
  letter-spacing:.22em;text-transform:uppercase;
  font-size:12px;color:var(--ink);
  text-decoration:none;
  padding:.6em 1.4em;
  border:1px solid var(--gold);
  border-radius:999px;
  background:linear-gradient(#f8f2e4,#efe6d0);
  box-shadow:0 1px 0 #fff inset,0 4px 12px rgba(120,90,40,.12);
  transition:background .35s,color .35s,box-shadow .35s;
}
.cta svg{width:14px;height:14px}
.cta:hover,.cta:focus-visible{
  background:linear-gradient(var(--peacock),var(--peacock-deep));
  color:#f4eedd;box-shadow:0 6px 18px rgba(20,80,75,.32);
}
.cta:hover svg [stroke]{stroke:#f4eedd}

/* ===================================================================
   ARCHED  CARTOUCHE  GRID  (real assets, framed)
=================================================================== */
.gallery{
  position:relative;z-index:5;
  width:100%;
  margin-top:clamp(8px,1.4vw,16px);
  padding:0 clamp(6px,2vw,28px) 8px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:clamp(12px,1.8vw,24px);
  align-items:end;
}
.cart{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
}
/* center cartouche is taller (the Mucha "panneau" focal) */
.cart.feature{transform:translateY(-14px)}

.arch{
  position:relative;
  width:100%;
  /* arched cartouche: rounded ogee top, square base */
  aspect-ratio:3/4;
  border-radius:48% 48% 12px 12px / 32% 32% 12px 12px;
  overflow:hidden;                 /* contain the asset inside the arch */
  background:#1c1a14;
  border:2px solid var(--gold);
  box-shadow:
    0 0 0 5px var(--parchment),
    0 0 0 6px var(--line),
    0 16px 34px rgba(40,30,12,.26);
  isolation:isolate;
}
.cart.feature .arch{aspect-ratio:3/4.4}
.arch img,.arch video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
/* gentle gold vignette + duotone-ish warm wash to unify assets under the palette */
.arch::after{
  content:"";position:absolute;inset:0;z-index:2;pointer-events:none;
  background:
    radial-gradient(120% 80% at 50% 8%, transparent 52%, rgba(31,111,106,.28) 100%),
    linear-gradient(180deg, rgba(176,141,60,.10), rgba(20,30,18,.30));
  mix-blend-mode:multiply;
}
/* the inner arched gold keyline */
.arch::before{
  content:"";position:absolute;inset:7px;z-index:3;pointer-events:none;
  border:1px solid rgba(201,168,90,.55);
  border-radius:46% 46% 8px 8px / 30% 30% 8px 8px;
}
/* play/poster control overlay for video cartouches */
.archvid .play{
  position:absolute;z-index:4;left:50%;top:50%;transform:translate(-50%,-50%);
  width:54px;height:54px;border-radius:50%;
  border:1px solid var(--gold-soft);
  background:rgba(31,111,106,.62);
  backdrop-filter:blur(2px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:opacity .3s,transform .3s,background .3s;
}
.archvid .play svg{width:18px;height:18px;margin-left:2px}
.archvid.playing .play{opacity:0;pointer-events:none}
.archvid .play:hover{background:rgba(20,82,77,.86);transform:translate(-50%,-50%) scale(1.06)}

.cart .label{
  font-family:"Marcellus",serif;
  letter-spacing:.2em;text-transform:uppercase;
  font-size:clamp(10px,1.05vw,12.5px);
  color:var(--peacock-deep);
  margin:.95em 0 .15em;
}
.cart .meta{
  font-style:italic;color:var(--ink-soft);
  font-size:clamp(12px,1.3vw,15px);
  margin:0;line-height:1.35;
}
.cart .dot{color:var(--gold);font-style:normal}

/* footer flourish */
.flourish{
  width:min(360px,70%);margin:clamp(18px,4vw,40px) auto 6px;
  opacity:.8;
}
.flourish svg{width:100%;height:auto;display:block}
.colophon{
  text-align:center;font-style:italic;color:var(--ink-soft);
  font-size:13px;letter-spacing:.04em;margin:0 0 6px;
}

/* focus visibility */
a:focus-visible,.play:focus-visible{
  outline:2px solid var(--peacock);outline-offset:3px;border-radius:6px;
}

/* ===================================================================
   ENTRANCE  MOTION  (vines "grow")  -  reduced-motion safe
=================================================================== */
.grow{
  stroke-dasharray:var(--len);
  stroke-dashoffset:var(--len);
  animation:grow 1.7s cubic-bezier(.22,.61,.36,1) forwards;
}
.grow.d1{animation-delay:.05s}
.grow.d2{animation-delay:.25s}
.grow.d3{animation-delay:.45s}
@keyframes grow{to{stroke-dashoffset:0}}

.bloom{opacity:0;transform-box:fill-box;transform-origin:center;transform:scale(.4) rotate(-12deg);animation:bloom .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes bloom{to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes rise{to{opacity:1;transform:none}}
.bloom.b1{animation-delay:.9s}
.bloom.b2{animation-delay:1.05s}
.bloom.b3{animation-delay:1.2s}
.bloom.b4{animation-delay:1.35s}

.rise{opacity:0;transform:translateY(18px);animation:rise .8s ease forwards}
.rise.r1{animation-delay:.35s}
.rise.r2{animation-delay:.55s}
.rise.r3{animation-delay:.8s}
/* headline keeps its scaleY through the fade (no translate wipe) */
.headline.rise{transform:scaleY(1.16);animation:headfade .8s ease forwards}
@keyframes headfade{from{opacity:0}to{opacity:1}}
.gallery .cart{opacity:0;transform:translateY(22px);animation:rise .8s ease forwards}
.gallery .cart:nth-child(1){animation-delay:.95s}
.gallery .cart:nth-child(2){animation-delay:1.1s}
.gallery .cart:nth-child(3){animation-delay:1.25s}

@media (prefers-reduced-motion:reduce){
  .grow{stroke-dasharray:none;stroke-dashoffset:0;animation:none}
  .bloom,.rise,.gallery .cart{opacity:1;transform:none;animation:none}
  .headline.rise{opacity:1;transform:scaleY(1.16);animation:none}
}

/* ===================================================================
   RESPONSIVE  -  keep the border ornament, never crop the asset
=================================================================== */
@media (max-width:900px){
  .gallery{grid-template-columns:repeat(3,1fr);gap:14px}
  .cart.feature{transform:none}
  .cart.feature .arch{aspect-ratio:3/4}
  .cart .label{letter-spacing:.14em}
}
@media (max-width:640px){
  .stage{padding:10px 8px 32px}
  /* vines scale down + hug the edges, ornament preserved (no crop) */
  .vine{width:34px}
  .vine.left{left:-6px}
  .vine.right{right:-6px}
  .titleband{padding:6px 14px 2px}
  .headline{font-size:clamp(40px,13vw,72px)}
  .subhead{font-size:16px}
  /* gallery stacks; assets letterbox/contain, never cover-crop a phone viewport */
  .gallery{grid-template-columns:1fr;gap:18px;max-width:340px;margin-left:auto;margin-right:auto}
  .arch,.cart.feature .arch{aspect-ratio:4/3}   /* roomy frame so contain letterboxes cleanly */
  /* contain (not cover) on phones: full asset shown inside the dark gold-keyline arch,
     letterboxed - square + landscape assets alike are never cropped on a phone viewport */
  .arch img,.arch video{object-fit:contain;background:#1c1a14}
  .medallion{width:128px}
}
@media (max-width:380px){
  .vine{width:26px}
  .headline{font-size:clamp(34px,12vw,58px)}
}
</style>

          <path class="grow d3" style="--len:120" d="M58 710 C82 720 94 704 98 690 C100 680 92 676 88 684 C86 690 94 694 98 690"/>
        </g>
      </svg>
    </div>

    <!-- ============ HEADLINE ========================================== -->
    <header class="titleband">
      <p class="eyebrow rise r1" id="eyebrow"></p>
      <h1 class="headline rise r2">
        <span id="t-a"></span> <span class="accent" id="t-acc"></span><br/>
        <span id="t-b"></span>
      </h1>
      <p class="subhead rise r3" id="subhead"></p>
      <a class="cta rise r3" href="#gallery" id="cta">
        <span id="cta-label"></span>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="#2a2419" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </header>

    <!-- ============ ARCHED CARTOUCHE GALLERY (real assets) ============ -->
    <section class="gallery" id="gallery" aria-label="Featured panels"></section>

    <!-- ============ FOOTER FLOURISH ================================== -->
    <div class="flourish" aria-hidden="true">
      <svg viewBox="0 0 360 40" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 20 C70 0 110 40 180 20 C250 0 290 40 350 20"
              fill="none" stroke="#b08d3c" stroke-width="1.4"/>
        <path d="M150 20 C160 8 172 8 180 20 C188 8 200 8 210 20 C200 32 188 32 180 20 C172 32 160 32 150 20Z"
              fill="#1f6f6a" stroke="#b08d3c" stroke-width="1"/>
        <circle cx="180" cy="20" r="4" fill="#c9a85a"/>
        <circle cx="10" cy="20" r="3.4" fill="#6b7d4f"/>
        <circle cx="350" cy="20" r="3.4" fill="#6b7d4f"/>
      </svg>

    <p class="colophon" id="colophon"></p>

  </div>
</main>

<script>
/* ===================================================================
   HYDRATE  from  TEMPLATE  DATA
=================================================================== */
(function(){
  const T = TEMPLATE;
  document.getElementById("eyebrow").innerHTML   = T.eyebrow;
  document.getElementById("t-a").textContent     = T.titleA;
  document.getElementById("t-acc").textContent   = T.titleAccent;
  document.getElementById("t-b").textContent     = T.titleB;
  document.getElementById("subhead").textContent = T.subhead;
  document.getElementById("cta-label").textContent = T.ctaLabel;
  document.getElementById("colophon").textContent  = T.colophon;
  document.title = T.titleA + " " + T.titleAccent + " " + T.titleB + " - Art Nouveau Organic";

  const PLAY_SVG = '<svg viewBox="0 0 24 24" fill="#f4eedd" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>';
  const gal = document.getElementById("gallery");

  T.cells.forEach((c,i) => {
    const cart = document.createElement("article");
    cart.className = "cart" + (c.feature ? " feature" : "");

    let media;
    if (c.type === "video") {
      cart.classList.add = cart.classList.add; // noop guard
      media =
        '<div class="arch archvid" data-vid="1">' +
          '<video src="'+c.src+'" poster="'+(c.poster||"")+'" muted loop playsinline preload="none"></video>' +
          '<button class="play" aria-label="Play '+c.label+'">'+PLAY_SVG+'</button>' +
        '</div>';
    } else {
      media =
        '<div class="arch">' +
          '<img src="'+c.src+'" alt="'+c.label+'" loading="lazy" decoding="async"/>' +
        '</div>';
    }

    cart.innerHTML =
      media +
      '<p class="label">'+c.label+'</p>' +
      '<p class="meta">'+c.meta.replace(/&middot;/g,'<span class="dot">&middot;</span>')+'</p>';
    gal.appendChild(cart);
  });

  /* ----------- VIDEO: poster by default, play only the focused one -----
     Avoids simultaneous decode of multiple clips (FPS guard). Honors
     reduced-motion (no autoplay attempt; user click still allowed).      */
  const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  const vids = Array.from(document.querySelectorAll(".archvid"));

  function pauseAll(except){
    vids.forEach(w=>{
      if(w===except) return;
      const v=w.querySelector("video");
      v.pause();
      w.classList.remove("playing");
    });
  }
  function playOne(w){
    pauseAll(w);
    const v=w.querySelector("video");
    const p=v.play();
    if(p&&p.catch){p.then(()=>w.classList.add("playing")).catch(()=>{});}
    else w.classList.add("playing");
  }

  vids.forEach(w=>{
    const v=w.querySelector("video");
    const btn=w.querySelector(".play");
    btn.addEventListener("click",()=>{
      if(v.paused) playOne(w); else { v.pause(); w.classList.remove("playing"); }
    });
    // pointer-driven focus: hover to play, leave to pause (desktop only)
    w.addEventListener("mouseenter",()=>{ if(!reduce && window.innerWidth>900) playOne(w); });
    w.addEventListener("mouseleave",()=>{ v.pause(); w.classList.remove("playing"); });
  });

  /* pause everything when scrolled out of view (perf) */
  if("IntersectionObserver" in window){
    const io=new IntersectionObserver((es)=>{
      es.forEach(e=>{
        if(!e.isIntersecting){
          const v=e.target.querySelector("video");
          if(v){v.pause();e.target.classList.remove("playing");}
        }
      });
    },{threshold:0.15});
    vids.forEach(w=>io.observe(w));
  }
})();
</script>
</body>
</html>
