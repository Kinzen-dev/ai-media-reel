<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yimwhan - Bauhaus Owner Overview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Archivo+Black&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   YIMWHAN BAUHAUS OWNER OVERVIEW
   Functional geometric modernism. Primary colors (red / blue /
   yellow) + black on off-white. Bold geometric SHAPES (circle,
   triangle, square, bars) as STRUCTURE and accents. A strict,
   visible grid. Geometric sans (Archivo / Archivo Black).
   Asymmetric balance. Distinct from Swiss (no hairline type-led
   minimalism, no single red) - here the primary shapes carry it.
   All SVG fills are inline hex, never var().
   ============================================================ */

/* ---- DATA (edit to reswap the whole dashboard) ---------------- */
/* exposed on window for the small render script below */

:root{
  --paper:#f3f0e8;   /* off-white */
  --ink:#141414;     /* black */
  --red:#e3261f;
  --blue:#1356a8;
  --yellow:#f4c430;
  --line:#141414;
  --hair:rgba(20,20,20,.16);
  --paper2:#ece8dc;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{ -webkit-text-size-adjust:100%; }
body{
  background:var(--paper);
  color:var(--ink);
  font-family:"Archivo",system-ui,-apple-system,"Segoe UI",sans-serif;
  font-weight:500;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
  /* faint structural grid drawn under everything */
  background-image:
    linear-gradient(var(--hair) 1px, transparent 1px),
    linear-gradient(90deg, var(--hair) 1px, transparent 1px);
  background-size:48px 48px;
  background-position:0 0;
}
.black{font-family:"Archivo Black","Archivo",sans-serif;font-weight:900}
.tabnum{font-variant-numeric:tabular-nums lining-nums}

/* ---- shell ---------------------------------------------------- */
.frame{
  max-width:1380px;
  margin:0 auto;
  padding:20px clamp(14px,3vw,34px) 64px;
  min-width:0;
}

/* ---- top band (compact, keeps signature above the fold) ------- */
.topband{
  display:flex; align-items:stretch; gap:0;
  border:4px solid var(--ink);
  background:var(--paper);
  min-width:0;
}
.brand{
  display:flex; align-items:center; gap:14px;
  padding:14px 20px; min-width:0; flex:1 1 auto;
  border-right:4px solid var(--ink);
}
.logomark{ flex:0 0 auto; display:block }
.brandtext{min-width:0}
.brandtext h1{
  margin:0; font-size:clamp(18px,2.4vw,27px); line-height:.95;
  letter-spacing:-.02em; text-transform:uppercase;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.brandtext p{
  margin:3px 0 0; font-size:12px; font-weight:600;
  text-transform:uppercase; letter-spacing:.14em; color:#4a463c;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.bandmeta{
  display:flex; align-items:stretch; flex:0 0 auto;
}
.metacell{
  display:flex; flex-direction:column; justify-content:center;
  padding:10px 18px; border-right:4px solid var(--ink); min-width:0;
}
.metacell:last-child{border-right:none}
.metacell .k{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#4a463c;white-space:nowrap}
.metacell .v{font-size:17px;font-weight:800;line-height:1.05;white-space:nowrap}
.metacell.live .v{display:flex;align-items:center;gap:8px}
.livedot{
  width:11px;height:11px;border-radius:50%;background:var(--red);
  border:2px solid var(--ink);box-shadow:0 0 0 0 rgba(227,38,31,.5);
  animation:pulse 1.8s ease-out infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(227,38,31,.45)}
  70%{box-shadow:0 0 0 8px rgba(227,38,31,0)}
  100%{box-shadow:0 0 0 0 rgba(227,38,31,0)}
}

/* ---- KPI stat blocks (the signature, bold + shape accents) ---- */
.kpis{
  display:grid; grid-template-columns:repeat(4,1fr); gap:14px;
  margin-top:14px; min-width:0;
}
.kpi{
  position:relative; border:4px solid var(--ink);
  background:var(--paper); padding:16px 16px 14px;
  min-width:0; overflow:hidden;
  display:flex; flex-direction:column; gap:8px;
}
.kpi .label{
  font-size:11px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:#4a463c;
  display:flex;align-items:center;gap:9px; min-width:0;
}
.kpi .label span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.kpi .shape{flex:0 0 auto;display:block}
.kpi .num{
  font-size:clamp(34px,4.4vw,52px); line-height:.86;
  letter-spacing:-.03em; font-family:"Archivo Black","Archivo",sans-serif;
  word-break:break-word;
}
.kpi .num .unit{font-size:.42em;font-weight:800;letter-spacing:0;margin-left:4px;color:#4a463c}
.kpi .delta{
  display:inline-flex;align-items:center;gap:6px;
  font-size:13px;font-weight:800;letter-spacing:.01em;
  padding:3px 8px 2px; border:3px solid var(--ink); width:max-content;
  max-width:100%;
}
.kpi .delta.up{background:var(--yellow)}
.kpi .delta.down{background:var(--paper)}
.kpi .delta .tri{flex:0 0 auto}
.kpi .delta small{font-weight:700;color:#4a463c;letter-spacing:.04em}
/* a corner geometric block, asymmetric */
.kpi .corner{position:absolute;right:-1px;bottom:-1px;display:block}

/* ---- main 2-col asymmetric grid ------------------------------- */
.grid2{
  display:grid;
  grid-template-columns:minmax(0,1.62fr) minmax(0,1fr);
  gap:14px; margin-top:14px; align-items:start; min-width:0;
}
.panel{
  border:4px solid var(--ink); background:var(--paper);
  min-width:0; overflow:hidden;
}
.panel .head{
  display:flex; align-items:center; justify-content:space-between;
  gap:12px; padding:12px 16px; border-bottom:4px solid var(--ink);
  background:var(--paper2); min-width:0;
}
.panel .head h2{
  margin:0; font-size:14px; font-weight:800; letter-spacing:.04em;
  text-transform:uppercase; display:flex;align-items:center;gap:10px;
  min-width:0;
}
.panel .head h2 span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.panel .head .sub{
  font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:#4a463c;white-space:nowrap;flex:0 0 auto;
}
.panel .body{padding:16px}

/* ---- trend chart (primary bars + black line) ------------------ */
.chartwrap{position:relative; width:100%; min-width:0}
.chartwrap svg{display:block;width:100%;height:auto}
.legend{
  display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:14px;
  padding-top:14px;border-top:3px solid var(--ink);
}
.legchip{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:.02em}
.legchip i{width:15px;height:15px;display:inline-block;border:2px solid var(--ink);flex:0 0 auto}
.legchip i.line{height:0;border-top:3px solid var(--ink);border-left:0;border-right:0;border-bottom:0;width:18px}

/* ---- donut (voice vs line) ------------------------------------ */
.splitrow{display:flex;align-items:center;gap:18px;flex-wrap:wrap;min-width:0}
.donutbox{flex:0 0 auto}
.splitlegend{flex:1 1 150px;min-width:0;display:flex;flex-direction:column;gap:10px}
.splititem{
  display:flex;align-items:center;gap:11px;
  border:3px solid var(--ink);padding:9px 11px;min-width:0;background:var(--paper);
}
.splititem .sw{width:18px;height:18px;flex:0 0 auto;border:2px solid var(--ink)}
.splititem .sw.tri{border:none;width:0;height:0;background:none}
.splititem .txt{min-width:0;flex:1 1 auto}
.splititem .txt .ch{font-size:13px;font-weight:800;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.splititem .txt .vol{font-size:11px;font-weight:600;color:#4a463c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.splititem .pct{font-size:21px;font-weight:900;font-family:"Archivo Black","Archivo",sans-serif;flex:0 0 auto;letter-spacing:-.02em}

/* ---- handoff list (needs a look) ------------------------------ */
.handoff .head h2 .badge{
  font-family:"Archivo Black","Archivo",sans-serif;
  background:var(--red);color:var(--paper);border:3px solid var(--ink);
  padding:1px 9px 0;font-size:13px;line-height:1.5;flex:0 0 auto;
}
.hlist{display:flex;flex-direction:column}
.hitem{
  display:flex;align-items:stretch;gap:0;
  border-bottom:3px solid var(--ink);min-width:0;
}
.hitem:last-child{border-bottom:none}
.hflag{
  flex:0 0 auto;width:10px;align-self:stretch;border-right:3px solid var(--ink);
}
.hflag.red{background:var(--red)}
.hflag.blue{background:var(--blue)}
.hflag.yellow{background:var(--yellow)}
.hmain{flex:1 1 auto;min-width:0;padding:12px 14px;display:flex;flex-direction:column;gap:5px}
.hmain .toprow{display:flex;align-items:baseline;gap:10px;justify-content:space-between;min-width:0}
.hmain .who{font-size:15px;font-weight:800;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.hmain .when{font-size:11px;font-weight:700;letter-spacing:.05em;color:#4a463c;flex:0 0 auto;white-space:nowrap}
.hmain .reason{font-size:13px;font-weight:500;line-height:1.35;color:#23211c;overflow-wrap:anywhere}
.hmeta{display:flex;flex-wrap:wrap;gap:6px;margin-top:2px}
.htag{
  font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  border:2px solid var(--ink);padding:2px 7px 1px;background:var(--paper);white-space:nowrap;
}
.htag.ch-voice{background:var(--blue);color:var(--paper);border-color:var(--ink)}
.htag.ch-line{background:var(--yellow)}
.hgo{
  flex:0 0 auto;align-self:stretch;width:52px;border-left:3px solid var(--ink);
  background:var(--paper2);display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
.hgo:hover{background:var(--yellow)}
.hgo:focus-visible{outline:none;background:var(--blue)}
.hgo:focus-visible svg path,.hgo:focus-visible svg polygon{fill:#f3f0e8}

/* ---- footer strip with shapes -------------------------------- */
.footstrip{
  margin-top:14px;border:4px solid var(--ink);background:var(--paper);
  display:flex;align-items:center;gap:0;min-width:0;overflow:hidden;
}
.footstrip .seg{
  display:flex;align-items:center;gap:12px;padding:13px 18px;
  border-right:4px solid var(--ink);min-width:0;flex:1 1 0;
}
.footstrip .seg:last-child{border-right:none}
.footstrip .seg .t{min-width:0}
.footstrip .seg .t .k{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#4a463c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.footstrip .seg .t .v{font-size:16px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

:focus-visible{outline:3px solid var(--blue);outline-offset:2px}

/* ---- responsive ---------------------------------------------- */
@media (max-width:1080px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
}
@media (max-width:640px){
  body{background-size:32px 32px}
  .frame{padding:12px 12px 48px}
  .topband{flex-direction:column}
  /* compact the stacked header so the chart peeks into the first screen */
  .brand{border-right:none;border-bottom:4px solid var(--ink);padding:11px 16px}
  .bandmeta{flex-wrap:wrap}
  .metacell{flex:1 1 50%;border-bottom:4px solid var(--ink);padding:8px 16px}
  .metacell:nth-last-child(-n+2){border-bottom:none}
  .metacell:nth-child(2n){border-right:none}
  .kpis{grid-template-columns:1fr;gap:10px;margin-top:10px}
  .kpi{padding:13px 14px 12px;gap:6px}
  .grid2{margin-top:10px;gap:10px}
  .footstrip{flex-direction:column}
  .footstrip .seg{border-right:none;border-bottom:4px solid var(--ink);width:100%}
  .footstrip .seg:last-child{border-bottom:none}
  .brandtext h1{white-space:normal}
  /* let the handoff heading text wrap instead of overflowing past its cell */
  .panel .head h2 span{white-space:normal;overflow:visible;text-overflow:clip;overflow-wrap:anywhere}
}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
  .livedot{box-shadow:0 0 0 2px rgba(227,38,31,.25)}
}
</style>
</head>
<body>
<main class="frame">

  <!-- TOP BAND ------------------------------------------------- -->
  <header class="topband">
    <div class="brand">
      <!-- logomark: three Bauhaus primitives -->
      <svg class="logomark" width="46" height="46" viewBox="0 0 46 46" aria-hidden="true">
        <rect x="0" y="0" width="46" height="46" fill="#141414"/>
        <circle cx="13" cy="13" r="9" fill="#e3261f"/>
        <rect x="25" y="4" width="17" height="17" fill="#f4c430"/>
        <polygon points="23,44 4,44 13.5,26" fill="#1356a8"/>
        <rect x="25" y="25" width="17" height="17" fill="#f3f0e8"/>
      </svg>
      <div class="brandtext">
        <h1 class="black">YIMWHAN <span style="color:#e3261f">/</span> OVERVIEW</h1>
        <p id="bclinic">CLINIC AI CONTROL ROOM</p>
      </div>
    </div>
    <div class="bandmeta">
      <div class="metacell">
        <span class="k">Range</span>
        <span class="v tabnum" id="brange">7 DAYS</span>
      </div>
      <div class="metacell">
        <span class="k">Updated</span>
        <span class="v tabnum" id="bupdated">12:40</span>
      </div>
      <div class="metacell live">
        <span class="k">Status</span>
        <span class="v"><span class="livedot" aria-hidden="true"></span><span id="bstatus">LIVE</span></span>
      </div>
    </div>
  </header>

  <!-- KPI STAT BLOCKS (signature) ------------------------------ -->
  <section class="kpis" id="kpis" aria-label="Key performance indicators"></section>

  <!-- MAIN GRID ------------------------------------------------ -->
  <section class="grid2">

    <!-- LEFT: trend chart -->
    <div class="panel">
      <div class="head">
        <h2>
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><rect x="1" y="8" width="3.5" height="7" fill="#1356a8" stroke="#141414" stroke-width="1.4"/><rect x="6.2" y="4" width="3.5" height="11" fill="#e3261f" stroke="#141414" stroke-width="1.4"/><rect x="11.4" y="1" width="3.5" height="14" fill="#f4c430" stroke="#141414" stroke-width="1.4"/></svg>
          <span>Calls &amp; Bookings</span>
        </h2>
        <span class="sub" id="chartsub">LAST 7 DAYS</span>
      </div>
      <div class="body">
        <div class="chartwrap" id="chartwrap"></div>
        <div class="legend">
          <span class="legchip"><i style="background:#e3261f"></i>Calls handled</span>
          <span class="legchip"><i style="background:#f4c430"></i>Bookings made</span>
          <span class="legchip"><i class="line"></i>Booking rate</span>
        </div>
      </div>
    </div>

    <!-- RIGHT: voice vs line split (donut) -->
    <div class="panel">
      <div class="head">
        <h2>
          <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="7" fill="none" stroke="#141414" stroke-width="1.6"/><path d="M8 8 L8 1 A7 7 0 0 1 14.6 5.7 Z" fill="#1356a8" stroke="#141414" stroke-width="1.2"/></svg>
          <span>Voice vs LINE</span>
        </h2>
        <span class="sub" id="splitsub">BY VOLUME</span>
      </div>
      <div class="body">
        <div class="splitrow">
          <div class="donutbox" id="donut"></div>
          <div class="splitlegend" id="splitlegend"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- HANDOFF LIST -------------------------------------------- -->
  <section class="panel handoff" style="margin-top:14px" aria-label="Conversations that need a look">
    <div class="head">
      <h2>
        <svg width="17" height="15" viewBox="0 0 17 15" aria-hidden="true"><polygon points="8.5,0.5 16.5,14.5 0.5,14.5" fill="#f4c430" stroke="#141414" stroke-width="1.5"/><rect x="7.3" y="5" width="2.4" height="5" fill="#141414"/><rect x="7.3" y="11" width="2.4" height="2.4" fill="#141414"/></svg>
        <span>Needs a look</span>
        <span class="badge tabnum" id="handoffcount">0</span>
      </h2>
      <span class="sub">UNRESOLVED HANDOFFS</span>
    </div>
    <div class="hlist" id="hlist"></div>
  </section>

  <!-- FOOTER STRIP -------------------------------------------- -->
  <section class="footstrip" id="footstrip" aria-label="Summary totals"></section>

</main>

<script>
/* ============================================================
   DATA  (single source - swap this object to rebrand the board)
   THB currency, Thai labels OK. All numbers are demo figures.
   ============================================================ */
const DATA = {
  meta:{ clinic:"DENTAL SMILE · RAMA 9", range:"7 DAYS", updated:"12:40", status:"LIVE" },

  /* KPI stat blocks. shape = circle | square | triangle. accent = red|blue|yellow */
  kpis:[
    { label:"Calls answered", value:"1,284", unit:"", delta:+12.4, deltaNote:"vs last wk", shape:"circle",   accent:"#e3261f" },
    { label:"Bookings made",  value:"372",   unit:"",  delta:+8.1,  deltaNote:"vs last wk", shape:"square",   accent:"#1356a8" },
    { label:"Booking rate",   value:"29.0",  unit:"%", delta:+2.3,  deltaNote:"vs last wk", shape:"triangle", accent:"#f4c430" },
    { label:"Revenue booked", value:"428",   unit:"K THB", delta:-3.6, deltaNote:"vs last wk", shape:"circle", accent:"#141414" }
  ],

  /* trend: one entry per day. calls + bookings -> bars; rate -> black line */
  trend:[
    { d:"MON", calls:172, bookings:48 },
    { d:"TUE", calls:158, bookings:44 },
    { d:"WED", calls:201, bookings:62 },
    { d:"THU", calls:186, bookings:51 },
    { d:"FRI", calls:224, bookings:71 },
    { d:"SAT", calls:203, bookings:58 },
    { d:"SUN", calls:140, bookings:38 }
  ],

  /* voice vs LINE split (donut). value = share %, vol = caption */
  split:[
    { ch:"Voice",  pct:58, vol:"745 calls",     color:"#1356a8", shape:"square" },
    { ch:"LINE",   pct:34, vol:"437 chats",     color:"#f4c430", shape:"circle" },
    { ch:"Missed", pct:8,  vol:"102 unhandled", color:"#e3261f", shape:"triangle" }
  ],

  /* handoff list (needs a look). flag color = urgency */
  handoff:[
    { who:"คุณนภา วงศ์ดี", when:"6 min", channel:"Voice", flag:"red",
      reason:"ถามราคารากเทียม 4 ซี่ AI ไม่มีราคา ขอให้หมอยืนยัน", tags:["PRICING","ESCALATED"] },
    { who:"K. Theerapong", when:"22 min", channel:"LINE", flag:"yellow",
      reason:"Asked to move an implant review to Saturday; the requested slot is already full", tags:["RESCHEDULE"] },
    { who:"คุณสมชาย ใจดี", when:"41 min", channel:"Voice", flag:"blue",
      reason:"สอบถามสิทธิประกันหลังจัดฟัน AI ส่งต่อให้คน", tags:["WARRANTY"] },
    { who:"New caller (+66 81 224 ...)", when:"58 min", channel:"Voice", flag:"red",
      reason:"Repeat caller, 3rd attempt today; the line dropped before a booking could be confirmed", tags:["DROPPED","REPEAT"] }
  ],

  /* footer totals */
  totals:[
    { k:"Avg handle time", v:"2:14 min", shape:"circle",   color:"#1356a8" },
    { k:"AI resolved",     v:"91.2 %",   shape:"square",   color:"#f4c430" },
    { k:"Sent to human",   v:"8.8 %",    shape:"triangle", color:"#e3261f" },
    { k:"New patients",    v:"148",      shape:"circle",   color:"#141414" }
  ]
};

const INK="#141414", PAPER="#f3f0e8";

/* ----- small SVG shape helpers (inline hex fills) ------------- */
function shapeSVG(kind, fill, size){
  const s = size||24, st = Math.max(2, Math.round(s/12));
  if(kind==="circle")
    return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10" fill="${fill}" stroke="${INK}" stroke-width="2.2"/></svg>`;
  if(kind==="square")
    return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" aria-hidden="true"><rect x="2.4" y="2.4" width="19.2" height="19.2" fill="${fill}" stroke="${INK}" stroke-width="2.2"/></svg>`;
  /* triangle */
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" aria-hidden="true"><polygon points="12,2.2 22,21.5 2,21.5" fill="${fill}" stroke="${INK}" stroke-width="2.2"/></svg>`;
}

/* ----- header meta ------------------------------------------- */
document.getElementById("bclinic").textContent = DATA.meta.clinic;
document.getElementById("brange").textContent  = DATA.meta.range;
document.getElementById("bupdated").textContent= DATA.meta.updated;
document.getElementById("bstatus").textContent = DATA.meta.status;

/* ----- KPI stat blocks --------------------------------------- */
(function renderKpis(){
  const wrap = document.getElementById("kpis");
  const cornerShapes = [
    `<svg class="corner" width="58" height="58" viewBox="0 0 58 58" aria-hidden="true"><path d="M58 0 L58 58 L0 58 Z" fill="#e3261f"/></svg>`,
    `<svg class="corner" width="56" height="56" viewBox="0 0 56 56" aria-hidden="true"><rect x="20" y="20" width="40" height="40" fill="#1356a8"/></svg>`,
    `<svg class="corner" width="62" height="62" viewBox="0 0 62 62" aria-hidden="true"><circle cx="50" cy="50" r="26" fill="#f4c430"/></svg>`,
    `<svg class="corner" width="58" height="58" viewBox="0 0 58 58" aria-hidden="true"><path d="M58 0 L58 58 L0 58 Z" fill="#141414"/></svg>`
  ];
  wrap.innerHTML = DATA.kpis.map((k,i)=>{
    const up = k.delta>=0;
    const tri = up
      ? `<svg class="tri" width="12" height="11" viewBox="0 0 12 11" aria-hidden="true"><polygon points="6,0 12,11 0,11" fill="${INK}"/></svg>`
      : `<svg class="tri" width="12" height="11" viewBox="0 0 12 11" aria-hidden="true"><polygon points="6,11 12,0 0,0" fill="${INK}"/></svg>`;
    const sign = up?"+":"−";
    const dabs = Math.abs(k.delta).toFixed(1);
    const unit = k.unit ? `<span class="unit">${k.unit}</span>` : "";
    return `<article class="kpi">
      ${cornerShapes[i%cornerShapes.length]}
      <div class="label">${shapeSVG(k.shape, k.accent, 22)}<span>${k.label}</span></div>
      <div class="num tabnum">${k.value}${unit}</div>
      <div class="delta ${up?'up':'down'}">${tri}<span class="tabnum">${sign}${dabs}%</span><small>${k.deltaNote}</small></div>
    </article>`;
  }).join("");
})();

/* ----- TREND CHART (primary bars + black booking-rate line) --- */
(function renderChart(){
  const host = document.getElementById("chartwrap");
  const t = DATA.trend;
  const W=720, H=330;
  const padL=44, padR=18, padT=18, padB=46;
  const plotW = W-padL-padR, plotH = H-padT-padB;
  const maxCalls = Math.max(...t.map(d=>d.calls));
  const yMax = Math.ceil(maxCalls/50)*50; // round to 50
  const n=t.length;
  const slot = plotW/n;
  const barGroupW = slot*0.56;
  const barW = barGroupW/2 - 3;

  const yScale = v => padT + plotH - (v/yMax)*plotH;

  // grid + y axis
  let g="";
  const ticks=4;
  for(let i=0;i<=ticks;i++){
    const val = Math.round(yMax*i/ticks);
    const y = yScale(val);
    g += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#141414" stroke-width="${i===0?2:1}" stroke-opacity="${i===0?1:0.18}"/>`;
    g += `<text x="${padL-8}" y="${(y+4).toFixed(1)}" text-anchor="end" font-family="Archivo, sans-serif" font-size="12" font-weight="700" fill="#4a463c">${val}</text>`;
  }

  // bars + x labels
  let bars="", labels="";
  const ratePts=[];
  const rateMax = Math.max(...t.map(d=>d.bookings/d.calls));
  const rateScale = r => padT + plotH - (r/(rateMax*1.18))*plotH;
  t.forEach((d,i)=>{
    const cx = padL + slot*i + slot/2;
    const x0 = cx - barGroupW/2;
    const yCalls = yScale(d.calls);
    const yBook  = yScale(d.bookings);
    bars += `<rect x="${(x0).toFixed(1)}" y="${yCalls.toFixed(1)}" width="${barW.toFixed(1)}" height="${(padT+plotH-yCalls).toFixed(1)}" fill="#e3261f" stroke="#141414" stroke-width="2"/>`;
    bars += `<rect x="${(x0+barW+6).toFixed(1)}" y="${yBook.toFixed(1)}" width="${barW.toFixed(1)}" height="${(padT+plotH-yBook).toFixed(1)}" fill="#f4c430" stroke="#141414" stroke-width="2"/>`;
    labels += `<text x="${cx.toFixed(1)}" y="${H-padB+22}" text-anchor="middle" font-family="Archivo, sans-serif" font-size="12.5" font-weight="800" fill="#141414">${d.d}</text>`;
    ratePts.push([cx, rateScale(d.bookings/d.calls)]);
  });

  // booking-rate black line + nodes (circles = bauhaus)
  let linePath = "M " + ratePts.map(p=>p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" L ");
  let nodes = ratePts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="5" fill="#f3f0e8" stroke="#141414" stroke-width="2.6"/>`).join("");

  host.innerHTML = `<svg viewBox="0 0 ${W} ${H}" role="img" aria-label="Calls handled and bookings made over the last 7 days, with the booking rate line">
    ${g}
    ${bars}
    <path d="${linePath}" fill="none" stroke="#141414" stroke-width="3.4" stroke-linejoin="round" stroke-linecap="round"/>
    ${nodes}
    ${labels}
  </svg>`;
})();

/* ----- DONUT (voice vs line vs missed) ----------------------- */
(function renderDonut(){
  const host = document.getElementById("donut");
  const seg = DATA.split;
  const total = seg.reduce((a,b)=>a+b.pct,0);
  const cx=88, cy=88, r=66, rin=34;
  const TAU=Math.PI*2;
  let a0=-Math.PI/2; // start top
  let paths="";
  seg.forEach(s=>{
    const frac=s.pct/total;
    const a1=a0+frac*TAU;
    const large = (a1-a0)>Math.PI?1:0;
    const xo0=cx+r*Math.cos(a0), yo0=cy+r*Math.sin(a0);
    const xo1=cx+r*Math.cos(a1), yo1=cy+r*Math.sin(a1);
    const xi1=cx+rin*Math.cos(a1), yi1=cy+rin*Math.sin(a1);
    const xi0=cx+rin*Math.cos(a0), yi0=cy+rin*Math.sin(a0);
    paths += `<path d="M ${xo0.toFixed(1)} ${yo0.toFixed(1)} A ${r} ${r} 0 ${large} 1 ${xo1.toFixed(1)} ${yo1.toFixed(1)} L ${xi1.toFixed(1)} ${yi1.toFixed(1)} A ${rin} ${rin} 0 ${large} 0 ${xi0.toFixed(1)} ${yi0.toFixed(1)} Z" fill="${s.color}" stroke="#141414" stroke-width="2.4"/>`;
    a0=a1;
  });
  // center: a black square framing the dominant share for bauhaus weight
  const top = seg.reduce((a,b)=>b.pct>a.pct?b:a, seg[0]);
  host.innerHTML = `<svg width="176" height="176" viewBox="0 0 176 176" role="img" aria-label="Voice versus LINE share of conversations">
    <circle cx="88" cy="88" r="80" fill="none" stroke="#141414" stroke-width="3"/>
    ${paths}
    <rect x="68" y="68" width="40" height="40" fill="#141414"/>
    <text x="88" y="92" text-anchor="middle" font-family="Archivo Black, Archivo, sans-serif" font-size="19" fill="#f3f0e8">${top.pct}%</text>
    <text x="88" y="106" text-anchor="middle" font-family="Archivo, sans-serif" font-size="8.4" font-weight="800" letter-spacing="1" fill="#f4c430">${top.ch.toUpperCase()}</text>
  </svg>`;

  // legend
  const lg = document.getElementById("splitlegend");
  lg.innerHTML = seg.map(s=>{
    const sw = s.shape==="circle"
      ? `<span class="sw" style="border-radius:50%;background:${s.color}"></span>`
      : s.shape==="triangle"
        ? shapeSVG("triangle", s.color, 18)
        : `<span class="sw" style="background:${s.color}"></span>`;
    return `<div class="splititem">
      ${sw}
      <div class="txt"><div class="ch">${s.ch}</div><div class="vol">${s.vol}</div></div>
      <div class="pct tabnum">${s.pct}%</div>
    </div>`;
  }).join("");
})();

/* ----- HANDOFF LIST ------------------------------------------ */
(function renderHandoff(){
  const host = document.getElementById("hlist");
  document.getElementById("handoffcount").textContent = DATA.handoff.length;
  const arrow = `<svg width="20" height="16" viewBox="0 0 20 16" aria-hidden="true"><path d="M2 8 H15" stroke="#141414" stroke-width="2.6"/><polygon points="13,2 19,8 13,14" fill="#141414"/></svg>`;
  host.innerHTML = DATA.handoff.map(h=>{
    const chClass = h.channel.toLowerCase()==="voice" ? "ch-voice" : "ch-line";
    const tags = (h.tags||[]).map(t=>`<span class="htag">${t}</span>`).join("");
    return `<div class="hitem">
      <span class="hflag ${h.flag}" aria-hidden="true"></span>
      <div class="hmain">
        <div class="toprow">
          <div class="who">${h.who}</div>
          <div class="when tabnum">${h.when} ago</div>
        </div>
        <div class="reason">${h.reason}</div>
        <div class="hmeta"><span class="htag ${chClass}">${h.channel}</span>${tags}</div>
      </div>
      <button class="hgo" type="button" aria-label="Open conversation with ${h.who.replace(/"/g,'')}">${arrow}</button>
    </div>`;
  }).join("");
})();

/* ----- FOOTER TOTALS ----------------------------------------- */
(function renderFooter(){
  const host = document.getElementById("footstrip");
  host.innerHTML = DATA.totals.map(t=>`<div class="seg">
    ${shapeSVG(t.shape, t.color, 26)}
    <div class="t"><div class="k">${t.k}</div><div class="v tabnum">${t.v}</div></div>
  </div>`).join("");
})();
</script>
