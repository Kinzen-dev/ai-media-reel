<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ben-Day Pop Couture</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Archivo+Black&family=Archivo:wght@500;700;900&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   BEN-DAY POP COUTURE  -  comic-panel pop art template
   Roy Lichtenstein register: white ground, flat CMYK, thick
   black panel borders, regular halftone Ben-Day dot fields,
   speech bubbles, hard-edge illustration framing.
   Native CSS/SVG/JS only. No libraries.
   ============================================================ */

:root{
  /* Flat CMYK comic palette */
  --c-cyan:    #00a8e8;
  --c-magenta: #ff2d78;
  --c-yellow:  #ffd400;
  --c-black:   #0a0a0a;
  --c-white:   #ffffff;
  --c-paper:   #fbf7ee;   /* faint warm comic newsprint */
  --ink:       7px;       /* nominal panel border weight */
  --gap:       18px;
  --shadow:    10px 10px 0 var(--c-black);
}

*{ box-sizing:border-box; }

html,body{ margin:0; padding:0; }

body{
  background:
    radial-gradient(circle at 50% 50%, rgba(0,0,0,.035) 1.4px, transparent 1.6px) 0 0 / 8px 8px,
    var(--c-paper);
  color:var(--c-black);
  font-family:"Archivo", system-ui, sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ---------- shared comic chrome ---------- */
.panel{
  position:relative;
  background:var(--c-white);
  border:var(--ink) solid var(--c-black);
  border-radius:4px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

/* letterbox media so a landscape asset is never cover-cropped */
.media-fit{
  width:100%;
  height:100%;
  display:block;
  object-fit:contain;
  background:var(--c-black);
}

/* big slab type */
.slab{
  font-family:"Anton", "Archivo Black", sans-serif;
  font-weight:400;
  letter-spacing:.01em;
  line-height:.92;
  text-transform:uppercase;
}
.bangers{ font-family:"Bangers", "Anton", sans-serif; letter-spacing:.02em; }

/* speech / caption box */
.bubble{
  position:relative;
  background:var(--c-white);
  border:5px solid var(--c-black);
  border-radius:22px;
  padding:16px 20px;
  box-shadow:6px 6px 0 var(--c-black);
  font-weight:900;
  text-transform:uppercase;
  line-height:1.05;
}
.bubble::after{   /* tail */
  content:"";
  position:absolute;
  left:34px; bottom:-22px;
  width:0;height:0;
  border-left:0 solid transparent;
  border-right:30px solid transparent;
  border-top:24px solid var(--c-black);
}
.bubble::before{
  content:"";
  position:absolute;
  left:40px; bottom:-12px;
  width:0;height:0;
  border-left:0 solid transparent;
  border-right:20px solid transparent;
  border-top:16px solid var(--c-white);
  z-index:2;
}

/* yellow burst caption label */
.tag{
  display:inline-block;
  background:var(--c-yellow);
  border:4px solid var(--c-black);
  padding:5px 12px;
  font-family:"Archivo Black", sans-serif;
  font-weight:900;
  font-size:13px;
  letter-spacing:.08em;
  text-transform:uppercase;
  transform:rotate(-2deg);
  box-shadow:4px 4px 0 var(--c-black);
}

a{ color:inherit; }
:focus-visible{
  outline:5px solid var(--c-magenta);
  outline-offset:4px;
}

/* ============================================================
   LAYOUT
   ============================================================ */
.wrap{
  max-width:1380px;
  margin:0 auto;
  padding:22px;
}

/* top band: title + bubble over a thin CMYK rule, ABOVE the fold */
.topband{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:24px;
  flex-wrap:wrap;
  margin-bottom:var(--gap);
}
.brand{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.brand .kicker{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.brand h1{
  margin:0;
  font-size:clamp(40px, 7.2vw, 104px);
  color:var(--c-black);
  text-shadow:5px 5px 0 var(--c-cyan), 9px 9px 0 var(--c-magenta);
}
.brand h1 em{ font-style:normal; color:var(--c-magenta); -webkit-text-stroke:2px #0a0a0a; }
.headbubble{
  max-width:330px;
  font-size:16px;
  flex:0 0 auto;
}

/* main signature: two panels side by side (dot field | comic illo) */
.hero{
  display:grid;
  grid-template-columns:0.92fr 1.08fr;
  gap:var(--gap);
}
.hero .col{
  display:flex;
  flex-direction:column;
  gap:var(--gap);
}

/* DOT PANEL */
.dotpanel{
  min-height:520px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:0;
}
.dotpanel .dotsvg{
  position:absolute; inset:0;
  width:100%; height:100%;
  display:block;
}
.dotpanel .caption{
  position:relative;
  margin:0 22px 24px 22px;
  z-index:3;
}
.dotpanel .big{
  font-size:clamp(38px, 5.4vw, 78px);
  color:var(--c-black);
  text-shadow:3px 3px 0 var(--c-white);
}

/* ILLO PANEL: black-outlined product/portrait, flat CMYK frame */
.illopanel{
  min-height:340px;
  position:relative;
  background:var(--c-cyan);
}
.illopanel .frame{
  position:absolute; inset:14px;
  border:5px solid var(--c-black);
  background:var(--c-black);
  overflow:hidden;
  border-radius:2px;
}
.illopanel .frame img,
.illopanel .frame video{
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:contain;
  background:var(--c-black);
}
/* inline-SVG flat-comic hero illustration fills the frame edge-to-edge */
.illopanel .frame .heroIllo{
  position:absolute; inset:0;
  width:100%; height:100%;
  display:block;
}
/* halftone overlay tint corner on the illo for comic shading */
.illopanel .shade{
  position:absolute; inset:14px;
  pointer-events:none;
  z-index:4;
  mix-blend-mode:multiply;
  opacity:.55;
}
.illopanel .pow{
  position:absolute;
  right:-10px; top:-14px;
  z-index:6;
}

/* small media strip (the supporting comic panels) */
.strip{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:var(--gap);
  margin-top:var(--gap);
}
.cell{
  position:relative;
  aspect-ratio:1/1;
  min-height:160px;
  cursor:pointer;
  background:var(--c-white);
}
.cell .label{
  position:absolute; left:0; bottom:0; z-index:5;
  background:var(--c-yellow);
  border-top:4px solid var(--c-black);
  border-right:4px solid var(--c-black);
  border-top-right-radius:6px;
  padding:4px 10px;
  font-family:"Archivo Black",sans-serif;
  font-size:11px; letter-spacing:.06em;
  text-transform:uppercase;
}
.cell .corner{
  position:absolute; right:6px; top:6px; z-index:5;
  width:30px; height:30px;
  display:grid; place-items:center;
  border:3px solid var(--c-black);
  border-radius:50%;
  background:var(--c-magenta);
  color:var(--c-white);
  font-family:"Archivo Black",sans-serif;
  font-size:13px;
}
.cell .play{
  position:absolute; inset:0; z-index:4;
  display:grid; place-items:center;
  pointer-events:none;
}
.cell .play span{
  width:0;height:0;
  border-top:16px solid transparent;
  border-bottom:16px solid transparent;
  border-left:26px solid var(--c-white);
  filter:drop-shadow(2px 2px 0 #0a0a0a);
  transition:transform .15s ease;
}
.cell.playing .play{ display:none; }
.cell:hover .play span{ transform:scale(1.12); }

/* bottom audio + cta row */
.footrow{
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:var(--gap);
  margin-top:var(--gap);
}
.audiopanel{ padding:20px; display:flex; flex-direction:column; gap:14px; }
.audiopanel h3{ margin:0; font-size:22px; }
.tracks{ display:flex; flex-direction:column; gap:12px; }
.track{
  display:flex; align-items:center; gap:14px;
  border:4px solid var(--c-black);
  border-radius:8px;
  padding:8px 12px;
  background:var(--c-white);
  cursor:pointer;
}
.track .wv{ height:34px; flex:1; image-rendering:pixelated; }
.track .pbtn{
  width:34px; height:34px; flex:0 0 auto;
  border:3px solid var(--c-black);
  border-radius:50%;
  background:var(--c-cyan);
  display:grid; place-items:center;
}
.track .pbtn span{
  width:0;height:0;
  border-top:8px solid transparent;
  border-bottom:8px solid transparent;
  border-left:13px solid var(--c-black);
  margin-left:2px;
}
.track.playing .pbtn{ background:var(--c-magenta); }
.track.playing .pbtn span{
  border:0; width:11px;height:11px;
  background:var(--c-black); margin-left:0;
}
.track .nm{ font-family:"Archivo Black",sans-serif; font-size:12px; letter-spacing:.04em; text-transform:uppercase; width:78px; }

.ctapanel{
  padding:24px;
  background:var(--c-magenta);
  color:var(--c-white);
  display:flex; flex-direction:column; justify-content:center; gap:16px;
}
.ctapanel .big{
  font-size:clamp(30px,4vw,52px);
  text-shadow:3px 3px 0 #0a0a0a;
}
.btn{
  align-self:flex-start;
  background:var(--c-yellow);
  color:var(--c-black);
  border:5px solid var(--c-black);
  border-radius:10px;
  padding:14px 26px;
  font-family:"Archivo Black",sans-serif;
  font-weight:900; font-size:18px;
  letter-spacing:.04em; text-transform:uppercase;
  box-shadow:6px 6px 0 #0a0a0a;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  transition:transform .12s ease, box-shadow .12s ease;
}
.btn:hover{ transform:translate(-2px,-2px); box-shadow:9px 9px 0 #0a0a0a; }
.btn:active{ transform:translate(3px,3px); box-shadow:2px 2px 0 #0a0a0a; }

.foot{
  margin-top:26px;
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
  font-family:"Archivo Black",sans-serif;
  font-size:12px; letter-spacing:.08em; text-transform:uppercase;
  opacity:.8;
}

/* floating sound toggle bubble */
.soundpop{
  position:fixed; right:18px; bottom:18px; z-index:40;
  background:var(--c-white);
  border:5px solid var(--c-black);
  border-radius:50%;
  width:58px; height:58px;
  box-shadow:5px 5px 0 var(--c-black);
  font-family:"Archivo Black",sans-serif;
  font-size:11px; line-height:1;
  cursor:pointer;
  display:grid; place-items:center; text-align:center;
}

/* ---------- POW burst svg sizing ---------- */
.pow svg{ display:block; }

/* ============================================================
   RESPONSIVE  -  stack panels on phones, never cover-crop
   ============================================================ */
@media (max-width:960px){
  .hero{ grid-template-columns:1fr; }
  .footrow{ grid-template-columns:1fr; }
  .dotpanel{ min-height:380px; }
}
@media (max-width:640px){
  .wrap{ padding:14px; }
  :root{ --ink:5px; --gap:14px; --shadow:7px 7px 0 var(--c-black); }
  .topband{ flex-direction:column; gap:14px; }
  .headbubble{ max-width:100%; }
  .strip{ grid-template-columns:1fr 1fr; }
  .strip .cell:nth-child(3){ grid-column:1 / -1; aspect-ratio:16/9; }
  .brand h1{ text-shadow:3px 3px 0 var(--c-cyan), 6px 6px 0 var(--c-magenta); }
  .dotpanel{ min-height:300px; }
  .illopanel{ min-height:240px; }
  .pow{ transform:scale(.78); right:-2px; top:-6px; }
}

/* ============================================================
   REDUCED MOTION  -  freeze everything, show final state
   ============================================================ */
@media (prefers-reduced-motion:reduce){
  *{ animation:none !important; transition:none !important; }
}
</style>
</head>

            <pattern id="shadeDots" width="9" height="9" patternUnits="userSpaceOnUse">
              <rect width="9" height="9" fill="#ffffff" fill-opacity="0"/>
              <circle cx="4.5" cy="4.5" r="2.4" fill="#ff2d78"/>
            </pattern>
          </defs>
          <rect x="0" y="0" width="200" height="120" fill="url(#shadeDots)"/>
        </svg>

        <!-- POW burst -->
        <div class="pow" id="heroPow" aria-hidden="true">
          <svg width="150" height="120" viewBox="0 0 150 120">
            <polygon points="75,4 92,38 130,30 108,62 146,74 106,84 120,118 86,94 75,118 64,94 30,118 44,84 4,74 42,62 20,30 58,38"
                     fill="#ffd400" stroke="#0a0a0a" stroke-width="5" stroke-linejoin="round"/>
            <text x="75" y="74" text-anchor="middle" font-family="Bangers, sans-serif"
                  font-size="34" fill="#ff2d78" stroke="#0a0a0a" stroke-width="1.2">WOW!</text>
          </svg>
        </div>

        <!-- caption strip on the illo -->
        <div style="position:absolute;left:14px;bottom:14px;z-index:6;max-width:80%;">
          <div class="bubble" id="heroBig" style="border-radius:14px;font-size:clamp(15px,2.2vw,26px);"></div>
        </div>
        <div class="tag" id="heroLabel" style="position:absolute;left:18px;top:18px;z-index:6;"></div>
      </div>

      <!-- SUPPORTING COMIC PANELS (real media cells, in first screen) -->
      <div class="strip" id="strip"></div>
    </div>
  </section>

  <!-- ====== B-SIDE: audio panel + CTA ====== -->
  <section class="footrow">
    <div class="panel audiopanel">
      <h3 class="bangers" id="audTitle" style="font-size:30px;"></h3>
      <div class="tracks" id="tracks"></div>
      <div style="font-size:12px;font-weight:700;opacity:.7;">ONE AT A TIME. TAP A STRIP TO PLAY.</div>
    </div>

    <div class="panel ctapanel">
      <div class="slab big" id="ctaBig"></div>
      <a class="btn" id="ctaBtn" href="#"></a>
    </div>
  </section>

  <footer class="foot">
    <span id="footL"></span>
    <span id="footR"></span>
  </footer>
</div>

<!-- floating sound toggle -->
<button class="soundpop" id="soundpop" aria-pressed="false" aria-label="Toggle sound on supporting reels">SOUND<br>OFF</button>

<script>
/* ============================================================
   RENDER  -  hydrate the comic from DATA
   ============================================================ */
(function(){
  const $ = (s,r=document)=>r.querySelector(s);
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // --- top band ---
  $("#t-kicker").textContent = DATA.kicker;
  const h1 = $("#t-h1");
  DATA.headline.forEach((w,i)=>{
    if(i===DATA.headEm){
      const em=document.createElement("em"); em.textContent=w; h1.appendChild(em);
    } else {
      h1.appendChild(document.createTextNode(w));
    }
    if(i<DATA.headline.length-1) h1.appendChild(document.createTextNode(" "));
  });
  $("#t-bubble").textContent = DATA.bubble;

  // --- hero illo ---
  // The hero is an inline-SVG flat-comic portrait (no photo). Only the comic
  // chrome (label, caption, POW word) is data-driven; the artwork is static SVG.
  $("#heroLabel").textContent = DATA.hero.label;
  $("#heroBig").textContent = DATA.hero.big;
  // swap pow word
  const powText = $("#heroPow svg text"); if(powText) powText.textContent = DATA.hero.pow;

  // --- supporting strip ---
  const strip = $("#strip");
  const videoEls = [];
  DATA.cells.forEach((c,idx)=>{
    const cell = document.createElement("div");
    cell.className = "panel cell";
    cell.tabIndex = 0;
    cell.setAttribute("role","button");
    cell.setAttribute("aria-label", (c.type==="video"?"Play reel ":"Panel ") + c.label);

    if(c.type==="video"){
      const v = document.createElement("video");
      v.className="media-fit";
      v.src = c.src;
      v.poster = c.poster || "";
      v.loop = true; v.muted = true; v.playsInline = true; v.preload="none";
      v.setAttribute("playsinline","");
      cell.appendChild(v);
      videoEls.push(v);

      const play = document.createElement("div");
      play.className="play"; play.innerHTML="<span></span>";
      cell.appendChild(play);

      // toggle: only the clicked video plays; pause all others (no simultaneous decode)
      const toggle = ()=>{
        const isPlaying = !v.paused && !v.ended;
        videoEls.forEach(o=>{ if(o!==v){ o.pause(); o.parentElement.classList.remove("playing"); }});
        if(isPlaying){ v.pause(); cell.classList.remove("playing"); }
        else { v.play().catch(()=>{}); cell.classList.add("playing"); }
      };
      cell.addEventListener("click", toggle);
      cell.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }});

      // pause if scrolled out of view (perf)
      if("IntersectionObserver" in window){
        new IntersectionObserver(es=>{
          es.forEach(en=>{ if(!en.isIntersecting && !v.paused){ v.pause(); cell.classList.remove("playing"); }});
        },{threshold:0.25}).observe(cell);
      }
    } else {
      const img = document.createElement("img");
      img.className="media-fit"; img.src=c.src; img.alt=c.label; img.loading="lazy";
      cell.appendChild(img);
    }

    const corner = document.createElement("div");
    corner.className="corner"; corner.textContent = c.n;
    cell.appendChild(corner);

    const label = document.createElement("div");
    label.className="label"; label.textContent = c.label;
    cell.appendChild(label);

    strip.appendChild(cell);
  });

  // --- sound toggle for reels ---
  let soundOn = false;
  const soundpop = $("#soundpop");
  soundpop.addEventListener("click", ()=>{
    soundOn = !soundOn;
    soundpop.innerHTML = soundOn ? "SOUND<br>ON" : "SOUND<br>OFF";
    soundpop.setAttribute("aria-pressed", String(soundOn));
    soundpop.style.background = soundOn ? "var(--c-yellow)" : "var(--c-white)";
    videoEls.forEach(v=> v.muted = !soundOn );
  });

  // --- audio b-side ---
  $("#audTitle").textContent = DATA.audio.title;
  const tracksWrap = $("#tracks");
  const audioObjs = [];
  DATA.audio.tracks.forEach(t=>{
    const row = document.createElement("div");
    row.className="track"; row.tabIndex=0;
    row.setAttribute("role","button");
    row.setAttribute("aria-label","Play "+t.name);
    row.innerHTML =
      '<div class="pbtn"><span></span></div>'+
      '<div class="nm">'+t.name+'</div>'+
      '<img class="wv" src="'+t.wave+'" alt="" />';
    const audio = new Audio(t.src);
    audio.preload="none";
    audioObjs.push({audio,row});
    audio.addEventListener("ended", ()=> row.classList.remove("playing"));
    const toggle = ()=>{
      const playing = !audio.paused;
      audioObjs.forEach(o=>{ if(o.audio!==audio){ o.audio.pause(); o.audio.currentTime=0; o.row.classList.remove("playing"); }});
      if(playing){ audio.pause(); row.classList.remove("playing"); }
      else { audio.play().catch(()=>{}); row.classList.add("playing"); }
    };
    row.addEventListener("click", toggle);
    row.addEventListener("keydown", e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); toggle(); }});
    tracksWrap.appendChild(row);
  });

  // --- cta + foot ---
  $("#ctaBig").textContent = DATA.cta.big;
  const cb = $("#ctaBtn"); cb.textContent = DATA.cta.btn; cb.href = DATA.cta.href;
  $("#footL").textContent = DATA.footL;
  $("#footR").textContent = DATA.footR;

  // reduced-motion: nothing auto-animates here, all media is click-gated, final state already shown.
})();
</script>
</body>
</html>
