<!-- TEMPLATE: The Atelier Broadsheet | ARCHETYPE: EXTRA broadsheet newspaper column grid | REF: Le Monde 2024, The Athletic (Webby 2025), NYT T Magazine 2025, Study Hall Design Studio (Awwwards SOTD 2026) | WHEN TO USE: portfolio/about/press as a dense editorial newspaper; each work is an article with byline + dateline | SWAP: edit the EDITION + DATA arrays at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Atelier Broadsheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,500&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
:root{
  --news:#faf8f2;        /* newsprint */
  --ink:#111111;         /* ink */
  --red:#c8102e;         /* masthead red */
  --rule:#e5e0d8;        /* column-rule gray */
  --ink-60:rgba(17,17,17,.62);
  --ink-40:rgba(17,17,17,.40);
  --gut:26px;            /* column gutter */
  --maxw:1320px;
  --serif:"Fraunces",Georgia,"Times New Roman",serif;
  --mono:"Space Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0;
  background:var(--news);
  color:var(--ink);
  font-family:var(--serif);
  /* subtle paper grain + fiber speckle, pure CSS so it stays self-contained */
  background-image:
    radial-gradient(circle at 20% 12%, rgba(200,16,46,.018), transparent 40%),
    radial-gradient(circle at 82% 78%, rgba(17,17,17,.022), transparent 45%),
    repeating-linear-gradient(0deg, rgba(17,17,17,.012) 0 1px, transparent 1px 3px);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 26px;}

/* ---------- TOP STRIP : weather/index folio ---------- */
.topstrip{
  border-bottom:1.5px solid var(--ink);
  font-family:var(--mono);
  font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
}
.topstrip .wrap{display:flex;justify-content:space-between;align-items:center;gap:18px;padding-top:7px;padding-bottom:7px;flex-wrap:wrap;}
.topstrip .ts-l,.topstrip .ts-r{display:flex;gap:18px;color:var(--ink-60);flex-wrap:wrap;}
.topstrip b{color:var(--ink);font-weight:700;}
.topstrip .ts-r{color:var(--red);}

/* ---------- MASTHEAD ---------- */
.masthead{padding-top:8px;}
.mh-est{
  display:flex;justify-content:space-between;align-items:flex-end;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-60);
  border-bottom:1px solid var(--rule);padding-bottom:4px;gap:10px;
}
.mh-est .red{color:var(--red);font-weight:700;}
.mh-title{
  font-family:var(--serif);
  font-weight:900;
  font-optical-sizing:auto;
  font-size:clamp(44px,9vw,116px);
  line-height:.82;
  letter-spacing:-.02em;
  text-align:center;
  margin:.04em 0 .02em;
  padding-top:.02em;
}
.mh-title .am{color:var(--red);}
.mh-sub{
  text-align:center;
  font-family:var(--mono);
  font-size:clamp(9px,1.5vw,12px);
  letter-spacing:.42em;
  text-transform:uppercase;
  color:var(--ink);
  padding-bottom:7px;
}
/* the folio rule: double line, the spine of any broadsheet */
.folio{
  border-top:3px solid var(--ink);
  border-bottom:1px solid var(--ink);
  padding:5px 0;
  display:flex;justify-content:space-between;align-items:center;gap:14px;
  font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink);
  flex-wrap:wrap;
}
.folio .red{color:var(--red);font-weight:700;}
.folio .dot::before{content:"\00a0\2022\00a0";color:var(--ink-40);}

/* ---------- SECTION KICKER ---------- */
.kicker-row{
  display:flex;align-items:center;gap:14px;
  border-bottom:1px solid var(--ink);
  margin-top:9px;padding-bottom:5px;
}
.kicker{
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  background:var(--red);color:var(--news);padding:3px 9px 2px;
}
.kicker-row .meta{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-60);margin-left:auto;}

/* ============ LEAD ARTICLE (first viewport signature) ============ */
.lead{
  display:grid;
  grid-template-columns: 1.55fr 1fr;
  gap:0 var(--gut);
  border-bottom:3px double var(--ink);
  padding:12px 0 22px;
}
.lead-main{position:relative;}
.lead-headline{
  font-family:var(--serif);
  font-weight:900;
  font-size:clamp(34px,4.4vw,64px);
  line-height:.92;
  letter-spacing:-.024em;
  margin:1px 0 6px;
}
.lead-deck{
  font-family:var(--serif);
  font-style:italic;
  font-weight:400;
  font-size:clamp(16px,1.8vw,23px);
  line-height:1.16;
  color:var(--ink);
  margin:0 0 8px;
  max-width:38ch;
}
.byline{
  font-family:var(--mono);
  font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-60);
  border-top:1px solid var(--ink);border-bottom:1px solid var(--rule);
  padding:5px 0;margin:0 0 11px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:baseline;
}
.byline .by{color:var(--red);font-weight:700;}
.byline .dl{color:var(--ink);font-weight:700;}

/* lead art with newspaper "cut" caption */
.lead-figure{margin:0 0 12px;border-top:1px solid var(--ink);padding-top:8px;}
.lead-figure .frame{
  width:100%;aspect-ratio:16/9;max-height:188px;overflow:hidden;background:#0c0c0c;
  border:1px solid var(--ink);position:relative;
  filter:contrast(1.05) saturate(.96);
}
.lead-figure img,.lead-figure video{
  width:100%;height:100%;object-fit:cover;display:block;
}
.figcap{
  font-family:var(--mono);font-size:10px;letter-spacing:.03em;text-transform:uppercase;color:var(--ink-60);
  padding:5px 0 0;line-height:1.36;
}
.figcap b{color:var(--ink);font-weight:700;}

/* the multicol body : the unmistakable newspaper texture */
.lead-body{
  column-count:2;
  column-gap:var(--gut);
  column-rule:1px solid var(--rule);
  font-size:11.5px;
  line-height:1.62;
  text-align:justify;
  hyphens:auto;
  -webkit-hyphens:auto;
  margin-top:2px;
}
.lead-body p{margin:0 0 .85em;}
.dropcap::first-letter{
  font-family:var(--serif);
  font-weight:900;
  float:left;
  font-size:3.55em;
  line-height:.74;
  padding:.04em .08em 0 0;
  margin:.02em 0 -.06em;
  color:var(--red);
}
.subhead{
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--ink);margin:.3em 0 .55em;break-inside:avoid;
}

/* pull quote inside the column flow */
.pull{
  break-inside:avoid;
  border-top:2px solid var(--ink);border-bottom:2px solid var(--ink);
  padding:9px 0;margin:.4em 0 .9em;
  font-family:var(--serif);font-style:italic;font-weight:500;
  font-size:18px;line-height:1.22;text-align:left;hyphens:none;
}
.pull .src{display:block;font-family:var(--mono);font-style:normal;font-weight:700;font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-top:7px;}

/* ----- LEAD SIDEBAR : Facts and Numbers ----- */
.sidebar{border-left:1px solid var(--rule);padding-left:var(--gut);}
@media(max-width:880px){.sidebar{border-left:none;padding-left:0;}}
.side-figure{margin:0 0 14px;}
.side-figure .frame{
  width:100%;aspect-ratio:4/5;overflow:hidden;border:1px solid var(--ink);background:#0c0c0c;
  filter:contrast(1.04) saturate(.95);
}
.side-figure img,.side-figure video{width:100%;height:100%;object-fit:cover;display:block;}
.facts{
  border-top:3px solid var(--ink);
  margin-top:4px;padding-top:8px;
}
.facts h3{
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  margin:0 0 4px;color:var(--red);
}
.facts .lede{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink-60);margin:0 0 10px;line-height:1.3;}
.stat{
  border-top:1px solid var(--rule);padding:8px 0 7px;
  display:grid;grid-template-columns:auto 1fr;gap:2px 12px;align-items:baseline;
}
.stat .num{
  font-family:var(--serif);font-weight:900;font-size:34px;line-height:.9;letter-spacing:-.02em;
  grid-row:span 2;
}
.stat .num.red{color:var(--red);}
.stat .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink);align-self:end;}
.stat .desc{font-family:var(--serif);font-size:11.5px;line-height:1.35;color:var(--ink-60);}

/* ============ ARTICLE GRID (the rest of the works) ============ */
.section-head{
  display:flex;align-items:baseline;gap:14px;
  border-bottom:2px solid var(--ink);margin:28px 0 0;padding-bottom:6px;
}
.section-head h2{
  font-family:var(--serif);font-weight:900;font-size:clamp(24px,3.6vw,44px);letter-spacing:-.02em;margin:0;
}
.section-head .stamp{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-60);margin-left:auto;}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:0;
  border-top:1px solid var(--ink);
}
.col{
  border-right:1px solid var(--rule);
  padding:18px var(--gut) 22px;
}
.col:nth-child(3n){border-right:none;}
.col:first-child{padding-left:0;}
.col:nth-child(3n){padding-right:0;}

.art{padding-bottom:18px;margin-bottom:18px;border-bottom:1px solid var(--rule);}
.art:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.art .akick{
  font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--red);
  display:block;margin-bottom:4px;
}
.art h3{
  font-family:var(--serif);font-weight:700;font-size:clamp(20px,2.5vw,27px);line-height:1.02;letter-spacing:-.015em;
  margin:0 0 7px;
}
.art h3.big{font-weight:900;font-size:clamp(24px,3vw,33px);}
.art .adl{
  font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-60);
  margin:0 0 9px;
}
.art .adl b{color:var(--ink);}
.art .aframe{
  width:100%;overflow:hidden;border:1px solid var(--ink);background:#0c0c0c;margin:0 0 9px;position:relative;
  filter:contrast(1.05) saturate(.95);
}
.art .aframe.wide{aspect-ratio:16/9;}
.art .aframe.sq{aspect-ratio:1/1;}
.art .aframe.tall{aspect-ratio:3/4;}
.art .aframe img,.art .aframe video{width:100%;height:100%;object-fit:cover;display:block;}
/* play badge for video figures */
.vbadge{
  position:absolute;left:8px;bottom:8px;z-index:3;
  font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  background:var(--red);color:var(--news);padding:2px 7px;
  display:inline-flex;align-items:center;gap:5px;
}
.vbadge::before{content:"";width:0;height:0;border-style:solid;border-width:4px 0 4px 6px;border-color:transparent transparent transparent var(--news);}
.art .abody{font-size:11px;line-height:1.55;text-align:justify;hyphens:auto;-webkit-hyphens:auto;color:var(--ink);margin:0;}
.art .abody p{margin:0 0 .7em;}
.art .abody p:last-child{margin-bottom:0;}
.art .more{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--red);margin-top:8px;display:inline-block;border-bottom:1px solid var(--red);padding-bottom:1px;}

/* mini pull quote inside grid article */
.art .qmini{
  break-inside:avoid;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);
  padding:7px 0;margin:9px 0;
  font-family:var(--serif);font-style:italic;font-weight:500;font-size:14px;line-height:1.2;
}

/* ---------- CLASSIFIEDS / COLOPHON footer ---------- */
.classifieds{
  border-top:3px solid var(--ink);margin-top:30px;padding:18px 0 10px;
}
.classifieds .ch{
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--red);
  border-bottom:1px solid var(--ink);padding-bottom:5px;margin-bottom:12px;
}
.class-grid{column-count:4;column-gap:var(--gut);}
.class-grid .ad{break-inside:avoid;margin-bottom:12px;font-size:10.5px;line-height:1.5;color:var(--ink-60);}
.class-grid .ad b{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink);margin-bottom:2px;}
.colophon{
  border-top:1px solid var(--rule);margin-top:8px;padding:14px 0 40px;
  display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;
  font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--ink-40);
}
.colophon .red{color:var(--red);}

/* ---------- focus visibility ---------- */
a{color:inherit;}
:focus-visible{outline:2.5px solid var(--red);outline-offset:3px;}

/* =================== RESPONSIVE =================== */
@media(max-width:1024px){
  :root{--gut:20px;}
  .lead{grid-template-columns:1.4fr 1fr;}
  .grid{grid-template-columns:repeat(2,1fr);}
  .col:nth-child(3n){border-right:1px solid var(--rule);padding-right:var(--gut);}
  .col:nth-child(2n){border-right:none;padding-right:0;}
  .col:nth-child(2n+1){padding-left:0;}
  .col:first-child{padding-left:0;}
  .class-grid{column-count:3;}
}
@media(max-width:880px){
  .lead{grid-template-columns:1fr;gap:0;border-bottom:3px double var(--ink);}
  .sidebar{margin-top:18px;border-top:1px solid var(--ink);padding-top:16px;}
  .side-figure .frame{aspect-ratio:16/9;}
}
@media(max-width:640px){
  :root{--gut:0px;}
  .wrap{padding:0 18px;}
  .topstrip .wrap{justify-content:center;gap:10px;font-size:9.5px;}
  .topstrip .ts-l,.topstrip .ts-r{gap:12px;}
  /* masthead stays intact, scales down */
  .mh-title{font-size:clamp(40px,15vw,90px);}
  .mh-sub{letter-spacing:.28em;}
  .folio{font-size:9.5px;gap:6px;justify-content:center;}
  .folio .dot:nth-child(n+4){display:none;}
  /* lead body collapses to a single readable column, rules become horizontal */
  .lead-body{column-count:1;column-rule:none;font-size:13px;line-height:1.66;}
  .lead-headline{font-size:clamp(30px,8.4vw,46px);line-height:.96;}
  .lead-deck{font-size:clamp(16px,4.4vw,21px);max-width:none;margin-bottom:7px;}
  /* keep the lead figure shallow on phone so the red drop cap peeks at scroll=0 */
  .lead-figure{padding-top:7px;margin-bottom:10px;}
  .lead-figure .frame{max-height:120px;}
  /* grid -> single column stack, keep horizontal rules */
  .grid{grid-template-columns:1fr;}
  .col{border-right:none !important;padding:16px 0 0 !important;border-top:1px solid var(--rule);}
  .col:first-child{border-top:none;}
  .section-head h2{font-size:clamp(26px,8vw,40px);}
  .class-grid{column-count:1;}
  .colophon{justify-content:flex-start;}
  /* never cover-crop landscape art on a phone: letterbox to its native ratio */
  .lead-figure .frame,.art .aframe.wide{aspect-ratio:16/9;}
  .lead-figure img,.lead-figure video,.art .aframe img,.art .aframe video{object-fit:contain;background:#0c0c0c;}
  .side-figure img,.side-figure video{object-fit:contain;}
}

/* =================== REDUCED MOTION =================== */
@media(prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important;}
  .ticker-track{animation:none !important;transform:none !important;}
  video{display:none !important;} /* posters remain; no autoplay decode */
  .poster-fallback{display:block !important;}
}

/* ticker (top breaking strip), respects reduced motion above */
.ticker{
  background:var(--ink);color:var(--news);overflow:hidden;white-space:nowrap;
  border-bottom:2px solid var(--ink);
}
.ticker-inner{display:flex;width:max-content;}
.ticker-track{
  display:inline-flex;align-items:center;gap:0;
  font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;
  padding:6px 0;
  animation:tick 42s linear infinite;
  will-change:transform;
}
.ticker-track span{padding:0 26px;display:inline-flex;align-items:center;gap:10px;}
.ticker-track .b{color:var(--red);font-weight:700;}
.ticker-track .sep{color:var(--news);opacity:.4;}
@keyframes tick{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.ticker:hover .ticker-track{animation-play-state:paused;}

.poster-fallback{display:none;width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>
<script>
/* ============================================================
   DATA  -  swap these to repurpose the broadsheet.
   No em dashes / en dashes anywhere in copy (periods + commas).
   ============================================================ */
const A = "../assets/";          // asset base
const G = "../assets/gen/";      // generated posters / waveforms

const EDITION = {
  title: ["THE ", "ATELIER"],      // [black, red] of masthead
  paper: "BROADSHEET",
  motto: "ALL THE WORK THAT IS FIT TO SHIP",
  vol:   "VOL. IX",
  no:    "No. 244",
  city:  "AYUTTHAYA . BANGKOK",
  price: "ONE EDITION",
  date:  "FRIDAY, JUNE 19, 2026",
  weather:"CLEAR. SHIP WINDS LIGHT.",
  section:"PORTFOLIO . PRESS",
  index: ["A1 LEAD", "B2 STUDIO", "C3 NUMBERS", "D4 CLASSIFIED"],
};

const TICKER = [
  ["BREAKING", "Voice plus LINE case capture clears pilot acceptance in clinical field test."],
  ["MARKETS", "Render times down forty percent after multicol refactor. Print desk pleased."],
  ["DESK", "T Magazine interactive cited as house reference for column rhythm and folio rule."],
  ["WIRE", "Reduced motion edition ships with full static fallback. No reader left behind."],
];

/* the lead, page A1, is the marquee work */
const LEAD = {
  kicker:"FRONT PAGE",
  headline:"Matte Black, Wet Neon, And A Studio That Renders At Speed",
  deck:"How a single broadsheet template turned a pile of generated assets into an editorial that reads with authority.",
  by:"By THE DESIGN DESK",
  dateline:"AYUTTHAYA",
  art:{ type:"video", src:A+"flux-car-i2v.mp4", poster:G+"poster-flux-car-i2v.png", ratio:"16/9" },
  cap:["Plate 1.", "A cinematic matte black coupe on a rain slicked neon street. Image to video, sixteen by nine, color graded for newsprint contrast."],
  body:[
    {type:"p", drop:true, text:"In the long tradition of the morning broadsheet, the front page is a contract. It promises the reader density without disorder, hierarchy without shouting, and a column grid strict enough that the eye never loses its place. This template keeps that contract. The masthead spans the page, the folio rule fixes the date and the edition, and the body type falls into justified columns with a true drop capital to open the lead."},
    {type:"p", text:"What follows is not a generic card grid dressed in serif type. It is a working newspaper. Each piece of the studio output becomes an article with a byline and a dateline. The reader scans the page the way one scans real print, from the display headline down through the deck, into the columns, and out to the sidebar of facts and numbers that anchors the right rail."},
    {type:"subhead", text:"THE COLUMN IS THE UNIT"},
    {type:"p", text:"Where a website measures itself in cards, a broadsheet measures itself in columns. The lead runs two justified columns split by a hairline rule. The studio section below runs three. On a narrow phone the columns collapse to one, the vertical rules turn horizontal, and the masthead survives intact. Nothing about the identity depends on the wide layout."},
    {type:"pull", text:"Density is not clutter. It is respect for a reader who came to read.", src:"THE STYLE BOOK, SECTION ONE"},
    {type:"p", text:"The art is handled the way a picture desk handles a plate. Landscape frames keep their sixteen by nine ratio, and on a phone they letterbox rather than crop, because a cropped car is a worse photograph than a smaller one. Motion is reserved. Only one video plays at a time, the focused one, and a reader who prefers stillness gets posters and a static page with no penalty."},
    {type:"p", text:"Read on. The studio desk files below, the numbers column keeps the score, and the classifieds close the edition the way a colophon should."},
  ],
};

/* sidebar Facts and Numbers (page anchor) */
const FACTS = {
  art:{ type:"img", src:A+"flux-clinic-4k.png", alt:"Mint and wood dental clinic interior", ratio:"4/5" },
  cap:["Plate 2.", "Field office. The clinic where the voice and LINE capture pilot was filed."],
  title:"FACTS AND NUMBERS",
  lede:"The edition by the figures, as filed by the numbers desk.",
  stats:[
    {num:"40%", red:true, lbl:"Render Cut", desc:"Front to back render time reduced after the column refactor."},
    {num:"6", lbl:"Columns Max", desc:"Strict broadsheet grid. Five to six across on the wide layout."},
    {num:"244", lbl:"Edition No.", desc:"This issue, filed and locked by the night desk."},
    {num:"1", lbl:"Video At A Time", desc:"Only the focused plate decodes. The rest hold their poster."},
    {num:"0", red:true, lbl:"Em Dashes", desc:"House rule. Periods and commas carry the copy throughout."},
  ],
};

/* the studio grid : every work is an article */
const ARTICLES = [
  {
    col:0, kicker:"MOTION DESK", big:true,
    title:"The Coupe Files: A Loop That Earns Its Frame",
    dateline:["FILED", "MOTION", "REEL 01"],

<!-- ===================== RENDER ===================== -->
<div id="paper"></div>

<script>
function el(html){ const t=document.createElement('template'); t.innerHTML=html.trim(); return t.content.firstElementChild; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* media cell : video shows poster + loads/plays only in view (IO). img is plain. */
function mediaCell(m, cls){
  const inner = (m.type==="video")
    ? `<video class="js-vid" muted loop playsinline preload="none"
         poster="${esc(m.poster)}" data-src="${esc(m.src)}"></video>
       <img class="poster-fallback" src="${esc(m.poster)}" alt="" aria-hidden="true" />
       <span class="vbadge">${esc(m.label||"Play")}</span>`
    : `<img loading="lazy" decoding="async" src="${esc(m.src)}" alt="${esc(m.alt||"")}" />`;
  const pad = m.pad ? 'style="background:var(--news);"' : '';
  return `<div class="${cls}" ${pad}>${inner}</div>`;
}

/* ---------- top strip + ticker + masthead ---------- */
function buildHead(){
  const ts = TICKER.map(([b,t])=>`<span><span class="b">${esc(b)}</span> ${esc(t)} <span class="sep">///</span></span>`).join('');
  return `
  <div class="ticker" aria-label="Breaking ticker">
    <div class="ticker-inner">
      <div class="ticker-track">${ts}</div>
      <div class="ticker-track" aria-hidden="true">${ts}</div>
    </div>
  </div>

  <div class="topstrip"><div class="wrap">
    <div class="ts-l">
      <span><b>${esc(EDITION.vol)}</b> . ${esc(EDITION.no)}</span>
      <span>${esc(EDITION.index.join(" · "))}</span>
    </div>
    <div class="ts-r"><span>${esc(EDITION.weather)}</span></div>
  </div></div>

  <header class="masthead"><div class="wrap">
    <div class="mh-est">
      <span>ESTABLISHED MMXXVI</span>
      <span class="red">${esc(EDITION.motto)}</span>
      <span>${esc(EDITION.price)}</span>
    </div>
    <h1 class="mh-title">${esc(EDITION.title[0])}<span class="am">${esc(EDITION.title[1])}</span></h1>
    <div class="mh-sub">${esc(EDITION.paper)} · EDITORIAL · PRESS · STUDIO</div>
    <div class="folio">
      <span class="red">${esc(EDITION.date)}</span>
      <span class="dot">${esc(EDITION.city)}</span>
      <span class="dot">${esc(EDITION.section)}</span>
      <span class="dot">${esc(EDITION.weather)}</span>
      <span class="dot">${esc(EDITION.vol)} ${esc(EDITION.no)}</span>
    </div>
  </div></header>`;
}

/* ---------- lead article ---------- */
function buildLead(){
  const bodyHtml = LEAD.body.map(b=>{
    if(b.type==="subhead") return `<p class="subhead">${esc(b.text)}</p>`;
    if(b.type==="pull") return `<div class="pull">${esc(b.text)}<span class="src">${esc(b.src)}</span></div>`;
    return `<p class="${b.drop?'dropcap':''}">${esc(b.text)}</p>`;
  }).join('');

  const facts = FACTS.stats.map(s=>`
    <div class="stat">
      <div class="num ${s.red?'red':''}">${esc(s.num)}</div>
      <div class="lbl">${esc(s.lbl)}</div>
      <div class="desc">${esc(s.desc)}</div>
    </div>`).join('');

  return `
  <main class="wrap" id="main">
    <div class="kicker-row">
      <span class="kicker">${esc(LEAD.kicker)}</span>
      <span class="meta">A1 · ${esc(EDITION.date)} · ${esc(EDITION.section)}</span>
    </div>

    <article class="lead">
      <div class="lead-main">
        <h2 class="lead-headline">${esc(LEAD.headline)}</h2>
        <p class="lead-deck">${esc(LEAD.deck)}</p>
        <div class="byline">
          <span class="by">${esc(LEAD.by)}</span>
          <span>·</span>
          <span class="dl">${esc(LEAD.dateline)}</span>
          <span>·</span>
          <span>STAFF REPORT</span>
        </div>

        <figure class="lead-figure">
          <div class="frame">${mediaCell(LEAD.art,'frameinner').replace('<div class="frameinner" >','').replace(/<\/div>$/,'')}</div>
          <figcaption class="figcap"><b>${esc(LEAD.cap[0])}</b> ${esc(LEAD.cap[1])}</figcaption>
        </figure>

        <div class="lead-body">${bodyHtml}</div>
      </div>

      <aside class="sidebar">
        <figure class="side-figure">
          <div class="frame"><img loading="lazy" decoding="async" src="${esc(FACTS.art.src)}" alt="${esc(FACTS.art.alt)}" /></div>
          <figcaption class="figcap"><b>${esc(FACTS.cap[0])}</b> ${esc(FACTS.cap[1])}</figcaption>
        </figure>
        <div class="facts">
          <h3>${esc(FACTS.title)}</h3>
          <p class="lede">${esc(FACTS.lede)}</p>
          ${facts}
        </div>
      </aside>
    </article>
  </main>`;
}

/* fix: mediaCell wraps in its own div; for the lead figure frame we want the inner media only */
function leadMedia(){
  const m = LEAD.art;
  if(m.type==="video"){
    return `<video class="js-vid" muted loop playsinline preload="none" poster="${esc(m.poster)}" data-src="${esc(m.src)}"></video>
            <img class="poster-fallback" src="${esc(m.poster)}" alt="" aria-hidden="true" />
            <span class="vbadge">PLAY REEL</span>`;
  }
  return `<img loading="lazy" decoding="async" src="${esc(m.src)}" alt="${esc(m.alt||"")}" />`;
}

/* ---------- studio grid ---------- */
function buildGrid(){
  const cols=[[],[],[]];
  ARTICLES.forEach(a=>cols[a.col].push(a));

  const colHtml = cols.map(list=>{
    const arts = list.map(a=>{
      const shapeCls = a.art.shape || "wide";
      let media;
      if(a.art.type==="video"){
        media = `<div class="aframe ${shapeCls}">
            <video class="js-vid" muted loop playsinline preload="none" poster="${esc(a.art.poster)}" data-src="${esc(a.art.src)}"></video>
            <img class="poster-fallback" src="${esc(a.art.poster)}" alt="" aria-hidden="true" />
            <span class="vbadge">${esc(a.art.label||"Play")}</span>
          </div>`;
      } else {
        const pad = a.art.pad ? ' style="background:var(--news);"' : '';
        media = `<div class="aframe ${shapeCls}"${pad}><img loading="lazy" decoding="async" src="${esc(a.art.src)}" alt="${esc(a.art.alt||"")}" /></div>`;
      }
      const bodyHtml = a.body.map(p=>`<p>${esc(p)}</p>`).join('');
      const quote = a.quote ? `<div class="qmini">${esc(a.quote)}</div>` : '';
      const more = a.more ? `<span class="more">${esc(a.more)}</span>` : '';
      const dl = `<span class="adl"><b>${esc(a.dateline[0])}</b> · ${esc(a.dateline.slice(1).join(" · "))}</span>`;
      return `<article class="art">
        <span class="akick">${esc(a.kicker)}</span>
        <h3 class="${a.big?'big':''}">${esc(a.title)}</h3>
        ${dl}
        ${media}
        <div class="abody">${bodyHtml}${quote}</div>
        ${more}
      </article>`;
    }).join('');
    return `<div class="col">${arts}</div>`;
  }).join('');

  return `
  <section class="wrap">
    <div class="section-head">
      <h2>From The Studio Desk</h2>
      <span class="stamp">PAGE B2 · SIX FILED · ${esc(EDITION.date)}</span>
    </div>
    <div class="grid">${colHtml}</div>
  </section>`;
}

/* ---------- classifieds + colophon ---------- */
function buildFoot(){
  const ads = CLASSIFIEDS.map(c=>`<div class="ad"><b>${esc(c.h)}</b>${esc(c.t)}</div>`).join('');
  return `
  <section class="wrap">
    <div class="classifieds">
      <div class="ch">Classifieds · Notices · Colophon</div>
      <div class="class-grid">${ads}</div>
    </div>
    <div class="colophon">
      <span><span class="red">THE ATELIER BROADSHEET</span> · ${esc(EDITION.city)} · ${esc(EDITION.vol)} ${esc(EDITION.no)}</span>
      <span>SET IN FRAUNCES AND SPACE MONO · PRINTED ON NEWSPRINT · NO EM DASHES</span>
      <span>© MMXXVI · ALL THE WORK THAT IS FIT TO SHIP</span>
    </div>
  </section>`;
}

/* assemble */
(function(){
  const root = document.getElementById('paper');
  root.innerHTML = buildHead() + buildLead() + buildGrid() + buildFoot();

  /* inject the correct lead media into the frame (clean, no string surgery) */
  const leadFrame = root.querySelector('.lead-figure .frame');
  if(leadFrame){ leadFrame.innerHTML = leadMedia(); }

  setupVideos();
})();

/* ---------- video governance ----------
   - never autoplay everything: only the single most-centered in-view video plays
   - load src lazily on first intersection, pause + free when out of view
   - reduced motion: CSS hides videos, posters carry the page (no JS load) */
function setupVideos(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce) return; // posters only, no decode

  const vids = Array.from(document.querySelectorAll('video.js-vid'));
  if(!vids.length) return;
  const visible = new Set();

  // lazy attach + track visibility
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      const v = e.target;
      if(e.isIntersecting && e.intersectionRatio>0.2){
        if(!v.src && v.dataset.src){ v.src = v.dataset.src; }
        visible.add(v);
      } else {
        visible.delete(v);
        if(!v.paused) v.pause();
      }
    });
    arbitrate();
  }, {threshold:[0,0.2,0.5,0.75]});
  vids.forEach(v=>io.observe(v));

  // play ONLY the single video closest to viewport center (avoids simultaneous decode)
  function arbitrate(){
    if(!visible.size){ vids.forEach(v=>{ if(!v.paused) v.pause(); }); return; }
    const cy = window.innerHeight/2;
    let best=null, bestD=Infinity;
    visible.forEach(v=>{
      const r=v.getBoundingClientRect();
      const d=Math.abs((r.top+r.bottom)/2 - cy);
      if(d<bestD){ bestD=d; best=v; }
    });
    vids.forEach(v=>{
      if(v===best){ const p=v.play(); if(p&&p.catch) p.catch(()=>{}); }
      else if(!v.paused){ v.pause(); }
    });
  }

  let raf=null;
  window.addEventListener('scroll', ()=>{ if(raf) return; raf=requestAnimationFrame(()=>{ raf=null; arbitrate(); }); }, {passive:true});

  // hover/focus a card to lock its video to the front (still single-decode)
  document.querySelectorAll('.aframe, .lead-figure .frame').forEach(frame=>{
    const v = frame.querySelector('video.js-vid');
    if(!v) return;
    const lock=()=>{ if(!v.src && v.dataset.src) v.src=v.dataset.src; vids.forEach(o=>{ if(o!==v&&!o.paused)o.pause(); }); const p=v.play(); if(p&&p.catch)p.catch(()=>{}); };
    frame.addEventListener('mouseenter', lock);
    frame.addEventListener('focusin', lock);
  });
}
</script>
