<!-- TEMPLATE: Cloud DevOps Blueprint Grid | ARCHETYPE: devops-blueprint (monochrome dot-grid cloud hero) | REF: vercel.com (Geist + dot/grid blueprint) | WHEN TO USE: cloud / devops / infra platform landing hero, minimal monochrome blueprint register | SWAP: edit the DATA object at top of <script> -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cloud DevOps Blueprint Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     PALETTE - monochrome blueprint, one subtle accent
     ============================================================ */
  :root {
    --bg:        #050507;   /* near-black full-bleed */
    --bg-2:      #08080b;
    --ink:       #f4f4f6;   /* near-white text */
    --ink-dim:   #8b8b95;   /* muted mono */
    --ink-faint: #4a4a54;
    --line:      rgba(255,255,255,0.055);  /* grid line */
    --line-bold: rgba(255,255,255,0.10);
    --dot:       rgba(255,255,255,0.16);   /* grid dot */
    --accent:    #3f8cff;   /* the single subtle accent */
    --accent-dim:rgba(63,140,255,0.16);
    --card:      rgba(255,255,255,0.022);
    --card-bd:   rgba(255,255,255,0.08);
    --grid-size: 30px;      /* repeating blueprint cell */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Space Grotesk", system-ui, -apple-system, sans-serif;
    line-height: 1.5;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

  a { color: inherit; text-decoration: none; }

  ::selection { background: var(--accent-dim); color: #fff; }

  /* ============================================================
     BLUEPRINT GRID - the signature mechanic (scroll=0 visible)
     dot grid + faint orthogonal lines, radial fade, slow drift
     ============================================================ */
  .stage {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* orthogonal blueprint lines */
  .grid-lines {
    position: absolute;
    inset: -2px;
    background-image:
      linear-gradient(to right,  var(--line) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
    pointer-events: none;
    z-index: 0;
  }
  /* every 5th line slightly bolder = blueprint "major" gridline */
  .grid-major {
    position: absolute;
    inset: -2px;
    background-image:
      linear-gradient(to right,  var(--line-bold) 1px, transparent 1px),
      linear-gradient(to bottom, var(--line-bold) 1px, transparent 1px);
    background-size: calc(var(--grid-size) * 5) calc(var(--grid-size) * 5);
    pointer-events: none;
    z-index: 0;
  }
  /* dot at each intersection */
  .grid-dots {
    position: absolute;
    inset: -2px;
    background-image: radial-gradient(circle, var(--dot) 1.1px, transparent 1.4px);
    background-size: var(--grid-size) var(--grid-size);
    background-position: -0.5px -0.5px;
    pointer-events: none;
    z-index: 0;
    will-change: transform;
    animation: drift 38s linear infinite;
  }
  @keyframes drift {
    from { transform: translate3d(0,0,0); }
    to   { transform: translate3d(var(--grid-size), var(--grid-size), 0); }
  }

  /* radial vignette so the headline floats out of the grid */
  .grid-fade {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(120% 90% at 50% 38%, transparent 0%, transparent 32%, rgba(5,5,7,0.55) 66%, var(--bg) 100%),
      radial-gradient(60% 50% at 50% 40%, var(--accent-dim) 0%, transparent 70%);
  }

  /* scanning sweep highlight that travels across the grid */
  .grid-scan {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: linear-gradient(105deg, transparent 38%, rgba(63,140,255,0.05) 50%, transparent 62%);
    background-size: 220% 100%;
    will-change: background-position;
    animation: scan 9s ease-in-out infinite;
  }
  @keyframes scan {
    0%   { background-position: 130% 0; }
    100% { background-position: -30% 0; }
  }

  /* ============================================================
     TOP NAV
     ============================================================ */
  .nav {
    position: relative;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px clamp(18px, 5vw, 56px);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    font-weight: 600;
    letter-spacing: -0.02em;
    font-size: 17px;
  }
  .brand .glyph {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border: 1px solid var(--card-bd);
    border-radius: 7px;
    background: linear-gradient(160deg, rgba(255,255,255,0.06), rgba(255,255,255,0));
  }
  .brand .glyph svg { width: 15px; height: 15px; }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 28px;
    font-size: 14px;
    color: var(--ink-dim);
  }
  .nav-links a { transition: color .18s ease; }
  .nav-links a:hover { color: var(--ink); }
  .nav-cta {
    border: 1px solid var(--card-bd);
    padding: 7px 15px;
    border-radius: 8px;
    color: var(--ink);
    font-size: 13.5px;
    background: rgba(255,255,255,0.03);
    transition: border-color .18s ease, background .18s ease;
  }
  .nav-cta:hover { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.06); }
  @media (max-width: 760px) {
    .nav-links a:not(.nav-cta) { display: none; }
  }

  /* ============================================================
     HERO CONTENT
     ============================================================ */
  .hero {
    position: relative;
    z-index: 3;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 28px clamp(18px, 5vw, 40px) 10px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-size: 12.5px;
    letter-spacing: 0.01em;
    color: var(--ink-dim);
    border: 1px solid var(--card-bd);
    background: rgba(255,255,255,0.025);
    padding: 6px 14px 6px 9px;
    border-radius: 999px;
    margin-bottom: 30px;
    backdrop-filter: blur(6px);
  }
  .pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(63,140,255,0.5);
    animation: ping 2.4s ease-out infinite;
  }
  @keyframes ping {
    0%   { box-shadow: 0 0 0 0 rgba(63,140,255,0.45); }
    70%  { box-shadow: 0 0 0 7px rgba(63,140,255,0); }
    100% { box-shadow: 0 0 0 0 rgba(63,140,255,0); }
  }
  .pill b { color: var(--ink); font-weight: 600; }

  h1 {
    font-weight: 600;
    letter-spacing: -0.035em;
    line-height: 0.98;
    font-size: clamp(40px, 8.2vw, 104px);
    max-width: 14ch;
    background: linear-gradient(180deg, #ffffff 30%, #b9b9c4 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  h1 .accent {
    background: linear-gradient(180deg, #79b2ff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .sub {
    margin-top: 26px;
    color: var(--ink-dim);
    font-size: clamp(14px, 1.5vw, 17px);
    max-width: 56ch;
    line-height: 1.6;
  }

  /* ============================================================
     CTA PAIR - install (mono command) + deploy
     ============================================================ */
  .cta-row {
    margin-top: 34px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-size: 14.5px;
    font-weight: 500;
    padding: 12px 20px;
    border-radius: 10px;
    border: 1px solid transparent;
    transition: transform .14s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    cursor: pointer;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--ink);
    color: #08080b;
    box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset, 0 6px 24px -6px rgba(63,140,255,0.45);
  }
  .btn-primary:hover { box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset, 0 10px 34px -6px rgba(63,140,255,0.6); }
  .btn-primary svg { width: 16px; height: 16px; }

  .btn-install {
    background: rgba(255,255,255,0.04);
    border-color: var(--card-bd);
    color: var(--ink);
    font-family: "JetBrains Mono", monospace;
    font-size: 13.5px;
    letter-spacing: -0.01em;
  }
  .btn-install:hover { border-color: rgba(255,255,255,0.24); background: rgba(255,255,255,0.07); }
  .btn-install .prompt { color: var(--accent); margin-right: 2px; }
  .btn-install .copy {
    margin-left: 6px; color: var(--ink-faint);
    border-left: 1px solid var(--card-bd);
    padding-left: 10px;
    transition: color .16s ease;
  }
  .btn-install:hover .copy { color: var(--ink-dim); }
  .btn-install.copied .copy { color: var(--accent); }

  /* ============================================================
     METRIC STRIP - small blueprint readouts (in first screen)
     ============================================================ */
  .metrics {
    position: relative;
    z-index: 3;
    display: flex;
    gap: clamp(20px, 5vw, 64px);
    justify-content: center;
    flex-wrap: wrap;
    padding: 6px clamp(18px,5vw,40px) 4px;
  }
  .metric { text-align: center; }
  .metric .num {
    font-family: "JetBrains Mono", monospace;
    font-size: clamp(18px, 2.4vw, 26px);
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .metric .num .u { color: var(--accent); }
  .metric .lab {
    margin-top: 3px;
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  /* ============================================================
     LOGO STRIP
     ============================================================ */
  .logos {
    position: relative;
    z-index: 3;
    border-top: 1px solid var(--line);
    margin-top: 26px;
    padding: 22px clamp(18px,5vw,40px) 30px;
  }
  .logos .cap {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 18px;
  }
  .logo-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: clamp(22px, 5vw, 56px);
  }
  .logo-row .lg {
    display: flex;
    align-items: center;
    gap: 9px;
    color: var(--ink-dim);
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
    opacity: 0.62;
    filter: grayscale(1);
    transition: opacity .2s ease, color .2s ease;
  }
  .logo-row .lg:hover { opacity: 1; color: var(--ink); }
  .logo-row .lg svg { width: 18px; height: 18px; flex: none; }
  .logo-row .lg img {
    width: 22px; height: 22px; border-radius: 5px; object-fit: cover;
    border: 1px solid var(--card-bd);
  }

  /* ============================================================
     REVEAL on load
     ============================================================ */
  .reveal { opacity: 0; transform: translateY(14px); }
  .ready .reveal {
    opacity: 1; transform: none;
    transition: opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1);
  }
  .ready .d1 { transition-delay: .05s; }
  .ready .d2 { transition-delay: .13s; }
  .ready .d3 { transition-delay: .21s; }
  .ready .d4 { transition-delay: .29s; }
  .ready .d5 { transition-delay: .37s; }
  .ready .d6 { transition-delay: .45s; }

  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 3px;
    border-radius: 6px;
  }

  /* ============================================================
     MOBILE - keep clean, grid scales, stack CTAs
     ============================================================ */
  @media (max-width: 640px) {
    :root { --grid-size: 24px; }
    .nav { padding: 16px 18px; }
    h1 { font-size: clamp(34px, 11vw, 56px); max-width: 16ch; }
    .sub { margin-top: 20px; }
    .cta-row { margin-top: 28px; flex-direction: column; width: 100%; max-width: 320px; }
    .cta-row .btn { width: 100%; justify-content: center; }
    .metrics { gap: 26px; }
    .grid-scan { display: none; } /* lighten paint on phones */
  }

  /* ============================================================
     REDUCED MOTION - disable all drift / scan / ping, final state
     ============================================================ */
  @media (prefers-reduced-motion: reduce) {
    .grid-dots, .grid-scan, .pill .dot { animation: none !important; }
    .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <!-- ===== signature blueprint grid (visible at scroll=0) ===== -->
    <div class="grid-lines" aria-hidden="true"></div>
    <div class="grid-major" aria-hidden="true"></div>
    <div class="grid-dots"  aria-hidden="true"></div>
    <div class="grid-scan"  aria-hidden="true"></div>
    <div class="grid-fade"  aria-hidden="true"></div>

    <!-- ===== nav ===== -->
    <nav class="nav reveal d1">
      <div class="brand">
        <span class="glyph" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
            <path d="M12 3 L21 8 V16 L12 21 L3 16 V8 Z"/>
            <path d="M12 12 L21 8 M12 12 V21 M12 12 L3 8"/>
          </svg>
        </span>
        <span id="brandName">Strata</span>
      </div>
      <div class="nav-links">
        <a href="#" id="nav1">Platform</a>
        <a href="#" id="nav2">Docs</a>
        <a href="#" id="nav3">Pricing</a>
        <a href="#" class="nav-cta" id="navCta">Sign in</a>
      </div>
    </nav>

    <!-- ===== hero ===== -->
    <section class="hero">
      <span class="pill reveal d2" id="pill">
        <span class="dot" aria-hidden="true"></span>
        <span><b id="pillBold">v4 edge runtime</b>&nbsp;<span id="pillRest">is now generally available</span></span>
      </span>

      <h1 class="reveal d3" id="headline"></h1>

      <p class="sub reveal d4" id="sub"></p>

      <div class="cta-row reveal d5">
        <button class="btn btn-primary" id="deployBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
          <span id="deployLabel">Deploy now</span>
        </button>
        <button class="btn btn-install" id="installBtn" aria-label="Copy install command">
          <span class="prompt">$</span><span id="installCmd">npx strata deploy</span>
          <span class="copy" id="copyLabel">copy</span>
        </button>
      </div>
    </section>

    <!-- ===== metric strip (still first screen) ===== -->
    <div class="metrics reveal d6" id="metrics"></div>

    <!-- ===== logo strip ===== -->
    <div class="logos reveal d6">
      <p class="cap" id="logoCap">Powering infrastructure for teams at</p>
      <div class="logo-row" id="logoRow"></div>
    </div>
  </main>

<script>
  /* ============================================================
     DATA - swap everything here to repurpose the template.
     Keep it monochrome + one accent for the Vercel register.
     ============================================================ */
  const DATA = {
    brand: "Strata",
    nav: { links: ["Platform", "Docs", "Pricing"], cta: "Sign in" },
    pill: { bold: "v4 edge runtime", rest: "is now generally available" },

    // headline: array of segments; {accent:true} colors the segment
    headline: [
      { t: "Ship to the edge " },
      { t: "in one command.", accent: true }
    ],

    sub: "Strata is the developer cloud for global apps. Zero config builds, instant rollbacks, and a blueprint-grade preview for every commit. Push code, we handle the rest.",

    deployLabel: "Deploy now",
    install: "npx strata deploy",   // copied to clipboard on click

    // small blueprint readouts. {u} = accent-colored unit/suffix
    metrics: [
      { num: "300",  u: "+", lab: "Edge regions" },
      { num: "40",   u: "ms", lab: "p95 cold start" },
      { num: "99.99","u": "%", lab: "Uptime SLA" },
      { num: "12",   u: "s",  lab: "Avg deploy" }
    ],

    logoCaption: "Powering infrastructure for teams at",
    // text marks read as authentic Vercel-register logos.
    // optional `img` swaps in an asset thumbnail (see ../assets/).
    logos: [
      { name: "Northwind",  icon: "hex" },
      { name: "Aperture",   icon: "ring" },
      { name: "Quanta",     icon: "tri" },
      { name: "Helios",     icon: "sun" },
      { name: "Beacon",     icon: "wave" },
      { name: "Continuum",  icon: "node" }
      // example asset-backed logo:
      // { name: "Mercedes", img: "../assets/flux-car-4k.png" }
    ]
  };

  /* ---- tiny inline logo glyph set (monochrome, stroke) ---- */
  const ICONS = {
    hex:  '<path d="M12 3 L20 7.5 V16.5 L12 21 L4 16.5 V7.5 Z"/>',
    ring: '<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/>',
    tri:  '<path d="M12 4 L20 19 H4 Z"/>',
    sun:  '<circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5 5l1.5 1.5M19 19l-1.5-1.5M19 5l-1.5 1.5M5 19l1.5-1.5"/>',
    wave: '<path d="M3 14c3-6 6 6 9 0s6-6 9 0"/>',
    node: '<circle cx="6" cy="12" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="18" cy="18" r="2.4"/><path d="M8 11l8-4M8 13l8 4"/>'
  };

  /* ---- render ---- */
  function el(id){ return document.getElementById(id); }

  el("brandName").textContent = DATA.brand;
  el("nav1").textContent = DATA.nav.links[0] || "";
  el("nav2").textContent = DATA.nav.links[1] || "";
  el("nav3").textContent = DATA.nav.links[2] || "";
  el("navCta").textContent = DATA.nav.cta;

  el("pillBold").textContent = DATA.pill.bold;
  el("pillRest").textContent = DATA.pill.rest;

  // headline with optional accent segments
  el("headline").innerHTML = DATA.headline.map(s =>
    s.accent ? '<span class="accent">'+s.t+'</span>' : s.t
  ).join("");

  el("sub").textContent = DATA.sub;
  el("deployLabel").textContent = DATA.deployLabel;
  el("installCmd").textContent = DATA.install;

  // metrics
  el("metrics").innerHTML = DATA.metrics.map(m =>
    '<div class="metric"><div class="num">'+m.num+'<span class="u">'+(m.u||"")+'</span></div>'+
    '<div class="lab">'+m.lab+'</div></div>'
  ).join("");

  // logos (text mark + glyph, or asset image)
  el("logoCap").textContent = DATA.logoCaption;
  el("logoRow").innerHTML = DATA.logos.map(l => {
    const mark = l.img
      ? '<img src="'+l.img+'" alt="" loading="lazy" />'
      : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+(ICONS[l.icon]||ICONS.hex)+'</svg>';
    return '<span class="lg">'+mark+'<span>'+l.name+'</span></span>';
  }).join("");

  /* ---- install copy-to-clipboard ---- */
  const installBtn = el("installBtn"), copyLabel = el("copyLabel");
  let copyTimer = null;
  installBtn.addEventListener("click", async () => {
    const cmd = DATA.install;
    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(cmd);
      } else {
        const ta = document.createElement("textarea");
        ta.value = cmd; ta.style.position = "fixed"; ta.style.opacity = "0";
        document.body.appendChild(ta); ta.select();
        document.execCommand("copy"); ta.remove();
      }
      installBtn.classList.add("copied");
      copyLabel.textContent = "copied";
      clearTimeout(copyTimer);
      copyTimer = setTimeout(() => {
        installBtn.classList.remove("copied");
        copyLabel.textContent = "copy";
      }, 1600);
    } catch (e) {
      copyLabel.textContent = "press Cmd+C";
    }
  });

  /* ---- reveal on load (skipped if reduced motion via CSS) ---- */
  requestAnimationFrame(() => {
    requestAnimationFrame(() => document.body.classList.add("ready"));
  });
</script>
</body>
</html>
