<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Command-K Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   ALL CONTENT LIVES IN THE WORKS ARRAY IN THE <script> BELOW.
   To reuse this template, edit that array only.
   ============================================================ */

:root{
  --void:#0f0f12;
  --void-2:#16161b;
  --bone:#f0ece4;
  --bone-dim:#a3a09a;
  --bone-faint:#5b594f;
  --cobalt:#3a7bd5;
  --cobalt-soft:rgba(58,123,213,.16);
  --amber:#e8c547;
  --line:rgba(240,236,228,.08);
  --line-2:rgba(240,236,228,.14);
  --modal-w:660px;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%}
body{
  background:var(--void);
  color:var(--bone);
  font-family:'Inter',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
  position:relative;
}

a{color:inherit}

/* ---------- BACKGROUND TYPOGRAPHIC INDEX ---------- */
.stage{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.topbar{
  flex:0 0 auto;
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:16px;
  padding:22px clamp(20px,5vw,64px) 18px;
  border-bottom:1px solid var(--line);
  z-index:2;
}
.brand{
  font-weight:800;
  font-size:clamp(15px,1.4vw,19px);
  letter-spacing:-.01em;
  display:flex;
  align-items:center;
  gap:11px;
}
.brand .dot{
  width:9px;height:9px;border-radius:50%;
  background:var(--cobalt);
  box-shadow:0 0 14px var(--cobalt);
}
.brand .meta{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.04em;
  color:var(--bone-dim);
  font-weight:400;
}
.topbar .hint{
  font-family:'JetBrains Mono',monospace;
  font-size:11.5px;
  color:var(--bone-dim);
  white-space:nowrap;
}
.topbar .hint b{
  color:var(--bone);
  background:var(--void-2);
  border:1px solid var(--line-2);
  border-radius:5px;
  padding:2px 6px;
  font-weight:500;
}

/* the index that sits behind the modal */
.index-wrap{
  flex:1 1 auto;
  position:relative;
  overflow:hidden;
}
.index{
  position:absolute;
  inset:0;
  padding:clamp(14px,3vh,30px) clamp(20px,5vw,64px) 80px;
  overflow:hidden;
}
.index-head{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--bone-faint);
  margin-bottom:10px;
}
.index-row{
  display:grid;
  grid-template-columns:46px 1fr auto;
  align-items:center;
  gap:18px;
  padding:clamp(7px,1.3vh,13px) 0;
  border-bottom:1px solid var(--line);
  font-weight:700;
  letter-spacing:-.02em;
  font-size:clamp(20px,3.4vw,40px);
  line-height:1;
  color:var(--bone-faint);
  transition:color .25s ease, opacity .25s ease;
}
.index-row .num{
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  font-weight:500;
  letter-spacing:0;
  color:var(--bone-faint);
}
.index-row .tags{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  font-weight:400;
  letter-spacing:.02em;
  color:var(--bone-faint);
  text-align:right;
}
/* the index is dim while the palette is the focus */
.scrim{
  position:absolute;
  inset:0;
  background:
    radial-gradient(120% 90% at 50% 0%, rgba(15,15,18,.28), rgba(15,15,18,.86) 70%);
  backdrop-filter:blur(1.5px);
  -webkit-backdrop-filter:blur(1.5px);
  z-index:1;
}

/* ---------- COMMAND PALETTE MODAL ---------- */
.palette{
  position:fixed;
  top:clamp(58px,12vh,140px);
  left:50%;
  transform:translateX(-50%);
  width:min(var(--modal-w),calc(100vw - 32px));
  z-index:20;
  background:rgba(20,20,25,.86);
  backdrop-filter:blur(22px) saturate(140%);
  -webkit-backdrop-filter:blur(22px) saturate(140%);
  border:1px solid var(--line-2);
  border-radius:16px;
  box-shadow:
    0 0 0 1px rgba(0,0,0,.4),
    0 40px 90px -20px rgba(0,0,0,.8),
    0 0 80px -30px var(--cobalt);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  max-height:min(74vh,640px);
}
.palette[hidden]{display:none}

.search{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:13px;
  padding:18px 20px;
  border-bottom:1px solid var(--line);
}
.search .glyph{
  flex:0 0 auto;
  color:var(--bone-dim);
  width:18px;height:18px;
  display:block;
}
.search-field{
  flex:1 1 auto;
  position:relative;
  display:flex;
  align-items:center;
}
.search input{
  width:100%;
  background:transparent;
  border:0;
  outline:0;
  color:var(--bone);
  font-family:'Inter',sans-serif;
  font-size:18px;
  font-weight:500;
  letter-spacing:-.01em;
  caret-color:var(--cobalt);
}
.search input::placeholder{color:var(--bone-faint)}
/* fake blinking caret so a static screenshot shows the cursor in the field */
.fake-caret{
  position:absolute;
  left:0;
  width:2px;
  height:22px;
  background:var(--cobalt);
  box-shadow:0 0 8px var(--cobalt);
  animation:blink 1.05s steps(1) infinite;
  pointer-events:none;
}
@keyframes blink{50%{opacity:0}}
.search .esc{
  flex:0 0 auto;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--bone-dim);
  border:1px solid var(--line-2);
  border-radius:5px;
  padding:3px 7px;
}

.results{
  flex:1 1 auto;
  overflow-y:auto;
  padding:8px;
  scrollbar-width:thin;
  scrollbar-color:var(--line-2) transparent;
}
.results::-webkit-scrollbar{width:8px}
.results::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px}

.group-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--bone-faint);
  padding:12px 12px 6px;
}

.opt{
  display:grid;
  grid-template-columns:34px 1fr auto;
  align-items:center;
  gap:14px;
  padding:11px 12px;
  border-radius:10px;
  cursor:pointer;
  scroll-margin:14px;
}
.opt .thumb{
  width:34px;height:34px;
  border-radius:7px;
  background-size:cover;
  background-position:center;
  border:1px solid var(--line-2);
  flex:0 0 auto;
}
.opt .body{min-width:0}
.opt .name{
  font-weight:600;
  font-size:15px;
  letter-spacing:-.01em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.opt .name mark{
  background:transparent;
  color:var(--cobalt);
  font-weight:800;
}
.opt .sub{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--bone-dim);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-top:2px;
}
.opt .badge{
  flex:0 0 auto;
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  font-weight:700;
  letter-spacing:.04em;
  color:var(--void);
  background:var(--amber);
  border-radius:5px;
  padding:3px 7px;
  text-transform:uppercase;
  box-shadow:0 1px 0 rgba(0,0,0,.3);
}
/* active match = cobalt highlight */
.opt.active{
  background:var(--cobalt-soft);
  box-shadow:inset 0 0 0 1px rgba(58,123,213,.45);
}
.opt.active .name{color:#dbe7fb}
.opt:hover:not(.active){background:rgba(240,236,228,.045)}

.empty{
  padding:34px 16px;
  text-align:center;
  color:var(--bone-dim);
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
}

.pal-foot{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:11px 16px;
  border-top:1px solid var(--line);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  color:var(--bone-dim);
}
.pal-foot .keys{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.pal-foot .kg{display:flex;align-items:center;gap:6px}
.pal-foot kbd{
  font-family:'JetBrains Mono',monospace;
  font-size:10.5px;
  color:var(--bone);
  background:var(--void-2);
  border:1px solid var(--line-2);
  border-bottom-width:2px;
  border-radius:5px;
  padding:2px 6px;
  min-width:20px;
  text-align:center;
}
.pal-foot .count{color:var(--bone-faint)}

/* ---------- ZOOMED WORK VIEW ---------- */
.viewer{
  position:fixed;
  inset:0;
  z-index:40;
  background:rgba(8,8,10,.96);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transition:opacity .28s ease;
}
.viewer.open{opacity:1;pointer-events:auto}
.viewer-top{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:18px clamp(18px,4vw,46px);
  border-bottom:1px solid var(--line);
}
.viewer-top .vtitle{
  font-weight:800;
  font-size:clamp(17px,2.2vw,26px);
  letter-spacing:-.02em;
}
.viewer-top .vmeta{
  font-family:'JetBrains Mono',monospace;
  font-size:11.5px;
  color:var(--bone-dim);
  margin-top:3px;
}
.viewer-close{
  flex:0 0 auto;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;
  color:var(--bone);
  background:var(--void-2);
  border:1px solid var(--line-2);
  border-radius:8px;
  padding:8px 13px;
  cursor:pointer;
  display:flex;align-items:center;gap:8px;
}
.viewer-close:hover{border-color:var(--cobalt)}
.viewer-close kbd{
  font-family:inherit;font-size:10px;color:var(--bone-dim);
  border:1px solid var(--line-2);border-radius:4px;padding:1px 5px;
}
.viewer-stage{
  flex:1 1 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:clamp(16px,3vw,40px);
  min-height:0;
}
/* media is letterboxed - never cover-cropped */
.viewer-media{
  max-width:min(1100px,100%);
  max-height:100%;
  width:auto;height:auto;
  display:block;
  border-radius:12px;
  border:1px solid var(--line-2);
  background:#000;
  object-fit:contain;
  box-shadow:0 40px 120px -30px rgba(0,0,0,.8);
}
.viewer-figure{
  display:flex;flex-direction:column;align-items:center;gap:16px;
  max-width:100%;max-height:100%;
}
.viewer-cap{
  max-width:760px;
  text-align:center;
  color:var(--bone-dim);
  font-size:14px;
  line-height:1.55;
}
.viewer-nav{
  flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;gap:18px;
  padding:14px;
  border-top:1px solid var(--line);
  font-family:'JetBrains Mono',monospace;
  font-size:11.5px;color:var(--bone-dim);
}
.viewer-nav kbd{
  font-family:inherit;font-size:10.5px;color:var(--bone);
  background:var(--void-2);border:1px solid var(--line-2);
  border-bottom-width:2px;border-radius:5px;padding:2px 6px;
}

/* ---------- FOCUS VISIBILITY ---------- */
:focus-visible{
  outline:2px solid var(--cobalt);
  outline-offset:3px;
  border-radius:6px;
}
.opt:focus-visible{outline-offset:-2px}

/* ---------- MOBILE ---------- */
@media (max-width:640px){
  :root{--modal-w:100%}
  .topbar{flex-wrap:wrap;padding:16px 18px 14px;gap:6px}
  .topbar .hint{font-size:10.5px;flex-basis:100%}
  .palette{
    top:10px;
    width:calc(100vw - 20px);
    max-height:calc(100vh - 20px);
    border-radius:14px;
  }
  .index{padding:14px 18px 60px}
  .index-row{
    grid-template-columns:34px 1fr;
    font-size:22px;
    gap:12px;
  }
  .index-row .tags{display:none}
  .opt{grid-template-columns:32px 1fr;gap:11px}
  .opt .badge{display:none}
  .opt .sub{font-size:10.5px}
  .pal-foot .keys{display:none}
  .search input{font-size:16px}
  .viewer-top{padding:14px 16px}
  .viewer-nav{font-size:10.5px;gap:10px}
}

/* ---------- REDUCED MOTION: kill blink + transitions, show final state ---------- */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.001ms !important;
  }
  .fake-caret{animation:none;opacity:1}
}
</style>
</head>
<body>

<!-- ============ BACKGROUND TYPOGRAPHIC INDEX ============ -->
<div class="stage" aria-hidden="false">
  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span>FIELD&thinsp;/&thinsp;NOTES</span>
      <span class="meta">studio index v3</span>
    </div>
    <div class="hint">press <b>Cmd</b> <b>K</b> to command  -  <b>type</b> to filter  -  <b>&uarr;&darr;</b> move  -  <b>&#9166;</b> open</div>
  </header>

  <div class="index-wrap">
    <div class="index" id="bgIndex" aria-hidden="true">
      <div class="index-head">// all works  -  filterable</div>
      <!-- rows injected by JS -->
    </div>
    <div class="scrim"></div>
  </div>
</div>

<!-- ============ COMMAND PALETTE MODAL ============ -->
<div class="palette" id="palette" role="dialog" aria-modal="true" aria-label="Command palette: search works">
  <div class="search">
    <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <div class="search-field">
      <span class="fake-caret" id="fakeCaret"></span>
      <input id="search" type="text" autocomplete="off" autocapitalize="off" spellcheck="false"
             placeholder="Search works, tools, tags ..." aria-label="Search works"
             aria-controls="results" role="combobox" aria-expanded="true" aria-autocomplete="list" />
    </div>
    <span class="esc">esc</span>
  </div>

  <div class="results" id="results" role="listbox" aria-label="Works">
    <!-- options injected by JS -->
  </div>

  <div class="pal-foot">
    <div class="keys">
      <span class="kg"><kbd>&uarr;</kbd><kbd>&darr;</kbd> navigate</span>
      <span class="kg"><kbd>&#9166;</kbd> open</span>
      <span class="kg"><kbd>esc</kbd> close</span>
    </div>
    <span class="count" id="count"></span>
  </div>
</div>

<!-- ============ ZOOMED WORK VIEWER ============ -->
<div class="viewer" id="viewer" role="dialog" aria-modal="true" aria-label="Work detail" aria-hidden="true">
  <div class="viewer-top">
    <div>
      <div class="vtitle" id="vTitle">Work</div>
      <div class="vmeta" id="vMeta">meta</div>
    </div>
    <button class="viewer-close" id="vClose">close <kbd>esc</kbd></button>
  </div>
  <div class="viewer-stage">
    <figure class="viewer-figure">
      <div id="vMediaSlot"></div>
      <figcaption class="viewer-cap" id="vCap"></figcaption>
    </figure>
  </div>
  <div class="viewer-nav">
    <span><kbd>&larr;</kbd><kbd>&rarr;</kbd> prev / next work</span>
    <span><kbd>esc</kbd> back to palette</span>
  </div>
</div>

<script>
/* ============================================================
   WORKS  -  THE ONLY THING YOU EDIT TO REUSE THIS TEMPLATE.
   Each entry:
     id      stable key
     title   work name (shown in index + palette + viewer)
     client  short subtitle / role line
     tags    array of keywords (searchable, shown right of index row)
     badge   short amber shortcut/label chip (e.g. command alias)  - optional
     type    "image" | "video"
     src     media path (relative to this file, reuse ../assets/)
     poster  poster image for video (or fallback) - relative path
     caption one-line description shown under the zoomed media
   ============================================================ */
const WORKS = [
  {
    id:"nocturne",
    title:"Nocturne Drive",
    client:"Automotive film  /  direction + grade",
    tags:["film","automotive","grade"],
    badge:"go car",
    type:"video",
    src:"../assets/flux-car-i2v.mp4",
    poster:"../assets/gen/poster-flux-car-i2v.png",
    caption:"Matte-black coupe on a rain-slicked neon street. Looping i2v plate, regraded for a cobalt-and-amber night mood."
  },
  {
    id:"showroom",
    title:"Showroom Still",
    client:"Key art  /  cinematic still",
    tags:["still","key-art","automotive"],
    badge:"go still",
    type:"image",
    src:"../assets/flux-car-4k.png",
    poster:"../assets/flux-car-4k.png",
    caption:"4K hero still of the same vehicle. Wet asphalt reflections carry the signage glow into the bodywork."
  },
  {
    id:"clinic",
    title:"Mint and Wood Clinic",
    client:"Brand environment  /  interior viz",
    tags:["interior","brand","health"],
    badge:"go clinic",
    type:"image",
    src:"../assets/flux-clinic-4k.png",
    poster:"../assets/flux-clinic-4k.png",
    caption:"Calm dental-clinic interior in mint and warm wood. Used as the anchor frame for a care-brand identity system."
  },
  {
    id:"kinetic",
    title:"Kinetic Loop A",
    client:"Motion study  /  generative",
    tags:["motion","loop","generative"],
    badge:"go loop",
    type:"video",
    src:"../assets/kling-video.mp4",
    poster:"../assets/gen/poster-kling-video.png",
    caption:"Seamless generative loop. Letterboxed and color-locked so it can drop into a wall of stills without clashing."
  },
  {
    id:"fold",
    title:"Fold Sequence",
    client:"Title sequence  /  abstract",
    tags:["title","abstract","sequence"],
    badge:"go fold",
    type:"video",
    src:"../assets/fal-video.mp4",
    poster:"../assets/gen/poster-fal-video.png",
    caption:"Abstract fold sequence built for a title card. Plays only when focused so the index never decodes everything at once."
  },
  {
    id:"presenter",
    title:"The Presenter",
    client:"Avatar spot  /  spokesperson",
    tags:["avatar","spokesperson","spot"],
    badge:"go talk",
    type:"video",
    src:"../assets/heygen-avatar.mp4",
    poster:"../assets/gen/poster-heygen.png",
    caption:"Synthetic presenter spot. Single locked frame in the index, full playback only inside the zoomed viewer."
  },
  {
    id:"establishing",
    title:"Establishing Shot",
    client:"Environment film  /  veo plate",
    tags:["environment","film","plate"],
    badge:"go shot",
    type:"video",
    src:"../assets/veo-video.mp4",
    poster:"../assets/gen/poster-veo-video.png",
    caption:"Wide establishing plate. Reserved for the open of a brand film, letterboxed to keep its cinematic crop intact."
  },
  {
    id:"fox",
    title:"Autumn Fox",
    client:"Illustration  /  painterly render",
    tags:["illustration","painterly","character"],
    badge:"go fox",
    type:"image",
    src:"../assets/sdxl.png",
    poster:"../assets/sdxl.png",
    caption:"Painterly autumn fox. A character study used to set the warmer, hand-touched register of the studio's range."
  },
  {
    id:"apple",
    title:"Low-Fi Apple",
    client:"Texture study  /  abstract",
    tags:["texture","abstract","study"],
    badge:"go apple",
    type:"image",
    src:"../assets/hf-tinysd.png",
    poster:"../assets/hf-tinysd.png",
    caption:"Deliberately low-fidelity apple. Kept in the index as a texture and grain reference for downstream comps."
  }
];

/* ============================================================
   ENGINE  -  no edits needed below to swap content.
   ============================================================ */
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const els = {
  bgIndex: document.getElementById('bgIndex'),
  palette: document.getElementById('palette'),
  search:  document.getElementById('search'),
  results: document.getElementById('results'),
  count:   document.getElementById('count'),
  caret:   document.getElementById('fakeCaret'),
  viewer:  document.getElementById('viewer'),
  vTitle:  document.getElementById('vTitle'),
  vMeta:   document.getElementById('vMeta'),
  vCap:    document.getElementById('vCap'),
  vSlot:   document.getElementById('vMediaSlot'),
  vClose:  document.getElementById('vClose')
};

let filtered = WORKS.slice();
let active = 0;            // index into `filtered`
let viewerIndex = -1;      // index into WORKS while zoomed
let activeMedia = null;    // currently playing <video> in viewer

/* ---- build the dim background index once ---- */
(function buildBgIndex(){
  WORKS.forEach((w, i) => {
    const row = document.createElement('div');
    row.className = 'index-row';
    row.innerHTML =
      '<span class="num">' + String(i + 1).padStart(2,'0') + '</span>' +
      '<span class="ttl">' + escapeHtml(w.title) + '</span>' +
      '<span class="tags">' + w.tags.join(' &middot; ') + '</span>';
    els.bgIndex.appendChild(row);
  });
})();

/* ---- escaping + match helpers ---- */
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}
function haystack(w){
  // search across every author-facing field so intuitive queries land
  // (e.g. "car" matches the automotive works via their badge + caption)
  return (w.title + ' ' + w.client + ' ' + w.tags.join(' ') +
          ' ' + (w.badge || '') + ' ' + (w.caption || '')).toLowerCase();
}
function highlight(title, q){
  if(!q) return escapeHtml(title);
  const lo = title.toLowerCase();
  const idx = lo.indexOf(q.toLowerCase());
  if(idx === -1) return escapeHtml(title);
  return escapeHtml(title.slice(0, idx)) +
    '<mark>' + escapeHtml(title.slice(idx, idx + q.length)) + '</mark>' +
    escapeHtml(title.slice(idx + q.length));
}

/* ---- filter + render the palette options ---- */
function render(){
  const q = els.search.value.trim().toLowerCase();
  filtered = q ? WORKS.filter(w => haystack(w).includes(q)) : WORKS.slice();
  if(active >= filtered.length) active = Math.max(0, filtered.length - 1);

  els.results.innerHTML = '';

  if(filtered.length === 0){
    const e = document.createElement('div');
    e.className = 'empty';
    e.textContent = 'No works match "' + els.search.value.trim() + '"';
    els.results.appendChild(e);
    els.count.textContent = '0 results';
    dimBgIndex(q);
    return;
  }

  const label = document.createElement('div');
  label.className = 'group-label';
  label.textContent = q ? 'matches' : 'works  -  ' + WORKS.length;
  els.results.appendChild(label);

  filtered.forEach((w, i) => {
    const opt = document.createElement('div');
    opt.className = 'opt' + (i === active ? ' active' : '');
    opt.id = 'opt-' + w.id;
    opt.setAttribute('role','option');
    opt.setAttribute('aria-selected', i === active ? 'true' : 'false');
    opt.tabIndex = -1;
    opt.dataset.idx = i;

    const badge = w.badge ? '<span class="badge">' + escapeHtml(w.badge) + '</span>' : '';
    opt.innerHTML =
      '<span class="thumb" style="background-image:url(' + w.poster + ')"></span>' +
      '<span class="body">' +
        '<span class="name">' + highlight(w.title, q) + '</span>' +
        '<span class="sub">' + escapeHtml(w.client) + '</span>' +
      '</span>' +
      badge;

    opt.addEventListener('mouseenter', () => { active = i; syncActive(); });
    opt.addEventListener('click', () => { active = i; openViewer(); });
    els.results.appendChild(opt);
  });

  els.count.textContent = filtered.length + (filtered.length === 1 ? ' result' : ' results');
  syncActive(false);
  dimBgIndex(q);
}

/* keep the dim background index in sync with the filter */
function dimBgIndex(q){
  const rows = els.bgIndex.querySelectorAll('.index-row');
  rows.forEach((row, i) => {
    const w = WORKS[i];
    const match = !q || haystack(w).includes(q);
    row.style.opacity = match ? '1' : '.18';
    row.style.color = (filtered[active] && filtered[active].id === w.id)
      ? 'var(--cobalt)'
      : (match ? 'var(--bone-dim)' : 'var(--bone-faint)');
  });
}

/* mark the active option + scroll it into view */
function syncActive(scroll = true){
  const opts = els.results.querySelectorAll('.opt');
  opts.forEach((o) => {
    const i = Number(o.dataset.idx);
    const on = i === active;
    o.classList.toggle('active', on);
    o.setAttribute('aria-selected', on ? 'true' : 'false');
    if(on){
      els.search.setAttribute('aria-activedescendant', o.id);
      if(scroll) o.scrollIntoView({block:'nearest', behavior: reduceMotion ? 'auto' : 'smooth'});
    }
  });
  dimBgIndex(els.search.value.trim().toLowerCase());
}

/* ---- caret position follows typed text (so the blink sits after input) ---- */
function placeCaret(){
  // measure text width via a hidden span
  const input = els.search;
  if(document.activeElement === input && input.value.length){
    els.caret.style.display = 'none';
    return;
  }
  els.caret.style.display = 'block';
  els.caret.style.left = '0px';
}

/* ============ PALETTE OPEN / CLOSE ============ */
function openPalette(){
  els.palette.hidden = false;
  els.search.focus({preventScroll:true});
  els.search.setSelectionRange(els.search.value.length, els.search.value.length);
  placeCaret();
}
function closePalette(){
  // never fully removes it on desktop entry; used when leaving to viewer
  els.palette.hidden = true;
}

/* ============ VIEWER (zoom selected work) ============ */
function openViewer(){
  const w = filtered[active];
  if(!w) return;
  viewerIndex = WORKS.indexOf(w);
  paintViewer();
  els.viewer.classList.add('open');
  els.viewer.setAttribute('aria-hidden','false');
  closePalette();
  els.vClose.focus({preventScroll:true});
}

function paintViewer(){
  const w = WORKS[viewerIndex];
  if(!w) return;
  stopActiveMedia();

  els.vTitle.textContent = w.title;
  els.vMeta.textContent = w.client + '   //   ' + w.tags.join(' . ');
  els.vCap.textContent = w.caption;
  els.vSlot.innerHTML = '';

  if(w.type === 'video'){
    const v = document.createElement('video');
    v.className = 'viewer-media';
    v.src = w.src;
    v.poster = w.poster;
    v.playsInline = true;
    v.loop = true;
    v.controls = false;
    v.muted = true;          // muted so autoplay is allowed; only ONE plays at a time
    v.preload = 'metadata';
    els.vSlot.appendChild(v);
    activeMedia = v;
    if(!reduceMotion){
      v.play().catch(()=>{ /* poster stays if blocked */ });
    }
  } else {
    const img = document.createElement('img');
    img.className = 'viewer-media';
    img.src = w.src;
    img.alt = w.title + ' - ' + w.caption;
    img.loading = 'eager';
    els.vSlot.appendChild(img);
  }
}

function stopActiveMedia(){
  if(activeMedia){
    try{ activeMedia.pause(); }catch(e){}
    activeMedia.removeAttribute('src');
    activeMedia.load && activeMedia.load();
    activeMedia = null;
  }
}

function closeViewer(){
  els.viewer.classList.remove('open');
  els.viewer.setAttribute('aria-hidden','true');
  stopActiveMedia();
  viewerIndex = -1;
  openPalette();
}

function stepViewer(dir){
  if(viewerIndex < 0) return;
  viewerIndex = (viewerIndex + dir + WORKS.length) % WORKS.length;
  paintViewer();
}

/* ============ KEYBOARD ============ */
document.addEventListener('keydown', (e) => {
  const cmdK = (e.key === 'k' || e.key === 'K') && (e.metaKey || e.ctrlKey);
  const slash = e.key === '/' && document.activeElement !== els.search && !els.viewer.classList.contains('open');

  // global open
  if(cmdK || slash){
    e.preventDefault();
    if(els.viewer.classList.contains('open')) closeViewer();
    openPalette();
    return;
  }

  // viewer-scoped keys
  if(els.viewer.classList.contains('open')){
    if(e.key === 'Escape'){ e.preventDefault(); closeViewer(); }
    else if(e.key === 'ArrowRight'){ e.preventDefault(); stepViewer(1); }
    else if(e.key === 'ArrowLeft'){ e.preventDefault(); stepViewer(-1); }
    return;
  }

  // palette-scoped keys (palette is the default surface)
  if(els.palette.hidden) return;

  switch(e.key){
    case 'ArrowDown':
      e.preventDefault();
      if(filtered.length){ active = (active + 1) % filtered.length; syncActive(); }
      break;
    case 'ArrowUp':
      e.preventDefault();
      if(filtered.length){ active = (active - 1 + filtered.length) % filtered.length; syncActive(); }
      break;
    case 'Enter':
      e.preventDefault();
      if(filtered.length) openViewer();
      break;
    case 'Escape':
      // re-focus the field / clear query instead of leaving the user stranded
      e.preventDefault();
      if(els.search.value){ els.search.value = ''; active = 0; render(); }
      els.search.focus();
      break;
    case 'Home':
      e.preventDefault(); active = 0; syncActive(); break;
    case 'End':
      e.preventDefault(); active = filtered.length - 1; syncActive(); break;
  }
});

els.search.addEventListener('input', () => { active = 0; render(); placeCaret(); });
els.search.addEventListener('focus', placeCaret);
els.search.addEventListener('blur', placeCaret);
els.vClose.addEventListener('click', closeViewer);

// click the dim background to (re)focus the palette field
document.querySelector('.scrim').addEventListener('click', () => { openPalette(); });

/* ============ BOOT  -  palette is OPEN on load (signature at scroll=0) ============ */
render();
openPalette();
</script>
</body>
</html>
