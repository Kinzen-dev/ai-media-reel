<!-- TEMPLATE: Pasted | ARCHETYPE: scrapbook | REF: Jackie Hu portfolio + KidCore collage 2026, Toilet Paper Barcelona mixed-media maximalism | WHEN TO USE: warm, hand-made, maximalist showcase where each work should feel physically taped onto a page (portfolios, lookbooks, zines, studio sites) | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pasted - a scrapbook showcase</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Gloria+Hallelujah&family=Special+Elite&family=Archivo+Black&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   PASTED - mixed-media scrapbook showcase
   Texture system: torn-paper CSS clip-paths, washi-tape strips,
   inline-SVG paper noise, coffee-ring radial gradients.
   No raster texture fetches. All clip-paths pure CSS.
   ============================================================ */

:root{
  --cream:#f4f0e0;        /* scrapbook page */
  --cream-deep:#e9e2c9;   /* darker paper for layering */
  --paper:#fbf8ee;        /* card stock (lighter than page) */
  --washi:#d62828;        /* washi-tape red */
  --washi-soft:rgba(214,40,40,.62);
  --ink:#222018;          /* hand ink */
  --ink-soft:#5a5446;
  --mustard:#e3a72f;      /* secondary stamp color */
  --teal:#2a6f6b;         /* tertiary accent */
  --shadow:rgba(40,34,20,.30);
  --tape-h:34px;
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}

body{
  margin:0;
  background:var(--cream);
  color:var(--ink);
  font-family:'Special Elite',Georgia,serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  position:relative;
}

/* --- global paper grain: tiled inline-SVG turbulence, fixed, cheap --- */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.55;
  mix-blend-mode:multiply;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.45'/></svg>");
  background-size:220px 220px;
}
/* warm vignette so edges feel like an aged page */
body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:radial-gradient(120% 120% at 50% 30%,transparent 55%,rgba(120,100,60,.16) 100%);
}

a{color:inherit}
img,video{display:block;max-width:100%}

/* ---------- HEADER / cover spread ---------- */
.cover{
  position:relative;
  z-index:1;
  min-height:100svh;
  padding:clamp(28px,6vw,80px);
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.cover-eyebrow{
  font-family:'Caveat',cursive;
  font-size:clamp(22px,3.5vw,34px);
  color:var(--washi);
  transform:rotate(-3deg);
  margin:0 0 .2em;
}
.cover h1{
  font-family:'Archivo Black',sans-serif;
  font-weight:400;
  font-size:clamp(56px,17vw,200px);
  line-height:.82;
  letter-spacing:-.02em;
  margin:0;
  color:var(--ink);
  text-transform:uppercase;
  max-width:11ch;
}
.cover h1 .accent{color:var(--washi);display:inline-block;transform:rotate(-2deg)}
.cover-sub{
  font-family:'Gloria Hallelujah',cursive;
  font-size:clamp(15px,2.2vw,22px);
  color:var(--ink-soft);
  max-width:46ch;
  margin:clamp(20px,3vw,34px) 0 0;
  line-height:1.6;
  transform:rotate(.4deg);
}
/* a couple of pasted decorations on the cover */
.cover-stamp{
  position:absolute;
  font-family:'Special Elite';
  font-size:13px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--washi);
  border:2.5px solid var(--washi);
  border-radius:50%;
  width:118px;height:118px;
  display:flex;align-items:center;justify-content:center;text-align:center;
  padding:10px;line-height:1.25;
  opacity:.82;
  mix-blend-mode:multiply;
}
.cover-stamp.s1{top:7%;right:8%;transform:rotate(13deg)}
.cover-stamp.s2{bottom:11%;right:14%;transform:rotate(-9deg);border-color:var(--teal);color:var(--teal);width:96px;height:96px}
.scroll-hint{
  position:absolute;
  bottom:clamp(18px,3vw,34px);
  left:clamp(28px,6vw,80px);
  font-family:'Caveat',cursive;
  font-size:24px;
  color:var(--ink-soft);
  display:flex;align-items:center;gap:8px;
}
.scroll-hint svg{animation:bob 1.8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
@media (prefers-reduced-motion:reduce){.scroll-hint svg{animation:none}}

/* ---------- SPREAD layout ---------- */
.spread{
  position:relative;
  z-index:1;
  padding:clamp(54px,9vw,130px) clamp(20px,5vw,70px);
  max-width:1240px;
  margin:0 auto;
}
.spread-head{
  position:relative;
  margin:0 0 clamp(20px,4vw,48px);
  max-width:760px;
}
.spread-num{
  font-family:'Caveat',cursive;
  font-size:clamp(26px,4vw,42px);
  color:var(--washi);
  transform:rotate(-4deg);
  display:inline-block;
}
.spread-title{
  font-family:'Archivo Black',sans-serif;
  font-weight:400;
  font-size:clamp(30px,6vw,62px);
  line-height:.95;
  margin:.1em 0 0;
  text-transform:uppercase;
  letter-spacing:-.01em;
}
.spread-note{
  font-family:'Gloria Hallelujah',cursive;
  font-size:clamp(14px,1.9vw,18px);
  color:var(--ink-soft);
  margin:.7em 0 0;
  line-height:1.55;
  transform:rotate(.3deg);
}

/* the non-grid canvas: items absolutely placed on desktop */
.canvas{position:relative;min-height:60px}

/* ---------- CARD (a pasted work) ---------- */
.card{
  position:relative;
  background:var(--paper);
  padding:14px 14px 18px;
  box-shadow:3px 5px 0 rgba(40,34,20,.10), 6px 9px 22px var(--shadow);
  transition:transform .45s cubic-bezier(.2,.9,.25,1), box-shadow .45s ease, filter .45s ease;
  cursor:pointer;
  /* torn-paper bottom-and-sides edge */
  clip-path:polygon(
    0% 2%, 4% 0%, 13% 3%, 26% 0.5%, 38% 3%, 52% 0%, 64% 3%, 78% 0.5%, 90% 3%, 97% 0%, 100% 3%,
    99% 16%, 100% 31%, 98% 48%, 100% 63%, 99% 78%, 100% 92%, 96% 100%, 84% 97%,
    70% 100%, 56% 97%, 42% 100%, 28% 97%, 14% 100%, 4% 98%, 0% 95%,
    1% 80%, 0% 64%, 2% 49%, 0% 33%, 1% 18%
  );
  will-change:transform;
}
.card .frame{
  position:relative;
  overflow:hidden;
  background:var(--cream-deep);
  border-radius:2px;
}
.card .frame::after{ /* inner paper noise on the media mat */
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='m'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23m)' opacity='0.10'/></svg>");
  mix-blend-mode:multiply;opacity:.5;
}
.card .media{
  display:block;width:100%;height:100%;
  object-fit:cover;object-position:center;
  background:var(--cream-deep);
}
/* landscape media on desktop cards keep a fixed mat ratio */
.card.r-land .frame{aspect-ratio:16/9}
.card.r-square .frame{aspect-ratio:1/1}
.card.r-wide .frame{aspect-ratio:6/1}
.card.r-port .frame{aspect-ratio:4/5}

.card .cap{
  display:flex;align-items:baseline;gap:10px;justify-content:space-between;
  margin:12px 4px 2px;
}
.card .cap h3{
  font-family:'Archivo Black',sans-serif;font-weight:400;
  font-size:clamp(15px,2vw,20px);margin:0;text-transform:uppercase;letter-spacing:-.01em;
}
.card .cap .kind{
  font-family:'Caveat',cursive;font-size:19px;color:var(--washi);
  transform:rotate(-3deg);white-space:nowrap;
}
.card .desc{
  font-family:'Special Elite';font-size:12.5px;color:var(--ink-soft);
  margin:4px 4px 0;line-height:1.5;
}

/* WASHI TAPE strips - pseudo elements pinned over the card corners */
.tape{
  position:absolute;
  width:96px;height:var(--tape-h);
  background:
    repeating-linear-gradient(45deg, rgba(255,255,255,.22) 0 7px, transparent 7px 14px),
    var(--washi-soft);
  box-shadow:0 2px 6px rgba(40,34,20,.22);
  mix-blend-mode:multiply;
  z-index:3;
  pointer-events:none;
  /* slightly torn tape ends */
  clip-path:polygon(0 14%,8% 0,16% 12%,26% 2%,100% 0,100% 100%,30% 96%,18% 100%,9% 90%,0 98%);
}
.tape.t-top{top:-15px;left:50%;transform:translateX(-50%) rotate(-2deg)}
.tape.t-tl{top:-13px;left:-18px;transform:rotate(-38deg)}
.tape.t-tr{top:-13px;right:-18px;transform:rotate(40deg)}
.tape.t-bl{bottom:-13px;left:-16px;transform:rotate(38deg)}
.tape.alt{background:
    repeating-linear-gradient(45deg, rgba(255,255,255,.20) 0 7px, transparent 7px 14px),
    rgba(227,167,47,.66)}
.tape.alt2{background:
    repeating-linear-gradient(45deg, rgba(255,255,255,.18) 0 7px, transparent 7px 14px),
    rgba(42,111,107,.55)}

/* HOVER: lift, straighten (unstick the tape), deepen shadow */
@media (hover:hover){
  .card:hover,.card:focus-visible{
    transform:rotate(0deg) translateY(-10px) scale(1.025) !important;
    box-shadow:5px 8px 0 rgba(40,34,20,.10), 14px 22px 46px rgba(40,34,20,.42);
    z-index:20;
    filter:saturate(1.05);
  }
}
.card:focus-visible{
  outline:3px dashed var(--washi);
  outline-offset:6px;
}
.card.playing{z-index:25}

/* play badge on video cards */
.play-badge{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:62px;height:62px;border-radius:50%;
  background:rgba(251,248,238,.92);
  border:3px solid var(--washi);
  display:flex;align-items:center;justify-content:center;
  z-index:4;pointer-events:none;
  box-shadow:0 4px 14px rgba(40,34,20,.3);
  transition:opacity .3s ease, transform .3s ease;
}
.play-badge svg{margin-left:4px}
.card.playing .play-badge{opacity:0;transform:translate(-50%,-50%) scale(.6)}
.media-wrap{position:relative;width:100%;height:100%}
.media-wrap video{opacity:0;transition:opacity .35s ease;position:absolute;inset:0}
.card.playing .media-wrap video{opacity:1}

/* small "scrap" decorations placed around cards on a canvas */
.scrap{
  position:absolute;z-index:2;pointer-events:none;
  font-family:'Gloria Hallelujah',cursive;
  font-size:15px;color:var(--ink-soft);
  max-width:170px;line-height:1.4;
}
.scrap.tag{
  font-family:'Special Elite';
  background:var(--mustard);color:var(--ink);
  padding:5px 12px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;
  box-shadow:2px 3px 0 rgba(40,34,20,.18);
  clip-path:polygon(0 0,100% 0,100% 70%,90% 100%,0 100%);
}
.scrap .doodle{display:block}

/* a hand-drawn SVG arrow annotation */
.annot{position:absolute;z-index:6;pointer-events:none}
.annot text{font-family:'Caveat',cursive;fill:var(--washi);font-size:26px}
.annot path{fill:none;stroke:var(--washi);stroke-width:2.4;stroke-linecap:round}

/* ---------- reveal animation ---------- */
.reveal{opacity:0;transform:translateY(34px) rotate(var(--r,0deg))}
.reveal.in{
  opacity:1;transform:translateY(0) rotate(var(--r,0deg));
  transition:opacity .8s ease, transform .9s cubic-bezier(.2,.85,.25,1);
}
@media (prefers-reduced-motion:reduce){
  .reveal{opacity:1 !important;transform:none !important}
  .card{transition:none !important}
  .card.r-rot{transform:rotate(var(--r,0deg))}
  /* no positional lift/scale on hover under reduced motion: keep resting tilt, only deepen shadow */
  .card:hover,.card:focus-visible{transform:rotate(var(--r,0deg)) !important}
}

/* ---------- FOOTER spread ---------- */
.outro{
  position:relative;z-index:1;text-align:center;
  padding:clamp(70px,12vw,150px) 20px clamp(50px,8vw,90px);
}
.outro .scribble{
  font-family:'Caveat',cursive;font-size:clamp(30px,7vw,72px);
  color:var(--washi);transform:rotate(-3deg);line-height:1.05;margin:0 auto;max-width:16ch;
}
.outro .small{
  font-family:'Special Elite';font-size:13px;color:var(--ink-soft);
  letter-spacing:.12em;text-transform:uppercase;margin-top:28px;
}
.outro .torn-divider{
  height:26px;max-width:280px;margin:34px auto 0;
  background:var(--washi-soft);mix-blend-mode:multiply;
  clip-path:polygon(0 40%,6% 10%,12% 55%,20% 5%,28% 60%,36% 12%,44% 58%,52% 8%,60% 60%,68% 14%,76% 56%,84% 6%,92% 58%,100% 30%,100% 100%,0 100%);
}

/* ============================================================
   DESKTOP collage positioning (>=860px).
   Each card on a canvas gets absolute placement + a base tilt.
   The CSS custom props --r set the resting rotation.
   ============================================================ */
@media (min-width:860px){
  .card.r-rot{transform:rotate(var(--r,0deg))}
  .canvas{min-height:560px}

  /* Spread A - 3 works, deliberate overlap + white gap upper-right */
  #cv-a{min-height:600px}
  #cv-a .pos-1{position:absolute;width:46%;left:0;top:24px;--r:-3.5deg}
  #cv-a .pos-2{position:absolute;width:34%;right:2%;top:0;--r:4deg}
  #cv-a .pos-3{position:absolute;width:40%;left:38%;top:300px;--r:-1.5deg;z-index:5}

  /* Spread B - 4 works, mixed sizes, intentional negative space center-left */
  #cv-b{min-height:760px}
  #cv-b .pos-1{position:absolute;width:38%;right:0;top:10px;--r:3deg}
  #cv-b .pos-2{position:absolute;width:30%;left:4%;top:80px;--r:-4.5deg}
  #cv-b .pos-3{position:absolute;width:44%;left:18%;top:360px;--r:2deg;z-index:6}
  #cv-b .pos-4{position:absolute;width:26%;right:6%;top:430px;--r:-3deg}

  /* Spread C - audio + 3D, banner waveform + square thumb */
  #cv-c{min-height:560px}
  #cv-c .pos-1{position:absolute;width:60%;left:2%;top:20px;--r:-2deg}
  #cv-c .pos-2{position:absolute;width:30%;right:3%;top:60px;--r:4.5deg}
  #cv-c .pos-3{position:absolute;width:40%;left:14%;top:300px;--r:1.5deg;z-index:5}
}

/* ============================================================
   MOBILE / tablet (<860px): single-column vertical scrapbook.
   Tape strip moves to the TOP of every card.
   Landscape + wide media is LETTERBOXED, never cover-cropped.
   ============================================================ */
@media (max-width:859px){
  .canvas{display:flex;flex-direction:column;gap:46px;align-items:center;min-height:0}
  .card{
    position:relative !important;
    width:100% !important;max-width:440px;
    transform:rotate(var(--mr,-1.5deg));
    margin:0 auto;
  }
  .card:nth-child(even){--mr:1.5deg}
  .card:nth-child(3n){--mr:-2.2deg}
  /* hide messy corner tapes, force one clean top strip per card */
  .tape{display:none}
  .tape.m-top{
    display:block;top:-14px;left:50%;transform:translateX(-50%) rotate(-2deg);width:120px;
  }
  /* LETTERBOX: contain landscape/wide media inside a fixed mat, no crop */
  .card.r-land .frame,.card.r-wide .frame{aspect-ratio:16/9;background:#15130d}
  .card.r-land .media,.card.r-wide .media,
  .card.r-land .media-wrap video,.card.r-wide .media-wrap video{
    object-fit:contain !important;
  }
  .card.r-square .frame{aspect-ratio:1/1}
  .card.r-port .frame{aspect-ratio:4/5}
  /* absolutely-positioned scraps/annotations are desktop-only flourishes */
  .scrap,.annot{display:none}
  .spread{padding-left:18px;padding-right:18px}
}

/* ============================================================
   PHONE (<=640px): hard guarantee against cover-crop on every
   ratio. Landscape/wide already letterbox above; here we also
   contain square/portrait media so nothing is silently cropped
   on a narrow screen. Belt-and-suspenders over the 859px rules.
   ============================================================ */
@media (max-width:640px){
  .card .media,.card .media-wrap video{
    object-fit:contain !important;
    background:#15130d;
  }
  /* give every mat a stable frame so contained media letterboxes cleanly */
  .card .frame{background:#15130d}
}

/* very small phones: keep h1 from clipping */
@media (max-width:400px){
  .cover h1{font-size:clamp(46px,15vw,60px)}
  .cover-stamp.s1{width:92px;height:92px;font-size:11px;top:5%;right:5%}
  .cover-stamp.s2{display:none}
}
</style>
</head>
<body>

<!-- ============================================================
     DATA - swap these objects to repaste the whole scrapbook.
     kind: 'image' | 'video'  (video needs src + poster)
     ratio: 'land'(16:9) | 'square'(1:1) | 'wide'(6:1) | 'port'(4:5)
     Posters/sources are relative to ../assets/ from this file.
     ============================================================ -->
<script>

</script>

<!-- COVER -->
<header class="cover" id="top">
  <p class="cover-eyebrow" data-bind="eyebrow"></p>
  <h1><span data-bind="titleA"></span><br><span class="accent" data-bind="titleB"></span></h1>
  <p class="cover-sub" data-bind="sub"></p>
  <div class="cover-stamp s1" data-bind="stamp1"></div>
  <div class="cover-stamp s2" data-bind="stamp2"></div>
  <div class="scroll-hint">
    flip the page
    <svg width="20" height="26" viewBox="0 0 20 26" aria-hidden="true">
      <path d="M10 2 L10 22 M3 15 L10 23 L17 15" fill="none" stroke="#5a5446" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
</header>

<main id="spreads"></main>

<!-- OUTRO -->
<footer class="outro">
  <div class="torn-divider" aria-hidden="true"></div>
  <p class="scribble" data-bind="outroLine"></p>
  <p class="small" data-bind="outroSmall"></p>
</footer>

<script>
/* ============================================================
   RENDER - build spreads + cards from DATA.
   ============================================================ */
const $ = (s,r=document)=>r.querySelector(s);
const reduceMotion = matchMedia('(prefers-reduced-motion:reduce)').matches;

/* bind simple text fields */
const B = DATA.brand;
document.querySelectorAll('[data-bind]').forEach(el=>{
  const k = el.dataset.bind;
  const map = {
    eyebrow:B.eyebrow, titleA:B.titleA, titleB:B.titleB, sub:B.sub,
    stamp1:B.stamp1, stamp2:B.stamp2,
    outroLine:DATA.outro.line, outroSmall:DATA.outro.small
  };
  if(map[k]!==undefined) el.textContent = map[k];
});

const tapeClasses = ['t-top','t-tl','t-tr','t-bl'];
const tapeColors  = ['','alt','alt2',''];

function cardEl(item, idx){
  const card = document.createElement('article');
  card.className = `card r-${item.ratio} reveal r-rot pos-${idx+1}`;
  card.tabIndex = 0;
  card.setAttribute('role','group');
  card.setAttribute('aria-label', `${item.title} - ${item.kindLabel}`);

  /* tape strips: desktop gets a randomish corner tape, mobile gets a clean top strip */
  const tc = tapeClasses[idx % tapeClasses.length];
  const col = tapeColors[idx % tapeColors.length];
  card.insertAdjacentHTML('beforeend',
    `<span class="tape ${tc} ${col}" aria-hidden="true"></span>
     <span class="tape m-top ${col}" aria-hidden="true"></span>`);

  /* media frame */
  const frame = document.createElement('div');
  frame.className = 'frame';

  if(item.kind === 'image'){
    frame.innerHTML =
      `<img class="media" src="${item.src}" alt="${item.title} - ${item.kindLabel}" loading="lazy" decoding="async">`;
  } else if(item.kind === 'video'){
    frame.innerHTML =
      `<div class="media-wrap">
         <img class="media" src="${item.poster}" alt="${item.title} - ${item.kindLabel} (poster)" loading="lazy" decoding="async">
         <video class="media" muted loop playsinline preload="none" poster="${item.poster}"
                data-src="${item.src}" aria-label="${item.title} video"></video>
       </div>
       <span class="play-badge" aria-hidden="true">
         <svg width="20" height="22" viewBox="0 0 20 22"><path d="M2 2 L18 11 L2 20 Z" fill="#d62828"/></svg>
       </span>`;
    card.dataset.video = '1';
  } else if(item.kind === 'audio'){
    /* waveform image as the "pasted" media; audio element hidden, toggled on click */
    frame.innerHTML =
      `<img class="media" src="${item.poster}" alt="${item.title} waveform" loading="lazy" decoding="async" style="object-fit:contain;background:#1a1812">
       <span class="play-badge" aria-hidden="true">
         <svg width="20" height="22" viewBox="0 0 20 22"><path d="M2 2 L18 11 L2 20 Z" fill="#d62828"/></svg>
       </span>
       <audio preload="none" data-src="${item.src}"></audio>`;
    card.dataset.audio = '1';
  }
  card.appendChild(frame);

  card.insertAdjacentHTML('beforeend',
    `<div class="cap">
       <h3>${item.title}</h3>
       <span class="kind">${item.kindLabel}</span>
     </div>
     <p class="desc">${item.desc}</p>`);

  return card;
}

function scrapEl(s){
  const el = document.createElement('div');
  el.className = `scrap ${s.t==='tag'?'tag':''}`;
  el.style.left = s.x; el.style.top = s.y;
  el.innerHTML = s.html.replace(/\\n/g,'<br>');
  el.setAttribute('aria-hidden','true');
  return el;
}

function annotEl(a){
  /* hand-drawn arrow + handwritten word, positioned as a percentage block */
  const wrap = document.createElement('div');
  wrap.className = 'annot';
  wrap.style.left = a.x+'%'; wrap.style.top = a.y+'%';
  wrap.setAttribute('aria-hidden','true');
  wrap.innerHTML =
    `<svg width="170" height="70" viewBox="0 0 170 70" overflow="visible">
       <text x="2" y="20">${a.text}</text>
       <path d="${a.path}"/>
       <path d="M${a.tip[0]-9},${a.tip[1]-7} L${a.tip[0]},${a.tip[1]} L${a.tip[0]-11},${a.tip[1]+5}"/>
     </svg>`;
  return wrap;
}

const host = $('#spreads');
DATA.spreads.forEach(sp=>{
  const sec = document.createElement('section');
  sec.className = 'spread';
  sec.id = `spread-${sp.id}`;

  const head = document.createElement('div');
  head.className = 'spread-head reveal';
  head.innerHTML =
    `<span class="spread-num">${sp.num}</span>
     <h2 class="spread-title">${sp.title}</h2>
     <p class="spread-note">${sp.note}</p>`;
  sec.appendChild(head);

  const cv = document.createElement('div');
  cv.className = 'canvas';
  cv.id = `cv-${sp.id}`;

  sp.items.forEach((it,i)=> cv.appendChild(cardEl(it,i)) );
  (sp.scraps||[]).forEach(s=> cv.appendChild(scrapEl(s)) );
  if(sp.annot) cv.appendChild(annotEl(sp.annot));

  sec.appendChild(cv);
  host.appendChild(sec);
});

/* give each card a tiny varied resting tilt fallback (used on mobile via --mr too) */
document.querySelectorAll('.card').forEach((c,i)=>{
  if(!c.style.getPropertyValue('--r')){
    const tilts = [-3.5,4,-1.5,3,-4.5,2,-3,4.5,1.5,-2];
    c.style.setProperty('--r', tilts[i % tilts.length]+'deg');
  }
});

/* ============================================================
   REVEAL on scroll (skipped under reduced-motion -> shown final)
   ============================================================ */
if(reduceMotion){
  document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));
} else {
  const revObs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); revObs.unobserve(e.target);} });
  },{threshold:.16, rootMargin:'0px 0px -8% 0px'});
  document.querySelectorAll('.reveal').forEach(el=>revObs.observe(el));
}

/* ============================================================
   MEDIA PLAYBACK DISCIPLINE
   - videos: lazy-attach src only when needed, play ONE focused
     card at a time, pause + detach when out of view.
   - audio: single global audio, toggled per card.
   - never autoplay many decoders on a shared stage at once.
   ============================================================ */
let activeVideo = null;       // currently playing <video>
let activeAudio = null;       // {el, card}

function stopActiveVideo(){
  if(activeVideo){
    activeVideo.pause();
    activeVideo.closest('.card')?.classList.remove('playing');
    activeVideo = null;
  }
}
function stopActiveAudio(){
  if(activeAudio){
    activeAudio.el.pause();
    activeAudio.card.classList.remove('playing');
    activeAudio = null;
  }
}

function playVideoCard(card){
  if(reduceMotion) return;            // honor reduced motion: posters only
  const v = card.querySelector('video');
  if(!v) return;
  if(activeVideo === v){ return; }
  stopActiveVideo();
  stopActiveAudio();
  if(!v.src){ v.src = v.dataset.src; }
  card.classList.add('playing');
  const p = v.play();
  if(p && p.catch) p.catch(()=>{ /* autoplay blocked, leave poster */ });
  activeVideo = v;
}

function toggleAudioCard(card){
  const a = card.querySelector('audio');
  if(!a) return;
  stopActiveVideo();
  if(activeAudio && activeAudio.el === a){
    stopActiveAudio();
    return;
  }
  stopActiveAudio();
  if(!a.src){ a.src = a.dataset.src; }
  card.classList.add('playing');
  a.play().catch(()=>{});
  activeAudio = { el:a, card };
  a.onended = ()=>{ card.classList.remove('playing'); if(activeAudio&&activeAudio.el===a) activeAudio=null; };
}

/* desktop: hover-to-play the focused video; mobile/touch: tap to play */
document.querySelectorAll('.card').forEach(card=>{
  const isVideo = card.dataset.video === '1';
  const isAudio = card.dataset.audio === '1';

  if(isVideo){
    /* hover (pointer) intent */
    card.addEventListener('pointerenter', e=>{
      if(e.pointerType === 'mouse') playVideoCard(card);
    });
    card.addEventListener('pointerleave', e=>{
      if(e.pointerType === 'mouse'){
        const v = card.querySelector('video');
        if(activeVideo === v) stopActiveVideo();
      }
    });
    /* click / tap toggles (covers touch + click) */
    card.addEventListener('click', ()=>{
      const v = card.querySelector('video');
      if(activeVideo === v) stopActiveVideo(); else playVideoCard(card);
    });
    card.addEventListener('keydown', e=>{
      if(e.key==='Enter'||e.key===' '){ e.preventDefault();
        const v = card.querySelector('video');
        if(activeVideo === v) stopActiveVideo(); else playVideoCard(card);
      }
    });
  } else if(isAudio){
    card.addEventListener('click', ()=> toggleAudioCard(card));
    card.addEventListener('keydown', e=>{
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggleAudioCard(card); }
    });
  }
});

/* pause + release any playing media that scrolls out of view */
const playObs = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(!e.isIntersecting){
      const card = e.target;
      const v = card.querySelector('video');
      if(v && activeVideo === v) stopActiveVideo();
      const a = card.querySelector('audio');
      if(a && activeAudio && activeAudio.el === a) stopActiveAudio();
    }
  });
},{threshold:0.01});
document.querySelectorAll('.card[data-video], .card[data-audio]').forEach(c=>playObs.observe(c));

/* pause everything if the tab is hidden */
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){ stopActiveVideo(); stopActiveAudio(); }
});
</script>
</body>
</html>
