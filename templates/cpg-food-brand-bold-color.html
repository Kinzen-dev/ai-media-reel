<!-- TEMPLATE: Bold Color Challenger CPG Hero | ARCHETYPE: cpg-food-brand-bold-color | REF: magicspoon.com, graza.co | WHEN TO USE: loud DTC food/CPG brand launch hero, one product centered on an oversized flat brand color | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SNACKO - bold challenger CPG hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     SWAP-ME: all brand content lives in the DATA array in <script>.
     This stylesheet only reads CSS custom props set from DATA.
     ============================================================ */
  :root {
    --brand: #ff5a1f;        /* oversized flat brand color (full-bleed) */
    --brand-deep: #d83c00;   /* shadow / depth of brand */
    --ink: #1a0f06;          /* near-black ink on brand */
    --cream: #fff3e2;        /* warm paper accent */
    --pop: #ffd23f;          /* secondary pop (starburst, badge) */
    --pop2: #2bb7a3;         /* tertiary pop (squiggle) */
    --radius: 26px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: var(--brand);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: inherit; }

  /* full-bleed oversized flat color field */
  .stage {
    position: relative;
    min-height: 100svh;
    background: var(--brand);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* subtle baked radial so the flat field still has depth, not muddy */
  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(120% 90% at 50% 18%, rgba(255,255,255,0.16), rgba(255,255,255,0) 55%),
      radial-gradient(100% 80% at 50% 120%, var(--brand-deep), rgba(0,0,0,0) 60%);
    pointer-events: none;
  }

  /* ---------- top band: brand + nav ---------- */
  .topbar {
    position: relative;
    z-index: 5;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 20px clamp(18px, 4vw, 54px);
  }
  .wordmark {
    font-family: "Fredoka", sans-serif;
    font-weight: 700;
    font-size: clamp(22px, 2.4vw, 30px);
    letter-spacing: -0.02em;
    color: var(--cream);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .wordmark .dot { color: var(--pop); }
  .nav {
    display: flex;
    align-items: center;
    gap: clamp(10px, 2vw, 28px);
    font-weight: 600;
    font-size: 14px;
  }
  .nav a { color: var(--cream); text-decoration: none; opacity: 0.92; }
  .nav a:hover { opacity: 1; }
  .nav .cart {
    background: var(--ink);
    color: var(--cream);
    padding: 8px 16px;
    border-radius: 999px;
    font-weight: 700;
  }
  @media (max-width: 720px) {
    .nav .link { display: none; }
  }

  /* ---------- hero grid: copy left, product center ---------- */
  .hero {
    position: relative;
    z-index: 4;
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1.05fr 1fr;
    align-items: center;
    gap: 12px;
    padding: clamp(6px, 1vh, 22px) clamp(18px, 4vw, 54px) clamp(20px, 3vh, 40px);
  }

  /* left rail: badges + benefit bullets */
  .rail-left {
    display: flex;
    flex-direction: column;
    gap: 18px;
    justify-self: start;
    max-width: 280px;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    align-self: flex-start;
    background: var(--ink);
    color: var(--cream);
    font-family: "Fredoka", sans-serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 8px 15px;
    border-radius: 999px;
  }
  .eyebrow .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--pop2); }
  .benefits { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px; }
  .benefits li {
    display: flex;
    align-items: center;
    gap: 11px;
    font-weight: 600;
    font-size: 15px;
    color: var(--cream);
  }
  .benefits .tick {
    flex: 0 0 auto;
    width: 24px; height: 24px;
    display: grid; place-items: center;
    background: var(--cream);
    color: var(--ink);
    border-radius: 50%;
  }

  /* center: headline above, product hero below */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 14px;
    justify-self: center;
    width: 100%;
  }
  .headline {
    font-family: "Fredoka", sans-serif;
    font-weight: 700;
    line-height: 0.92;
    letter-spacing: -0.03em;
    font-size: clamp(40px, 6.6vw, 92px);
    color: var(--cream);
    margin: 0;
    text-shadow: 0 3px 0 var(--brand-deep);
  }
  .headline .hl {
    display: inline-block;
    color: var(--ink);
    background: var(--pop);
    padding: 0 0.18em;
    border-radius: 12px;
    transform: rotate(-2.2deg);
    text-shadow: none;
  }
  .subhead {
    margin: 0;
    max-width: 30ch;
    color: var(--cream);
    font-size: clamp(14px, 1.5vw, 18px);
    font-weight: 500;
    opacity: 0.95;
  }

  /* product hero on a circle pad, with orbiting marks */
  .product-wrap {
    position: relative;
    width: min(46vh, 440px);
    aspect-ratio: 1 / 1;
    margin-top: 4px;
    display: grid;
    place-items: center;
    will-change: transform;
  }
  .pad {
    position: absolute;
    inset: 6%;
    border-radius: 50%;
    background:
      radial-gradient(circle at 38% 32%, var(--cream), #ffe3bd 60%, #ffcf94 100%);
    box-shadow:
      inset 0 -22px 44px rgba(216,60,0,0.30),
      0 30px 60px rgba(0,0,0,0.28);
  }
  .pad-ring {
    position: absolute;
    inset: -3%;
    border-radius: 50%;
    border: 4px dashed var(--pop);
    opacity: 0.85;
  }
  .product {
    position: relative;
    z-index: 2;
    width: 78%;
    height: 78%;
    object-fit: contain;
    filter: drop-shadow(0 20px 30px rgba(0,0,0,0.32));
    will-change: transform;
  }
  /* price flag badge */
  .price-flag {
    position: absolute;
    z-index: 3;
    top: 4%; right: 2%;
    background: var(--ink);
    color: var(--cream);
    font-family: "Fredoka", sans-serif;
    font-weight: 700;
    border-radius: 18px;
    padding: 12px 14px;
    text-align: center;
    line-height: 1;
    transform: rotate(7deg);
    box-shadow: 0 10px 22px rgba(0,0,0,0.3);
  }
  .price-flag .amt { font-size: 26px; display: block; }
  .price-flag .unit { font-size: 10px; letter-spacing: 0.08em; opacity: 0.8; text-transform: uppercase; }

  /* floating decorative marks anchored to the product wrap */
  .mark { position: absolute; z-index: 1; will-change: transform; }
  .mark.starburst { top: -6%; left: -4%; width: 92px; height: 92px; }
  .mark.squiggle  { bottom: 2%; left: -10%; width: 120px; height: 46px; }
  .mark.blob      { bottom: -4%; right: 4%; width: 70px; height: 70px; }
  .mark.sparkle   { top: 22%; right: -8%; width: 46px; height: 46px; }

  /* right rail: stat + CTA stack */
  .rail-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 20px;
    justify-self: end;
    max-width: 280px;
    text-align: right;
  }
  .stat-card {
    background: var(--cream);
    color: var(--ink);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: 0 18px 34px rgba(0,0,0,0.22);
    transform: rotate(2deg);
  }
  .stat-card .big {
    font-family: "Fredoka", sans-serif;
    font-weight: 700;
    font-size: 40px;
    line-height: 1;
    color: var(--brand-deep);
  }
  .stat-card .label { font-size: 13px; font-weight: 600; margin-top: 4px; }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--pop);
    color: var(--ink);
    font-family: "Fredoka", sans-serif;
    font-weight: 700;
    font-size: clamp(16px, 1.7vw, 20px);
    text-decoration: none;
    padding: 16px 26px;
    border-radius: 999px;
    box-shadow: 0 12px 0 var(--brand-deep);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .cta:hover { transform: translateY(-2px); box-shadow: 0 14px 0 var(--brand-deep); }
  .cta:active { transform: translateY(4px); box-shadow: 0 8px 0 var(--brand-deep); }
  .cta:focus-visible { outline: 4px solid var(--cream); outline-offset: 3px; }
  .cta .arrow { font-size: 1.1em; }

  /* ---------- bottom marquee strip ---------- */
  .ticker {
    position: relative;
    z-index: 5;
    background: var(--ink);
    color: var(--pop);
    overflow: hidden;
    border-top: 3px solid var(--cream);
  }
  .ticker-track {
    display: flex;
    gap: 0;
    white-space: nowrap;
    width: max-content;
    animation: marquee 26s linear infinite;
  }
  .ticker-track span {
    font-family: "Fredoka", sans-serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 12px 28px;
    display: inline-flex;
    align-items: center;
    gap: 28px;
  }
  .ticker-track .star { color: var(--pop2); }
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  a:focus-visible, .nav a:focus-visible { outline: 3px solid var(--cream); outline-offset: 2px; border-radius: 6px; }

  /* ============ RESPONSIVE: phone keeps product dominant ============
     Single clean vertical stack: badge, headline, product, proof+CTA row.
     The desktop 3-column grid collapses to one column; left/right rails
     become inline children of the centered column so nothing overlaps. */
  @media (max-width: 980px) {
    .hero {
      grid-template-columns: 1fr;
      justify-items: center;
      gap: 14px;
      padding-top: 4px;
      padding-bottom: 26px;
    }
    .center { order: 1; }
    /* left rail collapses to just the badge, sitting above the headline */
    .rail-left {
      order: 0;
      max-width: 100%;
      align-items: center;
      justify-self: center;
    }
    .rail-left .benefits { display: none; }  /* keep first screen product-dominant */
    .eyebrow { transform: none; align-self: center; }
    /* right rail becomes a tidy proof + CTA row under the product */
    .rail-right {
      order: 2;
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      justify-self: center;
      max-width: 560px;
      text-align: left;
      gap: 16px;
    }
    .stat-card { transform: none; }
  }
  @media (max-width: 640px) {
    .topbar { padding: 14px 18px; }
    .hero { padding: 4px 16px 22px; gap: 12px; }
    .headline { font-size: clamp(34px, 11vw, 56px); }
    .subhead { font-size: 14px; max-width: 26ch; }
    .product-wrap { width: min(74vw, 340px); margin-top: 0; }
    .mark.squiggle { left: -4%; width: 96px; }
    .mark.starburst { width: 70px; }
    .mark.blob { width: 56px; }
    .mark.sparkle { width: 38px; }
    .price-flag { padding: 9px 11px; }
    .price-flag .amt { font-size: 20px; }
    .stat-card { padding: 12px 16px; }
    .stat-card .big { font-size: 32px; }
    .rail-right { gap: 12px; }
    .cta { padding: 14px 22px; }
  }

  /* ============ REDUCED MOTION: show final state, no rAF/anim ============ */
  @media (prefers-reduced-motion: reduce) {
    .ticker-track { animation: none; transform: none; }
    .cta { transition: none; }
    * { scroll-behavior: auto; }
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <!-- top band: brand + nav (compact, above the signature) -->
    <header class="topbar">
      <div class="wordmark" id="wordmark">SNACK<span class="dot">O</span></div>
      <nav class="nav" aria-label="primary">
        <a class="link" href="#flavors">Flavors</a>
        <a class="link" href="#story">Our Story</a>
        <a class="cart" href="#buy">Cart (0)</a>
      </nav>
    </header>

    <!-- SIGNATURE at scroll=0: oversized flat color + centered product + punchy headline + buy CTA -->
    <section class="hero">
      <!-- left rail: badge + benefit ticks -->
      <aside class="rail-left">
        <span class="eyebrow"><span class="pip"></span><span id="eyebrow">No junk, all crunch</span></span>
        <ul class="benefits" id="benefits"><!-- populated from DATA --></ul>
      </aside>

      <!-- center: headline above, product hero with marks below -->
      <div class="center">
        <h1 class="headline" id="headline"></h1>
        <p class="subhead" id="subhead"></p>

        <div class="product-wrap" id="productWrap">
          <div class="pad"></div>
          <div class="pad-ring"></div>

          <!-- starburst -->
          <svg class="mark starburst" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 2 L60 30 L88 18 L70 44 L98 50 L70 56 L88 82 L60 70 L50 98 L40 70 L12 82 L30 56 L2 50 L30 44 L12 18 L40 30 Z" fill="#ffd23f" stroke="#1a0f06" stroke-width="3" stroke-linejoin="round"/>
            <text x="50" y="56" text-anchor="middle" font-family="Fredoka, sans-serif" font-weight="700" font-size="17" fill="#1a0f06">NEW</text>
          </svg>

          <!-- squiggle -->
          <svg class="mark squiggle" viewBox="0 0 120 46" aria-hidden="true">
            <path d="M4 30 Q20 4 36 24 T68 24 T100 24 Q112 24 116 12" fill="none" stroke="#2bb7a3" stroke-width="7" stroke-linecap="round"/>
          </svg>

          <!-- blob -->
          <svg class="mark blob" viewBox="0 0 70 70" aria-hidden="true">
            <path d="M35 4 C54 4 66 18 66 36 C66 54 52 66 34 66 C16 66 4 52 6 33 C8 16 16 4 35 4 Z" fill="#2bb7a3" stroke="#1a0f06" stroke-width="3"/>
            <circle cx="27" cy="30" r="4" fill="#1a0f06"/><circle cx="45" cy="30" r="4" fill="#1a0f06"/>
            <path d="M26 44 Q35 52 46 44" fill="none" stroke="#1a0f06" stroke-width="3" stroke-linecap="round"/>
          </svg>

          <!-- sparkle -->
          <svg class="mark sparkle" viewBox="0 0 46 46" aria-hidden="true">
            <path d="M23 2 C25 16 30 21 44 23 C30 25 25 30 23 44 C21 30 16 25 2 23 C16 21 21 16 23 2 Z" fill="#fff3e2" stroke="#1a0f06" stroke-width="2.5" stroke-linejoin="round"/>
          </svg>

          <!-- THE PRODUCT: reused demo asset, contained -->
          <img class="product" id="product" alt="" decoding="async" />

          <!-- price flag -->
          <div class="price-flag">
            <span class="amt" id="price">$9</span>
            <span class="unit" id="priceUnit">per pack</span>
          </div>
        </div>
      </div>

      <!-- right rail: proof stat + buy CTA -->
      <aside class="rail-right">
        <div class="stat-card">
          <div class="big" id="statBig">12g</div>
          <div class="label" id="statLabel">protein, zero guilt</div>
        </div>
        <a class="cta" id="buy" href="#buy">
          <span id="ctaLabel">Grab a 6 pack</span><span class="arrow" aria-hidden="true">&#8594;</span>
        </a>
      </aside>
    </section>

    <!-- bottom marquee: flavor names + claims, the playful CPG flourish -->
    <div class="ticker" aria-hidden="true">
      <div class="ticker-track" id="ticker"></div>
    </div>
  </main>

<script>
/* ============================================================================
   DATA - swap everything about the brand here. One object drives the whole hero.
   brand colors flow into CSS custom props; SVG mark colors are inline hex above
   (NEW starburst #ffd23f, squiggle #2bb7a3, blob #2bb7a3, sparkle #fff3e2).
   To re-skin: change theme hexes here AND mirror them in the inline SVGs if you
   want the marks to match a new palette.
   ============================================================================ */
const DATA = {
  brand: "SNACK",
  brandAccent: "O",                 // the playful colored letter in the wordmark
  eyebrow: "No junk, all crunch",
  // headline split: plain words + one highlighted word (gets the rotated chip)
  headline: [
    { t: "Snacks that", hl: false },
    { t: "hit",         hl: true  },
    { t: "different",   hl: false }
  ],
  subhead: "Crunchy, loud, and weirdly good for you. Real fruit, real crunch, zero of the boring stuff.",
  product: {
    src: "../assets/hf-tinysd.png",  // reused demo asset, object-fit: contain
    alt: "SNACKO fruit crisp pack, the hero product"
  },
  price: "$9",
  priceUnit: "per pack",
  benefits: [
    "Real fruit, nothing fake",
    "12g protein per pack",
    "No added sugar, ever"
  ],
  stat: { big: "12g", label: "protein, zero guilt" },
  cta: "Grab a 6 pack",
  // marquee claims; the engine doubles the track for a seamless loop
  ticker: ["Gluten free", "Vegan", "No added sugar", "Crunch certified", "Small batch", "Tastes like more"],
  theme: {
    brand:     "#ff5a1f",
    brandDeep: "#d83c00",
    ink:       "#1a0f06",
    cream:     "#fff3e2",
    pop:       "#ffd23f",
    pop2:      "#2bb7a3"
  }
};

/* ---------- apply theme to CSS custom props ---------- */
(function applyTheme(t){
  const r = document.documentElement.style;
  r.setProperty("--brand", t.brand);
  r.setProperty("--brand-deep", t.brandDeep);
  r.setProperty("--ink", t.ink);
  r.setProperty("--cream", t.cream);
  r.setProperty("--pop", t.pop);
  r.setProperty("--pop2", t.pop2);
})(DATA.theme);

/* ---------- populate content ---------- */
(function render(){
  // wordmark
  const wm = document.getElementById("wordmark");
  wm.innerHTML = DATA.brand + '<span class="dot">' + DATA.brandAccent + "</span>";

  document.getElementById("eyebrow").textContent = DATA.eyebrow;

  // headline with one highlighted chip word
  const h = document.getElementById("headline");
  h.innerHTML = DATA.headline.map(p =>
    p.hl ? '<span class="hl">' + p.t + "</span>" : p.t
  ).join(" ");

  document.getElementById("subhead").textContent = DATA.subhead;

  const img = document.getElementById("product");
  img.src = DATA.product.src;
  img.alt = DATA.product.alt;

  document.getElementById("price").textContent = DATA.price;
  document.getElementById("priceUnit").textContent = DATA.priceUnit;

  // benefits
  const ul = document.getElementById("benefits");
  ul.innerHTML = DATA.benefits.map(b =>
    '<li><span class="tick" aria-hidden="true">&#10003;</span>' + b + "</li>"
  ).join("");

  document.getElementById("statBig").textContent = DATA.stat.big;
  document.getElementById("statLabel").textContent = DATA.stat.label;
  document.getElementById("ctaLabel").textContent = DATA.cta;

  // ticker: build once, duplicate for seamless -50% marquee
  const oneRun = DATA.ticker
    .map(x => x + ' <span class="star">&#10039;</span> ')
    .join("");
  const t = document.getElementById("ticker");
  t.innerHTML = "<span>" + oneRun + "</span><span>" + oneRun + "</span>";
})();

/* ---------- gentle pointer parallax on product + marks (motion-gated) ----------
   Honors prefers-reduced-motion: when reduced, we attach nothing and the final
   resting state (CSS) is what shows. Uses a single rAF, transform-only. */
(function parallax(){
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)");
  if (reduce.matches) return;

  const wrap = document.getElementById("productWrap");
  const product = document.getElementById("product");
  const marks = Array.from(document.querySelectorAll(".mark"));
  if (!wrap) return;

  let tx = 0, ty = 0;          // target -1..1
  let cx = 0, cy = 0;          // current (eased)
  let raf = null;
  let idle = true;

  function onMove(e){
    const r = wrap.getBoundingClientRect();
    const px = (e.clientX - (r.left + r.width / 2)) / (window.innerWidth / 2);
    const py = (e.clientY - (r.top + r.height / 2)) / (window.innerHeight / 2);
    tx = Math.max(-1, Math.min(1, px));
    ty = Math.max(-1, Math.min(1, py));
    if (idle) { idle = false; loop(); }
  }

  function loop(){
    cx += (tx - cx) * 0.08;
    cy += (ty - cy) * 0.08;
    // product tilts a touch
    product.style.transform = "translate(" + (cx * 10) + "px," + (cy * 10) + "px) rotate(" + (cx * 2) + "deg)";
    // marks drift at varied depth for a parallax feel
    marks.forEach((m, i) => {
      const depth = 6 + (i % 4) * 7;
      m.style.transform = "translate(" + (cx * depth) + "px," + (cy * depth) + "px)";
    });
    if (Math.abs(tx - cx) > 0.001 || Math.abs(ty - cy) > 0.001) {
      raf = requestAnimationFrame(loop);
    } else {
      idle = true;
      raf = null;
    }
  }

  window.addEventListener("pointermove", onMove, { passive: true });

  // if the user flips reduced-motion on, stop and reset to final state
  reduce.addEventListener("change", (ev) => {
    if (ev.matches) {
      window.removeEventListener("pointermove", onMove);
      if (raf) cancelAnimationFrame(raf);
      product.style.transform = "";
      marks.forEach(m => (m.style.transform = ""));
    }
  });
})();
</script>
</body>
</html>
