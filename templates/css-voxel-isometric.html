<!-- TEMPLATE: Voxel Atelier | ARCHETYPE: css-voxel-isometric (a hand-built isometric voxel diorama of stacked cuboids, lit tops + shaded sides, slow ambient rotate, content cards floating beside) | REF: isometric CSS art, voxel dioramas, CSS 3D transforms, Monument-Valley-style scenes | WHEN TO USE: a studio/agency/product index that wants to feel crafted and dimensional without WebGL - a pure-CSS 3D scene as the hero | SWAP: edit the DATA + VOXELS arrays at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Voxel Atelier - pure CSS isometric diorama</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   DATA + VOXELS arrays live in the <script> at the very top of
   the body. To reskin this template you only touch those two
   arrays and the COLOR tokens below.
   ============================================================ */

:root{
  /* night ground */
  --bg:#11131a;
  --bg-2:#0c0e14;
  --bone:#f3ede1;
  --bone-dim:#b9b3a6;
  --line:rgba(243,237,225,.14);

  /* warm voxel palette - each block names a TOP color; sides are
     derived at render time by brightness-grading (see --shade vars) */
  --coral:#ff7a5c;
  --coral-top:#ff9276;
  --teal:#39c0b3;
  --teal-top:#54d8cb;
  --sand:#e6c178;
  --sand-top:#f3d390;
  --plum:#8e6bd6;
  --plum-top:#a586e6;
  --slate:#46506b;
  --slate-top:#5a647e;
  --grass:#6fbf73;
  --grass-top:#86d089;

  /* face brightness grade: top brightest, left mid, right darkest */
  --f-top:1;
  --f-left:.74;
  --f-right:.5;

  /* scene scale - overridden on small screens */
  --scene-scale:1;
  --vx:46px;   /* voxel edge length */
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(120% 90% at 78% 8%, #1a1d28 0%, var(--bg) 42%, var(--bg-2) 100%);
  color:var(--bone);
  font-family:"Space Grotesk",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100vh;
}

/* faint isometric floor grid drifting under everything */
body::before{
  content:"";
  position:fixed;
  inset:-20%;
  background-image:
    linear-gradient(115deg, var(--line) 1px, transparent 1px),
    linear-gradient(65deg, var(--line) 1px, transparent 1px);
  background-size:64px 64px;
  opacity:.5;
  pointer-events:none;
  transform:translateZ(0);
  z-index:0;
  mask-image:radial-gradient(80% 70% at 50% 45%, #000 30%, transparent 100%);
}

a{color:inherit;}

/* ---------- top band: compact, sits ABOVE the diorama ---------- */
.band{
  position:relative;
  z-index:6;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:24px;
  padding:30px clamp(20px,5vw,72px) 6px;
  max-width:1500px;
  margin:0 auto;
}
.brand{
  display:flex;align-items:center;gap:13px;
  font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  font-size:13px;color:var(--bone-dim);
}
.brand .mark{
  width:26px;height:26px;flex:0 0 auto;
  transform:rotate(45deg);
  background:
    linear-gradient(135deg,var(--coral-top),var(--coral)) ;
  border-radius:5px;
  box-shadow:
    inset -3px -3px 0 rgba(0,0,0,.28),
    0 0 0 1px rgba(255,255,255,.08);
}
.nav{display:flex;gap:6px;}
.nav a{
  font-size:12.5px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--bone-dim);text-decoration:none;
  padding:8px 13px;border-radius:999px;
  transition:color .2s, background .2s;
}
.nav a:hover,.nav a:focus-visible{color:var(--bone);background:rgba(243,237,225,.06);}
.nav a:focus-visible{outline:2px solid var(--coral);outline-offset:2px;}

/* ---------- hero layout: headline + stage side by side ---------- */
.hero{
  position:relative;z-index:5;
  max-width:1500px;margin:0 auto;
  padding:4px clamp(20px,5vw,72px) 60px;
  display:grid;
  grid-template-columns:minmax(280px,0.82fr) minmax(420px,1.18fr);
  gap:clamp(20px,3vw,56px);
  align-items:center;
}
.copy{max-width:520px;}
.eyebrow{
  display:inline-flex;align-items:center;gap:9px;
  font-size:12px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--teal-top);margin:0 0 18px;
}
.eyebrow::before{
  content:"";width:22px;height:1px;background:var(--teal-top);display:inline-block;
}
h1{
  font-family:"Fraunces",serif;
  font-weight:900;
  font-size:clamp(40px,6.4vw,86px);
  line-height:.96;
  letter-spacing:-.02em;
  margin:0 0 22px;
  overflow-wrap:break-word;
  word-break:normal;
  hyphens:none;
}
h1 .tline{display:block;}
h1 em{font-style:italic;color:var(--coral-top);}
.lede{
  font-size:clamp(15px,1.5vw,18px);
  line-height:1.55;
  color:var(--bone-dim);
  margin:0 0 30px;
  max-width:46ch;
}
.cta{display:flex;gap:14px;flex-wrap:wrap;}
.btn{
  font-family:inherit;font-size:14px;font-weight:600;letter-spacing:.02em;
  padding:13px 24px;border-radius:11px;cursor:pointer;
  border:1px solid transparent;text-decoration:none;display:inline-flex;align-items:center;gap:9px;
  transition:transform .15s ease, box-shadow .2s ease, background .2s;
}
.btn.solid{
  background:linear-gradient(180deg,var(--coral-top),var(--coral));
  color:#2a0f08;
  box-shadow:0 10px 26px -10px rgba(255,122,92,.6), inset 0 -3px 0 rgba(0,0,0,.18);
}
.btn.solid:hover{transform:translateY(-2px);}
.btn.ghost{
  border-color:var(--line);color:var(--bone);
}
.btn.ghost:hover{background:rgba(243,237,225,.06);border-color:rgba(243,237,225,.3);}
.btn:focus-visible{outline:2px solid var(--teal-top);outline-offset:3px;}

/* ---------- the voxel STAGE (pure CSS 3D) ---------- */
.stage-wrap{
  position:relative;
  min-height:min(64vh,560px);
  display:flex;align-items:center;justify-content:center;
}
.stage{
  position:relative;
  width:520px;height:480px;
  transform-style:preserve-3d;
  /* isometric-ish camera: tip back on X, hold the Z spin via --spin */
  transform:
    scale(var(--scene-scale))
    rotateX(58deg)
    rotateZ(var(--spin,45deg));
  transform-origin:center center;
  will-change:transform;
}

/* a single voxel: a cuboid built from 3 visible faces.
   --c = side/base color, --ct = top color, --h = height in voxel units.
   Positioned by --gx/--gy grid coords and stacked by --gz. */
.vox{
  position:absolute;
  width:var(--vx);height:var(--vx);
  transform-style:preserve-3d;
  /* place on the iso grid, then lift by stack height */
  transform:
    translate3d(
      calc(var(--gx) * var(--vx)),
      calc(var(--gy) * var(--vx)),
      calc(var(--gz) * var(--vx))
    );
  /* subtle contact shadow under each footprint */
}
.vox .face{
  position:absolute;
  left:0;top:0;
  width:var(--vx);
  backface-visibility:hidden;
  outline:1px solid rgba(0,0,0,.18); /* crisp voxel seams */
}
/* TOP face - brightest. Height does not matter for the top. */
.vox .top{
  height:var(--vx);
  background:var(--ct);
  filter:brightness(var(--f-top));
  transform:translateZ(calc(var(--h) * var(--vx)));
}
/* LEFT face (the +Y wall) - mid shade */
.vox .left{
  height:calc(var(--h) * var(--vx));
  background:var(--c);
  filter:brightness(var(--f-left));
  transform-origin:top;
  transform:translateY(var(--vx)) rotateX(-90deg);
}
/* RIGHT face (the +X wall) - darkest shade */
.vox .right{
  height:calc(var(--h) * var(--vx));
  background:var(--c);
  filter:brightness(var(--f-right));
  transform-origin:left;
  transform:translateX(var(--vx)) rotateY(90deg);
}

/* the billboard voxel can carry a real asset on its top face */
.vox .top.billboard{
  background-size:cover;background-position:center;
  box-shadow:inset 0 0 0 2px rgba(243,237,225,.5);
  filter:brightness(1.04) saturate(1.05);
}

/* floating content cards that orbit the diorama (counter-rotated to
   stay flat-facing the viewer) */
.cards{
  position:absolute;inset:0;
  z-index:7;pointer-events:none;
}
.card{
  position:absolute;
  pointer-events:auto;
  width:188px;
  background:rgba(18,20,28,.82);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px 15px 15px;
  backdrop-filter:blur(9px);
  box-shadow:0 22px 50px -22px rgba(0,0,0,.8);
  transform:translateY(8px);
  opacity:0;
  animation:cardIn .7s cubic-bezier(.2,.7,.2,1) forwards;
  animation-delay:var(--cd,0s);
}
.card .tag{
  display:inline-block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--accent,var(--teal-top));
  margin-bottom:8px;
}
.card .chip{
  width:100%;height:80px;border-radius:8px;overflow:hidden;
  background:#0c0e14 center/cover no-repeat;
  margin-bottom:10px;position:relative;
  border:1px solid rgba(243,237,225,.07);
}
.card .chip img{width:100%;height:100%;object-fit:cover;display:block;}
.card h3{font-size:15px;margin:0 0 4px;font-weight:600;letter-spacing:-.01em;}
.card p{font-size:12px;line-height:1.4;color:var(--bone-dim);margin:0;}
.card .meter{height:4px;border-radius:99px;background:rgba(243,237,225,.1);margin-top:11px;overflow:hidden;}
.card .meter span{display:block;height:100%;border-radius:99px;background:var(--accent,var(--teal-top));width:var(--pct,60%);}

/* position presets for the orbiting cards */
.card.c0{top:1%;left:-7%;--accent:var(--coral-top);--cd:.15s;}
.card.c1{top:42%;right:-7%;--accent:var(--teal-top);--cd:.32s;}
.card.c2{bottom:-2%;left:2%;--accent:var(--sand-top);--cd:.5s;}

@keyframes cardIn{to{opacity:1;transform:translateY(0);}}

/* the slow ambient spin */
@keyframes ambient{
  from{--spin:34deg;}
  to{--spin:394deg;}
}
/* register --spin so it can animate (Houdini-capable browsers) */
@property --spin{ syntax:'<angle>'; inherits:false; initial-value:45deg; }

.stage.spinning{
  animation:ambient 38s linear infinite;
}
/* JS fallback path (browsers without @property animating custom props):
   .js-spin gets its transform updated each frame; we then DROP the css
   animation class so they never fight. */

/* ---------- caption strip under the hero ---------- */
.caption{
  position:relative;z-index:5;
  max-width:1500px;margin:0 auto;
  padding:0 clamp(20px,5vw,72px) 64px;
  display:flex;flex-wrap:wrap;gap:10px 26px;
  color:var(--bone-dim);font-size:12.5px;letter-spacing:.04em;
}
.caption b{color:var(--bone);font-weight:600;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--coral);align-self:center;}

/* ---------- pause control ---------- */
.spin-toggle{
  position:fixed;right:18px;bottom:18px;z-index:20;
  font-family:inherit;font-size:12px;letter-spacing:.08em;
  color:var(--bone);background:rgba(18,20,28,.8);
  border:1px solid var(--line);border-radius:999px;
  padding:9px 16px;cursor:pointer;backdrop-filter:blur(8px);
  display:inline-flex;gap:8px;align-items:center;
}
.spin-toggle:hover{border-color:rgba(243,237,225,.32);}
.spin-toggle:focus-visible{outline:2px solid var(--coral);outline-offset:2px;}
.spin-toggle .ic{width:9px;height:9px;border-radius:1px;background:var(--coral-top);}
.spin-toggle.paused .ic{border-radius:50%;background:var(--teal-top);}

/* ================= RESPONSIVE ================= */
/* stack copy over stage; scale the diorama to CONTAIN, never crop */
@media (max-width:980px){
  .hero{
    grid-template-columns:1fr;
    gap:8px;
    padding-bottom:40px;
    text-align:left;
  }
  .lede{max-width:54ch;}
  .stage-wrap{min-height:min(52vh,440px);}
  :root{--scene-scale:.84;}
}

@media (max-width:640px){
  /* compact the whole vertical rhythm so a populated slice of the
     diorama (the signature) PEEKS into the first screen even on short
     phones (e.g. 390x667), not just below the fold. */
  .band{flex-direction:column;align-items:flex-start;gap:10px;padding-top:16px;padding-bottom:2px;}
  .nav{flex-wrap:wrap;}
  .hero{padding:2px 18px 28px;gap:4px;}
  .copy{max-width:none;}
  .eyebrow{margin:0 0 10px;}
  h1{font-size:clamp(28px,7.6vw,42px);line-height:1.02;margin:0 0 12px;}
  .lede{font-size:14px;line-height:1.45;margin:0 0 16px;max-width:none;}
  .cta{gap:10px;}
  .btn{padding:11px 18px;}
  /* lift the stage up and shrink the diorama so its footprint fits a
     390px column AND a meaningful chunk lands above the fold */
  .stage-wrap{min-height:min(34vh,300px);overflow:visible;margin-top:2px;}
  :root{--scene-scale:.58;--vx:42px;}
  /* re-flow orbiting cards so they don't fly off-screen */
  .cards{position:relative;inset:auto;margin-top:4px;display:grid;grid-template-columns:1fr;gap:12px;}
  .card{position:relative!important;top:auto!important;left:auto!important;right:auto!important;bottom:auto!important;width:100%;}
}
@media (max-width:390px){
  :root{--scene-scale:.5;}
}

/* ================= REDUCED MOTION ================= */
@media (prefers-reduced-motion:reduce){
  .stage.spinning{animation:none!important;}
  .card{animation:none!important;opacity:1!important;transform:none!important;}
  body::before{display:none;}
}

/* graceful no-3d fallback (very old engines): show a flat hint */
@supports not (transform-style:preserve-3d){
  .stage{transform:none;}
  .stage-wrap::after{
    content:"This scene uses CSS 3D transforms.";
    color:var(--bone-dim);font-size:13px;
  }
}
</style>
</head>

<!-- ============================================================
     DATA + VOXELS  (swap these two arrays to reskin)
     ============================================================ -->
<script>
/* ---- ASSET BASE (relative to this file) ---- */
const ASSETS = "../assets/";

/* CARDS: the floating content panes beside the diorama.
   Each reuses a REAL demo asset thumbnail. */
const DATA = {
  brand:   "VOXEL ATELIER",
  eyebrow: "Pure CSS 3D - no WebGL, no canvas",
  title:   ['A diorama', 'built block', 'by <em>block</em>.'],
  lede:    "Every cuboid is three divs - a lit top, a left wall, a darker right wall - stacked on an isometric grid and turned by a single slow rotate. Real CSS, hand placed.",
  ctas: [
    { label:"Tour the build", href:"#", solid:true },
    { label:"Read the method", href:"#", solid:false }
  ],
  caption: [
    "<b>0 WebGL</b> calls",
    "<b>42</b> hand-placed voxels",
    "<b>1</b> ambient rotate",
    "targets <b>>50fps</b>"
  ],
  cards: [
    {
      tag:"Render",
      title:"Lit-top shading",
      body:"Top face full bright, walls graded down. Sun direction is just three brightness values.",
      img:ASSETS+"flux-clinic.png",
      pct:"88%"
    },
    {
      tag:"Motion",
      title:"One rotateZ",
      body:"The whole scene spins on a single custom property. Pause it, reduce-motion freezes it.",
      img:ASSETS+"sdxl.png",
      pct:"64%"
    },
    {
      tag:"Asset",
      title:"Billboard face",
      body:"Any voxel top can carry a real image - here a generated frame, mapped onto the cube.",
      img:ASSETS+"hf-tinysd.png",
      pct:"73%"
    }
  ],
  /* the asset painted onto the tall billboard voxel's TOP face */
  billboardImg: ASSETS+"flux-car.png"
};

/* VOXELS: the diorama itself. Coordinates are in voxel units.
   gx = +right-ish, gy = +down-ish on the iso plane, gz = stack height
   (how many voxels up the BASE of this block sits), h = block height
   in voxel units, color = palette key.
   This is a small island: a stepped plinth, a coral tower, a teal
   slab, a sand path, plum accents, a billboard, and scattered trees.
   42 voxels - reasonable for >50fps. */
const VOXELS = [
  /* --- base plinth (a 5x5 slab, 1 unit tall) centered around origin --- */
  ...gridSlab(-2,-2, 5,5, 0, 1, "slate"),

  /* --- raised terrace (3x3, sits on top of plinth) --- */
  ...gridSlab(-1,-1, 3,3, 1, 1, "grass"),

  /* --- coral tower: 3 stacked blocks, NE corner of terrace --- */
  { gx:1, gy:-1, gz:2, h:2, color:"coral" },
  { gx:1, gy:-1, gz:4, h:1.4, color:"coral" },

  /* --- teal cantilever slab off the tower --- */
  { gx:0, gy:-1, gz:3, h:.6, color:"teal" },
  { gx:0, gy:-2, gz:3, h:.6, color:"teal" },

  /* --- sand steps leading down the front (descending stair) --- */
  { gx:-1, gy:1, gz:2, h:.5, color:"sand" },
  { gx:-1, gy:2, gz:1, h:.5, color:"sand" },
  { gx:-2, gy:2, gz:0, h:.5, color:"sand" },

  /* --- plum monolith accent, SW --- */
  { gx:-1, gy:1, gz:2, h:1.2, color:"plum", at:2.5 }, /* at = base lift override */
  { gx:1, gy:1, gz:2, h:1, color:"plum" },

  /* --- the BILLBOARD voxel: tall, top carries a real asset --- */
  { gx:2, gy:0, gz:1, h:1.8, color:"slate", billboard:true },

  /* --- little voxel "trees": dark trunk + bright canopy --- */
  { gx:-2,gy:-2,gz:1, h:.8, color:"slate" }, { gx:-2,gy:-2,gz:1.8, h:.8, color:"grass" },
  { gx:2, gy:2, gz:1, h:.8, color:"slate" }, { gx:2, gy:2, gz:1.8, h:.8, color:"grass" },
  { gx:-2,gy:1, gz:1, h:.7, color:"slate" }, { gx:-2,gy:1, gz:1.7, h:.7, color:"teal"  },

  /* --- scattered low accent blocks for texture --- */
  { gx:0, gy:2, gz:1, h:.4, color:"coral" },
  { gx:1, gy:-2,gz:1, h:.4, color:"sand"  },
  { gx:-1,gy:-2,gz:1, h:.4, color:"plum"  }
];

/* helper: fill a rectangular slab of voxels.
   x0,y0 = top-left grid origin; w,h = footprint; base = gz; thick = block height */
function gridSlab(x0,y0,w,d,base,thick,color){
  const out=[];
  for(let i=0;i<w;i++) for(let j=0;j<d;j++){
    out.push({ gx:x0+i, gy:y0+j, gz:base, h:thick, color });
  }
  return out;
}
window.__VOX = { ASSETS, DATA, VOXELS };
</script>

<!-- ===================== RENDER ===================== -->
<script>
(function(){
  const { ASSETS, DATA, VOXELS } = window.__VOX;

  /* ---- copy ---- */
  document.getElementById('brandName').textContent = DATA.brand;
  document.getElementById('eyebrow').textContent = DATA.eyebrow;
  /* each DATA.title entry is its own visual line (keeps the headline
     from running off narrow viewports) */
  document.getElementById('title').innerHTML =
    DATA.title.map(l=>`<span class="tline">${l}</span>`).join('');
  document.getElementById('lede').textContent = DATA.lede;

  const cta = document.getElementById('cta');
  DATA.ctas.forEach(c=>{
    const a=document.createElement('a');
    a.className='btn '+(c.solid?'solid':'ghost');
    a.href=c.href; a.textContent=c.label;
    cta.appendChild(a);
  });

  const cap=document.getElementById('caption');
  DATA.caption.forEach((c,i)=>{
    if(i){const d=document.createElement('span');d.className='dot';cap.appendChild(d);}
    const s=document.createElement('span'); s.innerHTML=c; cap.appendChild(s);
  });

  /* ---- cards ---- */
  const cardWrap=document.getElementById('cards');
  DATA.cards.forEach((cd,i)=>{
    const el=document.createElement('article');
    el.className='card c'+i;
    el.innerHTML=`
      <span class="tag">${cd.tag}</span>
      <div class="chip"><img src="${cd.img}" alt="" loading="lazy" decoding="async"></div>
      <h3>${cd.title}</h3>
      <p>${cd.body}</p>
      <div class="meter"><span style="--pct:${cd.pct}"></span></div>`;
    cardWrap.appendChild(el);
  });

  /* ---- build the voxel diorama ---- */
  const stage=document.getElementById('stage');
  const colorKey = c => ({
    coral:["--coral","--coral-top"], teal:["--teal","--teal-top"],
    sand:["--sand","--sand-top"], plum:["--plum","--plum-top"],
    slate:["--slate","--slate-top"], grass:["--grass","--grass-top"]
  })[c] || ["--slate","--slate-top"];

  VOXELS.forEach(v=>{
    const [cVar,ctVar]=colorKey(v.color);
    const el=document.createElement('div');
    el.className='vox';
    const baseZ = (v.at!==undefined)? v.at : v.gz; // 'at' overrides stack base
    el.style.setProperty('--gx', v.gx);
    el.style.setProperty('--gy', v.gy);
    el.style.setProperty('--gz', baseZ);
    el.style.setProperty('--h', v.h);
    el.style.setProperty('--c', `var(${cVar})`);
    el.style.setProperty('--ct', `var(${ctVar})`);

    const top=document.createElement('div');
    top.className='face top'+(v.billboard?' billboard':'');
    if(v.billboard){ top.style.backgroundImage=`url("${DATA.billboardImg}")`; }
    const left=document.createElement('div'); left.className='face left';
    const right=document.createElement('div'); right.className='face right';
    el.append(left,right,top); // top last = painted over walls
    stage.appendChild(el);
  });

  /* ---- ambient rotation control ----
     We honor reduced-motion, a pause button, and provide a rAF
     fallback for engines that can't animate the custom property. */
  const prefersReduce = window.matchMedia('(prefers-reduced-motion: reduce)');
  const btn=document.getElementById('spinBtn');
  const lbl=document.getElementById('spinLbl');

  // detect @property animation support for <angle> custom props
  const canAnimateProp = (typeof CSS!=='undefined' && CSS.registerProperty);

  let rafId=null, running=false, angle=34, last=0;

  function startCSS(){
    stage.classList.add('spinning');
    stage.classList.remove('js-spin');
  }
  function stopCSS(){ stage.classList.remove('spinning'); }

  function frame(t){
    if(!running) return;
    if(!last) last=t;
    const dt=(t-last)/1000; last=t;
    angle += dt * (360/38);           // match 38s css period
    if(angle>=394) angle-=360;
    stage.style.transform =
      `scale(var(--scene-scale)) rotateX(58deg) rotateZ(${angle}deg)`;
    rafId=requestAnimationFrame(frame);
  }
  function startJS(){
    stopCSS();
    running=true; last=0;
    rafId=requestAnimationFrame(frame);
  }
  function stopJS(){ running=false; if(rafId)cancelAnimationFrame(rafId); rafId=null; }

  function play(){
    if(prefersReduce.matches){ freeze(); return; }
    btn.setAttribute('aria-pressed','false');
    btn.classList.remove('paused');
    lbl.textContent='Pause rotation';
    if(canAnimateProp){ startCSS(); }
    else { startJS(); }
  }
  function pause(){
    btn.setAttribute('aria-pressed','true');
    btn.classList.add('paused');
    lbl.textContent='Resume rotation';
    if(canAnimateProp){
      // snapshot current angle then freeze by removing the animation
      const cs=getComputedStyle(stage).getPropertyValue('--spin');
      stopCSS();
      if(cs) stage.style.setProperty('--spin', cs.trim());
    } else { stopJS(); }
  }
  function freeze(){
    // reduced-motion: hold a pleasing static angle, kill all motion
    stopJS(); stopCSS();
    stage.style.transform='scale(var(--scene-scale)) rotateX(58deg) rotateZ(45deg)';
    btn.style.display='none';
  }

  let isPaused=false;
  btn.addEventListener('click',()=>{
    isPaused=!isPaused;
    isPaused ? pause() : play();
  });

  // start in the correct mode
  if(prefersReduce.matches){ freeze(); }
  else { play(); }

  // react to a live reduced-motion toggle
  prefersReduce.addEventListener?.('change', e=>{
    if(e.matches){ freeze(); }
    else { btn.style.display=''; isPaused=false; play(); }
  });

  // pause when tab hidden (saves a little battery / frames)
  document.addEventListener('visibilitychange',()=>{
    if(prefersReduce.matches) return;
    if(document.hidden){ if(canAnimateProp) stopCSS(); else stopJS(); }
    else if(!isPaused){ play(); }
  });
})();
</script>
</body>
</html>
