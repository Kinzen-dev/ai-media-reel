<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Relay // the realtime API for developers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   RELAY - centered developer-API code-block hero
   Register: Clerk / Resend / Liveblocks. The HERO is the code.
   Palette: near-white canvas, near-black ink, ONE accent (electric indigo),
            syntax tokens kept restrained (keyword / string / fn / comment / num).
   ============================================================ */
:root{
  --bg:#fbfbfd;
  --bg-grid:#f1f1f5;
  --ink:#0c0c11;
  --ink-2:#3a3a44;
  --ink-3:#6c6c78;
  --ink-faint:#9a9aa6;
  --line:#e6e6ec;
  --line-2:#dadae2;
  --accent:#5b5bf0;          /* electric indigo */
  --accent-ink:#4a4adf;
  --accent-soft:#eeeefe;
  --card:#ffffff;
  /* code surface = near-black plate so the snippet reads as the focal object */
  --code-bg:#101018;
  --code-bg-2:#15151f;
  --code-line:#23232f;
  --code-ink:#e7e7f0;
  --code-dim:#5d5d6e;
  /* syntax tokens (on dark plate) */
  --tok-key:#c79bf0;         /* keyword - violet */
  --tok-str:#8fd98a;         /* string - green */
  --tok-fn:#6fb6ff;          /* function - blue */
  --tok-num:#f2b072;         /* number - amber */
  --tok-com:#5d5d6e;         /* comment - dim */
  --tok-punct:#a8a8b8;
  --tok-prop:#e7e7f0;
  --radius:14px;
  --maxw:1180px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:"Inter",system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
.mono{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace}

/* faint structural grid behind everything - signature texture, very low contrast */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(var(--bg-grid) 1px,transparent 1px),
    linear-gradient(90deg,var(--bg-grid) 1px,transparent 1px);
  background-size:44px 44px;
  -webkit-mask-image:radial-gradient(120% 80% at 50% 28%,#000 35%,transparent 78%);
          mask-image:radial-gradient(120% 80% at 50% 28%,#000 35%,transparent 78%);
  opacity:.7;
}

/* ---- top nav ---- */
.nav{
  position:relative;z-index:5;
  max-width:var(--maxw);margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 28px;gap:18px;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:16px;letter-spacing:-.01em}
.brand .glyph{
  width:26px;height:26px;border-radius:8px;
  background:linear-gradient(150deg,var(--accent),#8a8af6);
  display:grid;place-items:center;color:#fff;
  font-family:"JetBrains Mono",monospace;font-weight:700;font-size:14px;
  box-shadow:0 2px 8px rgba(91,91,240,.35);
}
.nav-links{display:flex;align-items:center;gap:26px}
.nav-links a{color:var(--ink-2);text-decoration:none;font-size:14px;font-weight:500;transition:color .15s}
.nav-links a:hover{color:var(--ink)}
.nav-cta{
  font-size:14px;font-weight:600;color:#fff;background:var(--ink);
  padding:9px 16px;border-radius:9px;text-decoration:none;transition:transform .15s,background .15s;
}
.nav-cta:hover{background:#000;transform:translateY(-1px)}
@media(max-width:760px){ .nav-links a:not(.nav-cta){display:none} }

/* ---- hero ---- */
.hero{
  position:relative;z-index:2;
  max-width:920px;margin:0 auto;
  padding:30px 24px 56px;
  text-align:center;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:12.5px;font-weight:600;letter-spacing:.02em;
  color:var(--accent-ink);background:var(--accent-soft);
  border:1px solid #dcdcfb;border-radius:999px;
  padding:6px 13px 6px 9px;margin-bottom:22px;
}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px rgba(91,91,240,.18)}
.eyebrow .ver{font-family:"JetBrains Mono",monospace;font-weight:500;color:var(--accent-ink);opacity:.85}

h1{
  font-size:clamp(2.05rem,6vw,3.6rem);
  line-height:1.04;letter-spacing:-.035em;font-weight:700;
  color:var(--ink);
}
h1 .em{
  background:linear-gradient(100deg,var(--accent),#9494f7 80%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.sub{
  margin:20px auto 0;max-width:560px;
  font-size:clamp(1rem,2.4vw,1.16rem);
  color:var(--ink-3);font-weight:400;line-height:1.55;
}

/* ---- CTA pair ---- */
.cta-row{
  margin-top:30px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;
}
.btn{
  display:inline-flex;align-items:center;gap:9px;
  font-size:15px;font-weight:600;text-decoration:none;
  padding:13px 20px;border-radius:11px;
  transition:transform .14s,box-shadow .14s,background .14s,border-color .14s;
  cursor:pointer;border:1px solid transparent;
}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 6px 18px -6px rgba(91,91,240,.6)}
.btn-primary:hover{background:var(--accent-ink);transform:translateY(-2px);box-shadow:0 12px 26px -8px rgba(91,91,240,.65)}
.btn-ghost{
  background:var(--card);color:var(--ink);border-color:var(--line-2);
  font-family:"JetBrains Mono",monospace;font-weight:500;
}
.btn-ghost:hover{border-color:var(--ink-3);transform:translateY(-2px)}
.btn-ghost .prompt{color:var(--accent);font-weight:700}
.btn-ghost .copy{
  margin-left:2px;color:var(--ink-faint);
  display:inline-grid;place-items:center;width:18px;height:18px;
}
.btn-ghost.copied{border-color:var(--accent);color:var(--accent-ink)}
.btn-ghost.copied .copy{color:var(--accent)}
.btn svg{width:16px;height:16px;flex:none}

/* ---- THE CODE BLOCK (the signature) ---- */
.code-wrap{
  position:relative;z-index:2;
  max-width:760px;margin:42px auto 0;
}
.code-card{
  background:var(--code-bg);
  border:1px solid var(--code-line);
  border-radius:var(--radius);
  box-shadow:
    0 1px 0 rgba(255,255,255,.04) inset,
    0 30px 70px -28px rgba(20,20,50,.55),
    0 8px 24px -12px rgba(20,20,50,.35);
  overflow:hidden;
  text-align:left;
}
.code-head{
  display:flex;align-items:center;gap:12px;
  padding:11px 15px;
  background:var(--code-bg-2);
  border-bottom:1px solid var(--code-line);
}
.dots{display:flex;gap:7px}
.dots i{width:11px;height:11px;border-radius:50%;display:block}
.dots i:nth-child(1){background:#ff5f56}
.dots i:nth-child(2){background:#ffbd2e}
.dots i:nth-child(3){background:#27c93f}
.tabs{display:flex;gap:4px;margin-left:6px;flex:1;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-family:"JetBrains Mono",monospace;font-size:12.5px;
  color:var(--code-dim);background:transparent;border:0;
  padding:6px 11px;border-radius:7px;cursor:pointer;white-space:nowrap;
  transition:color .15s,background .15s;display:flex;align-items:center;gap:7px;
}
.tab .fdot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.55}
.tab[aria-selected="true"]{color:var(--code-ink);background:rgba(255,255,255,.06)}
.tab:hover{color:var(--code-ink)}
.tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.copy-btn{
  margin-left:auto;flex:none;
  display:inline-flex;align-items:center;gap:6px;
  font-family:"JetBrains Mono",monospace;font-size:11.5px;
  color:var(--code-dim);background:rgba(255,255,255,.04);
  border:1px solid var(--code-line);border-radius:7px;
  padding:6px 9px;cursor:pointer;transition:color .15s,border-color .15s;
}
.copy-btn:hover{color:var(--code-ink);border-color:#36364a}
.copy-btn:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.copy-btn.ok{color:var(--tok-str);border-color:var(--tok-str)}
.copy-btn svg{width:13px;height:13px}

.code-body{
  position:relative;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
}
.code-body::-webkit-scrollbar{height:8px}
.code-body::-webkit-scrollbar-thumb{background:#2a2a38;border-radius:8px}
pre{
  margin:0;padding:20px 22px 22px;
  font-family:"JetBrains Mono",monospace;
  font-size:14px;line-height:1.85;
  color:var(--code-ink);
  min-width:max-content;
  counter-reset:ln;
  tab-size:2;
}
.cl{display:block;white-space:pre}
.cl::before{
  counter-increment:ln;content:counter(ln);
  display:inline-block;width:1.6em;margin-right:1.4em;
  color:var(--code-line);text-align:right;
  -webkit-user-select:none;user-select:none;
  font-size:12.5px;
}
.cl.blank::before{color:var(--code-line)}
/* typed caret on the active code panel */
.code-panel{display:none}
.code-panel.on{display:block}
.caret{
  display:inline-block;width:8px;height:1.05em;
  background:var(--accent);margin-left:1px;vertical-align:text-bottom;
  border-radius:1px;
  animation:blink 1.1s steps(1) infinite;
}
@keyframes blink{50%{opacity:0}}

/* token colors */
.t-key{color:var(--tok-key)}
.t-str{color:var(--tok-str)}
.t-fn{color:var(--tok-fn)}
.t-num{color:var(--tok-num)}
.t-com{color:var(--tok-com);font-style:italic}
.t-pun{color:var(--tok-punct)}
.t-prop{color:var(--tok-prop)}
.t-acc{color:#a4a4ff}

/* footer line under the code: result chip */
.result{
  margin:16px auto 0;max-width:760px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-family:"JetBrains Mono",monospace;font-size:12.5px;
  color:var(--ink-3);
}
.result .pill{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--card);border:1px solid var(--line);border-radius:999px;
  padding:5px 12px;
}
.result .ok-dot{width:7px;height:7px;border-radius:50%;background:#27c93f;box-shadow:0 0 0 3px rgba(39,201,63,.16)}
.result .lat{color:var(--accent-ink);font-weight:600}

/* ---- logo strip ---- */
.logos{
  position:relative;z-index:2;
  max-width:var(--maxw);margin:62px auto 0;padding:0 24px 64px;
  text-align:center;
}
.logos .lead{
  font-size:12.5px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;margin-bottom:24px;
}
.logo-grid{
  display:flex;flex-wrap:wrap;align-items:center;justify-content:center;
  gap:14px 40px;
}
.logo{
  display:inline-flex;align-items:center;gap:9px;
  color:var(--ink-3);font-weight:600;font-size:16px;letter-spacing:-.01em;
  opacity:.8;transition:opacity .2s,color .2s;
}
.logo:hover{opacity:1;color:var(--ink)}
.logo svg{width:20px;height:20px;flex:none}
@media(max-width:640px){ .logo-grid{gap:14px 26px} .logo{font-size:14px} }

/* reduced motion: kill caret blink + transforms */
@media(prefers-reduced-motion:reduce){
  *{transition:none !important;animation:none !important}
  .caret{display:none}
}

@media(max-width:640px){
  .hero{padding:18px 18px 40px}
  .code-wrap{margin-top:30px}
  pre{font-size:13px;padding:16px 16px 18px}
  .cl::before{width:1.4em;margin-right:1em}
  .nav{padding:16px 18px}
  .cta-row{gap:10px}
  .btn{padding:12px 17px;font-size:14px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="brand">
    <span class="glyph mono" id="brandGlyph">/</span>
    <span id="brandName">Relay</span>
  </div>
  <div class="nav-links">
    <a href="#" data-nav="0">Docs</a>
    <a href="#" data-nav="1">Pricing</a>
    <a href="#" data-nav="2">Changelog</a>
    <a href="#" class="nav-cta" id="navCta">Get API keys</a>
  </div>
</nav>

<header class="hero">
  <span class="eyebrow">
    <span class="dot"></span>
    <span id="ebText">Realtime infrastructure</span>
    <span class="ver mono" id="ebVer">v3.2</span>
  </span>

  <h1 id="headline"></h1>
  <p class="sub" id="subline"></p>

  <div class="cta-row">
    <a class="btn btn-primary" href="#" id="ctaPrimary">
      <span id="ctaPrimaryLabel">Get API keys</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </a>
    <button class="btn btn-ghost mono" id="ctaInstall" type="button" aria-label="Copy install command">
      <span class="prompt">$</span>
      <span id="ctaInstallCmd">npm i @relay/client</span>
      <span class="copy" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
      </span>
    </button>
  </div>
</header>

<div class="code-wrap">
  <div class="code-card">
    <div class="code-head">
      <div class="dots" aria-hidden="true"><i></i><i></i><i></i></div>
      <div class="tabs" role="tablist" aria-label="Integration examples" id="tabs"></div>
      <button class="copy-btn mono" id="codeCopy" type="button" aria-label="Copy code">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        <span id="codeCopyLabel">Copy</span>
      </button>
    </div>
    <div class="code-body" id="codeBody"></div>
  </div>
</div>

<div class="result">
  <span class="pill"><span class="ok-dot"></span><span id="resultText">200 OK</span></span>
  <span>channel ready in <span class="lat mono" id="resultLat">11ms</span></span>
</div>

<section class="logos">
  <p class="lead" id="logosLead">Powering realtime for teams at</p>
  <div class="logo-grid" id="logoGrid"></div>
</section>

<script>
/* ============================================================
   DATA - swap everything here. The hero IS the code block.
   Each snippet is an array of LINES; each line is an array of
   [text, tokenClass] pairs. tokenClass: key str fn num com pun prop acc ''(plain)
   Keep snippets to 3-7 lines: it is integration proof, not a tutorial.
   ============================================================ */
const DATA = {
  brand:    { glyph:"/", name:"Relay" },
  eyebrow:  { text:"Realtime infrastructure", version:"v3.2" },
  // headline: array of {t, em?} segments. em = accent gradient.
  headline: [ {t:"The realtime API "}, {t:"developers",em:true}, {t:" actually ship on"} ],
  subline:  "Presence, broadcast, and storage as one primitive. Wire up live cursors, comments, and sync in the time it takes to read this snippet.",
  install:  "npm i @relay/client",
  cta:      { primary:"Get API keys" },
  result:   { status:"200 OK", latency:"11ms" },
  logosLead:"Powering realtime for teams at",

  // The integration snippets (tabs). Each is the minimal real code.
  tabs: [
    {
      label:"client.ts", lang:"ts",
      lines:[
        [ ["import",'key'],[" { createRoom } ",'pun'],["from",'key'],[" ",''],["'@relay/client'",'str'] ],
        [],
        [ ["const",'key'],[" room ",'prop'],["= ",'pun'],["createRoom",'fn'],["(",'pun'],["{",'pun'] ],
        [ ["  apiKey",'prop'],[": ",'pun'],["process",'prop'],[".",'pun'],["env",'prop'],[".",'pun'],["RELAY_KEY",'prop'],[",",'pun'] ],
        [ ["  channel",'prop'],[": ",'pun'],["'doc-42'",'str'] ],
        [ ["}",'pun'],[")",'pun'] ],
        [],
        [ ["room",'prop'],[".",'pun'],["on",'fn'],["(",'pun'],["'presence'",'str'],[", ",'pun'],["(",'pun'],["users",'prop'],[") ",'pun'],["=> ",'key'],["render",'fn'],["(",'pun'],["users",'prop'],[")",'pun'],[")",'pun'] ]
      ]
    },
    {
      label:"server.ts", lang:"ts",
      lines:[
        [ ["import",'key'],[" { Relay } ",'pun'],["from",'key'],[" ",''],["'@relay/node'",'str'] ],
        [],
        [ ["const",'key'],[" relay ",'prop'],["= ",'pun'],["new",'key'],[" ",''],["Relay",'fn'],["(",'pun'],["process",'prop'],[".",'pun'],["env",'prop'],[".",'pun'],["RELAY_KEY",'prop'],[")",'pun'] ],
        [],
        [ ["await",'key'],[" relay",'prop'],[".",'pun'],["broadcast",'fn'],["(",'pun'],["'doc-42'",'str'],[", ",'pun'],["{",'pun'] ],
        [ ["  type",'prop'],[": ",'pun'],["'comment'",'str'],[", ",'pun'],["at",'prop'],[": ",'pun'],["42",'num'] ],
        [ ["}",'pun'],[")",'pun'] ]
      ]
    },
    {
      label:"curl", lang:"sh",
      lines:[
        [ ["curl",'fn'],[" -X ",'pun'],["POST",'acc'],[" https://api.relay.dev/v3/broadcast",'str'],[" \\",'pun'] ],
        [ ["  -H ",'pun'],['"Authorization: Bearer $RELAY_KEY"',"str"],[" \\",'pun'] ],
        [ ["  -H ",'pun'],['"Content-Type: application/json"',"str"],[" \\",'pun'] ],
        [ ["  -d ",'pun'],['\'{ "channel": "doc-42", "event": "ping" }\'',"str"] ]
      ]
    }
  ],

  // logo strip - simple inline-SVG marks + names (kept generic, swap freely)
  logos:[
    {name:"Northwind", mark:"poly"},
    {name:"Cartograph", mark:"ring"},
    {name:"Beacon", mark:"tri"},
    {name:"Lumen", mark:"square"},
    {name:"Fathom", mark:"hex"},
    {name:"Verge", mark:"slash"}
  ]
};

/* ---------- render text bits ---------- */
document.getElementById('brandGlyph').textContent = DATA.brand.glyph;
document.getElementById('brandName').textContent  = DATA.brand.name;
document.getElementById('ebText').textContent      = DATA.eyebrow.text;
document.getElementById('ebVer').textContent       = DATA.eyebrow.version;
document.getElementById('subline').textContent     = DATA.subline;
document.getElementById('ctaInstallCmd').textContent = DATA.install;
document.getElementById('ctaPrimaryLabel').textContent = DATA.cta.primary;
document.getElementById('resultText').textContent  = DATA.result.status;
document.getElementById('resultLat').textContent   = DATA.result.latency;
document.getElementById('logosLead').textContent   = DATA.logosLead;
document.title = DATA.brand.name + " // " + DATA.eyebrow.text;

(function headline(){
  const h = document.getElementById('headline');
  DATA.headline.forEach(seg=>{
    const span = document.createElement('span');
    if(seg.em) span.className = 'em';
    span.textContent = seg.t;
    h.appendChild(span);
  });
})();

/* ---------- build code panels + tabs ---------- */
const tabsEl  = document.getElementById('tabs');
const bodyEl  = document.getElementById('codeBody');
const panels  = [];

DATA.tabs.forEach((tab, i)=>{
  // tab button
  const b = document.createElement('button');
  b.className = 'tab';
  b.setAttribute('role','tab');
  b.setAttribute('aria-selected', i===0 ? 'true':'false');
  b.id = 'tab-'+i;
  b.tabIndex = i===0 ? 0 : -1;
  b.innerHTML = '<span class="fdot"></span>'+tab.label;
  b.addEventListener('click', ()=>select(i));
  b.addEventListener('keydown', e=>{
    if(e.key==='ArrowRight'||e.key==='ArrowLeft'){
      e.preventDefault();
      const n = DATA.tabs.length;
      const next = (i + (e.key==='ArrowRight'?1:n-1)) % n;
      select(next); tabsEl.children[next].focus();
    }
  });
  tabsEl.appendChild(b);

  // code panel
  const panel = document.createElement('div');
  panel.className = 'code-panel' + (i===0?' on':'');
  panel.setAttribute('role','tabpanel');
  const pre = document.createElement('pre');
  pre.className = 'mono';
  tab.lines.forEach(line=>{
    const div = document.createElement('span');
    div.className = 'cl' + (line.length===0 ? ' blank':'');
    if(line.length===0){
      div.appendChild(document.createTextNode(' '));
    } else {
      line.forEach(([txt,cls])=>{
        if(cls){
          const s = document.createElement('span');
          s.className = 't-'+cls;
          s.textContent = txt;
          div.appendChild(s);
        } else {
          div.appendChild(document.createTextNode(txt));
        }
      });
    }
    pre.appendChild(div);
  });
  panel.appendChild(pre);
  bodyEl.appendChild(panel);
  panels.push(panel);
});

let current = 0;
function select(i){
  if(i===current) return;
  current = i;
  [...tabsEl.children].forEach((t,idx)=>{
    const on = idx===i;
    t.setAttribute('aria-selected', on?'true':'false');
    t.tabIndex = on?0:-1;
  });
  panels.forEach((p,idx)=>p.classList.toggle('on', idx===i));
  resetCopy(document.getElementById('codeCopy'), document.getElementById('codeCopyLabel'), 'Copy');
  placeCaret();
}

/* plain-text reconstruction of a snippet for clipboard */
function snippetText(tab){
  return tab.lines.map(line=> line.map(([t])=>t).join('')).join('\n');
}

/* ---------- copy helpers ---------- */
function flashCopy(btn, labelEl, doneLabel, baseLabel){
  if(labelEl) labelEl.textContent = doneLabel;
  btn.classList.add('ok','copied');
  clearTimeout(btn._t);
  btn._t = setTimeout(()=>{ if(labelEl) labelEl.textContent = baseLabel; btn.classList.remove('ok','copied'); }, 1400);
}
function resetCopy(btn,labelEl,baseLabel){
  if(labelEl) labelEl.textContent = baseLabel;
  btn.classList.remove('ok','copied');
}
function doCopy(text){
  if(navigator.clipboard && window.isSecureContext){
    return navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
  }
  return Promise.resolve(fallbackCopy(text));
}
function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{ document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
}

const codeCopyBtn   = document.getElementById('codeCopy');
const codeCopyLabel = document.getElementById('codeCopyLabel');
codeCopyBtn.addEventListener('click', ()=>{
  doCopy(snippetText(DATA.tabs[current]));
  flashCopy(codeCopyBtn, codeCopyLabel, 'Copied', 'Copy');
});

const installBtn = document.getElementById('ctaInstall');
installBtn.addEventListener('click', ()=>{
  doCopy(DATA.install);
  const cmd = document.getElementById('ctaInstallCmd');
  const orig = DATA.install;
  cmd.textContent = 'Copied to clipboard';
  installBtn.classList.add('copied');
  clearTimeout(installBtn._t);
  installBtn._t = setTimeout(()=>{ cmd.textContent = orig; installBtn.classList.remove('copied'); }, 1400);
});

/* ---------- live-editor caret (motion-safe) ----------
   We do NOT retype the whole block (jank + a11y noise). A single
   blinking caret sits at the end of the active panel, signaling
   "live editor" with zero per-frame layout cost. Under reduced
   motion it is suppressed entirely (CSS hides .caret too). */
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function placeCaret(){
  document.querySelectorAll('.caret').forEach(c=>c.remove());
  if(reduceMotion) return;
  const panel = panels[current];
  if(!panel) return;
  const lines = panel.querySelectorAll('.cl');
  const last  = lines[lines.length-1];
  if(!last) return;
  const c = document.createElement('span');
  c.className = 'caret';
  last.appendChild(c);
}
placeCaret();
