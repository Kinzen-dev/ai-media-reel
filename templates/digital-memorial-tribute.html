<!-- TEMPLATE: In Memoriam Tribute | ARCHETYPE: memorial obituary life-tribute | REF: digital memorial pages, obituary editorial, in-memoriam microsites | WHEN TO USE: a dignified life-tribute / obituary / in-memoriam page with sepia portrait, year span, and a vertical life-timeline | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>In Memoriam</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23f4f1ea'/%3E%3Cpath d='M8 3l1 3 3 1-3 1-1 3-1-3-3-1 3-1z' fill='%23b8975a'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DATA-DRIVEN MEMORIAL. All content lives in the JS DATA array
   at the top of <script>. Edit that to repurpose this page.
   Palette: warm paper / sepia portrait / ink / soft gold.
   ============================================================ */
:root{
  --paper:#f4f1ea;
  --paper-2:#efeadf;
  --ink:#2a2620;
  --ink-soft:#5b5347;
  --gold:#b8975a;
  --gold-deep:#9c7d44;
  --line:#d8d0c0;
  --sepia-tone:#7a6a4f;
  --maxw:1180px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion: reduce){ html{scroll-behavior:auto} }
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'EB Garamond', Georgia, serif;
  font-size:18px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
::selection{background:var(--gold);color:var(--paper)}

/* subtle paper grain via repeating gradient, no images */
body::before{
  content:"";
  position:fixed;inset:0;
  pointer-events:none;z-index:0;
  background:
    radial-gradient(120% 80% at 50% 0%, rgba(184,151,90,.05), transparent 60%),
    repeating-linear-gradient(0deg, rgba(42,38,32,.012) 0 2px, transparent 2px 4px);
  mix-blend-mode:multiply;
}

.wrap{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:0 28px}

/* ---------- top band: small ornament + label ---------- */
.topband{
  display:flex;align-items:center;justify-content:center;gap:18px;
  padding:30px 0 14px;
}
.topband .label{
  font-family:'Cormorant',serif;
  font-weight:500;
  letter-spacing:.42em;
  text-transform:uppercase;
  font-size:13px;
  color:var(--gold-deep);
}
.rule{height:1px;width:64px;background:linear-gradient(90deg,transparent,var(--line),transparent)}

/* ============================================================
   HERO - signature: sepia portrait + serif name + year span,
   with the START of the life-timeline already visible at scroll=0
   ============================================================ */
.hero{
  display:grid;
  grid-template-columns:1.05fr 1fr;
  gap:54px;
  align-items:center;
  padding:8px 0 40px;
  min-height:auto;
}

/* --- portrait, framed, sepia, dignified (contain) --- */
.portrait-frame{
  position:relative;
  align-self:center;
}
.portrait-mat{
  position:relative;
  background:linear-gradient(160deg,#fbf8f1,#e9e2d2);
  padding:20px;
  border:1px solid var(--line);
  box-shadow:
    0 1px 0 rgba(255,255,255,.7) inset,
    0 26px 60px -28px rgba(42,38,32,.5);
}
.portrait-mat::after{
  content:"";position:absolute;inset:11px;border:1px solid rgba(184,151,90,.45);pointer-events:none;
}
.portrait{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  overflow:hidden;
  background:#1c1812;
}
.portrait img{
  width:100%;height:100%;
  object-fit:cover;          /* desktop: square asset fills square frame cleanly */
  object-position:center 40%;
  display:block;
  /* sepia / desaturated treatment */
  filter:grayscale(.55) sepia(.42) contrast(.96) brightness(.98);
}
/* warm vignette + tone over portrait so any asset reads memorial */
.portrait::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(120% 110% at 50% 30%, transparent 38%, rgba(28,22,14,.42) 100%),
    linear-gradient(180deg, rgba(122,106,79,.10), rgba(42,38,32,.20));
  mix-blend-mode:multiply;
}
.portrait-cap{
  text-align:center;
  font-family:'Cormorant',serif;
  font-style:italic;
  font-size:15px;
  letter-spacing:.04em;
  color:var(--ink-soft);
  margin-top:14px;
}

/* --- name block --- */
.namecol{padding:6px 0}
.kicker{
  font-family:'Cormorant',serif;
  font-style:italic;
  font-size:20px;
  color:var(--gold-deep);
  letter-spacing:.02em;
  margin-bottom:8px;
}
.name{
  font-family:'Cormorant',serif;
  font-weight:300;
  font-size:clamp(48px, 6.4vw, 92px);
  line-height:.96;
  letter-spacing:.005em;
  color:var(--ink);
}
.name .gn{display:block;font-weight:500}
.years{
  display:flex;align-items:center;gap:16px;
  margin:22px 0 4px;
  font-family:'Cormorant',serif;
  font-size:clamp(22px,2.4vw,30px);
  font-weight:400;
  color:var(--ink-soft);
  letter-spacing:.06em;
}
.years .star{color:var(--gold);font-size:.7em;transform:translateY(-1px)}
.epitaph{
  max-width:40ch;
  margin-top:14px;
  font-style:italic;
  font-size:19px;
  color:var(--ink-soft);
}

/* --- timeline preview seeded into the hero (right under name) --- */
.hero-timeline{
  margin-top:26px;
  padding-left:24px;
  position:relative;
  max-width:46ch;
}
.hero-timeline::before{
  content:"";position:absolute;left:5px;top:6px;bottom:6px;width:2px;
  background:linear-gradient(180deg,var(--gold),var(--line));
}
.htl-item{position:relative;padding:0 0 16px 2px}
.htl-item:last-child{padding-bottom:0}
.htl-item::before{
  content:"";position:absolute;left:-23px;top:9px;width:10px;height:10px;border-radius:50%;
  background:var(--paper);border:2px solid var(--gold);
}
.htl-year{
  font-family:'Cormorant',serif;font-weight:600;font-size:16px;
  letter-spacing:.14em;color:var(--gold-deep);
}
.htl-text{font-size:16px;color:var(--ink);line-height:1.45}
.htl-more{
  font-family:'Cormorant',serif;font-style:italic;font-size:15px;
  color:var(--ink-soft);margin-top:4px;display:inline-block;
}

/* ============================================================
   FULL LIFE TIMELINE (below the fold)
   ============================================================ */
.section{padding:64px 0}
.section-head{text-align:center;margin-bottom:48px}
.section-head .eyebrow{
  font-family:'Cormorant',serif;font-weight:500;letter-spacing:.4em;
  text-transform:uppercase;font-size:12px;color:var(--gold-deep);
}
.section-head h2{
  font-family:'Cormorant',serif;font-weight:300;
  font-size:clamp(34px,4vw,52px);color:var(--ink);margin-top:6px;letter-spacing:.01em;
}

.timeline{
  position:relative;
  max-width:760px;margin:0 auto;
  padding-left:0;
}
.timeline::before{
  content:"";position:absolute;left:50%;transform:translateX(-50%);
  top:8px;bottom:8px;width:2px;
  background:linear-gradient(180deg,var(--line),var(--gold),var(--line));
}
.tl-row{
  position:relative;
  display:grid;
  grid-template-columns:1fr 56px 1fr;
  align-items:start;
  margin-bottom:46px;
  opacity:0;transform:translateY(18px);
  transition:opacity .8s ease, transform .8s ease;
}
.tl-row.in{opacity:1;transform:none}
.tl-row:nth-child(even) .tl-card{grid-column:3}
.tl-dot{
  grid-column:2;justify-self:center;margin-top:6px;
  width:16px;height:16px;border-radius:50%;
  background:var(--paper);border:2px solid var(--gold);
  box-shadow:0 0 0 5px rgba(184,151,90,.12);
  position:relative;z-index:2;
}
.tl-card{
  grid-column:1;
  background:var(--paper-2);
  border:1px solid var(--line);
  padding:20px 24px;
  position:relative;
}
.tl-card::before{ /* connector tick */
  content:"";position:absolute;top:12px;width:22px;height:1px;background:var(--gold);
}
.tl-row:nth-child(odd) .tl-card::before{right:-23px}
.tl-row:nth-child(even) .tl-card::before{left:-23px}
.tl-year{
  font-family:'Cormorant',serif;font-weight:600;font-size:17px;
  letter-spacing:.16em;color:var(--gold-deep);
}
.tl-title{
  font-family:'Cormorant',serif;font-weight:500;font-size:24px;
  color:var(--ink);margin:2px 0 6px;line-height:1.15;
}
.tl-body{font-size:16.5px;color:var(--ink-soft);line-height:1.5}

/* ============================================================
   EULOGY
   ============================================================ */
.eulogy{background:var(--paper-2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.eulogy .inner{max-width:660px;margin:0 auto;text-align:center;padding:8px 0}
.eulogy .mark{
  font-family:'Cormorant',serif;font-size:90px;line-height:.4;color:var(--gold);
  height:46px;display:block;
}
.eulogy p{
  font-family:'Cormorant',serif;font-style:italic;font-weight:400;
  font-size:clamp(22px,2.6vw,30px);line-height:1.5;color:var(--ink);
}
.eulogy p + p{margin-top:20px}
.eulogy .by{
  margin-top:30px;font-style:normal;font-family:'EB Garamond',serif;
  font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);
}

/* ============================================================
   GALLERY (gentle, sepia, contain)
   ============================================================ */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:22px;
}
.gframe{
  background:linear-gradient(160deg,#fbf8f1,#eae3d3);
  border:1px solid var(--line);
  padding:12px;
  box-shadow:0 16px 36px -26px rgba(42,38,32,.5);
  opacity:0;transform:translateY(16px) scale(.99);
  transition:opacity .7s ease, transform .7s ease;
}
.gframe.in{opacity:1;transform:none}
.gframe .ph{
  aspect-ratio:4/5;overflow:hidden;background:#1c1812;position:relative;
}
.gframe .ph img{
  width:100%;height:100%;object-fit:cover;display:block;
  filter:grayscale(.6) sepia(.4) contrast(.95) brightness(.97);
}
.gframe .ph::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(122,106,79,.06),rgba(42,38,32,.18));
  mix-blend-mode:multiply;
}
.gframe figcaption{
  text-align:center;font-family:'Cormorant',serif;font-style:italic;
  font-size:15px;color:var(--ink-soft);margin-top:10px;
}

/* ---------- closing ---------- */
.closing{text-align:center;padding:70px 0 30px}
.closing .orn{color:var(--gold);font-size:26px;letter-spacing:.5em;padding-left:.5em}
.closing .line{
  font-family:'Cormorant',serif;font-style:italic;font-size:clamp(24px,3vw,34px);
  color:var(--ink);margin:18px 0 8px;
}
.closing .sub{font-size:15px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft)}
footer{
  text-align:center;padding:28px 0 44px;border-top:1px solid var(--line);
  font-size:13px;letter-spacing:.12em;color:var(--ink-soft);
}

/* ---------- focus visibility ---------- */
a:focus-visible, .gframe:focus-visible{
  outline:2px solid var(--gold-deep);outline-offset:4px;
}

/* ============================================================
   RESPONSIVE - keep portrait dignified (contain), stack at phone
   ============================================================ */
@media (max-width: 920px){
  .hero{grid-template-columns:1fr;gap:34px;text-align:center}
  .portrait-frame{max-width:420px;margin:0 auto;order:0}
  .namecol{order:1}
  .years{justify-content:center}
  .epitaph{margin-left:auto;margin-right:auto}
  .hero-timeline{margin-left:auto;margin-right:auto;text-align:left;display:inline-block}
}
@media (max-width: 640px){
  body{font-size:16.5px}
  .wrap{padding:0 18px}
  .topband{padding:14px 0 6px}
  .topband .label{font-size:11px;letter-spacing:.34em}
  .rule{width:40px}
  /* compact the hero so the timeline mechanic peeks into the first screen */
  .hero{padding:2px 0 24px;gap:16px}
  .portrait-mat{padding:12px}
  .portrait-mat::after{inset:7px}
  /* letterbox the portrait so a non-square asset is NEVER harshly cropped,
     and cap its height so the seeded timeline reaches into the first viewport */
  .portrait{aspect-ratio:16/10;max-height:42vh}
  .portrait img{object-fit:contain;object-position:center;background:#1c1812}
  .portrait-cap{margin-top:8px;font-size:14px}
  .kicker{font-size:17px;margin-bottom:4px}
  .name{font-size:clamp(38px,11vw,56px)}
  .years{margin:12px 0 2px}
  .epitaph{margin-top:8px;font-size:17px}
  .hero-timeline{margin-top:14px;max-width:100%;padding-left:22px}
  .timeline{padding-left:6px}
  .timeline::before{left:7px;transform:none}
  .tl-row{grid-template-columns:32px 1fr;gap:0;margin-bottom:30px}
  .tl-dot{grid-column:1;justify-self:start;margin-left:0}
  .tl-card,.tl-row:nth-child(even) .tl-card{grid-column:2}
  .tl-card::before,.tl-row:nth-child(even) .tl-card::before,
  .tl-row:nth-child(odd) .tl-card::before{left:-23px;right:auto}
  .gallery-grid{grid-template-columns:1fr 1fr;gap:14px}
  .section{padding:48px 0}
}
@media (max-width: 420px){
  .gallery-grid{grid-template-columns:1fr}
}

/* reduced motion: show final state, no entrance transforms */
@media (prefers-reduced-motion: reduce){
  .tl-row,.gframe{opacity:1 !important;transform:none !important;transition:none !important}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- top band: keeps signature compact + above the seeded hero -->
  <div class="topband">
    <span class="rule"></span>
    <span class="label" id="topLabel">In Loving Memory</span>
    <span class="rule"></span>
  </div>

  <!-- HERO: sepia portrait + serif name + year span + timeline start -->
  <header class="hero">
    <div class="portrait-frame">
      <div class="portrait-mat">
        <figure class="portrait">
          <img id="heroImg" alt="" decoding="async" fetchpriority="high">
        </figure>
      </div>
      <div class="portrait-cap" id="heroCap"></div>
    </div>

    <div class="namecol">
      <div class="kicker" id="kicker"></div>
      <h1 class="name"><span class="gn" id="nameGiven"></span><span id="nameFamily"></span></h1>
      <div class="years">
        <span id="yBorn"></span>
        <span class="star">&#10022;</span>
        <span id="yTo">to</span>
        <span id="yDied"></span>
      </div>
      <p class="epitaph" id="epitaph"></p>

      <!-- start of the life-timeline, visible at scroll=0 -->
      <div class="hero-timeline" id="heroTimeline"></div>
    </div>
  </header>
</div>

<!-- FULL LIFE TIMELINE -->
<section class="section" id="lifeSection">
  <div class="wrap">
    <div class="section-head">
      <div class="eyebrow">A Life</div>
      <h2 id="lifeTitle">The Years Between</h2>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>
</section>

<!-- EULOGY -->
<section class="eulogy section">
  <div class="wrap">
    <div class="inner">
      <span class="mark">&#8220;</span>
      <div id="eulogyBody"></div>
      <div class="by" id="eulogyBy"></div>
    </div>
  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <div class="wrap">
    <div class="section-head">
      <div class="eyebrow">Remembered</div>
      <h2 id="galleryTitle">Moments Kept</h2>
    </div>
    <div class="gallery-grid" id="gallery"></div>
  </div>
</section>

<!-- CLOSING -->
<div class="wrap">
  <div class="closing">
    <div class="orn">&#10070; &#10070; &#10070;</div>
    <div class="line" id="closingLine"></div>
    <div class="sub" id="closingSub"></div>
  </div>
</div>
<footer id="footer"></footer>

<script>
/* ============================================================
   DATA - edit everything here to repurpose the memorial.
   Year span uses the word "to" (no dash) per house style.
   Asset paths are relative to /showcase/templates/.
   ============================================================ */
const DATA = {
  topLabel: "In Loving Memory",
  kicker: "We gather to remember",
  given:  "Eleanor",
  family: "Marchetti",
  bornYear: "1947",
  diedYear: "2026",
  epitaph: "A quiet life, lived with great warmth, and remembered by everyone she touched.",

  // portrait (square asset, treated sepia / contained on mobile)
  portrait: { src: "../assets/sdxl.png", alt: "Portrait of Eleanor Marchetti", caption: "Autumn, the season she loved most" },

  // seeded into the hero AND drives the section heading rail
  heroTimeline: [
    { year: "1947", text: "Born in late autumn, the youngest of four." },
    { year: "1969", text: "Married James beneath the old oak." },
    { year: "1974", text: "Welcomed her first child." }
  ],
  heroTimelineMore: "and a lifetime more, told below",

  // full vertical life-timeline (dated milestones)
  lifeTitle: "The Years Between",
  timeline: [
    { year: "1947", title: "A Beginning", body: "Born in a small town on the river, the youngest of four, into a house always full of music." },
    { year: "1965", title: "First Light", body: "Left for the city with a single suitcase and a notebook of poems she never showed anyone." },
    { year: "1969", title: "A Promise", body: "Married James beneath the old oak, the same tree their grandchildren would later climb." },
    { year: "1974", title: "A Family Grows", body: "Welcomed her first child, and learned, she often said, what her own mother had always known." },
    { year: "1988", title: "Her Own Door", body: "Opened the little bookshop on Maple Street, where strangers became regulars and regulars became family." },
    { year: "2003", title: "Still Water", body: "Retired to the coast, traded the shop bell for the sound of the tide, and never once looked back." },
    { year: "2026", title: "A Gentle Rest", body: "Passed peacefully at home, surrounded by the people and the autumn light she loved." }
  ],

  eulogy: {
    body: [
      "She measured a life not in what she kept, but in what she gave away freely, a kind word, a warm room, a chair always pulled out for one more.",
      "If you are reading this, you were one of the lucky ones who knew her."
    ],
    by: "Read by her daughter"
  },

  galleryTitle: "Moments Kept",
  gallery: [
    { src: "../assets/sdxl.png",          alt: "A favorite painting",  caption: "The painting above her desk" },
    { src: "../assets/flux-clinic-4k.png", alt: "A quiet interior",     caption: "Sunday mornings, unhurried" },
    { src: "../assets/hf-tinysd.png",     alt: "A small still life",   caption: "From the orchard out back" }
  ],

  closingLine: "Until we meet again, beneath the old oak.",
  closingSub: "Forever in our hearts",
  footer: "In Memoriam · 1947 to 2026 · Tribute page"
};

/* ---------- tiny render helpers ---------- */
const $ = s => document.querySelector(s);
const el = (tag, cls) => { const e=document.createElement(tag); if(cls) e.className=cls; return e; };

function render(){
  $("#topLabel").textContent = DATA.topLabel;
  $("#kicker").textContent   = DATA.kicker;
  $("#nameGiven").textContent  = DATA.given;
  $("#nameFamily").textContent = DATA.family;
  $("#yBorn").textContent = DATA.bornYear;
  $("#yDied").textContent = DATA.diedYear;
  $("#yTo").textContent   = "to";
  $("#epitaph").textContent = DATA.epitaph;

  const img = $("#heroImg");
  img.src = DATA.portrait.src;
  img.alt = DATA.portrait.alt;
  $("#heroCap").textContent = DATA.portrait.caption;

  // seeded hero timeline (scroll=0 signature)
  const htl = $("#heroTimeline");
  DATA.heroTimeline.forEach(it=>{
    const row = el("div","htl-item");
    const y = el("div","htl-year"); y.textContent = it.year;
    const t = el("div","htl-text"); t.textContent = it.text;
    row.append(y,t); htl.appendChild(row);
  });
  if(DATA.heroTimelineMore){
    const more = el("span","htl-more"); more.textContent = DATA.heroTimelineMore;
    htl.appendChild(more);
  }

  $("#lifeTitle").textContent = DATA.lifeTitle;
  const tl = $("#timeline");
  DATA.timeline.forEach(it=>{
    const row = el("div","tl-row");
    const dot = el("div","tl-dot");
    const card = el("div","tl-card");
    const y = el("div","tl-year"); y.textContent = it.year;
    const ti = el("div","tl-title"); ti.textContent = it.title;
    const b = el("div","tl-body"); b.textContent = it.body;
    card.append(y,ti,b);
    row.append(card,dot);  // dot is grid-positioned by CSS regardless of order
    tl.appendChild(row);
  });

  const eb = $("#eulogyBody");
  DATA.eulogy.body.forEach(p=>{ const para=el("p"); para.textContent=p; eb.appendChild(para); });
  $("#eulogyBy").textContent = DATA.eulogy.by;

  $("#galleryTitle").textContent = DATA.galleryTitle;
  const g = $("#gallery");
  DATA.gallery.forEach(it=>{
    const fig = el("figure","gframe");
    fig.tabIndex = 0;
    const ph = el("div","ph");
    const im = el("img");
    im.src = it.src; im.alt = it.alt; im.loading="lazy"; im.decoding="async";
    ph.appendChild(im);
    const cap = el("figcaption"); cap.textContent = it.caption;
    fig.append(ph,cap);
    g.appendChild(fig);
  });

  $("#closingLine").textContent = DATA.closingLine;
  $("#closingSub").textContent  = DATA.closingSub;
  $("#footer").textContent      = DATA.footer;
  document.title = "In Memoriam · " + DATA.given + " " + DATA.family;
}

/* ---------- gentle reveal on scroll (respect reduced motion) ---------- */
function reveals(){
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const items = document.querySelectorAll(".tl-row, .gframe");
  if(reduce || !("IntersectionObserver" in window)){
    items.forEach(i=>i.classList.add("in"));
    return;
  }
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); }
    });
  }, { threshold:0.18, rootMargin:"0px 0px -8% 0px" });
  items.forEach(i=>io.observe(i));
}

render();
reveals();
</script>
</body>
