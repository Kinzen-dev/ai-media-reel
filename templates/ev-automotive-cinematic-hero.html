<!-- TEMPLATE: EV Cinematic Hero | ARCHETYPE: ev-automotive-cinematic-hero | REF: polestar.com, rivian.com | WHEN TO USE: premium automotive / EV / luxury hardware launch landing, dark cinematic full-bleed vehicle hero with reduced UI | SWAP: edit the DATA object in the <script> at the bottom of <body> (plate image, model name, tagline, specs, CTAs) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOCTIS 01 - Electric Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Archivo+Expanded:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     DATA-DRIVEN: all swappable content lives in the JS DATA array
     at the bottom of <body>. This CSS only describes the cinematic
     stage, the reduced UI, and the responsive letterbox behaviour.
     ============================================================ */

  :root {
    --bg: #06070a;
    --ink: #f4f6f8;
    --ink-dim: rgba(244, 246, 248, 0.62);
    --ink-faint: rgba(244, 246, 248, 0.34);
    --accent: #5fd0e8;          /* one brand accent: electric ice */
    --accent-deep: #1e7f96;
    --hairline: rgba(244, 246, 248, 0.16);
    --pad: clamp(20px, 4vw, 56px);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Archivo", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ===== STAGE: full-viewport cinematic frame ===== */
  .stage {
    position: relative;
    width: 100%;
    height: 100svh;
    min-height: 600px;
    overflow: hidden;
    isolation: isolate;
    background: #04050a;
  }

  /* The cinematic vehicle plate. Cover for the full-bleed hero.
     A very slow Ken Burns push gives motion-picture life.
     object-position anchors the vehicle so the crop never decapitates it. */
  .plate {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: 50% 56%;
    z-index: 0;
    transform: scale(1.06);
    animation: kenburns 28s var(--ease) infinite alternate;
    will-change: transform;
  }

  @keyframes kenburns {
    0%   { transform: scale(1.06) translate3d(0, 0, 0); }
    100% { transform: scale(1.16) translate3d(-1.6%, -1.4%, 0); }
  }

  /* Cinematic colour grade + readability scrims, layered. */
  .grade {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(120% 90% at 50% 38%, transparent 0%, rgba(4,5,10,0.18) 56%, rgba(4,5,10,0.74) 100%),
      linear-gradient(180deg, rgba(4,5,10,0.72) 0%, rgba(4,5,10,0.04) 26%, rgba(4,5,10,0.0) 52%, rgba(4,5,10,0.62) 86%, rgba(4,5,10,0.92) 100%),
      linear-gradient(90deg, rgba(4,5,10,0.46) 0%, transparent 34%, transparent 70%, rgba(4,5,10,0.30) 100%);
  }

  /* A whisper of the accent washing the lower frame, like rim light. */
  .grade::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(90% 60% at 22% 92%, rgba(95,208,232,0.16), transparent 60%);
    mix-blend-mode: screen;
    opacity: 0.9;
  }

  /* Cinematic letterbox bars, drawn over everything except chrome. */
  .bar {
    position: absolute;
    left: 0; right: 0;
    height: clamp(18px, 4.2vh, 46px);
    background: #04050a;
    z-index: 2;
    pointer-events: none;
  }
  .bar.top { top: 0; }
  .bar.bottom { bottom: 0; }

  /* Faint film grain via repeating gradient (cheap, no asset). */
  .grain {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    opacity: 0.05;
    mix-blend-mode: overlay;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.6) 0 1px, transparent 1px 2px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.5) 0 1px, transparent 1px 2px);
    background-size: 3px 3px;
    animation: flicker 4s steps(6) infinite;
  }
  @keyframes flicker { 0%,100%{opacity:.05} 50%{opacity:.08} }

  /* ===== REDUCED UI CHROME ===== */
  .chrome {
    position: absolute;
    inset: 0;
    z-index: 5;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: clamp(28px, 5.4vh, 58px) var(--pad) clamp(26px, 5vh, 54px);
  }

  /* Top nav: minimal */
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: "Archivo Expanded", "Archivo", sans-serif;
    font-weight: 700;
    letter-spacing: 0.42em;
    font-size: 13px;
    text-transform: uppercase;
    text-indent: 0.42em;
  }
  .brand .mark {
    width: 13px; height: 13px;
    border: 1.5px solid var(--accent);
    transform: rotate(45deg);
    flex: none;
    box-shadow: 0 0 14px rgba(95,208,232,0.55);
  }
  .nav-links {
    display: flex;
    gap: clamp(20px, 2.6vw, 40px);
    list-style: none;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .nav-links a {
    color: inherit;
    text-decoration: none;
    position: relative;
    padding: 6px 0;
    transition: color 0.4s var(--ease);
  }
  .nav-links a::after {
    content: "";
    position: absolute;
    left: 0; bottom: 0;
    width: 100%; height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.45s var(--ease);
  }
  .nav-links a:hover, .nav-links a:focus-visible { color: var(--ink); }
  .nav-links a:hover::after, .nav-links a:focus-visible::after { transform: scaleX(1); }

  .nav-cta {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    padding: 9px 18px;
    border: 1px solid var(--hairline);
    border-radius: 999px;
    transition: border-color 0.4s var(--ease), background 0.4s var(--ease), color 0.4s var(--ease);
    white-space: nowrap;
  }
  .nav-cta:hover, .nav-cta:focus-visible {
    border-color: var(--accent);
    background: rgba(95,208,232,0.12);
  }

  /* Middle: the headline block, bottom-anchored within the free row */
  .stack {
    align-self: end;
    display: flex;
    flex-direction: column;
    gap: clamp(14px, 2.4vh, 26px);
    max-width: 760px;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
  }
  .eyebrow .pulse {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(95,208,232,0.7);
    animation: pulse 2.4s var(--ease) infinite;
    flex: none;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(95,208,232,0.55); }
    70%  { box-shadow: 0 0 0 10px rgba(95,208,232,0); }
    100% { box-shadow: 0 0 0 0 rgba(95,208,232,0); }
  }

  .model {
    font-family: "Archivo Expanded", "Archivo", sans-serif;
    font-weight: 600;
    line-height: 0.92;
    letter-spacing: -0.01em;
    font-size: clamp(54px, 11vw, 158px);
    text-transform: uppercase;
    text-shadow: 0 12px 60px rgba(0,0,0,0.55);
  }
  .model .light { font-weight: 300; color: var(--ink-dim); }

  .tagline {
    font-size: clamp(15px, 1.5vw, 19px);
    line-height: 1.5;
    color: var(--ink-dim);
    max-width: 46ch;
    font-weight: 300;
  }

  /* Bottom: a single understated spec strip + CTA */
  .footer {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 28px;
    flex-wrap: wrap;
  }
  .specs {
    display: flex;
    gap: clamp(26px, 4vw, 64px);
    flex-wrap: wrap;
  }
  .spec {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .spec .val {
    font-family: "Archivo Expanded", "Archivo", sans-serif;
    font-weight: 600;
    font-size: clamp(22px, 2.5vw, 34px);
    letter-spacing: -0.01em;
    line-height: 1;
  }
  .spec .val .unit {
    font-size: 0.46em;
    font-weight: 400;
    color: var(--ink-dim);
    margin-left: 4px;
    letter-spacing: 0.04em;
  }
  .spec .lab {
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }

  .cta-group {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .cta {
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--bg);
    background: var(--ink);
    text-decoration: none;
    padding: 14px 26px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: transform 0.4s var(--ease), background 0.4s var(--ease), color 0.4s var(--ease);
  }
  .cta:hover, .cta:focus-visible {
    background: var(--accent);
    color: #03242b;
    transform: translateY(-2px);
  }
  .cta svg { width: 14px; height: 14px; }

  .cta-ghost {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 9px;
    transition: color 0.4s var(--ease);
  }
  .cta-ghost:hover, .cta-ghost:focus-visible { color: var(--ink); }
  .cta-ghost .play {
    width: 26px; height: 26px;
    border: 1px solid var(--hairline);
    border-radius: 50%;
    display: grid; place-items: center;
    transition: border-color 0.4s var(--ease);
  }
  .cta-ghost:hover .play, .cta-ghost:focus-visible .play { border-color: var(--accent); }

  /* Scroll affordance */
  .scrollcue {
    position: absolute;
    left: 50%; bottom: clamp(14px, 3.4vh, 30px);
    transform: translateX(-50%);
    z-index: 6;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    font-size: 9.5px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-faint);
    pointer-events: none;
  }
  .scrollcue .line {
    width: 1px; height: 34px;
    background: linear-gradient(var(--accent), transparent);
    position: relative;
    overflow: hidden;
  }
  .scrollcue .line::after {
    content: "";
    position: absolute;
    top: -34px; left: 0; width: 100%; height: 34px;
    background: linear-gradient(var(--ink), transparent);
    animation: drop 2.2s var(--ease) infinite;
  }
  @keyframes drop { 0%{transform:translateY(0)} 70%,100%{transform:translateY(68px)} }

  /* Cinematic entrance, staggered. Disabled under reduced motion. */
  .reveal { opacity: 0; transform: translateY(22px); }
  .ready .reveal { animation: rise 1s var(--ease) forwards; }
  .ready .reveal[data-d="1"] { animation-delay: 0.10s; }
  .ready .reveal[data-d="2"] { animation-delay: 0.24s; }
  .ready .reveal[data-d="3"] { animation-delay: 0.40s; }
  .ready .reveal[data-d="4"] { animation-delay: 0.56s; }
  .ready .reveal[data-d="5"] { animation-delay: 0.70s; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 4px; }

  /* ================= MOBILE: letterbox the cinema, never crop the car ========
     A landscape vehicle plate under `cover` would crop both sides off on a 390px
     portrait phone (decapitated hood / lost tail). So at phone widths we switch
     the plate to `contain`: the WHOLE car is always visible, and the dark stage
     background (#04050a) forms the cinematic letterbox bars above and below it.
     The contained plate floats into the upper band (object-position y), leaving
     a dark lower band where the headline, spec strip and CTAs stack and read. */
  @media (max-width: 640px) {
    .stage { height: 100svh; min-height: 560px; }
    .plate {
      object-fit: contain;          /* full vehicle, no landscape cover-crop */
      object-position: 50% 26%;     /* float the contained frame into the upper band */
      transform: none;              /* scaling a contained frame would re-crop it */
      animation: none;              /* Ken Burns on a contained frame clips edges; freeze it */
      will-change: auto;
    }
    .chrome { padding: 22px var(--pad) 26px; grid-template-rows: auto 1fr auto; }
    .nav-links { display: none; }
    .brand { letter-spacing: 0.3em; font-size: 11px; }
    .nav-cta { padding: 8px 14px; font-size: 11px; }
    .stack { gap: 14px; }
    .model { font-size: clamp(46px, 17vw, 78px); }
    .tagline { font-size: 14px; max-width: 34ch; }
    .footer { flex-direction: column; align-items: stretch; gap: 22px; }
    .specs { gap: 22px; }
    .spec .val { font-size: 22px; }
    .cta-group { justify-content: space-between; }
    .cta { flex: 1; justify-content: center; padding: 14px 18px; }
    .scrollcue { display: none; }
    /* Lower-band scrim: blends the letterbox bar into the type area so the white
       headline holds whether it sits over the photo edge or the black bar. */
    .grade { background:
      radial-gradient(150% 86% at 50% 28%, transparent 0%, rgba(4,5,10,0.12) 52%, rgba(4,5,10,0.40) 100%),
      linear-gradient(180deg, rgba(4,5,10,0.55) 0%, rgba(4,5,10,0.0) 22%, rgba(4,5,10,0.0) 40%, rgba(4,5,10,0.72) 62%, rgba(4,5,10,0.97) 100%); }
  }

  @media (max-width: 380px) {
    .specs { gap: 16px; }
    .spec .lab { letter-spacing: 0.16em; }
  }

  /* ================= REDUCED MOTION: freeze the cinema ================= */
  @media (prefers-reduced-motion: reduce) {
    .plate { animation: none !important; transform: scale(1.04) !important; }
    .grain { animation: none !important; }
    .eyebrow .pulse { animation: none !important; }
    .scrollcue .line::after { animation: none !important; opacity: 0; }
    .reveal { opacity: 1 !important; transform: none !important; animation: none !important; }
    .ready .reveal { animation: none !important; }
  }
  /* On phones the plate is `contain`; any scale would re-crop the full car, so
     keep the static frame neutral here too (still no animation). */
  @media (prefers-reduced-motion: reduce) and (max-width: 640px) {
    .plate { transform: none !important; }
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <!-- cinematic vehicle plate (set from DATA) -->
    <img class="plate" id="plate" alt="" decoding="async" fetchpriority="high" />

    <div class="grade"></div>
    <div class="grain" aria-hidden="true"></div>
    <div class="bar top" aria-hidden="true"></div>
    <div class="bar bottom" aria-hidden="true"></div>

    <div class="chrome">
      <!-- TOP NAV (reduced) -->
      <nav class="nav reveal" data-d="1" aria-label="Primary">
        <span class="brand"><span class="mark" aria-hidden="true"></span><span id="brandName">NOCTIS</span></span>
        <ul class="nav-links" id="navLinks"></ul>
        <a class="nav-cta" id="navCta" href="#reserve">Reserve</a>
      </nav>

      <!-- HEADLINE STACK -->
      <div class="stack">
        <span class="eyebrow reveal" data-d="2"><span class="pulse" aria-hidden="true"></span><span id="eyebrow">All-electric performance</span></span>
        <h1 class="model reveal" data-d="3" id="model">NOCTIS <span class="light">01</span></h1>
        <p class="tagline reveal" data-d="4" id="tagline">A grand tourer reimagined for the silent era. Carved from one breath of air, charged for the long night.</p>
      </div>

      <!-- BOTTOM: spec strip + CTA -->
      <div class="footer reveal" data-d="5">
        <div class="specs" id="specs"></div>
        <div class="cta-group">
          <a class="cta" id="ctaPrimary" href="#configure">
            <span>Configure</span>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          <a class="cta-ghost" id="ctaGhost" href="#film">
            <span class="play" aria-hidden="true">
              <svg width="9" height="10" viewBox="0 0 9 10" fill="none"><path d="M1 1l7 4-7 4V1z" fill="currentColor"/></svg>
            </span>
            <span>Watch the film</span>
          </a>
        </div>
      </div>
    </div>

    <div class="scrollcue" aria-hidden="true">
      <span>Scroll</span>
      <span class="line"></span>
    </div>
  </main>

  <script>
    /* ============================================================
       DATA  -  swap everything here to re-skin the hero.
       Point `plate` at any cinematic dark vehicle photo in ../assets/.
       (flux-car-4k.png = matte-black coupe on a wet neon street.)
       ============================================================ */
    const DATA = {
      plate: {
        src: "../assets/flux-car-4k.png",
        alt: "NOCTIS 01 all-electric grand tourer at night on a rain-slicked neon street"
      },
      brand: "NOCTIS",
      eyebrow: "All-electric performance",
      model: { name: "NOCTIS", variant: "01" },
      tagline: "A grand tourer reimagined for the silent era. Carved from one breath of air, charged for the long night.",
      nav: [
        { label: "Models", href: "#models" },
        { label: "Technology", href: "#tech" },
        { label: "Charging", href: "#charging" },
        { label: "Owners", href: "#owners" }
      ],
      navCta: { label: "Reserve", href: "#reserve" },
      specs: [
        { value: "640", unit: "km", label: "Range WLTP" },
        { value: "3.1", unit: "s", label: "0 to 100" },
        { value: "18", unit: "min", label: "10 to 80 percent" }
      ],
      ctaPrimary: { label: "Configure", href: "#configure" },
      ctaGhost: { label: "Watch the film", href: "#film" }
    };

    (function render() {
      const $ = (id) => document.getElementById(id);

      // plate
      const plate = $("plate");
      plate.src = DATA.plate.src;
      plate.alt = DATA.plate.alt;

      // brand + nav
      $("brandName").textContent = DATA.brand;
      $("eyebrow").textContent = DATA.eyebrow;
      $("model").innerHTML = DATA.model.name + ' <span class="light">' + DATA.model.variant + "</span>";
      $("tagline").textContent = DATA.tagline;

      const navLinks = $("navLinks");
      navLinks.innerHTML = DATA.nav
        .map((n) => '<li><a href="' + n.href + '">' + n.label + "</a></li>")
        .join("");

      const navCta = $("navCta");
      navCta.textContent = DATA.navCta.label;
      navCta.href = DATA.navCta.href;

      // specs
      $("specs").innerHTML = DATA.specs
        .map((s) =>
          '<div class="spec"><span class="val">' + s.value +
          (s.unit ? '<span class="unit">' + s.unit + "</span>" : "") +
          '</span><span class="lab">' + s.label + "</span></div>"
        )
        .join("");

      // ctas
      const cp = $("ctaPrimary");
      cp.querySelector("span").textContent = DATA.ctaPrimary.label;
      cp.href = DATA.ctaPrimary.href;
      const cg = $("ctaGhost");
      cg.querySelectorAll("span")[cg.querySelectorAll("span").length - 1].textContent = DATA.ctaGhost.label;
      cg.href = DATA.ctaGhost.href;

      // Entrance: only arm staggered reveals when motion is allowed.
      const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (!reduce) {
        const start = () => document.body.classList.add("ready");
        if (plate.complete) start();
        else { plate.addEventListener("load", start, { once: true }); plate.addEventListener("error", start, { once: true }); }
        // safety: never trap content invisible if load stalls
        setTimeout(start, 1200);
      }
      // when reduced, .reveal CSS already forces final visible state
    })();
  </script>
</body>
</html>
