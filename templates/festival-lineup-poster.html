<!-- TEMPLATE: Festival Lineup Poster | ARCHETYPE: lineup-poster typographic festival bill | REF: Glastonbury / Coachella / Primavera lineup posters, letterpress music-bill typography | WHEN TO USE: event / festival / conference / release announce where the act list IS the design and typographic density sells it | SWAP: edit the single DATA object (meta + tiers array) in the script at the bottom; each tier kind sets its size class (headliner > sub > mid > support > clubs) -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NEON FIELDS // Lineup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Archivo+Black&family=Anton&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DATA lives in the <script> at the very bottom. Edit there.
   Everything below is the engine + the look.
   ============================================================ */
:root{
  --night:#101012;
  --night-2:#161619;
  --acid:#d8f64a;
  --pink:#ff3d8b;
  --bone:#f2ede1;
  --bone-dim:#a8a294;
  --rule:#2a2a30;
  --gutter:clamp(14px,3.4vw,40px);
  --bill:clamp(12px,1.3vw,18px);   /* baseline body size on bill */
}

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--night);
  color:var(--bone);
  font-family:'Archivo',system-ui,sans-serif;
  font-weight:600;
  line-height:1;
  letter-spacing:-.01em;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* paper grain + faint print misregistration glow, pure CSS */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(120% 80% at 18% -10%, rgba(216,246,74,.10), transparent 55%),
    radial-gradient(120% 90% at 92% 8%, rgba(255,61,139,.12), transparent 50%),
    radial-gradient(100% 120% at 50% 120%, rgba(255,61,139,.06), transparent 60%);
}
body::after{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.05;
  background-image:repeating-linear-gradient(0deg, #000 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;
}

.poster{position:relative;z-index:1;max-width:1480px;margin:0 auto;padding:0 var(--gutter) clamp(40px,8vw,110px)}

/* ---------- TOP BAND : presenter + date/venue badge ---------- */
.topband{
  display:flex;flex-wrap:wrap;gap:10px 18px;align-items:flex-end;justify-content:space-between;
  padding:clamp(14px,2.4vw,26px) 0 clamp(8px,1.4vw,14px);
  border-bottom:2px solid var(--bone);
  text-transform:uppercase;
}
.presenter{
  font-family:'Archivo',sans-serif;font-weight:800;
  font-size:clamp(11px,1.15vw,15px);letter-spacing:.22em;color:var(--bone-dim);
}
.presenter b{color:var(--acid)}
.badge{
  display:flex;gap:0;align-items:stretch;font-family:'Archivo Black',sans-serif;
  border:2px solid var(--bone);
}
.badge span{
  padding:7px 12px;font-size:clamp(11px,1.1vw,14px);letter-spacing:.06em;
  display:flex;align-items:center;
}
.badge .b-date{background:var(--acid);color:#101012}
.badge .b-sep{background:var(--bone);color:#101012;font-weight:900}
.badge .b-venue{color:var(--bone)}

/* ---------- THE BILL : tiers ---------- */
.bill{padding-top:clamp(10px,2vw,22px)}

/* every tier sits on a thin letterpress rule */
.tier{
  border-bottom:1px solid var(--rule);
  padding:clamp(6px,1vw,12px) 0 clamp(8px,1.4vw,14px);
}
.tier:last-child{border-bottom:0}

/* a tiny day/stage marker that runs down the left of a tier group */
.tier-head{
  display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;
  margin:clamp(14px,1.8vw,22px) 0 clamp(2px,.5vw,5px);
}
.tier-head .day{
  font-family:'Anton',sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(13px,1.4vw,18px);letter-spacing:.12em;color:#101012;
  background:var(--pink);padding:4px 11px 5px;line-height:1;
}
.tier-head .stages{
  font-family:'Archivo',sans-serif;font-weight:800;text-transform:uppercase;
  font-size:clamp(10px,1vw,12px);letter-spacing:.2em;color:var(--bone-dim);
}
.tier-head .stages i{color:var(--acid);font-style:normal}

/* HEADLINER : giant name spanning the viewport.
   Capped so the descending packed tiers still peek into a 900px desktop fold. */
.t-headliner .acts{
  font-family:'Anton','Archivo Black',sans-serif;font-weight:400;
  text-transform:uppercase;
  font-size:clamp(56px,13.8vw,208px);
  line-height:.82;letter-spacing:-.02em;
  display:flex;flex-wrap:wrap;align-items:baseline;
  gap:0 clamp(18px,3vw,46px);
}
.t-headliner .act{color:var(--bone)}
.t-headliner .act:nth-child(2){color:var(--acid)}
.t-headliner .dot{display:none}

/* SUB-HEADLINE : large, two-up feel, middot-separated like the bill */
.t-sub .acts{
  font-family:'Anton','Archivo Black',sans-serif;font-weight:400;
  text-transform:uppercase;
  font-size:clamp(30px,6.4vw,92px);
  line-height:.9;letter-spacing:-.01em;
}
.t-sub .dot{color:var(--acid);padding:0 .22em;position:relative;top:-.02em}

/* MID : packed condensed names with middot separators, justified */
.t-mid .acts{
  font-family:'Archivo',sans-serif;font-weight:900;
  text-transform:uppercase;
  font-size:clamp(20px,4.2vw,58px);
  line-height:.98;letter-spacing:-.01em;
  text-align:justify;
}
.t-mid .acts::after{content:"";display:inline-block;width:100%}

/* SUPPORT : small-caps grotesk, very dense, justified */
.t-support .label,
.t-mid .label,
.t-clubs .label{
  font-family:'Archivo',sans-serif;font-weight:800;text-transform:uppercase;
  font-size:clamp(9px,.95vw,11px);letter-spacing:.26em;color:var(--bone-dim);
  display:block;margin-bottom:6px;
}
.t-support .acts{
  font-family:'Archivo',sans-serif;font-weight:700;
  text-transform:uppercase;
  font-size:clamp(13px,2.2vw,26px);
  line-height:1.06;letter-spacing:.0em;
  text-align:justify;
}
.t-support .acts::after{content:"";display:inline-block;width:100%}

/* CLUBS / fine print : tiniest, the dense gray base of the bill */
.t-clubs .acts{
  font-family:'Archivo',sans-serif;font-weight:600;
  text-transform:uppercase;
  font-size:clamp(10px,1.5vw,15px);
  line-height:1.25;letter-spacing:.02em;color:var(--bone-dim);
  text-align:justify;
}
.t-clubs .acts::after{content:"";display:inline-block;width:100%}

/* the bullet separator between acts -> the festival-bill middot */
.dot{
  color:var(--pink);
  padding:0 .28em;
  font-weight:900;
  position:relative;top:-.04em;
}
.t-mid .dot{color:var(--acid)}
.t-support .dot{color:var(--pink);font-size:.7em}
.t-clubs .dot{color:var(--acid);opacity:.8}

/* hover lift on individual acts (desktop, no-motion safe) */
.act{transition:color .18s ease}
@media (hover:hover){
  .t-headliner .act:hover,
  .t-sub .act:hover{color:var(--pink)}
  .t-mid .act:hover,
  .t-support .act:hover,
  .t-clubs .act:hover{color:var(--bone)}
}

/* ---------- FOOTER STRIP ---------- */
.footstrip{
  margin-top:clamp(26px,4vw,52px);
  border-top:2px solid var(--bone);
  padding-top:clamp(12px,2vw,20px);
  display:flex;flex-wrap:wrap;gap:14px 22px;align-items:center;justify-content:space-between;
  text-transform:uppercase;
}
.footstrip .tag{
  font-family:'Archivo',sans-serif;font-weight:800;
  font-size:clamp(10px,1vw,13px);letter-spacing:.2em;color:var(--bone-dim);
}
.footstrip .tag b{color:var(--acid)}
.cta{
  display:inline-flex;align-items:center;gap:10px;
  font-family:'Archivo Black',sans-serif;
  font-size:clamp(12px,1.3vw,16px);letter-spacing:.06em;
  background:var(--acid);color:#101012;text-decoration:none;
  padding:11px 20px;border:2px solid var(--acid);
  transition:background .16s ease,color .16s ease;
}
.cta:hover{background:transparent;color:var(--acid)}
.cta:focus-visible{outline:3px solid var(--pink);outline-offset:3px}

/* marquee ribbon : "ON SALE NOW" loop, slow, paused for reduced motion */
.ribbon{
  position:relative;z-index:1;overflow:hidden;
  background:var(--pink);color:#101012;
  border-top:2px solid #101012;border-bottom:2px solid #101012;
  padding:7px 0;
}
.ribbon .track{
  display:inline-flex;white-space:nowrap;will-change:transform;
  animation:slide 22s linear infinite;
}
.ribbon span{
  font-family:'Archivo Black',sans-serif;text-transform:uppercase;
  font-size:clamp(11px,1.2vw,14px);letter-spacing:.18em;padding:0 22px;
}
@keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ---------- MOBILE : single column, keep the hierarchy ---------- */
@media (max-width:640px){
  :root{--gutter:14px}
  .topband{align-items:flex-start;flex-direction:column;gap:12px}
  .badge{align-self:stretch}
  .badge span{flex:1;justify-content:center}
  .t-headliner .acts{
    font-size:clamp(56px,19vw,120px);
    flex-direction:column;gap:0;line-height:.9;
  }
  /* mid/support/clubs: relax justify so single column reads cleanly */
  .t-mid .acts,
  .t-support .acts,
  .t-clubs .acts{text-align:left}
  .t-mid .acts::after,
  .t-support .acts::after,
  .t-clubs .acts::after{display:none}
  /* let dense act runs break cleanly so no name overruns the phone viewport */
  .bill .acts{overflow-wrap:break-word;word-break:break-word}
  .footstrip{flex-direction:column;align-items:flex-start}
  .cta{align-self:stretch;justify-content:center}
}

/* ---------- REDUCED MOTION : freeze everything, show final state ---------- */
@media (prefers-reduced-motion:reduce){
  .ribbon .track{animation:none;transform:none}
  .act,.cta{transition:none}
  *{scroll-behavior:auto !important}
}
</style>
</head>
<body>

<main class="poster" id="poster">
  <!-- top band fills via JS from DATA.meta -->
  <header class="topband">
    <div class="presenter" id="presenter"></div>
    <div class="badge" id="badge"></div>
  </header>

  <!-- the bill : built from DATA.tiers -->
  <section class="bill" id="bill" aria-label="Festival lineup"></section>

  <footer class="footstrip">
    <div class="tag" id="foottag"></div>
    <a class="cta" id="cta" href="#">GET TICKETS &rsaquo;</a>
  </footer>
</main>

<div class="ribbon" aria-hidden="true">
  <div class="track" id="track"></div>
</div>

<script>
/* ============================================================
   DATA  -  edit this to re-skin the whole poster.
   Each tier = one horizontal band of the bill.
   kind controls the type size class:
     headliner > sub > mid > support > clubs
   The act order = reading order. Density sells the look:
   pack the lower tiers full.
   ============================================================ */
const DATA = {
  meta: {
    presenter: ["VESPER FIELDS PRESENTS", "the 9th annual"],
    festival:  "NEON FIELDS",
    date:      "AUG 14 / 15 / 16",
    year:      "2026",
    venue:     "OBSIDIAN VALLEY, AYUTTHAYA",
    foot:      "ALL AGES  /  RAIN OR SHINE  /  4 STAGES  /  72 ACTS",
    ribbon:    "TICKETS ON SALE NOW",
    ctaText:   "GET TICKETS",
    ctaHref:   "#tickets"
  },
  tiers: [
    {
      kind:"headliner", day:"FRI", stages:"MAIN STAGE",
      acts:["CINDER","HALO MACHINE"]
    },
    {
      kind:"sub", day:"FRI", stages:"GROVE / VAULT",
      acts:["VELVET ACID","THE NIGHT PORTERS","KORU"]
    },
    {
      kind:"mid", label:"FRIDAY  /  ALSO PLAYING",
      acts:["SODA PALACE","MIRRORHALL","Y U N A","BRASS RIVER","DEAD CALM SOCIETY","PARALLEL","LOW TIDE KIDS"]
    },
    {
      kind:"headliner", day:"SAT", stages:"MAIN STAGE",
      acts:["AURELIA","SUNSET PROTOCOL"]
    },
    {
      kind:"sub", day:"SAT", stages:"GROVE / VAULT",
      acts:["GHOST ORCHARD","NEON TANUKI","SLOW EMPEROR"]
    },
    {
      kind:"mid", label:"SATURDAY  /  ALSO PLAYING",
      acts:["THE GOLDEN HOURS","FREQ","MARBLE SAINTS","HEX & HONEY","DRIFTWOOD","COBALT","SAINT MONICA","PALE FIRE"]
    },
    {
      kind:"support", label:"WEEKEND  /  SUPPORTING ACTS",
      acts:["WET CEMENT","TOPAZ","THE LANTERN CLUB","MONO NO AWARE","SILK ROUTE","BANGKOK 808","CARDINAL","FALSE SPRING","NIGHTSHADE","THE PALE BLUE DOT","OK CASSETTE","ECHO PARADE","SUGAR CULT","VANTA","RUST & RIVER","THE LOW COUNTRIES","HOLOGRAM SUNDAY","TINY DESERT","COVER STAR","MIDNIGHT IN MAY"]
    },
    {
      kind:"clubs", label:"AFTER HOURS  /  CLUB STAGE  +  DJS",
      acts:["DJ KAOMANGAI","SELEKTA RAIN","THE BASEMENT TAPES","ANALOG GHOST","2AM CLUB","FERAL DISCO","SOFT SERVE","GLASS HOUSE COLLECTIVE","NEONTAIL","ROOFTOP FREQUENCY","THE NIGHT SHIFT","PASTEL DOOM","RAVE CHURCH","CONCRETE GARDEN","BLUE HOUR","TROPIC OF CANCER","THE AFTERIMAGE","DUSK PATROL","MIDNIGHT MARAUDERS","VHS DREAMS","COSMIC LATTE","THE LATE SET","SUNRISE SERVICE","ENDLESS SUMMER"]
    }
  ]
};

/* ----------------- RENDER ----------------- */
const MIDDOT = "·"; // proper middot bullet, no em/en dash anywhere

function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

/* build the acts run for a tier. Bullet separators between acts. */
function actsHTML(acts, withDots){
  return acts.map((name,i)=>{
    const a = `<span class="act">${esc(name)}</span>`;
    const dot = (withDots && i < acts.length-1)
      ? `<span class="dot" aria-hidden="true">${MIDDOT}</span>`
      : "";
    return a + dot;
  }).join("");
}

function tierHTML(t){
  const cls = "t-" + t.kind;
  let head = "";
  if(t.day || t.stages){
    head = `<div class="tier-head">`
      + (t.day ? `<span class="day">${esc(t.day)}</span>` : "")
      + (t.stages ? `<span class="stages">${t.stages.split("/").map(s=>`<i>${esc(s.trim())}</i>`).join(" / ")}</span>` : "")
      + `</div>`;
  }
  // headliner gets big air (no dots); everything below gets the bill middot
  const withDots = (t.kind!=="headliner");
  const label = t.label ? `<span class="label">${esc(t.label)}</span>` : "";
  return head
    + `<div class="tier ${cls}">`
    +   label
    +   `<div class="acts">${actsHTML(t.acts, withDots)}</div>`
    + `</div>`;
}

function render(){
  const m = DATA.meta;

  // top band
  document.getElementById("presenter").innerHTML =
    `${esc(m.presenter[0])} <b>${esc(m.festival)}</b>` +
    (m.presenter[1] ? ` <span style="opacity:.6">// ${esc(m.presenter[1])}</span>` : "");

  document.getElementById("badge").innerHTML =
      `<span class="b-date">${esc(m.date)} ${esc(m.year)}</span>`
    + `<span class="b-sep">${MIDDOT}</span>`
    + `<span class="b-venue">${esc(m.venue)}</span>`;

  // bill
  document.getElementById("bill").innerHTML = DATA.tiers.map(tierHTML).join("");

  // foot + cta
  document.getElementById("foottag").innerHTML =
    esc(m.foot).replace(/(\d+)/g, "<b>$1</b>");
  const cta = document.getElementById("cta");
  cta.textContent = m.ctaText + "  ›";
  cta.href = m.ctaHref;

  // ribbon : duplicate the line so the -50% loop is seamless
  const piece = Array(6).fill(`<span>${esc(m.ribbon)}</span><span>${MIDDOT}</span>`).join("");
  document.getElementById("track").innerHTML = piece + piece;

  document.title = `${m.festival} // Lineup ${m.year}`;
}

render();
</script>
</body>
</html>
