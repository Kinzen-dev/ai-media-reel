<!-- TEMPLATE: Fintech Trust-Stack | ARCHETYPE: fintech-trust-stack | REF: Contiant Open Banking (Awwwards HM), Stripe, Mercury | WHEN TO USE: compliance-first fintech / regulated-vertical conversion landing where trust must be engineered through layout (badge cluster + partner shelf + score chip + jurisdiction strip), not flair | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Northvault - Trust-Stack Fintech Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
/* ============================================================================
   DATA-DRIVEN: all swappable copy lives in the JS DATA array near the bottom.
   The CSS below is structural. Palette tokens are the single source of truth.
   ========================================================================== */
:root{
  --trust:#0b1f3a;        /* deep trust-blue base */
  --trust-2:#0a1b32;      /* darker panel */
  --trust-ink:#08182d;    /* deepest, for footer */
  --blue:#1356a8;         /* action blue */
  --blue-lift:#2f7ce0;    /* hover lift */
  --mint:#1fb47a;         /* success / verified */
  --mint-soft:rgba(31,180,122,.14);
  --bone:#f0ece4;         /* warm neutral */
  --white:#ffffff;
  --ink-on-dark:#e7eef8;
  --muted:#a9bbd4;        /* muted text on dark */
  --muted-2:#7d92b4;
  --line:rgba(255,255,255,.10);
  --line-strong:rgba(255,255,255,.18);
  --pill-bg:rgba(255,255,255,.055);
  --radius:14px;
  --radius-lg:20px;
  --shadow-card:0 30px 70px -28px rgba(3,12,28,.85);
  --maxw:1200px;
  --ease:cubic-bezier(.22,.61,.36,1);
  font-synthesis-weight:none;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;
  background:var(--trust);
  color:var(--ink-on-dark);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-variant-numeric:tabular-nums lining-nums;
  font-feature-settings:"tnum" 1,"lnum" 1,"cv05" 1;
  overflow-x:hidden;
  line-height:1.5;
}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2.5px solid var(--mint);outline-offset:3px;border-radius:6px}
.wrap{max-width:var(--maxw);margin-inline:auto;padding-inline:clamp(18px,4vw,40px)}

/* ---------- Top nav ---------- */
.nav{position:sticky;top:0;z-index:60;background:rgba(11,31,58,.72);backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid var(--line)}
.nav-in{display:flex;align-items:center;gap:24px;height:64px}
.brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:-.02em;font-size:17px;color:#fff}
.brand-mark{width:30px;height:30px;border-radius:8px;background:
   conic-gradient(from 200deg at 60% 40%,var(--blue),var(--mint) 70%,var(--blue-lift));
   box-shadow:inset 0 0 0 1px rgba(255,255,255,.22),0 6px 18px -6px rgba(31,180,122,.6);position:relative;flex:none}
.brand-mark::after{content:"";position:absolute;inset:7px;border-radius:4px;background:var(--trust);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.55)}
.nav-links{display:none;gap:26px;margin-left:8px;font-size:14px;color:var(--muted);font-weight:500}
@media(min-width:880px){.nav-links{display:flex}}
.nav-links a:hover{color:#fff}
.nav-cta{margin-left:auto;display:flex;align-items:center;gap:14px}
.nav-secure{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--mint);font-weight:600;letter-spacing:.01em}
.nav-secure svg{width:14px;height:14px}
.btn{display:inline-flex;align-items:center;gap:9px;font-weight:600;border:0;border-radius:11px;transition:transform .18s var(--ease),box-shadow .25s var(--ease),background .2s}
.btn-primary{background:linear-gradient(180deg,var(--blue-lift),var(--blue));color:#fff;padding:12px 20px;font-size:14.5px;box-shadow:0 12px 30px -12px rgba(47,124,224,.75),inset 0 1px 0 rgba(255,255,255,.28)}
.btn-primary:hover{transform:translateY(-1.5px);box-shadow:0 18px 38px -12px rgba(47,124,224,.85),inset 0 1px 0 rgba(255,255,255,.34)}
.btn-ghost{background:rgba(255,255,255,.06);color:#fff;padding:11px 18px;font-size:14px;border:1px solid var(--line-strong)}
.btn-ghost:hover{background:rgba(255,255,255,.11)}
.nav-ghost{display:none}
@media(min-width:780px){.nav-ghost{display:inline-flex}}

/* ---------- HERO ---------- */
.hero{position:relative;padding:clamp(26px,4.4vw,52px) 0 clamp(40px,5vw,64px);overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
   radial-gradient(1100px 520px at 78% -8%,rgba(47,124,224,.30),transparent 60%),
   radial-gradient(760px 520px at 6% 12%,rgba(31,180,122,.13),transparent 62%),
   linear-gradient(180deg,#0b1f3a 0%,#0a1c34 60%,#0b1f3a 100%)}
/* faint compliance grid texture */
.hero::after{content:"";position:absolute;inset:0;z-index:0;opacity:.5;pointer-events:none;
  background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
  background-size:46px 46px;mask-image:radial-gradient(900px 600px at 70% 30%,#000,transparent 78%);-webkit-mask-image:radial-gradient(900px 600px at 70% 30%,#000,transparent 78%)}
.hero-grid{position:relative;z-index:2;display:grid;grid-template-columns:1.06fr .94fr;gap:clamp(26px,3.5vw,56px);align-items:center}
@media(max-width:940px){.hero-grid{grid-template-columns:1fr;gap:30px}}

.eyebrow{display:inline-flex;align-items:center;gap:9px;font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--mint);background:var(--mint-soft);border:1px solid rgba(31,180,122,.32);padding:7px 13px;border-radius:999px}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 4px rgba(31,180,122,.22)}
h1.head{margin:18px 0 0;font-size:clamp(33px,5.3vw,60px);line-height:1.02;letter-spacing:-.033em;font-weight:800;color:#fff}
h1.head .grad{background:linear-gradient(96deg,#fff 8%,#8fc4ff 52%,var(--mint) 118%);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{margin:18px 0 0;font-size:clamp(15.5px,1.45vw,18px);line-height:1.55;color:var(--muted);max-width:540px}
.cta-row{display:flex;flex-wrap:wrap;gap:13px;margin-top:26px;align-items:center}
.btn-hero{padding:15px 26px;font-size:15.5px;border-radius:13px}
.cta-note{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted-2);font-weight:500}
.cta-note svg{width:13px;height:13px;color:var(--mint)}

/* COMPLIANCE BADGE PILL ROW - directly beneath CTA, signature element */
.badge-row{margin-top:22px;display:flex;flex-wrap:wrap;gap:10px}
.badge{display:inline-flex;align-items:center;gap:9px;padding:9px 13px 9px 11px;border-radius:11px;
  background:var(--pill-bg);border:1px solid var(--line-strong);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);transition:transform .2s var(--ease),border-color .2s,background .2s}
.badge:hover{transform:translateY(-2px);border-color:rgba(31,180,122,.5);background:rgba(31,180,122,.07)}
.badge-ic{width:30px;height:30px;border-radius:8px;flex:none;display:grid;place-items:center;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.02));border:1px solid var(--line)}
.badge-ic svg{width:17px;height:17px}
.badge-tx{display:flex;flex-direction:column;line-height:1.18}
.badge-tx b{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em}
.badge-tx span{font-size:10.5px;color:var(--muted-2);font-weight:500;letter-spacing:.02em}
.badge-tx span.ok{color:var(--mint)}
@media(max-width:520px){
  .badge-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .badge{padding:8px 9px}
  .badge-tx b{font-size:12px}
}

/* ---------- Hero visual: product screen + score chip ---------- */
.hero-visual{position:relative;z-index:2}
.app-card{position:relative;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--line-strong);
  background:linear-gradient(180deg,#10243f,#0a1830);box-shadow:var(--shadow-card)}
.app-bar{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.025)}
.dots{display:flex;gap:6px}
.dots i{width:10px;height:10px;border-radius:50%;background:#33486a;display:block}
.dots i:nth-child(1){background:#e0617a}.dots i:nth-child(2){background:#e3b24c}.dots i:nth-child(3){background:#3fb27f}
.app-url{margin-left:6px;font-size:11.5px;color:var(--muted-2);display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.04);padding:4px 11px;border-radius:7px;border:1px solid var(--line)}
.app-url svg{width:11px;height:11px;color:var(--mint)}
/* product screen image - cover on desktop (tall card reads as a real screenshot) */
.app-media{position:relative;aspect-ratio:16/10;background:#091830;overflow:hidden}
.app-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
.app-media::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,24,48,.05),rgba(10,24,48,.55))}
/* overlaid mini ledger UI on the screen to read as a fintech dashboard */
.ledger{position:absolute;left:16px;right:16px;bottom:14px;z-index:3;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ledger-card{background:rgba(8,20,38,.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid var(--line-strong);border-radius:12px;padding:11px 13px}
.ledger-card .lab{font-size:10.5px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
.ledger-card .val{font-size:21px;font-weight:800;color:#fff;letter-spacing:-.02em;margin-top:3px;display:flex;align-items:baseline;gap:7px}
.ledger-card .val small{font-size:11.5px;color:var(--mint);font-weight:700}
.ledger-card .bar{margin-top:9px;height:6px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden}
.ledger-card .bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue-lift),var(--mint))}

/* SCORE CHIP - floats on hero, must be visible at scroll=0 */
.score-chip{position:absolute;z-index:5;top:-16px;right:-10px;display:flex;align-items:center;gap:11px;
  background:linear-gradient(180deg,#13294a,#0c1d36);border:1px solid var(--line-strong);
  border-radius:14px;padding:11px 14px;box-shadow:0 20px 40px -18px rgba(0,0,0,.8)}
.score-chip .g2{width:36px;height:36px;border-radius:9px;flex:none;display:grid;place-items:center;background:#ff492c;color:#fff;font-weight:900;font-size:17px;letter-spacing:-.04em;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}
.score-meta{line-height:1.2}
.stars{display:flex;gap:1.5px;margin-bottom:2px}
.stars svg{width:13px;height:13px;color:#ffc24b}
.score-meta .sc{font-size:13px;font-weight:700;color:#fff}
.score-meta .sc b{color:var(--mint)}
.score-meta .src{font-size:10.5px;color:var(--muted-2);font-weight:500}
@media(max-width:940px){.score-chip{top:-14px;right:8px}}
/* PHONE: never cover-crop the landscape product shot - contain + letterbox,
   and reflow the floating score chip + ledger to static blocks so nothing overlaps */
@media(max-width:640px){
  .app-media{aspect-ratio:16/9;background:#06101f}
  .app-media img{object-fit:contain;object-position:center}
  .app-media::after{display:none}            /* no dark scrim over a letterboxed shot */
  .score-chip{position:static;margin:0 0 12px;width:max-content}
  .ledger{position:static;margin-top:0;padding:12px 12px 14px;grid-template-columns:1fr 1fr}
}

/* floating verified glints on the app card */
.glint{position:absolute;z-index:4;display:inline-flex;align-items:center;gap:7px;background:rgba(8,20,38,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(31,180,122,.4);border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;color:#fff;box-shadow:0 12px 26px -12px rgba(0,0,0,.7)}
.glint svg{width:14px;height:14px;color:var(--mint)}
.glint.g-top{top:14px;left:14px}
@media(max-width:520px){.glint.g-top{display:none}}

/* ---------- PARTNER LOGO SHELF ---------- */
.shelf{position:relative;z-index:2;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(255,255,255,.018)}
.shelf-in{padding:22px 0}
.shelf-lab{font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted-2);font-weight:600;text-align:center;margin-bottom:16px}
.logos{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:clamp(22px,4.5vw,56px)}
.logos .lg{height:26px;opacity:.74;filter:saturate(0) brightness(1.65);transition:opacity .2s,filter .2s}
.logos .lg:hover{opacity:1;filter:saturate(1) brightness(1)}
.logos .lg svg{height:100%;width:auto;display:block}

/* ---------- TRUST PILLARS ---------- */
.section{position:relative;z-index:2;padding:clamp(54px,7vw,92px) 0}
.kicker{display:inline-flex;align-items:center;gap:9px;font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--mint)}
.kicker .ln{width:26px;height:1.5px;background:linear-gradient(90deg,var(--mint),transparent)}
.h2{font-size:clamp(26px,3.6vw,40px);line-height:1.08;letter-spacing:-.028em;font-weight:800;color:#fff;margin:16px 0 0;max-width:680px}
.lead{margin-top:14px;font-size:16px;color:var(--muted);max-width:580px}
.pillars{margin-top:42px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:880px){.pillars{grid-template-columns:1fr;gap:14px}}
.pillar{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.014));border:1px solid var(--line);border-radius:var(--radius);padding:24px 22px;transition:transform .25s var(--ease),border-color .25s,background .25s}
.pillar:hover{transform:translateY(-4px);border-color:rgba(31,180,122,.4);background:linear-gradient(180deg,rgba(31,180,122,.07),rgba(255,255,255,.02))}
.pillar-ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;background:linear-gradient(180deg,rgba(47,124,224,.22),rgba(31,180,122,.1));border:1px solid var(--line-strong);margin-bottom:16px}
.pillar-ic svg{width:22px;height:22px;color:#bfe3ff}
.pillar h3{margin:0;font-size:18px;font-weight:700;color:#fff;letter-spacing:-.01em}
.pillar p{margin:9px 0 0;font-size:14.5px;color:var(--muted);line-height:1.55}
.pillar .meta{margin-top:14px;display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--mint)}
.pillar .meta svg{width:13px;height:13px}

/* ---------- METRICS STRIP ---------- */
.metrics{margin-top:42px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:rgba(255,255,255,.02)}
@media(max-width:760px){.metrics{grid-template-columns:1fr 1fr}}
.metric{padding:24px 22px;border-right:1px solid var(--line)}
.metric:last-child{border-right:0}
@media(max-width:760px){.metric{border-bottom:1px solid var(--line)}.metric:nth-child(2n){border-right:0}.metric:nth-child(n+3){border-bottom:0}}
.metric .num{font-size:clamp(27px,3.4vw,38px);font-weight:800;color:#fff;letter-spacing:-.03em;line-height:1}
.metric .num em{font-style:normal;color:var(--mint)}
.metric .cap{margin-top:8px;font-size:13px;color:var(--muted);font-weight:500}

/* ---------- JURISDICTION STRIP (near footer) ---------- */
.juris{position:relative;z-index:2;background:linear-gradient(180deg,#0a1b32,#091628);border-top:1px solid var(--line)}
.juris-in{padding:clamp(34px,4.5vw,52px) 0}
.juris-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.juris-head .h3l{font-size:clamp(20px,2.6vw,27px);font-weight:800;color:#fff;letter-spacing:-.02em;margin:10px 0 0}
.juris-head p{margin:8px 0 0;font-size:14px;color:var(--muted);max-width:520px}
.flags{margin-top:26px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:880px){.flags{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.flags{grid-template-columns:1fr}}
.flag{display:flex;gap:13px;align-items:flex-start;padding:16px;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.022);transition:border-color .2s,background .2s}
.flag:hover{border-color:rgba(31,180,122,.4);background:rgba(31,180,122,.05)}
.flag-em{font-size:26px;line-height:1;flex:none;filter:saturate(1.05);margin-top:1px}
.flag b{font-size:14px;color:#fff;font-weight:700;display:block;letter-spacing:-.01em}
.flag span{font-size:11.5px;color:var(--muted-2);display:block;margin-top:4px;line-height:1.45}
.flag .reg{display:inline-flex;align-items:center;gap:5px;margin-top:7px;font-size:11px;font-weight:600;color:var(--mint)}
.flag .reg svg{width:11px;height:11px}

/* ---------- final CTA ---------- */
.cta-final{position:relative;z-index:2;text-align:center;padding:clamp(56px,7vw,92px) 0}
.cta-final h2{font-size:clamp(28px,4vw,46px);font-weight:800;color:#fff;letter-spacing:-.03em;line-height:1.06;margin:0 auto;max-width:680px}
.cta-final p{margin:16px auto 0;font-size:16px;color:var(--muted);max-width:480px}
.cta-final .cta-row{justify-content:center;margin-top:28px}
.mini-badges{margin-top:24px;display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.mini-badge{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);font-weight:600;background:var(--pill-bg);border:1px solid var(--line);padding:7px 12px;border-radius:999px}
.mini-badge svg{width:13px;height:13px;color:var(--mint)}

/* ---------- footer ---------- */
footer{position:relative;z-index:2;background:var(--trust-ink);border-top:1px solid var(--line)}
.foot-in{padding:40px 0 30px;display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:28px}
@media(max-width:760px){.foot-in{grid-template-columns:1fr 1fr;gap:24px}}
.foot-col h4{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);font-weight:700;margin:0 0 14px}
.foot-col a{display:block;font-size:13.5px;color:var(--muted);margin-bottom:10px}
.foot-col a:hover{color:#fff}
.foot-brandcol p{font-size:13px;color:var(--muted-2);max-width:240px;margin:12px 0 0;line-height:1.55}
.foot-bottom{border-top:1px solid var(--line);padding:18px 0 26px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted-2)}
.foot-bottom .legal{display:flex;gap:18px;flex-wrap:wrap}

/* reveal on scroll */
.rv{opacity:0;transform:translateY(20px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.rv.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
  .rv{opacity:1!important;transform:none!important}
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);border:0}
</style>
</head>
<body>

<!-- ============================ NAV ============================ -->
<header class="nav">
  <div class="wrap nav-in">
    <a class="brand" href="#" aria-label="Northvault home">
      <span class="brand-mark" aria-hidden="true"></span>
      <span data-bind="brand"></span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="#trust">Security</a>
      <a href="#compliance">Compliance</a>
      <a href="#regions">Regions</a>
      <a href="#pricing">Pricing</a>
    </nav>
    <div class="nav-cta">
      <span class="nav-secure"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.4 8 11 4.6-2.6 8-6 8-11V5l-8-3Z"/><path d="m9 12 2 2 4-4"/></svg><span data-bind="navSecure"></span></span>
      <a class="btn btn-ghost nav-ghost" href="#">Sign in</a>
      <a class="btn btn-primary" href="#" data-bind="navCta"></a>
    </div>
  </div>
</header>

<!-- ============================ HERO ============================ -->
<section class="hero" id="top">
  <div class="wrap hero-grid">

    <!-- LEFT: value headline + CTA + compliance pills -->
    <div class="hero-copy">
      <span class="eyebrow rv"><span class="dot" aria-hidden="true"></span><span data-bind="eyebrow"></span></span>
      <h1 class="head rv" data-delay="1"></h1>

<script>
/* ============================================================================
   DATA  -  EDIT THIS to repurpose the template. Everything below renders from it.
   ========================================================================== */
const DATA = {
  brand: "Northvault",
  navSecure: "Bank-grade encryption",
  navCta: "Open an account",

  eyebrow: "Regulated business banking",
  // headline supports a {grad} ... {/grad} span for the accent gradient

  sub: "Northvault is the treasury and payments platform built compliance-first. Every transfer is signed, logged, and reconciled to a standard your finance team and your regulator can both sign off on.",
  ctaPrimary: "Open an account",
  ctaSecondary: "Talk to compliance",
  ctaNote: "No setup fee, audit-ready from day one",

  // COMPLIANCE BADGE PILL ROW (the signature) - icon keys: shield, lock, bank, check, doc
  badges: [
    { icon:"shield", title:"SOC 2 Type II", note:"Audited 2026", ok:true },
    { icon:"lock",   title:"PCI DSS v4.0", note:"Level 1", ok:true },
    { icon:"bank",   title:"FDIC insured", note:"to 250K USD", ok:true },
    { icon:"doc",    title:"FCA authorised", note:"Ref 998241", ok:true }
  ],

  // hero score chip
  scoreValue: "4.9",
  scoreOf: "/ 5.0",
  scoreSource: "G2  +  Trustpilot  -  2,140 reviews",
  glint: "Every entry verified",
  appUrl: "app.northvault.com / treasury",
  ledger1Lab: "Balance",
  ledger1Val: "$48.2M",
  ledger1Delta: "+2.4%",
  ledger2Lab: "Reconciled",
  ledger2Val: "100%",
  ledger2Delta: "in sync",

  // partner shelf - rendered as clean inline SVG wordmarks (swap for <img> of real logos in ../assets/)
  shelfLabel: "Trusted by finance teams at regulated companies",

  pillarsKicker: "Trust by design",
  pillarsHead: "Controls a regulator recognises, before you ask.",
  pillarsLead: "Security is not a page in our docs. It is the layout of the product: dual-control approvals, immutable ledgers, and evidence exported on demand.",
  pillars: [
    { icon:"lock", h:"Encrypted end to end", p:"AES-256 at rest, TLS 1.3 in transit, keys in a FIPS 140-2 HSM. Field-level encryption on every PII column.", meta:"Zero plaintext storage" },
    { icon:"flow", h:"Dual-control approvals", p:"Every payout above your threshold needs two signers. Approval chains are policy-defined and fully replayable.", meta:"Segregation of duties" },
    { icon:"doc",  h:"Audit evidence on demand", p:"Export a tamper-evident log of every action, signed and timestamped, in the format your auditor expects.", meta:"SOC 2 + ISO 27001 ready" }
  ],

  metrics: [
    { num:"99.99%", cap:"Settlement uptime, trailing 12 months" },
    { num:"$8.4B", cap:"Processed without a reconciliation break" },
    { num:"<{e}40ms{/e}", cap:"Median ledger write latency" },
    { num:"0", cap:"Customer-impacting security incidents" }
  ],

  jurisKicker: "Where we are licensed",
  jurisHead: "Authorised to operate, jurisdiction by jurisdiction.",
  jurisSub: "We hold the right registration in every market we serve, and we will not onboard you where we cannot operate compliantly.",
  flags: [
    { em:"🇺🇸", b:"United States", s:"Money transmitter licensed, 48 states. FDIC pass-through insurance via partner banks.", reg:"FinCEN MSB" },
    { em:"🇬🇧", b:"United Kingdom", s:"Authorised payment institution under the Payment Services Regulations 2017.", reg:"FCA 998241" },
    { em:"🇪🇺", b:"European Union", s:"E-money institution passported across the SEPA zone via our Lithuanian entity.", reg:"Bank of Lithuania" },
    { em:"🇸🇬", b:"Singapore", s:"Major payment institution licence for cross-border and account services.", reg:"MAS MPI" }
  ],

  finalHead: "Open an account your board will not have to defend.",
  finalSub: "Most teams are sending their first signed, reconciled transfer within a day.",
  finalCta: "Open an account",
  finalCta2: "Book a compliance review",
  miniBadges: [
    { t:"SOC 2 Type II" }, { t:"PCI DSS v4.0" }, { t:"FDIC insured" }, { t:"FCA authorised" }, { t:"ISO 27001" }
  ],

  footBlurb: "Northvault Financial provides treasury and payment services through regulated banking partners. This page is a design template and not a financial promotion.",
  footLegal: "© 2026 Northvault Financial. Banking services provided by partner banks, members FDIC."
};

/* ----------------------------- ICONS ----------------------------- */
const ICON = {
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="#1fb47a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.4 8 11 4.6-2.6 8-6 8-11V5l-8-3Z"/><path d="m9 12 2 2 4-4"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="#8fc4ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/><circle cx="12" cy="16" r="1.4" fill="#8fc4ff" stroke="none"/></svg>',
  bank:'<svg viewBox="0 0 24 24" fill="none" stroke="#bfe3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10 12 4l9 6"/><path d="M5 10v8M9 10v8M15 10v8M19 10v8"/><path d="M3 21h18"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="#1fb47a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9l-6-6Z"/><path d="M14 3v6h6"/><path d="m9 15 2 2 4-4"/></svg>',
  check:'<svg viewBox="0 0 24 24" fill="none" stroke="#1fb47a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 13 4 4L19 7"/></svg>',
  flow:'<svg viewBox="0 0 24 24" fill="none" stroke="#bfe3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.4"/><circle cx="18" cy="6" r="2.4"/><circle cx="12" cy="18" r="2.4"/><path d="M8.4 6h7.2M7 8 11 16M17 8l-4 8"/></svg>'
};
const star='<svg viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 3 6.3 6.9 1-5 4.9 1.2 6.8L12 17.8 5.9 21l1.2-6.8-5-4.9 6.9-1L12 2Z"/></svg>';

/* ----------------------- partner wordmark svg --------------------- */
function wordmark(name){
  const w = Math.round(name.length*14.5 + 16); // generous width so 800-weight text never clips
  return '<svg viewBox="0 0 '+w+' 26" role="img" aria-label="'+name+'" preserveAspectRatio="xMinYMid meet">'+
    '<text x="2" y="20" font-family="Inter,sans-serif" font-weight="800" font-size="20" letter-spacing="0.4" fill="#ffffff">'+name+'</text></svg>';
}

/* ----------------------------- RENDER ----------------------------- */
function gradHead(s){ return s.replace('{grad}','<span class="grad">').replace('{/grad}','</span>'); }
function emNum(s){ return s.replace('{e}','<em>').replace('{/e}','</em>'); }

(function render(){
  // simple text bindings
  document.querySelectorAll('[data-bind]').forEach(el=>{
    const k = el.getAttribute('data-bind');
    if(k in DATA && typeof DATA[k]==='string') el.textContent = DATA[k];
  });
  // headline with gradient span
  const h1 = document.querySelector('h1.head');
  if(h1) h1.innerHTML = gradHead(DATA.headline);

  // stars in score chip
  const starsEl = document.querySelector('.score-chip .stars');
  if(starsEl) starsEl.innerHTML = star.repeat(5);

  // compliance badge pills
  document.getElementById('badges').innerHTML = DATA.badges.map(b=>
    '<div class="badge"><span class="badge-ic" aria-hidden="true">'+(ICON[b.icon]||ICON.shield)+'</span>'+
    '<span class="badge-tx"><b>'+b.title+'</b><span class="'+(b.ok?'ok':'')+'">'+
    (b.ok?'&#10003; ':'')+b.note+'</span></span></div>'
  ).join('');

  // partner shelf
  document.getElementById('logos').innerHTML = DATA.partners.map(p=>
    '<span class="lg">'+wordmark(p)+'</span>'
  ).join('');

  // pillars
  document.getElementById('pillars').innerHTML = DATA.pillars.map((p,i)=>
    '<article class="pillar rv" data-delay="'+(i+1)+'"><span class="pillar-ic" aria-hidden="true">'+(ICON[p.icon]||ICON.lock)+'</span>'+
    '<h3>'+p.h+'</h3><p>'+p.p+'</p><span class="meta">'+ICON.check+p.meta+'</span></article>'
  ).join('');

  // metrics
  document.getElementById('metrics').innerHTML = DATA.metrics.map(m=>
    '<div class="metric"><div class="num">'+emNum(m.num)+'</div><div class="cap">'+m.cap+'</div></div>'
  ).join('');

  // jurisdiction flags
  document.getElementById('flags').innerHTML = DATA.flags.map((f,i)=>
    '<div class="flag rv" data-delay="'+(i+1)+'"><span class="flag-em" aria-hidden="true">'+f.em+'</span>'+
    '<div><b>'+f.b+'</b><span>'+f.s+'</span><span class="reg">'+ICON.check+f.reg+'</span></div></div>'
  ).join('');

  // mini badges (final cta)
  document.getElementById('miniBadges').innerHTML = DATA.miniBadges.map(m=>
    '<span class="mini-badge">'+ICON.check+m.t+'</span>'
  ).join('');
})();

/* --------------------- reveal-on-scroll (motion-safe) -------------- */
(function reveal(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const items = document.querySelectorAll('.rv');
  if(reduce || !('IntersectionObserver' in window)){
    items.forEach(el=>el.classList.add('in'));
    return;
  }
  items.forEach(el=>{
    const d = parseInt(el.getAttribute('data-delay')||'0',10);
    el.style.transitionDelay = Math.min(d,6)*70 + 'ms';
  });
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  },{rootMargin:'0px 0px -8% 0px', threshold:0.08});
  items.forEach(el=>io.observe(el));
  // ensure above-the-fold hero items show immediately even before observer settles
  requestAnimationFrame(()=>document.querySelectorAll('.hero .rv').forEach(el=>el.classList.add('in')));
})();
</script>
</body>
