<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aqua Vista Media</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ====================================================================
   AQUA VISTA MEDIA  -  Frutiger Aero revival template
   Native CSS/JS only. No external libs. Honors reduced-motion.
   ==================================================================== */

:root{
  --sky-top:#cfeafe;
  --sky-mid:#e8f4fd;
  --sky-low:#ffffff;
  --gloss:#9fd4f5;
  --aqua:#5ba8d5;
  --aqua-deep:#3f86bd;
  --ink:#1f4663;
  --ink-soft:#3a6a8c;
  --nature:#3d7a3d;
  --nature-lite:#6fb56f;
  --frame-1:#ffffff;
  --frame-2:#c9e6fa;
  --frame-3:#7fb9e2;
  --gel-hi:#ffffff;
  --gel-lo:#7cc0ec;
  --shadow:0 14px 34px rgba(40,96,140,.28);
  --shadow-soft:0 6px 18px rgba(40,96,140,.18);
  --radius-lg:26px;
  --radius-md:18px;
  --radius-pill:999px;
  --font-display:"Varela Round", system-ui, sans-serif;
  --font-body:"Nunito", system-ui, sans-serif;
}

*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto;}}

body{
  margin:0;
  font-family:var(--font-body);
  color:var(--ink);
  background:
    radial-gradient(120% 80% at 50% -10%, #ffffff 0%, rgba(255,255,255,0) 45%),
    linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 38%, var(--sky-low) 80%);
  background-attachment:fixed;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* ---- ambient sky layer: clouds, water shimmer, sun gloss ---- */
.sky-layer{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden;}
.sun-gloss{
  position:absolute; top:-30vh; left:50%; width:120vmax; height:120vmax;
  transform:translateX(-50%);
  background:radial-gradient(circle, rgba(255,255,255,.85) 0%, rgba(199,233,250,.35) 30%, rgba(199,233,250,0) 60%);
}
.cloud{
  position:absolute; border-radius:999px;
  background:radial-gradient(ellipse at 50% 40%, #ffffff 0%, rgba(255,255,255,.85) 55%, rgba(255,255,255,0) 72%);
  filter:blur(2px);
  opacity:.9;
  will-change:transform;
}
.cloud.c1{top:8%;  left:-18%; width:42vw; height:16vw; animation:drift 60s linear infinite;}
.cloud.c2{top:26%; left:-30%; width:30vw; height:11vw; opacity:.7; animation:drift 90s linear infinite; animation-delay:-30s;}
.cloud.c3{top:54%; left:-25%; width:36vw; height:13vw; opacity:.55; animation:drift 120s linear infinite; animation-delay:-60s;}
@keyframes drift{from{transform:translateX(0);}to{transform:translateX(150vw);}}

.water{
  position:absolute; left:0; right:0; bottom:0; height:30vh;
  background:linear-gradient(180deg, rgba(91,168,213,0) 0%, rgba(91,168,213,.20) 40%, rgba(63,134,189,.34) 100%);
}
.water::before{
  content:""; position:absolute; inset:0;
  background:repeating-linear-gradient(180deg, rgba(255,255,255,.18) 0 1px, rgba(255,255,255,0) 1px 9px);
  mask:linear-gradient(180deg, transparent 0%, #000 60%);
  animation:ripple 7s ease-in-out infinite alternate;
}
@keyframes ripple{from{transform:translateY(0);}to{transform:translateY(6px);}}

/* floating nature leaves */
.leaf{position:absolute; will-change:transform; opacity:.8;}
.leaf.l1{top:14%; right:6%;  width:64px;  animation:bob 9s ease-in-out infinite;}
.leaf.l2{top:62%; left:4%;   width:48px;  animation:bob 11s ease-in-out infinite; animation-delay:-3s;}
.leaf.l3{top:40%; right:3%;  width:38px;  animation:bob 13s ease-in-out infinite; animation-delay:-6s;}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-6deg);}50%{transform:translateY(-16px) rotate(6deg);}}

@media (prefers-reduced-motion:reduce){
  .cloud,.water::before,.leaf{animation:none !important;}
}

/* ---- shell ---- */
.shell{position:relative; z-index:2; max-width:1280px; margin:0 auto; padding:18px 22px 80px;}

/* ===== top gel navbar ===== */
.topbar{
  display:flex; align-items:center; gap:16px;
  padding:10px 14px;
  border-radius:var(--radius-pill);
  background:linear-gradient(180deg, #ffffff 0%, #e6f4fe 48%, #cbe8fb 100%);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:
    inset 0 1px 0 #ffffff,
    inset 0 -10px 18px rgba(127,185,226,.35),
    var(--shadow-soft);
  position:relative;
  overflow:hidden;
}
.topbar::after{
  content:""; position:absolute; left:8px; right:8px; top:4px; height:42%;
  border-radius:var(--radius-pill);
  background:linear-gradient(180deg, rgba(255,255,255,.85), rgba(255,255,255,0));
  pointer-events:none;
}
.brand{display:flex; align-items:center; gap:11px; font-family:var(--font-display); position:relative; z-index:1;}
.brand .orb{
  width:38px; height:38px; border-radius:50%;
  background:radial-gradient(circle at 34% 28%, #ffffff 0%, #9fd4f5 38%, #3f86bd 100%);
  box-shadow:inset 0 -3px 6px rgba(31,70,99,.5), 0 3px 7px rgba(63,134,189,.5);
  position:relative; flex:0 0 auto;
}
.brand .orb::after{content:""; position:absolute; top:5px; left:7px; width:14px; height:9px; border-radius:50%; background:rgba(255,255,255,.9); filter:blur(.5px);}
.brand b{font-size:1.18rem; color:var(--ink); letter-spacing:.2px;}
.brand span{font-size:.72rem; color:var(--aqua-deep); font-family:var(--font-body); font-weight:700; display:block; margin-top:-3px;}

.nav-links{display:flex; gap:6px; margin-left:auto; position:relative; z-index:1;}
.nav-links a{
  font-family:var(--font-display);
  font-size:.92rem; color:var(--ink-soft);
  text-decoration:none; padding:8px 16px; border-radius:var(--radius-pill);
  transition:background .2s, color .2s, box-shadow .2s;
}
.nav-links a:hover, .nav-links a:focus-visible{
  color:var(--ink); background:rgba(255,255,255,.7);
  box-shadow:inset 0 1px 0 #fff, 0 2px 6px rgba(63,134,189,.3);
  outline:none;
}

/* ===== gel button (shared) ===== */
.gel{
  display:inline-flex; align-items:center; gap:9px;
  font-family:var(--font-display); font-size:.96rem; line-height:1;
  padding:13px 26px; border-radius:var(--radius-pill);
  border:1px solid rgba(255,255,255,.7);
  color:#0e3a57; cursor:pointer; position:relative; overflow:hidden;
  background:linear-gradient(180deg, var(--gel-hi) 0%, #d7eefb 45%, var(--gel-lo) 100%);
  box-shadow:
    inset 0 1px 0 #ffffff,
    inset 0 -8px 14px rgba(63,134,189,.45),
    0 7px 16px rgba(63,134,189,.4);
  transition:transform .12s ease, box-shadow .2s ease, filter .2s;
  text-decoration:none;
}
.gel::before{
  content:""; position:absolute; left:6px; right:6px; top:3px; height:44%;
  border-radius:var(--radius-pill);
  background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,0));
  pointer-events:none;
}
.gel:hover{transform:translateY(-2px); filter:brightness(1.04);}
.gel:active{transform:translateY(1px); box-shadow:inset 0 2px 5px rgba(63,134,189,.6), 0 3px 8px rgba(63,134,189,.4);}
.gel:focus-visible{outline:3px solid #1f4663; outline-offset:3px;}
.gel.green{
  color:#15391b;
  background:linear-gradient(180deg, #ffffff 0%, #c4e9c4 45%, #6fb56f 100%);
  box-shadow:inset 0 1px 0 #fff, inset 0 -8px 14px rgba(61,122,61,.45), 0 7px 16px rgba(61,122,61,.38);
}
.gel.ghost{
  color:var(--ink-soft);
  background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(231,244,253,.85));
  box-shadow:inset 0 1px 0 #fff, 0 4px 12px rgba(63,134,189,.25);
}

/* ===== hero band (compact, sits above the grid) ===== */
.hero{
  display:grid; grid-template-columns:1.15fr .85fr; gap:24px; align-items:center;
  margin:22px 0 18px;
}
.hero-copy h1{
  font-family:var(--font-display);
  font-size:clamp(2rem, 4.4vw, 3.3rem); line-height:1.02; margin:0 0 12px;
  color:var(--ink);
  text-shadow:0 1px 0 #fff, 0 2px 14px rgba(159,212,245,.55);
}
.hero-copy h1 .em{
  background:linear-gradient(180deg,#5ba8d5,#3d7a3d);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.hero-copy p{font-size:1.04rem; line-height:1.5; color:var(--ink-soft); max-width:46ch; margin:0 0 18px; font-weight:600;}
.hero-cta{display:flex; gap:12px; flex-wrap:wrap;}

/* hero badge cluster (gel badges) */
.badge-stack{display:flex; flex-direction:column; gap:12px; align-items:flex-end;}
.gel-badge{
  display:inline-flex; align-items:center; gap:10px;
  padding:10px 18px 10px 12px; border-radius:var(--radius-pill);
  font-family:var(--font-display); font-size:.9rem; color:var(--ink);
  background:linear-gradient(180deg,#ffffff,#dcefff 50%,#bfe3fb);
  border:1px solid rgba(255,255,255,.85);
  box-shadow:inset 0 1px 0 #fff, inset 0 -6px 12px rgba(127,185,226,.4), var(--shadow-soft);
  position:relative;
}
.gel-badge .dot{
  width:26px; height:26px; border-radius:50%; flex:0 0 auto;
  background:radial-gradient(circle at 34% 28%, #fff 0%, var(--c1,#9fd4f5) 40%, var(--c2,#3f86bd) 100%);
  box-shadow:inset 0 -2px 4px rgba(31,70,99,.45);
}
.gel-badge small{display:block; font-size:.7rem; color:var(--aqua-deep); font-weight:700; font-family:var(--font-body); margin-top:1px;}

/* ===== widget grid ===== */
.section-head{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin:30px 0 16px; flex-wrap:wrap;}
.section-head h2{font-family:var(--font-display); font-size:1.6rem; margin:0; color:var(--ink); display:flex; align-items:center; gap:10px;}
.section-head p{margin:0; color:var(--ink-soft); font-weight:600; font-size:.95rem;}

.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:22px;
}

/* the bevel-bordered work frame (a desktop widget) */
.widget{
  border-radius:var(--radius-lg);
  padding:9px;
  background:
    linear-gradient(180deg, var(--frame-1) 0%, var(--frame-2) 55%, var(--frame-3) 100%);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:
    inset 0 2px 0 #ffffff,
    inset 0 -10px 18px rgba(127,185,226,.5),
    var(--shadow);
  position:relative;
  transition:transform .25s ease, box-shadow .25s ease;
  cursor:pointer;
}
.widget::after{
  content:""; position:absolute; left:14px; right:14px; top:8px; height:30%;
  border-radius:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,0));
  pointer-events:none;
}
.widget:hover, .widget.is-active{transform:translateY(-4px); box-shadow:inset 0 2px 0 #fff, inset 0 -10px 18px rgba(127,185,226,.5), 0 22px 44px rgba(40,96,140,.36);}
.widget:focus-within{box-shadow:inset 0 2px 0 #fff, inset 0 -10px 18px rgba(127,185,226,.5), 0 0 0 4px rgba(31,70,99,.5), var(--shadow);}

/* the glossy inner screen - media letterboxes here */
.screen{
  position:relative; z-index:1;
  border-radius:16px;
  overflow:hidden;
  background:linear-gradient(180deg,#0d2a40,#16415f);
  aspect-ratio:16/10;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.25), inset 0 0 30px rgba(0,0,0,.4);
  display:flex; align-items:center; justify-content:center;
}
/* letterbox: contain, never crop a landscape into a tall box */
.screen img, .screen video{
  max-width:100%; max-height:100%;
  width:100%; height:100%;
  object-fit:contain;
  display:block;
  background:#0a2236;
}
.screen .poster{position:absolute; inset:0; transition:opacity .3s;}
.screen video{position:relative; z-index:0;}
/* gloss sheen over the screen */
.screen::after{
  content:""; position:absolute; inset:0; z-index:3; pointer-events:none;
  background:linear-gradient(125deg, rgba(255,255,255,.32) 0%, rgba(255,255,255,0) 30%);
}

/* play chip on video widgets */
.play-chip{
  position:absolute; z-index:4; left:12px; bottom:12px;
  display:inline-flex; align-items:center; gap:8px;
  padding:7px 14px 7px 9px; border-radius:var(--radius-pill);
  font-family:var(--font-display); font-size:.78rem; color:#0e3a57;
  background:linear-gradient(180deg,#fff,#cfeafe 60%,#9fd4f5);
  border:1px solid rgba(255,255,255,.85);
  box-shadow:inset 0 1px 0 #fff, 0 3px 8px rgba(40,96,140,.4);
  pointer-events:none;
}
.play-chip .tri{
  width:0;height:0;border-style:solid;border-width:6px 0 6px 10px;
  border-color:transparent transparent transparent #1f4663;
  margin-left:2px;
}
.widget.is-active .play-chip .tri{
  border-width:0; width:8px; height:9px; border-radius:1px;
  background:#1f4663; margin-left:0;
}

/* badge row inside each widget */
.tag-row{display:flex; align-items:center; gap:8px; padding:11px 8px 4px; position:relative; z-index:1; flex-wrap:wrap;}
.kind{
  font-family:var(--font-display); font-size:.72rem; padding:4px 11px; border-radius:999px;
  color:#0e3a57;
  background:linear-gradient(180deg,#fff,#d7eefb 55%,#a9dbf6);
  border:1px solid rgba(255,255,255,.8);
  box-shadow:inset 0 1px 0 #fff, 0 1px 3px rgba(40,96,140,.3);
}
.kind.green{color:#15391b; background:linear-gradient(180deg,#fff,#cdeccd 55%,#9bce9b);}
.kind.warm{color:#5a3210; background:linear-gradient(180deg,#fff,#ffe6c2 55%,#ffcd86);}
.widget h3{font-family:var(--font-display); font-size:1.06rem; margin:2px 8px 0; color:var(--ink); position:relative; z-index:1;}
.widget .desc{font-size:.82rem; color:var(--ink-soft); margin:4px 8px 10px; font-weight:600; line-height:1.4; position:relative; z-index:1;}

/* spotlight wide widget (spans 2 cols on desktop) */
.widget.wide{grid-column:span 2;}
.widget.wide .screen{aspect-ratio:21/9;}

/* ===== bottom strip: audio gel widgets ===== */
.audio-strip{
  margin-top:30px;
  border-radius:var(--radius-lg);
  padding:20px;
  background:linear-gradient(180deg,#ffffff,#e2f3fe 60%,#c2e4fb);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:inset 0 2px 0 #fff, inset 0 -12px 22px rgba(127,185,226,.4), var(--shadow);
  position:relative; overflow:hidden;
}
.audio-strip h2{font-family:var(--font-display); margin:0 0 14px; color:var(--ink); font-size:1.4rem;}
.audio-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:16px;}
.audio-card{
  display:flex; align-items:center; gap:12px;
  border-radius:18px; padding:12px;
  background:linear-gradient(180deg,#fff,#e8f4fd 60%,#cdeafb);
  border:1px solid rgba(255,255,255,.85);
  box-shadow:inset 0 1px 0 #fff, var(--shadow-soft);
}
.audio-btn{
  width:44px; height:44px; flex:0 0 auto; border-radius:50%; border:1px solid rgba(255,255,255,.8); cursor:pointer;
  background:radial-gradient(circle at 34% 28%, #fff 0%, #9fd4f5 42%, #3f86bd 100%);
  box-shadow:inset 0 -3px 6px rgba(31,70,99,.45), 0 4px 9px rgba(63,134,189,.5);
  display:flex; align-items:center; justify-content:center; position:relative;
  transition:transform .1s;
}
.audio-btn:hover{transform:scale(1.06);}
.audio-btn:active{transform:scale(.95);}
.audio-btn:focus-visible{outline:3px solid #1f4663; outline-offset:3px;}
.audio-btn .ico{width:0;height:0;border-style:solid;border-width:7px 0 7px 12px;border-color:transparent transparent transparent #fff; margin-left:3px;}
.audio-btn.playing .ico{border-width:0; width:11px; height:12px; border-radius:2px; background:none; margin:0; box-shadow:inset 5px 0 0 #fff, inset -5px 0 0 #fff;}
.audio-meta{flex:1; min-width:0;}
.audio-meta b{font-family:var(--font-display); display:block; color:var(--ink); font-size:.96rem;}
.audio-meta .wave{width:100%; height:26px; margin-top:5px; display:block; object-fit:cover; border-radius:6px; opacity:.85; filter:hue-rotate(-8deg) saturate(1.1);}

/* ===== footer ===== */
.foot{
  margin-top:34px; text-align:center; color:var(--ink-soft); font-weight:700; font-size:.86rem;
  display:flex; flex-direction:column; gap:6px; align-items:center;
}
.foot .pill{
  font-family:var(--font-display); color:#0e3a57; padding:7px 18px; border-radius:999px;
  background:linear-gradient(180deg,#fff,#d7eefb 55%,#a9dbf6);
  border:1px solid rgba(255,255,255,.8);
  box-shadow:inset 0 1px 0 #fff, var(--shadow-soft);
}

/* ===================== RESPONSIVE ===================== */
@media (max-width:1000px){
  .grid{grid-template-columns:repeat(2,1fr);}
  .widget.wide{grid-column:span 2;}
  .audio-grid{grid-template-columns:1fr 1fr;}
}
@media (max-width:760px){
  .hero{grid-template-columns:1fr; gap:18px;}
  .badge-stack{flex-direction:row; flex-wrap:wrap; align-items:stretch; justify-content:flex-start;}
}
@media (max-width:640px){
  .shell{padding:12px 14px 56px;}
  .topbar{flex-wrap:wrap; gap:8px; padding:9px 12px; border-radius:22px;}
  .nav-links{margin-left:0; width:100%; justify-content:space-between; gap:2px;}
  .nav-links a{padding:7px 10px; font-size:.82rem;}
  /* compact the hero so the populated grid is in the first screen */
  .hero{margin:14px 0 12px; gap:12px;}
  .hero-copy h1{font-size:1.78rem; margin-bottom:8px;}
  .hero-copy p{font-size:.92rem; margin-bottom:12px; max-width:none;}
  .grid{grid-template-columns:1fr; gap:18px;}
  .widget.wide{grid-column:span 1;}
  /* on phone, screens still letterbox (contain) - never crop a landscape */
  .screen{aspect-ratio:16/10;}
  .widget.wide .screen{aspect-ratio:16/10;}
  .section-head{margin:18px 0 12px;}
  .audio-grid{grid-template-columns:1fr;}
  .hero-cta{gap:10px;}
  .gel{padding:11px 18px; font-size:.88rem;}
}
@media (max-width:390px){
  .brand b{font-size:1.04rem;}
  .leaf{display:none;}
}
</style>
</head>

<!-- ambient sky -->
<div class="sky-layer" aria-hidden="true">
  <div class="sun-gloss"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <!-- inline leaf SVGs: any fill/stroke is a literal hex, never var() -->
  <svg class="leaf l1" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M58 6C30 8 8 26 6 54c22 4 46-12 52-48Z" fill="#6fb56f"/>
    <path d="M6 54C20 38 38 22 58 6" stroke="#3d7a3d" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
  <svg class="leaf l2" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 58C34 56 56 38 58 10 36 6 12 22 6 58Z" fill="#8fc98f"/>
    <path d="M58 10C44 26 26 42 6 58" stroke="#3d7a3d" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
  <svg class="leaf l3" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M58 6C30 8 8 26 6 54c22 4 46-12 52-48Z" fill="#a7daf2"/>
    <path d="M6 54C20 38 38 22 58 6" stroke="#3f86bd" stroke-width="2.4" stroke-linecap="round"/>
  </svg>
  <div class="water"></div>
</div>

<div class="shell">

  <!-- ===== gel navbar ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="orb" aria-hidden="true"></span>
      <span>
        <b id="brandName">Aqua Vista</b>
        <span id="brandTag">media gadgets</span>
      </span>
    </div>
    <nav class="nav-links" id="navLinks" aria-label="Primary"></nav>
  </header>

  <!-- ===== compact hero band (sits above the populated grid) ===== -->
  <section class="hero">
    <div class="hero-copy">
      <h1 id="heroTitle"></h1>
      <p id="heroBody"></p>
      <div class="hero-cta">
        <a href="#gallery" class="gel">Open the gallery</a>
        <a href="#sounds" class="gel green">Hear the sounds</a>
      </div>
    </div>
    <div class="badge-stack" id="badgeStack" aria-hidden="true"></div>
  </section>

  <!-- ===== signature: bevel-framed widget grid (visible at scroll=0) ===== -->
  <section id="gallery">
    <div class="section-head">
      <h2><span class="orb" style="width:24px;height:24px;display:inline-block;border-radius:50%;background:radial-gradient(circle at 34% 28%,#fff,#9fd4f5 40%,#3f86bd);box-shadow:inset 0 -2px 4px rgba(31,70,99,.5)"></span>Live gadgets</h2>
      <p>Hover or tap a widget to play. Landscape works letterbox, never crop.</p>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <!-- ===== audio strip ===== -->
  <section class="audio-strip" id="sounds">
    <h2>Sound gadgets</h2>
    <div class="audio-grid" id="audioGrid"></div>
  </section>

  <footer class="foot">
    <span class="pill">Aqua Vista Media</span>
    <span>Frutiger Aero revival template - swap the DATA array to make it yours</span>
  </footer>

</div>

<!-- shared single audio element for the sound strip -->
<audio id="audioPlayer"></audio>

<script>
(function(){
  "use strict";
  const RM = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ---------- fill brand + nav + hero ---------- */
  document.getElementById("brandName").textContent = DATA.brand.name;
  document.getElementById("brandTag").textContent  = DATA.brand.tag;

  const nav = document.getElementById("navLinks");
  DATA.nav.forEach(function(n,i){
    const a = document.createElement("a");
    a.textContent = n;
    a.href = i===0 ? "#gallery" : (n.toLowerCase()==="sounds" ? "#sounds" : "#gallery");
    nav.appendChild(a);
  });

  const h1 = document.getElementById("heroTitle");
  const t  = DATA.hero.title;
  h1.innerHTML = t[0] + " " + t[1] + ' <span class="em">' + t[2] + "</span>";
  document.getElementById("heroBody").textContent = DATA.hero.body;

  const bs = document.getElementById("badgeStack");
  DATA.hero.badges.forEach(function(b){
    const el = document.createElement("div");
    el.className = "gel-badge";
    el.innerHTML =
      '<span class="dot" style="--c1:'+b.c1+';--c2:'+b.c2+'"></span>'+
      '<span>'+b.label+'<small>'+b.sub+'</small></span>';
    bs.appendChild(el);
  });

  /* ---------- build widget grid ---------- */
  const grid = document.getElementById("grid");
  const videoWidgets = [];

  DATA.works.forEach(function(w, idx){
    const card = document.createElement("article");
    card.className = "widget" + (w.wide ? " wide" : "");
    card.tabIndex = 0;
    card.setAttribute("aria-label", w.title + " - " + (w.type==="video" ? "video" : "image"));

    let media = "";
    if(w.type === "video"){
      // poster shown by default; <video> preload=none, plays only on focus/hover/lock
      media =
        '<img class="poster" src="'+w.poster+'" alt="'+w.title+' preview" loading="lazy" decoding="async">'+
        '<video muted loop playsinline preload="none" poster="'+w.poster+'" aria-hidden="true">'+
          '<source data-src="'+w.src+'" type="video/mp4">'+
        '</video>'+
        '<span class="play-chip"><span class="tri"></span>play</span>';
    } else {
      media = '<img src="'+w.src+'" alt="'+w.title+'" loading="lazy" decoding="async">';
    }

    card.innerHTML =
      '<div class="screen">'+media+'</div>'+
      '<div class="tag-row"><span class="kind '+(w.kindClass||"")+'">'+w.kind+'</span></div>'+
      '<h3>'+w.title+'</h3>'+
      '<p class="desc">'+w.desc+'</p>';

    grid.appendChild(card);

    if(w.type === "video"){
      const video  = card.querySelector("video");
      const poster = card.querySelector(".poster");
      const source = card.querySelector("source");

      const lazyLoad = function(){
        if(!source.src){ source.src = source.dataset.src; video.load(); }
      };
      const play = function(){
        if(RM) return;            // reduced motion: stay on poster
        stopOthers(card);
        lazyLoad();
        card.classList.add("is-active");
        poster.style.opacity = "0";
        const p = video.play();
        if(p && p.catch) p.catch(function(){});
      };
      const stop = function(){
        video.pause();
        card.classList.remove("is-active");
        poster.style.opacity = "1";
      };

      card._stop = stop;
      videoWidgets.push(card);

      // hover (desktop) and focus (keyboard) -> play
      card.addEventListener("mouseenter", play);
      card.addEventListener("mouseleave", stop);
      card.addEventListener("focus", play);
      card.addEventListener("blur", stop);
      // tap (touch) -> toggle lock
      card.addEventListener("click", function(){
        if(card.classList.contains("is-active")) stop(); else play();
      });
      card.addEventListener("keydown", function(e){
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          if(card.classList.contains("is-active")) stop(); else play();
        }
      });
    }
  });

  // only one video active at a time -> avoids simultaneous decode/FPS hit
  function stopOthers(except){
    videoWidgets.forEach(function(c){ if(c !== except && c._stop) c._stop(); });
  }

  // pause any playing video that scrolls out of view (perf)
  if("IntersectionObserver" in window){
    const io = new IntersectionObserver(function(entries){
      entries.forEach(function(en){
        if(!en.isIntersecting && en.target.classList.contains("is-active") && en.target._stop){
          en.target._stop();
        }
      });
    }, { threshold:0.15 });
    videoWidgets.forEach(function(c){ io.observe(c); });
  }

  /* ---------- audio strip ---------- */
  const audioGrid = document.getElementById("audioGrid");
  const player = document.getElementById("audioPlayer");
  let currentBtn = null;

  DATA.sounds.forEach(function(s){
    const card = document.createElement("div");
    card.className = "audio-card";
    card.innerHTML =
      '<button class="audio-btn" aria-label="Play '+s.title+'"><span class="ico"></span></button>'+
      '<div class="audio-meta">'+
        '<b>'+s.title+'</b>'+
        '<img class="wave" src="'+s.wave+'" alt="" aria-hidden="true" loading="lazy">'+
      '</div>';
    audioGrid.appendChild(card);

    const btn = card.querySelector(".audio-btn");
    btn.addEventListener("click", function(){
      if(currentBtn === btn && !player.paused){
        player.pause();
        btn.classList.remove("playing");
        btn.setAttribute("aria-label", "Play " + s.title);
        return;
      }
      if(currentBtn){
        currentBtn.classList.remove("playing");
        currentBtn.setAttribute("aria-label", "Play");
      }
      player.src = s.src;
      const pr = player.play();
      if(pr && pr.catch) pr.catch(function(){});
      btn.classList.add("playing");
      btn.setAttribute("aria-label", "Pause " + s.title);
      currentBtn = btn;
    });
  });

  player.addEventListener("ended", function(){
    if(currentBtn){
      currentBtn.classList.remove("playing");
      currentBtn = null;
    }
  });
})();
</script>
</body>
</html>
