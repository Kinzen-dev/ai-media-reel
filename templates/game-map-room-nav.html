<!-- TEMPLATE: Dungeon Map Room Nav | ARCHETYPE: dungeon-map top-down room navigation | REF: top-down RPG / pixel-art dungeon-world map UIs | WHEN TO USE: portfolio or microsite where each section is a destination "room" you walk a player pip between | SWAP: edit the ROOMS DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon Map Room Nav</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Pixelify+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   DUNGEON-MAP ROOM NAV  -  flat top-down pixel world you traverse
   Palette: dark dungeon ground / parchment + stone rooms / torch-amber / pip
   ========================================================================= */
:root{
  --ground:#15110e;        /* dungeon floor (dark) */
  --ground-2:#1d1813;
  --grout:#0c0907;         /* tile grout lines */
  --stone:#3a352d;         /* corridor stone */
  --wall:#0a0807;          /* outer wall / hatch base */
  --parch:#cdb68a;         /* parchment room fill */
  --parch-d:#a48d63;       /* parchment shade */
  --room-floor:#2a241c;    /* inside-room dark floor */
  --torch:#f5a623;         /* torch amber accent */
  --torch-d:#c9791a;
  --pip:#6fe3c4;           /* player pip teal */
  --pip-d:#2f9c80;
  --ink:#2a2018;           /* dark ink on parchment */
  --paper:#e9dcc0;         /* light text */
  --fog:#0a0807;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--fog);
  color:var(--paper);
  font-family:'VT323',monospace;
  overflow:hidden;
  -webkit-font-smoothing:none;
  image-rendering:pixelated;
}
.pix{font-family:'Pixelify Sans',sans-serif}

/* ---------- stage ---------- */
#stage{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  background:
    radial-gradient(120% 90% at 50% 40%, #1d1813 0%, #15110e 55%, #0c0907 100%);
}

/* ---------- top band (headline overlays nothing, sits compact above map) ---------- */
#band{
  flex:0 0 auto;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 22px 10px;
  border-bottom:3px solid #000;
  background:linear-gradient(180deg,#241d16,#15110e);
  box-shadow:0 4px 0 #0a0807;
  position:relative;z-index:5;
}
#band h1{
  font-family:'Pixelify Sans',sans-serif;
  font-weight:700;
  font-size:clamp(18px,2.6vw,30px);
  letter-spacing:1px;
  color:var(--paper);
  text-shadow:2px 2px 0 #000, 4px 4px 0 var(--torch-d);
  line-height:1;
}
#band h1 b{color:var(--torch)}
#band .sub{
  font-size:clamp(13px,1.6vw,18px);
  color:#9c8e74;letter-spacing:1px;margin-top:3px;
}
#band .hint{
  font-size:clamp(12px,1.5vw,16px);
  color:#7a6e58;text-align:right;line-height:1.25;
  border-left:2px dashed #4a4032;padding-left:14px;
}
#band .hint kbd{
  display:inline-block;background:#2a241c;border:2px solid #000;
  border-bottom-width:4px;border-radius:3px;color:var(--paper);
  padding:0 6px;margin:0 1px;font-family:'VT323',monospace;font-size:15px;
}
#band .hint .torchk{color:var(--torch)}

/* ---------- map wrap ---------- */
#mapwrap{
  flex:1 1 auto;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  padding:18px;
  min-height:0;
}
#mapframe{
  position:relative;
  width:min(100%, calc((100vh - 168px) * 1.55));
  max-width:1180px;
  aspect-ratio:1.55 / 1;
  max-height:100%;
  /* outer wall */
  background:var(--wall);
  border:5px solid #000;
  box-shadow:
    0 0 0 5px #2a241c,
    0 0 0 9px #000,
    0 14px 0 -2px #0a0807,
    inset 0 0 90px rgba(0,0,0,.85);
}

/* the live grid map */
#map{
  position:absolute;inset:14px;
  display:grid;
  grid-template-columns:repeat(12,1fr);
  grid-template-rows:repeat(8,1fr);
  gap:0;
  /* dungeon floor tile pattern */
  background-color:var(--ground);
  background-image:
    linear-gradient(0deg, rgba(0,0,0,.45) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.45) 1px, transparent 1px),
    linear-gradient(0deg, rgba(255,255,255,.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
  background-size:
    calc(100%/12) calc(100%/8),
    calc(100%/12) calc(100%/8),
    calc(100%/24) calc(100%/16),
    calc(100%/24) calc(100%/16);
  box-shadow:inset 0 0 60px rgba(0,0,0,.7);
}

/* corridors layer (SVG, drawn behind rooms) */
#corridors{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}

/* ---------- a room ---------- */
.room{
  position:relative;
  z-index:2;
  margin:0;
  border:0;background:transparent;
  cursor:pointer;
  font-family:inherit;color:inherit;
  padding:0;
  outline:none;
  display:block;
}
.room .cell{
  position:absolute;inset:6%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  /* parchment + stone room rectangle */
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.25)),
    var(--parch);
  border:4px solid #000;
  box-shadow:
    inset 0 0 0 3px var(--parch-d),
    inset 0 0 22px rgba(0,0,0,.35),
    0 5px 0 #000;
  transition:transform .12s steps(2), box-shadow .12s steps(2), filter .12s steps(2);
  overflow:hidden;
}
/* inner dark room floor where media/icon sits */
.room .floor{
  position:absolute;inset:14%;
  background:var(--room-floor);
  border:3px solid #000;
  box-shadow:inset 0 0 14px rgba(0,0,0,.7);
  background-image:
    linear-gradient(0deg, rgba(0,0,0,.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.4) 1px, transparent 1px);
  background-size:14px 14px;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.room .floor img{
  width:100%;height:100%;object-fit:cover;
  image-rendering:pixelated;
  filter:saturate(.85) contrast(1.05);
  opacity:.92;
}
.room .floor .glyph{
  font-size:clamp(20px,3.2vw,40px);
  line-height:1;
  filter:drop-shadow(2px 2px 0 #000);
}
.room .label{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  font-family:'Pixelify Sans',sans-serif;font-weight:700;
  font-size:clamp(11px,1.5vw,17px);
  letter-spacing:1px;color:var(--ink);
  background:linear-gradient(180deg,var(--parch),var(--parch-d));
  padding:1px 8px;border:2px solid #000;
  text-shadow:0 1px 0 rgba(255,255,255,.4);
  z-index:3;white-space:nowrap;
}
.room .door{
  position:absolute;left:50%;bottom:-2px;transform:translateX(-50%);
  width:24%;height:7px;background:var(--torch-d);border:2px solid #000;border-bottom:0;
  z-index:3;
}
.room:hover .cell,
.room:focus-visible .cell{
  transform:translateY(-3px);
  filter:brightness(1.08);
  box-shadow:
    inset 0 0 0 3px var(--torch),
    inset 0 0 22px rgba(0,0,0,.3),
    0 8px 0 #000,
    0 0 0 3px var(--torch);
}
.room:focus-visible{outline:none}
.room:focus-visible .label{background:var(--torch);color:#1a140d}

/* current room marker glow ring */
.room.current .cell{
  box-shadow:
    inset 0 0 0 3px var(--torch),
    inset 0 0 26px rgba(245,166,35,.25),
    0 5px 0 #000,
    0 0 0 4px var(--torch),
    0 0 28px 6px rgba(245,166,35,.35);
}

/* ---------- player pip ---------- */
#pip{
  position:absolute;z-index:6;
  width:30px;height:30px;
  transform:translate(-50%,-50%);
  transition:left .42s steps(7), top .42s steps(7);
  pointer-events:none;
  will-change:left,top;
}
#pip .body{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 35% 30%, #b6ffe9, var(--pip) 55%, var(--pip-d) 100%);
  border:3px solid #000;
  box-shadow:0 4px 0 #000, 0 0 14px 3px rgba(111,227,196,.5);
}
#pip .eye{position:absolute;width:5px;height:6px;background:#0a1f1a;top:9px}
#pip .eye.l{left:8px}#pip .eye.r{right:8px}
#pip .glow{
  position:absolute;inset:-10px;border-radius:50%;
  background:radial-gradient(circle, rgba(111,227,196,.35), transparent 65%);
  animation:pulse 1.4s steps(3) infinite;
}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(.9)}50%{opacity:.95;transform:scale(1.1)}}
/* walk bob */
#pip.walking .body{animation:bob .42s steps(2)}
@keyframes bob{0%{transform:translateY(0)}50%{transform:translateY(-4px)}100%{transform:translateY(0)}}

/* ---------- legend ---------- */
#legend{
  position:absolute;left:18px;bottom:14px;z-index:7;
  background:linear-gradient(180deg,#241d16,#15110e);
  border:3px solid #000;box-shadow:0 5px 0 #0a0807, inset 0 0 0 2px #4a4032;
  padding:9px 12px;font-size:15px;color:#cbbd9f;line-height:1.5;
  max-width:240px;
}
#legend .ttl{
  font-family:'Pixelify Sans',sans-serif;font-weight:700;color:var(--torch);
  font-size:14px;letter-spacing:1px;margin-bottom:5px;
  border-bottom:2px dashed #4a4032;padding-bottom:4px;
}
#legend .row{display:flex;align-items:center;gap:8px}
#legend .sw{width:14px;height:14px;border:2px solid #000;flex:0 0 auto}
#legend .sw.parch{background:var(--parch)}
#legend .sw.cor{background:var(--stone)}
#legend .sw.pip{background:var(--pip);border-radius:50%}
#legend .sw.wall{background:repeating-linear-gradient(45deg,#000 0 3px,#3a352d 3px 6px)}

/* ---------- room detail panel (opens when you arrive) ---------- */
#panel{
  position:absolute;inset:0;z-index:20;
  display:none;align-items:center;justify-content:center;
  background:rgba(8,6,4,.78);
  backdrop-filter:blur(2px);
  padding:20px;
}
#panel.open{display:flex}
#panel .sheet{
  position:relative;
  width:min(640px,94vw);max-height:88%;
  overflow:auto;
  background:
    linear-gradient(180deg, rgba(255,255,255,.05), rgba(0,0,0,.2)),
    var(--parch);
  color:var(--ink);
  border:5px solid #000;
  box-shadow:0 0 0 5px var(--parch-d), 0 18px 0 -4px #000, 0 0 60px rgba(0,0,0,.7);
  padding:22px 24px 26px;
}
#panel .sheet h2{
  font-family:'Pixelify Sans',sans-serif;font-weight:700;
  font-size:clamp(22px,4vw,34px);letter-spacing:1px;
  display:flex;align-items:center;gap:10px;
  text-shadow:0 1px 0 rgba(255,255,255,.4);
}
#panel .sheet .kind{
  display:inline-block;font-size:14px;letter-spacing:2px;
  color:#6a5a3c;border:2px solid #6a5a3c;padding:0 6px;margin-bottom:10px;
}
#panel .sheet p{font-size:clamp(16px,2.2vw,19px);line-height:1.4;margin:8px 0;color:#352a1d}
#panel .media{
  margin:14px 0;border:4px solid #000;background:#1a140d;
  box-shadow:inset 0 0 0 3px var(--parch-d);
  aspect-ratio:16/9;overflow:hidden;position:relative;display:flex;
  align-items:center;justify-content:center;
}
#panel .media img,#panel .media video{
  width:100%;height:100%;object-fit:cover;display:block;image-rendering:auto;
}
#panel .tags{margin-top:12px;display:flex;flex-wrap:wrap;gap:6px}
#panel .tags span{
  font-size:14px;background:var(--ink);color:var(--parch);
  padding:2px 8px;border:2px solid #000;letter-spacing:1px;
}
#panel .close{
  position:absolute;top:10px;right:10px;
  width:38px;height:38px;cursor:pointer;
  background:var(--torch);border:3px solid #000;color:#1a140d;
  font-family:'Pixelify Sans',sans-serif;font-weight:700;font-size:22px;line-height:1;
  box-shadow:0 4px 0 #000;
}
#panel .close:hover{background:#ffc04d}
#panel .close:focus-visible{outline:3px solid #6fe3c4;outline-offset:2px}
#panel .nav{
  display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;
}
#panel .nav button{
  font-family:'Pixelify Sans',sans-serif;font-weight:600;font-size:15px;
  letter-spacing:1px;cursor:pointer;
  background:var(--ink);color:var(--parch);border:3px solid #000;
  padding:7px 12px;box-shadow:0 4px 0 #000;
}
#panel .nav button:hover{background:#3a2c1c}
#panel .nav button:focus-visible{outline:3px solid var(--torch);outline-offset:2px}
#panel .nav button.back{background:var(--torch);color:#1a140d}

/* ---------- torch flicker corner sconces (decorative, CSS only) ---------- */
.sconce{position:absolute;z-index:4;width:16px;height:24px;pointer-events:none}
.sconce i{
  position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:10px;height:14px;border-radius:50% 50% 45% 45%;
  background:radial-gradient(circle at 50% 70%, #fff7d6, var(--torch) 50%, var(--torch-d) 80%, transparent);
  animation:flick .28s steps(2) infinite;filter:blur(.3px);
}
.sconce b{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:4px;height:9px;background:#2a241c;border:1px solid #000}
@keyframes flick{0%{opacity:.85;transform:translateX(-50%) scale(1,1)}50%{opacity:1;transform:translateX(-50%) scale(1.08,1.18)}100%{opacity:.8;transform:translateX(-50%) scale(.96,.94)}}

/* visually hidden but screen-reader exposed */
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}

/* =================== RESPONSIVE / MOBILE =================== */
@media (max-width:640px){
  body{overflow-y:auto}
  #stage{position:relative;min-height:100vh}
  #band{flex-direction:column;align-items:flex-start;gap:6px;padding:12px 14px 10px}
  #band .hint{text-align:left;border-left:0;border-top:2px dashed #4a4032;padding-left:0;padding-top:6px;width:100%}
  #mapwrap{padding:10px}
  /* keep the FULL map, fit to width, never crush off-screen */
  #mapframe{
    width:100%;
    aspect-ratio:auto;
    height:auto;
    min-height:62vh;
  }
  #map{inset:10px;grid-template-columns:repeat(12,1fr);grid-template-rows:repeat(8,1fr)}
  #pip{width:22px;height:22px}
  #pip .eye{top:6px;width:4px;height:5px}
  #pip .eye.l{left:5px}#pip .eye.r{right:5px}
  .room .label{font-size:10px;padding:0 5px;top:3px}
  .room .floor{inset:16%}
  /* legend leaves the map frame on mobile so it never overlaps rooms */
  #mapwrap{flex-direction:column}
  #legend{position:static;left:auto;bottom:auto;margin:12px 14px 20px;max-width:none;
    display:flex;flex-wrap:wrap;gap:4px 14px;align-items:center}
  #legend .ttl{width:100%;margin-bottom:3px;border-bottom:0;padding-bottom:0}
  #panel{position:fixed}
}
@media (max-width:380px){
  .room .label{font-size:9px;letter-spacing:0}
  .room .floor .glyph{font-size:18px}
}

/* =================== REDUCED MOTION =================== */
@media (prefers-reduced-motion:reduce){
  #pip{transition:none !important;animation:none !important}
  #pip .glow,#pip.walking .body,.sconce i,.room.current .cell{animation:none !important}
  .room .cell{transition:none !important}
}
</style>
</head>
<body>
<div id="stage">

  <!-- ============ TOP BAND (compact, map visible below at scroll=0) ============ -->
  <header id="band">
    <div>
      <h1 class="pix">VESPER <b>KEEP</b> &middot; PORTFOLIO MAP</h1>
      <div class="sub">A top-down dungeon. Walk the pip to a room to enter.</div>
    </div>
    <div class="hint">
      Move: <kbd>&larr;</kbd><kbd>&uarr;</kbd><kbd>&darr;</kbd><kbd>&rarr;</kbd> or click a room<br>
      Enter room: <kbd class="torchk">ENTER</kbd> &nbsp; Close: <kbd>ESC</kbd>
    </div>
  </header>

  <!-- ============ THE MAP (signature mechanic, fully visible at scroll=0) ============ -->
  <div id="mapwrap">
    <div id="mapframe">
      <div id="map" role="application" aria-label="Dungeon map. Use arrow keys to walk the player between rooms, Enter to open a room.">
        <!-- corridors drawn here -->
        <svg id="corridors" viewBox="0 0 1200 800" preserveAspectRatio="none" aria-hidden="true"></svg>
        <!-- rooms + pip injected by JS -->
      </div>

      <!-- corner torch sconces -->
      <div class="sconce" style="left:6px;top:6px"><i></i><b></b></div>
      <div class="sconce" style="right:6px;top:6px"><i></i><b></b></div>
      <div class="sconce" style="left:6px;bottom:6px"><i></i><b></b></div>
      <div class="sconce" style="right:6px;bottom:6px"><i></i><b></b></div>

    </div>

    <!-- legend: absolutely positioned over the map on desktop, flows below on mobile -->
    <div id="legend" aria-hidden="true">
      <div class="ttl">LEGEND</div>
      <div class="row"><span class="sw parch"></span> Room (a section)</div>
      <div class="row"><span class="sw cor"></span> Corridor</div>
      <div class="row"><span class="sw wall"></span> Wall</div>
      <div class="row"><span class="sw pip"></span> You are here</div>
    </div>
  </div>

  <!-- ============ ROOM DETAIL PANEL ============ -->
  <div id="panel" role="dialog" aria-modal="true" aria-labelledby="panelTitle">
    <div class="sheet">
      <button class="close" id="panelClose" aria-label="Close room">&times;</button>
      <span class="kind" id="panelKind"></span>
      <h2 id="panelTitle"></h2>
      <div class="media" id="panelMedia"></div>
      <p id="panelBody"></p>
      <div class="tags" id="panelTags"></div>
      <div class="nav" id="panelNav"></div>
    </div>
  </div>

</div>

<script>
/* =========================================================================
   DATA  -  swap this array to retheme. Each room sits on a 12x8 grid.
   grid: {col,row} 1-based top-left; w/h in grid cells.
   media: {type:'img'|'video', src, poster?}  (paths relative to this file)
   ========================================================================= */
const ROOMS = [
  {
    id:'about', label:'About', glyph:'🕯️', /* candle */
    grid:{col:2,row:2,w:3,h:2}, start:true,
    kind:'THE HEARTH',
    title:'About',
    body:'A senior full-stack engineer and technical founder. Builds production-grade systems, ships fast, and keeps the architecture honest. This keep is a map of the work.',
    tags:['NestJS','React','Architecture','Founder'],
    media:{type:'img', src:'../assets/sdxl.png'}
  },
  {
    id:'work', label:'Work', glyph:'🚗', /* car */
    grid:{col:6,row:2,w:4,h:3},
    kind:'THE GALLERY',
    title:'Work',
    body:'Selected builds. Cinematic product visuals, voice and LINE automation, customer-facing demos that win deals before production. Hover a thumbnail to feel the motion.',
    tags:['Product','Voice AI','Shopify','Demos'],
    media:{type:'video', src:'../assets/flux-car-i2v.mp4', poster:'../assets/gen/poster-flux-car-i2v.png'}
  },
  {
    id:'lab', label:'Lab', glyph:'⚗️', /* alembic */
    grid:{col:2,row:5,w:3,h:2},
    kind:'THE WORKSHOP',
    title:'Lab',
    body:'Experiments, generative-media pipelines, and tooling spikes. Where new techniques get pressure-tested before they earn a place in shipped work.',
    tags:['Generative','3D','Tooling','R&D'],
    media:{type:'img', src:'../assets/hf-tinysd.png'}
  },
  {
    id:'blog', label:'Blog', glyph:'📜', /* scroll */
    grid:{col:6,row:6,w:3,h:2},
    kind:'THE ARCHIVE',
    title:'Blog',
    body:'Field notes from real builds: production debugging, AI-cost observability, the unglamorous engineering that makes systems trustworthy. Written for builders.',
    tags:['Writing','Postmortems','Systems'],
    media:{type:'img', src:'../assets/flux-clinic-4k.png'}
  },
  {
    id:'contact', label:'Contact', glyph:'🕯️',
    grid:{col:10,row:6,w:2,h:2},
    kind:'THE GATE',
    title:'Contact',
    body:'The way out, and in. Open to scoped contracts and product collaborations. Send a raven, or just an email.',
    tags:['Available','Contracts','Hello'],
    media:{type:'img', src:'../assets/flux-car-4k.png'}
  }
];

/* corridors connect rooms by id; drawn as stone-floored passages */
const LINKS = [
  ['about','work'],
  ['about','lab'],
  ['work','blog'],
  ['lab','blog'],
  ['blog','contact']
];

/* =========================================================================
   BUILD
   ========================================================================= */
const COLS = 12, ROWS = 8;
const map = document.getElementById('map');
const corridorsSvg = document.getElementById('corridors');
const reduceMotion = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

const byId = Object.fromEntries(ROOMS.map(r=>[r.id,r]));
let current = ROOMS.find(r=>r.start)?.id || ROOMS[0].id;

/* center of a room in 0..100 percent coords of the grid */
function roomCenter(r){
  const cx = (r.grid.col - 1 + r.grid.w/2) / COLS * 100;
  const cy = (r.grid.row - 1 + r.grid.h/2) / ROWS * 100;
  return {x:cx, y:cy};
}

/* ---- draw corridors (SVG, behind rooms) ---- */
function drawCorridors(){
  const W = 1200, H = 800;
  let out = '';
  /* stone corridor: a thick dark-stone band with a lighter center line */
  LINKS.forEach(([a,b])=>{
    const ca = roomCenter(byId[a]), cb = roomCenter(byId[b]);
    const x1 = ca.x/100*W, y1 = ca.y/100*H, x2 = cb.x/100*W, y2 = cb.y/100*H;
    /* L-shaped (manhattan) path: horizontal then vertical, feels like dungeon halls */
    const midx = x2, midy = y1;
    const d = `M ${x1} ${y1} L ${midx} ${midy} L ${x2} ${y2}`;
    out += `<path d="${d}" fill="none" stroke="#000" stroke-width="40" stroke-linejoin="miter" stroke-linecap="butt"/>`;
    out += `<path d="${d}" fill="none" stroke="#3a352d" stroke-width="32" stroke-linejoin="miter" stroke-linecap="butt"/>`;
    out += `<path d="${d}" fill="none" stroke="#2a241c" stroke-width="22" stroke-linejoin="miter" stroke-linecap="butt"/>`;
    out += `<path d="${d}" fill="none" stroke="#4a4338" stroke-width="2" stroke-dasharray="6 8" stroke-linecap="butt"/>`;
  });
  corridorsSvg.innerHTML = out;
}

/* ---- build rooms ---- */
function buildRooms(){
  ROOMS.forEach(r=>{
    const btn = document.createElement('button');
    btn.className = 'room' + (r.id===current ? ' current' : '');
    btn.id = 'room-'+r.id;
    btn.style.gridColumn = `${r.grid.col} / span ${r.grid.w}`;
    btn.style.gridRow = `${r.grid.row} / span ${r.grid.h}`;
    btn.setAttribute('aria-label', `${r.title} room. ${r.kind}. Press Enter to open.`);
    const mediaInner = r.media.type==='video'
      ? `<img src="${r.media.poster}" alt="">`
      : `<img src="${r.media.src}" alt="">`;
    btn.innerHTML = `
      <div class="cell">
        <div class="label">${r.label}</div>
        <div class="floor">${mediaInner}<span class="glyph" aria-hidden="true" style="position:absolute">${r.glyph}</span></div>
      </div>
      <div class="door" aria-hidden="true"></div>
    `;
    /* keep glyph subtle over media: only show when no img loads is fine; we layer it but dim */
    btn.querySelector('.glyph').style.opacity = '0.0';
    btn.querySelector('.glyph').style.mixBlendMode = 'screen';
    btn.addEventListener('click', ()=>{
      if(current===r.id){ openRoom(r.id); }
      else { walkTo(r.id, ()=>openRoom(r.id)); }
    });
    map.appendChild(btn);
  });
}

/* ---- player pip ---- */
const pip = document.createElement('div');
pip.id = 'pip';
pip.setAttribute('aria-hidden','true');
pip.innerHTML = `<div class="glow"></div><div class="body"><span class="eye l"></span><span class="eye r"></span></div>`;
map.appendChild(pip);

function placePip(roomId, instant){
  const c = roomCenter(byId[roomId]);
  if(instant || reduceMotion){
    const prev = pip.style.transition;
    pip.style.transition = 'none';
    pip.style.left = c.x + '%';
    pip.style.top = c.y + '%';
    /* force reflow then restore */
    void pip.offsetWidth;
    pip.style.transition = prev;
  } else {
    pip.style.left = c.x + '%';
    pip.style.top = c.y + '%';
  }
}

/* ---- walk pip to a room ---- */
let walking = false;
function walkTo(roomId, done){
  if(roomId===current){ done && done(); return; }
  setCurrent(roomId);
  if(reduceMotion){
    placePip(roomId, true);
    done && done();
    return;
  }
  walking = true;
  pip.classList.add('walking');
  placePip(roomId, false);
  setTimeout(()=>{
    pip.classList.remove('walking');
    walking = false;
    done && done();
  }, 460);
}

function setCurrent(roomId){
  document.getElementById('room-'+current)?.classList.remove('current');
  current = roomId;
  document.getElementById('room-'+current)?.classList.add('current');
}

/* =========================================================================
   ROOM PANEL
   ========================================================================= */
const panel = document.getElementById('panel');
const panelTitle = document.getElementById('panelTitle');
const panelKind = document.getElementById('panelKind');
const panelBody = document.getElementById('panelBody');
const panelTags = document.getElementById('panelTags');
const panelMedia = document.getElementById('panelMedia');
const panelNav = document.getElementById('panelNav');
const panelClose = document.getElementById('panelClose');
let activeVideo = null;
let lastFocus = null;

function openRoom(id){
  const r = byId[id];
  lastFocus = document.getElementById('room-'+id);
  panelKind.textContent = r.kind;
  panelTitle.textContent = r.glyph + '  ' + r.title;
  panelBody.textContent = r.body;
  panelTags.innerHTML = r.tags.map(t=>`<span>${t}</span>`).join('');

  /* media: only the focused room's video plays (perf) */
  if(r.media.type==='video'){
    panelMedia.innerHTML = `<video src="${r.media.src}" poster="${r.media.poster}" muted loop playsinline preload="metadata"></video>`;
    activeVideo = panelMedia.querySelector('video');
    if(!reduceMotion){ activeVideo.play().catch(()=>{}); }
  } else {
    panelMedia.innerHTML = `<img src="${r.media.src}" alt="${r.title} preview">`;
    activeVideo = null;
  }

  /* neighbor doors -> walk to next room from inside the panel */
  const neighbors = LINKS.filter(l=>l.includes(id)).map(l=> l[0]===id ? l[1] : l[0]);
  panelNav.innerHTML =
    `<button class="back" data-act="close">&larr; Back to map</button>` +
    neighbors.map(n=>`<button data-go="${n}">Walk to ${byId[n].label} &rarr;</button>`).join('');
  panelNav.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click', ()=>{
      if(b.dataset.act==='close'){ closeRoom(); return; }
      const go = b.dataset.go;
      closeRoom(true);
      walkTo(go, ()=>openRoom(go));
    });
  });

  panel.classList.add('open');
  panelClose.focus();
}

function closeRoom(keepBackground){
  if(activeVideo){ activeVideo.pause(); activeVideo = null; }
  panel.classList.remove('open');
  if(!keepBackground && lastFocus){ lastFocus.focus(); }
}

panelClose.addEventListener('click', ()=>closeRoom());
panel.addEventListener('click', (e)=>{ if(e.target===panel) closeRoom(); });

/* =========================================================================
   KEYBOARD NAVIGATION  -  arrow keys pick the nearest room in that direction
   ========================================================================= */
function nearestInDirection(dx, dy){
  const cur = roomCenter(byId[current]);
  let best = null, bestScore = Infinity;
  ROOMS.forEach(r=>{
    if(r.id===current) return;
    const c = roomCenter(r);
    const vx = c.x - cur.x, vy = c.y - cur.y;
    /* require movement in the intended axis */
    const aligned = (dx!==0 ? Math.sign(vx)===dx : true) && (dy!==0 ? Math.sign(vy)===dy : true);
    if(!aligned) return;
    /* primary axis distance dominates, off-axis penalised */
    const along = dx!==0 ? Math.abs(vx) : Math.abs(vy);
    const off   = dx!==0 ? Math.abs(vy) : Math.abs(vx);
    if(along < 1) return;
    const score = along + off*2.2;
    if(score < bestScore){ bestScore = score; best = r.id; }
  });
  return best;
}

document.addEventListener('keydown', (e)=>{
  if(panel.classList.contains('open')){
    if(e.key==='Escape'){ e.preventDefault(); closeRoom(); }
    return;
  }
  let target = null;
  switch(e.key){
    case 'ArrowLeft':  target = nearestInDirection(-1,0); break;
    case 'ArrowRight': target = nearestInDirection(1,0); break;
    case 'ArrowUp':    target = nearestInDirection(0,-1); break;
    case 'ArrowDown':  target = nearestInDirection(0,1); break;
    case 'Enter': case ' ':
      e.preventDefault(); openRoom(current); return;
    default: return;
  }
  if(target){
    e.preventDefault();
    walkTo(target);
    document.getElementById('room-'+target)?.focus();
  }
});

/* =========================================================================
   INIT
   ========================================================================= */
function init(){
  drawCorridors();
  buildRooms();
  /* place pip in starting room, instantly (also satisfies reduced-motion) */
  placePip(current, true);
}
init();

/* keep pip + corridors aligned on resize (percent-based, but re-place to be safe) */
let rAF;
window.addEventListener('resize', ()=>{
  cancelAnimationFrame(rAF);
  rAF = requestAnimationFrame(()=>{ placePip(current, true); });
});
</script>
</body>
</html>
