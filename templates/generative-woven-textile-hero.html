<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Loomwork - Woven Textile Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     DATA-DRIVEN THEME. All easy swaps live in the JS DATA block
     near the top of <script>. CSS here is structural only.
     ============================================================ */
  :root {
    --linen-0: #efe6d3;   /* lightest warp / page ground */
    --linen-1: #e2d2b4;
    --linen-2: #cdb993;
    --ink: #2a2118;       /* deep umber text */
    --ink-soft: #5c4f3d;
    --accent: #b4452f;    /* terracotta accent thread */
    --paper-edge: #d9c8a6;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--linen-0);
    color: var(--ink);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* ---------- HERO STAGE ---------- */
  .loom {
    position: relative;
    width: 100%;
    height: 100svh;
    min-height: 560px;
    overflow: hidden;
    isolation: isolate;
    background: var(--linen-1);
  }

  /* the woven cloth canvas fills the whole stage */
  #cloth {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    z-index: 1;
  }

  /* soft selvedge vignette so the cloth reads as a draped panel */
  .selvedge {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    box-shadow:
      inset 0 0 120px rgba(42, 33, 24, 0.34),
      inset 0 0 28px rgba(42, 33, 24, 0.22);
    background:
      radial-gradient(120% 80% at 50% 8%, rgba(255,250,238,0.16), transparent 46%),
      linear-gradient(180deg, rgba(42,33,24,0.10), transparent 18%, transparent 80%, rgba(42,33,24,0.20));
    mix-blend-mode: multiply;
  }

  /* ---------- WORDMARK OVERLAY ---------- */
  .plate {
    position: absolute;
    z-index: 3;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: min(86vw, 760px);
    padding: clamp(26px, 4.4vw, 52px) clamp(28px, 5vw, 60px);
    text-align: center;
    border-radius: 3px;
    /* a stitched linen label sitting on the cloth */
    background: linear-gradient(180deg, rgba(243,236,221,0.93), rgba(231,219,196,0.90));
    border: 1px solid rgba(120, 98, 64, 0.42);
    box-shadow:
      0 18px 60px rgba(42, 33, 24, 0.30),
      0 2px 0 rgba(255, 252, 244, 0.6) inset,
      0 0 0 8px rgba(243, 236, 221, 0.10);
  }
  /* dashed stitch line around the label */
  .plate::before {
    content: "";
    position: absolute;
    inset: 9px;
    border: 1.5px dashed rgba(120, 98, 64, 0.55);
    border-radius: 2px;
    pointer-events: none;
  }

  .eyebrow {
    font-family: "Inter", sans-serif;
    font-weight: 600;
    font-size: clamp(10px, 1.1vw, 12.5px);
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 clamp(12px, 1.8vw, 18px);
  }

  .wordmark {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 500;
    font-optical-sizing: auto;
    line-height: 0.92;
    letter-spacing: -0.012em;
    color: var(--ink);
    font-size: clamp(46px, 8.6vw, 104px);
    margin: 0;
  }
  .wordmark em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }

  .lede {
    font-family: "Inter", sans-serif;
    font-weight: 400;
    font-size: clamp(13px, 1.5vw, 16.5px);
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 46ch;
    margin: clamp(16px, 2.4vw, 24px) auto 0;
  }

  .cta-row {
    margin-top: clamp(20px, 3vw, 30px);
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    font-family: "Inter", sans-serif;
    font-weight: 600;
    font-size: 13.5px;
    letter-spacing: 0.04em;
    text-decoration: none;
    padding: 12px 22px;
    border-radius: 2px;
    transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease;
  }
  .btn-solid {
    background: var(--ink);
    color: var(--linen-0);
    border: 1px solid var(--ink);
  }
  .btn-solid:hover { transform: translateY(-2px); background: var(--accent); border-color: var(--accent); }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 1px solid rgba(90, 73, 47, 0.55);
  }
  .btn-ghost:hover { transform: translateY(-2px); background: rgba(180, 69, 47, 0.10); border-color: var(--accent); color: var(--accent); }

  .btn:focus-visible,
  .swatch:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 3px;
  }

  /* ---------- TOP META BAND (sits above, never pushes weave below fold) ---------- */
  .band {
    position: absolute;
    z-index: 4;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: clamp(16px, 2.4vw, 26px) clamp(20px, 4vw, 44px);
    color: var(--ink);
  }
  .brand {
    font-family: "Fraunces", serif;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.01em;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .brand .knot {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px rgba(180,69,47,0.22);
    flex: 0 0 auto;
  }
  .nav {
    display: flex;
    gap: clamp(14px, 2vw, 30px);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.03em;
  }
  .nav a { color: var(--ink-soft); text-decoration: none; }
  .nav a:hover { color: var(--accent); }
  .nav a:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }

  /* ---------- PALETTE SWATCH STRIP (re-weave control, optional flourish) ---------- */
  .swatches {
    position: absolute;
    z-index: 4;
    bottom: clamp(18px, 3vw, 30px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 9px 13px;
    border-radius: 40px;
    background: rgba(243, 236, 221, 0.86);
    border: 1px solid rgba(120, 98, 64, 0.34);
    box-shadow: 0 8px 26px rgba(42,33,24,0.22);
  }
  .swatches .lab {
    font-size: 10.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
    margin-right: 4px;
  }
  .swatch {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid rgba(255,252,244,0.8);
    box-shadow: 0 1px 4px rgba(42,33,24,0.32);
    cursor: pointer;
    padding: 0;
    transition: transform 0.16s ease;
  }
  .swatch:hover { transform: scale(1.14); }
  .swatch[aria-pressed="true"] { box-shadow: 0 0 0 3px var(--ink), 0 1px 4px rgba(42,33,24,0.32); }

  /* ---------- responsive: keep weave dense, stack the label cleanly ---------- */
  @media (max-width: 640px) {
    .nav { display: none; }
    .plate { width: min(90vw, 460px); }
    .wordmark { font-size: clamp(44px, 14vw, 66px); }
    .lede { display: none; }            /* keep the phone hero tight; weave + wordmark carry it */
    .swatches .lab { display: none; }
  }
  @media (max-width: 380px) {
    .cta-row .btn-ghost { display: none; }
  }

  /* honor reduced motion: nothing animates here, but disable hover lifts */
  @media (prefers-reduced-motion: reduce) {
    .btn, .swatch { transition: none; }
    .btn:hover, .swatch:hover { transform: none; }
  }

  .a11y-skip {
    position: absolute; left: -9999px; top: 0;
    background: var(--ink); color: var(--linen-0);
    padding: 10px 16px; z-index: 50; border-radius: 0 0 4px 0;
  }
  .a11y-skip:focus { left: 0; }
</style>
</head>
<body>
  <a class="a11y-skip" href="#main">Skip to content</a>

  <section class="loom" id="main" aria-label="Woven textile hero">
    <canvas id="cloth" role="img" aria-label="A generative hand-woven textile: warm linen warp threads crossed by jewel-toned weft threads forming a tapestry pattern"></canvas>
    <div class="selvedge" aria-hidden="true"></div>

    <header class="band">
      <div class="brand"><span class="knot" aria-hidden="true"></span>LOOMWORK</div>
      <nav class="nav" aria-label="Primary">
        <a href="#">Atelier</a>
        <a href="#">Collection</a>
        <a href="#">Process</a>
        <a href="#">Stockists</a>
      </nav>
    </header>

    <div class="plate">
      <p class="eyebrow" id="eyebrow">Hand Loomed in Small Batches</p>
      <h1 class="wordmark" id="wordmark">Warp <em>&amp;</em> Weft</h1>
      <p class="lede" id="lede">Every panel is woven thread by thread, jewel weft crossing warm linen warp, each interlacing casting its own small shadow. No two cloths the same.</p>
      <div class="cta-row">
        <a class="btn btn-solid" href="#">View the Collection</a>
        <a class="btn btn-ghost" href="#">Our Process</a>
      </div>
    </div>

    <div class="swatches" role="group" aria-label="Re-weave the cloth in a different palette">
      <span class="lab">Re-weave</span>
      <!-- swatch buttons injected by JS from PALETTES -->
    </div>
  </section>

<script>
/* =====================================================================
   DATA  -  edit here to swap copy, pattern, and palettes.
   The hero is fully generative (Canvas2D). No external assets required;
   it renders synchronously on load so a scroll=0 screenshot is fully
   painted. Distinct from riso/halftone: this is a real over/under
   interlaced weave with per-crossing shadows.
   ===================================================================== */
const DATA = {
  copy: {
    brand:   "LOOMWORK",
    eyebrow: "Hand Loomed in Small Batches",
    // use {em} ... {/em} to mark the italic accent run
    wordmark: "Warp {em}&{/em} Weft",
    lede:    "Every panel is woven thread by thread, jewel weft crossing warm linen warp, each interlacing casting its own small shadow. No two cloths the same.",
  },

  // weave density. cell = approximate px size of one warp/weft crossing
  // smaller cell = finer, denser cloth (stays dense on mobile via re-render)
  weave: {
    cellDesktop: 15,   // px per crossing on wide screens
    cellMobile:  11,   // finer on phones so the box stays densely woven
    threadGap:   0.04, // hairline of ground between adjacent threads (real cloth has a sett, not a void)
    twill:       3,    // float length: how many cells a thread rides over (3 => 3/1 twill diagonal)
  },

  /* PALETTES. First entry is the default at load.
     warp  = warm linen warp tones (vertical threads), picked per column.
     weft  = jewel weft tones (horizontal threads), the pattern colors.
     ground= the page/cloth base color seen in the inter-thread gaps.
     accent= one punch color used sparingly in the pattern + CSS accent. */
  palettes: [
    {
      id: "saffron",
      label: "Saffron loom",
      ground: "#e6d6b6",
      warp:   ["#e9dcc0", "#ddcaa3", "#d3bd92", "#e3d3b0", "#cbb487"],
      weft:   ["#7a3b2e", "#b4452f", "#c9772f", "#d8a13a", "#3f5c46", "#214a52"],
      accent: "#b4452f",
      cssAccent: "#b4452f",
      cssGround: "#e2d2b4",
    },
    {
      id: "indigo",
      label: "Indigo & madder",
      ground: "#dccfae",
      warp:   ["#e7d8b8", "#d6c39c", "#cdb88f", "#e0cfa9", "#c4ad81"],
      weft:   ["#1d2f52", "#2c4a72", "#3a6b8a", "#7c2c33", "#b34234", "#caa24a"],
      accent: "#b34234",
      cssAccent: "#9c3a3a",
      cssGround: "#dccdaa",
    },
    {
      id: "forest",
      label: "Forest & ochre",
      ground: "#e3d6b4",
      warp:   ["#e9dcbd", "#d9c89f", "#cfbc8f", "#e0d1a8", "#c6b183"],
      weft:   ["#21402c", "#2f6b3e", "#5c8a3a", "#a8842c", "#b4452f", "#6b3b2a"],
      accent: "#2f6b3e",
      cssAccent: "#2f6b3e",
      cssGround: "#e0d2ad",
    },
    {
      id: "plum",
      label: "Plum & brass",
      ground: "#e4d4b8",
      warp:   ["#ecdcc0", "#dac9a2", "#d0bd92", "#e3d4af", "#c8b388"],
      weft:   ["#3d1f3a", "#6d2c52", "#a23a5e", "#c98a3a", "#3a5a66", "#8a3a2c"],
      accent: "#a23a5e",
      cssAccent: "#9c3a64",
      cssGround: "#e2d2b4",
    },
  ],
};

/* =====================================================================
   RENDERER
   ===================================================================== */
(function () {
  "use strict";

  const canvas = document.getElementById("cloth");
  const ctx = canvas.getContext("2d", { alpha: false });

  let current = 0; // index into DATA.palettes

  /* ---- copy injection (supports {em}...{/em}) ---- */
  function applyCopy() {
    const c = DATA.copy;
    document.querySelector(".brand").lastChild.textContent = c.brand;
    document.getElementById("eyebrow").textContent = c.eyebrow;
    document.getElementById("lede").textContent = c.lede;
    const wm = c.wordmark
      .replace(/{em}/g, "<em>")
      .replace(/{\/em}/g, "</em>");
    document.getElementById("wordmark").innerHTML = wm;
  }

  /* ---- THE PATTERN ----
     Returns a WEFT COLOR INDEX for weave row r. The weft thread on a given
     pick (row) carries one dyed color across the cloth, banded so the field
     reads as horizontal color stripes broken by the medallion. This is the
     "coarse image" the weave forms. Procedural + deterministic => instant
     synchronous render, no async image decode race.
     To embed a real photo instead: sample image rows into weft buckets and
     image columns into a per-(c,r) override here. */
  function weftColorIndex(c, r, cols, rows, weftCount, h01, accentIdx) {
    const ny = r / rows;
    const nx = c / cols;
    const cx = nx - 0.5, cy = ny - 0.5;

    // base field: broad horizontal weft bands (the woven "stripe" ground)
    let band = Math.floor((r + Math.sin(nx * 5.0) * 1.6) / 3.0) % weftCount;

    // large central diamond medallion: the tapestry centerpiece, a coarse
    // motif the threads resolve into. Aspect-corrected so it reads as a
    // proper lozenge framing the wordmark plate. Rings alternate the accent
    // jewel against the darkest weft so the lozenge OUTLINE reads clearly
    // where it peeks above and below the centered wordmark label.
    const diamond = Math.abs(cx) * 1.45 + Math.abs(cy) * 2.30;
    if (diamond < 0.50) {
      const ring = Math.floor(diamond * 10);       // concentric step-rings
      band = (ring % 2 === 0) ? accentIdx : 0;     // accent vs deepest jewel
      if (diamond > 0.30 && diamond < 0.355) band = weftCount - 3; // inner border
      if (diamond < 0.10) band = weftCount - 2;    // bright core
      // tiny diamond pips inside the medallion field
      const pip = (Math.abs(((c % 8) - 4)) + Math.abs(((r % 8) - 4)));
      if (diamond > 0.13 && diamond < 0.30 && pip < 2) band = accentIdx;
    } else if (diamond < 0.575) {
      band = accentIdx;                              // bold outer frame ring
    } else if (diamond < 0.605) {
      band = 0;                                      // thin dark keyline outside the frame
    }

    // selvedge stripes top & bottom edges
    if (ny < 0.045 || ny > 0.955) band = (r % 2 === 0) ? 1 : 4;

    // sparse jewel flecks scattered in the open field
    if (diamond > 0.58 && h01 > 0.974) band = weftCount - 1;

    band = ((band % weftCount) + weftCount) % weftCount;
    return band;
  }

  // shade a hex color by amt (-1..1). negative darkens, positive lightens.
  function shade(hex, amt) {
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    if (amt >= 0) { r += (255 - r) * amt; g += (255 - g) * amt; b += (255 - b) * amt; }
    else { r *= (1 + amt); g *= (1 + amt); b *= (1 + amt); }
    return "rgb(" + (r | 0) + "," + (g | 0) + "," + (b | 0) + ")";
  }

  /* draw a continuous thread RUN as a rounded capsule with a cross-section
     sheen (light on one edge, shadow on the other) so it reads as a round
     dyed fiber lying on the cloth, not a flat bar. vertical=true => warp. */
  function threadRun(x, y, w, h, color, vertical) {
    const r = (vertical ? w : h) / 2;       // capsule radius = half thread width
    roundRect(x, y, w, h, r);
    ctx.fillStyle = color;
    ctx.fill();

    // cross-section shading across the thread's WIDTH
    const g = vertical
      ? ctx.createLinearGradient(x, 0, x + w, 0)
      : ctx.createLinearGradient(0, y, 0, y + h);
    g.addColorStop(0.00, "rgba(255,255,255,0.34)"); // lit edge
    g.addColorStop(0.30, "rgba(255,255,255,0.10)");
    g.addColorStop(0.52, "rgba(0,0,0,0.00)");
    g.addColorStop(0.80, "rgba(0,0,0,0.16)");
    g.addColorStop(1.00, "rgba(0,0,0,0.30)");      // shaded edge
    ctx.fillStyle = g;
    roundRect(x, y, w, h, r);
    ctx.fill();
  }

  function roundRect(x, y, w, h, r) {
    r = Math.max(0, Math.min(r, Math.min(w, h) / 2));
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  /* ---- MAIN WEAVE RENDER (synchronous, one pass) ----
     True interlaced twill: at each crossing the weft is ON TOP iff
     ((c + r * step) mod twill) < (twill - 1). That gives multi-cell FLOATS
     running on the diagonal, the signature of a woven twill cloth. We draw
     bottom layer first (the threads that go UNDER), a per-crossing contact
     shadow, then the floats that ride OVER, as continuous capsules. */
  function render() {
    const pal = DATA.palettes[current];
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cssW = canvas.clientWidth;
    const cssH = canvas.clientHeight;
    if (cssW === 0 || cssH === 0) return;

    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    const isMobile = cssW <= 640;
    const cell = isMobile ? DATA.weave.cellMobile : DATA.weave.cellDesktop;
    const twill = DATA.weave.twill;            // float length on the diagonal
    const gap = cell * DATA.weave.threadGap;   // hairline ground between threads
    const tw = cell - gap;                     // thread width
    const ext = gap * 0.55;                    // capsule overrun so floats merge smoothly

    const cols = Math.ceil(cssW / cell) + 2;
    const rows = Math.ceil(cssH / cell) + 2;
    const weftCount = pal.weft.length;
    const warpCount = pal.warp.length;
    // index of the accent jewel within the weft palette (drives the medallion);
    // fall back to a mid jewel if the accent is not present in the weft list.
    let accentIdx = pal.weft.indexOf(pal.accent);
    if (accentIdx < 0) accentIdx = Math.min(1, weftCount - 1);

    // 1) cloth ground (the sett: hairline ground visible between threads)
    ctx.fillStyle = pal.ground;
    ctx.fillRect(0, 0, cssW, cssH);
    paintGroundNoise(cssW, cssH, cell);

    // weft-over test for a 3/1 twill (over 3, under 1), stepping +1 per row
    const weftOver = (c, r) => (((c + r) % twill) !== 0);

    // 2) BOTTOM LAYER: draw every thread that passes UNDER at this crossing,
    //    slightly darkened (it sits in shadow beneath the float on top).
    for (let r = 0; r < rows; r++) {
      const y = r * cell;
      for (let c = 0; c < cols; c++) {
        const x = c * cell;
        const over = weftOver(c, r);
        if (over) {
          // weft is on top here => the WARP goes under at this crossing
          threadRun(x + gap / 2, y - ext, tw, cell + ext * 2,
                    shade(pal.warp[c % warpCount], -0.16), true);
        } else {
          // warp on top => the WEFT goes under at this crossing
          const wc = pal.weft[weftColorIndex(c, r, cols, rows, weftCount, 0, accentIdx)];
          threadRun(x - ext, y + gap / 2, cell + ext * 2, tw, shade(wc, -0.16), false);
        }
      }
    }

    // 3) CONTACT SHADOWS: a tiny soft shadow at every crossing so the top
    //    float visibly casts onto the layer below (the over/under read).
    paintCrossingShadows(cols, rows, cell);

    // 4) TOP LAYER: the floats that ride OVER, full color, as continuous
    //    capsules. Drawing them last makes the interlacing read cleanly.
    for (let r = 0; r < rows; r++) {
      const y = r * cell;
      for (let c = 0; c < cols; c++) {
        const x = c * cell;
        const over = weftOver(c, r);
        if (over) {
          const h01 = (((c * 73856093) ^ (r * 19349663)) >>> 0) / 4294967295;
          const idx = weftColorIndex(c, r, cols, rows, weftCount, h01, accentIdx);
          threadRun(x - ext, y + gap / 2, cell + ext * 2, tw, pal.weft[idx], false);
        } else {
          threadRun(x + gap / 2, y - ext, tw, cell + ext * 2, pal.warp[c % warpCount], true);
        }
      }
    }

    // 5) overall drape + light for cloth richness
    paintDrape(cssW, cssH);

    // sync CSS accent + ground to the active palette
    document.documentElement.style.setProperty("--accent", pal.cssAccent || pal.accent);
    document.documentElement.style.setProperty("--linen-1", pal.cssGround || "#e2d2b4");
  }

  // soft per-crossing contact shadows offset down-right under each float
  function paintCrossingShadows(cols, rows, cell) {
    ctx.save();
    ctx.globalCompositeOperation = "multiply";
    const off = cell * 0.16;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cx = c * cell + cell / 2 + off;
        const cy = r * cell + cell / 2 + off;
        const rad = cell * 0.58;
        const g = ctx.createRadialGradient(cx, cy, rad * 0.12, cx, cy, rad);
        g.addColorStop(0, "rgba(34,24,14,0.20)");
        g.addColorStop(1, "rgba(34,24,14,0)");
        ctx.fillStyle = g;
        ctx.fillRect(c * cell - cell * 0.2, r * cell - cell * 0.2, cell * 1.5, cell * 1.5);
      }
    }
    ctx.restore();
  }

  // faint deterministic fiber noise so the cloth is not dead flat
  function paintGroundNoise(w, h, cell) {
    ctx.save();
    ctx.globalAlpha = 0.05;
    ctx.fillStyle = "#3a2c1c";
    const step = Math.max(3, cell * 0.5);
    for (let yy = 0; yy < h; yy += step) {
      for (let xx = 0; xx < w; xx += step) {
        const hsh = ((xx * 374761393) ^ (yy * 668265263)) >>> 0;
        if ((hsh % 7) === 0) ctx.fillRect(xx, yy, 1.4, 1.4);
      }
    }
    ctx.restore();
  }

  // overall drape shading: a couple of soft folds, multiply blended
  function paintDrape(w, h) {
    ctx.save();
    ctx.globalCompositeOperation = "multiply";
    const folds = ctx.createLinearGradient(0, 0, w, 0);
    folds.addColorStop(0.00, "rgba(255,255,255,0.04)");
    folds.addColorStop(0.18, "rgba(60,45,28,0.10)");
    folds.addColorStop(0.34, "rgba(255,255,255,0.05)");
    folds.addColorStop(0.55, "rgba(60,45,28,0.08)");
    folds.addColorStop(0.78, "rgba(255,255,255,0.04)");
    folds.addColorStop(1.00, "rgba(60,45,28,0.12)");
    ctx.fillStyle = folds;
    ctx.fillRect(0, 0, w, h);

    // top light, bottom weight
    const v = ctx.createLinearGradient(0, 0, 0, h);
    v.addColorStop(0.0, "rgba(255,250,240,0.06)");
    v.addColorStop(0.5, "rgba(0,0,0,0.00)");
    v.addColorStop(1.0, "rgba(40,30,18,0.10)");
    ctx.fillStyle = v;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }

  /* ---- swatch UI (re-weave control) ---- */
  function buildSwatches() {
    const wrap = document.querySelector(".swatches");
    DATA.palettes.forEach((p, i) => {
      const b = document.createElement("button");
      b.className = "swatch";
      b.type = "button";
      b.style.background = "conic-gradient(" + p.weft.join(",") + ")";
      b.setAttribute("aria-label", "Re-weave in " + p.label);
      b.setAttribute("aria-pressed", i === current ? "true" : "false");
      b.addEventListener("click", () => {
        current = i;
        wrap.querySelectorAll(".swatch").forEach((s, j) =>
          s.setAttribute("aria-pressed", j === i ? "true" : "false"));
        render();
      });
      wrap.appendChild(b);
    });
  }

  /* ---- init: render synchronously, immediately ---- */
  applyCopy();
  buildSwatches();
  render();

  // re-weave to the box on resize / orientation change (debounced).
  // not an animation loop: a one-shot re-render so the cloth stays dense.
  let rt;
  window.addEventListener("resize", () => {
    clearTimeout(rt);
    rt = setTimeout(render, 140);
  });
  // also re-render once fonts settle (label sizing only; cloth is font-free)
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => { /* cloth unaffected; no re-render needed */ });
  }
})();
</script>
</body>
</html>
