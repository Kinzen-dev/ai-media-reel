<!-- TEMPLATE: The Hollow Vespers | ARCHETYPE: gothic-horror dark-fantasy editorial hero | REF: A24 horror key art, Penny Dreadful title design, Crimson Peak posters | WHEN TO USE: a theatrical dark-fantasy / horror landing or chapter cover - misty image, blood-crimson drop-shadow serif, decorative initial; for a film, novel, album, or atmospheric brand | SWAP: edit the DATA object at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Hollow Vespers</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   DATA-DRIVEN GOTHIC HORROR HERO
   All copy + the atmosphere image live in the JS DATA object
   at the very top of <script>. Swap there, nothing else.
   ============================================================ */
:root{
  --crimson:#b3122a;        /* blood-crimson display serif */
  --crimson-deep:#7c0a1c;   /* shadow / vein */
  --bone:#e7e0d2;           /* bone, parchment text */
  --bone-dim:#a99f8c;       /* dimmed bone */
  --forest:#0c130f;         /* dark-forest near-black */
  --forest-2:#070a08;       /* deepest */
  --mist:rgba(150,168,158,.10);
  --display:"Cinzel",'Trajan Pro',Georgia,serif;
  --body:"EB Garamond",Georgia,'Times New Roman',serif;
}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0;
  background:var(--forest-2);
  color:var(--bone);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

/* ---------- STAGE: full-viewport misty forest plate ---------- */
.stage{
  position:relative;
  min-height:100svh;
  min-height:100vh;
  width:100%;
  display:grid;
  grid-template-rows:auto 1fr auto;
  overflow:hidden;
  isolation:isolate;
}

/* the atmospheric image, desaturated + pushed dark + cold-forest tint */
.plate{
  position:absolute;
  inset:0;
  z-index:0;
  background-position:center 38%;
  background-size:cover;
  background-repeat:no-repeat;
  filter:grayscale(.62) brightness(.5) contrast(1.08) sepia(.18) hue-rotate(58deg) saturate(.82);
  transform:scale(1.06);
}
/* cold forest-green wash + heavy vignette so crimson pops, dread reads */
.plate::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(120% 90% at 50% 30%, rgba(12,19,15,0) 0%, rgba(7,10,8,.55) 58%, rgba(5,7,6,.96) 100%),
    linear-gradient(180deg, rgba(8,16,12,.62) 0%, rgba(8,16,12,.30) 34%, rgba(7,11,9,.78) 100%),
    linear-gradient(90deg, rgba(10,28,20,.42), rgba(10,28,20,.10) 50%, rgba(28,10,14,.36));
  mix-blend-mode:multiply;
}

/* drifting fog layers (two SVG noise sheets, slow opposite drift) */
.fog{
  position:absolute;
  z-index:1;
  inset:-25% -30%;
  pointer-events:none;
  opacity:.5;
  background-repeat:repeat;
  background-size:760px 760px;
  will-change:transform;
}
.fog.a{animation:driftA 64s linear infinite;}
.fog.b{opacity:.34;background-size:1020px 1020px;animation:driftB 92s linear infinite;}
@keyframes driftA{from{transform:translate3d(0,0,0);}to{transform:translate3d(-380px,-40px,0);}}
@keyframes driftB{from{transform:translate3d(0,0,0);}to{transform:translate3d(420px,30px,0);}}

/* fine film grain over everything for that 35mm horror plate feel */
.grain{
  position:absolute;
  z-index:2;
  inset:0;
  pointer-events:none;
  opacity:.10;
  mix-blend-mode:overlay;
  background-repeat:repeat;
  background-size:280px 280px;
}

/* ---------- TOP BAND: imprint / running head ---------- */
.band{
  position:relative;
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:22px clamp(20px,5vw,72px) 0;
  font-family:var(--display);
  letter-spacing:.42em;
  text-transform:uppercase;
  font-size:11px;
  color:var(--bone-dim);
}
.band .mark{
  display:inline-flex;
  align-items:center;
  gap:11px;
  color:var(--bone);
}
.band .mark svg{filter:drop-shadow(0 1px 2px rgba(0,0,0,.8));}
.band .right{text-align:right;letter-spacing:.34em;}
.band .right .crim{color:var(--crimson);}
.rule-thin{
  position:relative;z-index:5;
  margin:14px clamp(20px,5vw,72px) 0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(231,224,210,.30) 14%,rgba(179,18,42,.55) 50%,rgba(231,224,210,.30) 86%,transparent);
}

/* ---------- CENTER: the headline + decorative initial ---------- */
.hero{
  position:relative;
  z-index:5;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:clamp(6px,2vh,26px) clamp(18px,5vw,60px);
  gap:clamp(10px,1.7vh,22px);
}
.kicker{
  font-family:var(--display);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.62em;
  font-size:clamp(10px,1.6vw,14px);
  color:var(--bone-dim);
  text-shadow:0 2px 10px rgba(0,0,0,.9);
  padding-left:.62em; /* optical balance for tracking */
}

/* the ornament + headline cluster */
.title-wrap{
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:clamp(6px,1.2vh,16px);
  max-width:min(1040px,94vw);
}
/* decorative initial / illuminated drop-cap floats behind the first word */
.initial{
  position:relative;
  width:clamp(112px,15vw,172px);
  height:auto;
  margin-bottom:-6px;
  filter:drop-shadow(0 10px 26px rgba(0,0,0,.85)) drop-shadow(0 2px 0 rgba(124,10,28,.7));
}
.headline{
  margin:0;
  font-family:var(--display);
  font-weight:900;
  color:var(--crimson);
  line-height:.94;
  letter-spacing:.012em;
  font-size:clamp(46px,8.2vw,98px);
  /* heavy theatrical drop shadow: depth + blood-bleed + carved edge */
  text-shadow:
    0 1px 0 #4d0712,
    0 2px 0 #3a0510,
    0 6px 14px rgba(0,0,0,.92),
    0 0 44px rgba(179,18,42,.34),
    0 18px 40px rgba(0,0,0,.7);
  text-wrap:balance;
}
.headline .line{display:block;}
.headline .small{
  display:block;
  font-size:.46em;
  font-weight:700;
  letter-spacing:.18em;
  color:var(--bone);
  text-shadow:0 2px 4px rgba(0,0,0,.9),0 8px 20px rgba(0,0,0,.7);
  margin-top:.18em;
}

/* divider ornament under the headline */
.flourish{
  display:flex;align-items:center;gap:14px;
  color:var(--crimson);
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.8));
}
.flourish .ln{
  height:1px;width:clamp(48px,12vw,120px);
  background:linear-gradient(90deg,transparent,#b3122a);
}
.flourish .ln.r{background:linear-gradient(90deg,#b3122a,transparent);}

/* eerie subhead in spaced caps */
.subhead{
  font-family:var(--display);
  font-weight:400;
  text-transform:uppercase;
  letter-spacing:.5em;
  font-size:clamp(11px,1.55vw,15px);
  color:var(--bone);
  text-shadow:0 2px 12px rgba(0,0,0,.95);
  max-width:42ch;
  line-height:1.95;
  padding-left:.5em;
  margin:0;
}
.subhead em{
  font-style:italic;
  font-family:var(--body);
  text-transform:none;
  letter-spacing:.02em;
  color:var(--bone-dim);
}

/* one ominous CTA */
.cta{
  margin-top:clamp(6px,1.4vh,16px);
  display:inline-flex;
  align-items:center;
  gap:13px;
  padding:15px 30px 14px;
  font-family:var(--display);
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.34em;
  font-size:13px;
  color:var(--bone);
  text-decoration:none;
  background:linear-gradient(180deg,rgba(20,9,11,.62),rgba(10,5,6,.74));
  border:1px solid rgba(179,18,42,.6);
  box-shadow:
    inset 0 0 0 1px rgba(231,224,210,.05),
    inset 0 0 28px rgba(179,18,42,.14),
    0 8px 30px rgba(0,0,0,.6);
  transition:border-color .35s ease, box-shadow .35s ease, color .35s ease, transform .35s ease;
  backdrop-filter:blur(2px);
}
.cta .pip{color:var(--crimson);transition:transform .35s ease;}
.cta:hover{
  color:#fff;
  border-color:var(--crimson);
  box-shadow:
    inset 0 0 0 1px rgba(231,224,210,.08),
    inset 0 0 40px rgba(179,18,42,.30),
    0 0 36px rgba(179,18,42,.4),
    0 10px 36px rgba(0,0,0,.7);
  transform:translateY(-1px);
}
.cta:hover .pip{transform:translateX(4px);}
.cta:focus-visible{
  outline:2px solid var(--bone);
  outline-offset:4px;
}

/* ---------- BOTTOM BAND: dramatis / chapter ledger ---------- */
.ledger{
  position:relative;
  z-index:5;
  padding:0 clamp(20px,5vw,72px) clamp(20px,3vh,34px);
}
.ledger .lrule{
  height:1px;
  margin-bottom:16px;
  background:linear-gradient(90deg,transparent,rgba(231,224,210,.24) 12%,rgba(231,224,210,.24) 88%,transparent);
}
.cast{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:clamp(10px,2vw,26px);
}
.cast .col{
  border-left:1px solid rgba(179,18,42,.34);
  padding-left:clamp(10px,1vw,16px);
}
.cast .col .no{
  font-family:var(--display);
  font-size:11px;
  letter-spacing:.34em;
  color:var(--crimson);
  text-transform:uppercase;
}
.cast .col .nm{
  font-family:var(--display);
  font-weight:600;
  font-size:clamp(12px,1.4vw,15px);
  letter-spacing:.06em;
  color:var(--bone);
  margin-top:5px;
  text-shadow:0 1px 4px rgba(0,0,0,.8);
}
.cast .col .dt{
  font-size:13px;
  font-style:italic;
  color:var(--bone-dim);
  margin-top:3px;
  line-height:1.4;
}

/* slow blood-pulse on the crimson rule + initial (decorative, disabled on RM) */
.pulse{animation:pulse 6.5s ease-in-out infinite;}
@keyframes pulse{
  0%,100%{opacity:.92;}
  50%{opacity:1;filter:drop-shadow(0 10px 26px rgba(0,0,0,.85)) drop-shadow(0 0 18px rgba(179,18,42,.55));}
}

/* ---------- MOBILE: keep atmosphere, never cover-crop landscape ---------- */
@media (max-width:640px){
  .stage{grid-template-rows:auto auto auto;min-height:100svh;}
  /* let the landscape plate sit as a letterboxed band up top, content stacks below */
  .plate{
    background-position:center 30%;
    /* keep it cover but shorter focus; vignette already protects edges */
  }
  .hero{padding:30px 22px 14px;gap:18px;}
  .headline{font-size:clamp(40px,13vw,62px);}
  .subhead{letter-spacing:.34em;line-height:2;font-size:12px;max-width:30ch;}
  .band{letter-spacing:.28em;font-size:9.5px;padding:16px 20px 0;}
  .band .right{display:none;}
  .cast{grid-template-columns:repeat(2,1fr);row-gap:16px;}
  .initial{width:96px;}
  .kicker{letter-spacing:.4em;}
}
@media (max-width:380px){
  .cast{grid-template-columns:1fr;}
  .headline{font-size:clamp(34px,12vw,52px);}
}

/* ---------- REDUCED MOTION: freeze the dread ---------- */
@media (prefers-reduced-motion:reduce){
  .fog{animation:none !important;}
  .pulse{animation:none !important;}
  *{transition:none !important;}
}
</style>
</head>
<body>
  <main class="stage" id="stage">
    <!-- atmosphere layers -->
    <div class="plate" id="plate" aria-hidden="true"></div>
    <div class="fog a" id="fogA" aria-hidden="true"></div>
    <div class="fog b" id="fogB" aria-hidden="true"></div>
    <div class="grain" id="grain" aria-hidden="true"></div>

    <!-- TOP BAND: imprint running head -->
    <header>
      <div class="band">
        <span class="mark">
          <!-- inline SVG ornament: a thorned crest (hex literals, no var()) -->
          <svg width="20" height="22" viewBox="0 0 20 22" fill="none" aria-hidden="true">
            <path d="M10 1 L13 7 L19 7 L14 11 L16 18 L10 14 L4 18 L6 11 L1 7 L7 7 Z" stroke="#b3122a" stroke-width="1.1" fill="rgba(179,18,42,0.16)"/>
            <circle cx="10" cy="9.6" r="1.7" fill="#b3122a"/>
          </svg>
          <span id="imprint">THE VESPER PRESS</span>
        </span>
        <span class="right"><span class="crim" id="vol">VOL. XIII</span> &nbsp; &middot; &nbsp; <span id="season">ALL HALLOWS</span></span>
      </div>
      <div class="rule-thin" aria-hidden="true"></div>
    </header>

    <!-- CENTER: the signature - misty plate + crimson drop-shadow serif + initial -->
    <section class="hero">
      <p class="kicker" id="kicker">A Dark Fantasy In Three Acts</p>

      <div class="title-wrap">
        <!-- decorative illuminated initial (inline SVG, hex literals) -->
        <svg class="initial pulse" id="initial" viewBox="0 0 120 130" fill="none" aria-hidden="true">
          <!-- ornamental frame -->
          <path d="M60 4 C30 4 8 26 8 60 C8 96 32 126 60 126 C88 126 112 96 112 60 C112 26 90 4 60 4 Z"
                stroke="#7c0a1c" stroke-width="1.4" fill="none" opacity="0.75"/>
          <path d="M60 12 C84 12 104 33 104 60 C104 92 84 118 60 118 C36 118 16 92 16 60 C16 33 36 12 60 12 Z"
                stroke="#b3122a" stroke-width="0.9" fill="rgba(124,10,28,0.18)"/>
          <!-- vine flourishes -->
          <path d="M60 12 C50 22 70 28 60 40 M60 118 C70 108 50 102 60 90" stroke="#b3122a" stroke-width="1" opacity="0.7"/>
          <path d="M16 60 C28 50 30 70 42 60 M104 60 C92 70 90 50 78 60" stroke="#b3122a" stroke-width="1" opacity="0.55"/>
          <!-- the illuminated letter -->
          <text x="60" y="86" text-anchor="middle" font-family="Cinzel, Georgia, serif" font-weight="900"
                font-size="78" fill="#b3122a" id="initial-letter"
                style="filter:drop-shadow(0 2px 0 #4d0712);">V</text>
          <!-- thorn accents -->
          <path d="M60 4 l4 7 l-8 0 z" fill="#b3122a"/>
          <circle cx="60" cy="126" r="2.4" fill="#b3122a"/>
        </svg>

        <h1 class="headline" id="headline">
          <span class="line">The Hollow</span>
          <span class="line">Vespers</span>
          <span class="small" id="headline-sub">An Evening Service For The Damned</span>
        </h1>
      </div>

      <div class="flourish" aria-hidden="true">
        <span class="ln"></span>
        <!-- center ornament diamond -->
        <svg width="34" height="14" viewBox="0 0 34 14" fill="none">
          <path d="M17 1 L24 7 L17 13 L10 7 Z" stroke="#b3122a" stroke-width="1" fill="rgba(179,18,42,0.2)"/>
          <path d="M1 7 H8 M26 7 H33" stroke="#b3122a" stroke-width="1"/>
          <circle cx="17" cy="7" r="1.4" fill="#b3122a"/>
        </svg>
        <span class="ln r"></span>
      </div>

      <p class="subhead" id="subhead">
        They Came At Vespers &middot; They Did Not Leave By Matins<br />
        <em>a story told only once, and never finished</em>
      </p>

      <a class="cta" id="cta" href="#enter">
        <span id="cta-label">Enter The Service</span>
        <span class="pip" aria-hidden="true">&#10142;</span>
      </a>
    </section>

    <!-- BOTTOM BAND: dramatis ledger populated from DATA (signature fill at scroll=0) -->
    <footer class="ledger">
      <div class="lrule" aria-hidden="true"></div>
      <div class="cast" id="cast"><!-- rendered from DATA.cast --></div>
    </footer>
  </main>

<script>
/* ============================================================
   DATA - swap everything here to repurpose the template.
   ============================================================ */
const DATA = {
  // background atmosphere image (reuses the shared demo assets).
  // a dark wet night scene, pushed to desaturated dark-forest by CSS filters.
  image: "../assets/flux-car-4k.png",

  imprint: "THE VESPER PRESS",
  volume:  "VOL. XIII",
  season:  "ALL HALLOWS",

  kicker:  "A Dark Fantasy In Three Acts",

  initialLetter: "V",                 // the illuminated drop-cap glyph
  titleLines: ["The Hollow", "Vespers"],
  titleSub: "An Evening Service For The Damned",

  subheadCaps: "They Came At Vespers · They Did Not Leave By Matins",
  subheadItalic: "a story told only once, and never finished",

  ctaLabel: "Enter The Service",

  // dramatis / chapter ledger - 4 columns, fills the first viewport bottom band
  cast: [
    { no: "ACT I",   name: "The Procession", date: "into the black pines" },
    { no: "ACT II",  name: "The Reckoning",  date: "the bells toll backward" },
    { no: "ACT III", name: "The Hollow",     date: "what the mist keeps" },
    { no: "CODA",    name: "Matins",         date: "no one answers the door" },
  ],
};

/* ---------- bind DATA into the markup ---------- */
(function render(){
  const plate = document.getElementById('plate');
  plate.style.backgroundImage = `url("${DATA.image}")`;

  document.getElementById('imprint').textContent = DATA.imprint;
  document.getElementById('vol').textContent = DATA.volume;
  document.getElementById('season').textContent = DATA.season;
  document.getElementById('kicker').textContent = DATA.kicker;

  document.getElementById('initial-letter').textContent = DATA.initialLetter;

  const hl = document.getElementById('headline');
  // rebuild the headline lines + small sub from DATA
  hl.innerHTML = DATA.titleLines.map(l => `<span class="line">${l}</span>`).join('')
    + `<span class="small" id="headline-sub"></span>`;
  document.getElementById('headline-sub').textContent = DATA.titleSub;

  const sh = document.getElementById('subhead');
  sh.innerHTML = `${DATA.subheadCaps}<br /><em>${DATA.subheadItalic}</em>`;

  document.getElementById('cta-label').textContent = DATA.ctaLabel;

  const cast = document.getElementById('cast');
  cast.innerHTML = DATA.cast.map(c => `
    <div class="col">
      <div class="no">${c.no}</div>
      <div class="nm">${c.name}</div>
      <div class="dt">${c.date}</div>
    </div>`).join('');
})();

/* ---------- procedurally paint fog + grain as data-URI SVG noise ----------
   keeps the file self-contained (no external texture), cheap to decode.    */
(function textures(){
  // soft cloudy fog: fractal noise, low frequency, blurred feel
  const fog = encodeURIComponent(
    `<svg xmlns='http://www.w3.org/2000/svg' width='760' height='760'>
       <filter id='f'>
         <feTurbulence type='fractalNoise' baseFrequency='0.012 0.018' numOctaves='3' seed='7' stitchTiles='stitch'/>
         <feColorMatrix type='matrix' values='0 0 0 0 0.62  0 0 0 0 0.70  0 0 0 0 0.64  0 0 0 0.9 0'/>
       </filter>
       <rect width='100%' height='100%' filter='url(%23f)'/>
     </svg>`.replace(/\n\s+/g,'')
  );
  const fogUrl = `url("data:image/svg+xml,${fog}")`;
  document.getElementById('fogA').style.backgroundImage = fogUrl;
  document.getElementById('fogB').style.backgroundImage = fogUrl;

  // fine film grain
  const grain = encodeURIComponent(
    `<svg xmlns='http://www.w3.org/2000/svg' width='280' height='280'>
       <filter id='g'>
         <feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='3' stitchTiles='stitch'/>
         <feColorMatrix type='saturate' values='0'/>
       </filter>
       <rect width='100%' height='100%' filter='url(%23g)'/>
     </svg>`.replace(/\n\s+/g,'')
  );
  document.getElementById('grain').style.backgroundImage =
    `url("data:image/svg+xml,${grain}")`;
})();

/* ---------- subtle parallax breath on the plate (pointer only) ----------
   Honors reduced motion: no rAF / transform overrides when the user opts out.
   Final static state is the CSS scale(1.06) plate.                          */
(function parallax(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)');
  if (reduce.matches) return;                       // freeze: do nothing
  if (window.matchMedia('(pointer: coarse)').matches) return; // skip on touch

  const plate = document.getElementById('plate');
  const fogA  = document.getElementById('fogA');
  let tx = 0, ty = 0, cx = 0, cy = 0, raf = 0;

  function onMove(e){
    const w = window.innerWidth, h = window.innerHeight;
    tx = ((e.clientX / w) - 0.5);   // -0.5..0.5
    ty = ((e.clientY / h) - 0.5);
    if (!raf) raf = requestAnimationFrame(tick);
  }
  function tick(){
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;
    // very small drift so the headline stays the anchor, image breathes behind
    plate.style.transform = `scale(1.06) translate(${cx * -14}px, ${cy * -10}px)`;
    fogA.style.transform  = `translate3d(${cx * 24}px, ${cy * 18}px, 0)`;
    if (Math.abs(tx - cx) > 0.001 || Math.abs(ty - cy) > 0.001){
      raf = requestAnimationFrame(tick);
    } else { raf = 0; }
  }
  window.addEventListener('pointermove', onMove, { passive:true });

  // if the user flips reduced-motion on at runtime, kill the override + restore
  reduce.addEventListener('change', e => {
    if (e.matches){
      window.removeEventListener('pointermove', onMove);
      if (raf) cancelAnimationFrame(raf), raf = 0;
      plate.style.transform = 'scale(1.06)';
      fogA.style.transform  = '';
    }
  });
})();
</script>
</body>
</html>
