<!-- TEMPLATE: Holographic Foil Owner Dashboard | ARCHETYPE: holographic-foil-backoffice | REF: holographic / iridescent foil dashboards (shifting rainbow sheen, premium-playful) | WHEN TO USE: clinic / SMB owner overview where KPIs + trend + channel split must read premium yet stay crisp; numbers sit on frosted/ink plates over rainbow foil | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yimwhan - ภาพรวมคลินิก (Holographic Foil)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* =========================================================================
   ALL CONTENT LIVES IN THE DATA ARRAY (see <script> at top of body).
   This stylesheet builds the holographic-foil shell. Numbers always sit on a
   frosted/ink "plate" element, never directly on the rainbow foil.
   ========================================================================= */

:root{
  --ground:#f6f5fa;
  --ink:#2a2735;
  --ink-soft:#5a5468;
  --plate:#ffffff;
  /* near-opaque frost: blocks the rainbow behind data so numbers stay crisp.
     foil shows on card edges/borders/padding + sheen, never behind small text. */
  --plate-frost:rgba(255,255,255,0.965);
  --line:rgba(42,39,53,0.10);
  --pos:#1f9d6b;     /* legible green for positive deltas */
  --neg:#d6486a;     /* legible rose for negative deltas */
  --radius:22px;
  --shadow:0 22px 50px -28px rgba(58,42,88,0.45), 0 2px 0 rgba(255,255,255,0.7) inset;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{ -webkit-text-size-adjust:100%; }
body{
  font-family:"IBM Plex Sans Thai","Sora",system-ui,sans-serif;
  background:
    radial-gradient(1200px 700px at 12% -10%, #ffe9f4 0%, rgba(255,233,244,0) 55%),
    radial-gradient(1100px 760px at 95% 0%, #e6f3ff 0%, rgba(230,243,255,0) 50%),
    radial-gradient(1000px 800px at 60% 120%, #e9fff3 0%, rgba(233,255,243,0) 55%),
    var(--ground);
  color:var(--ink);
  min-width:0;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ---- the holographic foil itself: a shifting rainbow sheen + grain ------ */
.foil{
  position:relative;
  isolation:isolate;
  overflow:hidden;
  background:
    conic-gradient(from 200deg at 30% 25%,
      #ffd1e8 0deg,#d9c7ff 55deg,#bfe6ff 110deg,#c4ffe4 165deg,
      #fff0c9 215deg,#ffd1e8 280deg,#d9c7ff 330deg,#ffd1e8 360deg);
  background-size:240% 240%;
  background-position:0% 50%;
}
.foil::before{
  /* diagonal rainbow sweep that drifts (the "sheen").
     inset:0 keeps the layout box inside the foil so scroll dims never
     blow out; the sweep travels by animating background-position (cheap,
     compositor-friendly) over a gradient sized wider than the box. */
  content:"";
  position:absolute; inset:0;
  background:linear-gradient(115deg,
    rgba(255,255,255,0) 8%,
    rgba(255,255,255,0.65) 20%,
    rgba(255,210,240,0.0) 28%,
    rgba(190,225,255,0.55) 40%,
    rgba(196,255,228,0.0) 50%,
    rgba(255,240,201,0.55) 62%,
    rgba(255,255,255,0) 74%);
  background-size:220% 100%;
  background-position:0% 0%;
  mix-blend-mode:screen;
  filter:blur(2px);
  animation:sheen 9s linear infinite;
  z-index:0;
  pointer-events:none;
  will-change:background-position;
}
.foil::after{
  /* fine grain so foil never looks flat / banded */
  content:"";
  position:absolute; inset:0;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='120' height='120' filter='url(%23n)' opacity='0.5'/></svg>");
  opacity:0.10;
  mix-blend-mode:overlay;
  z-index:0;
  pointer-events:none;
}
@keyframes sheen{
  0%{background-position:0% 0%;}
  100%{background-position:100% 0%;}
}
.foil > *{position:relative; z-index:1;}

/* ============================ LAYOUT ===================================== */
.wrap{
  max-width:1320px;
  margin:0 auto;
  padding:26px 30px 56px;
}

/* ---- top band (brand + title overlay the first foil surface) ----------- */
.topbar{
  display:flex; align-items:center; gap:18px;
  flex-wrap:wrap;
  margin-bottom:22px;
}
.brand{
  display:flex; align-items:center; gap:13px; min-width:0;
}
.brand-badge{
  width:50px; height:50px; border-radius:15px; flex:0 0 auto;
  border:1px solid rgba(255,255,255,0.7);
  box-shadow:var(--shadow);
  overflow:hidden;
  position:relative;
  display:grid; place-items:center;
}
.brand-badge img{ width:100%; height:100%; object-fit:cover; display:block; }
.brand-badge .ring{
  position:absolute; inset:0; border-radius:15px;
  box-shadow:0 0 0 2px rgba(255,255,255,0.45) inset;
  pointer-events:none;
}
.brand-text{min-width:0;}
.brand-text h1{
  font-family:"Sora",sans-serif;
  font-size:19px; font-weight:800; letter-spacing:-0.01em;
  margin:0; line-height:1.1;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.brand-text p{
  margin:2px 0 0; font-size:12.5px; color:var(--ink-soft);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.topbar-spacer{flex:1 1 auto; min-width:8px;}
.range-pills{ display:flex; gap:8px; flex-wrap:wrap; }
.pill{
  font-family:"Sora",sans-serif;
  font-size:12.5px; font-weight:600;
  padding:8px 14px; border-radius:999px;
  border:1px solid var(--line);
  background:var(--plate-frost);
  -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
  color:var(--ink-soft);
  cursor:pointer; white-space:nowrap;
  transition:transform .14s ease, box-shadow .14s ease, color .14s ease;
}
.pill:hover{ transform:translateY(-1px); }
.pill.active{
  color:var(--ink);
  background:#fff;
  box-shadow:0 8px 22px -12px rgba(70,40,120,0.5);
  border-color:rgba(255,255,255,0.9);
}
.pill:focus-visible, .kpi:focus-visible, .row:focus-visible{
  outline:3px solid #6a5cff; outline-offset:3px;
}

/* ---- hero foil band with headline + a glance summary ------------------- */
.hero{
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:var(--shadow);
  padding:26px 28px;
  margin-bottom:22px;
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:22px;
  align-items:stretch;
}
.hero-copy{
  min-width:0; align-self:center;
  /* legible scrim so the headline + blurb read; kept lighter than the data
     plates so the foil still glows through the hero (this is the showcase band) */
  background:rgba(255,255,255,0.86);
  -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:18px;
  padding:20px 22px;
  box-shadow:0 12px 30px -22px rgba(58,42,88,0.5), 0 1px 0 rgba(255,255,255,0.9) inset;
}
.hero-eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  font-family:"Sora",sans-serif; font-size:11.5px; font-weight:700;
  letter-spacing:0.14em; text-transform:uppercase;
  color:var(--ink);
  background:rgba(255,255,255,0.78);
  -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  padding:6px 12px; border-radius:999px;
  border:1px solid rgba(255,255,255,0.8);
}
.hero-eyebrow .dot{ width:7px; height:7px; border-radius:50%; background:#1f9d6b; box-shadow:0 0 0 3px rgba(31,157,107,0.18); }
.hero h2{
  font-family:"Sora",sans-serif;
  font-size:34px; line-height:1.08; font-weight:800; letter-spacing:-0.02em;
  margin:14px 0 8px;
  color:var(--ink);
  text-shadow:0 1px 0 rgba(255,255,255,0.6);
}
.hero h2 .accent{
  background:linear-gradient(92deg,#e0489c 0%,#7b5cff 38%,#2aa9d6 70%,#1f9d6b 100%);
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.hero p{ margin:0; max-width:46ch; color:var(--ink-soft); font-size:14px; line-height:1.55; }

.hero-glance{
  display:grid; grid-template-columns:1fr 1fr; gap:12px;
  min-width:0;
}
.glance-plate{
  background:var(--plate-frost);
  -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.85);
  border-radius:16px;
  padding:14px 15px;
  min-width:0;
  box-shadow:0 10px 26px -20px rgba(58,42,88,0.5);
}
.glance-plate .lbl{ font-size:11.5px; color:var(--ink-soft); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.glance-plate .big{ font-family:"Sora",sans-serif; font-weight:800; font-size:24px; letter-spacing:-0.02em; margin-top:4px; color:var(--ink); }
.glance-plate .sub{ font-size:11.5px; margin-top:3px; }

/* ============================ KPI GRID =================================== */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:22px;
}
.kpi{
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:var(--shadow);
  padding:18px;
  min-width:0;
  display:flex; flex-direction:column; gap:12px;
}
.kpi-head{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.kpi-ico{
  width:38px; height:38px; border-radius:12px; flex:0 0 auto;
  background:rgba(255,255,255,0.82);
  -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,0.85);
  display:grid; place-items:center;
  box-shadow:0 8px 18px -12px rgba(58,42,88,0.5);
}
.kpi-tag{
  font-size:11px; font-weight:700; font-family:"Sora",sans-serif;
  color:var(--ink); background:rgba(255,255,255,0.72);
  border:1px solid rgba(255,255,255,0.8);
  padding:4px 9px; border-radius:999px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:58%;
}
/* the legible plate: numbers always go HERE, on frost over foil */
.kpi-plate{
  background:var(--plate-frost);
  -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:16px;
  padding:13px 15px;
  box-shadow:0 12px 30px -22px rgba(58,42,88,0.55), 0 1px 0 rgba(255,255,255,0.9) inset;
  min-width:0;
}
.kpi-label{ font-size:12px; color:var(--ink-soft); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.kpi-value{
  font-family:"Sora",sans-serif;
  font-size:30px; font-weight:800; letter-spacing:-0.025em;
  color:var(--ink); line-height:1.05; margin-top:4px;
  display:flex; align-items:baseline; gap:5px; flex-wrap:wrap;
}
.kpi-value .unit{ font-size:14px; font-weight:600; color:var(--ink-soft); }
.kpi-delta{ display:inline-flex; align-items:center; gap:5px; font-size:12.5px; font-weight:700; font-family:"Sora",sans-serif; margin-top:7px; }
.kpi-delta.up{ color:var(--pos); }
.kpi-delta.down{ color:var(--neg); }
.kpi-delta .arrow{ font-size:13px; line-height:1; }
.kpi-delta .vs{ color:var(--ink-soft); font-weight:500; }
.spark{ display:block; width:100%; height:30px; margin-top:10px; opacity:0.95; }

/* ============================ MID GRID =================================== */
.mid-grid{
  display:grid;
  grid-template-columns:1.55fr 1fr;
  gap:18px;
  margin-bottom:22px;
}
.panel{
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:var(--shadow);
  padding:20px 22px;
  min-width:0;
}
.panel-inner{
  /* opaque chart plate: the trend lines and donut read against solid white,
     not a translucent tint over the rainbow */
  background:rgba(255,255,255,0.97);
  -webkit-backdrop-filter:blur(14px); backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:16px;
  padding:16px 16px 8px;
  min-width:0;
}
.panel-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
.panel-title{ font-family:"Sora",sans-serif; font-weight:800; font-size:16.5px; letter-spacing:-0.01em; margin:0; color:var(--ink); }
.panel-sub{ font-size:12.5px; color:var(--ink-soft); margin:3px 0 0; }
.legend{ display:flex; gap:14px; flex-wrap:wrap; }
.legend span{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; color:var(--ink-soft); white-space:nowrap; }
.legend i{ width:11px; height:11px; border-radius:4px; display:inline-block; flex:0 0 auto; }

/* trend chart svg sits inside frosted panel-inner so its strokes stay crisp */
.chart-svg{ display:block; width:100%; height:auto; }
.chart-xaxis{ display:flex; justify-content:space-between; padding:8px 2px 4px; }
.chart-xaxis span{ font-size:11px; color:var(--ink-soft); font-weight:600; }

/* donut */
.donut-wrap{ display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
.donut-svg{ width:148px; height:148px; flex:0 0 auto; }
.donut-center-plate{ }
.donut-legend{ display:flex; flex-direction:column; gap:10px; min-width:0; flex:1 1 140px; }
.dl-row{ display:flex; align-items:center; gap:10px; min-width:0; }
.dl-row .sw{ width:13px; height:13px; border-radius:5px; flex:0 0 auto; }
.dl-row .nm{ font-size:13px; font-weight:600; color:var(--ink); min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dl-row .vl{ margin-left:auto; font-family:"Sora",sans-serif; font-weight:800; font-size:14px; color:var(--ink); flex:0 0 auto; }
.dl-row .pc{ font-size:11.5px; color:var(--ink-soft); font-weight:600; flex:0 0 auto; }

/* ============================ HANDOFF LIST ============================== */
.handoff{
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:var(--shadow);
  padding:20px 22px;
}
.handoff-list{ display:flex; flex-direction:column; gap:10px; margin-top:6px; }
.row{
  display:grid;
  grid-template-columns:auto 1.6fr 1fr auto;
  align-items:center;
  gap:14px;
  background:rgba(255,255,255,0.96);
  -webkit-backdrop-filter:blur(12px); backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.9);
  border-radius:14px;
  padding:13px 15px;
  min-width:0;
  box-shadow:0 10px 24px -20px rgba(58,42,88,0.5);
  transition:transform .14s ease, box-shadow .14s ease;
}
.row:hover{ transform:translateY(-1px); box-shadow:0 16px 30px -22px rgba(58,42,88,0.6); }
.row .chan{
  width:34px; height:34px; border-radius:10px; flex:0 0 auto;
  display:grid; place-items:center; font-size:13px; font-weight:800; font-family:"Sora",sans-serif; color:#fff;
}
.row .chan.voice{ background:linear-gradient(135deg,#7b5cff,#b06cff); }
.row .chan.line{ background:linear-gradient(135deg,#19c37d,#3ad6a0); }
.row .who{ min-width:0; }
.row .who .nm{ font-weight:700; font-size:14px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row .who .meta{ font-size:12px; color:var(--ink-soft); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row .reason{ min-width:0; font-size:13px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.row .badge{
  justify-self:end; white-space:nowrap; flex:0 0 auto;
  font-size:11.5px; font-weight:700; font-family:"Sora",sans-serif;
  padding:5px 11px; border-radius:999px;
}
.badge.hot{ background:rgba(214,72,106,0.14); color:#b32f55; border:1px solid rgba(214,72,106,0.28); }
.badge.warn{ background:rgba(214,150,40,0.16); color:#9a6c11; border:1px solid rgba(214,150,40,0.3); }
.badge.new{ background:rgba(80,110,230,0.14); color:#3b53c4; border:1px solid rgba(80,110,230,0.28); }

.foot{ margin-top:26px; text-align:center; font-size:12px; color:var(--ink-soft); }

/* ============================ RESPONSIVE ================================ */
@media (max-width:1080px){
  .kpi-grid{ grid-template-columns:repeat(2,1fr); }
  .hero{ grid-template-columns:1fr; }
  .mid-grid{ grid-template-columns:1fr; }
}
@media (max-width:640px){
  .wrap{ padding:18px 15px 44px; }
  .hero{ padding:20px; }
  .hero h2{ font-size:26px; }
  .hero-glance{ grid-template-columns:1fr 1fr; }
  .kpi-grid{ grid-template-columns:1fr; gap:14px; }
  .kpi-value{ font-size:27px; }
  .row{ grid-template-columns:auto 1fr auto; }
  .row .reason{ display:none; }       /* keep the phone row crisp, not cramped */
  .donut-svg{ width:130px; height:130px; }
  .topbar{ gap:12px; }
  .range-pills{ width:100%; }
}
@media (max-width:380px){
  .hero-glance{ grid-template-columns:1fr; }
}

/* ============================ REDUCED MOTION ============================ */
@media (prefers-reduced-motion:reduce){
  .foil::before{ animation:none !important; background-position:35% 0% !important; opacity:0.55; }
  *,*::before,*::after{ animation:none !important; transition:none !important; }
}
</style>
</head>

      { chan:"voice", who:"คุณ พิมพ์ชนก", meta:"081-xxx-4420 - 11:42", reason:"ขอเลื่อนนัดผ่าฟันคุด ด่วน", badge:"ด่วน", badgeType:"hot" },
      { chan:"line",  who:"คุณ ธนกร",     meta:"LINE - 10:18",          reason:"ถามราคาจัดฟันใส แพ็กเกจ", badge:"รอเสนอราคา", badgeType:"warn" },
      { chan:"voice", who:"คุณ อรุณี",    meta:"062-xxx-7781 - 09:55",  reason:"ปวดหลังรากฟันเทียม 2 วัน", badge:"ด่วน", badgeType:"hot" },
      { chan:"line",  who:"คุณ วีรภัทร",  meta:"LINE - 09:30",          reason:"คนไข้ใหม่ ขอนัดตรวจสุขภาพฟัน", badge:"ลูกค้าใหม่", badgeType:"new" },
      { chan:"voice", who:"คุณ สุชาดา",   meta:"089-xxx-1102 - 08:47",  reason:"สอบถามสิทธิประกันสังคม", badge:"รอเสนอราคา", badgeType:"warn" }
    ]
  }
};
</script>

<div class="wrap" id="app"></div>

<script>
/* =========================================================================
   RENDER  --  builds the holographic-foil dashboard from DATA.
   Sparklines, the trend chart, and the donut are inline SVG with literal hex
   (no var()). Numbers always land inside a frosted .plate element.
   ========================================================================= */
const $ = (h)=>{const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;};
const esc = (s)=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));

const ICONS = {
  phone:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5a3fd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
  calendar:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0a9e72" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="3"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
  baht:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c2417f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v18M9 4h4.5a3.5 3.5 0 0 1 0 7H9m0 0h5a3.5 3.5 0 0 1 0 7H9M7 7h2M7 18h2"/></svg>',
  alert:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#c45a2a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>'
};

/* ---- sparkline: tiny area+line, holographic stroke gradient ------------- */
let sparkUID = 0;
function sparkline(vals, tone){
  const w=160,h=30,p=2;
  const min=Math.min(...vals),max=Math.max(...vals),span=(max-min)||1;
  const pts=vals.map((v,i)=>{
    const x=p+(i/(vals.length-1))*(w-2*p);
    const y=h-p-((v-min)/span)*(h-2*p);
    return [x,y];
  });
  const line=pts.map((pt,i)=>(i?"L":"M")+pt[0].toFixed(1)+" "+pt[1].toFixed(1)).join(" ");
  const area=line+` L ${(w-p).toFixed(1)} ${h} L ${p} ${h} Z`;
  const id="sp"+(sparkUID++);
  const stops = tone==="down-good"
    ? '<stop offset="0" stop-color="#19c37d"/><stop offset="1" stop-color="#3ad6cf"/>'
    : '<stop offset="0" stop-color="#7b5cff"/><stop offset="0.5" stop-color="#e0489c"/><stop offset="1" stop-color="#2aa9d6"/>';
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
    <defs>
      <linearGradient id="${id}" x1="0" y1="0" x2="1" y2="0">${stops}</linearGradient>
      <linearGradient id="${id}f" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#7b5cff" stop-opacity="0.22"/>
        <stop offset="1" stop-color="#7b5cff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#${id}f)"/>
    <path d="${line}" fill="none" stroke="url(#${id})" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

/* ---- delta chip --------------------------------------------------------- */
function deltaChip(delta, note, tone){
  const positive = delta >= 0;
  // "down-good" = a metric where down is good (missed calls). Color it as positive.
  const good = (tone==="up") || (tone==="down-good" && delta < 0);
  const cls = good ? "up" : "down";
  const arrow = positive ? "&#9650;" : "&#9660;";
  const num = (positive?"+":"") + delta.toFixed(1) + "%";
  return `<div class="kpi-delta ${cls}"><span class="arrow">${arrow}</span><span>${num}</span><span class="vs">${esc(note)}</span></div>`;
}

/* ---- trend chart: two shimmering lines on a frosted plate --------------- */
function trendChart(t){
  const W=640,H=240,padL=8,padR=8,padT=14,padB=10;
  const all=[...t.calls,...t.bookings];
  const max=Math.max(...all)*1.08, min=0, span=(max-min)||1;
  const N=t.calls.length;
  const xOf=(i)=>padL+(i/(N-1))*(W-padL-padR);
  const yOf=(v)=>padT+(1-(v-min)/span)*(H-padT-padB);
  const toPath=(arr)=>arr.map((v,i)=>(i?"L":"M")+xOf(i).toFixed(1)+" "+yOf(v).toFixed(1)).join(" ");
  const lineC=toPath(t.calls), lineB=toPath(t.bookings);
  const areaC=lineC+` L ${xOf(N-1).toFixed(1)} ${H-padB} L ${xOf(0).toFixed(1)} ${H-padB} Z`;
  // gridlines (darker so the chart frame reads on the opaque plate)
  let grid="";
  for(let g=0; g<=4; g++){
    const y=(padT+(g/4)*(H-padT-padB)).toFixed(1);
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="#2a2735" stroke-opacity="0.13" stroke-width="1"/>`;
  }
  // last-point dots + their end values (legible against the plate)
  const cx=xOf(N-1).toFixed(1), cyC=yOf(t.calls[N-1]).toFixed(1), cyB=yOf(t.bookings[N-1]).toFixed(1);
  const endC=t.calls[N-1], endB=t.bookings[N-1];
  const lblC=Math.max(parseFloat(cyC)-12, padT+10).toFixed(1);
  const lblB=Math.min(parseFloat(cyB)+22, H-padB-6).toFixed(1);
  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="แนวโน้มสายเข้าและการจอง 30 วันล่าสุด">
    <defs>
      <linearGradient id="gCalls" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#5b34d6"/><stop offset="0.5" stop-color="#b81f6e"/><stop offset="1" stop-color="#0d6fa6"/>
      </linearGradient>
      <linearGradient id="gBook" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#067a55"/><stop offset="1" stop-color="#0a937a"/>
      </linearGradient>
      <linearGradient id="gCallsFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#7b5cff" stop-opacity="0.16"/>
        <stop offset="1" stop-color="#7b5cff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${grid}
    <path d="${areaC}" fill="url(#gCallsFill)"/>
    <path d="${lineC}" fill="none" stroke="url(#gCalls)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${lineB}" fill="none" stroke="url(#gBook)" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="1 0"/>
    <circle cx="${cx}" cy="${cyC}" r="4.6" fill="#ffffff" stroke="#5b34d6" stroke-width="2.8"/>
    <circle cx="${cx}" cy="${cyB}" r="4.6" fill="#ffffff" stroke="#067a55" stroke-width="2.8"/>
    <text x="${(W-padR).toFixed(1)}" y="${lblC}" text-anchor="end" font-family="Sora,sans-serif" font-weight="800" font-size="14" fill="#3a1f8f">${endC}</text>
    <text x="${(W-padR).toFixed(1)}" y="${lblB}" text-anchor="end" font-family="Sora,sans-serif" font-weight="800" font-size="14" fill="#0a6b4c">${endB}</text>
  </svg>`;
}

/* ---- iridescent donut --------------------------------------------------- */
function donut(ch){
  const size=148, r=58, cx=size/2, cy=size/2, C=2*Math.PI*r, sw=20;
  const total=ch.segments.reduce((a,s)=>a+s.value,0);
  let off=0, arcs="";
  ch.segments.forEach((s,i)=>{
    const frac=s.value/total;
    const len=frac*C;
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}"
      stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}"
      stroke-linecap="butt" transform="rotate(-90 ${cx} ${cy})"/>`;
    off+=len;
  });
  return `<svg class="donut-svg" viewBox="0 0 ${size} ${size}" role="img" aria-label="สัดส่วนช่องทาง">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#2a2735" stroke-opacity="0.06" stroke-width="${sw}"/>
    ${arcs}
    <circle cx="${cx}" cy="${cy}" r="${r-sw/2-3}" fill="#ffffff"/>
    <text x="${cx}" y="${cy-3}" text-anchor="middle" font-family="Sora,sans-serif" font-weight="800" font-size="22" fill="#2a2735">${esc(ch.total)}</text>
    <text x="${cx}" y="${cy+15}" text-anchor="middle" font-family="'IBM Plex Sans Thai',sans-serif" font-size="10.5" fill="#5a5468">บทสนทนา</text>
  </svg>`;
}

/* ============================== ASSEMBLE ================================= */
function render(){
  const app=document.getElementById("app");
  const D=DATA;

  /* topbar */
  const topbar=$(`<div class="topbar">
    <div class="brand">
      <div class="brand-badge"><img src="${esc(D.brand.logo)}" alt="" loading="lazy"/><span class="ring"></span></div>
      <div class="brand-text">
        <h1>${esc(D.brand.name)}</h1>
        <p>${esc(D.brand.clinic)}</p>
      </div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="range-pills" role="tablist" aria-label="ช่วงเวลา">
      ${D.ranges.map(r=>`<button class="pill${r===D.activeRange?" active":""}" role="tab" aria-selected="${r===D.activeRange}">${esc(r)}</button>`).join("")}
    </div>
  </div>`);
  app.appendChild(topbar);

  /* hero (foil) */
  const hero=$(`<section class="hero foil" aria-label="สรุปภาพรวม">
    <div class="hero-copy">
      <span class="hero-eyebrow"><span class="dot"></span>${esc(D.hero.eyebrow)}</span>
      <h2>${esc(D.hero.titlePre)} <span class="accent">${esc(D.hero.titleAccent)}</span></h2>
      <p>${esc(D.hero.blurb)}</p>
    </div>
    <div class="hero-glance">
      ${D.hero.glance.map(g=>`
        <div class="glance-plate">
          <div class="lbl">${esc(g.lbl)}</div>
          <div class="big">${esc(g.val)}</div>
          <div class="sub" style="color:${g.tone==="pos"?"#1f9d6b":"#5a5468"}">${esc(g.sub)}</div>
        </div>`).join("")}
    </div>
  </section>`);
  app.appendChild(hero);

  /* KPI grid (each card = foil + frosted number plate) */
  const grid=$(`<section class="kpi-grid" aria-label="ตัวชี้วัดหลัก"></section>`);
  D.kpis.forEach(k=>{
    const card=$(`<article class="kpi foil" tabindex="0">
      <div class="kpi-head">
        <div class="kpi-ico">${ICONS[k.icon]||""}</div>
        <span class="kpi-tag">${esc(k.label)}</span>
      </div>
      <div class="kpi-plate">
        <div class="kpi-label">${esc(k.label)}</div>
        <div class="kpi-value">${esc(k.value)}${k.unit?`<span class="unit">${esc(k.unit)}</span>`:""}</div>
        ${deltaChip(k.delta,k.deltaNote,k.tone)}
        ${sparkline(k.spark,k.tone)}
      </div>
    </article>`);
    grid.appendChild(card);
  });
  app.appendChild(grid);

  /* mid grid: trend chart + donut */
  const mid=$(`<section class="mid-grid">
    <div class="panel foil">
      <div class="panel-inner">
        <div class="panel-head">
          <div>
            <h3 class="panel-title">${esc(D.trend.title)}</h3>
            <p class="panel-sub">${esc(D.trend.sub)}</p>
          </div>
          <div class="legend">
            <span><i style="background:linear-gradient(90deg,#5b34d6,#b81f6e)"></i>สายเข้า</span>
            <span><i style="background:linear-gradient(90deg,#067a55,#0a937a)"></i>จองนัด</span>
          </div>
        </div>
        ${trendChart(D.trend)}
        <div class="chart-xaxis">${D.trend.xlabels.map(l=>`<span>${esc(l)}</span>`).join("")}</div>
      </div>
    </div>
    <div class="panel foil">
      <div class="panel-inner">
        <div class="panel-head">
          <div>
            <h3 class="panel-title">${esc(D.channels.title)}</h3>
            <p class="panel-sub">${esc(D.channels.sub)}</p>
          </div>
        </div>
        <div class="donut-wrap">
          ${donut(D.channels)}
          <div class="donut-legend">
            ${(()=>{const tot=D.channels.segments.reduce((a,s)=>a+s.value,0);
              return D.channels.segments.map(s=>`
                <div class="dl-row">
                  <span class="sw" style="background:${s.color}"></span>
                  <span class="nm">${esc(s.name)}</span>
                  <span class="vl">${s.value.toLocaleString("th-TH")}</span>
                  <span class="pc">${Math.round(s.value/tot*100)}%</span>
                </div>`).join("");})()}
          </div>
        </div>
      </div>
    </div>
  </section>`);
  app.appendChild(mid);

  /* handoff list */
  const ho=$(`<section class="handoff foil" aria-label="${esc(D.handoff.title)}">
    <div class="panel-head" style="margin-bottom:8px">
      <div>
        <h3 class="panel-title">${esc(D.handoff.title)}</h3>
        <p class="panel-sub">${esc(D.handoff.sub)}</p>
      </div>
    </div>
    <div class="handoff-list">
      ${D.handoff.rows.map(r=>`
        <div class="row" tabindex="0">
          <span class="chan ${r.chan}">${r.chan==="voice"?"&#9742;":"L"}</span>
          <div class="who">
            <div class="nm">${esc(r.who)}</div>
            <div class="meta">${esc(r.meta)}</div>
          </div>
          <div class="reason">${esc(r.reason)}</div>
          <span class="badge ${r.badgeType}">${esc(r.badge)}</span>
        </div>`).join("")}
    </div>
  </section>`);
  app.appendChild(ho);

  app.appendChild($(`<div class="foot">Yimwhan AI - ภาพรวมเรียลไทม์ อัปเดตอัตโนมัติทุก 5 นาที</div>`));

  /* range pill toggle (cosmetic, no data fetch) */
  app.querySelectorAll(".range-pills .pill").forEach(p=>{
    p.addEventListener("click",()=>{
      app.querySelectorAll(".range-pills .pill").forEach(x=>{x.classList.remove("active");x.setAttribute("aria-selected","false");});
      p.classList.add("active"); p.setAttribute("aria-selected","true");
    });
  });
}
render();
</script>
</body>
