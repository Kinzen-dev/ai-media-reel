<!-- TEMPLATE: Atelier Canvas | ARCHETYPE: infinite-canvas (pan/zoom spatial board) | REF: figma.com, tldraw.com, milanote.com | WHEN TO USE: showcase a body of work as an explorable spatial mood board, not a linear page | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Atelier Canvas - infinite workspace</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230a0a0c'/%3E%3Crect x='9' y='9' width='14' height='14' rx='4' fill='%23ff5c38'/%3E%3C/svg%3E" />
<meta name="theme-color" content="#0a0a0c" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   SWAP CONTENT IN THE JS `DATA` ARRAY NEAR THE TOP OF <script>.
   Each node = {id,type,x,y,w,title,tag,note,...}. Connectors
   live in the LINKS array. Everything else is engine + style.
   ============================================================ */
:root{
  --bg:#0a0a0c;
  --bg-2:#0d0d11;
  --ink:#f4f4f6;
  --ink-dim:#9a9aa6;
  --ink-faint:#5a5a66;
  --line:#1c1c22;
  --line-2:#26262e;
  --accent:#ff5c38;          /* the ONE accent */
  --accent-soft:rgba(255,92,56,.16);
  --accent-line:rgba(255,92,56,.55);
  --sticky:#f7d54a;
  --card:#121217;
  --card-2:#15151b;
  --shadow:0 10px 40px -12px rgba(0,0,0,.8), 0 2px 8px -2px rgba(0,0,0,.6);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:"Inter",system-ui,sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  touch-action:none;
}
.mono{font-family:"JetBrains Mono",ui-monospace,monospace}

/* ---- the world viewport (clips the canvas) ---- */
#stage{
  position:fixed;
  inset:0;
  overflow:hidden;
  cursor:grab;
  /* near-black with a faint dot grid; grid is fixed-screen so it never blurs */
  background-color:var(--bg);
  background-image:
    radial-gradient(circle at 50% 50%, rgba(255,92,56,.05), transparent 60%),
    radial-gradient(rgba(255,255,255,.05) 1.1px, transparent 1.1px);
  background-size:auto, 26px 26px;
  background-position:center, var(--gx,0) var(--gy,0);
}
#stage.grabbing{cursor:grabbing}
#stage:focus-visible{outline:none}

/* the single transformed layer: only translate/scale this */
#canvas{
  position:absolute;
  top:0;left:0;
  width:0;height:0;
  transform-origin:0 0;
  will-change:transform;
}

/* connectors sit behind everything, drawn in world space */
#wires{
  position:absolute;
  top:0;left:0;
  overflow:visible;
  pointer-events:none;
}
#wires path{fill:none;stroke:var(--line-2);stroke-width:1.4;}
#wires path.hot{stroke:var(--accent-line);stroke-width:1.8;}
#wires circle{fill:var(--bg);stroke:var(--line-2);stroke-width:1.4;}
#wires circle.hot{stroke:var(--accent-line);}

/* ---- nodes ---- */
.node{
  position:absolute;
  border-radius:var(--r);
  background:var(--card);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease;
  contain:layout style;
}
.node:hover{border-color:var(--line-2)}
.node.lit{
  border-color:var(--accent);
  box-shadow:0 0 0 1px var(--accent), 0 18px 60px -16px rgba(255,92,56,.45), var(--shadow);
}
.node:focus-visible{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent)}
.node .media{
  position:relative;
  width:100%;
  display:block;
  background:#000;
  overflow:hidden;
}
.node .media img,.node .media video{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
}
.node .meta{
  padding:11px 13px 12px;
  border-top:1px solid var(--line);
  background:linear-gradient(180deg,var(--card-2),var(--card));
}
.node .ttl{
  font-family:"Space Grotesk",sans-serif;
  font-weight:600;
  font-size:14px;
  letter-spacing:-.01em;
  line-height:1.2;
  color:var(--ink);
  display:flex;align-items:center;gap:7px;
}
.node .ttl .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex:0 0 auto}
.node .sub{
  margin-top:4px;
  font-size:11.5px;
  color:var(--ink-dim);
  line-height:1.35;
}
.node .tag{
  position:absolute;top:9px;left:9px;z-index:3;
  font-family:"JetBrains Mono",monospace;
  font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink);
  background:rgba(8,8,10,.62);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.1);
  padding:3px 7px;border-radius:6px;
}
/* play affordance for video nodes */
.node .play{
  position:absolute;inset:0;z-index:2;
  display:grid;place-items:center;
  pointer-events:none;
  transition:opacity .2s;
}
.node .play b{
  width:46px;height:46px;border-radius:50%;
  background:rgba(255,92,56,.92);
  display:grid;place-items:center;
  box-shadow:0 6px 22px -4px rgba(255,92,56,.6);
}
.node .play b::after{content:"";border-style:solid;border-width:8px 0 8px 13px;border-color:transparent transparent transparent #0a0a0c;margin-left:3px}
.node.playing .play{opacity:0}
.node .live{
  position:absolute;top:9px;right:9px;z-index:3;display:none;
  align-items:center;gap:5px;
  font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.08em;
  color:#fff;background:rgba(255,92,56,.9);padding:2px 7px;border-radius:6px;
}
.node.playing .live{display:flex}
.node .live i{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.1s infinite}
@keyframes blink{50%{opacity:.25}}

/* sticky label nodes (mood-board annotations) */
.sticky{
  position:absolute;
  background:var(--sticky);
  color:#1a1505;
  border-radius:3px;
  padding:14px 15px 15px;
  box-shadow:0 14px 34px -10px rgba(0,0,0,.7);
  transform:rotate(var(--rot,-2deg));
  font-family:"Space Grotesk",sans-serif;
  border:none;
}
.sticky::before{
  content:"";position:absolute;top:-9px;left:50%;transform:translateX(-50%);
  width:34px;height:16px;background:rgba(255,255,255,.34);
  border-radius:2px;box-shadow:0 2px 4px rgba(0,0,0,.3);
}
.sticky .k{font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;opacity:.55;display:block;margin-bottom:6px}
.sticky .v{font-size:15px;font-weight:600;line-height:1.35}

/* free-text headings that live on the board */
.legend{
  position:absolute;
  color:var(--ink);
  pointer-events:none;
  user-select:none;
}
.legend h2{font-family:"Space Grotesk",sans-serif;font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1}
.legend p{margin-top:9px;font-size:13px;color:var(--ink-dim);max-width:300px;line-height:1.5}
.legend .rule{margin-top:13px;width:54px;height:2px;background:var(--accent)}

/* 3D viewer node */
#three-canvas{width:100%;height:100%;display:block}

/* ======================= CHROME / HUD ======================= */
.hud{position:fixed;z-index:50;pointer-events:none}
.hud *{pointer-events:auto}

/* top-left brand */
#brand{top:18px;left:18px}
#brand .name{
  font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:16px;letter-spacing:-.01em;
  display:flex;align-items:center;gap:9px;color:var(--ink);
}
#brand .mark{width:13px;height:13px;border-radius:4px;background:var(--accent);box-shadow:0 0 14px var(--accent-soft);transform:rotate(12deg)}
#brand .meta{margin-top:5px;font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--ink-faint);letter-spacing:.04em}

/* top-right cluster pills */
#clusters{
  top:18px;right:18px;display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;max-width:62vw;
}
.cpill{
  font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:.03em;
  color:var(--ink-dim);
  background:rgba(18,18,23,.78);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid var(--line-2);
  padding:7px 11px;border-radius:999px;cursor:pointer;
  transition:.16s; white-space:nowrap;
}
.cpill:hover{color:var(--ink);border-color:var(--ink-faint)}
.cpill.active{color:#0a0a0c;background:var(--accent);border-color:var(--accent);font-weight:600}
.cpill i{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle}
.cpill.active i{background:#0a0a0c}

/* bottom-left zoom controls */
#zoomdock{
  bottom:20px;left:18px;display:flex;align-items:center;gap:8px;
  background:rgba(15,15,19,.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--line-2);border-radius:12px;padding:6px;
}
#zoomdock button{
  width:34px;height:34px;border-radius:8px;border:1px solid transparent;
  background:transparent;color:var(--ink-dim);cursor:pointer;
  display:grid;place-items:center;transition:.14s;font-size:16px;
}
#zoomdock button:hover{background:var(--card-2);color:var(--ink)}
#zoomdock button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
#zoomdock .pct{
  font-family:"JetBrains Mono",monospace;font-size:12px;color:var(--ink);
  min-width:48px;text-align:center;cursor:pointer;
}
#zoomdock .fit{
  width:auto;padding:0 12px;gap:7px;color:var(--ink);font-family:"JetBrains Mono",monospace;
  font-size:11px;letter-spacing:.03em;border-left:1px solid var(--line);border-radius:0 8px 8px 0;margin-left:2px;
}
#zoomdock .fit:hover{color:var(--accent)}
#zoomdock .div{width:1px;height:20px;background:var(--line)}

/* bottom-right minimap */
#minimap{
  bottom:20px;right:18px;
  width:184px;height:124px;
  background:rgba(11,11,14,.86);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--line-2);border-radius:12px;
  overflow:hidden;cursor:pointer;
  box-shadow:0 12px 40px -14px rgba(0,0,0,.8);
}
#minimap svg{display:block;width:100%;height:100%}
#minimap .mm-node{fill:var(--ink-faint)}
#minimap .mm-node.cam{fill:var(--accent)}
#minimap .mm-view{fill:rgba(255,92,56,.1);stroke:var(--accent);stroke-width:1.4}
#minimap .mm-cap{
  position:absolute;top:6px;left:9px;font-family:"JetBrains Mono",monospace;
  font-size:8.5px;letter-spacing:.08em;color:var(--ink-faint);text-transform:uppercase;pointer-events:none;
}

/* helper hint, fades out */
#hint{
  bottom:64px;left:50%;transform:translateX(-50%);
  font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-dim);
  background:rgba(15,15,19,.8);border:1px solid var(--line-2);border-radius:999px;
  padding:7px 15px;transition:opacity .6s; pointer-events:none;
}
#hint b{color:var(--accent)}

/* detail panel (slides in when a node is locked) */
#panel{
  position:fixed;z-index:60;top:0;right:0;height:100%;width:360px;max-width:88vw;
  background:linear-gradient(180deg,var(--bg-2),var(--bg));
  border-left:1px solid var(--line-2);
  transform:translateX(102%);transition:transform .34s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;
  box-shadow:-20px 0 60px -20px rgba(0,0,0,.7);
}
#panel.open{transform:translateX(0)}
#panel .ph{padding:20px 20px 14px;border-bottom:1px solid var(--line);position:relative}
#panel .pk{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
#panel h3{font-family:"Space Grotesk",sans-serif;font-size:21px;font-weight:700;margin-top:7px;letter-spacing:-.01em}
#panel .pclose{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:transparent;color:var(--ink-dim);cursor:pointer;font-size:15px}
#panel .pclose:hover{color:var(--ink);border-color:var(--ink-faint)}
#panel .pbody{padding:18px 20px;overflow:auto;flex:1}
#panel .pbody p{font-size:13.5px;color:var(--ink-dim);line-height:1.6;margin-bottom:14px}
#panel .specs{display:grid;grid-template-columns:auto 1fr;gap:9px 14px;margin-top:6px}
#panel .specs dt{font-family:"JetBrains Mono",monospace;font-size:10.5px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em}
#panel .specs dd{font-size:12.5px;color:var(--ink)}
#panel .pmedia{margin-bottom:16px;border-radius:10px;overflow:hidden;border:1px solid var(--line);aspect-ratio:16/9;background:#000}
#panel .pmedia img,#panel .pmedia video{width:100%;height:100%;object-fit:cover;display:block}
#panel audio{width:100%;margin-top:10px}

/* reduced-motion + mobile */
@media (prefers-reduced-motion:reduce){
  *{transition:none !important;animation:none !important;scroll-behavior:auto}
}
@media (max-width:640px){
  #clusters{max-width:none;left:14px;right:14px;top:auto;bottom:166px;justify-content:flex-start;overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  #minimap{width:128px;height:88px;bottom:14px;right:14px}
  #zoomdock{bottom:14px;left:14px}
  #brand{top:14px;left:14px}
  #panel{width:100%;max-width:100%}
  #hint{bottom:118px;font-size:10px}
  #zoomdock .fit b{display:none}
  /* on phones the panel is full-width: letterbox panel media so a landscape
     clip is never cover-cropped (show the whole frame on a black bed) */
  #panel .pmedia{aspect-ratio:16/9;background:#000}
  #panel .pmedia img,#panel .pmedia video{object-fit:contain}
}
.sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}
</style>
<!-- importmap so the GLTFLoader example module can resolve its bare `three` import (3D node only; everything else works without it) -->
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
} }
</script>
</head>
<body>

<!-- ================= STAGE (clips) > CANVAS (transforms) ================= -->
<main id="stage" tabindex="0" aria-label="Infinite canvas workspace. Drag to pan, scroll or pinch to zoom.">
  <div id="canvas">
    <svg id="wires" aria-hidden="true"></svg>
    <!-- nodes injected here -->
  </div>
</main>

<!-- ================= HUD ================= -->
<div id="brand" class="hud">
  <div class="name"><span class="mark"></span>ATELIER / CANVAS</div>
  <div class="meta">spatial archive - 15 works</div>
</div>

<div id="clusters" class="hud" role="tablist" aria-label="Jump to cluster"></div>

<div id="zoomdock" class="hud" role="group" aria-label="Zoom controls">
  <button id="zout" aria-label="Zoom out">&minus;</button>
  <div class="pct mono" id="zpct" role="button" tabindex="0" aria-label="Reset zoom to 100 percent">100%</div>
  <button id="zin" aria-label="Zoom in">&plus;</button>
  <span class="div"></span>
  <button class="fit" id="zfit" aria-label="Zoom to fit all works"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4.5V1h3.5M9.5 1H13v3.5M13 9.5V13H9.5M4.5 13H1V9.5"/></svg><b>FIT</b></button>
</div>

<div id="minimap" class="hud" role="button" tabindex="0" aria-label="Minimap. Click to recenter the view.">
  <span class="mm-cap">MAP</span>
  <svg id="mmsvg" preserveAspectRatio="xMidYMid meet"></svg>
</div>

<div id="hint" class="hud">drag to pan &nbsp;&middot;&nbsp; scroll to zoom &nbsp;&middot;&nbsp; click a <b>cluster</b> to fly</div>

<!-- detail panel -->
<aside id="panel" aria-hidden="true" aria-label="Work detail">
  <div class="ph">
    <button class="pclose" id="pclose" aria-label="Close detail">&times;</button>
    <div class="pk" id="pk">WORK</div>
    <h3 id="ph3">Title</h3>
  </div>
  <div class="pbody" id="pbody"></div>
</aside>

<script type="module">
/* ============================================================================
   DATA  -  EDIT HERE TO SWAP THE WHOLE BOARD
   ----------------------------------------------------------------------------
   Coordinates are in WORLD units (px). Lay works out spatially in clusters.
   type: "image" | "video" | "audio" | "three" | "sticky" | "legend"
   For media nodes give an aspect (w/h) so the engine sizes the media box.
   media   : path to the asset
   poster  : video poster (also the minimap colour swatch source)
   cluster : id used by the cluster pills + cluster-zoom
   ============================================================================ */
const A = "../assets/";
const DATA = [
  // ---- legend / free text on the board ----
  { id:"hdr", type:"legend", x:-220, y:-300, title:"The studio,\nlaid out flat.",
    note:"Every render, clip, voice and mesh we shipped this cycle, pinned where it lives. Pan around. Nothing is a page.", w:320 },

  // ===================== CLUSTER: STILLS =====================
  { id:"car",    type:"image", cluster:"stills", x:120,  y:80,  w:430, aspect:16/9,
    media:A+"flux-car-4k.png", tag:"FLUX - 4K", title:"Nightfall Coupe",
    sub:"Matte-black Mercedes, wet neon street", k:"Hero still",
    note:"Cinematic key frame generated at 2048x1152. Used as the launch hero plate and the i2v seed for the motion study one node over.",
    specs:{Model:"FLUX.1 dev",Res:"2048 x 1152",Seed:"art-direction",Use:"Hero + i2v seed"} },

  { id:"clinic", type:"image", cluster:"stills", x:600,  y:300, w:360, aspect:16/9,
    media:A+"flux-clinic-4k.png", tag:"FLUX - 4K", title:"Mint & Wood Clinic",
    sub:"Interior concept, warm dental space",
    note:"Environment concept for a healthcare brand. Mint, oak and soft daylight, rendered clean enough to drop straight into a deck.",
    specs:{Model:"FLUX.1 dev",Res:"2048 x 1152",Mood:"calm / clinical"} },

  { id:"fox",    type:"image", cluster:"stills", x:-260, y:200, w:248, aspect:1,
    media:A+"sdxl.png", tag:"SDXL", title:"Autumn Fox",
    sub:"Painterly character study",
    note:"SDXL painterly pass. Loose brush energy, kept square for sticker / avatar crops.",
    specs:{Model:"SDXL 1.0",Style:"painterly",Res:"512 x 512"} },

  { id:"apple",  type:"image", cluster:"stills", x:40,  y:430, w:210, aspect:1,
    media:A+"hf-tinysd.png", tag:"TINY-SD", title:"Low-fi Apple",
    sub:"Abstract, tiny-model sketch",
    note:"Deliberately rough. A speed test from a tiny distilled model, kept on the board as a texture reference.",
    specs:{Model:"Tiny-SD",Intent:"speed test",Res:"512 x 512"} },

  // ===================== CLUSTER: MOTION =====================
  { id:"carmo",  type:"video", cluster:"motion", x:560, y:-180, w:430, aspect:16/9,
    media:A+"flux-car-i2v.mp4", poster:A+"gen/poster-flux-car-i2v.png",
    tag:"i2v - silent", title:"Coupe in Motion",
    sub:"The hero still, animated",
    note:"Image-to-video off the Nightfall Coupe plate. Slow parallax push, looped seamlessly. Lock the node to play it.",
    specs:{Pipe:"image-to-video",Seed:"car still",Audio:"none",Loop:"yes"} },

  { id:"kling",  type:"video", cluster:"motion", x:1060, y:-40, w:430, aspect:16/9,
    media:A+"kling-video.mp4", poster:A+"gen/poster-kling-video.png",
    tag:"KLING - silent", title:"Kling Study",
    sub:"Camera-rich generative clip",
    note:"Kling text-to-video. Strong camera language and coherent motion across the full loop.",
    specs:{Model:"Kling",Type:"text-to-video",Audio:"none"} },

  { id:"fal",    type:"video", cluster:"motion", x:1080, y:420, w:380, aspect:16/9,
    media:A+"fal-video.mp4", poster:A+"gen/poster-fal-video.png",
    tag:"FAL - silent", title:"Fal Loop",
    sub:"Short generative loop",
    note:"Fast turnaround loop from the fal pipeline. Good for background plates and texture beds.",
    specs:{Pipe:"fal",Audio:"none",Loop:"yes"} },

  { id:"hyper",  type:"video", cluster:"motion", x:1520, y:220, w:380, aspect:16/9,
    media:A+"hyperframes.mp4", poster:A+"gen/poster-hyperframes.png",
    tag:"HYPERFRAMES", title:"Hyperframes",
    sub:"Frame-interpolated motion",
    note:"Interpolation-heavy study. Smooth in-betweens stretched from a sparse keyframe set.",
    specs:{Tech:"frame interp",Audio:"none"} },

  // ===================== CLUSTER: AVATARS =====================
  { id:"heygen", type:"video", cluster:"avatars", x:-540, y:-120, w:380, aspect:16/9,
    media:A+"heygen-avatar.mp4", poster:A+"gen/poster-heygen.png",
    tag:"HEYGEN - audio", title:"HeyGen Presenter",
    sub:"Lip-synced talking avatar",
    note:"Synthetic presenter with voice. Lock to play with sound. Useful for explainer intros and localized variants.",
    specs:{Model:"HeyGen",Audio:"voiced",Use:"explainer"} },

  { id:"veo",    type:"video", cluster:"avatars", x:-560, y:340, w:400, aspect:16/9,
    media:A+"veo-video.mp4", poster:A+"gen/poster-veo-video.png",
    tag:"VEO - audio", title:"Veo Scene",
    sub:"High-fidelity scene with sound",

/* ============================================================================
   ENGINE  (no need to edit below to swap content)
   ============================================================================ */
const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const stage  = document.getElementById("stage");
const canvas = document.getElementById("canvas");
const wires  = document.getElementById("wires");
const mmsvg  = document.getElementById("mmsvg");

const nodeEls = new Map(); // id -> { el, d, box }
let lockedId = null;

/* ---------- build nodes ---------- */
function aspectH(w,a){ return Math.round(w / a); }

for(const d of DATA){
  let el;
  if(d.type === "sticky"){
    el = document.createElement("div");
    el.className = "sticky node-ghost";
    el.style.setProperty("--rot", (d.rot||0)+"deg");
    el.innerHTML = `<span class="k">${d.k}</span><div class="v">${d.v}</div>`;
    el.style.width = d.w + "px";
  } else if(d.type === "legend"){
    el = document.createElement("div");
    el.className = "legend";
    const [t1,t2] = (d.title||"").split("\n");
    el.innerHTML = `<h2>${t1||""}${t2?"<br>"+t2:""}</h2><p>${d.note||""}</p><div class="rule"></div>`;
    el.style.width = d.w + "px";
  } else {
    el = document.createElement("article");
    el.className = "node";
    el.tabIndex = 0;
    el.setAttribute("role","button");
    el.setAttribute("aria-label", (d.title||"work") + ". " + (d.sub||""));
    el.style.width = d.w + "px";

    let mediaH;
    if(d.type === "audio"){
      mediaH = Math.round(d.w * 0.30);
      el.innerHTML = `
        <div class="media" style="height:${mediaH}px;background:#0e0e13">
          <span class="tag">${d.tag||""}</span>
          <img src="${d.wave}" alt="" loading="lazy" style="object-fit:cover;opacity:.92"/>
          <div class="play"><b></b></div>
          <div class="live"><i></i>PLAYING</div>
          <audio preload="none" src="${d.media}" loop></audio>
        </div>
        <div class="meta"><div class="ttl"><span class="dot"></span>${d.title}</div><div class="sub">${d.sub||""}</div></div>`;
    } else if(d.type === "three"){
      mediaH = aspectH(d.w, d.aspect||1);
      el.innerHTML = `
        <div class="media" data-three="1" style="height:${mediaH}px;background:#08080b">
          <span class="tag">${d.tag||""}</span>
          <img class="three-fallback" src="${d.poster}" alt="" loading="lazy"/>
          <canvas id="three-canvas" style="display:none"></canvas>
        </div>
        <div class="meta"><div class="ttl"><span class="dot"></span>${d.title}</div><div class="sub">${d.sub||""}</div></div>`;
    } else if(d.type === "video"){
      mediaH = aspectH(d.w, d.aspect||16/9);
      el.innerHTML = `
        <div class="media" style="height:${mediaH}px">
          <span class="tag">${d.tag||""}</span>
          <img src="${d.poster}" alt="${d.title}" loading="lazy"/>
          <video preload="none" playsinline loop ${/audio/i.test(d.tag||"")?"":"muted"} poster="${d.poster}" style="position:absolute;inset:0;opacity:0;transition:opacity .25s"></video>
          <div class="play"><b></b></div>
          <div class="live"><i></i>LIVE</div>
        </div>
        <div class="meta"><div class="ttl"><span class="dot"></span>${d.title}</div><div class="sub">${d.sub||""}</div></div>`;
    } else { // image
      mediaH = aspectH(d.w, d.aspect||16/9);
      el.innerHTML = `
        <div class="media" style="height:${mediaH}px">
          <span class="tag">${d.tag||""}</span>
          <img src="${d.media}" alt="${d.title}" loading="lazy"/>
        </div>
        <div class="meta"><div class="ttl"><span class="dot"></span>${d.title}</div><div class="sub">${d.sub||""}</div></div>`;
    }
  }
  el.style.left = d.x + "px";
  el.style.top  = d.y + "px";
  canvas.appendChild(el);
  nodeEls.set(d.id, { el, d });

  // interactions for real work nodes
  if(d.type !== "sticky" && d.type !== "legend"){
    const onActivate = (e)=>{ if(e) e.stopPropagation(); lockNode(d.id); };
    el.addEventListener("click", onActivate);
    el.addEventListener("keydown",(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); onActivate(e);} });
  }
}

/* measure node bounding boxes in world space (after layout) */
function measure(){
  for(const [id,o] of nodeEls){
    o.box = { x:o.d.x, y:o.d.y, w:o.el.offsetWidth, h:o.el.offsetHeight };
  }
}
measure();

/* ---------- world bounds (for fit + minimap) ---------- */
function worldBounds(filter){
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  for(const [id,o] of nodeEls){
    if(filter && !filter(o.d)) continue;
    const b=o.box; if(!b) continue;
    x0=Math.min(x0,b.x); y0=Math.min(y0,b.y);
    x1=Math.max(x1,b.x+b.w); y1=Math.max(y1,b.y+b.h);
  }
  if(x0===Infinity) return {x:0,y:0,w:1000,h:1000};
  return { x:x0, y:y0, w:x1-x0, h:y1-y0 };
}

/* ============================================================================
   CAMERA  -  the only thing we transform is #canvas (translate + scale)
   ============================================================================ */
const cam = { x:0, y:0, s:1 };       // current
const tgt = { x:0, y:0, s:1 };       // animation target
const MIN_S = 0.18, MAX_S = 2.6;
let animating = false;

function applyTransform(){
  canvas.style.transform = `translate3d(${cam.x}px,${cam.y}px,0) scale(${cam.s})`;
  // dot grid lives on the fixed stage; scroll + scale it to feel attached to the world
  const gs = 26 * cam.s;
  stage.style.backgroundSize = `auto, ${gs}px ${gs}px`;
  stage.style.setProperty("--gx", (cam.x % gs) + "px");
  stage.style.setProperty("--gy", (cam.y % gs) + "px");
  document.getElementById("zpct").textContent = Math.round(cam.s*100)+"%";
  drawMinimapView();
}

/* clamp pan so the board never drifts entirely off-screen */
function clampTarget(){
  tgt.s = Math.max(MIN_S, Math.min(MAX_S, tgt.s));
}

function setCamInstant(x,y,s){
  tgt.x=x; tgt.y=y; tgt.s=s; clampTarget();
  cam.x=tgt.x; cam.y=tgt.y; cam.s=tgt.s;
  applyTransform();
}

/* smooth spring toward target */
function tick(){
  const k = REDUCED ? 1 : 0.16;
  const dx=tgt.x-cam.x, dy=tgt.y-cam.y, ds=tgt.s-cam.s;
  if(Math.abs(dx)<0.06 && Math.abs(dy)<0.06 && Math.abs(ds)<0.0004){
    cam.x=tgt.x; cam.y=tgt.y; cam.s=tgt.s; applyTransform(); animating=false; return;
  }
  cam.x+=dx*k; cam.y+=dy*k; cam.s+=ds*k;
  applyTransform();
  requestAnimationFrame(tick);
}
function startAnim(){ if(!animating){ animating=true; requestAnimationFrame(tick);} }

/* fit a world rect into the viewport with padding */
function fitTo(b, pad=90){
  const vw=window.innerWidth, vh=window.innerHeight;
  const mob = window.innerWidth<=640;
  const padX = mob ? 22 : pad;
  const padTop = mob ? 74 : 92, padBot = mob ? 158 : 120;
  const availW=vw-padX*2, availH=vh-padTop-padBot;
  const s=Math.max(MIN_S, Math.min(MAX_S, Math.min(availW/b.w, availH/b.h)));
  const cx=b.x+b.w/2, cy=b.y+b.h/2;
  tgt.s=s;
  tgt.x=vw/2 - cx*s;
  tgt.y=(padTop + availH/2) - cy*s;
  clampTarget();
  if(REDUCED){ setCamInstant(tgt.x,tgt.y,tgt.s); } else startAnim();
}

/* center on a single node, gentle zoom-in */
function focusNode(id){
  const o=nodeEls.get(id); if(!o||!o.box) return;
  const b=o.box;
  fitTo({x:b.x-40,y:b.y-40,w:b.w+80,h:b.h+80}, 90);
}

/* ============================================================================
   PAN + ZOOM input
   ============================================================================ */
let dragging=false, moved=false, sx=0, sy=0, ox=0, oy=0;

stage.addEventListener("pointerdown",(e)=>{
  if(e.target.closest("#panel")) return;
  dragging=true; moved=false;
  sx=e.clientX; sy=e.clientY; ox=cam.x; oy=cam.y;
  tgt.x=cam.x; tgt.y=cam.y; tgt.s=cam.s; // stop any running anim
  stage.classList.add("grabbing");
  stage.setPointerCapture(e.pointerId);
});
stage.addEventListener("pointermove",(e)=>{
  if(!dragging) return;
  const dx=e.clientX-sx, dy=e.clientY-sy;
  if(Math.abs(dx)+Math.abs(dy)>4) moved=true;
  cam.x=ox+dx; cam.y=oy+dy;
  tgt.x=cam.x; tgt.y=cam.y;
  applyTransform();
});
function endDrag(e){
  if(!dragging) return;
  dragging=false; stage.classList.remove("grabbing");
  try{ stage.releasePointerCapture(e.pointerId);}catch(_){}
}
stage.addEventListener("pointerup",endDrag);
stage.addEventListener("pointercancel",endDrag);

/* click on empty canvas closes the locked node */
stage.addEventListener("click",(e)=>{
  if(moved) return;
  if(e.target===stage || e.target===canvas || e.target===wires){ unlock(); }
});

/* wheel zoom anchored at cursor */
stage.addEventListener("wheel",(e)=>{
  e.preventDefault();
  const rect=stage.getBoundingClientRect();
  const px=e.clientX-rect.left, py=e.clientY-rect.top;
  const factor=Math.exp(-e.deltaY*0.0016);
  zoomAt(px,py,cam.s*factor);
},{passive:false});

function zoomAt(px,py,newS){
  newS=Math.max(MIN_S,Math.min(MAX_S,newS));
  // world point under cursor stays fixed
  const wx=(px-cam.x)/cam.s, wy=(py-cam.y)/cam.s;
  cam.s=newS;
  cam.x=px-wx*cam.s;
  cam.y=py-wy*cam.s;
  tgt.x=cam.x; tgt.y=cam.y; tgt.s=cam.s;
  applyTransform();
  hideHint();
}

/* buttons */
function zoomStep(mult){
  const px=window.innerWidth/2, py=window.innerHeight/2;
  zoomAt(px,py,cam.s*mult);
}
document.getElementById("zin").onclick =()=>zoomStep(1.3);
document.getElementById("zout").onclick=()=>zoomStep(1/1.3);
document.getElementById("zfit").onclick=()=>{ setActivePill("all"); fitTo(worldBounds(),100); hideHint(); };
const zpct=document.getElementById("zpct");
zpct.onclick=()=>{ const px=innerWidth/2,py=innerHeight/2; zoomAt(px,py,1); };
zpct.onkeydown=(e)=>{ if(e.key==="Enter"||e.key===" "){e.preventDefault(); zpct.onclick();} };

/* ============================================================================
   PINCH (touch) zoom + two-finger pan
   ============================================================================ */
const touches=new Map();
let pinch=null;
stage.addEventListener("pointerdown",(e)=>{ if(e.pointerType==="touch") touches.set(e.pointerId,{x:e.clientX,y:e.clientY}); });
stage.addEventListener("pointermove",(e)=>{
  if(e.pointerType!=="touch") return;
  if(!touches.has(e.pointerId)) return;
  touches.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(touches.size===2){
    dragging=false; stage.classList.remove("grabbing");
    const [a,b]=[...touches.values()];
    const dist=Math.hypot(a.x-b.x,a.y-b.y);
    const mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};
    const rect=stage.getBoundingClientRect();
    const mx=mid.x-rect.left, my=mid.y-rect.top;
    if(pinch){
      const wx=(pinch.mx-cam.x)/cam.s, wy=(pinch.my-cam.y)/cam.s;
      const ns=Math.max(MIN_S,Math.min(MAX_S, cam.s*(dist/pinch.dist)));
      cam.s=ns;
      cam.x=mx-wx*cam.s + (mx-pinch.mx);
      cam.y=my-wy*cam.s + (my-pinch.my);
      tgt.x=cam.x; tgt.y=cam.y; tgt.s=cam.s;
      applyTransform();
    }
    pinch={dist,mx,my};
    hideHint();
  }
});
function dropTouch(e){ if(e.pointerType==="touch"){ touches.delete(e.pointerId); if(touches.size<2) pinch=null; } }
stage.addEventListener("pointerup",dropTouch);
stage.addEventListener("pointercancel",dropTouch);

/* ============================================================================
   CONNECTORS  -  drawn in world space (inside #canvas), curved between nodes
   ============================================================================ */
function anchor(id){
  const o=nodeEls.get(id); if(!o||!o.box) return null;
  const b=o.box; return { cx:b.x+b.w/2, cy:b.y+b.h/2, w:b.w, h:b.h, b };
}
function drawWires(){
  let svg="";
  for(const [from,to,hot] of LINKS){
    const a=anchor(from), c=anchor(to); if(!a||!c) continue;
    // pick edge midpoints facing each other
    const dx=c.cx-a.cx, dy=c.cy-a.cy;
    const horiz=Math.abs(dx)>Math.abs(dy);
    let x1,y1,x2,y2;
    if(horiz){
      x1=a.cx+Math.sign(dx)*a.w/2; y1=a.cy;
      x2=c.cx-Math.sign(dx)*c.w/2; y2=c.cy;
    } else {
      x1=a.cx; y1=a.cy+Math.sign(dy)*a.h/2;
      x2=c.cx; y2=c.cy-Math.sign(dy)*c.h/2;
    }
    const mx=(x1+x2)/2, my=(y1+y2)/2;
    const cls=hot?"hot":"";
    const cx1=horiz?mx:x1, cy1=horiz?y1:my;
    const cx2=horiz?mx:x2, cy2=horiz?y2:my;
    svg+=`<path class="${cls}" d="M${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}"/>`;
    svg+=`<circle class="${cls}" cx="${x1}" cy="${y1}" r="3.2"/><circle class="${cls}" cx="${x2}" cy="${y2}" r="3.2"/>`;
  }
  wires.innerHTML=svg;
  // size the svg generously to cover the world
  const wb=worldBounds();
  wires.setAttribute("width", wb.x+wb.w+400);
  wires.setAttribute("height", wb.y+wb.h+400);
  wires.style.left="0"; wires.style.top="0";
}

/* ============================================================================
   MINIMAP  -  static node dots + a live viewport rect
   ============================================================================ */
let mmBox=null;
function buildMinimap(){
  const pad=40;
  const wb=worldBounds();
  mmBox={ x:wb.x-pad, y:wb.y-pad, w:wb.w+pad*2, h:wb.h+pad*2 };
  mmsvg.setAttribute("viewBox", `${mmBox.x} ${mmBox.y} ${mmBox.w} ${mmBox.h}`);
  let s="";
  for(const [id,o] of nodeEls){
    if(o.d.type==="legend") continue;
    const b=o.box; if(!b) continue;
    const cls = (o.d.type==="sticky") ? "" : "mm-node";
    const fill = o.d.type==="sticky" ? 'fill="#f7d54a"' : "";
    const r = o.d.type==="sticky" ? 7 : 0;
    if(o.d.type==="sticky"){
      s+=`<rect x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" rx="6" ${fill} opacity=".8"/>`;
    } else {
      s+=`<rect class="mm-node" x="${b.x}" y="${b.y}" width="${b.w}" height="${b.h}" rx="8"/>`;
    }
  }
  s+=`<rect id="mm-view" class="mm-view" x="0" y="0" width="10" height="10" rx="3"/>`;
  mmsvg.innerHTML=s;
}
function drawMinimapView(){
  const v=document.getElementById("mm-view"); if(!v) return;
  // world rect currently visible
  const vw=window.innerWidth, vh=window.innerHeight;
  const x=(-cam.x)/cam.s, y=(-cam.y)/cam.s, w=vw/cam.s, h=vh/cam.s;
  v.setAttribute("x",x); v.setAttribute("y",y);
  v.setAttribute("width",w); v.setAttribute("height",h);
}
/* click minimap to recenter */
const minimap=document.getElementById("minimap");
function minimapTo(e){
  if(!mmBox) return;
  const r=mmsvg.getBoundingClientRect();
  const fx=(e.clientX-r.left)/r.width, fy=(e.clientY-r.top)/r.height;
  const wx=mmBox.x+fx*mmBox.w, wy=mmBox.y+fy*mmBox.h;
  tgt.s=cam.s;
  tgt.x=window.innerWidth/2 - wx*cam.s;
  tgt.y=window.innerHeight/2 - wy*cam.s;
  if(REDUCED) setCamInstant(tgt.x,tgt.y,tgt.s); else startAnim();
}
minimap.addEventListener("click",minimapTo);
minimap.addEventListener("keydown",(e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); fitTo(worldBounds(),100);} });

/* ============================================================================
   CLUSTER PILLS  -  cluster zoom
   ============================================================================ */
const clEl=document.getElementById("clusters");
CLUSTERS.forEach(c=>{
  const b=document.createElement("button");
  b.className="cpill"+(c.id==="all"?" active":"");
  b.setAttribute("role","tab");
  b.dataset.cluster=c.id;
  b.innerHTML = (c.id==="all"?"":'<i></i>')+c.label;
  b.onclick=()=>{
    setActivePill(c.id);
    if(c.id==="all") fitTo(worldBounds(),100);
    else fitTo(worldBounds(d=>d.cluster===c.id), 110);
    hideHint();
  };
  clEl.appendChild(b);
});
function setActivePill(id){
  clEl.querySelectorAll(".cpill").forEach(p=>p.classList.toggle("active",p.dataset.cluster===id));
}

/* ============================================================================
   LOCK / FOCUS a node  -  plays its video (only one at a time), opens panel
   ============================================================================ */
const panel=document.getElementById("panel");
const pbody=document.getElementById("pbody");

function stopAllMedia(except){
  for(const [id,o] of nodeEls){
    if(id===except) continue;
    const v=o.el.querySelector?.("video");
    const au=o.el.querySelector?.("audio");
    if(v){ v.pause(); v.style.opacity=0; o.el.classList.remove("playing"); }
    if(au){ au.pause(); o.el.classList.remove("playing"); }
  }
}

function lockNode(id){
  const o=nodeEls.get(id); if(!o) return;
  const d=o.d;
  lockedId=id;
  // light up the node + its wires
  for(const [k,v] of nodeEls) v.el.classList?.remove("lit");
  o.el.classList.add("lit");
  highlightWires(id);
  stopAllMedia(id);

  // play the focused media only
  const v=o.el.querySelector("video");
  if(v){
    if(!v.src) v.src=d.media;
    v.style.opacity=1;
    o.el.classList.add("playing");
    v.play().catch(()=>{});
  }
  const au=o.el.querySelector("audio");
  if(au){ o.el.classList.add("playing"); au.play().catch(()=>{}); }

  if(d.type==="three") initThree(o);

  openPanel(d);
  focusNode(id);
  hideHint();
}

function unlock(){
  lockedId=null;
  for(const [k,v] of nodeEls) v.el.classList?.remove("lit");
  highlightWires(null);
  stopAllMedia(null);
  closePanel();
}

function highlightWires(id){
  drawWires();
  if(!id) return;
  // re-mark wires touching this node as hot
  const paths=wires.querySelectorAll("path");
  let i=0;
  for(const [from,to,hot] of LINKS){
    const p=wires.children[i*3];
    const c1=wires.children[i*3+1], c2=wires.children[i*3+2];
    if(from===id||to===id){ p?.classList.add("hot"); c1?.classList.add("hot"); c2?.classList.add("hot"); }
    i++;
  }
}

function openPanel(d){
  const pk=document.getElementById("pk"), ph3=document.getElementById("ph3");
  pk.textContent=(d.k|| (d.cluster||"work")).toUpperCase();
  ph3.textContent=d.title;
  let media="";
  if(d.type==="image"){
    media=`<div class="pmedia" style="aspect-ratio:${(d.aspect||16/9)}"><img src="${d.media}" alt="${d.title}"/></div>`;
  } else if(d.type==="video"){
    // silent clips already loop live on the card (single decode); panel shows the poster.
    // voiced clips get a controls player here so the viewer can hear them on demand.
    media = /audio/i.test(d.tag||"")
      ? `<div class="pmedia"><video src="${d.media}" poster="${d.poster}" controls loop playsinline preload="none"></video></div>`
      : `<div class="pmedia"><img src="${d.poster}" alt="${d.title}"/></div>`;
  } else if(d.type==="audio"){
    media=`<div class="pmedia" style="aspect-ratio:auto;height:88px;background:#0e0e13"><img src="${d.wave}" alt="" style="object-fit:cover"/></div>
           <audio controls src="${d.media}"></audio>`;
  } else if(d.type==="three"){
    media=`<div class="pmedia" style="aspect-ratio:1"><img src="${d.poster}" alt="${d.title}"/></div>`;
  }
  let specs="";
  if(d.specs){
    specs="<dl class='specs'>";
    for(const [kk,vv] of Object.entries(d.specs)) specs+=`<dt>${kk}</dt><dd>${vv}</dd>`;
    specs+="</dl>";
  }
  pbody.innerHTML=`${media}<p>${d.note||""}</p>${specs}`;
  panel.classList.add("open");
  panel.setAttribute("aria-hidden","false");
}
function closePanel(){
  panel.classList.remove("open");
  panel.setAttribute("aria-hidden","true");
  pbody.querySelectorAll("video,audio").forEach(m=>m.pause&&m.pause());
}
document.getElementById("pclose").onclick=unlock;
document.addEventListener("keydown",(e)=>{ if(e.key==="Escape") unlock(); });

/* ============================================================================
   3D  -  three.js loaded lazily only when a mesh node is locked
   ============================================================================ */
let threeReady=false;
async function initThree(o){
  if(REDUCED) return; // honor reduced motion: keep the static thumbnail
  const wrap=o.el.querySelector('[data-three]');
  if(!wrap || wrap.dataset.live) return;
  wrap.dataset.live="1";
  try{
    const THREE = await import("three");
    const { GLTFLoader } = await import("three/addons/loaders/GLTFLoader.js");
    const cvs=wrap.querySelector("canvas");
    const fb=wrap.querySelector(".three-fallback");
    const W=wrap.clientWidth, H=wrap.clientHeight;
    const renderer=new THREE.WebGLRenderer({canvas:cvs, antialias:true, alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2)); // cap DPR at 2
    renderer.setSize(W,H,false);
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(40,W/H,0.1,100);
    camera.position.set(0,0.4,3.2);
    scene.add(new THREE.AmbientLight(0xffffff,0.85));
    const key=new THREE.DirectionalLight(0xff7a52,1.1); key.position.set(2,3,2); scene.add(key);
    const rim=new THREE.DirectionalLight(0x88aaff,0.6); rim.position.set(-2,1,-2); scene.add(rim);

    const loader=new GLTFLoader();
    loader.load(o.d.media, (gltf)=>{
      const model=gltf.scene;
      const box=new THREE.Box3().setFromObject(model);
      const size=box.getSize(new THREE.Vector3()).length();
      const center=box.getCenter(new THREE.Vector3());
      model.position.sub(center);
      const scl=1.8/size; model.scale.setScalar(scl);
      scene.add(model);
      cvs.style.display="block"; if(fb) fb.style.opacity=0;
      let drag=false, lx=0, rotY=0, rotX=0.1, auto=true;
      cvs.style.cursor="grab";
      cvs.addEventListener("pointerdown",(e)=>{drag=true;auto=false;lx=e.clientX;e.stopPropagation();cvs.style.cursor="grabbing";});
      window.addEventListener("pointermove",(e)=>{ if(!drag) return; rotY+=(e.clientX-lx)*0.01; lx=e.clientX; });
      window.addEventListener("pointerup",()=>{drag=false;cvs.style.cursor="grab";});
      function loop(){
        if(auto) rotY+=0.005;
        model.rotation.y=rotY; model.rotation.x=rotX;
        renderer.render(scene,camera);
        requestAnimationFrame(loop);
      }
      loop();
    }, undefined, ()=>{ /* on error keep poster */ });
    threeReady=true;
  }catch(err){ /* WebGL/import failed: poster stays, fully usable */ }
}

/* ============================================================================
   HINT auto-dismiss
   ============================================================================ */
let hintGone=false;
function hideHint(){ if(hintGone) return; hintGone=true; const h=document.getElementById("hint"); h.style.opacity=0; setTimeout(()=>h.remove(),700); }
setTimeout(hideHint, 5200);

/* ============================================================================
   RESIZE + BOOT
   ============================================================================ */
function relayout(){ measure(); drawWires(); buildMinimap(); drawMinimapView(); }
let rt;
window.addEventListener("resize",()=>{ clearTimeout(rt); rt=setTimeout(()=>{ relayout(); applyTransform(); }, 120); });

/* wait for fonts so measurement is correct, then build wires/map and fit */
function boot(){
  relayout();
  // open on a fitted overview of the whole board
  fitTo(worldBounds(), window.innerWidth<=640?40:110);
  applyTransform();
}
if(document.fonts && document.fonts.ready){
  document.fonts.ready.then(()=>{ relayout(); boot(); });
}
window.addEventListener("load",()=>{ relayout(); boot(); });
boot();

/* keyboard panning for accessibility */
stage.addEventListener("keydown",(e)=>{
  const step=80;
  let used=true;
  if(e.key==="ArrowLeft"){ tgt.x=cam.x+step; }
  else if(e.key==="ArrowRight"){ tgt.x=cam.x-step; }
  else if(e.key==="ArrowUp"){ tgt.y=cam.y+step; }
  else if(e.key==="ArrowDown"){ tgt.y=cam.y-step; }
  else if(e.key==="+"||e.key==="="){ zoomStep(1.3); used=false; }
  else if(e.key==="-"){ zoomStep(1/1.3); used=false; }
  else if(e.key==="0"){ fitTo(worldBounds(),100); used=false; }
  else used=false;
  if(used){ e.preventDefault(); if(REDUCED) setCamInstant(tgt.x,tgt.y,tgt.s); else startAnim(); }
});
