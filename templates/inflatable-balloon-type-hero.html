<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inflatable Balloon Type Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* =================================================================
     INFLATABLE BALLOON TYPE HERO
     Every letter is inline SVG, filled with a radialGradient "belly"
     (light source top-left) + a white specular oval near the top-left.
     Reads as 3D inflated type with zero real 3D transforms.
     ================================================================= */

  :root {
    --ground: #fbf7ff;          /* clean pastel ground */
    --ground-2: #f1ecff;
    --ink: #2b2150;             /* deep lilac ink for text */
    --ink-soft: #6a5e9c;
    --pink: #ff7fb6;
    --blue: #6fb7ff;
    --mint: #74e0c0;
    --lilac: #b79bff;
    --tape: rgba(183, 155, 255, 0.55);
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(1200px 700px at 18% -8%, #ffe9f5 0%, rgba(255,233,245,0) 55%),
      radial-gradient(1100px 650px at 100% 0%, #e4f2ff 0%, rgba(228,242,255,0) 55%),
      radial-gradient(900px 600px at 50% 120%, #e6fff6 0%, rgba(230,255,246,0) 60%),
      linear-gradient(180deg, var(--ground) 0%, var(--ground-2) 100%);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* floating soft balloons in the backdrop */
  .bg-orbs { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(2px);
    opacity: 0.55;
    animation: drift 14s ease-in-out infinite;
  }
  .orb::after {
    content: "";
    position: absolute;
    top: 14%; left: 16%;
    width: 34%; height: 26%;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    filter: blur(3px);
  }
  .orb.o1 { width: 150px; height: 150px; left: 6%;  top: 60%; background: radial-gradient(circle at 32% 28%, #ffd2e9, #ff9bc6); animation-delay: 0s; }
  .orb.o2 { width: 90px;  height: 90px;  left: 84%; top: 22%; background: radial-gradient(circle at 32% 28%, #d4ecff, #8fc4ff); animation-delay: 2.4s; }
  .orb.o3 { width: 120px; height: 120px; left: 78%; top: 70%; background: radial-gradient(circle at 32% 28%, #c9fff0, #79e3c5); animation-delay: 4.1s; }
  .orb.o4 { width: 70px;  height: 70px;  left: 14%; top: 16%; background: radial-gradient(circle at 32% 28%, #e7dbff, #b79bff); animation-delay: 1.2s; }

  @keyframes drift {
    0%,100% { transform: translateY(0) translateX(0); }
    50%     { transform: translateY(-26px) translateX(10px); }
  }

  /* ---------- layout ---------- */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1180px;
    margin: 0 auto;
    padding: 26px 28px 70px;
  }

  /* compact top band: brand + tagline + cta, sits ABOVE the wordmark */
  .topband {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    flex-wrap: wrap;
    padding: 8px 4px 18px;
  }
  .brand {
    display: flex; align-items: center; gap: 11px;
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 20px;
    color: var(--ink); letter-spacing: 0.2px;
  }
  .brand .dot {
    width: 30px; height: 30px; border-radius: 50%;
    background: radial-gradient(circle at 34% 28%, #fff 0%, #ff9bc6 30%, #ff6aa9 100%);
    box-shadow: 0 6px 14px rgba(255,106,169,0.4), inset -3px -4px 8px rgba(180,40,100,0.35);
  }
  .nav { display: flex; align-items: center; gap: 22px; }
  .nav a {
    color: var(--ink-soft); text-decoration: none; font-weight: 500; font-size: 14px;
    border-radius: 999px; padding: 4px 6px;
  }
  .nav a:hover { color: var(--ink); }
  .cta {
    font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 14px;
    color: #fff; text-decoration: none;
    padding: 11px 20px; border-radius: 999px;
    background: linear-gradient(135deg, #ff8cc0 0%, #b79bff 55%, #6fb7ff 100%);
    box-shadow: 0 10px 22px rgba(150,110,255,0.36), inset 0 2px 3px rgba(255,255,255,0.6);
  }
  .cta:hover { filter: brightness(1.05); }

  /* ---------- the wordmark stage (the SIGNATURE, at scroll=0) ---------- */
  .heroline { text-align: center; }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft);
    background: rgba(255,255,255,0.7);
    border: 1px solid rgba(183,155,255,0.4);
    padding: 7px 16px; border-radius: 999px;
    box-shadow: 0 6px 16px rgba(120,90,200,0.12);
    margin-bottom: 8px;
  }
  .eyebrow .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--mint); box-shadow: 0 0 0 3px rgba(116,224,192,0.3); }

  /* the SVG wordmark fills the first viewport */
  .wordmark {
    width: 100%;
    max-width: 1080px;
    margin: 4px auto 0;
    display: block;
    height: auto;
    overflow: visible;
  }

  /* gentle bob applied to each letter group; frozen for reduced-motion */
  .letter { transform-box: fill-box; transform-origin: center; animation: bob 3.6s ease-in-out infinite; will-change: transform; }
  .letter.l0 { animation-delay: 0s; }
  .letter.l1 { animation-delay: 0.18s; }
  .letter.l2 { animation-delay: 0.36s; }
  .letter.l3 { animation-delay: 0.54s; }
  .letter.l4 { animation-delay: 0.72s; }
  .letter.l5 { animation-delay: 0.9s; }
  @keyframes bob {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%     { transform: translateY(-6px) rotate(-0.3deg); }
  }

  .subline {
    max-width: 620px; margin: 10px auto 0;
    color: var(--ink-soft); font-size: 17px; line-height: 1.55;
  }
  .pills { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
  .pill {
    font-size: 13px; font-weight: 600; color: var(--ink);
    background: rgba(255,255,255,0.78);
    border: 1px solid rgba(183,155,255,0.35);
    padding: 8px 15px; border-radius: 999px;
    box-shadow: 0 6px 14px rgba(120,90,200,0.1);
  }

  /* ---------- gallery (the air-filled product cards, below the fold) ---------- */
  .section-h { text-align: center; margin: 80px 0 6px; }
  .section-h h2 {
    font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 30px; margin: 0;
    color: var(--ink);
  }
  .section-h p { color: var(--ink-soft); margin: 8px auto 0; max-width: 540px; font-size: 15px; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 22px;
    margin-top: 30px;
  }
  .card {
    position: relative;
    border-radius: 28px;
    overflow: hidden;
    background: #fff;
    border: 1px solid rgba(183,155,255,0.28);
    box-shadow: 0 18px 38px rgba(120,90,200,0.14), inset 0 2px 0 rgba(255,255,255,0.9);
    transition: transform 0.35s cubic-bezier(.2,.8,.2,1), box-shadow 0.35s;
  }
  .card:hover, .card:focus-within {
    transform: translateY(-6px) scale(1.012);
    box-shadow: 0 26px 52px rgba(120,90,200,0.22), inset 0 2px 0 rgba(255,255,255,0.9);
  }
  .card .media {
    position: relative;
    aspect-ratio: 4 / 3;
    background: #efeaff center/cover no-repeat;
    overflow: hidden;
  }
  .card .media img,
  .card .media video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .card .media video { opacity: 0; transition: opacity 0.4s; }
  .card.playing .media video { opacity: 1; }
  .card .badge {
    position: absolute; top: 12px; left: 12px; z-index: 3;
    font-size: 11px; font-weight: 700; letter-spacing: 0.04em;
    color: #fff; padding: 5px 11px; border-radius: 999px;
    background: rgba(43,33,80,0.6); backdrop-filter: blur(6px);
  }
  .card .play {
    position: absolute; inset: 0; z-index: 3;
    display: grid; place-items: center;
    color: #fff; pointer-events: none;
  }
  .card .play span {
    width: 54px; height: 54px; border-radius: 50%;
    background: rgba(255,255,255,0.85);
    color: var(--ink);
    display: grid; place-items: center; font-size: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    transition: opacity 0.3s, transform 0.3s;
  }
  .card.playing .play span { opacity: 0; transform: scale(0.7); }
  .card .body { padding: 16px 18px 18px; }
  .card .body h3 { font-family: 'Baloo 2', sans-serif; font-weight: 700; margin: 0 0 5px; font-size: 17px; color: var(--ink); }
  .card .body p { margin: 0; font-size: 13.5px; color: var(--ink-soft); line-height: 1.5; }

  /* footer */
  .foot { text-align: center; margin-top: 70px; color: var(--ink-soft); font-size: 13px; }

  /* ---------- focus visibility ---------- */
  a:focus-visible, button:focus-visible, .card:focus-visible {
    outline: 3px solid var(--lilac);
    outline-offset: 3px;
    border-radius: 12px;
  }

  /* =================== MOBILE: keep wordmark dominant, never crop ========= */
  @media (max-width: 860px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 640px) {
    .wrap { padding: 18px 16px 54px; }
    .nav { display: none; }
    .topband { padding-bottom: 12px; }
    .brand { font-size: 18px; }
    .eyebrow { font-size: 11px; padding: 6px 13px; }
    /* wordmark scales with viewport via its SVG viewBox + width:100%;
       letterbox naturally because height is auto. It stays dominant. */
    .subline { font-size: 15px; }
    .section-h h2 { font-size: 24px; }
    .grid { grid-template-columns: 1fr; gap: 18px; }
    .orb.o2, .orb.o3 { display: none; }
  }

  /* =================== REDUCED MOTION: freeze everything =================== */
  @media (prefers-reduced-motion: reduce) {
    .letter, .orb { animation: none !important; }
    .card { transition: none; }
    .card .media video { transition: none; }
  }
</style>
</head>

      { kind: "video", src: "../assets/veo-video.mp4",     poster: "../assets/gen/poster-veo-video.png",     badge: "MOTION", title: "Air Pump Promo",  blurb: "Product spot with that pumped-up bounce." },

<div class="bg-orbs" aria-hidden="true">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="orb o4"></div>

<div class="wrap">

  <!-- compact top band ABOVE the wordmark -->
  <header class="topband">
    <div class="brand"><span class="dot" aria-hidden="true"></span><span id="brand"></span></div>
    <nav class="nav" id="nav" aria-label="Primary"></nav>

  <!-- =============== SIGNATURE: inflated SVG wordmark (scroll=0) =========== -->
  <section class="heroline" aria-label="Hero">
    <span class="eyebrow"><span class="pip" aria-hidden="true"></span><span id="eyebrow"></span></span>
    <!-- SVG is generated by JS so the DATA word drives the letterforms -->
    <svg id="wordmark" class="wordmark" role="img" aria-labelledby="wmTitle"></svg>
    <p class="subline" id="subline"></p>
    <div class="pills" id="pills"></div>

  <!-- =============== gallery (below the fold) =============== -->

    <h2 id="galleryTitle"></h2>

<script>
/* =======================================================================
   1) Build the inflated balloon wordmark as inline SVG.
   Each glyph is drawn as a fat rounded path, filled with a per-letter
   radialGradient (light source top-left) + a white specular oval.
   Glyph paths are hand-tuned chunky letterforms on a 100x130 cell.
   ======================================================================= */

// Chunky inflated glyph paths on a 100 wide x 130 tall cell (y0 top).
// Designed to look swollen/rounded. Covers the letters we need + fallback.
const GLYPHS = {
  P: "M22 12 h34 a28 28 0 0 1 0 56 h-16 v50 a18 18 0 0 1 -36 0 V30 a18 18 0 0 1 18 -18 z m20 30 h-2 v14 h2 a7 7 0 0 0 0 -14 z",
  U: "M20 12 a18 18 0 0 1 18 18 v44 a8 8 0 0 0 16 0 V30 a18 18 0 0 1 36 0 v46 a44 44 0 0 1 -88 0 V30 a18 18 0 0 1 18 -18 z",
  F: "M22 12 h54 a16 16 0 0 1 0 32 h-36 v14 h26 a15 15 0 0 1 0 30 h-26 v22 a18 18 0 0 1 -36 0 V30 a18 18 0 0 1 18 -18 z",
  A: "M50 8 a22 22 0 0 1 21 16 l24 76 a17 17 0 0 1 -33 9 l-1 -3 h-22 l-1 3 a17 17 0 0 1 -33 -9 l24 -76 a22 22 0 0 1 21 -16 z m0 44 l-6 22 h12 z",
  O: "M50 10 a40 58 0 0 1 0 116 a40 58 0 0 1 0 -116 z m0 34 a14 24 0 0 0 0 48 a14 24 0 0 0 0 -48 z",
  I: "M50 12 a18 18 0 0 1 18 18 v68 a18 18 0 0 1 -36 0 V30 a18 18 0 0 1 18 -18 z",
  L: "M22 12 a18 18 0 0 1 18 18 v54 h28 a16 16 0 0 1 0 32 H22 a18 18 0 0 1 -18 -18 V30 a18 18 0 0 1 18 -18 z",
  B: "M22 12 h32 a26 26 0 0 1 18 44 a26 26 0 0 1 -18 44 H22 a18 18 0 0 1 -18 -18 V30 a18 18 0 0 1 18 -18 z m18 26 v18 h6 a9 9 0 0 0 0 -18 z m0 40 v18 h8 a9 9 0 0 0 0 -18 z",
  E: "M22 12 h50 a16 16 0 0 1 0 32 h-32 v9 h24 a15 15 0 0 1 0 30 h-24 v9 h34 a16 16 0 0 1 0 32 H22 a18 18 0 0 1 -18 -18 V30 a18 18 0 0 1 18 -18 z",
  N: "M22 12 a18 18 0 0 1 16 10 l24 44 V30 a18 18 0 0 1 36 0 v68 a18 18 0 0 1 -34 8 l-24 -44 v36 a18 18 0 0 1 -36 0 V30 a18 18 0 0 1 18 -18 z",
  S: "M70 14 a16 16 0 0 1 -8 30 a40 40 0 0 0 -16 -3 c-8 0 -10 5 -2 8 l18 7 a30 30 0 0 1 -8 60 a58 58 0 0 1 -28 -7 a16 16 0 0 1 12 -29 a40 40 0 0 0 18 4 c8 0 9 -6 1 -9 l-17 -7 a29 29 0 0 1 8 -57 a52 52 0 0 1 30 0 z",
  T: "M16 12 h68 a16 16 0 0 1 0 32 h-16 v54 a18 18 0 0 1 -36 0 V44 h-16 a16 16 0 0 1 0 -32 z",
  R: "M22 12 h34 a28 28 0 0 1 14 52 l14 30 a16 16 0 0 1 -29 14 l-13 -28 h-2 v20 a18 18 0 0 1 -36 0 V30 a18 18 0 0 1 18 -18 z m20 30 h-2 v14 h2 a7 7 0 0 0 0 -14 z"
};

function buildWordmark() {
  const word = DATA.word;
  const cellW = 100, cellH = 130;
  const gap = 50; // generous so each puffy letter reads as its own balloon even mid-bob
  const pad = 36; // breathing room so the specular + shadow don't clip
  const n = word.length;
  const totalW = n * cellW + (n - 1) * gap + pad * 2;
  const totalH = cellH + pad * 2 + 14; // extra for ground shadow

  const svg = document.getElementById("wordmark");
  svg.setAttribute("viewBox", `0 0 ${totalW} ${totalH}`);
  svg.setAttribute("aria-label", DATA.word.map(w => w.ch).join("") + " inflated wordmark");

  // ---- defs: per-letter belly gradient + shared specular + soft shadow ----
  let defs = `<defs>`;
  // soft ground/drop shadow filter
  defs += `
    <filter id="softShadow" x="-30%" y="-25%" width="160%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="7" flood-color="#7a5bc8" flood-opacity="0.30"/>
    </filter>
    <radialGradient id="specGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>`;

  word.forEach((w, i) => {
    const [lite, mid, dark] = w.fill;
    // belly: light source upper-left -> deepens to lower-right for volume
    defs += `
      <radialGradient id="belly${i}" cx="34%" cy="26%" r="78%">
        <stop offset="0%"  stop-color="${lite}"/>
        <stop offset="42%" stop-color="${mid}"/>
        <stop offset="100%" stop-color="${dark}"/>
      </radialGradient>`;
  });
  defs += `</defs>`;

  // ---- letters ----
  let body = "";
  word.forEach((w, i) => {
    const x = pad + i * (cellW + gap);
    const y = pad;
    const path = GLYPHS[w.ch.toUpperCase()] || GLYPHS.O;
    const cls = "letter l" + (i % 6);

    // Outer group positions the letter (static). Inner group carries the
    // bob animation. They MUST be separate: a CSS `transform` on the
    // animated element overrides any SVG transform attribute, so position
    // and animation cannot live on the same node.
    body += `
      <g transform="translate(${x},${y})">
        <g class="${cls}">
          <!-- the inflated body with soft drop shadow -->
          <path d="${path}" fill="url(#belly${i})" stroke="#ffffff" stroke-width="2.5"
                stroke-opacity="0.55" filter="url(#softShadow)"/>
          <!-- thin inner rim shadow on the lower-right for extra puff -->
          <path d="${path}" fill="none" stroke="#3a2a6e" stroke-opacity="0.10" stroke-width="5"/>
          <!-- big soft specular highlight near top-left -->
          <ellipse cx="34" cy="34" rx="20" ry="13" fill="url(#specGrad)" transform="rotate(-22 34 34)"/>
          <!-- tiny pin-glint -->
          <circle cx="26" cy="28" r="4.5" fill="#ffffff" fill-opacity="0.92"/>
        </g>
      </g>`;
  });

  // ground contact shadow (a single soft pancake under the word)
  const ground = `<ellipse cx="${totalW/2}" cy="${totalH - 6}" rx="${totalW*0.36}" ry="10"
      fill="#7a5bc8" opacity="0.14" filter="url(#softShadow)"/>`;

  svg.innerHTML = `<title id="wmTitle">${DATA.word.map(w=>w.ch).join("")}</title>` + defs + ground + body;
}

/* =======================================================================
   2) Populate text content + nav + pills from DATA.
   ======================================================================= */
function hydrate() {
  document.getElementById("brand").textContent = DATA.brand;
  document.getElementById("eyebrow").textContent = DATA.eyebrow;
  document.getElementById("subline").textContent = DATA.subline;
  document.getElementById("cta").textContent = DATA.cta;
  document.getElementById("galleryTitle").textContent = DATA.galleryTitle;
  document.getElementById("gallerySub").textContent = DATA.gallerySub;

  const nav = document.getElementById("nav");
  nav.innerHTML = DATA.nav.map(n => `<a href="#">${n}</a>`).join("");

  const pills = document.getElementById("pills");
  pills.innerHTML = DATA.pills.map(p => `<span class="pill">${p}</span>`).join("");
}

/* =======================================================================
   3) Gallery cards. Posters by default. Video plays ONLY for the
   focused/hovered card and only while in view (one decode at a time).
   ======================================================================= */
function buildGallery() {
  const grid = document.getElementById("grid");
  grid.innerHTML = DATA.cards.map((c, i) => {
    const mediaInner = c.kind === "video"
      ? `<img src="${c.poster}" alt="${c.title} poster" loading="lazy" decoding="async"/>
         <video muted loop playsinline preload="none" poster="${c.poster}">
           <source src="${c.src}" type="video/mp4"/>
         </video>
         <div class="play" aria-hidden="true"><span>&#9658;</span></div>`
      : `<img src="${c.src}" alt="${c.title}" loading="lazy" decoding="async"/>`;
    return `
      <article class="card" data-i="${i}" data-kind="${c.kind}" tabindex="0"
               aria-label="${c.title}: ${c.blurb}">
        <div class="media">
          <span class="badge">${c.badge}</span>
          ${mediaInner}
        </div>
        <div class="body"><h3>${c.title}</h3><p>${c.blurb}</p></div>
      </article>`;
  }).join("");
}

/* =======================================================================
   4) Performance + accessibility wiring.
   - IntersectionObserver tracks which video cards are on screen.
   - Only ONE video plays at a time (the focused/hovered one) and only
     if it is in view. Reduced-motion: never autoplay.
   ======================================================================= */
function wireMedia() {
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const cards = Array.from(document.querySelectorAll('.card[data-kind="video"]'));
  const inView = new WeakSet();
  let active = null;

  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) inView.add(e.target);
      else { inView.delete(e.target); if (active === e.target) stop(e.target); }
    });
  }, { threshold: 0.4 });
  cards.forEach(c => io.observe(c));

  function play(card) {
    if (reduce || !inView.has(card)) return;
    if (active && active !== card) stop(active);
    const v = card.querySelector("video");
    if (!v) return;
    card.classList.add("playing");
    const p = v.play();
    if (p && p.catch) p.catch(() => {});
    active = card;
  }
  function stop(card) {
    const v = card.querySelector("video");
    if (v) { v.pause(); }
    card.classList.remove("playing");
    if (active === card) active = null;
  }

  cards.forEach(card => {
    card.addEventListener("mouseenter", () => play(card));
    card.addEventListener("mouseleave", () => stop(card));
    card.addEventListener("focus", () => play(card));
    card.addEventListener("blur", () => stop(card));
    // touch / click toggle for phones
    card.addEventListener("click", () => {
      if (card.classList.contains("playing")) stop(card);
      else play(card);
    });
  });
}

/* boot */
buildWordmark();
hydrate();
buildGallery();
wireMedia();
</script>
