<!-- TEMPLATE: Print-Fidelity CV Sheet | ARCHETYPE: CURRICULUM | REF: Swiss CV typography, A4 print-resume conventions, document-replica web pages | WHEN TO USE: a resume/CV that must read as a printed A4 document at a glance, not a profile page | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curriculum Vitae - Print Replica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DATA-DRIVEN PRINT CV. All content lives in the JS DATA array
   near the top of <script>. Styling is print-document fidelity:
   an A4-ratio white sheet on a desk-gray ground.
   ============================================================ */
:root{
  --sheet:#ffffff;
  --desk:#ece9e2;
  --ink:#161616;
  --accent:#2c6fad;
  --muted:#6b6862;
  --hair:#d8d4cb;
  --hair-strong:#bcb7ac;
  --bar-track:#e7e3da;
  /* A4 is 210 x 297 mm => ratio 1 : 1.41428 */
  --sheet-w: min(820px, 94vw);
}
*{box-sizing:border-box;margin:0;padding:0}
html{ -webkit-text-size-adjust:100%; }
body{
  font-family:"IBM Plex Sans",system-ui,sans-serif;
  background:
    radial-gradient(120% 80% at 50% -10%, #f3f0e9 0%, rgba(243,240,233,0) 55%),
    var(--desk);
  color:var(--ink);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  font-feature-settings:"tnum" 1, "lnum" 1;
  line-height:1.45;
  padding: clamp(20px, 5vh, 64px) 0 clamp(40px, 8vh, 96px);
}

/* faint desk grain / vignette so the sheet pops */
body::before{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  background:
    radial-gradient(140% 120% at 50% 30%, rgba(0,0,0,0) 60%, rgba(0,0,0,.10) 100%);
  z-index:0;
}

/* ---------- THE A4 SHEET ---------- */
.sheet-wrap{
  position:relative;
  z-index:1;
  width:var(--sheet-w);
  margin:0 auto;
}
.sheet{
  position:relative;
  width:100%;
  /* aspect handled by content; min-height keeps page feel even if short */
  min-height: calc(var(--sheet-w) * 1.4142);
  background:var(--sheet);
  border:1px solid #e9e6df;
  box-shadow:
    0 1px 1px rgba(20,18,15,.04),
    0 10px 24px -8px rgba(20,18,15,.20),
    0 40px 80px -28px rgba(20,18,15,.30);
  padding: clamp(30px, 4.4vw, 56px) clamp(30px, 4.6vw, 60px);
  display:flex;
  flex-direction:column;
}
/* corner registration tick, subtle print cue */
.sheet::after{
  content:"";
  position:absolute; right:0; top:0;
  width:0; height:0;
  border-top:18px solid #f4f1ea;
  border-left:18px solid transparent;
  box-shadow:-1px 1px 1px rgba(0,0,0,.04) inset;
}

/* ---------- HEADER ---------- */
.cv-head{
  display:flex;
  gap: clamp(18px,3vw,32px);
  align-items:flex-start;
  padding-bottom: clamp(16px,2.4vw,22px);
  border-bottom:2px solid var(--ink);
}
.head-id{flex:1 1 auto; min-width:0;}
.name{
  font-weight:600;
  font-size: clamp(28px, 5.2vw, 46px);
  letter-spacing:-.02em;
  line-height:1.02;
}
.name .sur{font-weight:300;}
.role-line{
  margin-top:6px;
  font-family:"IBM Plex Mono",monospace;
  font-size: clamp(11px,1.5vw,13.5px);
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--accent);
  font-weight:500;
}
.summary{
  margin-top:12px;
  max-width:46ch;
  font-size: clamp(12.5px,1.55vw,14px);
  color:var(--muted);
  font-weight:400;
}
.head-meta{
  flex:0 0 auto;
  display:flex;
  flex-direction:column;
  gap:5px;
  align-items:flex-end;
  text-align:right;
  padding-top:4px;
}
.head-shot{
  width:74px; height:74px;
  border:1px solid var(--hair-strong);
  background:#f0ede6 center/contain no-repeat;
  margin-bottom:8px;
  /* contain so a landscape/portrait headshot is never face-cropped */
}
.contact{
  font-family:"IBM Plex Mono",monospace;
  font-size:11.5px;
  letter-spacing:.01em;
  color:var(--ink);
  white-space:nowrap;
  display:flex; gap:7px; align-items:center; justify-content:flex-end;
}
.contact b{
  color:var(--muted); font-weight:500;
  font-size:9.5px; letter-spacing:.1em; text-transform:uppercase;
}
.contact a{color:inherit; text-decoration:none; border-bottom:1px solid var(--hair-strong);}
.contact a:hover{border-color:var(--accent); color:var(--accent);}

/* ---------- BODY: two columns ---------- */
.cv-body{
  display:grid;
  grid-template-columns: 31% 1fr;
  gap: clamp(24px,3.4vw,42px);
  padding-top: clamp(20px,2.6vw,26px);
  flex:1 1 auto;
}

/* section heading shared */
.sec-title{
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--ink);
  padding-bottom:6px;
  margin-bottom:14px;
  border-bottom:1px solid var(--hair-strong);
  display:flex; align-items:baseline; justify-content:space-between;
}
.sec-title span{ color:var(--muted); font-size:9px; letter-spacing:.12em;}

/* ----- LEFT SIDEBAR: skills as labeled bars ----- */
.side{min-width:0;}
.side-block{ margin-bottom: clamp(22px,3vw,30px); }
.skill{ margin-bottom:13px; }
.skill-row{
  display:flex; justify-content:space-between; align-items:baseline;
  margin-bottom:5px;
}
.skill-name{ font-size:12.5px; font-weight:500; }
.skill-val{
  font-family:"IBM Plex Mono",monospace;
  font-size:10.5px; color:var(--muted); letter-spacing:.02em;
}
.bar{
  height:6px;
  background:var(--bar-track);
  border:1px solid var(--hair);
  position:relative;
  overflow:hidden;
}
.bar > i{
  position:absolute; left:0; top:0; bottom:0;
  width:var(--lvl, 0%);
  background:
    repeating-linear-gradient(135deg, var(--accent) 0 7px, #2f78ba 7px 14px);
  transform-origin:left center;
  transform:scaleX(0);
  transition: transform .9s cubic-bezier(.2,.7,.2,1);
}
.bar.fill > i{ transform:scaleX(1); }

/* small facts list (languages / tools) */
.facts{ list-style:none; }
.facts li{
  display:flex; justify-content:space-between; gap:8px;
  font-size:12px; padding:5px 0;
  border-bottom:1px dotted var(--hair);
}
.facts li:last-child{border-bottom:0;}
.facts .k{color:var(--ink); font-weight:500;}
.facts .v{font-family:"IBM Plex Mono",monospace; color:var(--muted); font-size:10.5px; text-align:right;}

/* ----- RIGHT COLUMN: experience with dated rail ----- */
.main{min-width:0;}
.exp{
  display:grid;
  grid-template-columns: 78px 1fr;
  gap:16px;
  padding:13px 0 15px;
  border-bottom:1px solid var(--hair);
  position:relative;
  cursor:default;
}
.exp:last-child{border-bottom:0;}
/* the tabular date rail */
.exp .rail{
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  color:var(--ink);
  text-align:right;
  padding-top:2px;
  font-variant-numeric: tabular-nums;
  line-height:1.5;
}
.exp .rail .yr{ display:block; }
.exp .rail .to{ color:var(--hair-strong); font-size:9.5px; }
.exp .rail .dur{ display:block; margin-top:4px; color:var(--accent); font-size:9.5px; letter-spacing:.04em;}
.exp .body{ min-width:0; }
.exp .role{
  font-size:14.5px; font-weight:600; letter-spacing:-.01em;
}
.exp .org{
  font-size:12.5px; color:var(--accent); font-weight:500;
  margin-top:1px;
}
.exp .org .place{ color:var(--muted); font-weight:400; }
.exp .blurb{
  font-size:12.5px; color:var(--muted); margin-top:7px; max-width:54ch;
}
.exp .tags{
  margin-top:9px; display:flex; flex-wrap:wrap; gap:5px;
}
.exp .tags span{
  font-family:"IBM Plex Mono",monospace;
  font-size:9.5px; letter-spacing:.03em;
  color:var(--muted);
  border:1px solid var(--hair-strong);
  padding:2px 6px;
}
/* hover/focus detail reveal: one line per role */
.exp .detail{
  margin-top:0;
  font-size:12px;
  color:var(--ink);
  display:grid;
  grid-template-rows:0fr;
  opacity:0;
  transition: grid-template-rows .42s cubic-bezier(.2,.7,.2,1), opacity .42s, margin-top .42s;
  border-left:2px solid var(--accent);
}
.exp .detail > span{ overflow:hidden; padding-left:0; }
.exp:hover .detail,
.exp:focus-within .detail,
.exp.open .detail{
  grid-template-rows:1fr; opacity:1; margin-top:10px;
}
.exp:hover .detail > span,
.exp:focus-within .detail > span,
.exp.open .detail > span{ padding:6px 0 4px 12px; }
.exp:hover{ background:linear-gradient(90deg, rgba(44,111,173,.04), rgba(44,111,173,0) 70%); }
.exp:focus-visible{ outline:none; }
.exp:focus-visible .body{ outline:2px solid var(--accent); outline-offset:6px; }

/* education / footer band inside sheet */
.cv-foot{
  margin-top: clamp(20px,2.6vw,28px);
  padding-top:14px;
  border-top:1px solid var(--hair-strong);
  display:flex; flex-wrap:wrap; gap:18px 30px;
  font-size:11.5px; color:var(--muted);
}
.cv-foot .edu{ display:flex; gap:10px; align-items:baseline; }
.cv-foot .edu time{ font-family:"IBM Plex Mono",monospace; color:var(--accent); font-size:10.5px; }
.cv-foot .edu .deg{ color:var(--ink); font-weight:500; }
.page-no{
  margin-left:auto;
  font-family:"IBM Plex Mono",monospace;
  font-size:10px; letter-spacing:.1em; color:var(--hair-strong);
  align-self:flex-end;
}

/* caption under the sheet, desk-level */
.desk-caption{
  width:var(--sheet-w);
  margin: 18px auto 0;
  display:flex; justify-content:space-between; align-items:center;
  font-family:"IBM Plex Mono",monospace;
  font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;
  color:#9a968d;
}
.desk-caption .dot{ width:7px;height:7px;border:1px solid #b7b2a8;border-radius:50%; display:inline-block; margin-right:7px; vertical-align:middle;}

/* ---------- MOBILE: drop the desk, fill width, single column ---------- */
@media (max-width:640px){
  :root{ --sheet-w: 100vw; }
  body{
    background:var(--sheet);
    padding:0;
  }
  body::before{ display:none; }
  .sheet-wrap{ width:100%; }
  .sheet{
    min-height:auto;
    border:0;
    box-shadow:none;
    padding:26px 20px 34px;
  }
  .sheet::after{ display:none; }
  .cv-head{ flex-direction:column-reverse; gap:14px; }
  .head-meta{ align-items:flex-start; text-align:left; flex-direction:row; flex-wrap:wrap; gap:10px 16px; }
  .head-shot{ margin-bottom:0; }
  .contact{ justify-content:flex-start; }
  .summary{ max-width:100%; }
  .cv-body{
    grid-template-columns:1fr;
    gap:26px;
  }
  /* sidebar above experience but still document-like */
  .exp{ grid-template-columns:64px 1fr; gap:12px; }
  /* on touch, no hover: show details always-open for readability */
  .exp .detail{ grid-template-rows:1fr; opacity:1; margin-top:10px; }
  .exp .detail > span{ padding:6px 0 4px 12px; }
  .desk-caption{ width:100%; padding:0 20px 22px; }
}

/* mid sizes: keep two columns but tighten rail */
@media (min-width:641px) and (max-width:820px){
  .exp{ grid-template-columns:70px 1fr; }
}

/* ---------- REDUCED MOTION: show final state, no animation ---------- */
@media (prefers-reduced-motion:reduce){
  .bar > i{ transition:none; transform:scaleX(1) !important; }
  .exp .detail{ transition:none; }
}
</style>
</head>
<body>

<main class="sheet-wrap" aria-label="Curriculum vitae document">
  <article class="sheet" id="sheet">
    <!-- HEADER injected -->
    <header class="cv-head" id="cvHead"></header>
    <!-- BODY: sidebar + experience injected -->
    <div class="cv-body">
      <aside class="side" id="cvSide" aria-label="Skills and details"></aside>
      <section class="main" id="cvMain" aria-label="Experience"></section>
    </div>
    <!-- FOOTER: education -->
    <footer class="cv-foot" id="cvFoot"></footer>
  </article>
</main>
<div class="desk-caption">
  <span><span class="dot"></span>Document - A4 / 210 x 297 mm</span>
  <span id="capRight">Curriculum Vitae</span>
</div>

<script>
/* ============================================================
   DATA  --  swap everything here. No markup edits needed.
   ============================================================ */
const DATA = {
  name:       { first:"Mara", last:"Lindqvist" },
  role:       "Principal Product Engineer",
  summary:    "Full-stack engineer and technical lead building reliable, observable systems. Twelve years across fintech, voice AI, and commerce platforms, with a bias for shipping measurable outcomes over surface polish.",
  // optional headshot. Leave "" to hide the box. contain = never crop the face.
  headshot:   "../assets/gen/poster-heygen.png",
  contact: [
    { k:"Mail",  v:"mara@lindqvist.dev", href:"mailto:mara@lindqvist.dev" },
    { k:"Web",   v:"lindqvist.dev",      href:"#" },
    { k:"Loc",   v:"Stockholm, SE",      href:"" }
  ],
  // LEFT sidebar: skill bars (0-100) and small fact lists
  skills: [
    { name:"TypeScript / Node", lvl:95, note:"expert" },
    { name:"React / Next.js",   lvl:90, note:"expert" },
    { name:"Systems design",    lvl:88, note:"advanced" },
    { name:"Observability",     lvl:84, note:"advanced" },
    { name:"Kafka / streaming", lvl:78, note:"strong" },
    { name:"Cloud / K8s",       lvl:72, note:"strong" }
  ],
  languages: [
    { k:"Swedish", v:"native" },
    { k:"English", v:"fluent" },
    { k:"German",  v:"working" }
  ],
  toolbox: [
    { k:"Runtime",  v:"Node, Deno" },
    { k:"Data",     v:"Postgres, Mongo" },
    { k:"Infra",    v:"GKE, Terraform" },
    { k:"Trace",    v:"OTel, Grafana" }
  ],
  // RIGHT column: experience, dates in tabular rail, hover reveals .detail
  experience: [
    {
      from:"2022", to:"now", dur:"3 yr",
      role:"Principal Product Engineer",
      org:"Northwind Voice", place:"Remote",
      blurb:"Led the rebuild of a real-time telephony AI stack to a streaming architecture serving 40k calls a day.",
      tags:["Node","Kafka","WebRTC","OTel"],
      detail:"Cut median voice latency from 1.9s to 640ms and drove cost per call down 38% by introducing per-stream observability and a fallback model router."
    },
    {
      from:"2019", to:"2022", dur:"3 yr",
      role:"Staff Engineer",
      org:"Ledgerline", place:"Stockholm",
      blurb:"Owned the payments ledger and reconciliation services across a four-team platform group.",
      tags:["TypeScript","Postgres","DDD"],
      detail:"Designed an event-sourced reconciliation engine that closed a recurring 0.3% settlement drift and passed two external audits with zero findings."
    },
    {
      from:"2016", to:"2019", dur:"3 yr",
      role:"Senior Full-Stack Engineer",
      org:"Cartwheel Commerce", place:"Berlin",
      blurb:"Shipped the storefront platform powering 1,200 merchant catalogs and the headless checkout API.",
      tags:["React","GraphQL","Shopify"],
      detail:"Rebuilt checkout as a headless flow that lifted conversion 11% and became the reference template for all new merchant onboardings."
    },
    {
      from:"2013", to:"2016", dur:"3 yr",
      role:"Software Engineer",
      org:"Fjord Labs", place:"Gothenburg",
      blurb:"Early engineer building data pipelines and internal tooling for a logistics analytics product.",
      tags:["Python","ETL","React"],
      detail:"Authored the ingestion framework still in production today, processing 2M shipment events daily across nine carriers."
    }
  ],
  education: [
    { time:"2013", deg:"M.Sc. Computer Science", where:"KTH Royal Institute" },
    { time:"2011", deg:"B.Sc. Software Engineering", where:"Chalmers University" }
  ]
};

/* ============================================================
   RENDER
   ============================================================ */
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function renderHead(){
  const d = DATA;
  const shot = d.headshot
    ? `<div class="head-shot" role="img" aria-label="Portrait of ${esc(d.name.first)} ${esc(d.name.last)}" style="background-image:url('${esc(d.headshot)}')"></div>`
    : "";
  const contact = d.contact.map(c=>{
    const inner = c.href
      ? `<a href="${esc(c.href)}">${esc(c.v)}</a>`
      : esc(c.v);
    return `<div class="contact"><b>${esc(c.k)}</b>${inner}</div>`;
  }).join("");
  document.getElementById("cvHead").innerHTML = `
    <div class="head-id">
      <h1 class="name">${esc(d.name.first)} <span class="sur">${esc(d.name.last)}</span></h1>
      <div class="role-line">${esc(d.role)}</div>
      <p class="summary">${esc(d.summary)}</p>
    </div>
    <div class="head-meta">
      ${shot}
      ${contact}
    </div>`;
  document.getElementById("capRight").textContent = `${d.name.first} ${d.name.last}`.toUpperCase();
}

function renderSide(){
  const d = DATA;
  const bars = d.skills.map(s=>`
    <div class="skill">
      <div class="skill-row">
        <span class="skill-name">${esc(s.name)}</span>
        <span class="skill-val">${esc(s.note)}</span>
      </div>
      <div class="bar" style="--lvl:${Math.max(0,Math.min(100,s.lvl))}%"><i></i></div>
    </div>`).join("");
  const langs = d.languages.map(l=>`<li><span class="k">${esc(l.k)}</span><span class="v">${esc(l.v)}</span></li>`).join("");
  const tools = d.toolbox.map(t=>`<li><span class="k">${esc(t.k)}</span><span class="v">${esc(t.v)}</span></li>`).join("");
  document.getElementById("cvSide").innerHTML = `
    <div class="side-block">
      <h2 class="sec-title">Skills <span>0 to 100</span></h2>
      ${bars}
    </div>
    <div class="side-block">
      <h2 class="sec-title">Languages</h2>
      <ul class="facts">${langs}</ul>
    </div>
    <div class="side-block">
      <h2 class="sec-title">Toolbox</h2>
      <ul class="facts">${tools}</ul>
    </div>`;
}

function renderMain(){
  const d = DATA;
  const items = d.experience.map((e,i)=>{
    const tags = (e.tags||[]).map(t=>`<span>${esc(t)}</span>`).join("");
    return `
    <article class="exp" tabindex="0" data-i="${i}"
      aria-label="${esc(e.role)} at ${esc(e.org)}, ${esc(e.from)} to ${esc(e.to)}">
      <div class="rail">
        <span class="yr">${esc(e.from)}</span>
        <span class="to">to ${esc(e.to)}</span>
        <span class="dur">${esc(e.dur||"")}</span>
      </div>
      <div class="body">
        <div class="role">${esc(e.role)}</div>
        <div class="org">${esc(e.org)} <span class="place">- ${esc(e.place)}</span></div>
        <p class="blurb">${esc(e.blurb)}</p>
        <div class="tags">${tags}</div>
        <div class="detail"><span>${esc(e.detail)}</span></div>
      </div>
    </article>`;
  }).join("");
  document.getElementById("cvMain").innerHTML = `
    <h2 class="sec-title">Experience <span>${d.experience.length} roles</span></h2>
    ${items}`;
}

function renderFoot(){
  const d = DATA;
  const edu = d.education.map(e=>`
    <div class="edu"><time>${esc(e.time)}</time>
      <span><span class="deg">${esc(e.deg)}</span> &middot; ${esc(e.where)}</span>
    </div>`).join("");
  document.getElementById("cvFoot").innerHTML = `${edu}<span class="page-no">PAGE 1 / 1</span>`;
}

renderHead();
renderSide();
renderMain();
renderFoot();

/* ---------- behaviour ---------- */
const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
const touch  = window.matchMedia("(hover:none), (pointer:coarse)").matches;

/* skill bars: animate in when sheet is in view (skip if reduced) */
const bars = Array.from(document.querySelectorAll(".bar"));
if(reduce){
  bars.forEach(b=>b.classList.add("fill"));
}else if("IntersectionObserver" in window){
  const io = new IntersectionObserver((ents)=>{
    ents.forEach(ent=>{
      if(ent.isIntersecting){
        const idx = bars.indexOf(ent.target);
        setTimeout(()=>ent.target.classList.add("fill"), 120 + idx*90);
        io.unobserve(ent.target);
      }
    });
  }, { threshold:.4 });
  bars.forEach(b=>io.observe(b));
}else{
  bars.forEach(b=>b.classList.add("fill"));
}

/* experience: keyboard + touch tap toggles the detail line.
   On hover-capable pointers CSS handles it; here we add tap/enter support. */
document.querySelectorAll(".exp").forEach(card=>{
  card.addEventListener("keydown", e=>{
    if(e.key==="Enter" || e.key===" "){
      e.preventDefault();
      card.classList.toggle("open");
    }
  });
  if(touch){
    card.addEventListener("click", ()=>card.classList.toggle("open"));
  }
});
</script>
</body>
</html>
