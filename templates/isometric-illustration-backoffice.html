<!-- TEMPLATE: Iso Clinic Console | ARCHETYPE: isometric-illustration-backoffice | REF: isometric illustration dashboards, iso 3D data towers, soft modern illustration | WHEN TO USE: a friendly owner OVERVIEW (KPIs + trend + channel split + handoff list) that wants illustrated 3D warmth instead of a flat card grid | SWAP: edit the DATA object at the top of the script -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iso Clinic Console - ภาพรวมเจ้าของคลินิก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ground:#f4f6fb;
    --ink:#1d2240;
    --ink-soft:#5a6080;
    --line:#e2e7f3;
    --card:#ffffff;
    --indigo:#5b6cf0;
    --indigo-d:#3f4fc9;
    --coral:#ff7a6b;
    --coral-d:#e25646;
    --teal:#2bc4a8;
    --teal-d:#1f9d87;
    --amber:#f7b32b;
    --amber-d:#d8930c;
    --shadow:0 24px 48px -28px rgba(43,52,96,.42);
    --shadow-sm:0 12px 26px -18px rgba(43,52,96,.4);
  }
  *{box-sizing:border-box;min-width:0}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 700px at 78% -8%, #eef1fc 0%, rgba(238,241,252,0) 60%),
      radial-gradient(900px 600px at 0% 100%, #eef7f4 0%, rgba(238,247,244,0) 55%),
      var(--ground);
    color:var(--ink);
    font-family:"IBM Plex Sans Thai","Sora",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    overflow-x:hidden;
  }
  .wrap{max-width:1320px;margin:0 auto;padding:26px 30px 60px}
  .num{font-family:"Sora",system-ui,sans-serif;font-variant-numeric:tabular-nums;letter-spacing:-.01em}

  /* ---- top band ---- */
  .topbar{
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    margin-bottom:22px;
  }
  .brand{display:flex;align-items:center;gap:13px;min-width:0}
  .brand-cube{flex:0 0 auto;filter:drop-shadow(0 10px 14px rgba(91,108,240,.32))}
  .brand-txt h1{font-family:"Sora",sans-serif;font-size:19px;font-weight:800;margin:0;letter-spacing:-.01em}
  .brand-txt p{margin:1px 0 0;font-size:12.5px;color:var(--ink-soft);font-weight:500}
  .topbar .spacer{flex:1 1 auto}
  .seg{
    display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:999px;
    padding:4px;gap:2px;box-shadow:var(--shadow-sm)
  }
  .seg button{
    font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-soft);
    border:0;background:transparent;padding:7px 15px;border-radius:999px;cursor:pointer;
    transition:background .18s,color .18s
  }
  .seg button[aria-pressed="true"]{background:var(--indigo);color:#fff;box-shadow:0 6px 14px -6px rgba(91,108,240,.7)}
  .seg button:focus-visible{outline:2px solid var(--indigo);outline-offset:2px}
  .owner{display:flex;align-items:center;gap:10px}
  .owner .av{width:38px;height:38px;border-radius:50%;background:linear-gradient(140deg,#7c8bff,#5b6cf0);color:#fff;display:grid;place-items:center;font-family:"Sora";font-weight:700;font-size:14px;box-shadow:var(--shadow-sm)}
  .owner .meta{font-size:12px;line-height:1.25}
  .owner .meta b{display:block;font-size:13px;font-weight:700}
  .owner .meta span{color:var(--ink-soft)}

  /* ---- layout grid ---- */
  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}
  .col-3{grid-column:span 3}
  .col-4{grid-column:span 4}
  .col-5{grid-column:span 5}
  .col-7{grid-column:span 7}
  .col-8{grid-column:span 8}
  .col-12{grid-column:span 12}

  .panel{
    background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);position:relative;overflow:hidden
  }
  .panel-pad{padding:18px}
  .phead{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .phead h2{font-family:"Sora";font-size:14.5px;font-weight:700;margin:0;letter-spacing:-.01em}
  .phead .sub{font-size:11.5px;color:var(--ink-soft);margin-left:auto;font-weight:500}
  .pin{flex:0 0 auto}

  /* ---- KPI iso blocks ---- */
  .kpi{cursor:default}
  .kpi .iso-top{position:relative}
  .kpi svg{display:block;width:100%;height:auto}
  /* the flat readable face overlay */
  .kpi .face{
    position:absolute;left:7.5%;top:13%;width:60%;
  }
  .kpi .face .label{font-size:11.5px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:6px}
  .kpi .face .label .ic{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
  .kpi .face .val{font-family:"Sora";font-weight:800;font-size:32px;line-height:1.02;margin-top:7px;letter-spacing:-.02em}
  .kpi .face .unit{font-size:13px;font-weight:600;color:var(--ink-soft);margin-left:3px}
  .delta{
    display:inline-flex;align-items:center;gap:4px;margin-top:9px;
    font-family:"Sora";font-size:12px;font-weight:700;padding:3px 9px;border-radius:999px
  }
  .delta.up{background:rgba(43,196,168,.14);color:var(--teal-d)}
  .delta.down{background:rgba(255,122,107,.16);color:var(--coral-d)}
  .delta .ar{font-size:11px}
  .delta + .vs{font-size:10.5px;color:var(--ink-soft);margin-top:6px;display:block;font-weight:500}

  /* ---- trend tower panel ---- */
  .tower-wrap{position:relative}
  .tower-svg{display:block;width:100%;height:auto;overflow:visible}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);font-weight:600}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
  .bar-grp{transition:transform .14s ease}
  .twr-num{font-family:"Sora";font-weight:700;font-size:10.5px;fill:var(--ink)}
  .twr-axis{font-family:"Sora";font-weight:600;font-size:10.5px;fill:var(--ink-soft)}

  /* ---- channel donut ---- */
  .donut-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .donut-wrap{flex:0 0 auto;position:relative}
  .donut-wrap svg{display:block;overflow:visible}
  .donut-center{position:absolute;left:0;top:42%;width:100%;text-align:center;transform:translateY(-50%)}
  .donut-center b{font-family:"Sora";font-weight:800;font-size:23px;display:block;line-height:1}
  .donut-center span{font-size:10.5px;color:var(--ink-soft);font-weight:600}
  .ch-list{flex:1 1 130px;min-width:0;display:flex;flex-direction:column;gap:11px}
  .ch{display:flex;align-items:center;gap:10px}
  .ch .dot{width:13px;height:13px;border-radius:4px;flex:0 0 auto;box-shadow:0 3px 6px -2px rgba(43,52,96,.4)}
  .ch .nm{font-size:12.5px;font-weight:600;min-width:0}
  .ch .nm small{display:block;font-size:10.5px;color:var(--ink-soft);font-weight:500}
  .ch .pc{margin-left:auto;font-family:"Sora";font-weight:800;font-size:15px}

  /* ---- handoff list ---- */
  .needlook{display:flex;flex-direction:column;gap:0}
  .nl-row{
    display:flex;align-items:center;gap:13px;padding:13px 4px;border-top:1px solid var(--line);
    transition:background .15s;border-radius:10px
  }
  .nl-row:first-child{border-top:0}
  .nl-row:hover{background:#f7f8fd}
  .nl-cube{flex:0 0 auto}
  .nl-body{flex:1 1 auto;min-width:0}
  .nl-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .nl-name{font-weight:700;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .chip{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px;flex:0 0 auto;font-family:"Sora"}
  .chip.voice{background:rgba(247,179,43,.16);color:var(--amber-d)}
  .chip.line{background:rgba(43,196,168,.15);color:var(--teal-d)}
  .nl-reason{font-size:12px;color:var(--ink-soft);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
  .nl-meta{flex:0 0 auto;text-align:right}
  .nl-when{font-size:11px;color:var(--ink-soft);font-family:"Sora";font-weight:600;white-space:nowrap}
  .sev{display:inline-block;margin-top:5px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:999px;font-family:"Sora";white-space:nowrap}
  .sev.hi{background:rgba(255,122,107,.16);color:var(--coral-d)}
  .sev.md{background:rgba(247,179,43,.18);color:var(--amber-d)}
  .nl-foot{margin-top:14px;display:flex;align-items:center;gap:10px}
  .btn{
    font-family:"Sora";font-weight:700;font-size:12.5px;border:0;border-radius:11px;cursor:pointer;
    padding:10px 16px;background:var(--indigo);color:#fff;box-shadow:0 10px 20px -10px rgba(91,108,240,.75);
    transition:transform .14s,box-shadow .14s
  }
  .btn:hover{transform:translateY(-1px)}
  .btn:focus-visible{outline:2px solid var(--indigo-d);outline-offset:2px}
  .btn.ghost{background:#fff;color:var(--indigo-d);border:1px solid var(--line);box-shadow:var(--shadow-sm)}

  /* ---- iso clinic scene accent ---- */
  .scene-panel{
    background:
      radial-gradient(120% 90% at 80% 10%, #eef1ff 0%, rgba(238,241,255,0) 60%),
      linear-gradient(180deg,#fbfcff 0%,#f4f6fb 100%);
  }
  .scene-panel svg{display:block;width:100%;height:auto}
  .scene-cap{position:absolute;left:18px;bottom:16px;right:18px}
  .scene-cap b{font-family:"Sora";font-size:13px;font-weight:700;display:block}
  .scene-cap span{font-size:11.5px;color:var(--ink-soft)}
  .scene-stat{position:absolute;top:16px;right:18px;text-align:right}
  .scene-stat b{font-family:"Sora";font-weight:800;font-size:26px;display:block;line-height:1;color:var(--indigo-d)}
  .scene-stat span{font-size:10.5px;color:var(--ink-soft);font-weight:600}

  .float{animation:bob 6s ease-in-out infinite}
  .float.b{animation-delay:-2s}
  .float.c{animation-delay:-4s}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

  .foot{margin-top:20px;display:flex;align-items:center;gap:8px;color:var(--ink-soft);font-size:11.5px;flex-wrap:wrap}
  .foot .d{width:4px;height:4px;border-radius:50%;background:var(--ink-soft);opacity:.5}

  /* ---------- responsive ---------- */
  @media (max-width:1100px){
    .col-3{grid-column:span 6}
    .col-4{grid-column:span 6}
    .col-5{grid-column:span 12}
    .col-7{grid-column:span 12}
    .col-8{grid-column:span 12}
  }
  @media (max-width:640px){
    .wrap{padding:18px 14px 44px}
    .grid{gap:14px}
    .col-3,.col-4,.col-5,.col-7,.col-8,.col-12{grid-column:span 12}
    .topbar{gap:11px}
    .topbar .spacer{display:none}
    .seg{order:3;width:100%;justify-content:center}
    .owner{order:2;margin-left:auto}
    .kpi .face .val{font-size:28px}
    .kpi .face{top:12%}
    .nl-reason{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;text-overflow:clip}
  }
  @media (prefers-reduced-motion:reduce){
    .float,.bar-grp{animation:none!important}
    *{transition:none!important}
  }
</style>
</head>
<body>
<div class="wrap">
<script>
/* =========================================================================
   DATA  -  swap everything here. All Thai copy + THB figures live below.
   ========================================================================= */
const DATA = {
  clinic:"คลินิกฟันยิ้มหวาน",
  branch:"สาขาพระราม 9",
  owner:{name:"คุณหมอแนน", role:"เจ้าของคลินิก", initials:"นน"},
  range:"7 วันล่าสุด",
  kpis:[

    {key:"books",  label:"นัดที่ปิดได้",       icon:"#2bc4a8", value:"412",   unit:"นัด",  delta:+11.2, side:"#2bc4a8", top:"#5fe0c8"},
    {key:"rev",    label:"มูลค่านัด (โดยประมาณ)", icon:"#f7b32b", value:"฿ 1.74", unit:"ล้าน", delta:+9.6, side:"#f7b32b", top:"#ffd072"},
    {key:"miss",   label:"สายที่ต้องคนช่วย",   icon:"#ff7a6b", value:"23",    unit:"เคส", delta:-6.1, side:"#ff7a6b", top:"#ff9f93"}

  trend:[

  needLook:[

    {name:"คุณธีรภัทร ส.",  ch:"line",  reason:"ถามราคารากฟันเทียม เกินเรตการ์ดที่ตั้งไว้", when:"22 นาทีก่อน", sev:"md"},
    {name:"คุณกัลยา พ.",    ch:"voice", reason:"ลูกค้าเสียงดัง จับใจความนัดไม่ครบ",        when:"41 นาทีก่อน", sev:"hi"},
    {name:"คุณวรินทร ก.",   ch:"line",  reason:"อยากคุยกับหมอก่อนตัดสินใจจัดฟัน",         when:"1 ชม. ก่อน",  sev:"md"}
  ]
};
</script>

<!-- ================= TOP BAND ================= -->
<header class="topbar">
  <div class="brand">
    <!-- iso brand cube -->
    <svg class="brand-cube" width="44" height="48" viewBox="0 0 44 48" aria-hidden="true">
      <polygon points="22,2 42,13 22,24 2,13" fill="#8b97ff"/>
      <polygon points="2,13 22,24 22,46 2,35" fill="#5b6cf0"/>
      <polygon points="42,13 22,24 22,46 42,35" fill="#3f4fc9"/>
      <polygon points="22,2 42,13 22,24 2,13" fill="#8b97ff"/>
      <circle cx="22" cy="13" r="3.4" fill="#fff" opacity=".92"/>
    </svg>
    <div class="brand-txt">
      <h1>Iso Clinic Console</h1>
      <p id="brandSub"></p>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="seg" role="group" aria-label="ช่วงเวลา">
    <button aria-pressed="false">วันนี้</button>
    <button aria-pressed="true">7 วัน</button>
    <button aria-pressed="false">30 วัน</button>
  </div>
  <div class="owner">
    <div class="av" id="ownerAv"></div>
    <div class="meta" id="ownerMeta"></div>
  </div>
</header>

<!-- ================= MAIN GRID ================= -->
<div class="grid">

  <!-- KPI iso blocks (4) -->
  <div class="col-3 panel kpi" id="kpi-0"></div>
  <div class="col-3 panel kpi" id="kpi-1"></div>
  <div class="col-3 panel kpi" id="kpi-2"></div>
  <div class="col-3 panel kpi" id="kpi-3"></div>

  <!-- Trend data-tower -->
  <div class="col-8 panel">
    <div class="panel-pad">
      <div class="phead">
        <svg class="pin" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true"><polygon points="11,2 20,7 11,12 2,7" fill="#8b97ff"/><polygon points="2,7 11,12 11,20 2,15" fill="#5b6cf0"/><polygon points="20,7 11,12 11,20 20,15" fill="#3f4fc9"/></svg>

      </div>
      <div class="legend">

        <span><i style="background:#2bc4a8"></i>นัดที่ปิดได้</span>
        <span style="margin-left:auto;color:#3f4fc9">สูงสุดวันศุกร์ 224 สาย / 74 นัด</span>
      </div>
    </div>
  </div>

  <!-- Channel donut + iso scene stacked in right column -->
  <div class="col-4 panel">
    <div class="panel-pad">
      <div class="phead">
        <svg class="pin" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true"><polygon points="11,2 20,7 11,12 2,7" fill="#5fe0c8"/><polygon points="2,7 11,12 11,20 2,15" fill="#2bc4a8"/><polygon points="20,7 11,12 11,20 20,15" fill="#1f9d87"/></svg>
        <h2>ช่องทางที่เข้ามา</h2>
      </div>
      <div class="donut-row">

  <div class="col-7 panel">
    <div class="panel-pad">
      <div class="phead">
        <svg class="pin" width="22" height="22" viewBox="0 0 22 22" aria-hidden="true"><polygon points="11,2 20,7 11,12 2,7" fill="#ff9f93"/><polygon points="2,7 11,12 11,20 2,15" fill="#ff7a6b"/><polygon points="20,7 11,12 11,20 20,15" fill="#e25646"/></svg>

      </g>

        <circle cx="298" cy="176" r="6" fill="#fff" opacity=".85"/>
      </g>

      <!-- amber pillar (calls) -->
      <g class="float c">
        <polygon points="318,128 342,140 342,206 318,194" fill="#f7b32b"/>
        <polygon points="366,128 342,140 342,206 366,194" fill="#d8930c"/>
        <polygon points="318,128 342,116 366,128 342,140" fill="#ffd072"/>

      <!-- little coral marker (handoff) -->

        <polygon points="206,196 224,205 224,228 206,219" fill="#ff7a6b"/>
        <polygon points="242,196 224,205 224,228 242,219" fill="#e25646"/>
        <polygon points="206,196 224,187 242,196 224,205" fill="#ff9f93"/>
        <polygon points="217,176 231,183 224,187 217,183" fill="#ff7a6b"/>
        <polygon points="217,176 217,183 224,187 224,180" fill="#e25646"/>
      </g>

      <!-- floating pulse rings over reception -->
      <g opacity=".9">
        <ellipse cx="298" cy="120" rx="20" ry="9" fill="none" stroke="#5b6cf0" stroke-width="2" opacity=".5"/>
        <ellipse cx="298" cy="120" rx="11" ry="5" fill="none" stroke="#5b6cf0" stroke-width="2" opacity=".8"/>
        <circle cx="298" cy="120" r="3" fill="#5b6cf0"/>
      </g>
    </svg>
    <div class="scene-stat">
      <b class="num">98.2%</b>
      <span>AI รับเองได้</span>
    </div>
    <div class="scene-cap">
      <b>ระบบทำงานปกติ</b>
      <span>AI รับสาย จองนัด และส่งต่อเคสยากให้ทีมอัตโนมัติ</span>
    </div>
  </div>

</div>

<div class="foot">
  <span>Iso Clinic Console</span><span class="d"></span>
  <span id="footRange"></span><span class="d"></span>
  <span>ตัวเลขเป็นข้อมูลตัวอย่าง</span><span class="d"></span>
  <span>THB</span>
</div>
</div>

<script>
(function(){
  const $=(s,r=document)=>r.querySelector(s);
  const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  /* ----- header ----- */
  $('#brandSub').textContent = DATA.clinic+" - "+DATA.branch;
  $('#ownerAv').textContent = DATA.owner.initials;
  $('#ownerMeta').innerHTML = '<b>'+esc(DATA.owner.name)+'</b><span>'+esc(DATA.owner.role)+'</span>';
  $('#trendSub').textContent = DATA.range;
  $('#footRange').textContent = DATA.range;
  $('#needCount').textContent = DATA.needLook.length+" เคสรอ";

  /* ====================================================================
     KPI ISO BLOCKS
     Each KPI is an isometric cuboid drawn in SVG (lit top + 2 shaded
     sides). The number lives on a FLAT html overlay above the top face
     so it is never distorted.
     ==================================================================== */
  DATA.kpis.forEach((k,i)=>{
    const up = k.delta>=0;
    const host = $('#kpi-'+i);
    // cuboid geometry inside a 260x190 viewBox
    const svg = `
      <div class="iso-top">
        <svg viewBox="0 0 260 200" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
          <!-- soft iso ground shadow -->
          <ellipse cx="130" cy="178" rx="92" ry="20" fill="${k.side}" opacity=".14"/>
          <!-- left lit side -->
          <polygon points="38,86 130,140 130,176 38,122" fill="${k.side}" opacity=".92"/>
          <!-- right darker side -->
          <polygon points="222,86 130,140 130,176 222,122" fill="${k.side}"/>
          <polygon points="222,86 130,140 130,176 222,122" fill="#000" opacity=".16"/>
          <!-- top lit face -->
          <polygon points="130,40 222,86 130,132 38,86" fill="${k.top}"/>
          <polygon points="130,40 222,86 130,132 38,86" fill="#fff" opacity=".22"/>
          <!-- top inner panel (where number reads from) -->
          <polygon points="130,58 200,93 130,128 60,93" fill="#fff" opacity=".9"/>
          <polygon points="130,58 200,93 130,128 60,93" fill="${k.top}" opacity=".10"/>
          <!-- subtle stud highlight -->
          <polygon points="130,40 150,50 130,60 110,50" fill="#fff" opacity=".55"/>
        </svg>
        <div class="face">
          <div class="label"><span class="ic" style="background:${k.icon}"></span>${esc(k.label)}</div>
          <div class="val num">${esc(k.value)}<span class="unit">${esc(k.unit)}</span></div>
          <span class="delta ${up?'up':'down'}"><span class="ar">${up?'▲':'▼'}</span>${Math.abs(k.delta).toFixed(1)}%</span>
          <span class="vs">เทียบ 7 วันก่อน</span>
        </div>
      </div>`;
    host.innerHTML = svg;
  });

  /* ====================================================================
     ISOMETRIC DATA-TOWER TREND
     For each day: two stacked iso bars (calls behind, books in front).
     Height of each tower = value. Drawn at a fixed iso angle.
     ==================================================================== */
  (function tower(){
    const svg = $('#towerSvg');
    const W=760, H=300;
    const baseY=236;          // floor line for tower bases
    const startX=70;
    const stepX=96;           // distance between day clusters
    const dw=30;              // half-width of a tower top (x)
    const dz=15;              // iso depth (y offset for the side)
    const maxCalls=Math.max(...DATA.trend.map(t=>t.calls));
    const scale=150/maxCalls; // px per unit, calls drive the scale

    const ns='http://www.w3.org/2000/svg';
    const mk=(t,a)=>{const e=document.createElementNS(ns,t);for(const k in a)e.setAttribute(k,a[k]);return e;};

    // faint floor grid (iso-ish baseline)
    for(let g=0;g<DATA.trend.length;g++){
      const cx=startX+g*stepX+24;
      const ln=mk('line',{x1:cx-44,y1:baseY+10,x2:cx+44,y2:baseY+10,stroke:'#eceffa','stroke-width':2});
      svg.appendChild(ln);
    }

    // build one iso bar (a cuboid) given base center, height, palette
    function bar(cx, h, top, side, depthShift, w){
      const g=mk('g',{class:'bar-grp'});
      const halfW=w||dw;
      const by=baseY;            // base center y
      const ty=baseY-h;          // top center y
      // anchor points (diamond cross-section): left, mid(near), right, mid(far via depth)
      // We use a simple 2-face cuboid: front-left lit, front-right shaded, top.
      const lx=cx-halfW, rx=cx+halfW;
      // top face (parallelogram)
      const topPts=`${cx},${ty-dz} ${rx},${ty} ${cx},${ty+dz} ${lx},${ty}`;
      // left lit side
      const leftPts=`${lx},${ty} ${cx},${ty+dz} ${cx},${by+dz} ${lx},${by}`;
      // right shaded side
      const rightPts=`${rx},${ty} ${cx},${ty+dz} ${cx},${by+dz} ${rx},${by}`;
      g.appendChild(mk('polygon',{points:leftPts, fill:side}));
      g.appendChild(mk('polygon',{points:rightPts, fill:side}));
      const rdark=mk('polygon',{points:rightPts, fill:'#000', opacity:.14});
      g.appendChild(rdark);
      const tp=mk('polygon',{points:topPts, fill:top});
      g.appendChild(tp);
      const sheen=mk('polygon',{points:topPts, fill:'#fff', opacity:.20});
      g.appendChild(sheen);
      return g;
    }

    DATA.trend.forEach((t,i)=>{
      const clusterX=startX+i*stepX;
      const hCalls=t.calls*scale;
      const hBooks=t.books*scale;

      // soft iso shadow puddle
      svg.appendChild(mk('ellipse',{cx:clusterX+14, cy:baseY+16, rx:46, ry:9, fill:'#5b6cf0', opacity:.08}));

      // back tower = calls (indigo), shifted up-right a touch for depth
      const callBar=bar(clusterX, hCalls, '#8b97ff', '#5b6cf0', 0, 22);
      svg.appendChild(callBar);

      // front tower = books (teal), in front + to the right
      const bookBar=bar(clusterX+30, hBooks, '#5fe0c8', '#2bc4a8', 0, 20);
      svg.appendChild(bookBar);

      // value label on the calls tower top (flat readable)
      const lblCalls=mk('text',{x:clusterX, y:baseY-hCalls-dz-6, 'text-anchor':'middle', class:'twr-num'});
      lblCalls.textContent=t.calls;
      svg.appendChild(lblCalls);

      // day axis label
      const ax=mk('text',{x:clusterX+14, y:baseY+34, 'text-anchor':'middle', class:'twr-axis'});
      ax.textContent=t.d;
      svg.appendChild(ax);
    });

    // y reference ticks (left)
    [0,75,150].forEach(v=>{
      const realVal=Math.round(v/scale);
      const y=baseY-v;
      const tx=mk('text',{x:34,y:y+3,'text-anchor':'end',class:'twr-axis'});
      tx.textContent=realVal;
      svg.appendChild(tx);
    });
  })();

  /* ====================================================================
     ISOMETRIC CHANNEL DONUT (ring tilted to iso plane)
     A donut compressed vertically (ry < rx) with an extruded lower edge
     to read as a 3D iso ring. Segments = Voice / LINE / web.
     ==================================================================== */
  (function donut(){
    const svg=$('#donutSvg');
    const ns='http://www.w3.org/2000/svg';
    const mk=(t,a)=>{const e=document.createElementNS(ns,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
    const cx=74, cy=66, rx=58, ry=33, inner=0.52, depth=16;

    const segs=DATA.channels;
    const total=segs.reduce((s,c)=>s+c.pct,0);

    // helper: point on tilted ellipse
    const pt=(ang,RX,RY)=>[cx+RX*Math.cos(ang), cy+RY*Math.sin(ang)];

    // draw thickness first (back to front) using darker side colors as an extruded band on the lower half
    // build each segment as an annular wedge
    let a0=-Math.PI/2;
    // shadow under ring
    svg.appendChild(mk('ellipse',{cx:cx,cy:cy+depth+8,rx:rx*0.9,ry:ry*0.5,fill:'#5b6cf0',opacity:.10}));

    // extruded side band (drawn before top faces)
    segs.forEach(s=>{
      const frac=s.pct/total;
      const a1=a0+frac*Math.PI*2;
      // only the front-facing lower arc gets visible thickness; approximate by drawing the outer arc band
      const steps=Math.max(2,Math.round(frac*40));
      let band='';
      const opts=[];
      for(let i=0;i<=steps;i++){
        const ang=a0+(a1-a0)*i/steps;
        opts.push(ang);
      }
      // top outer arc
      let dTop='M '+pt(a0,rx,ry).join(' ');
      opts.forEach(ang=>{ const p=pt(ang,rx,ry); dTop+=' L '+p[0]+' '+p[1]; });
      // down the depth and back along bottom outer arc
      let dSide=dTop;
      const last=pt(a1,rx,ry);
      dSide+=' L '+last[0]+' '+(last[1]+depth);
      for(let i=opts.length-1;i>=0;i--){ const p=pt(opts[i],rx,ry); dSide+=' L '+p[0]+' '+(p[1]+depth); }
      dSide+=' Z';
      // darker extrude
      svg.appendChild(mk('path',{d:dSide, fill:s.color, opacity:.55}));
      svg.appendChild(mk('path',{d:dSide, fill:'#000', opacity:.12}));
      a0=a1;
    });

    // top annular faces
    a0=-Math.PI/2;
    segs.forEach(s=>{
      const frac=s.pct/total;
      const a1=a0+frac*Math.PI*2;
      const steps=Math.max(2,Math.round(frac*48));
      let d='M '+pt(a0,rx,ry).join(' ');
      for(let i=1;i<=steps;i++){ const ang=a0+(a1-a0)*i/steps; const p=pt(ang,rx,ry); d+=' L '+p[0]+' '+p[1]; }
      // inner arc back
      for(let i=steps;i>=0;i--){ const ang=a0+(a1-a0)*i/steps; const p=pt(ang,rx*inner,ry*inner); d+=' L '+p[0]+' '+p[1]; }
      d+=' Z';
      svg.appendChild(mk('path',{d:d, fill:s.colorTop}));
      // light sheen on top
      svg.appendChild(mk('path',{d:d, fill:'#fff', opacity:.12}));
      a0=a1;
    });

    // inner hole top rim
    svg.appendChild(mk('ellipse',{cx:cx,cy:cy,rx:rx*inner,ry:ry*inner,fill:'#ffffff'}));
    svg.appendChild(mk('ellipse',{cx:cx,cy:cy,rx:rx*inner,ry:ry*inner,fill:'none',stroke:'#e2e7f3','stroke-width':1.5}));
  })();

  /* ----- channel list ----- */
  (function(){
    const wrap=$('#chList');
    wrap.innerHTML=DATA.channels.map(c=>(
      '<div class="ch">'+
        '<span class="dot" style="background:linear-gradient(140deg,'+c.colorTop+','+c.color+')"></span>'+
        '<div class="nm">'+esc(c.name)+'<small>'+esc(c.sub)+'</small></div>'+
        '<span class="pc">'+c.pct+'%</span>'+
      '</div>'
    )).join('');
  })();

  /* ----- needs-a-look list ----- */
  (function(){
    const wrap=$('#needList');
    const cubeFor=ch=>{
      const c = ch==='voice' ? {t:'#ffd072',l:'#f7b32b',r:'#d8930c'} : {t:'#5fe0c8',l:'#2bc4a8',r:'#1f9d87'};
      return '<svg class="nl-cube" width="34" height="36" viewBox="0 0 34 36" aria-hidden="true">'+
        '<polygon points="17,2 32,11 17,20 2,11" fill="'+c.t+'"/>'+
        '<polygon points="2,11 17,20 17,34 2,25" fill="'+c.l+'"/>'+
        '<polygon points="32,11 17,20 17,34 32,25" fill="'+c.r+'"/>'+
        '<circle cx="17" cy="11" r="3.2" fill="#fff" opacity=".9"/></svg>';
    };
    wrap.innerHTML=DATA.needLook.map(n=>(
      '<div class="nl-row">'+
        cubeFor(n.ch)+
        '<div class="nl-body">'+
          '<div class="nl-top">'+
            '<span class="nl-name">'+esc(n.name)+'</span>'+
            '<span class="chip '+n.ch+'">'+(n.ch==='voice'?'Voice':'LINE')+'</span>'+
          '</div>'+
          '<div class="nl-reason">'+esc(n.reason)+'</div>'+
        '</div>'+
        '<div class="nl-meta">'+
          '<div class="nl-when">'+esc(n.when)+'</div>'+
          '<span class="sev '+n.sev+'">'+(n.sev==='hi'?'ด่วน':'รอดู')+'</span>'+
        '</div>'+
      '</div>'
    )).join('');
  })();

  /* ----- segmented control (visual only) ----- */
  document.querySelectorAll('.seg button').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.seg button').forEach(x=>x.setAttribute('aria-pressed','false'));
      b.setAttribute('aria-pressed','true');
    });
  });
})();
</script>
</body>
