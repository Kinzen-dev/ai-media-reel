<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Morning Note - Yimwhan Daily Brief</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Shantell+Sans:wght@400;500;600&family=Gloria+Hallelujah&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   DATA-DRIVEN LIVING NOTE. All copy + numbers live in the JS DATA object
   at the very top of <script>. Edit there to repurpose the page.
   ========================================================================= */

:root{
  --paper:#f7f3ea;        /* warm cream */
  --paper-2:#f2ecdd;      /* slightly deeper cream for the page edge */
  --ink:#2a2722;          /* dark ink */
  --ink-soft:#5b554b;     /* faded ink for secondary text */
  --ink-faint:#9a9183;    /* very faint, pencil-grey */
  --accent:#b4654a;       /* ONE muted accent: terracotta */
  --accent-soft:#c98a73;
  --rule:#d9cfb8;         /* notebook horizontal rule */
  --margin-line:#cda99b;  /* the red-ish margin rule, muted */
  --paper-shadow:rgba(42,39,34,.12);
  --hl:#ecd9c0;           /* highlighter swipe */
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  background:
    radial-gradient(120% 90% at 80% -10%, #fbf8f0 0%, var(--paper) 46%, var(--paper-2) 100%);
  color:var(--ink);
  font-family:"Shantell Sans","Segoe UI",system-ui,sans-serif;
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;            /* belt + suspenders against h-overflow */
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* faint paper grain via tiled noise filter on a fixed layer */
.grain{
  position:fixed; inset:0; z-index:0; pointer-events:none;
  opacity:.05; mix-blend-mode:multiply;
}

/* ---------------- page sheet ---------------- */
.sheet-wrap{
  position:relative; z-index:1;
  max-width:1180px;
  margin:0 auto;
  padding:clamp(18px,3vw,46px) clamp(12px,3vw,40px) 80px;
}

.sheet{
  position:relative;
  background:
    repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 37px,
      var(--rule) 37px,
      var(--rule) 38px
    ),
    linear-gradient(180deg,#fbf7ee 0%, #f7f3ea 100%);
  border-radius:5px;
  box-shadow:
    0 1px 0 rgba(255,255,255,.7) inset,
    0 18px 40px -22px var(--paper-shadow),
    0 4px 14px -10px var(--paper-shadow);
  padding:clamp(26px,4vw,52px) clamp(20px,4.5vw,60px) clamp(34px,5vw,64px) clamp(58px,9vw,118px);
  min-width:0;
  overflow:hidden;
  /* subtle torn-corner feel */
  background-clip:padding-box;
}

/* the notebook margin rule down the left */
.sheet::before{
  content:"";
  position:absolute;
  top:0; bottom:0;
  left:clamp(40px,7vw,86px);
  width:2px;
  background:linear-gradient(180deg, transparent 0, var(--margin-line) 6%, var(--margin-line) 94%, transparent 100%);
  opacity:.55;
}
/* punched holes */
.holes{
  position:absolute; left:clamp(14px,2.4vw,30px); top:0; bottom:0;
  width:18px;
  display:flex; flex-direction:column; justify-content:space-around;
  align-items:center; padding:60px 0;
  pointer-events:none;
}
.holes i{
  width:14px;height:14px;border-radius:50%;
  background:radial-gradient(circle at 38% 34%, #e7e0d0 0%, #ded6c4 55%, #cfc6b1 100%);
  box-shadow:inset 1px 1px 2px rgba(0,0,0,.18), 0 1px 0 rgba(255,255,255,.6);
}

/* =================== HEADER (handwriting) =================== */
.brief-head{
  position:relative; min-width:0;
  margin-bottom:6px;
}
.kicker{
  font-family:"Caveat",cursive;
  font-size:clamp(18px,2.1vw,23px);
  color:var(--ink-faint);
  letter-spacing:.5px;
  margin:0 0 2px;
  transform:rotate(-.6deg);
}
.greeting{
  font-family:"Caveat",cursive;
  font-weight:700;
  font-size:clamp(40px,6.6vw,78px);
  line-height:.98;
  margin:0;
  color:var(--ink);
  letter-spacing:.5px;
  display:flex; flex-wrap:wrap; align-items:baseline; gap:0 .35em;
  min-width:0;
}
.greeting .swoosh{ color:var(--accent); position:relative; white-space:nowrap;}
.greeting .swoosh::after{
  /* highlighter swipe kept INSIDE the word box (inset 0, not -2%) so the
     skewed pseudo does not bleed past and inflate the line's scrollWidth */
  content:""; position:absolute; left:0; right:0; bottom:.04em; height:.42em;
  background:var(--hl); z-index:-1; transform:rotate(-1.1deg) skewX(-9deg);
  border-radius:40% 60% 55% 45%;
  mix-blend-mode:multiply;
}
.dateline{
  font-family:"Caveat",cursive;
  font-size:clamp(20px,2.6vw,30px);
  color:var(--ink-soft);
  margin:6px 0 0;
  transform:rotate(-.4deg);
}
.dateline b{color:var(--accent);font-weight:600;}

/* the warm summary line, in a body-ish hand */
.summary{
  font-family:"Gloria Hallelujah",cursive;
  font-size:clamp(16px,2vw,22px);
  line-height:1.75;
  color:var(--ink);
  margin:18px 0 4px;
  max-width:46ch;
  min-width:0;
}
.summary .num{ color:var(--accent); font-weight:700; }

/* a little hand underline rule under the intro block */
.rule-svg{display:block;width:min(420px,86%);height:14px;margin:10px 0 30px;color:var(--accent-soft);}

/* =================== BODY GRID =================== */
.brief-body{
  display:grid;
  grid-template-columns:1.15fr .95fr;
  gap:clamp(22px,4vw,54px);
  align-items:start;
  min-width:0;
}
.col{min-width:0;}

.section-h{
  font-family:"Caveat",cursive;
  font-weight:700;
  font-size:clamp(24px,2.9vw,32px);
  color:var(--ink);
  margin:0 0 4px;
  display:flex; align-items:center; gap:.4em;
  transform:rotate(-.5deg);
}
.section-h svg{flex:0 0 auto;color:var(--accent);}
.section-sub{
  font-family:"Caveat",cursive;
  font-size:clamp(15px,1.7vw,18px);
  color:var(--ink-faint);
  margin:0 0 14px;
}

/* ---- hand-drawn bullet summary ---- */
.tally{
  list-style:none; margin:0; padding:0;
  display:grid; gap:13px;
}
.tally li{
  display:grid;
  grid-template-columns:30px 1fr auto;
  align-items:center;
  gap:12px;
  min-width:0;
  padding-bottom:11px;
  border-bottom:1.5px dashed var(--rule);
}
.tally li:last-child{border-bottom:0;padding-bottom:0;}
.mark{
  width:30px;height:30px;color:var(--accent);flex:0 0 auto;
}
.tally .label{
  font-family:"Shantell Sans",sans-serif;
  font-weight:500;
  font-size:clamp(14px,1.6vw,17px);
  color:var(--ink);
  min-width:0;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.tally .label small{
  display:block;
  font-family:"Caveat",cursive;
  font-weight:400;
  font-size:clamp(13px,1.5vw,16px);
  color:var(--ink-faint);
  white-space:normal;
  line-height:1.25;
  margin-top:-2px;
}
.tally .value{
  font-family:"Caveat",cursive;
  font-weight:700;
  font-size:clamp(26px,3.4vw,40px);
  color:var(--ink);
  line-height:1;
  white-space:nowrap;
}
.tally .value.accent{color:var(--accent);}
.tally .value .unit{
  font-family:"Shantell Sans",sans-serif;
  font-weight:500;
  font-size:.42em;
  color:var(--ink-faint);
  margin-left:2px;
}

/* ---- wobbly hand-drawn sparkline ---- */
.spark-card{
  margin-top:26px;
  border:2px solid var(--ink);
  border-radius:14px 12px 13px 11px / 11px 13px 12px 14px; /* irregular = hand-drawn box */
  padding:16px 18px 12px;
  position:relative;
  background:rgba(255,255,255,.28);
  min-width:0;
}
.spark-card .spark-h{
  font-family:"Caveat",cursive; font-weight:600;
  font-size:clamp(17px,1.9vw,21px); color:var(--ink-soft);
  margin:0 0 2px; display:flex; justify-content:space-between; align-items:baseline; gap:8px;
}
.spark-card .spark-h b{ color:var(--accent); font-weight:700; font-size:1.18em; white-space:nowrap;}
.spark-wrap{width:100%; min-width:0;}
.spark-svg{display:block; width:100%; height:auto;}
.spark-x{
  display:flex; justify-content:space-between;
  font-family:"Caveat",cursive; font-size:clamp(11px,1.3vw,14px);
  color:var(--ink-faint); margin-top:2px;
}

/* the sparkline draw-on path */
.spark-line{
  fill:none; stroke:var(--accent); stroke-width:2.4;
  stroke-linecap:round; stroke-linejoin:round;
}
.spark-dot{fill:var(--accent);}
.spark-dot.peak{fill:var(--ink);}
.spark-anim .spark-line{
  stroke-dasharray:var(--len); stroke-dashoffset:var(--len);
  animation:draw 1.6s .25s ease-out forwards;
}
.spark-anim .spark-dot{opacity:0;animation:pop .4s ease-out forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}
@keyframes pop{to{opacity:1;}}

/* ---- "what needs you" checklist ---- */
.todo{ list-style:none; margin:0; padding:0; display:grid; gap:16px; }
.todo li{
  display:grid;
  grid-template-columns:34px 1fr;
  gap:13px;
  align-items:start;
  min-width:0;
  background:rgba(255,255,255,.32);
  border:1.5px solid var(--rule);
  border-radius:10px 13px 9px 12px / 12px 9px 13px 10px;
  padding:13px 15px 14px;
  position:relative;
  transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.todo li:hover, .todo li:focus-within{
  transform:translateY(-2px) rotate(-.3deg);
  box-shadow:0 10px 22px -16px var(--paper-shadow);
  border-color:var(--accent-soft);
}
.checkbox{
  width:34px;height:34px;flex:0 0 auto;color:var(--ink);
  cursor:pointer; background:none; border:0; padding:0; display:block;
}
.checkbox:focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:6px;}
.checkbox .tick{stroke:var(--accent);stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none;
  stroke-dasharray:34;stroke-dashoffset:34;transition:stroke-dashoffset .35s ease;}
.todo li.done .checkbox .tick{stroke-dashoffset:0;}
.todo li.done .t-title{color:var(--ink-faint);text-decoration:line-through;text-decoration-color:var(--accent-soft);}
.t-body{min-width:0;}
.t-tag{
  display:inline-block;
  font-family:"Caveat",cursive; font-weight:700;
  font-size:clamp(12px,1.4vw,15px);
  color:#fff; background:var(--accent);
  padding:0 9px; border-radius:9px 11px 8px 10px / 10px 8px 11px 9px;
  transform:rotate(-1.2deg);
  margin-bottom:5px;
}
.t-tag.calm{ background:var(--ink-soft); }
.t-title{
  font-family:"Shantell Sans",sans-serif; font-weight:600;
  font-size:clamp(15px,1.8vw,18px); color:var(--ink);
  margin:0; line-height:1.4;
  overflow-wrap:anywhere;
}
.t-meta{
  font-family:"Caveat",cursive; font-size:clamp(14px,1.6vw,17px);
  color:var(--ink-soft); margin:3px 0 0; line-height:1.4;
  overflow-wrap:anywhere;
}
.t-meta b{color:var(--accent);font-weight:600;}

/* the small evidence thumbnail (clinic photo) tucked beside header on wide */
.photo-clip{
  position:absolute;
  top:clamp(8px,1.6vw,18px);
  right:clamp(8px,1.6vw,20px);
  width:clamp(108px,15vw,176px);
  aspect-ratio:4/3;
  transform:rotate(2.4deg);
  border:7px solid #fff;
  box-shadow:0 12px 26px -16px rgba(42,39,34,.6);
  border-radius:3px;
  overflow:hidden;
  z-index:3;
}
.photo-clip img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-clip figcaption{
  position:absolute; left:0;right:0;bottom:0;
  font-family:"Caveat",cursive; font-size:13px; text-align:center;
  background:rgba(255,255,255,.86); color:var(--ink-soft);
  padding:1px 4px;
}
/* the bit of tape on the photo */
.photo-clip::before{
  content:""; position:absolute; top:-16px; left:50%; transform:translateX(-50%) rotate(-3deg);
  width:62px; height:24px; background:rgba(236,217,192,.72);
  box-shadow:0 1px 4px rgba(0,0,0,.12);
  z-index:4;
}

/* sign-off */
.signoff{
  margin-top:clamp(26px,4vw,46px);
  padding-top:18px;
  border-top:1.5px dashed var(--rule);
  display:flex; flex-wrap:wrap; align-items:flex-end; gap:6px 18px;
  justify-content:space-between;
  min-width:0;
}
.signoff .from{
  font-family:"Gloria Hallelujah",cursive;
  font-size:clamp(14px,1.6vw,17px); color:var(--ink-soft); margin:0;
}
.signoff .sig{
  font-family:"Caveat",cursive; font-weight:700;
  font-size:clamp(30px,4vw,46px); color:var(--accent); line-height:.9;
  transform:rotate(-2deg);
}
.signoff .stamp{
  font-family:"Caveat",cursive; font-size:clamp(13px,1.5vw,16px);
  color:var(--ink-faint); border:1.5px solid var(--ink-faint);
  border-radius:50%; padding:6px 14px; transform:rotate(-7deg); white-space:nowrap;
}

/* ============ MOBILE ============ */
@media (max-width:760px){
  .sheet{
    padding:24px 18px 30px 46px;
    background:
      repeating-linear-gradient(to bottom,transparent 0,transparent 33px,var(--rule) 33px,var(--rule) 34px),
      linear-gradient(180deg,#fbf7ee 0%, #f7f3ea 100%);
  }
  .sheet::before{left:30px;}
  .holes{display:none;}
  .brief-body{grid-template-columns:1fr; gap:30px;}
  .photo-clip{
    position:static; width:min(220px,62%); margin:14px auto 4px;
    transform:rotate(-1.8deg); display:block;
  }
  .photo-clip::before{width:74px;}
  .greeting{font-size:clamp(38px,12vw,56px);}
  .summary{max-width:none;}
  .signoff{flex-direction:column; align-items:flex-start; gap:10px;}
}
@media (max-width:380px){
  .sheet{padding:20px 14px 26px 38px;}
  .sheet::before{left:24px;}
  .tally li{grid-template-columns:26px 1fr auto; gap:9px;}
}

/* accessibility: reduced motion -> show final state, no draw/anim */
@media (prefers-reduced-motion:reduce){
  *{animation:none !important; transition:none !important;}
  .spark-anim .spark-line{stroke-dashoffset:0 !important;}
  .spark-anim .spark-dot{opacity:1 !important;}
}
:focus-visible{outline:3px solid var(--accent);outline-offset:2px;}
</style>
</head>
<body>

<!-- paper grain -->
<svg class="grain" aria-hidden="true">
  <filter id="paperGrain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
  <rect width="100%" height="100%" filter="url(#paperGrain)"/>
</svg>

<div class="sheet-wrap">
  <article class="sheet" id="sheet">
    <div class="holes" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i></div>

    <!-- evidence photo (clinic) -->
    <figure class="photo-clip">
      <img src="../assets/flux-clinic-4k.png" alt="The clinic, quiet this morning" loading="lazy" decoding="async">
      <figcaption id="cap-clinic"></figcaption>
    </figure>

    <!-- ===== HEADER ===== -->
    <header class="brief-head">
      <p class="kicker" id="kicker"></p>

      <p class="summary" id="summary"></p>
      <svg class="rule-svg" viewBox="0 0 420 14" preserveAspectRatio="none" aria-hidden="true">
        <path d="M2 9 C 60 3, 120 12, 180 7 S 320 3, 418 8" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
    </header>

    <!-- ===== BODY ===== -->
    <div class="brief-body">

      <!-- LEFT: tally + sparkline -->
      <section class="col" aria-labelledby="h-summary">
        <h2 class="section-h" id="h-summary">
          <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true"><path d="M4 21 L9 6 L14 19 L19 9 L23 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="h-summary-text"></span>
        </h2>
        <p class="section-sub" id="summary-sub"></p>

        <ul class="tally" id="tally"></ul>

        <!-- wobbly sparkline -->
        <div class="spark-card">
          <p class="spark-h"><span id="spark-title"></span> <b id="spark-peak"></b></p>
          <div class="spark-wrap">
            <svg class="spark-svg" id="spark" viewBox="0 0 320 88" preserveAspectRatio="none" role="img" aria-labelledby="spark-desc">
              <desc id="spark-desc"></desc>
            </svg>
          </div>
          <div class="spark-x" id="spark-x"></div>
        </div>
      </section>

      <!-- RIGHT: what needs you -->
      <section class="col" aria-labelledby="h-todo">
        <h2 class="section-h" id="h-todo">
          <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true"><path d="M5 8 h13 M5 13 h13 M5 18 h8" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" fill="none"/><circle cx="21" cy="18.5" r="3.4" fill="none" stroke="currentColor" stroke-width="2.1"/></svg>
          <span id="h-todo-text"></span>
        </h2>
        <p class="section-sub" id="todo-sub"></p>
        <ul class="todo" id="todo"></ul>
      </section>

    </div><!-- /brief-body -->

    <!-- ===== SIGN OFF ===== -->
    <footer class="signoff">
      <div>
        <p class="from" id="from"></p>
        <p class="sig" id="sig"></p>
      </div>
      <span class="stamp" id="stamp"></span>
    </footer>

  </article>
</div>

<script>
/* =========================================================================
   DATA  -  edit everything below to repurpose this morning note.
   Numbers, copy, the tally rows, the sparkline series, and the handoffs
   all come from here. Nothing else needs touching.
   ========================================================================= */
const DATA = {

    { mark:"phone",  label:"สายโทรเข้า",  sub:"เสียง + LINE รวมกัน",    value:"34", unit:"สาย",  accent:false },
    { mark:"calendar",label:"จองคิวสำเร็จ", sub:"ยืนยันเข้าระบบแล้ว",     value:"9",  unit:"ราย",  accent:true  },
    { mark:"check",  label:"ปิดเองได้",   sub:"ไม่ต้องส่งต่อให้ทีม",     value:"28", unit:"เรื่อง",accent:false },
    { mark:"baht",   label:"มูลค่าคิวที่จองได้", sub:"ประเมินจากรายการรักษา", value:"฿42,300", unit:"", accent:true }
  ],

  spark: {
    heading:"สายเข้าตลอดวัน",
    peakLabel:"พีคช่วงเย็น",
    // 0..max relative values across the hours below
    series:[2,1,3,5,6,4,7,9,8,11,9,12],

    desc:"กราฟมือวาดแสดงจำนวนสายเข้าตลอดวัน พีคช่วงเย็น"

  todoHeading: "วันนี้รอคุณหมออยู่",
  todoSub: "2 เรื่องที่ยิ้มหวานส่งต่อให้ตัดสินใจ",
  todo: [
    {
      tag:"ด่วน", calm:false,

      meta:"คุณ {ศิริพร} โทรเข้า 21:40 น. ยิ้มหวานกันคิวเดิมไว้ให้แล้ว รอคุณหมอยืนยันเวลาใหม่"
    },
    {
      tag:"ขอความเห็น", calm:true,
      title:"คนไข้ถามค่าจัดฟันแบบใส อยากได้ตัวเลขจากคุณหมอเอง",
      meta:"คุณ {ธนกร} ทักทาง LINE 22:15 น. ยิ้มหวานตอบช่วงราคาคร่าว ๆ ไปก่อน ขอคุณหมอช่วยเคาะราคาจริง"
    }
  ],

  fromLine: "ดูแลสายและแชตให้ตลอดคืนแล้วค่ะ พักผ่อนให้เต็มที่นะคะ",
  signature: "- น้องยิ้มหวาน",
  stamp: "ตรวจครบ 100%"
};

/* =========================================================================
   RENDER  -  pure DOM, no deps.
   ========================================================================= */
(function(){
  const $ = id => document.getElementById(id);

  // helper: accent-wrap {x} tokens (summary uses the large .num accent span)
  const accentTokens = (str) =>
    str.replace(/\{([^}]+)\}/g, '<span class="num">$1</span>');
  // meta lines use a bold accent (the <b> in .t-meta) for {name} tokens
  const accentBold = (str) =>
    str.replace(/\{([^}]+)\}/g, '<b>$1</b>');

  // ---- header ----
  $('kicker').textContent = DATA.kicker;
  $('greeting').innerHTML = DATA.greetingPlain + ' <span class="swoosh">' + DATA.greetingAccent + '</span>';
  $('dateline').innerHTML = DATA.date.dayName + ' <b>' + DATA.date.full + '</b> &middot; ' + DATA.date.clock;
  $('summary').innerHTML = accentTokens(DATA.summary);
  $('cap-clinic').textContent = DATA.clinicCaption;

  // ---- section headings ----
  $('h-summary-text').textContent = DATA.tallyHeading;
  $('summary-sub').textContent = DATA.tallySub;
  $('h-todo-text').textContent = DATA.todoHeading;
  $('todo-sub').textContent = DATA.todoSub;

  // ---- hand-drawn mark icons (inline SVG, hex strokes only) ----
  const MARK = {
    phone:    '<svg class="mark" viewBox="0 0 30 30" aria-hidden="true"><path d="M7 6 C6 12 12 22 22 24 c2 .4 4-2 3-4 l-3-2 c-1-.6-2 0-2 1 -3-1-6-4-7-7 1 0 1.6-1 1-2 L11 5 C9 4 7.3 4.5 7 6 Z" fill="none" stroke="#b4654a" stroke-width="2" stroke-linejoin="round"/></svg>',
    calendar: '<svg class="mark" viewBox="0 0 30 30" aria-hidden="true"><rect x="5" y="7" width="20" height="18" rx="2.5" fill="none" stroke="#b4654a" stroke-width="2"/><path d="M5 12 h20 M10 4 v5 M20 4 v5" stroke="#b4654a" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M11 18 l3 3 5-6" stroke="#b4654a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>',
    check:    '<svg class="mark" viewBox="0 0 30 30" aria-hidden="true"><circle cx="15" cy="15" r="11" fill="none" stroke="#b4654a" stroke-width="2"/><path d="M9.5 15.5 l3.5 4 7-9" stroke="#b4654a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>',
    baht:     '<svg class="mark" viewBox="0 0 30 30" aria-hidden="true"><circle cx="15" cy="15" r="11" fill="none" stroke="#b4654a" stroke-width="2"/><path d="M12 9 v12 M15 9 v-2 M15 23 v-2 M12 9 h4 a3 3 0 0 1 0 6 h-4 M12 15 h5 a3 3 0 0 1 0 6 h-5" stroke="#b4654a" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>'
  };

  // ---- tally ----
  const tallyEl = $('tally');
  DATA.tally.forEach(row => {
    const li = document.createElement('li');
    li.innerHTML =
      (MARK[row.mark] || '') +
      '<span class="label">' + row.label +
        (row.sub ? '<small>' + row.sub + '</small>' : '') +
      '</span>' +
      '<span class="value' + (row.accent ? ' accent' : '') + '">' +
        row.value + (row.unit ? '<span class="unit">' + row.unit + '</span>' : '') +
      '</span>';
    tallyEl.appendChild(li);
  });

  // ---- wobbly sparkline ----
  (function buildSpark(){
    const S = DATA.spark;
    $('spark-title').textContent = S.heading;
    $('spark-peak').textContent = S.peakLabel;
    $('spark-desc').textContent = S.desc;
    $('spark-x').innerHTML = S.hours.map(h => '<span>' + h + '</span>').join('');

    const svg = $('spark');
    const W = 320, H = 88, padX = 8, padY = 12;
    const data = S.series;
    const max = Math.max.apply(null, data) || 1;
    const stepX = (W - padX * 2) / (data.length - 1);

    // small deterministic wobble so it looks hand-drawn but stable
    const wob = i => (Math.sin(i * 2.3) * 1.4) + (Math.cos(i * 1.1) * 1.1);

    const pts = data.map((v, i) => {
      const x = padX + i * stepX;
      const y = padY + (H - padY * 2) * (1 - v / max) + wob(i);
      return [x, y];
    });

    // smooth-ish hand path through points (Catmull-Rom -> bezier)
    let d = 'M ' + pts[0][0].toFixed(1) + ' ' + pts[0][1].toFixed(1);
    for (let i = 0; i < pts.length - 1; i++){
      const p0 = pts[i - 1] || pts[i];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[i + 2] || p2;
      const c1x = p1[0] + (p2[0] - p0[0]) / 6;
      const c1y = p1[1] + (p2[1] - p0[1]) / 6;
      const c2x = p2[0] - (p3[0] - p1[0]) / 6;
      const c2y = p2[1] - (p3[1] - p1[1]) / 6;
      d += ' C ' + c1x.toFixed(1) + ' ' + c1y.toFixed(1) + ', ' +
                   c2x.toFixed(1) + ' ' + c2y.toFixed(1) + ', ' +
                   p2[0].toFixed(1) + ' ' + p2[1].toFixed(1);
    }

    // faint baseline (notebook feel)
    const base = document.createElementNS('http://www.w3.org/2000/svg','path');
    base.setAttribute('d', 'M ' + padX + ' ' + (H - padY) + ' L ' + (W - padX) + ' ' + (H - padY));
    base.setAttribute('stroke', '#d9cfb8');
    base.setAttribute('stroke-width', '1.4');
    base.setAttribute('stroke-dasharray', '2 4');
    base.setAttribute('fill', 'none');
    svg.appendChild(base);

    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('class', 'spark-line');
    svg.appendChild(path);

    // dots
    const peakIdx = data.indexOf(max);
    pts.forEach((p, i) => {
      const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx', p[0].toFixed(1));
      c.setAttribute('cy', p[1].toFixed(1));
      c.setAttribute('r', i === peakIdx ? '3.4' : '2');
      c.setAttribute('class', 'spark-dot' + (i === peakIdx ? ' peak' : ''));
      c.style.animationDelay = (0.35 + i * 0.11) + 's';
      svg.appendChild(c);
    });

    // set draw length, enable animation only if motion allowed + in view
    const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    let len = 600;
    try { len = path.getTotalLength(); } catch(e){}
    svg.parentElement.style.setProperty('--len', Math.ceil(len));
    path.style.setProperty && path.style.setProperty('--len', Math.ceil(len));
    svg.style.setProperty('--len', Math.ceil(len));

    if (!reduce && 'IntersectionObserver' in window){
      const io = new IntersectionObserver((entries) => {
        entries.forEach(en => {
          if (en.isIntersecting){
            svg.classList.add('spark-anim');
            io.disconnect();
          }
        });
      }, { threshold: 0.4 });
      io.observe(svg);
    } else {
      svg.classList.add('spark-anim'); // CSS reduced-motion rule forces final state
    }
  })();

  // ---- todo / what needs you ----
  const todoEl = $('todo');
  DATA.todo.forEach((t, i) => {
    const li = document.createElement('li');
    const titleId = 'todo-t-' + i;
    li.innerHTML =
      '<button class="checkbox" type="button" aria-pressed="false" aria-labelledby="' + titleId + '">' +
        '<svg viewBox="0 0 34 34" aria-hidden="true">' +
          '<rect x="3" y="3" width="28" height="28" rx="6" fill="none" stroke="#2a2722" stroke-width="2.2"/>' +
          '<path class="tick" d="M9 17 l5 6 11 -14"/>' +
        '</svg>' +
      '</button>' +
      '<div class="t-body">' +
        '<span class="t-tag' + (t.calm ? ' calm' : '') + '">' + t.tag + '</span>' +
        '<p class="t-title" id="' + titleId + '">' + t.title + '</p>' +
        '<p class="t-meta">' + accentBold(t.meta) + '</p>' +
      '</div>';
    todoEl.appendChild(li);

    const btn = li.querySelector('.checkbox');
    btn.addEventListener('click', () => {
      const done = li.classList.toggle('done');
      btn.setAttribute('aria-pressed', done ? 'true' : 'false');
    });
  });

  // ---- sign off ----
  $('from').textContent = DATA.fromLine;
  $('sig').textContent = DATA.signature;
  $('stamp').textContent = DATA.stamp;
})();
</script>
</body>
</html>
