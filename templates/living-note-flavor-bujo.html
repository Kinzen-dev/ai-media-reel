<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yimwhan - Owner Page (bujo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:ital,wght@0,400;0,600;0,700;1,500&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     DATA - swap clinic content here. Everything below renders from this.
     ============================================================ */
  /* (data also mirrored in JS below for the rendered widgets) */

  :root{
    --cream:#f6f1e6;     /* dot-grid page */
    --ink:#2a2722;       /* ink */
    --teal:#3a8f86;      /* marker accent 1 */
    --coral:#e07a5f;     /* marker accent 2 */
    --washi-teal:rgba(58,143,134,0.20);
    --washi-coral:rgba(224,122,95,0.22);
    --washi-gold:rgba(214,176,90,0.28);
    --dot:rgba(42,39,34,0.16);
    --paper-edge:rgba(42,39,34,0.10);
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:"Nunito", system-ui, sans-serif;
    color:var(--ink);
    background:
      radial-gradient(var(--dot) 1.4px, transparent 1.6px) 0 0 / 22px 22px,
      linear-gradient(#f8f3e9, #f1ead9);
    background-attachment:fixed, fixed;
    min-height:100vh;
    overflow-x:hidden;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
  }

  .hand{ font-family:"Shantell Sans", "Nunito", cursive; }

  /* paper sheet */
  .page{
    max-width:1200px;
    margin:0 auto;
    padding:26px 30px 70px;
    position:relative;
  }
  @media (max-width:640px){ .page{ padding:18px 16px 56px; } }

  /* a subtle wobble filter applied to hand-drawn frames */
  .wobble{ filter:url(#wob); }

  /* ---------- BANNER HEADER ---------- */
  .banner{
    position:relative;
    margin:6px 0 22px;
    min-width:0;
  }
  .banner svg{ display:block; width:100%; height:auto; }
  .banner .banner-text{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    padding:0 16px;
    min-width:0;
  }
  .banner h1{
    font-family:"Shantell Sans", cursive;
    font-weight:700;
    color:var(--cream);
    margin:0;
    font-size:clamp(26px, 4.6vw, 52px);
    line-height:1.02;
    letter-spacing:0.2px;
    text-shadow:1px 2px 0 rgba(42,39,34,0.35);
    max-width:100%;
    overflow-wrap:break-word;
  }
  .banner .sub{
    font-family:"Shantell Sans", cursive;
    color:#fdf6e9; font-weight:500;
    font-size:clamp(12px,1.5vw,17px);
    margin-top:6px;
    opacity:0.95;
    max-width:100%;
    overflow-wrap:break-word;
  }
  /* on phones the ribbon SVG squashes short (preserveAspectRatio:none); give the banner a
     min-height and let the ribbon stretch to fill it so the title + sub never clip/overflow */
  @media (max-width:640px){
    .banner{ min-height:104px; }
    .banner svg{ height:100%; min-height:104px; position:absolute; inset:0; }
    .banner .washi{ top:-14px; height:20px; width:74px; }
    .banner h1{ font-size:clamp(24px,7vw,38px); }
    .banner .sub{ font-size:clamp(12px,3.4vw,15px); }
  }

  /* washi tape strip helper. ragged ends are a clip-path on the element itself (kept
     inside its own box) so the torn-tape look survives without overflowing the parent. */
  .washi{
    position:absolute; height:26px; width:120px;
    max-width:100%;
    background:var(--washi-teal);
    box-shadow:0 1px 2px rgba(42,39,34,0.12);
    z-index:3;
    background-image:repeating-linear-gradient(90deg, rgba(255,255,255,0.18) 0 6px, transparent 6px 12px);
    clip-path:polygon(
      0 12%, 4px 0, 0 26%, 5px 40%, 0 56%, 4px 72%, 0 88%, 5px 100%,
      calc(100% - 5px) 100%, 100% 88%, calc(100% - 4px) 72%, 100% 56%,
      calc(100% - 5px) 40%, 100% 26%, calc(100% - 4px) 0, 100% 12%
    );
  }
  .washi.coral{ background-color:var(--washi-coral); }
  .washi.gold{ background-color:var(--washi-gold); }

  /* ---------- LAYOUT ---------- */
  .grid{
    display:grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap:20px;
    align-items:start;
  }
  .span-2{ grid-column: span 2; }
  .span-3{ grid-column: 1 / -1; }
  @media (max-width:980px){
    .grid{ grid-template-columns:1fr 1fr; }
    .span-2{ grid-column: span 2; }
  }
  @media (max-width:640px){
    .grid{ grid-template-columns:1fr; gap:16px; }
    .span-2,.span-3{ grid-column: 1 / -1; }
  }

  /* hand-drawn box card: an inline-SVG frame + content overlay */
  .box{
    position:relative;
    min-width:0;
    padding:18px 18px 16px;
  }
  .box > .frame{
    position:absolute; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:0;
  }
  .box > .frame svg{ width:100%; height:100%; display:block; }
  .box > .inner{ position:relative; z-index:1; min-width:0; }

  .box-title{
    font-family:"Shantell Sans", cursive;
    font-weight:700; font-size:15px;
    display:flex; align-items:center; gap:8px;
    margin:0 0 10px;
    min-width:0;
  }
  .box-title .dot-ic{ flex:0 0 auto; }
  .box-title .label{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* KPI */
  .kpi-row{ }
  .kpi-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  @media (max-width:640px){ .kpi-grid{ grid-template-columns:1fr 1fr; gap:12px; } }
  @media (max-width:380px){ .kpi-grid{ grid-template-columns:1fr; } }

  .kpi{
    position:relative; min-width:0;
    padding:14px 14px 12px;
  }
  .kpi .frame{ position:absolute; inset:0; z-index:0; }
  .kpi .frame svg{ width:100%; height:100%; display:block; }
  .kpi .k-inner{ position:relative; z-index:1; min-width:0; }
  .kpi .k-top{ display:flex; align-items:center; gap:9px; min-width:0; }
  .kpi .k-icon{ flex:0 0 auto; }
  .kpi .k-name{
    font-family:"Shantell Sans", cursive; font-weight:600;
    font-size:13px; color:#5a544a;
    min-width:0; overflow-wrap:break-word; word-break:break-word;
  }
  .kpi .k-val{
    font-family:"Shantell Sans", cursive; font-weight:700;
    font-size:clamp(26px,3.4vw,38px); line-height:1.05;
    margin-top:6px;
    overflow-wrap:break-word;
  }
  .kpi .k-delta{
    font-family:"Nunito"; font-weight:700; font-size:12px;
    margin-top:2px;
    display:inline-flex; align-items:center; gap:4px;
  }
  .up{ color:var(--teal); }
  .down{ color:var(--coral); }

  /* tracker */
  .tracker-wrap{ overflow-x:auto; }
  .tracker{ width:100%; min-width:280px; }
  .legend-tracker{
    display:flex; flex-wrap:wrap; gap:14px;
    font-family:"Nunito"; font-weight:600; font-size:12px;
    margin-top:10px; color:#5a544a;
  }
  .legend-tracker .sw{ display:inline-flex; align-items:center; gap:6px; }
  .legend-tracker i{ width:13px; height:13px; border-radius:3px; display:inline-block; }

  /* split */
  .split-flex{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .split-flex .pie-wrap{ flex:0 0 auto; }
  .split-flex .pie-key{ flex:1 1 130px; min-width:0; }
  .split-flex .pie-key .row{
    display:flex; align-items:center; gap:8px;
    font-family:"Nunito"; font-weight:600; font-size:13px;
    margin-bottom:8px; min-width:0;
  }
  .split-flex .pie-key .sw{ width:14px; height:14px; border-radius:4px; flex:0 0 auto; }
  .split-flex .pie-key .nm{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1 1 auto; min-width:0; }
  .split-flex .pie-key .pc{ font-weight:800; flex:0 0 auto; }

  /* rapid-log checklist */
  .rlist{ list-style:none; margin:0; padding:0; }
  .rlist li{
    display:flex; align-items:flex-start; gap:11px;
    padding:9px 4px;
    border-bottom:1px dashed rgba(42,39,34,0.16);
    min-width:0;
  }
  .rlist li:last-child{ border-bottom:none; }
  .rlist .sig{ flex:0 0 auto; margin-top:1px; }
  .rlist .txt{ min-width:0; flex:1 1 auto; }
  .rlist .lead{
    font-family:"Shantell Sans", cursive; font-weight:600;
    font-size:15px; line-height:1.25;
    overflow-wrap:break-word;
  }
  .rlist .meta{
    font-family:"Nunito"; font-size:12px; color:#7a7468; font-weight:600;
    margin-top:2px;
    overflow-wrap:break-word;
  }
  .rlist .done .lead{ text-decoration:line-through; color:#9a948a; }
  .pri-tag{
    font-family:"Shantell Sans", cursive; font-weight:700; font-size:11px;
    color:var(--coral); margin-left:6px;
  }

  /* KEY / legend block */
  .key-grid{
    display:grid; grid-template-columns:1fr 1fr; gap:10px 18px;
  }
  @media (max-width:640px){ .key-grid{ grid-template-columns:1fr 1fr; } }
  .key-grid .ki{
    display:flex; align-items:center; gap:10px;
    font-family:"Nunito"; font-weight:600; font-size:13px;
    min-width:0;
  }
  .key-grid .ki .kt{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* doodle note line */
  .scribble{
    font-family:"Shantell Sans", cursive; font-style:italic;
    font-weight:500; color:#7a7468; font-size:14px;
    margin:4px 0 0;
  }

  /* footer */
  .foot{
    margin-top:26px; text-align:center;
    font-family:"Shantell Sans", cursive; color:#8a8478;
    font-size:13px;
  }

  /* focus visibility */
  a:focus-visible, button:focus-visible, li:focus-visible{
    outline:3px solid var(--coral); outline-offset:3px; border-radius:6px;
  }

  /* tiny doodle floats */
  .doodle{ position:absolute; pointer-events:none; z-index:2; }

  @media (prefers-reduced-motion: reduce){
    .pencil{ animation:none !important; }
    *{ transition:none !important; }
  }

  /* draw-in of tracker bars (honored, light) */
  .growbar{ transform-origin:bottom center; }
  @media (prefers-reduced-motion: no-preference){
    .growbar{ animation:grow 0.7s cubic-bezier(.2,.7,.3,1) both; }
    @keyframes grow{ from{ transform:scaleY(0.04); } to{ transform:scaleY(1); } }
  }
</style>
</head>
<body>

<!-- ===== shared SVG defs: wobble + hand-drawn filters ===== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="wob" x="-4%" y="-12%" width="108%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="wob2" x="-6%" y="-10%" width="112%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.03" numOctaves="2" seed="19" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="1.8" xChannelSelector="R" yChannelSelector="G"/>

  </defs>
</svg>

<main class="page">

  <!-- ================= BANNER HEADER ================= -->
  <header class="banner" id="banner">
    <span class="washi" style="left:8%; top:-8px; transform:rotate(-5deg);"></span>
    <span class="washi coral" style="right:10%; top:-6px; transform:rotate(4deg); width:96px;"></span>
    <svg viewBox="0 0 1000 150" preserveAspectRatio="none" class="wobble" role="img" aria-label="Yimwhan clinic owner page banner">
      <!-- ribbon banner shape in teal marker -->
      <path d="M40 28 L960 28 L975 75 L960 122 L40 122 L25 75 Z" fill="#3a8f86"/>
      <!-- ribbon tails -->
      <path d="M25 75 L5 55 L18 75 L5 95 Z" fill="#2f7269"/>
      <path d="M975 75 L995 55 L982 75 L995 95 Z" fill="#2f7269"/>
      <!-- hand stitch border -->
      <path d="M52 40 L948 40 M52 110 L948 110" stroke="#fdf6e9" stroke-width="2.2" stroke-dasharray="2 9" stroke-linecap="round" opacity="0.85"/>

    <div class="banner-text">
      <h1 id="b-title">Yimwhan</h1>

  <!-- handwritten intro note line -->
  <p class="scribble" id="intro" style="margin:0 0 18px; padding-left:6px;"></p>

  <!-- ================= ROW 1: KPI BOXES + KEY ================= -->
  <section class="grid" style="margin-bottom:22px;">

    <!-- KPI cluster -->
    <div class="box span-2 kpi-row">
      <div class="frame"><svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <rect x="2" y="2" width="96" height="96" rx="5" fill="#fffdf6" stroke="#2a2722" stroke-width="0.8" filter="url(#wob2)"/>
      </svg></div>
      <div class="inner">
        <h2 class="box-title hand"><span class="dot-ic" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="4.5" fill="#2a2722"/></svg>
        </span><span class="label">the numbers today</span></h2>
        <div class="kpi-grid" id="kpiGrid"></div>
      </div>
    </div>

    <!-- KEY / legend -->
    <div class="box">
      <div class="frame"><svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <rect x="2" y="2" width="96" height="96" rx="5" fill="#fbf6ea" stroke="#e07a5f" stroke-width="0.9" stroke-dasharray="3 2.5" filter="url(#wob2)"/>
      </svg></div>
      <div class="inner">
        <span class="washi gold" style="left:16px; top:-13px; width:84px; height:22px; transform:rotate(-3deg);"></span>
        <h2 class="box-title hand"><span class="dot-ic" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 8h10" stroke="#e07a5f" stroke-width="2.4" stroke-linecap="round"/></svg>
        </span><span class="label">key / legend</span></h2>
        <div class="key-grid" id="keyGrid"></div>
      </div>
    </div>
  </section>

  <!-- ================= ROW 2: TRACKER + SPLIT ================= -->
  <section class="grid" style="margin-bottom:22px;">

    <!-- weekly tracker (span 2) -->
    <div class="box span-2">
      <div class="frame"><svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <rect x="2" y="2" width="96" height="96" rx="5" fill="#fffdf6" stroke="#2a2722" stroke-width="0.8" filter="url(#wob2)"/>
      </svg></div>
      <div class="inner">
        <span class="washi" style="right:18px; top:-12px; width:90px; height:22px; transform:rotate(3deg);"></span>
        <h2 class="box-title hand"><span class="dot-ic" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M3 14 L7 8 L10 11 L15 4" stroke="#3a8f86" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span><span class="label">this week tracker - calls + bookings</span></h2>
        <div class="tracker-wrap">
          <svg class="tracker" id="trackerSvg" viewBox="0 0 560 230" role="img" aria-label="Weekly calls and bookings bar tracker" data-lint-ignore></svg>
        </div>
        <div class="legend-tracker">
          <span class="sw"><i style="background:#3a8f86"></i> calls</span>
          <span class="sw"><i style="background:#e07a5f"></i> bookings</span>
        </div>
      </div>
    </div>

    <!-- Voice vs LINE split pie -->
    <div class="box">
      <div class="frame"><svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <rect x="2" y="2" width="96" height="96" rx="5" fill="#fffdf6" stroke="#2a2722" stroke-width="0.8" filter="url(#wob2)"/>
      </svg></div>
      <div class="inner">
        <h2 class="box-title hand"><span class="dot-ic" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="5" fill="none" stroke="#2a2722" stroke-width="1.6"/><path d="M8 8 L8 3 A5 5 0 0 1 12.5 9 Z" fill="#3a8f86"/></svg>
        </span><span class="label">channels</span></h2>
        <div class="split-flex">
          <div class="pie-wrap">
            <svg width="150" height="150" viewBox="0 0 150 150" id="pieSvg" role="img" aria-label="Voice versus LINE channel split"></svg>
          </div>
          <div class="pie-key" id="pieKey"></div>

      </div>
    </div>
  </section>

  <!-- ================= ROW 3: RAPID-LOG CHECKLIST ================= -->
  <section class="grid">
    <div class="box span-3">
      <div class="frame"><svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <rect x="2" y="2" width="96" height="96" rx="5" fill="#fffdf6" stroke="#e07a5f" stroke-width="1" filter="url(#wob2)"/>
      </svg></div>
      <div class="inner">
        <span class="washi coral" style="left:20px; top:-13px; width:110px; height:24px; transform:rotate(-2deg);"></span>
        <h2 class="box-title hand"><span class="dot-ic" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 18 18"><path d="M9 2 L11 6.6 L16 7 L12.2 10.3 L13.4 15 L9 12.4 L4.6 15 L5.8 10.3 L2 7 L7 6.6 Z" fill="#e07a5f"/></svg>
        </span><span class="label">needs a look - handoffs &amp; flags</span></h2>

  <p class="foot hand">n. yimwhan ai page // logged daily // tap a star to clear it</p>

</main>

<script>
/* ============================================================
   DATA - edit here to swap clinic content. All widgets render from this.
   ============================================================ */
const DATA = {
  clinic: "Yimwhan",
  banner: "today at a glance",
  date: "Tue 30 Jun",
  intro: "morning ! ai handled the line overnight. here is how the clinic ran today.",

  // KPI boxes - icon is a tiny doodle keyword
  kpis: [
    { name:"Calls handled", value:"148", delta:"+12%", up:true,  icon:"phone" },
    { name:"Bookings made", value:"63",  delta:"+9%",  up:true,  icon:"cal" },
    { name:"AI-resolved",   value:"82%", delta:"+4pt", up:true,  icon:"spark" },
    { name:"Avg response",  value:"9s",  delta:"-3s",  up:true,  icon:"clock" }
  ],

  // weekly tracker - calls + bookings per day
  week: [
    { d:"Mon", calls:120, books:48 },
    { d:"Tue", calls:148, books:63 },
    { d:"Wed", calls:96,  books:39 },
    { d:"Thu", calls:134, books:55 },
    { d:"Fri", calls:162, books:71 },
    { d:"Sat", calls:88,  books:34 },
    { d:"Sun", calls:54,  books:21 }
  ],

  // channel split
  channels: [
    { name:"Voice line", pct:58, color:"#3a8f86" },
    { name:"LINE OA",    pct:42, color:"#e07a5f" }
  ],

  // rapid-log: type drives the signifier. priority adds a star.
  log: [
    { type:"task", priority:true,  done:false, lead:"Call back คุณมาลี - asked for Dr. Anan",  meta:"handoff 08:42 // voice // wants Thu slot" },
    { type:"task", priority:true,  done:false, lead:"Refund question escalated to front desk", meta:"handoff 09:15 // LINE // AI could not confirm policy" },
    { type:"task", priority:false, done:false, lead:"3 callers asked about night opening hours", meta:"note // maybe update the greeting" },
    { type:"note", priority:false, done:false, lead:"Whitening promo drove most new bookings",   meta:"note // 14 of 63 today" },
    { type:"task", priority:false, done:true,  lead:"Confirmed double-booking on Wed 3pm",       meta:"resolved 10:02 // moved to 4pm" }
  ],

  // key / legend - signifier meanings
  key: [
    { sig:"dot",   text:"task / to do" },
    { sig:"dash",  text:"note" },
    { sig:"star",  text:"priority" },
    { sig:"check", text:"done" }
  ]
};

/* ---------- tiny SVG signifier builders ---------- */
function sig(kind, size){
  size = size || 18;
  const s = size, c = s/2;
  switch(kind){
    case "dot":   return `<svg width="${s}" height="${s}" viewBox="0 0 18 18" aria-hidden="true"><circle cx="9" cy="9" r="4.4" fill="#2a2722"/></svg>`;
    case "dash":  return `<svg width="${s}" height="${s}" viewBox="0 0 18 18" aria-hidden="true"><path d="M3 9 h12" stroke="#3a8f86" stroke-width="2.6" stroke-linecap="round"/></svg>`;
    case "star":  return `<svg width="${s}" height="${s}" viewBox="0 0 18 18" aria-hidden="true"><path d="M9 2 L11 6.6 L16 7 L12.2 10.3 L13.4 15 L9 12.4 L4.6 15 L5.8 10.3 L2 7 L7 6.6 Z" fill="#e07a5f"/></svg>`;
    case "check": return `<svg width="${s}" height="${s}" viewBox="0 0 18 18" aria-hidden="true"><path d="M2.5 9.5 L7 14 L15.5 3.5" stroke="#3a8f86" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }
  return "";
}

/* ---------- doodle KPI icons ---------- */
function kicon(kind){
  const wrap = (inner)=>`<svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true">${inner}</svg>`;
  switch(kind){
    case "phone": return wrap(`<path d="M6 5 q-1 3 1.5 7.5 T17 21 q3 1 4-2 l-2.5-2.5 -3 1.5 q-3-2 -5-5 l1.5-3 L11 7.5 Z" fill="none" stroke="#3a8f86" stroke-width="1.8" stroke-linejoin="round"/>`);
    case "cal":   return wrap(`<rect x="4" y="6" width="18" height="15" rx="2" fill="none" stroke="#e07a5f" stroke-width="1.8"/><path d="M4 10 h18 M8 4 v4 M18 4 v4" stroke="#e07a5f" stroke-width="1.8" stroke-linecap="round"/>`);
    case "spark": return wrap(`<path d="M13 3 L15 10 L22 12 L15 14 L13 21 L11 14 L4 12 L11 10 Z" fill="none" stroke="#3a8f86" stroke-width="1.6" stroke-linejoin="round"/>`);
    case "clock": return wrap(`<circle cx="13" cy="13" r="9" fill="none" stroke="#e07a5f" stroke-width="1.8"/><path d="M13 8 v5 l4 2" stroke="#e07a5f" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`);
  }
  return "";
}

/* ---------- hand-drawn box outline used per KPI ---------- */

/* WEEKLY TRACKER - hand-drawn dotted grid + paired bars */
(function(){
  const svg = document.getElementById("trackerSvg");
  const W=560,H=230, padL=34, padR=10, padT=14, padB=34;
  const plotH = H-padT-padB, plotW = W-padL-padR;
  const max = Math.max(...DATA.week.flatMap(d=>[d.calls,d.books]));
  const top = Math.ceil(max/40)*40;
  const n = DATA.week.length;
  const slot = plotW/n;
  const bw = Math.min(15, slot*0.26);
  let out = "";

  // dotted gridlines (bujo dot-grid feel) + axis labels
  const lines=4;
  for(let i=0;i<=lines;i++){
    const val = top*i/lines;
    const y = padT+plotH - (val/top)*plotH;
    out += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#2a2722" stroke-width="1" stroke-dasharray="1.5 7" opacity="0.28"/>`;
    out += `<text x="${padL-6}" y="${(y+4).toFixed(1)}" text-anchor="end" font-family="Nunito" font-weight="700" font-size="11" fill="#8a8478">${val}</text>`;
  }
  // hand-drawn baseline
  out += `<path d="M${padL} ${padT+plotH} L${W-padR} ${padT+plotH}" stroke="#2a2722" stroke-width="2" stroke-linecap="round" opacity="0.65" filter="url(#wob2)"/>`;

  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  DATA.week.forEach((d,i)=>{
    const cx = padL + slot*i + slot/2;
    const hC = (d.calls/top)*plotH;
    const hB = (d.books/top)*plotH;
    const xC = cx - bw - 2;
    const xB = cx + 2;
    const yC = padT+plotH - hC;
    const yB = padT+plotH - hB;
    const cls = reduce ? "" : "growbar";
    const delay = (i*0.06).toFixed(2);
    // calls bar (teal) - sketchy: rect + a hand stroke top
    out += `<g class="${cls}" style="animation-delay:${delay}s">
      <rect x="${xC.toFixed(1)}" y="${yC.toFixed(1)}" width="${bw}" height="${hC.toFixed(1)}" rx="2" fill="#3a8f86" filter="url(#wob2)"/>
      <rect x="${xC.toFixed(1)}" y="${yC.toFixed(1)}" width="${bw}" height="${hC.toFixed(1)}" rx="2" fill="none" stroke="#2f7269" stroke-width="1.1"/>
    </g>`;
    // bookings bar (coral)
    out += `<g class="${cls}" style="animation-delay:${(delay)}s">
      <rect x="${xB.toFixed(1)}" y="${yB.toFixed(1)}" width="${bw}" height="${hB.toFixed(1)}" rx="2" fill="#e07a5f" filter="url(#wob2)"/>
      <rect x="${xB.toFixed(1)}" y="${yB.toFixed(1)}" width="${bw}" height="${hB.toFixed(1)}" rx="2" fill="none" stroke="#c25e44" stroke-width="1.1"/>
    </g>`;
    // day label
    out += `<text x="${cx.toFixed(1)}" y="${H-12}" text-anchor="middle" font-family="Shantell Sans, cursive" font-weight="600" font-size="13" fill="#5a544a">${d.d}</text>`;
  });

  svg.innerHTML = out;
})();

/* CHANNEL PIE - hand-drawn donut */
(function(){
  const svg = document.getElementById("pieSvg");
  const cx=75,cy=75,r=56,ir=30;
  let a0 = -Math.PI/2;
  const tot = DATA.channels.reduce((s,c)=>s+c.pct,0);
  let out="";
  DATA.channels.forEach(c=>{
    const ang = (c.pct/tot)*Math.PI*2;
    const a1 = a0+ang;
    const large = ang>Math.PI?1:0;
    const x0=cx+r*Math.cos(a0), y0=cy+r*Math.sin(a0);
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const xi0=cx+ir*Math.cos(a1), yi0=cy+ir*Math.sin(a1);
    const xi1=cx+ir*Math.cos(a0), yi1=cy+ir*Math.sin(a0);
    out += `<path d="M${x0.toFixed(1)} ${y0.toFixed(1)} A${r} ${r} 0 ${large} 1 ${x1.toFixed(1)} ${y1.toFixed(1)} L${xi0.toFixed(1)} ${yi0.toFixed(1)} A${ir} ${ir} 0 ${large} 0 ${xi1.toFixed(1)} ${yi1.toFixed(1)} Z" fill="${c.color}" stroke="#2a2722" stroke-width="1.4" stroke-linejoin="round" filter="url(#wob2)"/>`;
    a0=a1;
  });
  // center scribble
  out += `<text x="${cx}" y="${cy-2}" text-anchor="middle" font-family="Shantell Sans, cursive" font-weight="700" font-size="15" fill="#2a2722">mix</text>`;
  out += `<text x="${cx}" y="${cy+14}" text-anchor="middle" font-family="Nunito" font-weight="700" font-size="10" fill="#8a8478">today</text>`;
  svg.innerHTML = out;

  document.getElementById("pieKey").innerHTML = DATA.channels.map(c=>`
    <div class="row"><span class="sw" style="background:${c.color}"></span><span class="nm">${c.name}</span><span class="pc">${c.pct}%</span></div>`).join("");
})();

/* RAPID-LOG CHECKLIST */
(function(){
  const ul = document.getElementById("rlist");
  function sigFor(item){
    if(item.done) return "check";
    return item.type==="note" ? "dash" : "task-box";
  }
  // a hand-drawn empty checkbox for open tasks
  function box(){
    return `<svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><rect x="2" y="2" width="14" height="14" rx="2.5" fill="none" stroke="#2a2722" stroke-width="1.6" filter="url(#wob2)"/></svg>`;
  }
  function signifier(item){
    if(item.done) return sig("check",18);
    if(item.type==="note") return sig("dash",18);
    return box();
  }
  ul.innerHTML = DATA.log.map((item,idx)=>`
    <li class="${item.done?'done':''}" tabindex="0" data-idx="${idx}" ${item.priority&&!item.done?'aria-label="priority handoff"':''}>
      <span class="sig">${signifier(item)}</span>
      <span class="txt">
        <span class="lead">${item.lead}${item.priority&&!item.done?'<span class="pri-tag">&#9733; priority</span>':''}</span>
        <span class="meta">${item.meta}</span>
      </span>
    </li>`).join("");

  // toggle done on click/Enter (rapid-log "x out")
  ul.addEventListener("click", e=>{ const li=e.target.closest("li[data-idx]"); if(li) toggle(li); });
  ul.addEventListener("keydown", e=>{
    if(e.key==="Enter"||e.key===" "){ const li=e.target.closest("li[data-idx]"); if(li){ e.preventDefault(); toggle(li); } }
  });
  function toggle(li){
    const i = +li.dataset.idx;
    DATA.log[i].done = !DATA.log[i].done;
    if(DATA.log[i].done) DATA.log[i].priority = false;
    // re-render this li only
    const item = DATA.log[i];
    li.className = item.done?"done":"";
    li.querySelector(".sig").innerHTML = signifier(item);
    const lead = li.querySelector(".lead");
    lead.innerHTML = item.lead + (item.priority&&!item.done?'<span class="pri-tag">&#9733; priority</span>':'');
  }
})();
</script>
