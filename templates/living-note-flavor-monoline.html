<!-- TEMPLATE: Living Note Monoline | ARCHETYPE: living-note-flavor-monoline | REF: minimal monoline single-ink line-art, ultra-clean, maximal whitespace | WHEN TO USE: the calmest most restrained owner dashboard flavor - off-white field, one charcoal ink, hairline hand-drawn strokes, large light KPI numbers | SWAP: edit the DATA object at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yimwhan - a quiet note on today</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500&family=Inter:wght@200;300;400&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   LIVING NOTE - minimal monoline ink
   One off-white field (#faf8f3). One charcoal ink (#2c2a26).
   One muted accent dot (#c0653f) on the single key figure.
   Everything else: hairline 1.4px hand-drawn monoline SVG,
   no fills, no second colour. Maximal whitespace.
   Caveat (handwriting) + Inter Light (clean sans).
   ============================================================ */

:root{
  --paper:#faf8f3;
  --ink:#2c2a26;
  --ink-soft:#6b6760;
  --ink-faint:#a8a39a;
  --accent:#c0653f;      /* the single tiny accent, used ONCE */
  --hair:#2c2a26;        /* stroke colour for monoline */
  --rule:#e2ddd2;        /* faint paper rule */
  --maxw:1180px;
}

*{box-sizing:border-box;}
*,*::before,*::after{min-width:0;}

html{-webkit-text-size-adjust:100%;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-weight:300;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}

/* very subtle paper grain via SVG turbulence, behind everything */
.grain{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  opacity:.4;
  mix-blend-mode:multiply;
}

.wrap{
  position:relative;
  z-index:1;
  max-width:var(--maxw);
  margin:0 auto;
  padding:clamp(28px,6vw,86px) clamp(22px,5vw,72px) 96px;
}

/* ---- thin handwritten header ---- */
.masthead{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  gap:24px;
  flex-wrap:wrap;
  padding-bottom:22px;
  border-bottom:1px solid var(--rule);
}
.brand{
  display:flex;
  align-items:baseline;
  gap:14px;
  flex-wrap:wrap;
}
.brand .mark{
  font-family:"Caveat",cursive;
  font-weight:500;
  font-size:clamp(34px,5vw,52px);
  line-height:.9;
  letter-spacing:.5px;
}
.brand .sub{
  font-family:"Inter";
  font-weight:300;
  font-size:13px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--ink-faint);
}
.dateline{
  text-align:right;
  font-family:"Caveat",cursive;
  font-size:clamp(20px,2.6vw,27px);
  color:var(--ink-soft);
  line-height:1.15;
  max-width:100%;
}
.dateline small{
  display:block;
  font-family:"Inter";
  font-weight:300;
  font-size:11px;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:var(--ink-faint);
  margin-top:4px;
}

/* a single hand-drawn underline rule under the masthead */
.underrule{display:block;width:100%;height:14px;margin-top:-1px;color:var(--hair);}

/* ---- KPI row: large light numbers + hairline sparklines ---- */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:clamp(22px,3.2vw,52px);
  margin-top:clamp(40px,6vw,76px);
}
.kpi{display:flex;flex-direction:column;gap:14px;min-width:0;}
.kpi .label{
  font-family:"Inter";
  font-weight:300;
  font-size:12px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--ink-faint);
}
.kpi .figure{
  font-family:"Inter";
  font-weight:200;
  font-size:clamp(46px,7vw,82px);
  line-height:.92;
  letter-spacing:-.02em;
  font-variant-numeric:tabular-nums;
  display:flex;
  align-items:baseline;
  gap:3px;
  white-space:nowrap;
}
.kpi .figure .unit{
  font-size:.34em;
  font-weight:300;
  color:var(--ink-soft);
  letter-spacing:0;
}
.kpi.key .figure{position:relative;}
/* the ONE accent dot - sits on the single key figure */
.kpi.key .figure::after{
  content:"";
  width:9px;height:9px;border-radius:50%;
  background:var(--accent);
  display:inline-block;
  margin-left:9px;
  align-self:center;
  flex:0 0 auto;
}
.kpi .delta{
  font-family:"Caveat",cursive;
  font-size:19px;
  color:var(--ink-soft);
  line-height:1;
}
.kpi .spark{display:block;width:100%;height:34px;color:var(--hair);}

/* ---- the single thin trend line ---- */
.trend{
  margin-top:clamp(54px,8vw,104px);
  padding-top:clamp(30px,4vw,46px);
  border-top:1px solid var(--rule);
}
.trend .cap{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
.trend .cap h2{
  margin:0;
  font-family:"Caveat",cursive;
  font-weight:500;
  font-size:clamp(26px,3.4vw,38px);
  font-weight:500;
  line-height:1;
}
.trend .cap .note{
  font-family:"Inter";
  font-weight:300;
  font-size:13px;
  color:var(--ink-faint);
  letter-spacing:.02em;
}
.trendwrap{position:relative;width:100%;}
.trendsvg{display:block;width:100%;height:clamp(170px,26vw,250px);color:var(--hair);overflow:visible;}
.trend-legend{
  display:flex;
  gap:28px;
  margin-top:14px;
  flex-wrap:wrap;
}
.trend-legend span{
  display:inline-flex;
  align-items:center;
  gap:9px;
  font-family:"Inter";
  font-weight:300;
  font-size:12.5px;
  color:var(--ink-soft);
  letter-spacing:.04em;
}
.trend-legend .swatch{display:inline-block;width:26px;height:0;border-top:1.4px solid var(--ink);}
.trend-legend .swatch.dash{border-top-style:dashed;}

/* ---- lower band: split ring + needs-a-look list ---- */
.lower{
  display:grid;
  grid-template-columns:minmax(0,300px) 1fr;
  gap:clamp(34px,5vw,80px);
  margin-top:clamp(54px,8vw,104px);
  padding-top:clamp(30px,4vw,46px);
  border-top:1px solid var(--rule);
  align-items:start;
}
.split{display:flex;flex-direction:column;gap:18px;align-items:flex-start;}
.split h3,.looklist h3{
  margin:0;
  font-family:"Inter";
  font-weight:300;
  font-size:12px;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--ink-faint);
}
.ringwrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap;}
.ringsvg{display:block;width:128px;height:128px;color:var(--hair);flex:0 0 auto;}
.ring-key{display:flex;flex-direction:column;gap:11px;min-width:0;}
.ring-key .row{display:flex;align-items:baseline;gap:10px;font-family:"Inter";font-weight:300;}
.ring-key .row .v{font-size:25px;font-weight:200;font-variant-numeric:tabular-nums;line-height:1;}
.ring-key .row .k{font-size:12.5px;color:var(--ink-soft);letter-spacing:.06em;}
.ring-key .row .tick{display:inline-block;width:20px;height:0;border-top:1.4px solid var(--ink);align-self:center;}
.ring-key .row .tick.dash{border-top-style:dashed;}

/* needs-a-look list with hand-drawn ticks */
.looklist{min-width:0;}
.looklist .lead{
  font-family:"Caveat",cursive;
  font-size:clamp(24px,3vw,32px);
  line-height:1;
  margin:6px 0 22px;
}
.looklist ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;}
.looklist li{
  display:grid;
  grid-template-columns:26px 1fr auto;
  gap:14px;
  align-items:start;
  padding:15px 2px;
  border-top:1px solid var(--rule);
  min-width:0;
}
.looklist li:first-child{border-top:none;}
.looklist li .tickmark{width:24px;height:24px;color:var(--hair);margin-top:1px;flex:0 0 auto;}
.looklist li .body{min-width:0;}
.looklist li .who{
  font-family:"Inter";
  font-weight:400;
  font-size:15px;
  line-height:1.35;
}
.looklist li .why{
  font-family:"Inter";
  font-weight:300;
  font-size:13px;
  color:var(--ink-soft);
  line-height:1.4;
  margin-top:2px;
  overflow-wrap:anywhere;
}
.looklist li .when{
  font-family:"Caveat",cursive;
  font-size:18px;
  color:var(--ink-faint);
  white-space:nowrap;
  justify-self:end;
  line-height:1.2;
  margin-top:1px;
}
.looklist li .when.flag{color:var(--accent);}

/* footer wisp */
.footwisp{
  margin-top:clamp(56px,8vw,96px);
  display:flex;
  align-items:center;
  gap:16px;
  font-family:"Caveat",cursive;
  font-size:21px;
  color:var(--ink-faint);
}
.footwisp svg{flex:0 0 auto;color:var(--hair);}

/* draw-on animation: dashed stroke reveal */
.draw{stroke-dasharray:var(--len,1200);stroke-dashoffset:var(--len,1200);animation:draw 1.7s cubic-bezier(.55,.1,.25,1) forwards;}
.draw.d1{animation-delay:.15s;}
.draw.d2{animation-delay:.35s;}
.draw.d3{animation-delay:.5s;}
.draw.d4{animation-delay:.65s;}
.draw.slow{animation-duration:2.4s;}
@keyframes draw{to{stroke-dashoffset:0;}}

.fade{opacity:0;transform:translateY(8px);animation:fade .8s ease forwards;}
.fade.f1{animation-delay:.25s;}
.fade.f2{animation-delay:.45s;}
.fade.f3{animation-delay:.65s;}
.fade.f4{animation-delay:.85s;}
@keyframes fade{to{opacity:1;transform:none;}}

:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px;}

/* ---------- responsive ---------- */
@media(max-width:880px){
  .kpis{grid-template-columns:repeat(2,1fr);row-gap:clamp(34px,7vw,48px);}
  .lower{grid-template-columns:1fr;gap:clamp(40px,9vw,56px);}
}
@media(max-width:520px){
  .kpis{grid-template-columns:1fr;}
  .masthead{align-items:flex-start;}
  .dateline{text-align:left;}
  .looklist li{grid-template-columns:24px 1fr;}
  .looklist li .when{grid-column:2;justify-self:start;}
}
/* phone guard: stack the masthead and letterbox any swapped-in raster/video
   so nothing cover-crops or overflows on portrait screens (this flavor draws
   its own SVG, which keeps its fixed height - the guard only governs media a
   SWAP might drop in, and never overrides the line-art SVG dimensions) */
@media(max-width:640px){
  .masthead{flex-direction:column;align-items:flex-start;gap:10px;}
  .dateline{text-align:left;}
  .brand{gap:8px 12px;}
  img,video{display:block;max-width:100%;height:auto;object-fit:contain;}
}

@media(prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important;}
  .draw{stroke-dashoffset:0 !important;}
  .fade{opacity:1 !important;transform:none !important;}
}
</style>
</head>
<body>

<!-- ============= subtle paper grain ============= -->
<svg class="grain" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <filter id="paperlin">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" result="n"/>
    <feColorMatrix in="n" type="matrix" values="0 0 0 0 0.17  0 0 0 0 0.16  0 0 0 0 0.15  0 0 0 0.04 0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#paperlin)"/>
  <rect width="100%" height="100%" filter="url(#paperlin)" style="filter:url(#paperlin)"/>
</svg>

<main class="wrap">

  <!-- ===== handwritten header ===== -->
  <header class="masthead">
    <div class="brand">
      <span class="mark" id="m-clinic"></span>
      <span class="sub" id="m-tag"></span>
    </div>
    <div class="dateline">
      <span id="m-date"></span>
      <small id="m-window"></small>
    </div>
  </header>
  <!-- one hand-drawn underline under the masthead -->
  <svg class="underrule" viewBox="0 0 1180 14" preserveAspectRatio="none" fill="none" aria-hidden="true">
    <path class="draw slow" style="--len:1190" d="M2 8 C 160 3, 320 11, 500 7 S 840 3, 1010 8 S 1140 6, 1178 7"
      stroke="#2c2a26" stroke-width="1.4" stroke-linecap="round"/>
  </svg>

  <!-- ===== KPI figures + hairline sparklines ===== -->
  <section class="kpis" id="kpis" aria-label="Today at a glance"></section>

  <!-- ===== single thin trend line ===== -->
  <section class="trend fade f1" aria-label="Calls and bookings, last fourteen days">
    <div class="cap">
      <h2 id="t-title"></h2>
      <span class="note" id="t-note"></span>
    </div>
    <div class="trendwrap">
      <svg class="trendsvg" id="trendsvg" viewBox="0 0 1180 230" preserveAspectRatio="none" fill="none" aria-hidden="true"></svg>
    </div>
    <div class="trend-legend">
      <span><i class="swatch"></i> calls</span>
      <span><i class="swatch dash"></i> bookings</span>
    </div>
  </section>

  <!-- ===== split ring + needs-a-look ===== -->
  <section class="lower">
    <div class="split fade f2">
      <h3>voice vs line</h3>
      <div class="ringwrap">
        <svg class="ringsvg" id="ringsvg" viewBox="0 0 120 120" fill="none" aria-hidden="true"></svg>
        <div class="ring-key" id="ringkey"></div>
      </div>
    </div>

    <div class="looklist fade f3">
      <h3>needs a look</h3>
      <p class="lead" id="look-lead"></p>
      <ul id="looklist"></ul>
    </div>
  </section>

  <div class="footwisp fade f4">
    <svg width="40" height="14" viewBox="0 0 40 14" fill="none" aria-hidden="true">
      <path class="draw d4" style="--len:80" d="M2 7 C 8 2, 14 12, 20 7 S 32 2, 38 7" stroke="#2c2a26" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span id="footnote"></span>
  </div>

</main>

<script>
/* ============================================================
   DATA - the single source of truth. Swap these to retheme.
   All figures are one clinic's owner snapshot for one day.
   ============================================================ */
const DATA = {
  clinic:   "Yimwhan Dental",
  tag:      "owner note",
  date:     "Tue, 30 Jun",
  window:   "08:00 - 20:00 today",
  footnote: "a quiet note. the AI handled the rest.",

  // KPI cards. `key:true` carries the single accent dot.
  // spark = small relative series 0..1 for the hairline sparkline.
  kpis: [
    { label:"calls",        figure:"128", unit:"",  delta:"+14 vs yest",
      spark:[.3,.45,.4,.55,.5,.7,.62,.8,.74,.9] },
    { label:"bookings",     figure:"37",  unit:"",  delta:"+6 vs yest",
      spark:[.4,.35,.5,.48,.6,.55,.7,.66,.82,.9] },
    { label:"ai resolved",  figure:"82",  unit:"%", delta:"steady", key:true,
      spark:[.6,.64,.62,.7,.68,.75,.78,.8,.82,.83] },
    { label:"avg response", figure:"1.4", unit:"s", delta:"-0.2s",
      spark:[.8,.7,.74,.6,.62,.5,.52,.44,.4,.36] }
  ],

  trend: {
    title: "calls and bookings",
    note:  "last 14 days",
    // 14 points each, relative 0..1 (top = high)
    calls:    [.42,.5,.46,.58,.54,.66,.6,.72,.64,.78,.7,.84,.8,.9],
    bookings: [.2,.26,.22,.3,.28,.34,.31,.4,.36,.46,.42,.5,.48,.56],
    labels: { start:"Jun 17", end:"Jun 30" }
  },

  split: {
    voice: 64,   // %
    line:  36    // %
  },

  // needs-a-look: handoffs / flags. flag:true -> accent on the time.
  look: [
    { who:"Khun Ploy, +66 81 xxx 4420", why:"asked for implant quote, AI passed to you", when:"11m ago", flag:true },
    { who:"Line: คุณนัท",                why:"reschedule x2, wants Sat slot",          when:"40m ago" },
    { who:"Khun Arthit, +66 92 xxx 1180", why:"complaint about wait time last visit",   when:"1h ago" },
    { who:"Line: bkk_smile",             why:"insurance question outside AI scope",    when:"2h ago" }
  ]
};

/* ----- tiny helpers ----- */
const $ = (s,r=document)=>r.querySelector(s);
const SVGNS = "http://www.w3.org/2000/svg";
const el = (n,a={})=>{const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};
const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;

/* turn a 0..1 series into a hand-wobbled smooth path */
function seriesPath(series, w, h, pad=2, wobble=0){
  const n = series.length;
  const pts = series.map((v,i)=>{
    const x = pad + (i/(n-1))*(w-pad*2);
    let y = h - pad - v*(h-pad*2);
    if(wobble) y += (Math.sin(i*2.3)*wobble);
    return [x,y];
  });
  // catmull-rom -> cubic bezier for an organic monoline
  let d = `M${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
  for(let i=0;i<pts.length-1;i++){
    const p0 = pts[i-1]||pts[i];
    const p1 = pts[i];
    const p2 = pts[i+1];
    const p3 = pts[i+2]||p2;
    const c1x = p1[0] + (p2[0]-p0[0])/6;
    const c1y = p1[1] + (p2[1]-p0[1])/6;
    const c2x = p2[0] - (p3[0]-p1[0])/6;
    const c2y = p2[1] - (p3[1]-p1[1])/6;
    d += ` C${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2[0].toFixed(1)} ${p2[1].toFixed(1)}`;
  }
  return d;
}
function pathLen(d){
  const p = el("path",{d}); const s=document.createElementNS(SVGNS,"svg");
  s.style.position="absolute";s.style.opacity="0";s.appendChild(p);document.body.appendChild(s);
  let L=400; try{L=p.getTotalLength()||400;}catch(e){} s.remove(); return Math.ceil(L)+8;
}

/* ===== masthead ===== */
$("#m-clinic").textContent = DATA.clinic;
$("#m-tag").textContent    = DATA.tag;
$("#m-date").textContent   = DATA.date;
$("#m-window").textContent = DATA.window;
$("#footnote").textContent = DATA.footnote;

/* ===== KPIs ===== */
const kpiHost = $("#kpis");
DATA.kpis.forEach((k,idx)=>{
  const card = document.createElement("div");
  card.className = "kpi fade f"+(idx%4+1)+(k.key?" key":"");
  const sw=480, sh=34;
  const d = seriesPath(k.spark, sw, sh, 4, 0);
  const len = pathLen(d);
  card.innerHTML = `
    <span class="label">${k.label}</span>
    <span class="figure">${k.figure}${k.unit?`<span class="unit">${k.unit}</span>`:""}</span>
    <svg class="spark" viewBox="0 0 ${sw} ${sh}" preserveAspectRatio="none" fill="none" aria-hidden="true">
      <path d="${d}" stroke="#2c2a26" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"
        ${reduced?"":`class="draw d${(idx%4)+1}" style="--len:${len}"`}/>
    </svg>
    <span class="delta">${k.delta}</span>`;
  kpiHost.appendChild(card);
});

/* ===== trend ===== */
$("#t-title").textContent = DATA.trend.title;
$("#t-note").textContent  = DATA.trend.note;
const tsvg = $("#trendsvg");
const TW=1180, TH=230;
const callsD = seriesPath(DATA.trend.calls, TW, TH, 14);
const bookD  = seriesPath(DATA.trend.bookings, TW, TH, 14);
const cLen = pathLen(callsD), bLen = pathLen(bookD);

// faint baseline rule (no axes box, just one whisper line)
const baseY = TH-8;
tsvg.appendChild(el("line",{x1:0,y1:baseY,x2:TW,y2:baseY,stroke:"#e2ddd2","stroke-width":1}));

// calls = solid monoline
const cPath = el("path",{d:callsD,stroke:"#2c2a26","stroke-width":1.7,"stroke-linecap":"round","stroke-linejoin":"round"});
if(!reduced){cPath.setAttribute("class","draw slow");cPath.style.setProperty("--len",cLen);}
tsvg.appendChild(cPath);

// bookings = dashed monoline (same ink, distinguished by dash)
const bPath = el("path",{d:bookD,stroke:"#2c2a26","stroke-width":1.4,"stroke-linecap":"round","stroke-linejoin":"round","stroke-dasharray":"1 7","opacity":"0.85"});
tsvg.appendChild(bPath);

// two labels only: start + end (no full axis)
const labStart = el("text",{x:14,y:baseY-6,fill:"#a8a39a","font-family":"Inter","font-size":13,"font-weight":300});
labStart.textContent = DATA.trend.labels.start;
const labEnd = el("text",{x:TW-12,y:baseY-6,fill:"#a8a39a","font-family":"Inter","font-size":13,"font-weight":300,"text-anchor":"end"});
labEnd.textContent = DATA.trend.labels.end;
tsvg.appendChild(labStart); tsvg.appendChild(labEnd);

// a tiny end-dot on the calls line, in ink (not accent - accent reserved for the one KPI)
const lastCalls = DATA.trend.calls[DATA.trend.calls.length-1];
tsvg.appendChild(el("circle",{cx:TW-14,cy:(TH-8)-lastCalls*(TH-28),r:3,fill:"#2c2a26"}));

/* ===== voice vs line ring ===== */
const ring = $("#ringsvg");
const cx=60,cy=60,r=46, C=2*Math.PI*r;
const voice = DATA.split.voice, line = DATA.split.line;
// full faint ring
ring.appendChild(el("circle",{cx,cy,r,stroke:"#e2ddd2","stroke-width":1.6,fill:"none"}));
// voice arc = solid ink
const vArc = el("circle",{cx,cy,r,stroke:"#2c2a26","stroke-width":2,fill:"none","stroke-linecap":"round",
  "stroke-dasharray":`${(voice/100*C).toFixed(1)} ${C.toFixed(1)}`,
  transform:`rotate(-90 ${cx} ${cy})`});
ring.appendChild(vArc);
// centre figure
const vt = el("text",{x:cx,y:cy-2,fill:"#2c2a26","font-family":"Inter","font-size":24,"font-weight":200,"text-anchor":"middle"});
vt.textContent = voice+"%";
const vl = el("text",{x:cx,y:cy+15,fill:"#a8a39a","font-family":"Inter","font-size":10,"font-weight":300,"text-anchor":"middle","letter-spacing":"1.5"});
vl.textContent = "VOICE";
ring.appendChild(vt); ring.appendChild(vl);
if(!reduced){
  vArc.style.transition="stroke-dasharray 1.5s cubic-bezier(.55,.1,.25,1) .5s";
  vArc.setAttribute("stroke-dasharray",`0 ${C.toFixed(1)}`);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    vArc.setAttribute("stroke-dasharray",`${(voice/100*C).toFixed(1)} ${C.toFixed(1)}`);
  }));
}
$("#ringkey").innerHTML = `
  <div class="row"><span class="tick"></span><span class="v">${voice}%</span><span class="k">voice calls</span></div>
  <div class="row"><span class="tick dash"></span><span class="v">${line}%</span><span class="k">line chats</span></div>`;

/* ===== needs-a-look list ===== */
const tickSVG = `<svg class="tickmark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
  <path %ANIM% d="M3 13 L9 19 L21 5" stroke="#2c2a26" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
$("#look-lead").textContent = DATA.look.length + " people the AI flagged for you";
const lh = $("#looklist");
DATA.look.forEach((it,i)=>{
  const li = document.createElement("li");
  const tick = tickSVG.replace("%ANIM%", reduced?"":`class="draw d${(i%4)+1}" style="--len:42"`);
  li.innerHTML = `
    ${tick}
    <div class="body">
      <div class="who">${it.who}</div>
      <div class="why">${it.why}</div>
    </div>
    <div class="when${it.flag?" flag":""}">${it.when}</div>`;
  lh.appendChild(li);
});
</script>
</body>
</html>
