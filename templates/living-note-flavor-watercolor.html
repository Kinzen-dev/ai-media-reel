<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,500;6..12,600;6..12,700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   YIMWHAN WATERCOLOR OWNER NOTE
   A soft, hand-painted living note. Cream paper, muted
   watercolor washes bleeding behind the figures, brush-script
   headings, delicate ink sketch sparklines. Every KPI sits on
   its own painted swatch. Calm, premium-feminine, distinct
   from any crisp graph-paper or dark-card grid.
   Watercolor edges are real: inline SVG feTurbulence +
   feGaussianBlur displacement, never a flat fill.
   ============================================================ */

:root {
  --cream:      #f8f4ec;
  --cream-deep: #f1ebdd;
  --paper:      #fcfaf4;
  --ink:        #34302a;
  --ink-2:      #5c554b;
  --ink-3:      #8a8170;
  --ink-4:      #b3a98f;

  /* muted watercolor pigments */
  --rose:   #c98a8f;
  --rose-d: #b06b72;
  --sage:   #91a98b;
  --sage-d: #6f8b6b;
  --sky:    #8aa6bd;
  --sky-d:  #6e8aa3;
  --ochre:  #d2a85f;
  --ochre-d:#bb8e42;

  --line:   #e3dcca;
  --line-2: #d6cdb6;

  --r:    20px;
  --r-sm: 14px;

  --shadow: 0 18px 44px -26px rgba(80,68,48,.45), 0 4px 14px -8px rgba(80,68,48,.18);
  --shadow-soft: 0 10px 30px -20px rgba(80,68,48,.4);
}

* { box-sizing: border-box; min-width: 0; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background:
    radial-gradient(1200px 700px at 78% -8%, rgba(201,138,143,.10), transparent 60%),
    radial-gradient(1000px 720px at 6% 14%, rgba(145,169,139,.10), transparent 58%),
    radial-gradient(1100px 800px at 50% 116%, rgba(138,166,189,.10), transparent 60%),
    var(--cream);
  color: var(--ink);
  font-family: "Nunito Sans", system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

/* faint paper grain via tiny tiled noise, kept subtle */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: .5;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='matrix' values='0 0 0 0 0.78  0 0 0 0 0.74  0 0 0 0 0.64  0 0 0 0.05 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  mix-blend-mode: multiply;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 1180px;
  margin: 0 auto;
  padding: 34px 40px 80px;
}

/* ---------- header ---------- */
.note-head {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  gap: 18px 28px;
  padding-bottom: 22px;
  margin-bottom: 26px;
}
.note-head::after {
  content: "";
  position: absolute;
  left: 2px; right: 2px; bottom: 0;
  height: 5px;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='6'><path d='M0 4 Q 50 1 100 3.5 T 200 3 T 300 4 T 400 3' stroke='%23c98a8f' stroke-width='2.4' fill='none' stroke-linecap='round' opacity='0.55'/></svg>") repeat-x left bottom;
  background-size: 400px 6px;
}
.eyebrow {
  font-size: 13px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 700;
  margin: 0 0 2px;
}
.brush-title {
  font-family: "Caveat", cursive;
  font-weight: 700;
  font-size: clamp(40px, 6vw, 62px);
  line-height: .95;
  margin: 0;
  color: var(--ink);
  letter-spacing: .5px;
}
.brush-title .accent { color: var(--rose-d); }
.head-meta {
  text-align: right;
  font-family: "Caveat", cursive;
  font-size: 24px;
  color: var(--ink-2);
  line-height: 1.25;
}
.head-meta .small {
  font-family: "Nunito Sans", sans-serif;
  font-size: 12.5px;
  letter-spacing: .04em;
  color: var(--ink-3);
  display: block;
  margin-top: 2px;
}
.head-mark {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  margin-bottom: 7px;
}
.head-mark .dot {
  width: 30px; height: 30px;
  border-radius: 50%;
  flex: 0 0 auto;
  background: radial-gradient(circle at 35% 30%, #d99aa0, var(--rose-d));
  box-shadow: 0 4px 12px -4px rgba(176,107,114,.6);
}

/* ---------- KPI swatch row ---------- */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  margin-bottom: 30px;
}
.kpi {
  position: relative;
  padding: 22px 22px 18px;
  border-radius: var(--r);
  isolation: isolate;
  overflow: hidden;
}
/* the painted swatch behind each kpi */
.kpi .swatch {
  position: absolute;
  inset: 0;
  z-index: -1;
  border-radius: var(--r);
}
.kpi .swatch svg { width: 100%; height: 100%; display: block; }
.kpi-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--ink-2);
  margin: 0 0 6px;
}
.kpi-pin {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex: 0 0 auto;
  box-shadow: 0 2px 5px -1px rgba(80,68,48,.35);
}
.kpi-value {
  font-family: "Caveat", cursive;
  font-weight: 700;
  font-size: 46px;
  line-height: .92;
  color: var(--ink);
  letter-spacing: .5px;
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.kpi-value .unit {
  font-size: 24px;
  color: var(--ink-2);
  font-weight: 600;
}
.kpi-delta {
  font-size: 12.5px;
  font-weight: 700;
  margin-top: 4px;
  color: var(--sage-d);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.kpi-delta.down { color: var(--rose-d); }
.kpi-spark {
  margin-top: 12px;
  height: 34px;
  width: 100%;
}
.kpi-spark svg { width: 100%; height: 100%; display: block; overflow: visible; }

/* ---------- main grid ---------- */
.grid {
  display: grid;
  grid-template-columns: 1.7fr 1fr;
  gap: 24px;
  align-items: start;
}
.panel {
  position: relative;
  background: var(--paper);
  border-radius: var(--r);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  padding: 24px 26px 26px;
}
.panel.tight { padding: 22px 22px 20px; }
.panel-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 16px;
}
.panel-title {
  font-family: "Caveat", cursive;
  font-weight: 700;
  font-size: 30px;
  line-height: 1;
  margin: 0;
  color: var(--ink);
}
.panel-sub {
  font-size: 12.5px;
  color: var(--ink-3);
  font-weight: 600;
  letter-spacing: .03em;
  white-space: nowrap;
}

/* legend chips */
.legend { display: flex; gap: 16px; flex-wrap: wrap; }
.legend .chip {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 12.5px; font-weight: 700; color: var(--ink-2);
}
.legend .swatch-dot {
  width: 14px; height: 10px; border-radius: 4px;
}

/* trend chart */
.chart-box { width: 100%; }
.chart-box svg { width: 100%; height: auto; display: block; overflow: visible; }

/* split / donut row */
.split-row { display: grid; grid-template-columns: 150px 1fr; gap: 18px; align-items: center; }
.donut-wrap { width: 150px; height: 150px; position: relative; }
.donut-wrap svg { width: 100%; height: 100%; display: block; overflow: visible; }
.donut-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; pointer-events: none;
}
.donut-center .big {
  font-family: "Caveat", cursive; font-weight: 700;
  font-size: 30px; line-height: .9; color: var(--ink);
}
.donut-center .lbl { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-3); }
.split-legend { display: flex; flex-direction: column; gap: 14px; }
.split-item { display: flex; align-items: center; gap: 12px; }
.split-blob { width: 26px; height: 26px; border-radius: 50%; flex: 0 0 auto; box-shadow: 0 4px 10px -4px rgba(80,68,48,.4); }
.split-meta { min-width: 0; }
.split-meta .name { font-weight: 700; font-size: 14px; color: var(--ink); }
.split-meta .num { font-family: "Caveat", cursive; font-size: 22px; font-weight: 700; color: var(--ink-2); line-height: 1; }

/* needs a look list */
.look-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
.look-item {
  display: grid;
  grid-template-columns: 22px 1fr auto;
  align-items: start;
  gap: 12px;
  padding: 12px 4px;
  border-bottom: 1px dashed var(--line-2);
}
.look-item:last-child { border-bottom: 0; }
.look-bullet {
  width: 16px; height: 16px; border-radius: 50%;
  margin-top: 3px;
  box-shadow: 0 2px 6px -2px rgba(80,68,48,.4);
}
.look-body { min-width: 0; }
.look-body .who { font-weight: 700; font-size: 14.5px; color: var(--ink); }
.look-body .why { font-size: 13px; color: var(--ink-2); margin-top: 1px; overflow-wrap: anywhere; }
.look-tag {
  font-size: 11px; font-weight: 800; letter-spacing: .05em;
  text-transform: uppercase;
  padding: 4px 9px; border-radius: 999px;
  white-space: nowrap; align-self: center;
}
.tag-rose { background: rgba(201,138,143,.2); color: var(--rose-d); }
.tag-ochre { background: rgba(210,168,95,.22); color: var(--ochre-d); }
.tag-sky { background: rgba(138,166,189,.22); color: var(--sky-d); }
.look-time {
  font-family: "Caveat", cursive; font-size: 17px;
  color: var(--ink-3); white-space: nowrap; align-self: center;
}

/* clinic photo softly inset, painterly mask */
.clinic-strip {
  margin-top: 14px;
  border-radius: var(--r-sm);
  overflow: hidden;
  position: relative;
  border: 1px solid var(--line);
  aspect-ratio: 16 / 6;
}
.clinic-strip img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  filter: saturate(.78) brightness(1.04) contrast(.96);
}
.clinic-strip::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(105deg, rgba(248,244,236,.62), rgba(248,244,236,.05) 42%, rgba(201,138,143,.18));
  mix-blend-mode: multiply;
}
.clinic-cap {
  position: absolute; left: 14px; bottom: 10px;
  font-family: "Caveat", cursive; font-size: 22px; font-weight: 600;
  color: #fff; text-shadow: 0 2px 6px rgba(52,48,42,.6);
}

.foot {
  margin-top: 34px; text-align: center;
  font-family: "Caveat", cursive; font-size: 21px; color: var(--ink-3);
}
.foot .ln { display: inline-block; border-top: 2px solid var(--line-2); width: 54px; vertical-align: middle; margin: 0 12px 6px; }

:focus-visible { outline: 3px solid var(--rose-d); outline-offset: 3px; border-radius: 6px; }

/* ---------- responsive ---------- */
@media (max-width: 1080px) {
  .grid { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .wrap { padding: 22px 18px 60px; }
  .note-head { grid-template-columns: 1fr; align-items: start; }
  .head-meta { text-align: left; }
  .kpi-row { grid-template-columns: 1fr; gap: 16px; }
  .split-row { grid-template-columns: 1fr; }
  .donut-wrap { margin: 0 auto; }
  .clinic-strip { aspect-ratio: 16 / 9; }
  .brush-title { font-size: clamp(38px, 12vw, 50px); }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
  .draw { stroke-dashoffset: 0 !important; }
  .fill-in { opacity: 1 !important; }
}

/* hand-drawn line-draw animation (disabled under reduced motion) */
@media (prefers-reduced-motion: no-preference) {
  .draw {
    stroke-dasharray: var(--len, 1200);
    stroke-dashoffset: var(--len, 1200);
    animation: drawLine 1.7s ease-out forwards;
  }
  .fill-in { opacity: 0; animation: fadeIn 1.2s ease-out .5s forwards; }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  @keyframes fadeIn { to { opacity: 1; } }
}
</style>

<script>
/* ============================================================
   RENDER - all visuals built from DATA, plain DOM + SVG
   ============================================================ */
(function () {
  const PIG = {
    rose:  { fill:"#c98a8f", deep:"#b06b72", soft:"rgba(201,138,143,.30)" },
    sage:  { fill:"#91a98b", deep:"#6f8b6b", soft:"rgba(145,169,139,.32)" },
    sky:   { fill:"#8aa6bd", deep:"#6e8aa3", soft:"rgba(138,166,189,.32)" },
    ochre: { fill:"#d2a85f", deep:"#bb8e42", soft:"rgba(210,168,95,.32)" }
  };
  const NS = "http://www.w3.org/2000/svg";
  const el = (t, a, kids) => {
    const n = document.createElement(t);
    if (a) for (const k in a) n.setAttribute(k, a[k]);
    if (kids) (Array.isArray(kids) ? kids : [kids]).forEach(c => n.append(c));
    return n;
  };
  const svgEl = (t, a) => {
    const n = document.createElementNS(NS, t);
    if (a) for (const k in a) n.setAttribute(k, a[k]);
    return n;
  };

  // ---- header text ----
  document.getElementById("clinicName").textContent = DATA.clinic;
  document.getElementById("ownerLabel").textContent = "for " + DATA.owner;
  document.getElementById("dateLabel").textContent = DATA.dateLabel;
  document.getElementById("rangeLabel").textContent = "snapshot, " + DATA.rangeLabel;

  // ---- watercolor swatch builder: an organic blobby fill ----
  function swatchSVG(pig, seed) {
    const s = svgEl("svg", { viewBox: "0 0 100 100", preserveAspectRatio: "none" });
    s.setAttribute("aria-hidden", "true");
    // base wash
    const base = svgEl("rect", { x: -8, y: -8, width: 116, height: 116, rx: 14, fill: pig.fill, opacity: ".16", filter: "url(#wc)" });
    // a couple of deeper blobs to give the paint pooling look
    const b1 = svgEl("ellipse", { cx: 24 + (seed % 8), cy: 30, rx: 46, ry: 30, fill: pig.fill, opacity: ".18", filter: "url(#wc)" });
    const b2 = svgEl("ellipse", { cx: 78, cy: 72, rx: 38, ry: 26, fill: pig.deep, opacity: ".12", filter: "url(#wc2)" });
    const b3 = svgEl("circle", { cx: 60, cy: 22, r: 16, fill: pig.fill, opacity: ".14", filter: "url(#wc2)" });
    s.append(base, b1, b2, b3);
    return s;
  }

  // ---- sketch sparkline (thin wobbly ink line) ----
  function sparkSVG(values, pig) {
    const W = 200, H = 34, pad = 3;
    const mn = Math.min(...values), mx = Math.max(...values);
    const rng = (mx - mn) || 1;
    const pts = values.map((v, i) => {
      const x = pad + (i / (values.length - 1)) * (W - pad * 2);
      const y = H - pad - ((v - mn) / rng) * (H - pad * 2);
      return [x, y];
    });
    // smooth-ish path
    let d = `M ${pts[0][0].toFixed(1)} ${pts[0][1].toFixed(1)}`;
    for (let i = 1; i < pts.length; i++) {
      const [x0, y0] = pts[i - 1], [x1, y1] = pts[i];
      const cx = (x0 + x1) / 2;
      d += ` Q ${cx.toFixed(1)} ${y0.toFixed(1)} ${x1.toFixed(1)} ${y1.toFixed(1)}`;
    }
    const s = svgEl("svg", { viewBox: `0 0 ${W} ${H}` });
    s.setAttribute("aria-hidden", "true");
    const path = svgEl("path", { d, fill: "none", stroke: pig.deep, "stroke-width": "2.2", "stroke-linecap": "round", "stroke-linejoin": "round", filter: "url(#ink)", opacity: ".85" });
    path.classList.add("draw");
    path.style.setProperty("--len", "320");
    const last = pts[pts.length - 1];
    const dot = svgEl("circle", { cx: last[0], cy: last[1], r: "3.4", fill: pig.deep });
    dot.classList.add("fill-in");
    s.append(path, dot);
    return s;
  }

  // ---- KPIs ----
  const kpiRow = document.getElementById("kpiRow");
  DATA.kpis.forEach((k, idx) => {
    const pig = PIG[k.pig];
    const card = el("article", { class: "kpi" });
    card.style.boxShadow = "var(--shadow-soft)";

    const sw = el("div", { class: "swatch" });
    sw.append(swatchSVG(pig, idx * 3 + 1));
    card.append(sw);

    const label = el("p", { class: "kpi-label" }, [
      el("span", { class: "kpi-pin" }), document.createTextNode(k.label)
    ]);
    label.querySelector(".kpi-pin").style.background = `radial-gradient(circle at 35% 30%, ${pig.fill}, ${pig.deep})`;

    const val = el("div", { class: "kpi-value" });
    val.append(document.createTextNode(k.value));
    if (k.unit) val.append(el("span", { class: "unit" }, document.createTextNode(k.unit)));

    const delta = el("div", { class: "kpi-delta" + (k.dir === "down" ? " down" : "") });
    delta.append(document.createTextNode((k.dir === "up" ? "↗ " : "↘ ") + k.delta));

    const spark = el("div", { class: "kpi-spark" });
    spark.append(sparkSVG(k.spark, pig));

    card.append(label, val, delta, spark);
    kpiRow.append(card);
  });

  // ---- trend chart: watercolor area (calls) + thin ink line (bookings) ----
  (function () {
    const t = DATA.trend;
    const W = 640, H = 270, L = 34, R = 14, T = 16, B = 40;
    const iw = W - L - R, ih = H - T - B;
    const n = t.labels.length;
    const xAt = i => L + (i / (n - 1)) * iw;
    const maxCalls = Math.max(...t.calls) * 1.12;
    const maxBook  = Math.max(...t.bookings) * 1.3;
    const yCall = v => T + ih - (v / maxCalls) * ih;
    const yBook = v => T + ih - (v / maxBook) * ih;

    const smooth = (pts) => {
      let d = `M ${pts[0][0]} ${pts[0][1]}`;
      for (let i = 1; i < pts.length; i++) {
        const [x0, y0] = pts[i - 1], [x1, y1] = pts[i];
        const cx = (x0 + x1) / 2;
        d += ` Q ${cx.toFixed(1)} ${y0.toFixed(1)} ${x1.toFixed(1)} ${y1.toFixed(1)}`;
      }
      return d;
    };

    const callPts = t.calls.map((v, i) => [xAt(i), yCall(v)]);
    const bookPts = t.bookings.map((v, i) => [xAt(i), yBook(v)]);

    const s = svgEl("svg", { viewBox: `0 0 ${W} ${H}`, role: "img" });
    s.setAttribute("aria-label", "Hourly calls as a watercolor area with bookings as a thin ink line");

    // defs: soft area gradient
    const defs = svgEl("defs");
    const grad = svgEl("linearGradient", { id: "areaGrad", x1: "0", y1: "0", x2: "0", y2: "1" });
    grad.append(svgEl("stop", { offset: "0", "stop-color": "#91a98b", "stop-opacity": ".42" }));
    grad.append(svgEl("stop", { offset: "1", "stop-color": "#91a98b", "stop-opacity": ".05" }));
    defs.append(grad);
    s.append(defs);

    // faint baseline guides
    for (let g = 1; g <= 3; g++) {
      const yy = T + (ih / 3) * g;
      s.append(svgEl("line", { x1: L, y1: yy.toFixed(1), x2: W - R, y2: yy.toFixed(1), stroke: "#d6cdb6", "stroke-width": "1", "stroke-dasharray": "2 6", opacity: ".7" }));
    }

    // area path (calls), watercolor edge via filter
    const areaD = smooth(callPts) + ` L ${xAt(n - 1)} ${T + ih} L ${L} ${T + ih} Z`;
    const area = svgEl("path", { d: areaD, fill: "url(#areaGrad)", filter: "url(#wc2)" });
    area.classList.add("fill-in");
    s.append(area);

    // the call edge line (soft sage), animated draw
    const edge = svgEl("path", { d: smooth(callPts), fill: "none", stroke: "#6f8b6b", "stroke-width": "2.4", "stroke-linecap": "round", "stroke-linejoin": "round", filter: "url(#ink)", opacity: ".9" });
    edge.classList.add("draw"); edge.style.setProperty("--len", "1100");
    s.append(edge);

    // bookings thin ink line
    const bline = svgEl("path", { d: smooth(bookPts), fill: "none", stroke: "#b06b72", "stroke-width": "2.6", "stroke-linecap": "round", "stroke-linejoin": "round", filter: "url(#ink)" });
    bline.classList.add("draw"); bline.style.setProperty("--len", "1100");
    bline.style.animationDelay = ".2s";
    s.append(bline);

    // booking dots
    bookPts.forEach(([x, y]) => {
      const dot = svgEl("circle", { cx: x.toFixed(1), cy: y.toFixed(1), r: "3", fill: "#b06b72" });
      dot.classList.add("fill-in");
      s.append(dot);
    });

    // x labels
    t.labels.forEach((lbl, i) => {
      const tx = svgEl("text", { x: xAt(i).toFixed(1), y: H - 14, "text-anchor": "middle", "font-family": "Nunito Sans, sans-serif", "font-size": "11", fill: "#8a8170", "font-weight": "600" });
      tx.textContent = lbl;
      s.append(tx);
    });

    document.getElementById("chartBox").append(s);
  })();

  // ---- Voice vs LINE donut ----
  (function () {
    const sp = DATA.split;
    const total = sp.voice.value + sp.line.value;
    const voicePct = sp.voice.pct / 100;
    document.getElementById("splitTotal").textContent = total + " conversations";

    const W = 150, H = 150, cx = 75, cy = 75, rOut = 60, rIn = 38;
    const s = svgEl("svg", { viewBox: `0 0 ${W} ${H}` });
    s.setAttribute("aria-hidden", "true");

    function ring(frac, start, color, opacity, filter) {
      const a0 = start * 2 * Math.PI - Math.PI / 2;
      const a1 = (start + frac) * 2 * Math.PI - Math.PI / 2;
      const large = frac > 0.5 ? 1 : 0;
      const p = (ang, r) => [cx + Math.cos(ang) * r, cy + Math.sin(ang) * r];
      const [x0, y0] = p(a0, rOut), [x1, y1] = p(a1, rOut);
      const [x2, y2] = p(a1, rIn), [x3, y3] = p(a0, rIn);
      const d = `M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${rOut} ${rOut} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} L ${x2.toFixed(2)} ${y2.toFixed(2)} A ${rIn} ${rIn} 0 ${large} 0 ${x3.toFixed(2)} ${y3.toFixed(2)} Z`;
      const path = svgEl("path", { d, fill: color, opacity, filter });
      return path;
    }
    // soft watercolor wedges
    const vWedge = ring(voicePct, 0, "#8aa6bd", ".85", "url(#wc2)");
    const lWedge = ring(1 - voicePct, voicePct, "#c98a8f", ".85", "url(#wc2)");
    vWedge.classList.add("fill-in"); lWedge.classList.add("fill-in");
    s.append(vWedge, lWedge);

    document.getElementById("donutBox").append(s);
    const center = el("div", { class: "donut-center" });
    center.append(el("div", { class: "big" }, document.createTextNode(total)));
    center.append(el("div", { class: "lbl" }, document.createTextNode("total")));
    document.getElementById("donutBox").append(center);

    const legend = document.getElementById("splitLegend");
    [
      { d: sp.voice, color: "linear-gradient(135deg,#a6bdd0,#6e8aa3)" },
      { d: sp.line,  color: "linear-gradient(135deg,#dba6aa,#b06b72)" }
    ].forEach(row => {
      const item = el("div", { class: "split-item" });
      const blob = el("span", { class: "split-blob" });
      blob.style.background = row.color;
      const meta = el("div", { class: "split-meta" });
      meta.append(el("div", { class: "name" }, document.createTextNode(row.d.label)));
      meta.append(el("div", { class: "num" }, document.createTextNode(row.d.value + "  (" + row.d.pct + "%)")));
      item.append(blob, meta);
      legend.append(item);
    });
  })();

  // ---- needs a look list ----
  (function () {
    const list = document.getElementById("lookList");
    document.getElementById("lookCount").textContent = DATA.needsLook.length + " open";
    const bulletColor = { "tag-rose": "linear-gradient(135deg,#dba6aa,#b06b72)", "tag-ochre": "linear-gradient(135deg,#e3c486,#bb8e42)", "tag-sky": "linear-gradient(135deg,#a6bdd0,#6e8aa3)" };
    DATA.needsLook.forEach(item => {
      const li = el("li", { class: "look-item" });
      const bullet = el("span", { class: "look-bullet" });
      bullet.style.background = bulletColor[item.tagClass] || "var(--rose-d)";
      const body = el("div", { class: "look-body" });
      body.append(el("div", { class: "who" }, document.createTextNode(item.who)));
      body.append(el("div", { class: "why" }, document.createTextNode(item.why)));
      const right = el("div", { style: "display:flex;flex-direction:column;align-items:flex-end;gap:4px;" });
      right.append(el("span", { class: "look-tag " + item.tagClass }, document.createTextNode(item.tag)));
      right.append(el("span", { class: "look-time" }, document.createTextNode(item.time)));
      li.append(bullet, body, right);
      list.append(li);
    });
  })();

})();
</script>
</body>
</html>
