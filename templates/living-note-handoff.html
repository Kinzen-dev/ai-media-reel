<style>
  :root {
    --paper: #f7f3ea;
    --paper-2: #fbf8f1;
    --ink: #2a2722;
    --ink-soft: #6f675b;
    --ink-faint: #9b9285;
    --accent: #bb5e3c;        /* muted terracotta */
    --accent-soft: #e8c8b6;
    --urgent: #c25a3f;        /* soft urgency tint base */
    --urgent-wash: #f3ddd2;
    --calm-wash: #e7e6d8;
    --line-blue: #4a7c66;     /* muted LINE-ish sage so it is not loud */
    --rule: #ddd5c6;
    --shadow: 18px 22px 40px -28px rgba(60, 48, 36, 0.55);
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    background:
      radial-gradient(120% 80% at 12% 0%, #fbf8f1 0%, var(--paper) 55%, #f1ebdd 100%);
    color: var(--ink);
    font-family: "Newsreader", Georgia, serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* faint paper grain + ruled feel */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg, transparent 0 31px, rgba(140, 120, 96, 0.05) 31px 32px);
    opacity: 0.6;
    z-index: 0;
  }

  .wobble { filter: url(#wob); }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1180px;
    margin: 0 auto;
    padding: 36px 40px 80px;
  }

  /* ---------- HEADER ---------- */
  .top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 28px;
    flex-wrap: wrap;
    margin-bottom: 26px;
  }
  .top .lead { min-width: 0; flex: 1 1 420px; }

  .greeting {
    font-family: "Shantell Sans", "Comic Sans MS", cursive;
    font-size: 0.95rem;
    color: var(--ink-soft);
    letter-spacing: 0.2px;
    margin: 0 0 2px;
  }
  h1 {
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: clamp(2.7rem, 6vw, 4.4rem);
    line-height: 0.95;
    margin: 0 0 4px;
    color: var(--ink);
    letter-spacing: 0.5px;
    position: relative;
    display: inline-block;
    max-width: 100%;
  }
  /* hand-drawn underline under the headline */
  .h1-underline {
    display: block;
    width: min(420px, 80%);
    height: 16px;
    margin-top: -2px;
    color: var(--accent);
  }
  .h1-underline svg { display: block; width: 100%; height: 100%; }

  .subtitle {
    font-size: 1.02rem;
    color: var(--ink-soft);
    max-width: 46ch;
    margin: 10px 0 0;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }

  /* small pinned clinic card with the real photo */
  .pinned {
    flex: 0 0 auto;
    width: 200px;
    max-width: 46vw;
    background: var(--paper-2);
    padding: 8px 8px 12px;
    box-shadow: var(--shadow);
    transform: rotate(2.4deg);
    position: relative;
  }
  .pinned img {
    display: block;
    width: 100%;
    height: 116px;
    object-fit: cover;
    filter: sepia(0.12) saturate(0.92) contrast(0.98);
  }
  .pinned .cap {
    font-family: "Caveat", cursive;
    font-size: 1.15rem;
    color: var(--ink-soft);
    text-align: center;
    margin-top: 4px;
    line-height: 1.05;
  }
  .pinned .cap small {
    display: block;
    font-family: "Shantell Sans", cursive;
    font-size: 0.62rem;
    color: var(--ink-faint);
    letter-spacing: 0.4px;
  }
  .tape {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%) rotate(-3deg);
    width: 78px;
    height: 24px;
    background: rgba(187, 94, 60, 0.18);
    border: 1px dashed rgba(187, 94, 60, 0.4);

  /* tally strip */
  .tally {
    display: flex;
    align-items: center;
    gap: 14px;

    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--paper-2);
    border: 1.5px solid var(--rule);

  .tally .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--urgent); }
  .tally .dot.done { background: var(--line-blue); }

  /* ---------- QUEUE ---------- */
  .queue {
    display: grid;
    grid-template-columns: 1fr;
    gap: 22px;
  }

  .card {
    position: relative;
    background: var(--paper-2);
    border: 1.5px solid var(--rule);

  .card:nth-child(odd)  { transform: rotate(-0.5deg); }
  .card:nth-child(even) { transform: rotate(0.5deg); }
  .card:hover { transform: rotate(0deg) translateY(-3px); box-shadow: 22px 28px 50px -28px rgba(60,48,36,0.6); }

  /* top card gets the soft hand-drawn highlight */

    background:

  .card.top::before {

  .ribbon {
    position: absolute;
    top: -13px;
    left: 22px;
    font-family: "Caveat", cursive;
    font-size: 1.15rem;
    color: #fff;
    background: var(--accent);

    transform: rotate(-1.5deg);
    box-shadow: 4px 6px 12px -8px rgba(60,48,36,0.7);

  .card-head {

    align-items: flex-start;

    flex-wrap: wrap;

  .who { min-width: 0; flex: 1 1 240px; }

    font-weight: 700;
    font-size: 1.9rem;

    color: var(--ink);
    margin: 0;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  .meta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 6px;
  }

  /* hand-drawn channel mark */
  .channel {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: "Shantell Sans", cursive;
    font-size: 0.74rem;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-soft);

  .channel svg { width: 26px; height: 26px; display: block; }
  .channel.voice svg { color: var(--accent); }
  .channel.line  svg { color: var(--line-blue); }

  .case-id {
    font-family: "Shantell Sans", cursive;
    font-size: 0.7rem;
    color: var(--ink-faint);
    letter-spacing: 1px;
  }
  .tag {
    font-family: "Shantell Sans", cursive;
    font-size: 0.68rem;
    color: var(--ink-soft);
    background: var(--calm-wash);
    border-radius: 999px;
    padding: 2px 10px;
    white-space: nowrap;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* wait clock, right side */
  .wait {
    flex: 0 0 auto;
    text-align: right;
    font-family: "Caveat", cursive;
    line-height: 0.92;
    min-width: 0;
  }
  .wait .num { font-size: 2.4rem; font-weight: 700; color: var(--urgent); }
  .wait .num.calm { color: var(--ink-soft); }
  .wait .lbl {
    display: block;
    font-family: "Shantell Sans", cursive;
    font-size: 0.62rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-top: -2px;
  }

  .reason {
    font-size: 1.06rem;
    color: var(--ink);
    margin: 16px 0 0;
    max-width: 64ch;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  .reason::before {
    content: "\201C";
    color: var(--accent);
    font-size: 1.4rem;
    margin-right: 1px;
  }

  .snippet {
    font-family: "Shantell Sans", cursive;
    font-style: italic;
    font-size: 0.9rem;
    color: var(--ink-soft);
    background: var(--paper);
    border-left: 3px solid var(--accent-soft);
    padding: 8px 12px;
    margin: 14px 0 0;
    max-width: 100%;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  .snippet .gloss {
    display: block;
    font-style: normal;
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-top: 3px;
  }

  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;

    flex-wrap: wrap;

  .foot-note {

    font-size: 0.82rem;

    min-width: 0;

    overflow-wrap: anywhere;
  }
  .foot-note .val { color: var(--accent); font-weight: 600; }

  .take {
    flex: 0 0 auto;
    font-family: "Caveat", cursive;
    font-weight: 700;
    font-size: 1.4rem;
    color: var(--paper-2);
    background: var(--ink);
    border: none;
    padding: 8px 22px 10px;
    cursor: pointer;
    position: relative;
    box-shadow: 5px 7px 16px -10px rgba(0,0,0,0.7);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .take:hover { transform: translateY(-2px); background: var(--accent); }
  .take:active { transform: translateY(0); }
  .take:focus-visible { outline: 3px solid var(--accent); outline-offset: 3px; }
  .card.top .take { background: var(--accent); }
  .card.top .take:hover { background: var(--ink); }

  .take.taken {
    background: var(--line-blue);
    cursor: default;
    transform: none;
  }
  .take.taken::after {
    content: " \2713";
  }

  /* footer scribble */
  .footer {
    margin-top: 44px;
    text-align: center;
    font-family: "Shantell Sans", cursive;
    font-size: 0.84rem;
    color: var(--ink-faint);
  }
  .footer .rule {
    width: 220px; max-width: 70%; height: 12px; color: var(--rule);
    margin: 0 auto 10px;
  }
  .footer .rule svg { width: 100%; height: 100%; display: block; }

  /* ---------- MOBILE ---------- */
  @media (max-width: 720px) {
    .wrap { padding: 24px 18px 56px; }
    .top { gap: 18px; }
    .pinned {
      width: 100%;
      max-width: 320px;
      margin: 4px auto 0;
      transform: rotate(-1deg);
    }
    .pinned img { height: 150px; }
    h1 { font-size: clamp(2.4rem, 12vw, 3.3rem); }
    .card-head { gap: 10px; }
    .wait { text-align: left; order: 3; flex-basis: 100%; }
    .wait .num { font-size: 1.9rem; }
    .patient { font-size: 1.6rem; }
    .reason { font-size: 1rem; }
    .take { width: 100%; text-align: center; }
    .card-foot { gap: 12px; }
    .foot-note { flex-basis: 100%; }
  }

  /* phones: never landscape cover-crop the clinic photo - letterbox it inside its frame */
  @media (max-width: 640px) {
    .pinned img {
      object-fit: contain;
      background: var(--paper);
      height: auto;
      aspect-ratio: 16 / 10;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
    .wobble { filter: none !important; }
    .card:hover, .take:hover { transform: none; }
  }
</style>
</head>
<body>

<!-- inline SVG hand-drawn wobble + reusable glyph defs -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="wob" x="-5%" y="-20%" width="110%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.018" numOctaves="2" seed="7" result="n" />
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.4" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>

<main class="wrap">

  <!-- HEADER + signature visible at scroll=0 -->
  <header class="top">
    <div class="lead">
      <p class="greeting" id="greeting"></p>
      <h1 class="wobble" id="title"></h1>
      <span class="h1-underline wobble" aria-hidden="true">
        <svg viewBox="0 0 420 16" preserveAspectRatio="none">
          <path d="M4 11 C 90 4, 150 14, 230 7 S 360 4, 416 9" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
          <path d="M14 14 C 110 9, 200 16, 300 11 S 380 12, 410 13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
        </svg>
      </span>
      <p class="subtitle" id="subtitle"></p>
    </div>

    <figure class="pinned wobble" aria-hidden="true">
      <span class="tape"></span>
      <img src="../assets/flux-clinic-4k.png" alt="" loading="lazy" />
      <figcaption class="cap" id="clinicCap"></figcaption>
    </figure>
  </header>

  <div class="tally">
    <span class="pill"><span class="dot"></span> <b id="waitingCount">0</b> waiting on you</span>
    <span class="pill"><span class="dot done"></span> <b id="handledCount">0</b> handled by the assistant today</span>
    <span style="color:var(--ink-faint)">it does the easy ones, hands you the judgment calls</span>
  </div>

  <section class="queue" id="queue" aria-label="Escalation queue, most urgent first"></section>

  <footer class="footer">
    <span class="rule wobble" aria-hidden="true">
      <svg viewBox="0 0 220 12" preserveAspectRatio="none">
        <path d="M3 7 C 60 2, 120 11, 180 5 S 210 7, 217 6" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </span>
    When the list is empty, go get a coffee. The assistant will keep the lights on.
  </footer>

</main>

<script>
  /* ---- channel glyphs, hand-drawn ---- */
  const GLYPH = {
    voice: '<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4.5c-2 0-3.4 1.5-3.4 3.6v5.1c0 2.1 1.4 3.6 3.4 3.6s3.4-1.5 3.4-3.6V8.1C17.4 6 16 4.5 14 4.5Z"/><path d="M7.5 12.6c.3 3.7 3.1 6 6.5 6s6.2-2.3 6.5-6"/><path d="M14 18.8v4.4M10.4 23.4h7.2"/></svg>',
    line:  '<svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4.6c-5.6 0-10.2 3.6-10.2 8.1 0 4 3.7 7.4 8.7 8 .9.1.8.6.7 1.2-.1.5-.4 1.7-.4 1.7-.1.5-.4 1.5 1 .9 1.4-.6 7.6-4.5 10.4-7.7 1.4-1.5 2-3.1 2-4.1 0-4.5-4.6-8.1-10.2-8.1Z"/><path d="M9.6 11.8v3.7M9.6 11.8h-1.7M13 11.8v3.7l-2.6-3.7v3.7M16.3 11.8v3.7M16.3 11.8h2M16.3 13.6h1.6M16.3 15.5h2"/></svg>'
  };

  function urgencyClass(min) { return min >= 12 ? "" : "calm"; }

  function waitLabel(min) {
    if (min < 1) return ["just now", "WAITING"];
    if (min < 60) return [String(min), "MIN WAITING"];
    return [String(Math.round(min/60*10)/10), "HRS WAITING"];
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[c]));
  }

  function render() {
    // header
    document.getElementById("greeting").textContent = HEADER.greeting;
    document.getElementById("title").textContent = HEADER.title;
    document.getElementById("subtitle").textContent = HEADER.subtitle;
    document.getElementById("clinicCap").innerHTML =
      escapeHtml(HEADER.clinic.split(",")[0]) + "<small>" + escapeHtml(HEADER.clinic) + "</small>";
    document.getElementById("handledCount").textContent = HEADER.handled;

    // sort most-urgent (longest wait) first
    const items = QUEUE.slice().sort((a,b) => b.waitMinutes - a.waitMinutes);
    document.getElementById("waitingCount").textContent = items.length;

    const q = document.getElementById("queue");
    q.innerHTML = "";

    items.forEach((it, i) => {
      const top = i === 0;
      const [num, lbl] = waitLabel(it.waitMinutes);
      const card = document.createElement("article");
      card.className = "card wobble" + (top ? " top" : "");

      const valLine = it.value > 0
        ? '<span class="foot-note"><span class="val">' + it.value.toLocaleString() + ' THB</span> at stake &middot; ' + escapeHtml(it.note) + '</span>'
        : '<span class="foot-note">' + escapeHtml(it.note) + '</span>';

      card.innerHTML =
        (top ? '<span class="ribbon" aria-hidden="true">waiting longest</span>' : '') +
        '<div class="card-head">' +
          '<div class="who">' +
            '<p class="patient">' + escapeHtml(it.patient) + '</p>' +
            '<div class="meta-row">' +
              '<span class="channel ' + it.channel + '">' + GLYPH[it.channel] +
                (it.channel === "voice" ? "phone call" : "LINE chat") +
              '</span>' +
              '<span class="case-id">' + escapeHtml(it.id) + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="wait" aria-label="' + num + ' ' + lbl.toLowerCase() + '">' +
            '<span class="num ' + urgencyClass(it.waitMinutes) + '">' + num + '</span>' +
            '<span class="lbl">' + lbl + '</span>' +
          '</div>' +
        '</div>' +
        '<p class="reason">' + escapeHtml(it.reason) + '"</p>' +
        '<div class="snippet">' + escapeHtml(it.snippet) +
          (it.quote && it.quote !== it.snippet ? '<span class="gloss">' + escapeHtml(it.quote) + '</span>' : '') +
        '</div>' +
        '<div class="card-foot">' +
          valLine +
          '<button class="take" type="button">I will take it</button>' +
        '</div>';

      const btn = card.querySelector(".take");
      btn.addEventListener("click", () => {
        if (btn.classList.contains("taken")) return;
        btn.classList.add("taken");
        btn.textContent = "Yours now, Dr. Ploy";
        card.style.opacity = "0.66";
        const wc = document.getElementById("waitingCount");
        wc.textContent = Math.max(0, parseInt(wc.textContent, 10) - 1);
      });

      q.appendChild(card);
    });
  }

  render();
</script>
