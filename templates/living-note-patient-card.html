<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Living Note - Patient Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Kalam:wght@400;700&family=Gaegu:wght@400;700&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   LIVING NOTE - hand-drawn patient index card
   Warm paper + ink + ONE muted accent (sage clay).
   All hand-drawn strokes are inline SVG with literal hex.
   ============================================================ */
:root{
  --paper:#f7f3ea;
  --paper-2:#f1ebdc;
  --ink:#2a2722;
  --ink-soft:#5a5348;
  --ink-faint:#8a8170;
  --accent:#7c8b6b;        /* muted sage clay - the ONE accent */
  --accent-deep:#5f6e50;
  --line:#cfc6b2;
  --tag-rose:#e9d5cf;
  --tag-rose-ink:#8a5c52;
  --tag-sky:#d3ddde;
  --tag-sky-ink:#4f6b6e;
  --tag-sun:#ece1c2;
  --tag-sun-ink:#8a7434;
  --tag-sage:#d9e0cd;
  --tag-sage-ink:#566443;
  --card:#fbf8f0;
  --shadow:rgba(58,50,38,.16);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-width:0}
html{-webkit-text-size-adjust:100%}
body{
  background:
    radial-gradient(120% 90% at 15% 0%, #fbf8f0 0%, var(--paper) 42%, var(--paper-2) 100%);
  color:var(--ink);
  font-family:"Noto Sans Thai","Kalam",system-ui,sans-serif;
  line-height:1.6;
  overflow-x:hidden;
  min-height:100vh;
  /* faint paper grain */
  background-attachment:fixed;
}
body::before{
  content:"";
  position:fixed;inset:0;
  pointer-events:none;
  z-index:0;
  opacity:.5;
  background-image:
    radial-gradient(rgba(120,108,86,.05) 1px, transparent 1.4px);
  background-size:7px 7px;
}
.wrap{
  position:relative;
  z-index:1;
  max-width:1180px;
  width:100%;
  margin:0 auto;
  padding:28px clamp(14px,4vw,40px) 64px;
}

/* ---- top band: clinic stamp + meta, compact so card stays above fold ---- */
.topband{
  display:flex;
  align-items:center;
  gap:clamp(12px,2.4vw,22px);
  flex-wrap:wrap;
  margin-bottom:18px;
  min-width:0;
}
.stamp{
  position:relative;
  flex:0 0 auto;
  width:clamp(108px,16vw,168px);
  max-width:40vw;
  aspect-ratio:16/9;
  border-radius:10px;
  overflow:hidden;
  filter:sepia(.18) saturate(.92) contrast(1.02);
  box-shadow:0 6px 16px -8px var(--shadow);
  min-width:0;
}
.stamp img{width:100%;height:100%;object-fit:cover;display:block;mix-blend-mode:multiply;opacity:.92}
.stamp svg.tape{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.topmeta{min-width:0;flex:1 1 220px}
.kicker{
  font-family:"Caveat",cursive;
  font-size:clamp(18px,2.4vw,24px);
  color:var(--accent-deep);
  font-weight:700;
  letter-spacing:.2px;
  margin:0;
  line-height:1.1;
}
.kicker em{font-style:normal;color:var(--ink-faint);font-size:.74em}
.clinicline{
  font-size:12.5px;
  color:var(--ink-soft);
  margin:3px 0 0;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
}
.dotsep{width:4px;height:4px;border-radius:50%;background:var(--line);display:inline-block}
.livebadge{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11.5px;color:var(--accent-deep);
  font-weight:600;
  background:rgba(124,139,107,.12);
  border:1px solid rgba(124,139,107,.32);
  border-radius:999px;
  padding:3px 10px 3px 8px;
  white-space:nowrap;
}
.pulse{position:relative;width:8px;height:8px}
.pulse i{position:absolute;inset:0;border-radius:50%;background:var(--accent)}
.pulse i::after{content:"";position:absolute;inset:0;border-radius:50%;background:var(--accent);
  animation:ping 2.4s cubic-bezier(0,0,.2,1) infinite}
@keyframes ping{0%{transform:scale(1);opacity:.7}80%,100%{transform:scale(2.6);opacity:0}}

/* ---- the card ---- */
.card{
  position:relative;
  background:
    linear-gradient(180deg,var(--card),#f7f2e7);
  border-radius:16px;
  padding:clamp(20px,3.4vw,40px) clamp(18px,3.4vw,42px) clamp(24px,3.4vw,40px);
  box-shadow:
    0 1px 0 rgba(255,255,255,.6) inset,
    0 18px 44px -22px var(--shadow),
    0 2px 8px -4px rgba(58,50,38,.12);
  min-width:0;
}
/* hand-drawn double frame */
.frame{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.frame path,.frame line{vector-effect:non-scaling-stroke}
/* ruled-paper margin line (the classic index-card red rule, here muted accent) */
.card::before{
  content:"";
  position:absolute;
  left:clamp(40px,6vw,64px);top:14px;bottom:14px;
  width:1.5px;
  background:linear-gradient(180deg,transparent,rgba(124,139,107,.45) 12%,rgba(124,139,107,.45) 88%,transparent);
  pointer-events:none;
}
@media(max-width:560px){.card::before{display:none}}

.cardgrid{
  position:relative;
  display:grid;
  grid-template-columns:minmax(0,1.15fr) minmax(0,1fr);
  gap:clamp(18px,3vw,40px);
  min-width:0;
  padding-left:clamp(8px,2vw,22px);
}
@media(max-width:760px){.cardgrid{grid-template-columns:1fr;gap:22px;padding-left:0}}

/* head row: avatar + name + facts */
.headrow{display:flex;gap:clamp(14px,2.4vw,22px);align-items:flex-start;min-width:0}
.avatar{
  position:relative;flex:0 0 auto;
  width:clamp(78px,12vw,104px);height:clamp(78px,12vw,104px);
}
.avatar svg{width:100%;height:100%;display:block;overflow:visible}
.avatar .initials{
  position:absolute;inset:0;display:grid;place-items:center;
  font-family:"Caveat",cursive;font-weight:700;
  font-size:clamp(30px,5vw,40px);color:var(--accent-deep);
  transform:rotate(-4deg);
}
.namecol{min-width:0;flex:1 1 auto}
.pname{
  font-family:"Caveat",cursive;
  font-weight:700;
  font-size:clamp(34px,6.4vw,56px);
  line-height:.98;
  margin:2px 0 2px;
  color:var(--ink);
  overflow-wrap:anywhere;
}
.pname .th{font-family:"Caveat","Noto Sans Thai",cursive}
.psub{
  font-family:"Kalam",cursive;
  font-size:13.5px;color:var(--ink-soft);
  margin:0 0 8px;
  display:flex;gap:8px;flex-wrap:wrap;align-items:baseline;
}
.psub b{color:var(--ink);font-weight:700}
.pid{
  font-family:"Gaegu","Kalam",cursive;
  font-size:12px;color:var(--ink-faint);
  letter-spacing:.4px;
}

/* hand-underline under name */
.uline{display:block;width:min(260px,86%);height:10px;margin:-2px 0 10px;overflow:visible}

/* facts: handwritten "label: value" rows */
.facts{
  list-style:none;margin:12px 0 0;padding:0;
  display:grid;grid-template-columns:1fr 1fr;gap:9px clamp(14px,2.4vw,26px);
  min-width:0;
}
/* keep facts 2-up on phones (values are short) so the card stays compact and the
   timeline mechanic can peek into the first viewport at scroll=0 */
@media(max-width:420px){.facts{gap:8px 12px}}
.facts li{min-width:0}
.flabel{
  display:block;
  font-family:"Gaegu","Kalam",cursive;
  font-size:12px;letter-spacing:.3px;text-transform:lowercase;
  color:var(--ink-faint);
}
.fval{
  display:block;
  font-family:"Kalam",cursive;font-weight:700;
  font-size:15px;color:var(--ink);
  overflow-wrap:anywhere;
  white-space:normal;
}
.fval.accent{color:var(--accent-deep)}

/* clinical notes block */
.notes{min-width:0}
.blkhead{
  display:flex;align-items:center;gap:9px;
  font-family:"Caveat",cursive;font-weight:700;
  font-size:clamp(19px,2.6vw,23px);color:var(--accent-deep);
  margin:0 0 6px;
}
.blkhead svg{flex:0 0 auto}
.noteline{
  font-family:"Kalam",cursive;
  font-size:15px;line-height:1.85;color:var(--ink);
  margin:0;
  /* faint ruled lines behind handwriting */
  background-image:linear-gradient(transparent calc(1.85em - 1px), rgba(176,165,140,.34) 1px);
  background-size:100% 1.85em;
  background-position:0 .42em;
  padding-top:.1em;
  overflow-wrap:anywhere;
}
.noteline + .noteline{margin-top:.55em}
.noteline .hl{
  background:linear-gradient(180deg,transparent 56%,rgba(124,139,107,.30) 56%);
  padding:0 2px;border-radius:2px;
}
.notemeta{
  font-family:"Gaegu","Kalam",cursive;font-size:11.5px;color:var(--ink-faint);
  margin:10px 0 0;
}

/* divider between cols on stacked view */
.colsep{display:none}
@media(max-width:760px){
  .colsep{display:block;height:1px;width:100%;margin:2px 0;overflow:visible}
}

/* tags */
.tags{display:flex;flex-wrap:wrap;gap:9px;margin:16px 0 0;min-width:0}
.tag{
  font-family:"Kalam",cursive;font-weight:700;font-size:12.5px;
  padding:4px 12px;border-radius:999px;
  position:relative;white-space:nowrap;max-width:100%;
  overflow:hidden;text-overflow:ellipsis;
  border:1.5px solid rgba(42,39,34,.14);
  transform:rotate(var(--rot,0deg));
  box-shadow:0 2px 5px -3px var(--shadow);
}
.tag.rose{background:var(--tag-rose);color:var(--tag-rose-ink)}
.tag.sky{background:var(--tag-sky);color:var(--tag-sky-ink)}
.tag.sun{background:var(--tag-sun);color:var(--tag-sun-ink)}
.tag.sage{background:var(--tag-sage);color:var(--tag-sage-ink)}

/* ---- the sketch timeline ---- */
.timeline{
  position:relative;
  margin:clamp(20px,3vw,30px) 0 0;
  padding:clamp(16px,2.4vw,22px) clamp(12px,2.4vw,22px) clamp(14px,2vw,18px);
  border-radius:14px;
  background:linear-gradient(180deg,rgba(255,255,255,.5),rgba(247,242,231,.4));
  min-width:0;
  overflow:hidden;
}
.timeline .tlframe{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}
.tlhead{
  display:flex;align-items:baseline;justify-content:space-between;gap:10px;
  flex-wrap:wrap;margin:0 0 6px;min-width:0;
}
.tlhead h3{
  font-family:"Caveat",cursive;font-weight:700;
  font-size:clamp(20px,2.8vw,25px);color:var(--ink);margin:0;
}
.tlhead .hint{font-family:"Gaegu","Kalam",cursive;font-size:11.5px;color:var(--ink-faint)}
.tlstage{position:relative;width:100%;min-width:0}
.tlsvg{display:block;width:100%;height:auto;overflow:visible}
.tl-dot{cursor:pointer}
.tl-dot circle.hit{fill:transparent}
.tl-dot:focus{outline:none}
.tl-dot:focus-visible .ring{stroke:#2a2722;stroke-width:2.4}
/* active dot scales gently */
.tl-dot .ring{transition:transform .25s ease, stroke .2s ease}
.tl-dot[data-active="1"] .ring{stroke:#5f6e50;stroke-width:3}
.tl-dot .fillc{transition:fill .2s ease}
.tl-dot[data-active="1"] .fillc{fill:#7c8b6b}

/* timeline detail card (handwritten callout) */
.tldetail{
  margin:12px 0 0;
  min-height:64px;
  position:relative;
  font-family:"Kalam",cursive;
  min-width:0;
}
.tldetail .stickyrow{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;min-width:0}
.tldate{
  font-family:"Caveat",cursive;font-weight:700;font-size:21px;color:var(--accent-deep);
  white-space:nowrap;flex:0 0 auto;
}
.tlchan{
  font-family:"Gaegu","Kalam",cursive;font-size:11px;color:var(--ink-faint);
  border:1.4px dashed rgba(124,139,107,.5);border-radius:999px;
  padding:2px 9px;flex:0 0 auto;white-space:nowrap;
}
.tltext{font-size:14.5px;color:var(--ink);flex:1 1 220px;min-width:0;line-height:1.7;overflow-wrap:anywhere}
.tlamount{font-family:"Caveat",cursive;font-weight:700;color:var(--ink);font-size:18px;white-space:nowrap;flex:0 0 auto}

/* footer scribble */
.foot{
  margin:22px clamp(8px,2vw,22px) 0;
  display:flex;gap:10px;align-items:center;justify-content:space-between;
  flex-wrap:wrap;min-width:0;
}
.foot .by{font-family:"Gaegu","Kalam",cursive;font-size:12px;color:var(--ink-faint);display:flex;align-items:center;gap:8px}
.foot .sig{font-family:"Caveat",cursive;font-weight:700;font-size:22px;color:var(--accent-deep);transform:rotate(-3deg)}

/* ---- phone compaction: pull the sketch timeline (the signature mechanic) up so a
       populated partial view peeks into the first viewport at scroll=0, and letterbox
       the one cover image so it never landscape-crops on a narrow screen ---- */
@media (max-width:640px){
  .wrap{padding-top:16px;padding-bottom:48px}
  /* keep the clinic stamp and its meta on ONE row (no vertical wrap) so the band stays short */
  .topband{margin-bottom:12px;gap:11px;flex-wrap:nowrap}
  .stamp{
    /* letterbox the clinic photo instead of cover-cropping it on phones */
    aspect-ratio:auto;height:58px;width:96px;max-width:34vw;
    background:var(--paper-2);
  }
  .stamp img{object-fit:contain}
  .topmeta{flex:1 1 0;min-width:0}
  .clinicline{font-size:12px;gap:7px}
  /* let the live badge wrap inside the meta column instead of overflowing on narrow phones */
  .livebadge{white-space:normal;max-width:100%}
  .card{padding-top:16px}
  .cardgrid{gap:14px}
  .headrow{gap:13px}
  .pname{font-size:clamp(28px,8vw,42px)}
  .avatar{width:64px;height:64px}
  .uline{margin:-2px 0 7px}
  .pid{margin-top:1px}
  .facts{margin-top:9px}
  .tags{margin-top:11px}
  .notes .blkhead{margin-bottom:3px;font-size:clamp(18px,2.6vw,21px)}
  .notes .noteline{font-size:13.5px;line-height:1.55}
  .noteline + .noteline{margin-top:.4em}
  .notemeta{margin-top:6px}
  .timeline{margin-top:11px;padding-top:13px}
}

@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important}
  .pulse i::after{display:none}
}
</style>
</head>

<!-- ===== top band: clinic stamp + meta (compact, keeps card above the fold) ===== -->
<header class="topband" id="topband"></header>

    <svg class="tlframe" viewBox="0 0 1000 200" preserveAspectRatio="none" aria-hidden="true">
      <path d="M10,16 C300,8 700,12 990,10 M8,184 C320,192 680,188 992,186 M10,16 C8,80 12,140 10,184 M990,10 C992,80 988,140 990,186"
        fill="none" stroke="#cfc6b2" stroke-width="1.4" stroke-dasharray="2 7" stroke-linecap="round" opacity="0.9"/>
    </svg>
    <div class="tlhead">
      <h3>visit timeline</h3>
      <span class="hint">tap a dot - the AI keeps it current</span>
    </div>
    <div class="tlstage">
      <svg class="tlsvg" id="tlsvg" viewBox="0 0 1000 120" preserveAspectRatio="xMidYMid meet" role="group" aria-label="Interactive visit timeline"></svg>
    </div>
    <div class="tldetail" id="tldetail" aria-live="polite"></div>
  </section>
</main>

<div class="foot">
  <span class="by">
    <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true"><path d="M4,14 C4,9 8,5 12,5 C16,5 20,9 20,14 M8,14 a4,4 0 0 0 8,0" fill="none" stroke="#8a8170" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span id="capnote"></span>
  </span>
  <span class="sig">~ น้องยิ้มหวาน</span>
</div>
</div>

<script>
/* ============================================================
   RENDER - pure DOM, no libs.
   ============================================================ */
(function(){
  const P = DATA.patient, C = DATA.clinic, TL = DATA.timeline;
  const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  /* ---- top band ---- */
  const tb = document.getElementById('topband');
  tb.innerHTML = `
    <figure class="stamp">
      <img src="${esc(C.photo)}" alt="${esc(C.name)} clinic interior" loading="lazy" decoding="async"/>
      <svg class="tape" viewBox="0 0 100 56" preserveAspectRatio="none" aria-hidden="true">
        <rect x="30" y="-6" width="40" height="16" rx="2" transform="rotate(-6 50 2)" fill="#efe7d2" opacity="0.85" stroke="#d8cdb2" stroke-width="0.6"/>
      </svg>
    </figure>
    <div class="topmeta">
      <p class="kicker">patient note <em>/ living index card</em></p>
      <p class="clinicline">
        <span>${esc(C.name)}</span><span class="dotsep"></span>
        <span>${esc(C.branch)}</span>
        <span class="livebadge"><span class="pulse"><i></i></span>AI keeping this current</span>
      </p>
    </div>`;

  /* ---- identity ---- */
  document.getElementById('initials').textContent = P.initials;
  document.getElementById('pname').textContent = P.name;
  document.getElementById('psub').innerHTML =
    `<b>${esc(P.pronounNote)}</b> <span class="dotsep" style="background:#cfc6b2"></span> first seen ${esc(P.firstSeen)} <span class="dotsep" style="background:#cfc6b2"></span> ${esc(P.visits)} visits`;
  document.getElementById('pid').textContent = "ref " + P.id + "  -  next due: " + P.nextDue;

  /* ---- facts ---- */
  document.getElementById('facts').innerHTML = P.facts.map(f =>
    `<li><span class="flabel">${esc(f.label)}</span><span class="fval${f.accent?' accent':''}">${esc(f.value)}</span></li>`
  ).join('');

  /* ---- notes ---- */
  document.getElementById('notes').innerHTML = P.notes.map(n =>
    `<p class="noteline">${n.html}</p>`
  ).join('');
  document.getElementById('notemeta').textContent = P.noteMeta;

  /* ---- tags ---- */
  document.getElementById('tags').innerHTML = P.tags.map(t =>
    `<span class="tag ${t.tone}" style="--rot:${t.rot}">${esc(t.text)}</span>`
  ).join('');

  document.getElementById('capnote').textContent = C.capturedBy;

  /* ---- sketch timeline ---- */
  const svg = document.getElementById('tlsvg');
  const W = 1000, H = 120, padX = 46, baseY = 64;
  const n = TL.length;
  const span = (W - padX*2) / Math.max(1, n-1);
  // wobble offsets (deterministic so it feels hand-drawn but stable)
  const wob = [0,-7,5,-4,8,-3,6,-5,4];
  const pts = TL.map((v,i)=>({ x: padX + i*span, y: baseY + (wob[i%wob.length]||0) }));

  // wobbly connecting line through points (smooth-ish path)
  let d = `M${pts[0].x},${pts[0].y}`;
  for(let i=1;i<pts.length;i++){
    const a=pts[i-1], b=pts[i];
    const cx=(a.x+b.x)/2;
    d += ` C${cx},${a.y-6} ${cx},${b.y+6} ${b.x},${b.y}`;
  }

  const SVGNS="http://www.w3.org/2000/svg";
  const mk=(t,a)=>{const e=document.createElementNS(SVGNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};

  // base scribbled line (under-stroke + main)
  svg.appendChild(mk('path',{d, fill:'none', stroke:'#cfc6b2', 'stroke-width':3.4, 'stroke-linecap':'round', opacity:'0.7', transform:'translate(0,2)'}));
  svg.appendChild(mk('path',{d, fill:'none', stroke:'#7c8b6b', 'stroke-width':2.2, 'stroke-linecap':'round', opacity:'0.85'}));

  // little start/end arrow flourish
  const last=pts[pts.length-1];
  const arrow=mk('path',{d:`M${last.x-12},${last.y-7} L${last.x+2},${last.y} L${last.x-12},${last.y+7}`,fill:'none',stroke:'#7c8b6b','stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round',opacity:'0.85'});
  svg.appendChild(arrow);

  const detail = document.getElementById('tldetail');
  const dots = [];
  function setActive(i){
    dots.forEach((g,j)=>g.setAttribute('data-active', j===i?'1':'0'));
    const v = TL[i];
    detail.innerHTML = `
      <div class="stickyrow">
        <span class="tldate">${esc(v.date)}</span>
        <span class="tlchan">${esc(v.channel)}</span>
        <span class="tltext">${esc(v.text)}</span>
        ${v.amount ? `<span class="tlamount">${esc(v.amount)}</span>` : ``}
      </div>`;
  }

  pts.forEach((p,i)=>{
    const g = mk('g',{class:'tl-dot', tabindex:'0', role:'button',
      'aria-label':`Visit ${i+1}: ${TL[i].date}, ${TL[i].channel}`, 'data-active':'0'});
    // generous invisible hit target
    g.appendChild(mk('circle',{class:'hit', cx:p.x, cy:p.y, r:22}));
    // ring
    g.appendChild(mk('circle',{class:'ring', cx:p.x, cy:p.y, r:9, fill:'#fbf8f0', stroke:'#7c8b6b', 'stroke-width':'2.2'}));
    // inner fill dot
    g.appendChild(mk('circle',{class:'fillc', cx:p.x, cy:p.y, r:4.2, fill:'#cfc6b2'}));
    // date label under each dot (handwritten, small)
    const lbl = mk('text',{x:p.x, y:p.y+30, 'text-anchor':'middle',
      'font-family':'Gaegu, Kalam, cursive', 'font-size':'12.5', fill:'#8a8170'});
    lbl.textContent = TL[i].date.split(' ').slice(0,2).join(' '); // short label e.g. "13 Jun"
    svg.appendChild(lbl);

    g.addEventListener('click', ()=>setActive(i));
    g.addEventListener('keydown', e=>{
      if(e.key==='Enter'||e.key===' '){e.preventDefault();setActive(i);}
      if(e.key==='ArrowRight'){e.preventDefault();const t=dots[(i+1)%n];t.focus();setActive((i+1)%n);}
      if(e.key==='ArrowLeft'){e.preventDefault();const k=(i-1+n)%n;dots[k].focus();setActive(k);}
    });
    svg.appendChild(g);
    dots.push(g);
  });

  // open on the most recent visit by default
  setActive(n-1);
})();
</script>
</body>
</html>
