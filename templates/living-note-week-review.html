<!-- TEMPLATE: Living Note | ARCHETYPE: living-note-week-review | REF: hand-drawn notebook, handwritten reflective weekly review page | WHEN TO USE: a calm owner-facing weekly summary that should feel like a person wrote it by hand in a notebook | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>This week - Yimwhan weekly review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Shantell+Sans:ital,wght@0,400;0,500;0,600;1,500&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   LIVING NOTE - handwritten weekly review
   Swap content: edit the DATA object in the <script> at the very
   top of the body. Everything renders from it - week range, the
   summary line, the wobbly week-over-week sketch chart, and the
   two handwritten lists. Inline SVG uses literal hex (never var()).
   ============================================================ */
:root{
  --cream:#f7f3ea;       /* warm notebook paper          */
  --cream-deep:#efe8d8;  /* shaded page edge             */
  --ink:#2a2722;         /* main ink                     */
  --ink-soft:#6a6354;    /* lighter pencil               */
  --accent:#3f6e63;      /* ONE muted accent (sage ink)  */
  --accent-soft:#7fa49a;
  --hi:#f4d35e;          /* soft highlighter             */
  --hi-warm:#f6e7a8;
  --rule:rgba(42,39,34,.10);
  --margin:#d98b7e;      /* notebook red margin rule     */
  --maxw:1180px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--cream);
  color:var(--ink);
  font-family:'Spectral',Georgia,serif;
  line-height:1.6;
  min-width:0;
  overflow-x:hidden;
  /* faint ruled-paper lines + warm paper grain */
  background-image:
    radial-gradient(900px 600px at 84% -8%, rgba(63,110,99,.06), transparent 60%),
    radial-gradient(700px 520px at 6% 108%, rgba(217,139,126,.06), transparent 60%);
}
img,svg,video{max-width:100%;height:auto;display:block}

/* ---- handwriting helpers ---- */
.hand{font-family:'Caveat',cursive;line-height:1.05}
.hand-b{font-family:'Shantell Sans',cursive}

/* ---- page shell ---- */
.page-wrap{
  max-width:var(--maxw);
  margin:0 auto;
  padding:26px clamp(14px,4vw,40px) 80px;
  min-width:0;
}

/* the notebook sheet */
.sheet{
  position:relative;
  background:var(--cream);
  border-radius:6px;
  padding:clamp(22px,4vw,52px) clamp(18px,4vw,56px) clamp(34px,5vw,64px);
  /* left margin rule lives inside via ::before */
  box-shadow:
    0 1px 0 rgba(255,255,255,.6) inset,
    0 30px 70px -42px rgba(42,39,34,.5),
    0 2px 6px rgba(42,39,34,.06);
  background-image:repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 37px,
    var(--rule) 37px,
    var(--rule) 38px
  );
  background-position:0 64px;
  overflow:hidden;
  min-width:0;
}
/* torn / soft page top sheen */
.sheet::after{
  content:"";position:absolute;inset:0;border-radius:6px;pointer-events:none;
  box-shadow:0 0 0 1px rgba(42,39,34,.06) inset;
}
/* red notebook margin (desktop) */
.sheet::before{
  content:"";position:absolute;top:0;bottom:0;
  left:clamp(46px,7vw,92px);width:1px;
  background:linear-gradient(to bottom,transparent,rgba(217,139,126,.55) 8%,rgba(217,139,126,.55) 92%,transparent);
  pointer-events:none;
}
.inset{padding-left:clamp(14px,3vw,46px);min-width:0}

/* ---- top band: date + meta ---- */
.topline{
  display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 18px;
  margin:0 0 4px;color:var(--ink-soft);
}
.kicker{
  font-family:'Shantell Sans',cursive;font-size:.72rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--accent);font-weight:600;
}
.clinic{
  font-family:'Shantell Sans',cursive;font-size:.74rem;color:var(--ink-soft);
  margin-left:auto;font-style:italic;
}

/* ---- week-range header ---- */
.week-head{
  display:flex;align-items:flex-end;gap:14px clamp(14px,3vw,30px);
  flex-wrap:wrap;margin:2px 0 6px;min-width:0;
  padding-right:6px;
}
.week-range{
  font-family:'Caveat',cursive;font-weight:700;
  font-size:clamp(2.7rem,7vw,4.6rem);line-height:.92;color:var(--ink);
  margin:0;letter-spacing:.4px;min-width:0;
}
.week-range small{
  display:block;font-size:clamp(1rem,2.4vw,1.5rem);font-weight:500;
  color:var(--ink-soft);letter-spacing:.3px;margin-top:2px;
}
.week-no{
  font-family:'Shantell Sans',cursive;font-size:.78rem;color:var(--accent);
  border:1.5px solid rgba(63,110,99,.4);border-radius:40px;
  padding:5px 13px;transform:rotate(-2.4deg);white-space:nowrap;
  background:rgba(63,110,99,.05);align-self:center;
}

/* ---- summary line with highlighter ---- */
.summary{
  font-family:'Caveat',cursive;font-weight:500;
  font-size:clamp(1.5rem,3.4vw,2.35rem);line-height:1.22;
  color:var(--ink);margin:14px 0 6px;max-width:30ch;
}
.hl{position:relative;white-space:nowrap;padding:0 .12em;z-index:0;color:var(--ink);}
.hl::before{
  content:"";position:absolute;left:-.06em;right:-.06em;top:14%;bottom:8%;
  background:linear-gradient(100deg,var(--hi) 0%,var(--hi-warm) 100%);
  transform:rotate(-1.1deg) skewX(-7deg);
  border-radius:3px 9px 4px 8px;z-index:-1;opacity:.92;
  filter:saturate(1.05);
  /* animated swipe */
  transform-origin:left center;
}
.subnote{
  font-family:'Shantell Sans',cursive;font-size:.92rem;color:var(--ink-soft);
  font-style:italic;margin:0 0 6px;
}

/* ---- main two-column body ---- */
.body-grid{
  display:grid;grid-template-columns:1.05fr .95fr;
  gap:clamp(22px,4vw,52px);margin-top:clamp(18px,3vw,30px);
  align-items:start;min-width:0;
}
.body-grid>*{min-width:0}

/* hand-drawn week-over-week panel */
.wow{
  position:relative;min-width:0;
}
.section-tag{
  font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1.5rem,3vw,2rem);
  color:var(--ink);margin:0 0 2px;display:flex;align-items:center;gap:10px;
}
.section-tag .dot{
  width:9px;height:9px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 4px rgba(63,110,99,.14);flex:none;
}
.section-sub{
  font-family:'Shantell Sans',cursive;font-size:.78rem;color:var(--ink-soft);
  margin:0 0 12px;font-style:italic;
}
.chart-card{
  background:rgba(255,255,255,.34);
  border:1.5px solid rgba(42,39,34,.12);
  border-radius:12px 14px 11px 13px;
  padding:16px 16px 12px;
  box-shadow:0 14px 30px -22px rgba(42,39,34,.5);
  min-width:0;overflow:hidden;
}
.chart-svg{width:100%;height:auto;display:block;overflow:visible}
.chart-legend{
  display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:10px;
  font-family:'Shantell Sans',cursive;font-size:.72rem;color:var(--ink-soft);
}
.chart-legend i{
  display:inline-block;width:18px;height:0;border-top-width:3px;
  border-top-style:solid;vertical-align:middle;margin-right:6px;border-radius:3px;
}

/* the up/down delta marks row */
.deltas{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;min-width:0;
}
.delta{
  background:rgba(255,255,255,.36);
  border:1.5px solid rgba(42,39,34,.1);
  border-radius:11px 12px 10px 13px;
  padding:11px 10px 9px;text-align:center;min-width:0;
}
.delta .num{
  font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1.6rem,4vw,2.1rem);
  line-height:1;color:var(--ink);display:block;
}
.delta .lab{
  font-family:'Shantell Sans',cursive;font-size:.66rem;color:var(--ink-soft);
  text-transform:uppercase;letter-spacing:.07em;display:block;margin-top:4px;
  overflow-wrap:anywhere;word-break:break-word;line-height:1.2;
}
.delta .vs{
  font-family:'Caveat',cursive;font-weight:600;font-size:1.12rem;margin-top:3px;
  display:inline-flex;align-items:center;gap:3px;
}
.vs.up{color:var(--accent)}
.vs.down{color:var(--margin)}
.vs.flat{color:var(--ink-soft)}

/* lists column */
.lists{display:flex;flex-direction:column;gap:clamp(18px,3vw,26px);min-width:0}
.note-list{min-width:0}
ul.hand-list{list-style:none;margin:8px 0 0;padding:0}
ul.hand-list li{
  position:relative;padding:5px 0 5px 34px;min-width:0;
  font-family:'Shantell Sans',cursive;font-size:clamp(.94rem,1.7vw,1.04rem);
  color:var(--ink);line-height:1.42;
  border-bottom:1px dashed rgba(42,39,34,.12);
}
ul.hand-list li:last-child{border-bottom:0}
ul.hand-list li b{font-weight:600;color:var(--ink)}
/* hand-drawn check / arrow markers via SVG background */
.mark{position:absolute;left:0;top:5px;width:24px;height:24px;flex:none}
li .meta{
  display:block;font-family:'Caveat',cursive;font-size:1.02rem;color:var(--ink-soft);
  line-height:1;margin-top:1px;
}

/* needed-a-human items get a warm tint */
.needs ul.hand-list li{color:var(--ink)}
.needs .pill{
  display:inline-block;font-family:'Shantell Sans',cursive;font-size:.64rem;
  letter-spacing:.06em;text-transform:uppercase;color:#8a4a40;
  background:rgba(217,139,126,.18);border-radius:30px;padding:1px 8px;margin-left:6px;
  transform:rotate(-1.5deg);
}

/* ---- footer sign-off ---- */
.signoff{
  margin-top:clamp(26px,4vw,42px);display:flex;align-items:flex-end;
  justify-content:space-between;gap:18px;flex-wrap:wrap;min-width:0;
  /* tiny right gutter so the rotated handwritten signature's corner stays inside the page box */
  padding-right:4px;
}
.signoff p{
  font-family:'Caveat',cursive;font-size:clamp(1.4rem,3vw,1.9rem);color:var(--ink);
  margin:0;max-width:34ch;line-height:1.18;
}
.sig{
  font-family:'Caveat',cursive;font-weight:700;font-size:clamp(1.7rem,4vw,2.4rem);
  color:var(--accent);transform:rotate(-3deg);white-space:nowrap;
}
.sig small{display:block;font-size:.5em;color:var(--ink-soft);font-weight:400;transform:rotate(1deg);}

/* tiny pinned clinic photo, paper-clipped feel */
.clip-photo{
  position:absolute;top:18px;right:clamp(10px,3vw,26px);width:clamp(74px,12vw,118px);
  transform:rotate(3.4deg);z-index:3;pointer-events:none;
}
.clip-photo img{
  width:100%;border-radius:3px;border:5px solid #fff;
  box-shadow:0 12px 26px -12px rgba(42,39,34,.55);object-fit:cover;aspect-ratio:4/3;
}
.clip-photo::before{
  content:"";position:absolute;top:-13px;left:50%;width:26px;height:30px;
  transform:translateX(-50%) rotate(-7deg);
  border:3px solid #b9b3a6;border-radius:8px;border-bottom-color:transparent;
  z-index:2;
}
.clip-cap{
  font-family:'Caveat',cursive;font-size:1rem;color:var(--ink-soft);text-align:center;
  margin-top:3px;transform:rotate(-1deg);
}

/* entrance animation (highlighter swipe + draw-in) honoring reduced motion */
.hl::before{animation:swipe .7s .35s cubic-bezier(.2,.7,.3,1) both}
@keyframes swipe{from{transform:rotate(-1.1deg) skewX(-7deg) scaleX(0)}to{transform:rotate(-1.1deg) skewX(-7deg) scaleX(1)}}
.draw{stroke-dasharray:var(--len,600);stroke-dashoffset:var(--len,600);animation:draw 1.1s .25s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.fade-up{opacity:0;transform:translateY(10px);animation:fadeUp .6s ease forwards}
.d1{animation-delay:.15s}.d2{animation-delay:.28s}.d3{animation-delay:.42s}.d4{animation-delay:.55s}.d5{animation-delay:.68s}
@keyframes fadeUp{to{opacity:1;transform:none}}

:focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:4px}

/* ---- mobile: single column, stack, drop the margin rule ---- */
@media (max-width:760px){
  .body-grid{grid-template-columns:1fr}
  .sheet::before{display:none}
  .inset{padding-left:0}
  .sheet{background-position:0 56px}
  .clinic{margin-left:0;width:100%}
  .clip-photo{position:relative;top:auto;right:auto;width:140px;margin:14px auto 0;transform:rotate(-2deg)}
  .clip-photo::before{display:none}
  .summary{max-width:none}
  .deltas{grid-template-columns:1fr 1fr 1fr}
}
/* <=640px: letterbox the pinned photo so the landscape clinic shot is never
   side-cropped on phones (contain, not cover). Stack is already handled at 760px. */
@media (max-width:640px){
  .clip-photo{width:min(190px,62vw)}
  .clip-photo img{
    aspect-ratio:auto;object-fit:contain;
    background:#f0ead9;border-width:6px;
  }
}
@media (max-width:430px){
  .deltas{grid-template-columns:1fr}
  .delta{display:flex;align-items:center;justify-content:space-between;text-align:left;gap:10px}
  .delta .num{font-size:1.6rem}
  .delta .lab{margin-top:0}
  .signoff{flex-direction:column;align-items:flex-start}
}

@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
  .hl::before{transform:rotate(-1.1deg) skewX(-7deg) scaleX(1)}
  .draw{stroke-dashoffset:0 !important}
  .fade-up{opacity:1 !important;transform:none !important}
}
</style>
</head>
<body>
<script>
/* =========================================================================
   DATA - edit this to reskin the whole page. Numbers drive the sketch chart.
   ========================================================================= */
const DATA = {
  clinic: "Yimwhan Dental - Asoke branch",
  kicker: "Weekly review",
  weekNo: "Week 26",
  weekRange: "Jun 22 - Jun 28",
  weekSub: "Mon to Sun, this week's note",
  // summary line; {{n}} gets wrapped in the highlighter
  summaryLead: "A good week -",
  summaryHi: "198 calls",
  summaryTail: ", 51 booked, 2 needed me.",
  subnote: "Calmer than last week. The phone barely rang past 9pm and nothing slipped through.",
  // headline deltas vs last week
  deltas: [
    { num: "198", label: "Calls handled", vs: "+17", dir: "up" },
    { num: "51",  label: "Appointments booked", vs: "+6", dir: "up" },
    { num: "2",   label: "Escalations to me", vs: "-3", dir: "down" }
  ],
  // week-over-week sketch chart: calls answered per day, this vs last
  chartTitle: "Calls, day by day",
  chartSub: "this week against last week",
  days: ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
  thisWeek: [31, 28, 34, 30, 38, 24, 13],
  lastWeek: [27, 30, 26, 25, 33, 21, 19],
  // handwritten lists
  wins: [
    { t: "Booked 51 appointments without me lifting a finger.", meta: "12 of them after-hours" },
    { t: "Answered every after-hours call. Quietest 9pm-to-midnight yet.", meta: "0 missed" },
    { t: "Quoted whitening + cleaning prices in THB, 40+ times, all correct.", meta: "no price slips" },
    { t: "Repeat patient recognised by phone number, greeted by name.", meta: "felt personal" }
  ],
  needs: [
    { t: "A patient asked about a payment plan I haven't set up yet.", meta: "Tue 2:10pm", tag: "decide" },
    { t: "Someone wanted to move a surgery slot the same day. I confirmed it with them.", meta: "Thu 6:40pm", tag: "judgment" }
  ],
  signoff: "Nothing on fire. The two human calls are both small. Same time next week.",
  signName: "Nong Yimwhan",
  signRole: "your front desk, all week",
  photo: "../assets/flux-clinic-4k.png",
  photoCap: "the front desk"
};
</script>

<div class="page-wrap">
  <main class="sheet" id="sheet" aria-label="Handwritten weekly review">

    <!-- pinned clinic photo -->
    <figure class="clip-photo fade-up d5">
      <img id="photo" alt="The clinic front desk" loading="lazy" decoding="async">
      <figcaption class="clip-cap" id="photoCap"></figcaption>
    </figure>

    <div class="inset">
      <!-- top band -->
      <div class="topline">
        <span class="kicker" id="kicker"></span>
        <span class="clinic" id="clinic"></span>
      </div>

      <!-- week-range header (signature, scroll=0) -->
      <div class="week-head">
        <h1 class="week-range" id="weekRange"></h1>
        <span class="week-no" id="weekNo"></span>
      </div>

      <!-- warm summary line with highlighter on the headline number -->
      <p class="summary fade-up d1" id="summary"></p>
      <p class="subnote fade-up d1" id="subnote"></p>

      <!-- two-column body: sketch chart + lists -->
      <div class="body-grid">

        <!-- week-over-week hand-drawn comparison -->
        <section class="wow fade-up d2" aria-labelledby="wowTag">
          <h2 class="section-tag" id="wowTag"><span class="dot"></span><span id="chartTitle"></span></h2>
          <p class="section-sub" id="chartSub"></p>
          <div class="chart-card">
            <svg class="chart-svg" id="chart" viewBox="0 0 420 220" role="img" aria-label="Hand drawn comparison of calls per day, this week versus last week"></svg>
            <div class="chart-legend">
              <span><i style="border-top-color:#3f6e63"></i>this week</span>
              <span><i style="border-top-color:#b9af97;border-top-style:dashed"></i>last week</span>
            </div>
          </div>
          <!-- up/down delta marks -->
          <div class="deltas" id="deltas"></div>
        </section>

        <!-- wins + needed-a-human -->
        <div class="lists">
          <section class="note-list fade-up d3" aria-labelledby="winsTag">
            <h2 class="section-tag" id="winsTag"><span class="dot"></span>Wins</h2>
            <p class="section-sub">what went right on its own</p>
            <ul class="hand-list" id="wins"></ul>
          </section>

          <section class="note-list needs fade-up d4" aria-labelledby="needsTag">
            <h2 class="section-tag" id="needsTag"><span class="dot" style="background:#d98b7e;box-shadow:0 0 0 4px rgba(217,139,126,.16)"></span>Needed a human</h2>
            <p class="section-sub">two small things for you</p>
            <ul class="hand-list" id="needs"></ul>
          </section>
        </div>
      </div>

      <!-- sign-off -->
      <div class="signoff fade-up d5">
        <p id="signoff"></p>
        <div class="sig"><span id="signName"></span><small id="signRole"></small></div>
      </div>
    </div>
  </main>
</div>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- hand-drawn wobble for chart strokes -->
    <filter id="wobble" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.018" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="3.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="wobble2" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.02" numOctaves="2" seed="19" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<script>
(function(){
  const D = DATA;
  const $ = id => document.getElementById(id);
  const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  // ---- text fields ----
  $('kicker').textContent = D.kicker;
  $('clinic').textContent = D.clinic;
  $('weekRange').innerHTML = esc(D.weekRange) + '<small>' + esc(D.weekSub) + '</small>';
  $('weekNo').textContent = D.weekNo;
  $('summary').innerHTML = esc(D.summaryLead) + ' <span class="hl">' + esc(D.summaryHi) + '</span>' + esc(D.summaryTail);
  $('subnote').textContent = D.subnote;
  $('chartTitle').textContent = D.chartTitle;
  $('chartSub').textContent = D.chartSub;
  $('signoff').textContent = D.signoff;
  $('signName').textContent = D.signName;
  $('signRole').textContent = D.signRole;

  const ph = $('photo');
  ph.src = D.photo; ph.alt = D.photoCap || 'clinic';
  $('photoCap').textContent = D.photoCap;

  // ---- deltas ----
  $('deltas').innerHTML = D.deltas.map(d => {
    const arrow = d.dir === 'up' ? '&#8599;' : d.dir === 'down' ? '&#8600;' : '&#8594;';
    return '<div class="delta"><span class="num">' + esc(d.num) + '</span>'
      + '<span class="lab">' + esc(d.label) + '</span>'
      + '<span class="vs ' + d.dir + '">' + arrow + ' ' + esc(d.vs) + ' vs last</span></div>';
  }).join('');

  // ---- hand-drawn check mark (SVG, reused) ----
  const check = '<svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">'
    + '<path d="M3 13 L9 19 L21 4" stroke="#3f6e63" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" filter="url(#wobble2)"/></svg>';
  const arrowMark = '<svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">'
    + '<path d="M4 12 H19 M13 6 L20 12 L13 18" stroke="#d98b7e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#wobble2)"/></svg>';

  $('wins').innerHTML = D.wins.map(w =>
    '<li>' + check + esc(w.t) + (w.meta ? '<span class="meta">' + esc(w.meta) + '</span>' : '') + '</li>'
  ).join('');

  $('needs').innerHTML = D.needs.map(n =>
    '<li>' + arrowMark + esc(n.t)
    + (n.tag ? '<span class="pill">' + esc(n.tag) + '</span>' : '')
    + (n.meta ? '<span class="meta">' + esc(n.meta) + '</span>' : '') + '</li>'
  ).join('');

  // ---- hand-drawn week-over-week sketch chart ----
  // build two polylines (this week solid sage, last week dashed pencil) with
  // an inline feTurbulence wobble so the lines read as drawn by hand.
  (function chart(){
    const svg = $('chart');
    const W = 420, H = 220, padL = 26, padR = 12, padT = 14, padB = 30;
    const days = D.days, a = D.thisWeek, b = D.lastWeek;
    const max = Math.max.apply(null, a.concat(b)) * 1.12;
    const x = i => padL + i * (W - padL - padR) / (days.length - 1);
    const y = v => H - padB - (v / max) * (H - padT - padB);

    let out = '';

    // soft hand-ruled baseline grid (3 faint lines)
    for (let g = 1; g <= 3; g++){
      const gy = padT + g * (H - padT - padB) / 4;
      out += '<line x1="' + padL + '" y1="' + gy.toFixed(1) + '" x2="' + (W - padR) + '" y2="' + gy.toFixed(1)
        + '" stroke="#2a2722" stroke-opacity="0.07" stroke-width="1" stroke-dasharray="2 5"/>';
    }

    const path = arr => arr.map((v,i) => (i ? 'L' : 'M') + x(i).toFixed(1) + ' ' + y(v).toFixed(1)).join(' ');

    // last week - dashed pencil, behind
    const lenB = 520;
    out += '<path d="' + path(b) + '" fill="none" stroke="#b9af97" stroke-width="2.4" '
      + 'stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="1 7" '
      + 'filter="url(#wobble)" opacity="0.95"/>';
    // little dots for last week
    b.forEach((v,i) => { out += '<circle cx="' + x(i).toFixed(1) + '" cy="' + y(v).toFixed(1) + '" r="2.4" fill="#b9af97"/>'; });

    // this week - sage ink, drawn-in
    const lenA = 560;
    out += '<path class="' + (reduce ? '' : 'draw') + '" style="--len:' + lenA + '" d="' + path(a) + '" fill="none" stroke="#3f6e63" '
      + 'stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" filter="url(#wobble)"/>';
    // markers + day labels for this week
    a.forEach((v,i) => {
      out += '<circle cx="' + x(i).toFixed(1) + '" cy="' + y(v).toFixed(1) + '" r="3.6" fill="#f7f3ea" stroke="#3f6e63" stroke-width="2.4"/>';
    });
    // peak callout (highest this-week day)
    let pk = 0; a.forEach((v,i)=>{ if(v>a[pk]) pk=i; });
    out += '<text x="' + x(pk).toFixed(1) + '" y="' + (y(a[pk]) - 9).toFixed(1)
      + '" font-family="Caveat, cursive" font-size="17" font-weight="700" fill="#2a2722" text-anchor="middle">'
      + a[pk] + '</text>';

    // x labels
    days.forEach((d,i) => {
      out += '<text x="' + x(i).toFixed(1) + '" y="' + (H - 9) + '" font-family="Shantell Sans, cursive" '
        + 'font-size="10.5" fill="#6a6354" text-anchor="middle">' + d + '</text>';
    });

    // hand-scrawled "up!" arrow near the peak vs last week
    if (a[pk] > b[pk]){
      const ax = x(pk).toFixed(1);
      out += '<path d="M' + (parseFloat(ax)+18) + ' ' + (y(a[pk])+2).toFixed(1)
        + ' q 14 -6 18 -20" fill="none" stroke="#d98b7e" stroke-width="2" stroke-linecap="round" filter="url(#wobble2)"/>'
        + '<path d="M' + (parseFloat(ax)+34) + ' ' + (y(a[pk])-20).toFixed(1)
        + ' l 2 -7 l 4 6" fill="none" stroke="#d98b7e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#wobble2)"/>'
        + '<text x="' + (parseFloat(ax)+44) + '" y="' + (y(a[pk])-16).toFixed(1)
        + '" font-family="Caveat, cursive" font-size="15" fill="#d98b7e">up</text>';
    }

    svg.innerHTML = out;
  })();
})();
</script>
</body>
