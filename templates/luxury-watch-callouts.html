<!-- TEMPLATE: Horology Callouts | ARCHETYPE: precision-object engineering callouts | REF: luxury watch / instrument microsites, engineering-callout annotation | WHEN TO USE: revere a single hero product (watch, car, lens, device) as an engineered object with radiating technical spec callouts | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Caliber 53 / Engineering Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   DATA-DRIVEN HOROLOGY CALLOUT TEMPLATE
   All content swappable in the JS DATA block at the top of <script>.
   Palette tokens below. SVG callout strokes use literal hex in JS
   (SVG presentation attrs ignore var()).
   ============================================================ */
:root{
  --void:#0a0c10;
  --void-2:#0d1016;
  --steel:#aab4c0;
  --steel-dim:#6b7682;
  --brass:#c8a45c;
  --brass-dim:#8a7440;
  --bone:#e9e4d6;
  --hairline:rgba(170,180,192,0.14);
  --serif:'Cormorant Garamond',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--void);
  color:var(--bone);
  font-family:var(--mono);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  line-height:1.5;
}
/* subtle vignette + faint engineering grid over the void */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(120% 90% at 50% 42%, rgba(200,164,92,0.07), transparent 60%),
    radial-gradient(140% 120% at 50% 50%, transparent 55%, rgba(0,0,0,0.7) 100%);
}
body::after{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.5;
  background-image:
    linear-gradient(rgba(170,180,192,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(170,180,192,0.035) 1px, transparent 1px);
  background-size:46px 46px;
  -webkit-mask-image:radial-gradient(110% 90% at 50% 45%, #000 30%, transparent 78%);
          mask-image:radial-gradient(110% 90% at 50% 45%, #000 30%, transparent 78%);
}

/* ---------- top register bar ---------- */
.register{
  position:relative;z-index:5;
  display:flex;align-items:center;justify-content:space-between;
  gap:1.5rem;
  padding:1.05rem clamp(1rem,4vw,2.6rem);
  border-bottom:1px solid var(--hairline);
}
.register .mark{
  font-family:var(--serif);font-size:clamp(1.05rem,1.9vw,1.5rem);
  letter-spacing:0.18em;color:var(--bone);font-weight:500;
}
.register .mark b{color:var(--brass);font-weight:500}
.register .meta{
  display:flex;gap:clamp(0.9rem,2.4vw,2.2rem);
  font-size:0.62rem;letter-spacing:0.26em;text-transform:uppercase;color:var(--steel-dim);
}
.register .meta span{white-space:nowrap}
.register .meta span b{color:var(--steel);font-weight:400}
@media(max-width:640px){ .register .meta{display:none} }

/* ---------- the stage : floating object + radiating callouts ---------- */
.stage{
  position:relative;z-index:2;
  width:100%;
  min-height:calc(100vh - 56px);
  min-height:calc(100svh - 56px);
  display:flex;align-items:center;justify-content:center;
  padding:clamp(1rem,3vh,2.5rem) 1rem;
  overflow:hidden;
}
.stage-inner{
  position:relative;
  width:min(1180px,94vw);
  aspect-ratio:16/10;
  max-height:78vh;
  display:flex;align-items:center;justify-content:center;
}

/* the reverently-lit hero object, contained never cropped */
.object{
  position:relative;z-index:3;
  width:min(720px,72%);
  filter:drop-shadow(0 30px 70px rgba(0,0,0,0.85));
  transform:translateY(8px) scale(0.985);
  opacity:0;
  transition:opacity 1.1s ease, transform 1.3s cubic-bezier(.16,.84,.3,1);
}
.object.lit{opacity:1;transform:translateY(0) scale(1)}
.object .frame{
  position:relative;border-radius:6px;overflow:hidden;
  outline:1px solid rgba(170,180,192,0.16);
  outline-offset:-1px;
}
.object img{
  display:block;width:100%;height:auto;
  object-fit:contain;
}
/* brass key-light sheen + bottom shadow plate so it reads as floating */
.object .frame::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(80% 60% at 30% 18%, rgba(233,228,214,0.10), transparent 55%),
    linear-gradient(180deg, transparent 60%, rgba(10,12,16,0.45));
}
.object .plate{
  position:absolute;left:50%;bottom:-7%;transform:translateX(-50%);
  width:62%;height:9%;z-index:-1;
  background:radial-gradient(60% 100% at 50% 0%, rgba(0,0,0,0.55), transparent 72%);
  filter:blur(6px);
}

/* the SVG callout overlay sits above the object on desktop */
.callouts{
  position:absolute;inset:0;z-index:4;pointer-events:none;
  width:100%;height:100%;
  overflow:visible;
}
.callouts .lead{
  stroke:#aab4c0;stroke-width:1;fill:none;
  stroke-dasharray:var(--len);
  stroke-dashoffset:var(--len);
  transition:stroke-dashoffset .9s cubic-bezier(.4,0,.2,1);
}
.callouts.run .lead{stroke-dashoffset:0}
.callouts .anchor{fill:#c8a45c}
.callouts .anchor-ring{fill:none;stroke:#c8a45c;stroke-width:1;opacity:0.55}
.callouts .tick{stroke:#aab4c0;stroke-width:1;opacity:0.55}

/* the HTML spec labels positioned over the SVG */
.labels{position:absolute;inset:0;z-index:5;pointer-events:none}
.label{
  position:absolute;width:max-content;max-width:200px;
  opacity:0;transform:translateY(6px);
  transition:opacity .55s ease, transform .55s ease;
}
.label.show{opacity:1;transform:translateY(0);pointer-events:auto}
.label .idx{
  font-size:0.56rem;letter-spacing:0.34em;color:var(--brass);
}
.label .name{
  font-family:var(--serif);font-size:clamp(1.02rem,1.5vw,1.35rem);
  color:var(--bone);line-height:1.12;margin:.12rem 0 .25rem;letter-spacing:0.01em;
}
.label .spec{
  font-size:0.66rem;letter-spacing:0.05em;color:var(--steel);
  display:flex;align-items:baseline;gap:.4rem;
}
.label .spec b{color:var(--brass);font-weight:400;font-variant-numeric:tabular-nums}
.label .unit{color:var(--steel-dim);font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase}
.label.lt{text-align:right}
.label.lt .spec{justify-content:flex-end}

/* caption block lower-left of stage */
.caption{
  position:absolute;left:clamp(1rem,4vw,2.4rem);bottom:clamp(1rem,4vh,2rem);
  z-index:6;max-width:min(340px,70vw);
  border-left:1px solid var(--hairline);padding-left:1rem;
  opacity:0;transform:translateY(8px);transition:opacity .8s ease .3s,transform .8s ease .3s;
}
.caption.show{opacity:1;transform:translateY(0)}
.caption .eyebrow{font-size:0.58rem;letter-spacing:0.32em;text-transform:uppercase;color:var(--brass);}
.caption h1{
  font-family:var(--serif);font-weight:400;
  font-size:clamp(1.5rem,3.2vw,2.5rem);line-height:1.04;color:var(--bone);
  margin:.4rem 0 .5rem;letter-spacing:0.005em;
}
.caption p{font-size:0.72rem;color:var(--steel);line-height:1.6;letter-spacing:0.01em}

.scrollcue{
  position:absolute;right:clamp(1rem,4vw,2.4rem);bottom:clamp(1rem,4vh,2rem);z-index:6;
  font-size:0.56rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--steel-dim);
  display:flex;align-items:center;gap:.6rem;writing-mode:vertical-rl;
}
.scrollcue i{display:block;width:1px;height:34px;background:linear-gradient(var(--steel-dim),transparent);}
@media(max-width:640px){ .caption,.scrollcue{position:static;max-width:none} .scrollcue{display:none} }

/* ---------- DESKTOP: callouts live; MOBILE: drop the lines, stack labels ---------- */
@media(max-width:640px){
  .stage{min-height:auto;padding:1.4rem 1rem 2rem}
  .stage-inner{aspect-ratio:auto;flex-direction:column;max-height:none;width:100%}
  .object{width:100%;max-width:520px;transform:none;opacity:1}
  .callouts{display:none}
  .labels{position:static;display:grid;grid-template-columns:1fr 1fr;gap:.85rem 1rem;
          width:100%;max-width:520px;margin-top:1.6rem}
  .label{position:static !important;opacity:1;transform:none;max-width:none;
         padding:.7rem .8rem;border:1px solid var(--hairline);border-radius:4px;
         background:rgba(13,16,22,0.6);text-align:left !important}
  .label.lt{text-align:left !important}
  .label .spec,.label.lt .spec{justify-content:flex-start}
  .caption{margin-top:1.6rem;border-left:1px solid var(--hairline)}
}

/* ---------- the technical dossier rows below the fold ---------- */
.dossier{position:relative;z-index:2;padding:clamp(3rem,8vh,6rem) clamp(1rem,5vw,4rem) 5rem;border-top:1px solid var(--hairline)}
.dossier .lead-row{display:flex;align-items:baseline;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:2.6rem}
.dossier h2{font-family:var(--serif);font-weight:400;font-size:clamp(1.6rem,3vw,2.4rem);color:var(--bone);letter-spacing:0.01em}
.dossier .ref{font-size:0.6rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--steel-dim)}
.specgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:var(--hairline);border:1px solid var(--hairline)}
.cell{background:var(--void-2);padding:1.4rem 1.3rem;display:flex;flex-direction:column;gap:.5rem;transition:background .4s ease}
.cell:hover{background:#11151c}
.cell .k{font-size:0.56rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--brass)}
.cell .v{font-family:var(--serif);font-size:1.5rem;color:var(--bone);line-height:1;font-variant-numeric:tabular-nums}
.cell .d{font-size:0.66rem;color:var(--steel);line-height:1.55}
.colophon{margin-top:3rem;display:flex;justify-content:space-between;gap:1rem;flex-wrap:wrap;
  font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--steel-dim)}
.colophon b{color:var(--steel);font-weight:400}

a{color:inherit}
:focus-visible{outline:2px solid var(--brass);outline-offset:3px;border-radius:2px}

/* ---------- reduced motion : show final state, no rAF / transitions ---------- */
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  *{transition:none !important;animation:none !important}
  .object{opacity:1 !important;transform:none !important}
  .callouts .lead{stroke-dashoffset:0 !important}
  .label,.caption{opacity:1 !important;transform:none !important}
}
</style>
</head>
<body>

<header class="register">
  <div class="mark">CALIBER <b>53</b> / Atelier</div>
  <nav class="meta" aria-label="register">
    <span>Ref <b>53.AMG.D</b></span>
    <span>Cert <b>COSC-G</b></span>
    <span>Series <b>I / VIII</b></span>
    <span>2026</span>
  </nav>
</header>

<main class="stage" id="stage">
  <div class="stage-inner" id="inner">

    <figure class="object" id="object">
      <div class="plate"></div>
      <div class="frame">
        <img id="hero" alt="" decoding="async" />
      </div>
    </figure>

    <!-- radiating engineering callout lines (desktop only) -->
    <svg class="callouts" id="callouts" viewBox="0 0 1000 625" preserveAspectRatio="none" aria-hidden="true"></svg>

    <!-- spec labels (positioned on desktop, stacked grid on mobile) -->
    <div class="labels" id="labels"></div>

    <figure class="caption" id="caption">
      <div class="eyebrow" id="cap-eyebrow"></div>
      <h1 id="cap-title"></h1>
      <p id="cap-body"></p>
    </figure>

    <div class="scrollcue" aria-hidden="true">Dossier <i></i></div>
  </div>
</main>

<section class="dossier" aria-label="technical dossier">
  <div class="lead-row">
    <h2 id="dos-title"></h2>
    <div class="ref" id="dos-ref"></div>
  </div>
  <div class="specgrid" id="specgrid"></div>
  <div class="colophon" id="colophon"></div>
</section>

<script>
/* ============================================================
   DATA  -  edit everything here to repurpose the template.
   - HERO.src : the reverent floating object (contain, not cropped).
   - CALLOUTS : each anchor (ax,ay in 0..1 of the object frame) draws a
                thin lead line out to a spec label placed at (lx,ly in 0..1
                of the whole stage). side:'l'|'r' aligns the label.
                Keep 3-5 for the radiating-precision read.
   ============================================================ */
const HERO = {
  src:"../assets/flux-car-4k.png",
  alt:"Matte-black precision coupe, reverently lit on a deep void"
};

const CAPTION = {
  eyebrow:"Engineering Register",
  title:"Every tolerance, accounted for.",
  body:"A single object held to instrument standards. The lines below trace each governed system from its anchor point to the spec that defines it."
};

/* anchor (on object) -> label (on stage). x/y normalized 0..1. */
const CALLOUTS = [
  { idx:"01", name:"Optical Array",   spec:"5 700", unit:"Kelvin",  ax:0.18, ay:0.46, lx:0.045, ly:0.20, side:"l" },
  { idx:"02", name:"Movement",        spec:"V8 / 4.0", unit:"Biturbo", ax:0.40, ay:0.30, lx:0.50, ly:0.045, side:"r" },
  { idx:"03", name:"Caliper Tolerance", spec:"0.002", unit:"mm",     ax:0.74, ay:0.72, lx:0.965, ly:0.30, side:"r" },
  { idx:"04", name:"Aero Plane",      spec:"0.29", unit:"Cd",       ax:0.62, ay:0.40, lx:0.965, ly:0.62, side:"r" },
  { idx:"05", name:"Chassis Datum",   spec:"100", unit:"% Rigid",   ax:0.30, ay:0.78, lx:0.045, ly:0.50, side:"l" }
];

const DOSSIER = {
  title:"Technical Dossier",
  ref:"Sheet 04 / Revision G",
  specs:[
    { k:"Power Reserve", v:"72h", d:"Continuous draw at the certified load curve, measured at the datum plane." },
    { k:"Frequency",     v:"36 000", d:"Vibrations per hour. Held within the chronometer band across temperature." },
    { k:"Jewels",        v:"31", d:"Synthetic bearings reducing friction at every governed pivot." },
    { k:"Water Index",   v:"100 m", d:"Pressure-rated to the field standard with no loss of register accuracy." },
    { k:"Case",          v:"904L", d:"Surgical-grade alloy, brushed and bevelled to a single light line." },
    { k:"Tolerance",     v:"+2 / -1", d:"Seconds per day, certified. The narrowest band the atelier ships." }
  ],
  colophon:[
    ["Atelier","Vesperwerk"],
    ["Calibration","COSC-G certified"],
    ["Edition","I of VIII"],
    ["Origin","Ayutthaya / 2026"]
  ]
};

/* ============================================================
   RENDER
   ============================================================ */
const $ = (s,r=document)=>r.querySelector(s);
const SVGNS = "http://www.w3.org/2000/svg";
const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
const VB_W = 1000, VB_H = 625; // svg viewBox, matched to object frame proportion

// hero
const hero = $("#hero");
hero.src = HERO.src; hero.alt = HERO.alt;

// caption
$("#cap-eyebrow").textContent = CAPTION.eyebrow;
$("#cap-title").textContent = CAPTION.title;
$("#cap-body").textContent = CAPTION.body;

// dossier
$("#dos-title").textContent = DOSSIER.title;
$("#dos-ref").textContent = DOSSIER.ref;
const specgrid = $("#specgrid");
DOSSIER.specs.forEach(s=>{
  const c = document.createElement("div"); c.className="cell";
  c.innerHTML = `<div class="k">${s.k}</div><div class="v">${s.v}</div><div class="d">${s.d}</div>`;
  specgrid.appendChild(c);
});
const colophon = $("#colophon");
DOSSIER.colophon.forEach(([k,v])=>{
  const d=document.createElement("div"); d.innerHTML = `${k} &nbsp; <b>${v}</b>`; colophon.appendChild(d);
});

const callSvg = $("#callouts");
const labelsWrap = $("#labels");
const leads = [];

/* labels are ALWAYS built (positioned over the object on desktop, stacked in a
   grid below the object on mobile via CSS). Built once. */
function buildLabels(){
  labelsWrap.innerHTML = "";
  CALLOUTS.forEach((c)=>{
    const lab = document.createElement("div");
    lab.className = "label" + (c.side==="l"?" lt":"");
    lab.style.left = (c.lx*100)+"%";
    lab.style.top  = (c.ly*100)+"%";
    // nudge so text sits beside the tick, not under it (desktop absolute mode)
    if(c.side==="l"){ lab.style.transform="translate(-100%,-50%)"; lab.style.marginLeft="-6px"; }
    else { lab.style.transform="translate(0,-50%)"; lab.style.marginLeft="6px"; }
    lab.innerHTML =
      `<div class="idx">${c.idx}</div>`+
      `<div class="name">${c.name}</div>`+
      `<div class="spec"><b>${c.spec}</b><span class="unit">${c.unit}</span></div>`;
    labelsWrap.appendChild(lab);
  });
}

/* build SVG lead geometry once the object has a measured box, so the anchors
   land on the real object, not the padded stage. Desktop only. */
function buildLeads(){
  callSvg.innerHTML = "";
  leads.length = 0;

  const inner = $("#inner");
  const obj = $("#object");
  const ir = inner.getBoundingClientRect();
  const orr = obj.getBoundingClientRect();
  if(ir.width === 0) return;

  // object box in viewBox units
  const ox = ((orr.left - ir.left)/ir.width)*VB_W;
  const oy = ((orr.top  - ir.top )/ir.height)*VB_H;
  const ow = (orr.width/ir.width)*VB_W;
  const oh = (orr.height/ir.height)*VB_H;

  CALLOUTS.forEach((c)=>{
    // anchor point on the object
    const ax = ox + c.ax*ow;
    const ay = oy + c.ay*oh;
    // label target in stage/viewBox space
    const lx = c.lx*VB_W;
    const ly = c.ly*VB_H;
    // elbow: go out horizontally toward the label side, then to label
    const elbowX = c.side === "l" ? lx + 14 : lx - 14;
    const elbowY = ly;
    const d = `M ${ax.toFixed(1)} ${ay.toFixed(1)} ` +
              `L ${((ax+elbowX)/2).toFixed(1)} ${ay.toFixed(1)} ` +
              `L ${elbowX.toFixed(1)} ${elbowY.toFixed(1)} L ${lx.toFixed(1)} ${ly.toFixed(1)}`;

    const path = document.createElementNS(SVGNS,"path");
    path.setAttribute("d",d);
    path.setAttribute("class","lead");
    const len = approxLen([[ax,ay],[(ax+elbowX)/2,ay],[elbowX,elbowY],[lx,ly]]);
    path.style.setProperty("--len", len.toFixed(0));
    callSvg.appendChild(path);
    leads.push(path);

    // brass anchor dot + ring at the object point
    const ring = document.createElementNS(SVGNS,"circle");
    ring.setAttribute("cx",ax); ring.setAttribute("cy",ay); ring.setAttribute("r","7");
    ring.setAttribute("class","anchor-ring");
    callSvg.appendChild(ring);
    const dot = document.createElementNS(SVGNS,"circle");
    dot.setAttribute("cx",ax); dot.setAttribute("cy",ay); dot.setAttribute("r","2.2");
    dot.setAttribute("class","anchor");
    callSvg.appendChild(dot);
    // small terminal tick at the label end
    const tick = document.createElementNS(SVGNS,"line");
    const tx = c.side==="l"? lx+14 : lx-14;
    tick.setAttribute("x1",lx); tick.setAttribute("y1",ly);
    tick.setAttribute("x2",tx); tick.setAttribute("y2",ly);
    tick.setAttribute("class","tick");
    callSvg.appendChild(tick);
  });
}

function approxLen(pts){
  let L=0;
  for(let i=1;i<pts.length;i++){
    const dx=pts[i][0]-pts[i-1][0], dy=pts[i][1]-pts[i-1][1];
    L += Math.hypot(dx,dy);
  }
  return L + 12;
}

/* sequence: light the object, draw leads, reveal labels one by one */
let revealed = false;
function reveal(){
  if(revealed) return; revealed = true;
  const obj = $("#object");
  const caption = $("#caption");

  if(reduce){
    obj.classList.add("lit");
    callSvg.classList.add("run");
    document.querySelectorAll(".label").forEach(l=>l.classList.add("show"));
    caption.classList.add("show");
    return;
  }

  obj.classList.add("lit");
  setTimeout(()=>caption.classList.add("show"), 250);
  setTimeout(()=>callSvg.classList.add("run"), 650);
  // reveal labels staggered after their lead has mostly drawn
  document.querySelectorAll(".label").forEach((l,i)=>{
    setTimeout(()=>l.classList.add("show"), 900 + i*230);
  });
}

/* layout + (re)build leads on resize. Labels are static; on mobile the SVG is
   display:none anyway, so only rebuild lead geometry above 640px. */
let raf=0;
function layout(){
  cancelAnimationFrame(raf);
  raf = requestAnimationFrame(()=>{
    if(window.innerWidth > 640){
      buildLeads();
      if(revealed){ // keep current visual state after a resize
        callSvg.classList.add("run");
        document.querySelectorAll(".label").forEach(l=>l.classList.add("show"));
      }
    }
  });
}

function start(){
  buildLabels();                                   // always: desktop overlay + mobile grid
  if(window.innerWidth > 640){ buildLeads(); }      // desktop only: the radiating lines
  // reveal as soon as ready so the signature is present at scroll=0
  reveal();
}

if(hero.complete && hero.naturalWidth){ start(); }
else {
  hero.addEventListener("load", start, {once:true});
  hero.addEventListener("error", start, {once:true}); // still reveal the register/labels
}
// safety: never leave it dark if load events misbehave
setTimeout(()=>{ if(!revealed) start(); }, 1200);

window.addEventListener("resize", layout, {passive:true});
window.addEventListener("orientationchange", layout, {passive:true});
</script>
</body>
</html>
