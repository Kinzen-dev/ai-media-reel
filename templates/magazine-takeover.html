<!-- TEMPLATE: ISSUE - Magazine Takeover | ARCHETYPE: COVER - each full-screen section is its own magazine cover (masthead, issue no + date, cover lines, barcode, edge-to-edge hero); snap-scroll = flipping an issue archive | REF: editorial cover design (Vogue / Wired / Kinfolk) | WHEN TO USE: a portfolio/work archive where every piece deserves its own newsstand cover - masthead, cover lines, issue number, barcode, edge-to-edge hero | SWAP: edit the COVERS array at top of <script> -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ISSUE - Magazine Takeover</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- Fraunces: a high-contrast display serif with optical sizing - the masthead glamour. Archivo: the grotesque workhorse for cover lines, dates, credits. -->
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#0d0c0b;          /* the press background between covers */
    --ink:#111110;
    --bone:#f4f0e6;           /* cover stock */
    --bone-soft:#e9e3d4;
    --hair:rgba(17,17,16,.18);
    /* per-cover accent (set inline by JS via --accent / --accent-ink) */
    --accent:#e2231a;
    --accent-ink:#f4f0e6;
    --gut: clamp(16px, 4.4vw, 64px);
    --mast: clamp(54px, 15.5vw, 230px);
    --ease: cubic-bezier(.22,.61,.36,1);
  }
  *{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Archivo", Helvetica, Arial, system-ui, sans-serif;
    font-feature-settings:"tnum" 1, "ss01" 1;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
    line-height:1;
  }
  img,video{ display:block; max-width:100%; }
  button{ font:inherit; color:inherit; background:none; border:0; cursor:pointer; }
  ::selection{ background:var(--accent); color:var(--accent-ink); }
  :focus-visible{ outline:3px solid var(--accent); outline-offset:3px; border-radius:2px; }
  .serif{ font-family:"Fraunces", Georgia, "Times New Roman", serif; }
  .uc{ text-transform:uppercase; }
  .tnum{ font-variant-numeric:tabular-nums; }

  /* ============ SCROLL SHELL ============ */
  /* each cover snaps; scrolling = flipping the issue archive */
  .deck{
    height:100svh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .deck::-webkit-scrollbar{ display:none; }

  /* ============ ONE COVER ============ */
  .cover{
    position:relative;
    height:100svh;
    scroll-snap-align:start;
    scroll-snap-stop:always;
    display:flex;
    overflow:hidden;
    background:var(--bone);
    color:var(--ink);
    padding:max(env(safe-area-inset-top),0px) 0 max(env(safe-area-inset-bottom),0px);
  }
  /* the bleed margin frame - a thin keyline like a real cover trim */
  .cover::after{
    content:""; position:absolute; inset:14px; pointer-events:none; z-index:6;
    border:1px solid rgba(244,240,230,.34);
    mix-blend-mode:overlay;
  }

  /* ---- HERO MEDIA bled to the edges ---- */
  .hero{
    position:absolute; inset:0; z-index:0;
    background:#000;
    overflow:hidden;
  }
  .hero .fill{
    width:100%; height:100%;
    object-fit:cover; object-position:center;
    transform:scale(1.04);
    transition:transform 1.1s var(--ease), filter 1.1s var(--ease);
    will-change:transform;
  }
  .cover.live .hero .fill{ transform:scale(1.0); }
  /* paper grain + accent wash so flat covers don't read screen-cheap */
  .hero::before{
    content:""; position:absolute; inset:0; z-index:2; pointer-events:none;
    background:
      linear-gradient(to bottom, rgba(13,12,11,.50) 0%, rgba(13,12,11,0) 26%, rgba(13,12,11,0) 52%, rgba(13,12,11,.72) 100%),
      radial-gradient(120% 80% at 50% 8%, transparent 40%, color-mix(in srgb, var(--accent) 26%, transparent) 130%);
  }
  .hero::after{
    content:""; position:absolute; inset:0; z-index:3; pointer-events:none; opacity:.5;
    background-image:radial-gradient(rgba(255,255,255,.16) 1px, transparent 1px);
    background-size:3px 3px; mix-blend-mode:soft-light;
  }
  /* mobile/portrait + landscape asset = LETTERBOX, never crop a wide work into a tall phone */
  .cover.letterbox .hero{ background:var(--bone); }
  .cover.letterbox .hero .fill{ object-fit:contain; }
  .cover.letterbox .hero::before{
    background:
      linear-gradient(to bottom, color-mix(in srgb,var(--bone) 92%, #000) 0%, transparent 18%, transparent 80%, color-mix(in srgb,var(--bone) 88%, #000) 100%);
    mix-blend-mode:multiply;
  }
  .cover.letterbox .text{ color:var(--ink); text-shadow:none; }
  .cover.letterbox .masthead{ color:var(--ink); }
  .cover.letterbox .kicker, .cover.letterbox .credit{ color:var(--ink); }

  video.fill{ background:#000; }
  .posterbtn{
    position:absolute; inset:0; z-index:4; display:grid; place-items:center;
  }
  .playmark{
    width:74px; height:74px; border-radius:50%;
    border:1.5px solid rgba(244,240,230,.85);
    display:grid; place-items:center;
    background:color-mix(in srgb, var(--accent) 88%, #000);
    color:var(--accent-ink);
    transition:transform .4s var(--ease), background .3s;
    box-shadow:0 10px 40px rgba(0,0,0,.4);
  }
  .posterbtn:hover .playmark{ transform:scale(1.08); }
  .playmark svg{ width:24px; height:24px; margin-left:3px; }
  .cover.playing .posterbtn{ opacity:0; pointer-events:none; }
  .has-audio .playmark::after{
    content:"♪"; position:absolute; font-size:10px; transform:translate(20px,-20px);
  }

  /* ---- TYPE LAYER ---- */
  .text{
    position:relative; z-index:5;
    width:100%; height:100%;
    display:grid;
    grid-template-rows:auto 1fr auto;
    padding:clamp(20px,3.4vw,46px) var(--gut) clamp(18px,3vw,40px);
    color:var(--bone);
    text-shadow:0 1px 30px rgba(0,0,0,.35);
    pointer-events:none;
  }
  .text a, .text button{ pointer-events:auto; }

  /* MASTHEAD - the wordmark, bled across the top */
  .topbar{
    display:flex; align-items:flex-start; justify-content:space-between;
    gap:16px;
  }
  .masthead{
    font-family:"Fraunces", Georgia, serif;
    font-weight:900;
    font-optical-sizing:auto;
    font-size:var(--mast);
    line-height:.82;
    letter-spacing:-.022em;
    margin:-.06em 0 0;
    color:var(--bone);
    text-transform:uppercase;
    white-space:nowrap;
    mix-blend-mode:normal;
  }
  .masthead .accentdot{ color:var(--accent); }
  .issueline{
    text-align:right; flex:0 0 auto;
    font-size:clamp(9px,1.05vw,12px);
    letter-spacing:.18em; font-weight:700;
    line-height:1.55;
  }
  .issueline b{ display:block; font-weight:800; }
  .issueline .accentpill{
    display:inline-block; margin-top:7px;
    background:var(--accent); color:var(--accent-ink);
    padding:4px 8px 3px; border-radius:2px;
    letter-spacing:.12em;
  }

  /* COVER LINES (kickers) float around the work */
  .lines{
    align-self:end;
    display:grid; gap:clamp(6px,1.1vw,12px);
    max-width:min(640px, 78%);
  }
  .lines.right{ justify-items:end; text-align:right; justify-self:end; }
  .kicker{
    font-weight:800; text-transform:uppercase;
    letter-spacing:.04em;
    font-size:clamp(11px,1.55vw,17px);
    line-height:1.18;
    display:inline-flex; align-items:baseline; gap:.5em;
  }
  .kicker .em{
    font-family:"Fraunces", Georgia, serif;
    font-style:italic; font-weight:600; text-transform:none;
    color:var(--accent-ink);
    letter-spacing:0;
    background:var(--accent);
    padding:.06em .34em .12em; border-radius:2px;
    text-shadow:none;
  }
  .lines.letterboxlines .kicker .em{ color:var(--accent-ink); }
  .feature{
    font-family:"Fraunces", Georgia, serif;
    font-weight:900; font-optical-sizing:auto;
    font-size:clamp(30px,6.2vw,78px);
    line-height:.92; letter-spacing:-.02em;
    margin:.12em 0 .04em; text-transform:none;
  }
  .feature em{ font-style:italic; font-weight:600; color:var(--accent); }
  .dek{
    font-size:clamp(12px,1.45vw,16px);
    line-height:1.34; font-weight:500; max-width:42ch;
    color:color-mix(in srgb, currentColor 90%, transparent);
  }
  .lines.right .dek{ margin-left:auto; }

  /* FOOTER - barcode + credits + price */
  .footer{
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:18px;
    border-top:1px solid rgba(244,240,230,.28);
    padding-top:clamp(10px,1.4vw,16px);
  }
  .cover.letterbox .footer{ border-top-color:var(--hair); }
  .credit{
    font-size:clamp(9px,1vw,11.5px);
    letter-spacing:.06em; line-height:1.5; font-weight:600;
    max-width:46ch;
  }
  .credit b{ font-weight:800; }
  .credit .accenttxt{ color:var(--accent); }
  .cover.letterbox .credit .accenttxt{ color:color-mix(in srgb,var(--accent) 75%,#000); }
  .barcode{
    flex:0 0 auto; text-align:center;
    background:var(--bone); color:#111;
    padding:7px 8px 4px; border-radius:2px;
    box-shadow:0 6px 22px rgba(0,0,0,.3);
  }
  .barcode svg{ display:block; height:34px; width:118px; }
  .barcode .num{
    font-size:9px; letter-spacing:.18em; font-weight:700;
    margin-top:2px; color:#111;
  }

  /* ============ ARCHIVE RAIL (right edge, desktop) ============ */
  .rail{
    position:fixed; z-index:40; top:50%; right:14px; transform:translateY(-50%);
    display:flex; flex-direction:column; gap:11px; align-items:flex-end;
  }
  .rail button{
    display:flex; align-items:center; gap:10px;
    color:var(--bone); opacity:.5;
    transition:opacity .3s, transform .3s var(--ease);
  }
  .rail button .lbl{
    font-size:10px; letter-spacing:.16em; font-weight:800; text-transform:uppercase;
    opacity:0; transform:translateX(6px);
    transition:opacity .3s, transform .3s var(--ease);
    white-space:nowrap;
    text-shadow:0 1px 8px rgba(0,0,0,.6);
  }
  .rail button .tick{
    width:26px; height:2px; background:currentColor; flex:0 0 auto;
    transition:width .3s var(--ease), background .3s;
  }
  .rail button:hover{ opacity:1; }
  .rail button:hover .lbl{ opacity:1; transform:translateX(0); }
  .rail button[aria-current="true"]{ opacity:1; color:var(--bone); }
  .rail button[aria-current="true"] .tick{ width:44px; background:var(--accent); }
  .rail button[aria-current="true"] .lbl{ opacity:1; transform:translateX(0); }

  /* progress strip top */
  .progress{
    position:fixed; top:0; left:0; height:3px; z-index:50;
    width:var(--p,0%); background:var(--accent);
    transition:width .25s linear, background .5s;
  }

  /* corner brand + scroll cue on first cover */
  .brand{
    position:fixed; z-index:45; left:var(--gut); bottom:clamp(12px,2vw,20px);
    font-size:10px; letter-spacing:.22em; font-weight:800; text-transform:uppercase;
    color:var(--bone); opacity:.0; transition:opacity .5s;
    text-shadow:0 1px 10px rgba(0,0,0,.6); pointer-events:none;
  }
  .scrollcue{
    position:absolute; left:50%; bottom:clamp(58px,8vw,80px); z-index:7;
    transform:translateX(-50%);
    font-size:10px; letter-spacing:.26em; font-weight:800; text-transform:uppercase;
    color:var(--bone); display:flex; flex-direction:column; align-items:center; gap:8px;
    text-shadow:0 1px 12px rgba(0,0,0,.6);
    pointer-events:none;
  }
  .scrollcue .arrow{
    width:1px; height:26px; background:currentColor;
    animation:drop 1.8s var(--ease) infinite;
  }
  @keyframes drop{ 0%{ transform:scaleY(0); transform-origin:top; } 50%{ transform:scaleY(1); transform-origin:top; } 51%{ transform-origin:bottom; } 100%{ transform:scaleY(0); transform-origin:bottom; } }
  .cover:not(:first-child) .scrollcue{ display:none; }

  /* ============ MOBILE / PORTRAIT ============ */
  @media (max-width: 760px){
    .rail{ display:none; }
    .lines{ max-width:88%; }
    .lines.right{ justify-items:start; text-align:left; justify-self:start; }
    .lines.right .dek{ margin-left:0; }
    .footer{ flex-direction:column-reverse; align-items:flex-start; gap:12px; }
    .barcode{ align-self:flex-start; }
    .issueline{ font-size:9px; max-width:42vw; }
    .issueline .accentpill{ white-space:nowrap; }
    .text{ text-shadow:0 1px 18px rgba(0,0,0,.55); }
    /* keep the scroll cue clear of the cover lines + footer on tall phones */
    .scrollcue{ bottom:auto; top:clamp(108px,30vh,220px); }
    .masthead{ letter-spacing:-.03em; }
  }
  /* PHONE LETTERBOX GUARANTEE - a wide 16:9 work must never cover-crop into a tall phone.
     CSS-only floor (works even if the JS letterbox toggle never runs): on portrait phones
     <=640px, any wide-fit hero is letterboxed (contain) and gets the bone matte + dark ink. */
  @media (max-width: 640px) and (orientation: portrait){
    .cover[data-fit="wide"] .hero{ background:var(--bone); }
    .cover[data-fit="wide"] .hero .fill{ object-fit:contain; }
    .cover[data-fit="wide"] .hero::before{
      background:
        linear-gradient(to bottom, color-mix(in srgb,var(--bone) 92%, #000) 0%, transparent 18%, transparent 80%, color-mix(in srgb,var(--bone) 88%, #000) 100%);
      mix-blend-mode:multiply;
    }
    .cover[data-fit="wide"] .text,
    .cover[data-fit="wide"] .masthead,
    .cover[data-fit="wide"] .kicker,
    .cover[data-fit="wide"] .credit{ color:var(--ink); text-shadow:none; }
    .cover[data-fit="wide"] .footer{ border-top-color:var(--hair); }
    .cover[data-fit="wide"] .credit .accenttxt{ color:color-mix(in srgb,var(--accent) 75%,#000); }
  }

  /* tiny phones: never let the cue collide with type */
  @media (max-width: 760px) and (max-height: 720px){
    .scrollcue{ display:none !important; }
  }
  /* very short / landscape phones: shrink the feature so footer never clips */
  @media (max-height: 560px){
    .feature{ font-size:clamp(24px,5vw,46px); }
    .scrollcue{ display:none !important; }
  }

  @media (prefers-reduced-motion: reduce){
    html, .deck{ scroll-behavior:auto; }
    *{ animation:none !important; }
    .hero .fill, .cover .hero .fill{ transition:none !important; transform:scale(1) !important; }
    .scrollcue .arrow{ animation:none; height:26px; }
  }
</style>
</head>
<body>

<div class="progress" id="progress" aria-hidden="true"></div>
<div class="brand serif" id="brand">ISSUE &middot; an archive of work</div>
<nav class="rail" id="rail" aria-label="Issue archive"></nav>

<main class="deck" id="deck" aria-label="Magazine cover archive. Scroll to flip through issues."></main>

<script>
/* =========================================================================
   COVERS - the entire magazine. Swap freely: each entry becomes one cover.
   media.kind: 'image' | 'video'  (video posters auto-resolved by convention)
   media.fit : 'cover' (portrait-safe art, bleeds full) | 'wide' (16:9 work -> letterboxes on phones)
   accent    : the ONE strong cover color for this issue (+ ink that reads on it)
   ========================================================================= */
const COVERS = [
  {
    id:"matte-black",
    masthead:"ISSUE", accentWord:".",            // masthead wordmark + accent glyph
    issueNo:"№ 01", date:"AUTUMN 2026", section:"COVER STORY",

    media:{ kind:"video", src:"../assets/flux-car-i2v.mp4", poster:"../assets/gen/poster-flux-car-i2v.png", fit:"wide", audio:false },
    eyebrow:"The Night Drive",

  },
  {
    id:"clinic-mint",
    masthead:"FORM", accentWord:"+",
    issueNo:"№ 02", date:"AUTUMN 2026", section:"SPACES",
    accent:"#11a17a", accentInk:"#f4f0e6",
    media:{ kind:"image", src:"../assets/flux-clinic-4k.png", fit:"wide" },
    eyebrow:"Calm by Design",
    feature:["The Quiet", "Clinic"], featureEm:"",
    dek:"Mint, warm oak and soft daylight. An interior architecture render that argues care can be a colour palette.",
    lines:[ {t:"Materials",em:"mint · oak · light"}, {t:"4K matte · full bleed"} ],

    barcode:"02-2026"
  },
  {
    id:"fox-paint",
    masthead:"PAINT", accentWord:".",
    issueNo:"№ 03", date:"AUTUMN 2026", section:"PORTFOLIO",
    accent:"#d8632a", accentInk:"#0d0c0b",
    media:{ kind:"image", src:"../assets/sdxl.png", fit:"cover" },
    eyebrow:"After the Frost",
    feature:["A Painterly", "Fox"], featureEm:"",
    dek:"Loose brushwork, autumn ochre, a single animal holding the whole frame. Diffusion as a painting medium, not a camera.",
    lines:[ {t:"Medium",em:"SDXL · oil-feel"}, {t:"One subject - total composition"} ],
    side:"left",
    credit:"Plate - <b>sdxl</b> · painterly diffusion<br><span class='accenttxt'>Subject</span> autumn fox",
    barcode:"03-2026"
  },
  {
    id:"kling-motion",
    masthead:"MOTION", accentWord:"/",
    issueNo:"№ 04", date:"AUTUMN 2026", section:"THE REEL",
    accent:"#3b5bff", accentInk:"#f4f0e6",
    media:{ kind:"video", src:"../assets/kling-video.mp4", poster:"../assets/gen/poster-kling-video.png", fit:"wide", audio:false },
    eyebrow:"Twelve Seconds",
    feature:["Loops That", "Breathe"], featureEm:"",
    dek:"Generative footage that holds together at speed. Plays only when you reach it, posters everywhere else so the press stays fast.",
    lines:[ {t:"Format",em:"1920×1080 loop"}, {t:"Tap to roll the reel"} ],
    side:"right",
    credit:"Footage - <b>kling-video</b><br><span class='accenttxt'>Playback</span> in-view only · poster-first",
    barcode:"04-2026"
  },
  {
    id:"lofi-apple",
    masthead:"LO-FI", accentWord:"·",
    issueNo:"№ 05", date:"AUTUMN 2026", section:"BACK PAGE",
    accent:"#c8203f", accentInk:"#f4f0e6",
    media:{ kind:"image", src:"../assets/hf-tinysd.png", fit:"cover" },
    eyebrow:"Low Fidelity, High Feeling",
    feature:["An Abstract", "Apple"], featureEm:"",
    dek:"The smallest model on the rack still makes an image with attitude. Grain, glitch and a stubborn sense of colour.",
    lines:[ {t:"Engine",em:"tiny-sd"}, {t:"Proof that small still ships"} ],
    side:"left",
    credit:"Closer - <b>hf-tinysd</b> · low-fi diffusion<br><span class='accenttxt'>End of issue</span> · flip back to start",
    barcode:"05-2026"

/* ---------- BARCODE: a deterministic, real-looking EAN-style SVG ---------- */
function barcodeSVG(seed){
  let h=0; for(const c of seed) h=(h*31+c.charCodeAt(0))>>>0;
  const bars=[]; let x=0; const W=118, H=34;
  // quiet zone + variable-width bars, pseudo-random but stable per seed
  while(x < W){
    h = (h*1103515245 + 12345) & 0x7fffffff;
    const w = 1 + (h % 4);            // 1..4 px wide
    const dark = ((h>>4) & 1) === 1;
    if(dark) bars.push(`<rect x="${x.toFixed(1)}" y="0" width="${w}" height="${H}" fill="#111"/>`);
    x += w;
  }
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="barcode">${bars.join("")}</svg>`;
}

const reduceMotion = matchMedia("(prefers-reduced-motion: reduce)").matches;
const deck = document.getElementById("deck");
const rail = document.getElementById("rail");
const progress = document.getElementById("progress");
const brand = document.getElementById("brand");

/* ---------- build one cover ---------- */
function buildCover(c, i){
  const sec = document.createElement("section");
  sec.className = "cover";
  sec.style.setProperty("--accent", c.accent);
  sec.style.setProperty("--accent-ink", c.accentInk);
  sec.dataset.index = i;
  sec.id = "cover-" + c.id;
  sec.setAttribute("aria-roledescription","magazine cover");
  sec.setAttribute("aria-label", `${c.masthead} ${c.issueNo}, ${c.feature.join(" ")} ${c.featureEm}`);

  const isWide = c.media.fit === "wide";
  const linesSide = c.side === "right" ? "right letterboxlines" : "letterboxlines";

  // HERO
  let heroInner = "";
  if(c.media.kind === "image"){
    heroInner = `<img class="fill" src="${c.media.src}" alt="${c.feature.join(" ")} ${c.featureEm} - cover image" loading="${i===0?"eager":"lazy"}" decoding="async">`;
  } else {
    heroInner = `
      <img class="fill poster" src="${c.media.poster}" alt="${c.feature.join(" ")} - cover still" loading="${i===0?"eager":"lazy"}" decoding="async">
      <video class="fill clip" muted ${c.media.audio?"":"muted"} loop playsinline preload="none" poster="${c.media.poster}" aria-label="${c.feature.join(" ")} cover video"></video>
      <button class="posterbtn ${c.media.audio?"has-audio":""}" aria-label="Play ${c.feature.join(" ")} cover video">
        <span class="playmark"><svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg></span>
      </button>`;
  }

  // COVER LINES
  const linesHTML = (c.lines||[]).map(l =>
    `<span class="kicker">${l.t}${l.em?` <span class="em serif">${l.em}</span>`:""}</span>`
  ).join("");

  const featureHTML = c.feature.map(w=>`<span>${w}</span>`).join("<br>") +
    (c.featureEm?` <em>${c.featureEm}</em>`:"");

  sec.innerHTML = `
    <div class="hero">${heroInner}</div>
    <div class="text">
      <header class="topbar">
        <h1 class="masthead">${c.masthead}<span class="accentdot">${c.accentWord||""}</span></h1>
        <div class="issueline uc tnum">
          <b>${c.issueNo}</b>
          ${c.date}
          <span class="accentpill">${c.section}</span>
        </div>
      </header>

      <div class="scrollcue"><span>Flip the issue</span><span class="arrow"></span></div>

      <div class="lines ${c.side==='right'?'right':''} ${linesSide}">
        <span class="kicker"><span class="em serif">${c.eyebrow}</span></span>
        <h2 class="feature serif">${featureHTML}</h2>
        <p class="dek">${c.dek}</p>
        ${linesHTML}
      </div>

      <footer class="footer">
        <p class="credit">${c.credit}</p>
        <div class="barcode">
          ${barcodeSVG(c.id + c.barcode)}
          <div class="num tnum">${c.masthead} ${c.barcode}</div>
        </div>
      </footer>
    </div>`;

  if(isWide) sec.classList.add("letterbox-cap"); // marker; actual letterbox decided by viewport
  sec.dataset.fit = c.media.fit;
  return sec;
}

COVERS.forEach((c,i)=> deck.appendChild(buildCover(c,i)));

/* ---------- rail (archive index) ---------- */
COVERS.forEach((c,i)=>{
  const b = document.createElement("button");
  b.type = "button";
  b.innerHTML = `<span class="lbl">${c.issueNo} ${c.masthead}</span><span class="tick"></span>`;
  b.setAttribute("aria-label", `Go to ${c.masthead} ${c.issueNo}`);
  b.addEventListener("click", ()=>{
    deck.children[i].scrollIntoView({ behavior: reduceMotion?"auto":"smooth" });
  });
  rail.appendChild(b);
});

/* ---------- LETTERBOX decision: wide 16:9 work must NOT crop into a tall phone ----------
   A wide asset is letterboxed when the viewport is portrait-ish (taller than ~3:4 of its width),
   which is exactly where a cover-crop would slice the work. Re-evaluated on resize/orient. */
function applyLetterbox(){
  const portraitish = window.innerHeight / window.innerWidth > 1.12; // phone portrait & narrow tablets
  document.querySelectorAll(".cover").forEach(sec=>{
    const wide = sec.dataset.fit === "wide";
    sec.classList.toggle("letterbox", wide && portraitish);
  });
}
applyLetterbox();
let rt; addEventListener("resize", ()=>{ clearTimeout(rt); rt=setTimeout(applyLetterbox,120); });

/* ---------- IN-VIEW: mark live cover, set page accent, play ONLY focused video ---------- */
const covers = [...document.querySelectorAll(".cover")];
const railBtns = [...rail.children];
let current = 0;

const io = new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    const sec = e.target;
    const idx = +sec.dataset.index;
    const vid = sec.querySelector("video.clip");
    if(e.isIntersecting && e.intersectionRatio > 0.55){
      // become the live cover
      covers.forEach(s=> s.classList.toggle("live", s===sec));
      railBtns.forEach((b,bi)=> b.setAttribute("aria-current", bi===idx ? "true":"false"));
      current = idx;
      // accent the global chrome (progress + brand) to this issue
      document.documentElement.style.setProperty("--accent", COVERS[idx].accent);
      progress.style.background = COVERS[idx].accent;
      brand.style.opacity = idx===0 ? "0" : ".7";
      // autoplay video ONLY if it was already locked-on (user pressed play) - keep press fast otherwise
      if(vid && sec.classList.contains("playing")) safePlay(vid);
    } else if(vid){
      // out of view: pause + release so only ever ONE clip decodes
      vid.pause();
    }
  });
}, { root: deck, threshold:[0,0.55,0.9] });
covers.forEach(c=> io.observe(c));

/* ---------- video play handling - poster-first, one clip at a time ---------- */
function safePlay(v){
  if(!v.src){ v.src = v.dataset.src || v.getAttribute("data-src") || v.src; }
  const p = v.play(); if(p&&p.catch) p.catch(()=>{});
}
covers.forEach((sec)=>{
  const btn = sec.querySelector(".posterbtn");
  const vid = sec.querySelector("video.clip");
  if(!btn || !vid) return;
  const idx = +sec.dataset.index;
  vid.dataset.src = COVERS[idx].media.src;
  btn.addEventListener("click", ()=>{
    // pause every other clip first (single decode budget)
    covers.forEach(s=>{ const ov=s.querySelector("video.clip"); if(ov&&ov!==vid){ ov.pause(); s.classList.remove("playing"); }});
    if(!vid.src) vid.src = vid.dataset.src;
    sec.classList.add("playing");
    if(COVERS[idx].media.audio) vid.muted = false;
    safePlay(vid);
  });
  vid.addEventListener("loadeddata", ()=>{ sec.querySelector(".poster")?.style.setProperty("opacity","0"); });
});

/* ---------- progress strip ---------- */
deck.addEventListener("scroll", ()=>{
  const max = deck.scrollHeight - deck.clientHeight;
  const p = max>0 ? (deck.scrollTop/max)*100 : 0;
  progress.style.setProperty("--p", p.toFixed(2)+"%");
}, { passive:true });

/* ---------- keyboard: arrows / page flip the archive ---------- */
addEventListener("keydown",(e)=>{
  if(e.target.closest("button")) return;
  if(["ArrowDown","PageDown"," "].includes(e.key)){ e.preventDefault(); covers[Math.min(current+1,covers.length-1)].scrollIntoView({behavior:reduceMotion?"auto":"smooth"}); }
  if(["ArrowUp","PageUp"].includes(e.key)){ e.preventDefault(); covers[Math.max(current-1,0)].scrollIntoView({behavior:reduceMotion?"auto":"smooth"}); }
  if(e.key==="Home"){ e.preventDefault(); covers[0].scrollIntoView({behavior:reduceMotion?"auto":"smooth"}); }
  if(e.key==="End"){ e.preventDefault(); covers[covers.length-1].scrollIntoView({behavior:reduceMotion?"auto":"smooth"}); }
});

/* mark first cover live immediately so it never starts blank */
covers[0].classList.add("live");
railBtns[0].setAttribute("aria-current","true");
</script>
</body>
</html>
