<!-- TEMPLATE: Memphis Neo Postmodern | ARCHETYPE: neo-memphis | REF: Ettore Sottsass, Memphis Group 1981, terrazzo/squiggle/confetti | WHEN TO USE: joyful anti-Swiss maximalist landing/portfolio where you want loud 80s postmodern personality, tilted media cards on a patterned field | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Memphis Neo Postmodern</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=Space+Grotesk:wght@400;500;700&family=Bricolage+Grotesque:opsz,wght@12..96,800&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     MEMPHIS NEO POSTMODERN
     Palette (inline-SVG patterns repeat these hex literally,
     never var(), because <pattern> fill cannot resolve CSS vars)
     ============================================================ */
  :root {
    --paper: #faf7f0;
    --ink: #16110d;
    --orange: #e9542f;
    --cyan: #2bb0c9;
    --yellow: #f4c01f;
    --pink: #e36fa8;
    --mint: #bfe3c6;
    --shadow: 6px 6px 0 #16110d;
    --shadow-lg: 10px 10px 0 #16110d;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }
  @media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Space Grotesk", system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* the squiggle + confetti + triangle pattern field, fixed behind everything */
  .field {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .field svg { width: 100%; height: 100%; display: block; }

  /* slow drift of the pattern. honored by reduced-motion below. */
  @keyframes drift {
    from { transform: translate3d(0, 0, 0); }
    to   { transform: translate3d(-72px, -72px, 0); }
  }
  .field .layer-a { animation: drift 38s linear infinite; }
  .field .layer-b { animation: drift 60s linear infinite reverse; }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 28px 120px;
  }

  /* ===================== TOP BAR ===================== */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 20px 0 14px;
    flex-wrap: wrap;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
  }
  .brand .blob {
    width: 30px; height: 30px;
    background: var(--orange);
    border: 3px solid var(--ink);
    border-radius: 50% 50% 50% 0;
    transform: rotate(-8deg);
  }
  .nav { display: flex; gap: 8px; flex-wrap: wrap; }
  .nav a {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink);
    text-decoration: none;
    padding: 7px 13px;
    border: 2.5px solid var(--ink);
    background: var(--paper);
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
  }
  .nav a:nth-child(2) { background: var(--yellow); }
  .nav a:nth-child(3) { background: var(--cyan); color: var(--paper); }
  .nav a:hover, .nav a:focus-visible {
    transform: translate(2px, 2px) rotate(-1.5deg);
    box-shadow: 1px 1px 0 var(--ink);
    outline: none;
  }

  /* ===================== HERO BAND (compact, mechanic still visible) ===================== */
  .hero {
    margin-top: 10px;
    margin-bottom: 26px;
  }
  .kicker {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    font-size: 12px;
    background: var(--ink);
    color: var(--paper);
    padding: 6px 14px;
    transform: rotate(-1.2deg);
    border-radius: 2px;
  }
  .kicker .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--pink); }

  .headline {
    font-family: "Fraunces", "Bricolage Grotesque", serif;
    font-weight: 900;
    font-size: clamp(46px, 9.2vw, 132px);
    line-height: 0.86;
    letter-spacing: -0.02em;
    margin: 14px 0 0;
    text-transform: uppercase;
  }
  .headline .l1 { color: var(--ink); }
  .headline .l2 { color: var(--orange); display: inline-block; transform: rotate(-1.6deg); }
  .headline .l3 { color: var(--cyan); display: inline-block; transform: rotate(1deg); }
  .headline .stamp {
    display: inline-block;
    font-size: 0.32em;
    vertical-align: middle;
    background: var(--yellow);
    color: var(--ink);
    border: 3px solid var(--ink);
    padding: 2px 10px;
    transform: rotate(4deg) translateY(-0.35em);
    box-shadow: var(--shadow);
    -webkit-text-fill-color: var(--ink);
  }

  .sub {
    margin: 18px 0 0;
    max-width: 560px;
    font-size: clamp(15px, 1.6vw, 18px);
    line-height: 1.5;
    font-weight: 500;
  }
  .sub b { background: var(--mint); padding: 0 4px; box-decoration-break: clone; }

  /* ===================== TILTED CARD GRID (the signature, populated at scroll=0) ===================== */
  .deck {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 26px;
    margin-top: 8px;
  }
  /* each card spans a chunk of the 12col grid; sizes vary for asymmetry */
  .card { position: relative; }
  .card .frame {
    position: relative;
    background: var(--paper);
    border: 3.5px solid var(--ink);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    transition: transform 0.18s cubic-bezier(.2,.7,.3,1), box-shadow 0.18s ease;
    will-change: transform;
  }
  /* media is CONTAINED so landscape assets never cover-crop; chip bg fills the slack */
  .card .media {
    display: block;
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: contain;
    background: var(--chip, #e9542f);
    image-rendering: auto;
  }
  .card video.media { background: #000; }
  .card .label {
    position: absolute;
    left: -3.5px; bottom: -3.5px;
    background: var(--ink);
    color: var(--paper);
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 6px 12px;
    border: 3.5px solid var(--ink);
  }
  .card .tag {
    position: absolute;
    right: 10px; top: 10px;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 11px;
    background: var(--tagbg, #f4c01f);
    color: var(--ink);
    border: 2.5px solid var(--ink);
    padding: 3px 8px;
    transform: rotate(6deg);
  }
  /* play affordance for video cards */
  .card .play {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    width: 58px; height: 58px;
    background: var(--paper);
    border: 3.5px solid var(--ink);
    border-radius: 50%;
    display: grid; place-items: center;
    box-shadow: var(--shadow);
    pointer-events: none;
  }
  .card .play::after {
    content: "";
    width: 0; height: 0;
    border-left: 16px solid var(--ink);
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    margin-left: 4px;
  }
  .card.playing .play, .card.is-img .play { display: none; }

  .card .frame:hover, .card .frame:focus-within {
    transform: rotate(0deg) scale(1.015) !important;
    box-shadow: 14px 14px 0 var(--ink);
  }
  .card .frame:focus-visible { outline: 4px solid var(--pink); outline-offset: 4px; }

  /* tilt + span assignments per slot (asymmetric Memphis layout) */
  .card.s1 { grid-column: span 5; }
  .card.s1 .frame { transform: rotate(-2.4deg); }
  .card.s2 { grid-column: span 4; margin-top: 34px; }
  .card.s2 .frame { transform: rotate(2.2deg); }
  .card.s3 { grid-column: span 3; margin-top: 8px; }
  .card.s3 .frame { transform: rotate(-1.4deg); }
  .card.s4 { grid-column: span 4; margin-top: 22px; }
  .card.s4 .frame { transform: rotate(1.8deg); }
  .card.s5 { grid-column: span 4; }
  .card.s5 .frame { transform: rotate(-1.9deg); }
  .card.s6 { grid-column: span 4; margin-top: 30px; }
  .card.s6 .frame { transform: rotate(2.6deg); }

  /* decorative loose geometric chips scattered between cards */
  .chip-deco {
    position: absolute;
    z-index: 2;
    pointer-events: none;
    border: 3px solid var(--ink);
  }
  .chip-deco.circ { border-radius: 50%; }
  .chip-deco.tri {
    width: 0; height: 0; border: none;
    background: none;
  }

  /* ===================== TERRAZZO STRIP ===================== */
  .terrazzo {
    margin: 60px 0 0;
    border: 3.5px solid var(--ink);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    position: relative;
  }
  .terrazzo svg { display: block; width: 100%; height: 150px; }
  .terrazzo .quote {
    position: absolute;
    inset: 0;
    display: grid; place-items: center;
    text-align: center;
    padding: 0 20px;
  }
  .terrazzo .quote span {
    font-family: "Fraunces", serif;
    font-weight: 900;
    font-size: clamp(20px, 3.4vw, 40px);
    color: var(--ink);
    background: var(--paper);
    padding: 8px 20px;
    border: 3.5px solid var(--ink);
    transform: rotate(-1.4deg);
    box-shadow: var(--shadow);
    letter-spacing: -0.01em;
  }

  /* ===================== SECTION HEADERS ===================== */
  .section-head {
    margin: 70px 0 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  .section-head h2 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800;
    font-size: clamp(30px, 5vw, 56px);
    margin: 0;
    text-transform: uppercase;
    letter-spacing: -0.02em;
    line-height: 0.95;
  }
  .section-head h2 em {
    font-style: normal;
    color: var(--paper);
    background: var(--orange);
    padding: 0 10px;
    transform: rotate(-1deg);
    display: inline-block;
    -webkit-box-decoration-break: clone;
  }
  .section-head .idx {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 14px;
    background: var(--cyan);
    color: var(--paper);
    border: 3px solid var(--ink);
    padding: 4px 11px;
    transform: rotate(3deg);
  }

  /* ===================== FEATURE ROWS (text + tilted media) ===================== */
  .feature {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: center;
    margin: 48px 0;
  }
  .feature:nth-child(even) .feat-media { order: -1; }
  .feat-copy h3 {
    font-family: "Fraunces", serif;
    font-weight: 900;
    font-size: clamp(26px, 3.6vw, 42px);
    margin: 0 0 14px;
    line-height: 0.96;
    text-transform: uppercase;
  }
  .feat-copy p { font-size: 16px; line-height: 1.55; max-width: 440px; font-weight: 500; }
  .feat-copy .pills { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 18px; }
  .feat-copy .pills span {
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
    border: 2.5px solid var(--ink); padding: 5px 11px; background: var(--paper);
    box-shadow: 3px 3px 0 var(--ink);
  }
  .feat-copy .pills span:nth-child(2) { background: var(--yellow); }
  .feat-copy .pills span:nth-child(3) { background: var(--pink); }

  .feat-media .frame {
    position: relative;
    border: 3.5px solid var(--ink);
    background: var(--paper);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    transform: rotate(var(--tilt, -2deg));
    transition: transform 0.18s ease;
  }
  .feat-media .frame:hover, .feat-media .frame:focus-within { transform: rotate(0deg) scale(1.01); }
  .feat-media .media {
    display: block; width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: contain;
    background: var(--chip, #2bb0c9);
  }
  .feat-media video.media { background: #000; }
  .feat-media .label {
    position: absolute; left: -3.5px; bottom: -3.5px;
    background: var(--ink); color: var(--paper);
    font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px;
    padding: 6px 12px; border: 3.5px solid var(--ink);
  }
  .feat-media .play {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 60px; height: 60px; background: var(--paper); border: 3.5px solid var(--ink);
    border-radius: 50%; display: grid; place-items: center; box-shadow: var(--shadow); pointer-events: none;
  }
  .feat-media .play::after {
    content: ""; width: 0; height: 0;
    border-left: 17px solid var(--ink);
    border-top: 11px solid transparent; border-bottom: 11px solid transparent; margin-left: 4px;
  }
  .feat-media.playing .play { display: none; }

  /* ===================== AUDIO TRACK CARDS ===================== */
  .audio-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
  .track {
    border: 3.5px solid var(--ink);
    box-shadow: var(--shadow);
    background: var(--paper);
    padding: 16px;
    transform: rotate(var(--tilt, -1deg));
    transition: transform 0.15s ease;
  }
  .track:nth-child(2) { background: var(--mint); }
  .track:hover, .track:focus-within { transform: rotate(0deg) translateY(-3px); }
  .track h4 {
    margin: 0 0 10px; font-family: "Bricolage Grotesque", sans-serif; font-weight: 800;
    font-size: 17px; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .track .wave {
    width: 100%; height: 54px; object-fit: cover;
    border: 2.5px solid var(--ink); background: var(--paper); display: block;
    image-rendering: pixelated;
  }
  .track audio { width: 100%; margin-top: 12px; }
  .track .meta { font-size: 12px; font-weight: 600; margin-top: 8px; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.6px; }

  /* ===================== FOOTER / CTA ===================== */
  .cta {
    margin-top: 80px;
    border: 4px solid var(--ink);
    background: var(--yellow);
    box-shadow: var(--shadow-lg);
    padding: 44px 34px;
    text-align: center;
    transform: rotate(-0.6deg);
    position: relative;
    overflow: hidden;
  }
  .cta h2 {
    font-family: "Fraunces", serif; font-weight: 900;
    font-size: clamp(30px, 6vw, 70px); margin: 0; line-height: 0.9; text-transform: uppercase;
  }
  .cta p { font-weight: 600; font-size: 16px; margin: 14px auto 24px; max-width: 460px; }
  .cta .btn {
    display: inline-block; font-family: "Space Grotesk", sans-serif; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.4px; font-size: 15px;
    background: var(--ink); color: var(--paper); text-decoration: none;
    padding: 15px 34px; border: 3px solid var(--ink); box-shadow: var(--shadow);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .cta .btn:hover, .cta .btn:focus-visible {
    transform: translate(3px,3px); box-shadow: 2px 2px 0 var(--ink); outline: none;
    background: var(--orange);
  }
  .footnote {
    text-align: center; margin-top: 30px; font-size: 13px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px; opacity: 0.7;
  }

  /* ===================== MOBILE ===================== */
  @media (max-width: 900px) {
    .feature { grid-template-columns: 1fr; gap: 24px; }
    .feature:nth-child(even) .feat-media { order: 0; }
    .audio-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .wrap { padding: 0 16px 80px; }
    /* stack the deck so no card relies on multi-col span; keeps pattern energy, kills overflow */
    .deck { grid-template-columns: 1fr; gap: 20px; }
    .card.s1, .card.s2, .card.s3, .card.s4, .card.s5, .card.s6 {
      grid-column: 1 / -1; margin-top: 0;
    }
    /* gentler tilts on phone so nothing pokes past the edge */
    .card.s1 .frame { transform: rotate(-1.6deg); }
    .card.s2 .frame { transform: rotate(1.6deg); }
    .card.s3 .frame { transform: rotate(-1.2deg); }
    .card.s4 .frame { transform: rotate(1.4deg); }
    .card.s5 .frame { transform: rotate(-1.4deg); }
    .card.s6 .frame { transform: rotate(1.5deg); }
    .card .media { aspect-ratio: 16 / 9; } /* letterbox landscape cleanly on portrait */
    .feat-media .frame { transform: rotate(-1.4deg); }
    .nav a { font-size: 11px; padding: 6px 10px; }
    .headline { font-size: clamp(42px, 13vw, 76px); }
    .chip-deco { display: none; } /* avoid stray geometry causing overflow */
  }

  /* ===================== REDUCED MOTION ===================== */
  @media (prefers-reduced-motion: reduce) {
    .field .layer-a, .field .layer-b { animation: none !important; }
    .card .frame, .feat-media .frame, .track, .nav a, .cta .btn { transition: none !important; }
    * { scroll-behavior: auto !important; }
  }
</style>
</head>
<body>

<!-- ============================================================
     DATA ARRAY  -  swap content here, markup is generated from it
     types: img | video | audio . chip = fallback/letterbox color.

<script>

  }
};
</script>

<!-- ============================================================
     PATTERN FIELD : squiggles + confetti dots + triangles
     hex literals only (no var()) so <pattern> fills resolve.
     ============================================================ -->
<div class="field" aria-hidden="true">
  <svg xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1440 900">
    <defs>
      <!-- squiggle tile -->
      <pattern id="squig" width="120" height="120" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
        <path d="M0 60 q15 -26 30 0 t30 0 t30 0 t30 0" fill="none" stroke="#16110d" stroke-width="3.2" stroke-linecap="round" opacity="0.18"/>
        <path d="M0 18 q15 -22 30 0 t30 0 t30 0 t30 0" fill="none" stroke="#16110d" stroke-width="2.4" stroke-linecap="round" opacity="0.10"/>
      </pattern>
      <!-- confetti dots + triangles tile -->
      <pattern id="confetti" width="160" height="160" patternUnits="userSpaceOnUse">
        <circle cx="24" cy="30" r="6" fill="#e9542f" opacity="0.85"/>
        <circle cx="120" cy="64" r="5" fill="#2bb0c9" opacity="0.8"/>
        <circle cx="70" cy="120" r="7" fill="#f4c01f" opacity="0.85"/>
        <circle cx="138" cy="138" r="4" fill="#e36fa8" opacity="0.85"/>
        <circle cx="40" cy="92" r="3.5" fill="#16110d" opacity="0.5"/>
        <path d="M96 14 l11 18 h-22 z" fill="#e36fa8" opacity="0.8"/>
        <path d="M14 132 l9 15 h-18 z" fill="#2bb0c9" opacity="0.8"/>
        <path d="M150 30 l8 14 h-16 z" fill="#f4c01f" opacity="0.85"/>
        <rect x="106" y="104" width="13" height="13" fill="#e9542f" opacity="0.7" transform="rotate(18 112 110)"/>
        <line x1="50" y1="46" x2="68" y2="64" stroke="#16110d" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
        <line x1="64" y1="46" x2="50" y2="64" stroke="#16110d" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
      </pattern>
    </defs>
    <rect width="1440" height="900" fill="#faf7f0"/>
    <g class="layer-a"><rect x="-120" y="-120" width="1680" height="1140" fill="url(#squig)"/></g>
    <g class="layer-b"><rect x="-160" y="-160" width="1760" height="1220" fill="url(#confetti)"/></g>
  </svg>
</div>

<main class="wrap">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand"><span class="blob"></span><span id="brand"></span></div>
    <nav class="nav" id="nav" aria-label="Primary"></nav>
  </header>

  <!-- HERO (compact band, mechanic stays in first viewport) -->
  <section class="hero">
    <span class="kicker"><span class="dot"></span><span id="kicker"></span></span>
    <h1 class="headline" id="headline"></h1>
    <p class="sub" id="sub"></p>
  </section>

  <!-- SIGNATURE DECK : tilted media cards on the pattern field -->
  <section class="deck" id="deck" aria-label="Featured media"></section>

  <!-- TERRAZZO STRIP -->
  <section class="terrazzo" aria-label="Terrazzo quote">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 150" preserveAspectRatio="xMidYMid slice" role="img" aria-label="terrazzo texture">
      <rect width="1440" height="150" fill="#faf7f0"/>
      <g id="terrazzo-dots"></g>
    </svg>
    <div class="quote"><span id="terrazzo-quote"></span></div>
  </section>

  <!-- FEATURES -->
  <div class="section-head">
    <span class="idx">A</span>
    <h2>The <em>rules</em> we break</h2>
  </div>
  <section id="features"></section>

  <!-- AUDIO -->
  <div class="section-head">
    <span class="idx">B</span>
    <h2>Sound <em>chips</em></h2>
  </div>
  <section class="audio-row" id="audio"></section>

  <!-- CTA -->
  <section class="cta">
    <h2 id="cta-h"></h2>
    <p id="cta-p"></p>
    <a class="btn" id="cta-btn" href="#"></a>
  </section>
  <p class="footnote" id="footnote"></p>

</main>

<script>
(() => {
  const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const $ = (s) => document.querySelector(s);

  // ---- HEADER / HERO ----
  $("#brand").textContent = DATA.brand;
  const nav = $("#nav");
  DATA.nav.forEach((n) => { const a = document.createElement("a"); a.href = "#"; a.textContent = n; nav.appendChild(a); });
  $("#kicker").textContent = DATA.hero.kicker;
  $("#headline").innerHTML =
    `<span class="l1">${DATA.hero.line1}</span> <span class="l2">${DATA.hero.line2}</span><br>` +
    `<span class="l3">${DATA.hero.line3}</span> <span class="stamp">${DATA.hero.stamp}</span>`;
  $("#sub").innerHTML = DATA.hero.sub;

  // ---- helper: build a media element (img or video w/ poster) ----
  function buildMedia(item, cls) {
    if (item.type === "video") {
      const v = document.createElement("video");
      v.className = cls;
      v.src = item.src;
      if (item.poster) v.poster = item.poster;
      v.muted = true; v.loop = true; v.playsInline = true; v.preload = "none";
      v.setAttribute("muted", "");
      return v;
    }
    const img = document.createElement("img");
    img.className = cls;
    img.src = item.src;
    img.alt = item.label || "";
    img.loading = "lazy";
    img.decoding = "async";
    return img;
  }

  // ---- DECK ----
  const deck = $("#deck");
  DATA.deck.forEach((item) => {
    const card = document.createElement("div");
    card.className = `card ${item.slot}` + (item.type === "img" ? " is-img" : "");
    const frame = document.createElement("div");
    frame.className = "frame";
    frame.tabIndex = 0;
    frame.style.setProperty("--chip", item.chip);

    const media = buildMedia(item, "media");
    frame.appendChild(media);

    if (item.type === "video") {
      const play = document.createElement("div");
      play.className = "play";
      frame.appendChild(play);
    }
    const lab = document.createElement("span");
    lab.className = "label"; lab.textContent = item.label;
    frame.appendChild(lab);
    const tag = document.createElement("span");
    tag.className = "tag"; tag.textContent = item.tag;
    tag.style.setProperty("--tagbg", item.tagbg);
    frame.appendChild(tag);

    card.appendChild(frame);
    deck.appendChild(card);

    if (item.type === "video") wireVideoCard(card, frame, media);
  });

  // ---- FEATURES ----
  const feats = $("#features");
  DATA.features.forEach((f) => {
    const row = document.createElement("article");
    row.className = "feature";

    const copy = document.createElement("div");
    copy.className = "feat-copy";
    copy.innerHTML =
      `<h3>${f.h}</h3><p>${f.p}</p>` +
      `<div class="pills">${f.pills.map((p) => `<span>${p}</span>`).join("")}</div>`;

    const mediaWrap = document.createElement("div");
    mediaWrap.className = "feat-media";
    const frame = document.createElement("div");
    frame.className = "frame";
    frame.tabIndex = 0;
    frame.style.setProperty("--tilt", f.tilt);
    frame.style.setProperty("--chip", f.chip);

    const media = buildMedia(f, "media");
    frame.appendChild(media);
    if (f.type === "video") {
      const play = document.createElement("div"); play.className = "play"; frame.appendChild(play);
    }
    const lab = document.createElement("span");
    lab.className = "label"; lab.textContent = f.label; frame.appendChild(lab);

    mediaWrap.appendChild(frame);
    row.appendChild(copy);
    row.appendChild(mediaWrap);
    feats.appendChild(row);

    if (f.type === "video") wireVideoCard(mediaWrap, frame, media);
  });

  // ---- AUDIO ----
  const audio = $("#audio");
  DATA.audio.forEach((t, i) => {
    const card = document.createElement("div");
    card.className = "track";
    card.style.setProperty("--tilt", (i % 2 === 0 ? -1.4 : 1.4) + "deg");
    card.innerHTML =
      `<h4>${t.h}</h4>` +
      `<img class="wave" src="${t.wave}" alt="waveform" loading="lazy" decoding="async">` +
      `<audio controls preload="none" src="${t.src}"></audio>` +
      `<div class="meta">${t.meta}</div>`;
    audio.appendChild(card);
  });

  // ---- CTA ----
  $("#cta-h").textContent = DATA.cta.h;
  $("#cta-p").textContent = DATA.cta.p;
  $("#cta-btn").textContent = DATA.cta.btn;
  $("#footnote").textContent = DATA.cta.foot;

  // ---- TERRAZZO dots (generated, deterministic so it renders crisp) ----
  $("#terrazzo-quote").textContent = DATA.terrazzoQuote;
  const tg = $("#terrazzo-dots");
  const COLS = ["#e9542f", "#2bb0c9", "#f4c01f", "#e36fa8", "#16110d", "#bfe3c6"];
  let seed = 7;
  const rnd = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };
  for (let i = 0; i < 130; i++) {
    const x = rnd() * 1440, y = rnd() * 150, r = 4 + rnd() * 11;
    const c = COLS[Math.floor(rnd() * COLS.length)];
    const shape = rnd();
    let el;
    if (shape < 0.62) {
      el = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      el.setAttribute("cx", x.toFixed(1)); el.setAttribute("cy", y.toFixed(1)); el.setAttribute("r", r.toFixed(1));
    } else if (shape < 0.85) {
      el = document.createElementNS("http://www.w3.org/2000/svg", "rect");
      el.setAttribute("x", x.toFixed(1)); el.setAttribute("y", y.toFixed(1));
      el.setAttribute("width", (r * 1.6).toFixed(1)); el.setAttribute("height", (r * 1.6).toFixed(1));
      el.setAttribute("transform", `rotate(${(rnd() * 60 - 30).toFixed(1)} ${x.toFixed(1)} ${y.toFixed(1)})`);
    } else {
      el = document.createElementNS("http://www.w3.org/2000/svg", "path");
      const s = r * 1.7;
      el.setAttribute("d", `M${x.toFixed(1)} ${(y - s).toFixed(1)} l${s.toFixed(1)} ${(s * 1.5).toFixed(1)} h${(-s * 2).toFixed(1)} z`);
    }
    el.setAttribute("fill", c);
    el.setAttribute("opacity", (0.55 + rnd() * 0.4).toFixed(2));
    tg.appendChild(el);
  }

  // ============================================================
  // VIDEO: play only when focused/hovered/locked AND in view.
  // Never autoplay all of them (simultaneous decode tanks FPS).
  // Posters show by default; one video plays at a time.
  // ============================================================
  let current = null;
  function stopCurrent() {
    if (current && current.v) {
      current.v.pause();
      current.card.classList.remove("playing");
    }
    current = null;
  }
  function playOne(card, v) {
    if (current && current.v === v) return;
    stopCurrent();
    if (REDUCED) return; // reduced motion: keep poster frame, no playback
    const p = v.play();
    if (p && p.catch) p.catch(() => {});
    card.classList.add("playing");
    current = { card, v };
  }

  function wireVideoCard(card, frame, v) {
    const inView = () => {
      const r = frame.getBoundingClientRect();
      return r.top < window.innerHeight && r.bottom > 0;
    };
    const enter = () => { if (inView()) playOne(card, v); };
    const leave = () => { if (current && current.v === v) stopCurrent(); };

    frame.addEventListener("mouseenter", enter);
    frame.addEventListener("mouseleave", leave);
    frame.addEventListener("focus", enter);
    frame.addEventListener("blur", leave);
    // tap-to-toggle on touch
    frame.addEventListener("click", () => {
      if (current && current.v === v) { stopCurrent(); }
      else { enter(); }
    });
  }

  // Pause whatever is playing if it scrolls fully out of view.
  if ("IntersectionObserver" in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (!e.isIntersecting && current && current.v && current.v.closest(".frame") === e.target) {
          stopCurrent();
        }
      });
    }, { threshold: 0.01 });
    document.querySelectorAll(".frame").forEach((f) => { if (f.querySelector("video")) io.observe(f); });
  }
})();
</script>
</body>
</html>
