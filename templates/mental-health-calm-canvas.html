<!-- TEMPLATE: Calm Canvas | ARCHETYPE: calm-soft-gradient-hero | REF: headspace.com, calm.com | WHEN TO USE: mental-health / wellness / meditation / sleep app landing hero, soft and reassuring (Headspace / Calm register) | SWAP: edit the DATA object in the inline script -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calm Canvas - a soft place to breathe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
<style>
  /* ====================================================================
     DATA-DRIVEN STYLE TOKENS
     The palette here mirrors the JS DATA.palette block so a swap stays
     in one mental model. Soft gradient: lavender -> warm peach -> sage.
     ==================================================================== */
  :root {
    --lavender: #d9d2f5;
    --lavender-deep: #b9aee9;
    --peach: #ffd9c0;
    --peach-deep: #ffc4a3;
    --sage: #cfe3cf;
    --sage-deep: #b3d4b6;
    --cream: #fff8f2;
    --ink: #4a4361;        /* soft humanist near-black, never pure #000 */
    --ink-soft: #6f6790;
    --cta: #8a7bd8;        /* friendly lavender-violet pill */
    --cta-hover: #7a69cf;
    --cta-text: #fffdfb;
    --ring: #6f5fc7;
    --radius-blob: 48px;
    --maxw: 1180px;
    --ease-soft: cubic-bezier(.34, 1.2, .42, 1);
  }

  * { box-sizing: border-box; }

  html, body { margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: var(--cream);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    line-height: 1.5;
  }

  /* ---- The full-bleed soft gradient canvas (scroll=0 signature) ---- */
  .stage {
    position: relative;
    min-height: 100vh;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    /* layered radial blooms over a diagonal pastel wash for organic depth */
    background:
      radial-gradient(circle at 78% 18%, rgba(255, 217, 192, .85) 0%, rgba(255, 217, 192, 0) 46%),
      radial-gradient(circle at 14% 82%, rgba(207, 227, 207, .9) 0%, rgba(207, 227, 207, 0) 48%),
      radial-gradient(circle at 90% 88%, rgba(185, 174, 233, .55) 0%, rgba(185, 174, 233, 0) 50%),
      linear-gradient(150deg, var(--lavender) 0%, var(--peach) 52%, var(--sage) 100%);
  }

  /* soft animated bloom layer that breathes very slowly behind everything */
  .bloom {
    position: absolute;
    inset: -10%;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(40% 38% at 30% 30%, rgba(255, 248, 242, .7) 0%, rgba(255, 248, 242, 0) 70%),
      radial-gradient(36% 34% at 72% 64%, rgba(255, 248, 242, .55) 0%, rgba(255, 248, 242, 0) 72%);
    animation: drift 26s var(--ease-soft) infinite alternate;
    will-change: transform;
  }
  @keyframes drift {
    0%   { transform: translate3d(-2%, -1%, 0) scale(1); }
    100% { transform: translate3d(2%, 2%, 0) scale(1.06); }
  }

  /* floating decorative soft circles (grain-free, very low contrast) */
  .motes { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
  .mote {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, .42);
    filter: blur(1px);
    animation: float-mote 9s ease-in-out infinite;
    will-change: transform;
  }
  .mote.m1 { width: 14px; height: 14px; left: 12%; top: 30%; animation-delay: 0s; }
  .mote.m2 { width: 9px;  height: 9px;  left: 24%; top: 64%; animation-delay: 1.4s; background: rgba(255,255,255,.32); }
  .mote.m3 { width: 18px; height: 18px; left: 84%; top: 40%; animation-delay: .7s; }
  .mote.m4 { width: 11px; height: 11px; left: 68%; top: 22%; animation-delay: 2.1s; }
  .mote.m5 { width: 7px;  height: 7px;  left: 50%; top: 78%; animation-delay: 1.1s; background: rgba(255,255,255,.3); }
  @keyframes float-mote {
    0%, 100% { transform: translateY(0); opacity: .7; }
    50%      { transform: translateY(-16px); opacity: 1; }
  }

  /* ---- top band: brand + minimal nav ---- */
  .topband {
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    padding: 26px clamp(20px, 5vw, 56px) 8px;
    max-width: var(--maxw);
    width: 100%;
    margin: 0 auto;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 11px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    letter-spacing: .2px;
    color: var(--ink);
  }
  .brand-dot {
    width: 34px; height: 34px;
    flex: 0 0 auto;
    display: grid; place-items: center;
  }
  .nav {
    display: flex;
    align-items: center;
    gap: clamp(14px, 2.6vw, 34px);
    font-family: 'Quicksand', sans-serif;
    font-weight: 500;
    font-size: .98rem;
  }
  .nav a {
    color: var(--ink-soft);
    text-decoration: none;
    transition: color .25s ease;
    padding: 6px 2px;
    border-radius: 8px;
  }
  .nav a:hover { color: var(--ink); }
  .nav a:focus-visible,
  .pill:focus-visible,
  .ghost:focus-visible,
  .brand:focus-visible {
    outline: 3px solid var(--ring);
    outline-offset: 3px;
  }
  .nav .ghost {
    display: inline-flex;
    align-items: center;
    padding: 9px 18px;
    border-radius: 999px;
    border: 2px solid rgba(74, 67, 97, .22);
    color: var(--ink);
    background: rgba(255, 255, 255, .35);
    text-decoration: none;
    transition: background .25s ease, border-color .25s ease, transform .25s var(--ease-soft);
  }
  .nav .ghost:hover { background: rgba(255, 255, 255, .6); border-color: rgba(74,67,97,.35); transform: translateY(-1px); }
  .nav-links { display: flex; gap: clamp(14px, 2.6vw, 34px); align-items: center; }

  /* ---- hero grid: copy + character ---- */
  .hero {
    position: relative;
    z-index: 2;
    flex: 1;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    align-items: center;
    gap: clamp(20px, 4vw, 60px);
    max-width: var(--maxw);
    width: 100%;
    margin: 0 auto;
    padding: clamp(8px, 2vw, 28px) clamp(20px, 5vw, 56px) clamp(28px, 4vw, 56px);
  }

  .copy { max-width: 560px; }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: .82rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, .5);
    padding: 8px 16px;
    border-radius: 999px;
    margin-bottom: 22px;
    backdrop-filter: blur(4px);
  }
  .eyebrow .seed {
    width: 9px; height: 9px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffd9c0, #ffb38a);
    box-shadow: 0 0 0 4px rgba(255, 196, 163, .35);
  }

  h1.headline {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: clamp(2.5rem, 6.2vw, 4.4rem);
    line-height: 1.04;
    letter-spacing: -.5px;
    margin: 0 0 22px;
    color: var(--ink);
  }
  h1.headline .soft {
    /* gentle gradient text for the warm accent word */
    background: linear-gradient(105deg, #8a7bd8 0%, #e89a78 60%, #7fae84 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
  }

  p.sub {
    font-size: clamp(1.05rem, 1.5vw, 1.28rem);
    line-height: 1.62;
    color: var(--ink-soft);
    margin: 0 0 34px;
    font-weight: 500;
    max-width: 30ch;
  }

  .cta-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
    margin-bottom: 30px;
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 11px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: 1.08rem;
    color: var(--cta-text);
    background: var(--cta);
    border: none;
    padding: 17px 34px;
    border-radius: 999px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 14px 30px -10px rgba(138, 123, 216, .65), inset 0 1px 0 rgba(255,255,255,.25);
    transition: transform .3s var(--ease-soft), box-shadow .3s ease, background .25s ease;
  }
  .pill:hover {
    background: var(--cta-hover);
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 20px 38px -10px rgba(138, 123, 216, .7), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .pill .arrow { transition: transform .3s var(--ease-soft); }
  .pill:hover .arrow { transform: translateX(4px); }

  .reassure {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    font-size: .96rem;
    font-weight: 600;
    color: var(--ink-soft);
  }
  .reassure svg { flex: 0 0 auto; }

  /* tiny trust line of soft chips */
  .chips { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: .85rem; font-weight: 600;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, .42);
    padding: 7px 14px; border-radius: 999px;
    backdrop-filter: blur(3px);
  }
  .chip i { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

  /* ---- the friendly blob CHARACTER ---- */
  .character {
    position: relative;
    justify-self: center;
    width: min(100%, 440px);
    aspect-ratio: 1 / 1;
    display: grid;
    place-items: center;
  }
  .character svg { width: 100%; height: 100%; overflow: visible; }

  /* the whole character breathes gently */
  .breathe { transform-box: fill-box; transform-origin: center; }
  .character .breathe {
    animation: breathe 7s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.035); }
  }
  /* gentle independent bob for the small companion blob */
  .companion {
    transform-box: fill-box;
    transform-origin: center;
    animation: bob 5.5s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50%      { transform: translateY(-12px) rotate(-3deg); }
  }
  /* slow blink */
  .eye-lid {
    transform-box: fill-box;
    transform-origin: center;
    animation: blink 6.5s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(0); }
    95%           { transform: scaleY(1); }
  }
  /* soft pulsing breath ring */
  .breath-ring {
    transform-box: fill-box;
    transform-origin: center;
    animation: ring 7s ease-in-out infinite;
  }
  @keyframes ring {
    0%, 100% { transform: scale(1); opacity: .55; }
    50%      { transform: scale(1.14); opacity: .15; }
  }

  /* breathe caption under the character */
  .breath-label {
    position: absolute;
    bottom: -6px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    font-size: .9rem;
    letter-spacing: .04em;
    color: var(--ink-soft);
    background: rgba(255, 255, 255, .55);
    padding: 7px 18px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
    white-space: nowrap;
  }
  .breath-label b { color: var(--ink); font-weight: 700; }

  /* soft wave footer divider */
  .wave {
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    z-index: 1;
    width: 100%;
    height: clamp(70px, 12vw, 130px);
    pointer-events: none;
  }

  /* ===================== RESPONSIVE ===================== */
  @media (max-width: 900px) {
    .hero {
      grid-template-columns: 1fr;
      text-align: center;
      gap: clamp(18px, 5vw, 34px);
      padding-top: 6px;
    }
    .copy { max-width: 600px; margin: 0 auto; }
    p.sub { max-width: 38ch; margin-left: auto; margin-right: auto; }
    .cta-row { justify-content: center; }
    .chips { justify-content: center; }
    .character {
      grid-row: 1;           /* character ABOVE copy so signature is first on phone */
      width: min(78%, 320px);
      margin-bottom: 6px;
    }
  }

  @media (max-width: 640px) {
    .nav-links { display: none; }       /* keep only the ghost CTA on phone */
    .topband { padding: 18px 20px 4px; }
    .eyebrow { margin-bottom: 16px; }
    h1.headline { font-size: clamp(2.1rem, 9vw, 3rem); margin-bottom: 16px; }
    p.sub { font-size: 1.04rem; margin-bottom: 24px; }
    .character { width: min(82%, 280px); }
    .breath-label { font-size: .82rem; }
    .pill { width: 100%; justify-content: center; }
    .reassure { justify-content: center; width: 100%; }
  }

  @media (max-width: 380px) {
    h1.headline { font-size: 1.95rem; }
  }

  /* ===================== REDUCED MOTION =====================
     Freeze every gentle float / breathing / drift; show final calm state. */
  @media (prefers-reduced-motion: reduce) {
    .bloom,
    .mote,
    .character .breathe,
    .companion,
    .eye-lid,
    .breath-ring {
      animation: none !important;
    }
    .eye-lid { transform: scaleY(0); }   /* eyes open, not mid-blink */
    .pill, .pill .arrow, .nav .ghost { transition: none !important; }
  }
</style>
</head>
<body>
<script>
  /* ====================================================================
     DATA  -  swap everything here to re-skin the template.
     Pure content + palette tokens. No layout logic lives in here.
     ==================================================================== */
  const DATA = {
    brand: "Stillwell",
    nav: [
      { label: "Meditate", href: "#meditate" },
      { label: "Sleep",    href: "#sleep" },
      { label: "Stories",  href: "#stories" },
      { label: "Pricing",  href: "#pricing" }
    ],
    navCta: { label: "Sign in", href: "#signin" },
    eyebrow: "A softer way to feel okay",
    headlineLead: "Breathe a little",
    headlineSoft: "lighter today",
    sub: "Gentle meditations, kind sleep stories, and small daily check-ins that meet you exactly where you are. No pressure. Just a calmer mind.",
    cta: { label: "Start for free", href: "#start" },
    reassure: "Free for 14 days. Cancel any time.",
    chips: [
      { label: "Guided breathing", color: "#b9aee9" },
      { label: "Sleep stories",    color: "#ffc4a3" },
      { label: "Daily mood",       color: "#b3d4b6" }
    ],
    breathLabel: { lead: "Breathe in", strong: "and let it go" },
    palette: {
      lavender: "#d9d2f5", peach: "#ffd9c0", sage: "#cfe3cf",
      cta: "#8a7bd8", ink: "#4a4361"
    }
  };

  /* ---- helpers (tiny, no libs) ---- */
  const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));

  /* Inline brand mark: a soft sprout blob. Hard-coded hex per spec (never var()). */
  const brandMark = `
    <svg viewBox="0 0 36 36" role="img" aria-label="logo" focusable="false">
      <path d="M18 4 C26 4 32 10 32 18 C32 27 25 32 18 32 C10 32 4 26 4 18 C4 9 11 4 18 4 Z" fill="#b9aee9"/>
      <path d="M18 22 C18 16 22 12 27 12 C26 19 23 23 18 24 Z" fill="#7fae84"/>
      <path d="M18 24 C18 18 14 14 9 14 C10 21 13 25 18 26 Z" fill="#9bc79f"/>
      <circle cx="18" cy="26" r="2.4" fill="#ffc4a3"/>
    </svg>`;

  /* ---- The friendly blob CHARACTER. All hard hex, no sharp edges. ---- */
  const character = `
    <svg viewBox="0 0 460 460" role="img" aria-label="A soft rounded character resting calmly" focusable="false">
      <defs>
        <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#c9bdf0"/>
          <stop offset="0.55" stop-color="#b9aee9"/>
          <stop offset="1" stop-color="#a99cdf"/>
        </linearGradient>
        <linearGradient id="cheekGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ffd9c0"/>
          <stop offset="1" stop-color="#ffb38a"/>
        </linearGradient>
        <radialGradient id="auraGrad" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stop-color="#fff8f2" stop-opacity="0.9"/>
          <stop offset="1" stop-color="#fff8f2" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="compGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#d6ecd8"/>
          <stop offset="1" stop-color="#b3d4b6"/>
        </linearGradient>
      </defs>

      <!-- soft aura -->
      <circle cx="230" cy="240" r="210" fill="url(#auraGrad)"/>

      <!-- pulsing breath ring -->
      <circle class="breath-ring" cx="230" cy="245" r="168" fill="none" stroke="#fff8f2" stroke-width="3" stroke-opacity="0.7"/>

      <!-- main body blob (rounded, organic, zero sharp edges) -->
      <g class="breathe">
        <path d="
          M230 70
          C312 70 376 128 376 218
          C376 296 332 360 264 386
          C238 396 222 396 196 386
          C128 360 84 296 84 218
          C84 128 148 70 230 70 Z"
          fill="url(#bodyGrad)"/>

        <!-- soft belly highlight -->
        <ellipse cx="230" cy="262" rx="118" ry="108" fill="#cabff1" opacity="0.55"/>

        <!-- little arms hugging knees -->
        <path d="M150 300 C132 320 132 350 156 360 C170 366 188 360 196 348 C176 340 162 322 150 300 Z" fill="#a99cdf"/>
        <path d="M310 300 C328 320 328 350 304 360 C290 366 272 360 264 348 C284 340 298 322 310 300 Z" fill="#a99cdf"/>

        <!-- blushy cheeks -->
        <ellipse cx="184" cy="232" rx="22" ry="15" fill="url(#cheekGrad)" opacity="0.85"/>
        <ellipse cx="276" cy="232" rx="22" ry="15" fill="url(#cheekGrad)" opacity="0.85"/>

        <!-- closed, content eyes (gentle curves) -->
        <path d="M170 206 C178 216 192 216 200 206" fill="none" stroke="#4a4361" stroke-width="6" stroke-linecap="round"/>
        <path d="M260 206 C268 216 282 216 290 206" fill="none" stroke="#4a4361" stroke-width="6" stroke-linecap="round"/>

        <!-- blink lids (animated, hidden until blink) -->
        <rect class="eye-lid" x="166" y="200" width="38" height="12" rx="6" fill="#b9aee9"/>
        <rect class="eye-lid" x="256" y="200" width="38" height="12" rx="6" fill="#b9aee9"/>

        <!-- soft serene smile -->
        <path d="M206 252 C220 266 240 266 254 252" fill="none" stroke="#4a4361" stroke-width="6" stroke-linecap="round"/>

        <!-- tiny sprout on top -->
        <path d="M230 70 C230 50 244 38 262 40 C258 58 246 68 230 72 Z" fill="#9bc79f"/>
        <path d="M230 72 C230 54 218 44 202 46 C206 62 216 70 230 74 Z" fill="#7fae84"/>
        <circle cx="230" cy="72" r="6" fill="#ffc4a3"/>
      </g>

      <!-- small companion blob (floats) -->
      <g class="companion">
        <path d="M372 322 C396 322 410 340 410 362 C410 386 392 402 372 402 C352 402 334 386 334 362 C334 340 348 322 372 322 Z" fill="url(#compGrad)"/>
        <path d="M360 356 C364 360 372 360 376 356" fill="none" stroke="#4a4361" stroke-width="4" stroke-linecap="round"/>
        <path d="M384 356 C388 360 396 360 400 356" fill="none" stroke="#4a4361" stroke-width="4" stroke-linecap="round"/>
        <path d="M368 372 C374 378 386 378 392 372" fill="none" stroke="#4a4361" stroke-width="4" stroke-linecap="round"/>
        <ellipse cx="352" cy="368" rx="9" ry="6" fill="#ffd9c0" opacity="0.85"/>
        <ellipse cx="406" cy="368" rx="9" ry="6" fill="#ffd9c0" opacity="0.85"/>
      </g>
    </svg>`;

  const navLinks = DATA.nav.map(n =>
    `<a href="${esc(n.href)}">${esc(n.label)}</a>`
  ).join("");

  const chips = DATA.chips.map(c =>
    `<span class="chip"><i style="background:${esc(c.color)}"></i>${esc(c.label)}</span>`
  ).join("");

  document.documentElement.lang = "en";
  document.body.innerHTML = `
    <main class="stage" role="main">
      <div class="bloom" aria-hidden="true"></div>
      <div class="motes" aria-hidden="true">
        <span class="mote m1"></span><span class="mote m2"></span><span class="mote m3"></span>
        <span class="mote m4"></span><span class="mote m5"></span>
      </div>

      <header class="topband">
        <a class="brand" href="#top" aria-label="${esc(DATA.brand)} home">
          <span class="brand-dot" aria-hidden="true">${brandMark}</span>
          ${esc(DATA.brand)}
        </a>
        <nav class="nav" aria-label="Primary">
          <span class="nav-links">${navLinks}</span>
          <a class="ghost" href="${esc(DATA.navCta.href)}">${esc(DATA.navCta.label)}</a>
        </nav>
      </header>

      <section class="hero">
        <div class="copy">
          <span class="eyebrow"><span class="seed" aria-hidden="true"></span>${esc(DATA.eyebrow)}</span>
          <h1 class="headline">${esc(DATA.headlineLead)} <span class="soft">${esc(DATA.headlineSoft)}</span></h1>
          <p class="sub">${esc(DATA.sub)}</p>
          <div class="cta-row">
            <a class="pill" href="${esc(DATA.cta.href)}">
              ${esc(DATA.cta.label)}
              <svg class="arrow" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <path d="M4 10h11M11 5l5 5-5 5" stroke="#fffdfb" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
            <span class="reassure">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M9 1.5l2 4.4 4.8.5-3.6 3.2 1 4.7L9 14l-4.2 2.3 1-4.7L2.2 6.4 7 5.9z" fill="#ffc4a3" stroke="#e89a78" stroke-width="1" stroke-linejoin="round"/>
              </svg>
              ${esc(DATA.reassure)}
            </span>
          </div>
          <div class="chips" aria-label="Features">${chips}</div>
        </div>

        <div class="character">
          ${character}
          <span class="breath-label" aria-hidden="true">${esc(DATA.breathLabel.lead)} <b>${esc(DATA.breathLabel.strong)}</b></span>
        </div>
      </section>

      <svg class="wave" viewBox="0 0 1440 130" preserveAspectRatio="none" aria-hidden="true">
        <path d="M0 70 C 240 20 480 20 720 60 C 960 100 1200 100 1440 50 L1440 130 L0 130 Z" fill="#fff8f2" opacity="0.65"/>
        <path d="M0 92 C 240 50 520 50 760 84 C 1000 118 1240 118 1440 78 L1440 130 L0 130 Z" fill="#fff8f2"/>
      </svg>
    </main>
  `;

  /* Light progressive enhancement: a gentle "breath" pace sync on the
     CTA hover that respects reduced-motion. Tiny + dependency-free. */
  (function () {
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return; // honor the freeze: no rAF, no inline-transform overrides
    const label = document.querySelector(".breath-label");
    if (!label) return;
    // soft fade of the breathe caption between in / out phases
    let phase = true;
    setInterval(() => {
      phase = !phase;
      label.style.transition = "opacity .9s ease";
      label.style.opacity = phase ? "1" : "0.55";
    }, 3500);
  })();
</script>
</body>
</html>
