<!-- TEMPLATE: Paper-Cut Poster | ARCHETYPE: Saul Bass mid-century paper-cut | REF: Saul Bass title sequences + posters, Anatomy of a Murder, mid-century American modernism | WHEN TO USE: bold single-statement landing/poster page, film/festival/brand announce, anything wanting a confident flat graphic identity | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Paper-Cut Poster - Saul Bass</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   SAUL BASS PAPER-CUT POSTER
   Flat geometric cut shapes, off-center silhouette, generous color fields.
   Palette: cream #efe6d2 / rust #c0532b / ink #1a1714 / ochre #d99a2b
   Inline-SVG shapes use hex fills only (never var()).
   ===================================================================== */
:root{
  --cream:#efe6d2;
  --rust:#c0532b;
  --ink:#1a1714;
  --ochre:#d99a2b;
  --paper:#e6dabf;
  --maxw:1380px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{scroll-behavior:smooth;background:var(--cream)}
body{
  font-family:"Archivo",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--ink);
  background:var(--cream);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  /* subtle paper grain so flat fields do not read as digital */
  background-image:
    radial-gradient(rgba(26,23,20,.025) 1px, transparent 1.1px);
  background-size:4px 4px;
}
a{color:inherit}
::selection{background:var(--rust);color:var(--cream)}

/* ---- focus visibility ---- */
:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
a:focus-visible,button:focus-visible{outline:3px solid var(--ink);outline-offset:4px}

.wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(18px,4vw,52px)}

/* =========================  TOP BAND  ============================= */
.band{
  border-bottom:3px solid var(--ink);
  background:var(--cream);
  position:relative;z-index:6;
}
.band .wrap{
  display:flex;align-items:center;justify-content:space-between;
  gap:18px;padding-top:14px;padding-bottom:14px;
}
.brand{
  font-family:"Anton",sans-serif;letter-spacing:.06em;text-transform:uppercase;
  font-size:clamp(15px,1.5vw,19px);display:flex;align-items:center;gap:12px;
}
.brand .dot{
  width:15px;height:15px;background:var(--rust);border-radius:50%;
  display:inline-block;flex:none;
}
.nav{display:flex;gap:clamp(14px,2vw,30px);font-weight:700;
  text-transform:uppercase;font-size:12px;letter-spacing:.13em}
.nav a{text-decoration:none;padding:4px 2px;border-bottom:2px solid transparent}
.nav a:hover{border-bottom-color:var(--rust)}
@media(max-width:640px){.nav{display:none}}

/* =========================  HERO  ============================= */
.hero{
  position:relative;
  border-bottom:3px solid var(--ink);
  overflow:hidden;
}
.hero-grid{
  display:grid;
  grid-template-columns:1.06fr 1fr;
  align-items:stretch;
  min-height:calc(100vh - 56px);
  max-height:980px;
}
/* LEFT: the silhouette stage (rust field on cream) */
.stage{
  position:relative;
  background:var(--cream);
  border-right:3px solid var(--ink);
  overflow:hidden;
  display:flex;align-items:stretch;justify-content:stretch;
}
.stage svg{display:block;width:100%;height:100%}
/* RIGHT: title block */
.titlebox{
  position:relative;
  background:var(--rust);
  color:var(--cream);
  padding:clamp(26px,4vw,64px) clamp(24px,4vw,60px);
  display:flex;flex-direction:column;justify-content:center;gap:clamp(16px,2.4vw,30px);
  overflow:hidden;
}
/* a single ochre cut-shape behind the title for depth */
.titlebox .cut-deco{
  position:absolute;right:-10%;top:-14%;width:58%;z-index:0;opacity:.7;
  pointer-events:none;
}
.titlebox .inner{position:relative;z-index:1}
.kicker{
  font-family:"Archivo";font-weight:700;text-transform:uppercase;
  letter-spacing:.34em;font-size:clamp(11px,1.1vw,13px);
  color:var(--cream);opacity:.92;
  display:flex;align-items:center;gap:12px;margin:0 0 6px;
}
.kicker::before{content:"";width:34px;height:3px;background:var(--ochre);display:inline-block}
.title{
  font-family:"Anton",sans-serif;font-weight:400;
  line-height:.86;letter-spacing:.005em;text-transform:uppercase;
  font-size:clamp(54px,9.2vw,140px);
  margin:0;color:var(--cream);
}
.title .ochre{color:var(--ochre)}
.title .ink{color:var(--ink)}
.lead{
  max-width:30ch;font-size:clamp(15px,1.35vw,18px);line-height:1.5;
  font-weight:500;color:var(--cream);opacity:.95;margin:0;
}
.cta{display:flex;gap:14px;flex-wrap:wrap;margin-top:4px}
.btn{
  font-family:"Archivo";font-weight:800;text-transform:uppercase;
  letter-spacing:.1em;font-size:13px;cursor:pointer;
  padding:14px 26px;border:3px solid var(--ink);background:var(--ink);
  color:var(--cream);text-decoration:none;display:inline-flex;align-items:center;gap:10px;
  transition:transform .12s ease, background .15s ease, color .15s ease;
}
.btn:hover{transform:translate(-2px,-2px)}
.btn.alt{background:var(--cream);color:var(--ink)}
.btn.alt:hover{background:var(--ochre);border-color:var(--ink)}
.btn .arrow{transition:transform .15s ease}
.btn:hover .arrow{transform:translateX(4px)}

/* film-strip footer inside hero (credits ticker) */
.credits{
  position:absolute;left:0;bottom:0;width:100%;
  border-top:3px solid var(--ink);
  background:var(--ink);color:var(--cream);
  font-family:"Archivo";font-weight:700;text-transform:uppercase;
  letter-spacing:.22em;font-size:11px;
  overflow:hidden;white-space:nowrap;z-index:4;
}
.credits .track{
  display:inline-block;padding:9px 0;
  animation:marquee 26s linear infinite;will-change:transform;
}
.credits .track span{padding:0 26px;display:inline-block}
.credits .track .star{color:var(--ochre)}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* =========================  POSTER STRIP (below fold)  ============================= */
.strip{padding:clamp(56px,8vw,104px) 0 clamp(40px,6vw,72px)}
.sec-head{
  display:flex;align-items:flex-end;justify-content:space-between;gap:18px;
  margin-bottom:clamp(26px,4vw,44px);flex-wrap:wrap;
}
.sec-head h2{
  font-family:"Anton",sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(30px,4.4vw,58px);line-height:.92;margin:0;letter-spacing:.01em;
}
.sec-head h2 .rust{color:var(--rust)}
.sec-head p{margin:0;max-width:34ch;font-weight:500;color:#4b4239;font-size:15px;line-height:1.45}

.cards{
  display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(16px,2vw,28px);
}
.card{
  position:relative;border:3px solid var(--ink);background:var(--paper);
  overflow:hidden;min-height:340px;display:flex;flex-direction:column;
  text-decoration:none;color:var(--ink);
  transition:transform .14s ease;
}
.card:hover{transform:translateY(-5px)}
.card .pcut{position:relative;height:200px;overflow:hidden;border-bottom:3px solid var(--ink);background:var(--cream)}
.card .pcut svg{position:absolute;inset:0;width:100%;height:100%}
.card .body{padding:18px 20px 22px;display:flex;flex-direction:column;gap:8px;flex:1}
.card .num{
  font-family:"Anton",sans-serif;font-size:13px;letter-spacing:.18em;color:var(--rust);
}
.card h3{font-family:"Anton",sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(20px,2.2vw,26px);line-height:.95;margin:0}
.card p{margin:0;font-size:13.5px;line-height:1.45;color:#4b4239;font-weight:500}
.card .tag{
  margin-top:auto;font-family:"Archivo";font-weight:800;text-transform:uppercase;
  letter-spacing:.12em;font-size:11px;color:var(--ink);
  display:inline-flex;align-items:center;gap:8px;
}
.card .tag::before{content:"";width:18px;height:18px;background:var(--ochre);border:2px solid var(--ink);display:inline-block}

/* the marquee video cell (cinematic title sequence) */
.reel{
  grid-column:1 / -1;
  position:relative;border:3px solid var(--ink);background:var(--ink);
  overflow:hidden;display:grid;grid-template-columns:1.3fr 1fr;align-items:stretch;
  min-height:300px;
}
.reel .scr{position:relative;overflow:hidden;border-right:3px solid var(--ink);background:#000}
.reel video,.reel img.poster{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.reel .scr::after{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(192,83,43,.18), rgba(26,23,20,.42));
  mix-blend-mode:multiply;pointer-events:none}
.reel .txt{
  background:var(--ochre);color:var(--ink);padding:clamp(22px,3vw,40px);
  display:flex;flex-direction:column;justify-content:center;gap:14px;
}
.reel .txt h3{font-family:"Anton",sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(26px,3.6vw,46px);line-height:.9;margin:0}
.reel .txt p{margin:0;font-weight:500;line-height:1.45;font-size:14.5px;max-width:32ch}
.reel .playflag{
  display:inline-flex;align-items:center;gap:10px;font-family:"Archivo";
  font-weight:800;text-transform:uppercase;letter-spacing:.12em;font-size:12px;
}
.reel .playflag .tri{
  width:0;height:0;border-left:14px solid var(--ink);
  border-top:9px solid transparent;border-bottom:9px solid transparent;
}

/* =========================  MARK ROW  ============================= */
.marks{
  border-top:3px solid var(--ink);border-bottom:3px solid var(--ink);
  background:var(--ink);color:var(--cream);
}
.marks .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:0}
.mk{padding:clamp(26px,4vw,46px) clamp(14px,2vw,26px);text-align:center;
  border-right:3px solid var(--cream)}
.mk:last-child{border-right:0}
.mk svg{width:clamp(40px,5vw,62px);height:clamp(40px,5vw,62px);display:block;margin:0 auto 14px}
.mk .v{font-family:"Anton",sans-serif;font-size:clamp(24px,3vw,40px);line-height:.9;color:var(--ochre)}
.mk .l{font-family:"Archivo";font-weight:700;text-transform:uppercase;letter-spacing:.16em;
  font-size:11px;margin-top:8px;opacity:.85}
@media(max-width:640px){.marks .wrap{grid-template-columns:repeat(2,1fr)}
  .mk:nth-child(2){border-right:0}
  .mk:nth-child(1),.mk:nth-child(2){border-bottom:3px solid var(--cream)}}

/* =========================  CLOSING POSTER  ============================= */
.closer{position:relative;padding:clamp(64px,9vw,120px) 0;overflow:hidden;background:var(--cream)}
.closer .wrap{position:relative;z-index:2;text-align:center}
.closer .cut-bg{position:absolute;inset:0;z-index:0;pointer-events:none}
.closer .cut-bg svg{width:100%;height:100%;display:block}
.closer h2{font-family:"Anton",sans-serif;font-weight:400;text-transform:uppercase;
  font-size:clamp(40px,8vw,116px);line-height:.85;margin:0 0 18px;color:var(--ink)}
.closer h2 .rust{color:var(--rust)}
.closer p{max-width:48ch;margin:0 auto 28px;font-weight:500;font-size:clamp(15px,1.4vw,18px);
  line-height:1.5;color:#4b4239}

/* =========================  FOOTER  ============================= */
footer{border-top:3px solid var(--ink);background:var(--ink);color:var(--cream);
  font-size:12px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
footer .wrap{display:flex;justify-content:space-between;align-items:center;gap:14px;
  padding-top:22px;padding-bottom:22px;flex-wrap:wrap}
footer .dot{color:var(--ochre)}

/* =========================  MOBILE  ============================= */
@media(max-width:900px){
  .hero-grid{grid-template-columns:1fr}
  .stage{border-right:0;border-bottom:3px solid var(--ink);min-height:54vh;max-height:none}
  .titlebox{padding-bottom:clamp(34px,8vw,52px)}
}
@media(max-width:640px){
  .hero-grid{min-height:auto;max-height:none}
  /* silhouette stays dominant + fully visible (contain, no crop) */
  .stage{min-height:46vh}
  .cards{grid-template-columns:1fr}
  .reel{grid-template-columns:1fr}
  .reel .scr{min-height:210px;border-right:0;border-bottom:3px solid var(--ink)}
  .credits{font-size:9px;letter-spacing:.16em}
  .title{font-size:clamp(46px,15vw,90px)}
}

/* =========================  REDUCED MOTION  ============================= */
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  .credits .track{animation:none;transform:none}
  .btn,.card,.btn .arrow{transition:none}
  .card:hover,.btn:hover{transform:none}
  [data-rise]{opacity:1 !important;transform:none !important}
}
/* scroll-rise (disabled under reduced-motion + before JS) */
[data-rise]{opacity:0;transform:translateY(22px);transition:opacity .6s ease, transform .6s ease}
[data-rise].in{opacity:1;transform:none}
.no-js [data-rise]{opacity:1;transform:none}
</style>
</head>
<body class="no-js">
<script>document.body.classList.remove('no-js');</script>

</header>

      <circle cx="246" cy="78" r="6" fill="#1a1714"/>
    </svg>`,
    hand: `<svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet">
      <rect width="400" height="200" fill="#efe6d2"/>
      <circle cx="320" cy="60" r="44" fill="#c0532b" opacity="0.85"/>
      <path d="M120 200 L120 110 C120 96 134 96 134 110 L134 70 C134 56 148 56 148 70
               L148 64 C148 50 162 50 162 64 L162 76 C162 62 176 62 176 76 L176 92
               C176 78 190 80 192 96 L196 130 C200 110 214 112 212 134
               L206 200 Z" fill="#1a1714"/>
      <path d="M120 200 L206 200 L210 168 L116 168 Z" fill="#d99a2b"/>
    </svg>`,
    eye: `<svg viewBox="0 0 400 200" preserveAspectRatio="xMidYMid meet">
      <rect width="400" height="200" fill="#1a1714"/>
      <path d="M40 100 C120 30 280 30 360 100 C280 170 120 170 40 100 Z" fill="#efe6d2"/>
      <circle cx="200" cy="100" r="46" fill="#c0532b"/>
      <circle cx="200" cy="100" r="20" fill="#1a1714"/>
      <path d="M40 100 C120 30 280 30 360 100" fill="none" stroke="#d99a2b" stroke-width="6"/>
    </svg>`
  };

  const GLYPHS = {
    target:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="none" stroke="#d99a2b" stroke-width="6"/><circle cx="50" cy="50" r="22" fill="none" stroke="#efe6d2" stroke-width="6"/><circle cx="50" cy="50" r="6" fill="#c0532b"/></svg>`,
    triangle:`<svg viewBox="0 0 100 100"><path d="M50 12 L88 84 L12 84 Z" fill="none" stroke="#d99a2b" stroke-width="6" stroke-linejoin="round"/><circle cx="50" cy="60" r="9" fill="#c0532b"/></svg>`,
    slash:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="none" stroke="#efe6d2" stroke-width="6"/><path d="M24 76 L76 24" stroke="#c0532b" stroke-width="9" stroke-linecap="round"/></svg>`,
    circle:`<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="#c0532b"/><circle cx="50" cy="50" r="22" fill="#d99a2b"/></svg>`
  };

  /* ---- band ---- */
  $("brand").textContent = D.brand;
  $("nav").innerHTML = D.nav.map((n,i)=>`<a href="#${["work","method","reel","contact"][i]||""}">${n}</a>`).join("");

  /* ---- hero ---- */
  $("kicker").textContent = D.hero.kicker;
  $("title").innerHTML = D.hero.titleLines.map(line =>
    line.map(p=>`<span class="${p.c}">${p.t}</span>`).join(" ")
  ).join("<br>");
  $("lead").textContent = D.hero.lead;
  $("cta1").innerHTML = D.hero.primary + ' <span class="arrow">&rarr;</span>';
  $("cta2").textContent = D.hero.secondary;

  /* ---- credits marquee (duplicated for seamless loop) ---- */
  const credLine = D.hero.credits.map((c,i)=>
    `<span>${c}</span>${i<D.hero.credits.length-1?'<span class="star">&#9733;</span>':''}`
  ).join("");
  $("credits").innerHTML = (reduce ? credLine : credLine + '<span class="star">&#9733;</span>' + credLine);

  /* ---- cards ---- */
  $("cards").innerHTML = D.cards.map(c=>`
    <a class="card" href="#contact" data-rise>
      <div class="pcut">${CUTS[c.shape]||CUTS.bird}</div>
      <div class="body">
        <span class="num">${c.num}</span>
        <h3>${c.title}</h3>
        <p>${c.body}</p>
        <span class="tag">${c.tag}</span>
      </div>
    </a>`).join("") + `
    <div class="reel" id="reel" data-rise>
      <div class="scr">
        <img class="poster" id="reel-poster" src="${D.reel.poster}" alt="">
        <video id="reel-video" muted loop playsinline preload="none" poster="${D.reel.poster}">
          <source src="${D.reel.video}" type="video/mp4">
        </video>
      </div>
      <div class="txt">
        <span class="playflag"><span class="tri"></span> ${D.reel.flag}</span>
        <h3>${D.reel.title}</h3>
        <p>${D.reel.body}</p>
      </div>
    </div>`;

  /* ---- marks ---- */
  $("marks").innerHTML = D.marks.map(m=>`
    <div class="mk">
      ${GLYPHS[m.glyph]||GLYPHS.circle}
      <div class="v">${m.v}</div>
      <div class="l">${m.l}</div>
    </div>`).join("");

  /* ---- closer ---- */
  $("closer-title").innerHTML = D.closer.titleLines.map(p=>`<span class="${p.c}">${p.t}</span>`).join(" ");
  $("closer-body").textContent = D.closer.body;
  $("closer-cta").innerHTML = D.closer.primary + ' <span class="arrow">&rarr;</span>';

  /* ---- footer ---- */
  $("foot-left").textContent = D.footer.left;
  $("foot-right").textContent = D.footer.right;

  /* ---- scroll-rise reveals ---- */
  if(!reduce && "IntersectionObserver" in window){
    const io = new IntersectionObserver((es)=>{
      es.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } });
    },{threshold:0.16});
    document.querySelectorAll("[data-rise]").forEach(el=>io.observe(el));
  } else {
    document.querySelectorAll("[data-rise]").forEach(el=>el.classList.add("in"));
  }

  /* ---- in-view video: play only the single reel when visible, pause off-screen.
         Under reduced-motion the video never autoplays; poster stays. ---- */
  const vid = $("reel-video");
  const poster = $("reel-poster");
  if(vid){
    if(reduce){
      // leave poster shown, no motion
      poster.style.display = "block";
    } else if("IntersectionObserver" in window){
      const vio = new IntersectionObserver((es)=>{
        es.forEach(e=>{
          if(e.isIntersecting){
            if(!vid.dataset.loaded){ vid.load(); vid.dataset.loaded="1"; }
            const p = vid.play();
            if(p && p.then) p.then(()=>{ poster.style.display="none"; }).catch(()=>{});
          } else {
            vid.pause();
          }
        });
      },{threshold:0.4});
      vio.observe(vid);
    }
  }
})();
</script>
</body>
</html>
