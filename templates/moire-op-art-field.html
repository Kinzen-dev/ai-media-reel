<!-- TEMPLATE: Moire Field | ARCHETYPE: moire-op-art-field | REF: Bridget Riley, Victor Vasarely op-art, generative SVG line/ring fields | WHEN TO USE: hypnotic monochrome/duotone op-art hero, capture-safe static SVG, no media | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moire Field</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;800;900&family=Archivo+Expanded:wght@600;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   MOIRE FIELD - op-art interference hero
   Pure inline SVG. Two overlaid ultra-fine line grids at a
   sub-degree offset produce large slow-breathing interference
   bands (Bridget Riley register). Monochrome / duotone.
   No media. Native CSS / SVG / JS only. No GSAP, no WebGL.
   ============================================================ */
:root{
  --ground:#f4f1ea;   /* warm paper ground */
  --ink:#14110f;      /* near-black ink    */
  --accent:#d8442f;   /* single warm accent (duotone option) */
  --panel:rgba(244,241,234,.74);
  --hair:rgba(20,17,15,.16);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  background:var(--ground);
  color:var(--ink);
  font-family:'Archivo',system-ui,sans-serif;
  overflow-x:hidden;
  line-height:1.42;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}

/* ---------- STAGE ---------- */
.stage{position:relative;width:100%;min-height:100svh;overflow:hidden}
.field{position:absolute;inset:0;width:100%;height:100%;display:block}
.field svg{position:absolute;inset:0;width:100%;height:100%}
/* the moving (offset) layer */
#layerB{transform-origin:50% 50%;will-change:transform}

/* vignette + grain to seat the field in the paper ground */
.seat{position:absolute;inset:0;pointer-events:none;mix-blend-mode:multiply;
  background:radial-gradient(120% 95% at 50% 42%,transparent 38%,rgba(20,17,15,.10) 78%,rgba(20,17,15,.30) 100%);}
.glow{position:absolute;inset:0;pointer-events:none;mix-blend-mode:screen;
  background:radial-gradient(60% 50% at 50% 40%,rgba(255,250,242,.55),transparent 70%);}

/* ---------- TOP BAND ---------- */
.band{position:absolute;top:0;left:0;right:0;z-index:6;
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;padding:1.15rem clamp(1.1rem,4vw,3rem);}
.mark{display:flex;align-items:baseline;gap:.55rem;font-family:'Space Mono',monospace;
  font-size:.78rem;letter-spacing:.42em;text-transform:uppercase;}
.mark b{font-weight:700}
.dot{width:.5rem;height:.5rem;border-radius:50%;background:var(--accent);
  display:inline-block;transform:translateY(.02em);animation:pulse 3.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:translateY(.02em) scale(1)}50%{opacity:.35;transform:translateY(.02em) scale(.7)}}
.nav{display:flex;gap:1.6rem;font-family:'Space Mono',monospace;font-size:.72rem;
  letter-spacing:.26em;text-transform:uppercase;}
.nav a{position:relative;opacity:.72;transition:opacity .3s}
.nav a:hover,.nav a:focus-visible{opacity:1}
.nav a:focus-visible{outline:2px solid var(--accent);outline-offset:4px}
@media(max-width:720px){.nav{display:none}}

/* ---------- CENTERPIECE WORDMARK ---------- */
.center{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:5rem 1.2rem 3rem;pointer-events:none;}
.plate{pointer-events:auto;position:relative;
  padding:clamp(1.6rem,4vw,2.9rem) clamp(1.6rem,5vw,3.4rem);
  background:var(--panel);backdrop-filter:blur(2px) saturate(1.05);
  -webkit-backdrop-filter:blur(2px) saturate(1.05);
  border:1px solid var(--hair);
  box-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 30px 80px -40px rgba(20,17,15,.5);}
.plate::before,.plate::after{content:"";position:absolute;width:14px;height:14px;border:2px solid var(--ink)}
.plate::before{top:-1px;left:-1px;border-right:0;border-bottom:0}
.plate::after{bottom:-1px;right:-1px;border-left:0;border-top:0}
.eyebrow{font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.5em;
  text-transform:uppercase;opacity:.66;margin-bottom:1.05rem}
.eyebrow .ac{color:var(--accent)}
h1{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:900;
  font-size:clamp(2.9rem,12.5vw,9.5rem);line-height:.84;letter-spacing:-.02em;
  text-transform:uppercase;margin:0;}
h1 .row{display:block;position:relative}
h1 .stroke{color:transparent;-webkit-text-stroke:2px var(--ink);text-stroke:2px var(--ink)}
h1 .ac{color:var(--accent)}
.sub{margin-top:1.25rem;max-width:34rem;font-size:clamp(.92rem,2.4vw,1.06rem);
  line-height:1.55;opacity:.82;font-weight:500}
.meta{margin-top:1.45rem;display:flex;flex-wrap:wrap;gap:.55rem;justify-content:center}
.chip{font-family:'Space Mono',monospace;font-size:.66rem;letter-spacing:.2em;
  text-transform:uppercase;padding:.42rem .8rem;border:1px solid var(--hair);
  background:rgba(244,241,234,.5)}
.chip.fill{background:var(--ink);color:var(--ground);border-color:var(--ink)}

/* ---------- BOTTOM RAIL ---------- */
.rail{position:absolute;left:0;right:0;bottom:0;z-index:6;
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;padding:1rem clamp(1.1rem,4vw,3rem);
  font-family:'Space Mono',monospace;font-size:.68rem;letter-spacing:.22em;
  text-transform:uppercase;}
.rail .seg{display:flex;align-items:center;gap:.6rem;opacity:.7}
.rail .ln{width:clamp(36px,7vw,80px);height:1px;background:var(--ink);opacity:.4}
.scrollcue{display:flex;align-items:center;gap:.5rem;opacity:.7}
.scrollcue .ar{display:inline-block;animation:dn 2.2s ease-in-out infinite}
@keyframes dn{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
@media(max-width:560px){.rail .seg:last-child{display:none}}

/* ---------- CONTROL CLUSTER ---------- */
.controls{position:absolute;z-index:7;right:clamp(1rem,4vw,3rem);
  top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:.5rem}
.controls button{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.16em;
  text-transform:uppercase;cursor:pointer;width:2.6rem;height:2.6rem;border-radius:50%;
  background:var(--panel);border:1px solid var(--hair);color:var(--ink);
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);transition:all .25s;
  display:flex;align-items:center;justify-content:center}
.controls button:hover{background:var(--ink);color:var(--ground);transform:scale(1.06)}
.controls button:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
.controls button[aria-pressed="true"]{background:var(--accent);color:var(--ground);border-color:var(--accent)}
@media(max-width:720px){.controls{top:auto;bottom:4.2rem;transform:none;flex-direction:row}}

/* ---------- PHONE (<=640px) ----------
   Field is centered generative SVG (slice on a centered viewBox), so it
   never landscape-cover-crops to an empty corner: it letterboxes by
   symmetric clipping around the middle, the interference bands stay dead
   center. We only compact the centerpiece so more of the live field peeks
   above and below the wordmark plate at scroll=0. */
@media(max-width:640px){
  .stage{min-height:100svh}
  /* field SVG already carries preserveAspectRatio="xMidYMid slice" in markup:
     it letterboxes by clipping symmetrically around center, bands never crop
     to an empty corner. Nothing to override here. */
  .center{padding:4.2rem 1rem 3.4rem;justify-content:center}
  .plate{padding:1.5rem 1.3rem;max-width:90vw}
  .sub{max-width:30rem}
  .band{padding:.95rem 1.1rem}
  .rail{padding:.85rem 1.1rem}
  h1{font-size:clamp(2.7rem,16vw,4.6rem)}
}
@media(max-width:560px){.rail .seg:first-child .ln{display:none}}

/* ---------- SECOND SECTION (proof the template scrolls) ---------- */
.strip{position:relative;z-index:2;background:var(--ink);color:var(--ground);
  padding:clamp(3rem,8vw,6rem) clamp(1.1rem,5vw,4rem);overflow:hidden}
.strip h2{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;
  font-size:clamp(1.5rem,5vw,2.8rem);line-height:.95;letter-spacing:-.01em;
  text-transform:uppercase;max-width:18ch;margin-bottom:2.4rem}
.strip h2 .ac{color:var(--accent)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;
  background:rgba(244,241,234,.14);border:1px solid rgba(244,241,234,.14)}
.card{background:var(--ink);padding:1.8rem 1.5rem;position:relative;min-height:200px;
  display:flex;flex-direction:column;justify-content:space-between}
.card .no{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.24em;
  opacity:.55;color:var(--accent)}
.card h3{font-family:'Archivo',sans-serif;font-weight:800;font-size:1.18rem;
  text-transform:uppercase;letter-spacing:.01em;margin:1.4rem 0 .55rem;line-height:1.05}
.card p{font-size:.86rem;opacity:.66;line-height:1.5}
.card .mini{position:absolute;top:1.4rem;right:1.4rem;width:42px;height:42px;opacity:.8}
.foot{position:relative;z-index:2;background:var(--ground);color:var(--ink);
  border-top:1px solid var(--hair);padding:2rem clamp(1.1rem,5vw,4rem);
  display:flex;flex-wrap:wrap;gap:1rem;justify-content:space-between;align-items:center;
  font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase}
.foot .ac{color:var(--accent)}

/* ---------- REDUCED MOTION ---------- */
@media(prefers-reduced-motion:reduce){
  *{animation:none !important}
  html{scroll-behavior:auto}
  #layerB{transform:rotate(var(--rmAngle,0.55deg)) !important}
}
</style>
</head>
<body>

<!-- ===================================================================
     DATA - edit this single array to re-skin the whole template.
     The op-art field is generated from `field`; everything else is copy.
     =================================================================== -->
<script>
const DATA = {
  field: {
    mode: "lines",        // "lines" = striped grids, "rings" = concentric rings
    gap: 7,               // px spacing between grid lines (fine enough to moire)
    stroke: 1.4,          // line weight in px (coarse enough to survive thumbnail)
    offsetDeg: 0.55,      // rotational offset between the two grids -> band period
    inkHex: "#14110f",    // SVG stroke color must be raw hex, never var()
    accentHex: "#d8442f", // duotone accent applied to layer B
    duotone: true,        // false = pure monochrome interference
    driftDeg: 0.65,       // max extra rotation the breathing animation adds
    driftSec: 26          // seconds per slow breath cycle
  },
  brand:    { kicker: "Optical Systems", mark: "MOIRE", index: "Field 01" },
  nav:      [ {label:"Field", href:"#"}, {label:"Method", href:"#method"}, {label:"Index", href:"#method"}, {label:"Contact", href:"#foot"} ],
  hero: {
    eyebrow: "Interference Study No. 7",
    lines:   [ {t:"MOIRE", cls:""}, {t:"FIELD", cls:"stroke"} ],
    sub:     "Two ultra-fine line grids, offset by a fraction of a degree, fold into slow breathing bands. Pure inline SVG, capture safe, no images required.",
    chips:   ["Op-Art", "Duotone", "SVG only", "Reduced-motion safe"]
  },
  rail: { left: "Lat 14.35 N / Lon 100.58 E", mid: "Generative SVG", cue: "Scroll" },
  strip: {
    title: ["Bands emerge where two", {ac:"orders disagree."}],
    cards: [
      { no:"01", h:"Overlay", p:"Two identical grids stack on the same stage, one rotated by a sliver of a degree." },
      { no:"02", h:"Beat", p:"Where the lines almost align, density spikes; where they cancel, the ground shows through." },
      { no:"03", h:"Breath", p:"A slow rAF nudge to the rotation walks the bands across the field. Gated off for reduced motion." },
      { no:"04", h:"Swap", p:"Change gap, stroke and offset in the DATA array to retune the whole pattern in one place." }
    ]
  },
  foot: { left: "MOIRE / FIELD", right: "Built with native SVG. No WebGL." }
};
</script>

<!-- ===================== HERO STAGE ===================== -->
<header class="stage" id="top">
  <div class="field" id="field" aria-hidden="true"></div>
  <div class="glow"></div>
  <div class="seat"></div>

  <!-- top band -->
  <div class="band">
    <div class="mark"><span class="dot"></span><b id="b-mark">MOIRE</b><span id="b-index" style="opacity:.55">Field 01</span></div>
    <nav class="nav" id="b-nav" aria-label="Primary"></nav>
  </div>

  <!-- centerpiece -->
  <div class="center">
    <div class="plate">
      <p class="eyebrow" id="b-eyebrow">Interference Study</p>
      <h1 id="b-h1"></h1>
      <p class="sub" id="b-sub"></p>
      <div class="meta" id="b-chips"></div>
    </div>
  </div>

  <!-- control cluster -->
  <div class="controls" aria-label="Field controls">
    <button id="btn-motion" aria-pressed="true" title="Toggle breathing motion">M</button>
    <button id="btn-tone" aria-pressed="true" title="Toggle duotone / monochrome">D</button>
    <button id="btn-density" title="Cycle line density">+</button>
  </div>

  <!-- bottom rail -->
  <div class="rail">
    <div class="seg"><span id="b-rl">Lat</span><span class="ln"></span></div>
    <div class="seg" id="b-rm">Generative SVG</div>
    <a class="scrollcue" href="#method"><span id="b-cue">Scroll</span><span class="ar">v</span></a>
  </div>
</header>

<!-- ===================== METHOD STRIP ===================== -->
<section class="strip" id="method">
  <h2 id="s-title"></h2>
  <div class="cards" id="s-cards"></div>
</section>

<footer class="foot" id="foot">
  <span id="f-left">MOIRE / FIELD</span>
  <span class="ac" id="f-right">Native SVG</span>
</footer>

<script>
/* ====================================================================
   RENDER + ANIMATE
   ==================================================================== */
(function(){
  const F = DATA.field;
  const REDUCED = window.matchMedia("(prefers-reduced-motion:reduce)").matches;

  /* ---- build one grid layer as an SVG string ----
     We oversize the SVG well beyond the viewport so that rotating
     layer B never reveals an empty corner. Coordinates are in a fixed
     2000x2000 user space; CSS stretches it edge to edge. */
  const SIZE = 2200;          // user-space square, centered
  const HALF = SIZE/2;

  function buildLines(color, w, gap){
    // vertical hairlines across the full oversized square
    let p = "";
    for(let x = -HALF; x <= HALF; x += gap){
      p += `M ${x} ${-HALF} L ${x} ${HALF} `;
    }
    return `<path d="${p}" stroke="${color}" stroke-width="${w}" fill="none" vector-effect="non-scaling-stroke" shape-rendering="crispEdges"/>`;
  }

  function buildRings(color, w, gap){
    let s = "";
    for(let r = gap; r <= HALF*1.45; r += gap){
      s += `<circle cx="0" cy="0" r="${r}" stroke="${color}" stroke-width="${w}" fill="none" vector-effect="non-scaling-stroke"/>`;
    }
    return s;
  }

  function layer(id, color){
    const body = F.mode === "rings"
      ? buildRings(color, F.stroke, F.gap)
      : buildLines(color, F.stroke, F.gap);
    // viewBox centered on origin so rotation pivots at center
    return `<svg id="${id}" viewBox="${-HALF} ${-HALF} ${SIZE} ${SIZE}" preserveAspectRatio="xMidYMid slice">${body}</svg>`;
  }

  const state = {
    duotone: F.duotone,
    motion: !REDUCED,
    densityStep: 0,
    gap: F.gap
  };

  function paint(){
    const fieldEl = document.getElementById("field");
    const colorB = state.duotone ? F.accentHex : F.inkHex;
    // layer A = base ink grid, layer B = offset grid (accent if duotone)
    fieldEl.innerHTML = layer("layerA", F.inkHex) + layer("layerB", colorB);
    // set the static offset on B; rmAngle drives the reduced-motion final state
    const b = document.getElementById("layerB");
    b.style.setProperty("--rmAngle", F.offsetDeg + "deg");
    b.style.transform = `rotate(${F.offsetDeg}deg)`;
    // mix-blend so overlapping ink darkens (true interference look)
    b.style.mixBlendMode = state.duotone ? "multiply" : "normal";
    b.style.opacity = state.duotone ? "0.92" : "1";
  }

  /* density rebuild: recompute grid spacing then repaint */
  const DENSITIES = [F.gap, Math.round(F.gap*0.62), Math.round(F.gap*1.55)];
  function applyDensity(){
    F.gap = DENSITIES[state.densityStep % DENSITIES.length];
    paint();
  }

  paint();

  /* ---- slow breathing drift via rAF (gated by reduced motion) ---- */
  let raf = null, t0 = null;
  function breathe(ts){
    if(t0 === null) t0 = ts;
    const phase = ((ts - t0) / 1000) / F.driftSec * Math.PI * 2;
    const angle = F.offsetDeg + (Math.sin(phase) * F.driftDeg * 0.5 + F.driftDeg * 0.5);
    const b = document.getElementById("layerB");
    if(b) b.style.transform = `rotate(${angle.toFixed(4)}deg)`;
    raf = requestAnimationFrame(breathe);
  }
  function startMotion(){
    if(REDUCED) return;            // never override reduced-motion final state
    if(raf) return;
    t0 = null;
    raf = requestAnimationFrame(breathe);
  }
  function stopMotion(){
    if(raf){ cancelAnimationFrame(raf); raf = null; }
    const b = document.getElementById("layerB");
    if(b) b.style.transform = `rotate(${F.offsetDeg}deg)`;  // settle to static offset
  }
  if(state.motion) startMotion();

  /* pause drift when hero scrolled out of view (perf) */
  const stageEl = document.getElementById("top");
  if("IntersectionObserver" in window){
    new IntersectionObserver((es)=>{
      es.forEach(e=>{
        if(!state.motion) return;
        if(e.isIntersecting) startMotion(); else stopMotion();
      });
    }, {threshold:0.04}).observe(stageEl);
  }

  /* ---- controls ---- */
  const bM = document.getElementById("btn-motion");
  const bT = document.getElementById("btn-tone");
  const bD = document.getElementById("btn-density");
  if(REDUCED){ bM.setAttribute("aria-pressed","false"); bM.disabled = true; bM.style.opacity=".4"; }
  bM.addEventListener("click", ()=>{
    state.motion = !state.motion;
    bM.setAttribute("aria-pressed", String(state.motion));
    state.motion ? startMotion() : stopMotion();
  });
  bT.addEventListener("click", ()=>{
    state.duotone = !state.duotone;
    bT.setAttribute("aria-pressed", String(state.duotone));
    paint();
    if(state.motion){ stopMotion(); startMotion(); }
  });
  bD.addEventListener("click", ()=>{
    state.densityStep++;
    applyDensity();
    if(state.motion){ stopMotion(); startMotion(); }
  });

  /* ---- populate copy from DATA ---- */
  document.getElementById("b-mark").textContent = DATA.brand.mark;
  document.getElementById("b-index").textContent = DATA.brand.index;
  document.getElementById("b-eyebrow").innerHTML =
    DATA.hero.eyebrow.replace(/(No\.\s*\d+)/, '<span class="ac">$1</span>');
  document.getElementById("b-h1").innerHTML =
    DATA.hero.lines.map(l=>`<span class="row ${l.cls}">${l.t}</span>`).join("");
  document.getElementById("b-sub").textContent = DATA.hero.sub;
  document.getElementById("b-chips").innerHTML =
    DATA.hero.chips.map((c,i)=>`<span class="chip ${i===0?'fill':''}">${c}</span>`).join("");

  const nav = document.getElementById("b-nav");
  nav.innerHTML = DATA.nav.map(n=>`<a href="${n.href}">${n.label}</a>`).join("");

  document.getElementById("b-rl").textContent = DATA.rail.left;
  document.getElementById("b-rm").textContent = DATA.rail.mid;
  document.getElementById("b-cue").textContent = DATA.rail.cue;

  /* method strip */
  document.getElementById("s-title").innerHTML =
    DATA.strip.title.map(t=> typeof t === "string" ? t : `<span class="ac"> ${t.ac}</span>`).join(" ");
  document.getElementById("s-cards").innerHTML = DATA.strip.cards.map(c=>`
    <article class="card">
      <span class="no">${c.no}</span>
      <svg class="mini" viewBox="0 0 42 42" aria-hidden="true">
        ${miniMoire(c.no)}
      </svg>
      <div>
        <h3>${c.h}</h3>
        <p>${c.p}</p>
      </div>
    </article>`).join("");

  document.getElementById("f-left").textContent = DATA.foot.left;
  document.getElementById("f-right").textContent = DATA.foot.right;

  /* small per-card moire glyph: two tiny rotated line clusters */
  function miniMoire(seed){
    const rot = (parseInt(seed,10)||1) * 7;
    let a="",b="";
    for(let x=1;x<42;x+=3){ a+=`<line x1="${x}" y1="2" x2="${x}" y2="40" stroke="#f4f1ea" stroke-width="0.8" opacity="0.5"/>`; }
    for(let x=1;x<42;x+=3){ b+=`<line x1="${x}" y1="2" x2="${x}" y2="40" stroke="#d8442f" stroke-width="0.8" opacity="0.8"/>`; }
    return a + `<g transform="rotate(${rot} 21 21)">${b}</g>`;
  }
})();
</script>
</body>
</html>
