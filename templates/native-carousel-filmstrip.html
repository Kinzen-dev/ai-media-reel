<!-- TEMPLATE: Native Filmstrip | ARCHETYPE: filmstrip | REF: Chrome 135 CSS Carousels (::scroll-button + ::scroll-marker), scroll-snap | WHEN TO USE: zero-JS native CSS carousel of media works, full-bleed editorial slides with browser-generated prev/next + numbered dots | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Native Filmstrip - CSS Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script>
/* =====================================================================
   DATA - edit this array to swap the filmstrip contents.
   type: "image" | "video"
   src:    media path (relative to this file, in ../assets/)
   poster: required for video (shown until the card is the focused slide)
   kicker / title / meta: editorial copy for the caption band
   ===================================================================== */
const DATA = [
  {
    type: "image",
    src: "../assets/flux-car-4k.png",
    kicker: "Plate 01 / Automotive",
    title: "Wet Street, Matte Black",
    meta: "FLUX 4K still"
  },
  {
    type: "video",
    src: "../assets/kling-video.mp4",
    poster: "../assets/gen/poster-kling-video.png",
    kicker: "Plate 02 / Motion",
    title: "Kling Sequence",
    meta: "Generated video loop"
  },
  {
    type: "image",
    src: "../assets/flux-clinic-4k.png",
    kicker: "Plate 03 / Interior",
    title: "Mint and Wood Clinic",
    meta: "FLUX 4K still"
  },
  {
    type: "video",
    src: "../assets/veo-video.mp4",
    poster: "../assets/gen/poster-veo-video.png",
    kicker: "Plate 04 / Motion",
    title: "Veo Render",
    meta: "Generated video loop"
  },
  {
    type: "image",
    src: "../assets/sdxl.png",
    kicker: "Plate 05 / Painterly",
    title: "Autumn Fox",
    meta: "SDXL study"
  },
  {
    type: "video",
    src: "../assets/heygen-avatar.mp4",
    poster: "../assets/gen/poster-heygen.png",
    kicker: "Plate 06 / Avatar",
    title: "HeyGen Presenter",
    meta: "Talking avatar"
  },
  {
    type: "image",
    src: "../assets/hf-tinysd.png",
    kicker: "Plate 07 / Low-fi",
    title: "Abstract Apple",
    meta: "TinySD sketch"
  }
];
</script>
<style>
  :root {
    --ink: #15110d;
    --ink-soft: #211a13;
    --bone: #efe7da;
    --bone-dim: #cdc2b0;
    --bone-faint: #8d8270;
    --copper: #c9794a;
    --copper-bright: #e08c56;
    --line: rgba(239, 231, 218, 0.14);
    --pad: clamp(18px, 4vw, 56px);
    --slide-radius: 14px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--ink);
    color: var(--bone);
    font-family: "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    /* subtle grain-free vignette so full-bleed slides feel framed */
    background:
      radial-gradient(120% 90% at 50% -10%, #221913 0%, var(--ink) 55%);
  }

  /* ---------- compact top band (mechanic stays above the fold) ---------- */
  .topband {
    flex: 0 0 auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    padding: clamp(16px, 3vw, 30px) var(--pad) clamp(12px, 2vw, 18px);
    border-bottom: 1px solid var(--line);
  }
  .topband .lead { max-width: 60ch; }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--copper);
    margin: 0 0 8px;
    font-weight: 600;
  }
  .topband h1 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 500;
    font-size: clamp(26px, 4.4vw, 50px);
    line-height: 0.98;
    letter-spacing: -0.01em;
    margin: 0;
    color: var(--bone);
  }
  .topband h1 em {
    font-style: italic;
    color: var(--copper-bright);
  }
  .topband .note {
    flex: 0 0 auto;
    text-align: right;
    font-size: 12px;
    line-height: 1.5;
    color: var(--bone-faint);
    max-width: 24ch;
  }
  .topband .note b { color: var(--bone-dim); font-weight: 500; }

  /* ---------- the stage that holds the carousel ---------- */
  .stage {
    flex: 1 1 auto;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
    padding: clamp(14px, 2.4vw, 26px) 0 clamp(58px, 7vw, 84px);
  }

  /* =====================================================================
     NATIVE CSS CAROUSEL (Chrome 135+)
     The <ul> IS the carousel. Buttons + dots are browser-generated.
     ===================================================================== */
  .filmstrip {
    list-style: none;
    margin: 0;
    padding: 0 var(--pad);
    display: flex;
    gap: clamp(16px, 2.4vw, 34px);
    overflow-x: auto;
    overscroll-behavior-x: contain;
    scroll-snap-type: x mandatory;
    scroll-behavior: smooth;
    scroll-padding-inline: var(--pad);
    /* anchor the generated dot group below the rail */
    scroll-marker-group: after;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .filmstrip::-webkit-scrollbar { display: none; }

  .slide {
    scroll-snap-align: center;
    scroll-snap-stop: always;
    flex: 0 0 min(86vw, 1040px);
    display: flex;
    flex-direction: column;
  }

  .frame {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    border-radius: var(--slide-radius);
    overflow: hidden;
    background:
      linear-gradient(155deg, #1c150f 0%, #0f0b07 100%);
    border: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* contain: never crop a landscape asset into a portrait frame */
  .frame img,
  .frame video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
  .frame video { background: #0c0905; }

  /* poster overlay for paused videos, plus a play glyph */
  .poster {
    position: absolute;
    inset: 0;
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #0c0905;
    transition: opacity 0.45s ease;
  }
  .slide.playing .poster { opacity: 0; pointer-events: none; }
  .play {
    position: absolute;
    inset: 0;
    margin: auto;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(21, 17, 13, 0.55);
    border: 1px solid rgba(239, 231, 218, 0.4);
    backdrop-filter: blur(2px);
    display: grid;
    place-items: center;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .play::after {
    content: "";
    width: 0; height: 0;
    margin-left: 4px;
    border-left: 16px solid var(--bone);
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
  }
  .slide.playing .play { opacity: 0; transform: scale(0.7); }

  /* media-type tag, top-left of frame */
  .tag {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 2;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--ink);
    background: var(--copper);
    padding: 5px 9px;
    border-radius: 999px;
  }
  .tag.is-video { background: var(--bone); }

  /* caption band under each frame */
  .cap {
    flex: 0 0 auto;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 4px 0;
  }
  .cap .kicker {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--copper);
    font-weight: 600;
  }
  .cap h2 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 500;
    font-size: clamp(18px, 2.4vw, 27px);
    line-height: 1.05;
    margin: 6px 0 0;
    color: var(--bone);
  }
  .cap .right {
    text-align: right;
    flex: 0 0 auto;
    font-size: 12px;
    color: var(--bone-faint);
  }

  /* ----- ::scroll-button : browser-generated prev / next ----- */
  .filmstrip::scroll-button(*) {
    position: absolute;
    bottom: clamp(14px, 5vw, 22px);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1px solid rgba(239, 231, 218, 0.28);
    background: rgba(21, 17, 13, 0.6);
    color: var(--bone);
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease, color 0.25s ease;
    z-index: 5;
  }
  .filmstrip::scroll-button(left)  { content: "\2190" / "Previous slide"; left: var(--pad); }
  .filmstrip::scroll-button(right) { content: "\2192" / "Next slide";     right: var(--pad); }
  .filmstrip::scroll-button(*):hover {
    background: var(--copper);
    border-color: var(--copper);
    color: var(--ink);
  }
  .filmstrip::scroll-button(*):focus-visible {
    outline: 2px solid var(--copper-bright);
    outline-offset: 3px;
  }
  .filmstrip::scroll-button(*):active { transform: scale(0.92); }
  /* disabled at the ends */
  .filmstrip::scroll-button(*):disabled {
    opacity: 0.28;
    cursor: default;
  }

  /* ----- ::scroll-marker : browser-generated numbered dots ----- */
  .filmstrip::scroll-marker-group {
    position: absolute;
    bottom: clamp(20px, 5.5vw, 30px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 4;
  }
  .slide::scroll-marker {
    content: counter(slide-num, decimal-leading-zero);
    counter-increment: slide-num;
    width: 34px;
    height: 26px;
    display: grid;
    place-items: center;
    font-family: "Inter", sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--bone-faint);
    border: 1px solid var(--line);
    border-radius: 6px;
    background: rgba(21, 17, 13, 0.5);
    backdrop-filter: blur(4px);
    cursor: pointer;
    transition: color 0.25s ease, border-color 0.25s ease, background 0.25s ease;
  }
  .filmstrip { counter-reset: slide-num; }
  .slide::scroll-marker:hover { color: var(--bone); border-color: var(--bone-faint); }
  .slide::scroll-marker:focus-visible {
    outline: 2px solid var(--copper-bright);
    outline-offset: 2px;
  }
  /* active dot = copper */
  .slide::scroll-marker:target-current {
    color: var(--ink);
    background: var(--copper);
    border-color: var(--copper);
  }

  /* =====================================================================
     FALLBACK : browsers without CSS-carousel support.
     A plain styled scroll-snap strip still works. We expose a manual
     dot row + prev/next buttons (wired by the tiny script) so the
     scroll=0 thumbnail is never empty.
     ===================================================================== */
  .fallback-ui { display: none; }

  @supports not (selector(::scroll-marker)) {
    .fallback-ui {
      display: flex;
      position: absolute;
      left: 0; right: 0;
      bottom: clamp(16px, 5vw, 26px);
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 0 var(--pad);
      z-index: 6;
      pointer-events: none;
    }
    .fb-dots {
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }
    .fb-dot {
      width: 34px; height: 26px;
      display: grid; place-items: center;
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--bone-faint);
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(21, 17, 13, 0.5);
      cursor: pointer;
      font-family: "Inter", sans-serif;
      transition: color 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    }
    .fb-dot[aria-current="true"] {
      color: var(--ink);
      background: var(--copper);
      border-color: var(--copper);
    }
    .fb-dot:focus-visible { outline: 2px solid var(--copper-bright); outline-offset: 2px; }
    .fb-btn {
      pointer-events: auto;
      width: 46px; height: 46px;
      border-radius: 50%;
      border: 1px solid rgba(239, 231, 218, 0.28);
      background: rgba(21, 17, 13, 0.6);
      color: var(--bone);
      font-size: 17px; cursor: pointer;
      backdrop-filter: blur(6px);
      display: grid; place-items: center;
      position: absolute;
      transition: background 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }
    .fb-btn.prev { left: var(--pad); }
    .fb-btn.next { right: var(--pad); }
    .fb-btn:hover { background: var(--copper); border-color: var(--copper); color: var(--ink); }
    .fb-btn:focus-visible { outline: 2px solid var(--copper-bright); outline-offset: 3px; }
  }

  /* =====================================================================
     MOBILE (<= 640px) : letterbox, never cover-crop.
     object-fit:contain already prevents cropping; we just give the
     frame a fixed-ratio shape and stack the caption cleanly.
     ===================================================================== */
  @media (max-width: 640px) {
    .topband {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .topband .note { text-align: left; max-width: 100%; }
    .slide { flex-basis: 90vw; }
    .frame {
      flex: 0 0 auto;
      aspect-ratio: 4 / 3;       /* tall enough to letterbox 16:9 AND 1:1 */
      min-height: 0;
    }
    .stage { padding-bottom: 76px; }
    .cap { flex-direction: column; gap: 4px; padding-top: 12px; }
    .cap .right { text-align: left; }
    .filmstrip::scroll-marker-group,
    .fb-dots { gap: 7px; }
    .slide::scroll-marker, .fb-dot { width: 30px; height: 24px; }
  }

  /* very short / landscape phones: keep at least a slice of the frame visible */
  @media (max-width: 640px) and (max-height: 560px) {
    .frame { aspect-ratio: 16 / 9; }
  }

  /* =====================================================================
     REDUCED MOTION : kill smooth scroll + all transitions, show final
     state. Native carousel still works, just jumps instantly.
     ===================================================================== */
  @media (prefers-reduced-motion: reduce) {
    .filmstrip { scroll-behavior: auto; }
    * { transition: none !important; animation: none !important; }
  }

  .visually-hidden {
    position: absolute; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden;
    clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
  <header class="topband">
    <div class="lead">
      <p class="eyebrow">Native CSS Carousel / Zero JS scroller</p>
      <h1>A filmstrip the <em>browser</em> paginates itself.</h1>
    </div>
    <p class="note">
      Prev, next and the numbered dots are <b>generated by CSS</b>
      via ::scroll-button and ::scroll-marker. Scroll, swipe or use the
      controls. Snap is touch native.
    </p>
  </header>

  <main class="stage">
    <ul class="filmstrip" id="filmstrip" aria-label="Generated media works">
      <!-- slides injected from DATA -->
    </ul>

    <!-- fallback controls (only shown when CSS carousel is unsupported) -->
    <div class="fallback-ui" id="fallbackUI" aria-hidden="true">
      <button class="fb-btn prev" type="button" data-fb="prev" aria-label="Previous slide">&#8592;</button>
      <div class="fb-dots" id="fbDots" role="tablist" aria-label="Slide pagination"></div>
      <button class="fb-btn next" type="button" data-fb="next" aria-label="Next slide">&#8594;</button>
    </div>
  </main>

  <p class="visually-hidden" aria-live="polite" id="live"></p>

<script>
  const strip = document.getElementById("filmstrip");

  /* ---------- build slides from DATA ---------- */
  DATA.forEach((d, i) => {
    const li = document.createElement("li");
    li.className = "slide";
    li.dataset.index = i;

    let media;
    if (d.type === "video") {
      media = `
        <span class="tag is-video">Video</span>
        <video muted loop playsinline preload="none"
               poster="${d.poster}" src="${d.src}"></video>
        <div class="poster" style="background-image:url('${d.poster}')"></div>
        <div class="play" aria-hidden="true"></div>`;
    } else {
      media = `
        <span class="tag">Still</span>
        <img src="${d.src}" alt="${d.title}" loading="lazy" decoding="async" />`;
    }

    li.innerHTML = `
      <div class="frame">${media}</div>
      <div class="cap">
        <div>
          <div class="kicker">${d.kicker}</div>
          <h2>${d.title}</h2>
        </div>
        <div class="right">${d.meta}</div>
      </div>`;
    strip.appendChild(li);
  });

  const slides = Array.from(strip.querySelectorAll(".slide"));
  const live = document.getElementById("live");

  /* ---------- play ONLY the focused/in-view video ----------
     Several media share one stage; simultaneous decode tanks FPS.
     Show posters, play just the most-centered video.
     Reduced motion: autoplaying looping video IS motion, so we never
     auto-play; posters stay shown and the loop is fully suppressed. -- */
  const reduceMQ = matchMedia("(prefers-reduced-motion: reduce)");
  const ratios = new Map();
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => ratios.set(e.target, e.isIntersecting ? e.intersectionRatio : 0));

    // find the single best (most visible) slide
    let best = null, bestR = 0.55; // must be clearly in view
    ratios.forEach((r, el) => { if (r > bestR) { bestR = r; best = el; } });

    const reduce = reduceMQ.matches; // re-read live; honors OS toggle without reload
    slides.forEach(li => {
      const vid = li.querySelector("video");
      if (!vid) return;
      if (li === best && !reduce) {
        if (vid.paused) {
          vid.play().then(() => li.classList.add("playing")).catch(() => {});
        }
      } else if (!vid.paused) {
        vid.pause();
        li.classList.remove("playing");
      }
    });
  }, { root: strip, threshold: [0, 0.55, 0.85, 1] });

  slides.forEach(li => io.observe(li));

  // If the user enables reduced motion mid-session, pause every video at once.
  reduceMQ.addEventListener("change", (e) => {
    if (!e.matches) return;
    slides.forEach(li => {
      const vid = li.querySelector("video");
      if (vid && !vid.paused) { vid.pause(); li.classList.remove("playing"); }
    });
  });

  // announce current slide for screen readers as it snaps
  let announceT;
  strip.addEventListener("scroll", () => {
    clearTimeout(announceT);
    announceT = setTimeout(() => {
      const c = strip.getBoundingClientRect();
      const cx = c.left + c.width / 2;
      let cur = 0, dmin = Infinity;
      slides.forEach((li, i) => {
        const r = li.getBoundingClientRect();
        const d = Math.abs((r.left + r.width / 2) - cx);
        if (d < dmin) { dmin = d; cur = i; }
      });
      live.textContent = `Slide ${cur + 1} of ${slides.length}: ${DATA[cur].title}`;
      syncFallback(cur);
    }, 120);
  }, { passive: true });

  /* ---------- FALLBACK wiring (no native carousel support) ----------
     Build a real dot row + connect the prev/next buttons so the
     scroll-snap strip is fully usable and the thumbnail is populated. */
  const noNative = !(CSS.supports && CSS.supports("selector(::scroll-marker)"));
  const fbDots = document.getElementById("fbDots");
  const fallbackUI = document.getElementById("fallbackUI");

  function scrollToIndex(i) {
    const li = slides[i];
    if (!li) return;
    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    li.scrollIntoView({
      behavior: reduce ? "auto" : "smooth",
      inline: "center",
      block: "nearest"
    });
  }

  function currentIndex() {
    const c = strip.getBoundingClientRect();
    const cx = c.left + c.width / 2;
    let cur = 0, dmin = Infinity;
    slides.forEach((li, i) => {
      const r = li.getBoundingClientRect();
      const d = Math.abs((r.left + r.width / 2) - cx);
      if (d < dmin) { dmin = d; cur = i; }
    });
    return cur;
  }

  function syncFallback(cur) {
    if (!noNative) return;
    fbDots.querySelectorAll(".fb-dot").forEach((dot, i) => {
      dot.setAttribute("aria-current", i === cur ? "true" : "false");
      dot.tabIndex = i === cur ? 0 : -1;
    });
  }

  if (noNative) {
    fallbackUI.setAttribute("aria-hidden", "false");
    DATA.forEach((d, i) => {
      const dot = document.createElement("button");
      dot.type = "button";
      dot.className = "fb-dot";
      dot.setAttribute("role", "tab");
      dot.setAttribute("aria-label", `Go to slide ${i + 1}: ${d.title}`);
      dot.textContent = String(i + 1).padStart(2, "0");
      dot.addEventListener("click", () => scrollToIndex(i));
      fbDots.appendChild(dot);
    });
    fallbackUI.querySelectorAll("[data-fb]").forEach(btn => {
      btn.addEventListener("click", () => {
        const dir = btn.dataset.fb === "next" ? 1 : -1;
        const next = Math.min(slides.length - 1, Math.max(0, currentIndex() + dir));
        scrollToIndex(next);
      });
    });
    syncFallback(0);
  }
</script>
</body>
</html>
