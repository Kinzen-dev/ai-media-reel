<!-- TEMPLATE: Neo-Brutalist Backoffice | ARCHETYPE: neo-brutalist raw bordered owner dashboard | REF: neo-brutalism (Gumroad / raw web) | WHEN TO USE: clinic / SMB owner OVERVIEW dashboard with KPIs, trend chart, channel split, handoff queue | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yimwhan - ภาพรวมคลินิก</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;900&family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans+Thai:wght@500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DATA lives in the <script> at the very bottom.
   This stylesheet is the neo-brutalist system: thick black
   borders, hard offset shadows (zero blur), flat accent blocks,
   no rounded corners, chunky type.
   ============================================================ */

:root{
  --paper:#fafaf5;
  --ink:#111111;
  --blue:#2b5fff;
  --yellow:#ffd000;
  --red:#ff4438;
  --white:#ffffff;
  --b:4px;            /* border weight */
  --shadow:8px 8px 0 0 var(--ink);
  --shadow-sm:5px 5px 0 0 var(--ink);
  --shadow-press:3px 3px 0 0 var(--ink);
}

*{box-sizing:border-box;margin:0;padding:0;min-width:0;}

html{ -webkit-text-size-adjust:100%; }

body{
  font-family:'IBM Plex Sans Thai','Archivo',system-ui,sans-serif;
  background:var(--paper);
  color:var(--ink);
  line-height:1.35;
  /* subtle paper grid, brutalist drafting feel */
  background-image:
    linear-gradient(rgba(17,17,17,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(17,17,17,.04) 1px, transparent 1px);
  background-size:34px 34px;
  overflow-x:hidden;
}

.wrap{
  max-width:1320px;
  margin:0 auto;
  padding:20px 22px 56px;
}

/* ---------- TOP BAND (compact, mechanic stays above fold) ---------- */
.topband{
  display:flex;
  align-items:stretch;
  gap:16px;
  border:var(--b) solid var(--ink);
  background:var(--ink);
  color:var(--paper);
  box-shadow:var(--shadow);
  margin-bottom:22px;
  flex-wrap:wrap;
}
.brandbox{
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 20px;
  flex:1 1 360px;
  min-width:0;
}
.logo-mark{
  width:46px;height:46px;flex:0 0 46px;
  background:var(--yellow);
  border:var(--b) solid var(--paper);
  display:flex;align-items:center;justify-content:center;
  font-family:'Archivo',sans-serif;font-weight:900;font-size:26px;color:var(--ink);
  box-shadow:var(--shadow-press);
}
.brand-text{min-width:0;}
.brand-text h1{
  font-family:'Archivo',sans-serif;
  font-weight:900;
  font-size:clamp(22px,3.4vw,34px);
  letter-spacing:-.02em;
  line-height:.98;
  text-transform:uppercase;
}
.brand-text .sub{
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;color:var(--yellow);
  margin-top:5px;
}
.bandmeta{
  display:flex;align-items:stretch;
  border-left:var(--b) solid var(--paper);
  flex-wrap:wrap;
}
.bandmeta .cell{
  padding:12px 20px;
  display:flex;flex-direction:column;justify-content:center;
  border-right:var(--b) solid var(--paper);
  min-width:0;
}
.bandmeta .cell:last-child{border-right:none;}
.bandmeta .k{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9a9a9a;}
.bandmeta .v{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;white-space:nowrap;}
.live-dot{
  display:inline-block;width:11px;height:11px;background:var(--red);
  border:2px solid var(--paper);margin-right:7px;vertical-align:middle;
}
@media (prefers-reduced-motion:no-preference){
  .live-dot{animation:blip 1.4s steps(2,end) infinite;}
}
@keyframes blip{50%{opacity:.25;}}

/* ---------- KPI ROW ---------- */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
  margin-bottom:22px;
}
.kpi{
  border:var(--b) solid var(--ink);
  box-shadow:var(--shadow);
  padding:16px 16px 14px;
  position:relative;
  min-width:0;
  display:flex;flex-direction:column;
}
.kpi.k-blue{background:var(--blue);color:var(--white);}
.kpi.k-yellow{background:var(--yellow);color:var(--ink);}
.kpi.k-paper{background:var(--white);color:var(--ink);}
.kpi.k-red{background:var(--red);color:var(--white);}
.kpi .label{
  font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  display:flex;align-items:center;gap:7px;
}
.kpi .num{
  font-family:'Archivo',sans-serif;font-weight:900;
  font-size:clamp(34px,4.4vw,52px);
  line-height:.92;letter-spacing:-.03em;
  margin:10px 0 4px;
  word-break:break-word;
}
.kpi .unit{font-size:.42em;font-weight:700;letter-spacing:0;}
.kpi .delta{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;
  border:3px solid var(--ink);
  background:var(--paper);color:var(--ink);
  padding:3px 8px;
  align-self:flex-start;
  box-shadow:var(--shadow-press);
}
.kpi .delta.down{background:var(--ink);color:var(--paper);}
.kpi .delta .arrow{font-family:'Archivo',sans-serif;font-weight:900;}
.kpi .foot{font-size:11px;font-weight:600;margin-top:8px;opacity:.85;}

/* ---------- MAIN GRID (chart + split) ---------- */
.main-grid{
  display:grid;
  grid-template-columns:1.65fr 1fr;
  gap:18px;
  margin-bottom:22px;
  align-items:start;
}
.panel{
  border:var(--b) solid var(--ink);
  background:var(--white);
  box-shadow:var(--shadow);
  min-width:0;
}
.panel-head{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--ink);color:var(--paper);
  padding:11px 16px;
  border-bottom:var(--b) solid var(--ink);
  flex-wrap:wrap;
}
.panel-head h2{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:16px;
  letter-spacing:.02em;text-transform:uppercase;min-width:0;
}
.legend{display:flex;gap:14px;flex-wrap:wrap;}
.legend span{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.legend i{width:14px;height:14px;border:2px solid var(--paper);display:inline-block;}
.panel-body{padding:16px;}

/* chart panel */
.chart-wrap{width:100%;}
.chart-wrap svg{display:block;width:100%;height:auto;}
.chart-foot{
  display:flex;justify-content:space-between;gap:10px;
  margin-top:12px;border-top:3px solid var(--ink);padding-top:10px;flex-wrap:wrap;
}
.chart-foot .stat{min-width:0;}
.chart-foot .stat .t{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#555;}
.chart-foot .stat .n{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;}

/* channel split panel */
.split-body{padding:18px 16px;}
.split-row{margin-bottom:18px;}
.split-row:last-child{margin-bottom:0;}
.split-row .toprow{
  display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:7px;
}
.split-row .name{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:17px;text-transform:uppercase;letter-spacing:.02em;
  display:flex;align-items:center;gap:8px;min-width:0;
}
.split-row .name .ic{width:18px;height:18px;border:3px solid var(--ink);flex:0 0 18px;}
.split-row .pct{font-family:'Archivo',sans-serif;font-weight:900;font-size:26px;letter-spacing:-.02em;white-space:nowrap;}
.bar-track{
  height:34px;border:var(--b) solid var(--ink);background:repeating-linear-gradient(45deg,#fff 0 8px,#f0f0e8 8px 16px);
  box-shadow:var(--shadow-press);position:relative;overflow:hidden;
}
.bar-fill{
  height:100%;border-right:var(--b) solid var(--ink);
  display:flex;align-items:center;padding-left:10px;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;color:var(--ink);
  white-space:nowrap;
}
.split-row.voice .bar-fill{background:var(--blue);color:#fff;}
.split-row.line .bar-fill{background:var(--yellow);}
.split-row .vol{font-size:11px;font-weight:600;color:#555;margin-top:6px;}
@media (prefers-reduced-motion:no-preference){
  .bar-fill{width:0;animation:grow 1s cubic-bezier(.2,.9,.3,1) forwards;}
}
@keyframes grow{from{width:0;}to{width:var(--target);}}

/* ---------- HANDOFF LIST ---------- */
.handoff{margin-bottom:10px;}
.handoff .panel-head{background:var(--red);}
.handoff .panel-head h2{color:var(--white);}
.handoff .panel-head .count{
  background:var(--ink);color:var(--paper);font-family:'Space Grotesk',sans-serif;font-weight:700;
  font-size:13px;border:2px solid var(--paper);padding:3px 9px;white-space:nowrap;
}
.hf-row{
  display:grid;
  grid-template-columns:84px 1fr auto;
  gap:16px;align-items:center;
  border-bottom:var(--b) solid var(--ink);
  padding:14px 16px;
  background:var(--white);
}
.hf-row:last-child{border-bottom:none;}
.hf-row:nth-child(even){background:#f5f5ec;}
.hf-tag{
  border:3px solid var(--ink);padding:6px 4px;text-align:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;
  box-shadow:var(--shadow-press);
}
.hf-tag.voice{background:var(--blue);color:#fff;}
.hf-tag.line{background:var(--yellow);color:var(--ink);}
.hf-main{min-width:0;}
.hf-main .who{font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;letter-spacing:-.01em;}
.hf-main .why{font-size:13px;font-weight:600;color:#333;margin-top:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hf-main .meta{font-size:11px;font-weight:600;color:#777;margin-top:5px;display:flex;gap:12px;flex-wrap:wrap;}
.hf-main .pill{border:2px solid var(--ink);padding:1px 7px;text-transform:uppercase;letter-spacing:.04em;background:var(--paper);white-space:nowrap;}
.hf-main .pill.hot{background:var(--red);color:#fff;border-color:var(--ink);}
.takeover{
  font-family:'Archivo',sans-serif;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:.04em;
  background:var(--yellow);color:var(--ink);
  border:var(--b) solid var(--ink);
  box-shadow:var(--shadow-sm);
  padding:11px 16px;cursor:pointer;white-space:nowrap;
  display:inline-flex;align-items:center;gap:8px;
}
.takeover .ar{font-size:15px;}
.takeover:focus-visible{outline:4px solid var(--blue);outline-offset:3px;}
@media (prefers-reduced-motion:no-preference){
  .takeover{transition:transform .08s ease, box-shadow .08s ease;}
  .takeover:hover{transform:translate(2px,2px);box-shadow:var(--shadow-press);}
  .takeover:active{transform:translate(5px,5px);box-shadow:0 0 0 0 var(--ink);}
}
.takeover.taken{background:var(--ink);color:var(--paper);}

/* footer strip */
.footstrip{
  border:var(--b) solid var(--ink);background:var(--ink);color:var(--paper);
  box-shadow:var(--shadow);
  padding:12px 18px;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;align-items:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12px;letter-spacing:.04em;text-transform:uppercase;
}
.footstrip .ftag{background:var(--blue);color:#fff;border:2px solid var(--paper);padding:3px 9px;}

/* focus visibility everywhere */
a:focus-visible, button:focus-visible, [tabindex]:focus-visible{outline:4px solid var(--blue);outline-offset:3px;}

/* ---------- RESPONSIVE ---------- */
@media (max-width:1040px){
  .main-grid{grid-template-columns:1fr;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
}
/* Phones: this is a DATA dashboard (no cover media), so the mobile risk is not
   crop, it is the signature mechanic (KPI blocks + trend chart) dropping below
   the fold. Compact the top band + go 2-up on KPIs so the chart peeks in at
   scroll=0. No landscape cover-crop possible here (the SVG chart letterboxes
   itself via viewBox + preserveAspectRatio + height:auto). */
@media (max-width:640px){
  :root{--b:3px;--shadow:5px 5px 0 0 var(--ink);--shadow-sm:4px 4px 0 0 var(--ink);}
  .wrap{padding:12px 12px 36px;}
  .topband{flex-direction:column;margin-bottom:14px;}
  .brandbox{flex:0 0 auto;padding:11px 14px;gap:11px;}
  .logo-mark{width:40px;height:40px;flex:0 0 40px;font-size:22px;}
  .brand-text h1{font-size:22px;}
  .brand-text .sub{font-size:10px;letter-spacing:.1em;margin-top:3px;}
  .bandmeta{border-left:none;border-top:var(--b) solid var(--paper);width:100%;}
  .bandmeta .cell{flex:1 1 33%;padding:8px 14px;border-right:var(--b) solid var(--paper);}
  .bandmeta .cell:last-child{border-right:none;}
  .bandmeta .v{font-size:15px;}
  /* 2-up KPI grid keeps blocks dense + lifts the chart into the first screen */
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;}
  .kpi{padding:12px 12px 11px;}
  .kpi .num{font-size:clamp(28px,9vw,38px);margin:7px 0 4px;}
  .kpi .label{font-size:11px;}
  .kpi .foot{font-size:10px;margin-top:6px;}
  .main-grid{gap:14px;margin-bottom:16px;}
  .hf-row{grid-template-columns:1fr;gap:12px;}
  .hf-tag{justify-self:start;padding:5px 14px;}
  .takeover{width:100%;justify-content:center;}
  .hf-main .why{white-space:normal;}
}
/* very narrow phones: fall back to a single KPI column so numbers never clip */
@media (max-width:360px){
  .kpi-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<main class="wrap">

  <!-- ===== TOP BAND ===== -->
  <header class="topband">
    <div class="brandbox">
      <div class="logo-mark">ย</div>
      <div class="brand-text">
        <h1>YIMWHAN OPS</h1>
        <div class="sub">ภาพรวมเจ้าของคลินิก / OWNER OVERVIEW</div>
      </div>
    </div>
    <div class="bandmeta">
      <div class="cell">
        <span class="k">สถานะ AI</span>
        <span class="v"><span class="live-dot"></span>ทำงานอยู่</span>
      </div>
      <div class="cell">
        <span class="k">ช่วงเวลา</span>
        <span class="v" id="rangeLabel">7 วันล่าสุด</span>
      </div>
      <div class="cell">
        <span class="k">อัปเดตล่าสุด</span>
        <span class="v" id="updatedLabel">09:42</span>
      </div>
    </div>
  </header>

  <!-- ===== KPI GRID ===== -->
  <section class="kpi-grid" id="kpiGrid" aria-label="ตัวชี้วัดหลัก"></section>

  <!-- ===== CHART + CHANNEL SPLIT ===== -->
  <section class="main-grid">

    <!-- TREND CHART -->
    <div class="panel">
      <div class="panel-head">
        <h2>สายโทร & การจอง / 7 วัน</h2>
        <div class="legend">
          <span><i style="background:#2b5fff"></i>สายโทร</span>
          <span><i style="background:#ffd000"></i>การจอง</span>
        </div>
      </div>
      <div class="panel-body">
        <div class="chart-wrap" id="chartWrap" role="img" aria-label="กราฟแนวโน้มสายโทรและการจอง 7 วันล่าสุด"></div>
        <div class="chart-foot" id="chartFoot"></div>
      </div>
    </div>

    <!-- CHANNEL SPLIT -->
    <div class="panel">
      <div class="panel-head">
        <h2>ช่องทาง / VOICE vs LINE</h2>
      </div>
      <div class="split-body" id="splitBody"></div>
    </div>

  </section>

  <!-- ===== HANDOFF LIST ===== -->
  <section class="panel handoff">
    <div class="panel-head">
      <h2>ต้องดูหน่อย / NEEDS A LOOK</h2>
      <span class="count" id="hfCount">0 รายการ</span>
    </div>
    <div id="handoffList"></div>
  </section>

  <!-- ===== FOOTER ===== -->
  <footer class="footstrip">
    <span><span class="ftag">YIMWHAN</span> Clinic AI Concierge - น้องยิ้มหวาน</span>
    <span id="footMeta">ข้อมูลสาธิต - swap the DATA array</span>
  </footer>

</main>

<script>
/* ============================================================
   DATA  -  edit here to repurpose this dashboard.
   All numbers are demo. THB currency. Thai labels OK.
   ============================================================ */
const DATA = {
  meta: {
    range: "7 วันล่าสุด",
    updated: "09:42",
    footer: "ข้อมูลสาธิต - แก้ DATA array ด้านบนเพื่อใช้งานจริง"
  },

  // each KPI block gets a different flat accent color
  kpis: [
    { label:"สายโทรเข้า",      accent:"blue",  num:"1,284", unit:"สาย",  delta:"+18%", dir:"up",   foot:"vs สัปดาห์ก่อน 1,088 สาย" },
    { label:"นัดที่จองสำเร็จ",  accent:"yellow",num:"342",   unit:"นัด",  delta:"+9%",  dir:"up",   foot:"อัตราจองจากสาย 26.6%" },
    { label:"รายได้คาดการณ์",   accent:"paper", num:"487K",  unit:"THB",  delta:"+12%", dir:"up",   foot:"เฉลี่ย 1,424 บาท/นัด" },
    { label:"สายที่ AI วางสาย",  accent:"red",   num:"7.4%",  unit:"",     delta:"+1.3pt",dir:"down", foot:"95 สายจาก 1,284 - ดูสาเหตุ" }
  ],

  // trend: 7 days, calls + bookings
  chart: {
    days:     ["จ","อ","พ","พฤ","ศ","ส","อา"],
    calls:    [148, 172, 165, 201, 224, 218, 156],
    bookings: [38,  44,  41,  52,  61,  58,  48]
  },

  // voice vs line channel split (percentages should read together)
  channels: [
    { key:"voice", name:"VOICE / โทรศัพท์", pct:64, volume:"822 บทสนทนา", color:"#2b5fff" },
    { key:"line",  name:"LINE / แชต",       pct:36, volume:"462 บทสนทนา", color:"#ffd000" }
  ],

  // handoff queue: AI flagged for human owner / staff
  handoff: [
    { ch:"voice", who:"คุณสมหญิง ว.",  why:"ขอเลื่อนนัดจัดฟันเป็นด่วน วันนี้ AI จองไม่ได้", wait:"รอ 4 นาที",  flag:"ด่วน",  hot:true  },
    { ch:"line",  who:"K. Patcharin",   why:"ถามราคารากฟันเทียม + เคสประกัน ต้องยืนยันโดยคน", wait:"รอ 11 นาที", flag:"ราคา",  hot:false },
    { ch:"voice", who:"คุณธนภัทร ก.",   why:"ร้องเรียนหลังหัตถการ ขออารมณ์ลูกค้าระวัง",       wait:"รอ 2 นาที",  flag:"ดูแล",  hot:true  },
    { ch:"line",  who:"คุณนภา ส.",      why:"เลข LINE ไม่ตรงเบอร์ในระบบ ขอยืนยันตัวตน",        wait:"รอ 19 นาที", flag:"ตรวจสอบ",hot:false }
  ]
};

/* ============================================================
   RENDER
   ============================================================ */
(function render(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // --- meta
  document.getElementById('rangeLabel').textContent = DATA.meta.range;
  document.getElementById('updatedLabel').textContent = DATA.meta.updated;
  document.getElementById('footMeta').textContent = DATA.meta.footer;

  // --- KPIs
  const kg = document.getElementById('kpiGrid');
  kg.innerHTML = DATA.kpis.map(k=>{
    const down = k.dir === 'down';
    const arrow = down ? '&#9660;' : '&#9650;';
    return `<div class="kpi k-${k.accent}">
      <div class="label">${k.label}</div>
      <div class="num">${k.num}${k.unit ? `<span class="unit"> ${k.unit}</span>` : ''}</div>
      <div class="delta ${down?'down':''}"><span class="arrow">${arrow}</span>${k.delta}</div>
      <div class="foot">${k.foot}</div>
    </div>`;
  }).join('');

  // --- CHART (inline SVG, literal hex per brief, no var())
  buildChart(reduce);

  // --- CHANNEL SPLIT
  const sb = document.getElementById('splitBody');
  sb.innerHTML = DATA.channels.map(c=>{
    return `<div class="split-row ${c.key}">
      <div class="toprow">
        <div class="name"><span class="ic" style="background:${c.color}"></span>${c.name}</div>
        <div class="pct">${c.pct}%</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="${reduce ? `width:${c.pct}%` : `--target:${c.pct}%;width:${c.pct}%`}">${c.pct}%</div>
      </div>
      <div class="vol">${c.volume}</div>
    </div>`;
  }).join('');

  // --- HANDOFF
  const hl = document.getElementById('handoffList');
  hl.innerHTML = DATA.handoff.map((h,i)=>{
    const chLabel = h.ch === 'voice' ? 'VOICE' : 'LINE';
    return `<div class="hf-row">
      <div class="hf-tag ${h.ch}">${chLabel}</div>
      <div class="hf-main">
        <div class="who">${h.who}</div>
        <div class="why">${h.why}</div>
        <div class="meta">
          <span class="pill ${h.hot?'hot':''}">${h.flag}</span>
          <span>${h.wait}</span>
        </div>
      </div>
      <button class="takeover" data-i="${i}" aria-label="รับเคส ${h.who}"><span class="ar">&#9656;</span> TAKE OVER</button>
    </div>`;
  }).join('');
  document.getElementById('hfCount').textContent = DATA.handoff.length + ' รายการ';

  // take-over interaction (visual only in demo)
  hl.querySelectorAll('.takeover').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      btn.classList.add('taken');
      btn.innerHTML = '&#10003; รับแล้ว';
    });
  });
})();

function buildChart(reduce){
  const W = 720, H = 320;
  const padL = 44, padR = 18, padT = 22, padB = 36;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const d = DATA.chart;
  const n = d.days.length;

  const maxCalls = Math.max(...d.calls);
  const maxBook  = Math.max(...d.bookings);
  const yMax = Math.ceil(Math.max(maxCalls, maxBook) / 50) * 50; // shared axis, round to 50

  const x = i => padL + (innerW * (i/(n-1)));
  const y = v => padT + innerH - (innerH * (v/yMax));

  // gridlines
  let grid = '';
  const steps = 4;
  for(let s=0;s<=steps;s++){
    const val = Math.round(yMax * s/steps);
    const yy = y(val);
    grid += `<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W-padR}" y2="${yy.toFixed(1)}" stroke="#111111" stroke-width="${s===0?2:1}" stroke-dasharray="${s===0?'':'2 5'}" opacity="${s===0?1:0.45}"/>`;
    grid += `<text x="${padL-8}" y="${(yy+4).toFixed(1)}" font-family="'Space Grotesk',sans-serif" font-size="12" font-weight="700" fill="#111111" text-anchor="end">${val}</text>`;
  }

  // x labels
  let xlab = '';
  d.days.forEach((day,i)=>{
    xlab += `<text x="${x(i).toFixed(1)}" y="${H-12}" font-family="'Space Grotesk',sans-serif" font-size="13" font-weight="700" fill="#111111" text-anchor="middle">${day}</text>`;
  });

  // calls: bold blue line with hard nodes
  const callsPts = d.calls.map((v,i)=>`${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
  const callsLine = `<polyline points="${callsPts}" fill="none" stroke="#2b5fff" stroke-width="5" stroke-linejoin="miter" stroke-linecap="square"/>`;
  let callNodes = '';
  d.calls.forEach((v,i)=>{
    callNodes += `<rect x="${(x(i)-6).toFixed(1)}" y="${(y(v)-6).toFixed(1)}" width="12" height="12" fill="#2b5fff" stroke="#111111" stroke-width="3"/>`;
  });

  // bookings: yellow bars (thick black border), behind line
  let bars = '';
  const bw = Math.min(26, innerW/n * 0.42);
  d.bookings.forEach((v,i)=>{
    const bx = x(i) - bw/2;
    const by = y(v);
    const bh = (padT + innerH) - by;
    bars += `<rect x="${bx.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="#ffd000" stroke="#111111" stroke-width="3"/>`;
  });

  const anim = reduce ? '' : `
    <style>
      @keyframes drawln{from{stroke-dashoffset:2000;}to{stroke-dashoffset:0;}}
      .calls-anim{stroke-dasharray:2000;animation:drawln 1.1s ease forwards;}
    </style>`;
  const callsClass = reduce ? '' : 'class="calls-anim"';

  const svg = `
  <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    ${anim}
    <rect x="1" y="1" width="${W-2}" height="${H-2}" fill="#ffffff" stroke="none"/>
    ${grid}
    ${bars}
    <polyline ${callsClass} points="${callsPts}" fill="none" stroke="#2b5fff" stroke-width="5" stroke-linejoin="miter" stroke-linecap="square"/>
    ${callNodes}
    ${xlab}
  </svg>`;
  document.getElementById('chartWrap').innerHTML = svg;

  // chart footer summary stats
  const totalCalls = d.calls.reduce((a,b)=>a+b,0);
  const totalBook  = d.bookings.reduce((a,b)=>a+b,0);
  const peakIdx = d.calls.indexOf(maxCalls);
  document.getElementById('chartFoot').innerHTML = `
    <div class="stat"><div class="t">สายรวม 7 วัน</div><div class="n">${totalCalls.toLocaleString()}</div></div>
    <div class="stat"><div class="t">จองรวม 7 วัน</div><div class="n">${totalBook}</div></div>
    <div class="stat"><div class="t">วันพีค</div><div class="n">${d.days[peakIdx]} / ${maxCalls}</div></div>
    <div class="stat"><div class="t">อัตราจอง</div><div class="n">${Math.round(totalBook/totalCalls*100)}%</div></div>`;
}
</script>
</body>
