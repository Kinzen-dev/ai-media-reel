<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yimwhan - ภาพรวมเจ้าของคลินิก (Soft UI)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   YIMWHAN SOFT OWNER OVERVIEW - neumorphism / soft UI
   ONE monochrome ground (#e6e7ee). Every surface is the SAME
   color extruded by a DUAL soft shadow: a light highlight at
   top-left (#ffffff) + a soft dark shadow at bottom-right
   (#b9bac6) so tiles read as RAISED out of the ground; inset
   panels invert the pair so they read as PRESSED IN.
   ONE muted accent = indigo #5b6ccf, reserved for the hero
   figure / active state only. Ink is slate (#41445c) kept at
   adequate contrast (neumorphism's classic faint-text trap is
   avoided on purpose). Manrope + IBM Plex Sans Thai. Hand-built
   inline-SVG trend + donut. No flat card grid, no colored fills.
   ============================================================ */

:root{
  --ground:#e6e7ee;          /* the single soft ground */
  --ground-deep:#dfe0e9;     /* faint pressed valley */
  --ink:#41445c;             /* primary slate ink (legible) */
  --ink-soft:#6c6f86;        /* secondary ink (still >= 4.5:1) */
  --ink-faint:#8a8da2;       /* tertiary, used only on big areas */
  --accent:#5b6ccf;          /* THE one muted indigo accent */
  --accent-deep:#48579f;
  --up:#3f7a63;              /* muted positive (delta up) */
  --down:#a8584f;            /* muted negative (delta down) */

  /* the dual soft shadow pair (raised) */
  --lt:#ffffff;              /* top-left highlight */
  --dk:#b9bac6;              /* bottom-right shadow */

  --r-lg:26px;
  --r-md:18px;
  --r-sm:13px;

  /* RAISED extrusion: light TL + dark BR */
  --raise:-7px -7px 16px var(--lt), 8px 8px 18px var(--dk);
  --raise-sm:-4px -4px 9px var(--lt), 5px 5px 11px var(--dk);
  /* PRESSED / inset valley */
  --inset:inset -5px -5px 11px var(--lt), inset 6px 6px 13px var(--dk);
  --inset-sm:inset -3px -3px 6px var(--lt), inset 4px 4px 8px var(--dk);
}

*{box-sizing:border-box;}
*,*::before,*::after{min-width:0;}
html,body{margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  background:var(--ground);
  color:var(--ink);
  font-family:"Manrope","IBM Plex Sans Thai",system-ui,sans-serif;
  font-weight:500;
  line-height:1.5;
  letter-spacing:.1px;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
:lang(th),.th{font-family:"IBM Plex Sans Thai","Manrope",system-ui,sans-serif;}

/* faint vignette so the ground has gentle depth, never a card grid */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(1200px 700px at 16% -8%, #eef0f6 0%, rgba(238,240,246,0) 60%),
    radial-gradient(1100px 800px at 108% 120%, #d8d9e3 0%, rgba(216,217,227,0) 55%);
}

.wrap{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:30px 26px 56px;}

/* ---------- focus visibility ---------- */
a:focus-visible,button:focus-visible,[tabindex]:focus-visible{
  outline:3px solid var(--accent);
  outline-offset:3px;
  border-radius:8px;
}

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar{
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  margin-bottom:22px;
}
.brand{display:flex;align-items:center;gap:14px;min-width:0;}
.brand-badge{
  width:52px;height:52px;border-radius:16px;flex:0 0 auto;
  background:var(--ground);box-shadow:var(--raise-sm);
  display:grid;place-items:center;overflow:hidden;
}
.brand-badge img{width:100%;height:100%;object-fit:cover;display:block;border-radius:14px;}
.brand-txt{min-width:0;}
.brand-txt h1{
  margin:0;font-size:18px;font-weight:800;letter-spacing:.2px;color:var(--ink);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.brand-txt p{margin:2px 0 0;font-size:12.5px;color:var(--ink-soft);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.topbar-spacer{flex:1 1 auto;}

/* segmented soft control (range) */
.seg{
  display:inline-flex;padding:5px;border-radius:16px;gap:4px;
  background:var(--ground);box-shadow:var(--inset-sm);
}
.seg button{
  appearance:none;border:0;cursor:pointer;font:inherit;font-weight:700;
  font-size:12.5px;color:var(--ink-soft);
  padding:7px 13px;border-radius:12px;background:transparent;
  transition:color .18s, box-shadow .22s, background .22s;
}
.seg button[aria-pressed="true"]{
  color:var(--accent-deep);background:var(--ground);box-shadow:var(--raise-sm);
}

/* round soft icon buttons */
.iconbtn{
  appearance:none;border:0;cursor:pointer;flex:0 0 auto;
  width:46px;height:46px;border-radius:14px;background:var(--ground);
  box-shadow:var(--raise-sm);color:var(--ink-soft);
  display:grid;place-items:center;transition:box-shadow .18s, color .18s;
}
.iconbtn:hover{color:var(--accent);}
.iconbtn:active{box-shadow:var(--inset-sm);}
.iconbtn svg{width:20px;height:20px;display:block;}

/* live status pill (pressed pad) */
.status{
  display:inline-flex;align-items:center;gap:9px;flex:0 0 auto;
  padding:10px 15px;border-radius:14px;background:var(--ground);
  box-shadow:var(--inset-sm);font-size:12.5px;font-weight:700;color:var(--ink);
}
.dot{width:9px;height:9px;border-radius:50%;background:var(--up);flex:0 0 auto;
  box-shadow:0 0 0 3px rgba(63,122,99,.16);}

/* ============================================================
   PRIMARY GRID (desktop-first)
   ============================================================ */
.grid{
  display:grid;gap:22px;
  grid-template-columns:repeat(4,minmax(0,1fr));
  align-items:start;
}

/* KPI tiles - raised soft pads */
.kpi{
  background:var(--ground);border-radius:var(--r-lg);box-shadow:var(--raise);
  padding:20px 20px 18px;min-width:0;
  transition:box-shadow .25s ease;
}
.kpi:hover{box-shadow:-9px -9px 20px var(--lt), 10px 10px 22px var(--dk);}
.kpi-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;min-width:0;}
.kpi-ico{
  width:40px;height:40px;border-radius:13px;flex:0 0 auto;
  background:var(--ground);box-shadow:var(--inset-sm);
  display:grid;place-items:center;color:var(--ink-soft);
}
.kpi-ico svg{width:19px;height:19px;display:block;}
.kpi-label{font-size:12.5px;font-weight:700;color:var(--ink-soft);
  letter-spacing:.2px;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kpi-val{
  font-size:34px;font-weight:800;letter-spacing:-.5px;color:var(--ink);
  line-height:1.05;display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;
}
.kpi-val .unit{font-size:14px;font-weight:700;color:var(--ink-soft);letter-spacing:0;}
.kpi.hero .kpi-val{color:var(--accent);}     /* THE one accent figure */
.kpi-delta{
  display:inline-flex;align-items:center;gap:6px;margin-top:11px;
  font-size:12.5px;font-weight:700;
  padding:6px 11px;border-radius:11px;background:var(--ground);box-shadow:var(--inset-sm);
}
.kpi-delta.up{color:var(--up);} .kpi-delta.down{color:var(--down);}
.kpi-delta svg{width:13px;height:13px;display:block;}
.kpi-delta .sub{color:var(--ink-faint);font-weight:600;}

/* span helpers */
.col-2{grid-column:span 2;} .col-4{grid-column:span 4;}

/* big inset trend panel = PRESSED valley */
.panel{
  background:var(--ground);border-radius:var(--r-lg);box-shadow:var(--raise);
  padding:22px;min-width:0;
}
.panel-head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;margin-bottom:6px;}
.panel-head .t{min-width:0;}
.panel-head h2{margin:0;font-size:16px;font-weight:800;color:var(--ink);letter-spacing:.1px;}
.panel-head p{margin:3px 0 0;font-size:12.5px;color:var(--ink-soft);font-weight:600;}
.panel-head .spacer{flex:1 1 auto;}

.legend{display:inline-flex;gap:7px;flex-wrap:wrap;}
.lg{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;
  color:var(--ink-soft);padding:6px 11px;border-radius:11px;background:var(--ground);box-shadow:var(--inset-sm);}
.lg i{width:11px;height:11px;border-radius:4px;flex:0 0 auto;display:block;}

/* the recessed chart well */
.chart-well{
  margin-top:16px;border-radius:20px;padding:18px 14px 10px;
  background:var(--ground-deep);box-shadow:var(--inset);
}
.chart-well svg{display:block;width:100%;height:auto;}

/* donut block */
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
.donut-stage{position:relative;width:188px;max-width:100%;}
.donut-stage svg{display:block;width:100%;height:auto;}
.donut-center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;pointer-events:none;
}
.donut-center .big{font-size:30px;font-weight:800;color:var(--ink);letter-spacing:-.5px;line-height:1;}
.donut-center .sm{font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-top:4px;}
.donut-keys{display:flex;flex-direction:column;gap:10px;width:100%;}
.dkey{
  display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:14px;
  background:var(--ground);box-shadow:var(--raise-sm);min-width:0;
}
.dkey i{width:13px;height:13px;border-radius:5px;flex:0 0 auto;display:block;}
.dkey .nm{font-size:13px;font-weight:700;color:var(--ink);min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dkey .vv{margin-left:auto;font-size:13px;font-weight:800;color:var(--ink);flex:0 0 auto;}
.dkey .pp{font-size:11px;font-weight:700;color:var(--ink-soft);flex:0 0 auto;}

/* ============================================================
   HANDOFF LIST - soft tiles ("needs a look")
   ============================================================ */
.handoff-head{display:flex;align-items:center;gap:13px;flex-wrap:wrap;margin-bottom:4px;}
.handoff-head h2{margin:0;font-size:16px;font-weight:800;color:var(--ink);}
.count-pad{
  display:inline-grid;place-items:center;min-width:30px;height:26px;padding:0 9px;
  border-radius:9px;background:var(--ground);box-shadow:var(--inset-sm);
  font-size:12.5px;font-weight:800;color:var(--accent-deep);
}
.handoff-head .spacer{flex:1 1 auto;}
.tiny-note{font-size:12px;font-weight:600;color:var(--ink-soft);}

.handoff-list{display:flex;flex-direction:column;gap:14px;margin-top:16px;}
.hitem{
  display:flex;align-items:center;gap:15px;min-width:0;
  background:var(--ground);border-radius:var(--r-md);box-shadow:var(--raise-sm);
  padding:14px 16px;transition:box-shadow .2s ease;
}
.hitem:hover{box-shadow:-6px -6px 14px var(--lt), 7px 7px 16px var(--dk);}
.h-av{
  width:46px;height:46px;border-radius:14px;flex:0 0 auto;
  background:var(--ground);box-shadow:var(--inset-sm);
  display:grid;place-items:center;color:var(--ink-soft);font-weight:800;font-size:14px;
}
.h-av.ch-voice{color:var(--accent-deep);}
.h-main{min-width:0;flex:1 1 auto;}
.h-top{display:flex;align-items:center;gap:9px;min-width:0;flex-wrap:wrap;}
.h-name{font-size:14px;font-weight:800;color:var(--ink);min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.chip{
  font-size:10.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;
  padding:4px 9px;border-radius:8px;background:var(--ground);box-shadow:var(--inset-sm);
  color:var(--ink-soft);flex:0 0 auto;
}
.chip.voice{color:var(--accent-deep);}
.h-reason{
  margin:5px 0 0;font-size:12.5px;color:var(--ink-soft);font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;
}
.h-meta{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:0 0 auto;}
.h-time{font-size:11.5px;font-weight:700;color:var(--ink-faint);white-space:nowrap;}
.urg{
  font-size:10.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase;
  padding:4px 9px;border-radius:8px;background:var(--ground);box-shadow:var(--inset-sm);white-space:nowrap;
}
.urg.high{color:var(--down);} .urg.med{color:#9a7a3f;} .urg.low{color:var(--up);}
.h-go{
  appearance:none;border:0;cursor:pointer;flex:0 0 auto;
  width:42px;height:42px;border-radius:13px;background:var(--ground);
  box-shadow:var(--raise-sm);color:var(--accent);display:grid;place-items:center;
  transition:box-shadow .16s, color .16s;
}
.h-go:hover{color:var(--accent-deep);}
.h-go:active{box-shadow:var(--inset-sm);}
.h-go svg{width:18px;height:18px;display:block;}

/* footer micro-row of soft toggles */
.foot{
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:30px;
  padding:18px 20px;border-radius:var(--r-md);background:var(--ground);box-shadow:var(--inset-sm);
}
.foot .lbl{font-size:12.5px;font-weight:700;color:var(--ink);min-width:0;}
.foot .spacer{flex:1 1 auto;}
.toggle{display:inline-flex;align-items:center;gap:10px;font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
.tg{
  appearance:none;border:0;cursor:pointer;width:50px;height:28px;border-radius:15px;flex:0 0 auto;
  background:var(--ground);box-shadow:var(--inset-sm);position:relative;transition:box-shadow .2s;
}
.tg::after{
  content:"";position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;
  background:var(--ground);box-shadow:var(--raise-sm);transition:transform .22s ease, background .2s;
}
.tg[aria-pressed="true"]::after{transform:translateX(22px);background:var(--accent);
  box-shadow:-2px -2px 5px rgba(255,255,255,.6), 2px 2px 6px rgba(72,87,159,.5);}
.tg[aria-pressed="true"]+.tg-txt{color:var(--accent-deep);}

.section-gap{margin-top:22px;}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:1080px){
  .grid{grid-template-columns:repeat(2,minmax(0,1fr));}
  .col-2{grid-column:span 2;} .col-4{grid-column:span 2;}
}
@media (max-width:640px){
  .wrap{padding:20px 15px 44px;}
  .grid{grid-template-columns:1fr;gap:16px;}
  .col-2,.col-4{grid-column:span 1;}
  .kpi-val{font-size:30px;}
  .topbar{gap:12px;}
  .topbar-spacer{display:none;}
  .seg{order:3;width:100%;justify-content:space-between;}
  .seg button{flex:1 1 auto;text-align:center;}
  .panel-head .legend{width:100%;}
  .donut-stage{width:160px;}
  .h-meta{display:none;}              /* keep phone row clean, no overflow */
  .h-reason{white-space:normal;}
  .foot{flex-direction:column;align-items:flex-start;gap:14px;}
}

@media (prefers-reduced-motion:reduce){
  *{transition:none !important;animation:none !important;}
}
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ TOP BAR ============ -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-badge">
        <img src="../assets/flux-clinic-4k.png" alt="โลโก้คลินิก" loading="eager" decoding="async" />
      </div>
      <div class="brand-txt">
        <h1 id="clinicName">ยิ้มหวาน คลินิกทันตกรรม</h1>
        <p>ภาพรวมเจ้าของคลินิก - ผู้ช่วย AI</p>
      </div>
    </div>

    <span class="topbar-spacer"></span>

    <div class="status">
      <span class="dot" aria-hidden="true"></span>
      <span>AI ออนไลน์</span>
    </div>

    <div class="seg" role="group" aria-label="ช่วงเวลา">
      <button type="button" data-range="7" aria-pressed="false">7 วัน</button>
      <button type="button" data-range="30" aria-pressed="true">30 วัน</button>
      <button type="button" data-range="90" aria-pressed="false">90 วัน</button>
    </div>

    <button class="iconbtn" type="button" aria-label="รีเฟรชข้อมูล" id="refreshBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 4v5h-5"/>
      </svg>
    </button>
  </header>

  <!-- ============ KPI ROW ============ -->
  <section class="grid" aria-label="ตัวชี้วัดหลัก">
    <!-- tiles injected by JS from DATA.kpis -->
  </section>

  <!-- ============ TREND + DONUT ROW ============ -->
  <section class="grid section-gap" aria-label="แนวโน้มและช่องทาง">

    <!-- inset trend panel -->
    <div class="panel col-2" style="grid-column:span 2;">
      <div class="panel-head">
        <div class="t">
          <h2>สายโทรเข้า และ การจอง</h2>
          <p id="trendSub">30 วันล่าสุด - รวมทุกช่องทาง</p>
        </div>
        <span class="spacer"></span>
        <div class="legend">
          <span class="lg"><i style="background:#5b6ccf"></i> สายเข้า</span>
          <span class="lg"><i style="background:#9aa0bf"></i> การจอง</span>
        </div>
      </div>
      <div class="chart-well">
        <svg id="trendSvg" viewBox="0 0 720 280" preserveAspectRatio="none" role="img" aria-label="กราฟแนวโน้มสายเข้าและการจอง 30 วัน"></svg>
      </div>
    </div>

    <!-- neumorphic donut: Voice vs LINE -->
    <div class="panel col-2" style="grid-column:span 2;">
      <div class="panel-head">
        <div class="t">
          <h2>ช่องทางที่ลูกค้าทักเข้ามา</h2>
          <p>สัดส่วน Voice เทียบ LINE</p>
        </div>
      </div>
      <div class="donut-wrap" style="margin-top:16px;">
        <div class="donut-stage">
          <svg id="donutSvg" viewBox="0 0 200 200" role="img" aria-label="โดนัทแสดงสัดส่วนช่องทาง Voice และ LINE"></svg>
          <div class="donut-center">
            <span class="big" id="donutTotal">0</span>
            <span class="sm">บทสนทนา</span>
          </div>
        </div>
        <div class="donut-keys" id="donutKeys"></div>
      </div>
    </div>
  </section>

  <!-- ============ HANDOFF LIST ============ -->
  <section class="panel section-gap" aria-label="รายการที่ต้องดูเพิ่ม" style="margin-top:22px;">
    <div class="handoff-head">
      <h2>ต้องให้คนช่วยดู</h2>
      <span class="count-pad" id="handoffCount">0</span>
      <span class="spacer"></span>
      <span class="tiny-note">AI ส่งต่อให้ทีมเมื่อต้องตัดสินใจ</span>
    </div>
    <div class="handoff-list" id="handoffList"></div>

    <div class="foot">
      <span class="lbl">การแจ้งเตือน</span>
      <span class="spacer"></span>
      <label class="toggle">
        <button class="tg" type="button" role="switch" aria-pressed="true" aria-label="แจ้งเตือนเคสด่วน"></button>
        <span class="tg-txt">เคสด่วน</span>
      </label>
      <label class="toggle">
        <button class="tg" type="button" role="switch" aria-pressed="false" aria-label="สรุปรายวัน"></button>
        <span class="tg-txt">สรุปรายวันทาง LINE</span>
      </label>
    </div>
  </section>

</div>

<script>
/* ============================================================
   DATA  - swap these to repurpose the whole dashboard.
   Numbers are illustrative (Yimwhan clinic-AI owner overview).
   ============================================================ */
const DATA = {
  clinic: "ยิ้มหวาน คลินิกทันตกรรม",
  range:  "30 วัน",

  kpis: [
    { key:"calls",    label:"สายที่ AI รับ",   value:"1,284", unit:"สาย",  delta:+18.4, sub:"เทียบเดือนก่อน", icon:"phone", hero:false },
    { key:"bookings", label:"นัดที่จองสำเร็จ", value:"612",  unit:"นัด",  delta:+24.1, sub:"เทียบเดือนก่อน", icon:"calendar", hero:false },
    { key:"revenue",  label:"มูลค่านัดโดยประมาณ", value:"1.84", unit:"ลบ. THB", delta:+12.7, sub:"เทียบเดือนก่อน", icon:"baht", hero:true },
    { key:"handoff",  label:"ส่งต่อให้ทีม",     value:"5.2",  unit:"%",   delta:-2.3, sub:"ลดลง ดีขึ้น",   icon:"flag", hero:false }
  ],

function svg(inner,extra){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"'+(extra||'')+'>'+inner+'</svg>';}
function up(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 15l6-6 6 6"/></svg>';}
function down(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>';}

/* ============================================================
   RENDER: KPI tiles
   ============================================================ */
function renderKpis(){
  const grid = document.querySelector('.grid');
  grid.innerHTML = DATA.kpis.map(k=>{
    const dpos = k.delta >= 0;
    const dCls = (k.key==='handoff') ? (dpos?'down':'up') : (dpos?'up':'down'); // lower handoff is good
    const arrow = dpos ? up() : down();
    const dval = (dpos?'+':'') + k.delta.toFixed(1) + '%';
    return `
      <div class="kpi${k.hero?' hero':''}" tabindex="0" aria-label="${k.label} ${k.value} ${k.unit}">
        <div class="kpi-head">
          <span class="kpi-ico">${svg(ICONS[k.icon]||ICONS.phone)}</span>
          <span class="kpi-label">${k.label}</span>
        </div>
        <div class="kpi-val">${k.value}<span class="unit">${k.unit}</span></div>
        <span class="kpi-delta ${dCls}">${arrow}${dval}<span class="sub">${k.sub}</span></span>
      </div>`;
  }).join('');
}

/* ============================================================
   RENDER: dual-line trend in the recessed well
   smooth catmull-rom -> bezier; soft fill under accent line
   ============================================================ */
function path(points){
  if(!points.length) return "";
  let d = "M"+points[0][0].toFixed(1)+" "+points[0][1].toFixed(1);
  for(let i=0;i<points.length-1;i++){
    const p0=points[i-1]||points[i], p1=points[i], p2=points[i+1], p3=points[i+2]||p2;
    const c1x=p1[0]+(p2[0]-p0[0])/6, c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6, c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=" C"+c1x.toFixed(1)+" "+c1y.toFixed(1)+" "+c2x.toFixed(1)+" "+c2y.toFixed(1)+" "+p2[0].toFixed(1)+" "+p2[1].toFixed(1);
  }
  return d;
}
function renderTrend(){
  const W=720,H=280,padL=10,padR=10,padT=18,padB=22;
  const calls=DATA.trend.calls, books=DATA.trend.bookings;
  const n=calls.length;
  const maxV=Math.max(...calls,...books)*1.12;
  const x=i=> padL + i*(W-padL-padR)/(n-1);
  const y=v=> H-padB - (v/maxV)*(H-padT-padB);
  const cp=calls.map((v,i)=>[x(i),y(v)]);
  const bp=books.map((v,i)=>[x(i),y(v)]);

  // baseline grid (faint) - 4 soft lines
  let grid="";
  for(let g=1;g<=4;g++){
    const gy = padT + g*(H-padT-padB)/5;
    grid += `<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W-padR}" y2="${gy.toFixed(1)}" stroke="#d3d4df" stroke-width="1" stroke-dasharray="2 7"/>`;
  }

  const cPath=path(cp), bPath=path(bp);
  const area = cPath + " L"+x(n-1).toFixed(1)+" "+(H-padB)+" L"+x(0).toFixed(1)+" "+(H-padB)+" Z";

  // last-point markers
  const lastC=cp[n-1], lastB=bp[n-1];

  document.getElementById('trendSvg').innerHTML = `
    <defs>
      <linearGradient id="callFill" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#5b6ccf" stop-opacity="0.22"/>
        <stop offset="1" stop-color="#5b6ccf" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${grid}
    <path d="${area}" fill="url(#callFill)"/>
    <path d="${bPath}" fill="none" stroke="#9aa0bf" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${cPath}" fill="none" stroke="#5b6ccf" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${lastB[0].toFixed(1)}" cy="${lastB[1].toFixed(1)}" r="5.5" fill="#e6e7ee" stroke="#9aa0bf" stroke-width="3"/>
    <circle cx="${lastC[0].toFixed(1)}" cy="${lastC[1].toFixed(1)}" r="6.5" fill="#e6e7ee" stroke="#5b6ccf" stroke-width="3.6"/>
  `;
}

/* ============================================================
   RENDER: neumorphic donut (Voice vs LINE)
   raised ring track + accent/slate arcs
   ============================================================ */
function arc(cx,cy,r,a0,a1){
  const p0=[cx+r*Math.cos(a0), cy+r*Math.sin(a0)];
  const p1=[cx+r*Math.cos(a1), cy+r*Math.sin(a1)];
  const large = (a1-a0) > Math.PI ? 1 : 0;
  return `M ${p0[0].toFixed(2)} ${p0[1].toFixed(2)} A ${r} ${r} 0 ${large} 1 ${p1[0].toFixed(2)} ${p1[1].toFixed(2)}`;
}
function renderDonut(){
  const cx=100,cy=100,r=72,sw=22;
  const total=DATA.channels.reduce((s,c)=>s+c.value,0);
  let a=-Math.PI/2;
  const gap=0.045;
  let arcs="";
  DATA.channels.forEach(c=>{
    const frac=c.value/total;
    const a0=a+gap/2, a1=a+frac*Math.PI*2-gap/2;
    arcs += `<path d="${arc(cx,cy,r,a0,a1)}" fill="none" stroke="${c.color}" stroke-width="${sw}" stroke-linecap="round"/>`;
    a += frac*Math.PI*2;
  });
  document.getElementById('donutSvg').innerHTML = `
    <!-- recessed track ring -->
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#d6d7e1" stroke-width="${sw+8}"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#eff0f6" stroke-width="2" opacity="0.7"/>
    ${arcs}
  `;
  document.getElementById('donutTotal').textContent = total.toLocaleString('en-US');

  const keys=document.getElementById('donutKeys');
  keys.innerHTML = DATA.channels.slice().reverse().map(c=>{
    const pct=Math.round(c.value/total*100);
    return `<div class="dkey">
      <i style="background:${c.color}"></i>
      <span class="nm">${c.name}</span>
      <span class="vv">${c.value.toLocaleString('en-US')}</span>
      <span class="pp">${pct}%</span>
    </div>`;
  }).join('');
}

/* ============================================================
   INTERACTIONS (soft, light; honor reduced-motion automatically
   via CSS - these are state-only toggles, no heavy rAF)
   ============================================================ */
function wire(){
  // range segmented control
  document.querySelectorAll('.seg button').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.seg button').forEach(x=>x.setAttribute('aria-pressed','false'));
      b.setAttribute('aria-pressed','true');
      const r=b.dataset.range;
      document.getElementById('trendSub').textContent = r+' วันล่าสุด - รวมทุกช่องทาง';
    });
  });
  // toggles
  document.querySelectorAll('.tg').forEach(t=>{
    t.addEventListener('click',()=>{
      t.setAttribute('aria-pressed', t.getAttribute('aria-pressed')==='true'?'false':'true');
    });
  });
  // refresh = subtle pressed feedback only
  const rb=document.getElementById('refreshBtn');
  rb.addEventListener('click',()=>{
    if(window.matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    rb.firstElementChild && (rb.firstElementChild.style.transform='rotate(360deg)');
    rb.firstElementChild && (rb.firstElementChild.style.transition='transform .6s ease');
    setTimeout(()=>{ if(rb.firstElementChild){rb.firstElementChild.style.transform='';} },650);
  });
}

renderKpis();
renderTrend();
renderDonut();
renderHandoff();
wire();
</script>
