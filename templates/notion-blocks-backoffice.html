<!-- TEMPLATE: Notion Blocks Backoffice | ARCHETYPE: notion-blocks-backoffice | REF: Notion block-editor doc | WHEN TO USE: calm owner/admin overview dashboard styled as a Notion page (callouts, inline-database KPI cards, toggle lists, embedded chart, to-do handoff list) | SWAP: edit the DATA object at top -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ภาพรวมคลินิก - Yimwhan AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   DATA-DRIVEN NOTION BLOCK DOCUMENT
   All content lives in the JS DATA object at the bottom <script>.
   This stylesheet only defines the calm Notion block look.
   ============================================================ */

:root {
  --ink: #37352f;          /* Notion ink text */
  --ink-soft: #787066;     /* secondary text */
  --ink-faint: #9b9588;    /* tertiary / captions */
  --rule: #ebe9e4;         /* hairline rules / dividers */
  --rule-strong: #e3e0d8;
  --paper: #ffffff;        /* page background */
  --shell: #f7f6f3;        /* app shell behind the page */
  --accent: #2383e2;       /* Notion blue accent */
  --accent-soft: #e7f1fb;

  /* soft block tints */
  --tint-gray:  #f1f1ef;
  --tint-blue:  #e7f0f9;
  --tint-green: #e9f3ec;
  --tint-amber: #faf2e3;
  --tint-red:   #fbeceb;
  --tint-purple:#f2eef9;

  --tint-gray-ink:  #5b574e;
  --tint-blue-ink:  #295b85;
  --tint-green-ink: #3a6b48;
  --tint-amber-ink: #8a6d2f;
  --tint-red-ink:   #9b4a45;

  --radius: 6px;
  --radius-lg: 10px;
  --doc-max: 880px;
  --sidebar-w: 248px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: "Inter", "Noto Sans Thai", system-ui, -apple-system, "Segoe UI", sans-serif;
  background: var(--shell);
  color: var(--ink);
  line-height: 1.65;
  font-size: 16px;
  letter-spacing: 0.005em;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

/* ---- App shell: slim sidebar + doc column ---- */
.app {
  display: flex;
  min-height: 100vh;
  width: 100%;
  min-width: 0;
}

/* ---- Sidebar ---- */
.sidebar {
  width: var(--sidebar-w);
  flex: 0 0 var(--sidebar-w);
  min-width: 0;
  background: var(--shell);
  border-right: 1px solid var(--rule);
  padding: 14px 8px 24px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sb-workspace {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--radius);
  margin-bottom: 12px;
}
.sb-avatar {
  width: 22px; height: 22px;
  flex: 0 0 22px;
  border-radius: 5px;
  background: var(--accent);
  color: #fff;
  display: grid; place-items: center;
  font-size: 13px; font-weight: 700;
}
.sb-name {
  font-weight: 600; font-size: 14px;
  color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.sb-name small { display: block; font-weight: 400; font-size: 11px; color: var(--ink-faint); }
.sb-section {
  font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
  color: var(--ink-faint);
  text-transform: uppercase;
  padding: 14px 10px 4px;
}
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 10px;
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--ink-soft);
  cursor: default;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.sb-item .emo { width: 18px; flex: 0 0 18px; text-align: center; font-size: 14px; }
.sb-item .lbl { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.sb-item.active { background: var(--rule); color: var(--ink); font-weight: 500; }
.sb-item:hover { background: var(--rule); color: var(--ink); }
.sb-count { margin-left: auto; font-size: 11px; color: var(--ink-faint); padding-left: 6px; }

/* ---- Doc column ---- */
.docwrap {
  flex: 1 1 auto;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: var(--paper);
}
.topbar {
  width: 100%;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 22px;
  border-bottom: 1px solid var(--rule);
  font-size: 13px; color: var(--ink-soft);
  position: sticky; top: 0; z-index: 5;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(6px);
  min-width: 0;
}
.crumb { display: flex; align-items: center; gap: 6px; min-width: 0; overflow: hidden; }
.crumb span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
.crumb .sep { color: var(--ink-faint); flex: 0 0 auto; }
.topbar .spacer { flex: 1 1 auto; }
.topbar .tb-btn {
  padding: 4px 10px; border-radius: var(--radius);
  font-size: 13px; color: var(--ink-soft); border: 1px solid var(--rule);
  background: #fff; white-space: nowrap; flex: 0 0 auto;
}
.topbar .tb-btn.share { background: var(--accent); color: #fff; border-color: var(--accent); }

.doc {
  width: 100%;
  max-width: var(--doc-max);
  padding: 8px 28px 120px;
  min-width: 0;
}

/* ---- Cover + page header ----
   Slim Notion-style cover banner. Kept short on purpose so the page opens
   on the title + callout + KPI database row, not on a tall photo. */
.cover {
  height: 68px;
  margin: 6px -28px 0;
  border-radius: 0;
  overflow: hidden;
  position: relative;
}
.cover img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 58%;
  display: block;
}
.cover::after {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.45) 100%);
}
.page-icon {
  font-size: 44px;
  line-height: 1;
  margin: -30px 0 2px;
  position: relative; z-index: 2;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.12));
}
h1.page-title {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.018em;
  margin: 0 0 2px;
  color: var(--ink);
  line-height: 1.18;
  word-break: break-word;
}
.page-sub {
  font-size: 14.5px;
  color: var(--ink-soft);
  margin: 0 0 2px;
  max-width: 64ch;
}
.page-meta {
  display: flex; flex-wrap: wrap; gap: 4px 16px;
  font-size: 12.5px; color: var(--ink-faint);
  padding: 4px 0 0;
}
.page-meta .pm {
  display: flex; align-items: center; gap: 6px; min-width: 0;
}
.page-meta .pm b { font-weight: 500; color: var(--ink-soft); }

/* ---- generic block spacing ---- */
.block { margin: 14px 0; min-width: 0; }
.h2 {
  font-size: 21px; font-weight: 600; letter-spacing: -0.01em;
  margin: 26px 0 6px; color: var(--ink);
  display: flex; align-items: center; gap: 8px;
}
/* The KPI inline-database header sits right under the callouts so the
   numbers peek into the first screen, not buried under a tall hero. */
.h2.db-h2 { margin-top: 12px; }
.h2 .he { font-size: 18px; }
.lead {
  color: var(--ink-soft); font-size: 15px; margin: 2px 0 10px;
  max-width: 64ch;
}

/* ---- Callout block ---- */
.callout {
  display: flex; gap: 12px;
  padding: 11px 14px;
  border-radius: var(--radius-lg);
  background: var(--tint-gray);
  margin: 12px 0;
  align-items: flex-start;
  min-width: 0;
}
.callout .c-emo { font-size: 20px; line-height: 1.4; flex: 0 0 auto; }
.callout .c-body { min-width: 0; }
.callout .c-title { font-weight: 600; font-size: 14.5px; margin: 0 0 2px; }
.callout .c-text { font-size: 14px; color: var(--ink-soft); margin: 0; }
.callout.blue  { background: var(--tint-blue);  }
.callout.blue  .c-title { color: var(--tint-blue-ink); }
.callout.green { background: var(--tint-green); }
.callout.green .c-title { color: var(--tint-green-ink); }
.callout.amber { background: var(--tint-amber); }
.callout.amber .c-title { color: var(--tint-amber-ink); }
.callout.red   { background: var(--tint-red);   }
.callout.red   .c-title { color: var(--tint-red-ink); }

.callout-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 10px 0 6px;
}

/* ---- Inline database / property row of KPI cards ---- */
.db-head {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--ink-faint);
  padding: 2px 2px 8px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 11px;
}
.db-head .db-tab {
  display: flex; align-items: center; gap: 6px;
  color: var(--ink); font-weight: 500;
  border-bottom: 2px solid var(--ink);
  padding-bottom: 8px; margin-bottom: -11px;
}
.db-head .db-tab.dim { color: var(--ink-faint); border-color: transparent; font-weight: 400; }
.db-head .spacer { flex: 1 1 auto; }
.db-head .db-prop { display: flex; align-items: center; gap: 5px; }

.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 4px 0 6px;
}
.kpi {
  border: 1px solid var(--rule-strong);
  border-radius: var(--radius-lg);
  padding: 14px 14px 13px;
  background: #fff;
  min-width: 0;
  transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
}
.kpi:hover {
  border-color: #d4d0c6;
  box-shadow: 0 1px 0 rgba(15,15,15,0.04), 0 6px 18px rgba(15,15,15,0.05);
  transform: translateY(-1px);
}
.kpi .k-prop {
  display: flex; align-items: center; gap: 6px;
  font-size: 12.5px; color: var(--ink-faint);
  margin-bottom: 9px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  min-width: 0;
}
.kpi .k-prop .ke { font-size: 13px; flex: 0 0 auto; }
.kpi .k-prop .kl { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.kpi .k-val {
  font-size: 27px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--ink); line-height: 1.1;
  font-variant-numeric: tabular-nums;
  word-break: break-word;
}
.kpi .k-val small { font-size: 14px; font-weight: 600; color: var(--ink-soft); margin-left: 3px; }
.kpi .k-foot {
  display: flex; align-items: center; gap: 7px;
  margin-top: 9px; font-size: 12.5px; min-width: 0;
}
.delta {
  display: inline-flex; align-items: center; gap: 3px;
  font-weight: 600; font-size: 12px;
  padding: 1px 7px 1px 5px;
  border-radius: 20px;
  flex: 0 0 auto;
}
.delta.up   { color: var(--tint-green-ink); background: var(--tint-green); }
.delta.down { color: var(--tint-red-ink);   background: var(--tint-red);   }
.delta.flat { color: var(--tint-gray-ink);  background: var(--tint-gray);  }
.k-foot .k-since { color: var(--ink-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }

/* ---- Two-column block region (chart + split) ---- */
.cols {
  display: grid;
  grid-template-columns: 1.55fr 1fr;
  gap: 18px;
  margin: 6px 0;
  align-items: stretch;
}
.embed {
  border: 1px solid var(--rule-strong);
  border-radius: var(--radius-lg);
  background: #fff;
  padding: 16px 16px 12px;
  min-width: 0;
}
.embed-head {
  display: flex; align-items: baseline; gap: 8px;
  margin-bottom: 4px; min-width: 0; flex-wrap: wrap;
}
.embed-head .et { font-size: 14.5px; font-weight: 600; color: var(--ink); }
.embed-head .es { font-size: 12.5px; color: var(--ink-faint); }
.embed-head .spacer { flex: 1 1 auto; }
.embed-head .legend { display: flex; gap: 12px; font-size: 12px; color: var(--ink-soft); flex-wrap: wrap; }
.embed-head .legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px; vertical-align: -1px; }

.chart-svg { width: 100%; height: auto; display: block; margin-top: 6px; }

/* Voice vs LINE split */
.split-card { display: flex; flex-direction: column; }
.split-ring { display: flex; align-items: center; gap: 16px; margin: 10px 0 6px; }
.split-ring svg { flex: 0 0 auto; }
.split-legend { min-width: 0; flex: 1 1 auto; }
.split-legend .sl {
  display: flex; align-items: center; gap: 8px;
  font-size: 13.5px; padding: 4px 0; min-width: 0;
}
.split-legend .sl .dot { width: 11px; height: 11px; border-radius: 3px; flex: 0 0 auto; }
.split-legend .sl .nm { color: var(--ink-soft); min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.split-legend .sl .pc { margin-left: auto; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; flex: 0 0 auto; }
.split-foot { font-size: 12.5px; color: var(--ink-faint); margin-top: auto; padding-top: 8px; border-top: 1px solid var(--rule); }

/* ---- Toggle list ---- */
.toggle {
  border-bottom: 1px solid var(--rule);
  min-width: 0;
}
.toggle > summary {
  list-style: none;
  cursor: pointer;
  display: flex; align-items: center; gap: 9px;
  padding: 11px 4px;
  font-size: 15px; font-weight: 500; color: var(--ink);
  min-width: 0;
}
.toggle > summary::-webkit-details-marker { display: none; }
.toggle > summary .tri {
  flex: 0 0 auto;
  width: 18px; height: 18px;
  display: grid; place-items: center;
  color: var(--ink-faint);
  transition: transform .18s ease;
  font-size: 11px;
}
.toggle[open] > summary .tri { transform: rotate(90deg); }
.toggle > summary .tt { min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.toggle > summary .tcount {
  margin-left: auto; font-size: 12px; color: var(--ink-faint);
  background: var(--tint-gray); padding: 1px 9px; border-radius: 20px; flex: 0 0 auto;
}
.toggle-body { padding: 0 4px 14px 31px; }
.tl-row {
  display: flex; align-items: baseline; gap: 10px;
  padding: 5px 0; font-size: 14px; color: var(--ink-soft);
  border-bottom: 1px dashed var(--rule);
  min-width: 0;
}
.tl-row:last-child { border-bottom: none; }
.tl-row .tk { color: var(--ink); font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
.tl-row .tv { margin-left: auto; font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 600; flex: 0 0 auto; }
.tl-row .tnote { color: var(--ink-faint); font-size: 12.5px; flex: 0 0 auto; }

/* ---- Divider ---- */
.divider {
  border: none; border-top: 1px solid var(--rule-strong);
  margin: 30px 0;
}

/* ---- To-do / handoff blocks ---- */
.todo {
  display: flex; align-items: flex-start; gap: 11px;
  padding: 9px 4px;
  border-radius: var(--radius);
  min-width: 0;
}
.todo:hover { background: #faf9f6; }
.todo .box {
  flex: 0 0 auto;
  width: 18px; height: 18px;
  margin-top: 2px;
  border: 1.5px solid #c5c0b5;
  border-radius: 4px;
  background: #fff;
  display: grid; place-items: center;
  cursor: pointer;
  transition: background .12s ease, border-color .12s ease;
}
.todo .box svg { width: 12px; height: 12px; opacity: 0; transition: opacity .12s ease; }
.todo.done .box { background: var(--accent); border-color: var(--accent); }
.todo.done .box svg { opacity: 1; }
.todo .t-main { min-width: 0; flex: 1 1 auto; }
.todo .t-line {
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; min-width: 0;
}
.todo .t-text { font-size: 14.5px; color: var(--ink); min-width: 0; }
.todo.done .t-text { color: var(--ink-faint); text-decoration: line-through; }
.todo .t-sub { font-size: 12.5px; color: var(--ink-faint); margin-top: 2px; }
.tag {
  font-size: 11px; font-weight: 600; letter-spacing: 0.01em;
  padding: 1px 8px; border-radius: 4px; flex: 0 0 auto;
  white-space: nowrap;
}
.tag.voice  { background: var(--tint-purple); color: #6a4ba0; }
.tag.line   { background: var(--tint-green);  color: var(--tint-green-ink); }
.tag.urgent { background: var(--tint-red);    color: var(--tint-red-ink); }
.tag.wait   { background: var(--tint-amber);  color: var(--tint-amber-ink); }
.t-time { font-size: 12px; color: var(--ink-faint); flex: 0 0 auto; margin-left: auto; white-space: nowrap; }

.add-block {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 4px; margin-top: 4px;
  font-size: 14px; color: var(--ink-faint);
  cursor: default;
}
.add-block .plus {
  width: 18px; height: 18px; border-radius: 4px;
  display: grid; place-items: center; font-size: 15px; flex: 0 0 auto;
}

.page-foot {
  margin-top: 40px; padding-top: 14px;
  border-top: 1px solid var(--rule);
  font-size: 12.5px; color: var(--ink-faint);
  display: flex; flex-wrap: wrap; gap: 6px 16px;
}

/* mobile menu toggle (hidden on desktop) */
.menu-btn { display: none; }

/* ============================================================
   RESPONSIVE  (stack to single column, no overflow at 390)
   ============================================================ */
@media (max-width: 1080px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .cols { grid-template-columns: 1fr; }
}
@media (max-width: 860px) {
  :root { --sidebar-w: 0px; }
  .sidebar {
    position: fixed; left: 0; top: 0; z-index: 40;
    width: 80vw; max-width: 300px; flex-basis: auto;
    transform: translateX(-102%);
    transition: transform .22s ease;
    box-shadow: 0 0 0 100vw rgba(0,0,0,0); /* overlay set via .open */
    background: var(--shell);
  }
  body.nav-open .sidebar { transform: translateX(0); box-shadow: 0 0 0 100vw rgba(15,15,15,0.32); }
  .menu-btn {
    display: inline-grid; place-items: center;
    width: 30px; height: 30px; border-radius: var(--radius);
    border: 1px solid var(--rule); background: #fff;
    flex: 0 0 auto; color: var(--ink-soft);
  }
  .doc { padding: 8px 18px 110px; }
  .cover { margin: 6px -18px 0; }
  h1.page-title { font-size: 28px; }
  .page-icon { font-size: 42px; margin-top: -28px; }
}
/* Phones: cover stays a slim fixed-height letterbox band so the landscape
   image is never full-bleed cover-cropped or stretched on a narrow screen,
   and so the title + callout + first KPI card reach the first screen. */
@media (max-width: 640px) {
  .cover { height: 60px; }
  .cover img { object-fit: cover; object-position: center 55%; }
}
@media (max-width: 560px) {
  body { font-size: 15px; }
  .callout-row { grid-template-columns: 1fr; }
  .kpi-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .kpi .k-val { font-size: 23px; }
  .topbar { padding: 9px 14px; gap: 8px; }
  .topbar .tb-btn:not(.share) { display: none; }
  .doc { padding: 6px 14px 96px; }
  .cover { margin: 8px -14px 0; height: 56px; }
  h1.page-title { font-size: 24px; }
  .h2 { font-size: 18px; }
  .toggle-body { padding-left: 22px; }
  .t-time { margin-left: 0; }
}
@media (max-width: 400px) {
  .kpi-grid { grid-template-columns: 1fr; }
  .page-meta { gap: 6px 12px; }
}

/* ---- Motion / accessibility ---- */
:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 4px;
}
@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
  .draw { stroke-dasharray: none !important; stroke-dashoffset: 0 !important; }
}
@media (prefers-reduced-motion: no-preference) {
  .draw { stroke-dasharray: var(--len); stroke-dashoffset: var(--len); animation: draw 1.1s ease-out 0.15s forwards; }
  .rise { opacity: 0; transform: translateY(6px); animation: rise .5s ease-out forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes rise { to { opacity: 1; transform: none; } }
}
</style>
</head>
<body>
<div class="app">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar" id="sidebar" aria-label="แถบนำทาง">
    <div class="sb-workspace">
      <div class="sb-avatar">Y</div>
      <div class="sb-name">Yimwhan AI<small>คลินิกยิ้มหวาน</small></div>
    </div>
    <nav id="navMount"></nav>
  </aside>

  <!-- ===================== DOC COLUMN ===================== -->
  <div class="docwrap">

    <header class="topbar">
      <button class="menu-btn" id="menuBtn" aria-label="เปิดเมนู" aria-expanded="false">
        <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M2 4h12M2 8h12M2 12h12" stroke="#787066" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
      <div class="crumb">
        <span>คลินิก</span><span class="sep">/</span><span id="crumbTitle">ภาพรวมรายวัน</span>
      </div>

/* ============================================================================
   CHART BUILDERS  -  inline SVG, hardcoded hex (never var()), accessible.
   ============================================================================ */
function buildChart(c) {
  const W = 520, H = 210, padL = 30, padR = 12, padT = 12, padB = 26;
  const iw = W - padL - padR, ih = H - padT - padB;
  const n = c.hours.length;
  const maxV = Math.max(...c.calls, ...c.bookings) * 1.15;
  const xAt = i => padL + (n === 1 ? iw / 2 : (i / (n - 1)) * iw);
  const yAt = v => padT + ih - (v / maxV) * ih;
  const barW = Math.max(6, (iw / n) * 0.46);

  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("class", "chart-svg");
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  svg.setAttribute("role", "img");
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");
  svg.setAttribute("aria-label", `${c.title}. ${c.peak.note}`);

  let out = "";
  // gridlines + y labels
  for (let g = 0; g <= 3; g++) {
    const gv = (maxV / 3) * g;
    const gy = yAt(gv);
    out += `<line x1="${padL}" y1="${gy.toFixed(1)}" x2="${W - padR}" y2="${gy.toFixed(1)}" stroke="#ebe9e4" stroke-width="1"/>`;
    out += `<text x="${padL - 6}" y="${(gy + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="#9b9588">${Math.round(gv)}</text>`;
  }

  // booking bars (green)
  c.bookings.forEach((v, i) => {
    const x = xAt(i) - barW / 2;
    const y = yAt(v);
    const h = (padT + ih) - y;
    out += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(0, h).toFixed(1)}" rx="2" fill="#3a9b6e" opacity="0.82"/>`;
  });

  // x labels
  c.hours.forEach((hr, i) => {
    out += `<text x="${xAt(i).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="9" fill="#9b9588">${esc(hr)}</text>`;
  });

  // calls area + line (blue)
  let linePts = c.calls.map((v, i) => `${xAt(i).toFixed(1)},${yAt(v).toFixed(1)}`);
  const areaPath = `M${xAt(0).toFixed(1)},${(padT + ih).toFixed(1)} L` + linePts.join(" L") + ` L${xAt(n - 1).toFixed(1)},${(padT + ih).toFixed(1)} Z`;
  out += `<path d="${areaPath}" fill="#2383e2" opacity="0.08"/>`;
  const linePath = `M` + linePts.join(" L");
  // measured length for the draw animation
  out += `<path d="${linePath}" fill="none" stroke="#2383e2" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round" class="draw" id="callsLine"/>`;
  // dots
  c.calls.forEach((v, i) => {
    out += `<circle cx="${xAt(i).toFixed(1)}" cy="${yAt(v).toFixed(1)}" r="2.6" fill="#ffffff" stroke="#2383e2" stroke-width="1.6"/>`;
  });

  // peak marker
  const peakIdx = c.calls.indexOf(Math.max(...c.calls));
  if (peakIdx >= 0) {
    const px = xAt(peakIdx), py = yAt(c.calls[peakIdx]);
    out += `<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="4" fill="#2383e2"/>`;
    const lblX = Math.min(Math.max(px, padL + 30), W - padR - 56);
    out += `<rect x="${(lblX - 30).toFixed(1)}" y="${(py - 28).toFixed(1)}" width="60" height="17" rx="4" fill="#37352f"/>`;
    out += `<text x="${lblX.toFixed(1)}" y="${(py - 16).toFixed(1)}" text-anchor="middle" font-size="9" fill="#ffffff">${esc(c.peak.hour)}</text>`;
  }

  svg.innerHTML = out;

  // set draw length for stroke animation (only matters with motion allowed)
  requestAnimationFrame(() => {
    const ln = svg.querySelector("#callsLine");
    if (ln && ln.getTotalLength) {
      const L = ln.getTotalLength();
      ln.style.setProperty("--len", L.toFixed(0));
    }
  });
  return svg;
}

function buildDonut(segments, total) {
  const size = 118, r = 46, cx = size / 2, cy = size / 2, sw = 18;
  const C = 2 * Math.PI * r;
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("width", size);
  svg.setAttribute("height", size);
  svg.setAttribute("viewBox", `0 0 ${size} ${size}`);
  svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", "สัดส่วนช่องทาง " + segments.map(s => `${s.name} ${Math.round(s.value / total * 100)}%`).join(", "));

  let out = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#f1f1ef" stroke-width="${sw}"/>`;
  let offset = 0;
  segments.forEach(s => {
    const frac = s.value / total;
    const len = frac * C;
    out += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${sw}" ` +
           `stroke-dasharray="${len.toFixed(2)} ${(C - len).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}" ` +
           `transform="rotate(-90 ${cx} ${cy})" stroke-linecap="butt"/>`;
    offset += len;
  });
  out += `<text x="${cx}" y="${cy - 2}" text-anchor="middle" font-size="22" font-weight="700" fill="#37352f">${total}</text>`;
  out += `<text x="${cx}" y="${cy + 13}" text-anchor="middle" font-size="9" fill="#9b9588">รายการ</text>`;
  svg.innerHTML = out;
  return svg;
}

/* ============================================================================
   MOBILE NAV TOGGLE
   ============================================================================ */
const menuBtn = $("#menuBtn");
menuBtn.addEventListener("click", () => {
  const open = document.body.classList.toggle("nav-open");
  menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
});
document.addEventListener("click", e => {
  if (!document.body.classList.contains("nav-open")) return;
  if (e.target.closest("#sidebar") || e.target.closest("#menuBtn")) return;
  document.body.classList.remove("nav-open");
  menuBtn.setAttribute("aria-expanded", "false");
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape" && document.body.classList.contains("nav-open")) {
    document.body.classList.remove("nav-open");
    menuBtn.setAttribute("aria-expanded", "false");
    menuBtn.focus();
  }
});
</script>
