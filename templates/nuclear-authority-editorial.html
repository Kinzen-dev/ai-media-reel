<!-- TEMPLATE: Nuclear Authority Editorial | ARCHETYPE: deep-tech-authority hard-science editorial hero | REF: fusion/space/semiconductor startup sites + editorial-magazine authority | WHEN TO USE: serious hard-science / energy / deep-tech company landing where authority comes from scale + restraint, not flair | SWAP: edit the DATA object at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nuclear Authority Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,340;9..144,400;9..144,500&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   DATA-DRIVEN. To re-skin: edit the DATA object in <script> below,
   then nothing else. All copy + media paths live there.
   ============================================================ */
:root{
  --ink:#0c0e10;          /* deep ink */
  --ink-2:#14171a;
  --stone:#f4f2ec;        /* stone paper */
  --stone-dim:#d7d4ca;
  --accent:#d65a31;       /* reactor orange (signal only) */
  --steel:#8a9aaa;        /* cool steel */
  --rule:rgba(244,242,236,.26);
  --serif:"Fraunces", Georgia, "Times New Roman", serif;
  --grotesk:"Space Grotesk", "Helvetica Neue", Arial, sans-serif;
  --pad: clamp(20px, 4.6vw, 64px);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--ink);
  color:var(--stone);
  font-family:var(--grotesk);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* ---------- HERO STAGE ---------- */
.hero{
  position:relative;
  width:100%;
  min-height:100svh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  overflow:hidden;
  isolation:isolate;
}
/* full-bleed atmospheric photograph (cover OK on the hero per brief) */
.hero__media{
  position:absolute;
  inset:0;
  z-index:0;
  overflow:hidden;
}
.hero__media img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:62% 50%;
  /* slow parallax drift, killed under reduced-motion */
  transform:scale(1.06) translate3d(0,var(--py,0),0);
  transition:transform .1s linear;
  filter:saturate(.82) contrast(1.04) brightness(.86);
}
/* editorial grade: darken bottom + left so type holds, keep top atmospheric */
.hero__grade{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(180deg, rgba(12,14,16,.30) 0%, rgba(12,14,16,0) 26%, rgba(12,14,16,.10) 55%, rgba(12,14,16,.86) 100%),
    linear-gradient(75deg, rgba(12,14,16,.78) 0%, rgba(12,14,16,.30) 40%, rgba(12,14,16,0) 72%);
}
/* faint film grain for editorial texture */
.hero__grain{
  position:absolute;inset:-50%;z-index:2;pointer-events:none;opacity:.05;mix-blend-mode:overlay;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* ---------- TOP BAND (masthead) ---------- */
.mast{
  position:relative;z-index:5;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:clamp(16px,2.4vw,26px) var(--pad);
}
.mast__brand{
  font-family:var(--serif);
  font-weight:500;
  font-size:clamp(17px,1.5vw,21px);
  letter-spacing:.005em;
}
.mast__brand b{font-weight:500}
.mast__brand .dot{color:var(--accent)}
.mast__nav{
  display:flex;gap:clamp(16px,2vw,34px);
  font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--stone-dim);
}
.mast__nav a{padding:6px 2px;border-bottom:1px solid transparent;transition:border-color .25s,color .25s}
.mast__nav a:hover{color:var(--stone);border-color:var(--accent)}

/* ---------- HEADLINE BLOCK ---------- */
.lead{
  position:relative;z-index:5;
  align-self:end;
  padding:0 var(--pad) clamp(26px,3.4vw,46px);
  max-width:min(100%, 1180px);
}
.eyebrow{
  display:inline-flex;align-items:center;gap:12px;
  font-size:11px;letter-spacing:.34em;text-transform:uppercase;
  color:var(--stone-dim);
  margin-bottom:clamp(18px,2.4vw,30px);
}
.eyebrow .mark{
  width:8px;height:8px;border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 4px rgba(214,90,49,.16);
}
.eyebrow .seq{color:var(--steel);font-variant-numeric:tabular-nums}

.headline{
  font-family:var(--serif);
  font-weight:340;
  /* oversize editorial scale */
  font-size:clamp(44px, 9.2vw, 138px);
  line-height:.96;
  letter-spacing:-.018em;
  color:var(--stone);
  text-wrap:balance;
  text-shadow:0 2px 40px rgba(0,0,0,.45);
}
.headline em{
  font-style:italic;
  font-weight:400;
}
.headline .glow{
  color:var(--stone);
  position:relative;
}

/* thin horizontal rule + calm sub-deck */
.rule{
  height:1px;width:100%;
  background:var(--rule);
  margin:clamp(22px,2.8vw,36px) 0 clamp(18px,2vw,24px);
  transform-origin:left center;
}
.deck{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:clamp(20px,4vw,60px);flex-wrap:wrap;
}
.subdeck{
  font-family:var(--serif);
  font-weight:340;
  font-size:clamp(15px,1.55vw,21px);
  line-height:1.5;
  color:var(--stone-dim);
  max-width:54ch;
}
.cta{
  flex:0 0 auto;align-self:flex-end;
  display:inline-flex;align-items:center;gap:12px;
  font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--stone);
  padding:13px 22px;
  border:1px solid var(--rule);
  border-radius:2px;
  transition:background .3s,border-color .3s,color .3s;
}
.cta:hover{background:var(--accent);border-color:var(--accent);color:#0c0e10}
.cta .arr{transition:transform .3s}
.cta:hover .arr{transform:translateX(4px)}

/* ---------- METRIC STRIP (bottom, restrained) ---------- */
.metrics{
  position:relative;z-index:5;
  border-top:1px solid var(--rule);
  background:linear-gradient(180deg, rgba(12,14,16,0) 0%, rgba(8,9,11,.62) 100%);
  display:grid;
  grid-template-columns:repeat(4,1fr);
}
.metric{
  padding:clamp(16px,2vw,24px) var(--pad);
  border-left:1px solid var(--rule);
  display:flex;flex-direction:column;gap:6px;
}
.metric:first-child{border-left:0}
.metric__val{
  font-family:var(--serif);
  font-weight:400;
  font-size:clamp(24px,3vw,42px);
  line-height:1;
  letter-spacing:-.01em;
  color:var(--stone);
}
.metric__val u{text-decoration:none;color:var(--accent);font-size:.62em;vertical-align:.16em;margin-left:.06em}
.metric__lab{
  font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--steel);
}

/* on-load entrance (gated for reduced motion) */
.anim{opacity:0;transform:translateY(16px);}
.is-ready .anim{opacity:1;transform:none;transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1)}
.is-ready .d1{transition-delay:.05s}
.is-ready .d2{transition-delay:.16s}
.is-ready .d3{transition-delay:.30s}
.is-ready .d4{transition-delay:.42s}
.is-ready .d5{transition-delay:.54s}
.is-ready .rule{animation:ruleIn 1s .30s cubic-bezier(.2,.7,.2,1) both}
@keyframes ruleIn{from{transform:scaleX(0)}to{transform:scaleX(1)}}

:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px}

/* ============ MOBILE: never cover-crop a landscape into portrait.
   Stack -> contained letterboxed image UNDER a dominant headline. ============ */
@media (max-width:640px){
  .hero{
    min-height:100svh;
    grid-template-rows:auto auto 1fr auto;
  }
  /* image becomes a contained band, not a full-bleed crop */
  .hero__media{
    position:relative;
    grid-row:2;
    z-index:0;
    width:100%;
    aspect-ratio:16/9;            /* matches the 2048x1152 asset, no crop */
    background:#07080a;
    border-top:1px solid var(--rule);
    border-bottom:1px solid var(--rule);
  }
  .hero__media img{
    object-fit:contain;            /* letterbox, never crop the landscape */
    transform:none !important;     /* no parallax on the contained band */
    filter:saturate(.86) contrast(1.04) brightness(.92);
  }
  /* grade only tints the contained band now */
  .hero__grade{
    position:absolute;
    background:linear-gradient(180deg, rgba(12,14,16,.10) 0%, rgba(12,14,16,0) 60%, rgba(12,14,16,.55) 100%);
  }
  .hero__grain{display:none}

  .mast{grid-row:1;flex-wrap:wrap;gap:10px}
  .mast__nav{display:none}

  /* headline sits in a top band ABOVE the image and stays dominant */
  .lead{
    grid-row:3;
    align-self:start;
    padding:clamp(20px,6vw,30px) var(--pad) clamp(18px,5vw,26px);
    background:var(--ink);
  }
  .headline{
    font-size:clamp(38px,12.6vw,68px);
    line-height:.98;
  }
  .deck{flex-direction:column;align-items:flex-start;gap:18px}
  .cta{align-self:stretch;justify-content:space-between}

  .metrics{
    grid-row:4;
    grid-template-columns:1fr 1fr;
  }
  .metric{border-top:1px solid var(--rule)}
  .metric:nth-child(2n){border-left:1px solid var(--rule)}
  .metric:nth-child(1),.metric:nth-child(2){border-top:0}
}
@media (max-width:380px){
  .metrics{grid-template-columns:1fr}
  .metric{border-left:0 !important;border-top:1px solid var(--rule) !important}
  .metric:first-child{border-top:0 !important}
}

/* Reorder source so headline reads first on mobile but image still visually sits between */
@media (min-width:641px){
  .mast{grid-row:1}
  .lead{grid-row:2}
  .metrics{grid-row:3}
}

/* ============ REDUCED MOTION: show final state, kill all heavy motion ============ */
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important}
  .hero__media img{transform:scale(1.04) !important;transition:none !important}
  .anim{opacity:1 !important;transform:none !important}
  .rule{transform:none !important}
}
</style>
</head>
<body>
<main class="hero" id="hero">

  <!-- atmospheric full-bleed photograph -->
  <div class="hero__media">
    <img id="heroImg" alt="" decoding="async" fetchpriority="high" />
  </div>
  <div class="hero__grade" aria-hidden="true"></div>
  <div class="hero__grain" aria-hidden="true"></div>

  <!-- masthead -->
  <header class="mast anim d1">
    <div class="mast__brand"><b id="brand">Brand</b><span class="dot">.</span></div>
    <nav class="mast__nav" id="nav" aria-label="Primary"></nav>
  </header>

  <!-- headline block: eyebrow + oversize headline + rule + sub-deck -->
  <section class="lead">
    <div class="eyebrow anim d2">
      <span class="mark" aria-hidden="true"></span>
      <span id="eyebrow">Eyebrow</span>
      <span class="seq" id="seq">/ 00</span>
    </div>

    <h1 class="headline anim d3" id="headline">Headline</h1>

    <div class="rule" role="presentation"></div>

    <div class="deck">
      <p class="subdeck anim d4" id="subdeck">Sub deck.</p>
      <a class="cta anim d4" id="cta" href="#">
        <span id="ctaLabel">Read the brief</span>
        <span class="arr" aria-hidden="true">&rarr;</span>
      </a>
    </div>
  </section>

  <!-- restrained metric strip -->
  <footer class="metrics anim d5" id="metrics" aria-label="Key figures"></footer>

</main>

<script>
/* ============================================================================
   DATA  - edit this object to re-skin the entire template. Nothing else.
   Headline supports <em>...</em> for the italic accent word(s).
   Metric value supports trailing <u>UNIT</u> rendered small in accent.
   ============================================================================ */
const DATA = {
  asset: "../assets/flux-car-4k.png",     // atmospheric full-bleed hero (16:9, 2048x1152)
  assetAlt: "Reactor hall at night, long exposure",
  brand: "HELION WORKS",
  nav: ["Program", "Physics", "Reactor", "Journal"],
  eyebrow: "Fusion Energy Systems",
  sequence: "/ 04",
  headline: "Power dense enough to <em>rewrite</em> the grid.",
  subdeck: "We are building a compact magnetic-confinement reactor that turns a deuterium plasma into stable baseload electricity. No carbon, no waste half-lives measured in millennia, no compromise on scale.",
  ctaLabel: "Read the technical brief",
  metrics: [
    { val: "100<u>MK</u>", label: "Plasma temperature" },
    { val: "8.6<u>T</u>",  label: "Peak field strength" },
    { val: "Q&gt;5",        label: "Net energy gain" },
    { val: "2031",         label: "First grid power" }
  ]
};

/* ---- render ---- */
(function render(){
  const $ = (s)=>document.querySelector(s);

  const img = $("#heroImg");
  img.src = DATA.asset;
  img.alt = DATA.assetAlt;

  $("#brand").textContent = DATA.brand;

  const nav = $("#nav");
  nav.innerHTML = DATA.nav.map(n=>`<a href="#">${n}</a>`).join("");

  $("#eyebrow").textContent = DATA.eyebrow;
  $("#seq").textContent = DATA.sequence;
  $("#headline").innerHTML = DATA.headline;
  $("#subdeck").textContent = DATA.subdeck;
  $("#ctaLabel").textContent = DATA.ctaLabel;

  $("#metrics").innerHTML = DATA.metrics.map(m=>
    `<div class="metric"><span class="metric__val">${m.val}</span><span class="metric__lab">${m.label}</span></div>`
  ).join("");
})();

/* ---- entrance: only after the hero image is ready, and only if motion allowed ---- */
(function entrance(){
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const ready = ()=> document.body.classList.add("is-ready");
  if (reduce){ document.body.classList.add("is-ready"); return; }

  const img = document.getElementById("heroImg");
  if (img.complete){ requestAnimationFrame(ready); }
  else { img.addEventListener("load", ()=>requestAnimationFrame(ready), {once:true});
         img.addEventListener("error", ()=>requestAnimationFrame(ready), {once:true}); }
  // safety: never leave the page hidden if the image stalls
  setTimeout(ready, 1400);
})();

/* ---- subtle scroll parallax on the full-bleed image (desktop, motion-on only) ---- */
(function parallax(){
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const mobile = window.matchMedia("(max-width:640px)").matches;
  if (reduce || mobile) return;

  const img = document.getElementById("heroImg");
  let ticking = false;

  function update(){
    const y = window.scrollY || 0;
    // gentle: image drifts at ~0.18x scroll, capped
    const py = Math.min(y * 0.18, 120);
    img.style.setProperty("--py", py + "px");
    ticking = false;
  }
  window.addEventListener("scroll", ()=>{
    if (!ticking){ ticking = true; requestAnimationFrame(update); }
  }, {passive:true});
  // re-evaluate on resize crossing the mobile boundary
  window.addEventListener("resize", ()=>{
    if (window.matchMedia("(max-width:640px)").matches) img.style.removeProperty("--py");
  }, {passive:true});
})();
</script>
</body>
</html>
