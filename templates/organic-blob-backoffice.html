<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ภาพรวมร้าน . Yimwhan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   DATA-DRIVEN ORGANIC BLOB BACKOFFICE
   All presentation hexes are inline in SVG (no var() in attrs).
   Swap content via the DATA array in the <script> at top.
   ============================================================ */
:root{
  --cream:#fbf9f6;
  --ink:#2a2630;
  --ink-soft:#6b6472;
  --ink-faint:#9b94a3;
  --card:#ffffff;
  --line:#efeae3;
  --coral:#ff7a59;
  --peach:#ffc26f;
  --teal:#2bc4a8;
  --mint:#7fe3c0;
  --blob-coral:#ffe7df;
  --blob-teal:#dcf6ee;
  --blob-peach:#fff2dc;
  --shadow:0 18px 50px -22px rgba(60,40,30,.30);
  --shadow-sm:0 8px 24px -14px rgba(60,40,30,.28);
  --r-lg:30px;
  --r-md:22px;
  --r-sm:16px;
}
*{box-sizing:border-box;margin:0;padding:0;min-width:0}
html{scroll-behavior:smooth}
body{
  font-family:"Plus Jakarta Sans","Noto Sans Thai",system-ui,sans-serif;
  background:var(--cream);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  overflow-x:hidden;
}
.th{font-family:"Noto Sans Thai","Plus Jakarta Sans",sans-serif}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
a{color:inherit;text-decoration:none}

/* ---- background blobs (fixed, clipped to viewport, never overflow page) ---- */
.bg-blobs{
  position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.bg-blobs svg{position:absolute;will-change:transform}
.bb1{top:-160px;right:-120px;width:560px;height:560px;opacity:.85}
.bb2{bottom:-220px;left:-160px;width:640px;height:640px;opacity:.8}
.bb3{top:38%;left:46%;width:380px;height:380px;opacity:.5}

/* ---- shell ---- */
.shell{position:relative;z-index:1;max-width:1240px;margin:0 auto;padding:26px 30px 70px}

/* ---- top bar ---- */
.topbar{
  display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  margin-bottom:26px;
}
.brand{display:flex;align-items:center;gap:13px;min-width:0}
.brand .mark{
  width:46px;height:46px;border-radius:15px;flex:0 0 auto;
  background:linear-gradient(135deg,#ff7a59,#ffc26f);
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:22px;
  box-shadow:0 10px 22px -10px rgba(255,122,89,.7);
}
.brand .who{min-width:0}
.brand .who h1{font-size:1.18rem;font-weight:800;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand .who p{font-size:.82rem;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .spacer{flex:1 1 40px}
.seg{
  display:flex;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px;gap:3px;
  box-shadow:var(--shadow-sm);
}
.seg button{
  padding:8px 16px;border-radius:999px;font-size:.83rem;font-weight:600;color:var(--ink-soft);
  white-space:nowrap;transition:color .2s;
}
.seg button.on{
  color:#fff;background:linear-gradient(135deg,#2bc4a8,#7fe3c0);
  box-shadow:0 8px 18px -8px rgba(43,196,168,.7);
}
.bell{
  width:46px;height:46px;flex:0 0 auto;border-radius:15px;background:#fff;border:1px solid var(--line);
  display:grid;place-items:center;box-shadow:var(--shadow-sm);position:relative;
}
.bell svg{width:21px;height:21px}
.bell .dot{position:absolute;top:11px;right:12px;width:9px;height:9px;border-radius:50%;background:#ff7a59;border:2px solid #fff}
.av{
  width:46px;height:46px;flex:0 0 auto;border-radius:15px;overflow:hidden;box-shadow:var(--shadow-sm);
  background:linear-gradient(135deg,#ffc26f,#ff7a59);border:2px solid #fff;
}
.av img{width:100%;height:100%;object-fit:cover}

/* ---- greeting band ---- */
.hello{margin:6px 0 22px;max-width:640px}
.hello .pill{
  display:inline-flex;align-items:center;gap:7px;font-size:.78rem;font-weight:600;color:#1d8a76;
  background:var(--blob-teal);padding:6px 13px;border-radius:999px;margin-bottom:13px;
}
.hello .pill .blip{width:8px;height:8px;border-radius:50%;background:#2bc4a8;box-shadow:0 0 0 4px rgba(43,196,168,.25)}
.hello h2{font-size:clamp(1.5rem,3.4vw,2.15rem);font-weight:800;letter-spacing:-.02em;line-height:1.18}
.hello h2 .grad{
  background:linear-gradient(105deg,#ff7a59,#ffc26f);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hello p{margin-top:9px;color:var(--ink-soft);font-size:.98rem}

/* ---- KPI row ---- */
.kpis{
  display:grid;gap:18px;margin-bottom:20px;
  grid-template-columns:1.35fr 1fr 1fr 1fr;
}
.kpi{
  position:relative;background:var(--card);border-radius:var(--r-md);padding:22px 22px 20px;
  box-shadow:var(--shadow-sm);border:1px solid var(--line);overflow:hidden;min-width:0;
}
.kpi .lab{font-size:.82rem;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;gap:8px}
.kpi .lab .ic{
  width:30px;height:30px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto;
}
.kpi .lab .ic svg{width:16px;height:16px}
.kpi .num{font-size:2.1rem;font-weight:800;letter-spacing:-.02em;margin-top:8px;padding-bottom:8px;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kpi .num small{font-size:.92rem;font-weight:700;color:var(--ink-soft);margin-left:3px}
.kpi .delta{
  margin-top:11px;display:inline-flex;align-items:center;gap:5px;font-size:.8rem;font-weight:700;
  padding:4px 9px;border-radius:999px;
}
.kpi .delta.up{color:#1a8d5f;background:#e3f7ec}
.kpi .delta.down{color:#c0492f;background:#fdeae3}
.kpi .delta svg{width:13px;height:13px}
.kpi .vs{font-size:.74rem;color:var(--ink-faint);margin-top:8px}

/* hero KPI on a gradient blob */
.kpi.hero{color:#fff;border:0;box-shadow:0 24px 54px -22px rgba(255,122,89,.78)}
.kpi.hero .grad-bg{position:absolute;inset:0;width:100%;height:100%;z-index:0}
.kpi.hero > *{position:relative;z-index:1}
.kpi.hero .lab{color:rgba(255,255,255,.92)}
.kpi.hero .lab .ic{background:rgba(255,255,255,.22)}
.kpi.hero .num{font-size:2.9rem}
.kpi.hero .num small{color:rgba(255,255,255,.85)}
.kpi.hero .delta{color:#fff;background:rgba(255,255,255,.22)}
.kpi.hero .vs{color:rgba(255,255,255,.8)}
.kpi.hero .clip{position:absolute;inset:0;overflow:hidden;border-radius:inherit;z-index:0;pointer-events:none}
.kpi.hero .blobfig{position:absolute;right:-30px;bottom:-44px;width:200px;height:200px;opacity:.5}

/* ---- main grid ---- */
.grid{display:grid;gap:20px;grid-template-columns:1.7fr 1fr;align-items:start}

.panel{
  background:var(--card);border-radius:var(--r-lg);border:1px solid var(--line);
  box-shadow:var(--shadow-sm);padding:24px;min-width:0;
}
.panel .head{display:flex;align-items:flex-start;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.panel .head h3{font-size:1.08rem;font-weight:800;letter-spacing:-.01em}
.panel .head p{font-size:.82rem;color:var(--ink-soft);margin-top:3px}
.panel .head .spacer{flex:1 1 20px}
.chiprow{display:flex;gap:8px;flex-wrap:wrap}
.chip{
  font-size:.76rem;font-weight:600;padding:6px 12px;border-radius:999px;color:var(--ink-soft);
  background:#f6f2ec;border:1px solid var(--line);white-space:nowrap;
}
.chip.on{color:#1d8a76;background:var(--blob-teal);border-color:#c4ede1}

/* ---- trend chart ---- */
.chartwrap{margin-top:18px;position:relative}
.chart{width:100%;height:auto;display:block;overflow:visible}
.legend{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;font-size:.8rem;color:var(--ink-soft)}
.legend span{display:inline-flex;align-items:center;gap:7px;font-weight:600}
.legend i{width:12px;height:12px;border-radius:4px;display:inline-block}
.tip{
  position:absolute;pointer-events:none;background:#2a2630;color:#fff;border-radius:12px;
  padding:8px 12px;font-size:.76rem;font-weight:600;white-space:nowrap;opacity:0;transform:translate(-50%,-12px);
  transition:opacity .14s;box-shadow:0 12px 26px -12px rgba(0,0,0,.5);z-index:5;
}
.tip b{color:#ffc26f}
.tip .t2{color:#7fe3c0}

/* ---- donut split ---- */
.split-body{display:flex;align-items:center;gap:24px;margin-top:14px;flex-wrap:wrap}
.donut{position:relative;width:172px;height:172px;flex:0 0 auto}
.donut .ctr{position:absolute;inset:0;display:grid;place-content:center;text-align:center}
.donut .ctr .big{font-size:1.7rem;font-weight:800;letter-spacing:-.02em;line-height:1}
.donut .ctr .sub{font-size:.72rem;color:var(--ink-soft);font-weight:600;margin-top:3px}
.split-legend{flex:1 1 150px;min-width:0;display:flex;flex-direction:column;gap:13px}
.split-legend .row{display:flex;align-items:center;gap:11px;min-width:0}
.split-legend .swatch{width:13px;height:13px;border-radius:5px;flex:0 0 auto}
.split-legend .meta{min-width:0;flex:1}
.split-legend .meta .nm{font-size:.86rem;font-weight:700;display:flex;align-items:center;gap:6px}
.split-legend .meta .nm small{font-weight:600;color:var(--ink-soft);font-size:.74rem}
.split-legend .meta .bar{height:7px;border-radius:99px;background:#f0ece6;margin-top:6px;overflow:hidden}
.split-legend .meta .bar i{display:block;height:100%;border-radius:99px}
.split-legend .val{font-size:1.05rem;font-weight:800;flex:0 0 auto}

/* ---- handoff list ---- */
.handoff{grid-column:1 / -1}
.cards{display:grid;gap:14px;margin-top:18px;grid-template-columns:repeat(3,1fr)}
.hcard{
  position:relative;border-radius:var(--r-md);padding:18px;background:#fffaf6;
  border:1px solid #f2e7df;overflow:hidden;min-width:0;transition:transform .18s,box-shadow .18s;
}
.hcard:hover,.hcard:focus-within{transform:translateY(-3px);box-shadow:var(--shadow)}
.hcard .clip{position:absolute;inset:0;overflow:hidden;border-radius:inherit;z-index:0;pointer-events:none}
.hcard .hblob{position:absolute;right:-26px;top:-26px;width:120px;height:120px;opacity:.7}
.hcard > *{position:relative;z-index:1}
.hcard .top{display:flex;align-items:center;gap:11px;min-width:0}
.hcard .ava{
  width:42px;height:42px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;
  color:#fff;font-weight:800;font-size:1rem;overflow:hidden;
}
.hcard .ava img{width:100%;height:100%;object-fit:cover}
.hcard .who{min-width:0;flex:1}
.hcard .who .n{font-size:.95rem;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard .who .meta{font-size:.74rem;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hcard .reason{font-size:.86rem;color:var(--ink);margin-top:13px;line-height:1.45}
.hcard .foot{display:flex;align-items:center;gap:8px;margin-top:15px;flex-wrap:wrap}
.tag{font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap}
.tag.voice{color:#a14a2c;background:#ffe7df}
.tag.line{color:#1d8a76;background:#dcf6ee}
.tag.urgent{color:#fff;background:linear-gradient(135deg,#ff7a59,#ff5a7a)}
.tag.wait{color:#8a6d1f;background:#fff2dc}
.hcard .foot .spacer{flex:1 1 4px}
.hcard .go{
  display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:700;color:#fff;
  padding:8px 14px;border-radius:999px;background:linear-gradient(135deg,#2bc4a8,#7fe3c0);
  box-shadow:0 8px 16px -8px rgba(43,196,168,.7);white-space:nowrap;
}
.hcard .go svg{width:13px;height:13px}
.hcard .time{font-size:.72rem;color:var(--ink-faint);font-weight:600;display:flex;align-items:center;gap:5px}
.hcard .time .pip{width:7px;height:7px;border-radius:50%;background:#ff7a59}

/* mini sparkline inside kpi */
.kpi .spark{position:absolute;right:14px;bottom:12px;width:78px;height:34px;opacity:.9}

:focus-visible{outline:3px solid #2bc4a8;outline-offset:3px;border-radius:10px}

/* ---- responsive ---- */
@media(max-width:1080px){
  .kpis{grid-template-columns:1fr 1fr}
  .kpi.hero{grid-column:1 / -1}
  .grid{grid-template-columns:1fr}
  .cards{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .shell{padding:18px 16px 56px}
  .topbar{gap:12px}
  .topbar .spacer{flex-basis:100%;order:5;height:0}
  .seg{order:6;width:100%;overflow-x:auto}
  .seg button{flex:1}
  .kpis{grid-template-columns:1fr}
  .kpi .num{font-size:1.9rem}
  .kpi.hero .num{font-size:2.5rem}
  .cards{grid-template-columns:1fr}
  .donut{margin:0 auto}
  .split-body{justify-content:center}
  .bb1,.bb2,.bb3{filter:saturate(1.05)}
}

@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
  html{scroll-behavior:auto}
  .bg-blobs svg{transform:none!important}
}
</style>
</head>

  cal:'<path d="M7 2v3M17 2v3M3 9h18M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
  phone:'<path d="M5 4h4l2 5-2.5 1.5a12 12 0 0 0 5 5L20 13l-1 4a2 2 0 0 1-2 1.5A15 15 0 0 1 3.5 6 2 2 0 0 1 5 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>',
  chat:'<path d="M4 5h16a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H9l-4 4v-4H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>',
  baht:'<path d="M9 4h4a3.5 3.5 0 0 1 0 7H9zM9 11h5a3.5 3.5 0 0 1 0 7H9zM9 4v14M11 2v2M11 18v2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
  up:'<path d="M12 19V6M5 12l7-7 7 7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>',
  down:'<path d="M12 5v13M19 12l-7 7-7-7" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>',
  arrow:'<path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>',
  bell:'<path d="M12 3a6 6 0 0 0-6 6c0 6-2 8-2 8h16s-2-2-2-8a6 6 0 0 0-6-6zM10 21h4" fill="none" stroke="#2a2630" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
};
const TINT = {
  coral:{bg:'#ffe7df',fg:'#a14a2c'},
  teal:{bg:'#dcf6ee',fg:'#1d8a76'},
  peach:{bg:'#fff2dc',fg:'#8a6d1f'},
  def:{bg:'#f0ece6',fg:'#6b6472'}
};

/* ---------- small helpers ---------- */
const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function sparkPath(arr,w,h){
  const mx=Math.max(...arr),mn=Math.min(...arr),rng=(mx-mn)||1;
  const stp=w/(arr.length-1);
  return arr.map((v,i)=>{
    const x=(i*stp).toFixed(1);
    const y=(h-((v-mn)/rng)*h).toFixed(1);
    return (i?'L':'M')+x+' '+y;
  }).join(' ');
}

/* ---------- render: top bar + greeting ---------- */
function topbar(){
  const b=DATA.brand;
  const segs=DATA.ranges.map((r,i)=>`<button class="${i===1?'on':''}" data-range="${i}">${esc(r)}</button>`).join('');
  return `
  <header class="topbar">
    <div class="brand">
      <div class="mark th" aria-hidden="true">${esc(b.mark)}</div>
      <div class="who"><h1 class="th">${esc(b.name)}</h1><p class="th">${esc(b.sub)}</p></div>
    </div>
    <div class="spacer"></div>
    <div class="seg th" role="tablist" aria-label="ช่วงเวลา">${segs}</div>
    <button class="bell" aria-label="การแจ้งเตือน"><svg viewBox="0 0 24 24">${IC.bell}</svg><span class="dot"></span></button>
    <div class="av"><img src="${b.avatar}" alt="" loading="lazy" onerror="this.style.display='none'"/></div>
  </header>`;
}
function hello(){
  const g=DATA.greeting;
  return `
  <section class="hello th">
    <span class="pill"><span class="blip"></span>${esc(g.pill)}</span>
    <h2>${esc(g.hi)} <span class="grad">${esc(g.lead)}</span></h2>
    <p>${esc(g.note)}</p>
  </section>`;
}

/* ---------- render: KPI cards ---------- */
function kpiCard(k){
  const dIc = k.dir==='up'?IC.up:IC.down;
  const sp = sparkPath(k.spark,78,32);
  if(k.hero){
    return `
    <div class="kpi hero th">
      <svg class="grad-bg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
        <defs><linearGradient id="heroG" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ff7a59"/><stop offset="55%" stop-color="#ff9a63"/><stop offset="100%" stop-color="#ffc26f"/>
        </linearGradient></defs>
        <rect width="100" height="100" fill="url(#heroG)"/>
      </svg>
      <div class="clip" data-lint-ignore aria-hidden="true">
        <svg class="blobfig" viewBox="0 0 200 200">
          <path fill="rgba(255,255,255,.55)" d="M100,18 C150,12 188,52 184,104 C180,156 138,190 88,184 C44,179 16,140 22,96 C28,52 56,24 100,18 Z"/>
        </svg>
      </div>
      <div class="lab"><span class="ic"><svg viewBox="0 0 24 24">${IC[k.icon]}</svg></span>${esc(k.label)}</div>
      <div class="num">${esc(k.value)}<small>${esc(k.unit)}</small></div>
      <div class="delta"><svg viewBox="0 0 24 24">${dIc}</svg>${esc(k.delta)}</div>
      <div class="vs">${esc(k.vs)}</div>
    </div>`;
  }
  const t = TINT[k.tint]||TINT.def;
  const stroke = k.tint==='teal'?'#2bc4a8':(k.tint==='peach'?'#ffb24d':'#ff7a59');
  return `
  <div class="kpi th">
    <div class="lab"><span class="ic" style="background:${t.bg};color:${t.fg}"><svg viewBox="0 0 24 24">${IC[k.icon]}</svg></span>${esc(k.label)}</div>
    <div class="num">${esc(k.value)}<small>${esc(k.unit)}</small></div>
    <div class="delta ${k.dir}"><svg viewBox="0 0 24 24">${dIc}</svg>${esc(k.delta)}</div>
    <div class="vs">${esc(k.vs)}</div>
    <svg class="spark" viewBox="0 0 78 34" fill="none" aria-hidden="true">
      <path d="${sp} L78 34 L0 34 Z" fill="${stroke}" opacity="0.12"/>
      <path d="${sp}" stroke="${stroke}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>`;
}

/* ---------- render: trend chart (gradient-filled area) ---------- */
function trendChart(){
  const t=DATA.trend;
  const W=620,H=240,PADL=8,PADR=8,PADT=18,PADB=34;
  const iw=W-PADL-PADR, ih=H-PADT-PADB;
  const n=t.labels.length, stp=iw/(n-1);
  const xy=(i,v,max)=>[PADL+i*stp, PADT+ih-(v/max)*ih];
  // smooth path via simple catmull-ish (quadratic midpoints)
  function smooth(vals,max){
    const pts=vals.map((v,i)=>xy(i,v,max));
    let d='M'+pts[0][0].toFixed(1)+' '+pts[0][1].toFixed(1);
    for(let i=0;i<pts.length-1;i++){
      const [x0,y0]=pts[i],[x1,y1]=pts[i+1];
      const mx=(x0+x1)/2;
      d+=` C${mx.toFixed(1)} ${y0.toFixed(1)} ${mx.toFixed(1)} ${y1.toFixed(1)} ${x1.toFixed(1)} ${y1.toFixed(1)}`;
    }
    return {d,pts};
  }
  const callsL=smooth(t.calls,t.callsMax);
  const bookL=smooth(t.bookings,t.bookMax);
  const areaD = callsL.d + ` L${(PADL+iw).toFixed(1)} ${(PADT+ih).toFixed(1)} L${PADL.toFixed(1)} ${(PADT+ih).toFixed(1)} Z`;
  const grids=[0.25,0.5,0.75,1].map(f=>{
    const y=(PADT+ih-f*ih).toFixed(1);
    return `<line x1="${PADL}" y1="${y}" x2="${PADL+iw}" y2="${y}" stroke="#f1ece5" stroke-width="1"/>`;
  }).join('');
  const xlabs=t.labels.map((l,i)=>{
    const x=(PADL+i*stp).toFixed(1);
    return `<text x="${x}" y="${H-10}" text-anchor="middle" font-size="12" font-weight="600" fill="#9b94a3" font-family="Noto Sans Thai,sans-serif">${esc(l)}</text>`;
  }).join('');
  const dotsCalls=callsL.pts.map(([x,y],i)=>`<circle class="hpt" data-i="${i}" data-x="${x.toFixed(1)}" data-y="${y.toFixed(1)}" cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4.5" fill="#fff" stroke="#ff7a59" stroke-width="2.5"/>`).join('');
  const dotsBook=bookL.pts.map(([x,y])=>`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3.5" fill="#fff" stroke="#2bc4a8" stroke-width="2.5"/>`).join('');
  return `
  <section class="panel" aria-label="แนวโน้มสาย และ การจอง">
    <div class="head">
      <div>
        <h3 class="th">${esc(t.title)}</h3>
        <p class="th">${esc(t.sub)}</p>
      </div>
      <div class="spacer"></div>
      <div class="chiprow th"><span class="chip on">สาย</span><span class="chip on">การจอง</span></div>
    </div>
    <div class="chartwrap" id="chartwrap">
      <svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="กราฟแนวโน้ม">
        <defs>
          <linearGradient id="areaG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ff7a59" stop-opacity="0.34"/>
            <stop offset="100%" stop-color="#ffc26f" stop-opacity="0.02"/>
          </linearGradient>
          <linearGradient id="lineCalls" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#ff7a59"/><stop offset="100%" stop-color="#ffc26f"/>
          </linearGradient>
          <linearGradient id="lineBook" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#2bc4a8"/><stop offset="100%" stop-color="#7fe3c0"/>
          </linearGradient>
        </defs>
        ${grids}
        <path d="${areaD}" fill="url(#areaG)"/>
        <path class="anim-line" d="${bookL.d}" fill="none" stroke="url(#lineBook)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path class="anim-line" d="${callsL.d}" fill="none" stroke="url(#lineCalls)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${dotsBook}${dotsCalls}
        ${xlabs}
      </svg>
      <div class="tip" id="tip"></div>
    </div>
    <div class="legend th">
      <span><i style="background:linear-gradient(135deg,#ff7a59,#ffc26f)"></i>สายโทรเข้า</span>
      <span><i style="background:linear-gradient(135deg,#2bc4a8,#7fe3c0)"></i>การจองนัด</span>
    </div>
  </section>`;
}

/* ---------- render: donut split ---------- */
function donutSplit(){
  const s=DATA.split;
  const R=70, C=2*Math.PI*R, cx=86, cy=86;
  let acc=0;
  const arcs=s.segments.map((seg,i)=>{
    const len=C*(seg.pct/100);
    const gap=C-len;
    const off=-acc;
    acc+=len;
    return `<circle cx="${cx}" cy="${cy}" r="${R}" fill="none"
      stroke="url(#dg${i})" stroke-width="22" stroke-linecap="round"
      stroke-dasharray="${(len-3).toFixed(1)} ${(gap+3).toFixed(1)}"
      stroke-dashoffset="${off.toFixed(1)}"
      transform="rotate(-90 ${cx} ${cy})"/>`;
  }).join('');
  const defs=s.segments.map((seg,i)=>`
    <linearGradient id="dg${i}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="${seg.c1}"/><stop offset="100%" stop-color="${seg.c2}"/>
    </linearGradient>`).join('');
  const legend=s.segments.map(seg=>`
    <div class="row">
      <span class="swatch" style="background:linear-gradient(135deg,${seg.c1},${seg.c2})"></span>
      <div class="meta">
        <div class="nm th">${esc(seg.name)} <small>${esc(seg.note)}</small></div>
        <div class="bar"><i style="width:${seg.pct}%;background:linear-gradient(90deg,${seg.c1},${seg.c2})"></i></div>
      </div>
      <div class="val">${seg.pct}%</div>
    </div>`).join('');
  return `
  <section class="panel" aria-label="${esc(s.title)}">
    <div class="head"><div><h3 class="th">${esc(s.title)}</h3><p class="th">${esc(s.sub)}</p></div></div>
    <div class="split-body">
      <div class="donut">
        <svg viewBox="0 0 172 172" role="img" aria-label="สัดส่วนช่องทาง">
          <defs>${defs}</defs>
          <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="#f3efe9" stroke-width="22"/>
          ${arcs}
        </svg>
        <div class="ctr"><div class="big th">${esc(s.centerBig)}</div><div class="sub th">${esc(s.centerSub)}</div></div>
      </div>
      <div class="split-legend th">${legend}</div>
    </div>
  </section>`;
}

/* ---------- render: handoff cards ---------- */
function handoff(){
  const h=DATA.handoff;
  const cards=h.items.map((it,ix)=>{
    const gid="hb"+ix; // unique gradient id per card (avatars can repeat channel -> avoid dup id collision)
    const ava = it.avatar
      ? `<div class="ava"><img src="${it.avatar}" alt="" loading="lazy" onerror="this.parentNode.textContent='${esc(it.initial||'?')}'"/></div>`
      : `<div class="ava" style="background:linear-gradient(135deg,${it.c1},${it.c2})">${esc(it.initial||'?')}</div>`;
    const chTag = it.ch==='voice'
      ? `<span class="tag voice">เสียง</span>`
      : `<span class="tag line">LINE</span>`;
    const flagTag = `<span class="tag ${it.flag}">${esc(it.flagText)}</span>`;
    return `
    <article class="hcard th" tabindex="0">
      <div class="clip" data-lint-ignore aria-hidden="true">
        <svg class="hblob" viewBox="0 0 120 120">
          <defs><linearGradient id="${gid}" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="${it.ch==='voice'?'#ffd9c9':'#cdf2e8'}"/>
            <stop offset="100%" stop-color="${it.ch==='voice'?'#ffe9d2':'#e0f7ef'}"/>
          </linearGradient></defs>
          <path fill="url(#${gid})" d="M60,8 C92,4 116,32 112,64 C108,94 82,116 52,110 C26,105 8,80 12,52 C16,26 34,12 60,8 Z"/>
        </svg>
      </div>
      <div class="top">
        ${ava}
        <div class="who"><div class="n">${esc(it.name)}</div><div class="meta">${esc(it.meta)}</div></div>
      </div>
      <p class="reason">${esc(it.reason)}</p>
      <div class="foot">
        ${chTag}${flagTag}
        <div class="spacer"></div>
      </div>
      <div class="foot">
        <span class="time"><span class="pip"></span>${esc(it.time)}</span>
        <div class="spacer"></div>
        <button class="go">เปิดเคส <svg viewBox="0 0 24 24">${IC.arrow}</svg></button>
      </div>
    </article>`;
  }).join('');
  return `
  <section class="panel handoff" aria-label="${esc(h.title)}">
    <div class="head">
      <div><h3 class="th">${esc(h.title)}</h3><p class="th">${esc(h.sub)}</p></div>
      <div class="spacer"></div>
      <div class="chiprow th"><span class="chip on">${h.items.length} เคส</span><span class="chip">ดูทั้งหมด</span></div>
    </div>
    <div class="cards">${cards}</div>
  </section>`;
}

/* ---------- mount ---------- */
const app=document.getElementById('app');
app.innerHTML =
  topbar() + hello() +
  `<section class="kpis">${DATA.kpis.map(kpiCard).join('')}</section>` +
  `<section class="grid">${trendChart()}${donutSplit()}${handoff()}</section>`;

/* ---------- interactions (all motion guarded by reduced-motion) ---------- */
const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* segmented range buttons */
app.querySelectorAll('.seg button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    app.querySelectorAll('.seg button').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
  });
});

/* chart hover tooltip (calls + bookings at that day) */
(function(){
  const wrap=document.getElementById('chartwrap');
  const tip=document.getElementById('tip');
  const svg=wrap?wrap.querySelector('svg'):null;
  if(!wrap||!tip||!svg) return;
  const t=DATA.trend;
  function show(i,clientX){
    const r=wrap.getBoundingClientRect();
    tip.style.left=(clientX-r.left)+'px';
    tip.style.top='6px';
    tip.innerHTML=`${t.labels[i]} . <b>${t.calls[i]} สาย</b> . <span class="t2">${t.bookings[i]} จอง</span>`;
    tip.style.opacity='1';
  }
  wrap.querySelectorAll('.hpt').forEach(dot=>{
    const i=+dot.dataset.i;
    dot.addEventListener('mouseenter',e=>show(i,e.clientX));
    dot.addEventListener('mousemove',e=>show(i,e.clientX));
    dot.addEventListener('mouseleave',()=>tip.style.opacity='0');
  });
  // also map across whole svg for finer hovering
  svg.addEventListener('mousemove',e=>{
    const r=svg.getBoundingClientRect();
    const frac=(e.clientX-r.left)/r.width;
    let i=Math.round(frac*(t.labels.length-1));
    i=Math.max(0,Math.min(t.labels.length-1,i));
    show(i,e.clientX);
  });
  svg.addEventListener('mouseleave',()=>tip.style.opacity='0');
})();

/* line draw-in on load (skipped under reduced-motion) */
if(!reduce){
  document.querySelectorAll('.anim-line').forEach((p,idx)=>{
    try{
      const len=p.getTotalLength();
      p.style.strokeDasharray=len;
      p.style.strokeDashoffset=len;
      p.style.transition=`stroke-dashoffset 1.1s cubic-bezier(.22,.7,.3,1) ${idx*0.18+0.15}s`;
      requestAnimationFrame(()=>requestAnimationFrame(()=>{p.style.strokeDashoffset='0';}));
    }catch(e){/* getTotalLength unsupported -> show final state */}
  });

  /* gentle parallax drift on background blobs */
  const blobs=[...document.querySelectorAll('.bg-blobs svg')];
  let tx=0,ty=0,cx=0,cy=0;
  window.addEventListener('pointermove',e=>{
    tx=(e.clientX/window.innerWidth-0.5);
    ty=(e.clientY/window.innerHeight-0.5);
  },{passive:true});
  (function drift(){
    cx+=(tx-cx)*0.04; cy+=(ty-cy)*0.04;
    blobs.forEach((b,i)=>{
      const k=(i+1)*8;
      b.style.transform=`translate(${(cx*k).toFixed(2)}px,${(cy*k).toFixed(2)}px)`;
    });
    requestAnimationFrame(drift);
  })();
}
</script>
