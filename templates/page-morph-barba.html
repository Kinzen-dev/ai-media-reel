<script type="module">
import * as THREE from "three";

/* ---------------------------------------------------------------------- *
 *  Liquid Page engine
 *  - one Three.js canvas persists across routes (only uniforms/textures swap)
 *  - native History API pushState routing (no framework, no barba dep)
 *  - noise-masked diagonal dissolve reveals the next page's accent
 *  - GLSL ES 1.0 robustness: NO dynamic-indexed local arrays; LUT uniform
 *  - DPR capped at 1 for the transition stage (cheap, full-viewport)
 *  - mobile / reduced-motion: CSS clip-path wipe instead of WebGL
 * ---------------------------------------------------------------------- */

const app    = document.getElementById("app");
const stage  = document.getElementById("stage");
const wipeEl = document.getElementById("wipe");
const topnav = document.getElementById("topnav");

const REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const MOBILE  = window.matchMedia("(max-width: 640px)").matches;

/* Base-aware routing: the data uses clean routes ("/", "/work/x") but the file
   may be served from any path (e.g. /templates/page-morph-barba.html). We keep
   pushState anchored to the document's own URL via a hash-suffix so:
     - relative assets ("../assets/..") keep resolving against the real file
     - hard reload / deep link still lands on a valid document
   URL shape: <file>#<route>  e.g. .../page-morph-barba.html#/work/nocturne   */
const DOC = location.pathname;                       // real served path of the file
const routeToUrl = (route) => DOC + (route === "/" ? "" : "#" + route);
const urlToRoute = () => {
  const h = location.hash.replace(/^#/, "");
  return PAGES.some(p => p.route === h) ? h : "/";
};

/* ------------------------- helpers ------------------------- */
const byRoute = (r) => PAGES.find(p => p.route === r) || PAGES[0];
const details = PAGES.filter(p => p.kind === "detail");
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c])); }
function hexToVec3(hex){
  const h = hex.replace("#","");
  return [parseInt(h.slice(0,2),16)/255, parseInt(h.slice(2,4),16)/255, parseInt(h.slice(4,6),16)/255];
}
function setAccent(hex){ document.documentElement.style.setProperty("--accent", hex); }

/* ------------------------- top nav ------------------------- */
function buildNav(activeRoute){
  topnav.innerHTML = details.map(p =>
    `<a href="${p.route}" data-link aria-current="${p.route===activeRoute?"page":"false"}">${escapeHtml(p.title)}</a>`
  ).join("");
}

/* ======================= VIEW RENDERERS ======================= */
function renderIndex(p){
  const titleHtml = p.title.split("\n").map((l,i)=> i===1?`<b>${escapeHtml(l)}</b>`:escapeHtml(l)).join("\n");
  const rows = details.map(d => `
    <a class="work-row" href="${d.route}" data-link data-accent="${d.accent}"
       style="--row-accent:${d.accent}" tabindex="0">
      <span class="wr-num">${escapeHtml(d.index)}</span>
      <span class="wr-name">${escapeHtml(d.title)}</span>
      <span class="wr-tag">${escapeHtml(d.eyebrow)}</span>
      <span class="wr-dot"></span>
    </a>`).join("");

  // pre-hovered = first detail; its accent already painted at scroll=0
  const hero = details[0];

  return `
  <section class="view idx" aria-label="Index">
    <div class="idx-left">
      <p class="idx-eyebrow">${escapeHtml(p.eyebrow)}</p>
      <h1 class="idx-title">${titleHtml}</h1>
      <p class="idx-blurb">${escapeHtml(p.blurb)}</p>
      <nav class="worklist" aria-label="Selected work">${rows}</nav>
    </div>
    <div class="idx-right">
      <div class="idx-hint"><span class="pulse"></span> Hover a work to load its world</div>
      <figure class="idx-figure" id="idxFigure">
        <img src="${hero.media.src}" alt="${escapeHtml(hero.sub||hero.title)}" decoding="async" />
      </figure>
      <div class="idx-fig-overlay">
        <div class="idx-fig-accentbar" id="idxBar"></div>
        <div class="idx-fig-label" id="idxLabel">${escapeHtml(hero.title)}</div>
        <div class="idx-fig-meta" id="idxMeta">${escapeHtml(hero.index)} / ${escapeHtml(hero.eyebrow)}</div>
      </div>
    </div>
  </section>`;
}

function renderDetail(p){
  const idx = details.findIndex(d => d.route === p.route);
  const next = details[(idx+1) % details.length];
  const facts = (p.facts||[]).map(([k,v]) =>
    `<div class="d-fact"><span class="k">${escapeHtml(k)}</span><span class="v">${escapeHtml(v)}</span></div>`).join("");

  let mediaHtml;
  if (p.media.type === "video"){
    mediaHtml = `<video src="${p.media.src}" poster="${p.media.poster}" muted loop playsinline preload="metadata"></video>`;
  } else {
    mediaHtml = `<img src="${p.media.src}" alt="${escapeHtml(p.sub||p.title)}" decoding="async" />`;
  }

  return `
  <section class="view detail" aria-label="${escapeHtml(p.title)}">
    <div class="detail-hero">
      <div class="detail-media">${mediaHtml}</div>
      <div class="detail-grade"></div>
      <div class="detail-frame"></div>
      <div class="detail-content">
        <div>
          <div class="d-index"><span class="bar"></span>${escapeHtml(p.index)}</div>
          <p class="d-eyebrow">${escapeHtml(p.eyebrow)}</p>
          <h1 class="d-title">${escapeHtml(p.title)}</h1>
          <p class="d-sub">${escapeHtml(p.sub)}</p>
        </div>
        <div class="d-side">
          <p class="d-body">${escapeHtml(p.body)}</p>
          <div class="d-facts">${facts}</div>
        </div>
      </div>
    </div>
    <nav class="detail-nav" aria-label="Pagination">
      <a class="navbtn back" href="/" data-link><small>Index</small> All work</a>
      <a class="navbtn" href="${next.route}" data-link data-accent="${next.accent}">
        <small>Next ${escapeHtml(next.index)}</small> ${escapeHtml(next.title)}
      </a>
    </nav>
  </section>`;
}

/* ======================= INDEX INTERACTIONS ======================= */
let idxHotIndex = 0;
/* engagement gate: the scroll=0 hero is the pre-hovered Nocturne/amber world.
   A cursor that merely RESTS on a row at load (no real user gesture) fires
   mouseenter and would hijack the hero - which also corrupts the catalog
   thumbnail (a no-interaction scroll=0 shot). So a row hover only swaps the
   world AFTER a genuine pointer move / key intent. Keyboard focus is itself an
   intent, so it flips the gate on. */
let userEngaged = false;
function markEngaged(){ userEngaged = true; }
window.addEventListener("pointermove", markEngaged, { once: true, passive: true });
window.addEventListener("wheel",       markEngaged, { once: true, passive: true });
window.addEventListener("keydown",     markEngaged, { once: true });
window.addEventListener("touchstart",  markEngaged, { once: true, passive: true });

function wireIndex(activeRoute){
  const rows  = [...app.querySelectorAll(".work-row")];
  const fig   = document.getElementById("idxFigure");
  const label = document.getElementById("idxLabel");
  const meta  = document.getElementById("idxMeta");
  const bar   = document.getElementById("idxBar");
  if (!rows.length) return;

  function hot(i){
    idxHotIndex = i;
    const d = details[i];
    rows.forEach((r,j)=> r.classList.toggle("hot", j===i));
    setAccent(d.accent);
    if (fig){
      const im = fig.querySelector("img");
      if (im && !im.src.endsWith(d.media.src.replace("../",""))) {
        // swap the hero image to the hovered world
        im.src = d.media.src;
        im.alt = d.sub || d.title;
      }
    }
    if (label) label.textContent = d.title;
    if (meta)  meta.textContent = d.index + " / " + d.eyebrow;
    if (bar)   bar.style.background = d.accent;
  }

  rows.forEach((row,i)=>{
    // only react to a hover once the user has actually moved the pointer;
    // keeps scroll=0 deterministic on the pre-hovered hero for the thumbnail
    row.addEventListener("mouseenter", ()=>{ if (userEngaged) hot(i); });
    row.addEventListener("focus", ()=>{ userEngaged = true; hot(i); });
  });

  // scroll=0 pre-hover: first work's world is already composed + colored
  hot(0);
}

/* ======================= VIDEO IN-VIEW PLAY ======================= */
let mediaObserver = null;
function wireMedia(){
  if (mediaObserver){ mediaObserver.disconnect(); mediaObserver = null; }
  const vids = [...app.querySelectorAll("video")];
  if (!vids.length) return;
  mediaObserver = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      const v = e.target;
      if (e.isIntersecting && !REDUCED){ v.play().catch(()=>{}); }
      else { v.pause(); }
    });
  }, { threshold: 0.35 });
  vids.forEach(v=> mediaObserver.observe(v));
}

/* =========================================================================
 *  WEBGL DISSOLVE STAGE  (one persistent canvas)
 * ========================================================================= */
let GL = null;            // { renderer, scene, camera, mesh, mat, ok }
let webglEnabled = !MOBILE && !REDUCED;

/* noise-threshold LUT: precomputed 16-step ramp passed as a uniform array.
   Avoids GLSL ES 1.0 dynamic local-array indexing (ANGLE returns 0). */
const LUT_N = 16;
function buildLUT(){
  const lut = [];
  for (let i=0;i<LUT_N;i++){ lut.push(0.04 + 0.92 * (i/(LUT_N-1))); }
  return lut;
}

const VERT = `
  varying vec2 vUv;
  void main(){ vUv = uv; gl_Position = vec4(position, 1.0); }
`;

/* Fragment shader:
   - simplex-ish value noise (no texture dependency, no dynamic arrays)
   - progress sweeps a diagonal band; noise perturbs the edge -> dissolve
   - reveals uColorTo accent over uColorFrom accent
   - LUT only read via constant-foldable / loop-constant index (safe) */
const FRAG = `
  precision highp float;
  varying vec2 vUv;
  uniform vec2  uRes;
  uniform float uProg;       // 0..1 transition progress
  uniform vec3  uFrom;       // outgoing accent
  uniform vec3  uTo;         // incoming accent
  uniform float uLut[${LUT_N}];
  uniform float uTime;

  // hash + value noise (cheap, deterministic)
  float hash(vec2 p){
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
  }
  float vnoise(vec2 p){
    vec2 i = floor(p), f = fract(p);
    float a = hash(i);
    float b = hash(i + vec2(1.0,0.0));
    float c = hash(i + vec2(0.0,1.0));
    float d = hash(i + vec2(1.0,1.0));
    vec2 u = f*f*(3.0-2.0*f);
    return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
  }
  float fbm(vec2 p){
    float v = 0.0, amp = 0.5;
    // fixed unrolled-by-compiler loop; constant trip count = safe
    for(int k=0;k<5;k++){
      v += amp * vnoise(p);
      p *= 2.02; amp *= 0.5;
    }
    return v;
  }

  void main(){
    vec2 uv = vUv;
    float aspect = uRes.x / max(uRes.y, 1.0);

    // diagonal coordinate (top-left -> bottom-right sweep)
    float diag = (uv.x * 0.62 + (1.0 - uv.y) * 0.38);

    // noisy edge field
    vec2 np = vec2(uv.x * aspect, uv.y) * 3.4;
    float n = fbm(np + uTime * 0.04);

    // LUT-quantized noise threshold band (LUT read by loop-const index)
    float lutMix = 0.0;
    for(int i=0;i<${LUT_N};i++){
      // step contributions: builds a smoothed ramp from the LUT uniform
      float w = (n > float(i)/float(${LUT_N}-1)) ? 1.0 : 0.0;
      lutMix += w * (uLut[i] / float(${LUT_N}));
    }
    float thresh = lutMix; // ~0..0.95 dissolve threshold per fragment

    // sweep: progress expands a band; mask = where new color has dissolved in
    float edge = uProg * 1.55 - 0.28;
    float reveal = smoothstep(edge - 0.16, edge + 0.16, diag + (thresh - 0.5) * 0.55);
    // invert so 0 progress = all-from, 1 progress = all-to
    float m = 1.0 - reveal;

    // bright dissolve crest at the moving boundary
    float crest = smoothstep(0.0, 0.5, 1.0 - abs(diag + (thresh-0.5)*0.55 - edge) * 6.0);

    vec3 col = mix(uFrom, uTo, m);
    // grain + crest glow
    float grain = (hash(uv * uRes.xy * 0.5 + uTime) - 0.5) * 0.05;
    col += crest * 0.6 * uTo;
    col += grain;

    // darken toward void at the extremes so it reads against #070708
    col *= 0.92 + 0.08 * m;

    gl_FragColor = vec4(col, 1.0);
  }
`;

function initGL(){
  if (GL || !webglEnabled) return;
  let renderer;
  try {
    renderer = new THREE.WebGLRenderer({
      antialias: false,
      alpha: false,
      preserveDrawingBuffer: true,   // so a painted frame can be captured
      powerPreference: "high-performance"
    });
  } catch(e){ webglEnabled = false; return; }

  const gl = renderer.getContext();
  if (!gl){ webglEnabled = false; return; }

  renderer.setPixelRatio(1);          // DPR capped at 1 for the stage
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  stage.appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.Camera();  // fullscreen tri, no projection needed

  const from = hexToVec3(PAGES[1] ? PAGES[1].accent : "#e8b84b");
  const mat = new THREE.ShaderMaterial({
    vertexShader: VERT,
    fragmentShader: FRAG,
    uniforms: {
      uRes:  { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
      uProg: { value: 0.0 },
      uFrom: { value: new THREE.Vector3(...from) },
      uTo:   { value: new THREE.Vector3(...from) },
      uLut:  { value: buildLUT() },
      uTime: { value: 0.0 }
    }
  });

  const geo  = new THREE.PlaneGeometry(2, 2);
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  // PAINT-CONFIRM: render one frame and read a pixel; if blank, disable WebGL.
  mat.uniforms.uProg.value = 0.5;
  renderer.render(scene, camera);
  let painted = true;
  try {
    const px = new Uint8Array(4);
    gl.readPixels(Math.floor(window.innerWidth/2), Math.floor(window.innerHeight/2), 1, 1, gl.RGBA, gl.UNSIGNED_BYTE, px);
    painted = (px[0] + px[1] + px[2]) > 6; // non-blank
  } catch(e){ painted = true; } // readPixels can throw on some contexts; trust render
  mat.uniforms.uProg.value = 0.0;

  if (!painted){
    renderer.dispose();
    stage.removeChild(renderer.domElement);
    webglEnabled = false;
    GL = null;
    return;
  }

  GL = { renderer, scene, camera, mesh, mat, ok: true, raf: 0 };

  window.addEventListener("resize", ()=>{
    if (!GL) return;
    GL.renderer.setSize(window.innerWidth, window.innerHeight, false);
    GL.mat.uniforms.uRes.value.set(window.innerWidth, window.innerHeight);
  });
}

/* run the WebGL dissolve; resolves when fully covered (swap point) and
   when fully cleared (done). We do it in two callbacks. */
function runDissolveWebGL(fromHex, toHex, onCovered){
  return new Promise((resolve)=>{
    if (!GL){ onCovered && onCovered(); resolve(); return; }
    stage.classList.add("active");
    const m = GL.mat.uniforms;
    m.uFrom.value.set(...hexToVec3(fromHex));
    m.uTo.value.set(...hexToVec3(toHex));
    const t0 = performance.now();
    const DUR_IN  = 520;  // cover
    const DUR_OUT = 520;  // clear (to-color fills then fades to reveal page)
    let covered = false;

    cancelAnimationFrame(GL.raf);
    const tick = (now)=>{
      const t = now - t0;
      m.uTime.value = now * 0.001;
      if (t <= DUR_IN){
        // 0 -> ~0.5 : new color dissolving in across the diagonal
        m.uProg.value = (t / DUR_IN) * 0.52;
      } else if (!covered) {
        covered = true;
        m.uProg.value = 0.52;
        GL.renderer.render(GL.scene, GL.camera);
        onCovered && onCovered();   // swap DOM under the cover
        // continue to clear phase
      }
      if (t > DUR_IN){
        const t2 = Math.min((t - DUR_IN) / DUR_OUT, 1.0);
        // 0.52 -> 1.0 : the to-color sweeps off, revealing the new page
        m.uProg.value = 0.52 + t2 * 0.48;
        if (t2 >= 1.0){
          GL.renderer.render(GL.scene, GL.camera);
          stage.classList.remove("active");
          resolve();
          return;
        }
      }
      GL.renderer.render(GL.scene, GL.camera);
      GL.raf = requestAnimationFrame(tick);
    };
    GL.raf = requestAnimationFrame(tick);
  });
}

/* CSS clip-path diagonal wipe (mobile / reduced-motion / WebGL-failed) */
function runWipeCSS(toHex, onCovered){
  return new Promise((resolve)=>{
    if (REDUCED){ onCovered && onCovered(); resolve(); return; }
    wipeEl.style.background = toHex;
    wipeEl.classList.remove("run");
    void wipeEl.offsetWidth; // reflow to restart
    let swapped = false;
    const swapAt = setTimeout(()=>{ swapped = true; onCovered && onCovered(); }, 300);
    const done = ()=>{
      wipeEl.classList.remove("run");
      wipeEl.style.opacity = "0";
      clearTimeout(swapAt);
      if (!swapped){ onCovered && onCovered(); }
      resolve();
    };
    wipeEl.addEventListener("animationend", done, { once: true });
    wipeEl.classList.add("run");
    // safety timeout
    setTimeout(done, 760);
  });
}

/* ======================= ROUTING ======================= */
let currentRoute = null;
let transitioning = false;

function paintRoute(route){
  const p = byRoute(route);
  setAccent(p.accent);
  buildNav(p.route);
  app.innerHTML = (p.kind === "index") ? renderIndex(p) : renderDetail(p);
  // mark current view shown
  const v = app.querySelector(".view"); if (v) v.classList.add("show");
  if (p.kind === "index") wireIndex(p.route);
  wireMedia();
  window.scrollTo(0,0);
  currentRoute = route;
  document.title = (p.kind==="index" ? "Liquid Page" : p.title + " - Liquid Page");
}

async function navigate(route, push=true){
  if (transitioning || route === currentRoute){ return; }
  const fromPage = byRoute(currentRoute || "/");
  const toPage   = byRoute(route);
  transitioning = true;

  const swap = ()=>{
    paintRoute(route);
    if (push){ history.pushState({ route }, "", routeToUrl(route)); }
  };

  if (webglEnabled && GL){
    await runDissolveWebGL(fromPage.accent, toPage.accent, swap);
  } else {
    await runWipeCSS(toPage.accent, swap);
  }
  transitioning = false;
}

/* intercept internal links */
document.addEventListener("click", (e)=>{
  const a = e.target.closest("a[data-link]");
  if (!a) return;
  const href = a.getAttribute("href");
  if (!href || href.startsWith("http")) return;
  e.preventDefault();
  navigate(href, true);
});

window.addEventListener("popstate", (e)=>{
  const route = (e.state && e.state.route) || urlToRoute();
  // popstate: animate but do not push again
  if (route === currentRoute){ return; }
  const fromPage = byRoute(currentRoute || "/");
  const toPage   = byRoute(route);
  transitioning = true;
  const swap = ()=> paintRoute(route);
  const runner = (webglEnabled && GL)
    ? runDissolveWebGL(fromPage.accent, toPage.accent, swap)
    : runWipeCSS(toPage.accent, swap);
  runner.then(()=>{ transitioning = false; });
});

/* ======================= BOOT ======================= */
function boot(){
  // resolve the start route from the hash suffix (deep link), else index
  const start = urlToRoute();

  // init WebGL stage first so the paint-confirm runs before any transition
  if (webglEnabled){ initGL(); }

  // first paint = composed page at scroll=0 (index shows pre-hovered world)
  paintRoute(start);
  history.replaceState({ route: start }, "", routeToUrl(start));
}

if (document.readyState === "loading"){
  document.addEventListener("DOMContentLoaded", boot);
} else { boot(); }
</script>
</body>
