<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Constellation - a night sky of works</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DATA lives in <script> at the very top of the body.
   Visual system below. Palette:
     deep space navy #060914 + star white + one cyan connector
   ============================================================ */
:root{
  --navy:#060914;
  --navy-2:#0a1020;
  --star:#f2f6ff;
  --cyan:#5fe3ff;
  --cyan-dim:rgba(95,227,255,.30);
  --muted:#8a94b3;
  --line:rgba(143,160,200,.16);
  --maxw:1400px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--navy);
  color:var(--star);
  font-family:"Space Grotesk",system-ui,sans-serif;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
/* deep radial vignette behind the canvas for depth */
.space{
  position:fixed;inset:0;
  background:
    radial-gradient(120% 90% at 70% 18%, #0d1426 0%, rgba(8,11,22,0) 55%),
    radial-gradient(140% 120% at 18% 92%, #0a1226 0%, rgba(6,9,20,0) 50%),
    var(--navy);
  z-index:0;
}
canvas#sky{
  position:fixed;inset:0;width:100%;height:100%;
  z-index:1;display:block;touch-action:none;cursor:grab;
}
canvas#sky.dragging{cursor:grabbing}
canvas#sky:focus-visible{outline:2px solid var(--cyan);outline-offset:-4px}

/* ---------- chrome / header ---------- */
.frame{position:fixed;inset:0;z-index:3;pointer-events:none}
.frame .inner{max-width:var(--maxw);margin:0 auto;height:100%;padding:clamp(18px,3vw,34px);
  display:flex;flex-direction:column;justify-content:space-between}
header,footer{pointer-events:none}
.brand{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brand .mark{
  font-family:"Fraunces",serif;font-weight:400;font-size:clamp(20px,2.4vw,30px);
  letter-spacing:.01em;line-height:1;
}
.brand .mark b{font-weight:500;font-style:italic;color:var(--cyan)}
.brand .tag{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted)}
.lede{margin-top:14px;max-width:38ch;color:var(--muted);font-size:clamp(13px,1.4vw,15px);line-height:1.6}
.lede em{color:var(--star);font-style:normal}

footer{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap}
.legend{display:flex;gap:20px;flex-wrap:wrap;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
.legend span{display:flex;align-items:center;gap:8px}
.legend i{width:18px;height:1px;background:var(--cyan);display:inline-block;box-shadow:0 0 6px var(--cyan)}
.legend .dot{width:7px;height:7px;border-radius:50%;background:var(--star);box-shadow:0 0 8px var(--star)}
.hint{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);text-align:right}
.hint kbd{font-family:inherit;color:var(--cyan);border:1px solid var(--cyan-dim);border-radius:5px;padding:2px 7px;font-size:10px;letter-spacing:.1em}

/* ---------- floating count / reset ---------- */
.controls{position:fixed;z-index:4;right:clamp(14px,3vw,34px);top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:10px;pointer-events:auto}
.controls button{
  pointer-events:auto;font-family:inherit;font-size:11px;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);background:rgba(12,18,34,.6);border:1px solid var(--line);border-radius:999px;
  padding:9px 14px;cursor:pointer;backdrop-filter:blur(8px);transition:.25s;white-space:nowrap}
.controls button:hover{color:var(--star);border-color:var(--cyan-dim)}
.controls button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

/* ---------- the opened work (lightbox) ---------- */
.viewer{
  position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
  padding:clamp(16px,4vw,56px);
  background:radial-gradient(120% 120% at 50% 40%, rgba(6,9,20,.72), rgba(4,6,14,.95));
  backdrop-filter:blur(10px);
  opacity:0;visibility:hidden;transition:opacity .5s ease, visibility .5s;
}
.viewer.open{opacity:1;visibility:visible}
.viewer-card{
  width:min(1100px,100%);max-height:100%;
  display:grid;grid-template-columns:1.35fr .8fr;gap:0;
  background:linear-gradient(180deg,#0b1226,#080d1c);
  border:1px solid rgba(95,227,255,.18);border-radius:18px;overflow:hidden;
  box-shadow:0 40px 120px -30px rgba(0,0,0,.8), 0 0 80px -20px rgba(95,227,255,.18);
  transform:translateY(22px) scale(.97);transition:transform .55s cubic-bezier(.2,.9,.2,1);
}
.viewer.open .viewer-card{transform:none}
.stage{
  position:relative;background:#04060e;min-height:0;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
/* CRITICAL: media is contained, never cover-cropped. Landscape stays letterboxed. */
.stage img,.stage video{
  max-width:100%;max-height:100%;width:auto;height:auto;display:block;object-fit:contain;
}
.stage .glb{width:100%;height:100%;min-height:320px;border:0;background:#04060e}
.badge{
  position:absolute;top:14px;left:14px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--cyan);background:rgba(6,12,24,.7);border:1px solid var(--cyan-dim);
  border-radius:999px;padding:5px 11px;backdrop-filter:blur(6px)
}
.meta{padding:clamp(22px,3vw,34px);display:flex;flex-direction:column;gap:16px;overflow:auto}
.meta .const{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--cyan)}
.meta h2{font-family:"Fraunces",serif;font-weight:400;font-size:clamp(24px,3vw,34px);line-height:1.1}
.meta h2 em{font-style:italic}
.meta p{color:var(--muted);font-size:14px;line-height:1.7}
.meta .tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.meta .tags span{font-size:11px;letter-spacing:.08em;color:var(--star);border:1px solid var(--line);border-radius:999px;padding:5px 11px}
.meta .links{display:flex;gap:14px;align-items:center;margin-top:auto;padding-top:10px}
.meta .pager{display:flex;gap:10px}
.iconbtn{
  pointer-events:auto;font-family:inherit;font-size:12px;letter-spacing:.05em;color:var(--muted);
  background:transparent;border:1px solid var(--line);border-radius:10px;padding:9px 14px;cursor:pointer;transition:.22s
}
.iconbtn:hover{color:var(--star);border-color:var(--cyan-dim)}
.iconbtn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.iconbtn.audio{display:none}
.close{
  position:fixed;top:clamp(16px,3vw,30px);right:clamp(16px,3vw,30px);z-index:9;
  width:46px;height:46px;border-radius:50%;display:grid;place-items:center;
  background:rgba(12,18,34,.66);border:1px solid var(--line);color:var(--star);cursor:pointer;
  backdrop-filter:blur(8px);transition:.25s;font-size:18px;line-height:1
}
.viewer.open .close{display:grid}
.close{display:none}
.close:hover{border-color:var(--cyan-dim);transform:rotate(90deg)}
.close:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

/* ---------- tooltip rendered in DOM for crisp text ---------- */
#tip{
  position:fixed;z-index:5;pointer-events:none;opacity:0;transform:translate(-50%,0);
  transition:opacity .18s ease;will-change:transform,opacity;
  background:rgba(8,13,26,.82);border:1px solid var(--cyan-dim);border-radius:11px;
  padding:9px 13px;backdrop-filter:blur(8px);max-width:240px;
  box-shadow:0 12px 40px -12px rgba(0,0,0,.7)
}
#tip .t{font-family:"Fraunces",serif;font-size:15px;line-height:1.15;white-space:nowrap}
#tip .s{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);margin-top:3px}

/* ---------- mobile ---------- */
@media (max-width:880px){
  .viewer-card{grid-template-columns:1fr;grid-template-rows:auto 1fr;max-height:100%}
  .stage{max-height:52vh}
  .meta{max-height:46vh}
  .controls{top:auto;bottom:calc(env(safe-area-inset-bottom) + 84px);transform:none;flex-direction:row}
  .lede{display:none}
}
@media (max-width:640px){
  .frame .inner{padding:16px}
  .hint{display:none}
  .legend{gap:14px;font-size:10px}
  /* phone: full-width stacked card; landscape media letterboxes, never cover-crops */
  .viewer{padding:0}
  .viewer-card{width:100%;height:100%;max-height:100%;border-radius:0;border:0;grid-template-rows:auto 1fr}
  .stage{max-height:46vh;width:100%;background:#04060e}
  .stage img,.stage video{
    width:100%;height:100%;max-width:100%;max-height:100%;
    object-fit:contain;object-position:center; /* letterbox a 16:9 clip inside a narrow stage */
  }
  .stage .glb{min-height:0}
  .meta{max-height:none}
}
@media (max-width:380px){
  .legend span:nth-child(3){display:none}
}

/* ---------- reduced motion: kill drift, twinkle, transitions; show static sky ---------- */
@media (prefers-reduced-motion:reduce){
  *{transition-duration:.001ms !important}
  .close:hover{transform:none}
}
.noscript{position:fixed;inset:0;display:grid;place-items:center;z-index:20;color:var(--muted);padding:24px;text-align:center}
</style>

<script>
(() => {
"use strict";
const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const touch  = window.matchMedia("(hover: none), (pointer: coarse)").matches;

/* ---------- canvas setup ---------- */
const cv = document.getElementById("sky");
const ctx = cv.getContext("2d", { alpha:true });
let W=0, H=0, DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
  cv.style.width = W+"px"; cv.style.height = H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layout();
  requestFrame(); // repaint after relayout (matters on reduced-motion, where the loop is on-demand)
}
window.addEventListener("resize", resize);

/* ---------- seeded layout: golden-angle spiral, grouped by constellation ---------- */
const GOLDEN = Math.PI * (3 - Math.sqrt(5));
const groups = [...new Set(DATA.map(d=>d.constellation))];

// color per constellation kept subtle - all stars are white; line is the single cyan.
let nodes = [];
function layout(){
  const cx = W*0.5, cy = H*0.5;
  // base radius scales with the smaller viewport dim so it fits portrait phones
  const R = Math.min(W,H) * (touch ? 0.40 : 0.46);
  nodes = DATA.map((d,i) => {
    // spiral position, then nudged toward the group's own anchor so clusters read
    const a = i*GOLDEN;
    const r = R * Math.sqrt((i+0.6)/DATA.length);
    const gi = groups.indexOf(d.constellation);
    const ga = (gi/groups.length)*Math.PI*2;
    const gx = Math.cos(ga)*R*0.62, gy = Math.sin(ga)*R*0.62;
    let bx = cx + Math.cos(a)*r;
    let by = cy + Math.sin(a)*r*0.82;
    // blend 55% toward the group anchor so same-constellation stars sit near each other
    bx = bx*0.45 + (cx+gx)*0.55;
    by = by*0.45 + (cy+gy)*0.55;
    const prev = nodes[i];
    return {
      d, i, group:d.constellation,
      bx, by,                       // base (anchor) position
      x: prev? prev.x : bx,         // animated position
      y: prev? prev.y : by,
      mag: d.mag||1,
      // per-star twinkle phase + drift seed
      tw: (i*97.13)%(Math.PI*2),
      drx: Math.cos(i*2.4)*1, dry: Math.sin(i*1.7)*1,
      poster:null, posterReady:false
    };
  });
  // links: connect each star to the next star sharing its constellation (ring per group)
  links = [];
  groups.forEach(g=>{
    const gn = nodes.filter(n=>n.group===g);
    for(let k=0;k<gn.length;k++){
      const a=gn[k], b=gn[(k+1)%gn.length];
      if(gn.length>1 && !(gn.length===2 && k===1)) links.push([a,b]);
    }
  });
}
let links = [];

/* lazily load poster thumbnails for the glow (only what we draw) */
function ensurePoster(n){
  if(n.poster || n._loading) return;
  n._loading = true;
  const img = new Image();
  img.onload = ()=>{ n.poster=img; n.posterReady=true; };
  img.onerror = ()=>{ n._loading=false; };
  img.src = n.d.poster || n.d.src;
}

/* ---------- interaction state ---------- */
let pan = {x:0,y:0};            // pan offset
let target = {x:0,y:0};
let mouse = {x:W/2,y:H/2,active:false};
let parallax = {x:0,y:0};
let hovered = null;
let focusIdx = 0;               // keyboard focus
let dragging=false, dragStart=null, panStart=null, moved=0;

function screenPos(n){
  // base + gentle per-star drift + global pan + mouse parallax (depth by magnitude)
  const depth = 0.6 + (n.mag-0.8)*0.8;
  return {
    x: n.x + pan.x + parallax.x*depth*0.6,
    y: n.y + pan.y + parallax.y*depth*0.6
  };
}

/* ---------- pointer handling ---------- */
function evtPos(e){
  const t = e.touches ? e.touches[0] : e;
  return { x:t.clientX, y:t.clientY };
}
cv.addEventListener("pointerdown", e=>{
  cv.setPointerCapture(e.pointerId);
  dragging=true; moved=0;
  dragStart=evtPos(e); panStart={...pan};
  cv.classList.add("dragging");
});
cv.addEventListener("pointermove", e=>{
  const p = evtPos(e);
  mouse.x=p.x; mouse.y=p.y; mouse.active=true;
  if(dragging){
    pan.x = panStart.x + (p.x-dragStart.x);
    pan.y = panStart.y + (p.y-dragStart.y);
    target.x = pan.x; target.y = pan.y;
    moved += Math.abs(p.x-dragStart.x)+Math.abs(p.y-dragStart.y);
  } else {
    hitTest(p.x,p.y);
  }
  requestFrame();
});
function endDrag(){ dragging=false; cv.classList.remove("dragging"); }
cv.addEventListener("pointerup", e=>{
  endDrag();
  if(moved<6){ // treat as click/tap
    const p=evtPos(e);
    const hit = pick(p.x,p.y);
    if(hit) openWork(hit.i);
  }
});
cv.addEventListener("pointercancel", endDrag);
cv.addEventListener("pointerleave", ()=>{ mouse.active=false; if(!touch){ hovered=null; hideTip(); requestFrame(); } });

/* parallax target follows mouse (not on touch) */
window.addEventListener("mousemove", e=>{
  if(touch||reduce) return;
  const nx=(e.clientX/W-0.5), ny=(e.clientY/H-0.5);
  pmTarget.x = -nx*46; pmTarget.y = -ny*46;
});
let pmTarget={x:0,y:0};

/* pick the star under a screen coordinate */
function pick(sx,sy){
  let best=null, bd=1e9;
  for(const n of nodes){
    const p=screenPos(n);
    const rad = starRadius(n)+12;
    const dx=sx-p.x, dy=sy-p.y, dist=dx*dx+dy*dy;
    if(dist< rad*rad && dist<bd){ bd=dist; best=n; }
  }
  return best;
}
function hitTest(sx,sy){
  const hit=pick(sx,sy);
  if(hit!==hovered){
    hovered=hit;
    if(hit){ showTip(hit); cv.style.cursor="pointer"; }
    else  { hideTip(); cv.style.cursor=dragging?"grabbing":"grab"; }
  } else if(hit){ showTip(hit); }
}
function starRadius(n){
  return (touch?5.4:4.4) * n.mag;
}

/* ---------- tooltip (DOM, crisp text) ---------- */
const tip=document.getElementById("tip");
const tipT=tip.querySelector(".t"), tipS=tip.querySelector(".s");
function showTip(n){
  const p=screenPos(n);
  tipT.textContent=n.d.title;
  tipS.textContent=n.group;
  tip.style.left=p.x+"px";
  tip.style.top=(p.y - starRadius(n) - 54)+"px";
  tip.style.opacity="1";
}
function hideTip(){ tip.style.opacity="0"; }

/* ---------- keyboard ---------- */
cv.addEventListener("keydown", e=>{
  if(["ArrowRight","ArrowDown"].includes(e.key)){ focusIdx=(focusIdx+1)%nodes.length; focusStar(); e.preventDefault(); }
  else if(["ArrowLeft","ArrowUp"].includes(e.key)){ focusIdx=(focusIdx-1+nodes.length)%nodes.length; focusStar(); e.preventDefault(); }
  else if(e.key==="Enter"||e.key===" "){ openWork(nodes[focusIdx].d ? focusIdx : 0); e.preventDefault(); }
});
function focusStar(){
  const n=nodes[focusIdx];
  hovered=n; showTip(n);
  // re-center pan so the focused star drifts toward center
  const p=screenPos(n);
  target.x += (W/2 - p.x); target.y += (H/2 - p.y);
  requestFrame();
}

/* ---------- recenter ---------- */
document.getElementById("recenter").addEventListener("click", ()=>{
  target.x=0; target.y=0; hovered=null; hideTip();
  requestFrame();
});

/* ============================================================
   RENDER LOOP
   ============================================================ */
let t0=performance.now();
let rafPending=false;
/* On reduced-motion the loop is NOT perpetual: we render on demand and snap
   pan instantly, so there is no idle animation and no continuous rAF churn. */
function requestFrame(){
  if(reduce && !rafPending){ rafPending=true; requestAnimationFrame(frame); }
}
function frame(now){
  rafPending=false;
  const dt=Math.min(2,(now-t0)/16.67); t0=now;
  if(reduce){
    // snap directly to target: drag / recenter / keyboard land with no drift
    pan.x=target.x; pan.y=target.y;
    parallax.x=0; parallax.y=0;
    draw(now);
    if(hovered) showTip(hovered);
    return; // do not self-schedule; interaction handlers re-request a frame
  }
  // ease pan + parallax (motion allowed)
  pan.x += (target.x-pan.x)*0.08*dt;
  pan.y += (target.y-pan.y)*0.08*dt;
  parallax.x += (pmTarget.x-parallax.x)*0.05*dt;
  parallax.y += (pmTarget.y-parallax.y)*0.05*dt;
  draw(now);
  if(hovered) showTip(hovered);
  requestAnimationFrame(frame);
}

function draw(now){
  ctx.clearRect(0,0,W,H);
  const time = reduce ? 0 : now*0.001;

  // ---- background dust: cheap static-ish star specks (deterministic) ----
  drawDust(time);

  // ---- constellation lines ----
  // a line lights up (cyan) when either endpoint is hovered/focused
  const lit = hovered || nodes[focusIdx];
  ctx.lineWidth=1;
  for(const [a,b] of links){
    const pa=screenPos(a), pb=screenPos(b);
    const active = lit && (a.group===lit.group);
    ctx.beginPath();
    ctx.moveTo(pa.x,pa.y); ctx.lineTo(pb.x,pb.y);
    if(active){
      const g=ctx.createLinearGradient(pa.x,pa.y,pb.x,pb.y);
      g.addColorStop(0,"rgba(95,227,255,.65)");
      g.addColorStop(.5,"rgba(95,227,255,.9)");
      g.addColorStop(1,"rgba(95,227,255,.65)");
      ctx.strokeStyle=g; ctx.lineWidth=1.4;
      ctx.shadowColor="rgba(95,227,255,.8)"; ctx.shadowBlur=8;
    }else{
      ctx.strokeStyle="rgba(143,160,200,.12)"; ctx.lineWidth=1; ctx.shadowBlur=0;
    }
    ctx.stroke();
  }
  ctx.shadowBlur=0;

  // ---- stars (only visible ones; clip to viewport with margin) ----
  for(const n of nodes){
    const p=screenPos(n);
    if(p.x<-80||p.x>W+80||p.y<-80||p.y>H+80) continue;
    const r = starRadius(n);
    const tw = reduce ? 0.85 : 0.62 + 0.38*Math.sin(time*1.8 + n.tw); // twinkle
    const isHover = (n===hovered) || (n===nodes[focusIdx] && document.activeElement===cv);
    const groupLit = lit && n.group===lit.group;

    // halo
    const haloR = r * (isHover? 7 : groupLit? 4.4 : 3.2);
    const grad = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,haloR);
    const a0 = (isHover?0.55:0.32)*tw;
    grad.addColorStop(0, isHover? `rgba(95,227,255,${a0})` : `rgba(190,215,255,${a0})`);
    grad.addColorStop(.5,`rgba(95,227,255,${0.08*tw})`);
    grad.addColorStop(1,"rgba(95,227,255,0)");
    ctx.fillStyle=grad;
    ctx.beginPath(); ctx.arc(p.x,p.y,haloR,0,Math.PI*2); ctx.fill();

    // core
    ctx.beginPath();
    ctx.arc(p.x,p.y, r*(isHover?1.5:1)*(0.85+0.15*tw), 0, Math.PI*2);
    ctx.fillStyle = isHover ? "#eaffff" : "#f2f6ff";
    ctx.shadowColor = isHover? "rgba(95,227,255,.95)" : "rgba(210,230,255,.7)";
    ctx.shadowBlur = isHover? 18 : 8*tw;
    ctx.fill();
    ctx.shadowBlur=0;

    // diffraction spikes on the brightest / hovered stars
    if(isHover || n.mag>1.15){
      const spike = r*(isHover?6:3.2)*tw;
      ctx.strokeStyle = isHover? "rgba(95,227,255,.5)" : `rgba(200,225,255,${0.25*tw})`;
      ctx.lineWidth = isHover?1.2:0.8;
      ctx.beginPath();
      ctx.moveTo(p.x-spike,p.y); ctx.lineTo(p.x+spike,p.y);
      ctx.moveTo(p.x,p.y-spike); ctx.lineTo(p.x,p.y+spike);
      ctx.stroke();
    }
  }
}

/* deterministic background dust without allocating per-frame arrays */
const DUST=[];
(function seedDust(){
  let s=1337;
  const rnd=()=>{ s=(s*1103515245+12345)&0x7fffffff; return s/0x7fffffff; };
  for(let i=0;i<150;i++) DUST.push({rx:rnd(),ry:rnd(),m:rnd(),ph:rnd()*6.28});
})();
function drawDust(time){
  for(const d of DUST){
    const x=d.rx*W + parallax.x*0.18*(0.4+d.m);
    const y=d.ry*H + parallax.y*0.18*(0.4+d.m);
    const tw = reduce?0.5:0.3+0.3*Math.sin(time*1.2+d.ph);
    ctx.globalAlpha = (0.12 + 0.4*d.m)*tw;
    ctx.fillStyle = d.m>0.85? "#cfe0ff" : "#9fb2d8";
    ctx.fillRect(x, y, d.m>0.9?1.6:1, d.m>0.9?1.6:1);
  }
  ctx.globalAlpha=1;
}

/* ============================================================
   VIEWER / LIGHTBOX  -  one video at a time
   ============================================================ */
const viewer=document.getElementById("viewer");
const vStage=document.getElementById("vStage");
const vConst=document.getElementById("vConst");
const vTitle=document.getElementById("vTitle");
const vBlurb=document.getElementById("vBlurb");
const vTags=document.getElementById("vTags");
const vAudio=document.getElementById("vAudio");
const vClose=document.getElementById("vClose");
let curIdx=-1, curVideo=null, lastFocus=null;

function clearStage(){
  if(curVideo){ try{ curVideo.pause(); }catch(e){} curVideo.removeAttribute("src"); curVideo.load&&curVideo.load(); curVideo=null; }
  vStage.innerHTML="";
}

function openWork(i){
  const n = nodes[i]; if(!n) return;
  const d = n.d;
  curIdx=i; focusIdx=i;
  lastFocus = document.activeElement;
  clearStage();

  vConst.textContent = d.constellation;
  vTitle.innerHTML = `<em>${d.title}</em>`;
  vBlurb.textContent = d.blurb;
  vTags.innerHTML = (d.tags||[]).map(t=>`<span>${t}</span>`).join("");

  const badge=document.createElement("div"); badge.className="badge"; badge.textContent=d.type;
  vStage.appendChild(badge);

  if(d.type==="video"){
    const v=document.createElement("video");
    v.src=d.src; v.poster=d.poster||""; v.playsInline=true; v.loop=true;
    v.muted = !d.audio; v.setAttribute("playsinline","");
    v.preload="metadata";
    vStage.appendChild(v);
    curVideo=v;
    // play only this one
    const p=v.play(); if(p&&p.catch) p.catch(()=>{});
    // audio toggle
    if(d.audio){
      vAudio.style.display="inline-block";
      vAudio.textContent = v.muted? "Unmute" : "Mute";
      vAudio.onclick=()=>{ v.muted=!v.muted; vAudio.textContent=v.muted?"Unmute":"Mute"; };
    } else { vAudio.style.display="none"; }
  } else if(d.type==="glb"){
    vAudio.style.display="none";
    // mobile / no-WebGL fallback: skip the heavy ESM and show the poster still
    if(!hasWebGL()){
      const img=document.createElement("img"); img.src=d.poster||d.src; img.alt=d.title; img.decoding="async";
      vStage.appendChild(img);
    } else
    // lazy-load model-viewer only when a glb is actually opened AND WebGL exists
    loadModelViewer().then(()=>{
      const mv=document.createElement("model-viewer");
      mv.className="glb";
      mv.setAttribute("src",d.src);
      mv.setAttribute("poster",d.poster||"");
      mv.setAttribute("camera-controls","");
      if(!reduce) mv.setAttribute("auto-rotate",""); // honor reduced-motion: no idle spin
      mv.setAttribute("interaction-prompt","none");
      mv.setAttribute("shadow-intensity","1");
      mv.setAttribute("exposure","1.1");
      mv.style.setProperty("--poster-color","transparent");
      vStage.appendChild(mv);
    }).catch(()=>{
      const img=document.createElement("img"); img.src=d.poster||d.src; img.alt=d.title; vStage.appendChild(img);
    });
  } else {
    vAudio.style.display="none";
    const img=document.createElement("img");
    img.src=d.src; img.alt=d.title; img.decoding="async";
    vStage.appendChild(img);
  }

  viewer.classList.add("open");
  document.body.style.overflow="hidden";
  vClose.focus();
}

function closeWork(){
  clearStage();
  viewer.classList.remove("open");
  document.body.style.overflow="";
  if(lastFocus && lastFocus.focus) lastFocus.focus(); else cv.focus();
}
vClose.addEventListener("click", closeWork);
viewer.addEventListener("click", e=>{ if(e.target===viewer) closeWork(); });
document.getElementById("vNext").addEventListener("click", ()=> openWork((curIdx+1)%nodes.length));
document.getElementById("vPrev").addEventListener("click", ()=> openWork((curIdx-1+nodes.length)%nodes.length));
window.addEventListener("keydown", e=>{
  if(!viewer.classList.contains("open")) return;
  if(e.key==="Escape") closeWork();
  else if(e.key==="ArrowRight") openWork((curIdx+1)%nodes.length);
  else if(e.key==="ArrowLeft") openWork((curIdx-1+nodes.length)%nodes.length);
});

/* WebGL capability probe (cached): gates the 3D path so incapable phones
   fall back to the poster image without fetching model-viewer at all */
let _webgl;
function hasWebGL(){
  if(_webgl!==undefined) return _webgl;
  try{
    const c=document.createElement("canvas");
    _webgl = !!(window.WebGLRenderingContext && (c.getContext("webgl")||c.getContext("experimental-webgl")));
  }catch(e){ _webgl=false; }
  return _webgl;
}

/* lazy model-viewer loader (ESM, only on first glb open) */
let mvPromise=null;
function loadModelViewer(){
  if(window.customElements && customElements.get("model-viewer")) return Promise.resolve();
  if(mvPromise) return mvPromise;
  mvPromise = new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.type="module";
    s.src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js";
    s.onload=()=> customElements.whenDefined("model-viewer").then(res);
    s.onerror=rej;
    document.head.appendChild(s);
  });
  return mvPromise;
}

/* ============================================================
   BOOT
   ============================================================ */
resize();
// preload posters used as star glow source for the brightest few (cheap)
nodes.sort((a,b)=>b.mag-a.mag).slice(0,4).forEach(ensurePoster);
nodes.sort((a,b)=>a.i-b.i); // restore order
// motion path: start the perpetual loop (twinkle + parallax need every frame).
// reduced-motion path: draw once on demand; resize() already requested the first paint.
if(!reduce) requestAnimationFrame(frame); else requestFrame();

// pause the open video if its tab is hidden (battery / decode)
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden && curVideo) curVideo.pause();
  else if(!document.hidden && curVideo && viewer.classList.contains("open")){
    const p=curVideo.play(); if(p&&p.catch) p.catch(()=>{});
  }
});
})();
</script>
</body>
