<style>
/* ============================================================
   DUST FORM  ->  particle-image-morph
   ONE persistent Three.js point-cloud (~30k / ~10k mobile).
   Each work image's luminance seeds a target buffer; the cloud
   ASSEMBLES into that silhouette, then lerps to the next work
   through an amber-ignited dust burst.
   PALETTE  #06060a void | #e8f0ff cool dust | #ff9f3f amber ignite | #f0ece4 bone label
   The formed image supplies its own recognizable color.
   ============================================================ */
:root{
  --void:#06060a;
  --void2:#0b0b12;
  --dust:#e8f0ff;
  --amber:#ff9f3f;
  --bone:#f0ece4;
  --dim:#5a5f73;
  --line:#171723;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:
    radial-gradient(120% 90% at 50% 8%, #0c0c16 0%, var(--void) 60%) fixed,
    var(--void);
  color:var(--dust);
  font-family:"Space Grotesk",system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
a{color:inherit}
canvas{display:block}

/* ---- STAGE : the point-cloud lives here, pinned full-viewport ---- */
#stage{
  position:fixed; inset:0; z-index:0;
  width:100%; height:100%;
}
#stage canvas{width:100%!important; height:100%!important}
/* soft vignette over the cloud so the void edges read as deep space */
#vign{
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(120% 100% at 50% 46%, transparent 38%, rgba(6,6,10,.55) 78%, rgba(6,6,10,.92) 100%);
}
/* fine grain so flat voids never band */
#grain{
  position:fixed; inset:0; z-index:1; pointer-events:none; opacity:.05; mix-blend-mode:screen;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* ---- FRAME : the HUD that frames the cloud as a gallery plate ---- */
.frame{position:relative; z-index:3; min-height:100%; pointer-events:none}
.frame a,.frame button{pointer-events:auto}

/* top band : compact, never covers the cloud */
.topband{
  position:fixed; top:0; left:0; right:0; z-index:4;
  display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;
  padding:18px clamp(16px,4vw,40px);
  background:linear-gradient(180deg, rgba(6,6,10,.82) 0%, rgba(6,6,10,.42) 60%, transparent 100%);
}
.brand{
  font-weight:700; letter-spacing:.02em; font-size:clamp(15px,1.5vw,18px);
  display:flex; align-items:center; gap:10px;
}
.brand .dot{
  width:9px; height:9px; border-radius:50%;
  background:var(--amber); box-shadow:0 0 14px var(--amber);
  animation:pulse 3.4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
.brand small{
  font-family:"Space Mono",monospace; font-weight:400; font-size:11px;
  color:var(--dim); letter-spacing:.14em; text-transform:uppercase;
}
.topmeta{
  margin-left:auto; font-family:"Space Mono",monospace; font-size:11px;
  letter-spacing:.16em; text-transform:uppercase; color:var(--dim);
}

/* corner ticks : turn the viewport into a framed plate */
.tick{position:fixed; z-index:4; width:26px; height:26px; border:1px solid var(--line); pointer-events:none}
.tick.tl{top:64px; left:18px; border-right:0; border-bottom:0}
.tick.tr{top:64px; right:18px; border-left:0; border-bottom:0}
.tick.bl{bottom:84px; left:18px; border-right:0; border-top:0}
.tick.br{bottom:84px; right:18px; border-left:0; border-top:0}

/* CAPTION : current work plate, lower-left, reads against the dust */
.caption{
  position:fixed; z-index:4; left:clamp(16px,4vw,44px); bottom:clamp(96px,12vh,128px);
  max-width:min(86vw,440px);
}
.caption .idx{
  font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.22em;
  color:var(--amber); margin-bottom:10px;
}
.caption h1{
  font-size:clamp(30px,5.4vw,58px); line-height:.98; font-weight:700;
  letter-spacing:-.02em; color:var(--bone);
  text-shadow:0 2px 30px rgba(6,6,10,.7);
}
.caption .meta{
  margin-top:10px; display:flex; gap:8px 14px; flex-wrap:wrap;
  font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.14em;
  text-transform:uppercase; color:var(--dim);
}
.caption .meta b{color:var(--dust); font-weight:400}
.caption .desc{
  margin-top:14px; font-size:14.5px; line-height:1.5; color:#aab1c6;
  max-width:40ch;
}
.swatch{
  display:inline-block; width:10px; height:10px; border-radius:2px;
  vertical-align:middle; margin-right:6px; transform:translateY(-1px);
  box-shadow:0 0 0 1px rgba(255,255,255,.14);
}

/* CONTROL DECK : index rail + prev/next, lower-centre */
.deck{
  position:fixed; z-index:5; left:50%; bottom:clamp(20px,4vh,34px);
  transform:translateX(-50%);
  display:flex; align-items:center; gap:14px;
  padding:9px 12px; border-radius:999px;
  background:rgba(11,11,18,.66); border:1px solid var(--line);
  backdrop-filter:blur(10px);
}
.navbtn{
  width:40px; height:40px; border-radius:50%; border:1px solid var(--line);
  background:transparent; color:var(--dust); cursor:pointer;
  font-size:17px; line-height:1; display:grid; place-items:center;
  transition:background .18s ease, border-color .18s ease, transform .12s ease;
}
.navbtn:hover{background:rgba(255,159,63,.14); border-color:var(--amber)}
.navbtn:active{transform:scale(.92)}
.navbtn:focus-visible{outline:2px solid var(--amber); outline-offset:3px}
.rail{display:flex; gap:9px; align-items:center}
.pip{
  width:auto; min-width:9px; height:9px; padding:0; border:0; border-radius:999px;
  background:#2a2c3a; cursor:pointer; transition:width .3s ease, background .3s ease;
}
.pip[aria-current="true"]{width:30px; background:var(--amber)}
.pip:focus-visible{outline:2px solid var(--amber); outline-offset:3px}
.hint{
  font-family:"Space Mono",monospace; font-size:10.5px; letter-spacing:.16em;
  text-transform:uppercase; color:var(--dim); padding-left:6px; border-left:1px solid var(--line);
}

/* MORPH meter : thin amber bar across the top while igniting */
#morphbar{
  position:fixed; top:0; left:0; height:2px; width:0%; z-index:6;
  background:linear-gradient(90deg, transparent, var(--amber) 60%, #ffd9a8);
  box-shadow:0 0 12px var(--amber); transition:opacity .3s ease;
}

/* SCROLL SPACER : gives the page scroll-driven morph room on desktop.
   Each work = one viewport of scroll; the cloud is fixed, scroll only
   drives morph progress. Hidden on touch (tap-next instead). */
#scroller{position:relative; z-index:2}
.sect{height:100vh}

/* loading veil */
#veil{
  position:fixed; inset:0; z-index:10; display:grid; place-items:center;
  background:var(--void); transition:opacity .8s ease; pointer-events:none;
}
#veil.gone{opacity:0}
#veil .vinner{font-family:"Space Mono",monospace; letter-spacing:.2em; text-transform:uppercase; font-size:12px; color:var(--dim); text-align:center}
#veil .bar{width:160px; height:2px; background:#1a1a26; margin:14px auto 0; overflow:hidden}
#veil .bar i{display:block; height:100%; width:30%; background:var(--amber); animation:load 1.1s ease-in-out infinite}
@keyframes load{0%{transform:translateX(-120%)}100%{transform:translateX(440%)}}

/* WebGL fallback (no THREE / context lost) : show the formed image flat */
#fallback{
  position:fixed; inset:0; z-index:2; display:none; place-items:center; padding:8vh 6vw 16vh;
}
#fallback.on{display:grid}
#fallback figure{
  position:relative; max-width:min(92vw,900px); width:100%;
  border:1px solid var(--line); border-radius:6px; overflow:hidden;
  box-shadow:0 30px 90px rgba(0,0,0,.6);
}
#fallback img{width:100%; height:auto; display:block; filter:saturate(.95) contrast(1.02)}
#fallback figcaption{
  position:absolute; left:0; right:0; bottom:0; padding:18px 20px;
  background:linear-gradient(0deg, rgba(6,6,10,.9), transparent);
  font-family:"Space Mono",monospace; font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--bone);
}

/* a11y : reduced motion -> static formed cloud, no rAF, no pulse, hide hint */
@media (prefers-reduced-motion:reduce){
  .brand .dot{animation:none; opacity:.9}
  #veil .bar i{animation:none; width:100%}
  .hint{display:none}
}

/* MOBILE : letterbox the framing, stack caption above deck, never crop.
   The cloud canvas already fits the viewport (contain), so nothing crops. */
@media (max-width:640px){
  .tick{display:none}
  .topmeta{display:none}
  .caption{left:16px; right:16px; bottom:108px; max-width:none}
  .caption h1{font-size:clamp(26px,9vw,40px)}
  .caption .desc{max-width:none}
  .deck{gap:10px; padding:8px 10px}
  .hint{display:none}
  .navbtn{width:44px; height:44px}
  #fallback{padding:14vh 18px 18vh}
}

<script type="module">
/* ============================================================================
   DATA  ->  edit this array to swap works. Each entry:
     img    : path to the source image (luminance sampled into the cloud)
     title  : display title
     idx     : catalog code
     tags   : meta chips
     color  : recognizable accent the formed image supplies (drives label swatch + tint)
     desc   : short line
   First entry is seeded FULLY FORMED at rest (thumbnail = an image made of particles).
   ============================================================================ */
const DATA = [
  {
    img:"../assets/flux-car-4k.png",
    title:"Nocturne, Wet Asphalt",
    idx:"AX-01", tags:["FLUX","2048x1152","matte-black"],
    color:"#7fb2ff",
    desc:"A cinematic matte-black coupe on a rain-slick neon street, reassembled point by point."
  },
  {
    img:"../assets/flux-clinic-4k.png",
    title:"Mint & Timber Suite",
    idx:"AX-02", tags:["FLUX","2048x1152","interior"],
    color:"#7fe3c4",
    desc:"A calm mint-and-wood dental room; the cloud settles into its soft geometry."
  },
  {
    img:"../assets/sdxl.png",
    title:"Autumn Fox, Painterly",
    idx:"AX-03", tags:["SDXL","512x512","painterly"],
    color:"#ff9f5a",
    desc:"A warm painterly fox in fall light, drawn out of the same thirty thousand grains."
  },
  {
    img:"../assets/hf-tinysd.png",
    title:"Lo-Fi Pomme",
    idx:"AX-04", tags:["TINY-SD","512x512","abstract"],
    color:"#ff5d6c",
    desc:"An abstract low-fi apple closes the loop; the dust never multiplies, only re-forms."
  }
];

/* ---- runtime config --------------------------------------------------- */
const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
const isTouch = window.matchMedia("(hover:none),(pointer:coarse)").matches || ("ontouchstart" in window);
const MOBILE = isTouch || window.innerWidth <= 640;
const COUNT  = MOBILE ? 10000 : 30000;        // particle budget
const GRID   = MOBILE ? 180 : 280;            // luminance sample resolution per axis
const ASPECT_FIT = 1.42;                       // world half-width for a 16:9 plate (square images letterboxed inside)

import * as THREE from "three";

/* ============================================================================
   PALETTE LUT  (ANGLE-safe)
   ANGLE returns 0 for GLSL ES 1.0 dynamic-indexed local arrays, so the
   amber-ignite ramp goes through a 1D LUT texture, never an indexed array.
   x = morph energy (0 cool dust -> 1 amber ignite). The shader samples this.
   ============================================================================ */
function buildLUT(){
  const w = 256, c = document.createElement("canvas");
  c.width = w; c.height = 1;
  const ctx = c.getContext("2d");
  const g = ctx.createLinearGradient(0,0,w,0);
  g.addColorStop(0.00, "#9fb8ff");   // cool dust at rest
  g.addColorStop(0.35, "#cfe0ff");
  g.addColorStop(0.55, "#ffd9a8");   // warming
  g.addColorStop(0.78, "#ff9f3f");   // amber ignite peak
  g.addColorStop(1.00, "#fff0d6");   // hot core
  ctx.fillStyle = g; ctx.fillRect(0,0,w,1);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.minFilter = THREE.LinearFilter; tex.magFilter = THREE.LinearFilter;
  tex.wrapS = THREE.ClampToEdgeWrapping; tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

/* ============================================================================
   IMAGE -> TARGET BUFFER
   Sample each image's luminance on a GRID x GRID lattice. Brighter, more
   saturated, edge-rich pixels are MORE likely to host a particle, so the
   cloud literally assembles the recognizable silhouette in the work's own
   colours. Returns {pos:Float32Array(COUNT*3), col:Float32Array(COUNT*3)}.
   ============================================================================ */
function sampleImage(img){
  // draw to an offscreen GRID x GRID canvas (cover-fit the image into the square sampler,
  // then we map to world keeping the source aspect so nothing is stretched in the cloud)
  const cv = document.createElement("canvas");
  cv.width = GRID; cv.height = GRID;
  const ctx = cv.getContext("2d", {willReadFrequently:true});
  // contain the image inside the square sampler (letterbox) so aspect is preserved
  const ia = img.naturalWidth / img.naturalHeight;
  let dw = GRID, dh = GRID, dx = 0, dy = 0;
  if (ia > 1){ dh = GRID/ia; dy = (GRID-dh)/2; }
  else if (ia < 1){ dw = GRID*ia; dx = (GRID-dw)/2; }
  ctx.fillStyle = "#000"; ctx.fillRect(0,0,GRID,GRID);
  ctx.drawImage(img, dx, dy, dw, dh);
  const data = ctx.getImageData(0,0,GRID,GRID).data;

  // build a weighted candidate list: weight = luminance * (1 + saturation)
  // skip near-black letterbox so particles concentrate on the actual image.
  const candX = [], candY = [], candR = [], candG = [], candB = [];
  for (let y=0; y<GRID; y++){
    for (let x=0; x<GRID; x++){
      const i = (y*GRID + x)*4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
      if (lum < 0.06) continue;                       // drop void / letterbox
      const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
      const sat = mx === 0 ? 0 : (mx-mn)/mx;
      const w = lum * (0.55 + 0.9*lum) * (0.6 + 0.8*sat); // favour bright + saturated detail
      // store weight in candR's place? no -> push per-pixel, repeat by weight bucket below
      candX.push(x); candY.push(y);
      candR.push(r); candG.push(g); candB.push(b);
      // stash weight on a parallel array via closure
      candX.weight = candX.weight || [];
    }
  }
  // recompute a flat weight array aligned to candidates (clearer than the closure hack)
  const N = candX.length;
  const weights = new Float32Array(N);
  let total = 0;
  for (let k=0;k<N;k++){
    const r=candR[k], g=candG[k], b=candB[k];
    const lum=(0.299*r+0.587*g+0.114*b)/255;
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
    const sat=mx===0?0:(mx-mn)/mx;
    const w=lum*(0.55+0.9*lum)*(0.6+0.8*sat);
    weights[k]=w; total+=w;
  }

  // build a CDF and inverse-transform sample COUNT particles by weight
  const cdf = new Float32Array(N);
  let acc=0;
  for (let k=0;k<N;k++){ acc+=weights[k]/total; cdf[k]=acc; }

  const pos = new Float32Array(COUNT*3);
  const col = new Float32Array(COUNT*3);
  const HALFW = ASPECT_FIT;                  // world half-width
  const HALFH = ASPECT_FIT;                  // sampler is square -> square world, image letterboxed inside
  for (let p=0; p<COUNT; p++){
    // binary search the CDF
    const t = Math.random();
    let lo=0, hi=N-1;
    while (lo<hi){ const mid=(lo+hi)>>1; if (cdf[mid]<t) lo=mid+1; else hi=mid; }
    const k = lo;
    // jitter within the cell so the cloud is not a hard lattice
    const gx = (candX[k] + Math.random()) / GRID;   // 0..1
    const gy = (candY[k] + Math.random()) / GRID;   // 0..1
    const wx = (gx - 0.5) * 2 * HALFW;
    const wy = (0.5 - gy) * 2 * HALFH;              // flip y to screen-up
    // near-planar: a SLIGHT luminance z-relief for life, but shallow enough that the
    // cloud reads as an assembled image (a silhouette), not a bokeh ball of discs.
    const r=candR[k], g=candG[k], b=candB[k];
    const lum=(0.299*r+0.587*g+0.114*b)/255;
    const wz = (lum - 0.5) * 0.12 + (Math.random()-0.5)*0.05;
    pos[p*3]   = wx;
    pos[p*3+1] = wy;
    pos[p*3+2] = wz;
    col[p*3]   = r/255;
    col[p*3+1] = g/255;
    col[p*3+2] = b/255;
  }
  return {pos, col};
}

/* ============================================================================
   LOAD all images, then build the cloud.
   ============================================================================ */
function loadImage(src){
  return new Promise((res, rej)=>{
    const im = new Image();
    im.crossOrigin = "anonymous";
    im.onload = ()=>res(im);
    im.onerror = ()=>rej(new Error("img fail "+src));
    im.src = src;
  });
}

let renderer, scene, camera, points, geo, mat, lut;
let targets = [];          // [{pos,col}] per work
let current = 0;           // index of the work we are AT (settled) or coming FROM
let next = 0;              // index we are morphing TO
let morph = 0;             // 0..1 progress current->next
let morphActive = false;
let morphDir = 1;
let raf = null;
let webglOK = true;

/* GPU morph. uMorph 0..1 lerps position (the FROM silhouette) -> aNext (the TO
   silhouette). A dust burst window = sin(pi*morph) peaks at the midpoint: it
   pushes every particle outward along a per-seed direction (the cloud blows
   apart) and drives the amber LUT ignite in the fragment, then the cloud
   re-forms into the next image. Colour lerps each work's own pixels (aColA ->
   aColB) and is washed toward the amber LUT at the burst peak. */
const VERT_REAL = `
  uniform float uMorph;
  uniform float uTime;
  uniform float uSize;
  uniform float uPixelRatio;
  attribute vec3 aNext;
  attribute vec3 aColA;
  attribute vec3 aColB;
  attribute float aSeed;
  varying vec3 vCol;
  varying float vEnergy;

  float hash(float n){ return fract(sin(n)*43758.5453123); }

  void main(){
    float m = uMorph;
    float e = m*m*(3.0-2.0*m);
    float burst = sin(m*3.14159265);
    vEnergy = burst;

    vec3 p = mix(position, aNext, e);

    float a = aSeed * 6.2831853;
    vec3 dir = normalize(vec3(cos(a), sin(a*1.7), sin(a)*0.7) + 0.0001);
    float spread = burst * (0.55 + 0.8*hash(aSeed*91.7));
    p += dir * spread;
    p.x += sin(uTime*0.9 + aSeed*30.0) * burst * 0.06;
    p.y += cos(uTime*1.1 + aSeed*21.0) * burst * 0.06;

    vCol = mix(aColA, aColB, e);

    vec4 mv = modelViewMatrix * vec4(p, 1.0);
    gl_Position = projectionMatrix * mv;
    float size = uSize * (1.0 + burst*1.4) * (0.6 + 0.8*hash(aSeed*3.1));
    // perspective scale tuned so a resting grain is a few px (an image of grains),
    // NOT a ~200px bokeh disc; the constant was far too large for a ~900px viewport.
    gl_PointSize = clamp(size * uPixelRatio * (16.0 / -mv.z), 1.0, 26.0);
  }
`;

const FRAG_REAL = `
  precision mediump float;
  uniform sampler2D uLut;     // amber-ignite ramp (ANGLE-safe, no indexed local arrays)
  varying vec3 vCol;
  varying float vEnergy;      // 0 cool .. 1 burst

  void main(){
    // round soft sprite, firm core so the formed image reads crisp (not a haze)
    vec2 uv = gl_PointCoord - 0.5;
    float d = length(uv);
    if (d > 0.5) discard;
    float alpha = smoothstep(0.5, 0.28, d);   // firm-cored grain -> the silhouette reads, not bokeh

    // sample the LUT by burst energy -> amber ignite mid-morph.
    // LUT lookup (texture) instead of an indexed local color array (ANGLE-safe).
    vec3 ignite = texture2D(uLut, vec2(vEnergy, 0.5)).rgb;

    // at rest (energy 0) show the work's own colour; during burst push to amber LUT.
    // NormalBlending base means overlapping same-colour grains converge to that colour
    // (the silhouette), instead of summing to white the way additive did.
    vec3 c = mix(vCol, ignite, clamp(vEnergy*1.15, 0.0, 1.0));
    // amber glow core only during the burst (energy-gated), keeps the resting image clean
    c += ignite * vEnergy * vEnergy * 0.5 * (1.0 - d);

    // full opacity at rest so the image is solid; soften only during the burst spread
    gl_FragColor = vec4(c, alpha);
  }
`;

function buildCloud(){
  const stage = document.getElementById("stage");
  try{
    renderer = new THREE.WebGLRenderer({
      antialias:false,
      alpha:true,
      preserveDrawingBuffer:true   // headless thumbnail must capture the painted canvas
    });
  }catch(err){
    webglOK = false; return;
  }
  if (!renderer || !renderer.getContext()){ webglOK = false; return; }

  const DPR = Math.min(window.devicePixelRatio || 1, 2); // DPR capped at 2 (retina-crisp, bounded cost)
  renderer.setPixelRatio(DPR);
  renderer.setSize(stage.clientWidth, stage.clientHeight, false);
  renderer.setClearColor(0x000000, 0);
  stage.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(46, stage.clientWidth/stage.clientHeight, 0.1, 100);
  camera.position.set(0, 0, 4.4);

  lut = buildLUT();

  geo = new THREE.BufferGeometry();
  // start FORMED into work 0 (current==next==0, morph 0) -> thumbnail reads as a real image.
  const t0 = targets[0];
  const pos = new Float32Array(t0.pos);          // position = aPos (FROM)
  const nxt = new Float32Array(t0.pos);          // aNext = same as pos at rest
  const colA = new Float32Array(t0.col);
  const colB = new Float32Array(t0.col);
  const seed = new Float32Array(COUNT);
  for (let i=0;i<COUNT;i++) seed[i] = Math.random();

  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  geo.setAttribute("aNext",    new THREE.BufferAttribute(nxt, 3));
  geo.setAttribute("aColA",    new THREE.BufferAttribute(colA, 3));
  geo.setAttribute("aColB",    new THREE.BufferAttribute(colB, 3));
  geo.setAttribute("aSeed",    new THREE.BufferAttribute(seed, 1));

  mat = new THREE.ShaderMaterial({
    vertexShader: VERT_REAL,
    fragmentShader: FRAG_REAL,
    uniforms:{
      uMorph:{value:0},
      uTime:{value:0},
      uSize:{value: MOBILE ? 2.0 : 1.5},
      uPixelRatio:{value: DPR},
      uLut:{value: lut}
    },
    transparent:true,
    depthWrite:false,
    depthTest:false,
    // NormalBlending (not additive): grains paint the work's true colours and the
    // dark regions of the image stay dark, so the silhouette is legible instead of
    // 30k additive sprites stacking to a white blob.
    blending: THREE.NormalBlending
  });

  points = new THREE.Points(geo, mat);
  scene.add(points);
}

/* commit a finished morph: the NEXT silhouette becomes the new FROM/position,
   so the next transition lerps from where we actually are. */
function commitMorph(){
  const t = targets[next];
  const posAttr = geo.getAttribute("position");
  const nxtAttr = geo.getAttribute("aNext");
  const colAAttr = geo.getAttribute("aColA");
  const colBAttr = geo.getAttribute("aColB");
  posAttr.array.set(t.pos);
  nxtAttr.array.set(t.pos);
  colAAttr.array.set(t.col);
  colBAttr.array.set(t.col);
  posAttr.needsUpdate = nxtAttr.needsUpdate = colAAttr.needsUpdate = colBAttr.needsUpdate = true;
  current = next;
  mat.uniforms.uMorph.value = 0;
  morph = 0;
  morphActive = false;
}

/* arm a morph current -> targetIndex (sets aNext/aColB to the target work) */
function armMorph(targetIndex){
  if (targetIndex === current) return;
  next = targetIndex;
  const tn = targets[next];
  const nxtAttr = geo.getAttribute("aNext");
  const colBAttr = geo.getAttribute("aColB");
  nxtAttr.array.set(tn.pos);
  colBAttr.array.set(tn.col);
  nxtAttr.needsUpdate = colBAttr.needsUpdate = true;
  morphActive = true;
}

/* ============================================================================
   NAVIGATION + UI
   ============================================================================ */
const el = {
  idx:document.getElementById("cIdx"),
  title:document.getElementById("cTitle"),
  meta:document.getElementById("cMeta"),
  desc:document.getElementById("cDesc"),
  rail:document.getElementById("rail"),
  prev:document.getElementById("prev"),
  next:document.getElementById("next"),
  bar:document.getElementById("morphbar"),
  topmeta:document.getElementById("topmeta")
};

function paintCaption(i){
  const d = DATA[i];
  el.idx.textContent = String(i+1).padStart(2,"0") + " / " + String(DATA.length).padStart(2,"0");
  el.title.textContent = d.title;
  el.meta.innerHTML =
    `<span><span class="swatch" style="background:${d.color}"></span>${d.idx}</span>` +
    d.tags.map(t=>`<span><b>${t}</b></span>`).join("");
  el.desc.textContent = d.desc;
  // rail pips
  [...el.rail.children].forEach((p,k)=>p.setAttribute("aria-current", k===i ? "true":"false"));
}

function buildRail(){
  DATA.forEach((d,i)=>{
    const b = document.createElement("button");
    b.className = "pip"; b.setAttribute("role","tab");
    b.setAttribute("aria-label", `${d.title}`);
    b.setAttribute("aria-current", i===0 ? "true":"false");
    b.addEventListener("click", ()=>goTo(i));
    el.rail.appendChild(b);
  });
}

/* trigger a morph to index i (click / pip / key). Reduced-motion snaps. */
let animating = false;
function goTo(i){
  if (!webglOK){ paintCaption(i); showFallback(i); return; }
  if (i === current || animating) return;
  i = (i + DATA.length) % DATA.length;
  paintCaption(i);
  if (reduce){
    // snap: just rebuild as formed, no burst
    next = i; armMorph(i); mat.uniforms.uMorph.value = 1; renderOnce(); commitMorph(); return;
  }
  armMorph(i);
  animating = true;
  morph = 0; morphDir = 1;
  el.bar.style.opacity = "1";
  if (!raf) loop();
}

/* desktop scroll -> morph progress. We map total scroll across DATA.length-1
   morphs; whichever pair we are between drives a click-style morph. Simpler:
   each downward "section" crossed = goTo(next). We debounce wheel into steps. */
let wheelLock = false;
function onWheel(e){
  if (MOBILE || !webglOK || reduce || animating) return;
  if (Math.abs(e.deltaY) < 8) return;
  if (wheelLock) return;
  wheelLock = true;
  const dirDown = e.deltaY > 0;
  goTo(current + (dirDown ? 1 : -1));
  setTimeout(()=>{ wheelLock = false; }, 120);
}

document.getElementById("next").addEventListener("click", ()=>goTo(current+1));
document.getElementById("prev").addEventListener("click", ()=>goTo(current-1));
window.addEventListener("keydown", (e)=>{
  if (e.key === "ArrowRight" || e.key === "ArrowDown"){ e.preventDefault(); goTo(current+1); }
  else if (e.key === "ArrowLeft" || e.key === "ArrowUp"){ e.preventDefault(); goTo(current-1); }
});
window.addEventListener("wheel", onWheel, {passive:true});

/* touch: tap-next (swipe horizontally) */
let tx=0;
window.addEventListener("touchstart", e=>{ tx = e.touches[0].clientX; }, {passive:true});
window.addEventListener("touchend", e=>{
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 48) goTo(current + (dx<0 ? 1 : -1));
}, {passive:true});

/* ============================================================================
   RENDER LOOP  (single rAF; gated off under reduced-motion)
   ============================================================================ */
const MORPH_SPEED = 0.018;   // per frame; ~ 1s morph at 60fps
let clock = 0;

function renderOnce(){
  if (!webglOK) return;
  mat.uniforms.uTime.value = clock;
  renderer.render(scene, camera);
}

function loop(){
  raf = requestAnimationFrame(loop);
  clock += 0.016;
  if (animating){
    morph += MORPH_SPEED;
    if (morph >= 1){
      morph = 1;
      mat.uniforms.uMorph.value = 1;
      renderOnce();
      commitMorph();
      animating = false;
      el.bar.style.width = "0%";
      el.bar.style.opacity = "0";
      // idle: one more paint then stop the loop to save battery (image is static)
      renderOnce();
      cancelAnimationFrame(raf); raf = null;
      return;
    }
    mat.uniforms.uMorph.value = morph;
    el.bar.style.width = (morph*100).toFixed(1) + "%";
  }
  renderOnce();
}

/* ============================================================================
   FALLBACK
   ============================================================================ */
function showFallback(i){
  const fb = document.getElementById("fallback");
  const im = document.getElementById("fbimg");
  const cap = document.getElementById("fbcap");
  fb.classList.add("on");
  im.src = DATA[i].img; im.alt = DATA[i].title;
  cap.textContent = `${DATA[i].idx}  /  ${DATA[i].title}`;
}

/* ============================================================================
   RESIZE
   ============================================================================ */
function onResize(){
  if (!webglOK) return;
  const stage = document.getElementById("stage");
  camera.aspect = stage.clientWidth/stage.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(stage.clientWidth, stage.clientHeight, false);
  renderOnce();
}
window.addEventListener("resize", ()=>{ clearTimeout(window.__rz); window.__rz=setTimeout(onResize,150); });

/* ============================================================================
   BOOT
   ============================================================================ */
async function boot(){
  // build scroll spacer (desktop scroll affordance only; cloud is fixed)
  if (!MOBILE && !reduce){
    const sc = document.getElementById("scroller");
    sc.innerHTML = DATA.map(()=>`<div class="sect"></div>`).join("");
  }
  el.topmeta.textContent = `PARTICLES ${COUNT.toLocaleString()} / GPU POINT-CLOUD`;
  buildRail();
  paintCaption(0);

  let imgs;
  try{
    imgs = await Promise.all(DATA.map(d=>loadImage(d.img)));
  }catch(err){
    webglOK = false;
    document.getElementById("veil").classList.add("gone");
    showFallback(0);
    return;
  }

  // sample every work into a target buffer
  targets = imgs.map(im=>sampleImage(im));

  buildCloud();
  if (!webglOK){
    document.getElementById("veil").classList.add("gone");
    showFallback(0);
    return;
  }

  // FIRST PAINT: formed into work 0 at rest. Confirm the canvas paints one
  // frame before sign-off (brief). renderOnce paints with preserveDrawingBuffer.
  mat.uniforms.uMorph.value = 0;
  renderOnce();

  // tiny settle wobble on load so the static cloud has life on desktop (one short loop),
  // but under reduced-motion we leave it dead still.
  document.getElementById("veil").classList.add("gone");

  if (reduce){
    // static formed cloud, no rAF. Single paint already done. Done.
    return;
  }

  // gentle idle: do NOT run a permanent rAF; only spin the loop during morphs.
  // But give a brief intro shimmer so first view feels alive (2s then stop).
  let introT = 0;
  const intro = ()=>{
    introT += 0.016;
    clock += 0.016;
    // sub-pixel camera breathe
    camera.position.x = Math.sin(introT*0.6)*0.05;
    camera.position.y = Math.cos(introT*0.5)*0.03;
    camera.lookAt(0,0,0);
    renderOnce();
    if (introT < 2.4){ requestAnimationFrame(intro); }
    else { camera.position.set(0,0,4.4); camera.lookAt(0,0,0); renderOnce(); }
  };
  requestAnimationFrame(intro);
}

// context loss -> fall back gracefully
window.addEventListener("webglcontextlost", (e)=>{ e.preventDefault(); webglOK=false; showFallback(current); }, false);

boot();
</script>
</body>
</html>
