<!-- TEMPLATE: Matchday Flood | ARCHETYPE: sports-club-hero | REF: juventus.com (Deltatre), NBA.com | WHEN TO USE: pro sports club / team landing with team-color flood + edge-to-edge action shot + live/next-fixture strip + Tickets CTA | SWAP: edit the DATA object at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Matchday Flood - Pro Sports Club Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     SWAP DESIGN HERE (mirrors the JS DATA object):
       --team        primary TEAM COLOR flood
       --team-deep   darker shade for gradients / footer band
       --accent      single secondary accent (CTA, live dot)
       --ink         text on light, --paper text on dark
     ============================================================ */
  :root{
    --team:#0a0a0a;        /* primary team color flood (matte black, club-noir) */
    --team-deep:#000000;
    --team-soft:#1a1a1c;
    --accent:#ffd400;      /* single secondary accent */
    --accent-2:#e63d2f;    /* live red, used only for the LIVE pulse */
    --paper:#f6f6f4;
    --ink:#0a0a0a;
    --line:rgba(255,255,255,.14);
    --pad:clamp(16px,3.4vw,46px);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--team);
    color:var(--paper);
    font-family:"Barlow",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  .cond{font-family:"Barlow Condensed",sans-serif}

  /* ---------- STAGE ---------- */
  .stage{
    position:relative;
    min-height:100svh;
    min-height:100vh;
    display:grid;
    grid-template-rows:auto 1fr auto;
    isolation:isolate;
    overflow:hidden;
  }

  /* team-color flood: a radial + linear wash sitting under everything */
  .flood{
    position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(120% 90% at 78% 18%, rgba(255,212,0,.10), rgba(255,212,0,0) 46%),
      radial-gradient(130% 110% at 12% 8%, var(--team-soft), rgba(26,26,28,0) 52%),
      linear-gradient(180deg, var(--team) 0%, var(--team-deep) 100%);
  }

  /* edge-to-edge player ACTION SHOT (landscape asset, cover on desktop) */
  .action{
    position:absolute;z-index:1;
    inset:0 0 0 38%;                 /* shot occupies the right ~62% on desktop */
    background-image:var(--shot);
    background-size:cover;
    background-position:64% 50%;
    background-repeat:no-repeat;
    will-change:transform;
    transform:translate3d(0,0,0) scale(1.06);
  }
  /* fade the shot into the team flood on its left edge so the headline sits on color */
  .action::after{
    content:"";position:absolute;inset:0;
    background:
      linear-gradient(90deg, var(--team) 0%, rgba(10,10,10,.72) 22%, rgba(10,10,10,0) 56%),
      linear-gradient(0deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,0) 40%);
  }
  /* subtle broadcast scanline grain */
  .grain{
    position:absolute;inset:0;z-index:2;pointer-events:none;mix-blend-mode:overlay;opacity:.5;
    background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 1px,rgba(0,0,0,0) 1px 3px);
  }

  /* ---------- TOP BAR (crest + nav) ---------- */
  .topbar{
    position:relative;z-index:5;
    display:flex;align-items:center;gap:18px;
    padding:clamp(14px,2vw,22px) var(--pad);
  }
  .crest{display:flex;align-items:center;gap:13px;min-width:0}
  .crest svg{width:46px;height:54px;flex:none;filter:drop-shadow(0 4px 14px rgba(0,0,0,.55))}
  .crest .wm{line-height:.94}
  .crest .wm b{
    display:block;font-family:"Archivo Black",sans-serif;
    font-size:clamp(15px,1.5vw,19px);letter-spacing:.02em;text-transform:uppercase;
  }
  .crest .wm span{
    display:block;font-size:11px;letter-spacing:.42em;text-transform:uppercase;
    color:var(--accent);font-weight:600;margin-top:2px;
  }
  .nav{margin-left:auto;display:flex;align-items:center;gap:clamp(14px,2vw,30px)}
  .nav a{
    font-family:"Barlow Condensed",sans-serif;font-weight:600;
    text-transform:uppercase;letter-spacing:.12em;font-size:14px;color:rgba(246,246,244,.82);
    padding:6px 2px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;
  }
  .nav a:hover,.nav a:focus-visible{color:#fff;border-color:var(--accent)}
  .nav .members{
    border:1.5px solid var(--line);border-radius:999px;padding:8px 16px;border-bottom-width:1.5px;
    background:rgba(255,255,255,.04);
  }
  .nav .members:hover{border-color:var(--accent);color:#fff}

  /* ---------- HERO CORE ---------- */
  .hero{
    position:relative;z-index:5;
    align-self:center;
    padding:clamp(10px,2vw,28px) var(--pad) clamp(8px,2vw,20px);
    max-width:min(60ch,62%);
  }
  .kicker{
    display:inline-flex;align-items:center;gap:10px;
    font-family:"Barlow Condensed",sans-serif;font-weight:600;
    text-transform:uppercase;letter-spacing:.34em;font-size:13px;
    color:var(--accent);margin-bottom:18px;
  }
  .kicker::before{content:"";width:30px;height:2px;background:var(--accent)}
  h1{
    font-family:"Archivo Black",sans-serif;
    font-size:clamp(46px,8.6vw,128px);
    line-height:.86;letter-spacing:-.02em;text-transform:uppercase;
    text-shadow:0 8px 40px rgba(0,0,0,.55);
  }
  h1 .stroke{
    color:transparent;-webkit-text-stroke:2px var(--accent);
    text-stroke:2px var(--accent);
    display:block;
  }
  .sub{
    margin-top:18px;max-width:42ch;
    font-size:clamp(15px,1.5vw,18px);line-height:1.5;color:rgba(246,246,244,.86);font-weight:500;
  }
  .cta{display:flex;flex-wrap:wrap;gap:14px;margin-top:28px}
  .btn{
    display:inline-flex;align-items:center;gap:10px;
    font-family:"Barlow Condensed",sans-serif;font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;font-size:17px;
    padding:15px 28px;border-radius:6px;transition:transform .16s ease, box-shadow .2s, background .2s;
  }
  .btn-primary{
    background:var(--accent);color:var(--ink);
    box-shadow:0 12px 34px -10px rgba(255,212,0,.7);
  }
  .btn-primary:hover,.btn-primary:focus-visible{transform:translateY(-2px);box-shadow:0 18px 44px -10px rgba(255,212,0,.85)}
  .btn-ghost{border:1.5px solid var(--line);background:rgba(255,255,255,.05);color:#fff}
  .btn-ghost:hover,.btn-ghost:focus-visible{border-color:#fff;transform:translateY(-2px)}
  .btn svg{width:18px;height:18px}

  /* ---------- FIXTURE STRIP (the live / next-fixture signature) ---------- */
  .fixtures{
    position:relative;z-index:5;
    border-top:1px solid var(--line);
    background:linear-gradient(180deg, rgba(0,0,0,.30), rgba(0,0,0,.62));
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
  }
  .fix-track{
    display:flex;align-items:stretch;
    overflow-x:auto;scroll-snap-type:x mandatory;
    scrollbar-width:none;
  }
  .fix-track::-webkit-scrollbar{display:none}
  .fix{
    scroll-snap-align:start;flex:1 0 clamp(230px,24vw,300px);
    display:flex;flex-direction:column;justify-content:center;gap:8px;
    padding:16px clamp(16px,2vw,26px);
    border-right:1px solid var(--line);position:relative;
    transition:background .2s;
  }
  .fix:hover{background:rgba(255,255,255,.04)}
  .fix-head{
    display:flex;align-items:center;gap:10px;
    font-family:"Barlow Condensed",sans-serif;font-weight:600;
    text-transform:uppercase;letter-spacing:.18em;font-size:11px;color:rgba(246,246,244,.7);
  }
  .pill{
    font-family:"Barlow Condensed",sans-serif;font-weight:700;letter-spacing:.14em;
    font-size:10px;text-transform:uppercase;padding:3px 8px;border-radius:4px;color:#fff;
  }
  .pill.live{background:var(--accent-2)}
  .pill.next{background:rgba(255,255,255,.12);color:var(--accent)}
  .pill.final{background:rgba(255,255,255,.1);color:rgba(246,246,244,.8)}
  .live-dot{
    width:7px;height:7px;border-radius:50%;background:#fff;
    box-shadow:0 0 0 0 rgba(255,255,255,.7);
    animation:pulse 1.6s ease-out infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,255,255,.6)}
    70%{box-shadow:0 0 0 9px rgba(255,255,255,0)}
    100%{box-shadow:0 0 0 0 rgba(255,255,255,0)}
  }
  .fix-row{display:flex;align-items:center;gap:12px}
  .team-mark{
    width:30px;height:30px;border-radius:50%;flex:none;
    display:grid;place-items:center;font-family:"Archivo Black",sans-serif;font-size:13px;
    color:#0a0a0a;letter-spacing:0;
  }
  .vs{
    font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:13px;
    color:rgba(246,246,244,.55);letter-spacing:.1em;
  }
  .score{
    margin-left:auto;font-family:"Archivo Black",sans-serif;font-size:22px;letter-spacing:.02em;
    color:#fff;
  }
  .score.kick{font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:17px;color:var(--accent)}
  .opp{
    font-family:"Barlow Condensed",sans-serif;font-weight:600;font-size:17px;
    text-transform:uppercase;letter-spacing:.02em;color:#fff;line-height:1;
  }
  .fix-meta{
    font-family:"Barlow",sans-serif;font-size:12px;color:rgba(246,246,244,.62);
    display:flex;gap:8px;flex-wrap:wrap;
  }
  .fix-meta b{color:rgba(246,246,244,.85);font-weight:600}
  .fix.is-live{background:linear-gradient(180deg, rgba(230,61,47,.16), rgba(230,61,47,.05))}
  .fix.is-live .score{color:var(--accent)}

  /* ---------- FOCUS ---------- */
  :focus-visible{outline:3px solid var(--accent);outline-offset:3px;border-radius:4px}

  /* ============================================================
     MOBILE (<=640px): NEVER cover-crop the landscape action shot
     into a portrait viewport. Stack: top band, letterboxed shot
     (16:9), headline + CTA, then the fixture strip. Player + the
     fixture strip BOTH stay on the first screen.
     ============================================================ */
  @media (max-width:880px){
    .action{inset:0 0 0 26%;background-position:62% 50%}
    .hero{max-width:74%}
    .nav .grp{display:none}
  }
  @media (max-width:640px){
    .stage{grid-template-rows:auto auto auto;min-height:auto}
    .topbar{padding-top:16px}
    .nav{gap:0}
    .nav a:not(.members){display:none}
    .nav .members{margin-left:auto;font-size:13px;padding:7px 14px}

    /* shot becomes a contained, letterboxed band (no crop). Capped at
       40svh so crest + headline + the fixture strip stay on screen 1. */
    .action{
      position:relative;inset:auto;order:0;
      width:100%;aspect-ratio:2/1;max-height:40svh;
      background-size:cover;background-position:62% 44%;
      transform:none !important;
      border-bottom:2px solid var(--accent);
    }
    .action::after{
      background:linear-gradient(0deg, var(--team) 0%, rgba(10,10,10,.32) 28%, rgba(10,10,10,0) 60%);
    }
    .grain{display:none}
    .topbar{padding-top:13px;padding-bottom:0}
    .crest svg{width:38px;height:45px}
    .hero{
      position:relative;z-index:5;max-width:100%;
      padding:14px var(--pad) 14px;align-self:auto;
    }
    .kicker{margin-bottom:12px}
    h1{font-size:clamp(38px,12vw,58px)}
    .sub{margin-top:11px;font-size:14px;line-height:1.42}
    .cta{margin-top:16px}
    .btn{flex:1 1 auto;justify-content:center;padding:13px 20px}
    .fix{flex:0 0 84%;padding-top:13px;padding-bottom:13px}
    .fix:first-child{flex-basis:90%}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
    .action{transform:none !important}
    .live-dot{box-shadow:0 0 0 3px rgba(255,255,255,.18)}
  }
</style>
</head>
<body>
<script>
/* ============================================================
   DATA  -  swap everything about the club + matchday here.
   crestHex feeds the INLINE SVG crest (literal hex, never var()).
   ============================================================ */
const DATA = {
  club: {
    name: "VESPER",
    full: "VESPER ATHLETIC",
    tagline: "EST. MMXXVI",
    crestHex: "#ffd400",      // crest fill (matches --accent)
    teamColor: "#0a0a0a",     // primary flood (matches --team)
    accent: "#ffd400"
  },
  hero: {
    kicker: "Matchday 27 - The Citadel",
    line1: "OWN THE",
    line2Stroke: "NIGHT",
    sub: "Floodlights up. Forty-one thousand strong. The black-and-gold defends its fortress under the lights. Be in the stand.",
    shot: "../assets/flux-car-4k.png",   // edge-to-edge player ACTION SHOT (landscape, cover desktop / letterbox mobile)
    ctaPrimary: { label: "Buy Tickets", href: "#tickets" },
    ctaSecondary:{ label: "Watch Live", href: "#watch" }
  },
  nav: ["Matches","Squad","Tickets","Store"],
  fixtures: [
    {
      state:"live", comp:"Premier Cup", venue:"Home - The Citadel",
      home:{ab:"VES", color:"#ffd400", ink:"#0a0a0a"},
      away:{ab:"RVN", name:"Ravensgate", color:"#c8ccd2", ink:"#0a0a0a"},
      score:"2 - 1", minute:"67'"
    },
    {
      state:"next", comp:"League - MD 28", venue:"Away - Harbor Park",
      home:{ab:"PRT", name:"Port City", color:"#1d6fe0", ink:"#ffffff"},
      away:{ab:"VES", color:"#ffd400", ink:"#0a0a0a"},
      kickoff:"Sat 20:45", date:"Jun 28"
    },
    {
      state:"next", comp:"Continental R16", venue:"Home - The Citadel",
      home:{ab:"VES", color:"#ffd400", ink:"#0a0a0a"},
      away:{ab:"ATL", name:"Atlas FC", color:"#e63d2f", ink:"#ffffff"},
      kickoff:"Wed 03:00", date:"Jul 02"
    },
    {
      state:"final", comp:"League - MD 26", venue:"Home - The Citadel",
      home:{ab:"VES", color:"#ffd400", ink:"#0a0a0a"},
      away:{ab:"NDR", name:"Nord United", color:"#0e8a5f", ink:"#ffffff"},
      score:"3 - 0", result:"W", date:"Jun 14"
    }
  ]
};

/* ---------- INLINE SVG CREST (literal hex from DATA.club.crestHex) ---------- */
function crestSVG(hex){
  return `
  <svg viewBox="0 0 60 72" role="img" aria-label="Club crest" xmlns="http://www.w3.org/2000/svg">
    <path d="M4 6 L30 0 L56 6 L56 40 Q56 60 30 72 Q4 60 4 40 Z" fill="${hex}"/>
    <path d="M9 11 L30 6 L51 11 L51 39 Q51 55 30 65 Q9 55 9 39 Z" fill="none" stroke="#0a0a0a" stroke-width="2.4"/>
    <path d="M30 16 L34 27 L46 27 L36 34 L40 46 L30 39 L20 46 L24 34 L14 27 L26 27 Z" fill="#0a0a0a"/>
    <rect x="22" y="50" width="16" height="3.4" fill="#0a0a0a"/>
  </svg>`;
}

/* ---------- BUILD ---------- */
function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}

function teamMark(t){
  return `<span class="team-mark" style="background:${t.color};color:${t.ink}">${t.ab}</span>`;
}

function fixtureCard(f){
  const isLive = f.state==="live";
  let pill, scoreBlock, head;
  if(isLive){
    pill = `<span class="pill live">Live</span><span class="live-dot" aria-hidden="true"></span><span>${f.minute||""}</span>`;
  } else if(f.state==="final"){
    pill = `<span class="pill final">Full Time</span>`;
  } else {
    pill = `<span class="pill next">Next</span>`;
  }
  head = `<div class="fix-head">${pill}<span style="margin-left:auto">${f.comp}</span></div>`;

  if(f.state==="next"){
    scoreBlock = `<span class="score kick">${f.kickoff||"TBD"}</span>`;
  } else {
    scoreBlock = `<span class="score">${f.score||""}</span>`;
  }

  const oppName = (f.away.name||f.home.name||"").toUpperCase();

  return el(`
    <article class="fix ${isLive?'is-live':''}" tabindex="0" aria-label="${f.comp} fixture">
      ${head}
      <div class="fix-row">
        ${teamMark(f.home)}
        <span class="vs">v</span>
        ${teamMark(f.away)}
        <span class="opp" style="margin-left:6px">${oppName}</span>
        ${scoreBlock}
      </div>
      <div class="fix-meta"><span>${f.venue}</span>${f.date?`<span>- <b>${f.date}</b></span>`:''}${f.result?`<span>- <b>${f.result}</b></span>`:''}</div>
    </article>`);
}

function build(){
  const C = DATA.club, H = DATA.hero;
  document.documentElement.style.setProperty('--team', C.teamColor);
  document.documentElement.style.setProperty('--accent', C.accent);

  const stage = el(`
    <main class="stage">
      <div class="flood" aria-hidden="true"></div>
      <div class="action" style="--shot:url('${H.shot}')" role="img" aria-label="Club player action shot"></div>
      <div class="grain" aria-hidden="true"></div>

      <header class="topbar">
        <a class="crest" href="#top" aria-label="${C.full} home">
          ${crestSVG(C.crestHex)}
          <span class="wm"><b>${C.name}</b><span>${C.tagline}</span></span>
        </a>
        <nav class="nav" aria-label="Primary">
          <span class="grp" style="display:contents">
            ${DATA.nav.map(n=>`<a href="#${n.toLowerCase()}">${n}</a>`).join('')}
          </span>
          <a class="members" href="#members">Members</a>
        </nav>
      </header>

      <section class="hero">
        <span class="kicker">${H.kicker}</span>
        <h1>${H.line1}<span class="stroke">${H.line2Stroke}</span></h1>
        <p class="sub">${H.sub}</p>
        <div class="cta">
          <a class="btn btn-primary" href="${H.ctaPrimary.href}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M3 8.5A2 2 0 0 1 5 6.5h14a2 2 0 0 1 2 2v1a2 2 0 0 0 0 5v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1a2 2 0 0 0 0-5Z"/><path d="M14 6.5v12" stroke-dasharray="2 2.6"/></svg>
            ${H.ctaPrimary.label}
          </a>
          <a class="btn btn-ghost" href="${H.ctaSecondary.href}">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            ${H.ctaSecondary.label}
          </a>
        </div>
      </section>

      <section class="fixtures" aria-label="Live and upcoming fixtures">
        <div class="fix-track"></div>
      </section>
    </main>`);

  const track = stage.querySelector('.fix-track');
  DATA.fixtures.forEach(f=>track.appendChild(fixtureCard(f)));
  document.body.appendChild(stage);

  initParallax(stage);
}

/* ---------- subtle action-shot parallax (disabled for reduced motion / small screens) ---------- */
function initParallax(stage){
  const action = stage.querySelector('.action');
  const reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if(reduce) return;
  let raf=0, tx=0, ty=0;
  function onMove(e){
    if(window.innerWidth<=640) return;
    const cx=(e.clientX/window.innerWidth-0.5);
    const cy=(e.clientY/window.innerHeight-0.5);
    tx=cx*-14; ty=cy*-10;
    if(!raf) raf=requestAnimationFrame(apply);
  }
  function apply(){
    raf=0;
    action.style.transform=`translate3d(${tx}px,${ty}px,0) scale(1.06)`;
  }
  window.addEventListener('pointermove', onMove, {passive:true});
}

build();
</script>
</body>
</html>
