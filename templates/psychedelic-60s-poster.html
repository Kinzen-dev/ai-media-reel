<!-- TEMPLATE: Vibratin' Fillmore | ARCHETYPE: psychedelic-60s-poster | REF: Wes Wilson, Victor Moscoso, Bonnie MacLean, 1960s Fillmore concert posters | WHEN TO USE: music / festival / launch / counterculture brand hero where warped hand-drawn lettering bends to fill a melting oval over vibrating complementary color clash; SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vibratin' Fillmore - Psychedelic 60s Poster</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rye&family=Alfa+Slab+One&family=Bungee+Inline&family=Shrikhand&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   PSYCHEDELIC 60s POSTER  -  Vibratin' Fillmore
   Palette (no black, ever): molten orange / violet / teal / acid yellow
   Everything vibrates on complementary clash. SVG fills are inline hex.
============================================================ */
:root{
  --orange:#f24b1e;
  --violet:#6b2cc9;
  --teal:#1aa7a0;
  --yellow:#f5d000;
  --orange-deep:#c5350f;
  --violet-deep:#4a1a93;
  --ink:#2a0f3d;          /* darkest allowed = deep violet, never #000 */
  --paper:#f7e9c9;        /* warm aged poster stock */
}

*{box-sizing:border-box}
html{ -webkit-text-size-adjust:100% }
html,body{margin:0;padding:0}
body{
  font-family:"Rye","Alfa Slab One",serif;
  color:var(--ink);
  background:var(--violet);
  overflow-x:hidden;
  /* base vibrating field: orange<->teal radial clash */
  background:
    radial-gradient(circle at 50% 38%, #1aa7a0 0%, #1aa7a0 18%, #6b2cc9 19%, #6b2cc9 31%, #f24b1e 32%, #f24b1e 44%, #6b2cc9 45%, #6b2cc9 57%, #1aa7a0 58%, #1aa7a0 72%, #6b2cc9 73%);
}

/* ---- the swirling stage ---- */
.stage{
  position:relative;
  min-height:100vh;
  min-height:100svh;
  display:flex;
  flex-direction:column;
  align-items:center;
  isolation:isolate;
  padding:18px 16px 40px;
}

/* breathing color shimmer of the whole field (frozen for reduced-motion) */
.field-shimmer{
  position:fixed; inset:-10%;
  z-index:-2;
  pointer-events:none;
  background:
    repeating-radial-gradient(circle at 50% 40%,
      #f5d00033 0 14px, #6b2cc933 14px 28px, #1aa7a033 28px 42px);
  mix-blend-mode:overlay;
  animation:breathe 7s ease-in-out infinite alternate;
}
@keyframes breathe{
  from{ transform:scale(1) rotate(0deg); opacity:.55 }
  to{ transform:scale(1.12) rotate(4deg); opacity:.85 }
}

/* top band: presenter line, kept compact so the oval is in first screen */
.bill{
  width:100%;
  max-width:1180px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  color:var(--yellow);
  text-shadow:2px 2px 0 var(--violet-deep);
  font-family:"Rye",serif;
  letter-spacing:.04em;
  font-size:clamp(11px,1.5vw,16px);
  text-transform:uppercase;
  z-index:3;
}
.bill .presents{ color:var(--paper); text-shadow:2px 2px 0 var(--orange-deep) }
.bill b{ color:#f7e9c9 }

/* ============================================================
   THE OVAL POSTER  -  the signature mechanic
   A melting ovoid frame; the brand name is warped SVG text-on-path
   that thickens/thins and bends to fill the oval. Media sit inside a
   melting window. Vibrating complementary color throughout.
============================================================ */
.poster{
  position:relative;
  width:min(94vw, 760px);
  margin:10px auto 0;
  aspect-ratio:760/940;
  filter:drop-shadow(0 18px 40px #2a0f3d80);
  z-index:2;
}
.poster svg{ width:100%; height:100%; display:block; overflow:visible }

/* the warped headline letters get a faint vibrate (paused on RM) */
.vibrate{ animation:vibe .12s steps(2) infinite }
@keyframes vibe{
  0%{ transform:translate(0,0) }
  50%{ transform:translate(.6px,-.4px) }
  100%{ transform:translate(-.5px,.4px) }
}

/* ---- the media window inside the oval ---- */
.window{
  position:absolute;
  /* melting porthole seated below the mid headline word so lettering reads */
  left:50%; top:58%;
  transform:translate(-50%,-50%);
  width:39%;
  aspect-ratio:1/1;
  border-radius:46% 54% 50% 50% / 54% 46% 54% 46%;
  overflow:hidden;
  background:var(--ink);
  box-shadow:0 0 0 6px #f5d000, 0 0 0 12px #f24b1e, 0 0 0 18px #6b2cc9, 0 0 36px #1aa7a0;
  z-index:4;
}
.window .stageMedia{
  position:absolute; inset:0;
  width:100%; height:100%;
}
.window img, .window video{
  width:100%; height:100%;
  object-fit:cover;        /* portrait porthole, landscape art: cover OK here, it is a vignette not the page */
  display:block;
  filter:saturate(1.35) contrast(1.05);
}
.window .label{
  position:absolute; left:0; right:0; bottom:0;
  padding:8px 10px 9px;
  background:linear-gradient(transparent, #2a0f3dcc 55%);
  color:var(--yellow);
  font-family:"Rye",serif;
  font-size:clamp(10px,1.6vw,14px);
  text-align:center;
  text-shadow:1px 1px 0 var(--violet-deep);
  pointer-events:none;
}

/* ---- the act / lineup row, like the band list on a Fillmore bill ---- */
.lineup{
  width:min(94vw,760px);
  margin:18px auto 0;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  z-index:3;
}
.act{
  position:relative;
  border:0;
  cursor:pointer;
  padding:0;
  width:96px; height:96px;
  border-radius:48% 52% 50% 50% / 52% 48% 52% 48%;
  overflow:hidden;
  background:var(--violet-deep);
  box-shadow:0 0 0 3px #f5d000, 0 0 0 6px #f24b1e;
  transition:transform .25s ease, box-shadow .25s ease;
  outline:none;
}
.act img{
  width:100%; height:100%; object-fit:cover; display:block;
  filter:saturate(1.3);
  transition:filter .25s ease, transform .25s ease;
}
.act .ttl{
  position:absolute; inset:auto 0 0 0;
  font-family:"Rye",serif;
  font-size:9px; line-height:1.05;
  color:var(--paper);
  background:#2a0f3dcc;
  padding:3px 4px;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:.02em;
}
.act:hover, .act.on{ transform:scale(1.12) rotate(-3deg) }
.act.on{ box-shadow:0 0 0 3px #1aa7a0, 0 0 0 7px #f24b1e, 0 0 22px #f5d000 }
.act:focus-visible{ box-shadow:0 0 0 4px #f7e9c9, 0 0 0 9px #6b2cc9 }
.act .playdot{
  position:absolute; top:6px; right:6px;
  width:16px; height:16px; border-radius:50%;
  background:#f5d000; color:#2a0f3d;
  font-family:"Alfa Slab One"; font-size:9px;
  display:none; align-items:center; justify-content:center;
  box-shadow:0 0 0 2px #f24b1e;
}
.act[data-kind="video"] .playdot{ display:flex }
.act[data-kind="audio"] .playdot{ display:flex; background:#1aa7a0; color:#f7e9c9 }

/* dates ribbon under the lineup */
.dates{
  margin:22px auto 6px;
  width:min(94vw,760px);
  text-align:center;
  color:var(--paper);
  font-family:"Rye",serif;
  text-transform:uppercase;
  letter-spacing:.06em;
  font-size:clamp(13px,2.2vw,22px);
  text-shadow:2px 2px 0 var(--orange-deep), -1px -1px 0 var(--teal);
  z-index:3;
}
.dates .tix{
  display:inline-block;
  margin-top:12px;
  padding:10px 22px;
  border-radius:40% 60% 55% 45% / 55% 45% 60% 40%;
  background:var(--yellow);
  color:var(--violet-deep);
  font-family:"Alfa Slab One";
  font-size:clamp(13px,2vw,18px);
  letter-spacing:.02em;
  text-shadow:none;
  box-shadow:0 0 0 4px #f24b1e, 0 0 0 8px #1aa7a0;
  text-decoration:none;
  transition:transform .2s ease;
}
.dates .tix:hover{ transform:scale(1.06) rotate(-2deg) }
.dates .tix:focus-visible{ outline:3px solid #f7e9c9; outline-offset:3px }

/* ===== MOBILE: keep the warped lettering contained, never crop ===== */
@media (max-width:640px){
  .poster{ width:min(96vw,460px); aspect-ratio:460/600 }
  /* seat the porthole between the mid word and the bottom dome so neither is covered */
  .window{ width:44%; top:57% }
  .act{ width:74px; height:74px }
  .bill{ flex-direction:column; gap:4px; text-align:center }
  .bill .right{ order:3 }
}
@media (max-width:380px){
  .act{ width:64px; height:64px }
}

/* ===== reduced motion: freeze ALL shimmer + vibrate, show final state ===== */
@media (prefers-reduced-motion:reduce){
  .field-shimmer{ animation:none; opacity:.7; transform:none }
  .vibrate{ animation:none }
  .act, .tix, .window{ transition:none }
}

/* small footer credit, still on-paradigm */
.credit{
  margin-top:30px;
  color:#f7e9c9cc;
  font-family:"Rye",serif;
  font-size:11px;
  letter-spacing:.04em;
  text-align:center;
  text-shadow:1px 1px 0 #4a1a93;
  z-index:3;
}
</style>
</head>
<body>
<!-- ============================================================
     DATA  -  swap these to retheme the poster. Keep 4-6 acts.
     headline words bend to fill the oval; media reuse ../assets/.
============================================================ -->
<script>
const DATA = {
  presents: "Vesperwerk Light & Sound presents",
  hall: "at the Melting Hall",
  // headline words, top to bottom, that warp around the oval
  headline: ["VIBRATIN", "FILLMORE", "REVUE"],
  // the act lineup (porthole thumbnails). kind drives the badge + focus play.
  acts: [
    { id:"car",    title:"Night Mercedes", kind:"image", src:"../assets/flux-car-4k.png" },
    { id:"kling",  title:"Kling Loop",     kind:"video", src:"../assets/kling-video.mp4",  poster:"../assets/gen/poster-kling-video.png" },
    { id:"fox",    title:"Autumn Fox",     kind:"image", src:"../assets/sdxl.png" },
    { id:"veo",    title:"Veo Drift",      kind:"video", src:"../assets/veo-video.mp4",    poster:"../assets/gen/poster-veo-video.png" },
    { id:"clinic", title:"Mint Clinic",    kind:"image", src:"../assets/flux-clinic-4k.png" },
    { id:"music",  title:"MusicGen",       kind:"audio", src:"../assets/musicgen.wav",     poster:"../assets/gen/wave-musicgen.png" }
  ],
  dates: "Fri / Sat / Sun  -  June 19, 20, 21",
  ticket: { label:"Tickets at the Door", href:"#" }
};
</script>

<div class="field-shimmer" aria-hidden="true"></div>

<main class="stage">

  <!-- compact top bill so the oval lands in the first screen -->
  <div class="bill">
    <span class="presents" id="bPresents"></span>
    <b class="right" id="bHall"></b>
  </div>

  <!-- THE OVAL POSTER (signature, visible at scroll=0) -->
  <section class="poster" aria-label="Psychedelic concert poster">
    <svg viewBox="0 0 760 940" role="img" aria-labelledby="postTitle">
      <title id="postTitle">Vibratin Fillmore Revue, a 1960s style psychedelic concert poster</title>
      <defs>
        <!-- text-on-path arcs: top dome, middle bulge, bottom dome of the oval -->
        <path id="arcTop"  d="M 100 300 C 100 120, 660 120, 660 300" fill="none"/>
        <path id="arcMid"  d="M 78 400 C 78 290, 682 290, 682 400" fill="none"/>
        <path id="arcBot"  d="M 130 700 C 222 884, 538 884, 630 700" fill="none"/>

        <!-- swirling organic frame ornament: melting petals around the oval -->
        <radialGradient id="gPaper" cx="50%" cy="42%" r="62%">
          <stop offset="0%"  stop-color="#f5d000"/>
          <stop offset="46%" stop-color="#f24b1e"/>
          <stop offset="72%" stop-color="#6b2cc9"/>
          <stop offset="100%" stop-color="#1aa7a0"/>
        </radialGradient>
        <filter id="warp">
          <feTurbulence type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="n"/>
          <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>

      <!-- outer melting ovoid plate -->
      <ellipse cx="380" cy="470" rx="372" ry="462" fill="url(#gPaper)"/>
      <ellipse cx="380" cy="470" rx="352" ry="442" fill="none" stroke="#2a0f3d" stroke-width="5"/>

      <!-- swirling petal ornament ring (organic, hand-drawn feel) -->
      <g id="ornament" stroke="#2a0f3d" stroke-width="4" fill="none" opacity="0.9"></g>

      <!-- vibrating complementary inner field: teal core, orange halo -->
      <ellipse cx="380" cy="470" rx="318" ry="404" fill="#1aa7a0"/>
      <ellipse cx="380" cy="470" rx="318" ry="404" fill="none" stroke="#f24b1e" stroke-width="9" stroke-dasharray="3 7"/>

      <!-- inner aged-paper oval the lettering sits on -->
      <ellipse cx="380" cy="470" rx="300" ry="384" fill="#f7e9c9"/>

      <!-- WARPED HAND-DRAWN LETTERING (text-on-path), thick/thin + warp filter.
           textLength + lengthAdjust constrain each word to its arc chord so ANY
           swapped headline word fills (never overflows) the cream oval. -->
      <g class="vibrate" filter="url(#warp)">
        <!-- top dome word: violet, outlined in acid yellow, vibrates on cream -->
        <text font-family="'Alfa Slab One', serif" font-size="112" fill="#6b2cc9"
              stroke="#f5d000" stroke-width="3" paint-order="stroke" letter-spacing="2"
              text-anchor="middle">
          <textPath href="#arcTop" startOffset="50%" id="lineTop"
                    textLength="470" lengthAdjust="spacingAndGlyphs"></textPath>
        </text>
        <!-- mid bulge word: molten orange on cream, the loudest line, vibrates hardest -->
        <text font-family="'Shrikhand', serif" font-size="118" fill="#f24b1e"
              stroke="#4a1a93" stroke-width="3" paint-order="stroke" text-anchor="middle">
          <textPath href="#arcMid" startOffset="50%" id="lineMid"
                    textLength="520" lengthAdjust="spacingAndGlyphs"></textPath>
        </text>
        <!-- bottom dome word: teal, outlined in orange, mirrors the top -->
        <text font-family="'Alfa Slab One', serif" font-size="104" fill="#1aa7a0"
              stroke="#f24b1e" stroke-width="3" paint-order="stroke" letter-spacing="2"
              text-anchor="middle">
          <textPath href="#arcBot" startOffset="50%" id="lineBot"
                    textLength="430" lengthAdjust="spacingAndGlyphs"></textPath>
        </text>
      </g>

      <!-- acid-yellow vibrating dot fringe inside the rim -->
      <ellipse cx="380" cy="470" rx="296" ry="380" fill="none"
               stroke="#f5d000" stroke-width="6" stroke-dasharray="2 14" opacity="0.85"/>
    </svg>

    <!-- the live media porthole, layered over the oval center -->
    <div class="window" id="window">
      <div class="stageMedia" id="stageMedia"></div>
      <div class="label" id="windowLabel"></div>
    </div>
  </section>

  <!-- the band lineup: melting porthole thumbs, click to load the focused one -->
  <div class="lineup" id="lineup" role="tablist" aria-label="Lineup, choose an act to feature"></div>

  <!-- dates ribbon + ticket -->
  <div class="dates">
    <div id="dDates"></div>
    <a class="tix" id="dTix" href="#"></a>
  </div>

  <div class="credit">Native CSS / SVG only. No GSAP, no libs. Warped text-on-path lettering, vibrating complementary field.</div>
</main>

<script>
(function(){
  const rm = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ---- fill the bill + headline ---- */
  document.getElementById("bPresents").textContent = DATA.presents;
  document.getElementById("bHall").textContent = DATA.hall;
  document.getElementById("lineTop").textContent = DATA.headline[0] || "";
  document.getElementById("lineMid").textContent = DATA.headline[1] || "";
  document.getElementById("lineBot").textContent = DATA.headline[2] || "";
  document.getElementById("dDates").textContent = DATA.dates;
  const tix = document.getElementById("dTix");
  tix.textContent = DATA.ticket.label; tix.href = DATA.ticket.href;

  /* ---- generate the swirling organic petal ornament ring (pure SVG paths) ---- */
  const orn = document.getElementById("ornament");
  const cx=380, cy=470, n=20;
  let paths="";
  for(let i=0;i<n;i++){
    const a = (i/n)*Math.PI*2;
    const rx=336, ry=426;
    const x = cx + Math.cos(a)*rx;
    const y = cy + Math.sin(a)*ry;
    // a small melting paisley teardrop pointing outward
    const a2 = a + Math.PI/2;
    const len = 22 + (i%2)*10;
    const tx = x + Math.cos(a)*len;
    const ty = y + Math.sin(a)*len;
    const w = 13;
    const lx = x + Math.cos(a2)*w, ly = y + Math.sin(a2)*w;
    const rxp = x - Math.cos(a2)*w, ryp = y - Math.sin(a2)*w;
    paths += `<path d="M ${lx.toFixed(1)} ${ly.toFixed(1)} Q ${tx.toFixed(1)} ${ty.toFixed(1)} ${rxp.toFixed(1)} ${ryp.toFixed(1)}"/>`;
  }
  orn.innerHTML = paths;

  /* ============================================================
     LINEUP  +  single focused media stage (never autoplay all)
     Only the focused/locked act plays; others show poster/still.
  ============================================================ */
  const lineup = document.getElementById("lineup");
  const stageMedia = document.getElementById("stageMedia");
  const windowLabel = document.getElementById("windowLabel");
  let currentVideo = null;

  function thumbSrc(a){
    if(a.kind === "image") return a.src;
    return a.poster || a.src; // video/audio use poster/wave still in the thumb
  }

  // build lineup thumbs
  DATA.acts.forEach((a, idx)=>{
    const b = document.createElement("button");
    b.className = "act";
    b.setAttribute("role","tab");
    b.setAttribute("data-kind", a.kind);
    b.setAttribute("aria-label", a.title + " (" + a.kind + ")");
    b.dataset.idx = idx;
    b.innerHTML =
      '<img src="'+thumbSrc(a)+'" alt="'+a.title+'" loading="lazy" decoding="async" />' +
      '<span class="playdot">'+(a.kind==="audio" ? "♪" : "▶")+'</span>' +
      '<span class="ttl">'+a.title+'</span>';
    b.addEventListener("click", ()=> focusAct(idx));
    lineup.appendChild(b);
  });

  function clearStage(){
    if(currentVideo){
      try{ currentVideo.pause(); }catch(e){}
      currentVideo = null;
    }
    stageMedia.innerHTML = "";
  }

  function focusAct(idx){
    const a = DATA.acts[idx];
    clearStage();

    // mark active tab
    [...lineup.children].forEach((c,i)=>{
      const on = i===idx;
      c.classList.toggle("on", on);
      c.setAttribute("aria-selected", on ? "true" : "false");
    });

    windowLabel.textContent = a.title;

    if(a.kind === "video"){
      const v = document.createElement("video");
      v.src = a.src;
      v.poster = a.poster || "";
      v.muted = true;          // landscape loops are silent; muted lets in-view autoplay
      v.loop = true;
      v.playsInline = true;
      v.setAttribute("playsinline","");
      v.preload = "metadata";
      stageMedia.appendChild(v);
      currentVideo = v;
      // only this single focused video ever plays -> no simultaneous decode
      if(!rm){ v.play().catch(()=>{}); }
    } else if(a.kind === "audio"){
      // show the waveform still + a real audio element (no autoplay; user-gesture)
      const wrap = document.createElement("div");
      wrap.style.cssText = "position:absolute;inset:0;background:#2a0f3d;display:flex;align-items:center;justify-content:center";
      const img = document.createElement("img");
      img.src = a.poster || "";
      img.alt = a.title + " waveform";
      img.style.cssText = "width:84%;height:auto;filter:hue-rotate(20deg) saturate(2)";
      wrap.appendChild(img);
      const au = document.createElement("audio");
      au.src = a.src; au.controls = true;
      au.style.cssText = "position:absolute;left:6%;right:6%;bottom:8%;width:88%";
      wrap.appendChild(au);
      stageMedia.appendChild(wrap);
    } else {
      const img = document.createElement("img");
      img.src = a.src;
      img.alt = a.title;
      img.loading = "eager"; img.decoding = "async";
      stageMedia.appendChild(img);
    }
  }

  // pause the focused video when the poster scrolls out of view (perf)
  const poster = document.querySelector(".poster");
  if("IntersectionObserver" in window){
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(!currentVideo) return;
        if(e.isIntersecting && !rm){ currentVideo.play().catch(()=>{}); }
        else { try{ currentVideo.pause(); }catch(err){} }
      });
    }, { threshold:0.25 });
    io.observe(poster);
  }

  // open on the first act so scroll=0 shows a populated porthole, not an empty hole
  focusAct(0);
})();
</script>
</body>
</html>
