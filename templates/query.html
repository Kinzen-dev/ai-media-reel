<!-- TEMPLATE: Query - Hover-Reveal Index | ARCHETYPE: QUERY hover-reveal index | REF: Obys Agency, Unseen Studio | WHEN TO USE: a generative reel / portfolio presented as a typographic index you "query" with the cursor; rows reveal their asset on hover, click locks it | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>QUERY // The Reel Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   QUERY - hover-reveal index. Two-color: near-black + cyan.
   Media supplies all the color; type is monochrome.
   ============================================================ */
:root{
  --bg:#0a0a0b;
  --ink:#f4f4f1;
  --dim:#5d5d61;
  --accent:#19f0d8;        /* electric cyan */
  --line:rgba(244,244,241,.12);
  --reveal-w:min(46vw,560px);
  --reveal-h:min(60vh,460px);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Archivo',sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  min-height:100vh;
  cursor:none; /* custom cursor on desktop */
}
body.no-cursor{cursor:auto}
::selection{background:var(--accent);color:#04130f}

a{color:inherit;text-decoration:none}

/* ---------- shell ---------- */
.wrap{
  position:relative;
  z-index:3;
  max-width:1480px;
  margin:0 auto;
  padding:clamp(22px,4vw,56px);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ---------- header ---------- */
header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:24px;
  padding-bottom:clamp(28px,5vw,60px);
  border-bottom:1px solid var(--line);
  mix-blend-mode:difference; /* stays legible over revealed media */
}
.brand{
  font-weight:900;
  font-size:clamp(20px,2.4vw,30px);
  letter-spacing:-.02em;
  line-height:.95;
}
.brand b{color:var(--accent)}
.lede{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;
  line-height:1.55;
  color:var(--dim);
  max-width:34ch;
  text-align:right;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.lede .blink{color:var(--accent);animation:blink 1.1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}

/* ---------- prompt bar ---------- */
.promptbar{
  display:flex;align-items:baseline;gap:14px;
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(12px,1.4vw,15px);
  color:var(--dim);
  padding:clamp(16px,2.4vw,26px) 0;
  border-bottom:1px solid var(--line);
  text-transform:uppercase;letter-spacing:.05em;
  mix-blend-mode:difference;
}
.promptbar .car{color:var(--accent)}
.promptbar .typed{color:var(--ink)}

/* ---------- index list ---------- */
.index{
  flex:1;
  list-style:none;
  counter-reset:row;
}
.row{
  counter-increment:row;
  position:relative;
  display:grid;
  grid-template-columns:auto 1fr auto auto;
  align-items:baseline;
  gap:clamp(14px,2.5vw,40px);
  padding:clamp(14px,2.3vw,26px) 4px;
  border-bottom:1px solid var(--line);
  cursor:none;
  transition:background .4s ease;
}
.row .num{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(11px,1vw,13px);
  color:var(--dim);
  letter-spacing:.02em;
  transition:color .35s ease;
}
.row .num::before{content:counter(row,decimal-leading-zero)}
.row .title{
  font-weight:800;
  font-size:clamp(26px,5.4vw,68px);
  letter-spacing:-.03em;
  line-height:.92;
  color:var(--ink);
  transition:opacity .4s ease,transform .5s cubic-bezier(.2,.7,.2,1),color .35s ease;
  will-change:transform;
  text-wrap:balance;
}
.row .tool,.row .modality{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(10px,1vw,13px);
  color:var(--dim);
  letter-spacing:.04em;
  text-transform:uppercase;
  white-space:nowrap;
  transition:color .35s ease;
}
.row .modality{
  color:var(--accent);opacity:.62;
  min-width:7ch;text-align:right;
}

/* hover / active row state */
.row:hover .num,.row.lock .num{color:var(--accent)}
.row:hover .tool,.row.lock .tool{color:var(--ink)}
.row:hover .modality,.row.lock .modality{opacity:1}
.row:hover .title,.row.lock .title{
  transform:translateX(clamp(8px,1.6vw,26px));
}
.row:focus{outline:none}
.row:focus-visible{outline:none}
.row:focus-visible .title{
  transform:translateX(clamp(8px,1.6vw,26px));
  color:var(--accent);
  text-decoration:underline;text-decoration-color:var(--accent);
  text-underline-offset:8px;text-decoration-thickness:2px;
}
.row:focus-visible .num{color:var(--accent)}
/* dim the other rows so the queried one pops */
.index.querying .row:not(:hover):not(.lock) .title{opacity:.32}
.index.querying .row:not(:hover):not(.lock) .num,
.index.querying .row:not(:hover):not(.lock) .tool,
.index.querying .row:not(:hover):not(.lock) .modality{opacity:.3}

.row.lock .title{color:var(--accent)}
.row .lockbadge{
  position:absolute;
  left:4px;top:50%;transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:.1em;
  color:var(--accent);
  opacity:0;pointer-events:none;
  text-transform:uppercase;
}
.row.lock .lockbadge{opacity:1;animation:badgeIn .4s ease}
@keyframes badgeIn{from{opacity:0;transform:translate(-6px,-50%)}}

/* footer */
footer{
  margin-top:clamp(40px,7vw,90px);
  display:flex;justify-content:space-between;align-items:flex-end;gap:20px;
  font-family:'JetBrains Mono',monospace;
  font-size:11px;color:var(--dim);
  text-transform:uppercase;letter-spacing:.05em;
  mix-blend-mode:difference;
}
footer .hint{color:var(--dim)}
footer .hint kbd{
  color:var(--accent);border:1px solid var(--line);
  padding:1px 6px;border-radius:3px;font-family:inherit;
}

/* ---------- the cursor-driven reveal stage ---------- */
#stage{
  position:fixed;inset:0;z-index:1;pointer-events:none;
}
.reveal{
  position:fixed;
  width:var(--reveal-w);
  height:var(--reveal-h);
  left:0;top:0;
  transform:translate(-50%,-50%) scale(.9);
  opacity:0;
  border-radius:3px;
  overflow:hidden;
  pointer-events:none;
  box-shadow:0 40px 90px -30px rgba(0,0,0,.9);
  transition:opacity .42s ease, transform .5s cubic-bezier(.16,.84,.32,1);
  will-change:transform,opacity;
}
.reveal.on{opacity:1;transform:translate(-50%,-50%) scale(1)}
.reveal::after{ /* subtle scanline / vignette to tie media into the brand */
  content:"";position:absolute;inset:0;pointer-events:none;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.07),
             inset 0 0 80px rgba(0,0,0,.35);
  background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(0,0,0,.10) 3px 4px);
  mix-blend-mode:multiply;
}
.reveal media-el,.reveal img,.reveal video{
  width:100%;height:100%;object-fit:cover;display:block;
  filter:saturate(1.05) contrast(1.02);
}
/* media meta chip inside reveal */
.reveal .chip{
  position:absolute;left:10px;bottom:10px;z-index:2;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  color:var(--accent);
  background:rgba(8,8,10,.6);backdrop-filter:blur(6px);
  padding:5px 9px;border:1px solid rgba(25,240,216,.25);border-radius:2px;
}
.reveal.locked .chip::before{content:"LOCKED // ";color:var(--ink)}

/* parallax shadow plate behind the reveal */
.shadowplate{
  position:fixed;width:var(--reveal-w);height:var(--reveal-h);
  left:0;top:0;transform:translate(-50%,-50%);
  background:var(--accent);opacity:0;border-radius:3px;
  filter:blur(2px);pointer-events:none;z-index:0;
  transition:opacity .42s ease;
}
.shadowplate.on{opacity:.16}

/* ---------- custom cursor ---------- */
#cursor{
  position:fixed;z-index:50;left:0;top:0;pointer-events:none;
  width:54px;height:54px;margin:-27px 0 0 -27px;
  border:1px solid var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:9px;
  letter-spacing:.08em;color:var(--accent);text-transform:uppercase;
  transition:width .25s ease,height .25s ease,margin .25s ease,
             background .25s ease,color .25s ease,opacity .2s ease,border-color .25s;
  mix-blend-mode:difference;opacity:0;
}
#cursor.show{opacity:1}
#cursor.hot{
  width:74px;height:74px;margin:-37px 0 0 -37px;
  background:var(--accent);color:#04130f;border-color:var(--accent);
}
#cursor.locked{background:transparent;border-color:var(--ink);color:var(--ink)}
#cursor .lab{transform:scale(.9)}

/* noise grain overlay */
.grain{
  position:fixed;inset:0;z-index:4;pointer-events:none;opacity:.045;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
}

/* ============================================================
   MOBILE (<=860 collapse meta; <=640 full mobile = tap to expand)
   Never cover-crop a landscape asset into a portrait viewport:
   media is letterboxed (object-fit:contain) when expanded inline.
   ============================================================ */
@media (max-width:860px){
  .row{grid-template-columns:auto 1fr;grid-row-gap:6px}
  .row .tool{grid-column:2;justify-self:start;text-align:left;margin-top:2px}
  .row .modality{grid-column:1;grid-row:2;text-align:left;min-width:0}
}
@media (max-width:640px){
  body{cursor:auto}
  #cursor,#stage,.shadowplate,.grain{display:none}
  header{mix-blend-mode:normal}
  .promptbar{mix-blend-mode:normal}
  footer{mix-blend-mode:normal}
  .lede{text-align:left;max-width:none}
  header{flex-direction:column;gap:14px}
  .row{padding:18px 2px}
  .row .title{font-size:clamp(30px,11vw,52px)}
  .index.querying .row:not(:hover) .title{opacity:1} /* no hover dim on touch */
  .index.querying .row .num,.index.querying .row .tool,
  .index.querying .row .modality{opacity:1}
  /* inline expanding media panel */
  .m-media{
    grid-column:1 / -1;
    height:0;overflow:hidden;
    border-radius:3px;margin-top:0;
    background:#050506;
    transition:height .45s cubic-bezier(.2,.7,.2,1),margin-top .45s ease;
  }
  .row.open .m-media{
    height:min(58vw,300px);margin-top:14px;
    border:1px solid var(--line);
  }
  .m-media .holder{
    width:100%;height:100%;display:flex;align-items:center;justify-content:center;
    background:#000;position:relative;
  }
  .m-media img,.m-media video{
    max-width:100%;max-height:100%;width:auto;height:auto;
    object-fit:contain; /* letterbox - never crop */
    display:block;
  }
  .m-media .chip{
    position:absolute;left:8px;bottom:8px;
    font-family:'JetBrains Mono',monospace;font-size:9px;
    letter-spacing:.06em;text-transform:uppercase;color:var(--accent);
    background:rgba(8,8,10,.7);padding:4px 7px;border-radius:2px;
    border:1px solid rgba(25,240,216,.25);
  }
  .row.open .title{color:var(--accent)}
  .row .plus{
    grid-column:2;grid-row:1;justify-self:end;align-self:center;
    font-family:'JetBrains Mono',monospace;color:var(--accent);
    font-size:20px;line-height:1;transition:transform .3s ease;
  }
  .row.open .plus{transform:rotate(45deg)}
}
/* on desktop the mobile-only nodes are inert */
@media (min-width:641px){ .m-media,.plus{display:none} }

@media (prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
  .reveal{transform:translate(-50%,-50%)}
}
</style>
</head>
<body>

<!-- reveal stage sits behind the type -->
<div class="shadowplate" id="shadowplate"></div>
<div id="stage"></div>

<div class="wrap">
  <header>
    <div class="brand">GEN<b>/</b>REEL<br>INDEX <b>&rsquo;26</b></div>
    <div class="lede">
      A queryable index of generated assets.<br>
      Move the cursor to surface a frame.<br>
      <span class="blink">&#9608;</span> click to lock // esc to release
    </div>
  </header>

  <div class="promptbar">
    <span class="car">&gt;</span>
    <span>query</span>
    <span class="typed" id="queryEcho">the_reel</span>
    <span style="margin-left:auto">[ <span class="car" id="assetCount">15</span> assets indexed ]</span>
  </div>

  <ul class="index" id="index"><!-- rows injected --></ul>

  <footer>
    <div>VESPERWERK &middot; GENERATIVE STUDIO</div>
    <div class="hint">HOVER = PREVIEW &middot; CLICK = <kbd>LOCK</kbd> &middot; <kbd>ESC</kbd> = RELEASE</div>
  </footer>
</div>

<div class="grain"></div>
<div id="cursor"><span class="lab" id="cursorLab">VIEW</span></div>

<script>
/* ============================================================
   DATA  -  swap freely. Each entry =
     title    : big index line
     tool     : mono meta (model / generator)
     modality : mono meta (image|video|audio|3d)
     type     : 'image' | 'video'  (audio uses its waveform image)
     src      : media path (relative to this file's location)
     poster   : poster image for video (shown until in-view play)
     audio    : true if it's an audio waveform card
   Assets live in ../assets and ../assets/gen relative to this template.
   ============================================================ */
const A = '../assets/';
const G = '../assets/gen/';
const DATA = [
  { title:'Matte Black on Wet Neon', tool:'FLUX.1 / 4K upscale', modality:'image', type:'image', src:A+'flux-car-4k.png' },
  { title:'The Mercedes, Animated',  tool:'FLUX img2vid',        modality:'video', type:'video', src:A+'flux-car-i2v.mp4',     poster:G+'poster-flux-car-i2v.png' },
  { title:'Black Car / Native Audio',tool:'Veo',                 modality:'video', type:'video', src:A+'veo-video.mp4',         poster:G+'poster-veo-video.png' },
  { title:'Silver, Motion Blur',     tool:'Kling',               modality:'video', type:'video', src:A+'kling-video.mp4',       poster:G+'poster-kling-video.png' },
  { title:'Neon Forecourt',          tool:'fal.ai',              modality:'video', type:'video', src:A+'fal-video.mp4',         poster:G+'poster-fal-video.png' },
  { title:'Serene Mint Clinic',      tool:'FLUX.1 / 4K upscale', modality:'image', type:'image', src:A+'flux-clinic-4k.png' },
  { title:'Painterly Autumn Fox',    tool:'SDXL',                modality:'image', type:'image', src:A+'sdxl.png' },
  { title:'Low-Fi Apple Study',      tool:'TinySD',              modality:'image', type:'image', src:A+'hf-tinysd.png' },
  { title:'Thai Avatar / Spoken',    tool:'HeyGen',              modality:'video', type:'video', src:A+'heygen-avatar.mp4',     poster:G+'poster-heygen.png' },
  { title:'Talking Portrait',        tool:'D-ID',                modality:'video', type:'video', src:A+'did-talking-photo.mp4', poster:G+'poster-did.png' },
  { title:'Title Card Loop',         tool:'HyperFrames',         modality:'video', type:'video', src:A+'hyperframes.mp4',       poster:G+'poster-hyperframes.png' },
  { title:'Thai Voice / ElevenLabs', tool:'ElevenLabs TTS',      modality:'audio', type:'image', src:G+'wave-elevenlabs.png', audio:true, sound:A+'elevenlabs-thai.mp3' },
  { title:'Generated Score',         tool:'MusicGen',            modality:'audio', type:'image', src:G+'wave-musicgen.png',   audio:true, sound:A+'musicgen.wav' },
  { title:'Offline Neural Voice',    tool:'Piper',               modality:'audio', type:'image', src:G+'wave-piper.png',      audio:true, sound:A+'piper.wav' },
  { title:'Tooth Mascot / 3D',       tool:'Meshy (refined)',     modality:'3d',    type:'image', src:A+'meshy-refined-thumb.png' }
];

/* ============================================================
   BUILD ROWS
   ============================================================ */
const index = document.getElementById('index');
const stage = document.getElementById('stage');
const shadowplate = document.getElementById('shadowplate');
const reducedMotion = matchMedia('(prefers-reduced-motion:reduce)').matches;
const isTouch = matchMedia('(max-width:640px)').matches || ('ontouchstart' in window && innerWidth<=640);

DATA.forEach((d,i)=>{
  const li=document.createElement('li');
  li.className='row';
  li.dataset.i=i;
  li.tabIndex=0;
  li.setAttribute('aria-label', d.title+' - '+d.tool+' - '+d.modality);
  li.innerHTML = `
    <span class="num"></span>
    <span class="title">${d.title}</span>
    <span class="tool">${d.tool}</span>
    <span class="modality">${d.modality}</span>
    <span class="plus" aria-hidden="true">+</span>
    <span class="lockbadge">&#9679; locked</span>
    <div class="m-media" aria-hidden="true"><div class="holder"></div></div>`;
  index.appendChild(li);
});

const rows=[...index.querySelectorAll('.row')];
const _ac=document.getElementById('assetCount'); if(_ac) _ac.textContent=String(DATA.length).padStart(2,'0');

/* ============================================================
   DESKTOP: cursor-driven reveal + custom cursor + parallax
   ============================================================ */
const cursorEl=document.getElementById('cursor');
const cursorLab=document.getElementById('cursorLab');
const queryEcho=document.getElementById('queryEcho');

let reveal=null;             // current floating reveal node
let activeRow=null;          // hovered row index
let lockedRow=null;          // locked row index
let mx=innerWidth/2, my=innerHeight/2;       // cursor target
let rx=mx, ry=my;            // reveal eased position
let cx=mx, cy=my;            // custom-cursor eased position
let lastMouseTime=0;

/* create a reveal media node for a row, lazily */
function makeReveal(d){
  const node=document.createElement('div');
  node.className='reveal';
  let inner='';
  if(d.type==='video'){
    inner=`<video src="${d.src}" poster="${d.poster||''}" muted loop playsinline preload="metadata"></video>`;
  }else{
    inner=`<img src="${d.src}" alt="" loading="lazy" draggable="false">`;
  }
  node.innerHTML = inner + `<span class="chip">${d.tool} &middot; ${d.modality}</span>`;
  return node;
}

function clearReveal(){
  if(reveal){
    const dead=reveal;
    dead.classList.remove('on');
    const v=dead.querySelector('video'); if(v) v.pause();
    setTimeout(()=>dead.remove(),460);
    reveal=null;
  }
  shadowplate.classList.remove('on');
}

function showReveal(i){
  if(lockedRow!==null) return;     // locked takes priority
  const d=DATA[i];
  clearReveal();
  reveal=makeReveal(d);
  stage.appendChild(reveal);
  // force layout then animate in
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    if(reveal) reveal.classList.add('on');
  }));
  shadowplate.classList.add('on');
  const v=reveal.querySelector('video');
  if(v && !reducedMotion){ v.play().catch(()=>{}); }   // reduced motion: hold the poster frame
  queryEcho.textContent = d.title.toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,18);
}

/* hover wiring (desktop only) */
if(!isTouch){
  rows.forEach((row,i)=>{
    row.addEventListener('mouseenter',()=>{
      activeRow=i; index.classList.add('querying');
      cursorEl.classList.add('hot'); cursorLab.textContent = lockedRow===i?'LOCKED':'VIEW';
      showReveal(i);
    });
    row.addEventListener('mouseleave',()=>{
      if(activeRow===i){ activeRow=null; }
      if(lockedRow===null){
        index.classList.remove('querying');
        cursorEl.classList.remove('hot');
        clearReveal();
      }
    });
    row.addEventListener('click',()=>toggleLock(i));
    /* keyboard: enter to lock, focus to preview */
    row.addEventListener('focus',()=>{ if(lockedRow===null){ activeRow=i; index.classList.add('querying'); showReveal(i);} });
    row.addEventListener('blur',()=>{ if(lockedRow===null && activeRow===i){activeRow=null; index.classList.remove('querying'); clearReveal();} });
    row.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key===' '){ e.preventDefault(); toggleLock(i); }
    });
  });

  function toggleLock(i){
    if(lockedRow===i){
      // unlock
      rows[i].classList.remove('lock');
      lockedRow=null;
      cursorEl.classList.remove('locked');
      // keep showing if still hovered, else clear
      if(activeRow===i){ showRevealForce(i); } else { clearReveal(); index.classList.remove('querying'); }
    }else{
      if(lockedRow!==null) rows[lockedRow].classList.remove('lock');
      lockedRow=i;
      rows[i].classList.add('lock');
      index.classList.add('querying');
      cursorEl.classList.add('locked');
      showRevealForce(i);
      if(reveal) reveal.classList.add('locked');
    }
  }
  // force a reveal even when locked-gate is on
  function showRevealForce(i){
    const d=DATA[i]; clearReveal();
    reveal=makeReveal(d); if(lockedRow===i) reveal.classList.add('locked');
    stage.appendChild(reveal);
    requestAnimationFrame(()=>requestAnimationFrame(()=>{ if(reveal) reveal.classList.add('on'); }));
    shadowplate.classList.add('on');
    const v=reveal.querySelector('video'); if(v && !reducedMotion) v.play().catch(()=>{});
    queryEcho.textContent=d.title.toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,18);
  }

  // esc releases lock
  addEventListener('keydown',e=>{
    if(e.key==='Escape' && lockedRow!==null){
      rows[lockedRow].classList.remove('lock');
      lockedRow=null; cursorEl.classList.remove('locked');
      clearReveal(); index.classList.remove('querying');
    }
  });

  // pointer tracking
  addEventListener('pointermove',e=>{
    mx=e.clientX; my=e.clientY; lastMouseTime=performance.now();
    cursorEl.classList.add('show');
  },{passive:true});
  addEventListener('pointerleave',()=>cursorEl.classList.remove('show'));

  // animation loop: ease reveal + cursor; parallax offset from velocity
  let lastX=mx,lastY=my;
  function loop(){
    // custom cursor follows tightly
    cx+=(mx-cx)*0.35; cy+=(my-cy)*0.35;
    cursorEl.style.transform=`translate(${cx}px,${cy}px)`;
    // reveal lags for weight; parallax shadow lags more
    const ease = reducedMotion?1:0.13;
    rx+=(mx-rx)*ease; ry+=(my-ry)*ease;
    const vx=mx-lastX, vy=my-lastY; lastX=mx; lastY=my;
    if(reveal){
      // offset reveal to the side the cursor isn't, so type stays readable
      const side = mx > innerWidth*0.5 ? -1 : 1;
      const offX = side*Math.min(innerWidth*0.20, 260);
      // reduced motion: no velocity tilt, no trailing parallax - show a stable final frame
      const tiltX = reducedMotion?0:Math.max(-8,Math.min(8,vx*-0.4));
      const tiltY = reducedMotion?0:Math.max(-8,Math.min(8,vy*-0.4));
      reveal.style.left=(rx+offX)+'px';
      reveal.style.top=ry+'px';
      reveal.style.transform=`translate(-50%,-50%) ${reveal.classList.contains('on')?'scale(1)':'scale(.9)'} rotateX(${tiltY}deg) rotateY(${tiltX}deg)`;
      // parallax shadow trails further behind with extra offset (no velocity trail under reduced motion)
      const svx=reducedMotion?0:vx*1.4, svy=reducedMotion?0:vy*1.4;
      shadowplate.style.left=(rx+offX - svx + 14)+'px';
      shadowplate.style.top=(ry - svy + 18)+'px';
    }
    requestAnimationFrame(loop);
  }
  loop();

  // in-view pause/play safety: pause any video far off-screen (defensive)
  // (reveals are short-lived; the IO below mainly serves mobile inline media)
}

/* ============================================================
   MOBILE: tap a row to expand inline, letterboxed media.
   Lazy-load media only when opened; pause video on close.
   ============================================================ */
if(isTouch){
  document.body.classList.add('no-cursor');
  rows.forEach((row,i)=>{
    const d=DATA[i];
    const holder=row.querySelector('.m-media .holder');
    let built=false;
    row.addEventListener('click',()=>{
      const isOpen=row.classList.contains('open');
      // close any other open row (single-open accordion)
      rows.forEach(r=>{ if(r!==row){ r.classList.remove('open'); const ov=r.querySelector('video'); if(ov) ov.pause(); }});
      if(isOpen){
        row.classList.remove('open');
        const v=holder.querySelector('video'); if(v) v.pause();
        return;
      }
      if(!built){
        built=true;
        if(d.type==='video'){
          holder.innerHTML=`<video src="${d.src}" poster="${d.poster||''}" muted loop playsinline preload="metadata"></video><span class="chip">${d.tool} &middot; ${d.modality}</span>`;
        }else{
          holder.innerHTML=`<img src="${d.src}" alt="${d.title}" loading="lazy"><span class="chip">${d.tool} &middot; ${d.modality}</span>`;
        }
      }
      row.classList.add('open');
      const v=holder.querySelector('video');
      if(v && !reducedMotion) v.play().catch(()=>{});
    });
  });

  // IntersectionObserver: pause inline videos that scroll off-screen
  const io=new IntersectionObserver(entries=>{
    entries.forEach(en=>{
      const v=en.target.querySelector('video');
      if(!v) return;
      if(en.isIntersecting){ if(en.target.classList.contains('open')&&!reducedMotion) v.play().catch(()=>{}); }
      else v.pause();
    });
  },{threshold:0.1});
  rows.forEach(r=>io.observe(r));
}
</script>
