<!-- TEMPLATE: The Object | ARCHETYPE: object-in-cinematic-void (deadpan launch) | REF: deadpan premium product-launch parody sites (Awwwards 2026), single-hero-object cinematic photography | WHEN TO USE: a reverent single-product launch / hero reveal where restraint and over-serious spec copy IS the brand (real or wink) | SWAP: edit the DATA object at top of <script> -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Object - a study in restraint</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     THE OBJECT - single macro object floating in a cinematic
     warm-black void. Deadpan over-serious launch typography.
     Native CSS/JS only. No libraries.
     ============================================================ */
  :root {
    --void: #100904;          /* warm near-black void          */
    --void-2: #170d06;        /* a half-step up for the floor   */
    --cream: #f3e9d6;         /* product-name + body cream      */
    --cream-dim: rgba(243,233,214,0.52);
    --cream-faint: rgba(243,233,214,0.30);
    --hair: rgba(243,233,214,0.16);
    --accent: #c8a25e;        /* one spec-accent: warm brass    */
    --serif: "Fraunces", Georgia, serif;
    --mono: "Archivo", system-ui, sans-serif;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--void);
    color: var(--cream);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  /* a faint warm vignette + grain over the whole page, fixed */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
    background:
      radial-gradient(120% 80% at 50% 42%, transparent 38%, rgba(0,0,0,0.45) 100%);
    mix-blend-mode: multiply;
  }
  body::after {
    content: "";
    position: fixed;
    inset: -50%;
    pointer-events: none;
    z-index: 61;
    opacity: 0.04;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  ::selection { background: var(--accent); color: var(--void); }

  a { color: inherit; text-decoration: none; }

  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 4px;
    border-radius: 2px;
  }

  /* ---------- TOP BAND : compact deadpan masthead ---------- */
  .masthead {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px clamp(18px, 4vw, 48px);
    font-size: 11px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--cream-dim);
    mix-blend-mode: screen;
  }
  .masthead .mark {
    color: var(--cream);
    letter-spacing: 0.42em;
    font-weight: 600;
  }
  .masthead .right { display: flex; gap: clamp(14px, 3vw, 34px); }
  .masthead .right span:nth-child(2) { color: var(--accent); }
  @media (max-width: 560px) {
    .masthead .right span:first-child { display: none; }
  }

  /* ===========================================================
     STAGE - the first viewport. ONE object in the void.
     =========================================================== */
  .stage {
    position: relative;
    min-height: 100svh;
    display: grid;
    grid-template-rows: 1fr auto;
    overflow: hidden;
  }

  /* the reverent halo behind the object */
  .stage::before {
    content: "";
    position: absolute;
    left: 50%; top: 46%;
    width: min(96vw, 1180px);
    height: min(72vh, 720px);
    transform: translate(-50%, -50%);
    background:
      radial-gradient(closest-side, rgba(200,162,94,0.16), rgba(200,162,94,0.05) 46%, transparent 72%);
    filter: blur(8px);
    z-index: 0;
    pointer-events: none;
  }

  /* the object itself: macro photograph, CONTAINED, never cropped */
  .object-wrap {
    position: relative;
    z-index: 2;
    align-self: center;
    justify-self: center;
    width: 100%;
    max-width: 1180px;
    padding: 96px clamp(16px, 5vw, 64px) 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .object-frame {
    position: relative;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .object {
    display: block;
    width: 100%;
    height: auto;
    max-height: 60svh;
    object-fit: contain;       /* NEVER cover-crop the landscape asset */
    /* float + reverent grade */
    filter: contrast(1.06) saturate(1.04) brightness(1.02)
            drop-shadow(0 40px 60px rgba(0,0,0,0.55));
    will-change: transform;
    /* breathing float, paused under reduced-motion */
    animation: float 9s var(--ease) infinite alternate;
  }
  @keyframes float {
    from { transform: translateY(-6px) scale(1.0); }
    to   { transform: translateY(10px) scale(1.012); }
  }

  /* soft contact-shadow / reflection puddle under the object */
  .object-frame::after {
    content: "";
    position: absolute;
    bottom: -6%;
    left: 50%;
    transform: translateX(-50%);
    width: 64%;
    height: 64px;
    background: radial-gradient(closest-side, rgba(0,0,0,0.62), transparent 78%);
    filter: blur(10px);
    z-index: -1;
  }

  /* ---------- PRECISION LABELS : tiny leader-line callouts ---------- */
  .labels { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
  .label {
    position: absolute;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-dim);
    line-height: 1.4;
    opacity: 0;
    transform: translateY(4px);
    animation: labelIn 0.9s var(--ease) forwards;
  }
  .label .idx { color: var(--accent); font-weight: 600; }
  .label .val { display: block; color: var(--cream); margin-top: 2px; }
  /* the leader line + node */
  .label::before {
    content: "";
    position: absolute;
    width: 1px;
    height: 30px;
    background: linear-gradient(var(--accent), transparent);
  }
  .label::after {
    content: "";
    position: absolute;
    width: 5px; height: 5px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    background: rgba(200,162,94,0.18);
  }
  /* line goes DOWN from the text toward the object */
  .label[data-side="below"]::before { top: 100%; left: 0; }
  .label[data-side="below"]::after  { top: calc(100% + 30px); left: -2px; }
  /* line goes UP from the text */
  .label[data-side="above"]::before { bottom: 100%; left: 0; }
  .label[data-side="above"]::after  { bottom: calc(100% + 30px); left: -2px; }

  @keyframes labelIn { to { opacity: 1; transform: translateY(0); } }

  /* hide the noisiest labels on small screens so it stays clean */
  @media (max-width: 720px) {
    .label[data-mobile="hide"] { display: none; }
  }

  /* ---------- HERO TYPE : product name + one spec line ---------- */
  .herotype {
    position: relative;
    z-index: 4;
    text-align: center;
    padding: 0 clamp(16px, 5vw, 48px) clamp(28px, 5vh, 56px);
    align-self: end;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 18px;
    opacity: 0;
    animation: rise 1s var(--ease) 0.1s forwards;
  }
  .eyebrow .dot {
    display: inline-block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    margin: 0 0.7em 0.18em;
    vertical-align: middle;
  }
  .product-name {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(48px, 10.5vw, 132px);
    line-height: 0.94;
    letter-spacing: -0.01em;
    color: var(--cream);
    opacity: 0;
    animation: rise 1.1s var(--ease) 0.18s forwards;
  }
  .product-name em {
    font-style: italic;
    font-weight: 400;
    color: var(--cream);
  }
  .spec-line {
    margin-top: 22px;
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0 clamp(12px, 2.4vw, 26px);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--cream-dim);
    opacity: 0;
    animation: rise 1.1s var(--ease) 0.3s forwards;
  }
  .spec-line b { color: var(--cream); font-weight: 600; }
  .spec-line .sep { color: var(--accent); opacity: 0.7; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* scroll cue */
  .scrollcue {
    position: absolute;
    left: 50%;
    bottom: 14px;
    transform: translateX(-50%);
    z-index: 5;
    font-size: 9.5px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--cream-faint);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 9px;
    opacity: 0;
    animation: rise 1s var(--ease) 0.6s forwards;
  }
  .scrollcue .bar {
    width: 1px; height: 34px;
    background: linear-gradient(var(--cream-faint), transparent);
    position: relative;
    overflow: hidden;
  }
  .scrollcue .bar::after {
    content: "";
    position: absolute;
    top: -34px; left: 0;
    width: 1px; height: 34px;
    background: linear-gradient(transparent, var(--accent));
    animation: drip 2.4s var(--ease) infinite;
  }
  @keyframes drip { to { top: 34px; } }

  /* ===========================================================
     DOSSIER - the deadpan over-serious spec copy below the fold
     =========================================================== */
  .dossier {
    position: relative;
    background:
      linear-gradient(var(--void), var(--void-2));
    padding: clamp(72px, 12vh, 150px) clamp(18px, 6vw, 96px) clamp(56px, 8vh, 110px);
    border-top: 1px solid var(--hair);
  }
  .dossier-head {
    max-width: 1180px;
    margin: 0 auto clamp(48px, 7vh, 92px);
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  .dossier-head .kicker {
    font-size: 11px;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--accent);
  }
  .dossier-head h2 {
    font-family: var(--serif);
    font-weight: 300;
    font-size: clamp(28px, 4.6vw, 60px);
    line-height: 1.04;
    max-width: 18ch;
    color: var(--cream);
  }
  .dossier-head p {
    max-width: 56ch;
    font-size: clamp(13px, 1.5vw, 15px);
    line-height: 1.7;
    color: var(--cream-dim);
    letter-spacing: 0.01em;
  }

  /* the spec table : over-serious precision */
  .specs {
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--hair);
  }
  .spec {
    padding: 26px 22px 30px 0;
    border-bottom: 1px solid var(--hair);
    position: relative;
  }
  /* vertical hairlines between columns, but not the first */
  .spec:not(:nth-child(4n+1))::before {
    content: "";
    position: absolute;
    left: -1px; top: 0; bottom: 0;
    width: 1px;
    background: var(--hair);
  }
  .spec:not(:nth-child(4n+1)) { padding-left: 22px; }
  .spec .n {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .spec .v {
    font-family: var(--serif);
    font-weight: 400;
    font-size: clamp(24px, 3vw, 38px);
    line-height: 1;
    color: var(--cream);
  }
  .spec .v small {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--cream-dim);
    letter-spacing: 0.04em;
    margin-left: 4px;
  }
  .spec .k {
    margin-top: 10px;
    font-size: 10.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--cream-dim);
  }

  @media (max-width: 880px) {
    .specs { grid-template-columns: repeat(2, 1fr); }
    .spec:not(:nth-child(4n+1))::before { content: none; }
    .spec:not(:nth-child(2n+1))::before {
      content: "";
      position: absolute;
      left: -1px; top: 0; bottom: 0;
      width: 1px;
      background: var(--hair);
    }
    .spec:not(:nth-child(2n+1)) { padding-left: 22px; }
    .spec:nth-child(2n+1) { padding-left: 0; }
  }
  @media (max-width: 480px) {
    .specs { grid-template-columns: 1fr; }
    .spec::before { content: none !important; }
    .spec { padding-left: 0 !important; }
  }

  /* deadpan footnote / colophon */
  .colophon {
    max-width: 1180px;
    margin: clamp(56px, 9vh, 120px) auto 0;
    padding-top: 30px;
    border-top: 1px solid var(--hair);
    display: flex;
    flex-wrap: wrap;
    gap: 14px 32px;
    justify-content: space-between;
    align-items: baseline;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--cream-faint);
  }
  .colophon b { color: var(--cream-dim); font-weight: 500; }
  .colophon .accent { color: var(--accent); }

  /* ---------- reveal-on-scroll for dossier blocks ---------- */
  .reveal {
    opacity: 0;
    transform: translateY(26px);
    transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
  }
  .reveal.in { opacity: 1; transform: none; }

  /* =================== PHONE (<=640px) ===================
     Guarantee the landscape macro object is letterboxed, never
     cover-cropped, and keep the object + a label peeking into the
     first screen so the signature is visible at scroll=0. */
  @media (max-width: 640px) {
    .stage { min-height: 100svh; }
    .object-wrap { padding: 76px clamp(12px, 4vw, 24px) 0; }
    .object {
      width: 100%;
      height: auto;
      max-height: 42svh;       /* shorter so the object + label sit in view */
      object-fit: contain;     /* explicit: letterbox, no cover-crop */
    }
    .herotype { padding-bottom: clamp(18px, 4vh, 36px); }
    .product-name { font-size: clamp(40px, 16vw, 72px); }
    .eyebrow { margin-bottom: 12px; }
    .spec-line { margin-top: 14px; }
    .scrollcue { display: none; }   /* room is tight; cue is non-essential */
  }

  /* =================== REDUCED MOTION =================== */
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .object { animation: none !important; transform: none !important; }
    .eyebrow, .product-name, .spec-line, .scrollcue,
    .label { animation: none !important; opacity: 1 !important; transform: none !important; }
    .scrollcue .bar::after { animation: none !important; }
    .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
  }
</style>
</head>
<body>

  <!-- compact deadpan masthead (does not push the object below the fold) -->
  <header class="masthead">
    <span class="mark">MERIDIAN</span>
    <nav class="right" aria-label="meta">
      <span>EST. 2026</span>
      <span>SERIES 01</span>
      <span>NO. 0001 / 0500</span>
    </nav>
  </header>

  <!-- =============== STAGE : ONE object in the void =============== -->
  <main>
    <section class="stage" aria-label="The Object">

      <div class="object-wrap">
        <div class="object-frame">
          <img class="object" id="hero" alt="The Object - a dark coupe presented alone, lit cinematically" decoding="async" fetchpriority="high" />

          <!-- tiny precision labels with leader lines (deadpan) -->
          <div class="labels" id="labels" aria-hidden="true"></div>
        </div>
      </div>

      <!-- product name + single spec line -->
      <div class="herotype">
        <div class="eyebrow" id="eyebrow"></div>
        <h1 class="product-name" id="pname"></h1>
        <div class="spec-line" id="specline"></div>
      </div>

      <div class="scrollcue" aria-hidden="true">
        <span>Specification</span>
        <span class="bar"></span>
      </div>
    </section>

    <!-- =============== DOSSIER : over-serious spec copy =============== -->
    <section class="dossier" aria-label="Specification">
      <div class="dossier-head reveal">
        <span class="kicker" id="d-kicker"></span>
        <h2 id="d-title"></h2>
        <p id="d-body"></p>
      </div>

      <div class="specs reveal" id="specs"></div>

      <div class="colophon reveal" id="colophon"></div>
    </section>
  </main>

<script>
  /* ============================================================
     DATA - swap everything about the object here.
     One object. One name. One spec line. A handful of labels.
     Deadpan over-serious dossier copy. That is the whole page.
     ============================================================ */
  const DATA = {
    // the single macro-photographed object (reused demo asset)
    object: {
      src: "../assets/flux-car-4k.png",
      alt: "The Object - a dark coupe presented alone, lit cinematically"
    },

    eyebrow: "A study in restraint",

    // the product name. <em>...</em> renders italic for the wink.
    name: "The <em>Object</em>",

    // the single hero spec line (kept to one breath)
    specLine: [
      { label: "Mass", value: "1,840 kg" },
      { label: "Silence", value: "0 dB at rest" },
      { label: "Finish", value: "Obsidian, hand-cured" }
    ],

    // tiny precision labels pinned over the object. Position is in %.
    // side = above | below (which way the leader line points).
    // mobile = "hide" to drop the noisiest ones under 720px.
    labels: [
      { idx: "A1", text: "Aperture", val: "f / 1.4 nominal", x: 18, y: 26, side: "below", mobile: "show" },
      { idx: "A2", text: "Luminance", val: "single source", x: 70, y: 22, side: "below", mobile: "hide" },
      { idx: "A3", text: "Stance", val: "fixed, deliberate", x: 58, y: 74, side: "above", mobile: "show" },
      { idx: "A4", text: "Reflection", val: "permitted, once", x: 14, y: 70, side: "above", mobile: "hide" }
    ],

    // the deadpan dossier
    dossier: {
      kicker: "On the matter of the Object",
      title: "We removed everything until only the Object remained.",
      body: "It does not need a grid. It does not need a carousel. It is photographed once, lit once, and presented at the exact scale at which it deserves to be considered. Everything around it is the absence of distraction, rendered intentionally. The price is on request. The request is also on request.",
      specs: [
        { n: "01", v: "0", unit: "compromises", k: "Design language" },
        { n: "02", v: "1", unit: "object", k: "Total inventory" },
        { n: "03", v: "62", unit: "ms", k: "Time to reverence" },
        { n: "04", v: "∞", unit: "", k: "Restraint, claimed" },
        { n: "05", v: "100", unit: "%", k: "Surface, considered" },
        { n: "06", v: "7", unit: "yr", k: "Warranty on the silence" },
        { n: "07", v: "1 / 500", unit: "", k: "Of this exact intention" },
        { n: "08", v: "POA", unit: "", k: "Price (on absolutely request)" }
      ],
      colophon: [
        { type: "b", text: "Meridian Series 01" },
        { type: "plain", text: "Photographed in a single warm-black void" },
        { type: "accent", text: "No configurator. There is nothing to configure." },
        { type: "plain", text: "Available, in theory" }
      ]
    }
  };

  /* ---------------- RENDER ---------------- */
  const $ = (s) => document.querySelector(s);

  // object
  const hero = $("#hero");
  hero.src = DATA.object.src;
  hero.alt = DATA.object.alt;

  // hero type
  $("#eyebrow").innerHTML = '<span class="dot"></span>' + DATA.eyebrow + '<span class="dot"></span>';
  $("#pname").innerHTML = DATA.name;
  $("#specline").innerHTML = DATA.specLine
    .map(s => `<span><b>${s.value}</b> ${s.label}</span>`)
    .join('<span class="sep">/</span>');

  // precision labels
  $("#labels").innerHTML = DATA.labels.map((l, i) => `
    <div class="label" data-side="${l.side}" data-mobile="${l.mobile}"
         style="left:${l.x}%; top:${l.y}%; animation-delay:${0.5 + i * 0.18}s;">
      <span class="idx">${l.idx}</span> ${l.text}
      <span class="val">${l.val}</span>
    </div>`).join('');

  // dossier
  const D = DATA.dossier;
  $("#d-kicker").textContent = D.kicker;
  $("#d-title").textContent = D.title;
  $("#d-body").textContent = D.body;

  $("#specs").innerHTML = D.specs.map(s => `
    <div class="spec">
      <div class="n">${s.n}</div>
      <div class="v">${s.v}${s.unit ? `<small>${s.unit}</small>` : ''}</div>
      <div class="k">${s.k}</div>
    </div>`).join('');

  $("#colophon").innerHTML = D.colophon.map(c => {
    if (c.type === "b") return `<span><b>${c.text}</b></span>`;
    if (c.type === "accent") return `<span class="accent">${c.text}</span>`;
    return `<span>${c.text}</span>`;
  }).join('');

  /* ---------------- subtle parallax on the object ----------------
     Honors reduced-motion: skipped entirely (no rAF, no transforms).
     Mouse only, very small, never on touch. */
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)");
  const fine = window.matchMedia("(hover: hover) and (pointer: fine)");

  if (!reduce.matches && fine.matches) {
    const frame = $(".object-frame");
    let tx = 0, ty = 0, cx = 0, cy = 0, raf = null;
    const lerp = (a, b, n) => a + (b - a) * n;

    function loop() {
      cx = lerp(cx, tx, 0.06);
      cy = lerp(cy, ty, 0.06);
      frame.style.transform = `translate3d(${cx}px, ${cy}px, 0)`;
      if (Math.abs(cx - tx) > 0.1 || Math.abs(cy - ty) > 0.1) {
        raf = requestAnimationFrame(loop);
      } else { raf = null; }
    }
    window.addEventListener("pointermove", (e) => {
      const nx = (e.clientX / window.innerWidth - 0.5);
      const ny = (e.clientY / window.innerHeight - 0.5);
      tx = nx * 22;   // tiny, reverent
      ty = ny * 14;
      if (!raf) raf = requestAnimationFrame(loop);
    }, { passive: true });
  }

  /* ---------------- reveal-on-scroll for the dossier ----------------
     Skipped under reduced-motion (final state already shown via CSS). */
  if (!reduce.matches && "IntersectionObserver" in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) { en.target.classList.add("in"); io.unobserve(en.target); }
      });
    }, { threshold: 0.16 });
    document.querySelectorAll(".reveal").forEach(el => io.observe(el));
  } else {
    document.querySelectorAll(".reveal").forEach(el => el.classList.add("in"));
  }
</script>
</body>
</html>
