<!-- TEMPLATE: Silent Luxury Restraint | ARCHETYPE: RAPPORT silent-luxury restraint | REF: Koto Studio annual-report microsites 2025, Bottega Veneta digital editorial, Maison Margiela brand site | WHEN TO USE: high-end editorial / brand portfolio / annual report where the restraint itself is the art direction (one work per scroll panel, no accent color, hierarchy from scale and weight alone) | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Silent Luxury Restraint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SILENT LUXURY RESTRAINT
   Two tones only: near-white #fdfcfa, near-black #0e0e0e.
   No accent color. No rule. No decoration.
   Hierarchy from scale + weight alone.
   The single thread of motion: one hairline scroll progress.
   ============================================================ */

:root{
  --paper:#fdfcfa;
  --ink:#0e0e0e;
  --ink-soft:rgba(14,14,14,.55);
  --ink-faint:rgba(14,14,14,.30);
  --hair:rgba(14,14,14,.16);
  /* fluid type scale, restrained ratio ~1.5 */
  --kicker:clamp(.62rem,.55rem + .35vw,.78rem);
  --caption:clamp(.78rem,.72rem + .3vw,.92rem);
  --display:clamp(2.7rem,1.6rem + 5.4vw,7rem);
  --serif:"EB Garamond",Cormorant Garamond,Garamond,"Times New Roman",serif;
  --gutter:clamp(1.4rem,5vw,6rem);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}

body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--serif);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}

/* ---- single hairline of motion: top scroll progress ---- */
#progress{
  position:fixed;top:0;left:0;height:1px;width:0%;
  background:var(--ink);z-index:50;
  transform-origin:left;
  transition:width .08s linear;
}

/* ---- fixed editorial frame (page chrome) ---- */
.frame{
  position:fixed;inset:0;z-index:40;pointer-events:none;
  padding:clamp(.9rem,2.2vw,1.7rem);
}
.frame-row{
  display:flex;justify-content:space-between;align-items:baseline;
  font-size:var(--kicker);letter-spacing:.34em;text-transform:uppercase;
  color:var(--ink-soft);font-weight:500;
}
.frame-bottom{position:absolute;left:0;right:0;bottom:clamp(.9rem,2.2vw,1.7rem);padding:0 clamp(.9rem,2.2vw,1.7rem)}
.frame .idx{font-variant-numeric:tabular-nums}

/* small-caps kicker primitive */
.kicker{
  font-size:var(--kicker);
  letter-spacing:.36em;
  text-transform:uppercase;
  font-weight:500;
  color:var(--ink-soft);
}

/* ============================================================
   HERO  -- scroll=0 signature
   Compact top band of type ABOVE a contained editorial image,
   so the discipline reads at first paint on desktop AND phone.
   ============================================================ */
.hero{
  min-height:100svh;
  display:grid;
  grid-template-columns:minmax(0,1fr) minmax(0,1fr);
  align-items:center;
  column-gap:clamp(2rem,5vw,5rem);
  row-gap:clamp(1.6rem,4vh,3rem);
  padding:clamp(3.4rem,8vh,5.6rem) var(--gutter) clamp(3rem,7vh,5rem);
}
.hero-head{max-width:18ch}
.hero-kicker{display:block;margin-bottom:clamp(1rem,2.4vh,1.7rem)}
.hero-title{
  margin:0;
  font-size:var(--display);
  font-weight:500;
  line-height:.98;
  letter-spacing:-.01em;
}
.hero-title em{font-style:italic;font-weight:400}
.hero-sub{
  margin:clamp(1rem,2.4vh,1.6rem) 0 0;
  max-width:34ch;
  font-size:var(--caption);
  line-height:1.6;
  color:var(--ink-soft);
}

/* contained editorial image, never full-bleed, always letterboxed.
   Sits in the hero's right column, vertically centered, in view at scroll=0. */
.hero-plate-wrap{justify-self:end;width:min(40vw,520px);max-width:100%}
.hero-plate{
  width:100%;
  aspect-ratio:16/9;
  position:relative;
  overflow:hidden;
  background:#f3f1ec;
}
.hero-plate img{
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  display:block;
  filter:grayscale(.04) contrast(1.02);
}
.plate-cap{
  margin-top:.7rem;
  text-align:right;
  font-size:var(--kicker);
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--ink-faint);
}

/* ============================================================
   WORK PANELS  -- one work per scroll panel, image ~60% vh
   ============================================================ */
.panel{
  min-height:100svh;
  display:grid;
  align-content:center;
  padding:clamp(4rem,12vh,9rem) var(--gutter);
  gap:clamp(1.4rem,3.5vh,2.6rem);
}
.panel-meta{
  display:flex;align-items:baseline;gap:clamp(1rem,3vw,2.4rem);
  flex-wrap:wrap;
}
.panel-num{
  font-size:var(--kicker);letter-spacing:.3em;
  color:var(--ink-faint);font-variant-numeric:tabular-nums;font-weight:500;
}
.panel-head{
  font-size:clamp(1.8rem,1.1rem + 2.6vw,3.4rem);
  font-weight:500;line-height:1.04;margin:0;letter-spacing:-.005em;max-width:20ch;
}
.panel-head em{font-style:italic;font-weight:400}

/* media occupies ~60% of viewport height, contained + letterboxed */
.media{
  position:relative;
  width:100%;
  height:60vh;
  max-height:60svh;
  overflow:hidden;
  background:#f1efe9;
}
.media.is-square{
  width:min(60vh,100%);
  margin-inline:auto;
  aspect-ratio:1/1;
  height:auto;
}
.media img,
.media video{
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  display:block;
  filter:grayscale(.04) contrast(1.02);
}
.media video{opacity:0;transition:opacity .6s ease}
.media video.is-playing{opacity:1}
.media .poster{
  position:absolute;inset:0;
  transition:opacity .6s ease;
}
.media.playing .poster{opacity:0}

/* caption: one quiet line, scale + weight only */
.panel-caption{
  display:flex;justify-content:space-between;align-items:baseline;
  gap:1.5rem;flex-wrap:wrap;
  font-size:var(--caption);
  color:var(--ink-soft);
  line-height:1.5;
}
.panel-caption .role{
  font-size:var(--kicker);letter-spacing:.28em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:500;white-space:nowrap;
}

/* ============================================================
   COLOPHON
   ============================================================ */
.colophon{
  min-height:80svh;
  display:grid;align-content:center;justify-items:center;
  text-align:center;gap:clamp(1.6rem,4vh,2.6rem);
  padding:clamp(5rem,14vh,10rem) var(--gutter);
}
.colophon-title{
  font-size:clamp(2.2rem,1.3rem + 4vw,5rem);
  font-weight:500;line-height:1.02;margin:0;letter-spacing:-.01em;max-width:16ch;
}
.colophon-title em{font-style:italic;font-weight:400}
.colophon .kicker{display:block}
.colophon-note{font-size:var(--caption);color:var(--ink-soft);max-width:38ch;line-height:1.65}

/* reveal: hairline of motion only, off under reduced motion */
.reveal{opacity:0;transform:translateY(18px);transition:opacity 1.1s ease,transform 1.1s cubic-bezier(.16,.84,.36,1)}
.reveal.in{opacity:1;transform:none}

:focus-visible{outline:1.5px solid var(--ink);outline-offset:4px}

/* ============================================================
   MOBILE  <=640px -- keep the restraint, never crowd, letterbox
   ============================================================ */
@media (max-width:640px){
  :root{--gutter:1.4rem}
  .hero{
    grid-template-columns:1fr;     /* stack: type, then plate */
    align-items:start;
    padding:clamp(3.6rem,11vh,5rem) var(--gutter) 2.4rem;
    row-gap:2rem;
  }
  .hero-head{max-width:none}
  .hero-title{font-size:clamp(2.6rem,11vw,3.7rem)}
  .hero-plate-wrap{justify-self:stretch;width:100%}
  .hero-plate{
    width:100%;
    aspect-ratio:16/9;        /* letterbox the landscape asset, never crop to portrait */
  }
  .plate-cap{text-align:left}

  .panel{padding:clamp(3.4rem,10vh,5rem) var(--gutter);gap:1.3rem}
  .media{height:auto;aspect-ratio:16/9;max-height:none}  /* contain + letterbox */
  .media.is-square{width:100%;aspect-ratio:1/1}
  /* phones: never cover-crop a landscape (or any swapped) asset into portrait;
     letterbox it inside the fixed box instead */
  .media img,
  .media video{object-fit:contain}
  .hero-plate img{object-fit:contain}
  .panel-caption{flex-direction:column;gap:.5rem}
  .panel-caption .role{order:-1}

  .frame-row{font-size:.56rem;letter-spacing:.22em}
  .frame .tagline{display:none}  /* avoid crowding the corners on phone */
}

/* honor reduced motion fully: show final state, kill rAF-driven motion */
@media (prefers-reduced-motion:reduce){
  .reveal{opacity:1!important;transform:none!important;transition:none!important}
  #progress{transition:none}
  .media video{transition:none}
  .media .poster{transition:none}
}
</style>
</head>
<body>

<!-- ====== SINGLE THREAD OF MOTION ====== -->
<div id="progress" aria-hidden="true"></div>

<!-- ====== FIXED EDITORIAL FRAME ====== -->
<div class="frame" aria-hidden="true">
  <div class="frame-row">
    <span id="frame-studio">ATELIER</span>
    <span class="tagline" id="frame-tagline">SELECTED WORKS</span>
  </div>
  <div class="frame-row frame-bottom">
    <span class="idx" id="frame-idx">01</span>
    <span id="frame-year">MMXXV</span>
  </div>
</div>

<main id="app"></main>

<script>
/* ============================================================
   DATA  -- swap everything here. One object per scroll panel.
   media.type: "image" (still) | "video" (in-view play, poster first)
   media.shape: "wide" (16:9 letterboxed) | "square" (1:1 contained)
   ============================================================ */
const DATA = {
  brand: {
    studio: "ATELIER",
    tagline: "Selected Works",
    year: "MMXXV"
  },
  hero: {
    kicker: "Annual Editorial / Volume V",
    title: ["A quiet", "study in", "restraint"],   // each entry = a line
    titleItalicLast: true,                          // italicize final line
    sub: "Nothing added for effect. A single serif, two tones, and the room to breathe. The work carries the page.",
    plate: { src: "../assets/flux-car-4k.png", cap: "Plate I · Nocturne" }
  },
  works: [
    {
      num: "01",
      head: ["Form held still", "under low light"],
      headItalicLast: true,
      media: { type: "image", shape: "wide", src: "../assets/flux-car-4k.png", poster: null },
      caption: "A matte body on a wet street, lit only by the city. Composition first, color never.",
      role: "Photography"
    },
    {
      num: "02",
      head: ["Calm rooms,", "warm material"],
      headItalicLast: true,
      media: { type: "image", shape: "wide", src: "../assets/flux-clinic-4k.png", poster: null },
      caption: "Mint and wood, arranged to recede. The space is the subject; the frame stays out of its way.",
      role: "Interior"
    },
    {
      num: "03",
      head: ["Motion, when", "it is earned"],
      headItalicLast: true,
      media: { type: "video", shape: "wide", src: "../assets/flux-car-i2v.mp4", poster: "../assets/gen/poster-flux-car-i2v.png" },
      caption: "A single loop, played only in view. The page holds its silence until you arrive.",
      role: "Moving Image"
    },
    {
      num: "04",
      head: ["A painted", "stillness"],
      headItalicLast: true,
      media: { type: "image", shape: "square", src: "../assets/sdxl.png", poster: null },
      caption: "A square study, centered and contained. Edges given to the paper, not the image.",
      role: "Illustration"
    },
    {
      num: "05",
      head: ["Reduction as", "a finished idea"],
      headItalicLast: true,
      media: { type: "image", shape: "square", src: "../assets/hf-tinysd.png", poster: null },
      caption: "Low fidelity made deliberate. What is left out is the point of what remains.",
      role: "Abstract"
    }
  ],
  colophon: {
    kicker: "Colophon",
    title: ["Set in one serif.", "Nothing to prove."],
    titleItalicLast: true,
    note: "Two tones, a single typeface, and one hairline of motion. Restraint as the whole art direction."
  }
};

/* ============================================================
   RENDER
   ============================================================ */
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function lines(arr, italicLast){
  return arr.map((l,i)=>{
    const last = italicLast && i===arr.length-1;
    return `<span class="ln">${last?`<em>${esc(l)}</em>`:esc(l)}</span>`;
  }).join("<br>");
}

function mediaBlock(m){
  const shapeCls = m.shape === "square" ? "is-square" : "";
  if(m.type === "video"){
    return `<figure class="media ${shapeCls}" data-video>
      <img class="poster" src="${esc(m.poster)}" alt="" loading="lazy" decoding="async">
      <video muted loop playsinline preload="none" data-src="${esc(m.src)}" ${m.poster?`poster="${esc(m.poster)}"`:""}></video>
    </figure>`;
  }
  return `<figure class="media ${shapeCls}">
    <img src="${esc(m.src)}" alt="" loading="lazy" decoding="async">
  </figure>`;
}

function render(){
  const d = DATA;
  // frame
  document.getElementById("frame-studio").textContent = d.brand.studio;
  document.getElementById("frame-tagline").textContent = d.brand.tagline;
  document.getElementById("frame-year").textContent = d.brand.year;

  const h = d.hero;
  let html = `
  <section class="hero" aria-label="Introduction">
    <div class="hero-head reveal">
      <span class="kicker hero-kicker">${esc(h.kicker)}</span>
      <h1 class="hero-title">${lines(h.title, h.titleItalicLast)}</h1>
      <p class="hero-sub">${esc(h.sub)}</p>
    </div>
    <div class="hero-plate-wrap reveal">
      <figure class="hero-plate">
        <img src="${esc(h.plate.src)}" alt="" decoding="async" fetchpriority="high">
      </figure>
      <figcaption class="plate-cap">${esc(h.plate.cap)}</figcaption>
    </div>
  </section>`;

  d.works.forEach(w => {
    html += `
    <section class="panel" aria-label="Work ${esc(w.num)}" data-num="${esc(w.num)}">
      <div class="panel-meta reveal">
        <span class="panel-num">${esc(w.num)}</span>
        <h2 class="panel-head">${lines(w.head, w.headItalicLast)}</h2>
      </div>
      <div class="reveal">${mediaBlock(w.media)}</div>
      <div class="panel-caption reveal">
        <span class="text">${esc(w.caption)}</span>
        <span class="role">${esc(w.role)}</span>
      </div>
    </section>`;
  });

  const c = d.colophon;
  html += `
  <section class="colophon" aria-label="Colophon">
    <span class="kicker reveal">${esc(c.kicker)}</span>
    <h2 class="colophon-title reveal">${lines(c.title, c.titleItalicLast)}</h2>
    <p class="colophon-note reveal">${esc(c.note)}</p>
  </section>`;

  document.getElementById("app").innerHTML = html;
}

render();

/* ============================================================
   BEHAVIOR
   ============================================================ */
const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;

/* --- single hairline of motion: scroll progress + current index --- */
const progress = document.getElementById("progress");
const idxEl = document.getElementById("frame-idx");
const panels = Array.from(document.querySelectorAll(".panel"));

let ticking = false;
function onScroll(){
  if(ticking) return;
  ticking = true;
  requestAnimationFrame(()=>{
    const max = document.documentElement.scrollHeight - window.innerHeight;
    const p = max > 0 ? (window.scrollY / max) : 0;
    progress.style.width = (p*100).toFixed(2) + "%";
    // current work index by viewport center
    const mid = window.scrollY + window.innerHeight*0.5;
    let cur = "00";
    for(const pn of panels){
      const top = pn.offsetTop, bot = top + pn.offsetHeight;
      if(mid >= top && mid < bot){ cur = pn.dataset.num; break; }
    }
    idxEl.textContent = cur;
    ticking = false;
  });
}
window.addEventListener("scroll", onScroll, {passive:true});
window.addEventListener("resize", onScroll, {passive:true});
onScroll();

/* --- reveal on enter (hairline of motion; final state if reduced) --- */
if(reduce){
  document.querySelectorAll(".reveal").forEach(el=>el.classList.add("in"));
}else{
  const revObs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add("in"); revObs.unobserve(e.target); }});
  }, {threshold:0.18, rootMargin:"0px 0px -8% 0px"});
  document.querySelectorAll(".reveal").forEach(el=>revObs.observe(el));
}

/* --- videos: lazy-load + play ONLY when in view, one at a time ---
   Posters shown until the focused video is in view; pause + reset
   off-screen so we never decode/mix several at once.            --- */
const videoFigs = Array.from(document.querySelectorAll(".media[data-video]"));
function ensureSrc(v){
  if(!v.src && v.dataset.src){ v.src = v.dataset.src; }
}
const vidObs = new IntersectionObserver((entries)=>{
  // find the most-visible in-view video; play it, pause the rest
  let best = null, bestRatio = 0;
  entries.forEach(e=>{
    const fig = e.target;
    const v = fig.querySelector("video");
    if(e.isIntersecting && e.intersectionRatio >= 0.55){
      if(e.intersectionRatio > bestRatio){ best = fig; bestRatio = e.intersectionRatio; }
    }else{
      // leaving view: pause, drop playing state, keep poster
      fig.classList.remove("playing");
      v.classList.remove("is-playing");
      if(!v.paused) v.pause();
    }
  });
  if(best && !reduce){
    const v = best.querySelector("video");
    ensureSrc(v);
    best.classList.add("playing");
    v.classList.add("is-playing");
    const pr = v.play();
    if(pr && pr.catch) pr.catch(()=>{ /* autoplay blocked: poster remains */ });
  }
}, {threshold:[0,0.55,0.85]});
videoFigs.forEach(f=>vidObs.observe(f));

/* under reduced motion, surface the poster as the resting state (already shown) */
</script>
</body>
</html>
