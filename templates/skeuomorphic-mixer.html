<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Board - Mixing Desk Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   THE BOARD - a CSS-3D mixing desk that IS the gallery
   Palette:
     #1a1a1a anodized steel chassis
     #d4a84b brushed gold knob caps
     #e03c2c armed red
     #3a7bd5 send blue
     #2a2a2a matte channel strips
   Every surface is gradient + box-shadow. No textures, no canvas.
   ============================================================ */
:root {
  --steel: #1a1a1a;
  --steel-2: #232323;
  --strip: #2a2a2a;
  --gold: #d4a84b;
  --gold-d: #8a6e2c;
  --red: #e03c2c;
  --blue: #3a7bd5;
  --ink: #e8e6df;
  --mute: #8d8a82;
  --line: rgba(0,0,0,.55);
  --hi: rgba(255,255,255,.06);
  --bezel: #0c0c0c;
}
* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(120% 80% at 50% -10%, #2b2b2b 0%, #161616 55%, #0c0c0c 100%);
  color: var(--ink);
  font-family: "Barlow Condensed", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  line-height: 1.25;
  letter-spacing: .02em;
}
.mono { font-family: "Space Mono", ui-monospace, monospace; letter-spacing: 0; }

/* ---------- top band / headline ---------- */
.brand {
  display: flex; align-items: baseline; gap: 14px;
  flex-wrap: wrap;
  padding: 18px clamp(14px, 4vw, 48px) 6px;
}
.brand h1 {
  margin: 0;
  font-size: clamp(26px, 4.2vw, 52px);
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  background: linear-gradient(180deg, #fff 0%, var(--gold) 60%, var(--gold-d) 100%);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  text-shadow: 0 1px 0 rgba(0,0,0,.4);
}
.brand .sub {
  font-family: "Space Mono", monospace;
  font-size: clamp(10px, 1.2vw, 13px);
  color: var(--mute);
  text-transform: uppercase;
  letter-spacing: .18em;
}
.brand .led {
  width: 9px; height: 9px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #ff8a3a, var(--red));
  box-shadow: 0 0 8px var(--red), inset 0 0 3px rgba(0,0,0,.5);
  align-self: center;
}

/* ---------- the console shell ---------- */
.console {
  margin: 0 auto;
  max-width: 1340px;
  padding: 0 clamp(10px, 2.5vw, 28px) 60px;
}

/* monitor bridge above the desk */
.bridge {
  position: relative;
  border-radius: 16px 16px 6px 6px;
  padding: 16px 16px 18px;
  background:
    linear-gradient(180deg, #2c2c2c, #1c1c1c 60%, #141414);
  box-shadow:
    inset 0 1px 0 var(--hi),
    inset 0 -2px 6px rgba(0,0,0,.6),
    0 18px 40px rgba(0,0,0,.5);
  border: 1px solid #0a0a0a;
}
.bridge::before {
  /* rack-mount screw row */
  content: "";
  position: absolute; left: 14px; right: 14px; top: 6px; height: 0;
}
.monitor {
  position: relative;
  aspect-ratio: 16 / 6;
  max-height: 46vh;
  border-radius: 8px;
  background: #000;
  overflow: hidden;
  border: 10px solid #0a0a0a;
  box-shadow:
    inset 0 0 0 2px #050505,
    inset 0 0 60px rgba(0,0,0,.9),
    0 2px 0 rgba(255,255,255,.03);
}
.monitor .screen {
  position: absolute; inset: 0;
  display: grid; place-items: center;
  background:
    radial-gradient(120% 140% at 50% 0%, #16202b 0%, #070b10 70%);
}
/* letterboxed media - fill the screen box but CONTAIN so nothing is cropped */
.monitor .screen img,
.monitor .screen video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;        /* letterbox - never cover-crop, never overflow */
  display: block;
}
.monitor .scanlines {
  position: absolute; inset: 0; pointer-events: none;
  background: repeating-linear-gradient(180deg, rgba(255,255,255,.035) 0 1px, transparent 1px 3px);
  mix-blend-mode: overlay;
  opacity: .6;
}
.monitor .glare {
  position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(115deg, rgba(255,255,255,.10) 0%, transparent 22%, transparent 100%);
}
.monitor .osd {
  position: absolute; left: 12px; top: 10px; z-index: 4;
  font-family: "Space Mono", monospace;
  font-size: clamp(10px, 1.3vw, 14px);
  color: #8fffc6; text-shadow: 0 0 8px rgba(60,255,160,.5);
  letter-spacing: .12em; text-transform: uppercase;
}
.monitor .osd b { color: #fff; }
.monitor .osd .rec {
  display: none; color: var(--red); text-shadow: 0 0 8px rgba(224,60,44,.7);
}
.monitor.playing .osd .rec { display: inline; }
.monitor .meta {
  position: absolute; left: 12px; right: 12px; bottom: 10px; z-index: 4;
  display: flex; justify-content: space-between; gap: 10px;
  font-family: "Space Mono", monospace;
  font-size: clamp(9px, 1.1vw, 12px);
  color: rgba(220,235,255,.75); letter-spacing: .08em;
  text-shadow: 0 1px 4px #000;
}
.monitor .audwrap {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 5;
  display: none;
}
.monitor .audwrap audio { width: 100%; }
.monitor.audio-on .audwrap { display: block; }
.monitor.audio-on .screen { background:
    radial-gradient(120% 140% at 50% 0%, #1d1810 0%, #0a0805 70%); }

/* poster / play affordance overlay */
.monitor .tapbtn {
  position: absolute; z-index: 6; inset: 0;
  display: none; place-items: center;
  background: rgba(0,0,0,.18);
  border: 0; cursor: pointer; color: #fff;
}
.monitor.video-ready .tapbtn { display: grid; }
.monitor.playing .tapbtn { display: none; }
.monitor .tapbtn .tri {
  width: 60px; height: 60px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.95), rgba(180,180,180,.7));
  box-shadow: 0 6px 18px rgba(0,0,0,.6), inset 0 0 0 2px rgba(0,0,0,.2);
  display: grid; place-items: center;
}
.monitor .tapbtn .tri::after {
  content: ""; width: 0; height: 0; margin-left: 5px;
  border-left: 18px solid #111;
  border-top: 11px solid transparent;
  border-bottom: 11px solid transparent;
}

/* ---------- the desk surface ---------- */
.desk {
  margin-top: 12px;
  border-radius: 6px 6px 16px 16px;
  padding: 12px clamp(8px, 1.6vw, 18px) 16px;
  background:
    linear-gradient(180deg, #232323 0%, #1b1b1b 8%, #161616 100%);
  box-shadow:
    inset 0 2px 0 var(--hi),
    inset 0 -10px 30px rgba(0,0,0,.55),
    0 26px 50px rgba(0,0,0,.55);
  border: 1px solid #090909;
  /* subtle 3D tilt toward the viewer */
  transform: perspective(1600px) rotateX(7deg);
  transform-origin: center top;
}
.desk-label {
  display: flex; justify-content: space-between; align-items: center;
  margin: 0 4px 10px;
  font-family: "Space Mono", monospace;
  font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
  color: var(--mute);
}
.desk-label .seg { color: var(--gold); }

.strips {
  display: grid;
  grid-template-columns: repeat(var(--n, 4), 1fr) 1.25fr;
  gap: clamp(6px, 1vw, 12px);
}

/* a single channel strip ---------------------------------- */
.strip {
  position: relative;
  border-radius: 8px;
  padding: 10px 8px 12px;
  background:
    linear-gradient(180deg, #313131 0%, var(--strip) 4%, #242424 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.05),
    inset 0 0 0 1px rgba(0,0,0,.5),
    0 6px 14px rgba(0,0,0,.4);
  display: flex; flex-direction: column; align-items: center;
  gap: 8px;
  user-select: none;
}
.strip.active {
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.07),
    inset 0 0 0 1px rgba(212,168,75,.5),
    0 0 0 1px rgba(212,168,75,.25),
    0 8px 20px rgba(0,0,0,.5);
}
.ch-no {
  font-family: "Space Mono", monospace;
  font-size: 10px; letter-spacing: .2em; color: var(--mute);
}
.ch-name {
  font-size: clamp(11px, 1.2vw, 14px);
  font-weight: 600; text-transform: uppercase; letter-spacing: .04em;
  text-align: center; min-height: 2em;
  display: flex; align-items: center; color: var(--ink);
}

/* rotary knob ------------------------------------------------ */
.knob-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.knob {
  --rot: -135deg;
  position: relative;
  width: clamp(38px, 5vw, 52px); aspect-ratio: 1; border-radius: 50%;
  cursor: grab;
  background:
    radial-gradient(circle at 50% 38%, #f0d493 0%, var(--gold) 40%, var(--gold-d) 78%, #5a4519 100%);
  box-shadow:
    inset 0 2px 4px rgba(255,255,255,.4),
    inset 0 -3px 6px rgba(0,0,0,.5),
    0 4px 8px rgba(0,0,0,.45);
  touch-action: none;
}
.knob::after {
  /* pointer indicator */
  content: ""; position: absolute;
  left: 50%; top: 9%;
  width: 3px; height: 32%;
  border-radius: 2px;
  background: #1a1208;
  transform: translateX(-50%);
  box-shadow: 0 0 2px rgba(0,0,0,.6);
}
.knob .dial {
  position: absolute; inset: -10px; border-radius: 50%;
  background: conic-gradient(from -135deg,
     var(--blue) 0deg, var(--blue) calc((var(--pct, 0) * 270deg)),
     transparent calc((var(--pct, 0) * 270deg)), transparent 270deg, transparent 360deg);
  -webkit-mask: radial-gradient(transparent 64%, #000 65%, #000 70%, transparent 71%);
          mask: radial-gradient(transparent 64%, #000 65%, #000 70%, transparent 71%);
  opacity: .9; pointer-events: none;
}
.knob:active { cursor: grabbing; }
.knob > .needle { display: contents; }
/* the rotating face */
.knob .face {
  position: absolute; inset: 0; border-radius: 50%;
  transform: rotate(var(--rot));
  pointer-events: none;
}
.knob-lab {
  font-family: "Space Mono", monospace;
  font-size: 9px; letter-spacing: .14em; color: var(--mute); text-transform: uppercase;
}

/* VU meter --------------------------------------------------- */
.vu {
  width: 100%; max-width: 84px;
  height: 46px;
  border-radius: 4px;
  background: linear-gradient(180deg, #0a0a0a, #141414);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04), inset 0 0 0 1px #000;
  padding: 4px;
  display: flex; align-items: flex-end; gap: 3px;
}
.vu .seg {
  flex: 1; height: var(--h, 30%);
  border-radius: 1px;
  background: linear-gradient(180deg, #6dffae, #2fae6a);
  box-shadow: 0 0 6px rgba(60,220,140,.4);
  transition: height .12s linear;
}
.vu .seg.b2 { animation-delay: .1s; }
.vu .seg.b3 { animation-delay: .22s; }
.vu.hot .seg { background: linear-gradient(180deg, #ffd36b, #e03c2c); box-shadow: 0 0 8px rgba(224,60,44,.5); }

/* fader ------------------------------------------------------ */
.fader {
  position: relative;
  width: 34px;
  height: clamp(120px, 20vh, 190px);
  margin-top: 2px;
  border-radius: 6px;
  background: linear-gradient(180deg, #161616, #1f1f1f);
  box-shadow: inset 0 0 0 1px #000, inset 0 2px 6px rgba(0,0,0,.7);
  touch-action: none;
}
.fader .slot {
  position: absolute; left: 50%; top: 12px; bottom: 12px;
  width: 5px; transform: translateX(-50%);
  border-radius: 3px;
  background: linear-gradient(90deg, #000, #2a2a2a 50%, #000);
  box-shadow: inset 0 0 3px #000;
}
.fader .ticks {
  position: absolute; left: 3px; top: 12px; bottom: 12px; width: 6px;
  background: repeating-linear-gradient(180deg, var(--hi) 0 1px, transparent 1px 12.5%);
  opacity: .6; pointer-events: none;
}
.fader .cap {
  position: absolute; left: 50%; width: 40px; height: 26px;
  transform: translate(-50%, -50%);
  top: 50%;
  border-radius: 5px;
  cursor: grab;
  background:
    linear-gradient(180deg, #4a4a4a 0%, #2c2c2c 46%, #1a1a1a 54%, #333 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.18),
    inset 0 -1px 2px rgba(0,0,0,.6),
    0 4px 8px rgba(0,0,0,.5);
}
.fader .cap::after {
  content: ""; position: absolute; left: 6px; right: 6px; top: 50%;
  height: 3px; transform: translateY(-50%);
  border-radius: 2px;
  background: var(--gold);
  box-shadow: 0 0 5px rgba(212,168,75,.6), 0 1px 0 rgba(0,0,0,.4);
}
.fader .cap:active { cursor: grabbing; }
.fader .cap:focus-visible { outline: none; }
.fader .cap:focus-visible::before {
  content: ""; position: absolute; inset: -5px; border-radius: 8px;
  outline: 2px solid var(--gold); outline-offset: 2px;
}
.fader-val {
  font-family: "Space Mono", monospace;
  font-size: 10px; color: var(--gold); letter-spacing: .08em;
}

/* ARM button ------------------------------------------------- */
.arm {
  width: 100%; max-width: 78px;
  margin-top: 2px;
  padding: 9px 6px 7px;
  border: 0; border-radius: 5px; cursor: pointer;
  font-family: "Space Mono", monospace;
  font-size: 11px; font-weight: 700; letter-spacing: .14em;
  text-transform: uppercase;
  color: #2a0c08;
  background:
    linear-gradient(180deg, #ff6a52 0%, var(--red) 45%, #9c241a 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.35),
    inset 0 -2px 4px rgba(0,0,0,.45),
    0 4px 0 #6c1812, 0 6px 10px rgba(0,0,0,.5);
  transition: transform .05s, box-shadow .05s;
}
.arm:hover { filter: brightness(1.06); }
.arm:active, .arm[aria-pressed="true"] {
  transform: translateY(3px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.25),
    inset 0 -1px 3px rgba(0,0,0,.5),
    0 1px 0 #6c1812, 0 2px 5px rgba(0,0,0,.5);
  color: #fff;
}
.arm[aria-pressed="true"] {
  background: linear-gradient(180deg, #ff8b76, #e03c2c 45%, #b32a20);
  text-shadow: 0 0 8px rgba(255,200,190,.7);
}
.arm:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
.arm .dot {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  margin-right: 5px; vertical-align: middle;
  background: #5a120c; box-shadow: inset 0 0 2px #000;
}
.arm[aria-pressed="true"] .dot {
  background: #fff; box-shadow: 0 0 8px #fff, 0 0 14px var(--red);
  animation: armblink .8s steps(2) infinite;
}
@keyframes armblink { 50% { opacity: .35; } }

/* MASTER strip ----------------------------------------------- */
.strip.master {
  background:
    linear-gradient(180deg, #383024 0%, #2c2519 6%, #201b12 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.06),
    inset 0 0 0 1px rgba(212,168,75,.25),
    0 6px 14px rgba(0,0,0,.45);
}
.strip.master .ch-name { color: var(--gold); }
.strip.master .fader .cap::after { background: #fff; box-shadow: 0 0 6px rgba(255,255,255,.7); }
.master-hint {
  font-family: "Space Mono", monospace;
  font-size: 9px; color: var(--mute); text-align: center;
  letter-spacing: .08em; line-height: 1.4;
}

/* footer plate */
.plate {
  margin: 22px auto 0; max-width: 1340px;
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 10px;
  padding: 0 clamp(10px, 2.5vw, 28px);
  font-family: "Space Mono", monospace;
  font-size: 11px; color: var(--mute); letter-spacing: .12em;
}
.plate .pill {
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid rgba(212,168,75,.35); color: var(--gold);
}

/* mobile channel switcher: hidden on desktop, shown in the mobile query below */
.mob-switch { display: none; }

/* ---------- MOBILE: 2-channel simplified strip ---------- */
@media (max-width: 640px) {
  .desk { transform: none; padding: 14px 8px 18px; }
  .monitor { aspect-ratio: 16 / 10; }
  .strips {
    grid-template-columns: 1fr 1fr;
    grid-auto-rows: auto;
    gap: 8px;
  }
  /* show only 2 channels + master; hide extras, simplify */
  .strip { display: none; }
  .strip.m-show { display: flex; }
  .strip .knob-wrap { display: none; }     /* simplified: one fader + VU */
  .strip .vu { max-width: 100%; height: 44px; }
  .fader { height: clamp(130px, 30vh, 200px); }
  .strip.master { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 14px; }
  .strip.master .fader { height: 110px; }
  .strip.master .ch-name { min-height: 0; width: 100%; }
  .mob-switch {
    display: flex; gap: 8px; justify-content: center; flex-wrap: wrap;
    margin: 10px 0 4px;
  }
}
.mob-switch button {
  font-family: "Space Mono", monospace;
  font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
  padding: 7px 12px; border-radius: 6px; cursor: pointer;
  color: var(--ink);
  border: 1px solid #000;
  background: linear-gradient(180deg, #2e2e2e, #1d1d1d);
  box-shadow: inset 0 1px 0 var(--hi), 0 3px 6px rgba(0,0,0,.4);
}
.mob-switch button[aria-pressed="true"] {
  color: #2a0c08;
  background: linear-gradient(180deg, var(--gold), var(--gold-d));
}

/* ---------- reduced motion: freeze VU as static bar ---------- */
@media (prefers-reduced-motion: reduce) {
  .vu .seg { transition: none !important; animation: none !important; }
  .arm[aria-pressed="true"] .dot { animation: none !important; }
}
</style>
</head>
<body>

<!-- ============================================================
     DATA - swap the whole catalog here. Each entry = one channel.
       title   channel label on the desk
       kind    'image' | 'video' | 'audio'
       src      media file (relative to /assets/)
       poster   still shown before play (video) or as image
       meta     small caption shown bottom-left of monitor
       gain     0..1 initial fader position (the top channel opens raised)
     ============================================================ -->
<script>
const DATA = [
  { title: "Night Drive",      kind: "video", src: "../assets/flux-car-i2v.mp4", poster: "../assets/gen/poster-flux-car-i2v.png", meta: "FLUX i2v / 4K matte black", gain: 0.86 },
  { title: "Clinic Mint",      kind: "image", src: "../assets/flux-clinic-4k.png", poster: "../assets/flux-clinic-4k.png",        meta: "FLUX / interior render",   gain: 0.40 },
  { title: "Autumn Fox",       kind: "image", src: "../assets/sdxl.png",            poster: "../assets/sdxl.png",                  meta: "SDXL / painterly",         gain: 0.30 },
  { title: "Kling Loop",       kind: "video", src: "../assets/kling-video.mp4",     poster: "../assets/gen/poster-kling-video.png",meta: "Kling / motion loop",      gain: 0.22 },
  { title: "Veo Spot",         kind: "video", src: "../assets/veo-video.mp4",       poster: "../assets/gen/poster-veo-video.png",  meta: "Veo / sound on",           gain: 0.18 },
  { title: "Thai VO",          kind: "audio", src: "../assets/elevenlabs-thai.mp3", poster: "../assets/gen/wave-elevenlabs.png",   meta: "ElevenLabs / Thai voice",  gain: 0.14 },
];
</script>

<header class="brand">
  <span class="led" aria-hidden="true"></span>
  <h1>The Board</h1>
  <span class="sub">8-bus generative console &nbsp;/&nbsp; pull a fader to monitor &nbsp;/&nbsp; arm to play</span>
</header>

<main class="console" id="console">
  <!-- monitor bridge -->
  <section class="bridge" aria-label="Monitor bridge">
    <div class="monitor" id="monitor">
      <div class="screen" id="screen"></div>
      <div class="scanlines" aria-hidden="true"></div>
      <div class="glare" aria-hidden="true"></div>
      <div class="osd"><span class="rec">&#9679; PLAY </span><b id="osd-title">CH 1</b> <span id="osd-kind"></span></div>
      <div class="meta"><span id="meta-l">SIGNAL OK</span><span class="mono" id="meta-r">-12 dB</span></div>
      <div class="audwrap" id="audwrap"></div>
      <button class="tapbtn" id="tapbtn" aria-label="Play media"><span class="tri"></span></button>
    </div>
  </section>

  <!-- desk -->
  <section class="desk" aria-label="Mixing desk">
    <div class="desk-label"><span>VESPERWERK &middot; <span class="seg">VW-2400</span></span><span>FADER = REVEAL &middot; KNOB = TONE &middot; ARM = PLAY</span></div>
    <div class="mob-switch" id="mobSwitch" role="tablist" aria-label="Mobile channel bank"></div>
    <div class="strips" id="strips"></div>
  </section>

  <div class="plate">
    <span>PWR &middot; <span class="pill">PHANTOM 48V</span></span>
    <span class="mono">drag the gold fader caps &middot; rotary knobs turn on drag &middot; master scrubs the bank</span>
  </div>
</main>

<script>
(() => {
  const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
  const isMobile = () => matchMedia("(max-width: 640px)").matches;

  const strips   = document.getElementById("strips");
  strips.style.setProperty("--n", String(DATA.length)); // one column per channel + master
  const monitor  = document.getElementById("monitor");
  const screen   = document.getElementById("screen");
  const osdTitle = document.getElementById("osd-title");
  const osdKind  = document.getElementById("osd-kind");
  const metaL    = document.getElementById("meta-l");
  const metaR    = document.getElementById("meta-r");
  const audwrap  = document.getElementById("audwrap");
  const tapbtn   = document.getElementById("tapbtn");

  const channels = [];   // per-channel state {el, gain, fadGain, vu, segs}
  let focused = 0;       // which channel is in the monitor
  let activeMedia = null;// currently mounted <video>/<img>
  let playing = false;

  // ---- build strips ------------------------------------------------------
  DATA.forEach((d, i) => {
    const strip = document.createElement("div");
    strip.className = "strip" + (i < 2 || false ? "" : "");
    if (i < 2) strip.classList.add("m-show");      // first 2 channels survive on mobile
    strip.dataset.i = i;

    strip.innerHTML = `
      <div class="ch-no">CH ${String(i+1).padStart(2,"0")}</div>
      <div class="ch-name">${d.title}</div>
      <div class="knob-wrap">
        <div class="knob" tabindex="0" role="slider" aria-label="${d.title} tone" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50">
          <span class="dial"></span><span class="face"></span>
        </div>
        <div class="knob-lab">TONE</div>
      </div>
      <div class="vu" aria-hidden="true">
        <span class="seg b1"></span><span class="seg b2"></span><span class="seg b3"></span><span class="seg b1"></span>
      </div>
      <div class="fader" data-fader>
        <span class="slot"></span><span class="ticks"></span>
        <span class="cap" tabindex="0" role="slider" aria-label="${d.title} reveal level" aria-valuemin="0" aria-valuemax="100" aria-valuenow="${Math.round(d.gain*100)}"></span>
      </div>
      <div class="fader-val mono">${Math.round(d.gain*100)}</div>
      <button class="arm" aria-pressed="false" aria-label="Arm and play ${d.title}"><span class="dot"></span>ARM</button>
    `;
    strips.appendChild(strip);

    const st = {
      el: strip,
      gain: d.gain,
      knob: 0.5,
      fader: strip.querySelector(".fader"),
      cap: strip.querySelector(".cap"),
      val: strip.querySelector(".fader-val"),
      knobEl: strip.querySelector(".knob"),
      arm: strip.querySelector(".arm"),
      vu: strip.querySelector(".vu"),
      segs: [...strip.querySelectorAll(".vu .seg")],
    };
    channels.push(st);

    layoutFader(st);
    layoutKnob(st);

    wireFader(st, i);
    wireKnob(st, i);
    st.arm.addEventListener("click", () => toggleArm(i));
  });

  // raise the master at the end
  const master = document.createElement("div");
  master.className = "strip master";
  master.innerHTML = `
    <div class="ch-no">MASTER</div>
    <div class="ch-name">SCRUB BANK</div>
    <div class="vu" aria-hidden="true">
      <span class="seg b1"></span><span class="seg b2"></span><span class="seg b3"></span><span class="seg b1"></span>
    </div>
    <div class="fader" data-fader>
      <span class="slot"></span><span class="ticks"></span>
      <span class="cap" tabindex="0" role="slider" aria-label="Master - scrub through works" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100"></span>
    </div>
    <div class="fader-val mono">CH 01</div>
    <div class="master-hint">PULL DOWN<br>TO SCRUB<br>THE REVEALS</div>
  `;
  strips.appendChild(master);
  const masterState = {
    el: master,
    fader: master.querySelector(".fader"),
    cap: master.querySelector(".cap"),
    val: master.querySelector(".fader-val"),
    vu: master.querySelector(".vu"),
    segs: [...master.querySelectorAll(".vu .seg")],
    pos: 1, // 1 = top = channel 0
  };
  layoutFaderPos(masterState, masterState.pos);
  wireMaster(masterState);

  // ---- geometry helpers --------------------------------------------------
  function faderTravel(fader) {
    const r = fader.getBoundingClientRect();
    const cap = 26; // cap height
    const top = r.top + 12 + cap/2;
    const bot = r.bottom - 12 - cap/2;
    return { top, bot, h: bot - top, r };
  }
  function layoutFaderPos(st, pos) {
    // pos 0..1, 1 = fully up
    st.cap.style.top = (100 - pos*100) + "%";
    st.cap.setAttribute("aria-valuenow", Math.round(pos*100));
  }
  function layoutFader(st) {
    layoutFaderPos(st, st.gain);
    st.val.textContent = Math.round(st.gain*100);
  }
  function layoutKnob(st) {
    // map 0..1 -> -135..135 deg
    const deg = -135 + st.knob * 270;
    st.knobEl.style.setProperty("--rot", deg + "deg");
    st.knobEl.style.setProperty("--pct", st.knob.toFixed(3));
    st.knobEl.setAttribute("aria-valuenow", Math.round(st.knob*100));
  }

  // ---- fader drag (pointer capture) -------------------------------------
  function wireFader(st, idx) {
    const onMove = (e) => {
      const t = faderTravel(st.fader);
      let pos = 1 - (e.clientY - t.top) / t.h;
      pos = Math.max(0, Math.min(1, pos));
      st.gain = pos;
      layoutFader(st);
      // pulling a fader up beyond others focuses + reveals that work
      maybeFocusByGain(idx);
    };
    pointerDrag(st.cap, onMove);
    // keyboard
    st.cap.addEventListener("keydown", (e) => {
      const step = e.shiftKey ? 0.1 : 0.05;
      if (e.key === "ArrowUp" || e.key === "ArrowRight") st.gain = Math.min(1, st.gain + step);
      else if (e.key === "ArrowDown" || e.key === "ArrowLeft") st.gain = Math.max(0, st.gain - step);
      else if (e.key === "Home") st.gain = 1;
      else if (e.key === "End") st.gain = 0;
      else return;
      e.preventDefault();
      layoutFader(st);
      maybeFocusByGain(idx);
    });
  }

  function maybeFocusByGain(idx) {
    // the channel with the highest fader wins the monitor
    let top = 0, best = -1;
    channels.forEach((c, i) => { if (c.gain > best) { best = c.gain; top = i; } });
    if (top !== focused) reveal(top);
    refreshActiveClasses();
  }

  // ---- knob drag (pointer capture) --------------------------------------
  function wireKnob(st) {
    let startY = 0, startVal = 0;
    const onDown = (e) => { startY = e.clientY; startVal = st.knob; };
    pointerDrag(st.knobEl, (e) => {
      const dy = startY - e.clientY;       // up = increase
      st.knob = Math.max(0, Math.min(1, startVal + dy / 160));
      layoutKnob(st);
      tintMonitor();
    }, onDown);
    st.knobEl.addEventListener("keydown", (e) => {
      const step = e.shiftKey ? 0.1 : 0.05;
      if (e.key === "ArrowUp" || e.key === "ArrowRight") st.knob = Math.min(1, st.knob + step);
      else if (e.key === "ArrowDown" || e.key === "ArrowLeft") st.knob = Math.max(0, st.knob - step);
      else return;
      e.preventDefault(); layoutKnob(st); tintMonitor();
    });
  }

  function tintMonitor() {
    // tone knob of focused channel warms/cools the monitor glow + meta
    const k = channels[focused] ? channels[focused].knob : 0.5;
    const db = Math.round(-24 + k * 24);
    metaR.textContent = (db >= 0 ? "+" : "") + db + " dB";
    if (activeMedia) {
      const hue = Math.round(-30 + k * 60);
      activeMedia.style.filter = `saturate(${0.8 + k*0.5}) hue-rotate(${hue}deg) brightness(${0.9 + k*0.25})`;
    }
  }

  // ---- master fader: scrubs through channels ----------------------------
  function wireMaster(st) {
    const apply = () => {
      const idx = Math.min(DATA.length - 1, Math.round((1 - st.pos) * (DATA.length - 1)));
      st.val.textContent = "CH " + String(idx+1).padStart(2,"0");
      // lift the chosen channel's fader so the reveal logic agrees
      channels.forEach((c, i) => {
        c.gain = (i === idx) ? 0.9 : 0.18 + (1 - Math.abs(i - idx) / DATA.length) * 0.15;
        layoutFader(c);
      });
      reveal(idx);
      refreshActiveClasses();
    };
    const onMove = (e) => {
      const t = faderTravel(st.fader);
      let pos = 1 - (e.clientY - t.top) / t.h;
      st.pos = Math.max(0, Math.min(1, pos));
      st.cap.style.top = (100 - st.pos*100) + "%";
      st.cap.setAttribute("aria-valuenow", Math.round(st.pos*100));
      apply();
    };
    pointerDrag(st.cap, onMove);
    st.cap.addEventListener("keydown", (e) => {
      const step = 1 / (DATA.length - 1);
      if (e.key === "ArrowDown" || e.key === "ArrowLeft") st.pos = Math.max(0, st.pos - step);
      else if (e.key === "ArrowUp" || e.key === "ArrowRight") st.pos = Math.min(1, st.pos + step);
      else return;
      e.preventDefault();
      st.cap.style.top = (100 - st.pos*100) + "%";
      apply();
    });
  }

  // ---- generic drag: setPointerCapture for the real device, but listen on
  //      window so the gesture is robust if capture is lost or unsupported ---
  function pointerDrag(handle, onMove, onDown) {
    handle.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      try { handle.setPointerCapture(e.pointerId); } catch (_) {}
      handle.focus({ preventScroll: true });
      if (onDown) onDown(e);
      const move = (ev) => onMove(ev);
      const up = () => {
        try { handle.releasePointerCapture(e.pointerId); } catch (_) {}
        window.removeEventListener("pointermove", move);
        window.removeEventListener("pointerup", up);
        window.removeEventListener("pointercancel", up);
      };
      window.addEventListener("pointermove", move);
      window.addEventListener("pointerup", up);
      window.addEventListener("pointercancel", up);
    });
  }

  // ---- reveal a work in the monitor (poster only, no autoplay) -----------
  function reveal(i) {
    focused = i;
    const d = DATA[i];
    // tear down any playing media
    stopMedia();
    screen.innerHTML = "";
    monitor.classList.remove("playing", "video-ready", "audio-on");
    audwrap.innerHTML = "";

    osdTitle.textContent = "CH " + String(i+1).padStart(2,"0") + " / " + d.title.toUpperCase();
    osdKind.textContent = "[" + d.kind.toUpperCase() + "]";
    metaL.textContent = d.meta;

    if (d.kind === "image") {
      const img = document.createElement("img");
      img.src = d.src; img.alt = d.title; img.loading = "lazy"; img.decoding = "async";
      screen.appendChild(img);
      activeMedia = img;
    } else if (d.kind === "video") {
      // show POSTER as image; mount real video only on ARM/tap (avoids decode storms)
      const img = document.createElement("img");
      img.src = d.poster; img.alt = d.title + " poster"; img.loading = "lazy"; img.decoding = "async";
      screen.appendChild(img);
      activeMedia = img;
      monitor.classList.add("video-ready");
    } else if (d.kind === "audio") {
      const img = document.createElement("img");
      img.src = d.poster; img.alt = d.title + " waveform"; img.loading = "lazy";
      img.style.imageRendering = "pixelated";
      screen.appendChild(img);
      activeMedia = img;
      monitor.classList.add("audio-on");
    }
    tintMonitor();
    refreshActiveClasses();
  }

  function stopMedia() {
    const v = screen.querySelector("video");
    if (v) { try { v.pause(); } catch(_){} v.removeAttribute("src"); v.load && v.load(); }
    const a = audwrap.querySelector("audio");
    if (a) { try { a.pause(); } catch(_){} }
    playing = false;
    monitor.classList.remove("playing");
  }

  // ---- ARM: play the focused channel's media ----------------------------
  function toggleArm(i) {
    const wasArmed = channels[i].arm.getAttribute("aria-pressed") === "true";
    // single-arm: clear others
    channels.forEach((c) => c.arm.setAttribute("aria-pressed", "false"));
    if (focused !== i) { /* arming raises that channel into the monitor */
      channels.forEach((c, k) => { if (k !== i) c.gain = Math.min(c.gain, 0.3); });
      channels[i].gain = 0.95; layoutFader(channels[i]);
      reveal(i);
    }
    if (wasArmed) { stopMedia(); refreshActiveClasses(); return; }

    channels[i].arm.setAttribute("aria-pressed", "true");
    playMedia(DATA[i]);
    refreshActiveClasses();
  }

  function playMedia(d) {
    if (d.kind === "video") {
      screen.innerHTML = "";
      const v = document.createElement("video");
      v.src = d.src; v.poster = d.poster;
      v.loop = true; v.playsInline = true; v.preload = "metadata";
      // heygen/veo/did carry audio; arming = intentional, so sound on for those
      const hasAudio = /veo|heygen|did/.test(d.src);
      v.muted = !hasAudio;
      v.style.maxWidth = "100%"; v.style.maxHeight = "100%";
      screen.appendChild(v);
      activeMedia = v;
      v.play().then(() => { playing = true; monitor.classList.add("playing"); tintMonitor(); })
              .catch(() => { v.muted = true; v.play().catch(()=>{}); monitor.classList.add("playing"); });
    } else if (d.kind === "audio") {
      const a = document.createElement("audio");
      a.src = d.src; a.controls = true; a.loop = true;
      audwrap.innerHTML = ""; audwrap.appendChild(a);
      a.play().then(() => { playing = true; monitor.classList.add("playing"); }).catch(()=>{});
    } else {
      // image: "play" = a brief framing flash via OSD
      monitor.classList.add("playing");
      playing = true;
    }
  }

  // tap-to-play overlay on the monitor (video kind)
  tapbtn.addEventListener("click", () => {
    if (DATA[focused]) toggleArm(focused);
  });

  // ---- active strip highlight + master meter ----------------------------
  function refreshActiveClasses() {
    channels.forEach((c, i) => c.el.classList.toggle("active", i === focused));
  }

  // ---- VU animation (CSS custom property driven, rAF) -------------------
  let raf = null;
  function vuTick(t) {
    channels.forEach((c, i) => {
      const lvl = c.gain;                 // louder channel = taller bars
      const armed = c.arm.getAttribute("aria-pressed") === "true";
      const energy = armed ? 1 : (i === focused ? 0.85 : 0.5);
      c.segs.forEach((seg, k) => {
        const base = lvl * energy;
        const wob = (Math.sin(t/180 + i*1.3 + k*0.9) * 0.5 + 0.5) * base;
        const h = Math.max(6, Math.min(100, (base*0.55 + wob*0.5) * 100));
        seg.style.setProperty("--h", h.toFixed(0) + "%");
      });
      c.vu.classList.toggle("hot", (armed ? lvl : lvl*0.85) > 0.78);
    });
    // master meter mirrors the focused channel
    const f = channels[focused];
    if (f && masterState.segs) {
      masterState.segs.forEach((seg, k) => {
        const wob = (Math.sin(t/150 + k) * 0.5 + 0.5) * f.gain;
        seg.style.setProperty("--h", Math.max(8, Math.min(100, (f.gain*0.5 + wob*0.55)*100)).toFixed(0) + "%");
      });
      masterState.vu.classList.toggle("hot", f.gain > 0.78);
    }
    raf = requestAnimationFrame(vuTick);
  }

  if (reduce) {
    // freeze VU as a static bar - no rAF, no transforms
    const setStatic = (segs, g) => segs.forEach((seg, k) => seg.style.setProperty("--h", (28 + g*40 + k*4) + "%"));
    channels.forEach((c) => setStatic(c.segs, c.gain));
    setStatic(masterState.segs, channels[focused] ? channels[focused].gain : 0.6);
  } else {
    raf = requestAnimationFrame(vuTick);
  }

  // ---- mobile channel switcher ------------------------------------------
  const mobSwitch = document.getElementById("mobSwitch");
  DATA.forEach((d, i) => {
    const b = document.createElement("button");
    b.type = "button";
    b.textContent = "CH" + String(i+1).padStart(2,"0");
    b.setAttribute("role", "tab");
    b.setAttribute("aria-pressed", i < 2 ? "true" : "false");
    b.addEventListener("click", () => {
      // on mobile, swap which 2 channels are visible: focus this + next
      const a = i, bIdx = (i + 1) % DATA.length;
      channels.forEach((c, k) => c.el.classList.toggle("m-show", k === a || k === bIdx));
      [...mobSwitch.children].forEach((btn, k) => btn.setAttribute("aria-pressed", (k === a) ? "true" : "false"));
      channels[a].gain = 0.9; layoutFader(channels[a]);
      reveal(a);
    });
    mobSwitch.appendChild(b);
  });

  // ---- boot: top channel already raised, work in the monitor at scroll=0 -
  reveal(0);
  refreshActiveClasses();

  // re-seat fader caps on resize (% based so cheap, but recompute travel cache via layout)
  let rz;
  addEventListener("resize", () => {
    clearTimeout(rz);
    rz = setTimeout(() => { channels.forEach(layoutFader); }, 150);
  }, { passive: true });
})();
</script>
</body>
</html>
