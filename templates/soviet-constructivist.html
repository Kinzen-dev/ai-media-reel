<!-- TEMPLATE: Red Wedge Agitprop | ARCHETYPE: Constructivist | REF: Rodchenko, El Lissitzky (Beat the Whites with the Red Wedge), Stenberg Bros film posters | WHEN TO USE: bold manifesto / launch / campaign landing that wants heroic revolutionary-poster confidence | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Red Wedge | Constructivist Agitprop Template</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Anton&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     RED WEDGE - Constructivist agitprop template
     Palette: paper #ece7dd  /  revolutionary red #c81912  /  black #0d0d0d
     Type: Anton (display condensed), Oswald (UI condensed)
     ============================================================ */
  :root {
    --paper: #ece7dd;
    --red: #c81912;
    --red-deep: #9e1209;
    --black: #0d0d0d;
    --ink: #14110e;
    --ax: 38deg;          /* the master diagonal axis */
    --ax-neg: -38deg;
    --edge: 3px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--paper);
    color: var(--black);
    font-family: "Oswald", system-ui, sans-serif;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    /* faint paper texture: orthogonal print grid */
    background-image:
      repeating-linear-gradient(0deg, rgba(13,13,13,.035) 0 1px, transparent 1px 38px),
      repeating-linear-gradient(90deg, rgba(13,13,13,.035) 0 1px, transparent 1px 38px);
  }
  a { color: inherit; text-decoration: none; }
  ::selection { background: var(--red); color: var(--paper); }
  :focus-visible {
    outline: var(--edge) solid var(--red);
    outline-offset: 3px;
  }

  /* ---------- shared geometry helpers ---------- */
  .wrap { max-width: 1440px; margin: 0 auto; padding: 0 clamp(16px, 4vw, 56px); }
  .cond { font-family: "Anton", "Oswald", sans-serif; font-weight: 400; letter-spacing: .01em; line-height: .86; }
  .upper { text-transform: uppercase; }
  .red { color: var(--red); }
  .paperc { color: var(--paper); }

  /* ============================================================
     SIGNATURE STAGE  (scroll=0: wedge + diagonal headline + montage)
     ============================================================ */
  .stage {
    position: relative;
    min-height: 100svh;
    overflow: hidden;
    border-bottom: 6px solid var(--black);
    isolation: isolate;
  }

  /* THE RED WEDGE - full-bleed diagonal slicing from bottom-left corner.
     Built as an SVG so the hypotenuse is a crisp authentic blade. */
  .wedge {
    position: absolute;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    will-change: transform;
  }
  .wedge svg { width: 100%; height: 100%; display: block; }

  /* big circular geometric marker (Rodchenko ring) */
  .ring {
    position: absolute;
    z-index: 1;
    border-radius: 50%;
    border: var(--edge) solid var(--black);
    pointer-events: none;
  }
  .ring.r1 {
    width: clamp(180px, 30vw, 420px);
    aspect-ratio: 1;
    top: -8%; right: 4%;
    border-color: var(--black);
  }
  .ring.r1::after {
    content: "";
    position: absolute; inset: 14%;
    border-radius: 50%;
    border: var(--edge) solid var(--red);
  }

  /* top agit band: kicker + nav, compact, sits ABOVE the populated montage */
  .band {
    position: relative;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-top: clamp(14px, 2.4vw, 26px);
    flex-wrap: wrap;
  }
  .mark {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: "Anton", sans-serif;
    font-size: clamp(20px, 2.4vw, 30px);
    letter-spacing: .02em;
    text-transform: uppercase;
  }
  .mark .glyph {
    width: 30px; height: 30px;
    background: var(--red);
    transform: rotate(45deg);
    display: inline-block;
    flex: 0 0 auto;
  }
  .nav {
    display: flex; gap: clamp(10px, 1.6vw, 26px);
    font-size: 13px; letter-spacing: .18em; text-transform: uppercase; font-weight: 600;
  }
  .nav a { padding: 6px 2px; border-bottom: 2px solid transparent; transition: border-color .15s, color .15s; }
  .nav a:hover { border-bottom-color: var(--red); }

  /* MAIN SIGNATURE GRID: headline on diagonal axis + montage blocks
     Visible & populated at scroll=0. */
  .signature {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 1.15fr .85fr;
    gap: clamp(16px, 3vw, 40px);
    align-items: center;
    padding-top: clamp(20px, 4vw, 56px);
    padding-bottom: clamp(28px, 5vw, 72px);
    min-height: calc(100svh - 120px);
  }

  /* DIAGONAL CONDENSED HEADLINE on the 38deg axis */
  .headline {
    position: relative;
    transform-origin: left center;
    /* the headline rides the master diagonal */
  }
  .headline .deck {
    font-size: 13px; letter-spacing: .32em; font-weight: 600;
    text-transform: uppercase; color: var(--red-deep);
    margin-bottom: clamp(10px, 1.4vw, 18px);
    display: inline-block;
    padding: 5px 12px;
    background: var(--black);
    color: var(--paper);
  }
  .htitle {
    font-family: "Anton", sans-serif;
    font-size: clamp(58px, 13.5vw, 200px);
    line-height: .82;
    text-transform: uppercase;
    letter-spacing: -0.005em;
  }
  /* each title line is rotated onto the diagonal, stepped to build the L-to-R reading diagonal */
  .htitle .ln { display: block; transform-origin: left center; }
  .htitle .ln1 { transform: rotate(var(--ax-neg)) translateX(2%); color: var(--black); }
  .htitle .ln2 { transform: rotate(var(--ax-neg)) translateX(11%); color: var(--red); margin-top: -.06em; }
  .htitle .ln3 { transform: rotate(var(--ax-neg)) translateX(20%); color: var(--black); margin-top: -.04em; }
  .htitle .stroke {
    -webkit-text-stroke: 2px var(--black);
    color: transparent;
  }

  .lede {
    margin-top: clamp(34px, 6vw, 88px);
    max-width: 30ch;
    font-size: clamp(14px, 1.15vw, 17px);
    line-height: 1.45;
    font-weight: 400;
    color: var(--ink);
    border-left: var(--edge) solid var(--red);
    padding-left: 16px;
  }
  .cta {
    display: inline-flex; align-items: center; gap: 12px;
    margin-top: 22px;
    background: var(--red);
    color: var(--paper);
    font-family: "Anton", sans-serif;
    font-size: clamp(15px, 1.4vw, 20px);
    letter-spacing: .04em; text-transform: uppercase;
    padding: 12px 22px 11px;
    transform: skewX(-9deg);
    transition: transform .14s ease, background .14s;
  }
  .cta > span { transform: skewX(9deg); display: inline-block; }
  .cta:hover { background: var(--black); transform: skewX(-9deg) translateY(-2px); }
  .cta .arrow { width: 26px; height: 12px; }

  /* PHOTOMONTAGE BLOCK - geometric image cells, contained (never cover-crop) */
  .montage {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: clamp(8px, 1.1vw, 14px);
    transform: rotate(2.2deg);
  }
  .cell {
    position: relative;
    background: var(--black);
    border: var(--edge) solid var(--black);
    overflow: hidden;
    aspect-ratio: 16 / 11;
  }
  .cell.tall { aspect-ratio: 3 / 4; grid-row: span 2; }
  .cell img, .cell video {
    width: 100%; height: 100%;
    object-fit: cover;        /* landscape cells (16:9 assets) into the 16:11 box: minimal, safe crop */
    object-position: center;
    display: block;
    filter: grayscale(1) contrast(1.16) brightness(1.02);
    transition: filter .3s ease;
  }
  /* the tall portrait cell carries a 16:9 video; cover would slice off most of the frame,
     so letterbox it (contain) on the cell's black mat - black is a palette color, fully on-brand */
  .cell.tall img, .cell.tall video { object-fit: contain; background: var(--black); }
  .cell .duo {                 /* red duotone wash - the agitprop ink */
    position: absolute; inset: 0;
    background: var(--red);
    mix-blend-mode: multiply;
    opacity: .42;
    pointer-events: none;
    transition: opacity .3s ease;
  }
  .cell:hover img, .cell:hover video { filter: grayscale(.2) contrast(1.05) brightness(1.05); }
  .cell:hover .duo { opacity: .12; }
  .cell .tag {
    position: absolute; left: 0; bottom: 0; z-index: 3;
    background: var(--black); color: var(--paper);
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase; font-weight: 600;
    padding: 4px 9px;
  }
  /* triangular marker overlay on the montage */
  .tri {
    position: absolute; z-index: 4;
    width: 0; height: 0;
    border-left: 34px solid transparent;
    border-right: 34px solid transparent;
    border-bottom: 58px solid var(--red);
    top: 38%; left: -22px;
    transform: rotate(18deg);
    filter: drop-shadow(0 0 0 var(--black));
    pointer-events: none;
  }
  .montage .num {
    position: absolute; z-index: 4;
    right: -14px; top: -30px;
    font-family: "Anton", sans-serif;
    font-size: clamp(48px, 6vw, 84px);
    color: var(--red);
    -webkit-text-stroke: 2px var(--black);
    line-height: 1;
    transform: rotate(8deg);
  }

  /* play button for the focused video cell */
  .cell .play {
    position: absolute; z-index: 4;
    left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 64px; height: 64px;
    background: var(--red);
    border: var(--edge) solid var(--paper);
    display: grid; place-items: center;
    cursor: pointer;
    transition: transform .15s, background .15s;
  }
  .cell .play:hover { transform: translate(-50%,-50%) scale(1.08); background: var(--black); }
  .cell .play svg { width: 22px; height: 22px; margin-left: 3px; }
  .cell.playing .play { display: none; }

  /* scroll cue */
  .cue {
    position: absolute; z-index: 6; left: clamp(16px,4vw,56px); bottom: 18px;
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; letter-spacing: .26em; text-transform: uppercase; font-weight: 600;
    color: var(--paper);
  }
  .cue .bar { width: 56px; height: 3px; background: var(--paper); transform: rotate(var(--ax-neg)); }

  /* ============================================================
     MANIFESTO STRIP (marquee on the diagonal)
     ============================================================ */
  .strip {
    background: var(--black);
    color: var(--paper);
    overflow: hidden;
    border-bottom: 6px solid var(--red);
    padding: 14px 0;
  }
  .strip .track {
    display: flex; gap: 48px; white-space: nowrap;
    width: max-content;
    font-family: "Anton", sans-serif;
    font-size: clamp(22px, 3vw, 40px);
    text-transform: uppercase; letter-spacing: .02em;
    animation: march 26s linear infinite;
  }
  .strip .track span { display: inline-flex; align-items: center; gap: 48px; }
  .strip .track .dot { width: 14px; height: 14px; background: var(--red); border-radius: 50%; }
  @keyframes march { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ============================================================
     PROGRAM PANELS (the agitprop content blocks)
     ============================================================ */
  .program { padding: clamp(48px, 8vw, 110px) 0; position: relative; }
  .program::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 12px;
    background: repeating-linear-gradient(var(--ax), var(--red) 0 14px, var(--black) 14px 28px);
  }
  .sec-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    gap: 20px; margin-bottom: clamp(28px, 4vw, 56px); flex-wrap: wrap;
  }
  .sec-head h2 {
    font-family: "Anton", sans-serif; text-transform: uppercase;
    font-size: clamp(40px, 8vw, 110px); line-height: .84;
  }
  .sec-head h2 em { font-style: normal; color: var(--red); display: block; transform: translateX(6%) rotate(-3deg); }
  .sec-head .meta { font-size: 12px; letter-spacing: .22em; text-transform: uppercase; font-weight: 600; color: var(--ink); text-align: right; }

  .panels { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(14px, 2vw, 24px); }
  .panel {
    position: relative;
    background: var(--paper);
    border: var(--edge) solid var(--black);
    padding: 0;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .panel .ph {
    position: relative; aspect-ratio: 16 / 10; overflow: hidden; background: var(--black);
    border-bottom: var(--edge) solid var(--black);
  }
  .panel .ph img, .panel .ph video {
    width: 100%; height: 100%; object-fit: cover; object-position: center;
    filter: grayscale(1) contrast(1.12);
    transition: filter .3s;
  }
  .panel .ph .duo { position: absolute; inset: 0; background: var(--red); mix-blend-mode: multiply; opacity: .4; transition: opacity .3s; }
  .panel:hover .ph img, .panel:hover .ph video { filter: grayscale(.15) contrast(1.04); }
  .panel:hover .ph .duo { opacity: .12; }
  .panel .ph .idx {
    position: absolute; top: 0; right: 0; z-index: 3;
    font-family: "Anton", sans-serif; font-size: 40px; line-height: 1;
    color: var(--paper); background: var(--red); padding: 4px 12px 6px;
  }
  .panel .ph .play2 {
    position: absolute; z-index: 4; left: 14px; bottom: 14px;
    width: 46px; height: 46px; background: var(--red); border: var(--edge) solid var(--paper);
    display: grid; place-items: center; cursor: pointer; transition: transform .15s, background .15s;
  }
  .panel .ph .play2:hover { transform: scale(1.08); background: var(--black); }
  .panel .ph .play2 svg { width: 16px; height: 16px; margin-left: 2px; }
  .panel.playing .play2 { display: none; }
  .panel .body { padding: 16px 16px 18px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .panel .body h3 { font-family: "Anton", sans-serif; text-transform: uppercase; font-size: clamp(20px, 2.2vw, 28px); line-height: .92; }
  .panel .body p { font-size: 13.5px; line-height: 1.45; color: var(--ink); }
  .panel .body .kick { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; font-weight: 700; color: var(--red); }

  /* ============================================================
     SLOGAN BLOCK - giant diagonal type over red field
     ============================================================ */
  .slogan {
    position: relative;
    background: var(--red);
    color: var(--paper);
    overflow: hidden;
    border-top: 6px solid var(--black);
    border-bottom: 6px solid var(--black);
    padding: clamp(60px, 11vw, 150px) 0;
  }
  .slogan .field {
    position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      repeating-linear-gradient(var(--ax-neg), rgba(13,13,13,.10) 0 2px, transparent 2px 40px);
  }
  .slogan .blk { position: absolute; background: var(--black); z-index: 0; }
  .slogan .blk.b1 { width: clamp(120px,16vw,260px); height: clamp(120px,16vw,260px); right: -3%; top: -10%; transform: rotate(45deg); }
  .slogan .blk.b2 { width: clamp(70px,10vw,160px); height: clamp(70px,10vw,160px); left: 6%; bottom: -8%; border-radius: 50%; background: transparent; border: 6px solid var(--black); }
  .slogan .txt { position: relative; z-index: 2; }
  .slogan h2 {
    font-family: "Anton", sans-serif; text-transform: uppercase;
    font-size: clamp(46px, 11vw, 150px); line-height: .82; letter-spacing: -0.01em;
    max-width: 16ch;
  }
  .slogan h2 .out { -webkit-text-stroke: 2px var(--paper); color: transparent; }
  .slogan .sub { margin-top: 22px; max-width: 46ch; font-size: clamp(14px,1.2vw,18px); line-height: 1.5; font-weight: 400; }

  /* ============================================================
     MASTHEAD / FOOTER
     ============================================================ */
  .foot { background: var(--black); color: var(--paper); padding: clamp(40px,7vw,90px) 0 36px; position: relative; overflow: hidden; }
  .foot .bigword {
    font-family: "Anton", sans-serif; text-transform: uppercase;
    font-size: clamp(64px, 18vw, 280px); line-height: .8; color: var(--paper);
    -webkit-text-stroke: 0; opacity: .96;
  }
  .foot .bigword b { color: var(--red); -webkit-text-stroke: 0; }
  .foot .grid {
    display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 28px;
    margin-top: clamp(28px,5vw,56px); align-items: start;
  }
  .foot .grid .col h4 { font-size: 12px; letter-spacing: .2em; text-transform: uppercase; color: var(--red); margin-bottom: 12px; font-weight: 700; }
  .foot .grid .col a, .foot .grid .col p { display: block; font-size: 14px; line-height: 1.8; color: #cfc9be; }
  .foot .grid .col a:hover { color: var(--paper); }
  .foot .rule { height: 3px; background: var(--red); margin: 34px 0 18px; transform: skewX(-12deg); }
  .foot .legal { display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: #8f897e; }

  /* ============================================================
     REVEAL (scroll-in) - disabled under reduced motion
     ============================================================ */
  .reveal { opacity: 0; transform: translateY(26px); transition: opacity .6s ease, transform .6s cubic-bezier(.2,.7,.2,1); }
  .reveal.in { opacity: 1; transform: none; }

  /* ============================================================
     RESPONSIVE - keep diagonal energy, no horizontal overflow,
     never cover-crop landscape into portrait viewport.
     ============================================================ */
  @media (max-width: 960px) {
    .panels { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 760px) {
    :root { --ax: 30deg; --ax-neg: -30deg; }
    .signature {
      grid-template-columns: 1fr;
      gap: clamp(28px, 7vw, 44px);
      min-height: 0;
      padding-bottom: 40px;
    }
    .htitle { font-size: clamp(46px, 16vw, 90px); }
    /* soften rotation so condensed lines never bleed off-screen on a phone */
    .htitle .ln1 { transform: rotate(-7deg) translateX(0); }
    .htitle .ln2 { transform: rotate(-7deg) translateX(4%); }
    .htitle .ln3 { transform: rotate(-7deg) translateX(8%); }
    .lede { margin-top: 20px; max-width: none; }
    .montage { transform: rotate(1.5deg); }
    .ring.r1 { top: -4%; right: -10%; width: 220px; }
    .panels { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    /* Phone: stack everything single-column and letterbox-contain every media cell on its
       black mat, so NO landscape (or video) frame is ever cover-cropped on a portrait screen.
       Black mat is a palette colour, so letterboxing reads as deliberate framing, not a gap. */
    .montage { grid-template-columns: 1fr; grid-template-rows: none; transform: rotate(1.2deg); }
    .cell { aspect-ratio: 16 / 9; grid-row: auto; }
    .cell.tall { aspect-ratio: 16 / 9; grid-row: auto; }
    .cell img, .cell video,
    .cell.tall img, .cell.tall video { object-fit: contain; background: var(--black); }
    /* program panels: square / landscape assets letterboxed too (no top-bottom crop on phone) */
    .panel .ph { aspect-ratio: 16 / 9; }
    .panel .ph img, .panel .ph video { object-fit: contain; background: var(--black); }
    .strip .track { font-size: 22px; }
    .sec-head h2 { font-size: clamp(34px, 12vw, 64px); }
  }
  @media (max-width: 420px) {
    .htitle .ln1, .htitle .ln2, .htitle .ln3 { transform: rotate(-5deg) translateX(0); }
    .nav { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .strip .track { animation: none; }
    .reveal { opacity: 1; transform: none; transition: none; }
    .wedge { transform: none !important; }
    .cta, .panel .ph img, .cell img, .cell video { transition: none; }
  }
</style>
</head>
<body>

<!-- ============================================================
     DATA - swap content here. Each montage/panel media reuses ../assets/.
     ============================================================ -->
<script>
  const DATA = {
    brand: "RED WEDGE",
    nav: ["Program", "Manifesto", "Works", "Join"],
    hero: {
      deck: "Edition No. 01 / Built to Convince",
      // three condensed lines set on the diagonal axis
      lines: [
        { text: "Beat the",  cls: "ln1" },
        { text: "Whites",    cls: "ln2" },
        { text: "with Red",  cls: "ln3 stroke" }
      ],
      lede: "A revolutionary poster as a user interface. One diagonal, one wedge, one demand. Build pages that do not ask, they declare.",
      cta: "Mobilize Now"
    },
    // montage cells in the hero (one focusable video, rest stills, contained)
    montage: [
      { type: "img",   src: "../assets/flux-car-4k.png",        tag: "Plate 01 / Machine",  cls: "" },
      { type: "video", src: "../assets/kling-video.mp4",        poster: "../assets/gen/poster-kling-video.png", tag: "Plate 02 / Motion", cls: "tall" },
      { type: "img",   src: "../assets/flux-clinic-4k.png",     tag: "Plate 03 / Labor",    cls: "" }
    ],
    marquee: ["Form follows force", "No ornament", "The diagonal is a weapon", "Print loud", "Geometry is a position"],
    program: {
      title: "The", em: "Program",
      meta: "Five demands /<br>Zero apology",
      panels: [
        { idx: "1", type: "img",   src: "../assets/sdxl.png",   kick: "Section A", title: "Seize the Grid", body: "Photomontage over polish. Cut, paste, rotate. The composition argues before a word is read." },
        { idx: "2", type: "video", src: "../assets/fal-video.mp4", poster: "../assets/gen/poster-fal-video.png", kick: "Section B", title: "Motion as Force", body: "One focused frame plays. The rest hold their posters. Decode budget stays cheap, the page stays fast." },
        { idx: "3", type: "img",   src: "../assets/hf-tinysd.png", kick: "Section C", title: "Color is a Stance", body: "Paper, black, one red. Three voices, no compromise. The duotone wash makes every plate take a side." },
        { idx: "4", type: "img",   src: "../assets/flux-car-4k.png", kick: "Section D", title: "Type on the Diagonal", body: "Condensed, heavy, tilted. Reading left to right becomes a march up the page." },
        { idx: "5", type: "video", src: "../assets/veo-video.mp4", poster: "../assets/gen/poster-veo-video.png", kick: "Section E", title: "Build to Convince", body: "Confidence over decoration. The wedge does the talking. Ship the manifesto." },
        { idx: "6", type: "img",   src: "../assets/flux-clinic-4k.png", kick: "Section F", title: "Hold the Margin", body: "A printed grid, a hard border, a circular marker. Constraint reads as conviction." }
      ]
    },
    slogan: {
      head: ["Our", "RED", "is", "non", "negotiable"],
      sub: "This template commits to one paradigm and never blinks. Drop your media in the DATA array, edit the slogans, keep the wedge. The agitprop does the rest."
    },
    foot: {
      bigA: "RED", bigB: "WEDGE",
      cols: [
        { h: "Editorial", items: ["Manifesto", "Submissions", "Print archive", "Contact the desk"] },
        { h: "Press", items: ["Posters", "Plates", "Type specimens"] },
        { h: "Join", items: ["Mailing list", "Distribution", "Volunteer"] }
      ],
      legal: ["Constructivist Agitprop Template", "Set in Anton + Oswald", "Paper E C E 7 D D / Red C 8 1 9 1 2"]
    }
  };
</script>

<!-- ============================================================
     SIGNATURE STAGE
     ============================================================ -->
<header class="stage" id="top">

  <!-- THE RED WEDGE (full-bleed diagonal, SVG blade) -->
  <div class="wedge" id="wedge" aria-hidden="true">
    <svg viewBox="0 0 100 100" preserveAspectRatio="none">
      <!-- red wedge from bottom-left corner driving up to the right -->
      <polygon points="0,100 0,30 100,100" fill="#c81912"></polygon>
      <!-- deep-red under-shadow blade for depth -->
      <polygon points="0,100 0,40 78,100" fill="#9e1209"></polygon>
      <!-- thin black crispline on the hypotenuse -->
      <polyline points="0,30 100,100" fill="none" stroke="#0d0d0d" stroke-width="0.5"></polyline>
    </svg>
  </div>

  <!-- Rodchenko ring marker -->
  <span class="ring r1" aria-hidden="true"></span>

  <div class="wrap">
    <!-- top agit band -->
    <nav class="band" aria-label="Primary">
      <span class="mark"><span class="glyph"></span><span id="brand">RED WEDGE</span></span>
      <div class="nav" id="nav"></div>
    </nav>

    <!-- main signature: diagonal headline + montage -->
    <div class="signature">
      <div class="headline">
        <span class="deck" id="deck">Edition No. 01</span>
        <h1 class="htitle" id="htitle"></h1>
        <p class="lede" id="lede"></p>
        <a class="cta" href="#program" id="cta">
          <span>Mobilize</span>
          <svg class="arrow" viewBox="0 0 26 12" aria-hidden="true">
            <path d="M0 6 L22 6 M16 1 L23 6 L16 11" fill="none" stroke="#ece7dd" stroke-width="2"></path>
          </svg>
        </a>
      </div>

      <!-- PHOTOMONTAGE BLOCK -->
      <div class="montage" id="montage" aria-label="Photomontage">
        <span class="num" aria-hidden="true">01</span>
        <span class="tri" aria-hidden="true"></span>
        <!-- cells injected by JS -->
      </div>
    </div>
  </div>

  <div class="cue" aria-hidden="true"><span class="bar"></span> Scroll to advance</div>
</header>

<!-- ============================================================
     MANIFESTO MARQUEE
     ============================================================ -->
<div class="strip" aria-hidden="true">
  <div class="track" id="track"></div>
</div>

<!-- ============================================================
     PROGRAM PANELS
     ============================================================ -->
<main>
<section class="program" id="program">
  <div class="wrap">
    <div class="sec-head reveal">
      <h2><span id="progTitle">The</span> <em id="progEm">Program</em></h2>
      <div class="meta" id="progMeta"></div>
    </div>
    <div class="panels" id="panels"></div>
  </div>
</section>

<!-- ============================================================
     SLOGAN BLOCK
     ============================================================ -->
<section class="slogan" id="manifesto">
  <span class="field" aria-hidden="true"></span>
  <span class="blk b1" aria-hidden="true"></span>
  <span class="blk b2" aria-hidden="true"></span>
  <div class="wrap txt">
    <h2 class="reveal" id="sloganHead"></h2>
    <p class="sub reveal" id="sloganSub"></p>
  </div>
</section>
</main>

<!-- ============================================================
     FOOTER MASTHEAD
     ============================================================ -->
<footer class="foot" id="join">
  <div class="wrap">
    <div class="bigword reveal" id="bigword"></div>
    <div class="grid" id="footGrid"></div>
    <div class="rule" aria-hidden="true"></div>
    <div class="legal" id="footLegal"></div>
  </div>
</footer>

<script>
  /* ============================================================
     RENDER from DATA
     ============================================================ */
  (function () {
    const $ = (s, r = document) => r.querySelector(s);
    const esc = (s) => String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    // brand + nav
    $("#brand").textContent = DATA.brand;
    document.title = DATA.brand + " | Constructivist Agitprop Template";
    $("#nav").innerHTML = DATA.nav.map((n, i) =>
      `<a href="#${["program","manifesto","program","join"][i] || "top"}">${esc(n)}</a>`).join("");

    // hero
    $("#deck").textContent = DATA.hero.deck;
    $("#htitle").innerHTML = DATA.hero.lines
      .map(l => `<span class="ln ${l.cls}">${esc(l.text)}</span>`).join("");
    $("#lede").textContent = DATA.hero.lede;
    $("#cta span").textContent = DATA.hero.cta;

    // montage cells
    const mont = $("#montage");
    DATA.montage.forEach((m, i) => {
      const cell = document.createElement("div");
      cell.className = "cell " + (m.cls || "");
      cell.dataset.idx = i;
      if (m.type === "video") {
        cell.innerHTML =
          `<video muted loop playsinline preload="none" poster="${esc(m.poster)}">
             <source data-src="${esc(m.src)}" type="video/mp4">
           </video>
           <span class="duo"></span>
           <button class="play" aria-label="Play ${esc(m.tag)}">
             <svg viewBox="0 0 22 22" aria-hidden="true"><path d="M4 2 L20 11 L4 20 Z" fill="#ece7dd"/></svg>
           </button>
           <span class="tag">${esc(m.tag)}</span>`;
      } else {
        cell.innerHTML =
          `<img src="${esc(m.src)}" alt="${esc(m.tag)}" loading="${i === 0 ? "eager" : "lazy"}" decoding="async">
           <span class="duo"></span>
           <span class="tag">${esc(m.tag)}</span>`;
      }
      mont.appendChild(cell);
    });

    // marquee (duplicated for seamless loop)
    const one = DATA.marquee.map(t =>
      `<span><span class="dot"></span>${esc(t)}</span>`).join("");
    $("#track").innerHTML = `<span>${one}</span><span>${one}</span>`;

    // program
    $("#progTitle").textContent = DATA.program.title;
    $("#progEm").textContent = DATA.program.em;
    $("#progMeta").innerHTML = DATA.program.meta;
    $("#panels").innerHTML = DATA.program.panels.map((p, i) => {
      const media = p.type === "video"
        ? `<video muted loop playsinline preload="none" poster="${esc(p.poster)}">
             <source data-src="${esc(p.src)}" type="video/mp4"></video>
           <span class="duo"></span>
           <button class="play2" aria-label="Play ${esc(p.title)}">
             <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 2 L14 8 L3 14 Z" fill="#ece7dd"/></svg>
           </button>`
        : `<img src="${esc(p.src)}" alt="${esc(p.title)}" loading="lazy" decoding="async">
           <span class="duo"></span>`;
      return `<article class="panel reveal" style="transition-delay:${(i % 3) * 70}ms">
        <div class="ph">
          ${media}
          <span class="idx">${esc(p.idx)}</span>
        </div>
        <div class="body">
          <span class="kick">${esc(p.kick)}</span>
          <h3>${esc(p.title)}</h3>
          <p>${esc(p.body)}</p>
        </div>
      </article>`;
    }).join("");

    // slogan - alternate emphasis on words
    $("#sloganHead").innerHTML = DATA.slogan.head
      .map((w, i) => i % 2 ? `<span class="out">${esc(w)}</span> ` : `${esc(w)} `).join("");
    $("#sloganSub").textContent = DATA.slogan.sub;

    // footer
    $("#bigword").innerHTML = `${esc(DATA.foot.bigA)}<b>${esc(DATA.foot.bigB)}</b>`;
    $("#footGrid").innerHTML = DATA.foot.cols.map(c =>
      `<div class="col"><h4>${esc(c.h)}</h4>${c.items.map(it => `<a href="#">${esc(it)}</a>`).join("")}</div>`
    ).join("");
    $("#footLegal").innerHTML = DATA.foot.legal.map(l => `<span>${esc(l)}</span>`).join("");
  })();

  /* ============================================================
     MOTION + MEDIA  (all guarded by reduced-motion)
     ============================================================ */
  (function () {
    const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    /* ---- reveal on scroll ---- */
    if (!reduce && "IntersectionObserver" in window) {
      const io = new IntersectionObserver((ents) => {
        ents.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
      }, { threshold: 0.16 });
      document.querySelectorAll(".reveal").forEach(el => io.observe(el));
    } else {
      document.querySelectorAll(".reveal").forEach(el => el.classList.add("in"));
    }

    /* ---- subtle wedge parallax on the master diagonal (off under reduced motion) ---- */
    if (!reduce) {
      const wedge = document.getElementById("wedge");
      let ticking = false;
      const onScroll = () => {
        if (ticking) return;
        ticking = true;
        requestAnimationFrame(() => {
          const y = window.scrollY || 0;
          const top = document.getElementById("top");
          const h = top ? top.offsetHeight : 1;
          const p = Math.min(1, y / h);
          // wedge slides slightly up-right along the axis, never enough to expose paper edges
          wedge.style.transform = `translate(${p * 3}%, ${-p * 5}%)`;
          ticking = false;
        });
      };
      window.addEventListener("scroll", onScroll, { passive: true });
    }

    /* ============================================================
       VIDEO: lazy-load source only when in view; play ONLY the
       focused/clicked one (never autoplay several at once -> no
       simultaneous decode FPS tank). Stills/posters stay shown.
       ============================================================ */
    let active = null; // the single currently-playing <video>

    function ensureSrc(video) {
      const src = video.querySelector("source[data-src]");
      if (src && !src.src) { src.src = src.dataset.src; video.load(); }
    }
    function stop(video) {
      if (!video) return;
      try { video.pause(); } catch (e) {}
      const host = video.closest(".cell, .panel");
      if (host) host.classList.remove("playing");
    }
    function focusPlay(video) {
      if (reduce) return; // honor reduced motion: do not auto-play heavy media
      if (active && active !== video) stop(active);
      ensureSrc(video);
      const host = video.closest(".cell, .panel");
      const go = () => { video.play().then(() => { if (host) host.classList.add("playing"); active = video; }).catch(() => {}); };
      if (video.readyState >= 2) go();
      else video.addEventListener("loadeddata", go, { once: true });
    }

    // wire play buttons
    document.querySelectorAll(".play, .play2").forEach(btn => {
      btn.addEventListener("click", (ev) => {
        ev.preventDefault();
        const v = btn.parentElement.querySelector("video");
        if (!v) return;
        if (active === v && !v.paused) stop(v); else focusPlay(v);
      });
    });

    // pause any playing video when it scrolls fully out of view (free the decoder)
    if ("IntersectionObserver" in window) {
      const vio = new IntersectionObserver((ents) => {
        ents.forEach(e => {
          const v = e.target;
          if (!e.isIntersecting && active === v) { stop(v); active = null; }
        });
      }, { threshold: 0.01 });
      document.querySelectorAll("video").forEach(v => vio.observe(v));
    }

    // desktop hover-to-focus on the hero montage video cell (one at a time)
    if (!reduce && window.matchMedia("(hover: hover)").matches) {
      document.querySelectorAll(".cell").forEach(cell => {
        const v = cell.querySelector("video");
        if (!v) return;
        cell.addEventListener("mouseenter", () => focusPlay(v));
        cell.addEventListener("mouseleave", () => { if (active === v) { stop(v); active = null; } });
      });
    }
  })();
</script>
</body>
</html>
