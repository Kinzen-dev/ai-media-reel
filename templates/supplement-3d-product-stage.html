<!-- TEMPLATE: Supplement Product Stage | ARCHETYPE: supplement - hero product on flat-color stage | REF: More Nutrition (Awwwards SOTD Nov 2025), premium nutrition DTC | WHEN TO USE: single-product supplement/nutrition/cosmetic DTC hero, one bold flat color + one product + buy CTA | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Matcha Daily - Supplement Product Stage</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script>
/* =========================================================================
   DATA - swap everything here. One product, one bold flat stage.
   product.image: a real asset path renders a photo (object-fit: contain).
   Leave product.image null to render the gradient inline-SVG tub instead.
   ========================================================================= */
const DATA = {
  brand: "MATCHA DAILY",
  // Flat stage. Pick a bold candy / nutrition color and a soft contrast.
  stage: {
    bg:       "#0E7C5A",   // matcha green, full-bleed flat
    bgSoft:   "#16A06F",   // subtle radial lift behind the product
    cream:    "#F6F1E4",   // cream foreground text / chips
    accent:   "#F4C84A",   // candy yellow CTA + price
    ink:      "#08382A"     // deepest green for CTA text / fine print
  },
  eyebrow: "30 servings - ceremonial grade",
  headline: ["Calm energy,", "one scoop a day."],
  sub: "L-theanine plus stone-ground matcha. Steady focus without the crash, the jitters, or the 3pm dip.",
  // Benefit / ingredient chips. icon: one of leaf, bolt, heart, drop, shield
  chips: [
    { icon: "bolt",   label: "Clean energy" },
    { icon: "leaf",   label: "L-theanine" },
    { icon: "heart",  label: "Antioxidants" },
    { icon: "drop",   label: "Zero sugar" },
    { icon: "shield", label: "Third-party tested" }
  ],
  product: {
    // image: "../assets/flux-clinic-4k.png", // <- a real asset renders contained
    image: null,                              // null => gradient inline-SVG tub
    name: "Matcha Daily",
    flavor: "Original ceremonial",
    badge: "NEW"
  },
  buy: {
    price: "32",
    currency: "USD",
    unit: "/ 30 servings",
    sub: "1.07 per serving",
    cta: "Add to cart",
    rating: "4.9",
    reviews: "2,418"
  },
  marquee: ["NO CRASH", "NO JITTERS", "NO SUGAR", "ALWAYS SMOOTH"],
  footnote: "Free shipping over 40 USD - subscribe and save 15 percent"
};
</script>
<style>
  /* ---- reset / base ---- */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:     #0E7C5A;
    --bgSoft: #16A06F;
    --cream:  #F6F1E4;
    --accent: #F4C84A;
    --ink:    #08382A;
    --r: 22px;
  }
  html, body { height: 100%; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    background: var(--bg);
    color: var(--cream);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .display { font-family: "Bricolage Grotesque", "Inter", sans-serif; }

  /* full-bleed flat stage with a soft radial lift behind the product */
  .stage {
    position: relative;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    background:
      radial-gradient(120% 90% at 50% 64%, var(--bgSoft) 0%, rgba(22,160,111,0) 58%),
      var(--bg);
    isolation: isolate;
  }
  /* faint concentric rings for depth, pointer-safe */
  .stage::before {
    content: "";
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 50% 62%, rgba(255,255,255,0.07) 0 1px, transparent 1px 22%),
      radial-gradient(circle at 50% 62%, rgba(255,255,255,0.05) 0 1px, transparent 1px 38%),
      radial-gradient(circle at 50% 62%, rgba(255,255,255,0.04) 0 1px, transparent 1px 54%);
    z-index: -1;
    pointer-events: none;
  }

  /* ---- top bar ---- */
  .bar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    padding: 22px clamp(18px, 4vw, 54px);
  }
  .logo {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800; letter-spacing: 0.14em; font-size: 16px;
    color: var(--cream);
  }
  .logo span { color: var(--accent); }
  .nav { display: flex; gap: 26px; align-items: center; }
  .nav a {
    color: var(--cream); text-decoration: none; opacity: 0.82;
    font-size: 13.5px; font-weight: 500; letter-spacing: 0.02em;
    transition: opacity .2s;
  }
  .nav a:hover { opacity: 1; }
  .cart {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--cream); color: var(--ink);
    border: none; cursor: pointer;
    padding: 9px 16px; border-radius: 999px;
    font-weight: 600; font-size: 13.5px; letter-spacing: 0.01em;
    transition: transform .18s ease;
  }
  .cart:hover { transform: translateY(-1px); }
  .cart .dot {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); color: var(--ink);
    display: grid; place-items: center; font-size: 11px; font-weight: 700;
  }

  /* ---- main grid: copy left, product center, buy right ---- */
  .hero {
    flex: 1;
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(0, 1.25fr) minmax(0, 1.05fr);
    align-items: center;
    gap: clamp(12px, 2vw, 36px);
    padding: 0 clamp(18px, 4vw, 54px) clamp(16px, 3vh, 40px);
  }

  /* left copy */
  .copy { max-width: 420px; }
  .eyebrow {
    display: inline-block;
    font-size: 12px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--accent);
    padding: 6px 12px; border-radius: 999px;
    margin-bottom: 18px;
  }
  .headline {
    font-weight: 800;
    font-size: clamp(38px, 5.4vw, 68px);
    line-height: 0.98;
    letter-spacing: -0.02em;
    color: var(--cream);
    margin-bottom: 18px;
  }
  .headline em { color: var(--accent); font-style: normal; }
  .sub {
    font-size: clamp(14.5px, 1.2vw, 16.5px);
    line-height: 1.55; color: var(--cream); opacity: 0.86;
    max-width: 380px; margin-bottom: 22px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 9px; }
  .chip {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(246,241,228,0.10);
    border: 1px solid rgba(246,241,228,0.22);
    color: var(--cream);
    padding: 8px 13px 8px 10px; border-radius: 999px;
    font-size: 13px; font-weight: 500; letter-spacing: 0.01em;
    backdrop-filter: blur(2px);
  }
  .chip svg { width: 15px; height: 15px; flex: none; }
  .chip svg [stroke] { stroke: var(--accent); }
  .chip svg [fill]:not([fill="none"]) { fill: var(--accent); }

  /* center product */
  .product {
    position: relative;
    display: grid; place-items: center;
    align-self: center;
  }
  .product .glow {
    position: absolute; width: 78%; aspect-ratio: 1; left: 50%; top: 54%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(244,200,74,0.30) 0%, rgba(244,200,74,0) 64%);
    filter: blur(8px); z-index: 0; pointer-events: none;
  }
  .product .floor {
    position: absolute; left: 50%; bottom: 4%;
    width: 56%; height: 26px;
    transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.34) 0%, rgba(0,0,0,0) 70%);
    z-index: 0; filter: blur(2px); pointer-events: none;
  }
  .product .art {
    position: relative; z-index: 1;
    width: min(420px, 78%);
    max-height: 62vh;
    object-fit: contain;
    display: block;
    will-change: transform;
    filter: drop-shadow(0 28px 40px rgba(0,0,0,0.34));
  }
  .product .badge {
    position: absolute; z-index: 2;
    top: 16%; right: 18%;
    transform: rotate(8deg);
    background: var(--accent); color: var(--ink);
    font-weight: 800; font-size: 11px; letter-spacing: 0.1em;
    width: 52px; height: 52px; border-radius: 50%;
    display: grid; place-items: center;
    box-shadow: 0 8px 22px rgba(0,0,0,0.28);
  }
  /* float animation, killed under reduced-motion + by JS rAF tilt */
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  .product .art { animation: bob 6s ease-in-out infinite; }

  /* right buy card */
  .buy {
    justify-self: end;
    width: min(300px, 100%);
    background: var(--cream); color: var(--ink);
    border-radius: var(--r);
    padding: 22px 22px 20px;
    box-shadow: 0 24px 60px rgba(0,0,0,0.26);
  }
  .buy .pname { font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.01em; }
  .buy .pflav { font-size: 13px; opacity: 0.66; margin-top: 2px; }
  .buy .stars {
    display: flex; align-items: center; gap: 7px;
    margin: 12px 0 16px; font-size: 12.5px; opacity: 0.78;
  }
  .buy .stars .s { color: #E6A700; letter-spacing: 1px; font-size: 13px; }
  .buy .priceRow { display: flex; align-items: baseline; gap: 6px; }
  .buy .price { font-family: "Bricolage Grotesque", sans-serif; font-weight: 800; font-size: 38px; line-height: 1; }
  .buy .cur { font-weight: 700; font-size: 15px; align-self: flex-start; margin-top: 4px; }
  .buy .unit { font-size: 13px; opacity: 0.6; }
  .buy .perserv { font-size: 12px; opacity: 0.6; margin: 4px 0 16px; }
  .buy .addBtn {
    width: 100%; border: none; cursor: pointer;
    background: var(--ink); color: var(--cream);
    font-weight: 700; font-size: 15px; letter-spacing: 0.01em;
    padding: 15px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: transform .16s ease, background .16s ease;
  }
  .buy .addBtn:hover { transform: translateY(-2px); background: #0a4634; }
  .buy .addBtn svg { width: 17px; height: 17px; }
  .buy .note { font-size: 11.5px; text-align: center; opacity: 0.6; margin-top: 12px; line-height: 1.4; }

  /* ---- marquee strip across the bottom of the stage ---- */
  .marquee {
    overflow: hidden; white-space: nowrap;
    border-top: 1px solid rgba(246,241,228,0.18);
    padding: 13px 0;
  }
  .marquee .track {
    display: inline-flex; gap: 0; align-items: center;
    animation: slide 22s linear infinite;
  }
  .marquee .item {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 700; letter-spacing: 0.06em;
    font-size: 14px; color: var(--cream); opacity: 0.9;
    padding: 0 26px;
    display: inline-flex; align-items: center; gap: 26px;
  }
  .marquee .item::after { content: "\25CF"; color: var(--accent); font-size: 9px; }
  @keyframes slide { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  /* ---- focus visibility ---- */
  a:focus-visible, button:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 3px;
    border-radius: 6px;
  }

  /* ---- responsive: tablet ---- */
  @media (max-width: 1080px) {
    .hero {
      grid-template-columns: 1fr 1fr;
      grid-template-areas: "copy product" "buy product";
      align-content: center;
      gap: 24px;
      padding-top: 8px;
    }
    .copy { grid-area: copy; }
    .product { grid-area: product; grid-row: 1 / 3; }
    .buy { grid-area: buy; justify-self: start; }
  }

  /* ---- responsive: phone (<=640px). Stack, product DOMINANT + contained ---- */
  @media (max-width: 640px) {
    .nav { display: none; }
    .bar { padding: 16px 18px; }
    .hero {
      grid-template-columns: 1fr;
      grid-template-areas: "copy" "product" "buy";
      gap: 18px;
      padding: 4px 18px 26px;
      text-align: center;
    }
    .copy { grid-area: copy; max-width: 100%; margin: 0 auto; }
    .sub { margin-left: auto; margin-right: auto; }
    .chips { justify-content: center; }
    .product { grid-area: product; grid-row: auto; min-height: 46svh; }
    .product .art { width: min(280px, 70%); max-height: 46svh; }
    .product .badge { width: 46px; height: 46px; right: 22%; top: 10%; }
    .buy { grid-area: buy; justify-self: stretch; width: 100%; text-align: left; }
    .headline { font-size: clamp(34px, 11vw, 46px); }
    .eyebrow { margin-bottom: 14px; }
  }
  @media (max-width: 360px) {
    .product .art { width: 64%; }
  }

  /* ---- reduced motion: freeze all motion, show final state ---- */
  @media (prefers-reduced-motion: reduce) {
    .product .art { animation: none !important; transform: none !important; }
    .marquee .track { animation: none !important; }
    .cart, .buy .addBtn { transition: none !important; }
  }
</style>
</head>
<body>
  <main class="stage" id="stage">
    <!-- top bar -->
    <header class="bar">
      <div class="logo" id="logo">MATCHA<span>.</span>DAILY</div>
      <nav class="nav" aria-label="Primary">
        <a href="#">Shop</a>
        <a href="#">Science</a>
        <a href="#">Reviews</a>
        <a href="#">Subscribe</a>
      </nav>
      <button class="cart" id="cartBtn" type="button" aria-label="Open cart, 1 item">
        Cart <span class="dot">1</span>
      </button>
    </header>

    <!-- hero grid -->
    <section class="hero">
      <!-- LEFT: copy -->
      <div class="copy">
        <span class="eyebrow" id="eyebrow">30 servings - ceremonial grade</span>
        <h1 class="headline display" id="headline"></h1>
        <p class="sub" id="sub"></p>
        <div class="chips" id="chips" aria-label="Benefits"></div>
      </div>

      <!-- CENTER: the product, dominant on the flat stage -->
      <div class="product" id="product">
        <div class="glow" aria-hidden="true"></div>
        <div class="floor" aria-hidden="true"></div>
        <div class="badge" id="badge" aria-hidden="true">NEW</div>
        <!-- art injected by JS: real <img> if product.image set, else inline SVG tub -->
      </div>

      <!-- RIGHT: buy card -->
      <aside class="buy" id="buy" aria-label="Buy box"></aside>
    </section>

    <!-- bottom marquee -->
    <div class="marquee" aria-hidden="true">
      <div class="track" id="track"></div>
    </div>
  </main>

<script>
(function () {
  const D = DATA;
  const $ = (s, r = document) => r.querySelector(s);

  /* ---- apply flat-color stage tokens ---- */
  const root = document.documentElement.style;
  root.setProperty("--bg", D.stage.bg);
  root.setProperty("--bgSoft", D.stage.bgSoft);
  root.setProperty("--cream", D.stage.cream);
  root.setProperty("--accent", D.stage.accent);
  root.setProperty("--ink", D.stage.ink);

  document.title = D.product.name + " - Supplement Product Stage";
  $("#logo").innerHTML = D.brand.replace(/\s+/g, "<span>.</span>");

  /* ---- copy ---- */
  $("#eyebrow").textContent = D.eyebrow;
  // headline: last word of last line accented for the More-Nutrition pop
  $("#headline").innerHTML = D.headline.map(function (line, i) {
    if (i === D.headline.length - 1) {
      const parts = line.split(" ");
      const last = parts.pop();
      return parts.join(" ") + " <em>" + last + "</em>";
    }
    return line;
  }).join("<br>");
  $("#sub").textContent = D.sub;

  /* ---- benefit chips with inline icons ---- */
  const ICON = {
    leaf:   '<path d="M11 13c-3.5 0-6-2-6-6 4 0 6 2 6 6z" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 13C11 7 7 4 2 4" fill="none" stroke-width="1.5" stroke-linecap="round"/>',
    bolt:   '<path d="M9 1 3 9h4l-1 6 6-8H8l1-6z" fill="currentColor" stroke="none"/>',
    heart:  '<path d="M8 14S2 10 2 5.5A3 3 0 0 1 8 4a3 3 0 0 1 6 1.5C14 10 8 14 8 14z" fill="currentColor" stroke="none"/>',
    drop:   '<path d="M8 1.5c2.5 3 4.5 5.2 4.5 7.5a4.5 4.5 0 1 1-9 0C3.5 6.7 5.5 4.5 8 1.5z" fill="currentColor" stroke="none"/>',
    shield: '<path d="M8 1 2.5 3v4.5C2.5 11 5 13.5 8 15c3-1.5 5.5-4 5.5-7.5V3L8 1z" fill="none" stroke-width="1.5" stroke-linejoin="round"/><path d="M5.6 8 7.3 9.7 10.6 6.2" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>'
  };
  $("#chips").innerHTML = D.chips.map(function (c) {
    return '<span class="chip"><svg viewBox="0 0 16 16">' + (ICON[c.icon] || ICON.leaf) +
           '</svg>' + c.label + "</span>";
  }).join("");

  /* ---- product art: real asset (contain) or gradient inline-SVG tub ---- */
  const prod = $("#product");
  $("#badge").textContent = D.product.badge || "";
  if (!D.product.badge) $("#badge").style.display = "none";

  if (D.product.image) {
    const img = document.createElement("img");
    img.className = "art";
    img.src = D.product.image;
    img.alt = D.product.name + " " + (D.product.flavor || "");
    img.loading = "eager";
    img.decoding = "async";
    prod.appendChild(img);
  } else {
    // gradient-shaded supplement tub, built with hex stops (never var())
    const g = D.stage; // local hex refs
    const svg =
      '<svg class="art" viewBox="0 0 320 380" role="img" aria-label="' +
      D.product.name + " " + (D.product.flavor || "") + ' tub">' +
        '<defs>' +
          '<linearGradient id="body" x1="0" y1="0" x2="1" y2="0">' +
            '<stop offset="0" stop-color="#063a2b"/>' +
            '<stop offset="0.18" stop-color="' + g.bg + '"/>' +
            '<stop offset="0.5" stop-color="' + g.bgSoft + '"/>' +
            '<stop offset="0.82" stop-color="' + g.bg + '"/>' +
            '<stop offset="1" stop-color="#05281e"/>' +
          '</linearGradient>' +
          '<linearGradient id="lid" x1="0" y1="0" x2="1" y2="0">' +
            '<stop offset="0" stop-color="#0a4a37"/>' +
            '<stop offset="0.5" stop-color="' + g.bgSoft + '"/>' +
            '<stop offset="1" stop-color="#073527"/>' +
          '</linearGradient>' +
          '<linearGradient id="label" x1="0" y1="0" x2="0" y2="1">' +
            '<stop offset="0" stop-color="' + g.cream + '"/>' +
            '<stop offset="1" stop-color="#ece3cd"/>' +
          '</linearGradient>' +
          '<radialGradient id="sheen" cx="0.3" cy="0.2" r="0.9">' +
            '<stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>' +
            '<stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>' +
          '</radialGradient>' +
        '</defs>' +
        // lid
        '<rect x="64" y="34" width="192" height="46" rx="16" fill="url(#lid)"/>' +
        '<rect x="64" y="34" width="192" height="14" rx="7" fill="#ffffff" opacity="0.10"/>' +
        // body
        '<rect x="52" y="74" width="216" height="276" rx="34" fill="url(#body)"/>' +
        // label panel
        '<rect x="70" y="120" width="180" height="196" rx="20" fill="url(#label)"/>' +
        // accent band
        '<rect x="70" y="120" width="180" height="40" rx="20" fill="' + g.accent + '"/>' +
        '<rect x="70" y="146" width="180" height="14" fill="' + g.accent + '"/>' +
        // label text
        '<text x="160" y="148" text-anchor="middle" font-family="Bricolage Grotesque, sans-serif" font-weight="800" font-size="20" fill="' + g.ink + '">' + (D.brand.split(" ")[0] || "MATCHA") + '</text>' +
        '<text x="160" y="206" text-anchor="middle" font-family="Bricolage Grotesque, sans-serif" font-weight="800" font-size="34" fill="' + g.ink + '">MATCHA</text>' +
        '<text x="160" y="236" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="13" letter-spacing="3" fill="#6f7d5e">DAILY RITUAL</text>' +
        // little leaf glyph
        '<path d="M160 256c-16 0-26-9-26-26 18 0 26 9 26 26z" fill="' + g.bg + '"/>' +
        '<path d="M160 256c0-26-12-37-30-37" fill="none" stroke="' + g.bgSoft + '" stroke-width="3" stroke-linecap="round"/>' +
        '<text x="160" y="300" text-anchor="middle" font-family="Inter, sans-serif" font-weight="600" font-size="11" letter-spacing="2" fill="#8a9676">30 SERVINGS - ZERO SUGAR</text>' +
        // glass sheen over the tub
        '<rect x="52" y="74" width="216" height="276" rx="34" fill="url(#sheen)"/>' +
      '</svg>';
    prod.insertAdjacentHTML("beforeend", svg);
  }

  /* ---- buy card ---- */
  const b = D.buy;
  $("#buy").innerHTML =
    '<div class="pname">' + D.product.name + '</div>' +
    '<div class="pflav">' + (D.product.flavor || "") + '</div>' +
    '<div class="stars"><span class="s">' + "★".repeat(5) + '</span>' +
      b.rating + ' (' + b.reviews + ' reviews)</div>' +
    '<div class="priceRow"><span class="cur">' + b.currency + '</span>' +
      '<span class="price">' + b.price + '</span>' +
      '<span class="unit">' + b.unit + '</span></div>' +
    '<div class="perserv">' + b.sub + '</div>' +
    '<button class="addBtn" type="button" id="addBtn">' +
      '<svg viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M2 3h2l1.5 8.5h7L15 5H4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6.5" cy="14" r="1" fill="currentColor"/><circle cx="12" cy="14" r="1" fill="currentColor"/></svg>' +
      b.cta + '</button>' +
    '<div class="note">' + D.footnote + '</div>';

  /* ---- marquee (duplicate the items so the -50% loop is seamless) ---- */
  const one = D.marquee.map(function (m) { return '<span class="item">' + m + '</span>'; }).join("");
  $("#track").innerHTML = one + one;

  /* ---- gentle pointer-parallax tilt on the product (desktop, motion-OK) ---- */
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const fine = window.matchMedia("(pointer: fine)").matches;
  const art = $("#product .art");
  if (!reduce && fine && art) {
    let tx = 0, ty = 0, cx = 0, cy = 0, raf = null;
    function loop() {
      cx += (tx - cx) * 0.08;
      cy += (ty - cy) * 0.08;
      // compose with the CSS bob by keeping translate small + rotate only
      art.style.transform =
        "rotateX(" + (-cy) + "deg) rotateY(" + cx + "deg) translateY(" + (cy * -0.4) + "px)";
      raf = Math.abs(tx - cx) > 0.01 || Math.abs(ty - cy) > 0.01 ? requestAnimationFrame(loop) : null;
    }
    $("#stage").addEventListener("pointermove", function (e) {
      const r = art.getBoundingClientRect();
      const px = (e.clientX - (r.left + r.width / 2)) / r.width;
      const py = (e.clientY - (r.top + r.height / 2)) / r.height;
      tx = Math.max(-1, Math.min(1, px)) * 7;
      ty = Math.max(-1, Math.min(1, py)) * 7;
      if (art) art.style.animation = "none"; // hand control to rAF once interacting
      if (!raf) raf = requestAnimationFrame(loop);
    }, { passive: true });
    $("#stage").addEventListener("pointerleave", function () {
      tx = 0; ty = 0; if (!raf) raf = requestAnimationFrame(loop);
    });
  }

  /* ---- tiny cart feedback, no real backend ---- */
  function bump(btn, txt) {
    const old = btn.dataset.busy; if (old) return;
    btn.dataset.busy = "1";
    const prev = btn.innerHTML;
    btn.innerHTML = txt;
    setTimeout(function () { btn.innerHTML = prev; delete btn.dataset.busy; }, 1400);
  }
  document.addEventListener("click", function (e) {
    const add = e.target.closest("#addBtn");
    if (add) bump(add, "Added ✓");
  });
})();
</script>
</body>
