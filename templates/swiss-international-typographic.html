<!-- TEMPLATE: Grid Manifest | ARCHETYPE: Swiss International Typographic Style editorial | REF: Muller-Brockmann grid systems, Helvetica Now, Swiss poster tradition, Awwwards minimal-editorial 2026 | WHEN TO USE: editorial / portfolio / agency front pages that must read as rigorous, premium, type-led precision rather than decorated minimal | SWAP: edit the DATA object in the <script> at the bottom of <body> -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grid Manifest - Swiss International Typographic</title>
<style>
/* ===================================================================
   SWAP CONTENT IN THE <script> DATA OBJECT AT THE BOTTOM OF <body>.
   Palette is locked Swiss: paper / ink / one red.
   =================================================================== */
:root{
  --paper:#f4f1ea;
  --ink:#111111;
  --red:#e2231a;
  --hair:rgba(17,17,17,.16);   /* hairline ink */
  --hair-strong:rgba(17,17,17,.32);
  --col:12;
  --gutter:clamp(12px,1.6vw,24px);
  --margin:clamp(20px,4.2vw,72px);
  --baseline:28px;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:"Helvetica Neue",Helvetica,"Neue Haas Grotesk",Arial,sans-serif;
  font-weight:400;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-feature-settings:"kern" 1,"liga" 1;
  line-height:1.32;
  letter-spacing:.005em;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}

/* ---- the visible 12 column grid, drawn as a fixed underlay ---- */
.gridlines{
  position:fixed;
  inset:0;
  padding:0 var(--margin);
  pointer-events:none;
  z-index:0;
  display:grid;
  grid-template-columns:repeat(var(--col),1fr);
  column-gap:var(--gutter);
}
.gridlines span{
  border-left:1px solid var(--hair);
  border-right:1px solid var(--hair);
  /* only the column field edges read; interior hairlines stay quiet */
  border-left-color:transparent;
  border-right-color:transparent;
}
.gridlines span:nth-child(odd){border-left-color:var(--hair)}
.gridlines span:first-child{border-left-color:var(--hair-strong)}
.gridlines span:last-child{border-right-color:var(--hair-strong)}

/* layout shell aligned to the same grid */
.shell{
  position:relative;
  z-index:1;
  max-width:1680px;
  margin:0 auto;
  padding:0 var(--margin);
}
.grid{
  display:grid;
  grid-template-columns:repeat(var(--col),1fr);
  column-gap:var(--gutter);
}

/* ---------- top meta band ---------- */
.topbar{
  display:grid;
  grid-template-columns:repeat(var(--col),1fr);
  column-gap:var(--gutter);
  align-items:baseline;
  padding-top:clamp(18px,3vw,30px);
  padding-bottom:14px;
}
.topbar .mark{
  grid-column:1 / span 4;
  font-size:13px;
  font-weight:700;
  letter-spacing:.02em;
  text-transform:uppercase;
}
.topbar .mark b{color:var(--red)}
.topbar .nav{
  grid-column:7 / span 6;
  display:flex;
  gap:clamp(14px,2vw,34px);
  justify-content:flex-end;
  font-size:12px;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--ink);
}
.topbar .nav a{position:relative;padding-bottom:2px}
.topbar .nav a:hover,.topbar .nav a:focus-visible{color:var(--red)}
.topbar .nav a:focus-visible{outline:2px solid var(--red);outline-offset:3px}

/* primary hairline rule under the meta band */
.rule{
  border:0;
  border-top:1px solid var(--ink);
  margin:0;
}
.rule.thin{border-top:1px solid var(--hair-strong)}

/* ---------- masthead: oversized flush-left headline ---------- */
.masthead{padding-top:clamp(16px,3vw,30px);padding-bottom:clamp(14px,2.4vw,24px)}
.kicker{
  display:grid;
  grid-template-columns:repeat(var(--col),1fr);
  column-gap:var(--gutter);
  margin-bottom:clamp(10px,1.4vw,16px);
}
.kicker .idx{
  grid-column:1 / span 2;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--red);
  font-weight:700;
}
.kicker .label{
  grid-column:3 / span 5;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink);
  opacity:.7;
}
.kicker .ed{
  grid-column:11 / span 2;
  text-align:right;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.7;
}
h1.display{
  margin:0;
  grid-column:1 / span 10;
  font-weight:700;
  font-size:clamp(44px,9.2vw,158px);
  line-height:.9;
  letter-spacing:-.025em;
  text-transform:uppercase;
  /* flush left, ragged right - the Swiss tell */
  text-align:left;
  max-width:14ch;
}
h1.display .red{color:var(--red)}
.display-wrap{
  display:grid;
  grid-template-columns:repeat(var(--col),1fr);
  column-gap:var(--gutter);
}
.lede{
  grid-column:11 / span 2;
  align-self:end;
  font-size:clamp(13px,1.05vw,15px);
  line-height:1.5;
  letter-spacing:0;
  /* ragged right body */
  text-align:left;
  hyphens:none;
}
.lede strong{color:var(--red);font-weight:700}

/* ---------- hero: grid-aligned cropped image, populated at scroll 0 ---------- */
.hero{padding-top:clamp(14px,2.2vw,22px);padding-bottom:clamp(20px,3vw,34px)}
.hero-grid{
  display:grid;
  grid-template-columns:repeat(var(--col),1fr);
  column-gap:var(--gutter);
  align-items:stretch;
}
.figure{
  grid-column:1 / span 8;
  position:relative;
  overflow:hidden;
  background:#1a1a1a;
  /* image obeys the grid: cropped to a strict ratio */
  aspect-ratio:8 / 3.4;
}
.figure img,.figure video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.figure .fignum{
  position:absolute;
  left:12px;top:10px;
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  color:var(--paper);
  background:var(--red);
  padding:3px 7px;
  font-weight:700;
  z-index:2;
}
.figure .caption{
  position:absolute;
  left:0;right:0;bottom:0;
  padding:10px 12px;
  font-size:11px;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:var(--paper);
  background:linear-gradient(to top,rgba(0,0,0,.74),rgba(0,0,0,0));
  z-index:2;
}
/* right side index column - asymmetric but aligned */
.sidecol{
  grid-column:9 / span 4;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  gap:14px;
}
.sidecol .quote{
  font-size:clamp(15px,1.35vw,20px);
  line-height:1.25;
  letter-spacing:-.01em;
  font-weight:400;
}
.sidecol .quote b{color:var(--red);font-weight:700}
.sidecol .stat{
  border-top:1px solid var(--ink);
  padding-top:8px;
}
.sidecol .stat .n{
  font-size:clamp(30px,3.6vw,52px);
  font-weight:700;
  line-height:.92;
  letter-spacing:-.02em;
}
.sidecol .stat .n em{font-style:normal;color:var(--red)}
.sidecol .stat .k{
  font-size:11px;
  letter-spacing:.08em;
  text-transform:uppercase;
  opacity:.7;
  margin-top:4px;
}

/* ---------- index / contents section ---------- */
section.contents{padding:clamp(26px,4vw,52px) 0 clamp(20px,3vw,30px)}
.sec-head{
  display:grid;
  grid-template-columns:repeat(var(--col),1fr);
  column-gap:var(--gutter);
  align-items:baseline;
  margin-bottom:18px;
}
.sec-head .n{
  grid-column:1 / span 2;
  font-size:12px;font-weight:700;color:var(--red);
  letter-spacing:.06em;text-transform:uppercase;
}
.sec-head .t{
  grid-column:3 / span 7;
  font-size:clamp(18px,2vw,30px);
  font-weight:700;letter-spacing:-.015em;text-transform:uppercase;
}
.sec-head .meta{
  grid-column:11 / span 2;text-align:right;
  font-size:11px;letter-spacing:.06em;text-transform:uppercase;opacity:.7;
}
.index-list{margin-top:6px}
.row{
  display:grid;
  grid-template-columns:repeat(var(--col),1fr);
  column-gap:var(--gutter);
  align-items:baseline;
  padding:clamp(12px,1.5vw,18px) 0;
  border-top:1px solid var(--hair-strong);
  position:relative;
}
.row:last-child{border-bottom:1px solid var(--hair-strong)}
.row .num{
  grid-column:1 / span 1;
  font-size:13px;font-weight:700;
  font-variant-numeric:tabular-nums;
}
.row .title{
  grid-column:2 / span 6;
  font-size:clamp(17px,1.9vw,26px);
  font-weight:700;letter-spacing:-.012em;
  transition:color .18s ease,transform .22s cubic-bezier(.2,.7,.2,1);
}
.row .desc{
  grid-column:8 / span 3;
  font-size:13px;line-height:1.45;opacity:.78;
  letter-spacing:0;
}
.row .tag{
  grid-column:11 / span 2;
  text-align:right;
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink);opacity:.7;
}
.row .marker{
  position:absolute;
  left:calc(-1 * var(--margin) + 0px);
  top:50%;
  width:0;height:1px;background:var(--red);
  transition:width .26s cubic-bezier(.2,.7,.2,1);
}
.row:hover .title,.row:focus-within .title{color:var(--red);transform:translateX(10px)}
.row:hover .marker{width:var(--margin)}
.row a.hit{position:absolute;inset:0;z-index:3}
.row a.hit:focus-visible{outline:2px solid var(--red);outline-offset:-3px}

/* ---------- media plate strip: real assets, one plays at a time ---------- */
section.plates{padding:clamp(20px,3vw,40px) 0}
.plate-grid{
  display:grid;
  grid-template-columns:repeat(var(--col),1fr);
  column-gap:var(--gutter);
  row-gap:clamp(14px,2vw,26px);
}
.plate{
  position:relative;
  overflow:hidden;
  background:#161616;
  cursor:pointer;
}
.plate.p4{grid-column:span 4;aspect-ratio:4 / 5}
.plate.p6{grid-column:span 6;aspect-ratio:6 / 4}
.plate.p8{grid-column:span 8;aspect-ratio:8 / 3.6}
.plate img,.plate video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
.plate video{opacity:0;transition:opacity .35s ease}
.plate.playing video{opacity:1}
.plate .pcap{
  position:absolute;left:0;right:0;bottom:0;z-index:2;
  padding:12px 13px;
  display:flex;justify-content:space-between;align-items:flex-end;gap:10px;
  background:linear-gradient(to top,rgba(0,0,0,.72),rgba(0,0,0,0));
  color:var(--paper);
}
.plate .pcap .pt{
  font-size:13px;font-weight:700;letter-spacing:.01em;text-transform:uppercase;
}
.plate .pcap .ps{
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;opacity:.85;
}
.plate .pidx{
  position:absolute;left:11px;top:10px;z-index:2;
  font-size:11px;font-weight:700;letter-spacing:.08em;
  color:var(--paper);background:var(--red);padding:3px 6px;
}
.plate .ptype{
  position:absolute;right:11px;top:10px;z-index:2;
  font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink);background:var(--paper);padding:3px 6px;
}

/* ---------- colophon / footer ---------- */
footer.colophon{padding:clamp(28px,4vw,56px) 0 clamp(40px,6vw,80px)}
.colophon .big{
  display:grid;grid-template-columns:repeat(var(--col),1fr);column-gap:var(--gutter);
  align-items:end;margin-top:18px;
}
.colophon .word{
  grid-column:1 / span 8;
  font-size:clamp(30px,6.6vw,108px);
  font-weight:700;line-height:.86;letter-spacing:-.025em;text-transform:uppercase;
}
.colophon .word .red{color:var(--red)}
.colophon .info{
  grid-column:10 / span 3;
  font-size:12px;line-height:1.5;letter-spacing:.02em;
}
.colophon .info b{display:block;text-transform:uppercase;letter-spacing:.06em;font-size:11px;margin-bottom:3px}
.colophon .info .red{color:var(--red)}
.colophon .info div + b{margin-top:14px}

/* ---------- grid toggle control ---------- */
.gridtoggle{
  position:fixed;right:14px;bottom:14px;z-index:6;
  font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  background:var(--ink);color:var(--paper);
  border:0;padding:8px 11px;cursor:pointer;font-weight:700;
  font-family:inherit;
}
.gridtoggle:focus-visible{outline:2px solid var(--red);outline-offset:2px}
.gridtoggle b{color:var(--red)}
body.grid-off .gridlines{opacity:0}

/* fade-in on scroll, but only as a refinement */
.reveal{opacity:0;transform:translateY(14px)}
.reveal.in{opacity:1;transform:none;transition:opacity .6s ease,transform .6s cubic-bezier(.2,.7,.2,1)}

/* =========================================================
   MOBILE: collapse columns, KEEP alignment + the red.
   Landscape assets letterboxed/contained, never cover-cropped.
   ========================================================= */
@media (max-width:880px){
  :root{--col:6}
  .gridlines{padding:0 var(--margin)}
  .gridlines span:nth-child(n){border-left-color:transparent}
  .gridlines span:nth-child(odd){border-left-color:var(--hair)}
  .topbar .mark{grid-column:1 / span 3}
  .topbar .nav{grid-column:4 / span 3}
  h1.display{grid-column:1 / span 6;font-size:clamp(40px,13vw,86px);max-width:none}
  .lede{grid-column:1 / span 6;margin-top:14px}
  .kicker .idx{grid-column:1 / span 2}
  .kicker .label{grid-column:3 / span 4}
  .kicker .ed{grid-column:1 / span 6;text-align:left;margin-top:2px}
  .figure{grid-column:1 / span 6;aspect-ratio:16 / 9}
  .sidecol{grid-column:1 / span 6;margin-top:16px;gap:18px}
  .sec-head .n{grid-column:1 / span 1}
  .sec-head .t{grid-column:2 / span 5}
  .sec-head .meta{grid-column:1 / span 6;text-align:left;margin-top:4px}
  .row .num{grid-column:1 / span 1}
  .row .title{grid-column:2 / span 5}
  .row .desc{grid-column:2 / span 5;margin-top:6px}
  .row .tag{grid-column:1 / span 6;text-align:left;margin-top:6px;grid-row:auto}
  .row:hover .title,.row:focus-within .title{transform:translateX(6px)}
  .plate.p4{grid-column:span 3;aspect-ratio:3 / 4}
  .plate.p6{grid-column:span 6;aspect-ratio:16 / 9}
  .plate.p8{grid-column:span 6;aspect-ratio:16 / 9}
  .colophon .word{grid-column:1 / span 6}
  .colophon .info{grid-column:1 / span 6;margin-top:18px}
}
@media (max-width:560px){
  :root{--col:4}
  .topbar .mark{grid-column:1 / span 2}
  .topbar .nav{grid-column:3 / span 2;font-size:10px;gap:10px;flex-wrap:wrap}
  h1.display{grid-column:1 / span 4;font-size:clamp(38px,14.5vw,72px)}
  .lede{grid-column:1 / span 4}
  .kicker .idx{grid-column:1 / span 2}
  .kicker .label{grid-column:3 / span 2}
  .kicker .ed{grid-column:1 / span 4}
  .figure{grid-column:1 / span 4}
  /* contain the landscape hero so it is never cropped to a tall box */
  .figure.contain{background:#101010;aspect-ratio:16 / 10}
  .figure.contain img,.figure.contain video{object-fit:contain}
  .sidecol{grid-column:1 / span 4}
  .sec-head .n{grid-column:1 / span 1}
  .sec-head .t{grid-column:2 / span 3}
  .sec-head .meta{grid-column:1 / span 4}
  .row .num{grid-column:1 / span 1}
  .row .title{grid-column:2 / span 3}
  .row .desc{grid-column:1 / span 4;margin-top:6px}
  .plate.p4,.plate.p6,.plate.p8{grid-column:span 4}
  .plate.p4{aspect-ratio:4 / 5}
  .plate.p6,.plate.p8{aspect-ratio:16 / 10}
  .plate.contain{background:#101010}
  .plate.contain video,.plate.contain img{object-fit:contain}
  .colophon .word{grid-column:1 / span 4}
  .colophon .info{grid-column:1 / span 4}
}

/* accessibility: kill heavy motion, show final state */
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;scroll-behavior:auto !important}
  .reveal{opacity:1 !important;transform:none !important;transition:none !important}
  .row .title,.row .marker,.plate video{transition:none !important}
}
</style>
</head>
<body>

<!-- the VISIBLE Swiss grid, drawn as a fixed underlay (signature, present at scroll 0) -->
<div class="gridlines" id="gridlines" aria-hidden="true"></div>

<div class="shell">

  <!-- top meta band -->
  <header class="topbar">
    <div class="mark" id="mark">GRID<b>/</b>MANIFEST</div>
    <nav class="nav" id="nav" aria-label="Sections"></nav>
  </header>
  <hr class="rule">

  <!-- masthead: oversized flush-left headline (overlays compact band, not full-viewport) -->
  <section class="masthead" aria-label="Masthead">
    <div class="kicker">
      <span class="idx" id="k-idx">01</span>
      <span class="label" id="k-label"></span>
      <span class="ed" id="k-ed"></span>
    </div>
    <div class="display-wrap">
      <h1 class="display" id="headline"></h1>
      <p class="lede" id="lede"></p>
    </div>
  </section>

  <!-- hero: grid-aligned cropped image + asymmetric aligned side column (populated at scroll 0) -->
  <section class="hero" aria-label="Lead figure">
    <div class="hero-grid">
      <figure class="figure contain" id="figure">
        <span class="fignum" id="fig-num">FIG. 01</span>
        <img id="fig-img" alt="" decoding="async">
        <figcaption class="caption" id="fig-cap"></figcaption>
      </figure>
      <div class="sidecol" id="sidecol"></div>
    </div>
  </section>
  <hr class="rule thin">

  <!-- index / contents -->
  <section class="contents reveal" id="contents-sec" aria-label="Index">
    <div class="sec-head">
      <span class="n">02</span>
      <span class="t" id="contents-title"></span>
      <span class="meta" id="contents-meta"></span>
    </div>
    <div class="index-list" id="index-list"></div>
  </section>

  <!-- media plate strip -->
  <section class="plates reveal" id="plates-sec" aria-label="Plates">
    <div class="sec-head">
      <span class="n">03</span>
      <span class="t" id="plates-title"></span>
      <span class="meta" id="plates-meta"></span>
    </div>
    <div class="plate-grid" id="plate-grid"></div>
  </section>
  <hr class="rule thin">

  <!-- colophon -->
  <footer class="colophon reveal" aria-label="Colophon">
    <div class="sec-head">
      <span class="n">04</span>
      <span class="t" id="colophon-title"></span>
      <span class="meta" id="colophon-meta"></span>
    </div>
    <div class="big">
      <div class="word" id="colophon-word"></div>
      <div class="info" id="colophon-info"></div>
    </div>
  </footer>

</div>

<button class="gridtoggle" id="gridtoggle" aria-pressed="true">GRID<b> ON</b></button>

<script>
/* ===================================================================
   DATA - swap everything here. Paths are relative to ../assets/.
   =================================================================== */
const DATA = {
  brand: "GRID/MANIFEST",
  nav: ["Index","Plates","Colophon","Contact"],
  masthead: {
    index: "01",
    label: "International Typographic Style / Vol. 12",
    edition: "Edition 2026",
    // use <span class="red"> to set the single red word
    headline: 'Order is the <span class="red">Method,</span> not the decoration',
    lede: 'A 12 column field, one hairline, one red. Hierarchy comes from scale and position, <strong>nothing else.</strong> Set flush left, ragged right.'
  },
  hero: {
    figNum: "FIG. 01",
    img: "../assets/flux-car-4k.png",   // landscape 16:9 - contained on phone
    alt: "Matte black coupe on a wet neon street",
    caption: "Plate A / Composition on the grid / Cropped to field 1-8",
    side: {
      quote: 'Whitespace is not empty. It is <b>measured.</b>',
      stats: [
        { n: '<em>12</em>', k: "Column field" },
        { n: '1<em>.0</em>', k: "Hairline rule, px" }
      ]
    }
  },
  contents: {
    title: "Index of Principles",
    meta: "Four rooms",
    rows: [
      { num:"01", title:"Flush Left, Ragged Right", desc:"Text aligns to one edge. The right stays unjustified so word spacing never breaks the rhythm.", tag:"Setting" },
      { num:"02", title:"The Visible Grid", desc:"Twelve columns govern every block. The field is drawn, not hidden, so alignment is provable.", tag:"Structure" },
      { num:"03", title:"Scale and Position", desc:"Importance reads from size and placement. No rules, boxes, or shadows do that work.", tag:"Hierarchy" },
      { num:"04", title:"One Accent Only", desc:"A single red marks the one thing that matters per view. Restraint is the signal.", tag:"Colour" }
    ]
  },
  plates: {
    title: "Plates",
    meta: "Hover or tap to play",
    // one plays at a time; others stay on poster. span: 4 / 6 / 8. contain=true for non-portrait assets on phone
    items: [
      { span:8, idx:"P1", type:"Video", title:"Drive Loop", sub:"flux-car-i2v / silent", poster:"../assets/gen/poster-flux-car-i2v.png", video:"../assets/flux-car-i2v.mp4", contain:true },
      { span:4, idx:"P2", type:"Still", title:"Clinic", sub:"flux-clinic / 4k still", poster:"../assets/flux-clinic-4k.png", video:null, contain:false },
      { span:4, idx:"P3", type:"Still", title:"Fox", sub:"sdxl / painterly", poster:"../assets/sdxl.png", video:null, contain:false },
      { span:8, idx:"P4", type:"Video", title:"Motion Study", sub:"kling / silent loop", poster:"../assets/gen/poster-kling-video.png", video:"../assets/kling-video.mp4", contain:true }
    ]
  },
  colophon: {
    title: "Colophon",
    meta: "Set in Helvetica Neue",
    word: 'PRECISION <span class="red">.</span>',
    info: [
      { label:"Typeface", body:'Helvetica Neue / Neue Haas Grotesk. Weights 400 and 700 only.' },
      { label:"Grid", body:'12 columns, fluid gutter, fixed margins. Baseline locked.' },
      { label:"Accent", body:'<span class="red">Pantone-adjacent red #e2231a, used once per view.</span>' }
    ]
  }
};

/* ===================================================================
   RENDER
   =================================================================== */
const $ = (id)=>document.getElementById(id);

// draw 12 (or responsive) column spans into the gridline underlay
function buildGridlines(){
  const host = $('gridlines');
  const cols = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--col')) || 12;
  host.style.gridTemplateColumns = `repeat(${cols},1fr)`;
  host.innerHTML = '';
  for(let i=0;i<cols;i++){ host.appendChild(document.createElement('span')); }
}

function render(){
  $('mark').innerHTML = DATA.brand.replace('/','<b>/</b>');

  // nav
  $('nav').innerHTML = DATA.nav.map(n=>`<a href="#${n.toLowerCase()}">${n}</a>`).join('');

  // masthead
  $('k-idx').textContent = DATA.masthead.index;
  $('k-label').textContent = DATA.masthead.label;
  $('k-ed').textContent = DATA.masthead.edition;
  $('headline').innerHTML = DATA.masthead.headline;
  $('lede').innerHTML = DATA.masthead.lede;

  // hero figure
  $('fig-num').textContent = DATA.hero.figNum;
  const fimg = $('fig-img');
  fimg.src = DATA.hero.img;
  fimg.alt = DATA.hero.alt;
  $('fig-cap').textContent = DATA.hero.caption;

  // side column
  const stats = DATA.hero.side.stats.map(s=>
    `<div class="stat"><div class="n">${s.n}</div><div class="k">${s.k}</div></div>`).join('');
  $('sidecol').innerHTML =
    `<p class="quote">${DATA.hero.side.quote}</p>${stats}`;

  // contents
  $('contents-title').textContent = DATA.contents.title;
  $('contents-meta').textContent = DATA.contents.meta;
  $('index-list').innerHTML = DATA.contents.rows.map(r=>`
    <div class="row">
      <span class="marker"></span>
      <span class="num">${r.num}</span>
      <span class="title">${r.title}</span>
      <span class="desc">${r.desc}</span>
      <span class="tag">${r.tag}</span>
      <a class="hit" href="#index" aria-label="${r.title}"></a>
    </div>`).join('');

  // plates
  $('plates-title').textContent = DATA.plates.title;
  $('plates-meta').textContent = DATA.plates.meta;
  $('plate-grid').innerHTML = DATA.plates.items.map((p,i)=>{
    const spanCls = p.span===8?'p8':(p.span===6?'p6':'p4');
    const containCls = p.contain?' contain':'';
    const media = p.video
      ? `<img class="poster" src="${p.poster}" alt="${p.title} poster" decoding="async" loading="lazy">
         <video data-i="${i}" muted loop playsinline preload="none" poster="${p.poster}"
                aria-label="${p.title} video"><source data-src="${p.video}" type="video/mp4"></video>`
      : `<img src="${p.poster}" alt="${p.title}" decoding="async" loading="lazy">`;
    return `<figure class="plate ${spanCls}${containCls}" data-has-video="${!!p.video}" tabindex="0" aria-label="${p.title}">
      <span class="pidx">${p.idx}</span>
      <span class="ptype">${p.type}</span>
      ${media}
      <figcaption class="pcap"><span class="pt">${p.title}</span><span class="ps">${p.sub}</span></figcaption>
    </figure>`;
  }).join('');

  // colophon
  $('colophon-title').textContent = DATA.colophon.title;
  $('colophon-meta').textContent = DATA.colophon.meta;
  $('colophon-word').innerHTML = DATA.colophon.word;
  $('colophon-info').innerHTML = DATA.colophon.info.map(c=>
    `<b>${c.label}</b><div>${c.body}</div>`).join('');
}

/* ---------- single-active video playback (no simultaneous decode) ---------- */
const prefersReduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
let activePlate = null;

function ensureLoaded(video){
  const src = video.querySelector('source[data-src]');
  if(src && !src.src){ src.src = src.dataset.src; video.load(); }
}
function playPlate(plate){
  if(prefersReduced) return;            // honor reduced motion: posters only
  if(plate.dataset.hasVideo!=="true") return;
  if(activePlate===plate) return;
  stopActive();
  const v = plate.querySelector('video');
  if(!v) return;
  ensureLoaded(v);
  plate.classList.add('playing');
  const pr = v.play();
  if(pr && pr.catch) pr.catch(()=>{});
  activePlate = plate;
}
function stopActive(){
  if(!activePlate) return;
  const v = activePlate.querySelector('video');
  if(v){ try{ v.pause(); }catch(e){} }
  activePlate.classList.remove('playing');
  activePlate = null;
}

function wirePlates(){
  document.querySelectorAll('.plate[data-has-video="true"]').forEach(plate=>{
    plate.addEventListener('mouseenter', ()=>playPlate(plate));
    plate.addEventListener('mouseleave', ()=>{ if(activePlate===plate) stopActive(); });
    plate.addEventListener('focusin', ()=>playPlate(plate));
    plate.addEventListener('focusout', ()=>{ if(activePlate===plate) stopActive(); });
    // touch: tap toggles
    plate.addEventListener('click', ()=>{
      if(activePlate===plate) stopActive(); else playPlate(plate);
    });
  });
  // pause whatever is playing if it scrolls out of view
  if('IntersectionObserver' in window){
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(!e.isIntersecting && activePlate===e.target) stopActive();
      });
    },{threshold:0.25});
    document.querySelectorAll('.plate[data-has-video="true"]').forEach(p=>io.observe(p));
  }
}

/* ---------- scroll reveal (refinement only) ---------- */
function wireReveal(){
  const els = document.querySelectorAll('.reveal');
  if(prefersReduced || !('IntersectionObserver' in window)){
    els.forEach(el=>el.classList.add('in')); return;
  }
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
  },{threshold:0.12});
  els.forEach(el=>io.observe(el));
}

/* ---------- grid toggle ---------- */
function wireToggle(){
  const btn = $('gridtoggle');
  btn.addEventListener('click', ()=>{
    const off = document.body.classList.toggle('grid-off');
    btn.setAttribute('aria-pressed', String(!off));
    btn.innerHTML = off ? 'GRID<b> OFF</b>' : 'GRID<b> ON</b>';
  });
}

/* ---------- responsive: rebuild gridlines on column-count change ---------- */
function wireResize(){
  let last = 0;
  const update = ()=>{
    const cols = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--col')) || 12;
    if(cols!==last){ last = cols; buildGridlines(); }
  };
  update();
  let t;
  window.addEventListener('resize', ()=>{ clearTimeout(t); t=setTimeout(update,150); }, {passive:true});
}

render();
buildGridlines();
wireResize();
wirePlates();
wireReveal();
wireToggle();
</script>
</body>
