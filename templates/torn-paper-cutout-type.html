<!-- TEMPLATE: Torn Paper Type | ARCHETYPE: TORN PAPER - cut-paper layered type hero | REF: torn/cut-paper collage typography, layered paper-edge lettering, paper-craft poster art | WHEN TO USE: a tactile hand-torn paper-collage hero where a big headline word looks ripped from layered paper with a bright underlayer bleeding through jagged tears, for craft/editorial/studio/brand landings | SWAP: edit the DATA object at top of <script> -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torn Paper - Cut-Paper Layered Type</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* warm paper-craft layers */
    --cream:#f3ead4;     /* top paper / page */
    --cream-2:#ece0c2;   /* secondary paper */
    --kraft:#c69a63;     /* kraft layer */
    --ink:#23211c;       /* ink letter face */
    --ink-soft:#3a362d;
    --bright:#e8503a;    /* bright underlayer (tomato) */
    --bright-2:#f0a92e;  /* second underlayer (amber) */
    --teal:#2f6f6a;      /* accent underlayer (deep teal) */
    --line:rgba(35,33,28,0.16);
    --paper-shadow:rgba(60,45,25,0.30);
  }

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  html,body{min-height:100%;}

  body{
    background:
      radial-gradient(120% 90% at 12% 0%, #f7efda 0%, var(--cream) 42%, var(--cream-2) 100%);
    color:var(--ink);
    font-family:"Space Grotesk", system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    position:relative;
  }

  /* paper-fiber grain overlay (cheap, GPU-friendly) */
  body::before{
    content:"";
    position:fixed; inset:0; z-index:0; pointer-events:none;
    opacity:0.5;
    background-image:
      repeating-linear-gradient(94deg, rgba(120,95,55,0.045) 0 2px, transparent 2px 5px),
      repeating-linear-gradient(2deg, rgba(120,95,55,0.04) 0 2px, transparent 2px 6px);
    mix-blend-mode:multiply;
  }

  a{color:inherit; text-decoration:none;}

  .wrap{position:relative; z-index:1; max-width:1320px; margin:0 auto; padding:0 clamp(18px,4vw,52px);}

  /* ---------- top band ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    gap:18px; padding:22px 0 8px;
  }
  .brand{
    display:flex; align-items:center; gap:12px;
    font-family:"Fraunces", serif; font-weight:600; font-size:1.05rem; letter-spacing:0.01em;
  }
  .brand .chip{
    width:30px; height:30px; border-radius:6px;
    background:var(--ink);
    display:grid; place-items:center;
    color:var(--cream); font-family:"Archivo Black"; font-size:0.8rem;
    transform:rotate(-4deg);
    box-shadow:3px 4px 0 rgba(35,33,28,0.18);
    /* a small torn corner */
    clip-path:polygon(0 0, 100% 0, 100% 72%, 86% 84%, 100% 100%, 0 100%);
  }
  .nav{display:flex; gap:6px; align-items:center; flex-wrap:wrap;}
  .nav a{
    font-size:0.82rem; font-weight:500; letter-spacing:0.04em; text-transform:uppercase;
    padding:8px 13px; border-radius:999px;
    border:1px solid var(--line);
    background:rgba(255,255,255,0.34);
    transition:transform .18s ease, background .18s ease;
  }
  .nav a:hover, .nav a:focus-visible{transform:translateY(-2px); background:var(--cream);}
  .nav a.cta{background:var(--ink); color:var(--cream); border-color:var(--ink);}
  .nav a.cta:hover, .nav a.cta:focus-visible{background:var(--bright); border-color:var(--bright);}

  /* ---------- hero (signature, visible at scroll=0) ---------- */
  .hero{padding:14px 0 34px;}
  .kicker{
    display:inline-flex; align-items:center; gap:10px;
    font-size:0.74rem; font-weight:600; letter-spacing:0.22em; text-transform:uppercase;
    color:var(--ink-soft);
    padding:7px 14px;
    background:var(--cream);
    border:1px dashed rgba(35,33,28,0.32);
    transform:rotate(-1.2deg);
    box-shadow:2px 3px 0 rgba(60,45,25,0.14);
  }
  .kicker b{color:var(--bright); font-weight:700;}

  .headline{
    margin:18px 0 4px;
    font-family:"Archivo Black", system-ui, sans-serif;
    line-height:0.82;
    letter-spacing:-0.01em;
    text-transform:uppercase;
    display:flex; flex-wrap:wrap; gap:0.10em 0.04em;
    align-items:flex-end;
  }
  .word{display:inline-flex; flex-wrap:nowrap;}
  .word.gap{margin-right:0.18em;}

  /* each torn letter = stacked layers */
  .ltr{
    position:relative;
    display:inline-block;
    font-size:clamp(4.4rem, 16.5vw, 13.5rem);
    line-height:0.82;
    color:transparent;            /* hide the base glyph; layers paint it */
    --tear:polygon(0% 0%, 100% 0%, 100% 78%, 92% 80%, 97% 86%, 88% 89%, 94% 94%, 80% 95%, 86% 100%, 0% 100%);
  }
  .ltr > span{
    position:absolute; inset:0;
    display:block;
    -webkit-background-clip:text; background-clip:text;
    color:transparent;
    pointer-events:none;
  }
  /* bottom: bright underlayer, offset down-right so it reads as paper beneath */
  .ltr .under{
    transform:translate(0.06em, 0.055em);
    color:var(--u, var(--bright));
    z-index:1;
    filter:drop-shadow(0 1px 0 rgba(0,0,0,0.10));
  }
  /* second exposed strip for extra depth */
  .ltr .under2{
    transform:translate(0.028em, 0.026em);
    color:var(--u2, var(--bright-2));
    z-index:2;
  }
  /* top: ink/kraft paper face, clipped to the jagged tear, casts paper shadow */
  .ltr .face{
    z-index:3;
    color:var(--ink);
    -webkit-clip-path:var(--tear);
    clip-path:var(--tear);
    /* soft paper drop-shadow gives the torn-edge lift */
    filter:
      drop-shadow(3px 5px 0 rgba(60,45,25,0.16))
      drop-shadow(7px 9px 9px rgba(60,45,25,0.22));
  }
  /* tiny static keeps glyph in flow for layout/measurement; transparent */
  .ltr .ghost{position:static; color:transparent;}

  /* alternate tear shapes so no two letters rip identically */
  .ltr.t2{ --tear:polygon(0% 0%, 100% 0%, 100% 70%, 90% 75%, 96% 81%, 84% 84%, 91% 91%, 76% 92%, 83% 100%, 0% 100%); }
  .ltr.t3{ --tear:polygon(0% 0%, 100% 0%, 100% 84%, 93% 82%, 98% 89%, 86% 90%, 92% 96%, 82% 97%, 88% 100%, 0% 100%); }
  .ltr.t4{ --tear:polygon(0% 0%, 100% 0%, 100% 74%, 94% 79%, 90% 84%, 96% 88%, 83% 90%, 90% 96%, 78% 97%, 85% 100%, 0% 100%); }

  .ltr.kraft .face{color:var(--kraft);}
  .ltr.inkface .face{color:var(--ink);}

  .sub{
    max-width:38ch;
    margin-top:22px;
    font-size:clamp(1rem, 1.4vw, 1.18rem);
    line-height:1.55;
    color:var(--ink-soft);
  }
  .sub strong{color:var(--ink);}

  .herorow{
    margin-top:28px;
    display:grid;
    grid-template-columns:minmax(0,1.15fr) minmax(0,0.85fr);
    gap:clamp(18px,3vw,38px);
    align-items:end;
  }

  /* framed torn photo on the right of the first screen */
  .frame{
    position:relative;
    background:var(--cream);
    padding:14px;
    transform:rotate(1.6deg);
    box-shadow:6px 10px 0 rgba(60,45,25,0.16), 0 18px 30px rgba(60,45,25,0.16);
    -webkit-clip-path:polygon(2% 0, 99% 1%, 100% 12%, 98% 22%, 100% 40%, 97% 60%, 100% 82%, 99% 100%, 60% 98%, 40% 100%, 12% 99%, 1% 96%, 0 70%, 2% 48%, 0 26%, 1% 8%);
    clip-path:polygon(2% 0, 99% 1%, 100% 12%, 98% 22%, 100% 40%, 97% 60%, 100% 82%, 99% 100%, 60% 98%, 40% 100%, 12% 99%, 1% 96%, 0 70%, 2% 48%, 0 26%, 1% 8%);
  }
  .frame .pic{
    position:relative;
    aspect-ratio:16/10;
    overflow:hidden;
    background:#cdbf9d;
    -webkit-clip-path:polygon(0 4%, 6% 0, 30% 2%, 55% 0, 80% 2%, 95% 0, 100% 6%, 99% 30%, 100% 60%, 98% 88%, 100% 96%, 78% 99%, 50% 100%, 22% 98%, 4% 100%, 0 92%, 1% 60%, 0 30%);
    clip-path:polygon(0 4%, 6% 0, 30% 2%, 55% 0, 80% 2%, 95% 0, 100% 6%, 99% 30%, 100% 60%, 98% 88%, 100% 96%, 78% 99%, 50% 100%, 22% 98%, 4% 100%, 0 92%, 1% 60%, 0 30%);
  }
  .frame .pic img{width:100%; height:100%; object-fit:cover; display:block; filter:saturate(0.96) contrast(1.02);}
  .frame .tape{
    position:absolute; top:-12px; left:50%; transform:translateX(-50%) rotate(-3deg);
    width:120px; height:30px;
    background:rgba(240,169,46,0.55);
    box-shadow:0 3px 8px rgba(60,45,25,0.18);
    -webkit-clip-path:polygon(3% 12%, 97% 0, 100% 84%, 0 100%);
    clip-path:polygon(3% 12%, 97% 0, 100% 84%, 0 100%);
    mix-blend-mode:multiply;
  }
  .frame .cap{
    margin-top:11px; padding:0 4px;
    font-family:"Fraunces", serif; font-size:0.86rem; color:var(--ink-soft);
    display:flex; justify-content:space-between; gap:10px;
  }

  /* scrap-strip stats glued at bottom of the hero column */
  .scraps{display:flex; flex-wrap:wrap; gap:12px; margin-top:6px;}
  .scrap{
    background:var(--cream);
    padding:11px 15px 12px;
    box-shadow:3px 5px 0 rgba(60,45,25,0.14);
  }
  .scrap:nth-child(1){transform:rotate(-1.5deg); border-top:3px solid var(--bright);}
  .scrap:nth-child(2){transform:rotate(1.2deg); border-top:3px solid var(--teal);}
  .scrap:nth-child(3){transform:rotate(-0.6deg); border-top:3px solid var(--bright-2);}
  .scrap b{display:block; font-family:"Archivo Black"; font-size:1.5rem; line-height:1;}
  .scrap span{font-size:0.72rem; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft);}

  /* ---------- collage gallery section ---------- */
  .section{padding:54px 0 30px;}
  .sechead{
    display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;
    margin-bottom:26px;
  }
  .sechead h2{
    font-family:"Fraunces", serif; font-weight:600;
    font-size:clamp(1.7rem,3.4vw,2.6rem); line-height:1;
  }
  .sechead .tag{
    font-size:0.72rem; font-weight:600; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--bright); background:var(--cream); padding:5px 11px;
    transform:rotate(-1deg); box-shadow:2px 3px 0 rgba(60,45,25,0.12);
  }

  .collage{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:clamp(14px,2vw,24px);
  }
  .card{
    position:relative;
    background:var(--cream);
    padding:12px;
    box-shadow:5px 8px 0 rgba(60,45,25,0.13), 0 14px 26px rgba(60,45,25,0.13);
    transition:transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s ease;
    will-change:transform;
  }
  .card:hover, .card:focus-within{
    transform:translateY(-6px) rotate(var(--rot,0deg));
    box-shadow:7px 12px 0 rgba(60,45,25,0.16), 0 22px 40px rgba(60,45,25,0.18);
  }
  .card .torn{
    position:relative; overflow:hidden; background:#cdbf9d;
    -webkit-clip-path:polygon(0 3%, 8% 0, 34% 2%, 62% 0, 88% 2%, 100% 5%, 99% 34%, 100% 64%, 97% 90%, 100% 98%, 72% 100%, 44% 98%, 16% 100%, 2% 97%, 0 64%, 1% 32%);
    clip-path:polygon(0 3%, 8% 0, 34% 2%, 62% 0, 88% 2%, 100% 5%, 99% 34%, 100% 64%, 97% 90%, 100% 98%, 72% 100%, 44% 98%, 16% 100%, 2% 97%, 0 64%, 1% 32%);
  }
  .card .torn img, .card .torn video{width:100%; height:100%; object-fit:cover; display:block;}
  .card.media .torn{cursor:pointer;}
  .card .torn .poster{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:2; transition:opacity .3s ease;}
  .card.playing .torn .poster{opacity:0; pointer-events:none;}
  .card .torn video{position:absolute; inset:0; z-index:1;}
  .card.still .torn{aspect-ratio:4/3;}
  .card.media .torn{aspect-ratio:4/3;}
  .card .play{
    position:absolute; z-index:3; left:12px; bottom:12px;
    width:42px; height:42px; border-radius:50%;
    background:rgba(232,80,58,0.94); color:var(--cream);
    display:grid; place-items:center; font-size:0.9rem;
    box-shadow:0 5px 12px rgba(60,45,25,0.3);
    transition:transform .2s ease, opacity .2s ease;
    pointer-events:none;
  }
  .card.playing .play{opacity:0;}
  .card .meta{padding:11px 5px 4px; display:flex; flex-direction:column; gap:3px;}
  .card .meta .t{font-family:"Fraunces", serif; font-weight:600; font-size:1.02rem; line-height:1.1;}
  .card .meta .d{font-size:0.8rem; color:var(--ink-soft); line-height:1.35;}
  .card .badge{
    position:absolute; z-index:3; top:6px; right:6px;
    font-size:0.62rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase;
    background:var(--ink); color:var(--cream); padding:4px 8px;
    transform:rotate(3deg);
    -webkit-clip-path:polygon(0 0,100% 0,94% 100%,4% 92%);
    clip-path:polygon(0 0,100% 0,94% 100%,4% 92%);
  }
  /* spans + rotations for collage rhythm */
  .card.s4{grid-column:span 4;} .card.s6{grid-column:span 6;}
  .card.s5{grid-column:span 5;} .card.s7{grid-column:span 7;}
  .card.s3{grid-column:span 3;}
  .card.r1{--rot:-1.4deg; transform:rotate(-1.4deg);}
  .card.r2{--rot:1.1deg; transform:rotate(1.1deg);}
  .card.r3{--rot:-0.7deg; transform:rotate(-0.7deg);}
  .card.r4{--rot:1.6deg; transform:rotate(1.6deg);}

  /* a torn-paper pull quote block */
  .quote{
    grid-column:span 5;
    background:var(--ink); color:var(--cream);
    padding:26px 24px;
    transform:rotate(-1deg);
    box-shadow:6px 10px 0 rgba(60,45,25,0.2);
    -webkit-clip-path:polygon(0 4%, 6% 0, 96% 2%, 100% 8%, 98% 92%, 100% 98%, 6% 100%, 0 94%, 2% 50%);
    clip-path:polygon(0 4%, 6% 0, 96% 2%, 100% 8%, 98% 92%, 100% 98%, 6% 100%, 0 94%, 2% 50%);
    display:flex; flex-direction:column; justify-content:center; gap:14px;
  }
  .quote p{font-family:"Fraunces", serif; font-size:clamp(1.2rem,2vw,1.55rem); line-height:1.32;}
  .quote .by{font-size:0.78rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--bright-2);}
  .quote .by b{color:var(--cream);}

  /* ---------- footer / closing torn band ---------- */
  .closing{
    margin-top:40px;
    background:linear-gradient(180deg, var(--bright) 0%, #d84630 100%);
    color:var(--cream);
    padding:clamp(34px,6vw,68px) 0;
    -webkit-clip-path:polygon(0 6%, 7% 2%, 22% 5%, 41% 1%, 60% 5%, 79% 1%, 93% 5%, 100% 2%, 100% 100%, 0 100%);
    clip-path:polygon(0 6%, 7% 2%, 22% 5%, 41% 1%, 60% 5%, 79% 1%, 93% 5%, 100% 2%, 100% 100%, 0 100%);
  }
  .closing .wrap{display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:22px;}
  .closing h3{font-family:"Archivo Black"; font-size:clamp(1.8rem,4.5vw,3.2rem); line-height:0.9; text-transform:uppercase; letter-spacing:-0.01em; max-width:14ch;}
  .closing .act{display:flex; gap:12px; flex-wrap:wrap;}
  .closing .act a{
    padding:14px 22px; font-weight:600; letter-spacing:0.04em;
    background:var(--cream); color:var(--ink);
    box-shadow:4px 6px 0 rgba(60,30,18,0.35);
    transition:transform .18s ease;
  }
  .closing .act a.ghost{background:transparent; color:var(--cream); border:2px solid var(--cream); box-shadow:none;}
  .closing .act a:hover, .closing .act a:focus-visible{transform:translateY(-3px);}

  footer.legal{padding:24px 0 50px; font-size:0.78rem; color:var(--ink-soft); display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap;}

  :focus-visible{outline:3px solid var(--teal); outline-offset:3px;}

  /* ---------- responsive: stack + keep headline dominant ---------- */
  @media (max-width:900px){
    .herorow{grid-template-columns:1fr;}
    .frame{transform:rotate(0.8deg); max-width:560px;}
    .card.s4,.card.s5,.card.s6,.card.s7,.card.s3{grid-column:span 6;}
    .quote{grid-column:span 6;}
  }
  @media (max-width:640px){
    .nav{display:none;}
    .ltr{font-size:clamp(3.6rem, 22vw, 7rem);}
    .headline{gap:0.08em 0.02em;}
    .frame{transform:none; max-width:none;}
    .collage{grid-template-columns:repeat(6,1fr);}
    .card.s4,.card.s5,.card.s6,.card.s7,.card.s3{grid-column:span 6;}
    .quote{grid-column:span 6;}
    .closing .wrap{flex-direction:column; align-items:flex-start;}
  }
  @media (max-width:430px){
    .ltr{font-size:clamp(3.2rem, 24vw, 5.6rem);}
  }

  /* ---------- reduced motion: kill all heavy motion, show final state ---------- */
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto;}
    *{transition:none !important; animation:none !important;}
    .reveal{opacity:1 !important; transform:none !important;}
  }

  /* entrance reveal (JS adds .in); disabled under reduced-motion */
  .reveal{opacity:0; transform:translateY(18px); transition:opacity .6s ease, transform .6s cubic-bezier(.2,.7,.2,1);}
  .reveal.in{opacity:1; transform:none;}
</style>
</head>
<body>

<div class="wrap">
  <header class="topbar">
    <div class="brand"><span class="chip">PP</span> Paper &amp; Press</div>
    <nav class="nav" aria-label="Primary">
      <a href="#work">Work</a>
      <a href="#process">Process</a>
      <a href="#studio">Studio</a>
      <a href="#start" class="cta">Start a piece</a>
    </nav>
  </header>

  <main class="hero">
    <span class="kicker">Hand torn <b>+</b> layered by us</span>

    <h1 class="headline" id="headline" aria-label="loading"></h1>

    <div class="herorow">
      <div>
        <p class="sub">A cut-paper studio for <strong>tactile brand work</strong>. Every letter above is built from stacked paper layers, ripped along its edge so the bright underlayer bleeds through the tear.</p>
        <div class="scraps" id="scraps"></div>
      </div>

      <figure class="frame reveal" id="heroframe">
        <span class="tape" aria-hidden="true"></span>
        <div class="pic"><img id="heroimg" alt="" loading="eager" decoding="async"></div>
        <figcaption class="cap"><span id="herocapt"></span><span id="herocapb"></span></figcaption>
      </figure>
    </div>
  </main>
</div>

<div class="wrap">
  <section class="section" id="work">
    <div class="sechead">
      <h2>The collage table</h2>
      <span class="tag">Mixed media</span>
    </div>
    <div class="collage" id="collage"></div>
  </section>
</div>

<section class="closing" id="start">
  <div class="wrap">
    <h3 id="closeHead"></h3>
    <div class="act">
      <a href="#" id="closeA"></a>
      <a href="#" class="ghost" id="closeB"></a>
    </div>
  </div>
</section>

<div class="wrap">
  <footer class="legal">
    <span id="legalLeft"></span>
    <span id="legalRight"></span>
  </footer>
</div>

<script>
/* =========================================================================
   DATA  -  swap everything here. Asset paths are relative to ../assets/.
   ========================================================================= */
const DATA = {
  /* HEADLINE: the torn-paper word(s). Per-letter optional overrides:
     u  = bright underlayer color (hex, never var())
     u2 = second exposed strip color (hex)
     face = "ink" | "kraft"  (top paper-face color)
     tear = "t2"|"t3"|"t4"  (alternate jagged rip shape; omit for default) */
  headline: [
    { word:"TORN",  letters:[
      {c:"T", u:"#e8503a", u2:"#f0a92e", face:"ink"},
      {c:"O", u:"#2f6f6a", u2:"#f0a92e", face:"ink", tear:"t2"},
      {c:"R", u:"#f0a92e", u2:"#e8503a", face:"ink", tear:"t3"},
      {c:"N", u:"#e8503a", u2:"#2f6f6a", face:"ink", tear:"t4"}
    ]},
    { word:"PAPER", letters:[
      {c:"P", u:"#f0a92e", u2:"#e8503a", face:"kraft", tear:"t2"},
      {c:"A", u:"#e8503a", u2:"#2f6f6a", face:"kraft"},
      {c:"P", u:"#2f6f6a", u2:"#f0a92e", face:"kraft", tear:"t3"},
      {c:"E", u:"#e8503a", u2:"#f0a92e", face:"kraft", tear:"t4"},
      {c:"R", u:"#f0a92e", u2:"#e8503a", face:"kraft", tear:"t2"}
    ]}
  ],

  /* framed photo on the first screen */
  heroFrame:{
    img:"../assets/flux-clinic-4k.png",
    alt:"Mint and wood interior, photographed for a paper-craft brand study",
    capLeft:"Plate 01",
    capRight:"Layered study"
  },

  /* small glued stat scraps */
  scraps:[
    { n:"12", label:"paper weights" },
    { n:"3x", label:"layer depth" },
    { n:"48h", label:"per piece" }
  ],

  /* collage cards. type: "still" (image) or "media" (video).
     media items list src + poster; only the focused/clicked one plays. */
  cards:[
    { type:"still", span:"s7", rot:"r1", img:"../assets/flux-car-4k.png",
      title:"Nightfall, kraft on ink", desc:"Matte black coupe torn from three paper layers." },
    { type:"media", span:"s5", rot:"r2", src:"../assets/veo-video.mp4", poster:"../assets/gen/poster-veo-video.png",
      badge:"Loop", title:"Paper in motion", desc:"Tap to play the layered reveal." },
    { type:"media", span:"s5", rot:"r3", src:"../assets/kling-video.mp4", poster:"../assets/gen/poster-kling-video.png",
      badge:"Loop", title:"Edge studies", desc:"How a tear catches light, on a loop." },
    { type:"still", span:"s4", rot:"r4", img:"../assets/sdxl.png",
      title:"Autumn fox, gouache scrap", desc:"Warm underlayer bleeding through." },
    { type:"quote", span:"s5",
      text:"We do not print the edge. We rip it, so light gets caught in the fibers.",
      by:"Studio note", who:"Paper & Press" },
    { type:"media", span:"s4", rot:"r1", src:"../assets/fal-video.mp4", poster:"../assets/gen/poster-fal-video.png",
      badge:"Loop", title:"Off-cut reel", desc:"Scraps from the cutting table." },
    { type:"still", span:"s3", rot:"r2", img:"../assets/hf-tinysd.png",
      title:"Apple, low-fi", desc:"A single torn shape." }
  ],

  closing:{
    head:"Let us tear something for you",
    ctaA:"Book the studio",
    ctaB:"See the full archive"
  },

  legal:{ left:"Paper & Press Studio - cut by hand", right:"Template: Torn Paper Type" }
};

/* =========================================================================
   RENDER
   ========================================================================= */
const $ = (s,r=document)=>r.querySelector(s);
const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* ---- headline: build stacked torn letters ---- */
(function buildHeadline(){
  const h = $("#headline");
  const aria = DATA.headline.map(w=>w.word).join(" ");
  h.setAttribute("aria-label", aria);
  DATA.headline.forEach((w, wi)=>{
    const wordEl = document.createElement("span");
    wordEl.className = "word" + (wi < DATA.headline.length-1 ? " gap" : "");
    w.letters.forEach(L=>{
      const ltr = document.createElement("span");
      ltr.className = "ltr"
        + (L.tear ? " "+L.tear : "")
        + (L.face==="kraft" ? " kraft" : " inkface");
      if(L.u)  ltr.style.setProperty("--u", L.u);
      if(L.u2) ltr.style.setProperty("--u2", L.u2);
      ltr.setAttribute("aria-hidden","true");
      // four stacked spans paint the same glyph at different depths
      ltr.innerHTML =
        '<span class="ghost">'+L.c+'</span>'+
        '<span class="under">'+L.c+'</span>'+
        '<span class="under2">'+L.c+'</span>'+
        '<span class="face">'+L.c+'</span>';
      wordEl.appendChild(ltr);
    });
    h.appendChild(wordEl);
  });
})();

/* ---- hero frame ---- */
(function heroFrame(){
  const f = DATA.heroFrame;
  const img = $("#heroimg");
  img.src = f.img; img.alt = f.alt;
  $("#herocapt").textContent = f.capLeft;
  $("#herocapb").textContent = f.capRight;
})();

/* ---- scraps ---- */
(function scraps(){
  const wrap = $("#scraps");
  DATA.scraps.forEach(s=>{
    const el = document.createElement("div");
    el.className = "scrap";
    el.innerHTML = '<b>'+s.n+'</b><span>'+s.label+'</span>';
    wrap.appendChild(el);
  });
})();

/* ---- collage ---- */
(function collage(){
  const grid = $("#collage");
  DATA.cards.forEach(c=>{
    if(c.type==="quote"){
      const q = document.createElement("blockquote");
      q.className = "quote reveal " + (c.span||"s5");
      q.innerHTML = '<p>"'+c.text+'"</p><span class="by">'+c.by+' / <b>'+c.who+'</b></span>';
      grid.appendChild(q);
      return;
    }
    const card = document.createElement("figure");
    card.className = "card reveal " + c.type + " " + (c.span||"s4") + " " + (c.rot||"");
    let inner = '<div class="torn">';
    if(c.type==="still"){
      inner += '<img src="'+c.img+'" alt="'+(c.title||"")+'" loading="lazy" decoding="async">';
    } else { // media
      inner += '<video muted loop playsinline preload="none" poster="'+c.poster+'"></video>';
      inner += '<img class="poster" src="'+c.poster+'" alt="'+(c.title||"")+'" loading="lazy" decoding="async">';
      inner += '<span class="play" aria-hidden="true">&#9658;</span>';
      card.dataset.src = c.src;
    }
    if(c.badge) inner += '<span class="badge">'+c.badge+'</span>';
    inner += '</div>';
    inner += '<figcaption class="meta"><span class="t">'+(c.title||"")+'</span><span class="d">'+(c.desc||"")+'</span></figcaption>';
    card.innerHTML = inner;

    if(c.type==="media"){
      card.tabIndex = 0;
      card.setAttribute("role","button");
      card.setAttribute("aria-label","Play "+(c.title||"video"));
      const torn = card.querySelector(".torn");
      const toggle = ()=>togglePlay(card);
      torn.addEventListener("click", toggle);
      card.addEventListener("keydown", e=>{
        if(e.key==="Enter" || e.key===" "){ e.preventDefault(); toggle(); }
      });
    }
    grid.appendChild(card);
  });
})();

/* ---- closing + legal ---- */
$("#closeHead").textContent = DATA.closing.head;
$("#closeA").textContent = DATA.closing.ctaA;
$("#closeB").textContent = DATA.closing.ctaB;
$("#legalLeft").textContent = DATA.legal.left;
$("#legalRight").textContent = DATA.legal.right;

/* =========================================================================
   VIDEO: only one plays at a time; lazy-attach src; pause when out of view.
   ========================================================================= */
let current = null;
function attachVideo(card){
  const v = card.querySelector("video");
  if(v && !v.src && card.dataset.src){ v.src = card.dataset.src; }
  return v;
}
function stopCard(card){
  if(!card) return;
  const v = card.querySelector("video");
  if(v) v.pause();
  card.classList.remove("playing");
}
function togglePlay(card){
  const v = attachVideo(card);
  if(!v) return;
  if(card.classList.contains("playing")){
    stopCard(card);
    if(current===card) current=null;
    return;
  }
  if(current && current!==card) stopCard(current);  // single decode at a time
  current = card;
  card.classList.add("playing");
  const p = v.play();
  if(p && p.catch) p.catch(()=>{ card.classList.remove("playing"); });
}

/* pause whatever scrolls out of view (saves decode + battery) */
if("IntersectionObserver" in window){
  const vis = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting && e.target.classList.contains("playing")){
        stopCard(e.target);
        if(current===e.target) current=null;
      }
    });
  }, { threshold:0.25 });
  document.querySelectorAll(".card.media").forEach(c=>vis.observe(c));
}

/* =========================================================================
   ENTRANCE REVEAL  (skipped entirely under reduced-motion)
   ========================================================================= */
if(reduce){
  document.querySelectorAll(".reveal").forEach(el=>el.classList.add("in"));
} else if("IntersectionObserver" in window){
  const io = new IntersectionObserver((entries,obs)=>{
    entries.forEach((e,i)=>{
      if(e.isIntersecting){
        const el = e.target;
        setTimeout(()=>el.classList.add("in"), Math.min(i*60,240));
        obs.unobserve(el);
      }
    });
  }, { threshold:0.12, rootMargin:"0px 0px -8% 0px" });
  document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
} else {
  document.querySelectorAll(".reveal").forEach(el=>el.classList.add("in"));
}
</script>
