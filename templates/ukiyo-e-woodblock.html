<!-- TEMPLATE: Ukiyo-e Woodblock | ARCHETYPE: ukiyo-e | REF: Hokusai Great Wave, Hiroshige, Edo woodblock | WHEN TO USE: maximally decorated flat-color contour-line hero for craft / heritage / editorial brands wanting Edo print drama, not minimal-Japanese MUJI | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ukiyo-e Woodblock</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   UKIYO-E WOODBLOCK  -  Edo flat-color contour-line print
   Palette: washi #efe7d4 | Prussian #2a4a7f | indigo #16335c
            vermilion seal #b5402e | ink contour #1c1c1c
   ============================================================ */
:root{
  --washi:#efe7d4;
  --washi-deep:#e3d7bd;
  --prussian:#2a4a7f;
  --prussian-pale:#6f8db8;
  --indigo:#16335c;
  --indigo-deep:#0e2440;
  --vermilion:#b5402e;
  --vermilion-deep:#8c2c20;
  --ink:#1c1c1c;
  --foam:#f7f1e2;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--washi);
  color:var(--ink);
  font-family:"Shippori Mincho",Georgia,serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  line-height:1.6;
}
/* washi paper grain ------------------------------------------------ */
body::before{
  content:"";
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(circle at 12% 18%, rgba(28,28,28,.045) 0 1px, transparent 1.6px),
    radial-gradient(circle at 67% 42%, rgba(28,28,28,.035) 0 1px, transparent 1.6px),
    radial-gradient(circle at 38% 78%, rgba(28,28,28,.04) 0 1px, transparent 1.6px),
    radial-gradient(circle at 88% 88%, rgba(28,28,28,.03) 0 1px, transparent 1.6px);
  background-size:7px 7px, 11px 11px, 9px 9px, 13px 13px;
  mix-blend-mode:multiply;opacity:.6;
}
body::after{
  content:"";
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg, rgba(28,28,28,.025) 0 1px, transparent 1px 4px);
  opacity:.5;mix-blend-mode:multiply;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
.jp{font-family:"Zen Maru Gothic","Shippori Mincho",serif}

/* ============================================================
   LAYOUT SHELL  -  vertical Japanese grid composition
   ============================================================ */
.frame-outer{
  position:relative;z-index:1;
  max-width:1380px;margin:0 auto;
  padding:18px;
}
/* the kacho-e style border around the whole page */
.frame-outer::before{
  content:"";position:absolute;inset:9px;pointer-events:none;
  border:3px solid var(--ink);
  box-shadow:inset 0 0 0 5px var(--washi), inset 0 0 0 7px var(--ink);
  z-index:5;
}

/* ---- top band : title cartouche + signature seal ---------------- */
.topband{
  position:relative;z-index:3;
  display:grid;
  grid-template-columns:1fr auto;
  gap:20px;align-items:stretch;
  padding:26px 30px 22px;
}
.brandblock{display:flex;flex-direction:column;gap:10px;min-width:0}
.kicker{
  display:inline-flex;align-items:center;gap:10px;
  font-family:"Zen Maru Gothic",serif;font-weight:700;
  font-size:.74rem;letter-spacing:.34em;text-transform:uppercase;
  color:var(--indigo);
}
.kicker .vbar{width:34px;height:3px;background:var(--vermilion)}
.brand{
  font-weight:800;line-height:.96;color:var(--indigo-deep);
  font-size:clamp(2.4rem,6.4vw,5.1rem);
  letter-spacing:-.01em;margin:0;
  text-shadow:2px 3px 0 rgba(42,74,127,.16);
}
.brand .red{color:var(--vermilion)}
.lede{
  font-size:clamp(.96rem,1.5vw,1.12rem);
  max-width:46ch;color:#33312c;margin:4px 0 0;
}
.cta-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:8px}
.btn{
  font-family:"Zen Maru Gothic",serif;font-weight:700;
  font-size:.82rem;letter-spacing:.08em;
  padding:12px 22px;border:2.5px solid var(--ink);
  background:var(--vermilion);color:var(--foam);
  display:inline-flex;align-items:center;gap:8px;cursor:pointer;
  box-shadow:4px 4px 0 var(--ink);
  transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
}
.btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.btn.ghost{background:transparent;color:var(--indigo-deep)}
.btn.ghost:hover{background:var(--washi-deep)}
.btn:focus-visible,a:focus-visible,button:focus-visible{
  outline:3px solid var(--prussian);outline-offset:3px;
}

/* hanko seal (vertical, top-right of band) */
.seal{
  position:relative;align-self:center;
  width:104px;height:118px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(2px 3px 0 rgba(140,44,32,.28));
}
.seal svg{width:100%;height:100%;display:block}

/* ---- HERO : the woodblock wave -- signature, visible at scroll 0 -- */
.hero{
  position:relative;z-index:2;
  margin:0 18px 18px;
  border:3px solid var(--ink);
  background:linear-gradient(180deg,#f3ecda 0%,#e9dfc6 100%);
  overflow:hidden;
}
.hero-svg-wrap{
  position:relative;width:100%;
  /* keep the print a fixed-ratio panel so the wave reads at scroll 0 */
  aspect-ratio:1440/620;
}
@media (max-width:640px){
  .hero-svg-wrap{aspect-ratio:390/440}
}
.hero-svg{position:absolute;inset:0;width:100%;height:100%}
/* drifting cloud bands behind the wave (honored under reduced motion) */
.cloud{transform-box:fill-box;transform-origin:center}
@keyframes drift{from{transform:translateX(0)}to{transform:translateX(48px)}}
.cloud.c1{animation:drift 19s ease-in-out infinite alternate}
.cloud.c2{animation:drift 26s ease-in-out infinite alternate-reverse}
.swell{transform-box:fill-box;transform-origin:center bottom}
@keyframes swell{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.swell{animation:swell 9s ease-in-out infinite}

/* hero caption strip riding the bottom of the print */
.hero-cap{
  position:absolute;left:0;right:0;bottom:0;z-index:4;
  display:flex;justify-content:space-between;align-items:center;
  gap:14px;flex-wrap:wrap;
  padding:10px 18px;
  background:rgba(14,36,64,.86);color:var(--foam);
  font-family:"Zen Maru Gothic",serif;
  border-top:3px solid var(--ink);
}
.hero-cap .t{font-weight:700;font-size:.92rem;letter-spacing:.05em}
.hero-cap .m{font-size:.74rem;letter-spacing:.18em;opacity:.85;text-transform:uppercase}

/* ============================================================
   SECTION HEADINGS
   ============================================================ */
.sec{position:relative;z-index:2;padding:14px 30px 6px}
.sec-head{
  display:flex;align-items:center;gap:16px;margin:34px 0 22px;
}
.sec-no{
  font-family:"Zen Maru Gothic",serif;font-weight:700;
  color:var(--foam);background:var(--indigo);
  border:2.5px solid var(--ink);
  width:46px;height:46px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;
  font-size:1.05rem;box-shadow:3px 3px 0 var(--ink);
}
.sec-title{
  font-weight:800;color:var(--indigo-deep);
  font-size:clamp(1.5rem,3.2vw,2.3rem);margin:0;line-height:1.05;
}
.sec-title small{
  display:block;font-family:"Zen Maru Gothic",serif;font-weight:500;
  font-size:.62em;letter-spacing:.22em;color:var(--vermilion);
  text-transform:uppercase;margin-top:3px;
}
.sec-rule{flex:1;height:3px;background:var(--ink);min-width:18px}

/* ============================================================
   CARTOUCHE GALLERY  -  framed media cells, flat ink borders
   ============================================================ */
.gallery{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:18px;
}
.cart{
  position:relative;
  border:3px solid var(--ink);
  background:var(--foam);
  box-shadow:5px 5px 0 rgba(28,28,28,.18);
  display:flex;flex-direction:column;
  overflow:hidden;
}
/* spanning rhythm of an asymmetric Edo grid */
.cart.span7{grid-column:span 7}
.cart.span5{grid-column:span 5}
.cart.span4{grid-column:span 4}
.cart.span8{grid-column:span 8}
.cart.span6{grid-column:span 6}
.cart.span12{grid-column:span 12}

.cart-bar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:9px 13px;background:var(--indigo);color:var(--foam);
  border-bottom:3px solid var(--ink);
}
.cart-bar .nm{
  font-family:"Zen Maru Gothic",serif;font-weight:700;
  font-size:.84rem;letter-spacing:.04em;
}
.cart-bar .tag{
  font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;
  padding:3px 8px;border:1.5px solid var(--prussian-pale);color:var(--washi);
}
/* the framed media well : asset is CONTAINED, never cropped */
.well{
  position:relative;
  background:
    repeating-linear-gradient(45deg, rgba(42,74,127,.07) 0 9px, transparent 9px 18px),
    var(--washi-deep);
  aspect-ratio:16/10;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.well.tall{aspect-ratio:1/1}
.well img,.well video{
  width:100%;height:100%;object-fit:contain;
}
.well .frameline{
  position:absolute;inset:9px;border:1.5px solid var(--ink);
  pointer-events:none;opacity:.55;
}
.cart-cap{
  padding:11px 14px;font-size:.86rem;color:#3a382f;
  border-top:2px solid rgba(28,28,28,.18);background:var(--foam);
}
.cart-cap b{color:var(--indigo-deep)}

/* video controls / poster behaviour */
.media-shell{position:absolute;inset:0}
.media-shell video{opacity:0;transition:opacity .35s ease}
.media-shell.playing video{opacity:1}
.poster{position:absolute;inset:0;width:100%;height:100%;object-fit:contain}
.media-shell.playing .poster{opacity:0;transition:opacity .35s ease}
.playbtn{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  z-index:3;width:62px;height:62px;border-radius:50%;
  background:var(--vermilion);border:3px solid var(--ink);
  color:var(--foam);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:3px 3px 0 var(--ink);transition:transform .12s ease;
}
.playbtn:hover{transform:translate(-50%,-50%) scale(1.07)}
.playbtn svg{width:24px;height:24px;margin-left:3px}
.media-shell.playing .playbtn{opacity:0;pointer-events:none}

/* ============================================================
   AUDIO STRIP  -  waveform plaques
   ============================================================ */
.audio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.audio-card{
  border:3px solid var(--ink);background:var(--foam);
  box-shadow:5px 5px 0 rgba(28,28,28,.18);
  display:flex;flex-direction:column;
}
.audio-card .wbar{
  padding:8px 13px;background:var(--vermilion);color:var(--foam);
  font-family:"Zen Maru Gothic",serif;font-weight:700;font-size:.82rem;
  border-bottom:3px solid var(--ink);
  display:flex;align-items:center;justify-content:space-between;
}
.audio-card .wwell{
  padding:14px;background:var(--washi-deep);
  border-bottom:3px solid var(--ink);
}
.audio-card .wwell img{width:100%;height:46px;object-fit:cover;
  filter:sepia(.2) hue-rotate(170deg) saturate(1.3) contrast(1.05);}
.audio-card .arow{
  display:flex;align-items:center;gap:11px;padding:11px 13px;
}
.audio-card audio{width:100%;height:34px}

/* ============================================================
   COLOPHON / FOOTER
   ============================================================ */
.colophon{
  position:relative;z-index:2;margin:40px 18px 22px;
  border:3px solid var(--ink);background:var(--indigo-deep);
  color:var(--washi);padding:30px 30px;
  display:grid;grid-template-columns:1fr auto;gap:24px;align-items:center;
}
.colophon h3{font-size:1.5rem;margin:0 0 8px;color:var(--foam)}
.colophon p{margin:0;max-width:52ch;font-size:.94rem;opacity:.86}
.palette{display:flex;gap:0;border:2.5px solid var(--ink);box-shadow:4px 4px 0 var(--ink)}
.palette span{width:42px;height:54px;display:block}

footer.foot{
  position:relative;z-index:2;text-align:center;
  padding:14px 0 30px;color:#555047;
  font-family:"Zen Maru Gothic",serif;font-size:.76rem;letter-spacing:.16em;
}

/* ============================================================
   RESPONSIVE  -  stack & letterbox at small widths
   ============================================================ */
@media (max-width:900px){
  .topband{grid-template-columns:1fr;gap:16px}
  .seal{align-self:flex-start}
  .gallery{grid-template-columns:repeat(6,1fr)}
  .cart.span7,.cart.span5,.cart.span4,.cart.span8,.cart.span6{grid-column:span 6}
  .audio-grid{grid-template-columns:1fr}
  .colophon{grid-template-columns:1fr;text-align:left}
}
@media (max-width:640px){
  .frame-outer{padding:10px}
  .frame-outer::before{inset:6px}
  .topband{padding:20px 16px 14px}
  .hero{margin:0 10px 10px}
  .sec{padding:8px 16px}
  .gallery{grid-template-columns:1fr}
  .colophon{padding:22px 18px}
  .palette span{width:34px;height:44px}
}

/* ============================================================
   REDUCED MOTION  -  disable drift / swell, show final state
   ============================================================ */
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important;scroll-behavior:auto !important}
  .cloud,.swell{transform:none !important}
}
</style>
</head>
<body>
<script>
/* ============================================================
   DATA  -  swap this array to re-theme the whole template.
   Each gallery item points at a real asset in ../assets/.
   img cells render the still; video cells render poster+play.
   ============================================================ */
const DATA = {
  brand: { pre:"Edo Print House", name:["Floating","World"], red:"World",
           lede:"A maximally decorated woodblock paradigm. Flat Prussian-blue zones cut by bold ink contour lines, sealed with a vermilion hanko. Built entirely from inline SVG and native CSS." },
  seal: "印",          /* glyph inside the hanko */
  cta: [
    { label:"View the prints", href:"#gallery", solid:true },
    { label:"Colophon", href:"#colophon", solid:false }
  ],
  heroCap: { title:"The Great Wave  /  Kanagawa-oki Nami Ura", meta:"Flat color · Contour line · No gradients in the wave" },

  gallery: [
    { kind:"img",   span:"span7", name:"Night Drive",   tag:"Image", src:"../assets/flux-car-4k.png",
      cap:"<b>flux-car-4k</b> · cinematic matte-black coupe on a wet neon street, framed in a contour cartouche." },
    { kind:"img",   span:"span5", name:"The Fox",       tag:"Image", well:"tall", src:"../assets/sdxl.png",
      cap:"<b>sdxl</b> · painterly autumn fox, contained inside a square seal-frame." },
    { kind:"video", span:"span6", name:"Drift Loop",    tag:"Motion", src:"../assets/kling-video.mp4", poster:"../assets/gen/poster-kling-video.png",
      cap:"<b>kling-video</b> · plays only when in view and focused; poster holds the still otherwise." },
    { kind:"video", span:"span6", name:"Frame Study",   tag:"Motion", src:"../assets/fal-video.mp4",   poster:"../assets/gen/poster-fal-video.png",
      cap:"<b>fal-video</b> · silent loop, single-decode discipline, no simultaneous autoplay." },
    { kind:"img",   span:"span5", name:"Clinic Calm",   tag:"Image", src:"../assets/flux-clinic-4k.png",
      cap:"<b>flux-clinic-4k</b> · mint and wood interior, letterboxed so nothing crops." },
    { kind:"img",   span:"span7", name:"Low-Fi Apple",  tag:"Image", src:"../assets/hf-tinysd.png",
      cap:"<b>hf-tinysd</b> · abstract low-fi study, contained on a hatched washi well." }
  ],

  audio: [
    { name:"Thai Voice",  glyph:"声", wave:"../assets/gen/wave-elevenlabs.png", src:"../assets/elevenlabs-thai.mp3" },
    { name:"MusicGen",    glyph:"楽", wave:"../assets/gen/wave-musicgen.png",   src:"../assets/musicgen.wav" },
    { name:"Piper TTS",   glyph:"管", wave:"../assets/gen/wave-piper.png",      src:"../assets/piper.wav" }
  ],

  colophon: { title:"Carved, inked, pressed.",
    body:"Five blocks would print this by hand: keyblock for the contour line, then one block per flat color. Here every block is an inline SVG path with a literal hex fill. Swap the DATA array above to re-theme.",
    palette:["#efe7d4","#2a4a7f","#16335c","#b5402e","#1c1c1c"] }
};
</script>

<div class="frame-outer">

  <!-- ================= TOP BAND ================= -->
  <header class="topband">
    <div class="brandblock">
      <span class="kicker"><span class="vbar"></span><span id="kicker"></span></span>
      <h1 class="brand" id="brand"></h1>
      <p class="lede" id="lede"></p>
      <div class="cta-row" id="cta"></div>
    </div>

    <!-- HANKO SEAL : vermilion, inline SVG, scroll-0 accent -->
    <div class="seal" aria-label="Vermilion hanko seal">
      <svg viewBox="0 0 104 118" role="img" aria-hidden="true">
        <rect x="3" y="3" width="98" height="112" fill="#b5402e" stroke="#1c1c1c" stroke-width="3"/>
        <rect x="11" y="11" width="82" height="96" fill="none" stroke="#efe7d4" stroke-width="3"/>
        <!-- carved-out negative-space glyph blocks -->
        <g fill="#efe7d4">
          <rect x="22" y="24" width="60" height="9"/>
          <rect x="22" y="42" width="26" height="9"/>
          <rect x="58" y="42" width="24" height="9"/>
          <rect x="40" y="33" width="9" height="54"/>
          <rect x="22" y="78" width="60" height="9"/>
          <rect x="62" y="56" width="9" height="22"/>
          <rect x="33" y="56" width="9" height="22"/>
        </g>
        <text id="sealGlyph" x="52" y="64" text-anchor="middle" font-family="'Zen Maru Gothic',serif"
              font-size="34" font-weight="700" fill="#efe7d4" opacity="0"></text>
      </svg>
    </div>
  </header>

  <!-- ================= HERO WOODBLOCK WAVE ================= -->
  <section class="hero" aria-label="Ukiyo-e woodblock hero print of a cresting wave and Mount Fuji">
    <div class="hero-svg-wrap">
      <!-- preserveAspectRatio "meet" => the print is always fully contained, never cropped on phone -->
      <svg class="hero-svg" viewBox="0 0 1440 620" preserveAspectRatio="xMidYMid meet" role="img"
           aria-label="Flat-color Prussian-blue cresting wave with foam claws, Mount Fuji behind, sun disc above">

        <!-- washi sky ground -->
        <rect x="0" y="0" width="1440" height="620" fill="#efe7d4"/>

        <!-- graded woodblock sky : stacked FLAT bands (bokashi), no gradient -->
        <rect x="0" y="0"   width="1440" height="120" fill="#dfd3b8"/>
        <rect x="0" y="120" width="1440" height="90"  fill="#e6dcc4"/>
        <rect x="0" y="210" width="1440" height="80"  fill="#efe7d4"/>

        <!-- vermilion sun disc -->
        <circle cx="1180" cy="120" r="62" fill="#b5402e" stroke="#1c1c1c" stroke-width="4"/>
        <circle cx="1180" cy="120" r="62" fill="none" stroke="#efe7d4" stroke-width="2" opacity="0"/>

        <!-- drifting flat cloud bands -->
        <g class="cloud c1" opacity=".55">
          <path d="M120 96 q60 -34 150 -16 q70 -34 170 -8 q60 -22 120 6 q-90 26 -220 18 q-150 8 -220 -0 Z"
                fill="#c9bda0" stroke="#1c1c1c" stroke-width="3"/>
        </g>
        <g class="cloud c2" opacity=".45">
          <path d="M620 70 q70 -28 170 -10 q90 -26 200 4 q-100 24 -240 14 q-90 4 -130 -8 Z"
                fill="#d6cab0" stroke="#1c1c1c" stroke-width="3"/>
        </g>

        <!-- ===== MOUNT FUJI : flat indigo cone, snow cap, contour ===== -->
        <g class="swell">
          <path d="M470 470 L700 250 Q720 234 740 250 L968 470 Z"
                fill="#16335c" stroke="#1c1c1c" stroke-width="5" stroke-linejoin="round"/>
          <!-- snow cap as flat washi block with jagged contour skirt -->
          <path d="M656 296 L700 250 Q720 234 740 250 L786 298
                   L766 308 L748 296 L732 312 L714 298 L696 314 L678 300 L662 312 Z"
                fill="#f7f1e2" stroke="#1c1c1c" stroke-width="4" stroke-linejoin="round"/>
          <!-- fuji shading facet (single flat darker zone) -->
          <path d="M721 252 L721 470 L968 470 Z" fill="#0e2440" opacity=".5"/>
        </g>

        <!-- ===== THE GREAT WAVE : flat Prussian zones + bold ink contour ===== -->
        <!-- deep trough -->
        <path d="M0 470 Q220 430 430 470 T870 470 T1280 470 T1440 470 L1440 620 L0 620 Z"
              fill="#16335c"/>
        <!-- mid swell -->
        <path d="M0 500 Q240 452 470 498 T940 498 T1440 498 L1440 620 L0 620 Z"
              fill="#2a4a7f"/>

        <!-- the great cresting wave (left mass) -->
        <g class="swell">
          <path d="M-40 470
                   C140 330 280 300 420 360
                   C500 394 540 470 470 520
                   C560 472 660 470 690 540
                   C600 540 540 514 470 540
                   C540 560 600 560 660 552
                   C520 600 320 600 150 560
                   C40 534 -20 510 -40 470 Z"
                fill="#2a4a7f" stroke="#1c1c1c" stroke-width="6" stroke-linejoin="round"/>
          <!-- inner wave hollow : flat indigo zone -->
          <path d="M70 466
                   C180 372 280 350 380 388
                   C440 410 462 460 430 494
                   C360 452 250 452 170 486
                   C120 500 88 490 70 466 Z"
                fill="#16335c" stroke="#1c1c1c" stroke-width="5" stroke-linejoin="round"/>
          <!-- inner foam crescent : flat washi -->
          <path d="M150 452
                   C230 398 312 386 386 412
                   C330 404 252 410 192 446
                   C172 458 158 458 150 452 Z"
                fill="#f7f1e2" stroke="#1c1c1c" stroke-width="3"/>

          <!-- FOAM CLAWS : the signature finger-spray, flat washi + ink contour -->
          <g fill="#f7f1e2" stroke="#1c1c1c" stroke-width="4" stroke-linejoin="round">
            <path d="M360 352 q-22 -46 6 -86 q12 40 -6 86 Z"/>
            <path d="M404 338 q-12 -52 24 -84 q4 44 -24 84 Z"/>
            <path d="M300 372 q-34 -36 -22 -82 q26 34 22 82 Z"/>
            <path d="M448 350 q4 -50 46 -68 q-8 44 -46 68 Z"/>

<script>
/* ============================================================
   RENDER from DATA
   ============================================================ */
const $ = (s,r=document)=>r.querySelector(s);
const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

/* --- top band --- */
$("#kicker").textContent = DATA.brand.pre;
$("#brand").innerHTML = DATA.brand.name
  .map(w => w === DATA.brand.red ? `<span class="red">${w}</span>` : w).join(" ");
$("#lede").textContent = DATA.brand.lede;
$("#sealGlyph").textContent = DATA.seal;

$("#cta").innerHTML = DATA.cta.map(c =>
  `<a class="btn ${c.solid?"":"ghost"}" href="${c.href}">${c.label}</a>`).join("");

$("#heroCapTitle").textContent = DATA.heroCap.title;
$("#heroCapMeta").textContent  = DATA.heroCap.meta;

/* --- gallery --- */
$("#galleryGrid").innerHTML = DATA.gallery.map((g,i) => {
  const wellCls = "well" + (g.well==="tall" ? " tall" : "");
  let media;
  if (g.kind === "img") {
    media = `<img src="${g.src}" alt="${g.name}" loading="lazy" decoding="async"/>
             <span class="frameline"></span>`;
  } else {
    media = `<div class="media-shell" data-vi="${i}">
        <img class="poster" src="${g.poster}" alt="${g.name} poster" loading="lazy" decoding="async"/>
        <video muted loop playsinline preload="none" poster="${g.poster}"
               aria-label="${g.name} video loop"><source data-src="${g.src}" type="video/mp4"/></video>
        <button class="playbtn" aria-label="Play ${g.name}">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <span class="frameline"></span>
      </div>`;
  }
  return `<article class="cart ${g.span}">
      <div class="cart-bar"><span class="nm">${g.name}</span><span class="tag">${g.tag}</span></div>
      <div class="${wellCls}">${media}</div>
      <div class="cart-cap">${g.cap}</div>
    </article>`;
}).join("");

/* --- audio --- */
$("#audioGrid").innerHTML = DATA.audio.map(a =>
  `<article class="audio-card">
     <div class="wbar"><span>${a.name}</span><span class="jp">${a.glyph}</span></div>
     <div class="wwell"><img src="${a.wave}" alt="${a.name} waveform" loading="lazy"/></div>
     <div class="arow"><audio controls preload="none" src="${a.src}"></audio></div>
   </article>`).join("");

/* --- colophon --- */
$("#colTitle").textContent = DATA.colophon.title;
$("#colBody").textContent  = DATA.colophon.body;
$("#palette").innerHTML = DATA.colophon.palette
  .map(c => `<span style="background:${c}"></span>`).join("");

/* ============================================================
   VIDEO : single-decode discipline.
   - lazy-attach source only when needed
   - play only the focused/clicked one, in view
   - pause others (no simultaneous decode)
   - pause when scrolled out of view
   ============================================================ */
const shells = Array.from(document.querySelectorAll(".media-shell"));

function attachSrc(video){
  const src = video.querySelector("source");
  if (src && !src.src) { src.src = src.dataset.src; video.load(); }
}
function pauseAll(except){
  shells.forEach(s => {
    if (s === except) return;
    const v = s.querySelector("video");
    v.pause(); s.classList.remove("playing");
  });
}
function playShell(shell){
  if (reduce) return;          /* honor reduced motion : keep poster */
  const v = shell.querySelector("video");
  pauseAll(shell);
  attachSrc(v);
  shell.classList.add("playing");
  v.play().catch(()=>{ shell.classList.remove("playing"); });
}

shells.forEach(shell => {
  const btn = shell.querySelector(".playbtn");
  btn.addEventListener("click", e => {
    e.preventDefault();
    if (shell.classList.contains("playing")) {
      shell.querySelector("video").pause();
      shell.classList.remove("playing");
    } else {
      playShell(shell);
    }
  });
});

/* pause videos that scroll out of view (frees the decoder) */
if ("IntersectionObserver" in window){
  const io = new IntersectionObserver(entries => {
    entries.forEach(en => {
      if (!en.isIntersecting){
        const v = en.target.querySelector("video");
        v.pause(); en.target.classList.remove("playing");
      }
    });
  }, { threshold:0.25 });
  shells.forEach(s => io.observe(s));
}

/* reveal the seal glyph subtly behind the carved blocks (static, no motion) */
if (reduce){ /* nothing to animate */ }
</script>
</body>
