<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Synthwave Owner Deck</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Audiowide&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   SYNTHWAVE OWNER DECK  -  vaporwave / synthwave backoffice
   Palette: #1a0b2e deep purple ground | #2a0f4a navy-violet
            #ff2d95 neon magenta | #2de2e6 cyan | #ff8a3c sunset orange
   ============================================================ */
:root{
  --ground:#1a0b2e;
  --ground2:#0d0620;
  --navy:#2a0f4a;
  --mag:#ff2d95;
  --cyan:#2de2e6;
  --orange:#ff8a3c;
  --violet:#8a4fff;
  --ink:#f3e9ff;
  --dim:#d8c4f2;        /* secondary text: brighter lavender for readable contrast on dark purple */
  --dim2:#c0a6e6;       /* slightly deeper, still legible: chart axis ticks */
  --line:rgba(255,45,149,0.28);
  --pane:rgba(34,15,64,0.55);
  --pane2:rgba(20,8,42,0.6);
  --glow-mag:0 0 14px rgba(255,45,149,0.55);
  --glow-cy:0 0 14px rgba(45,226,230,0.5);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;width:100%;overflow-x:hidden}
body{
  font-family:'Sarabun',system-ui,sans-serif;
  color:var(--ink);
  background:var(--ground2);
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
  position:relative;
}

/* ---------- fixed sunset-grid backdrop (the signature stage) ---------- */
.stage{
  position:fixed;
  inset:0;
  z-index:0;
  overflow:hidden;            /* clip the perspective grid - zero page overflow */
  background:
     radial-gradient(120% 78% at 50% 64%, rgba(255,45,149,0.20) 0%, rgba(255,45,149,0) 46%),
     linear-gradient(180deg,
        #160a2b 0%,
        #2a0f4a 30%,
        #5a1c6e 50%,
        #b5277e 62%,
        #ff5a86 70%,
        #ff8a3c 76%,
        #1a0b2e 76.4%,
        #14082a 100%);
}
/* retro sun disc with scanline cutouts */
.sun{
  position:absolute;
  left:50%;
  top:34%;
  width:min(46vw,440px);
  height:min(46vw,440px);
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:linear-gradient(180deg,#fff06b 0%,#ff8a3c 34%,#ff2d95 78%,#c01e7a 100%);
  -webkit-mask:repeating-linear-gradient(180deg,#000 0 calc(7% ),transparent calc(7%) calc(8.6%));
          mask:repeating-linear-gradient(180deg,#000 0 calc(7% ),transparent calc(7%) calc(8.6%));
  filter:drop-shadow(0 0 60px rgba(255,90,134,0.55));
  z-index:1;
}
/* solid lower half of sun (no scanlines near bottom) */
.sun::after{
  content:"";
  position:absolute;
  inset:0;
  top:auto;
  height:34%;
  border-radius:0 0 999px 999px;
  background:linear-gradient(180deg,#ff2d95,#c01e7a);
  -webkit-mask:none;mask:none;
}
/* perspective grid floor - inline SVG receding to a vanishing point.
   SVG box == its layout box, so scrollWidth never exceeds clientWidth (vlint-safe). */
.grid-lane{
  position:absolute;
  left:0;right:0;bottom:0;
  height:56vh;
  overflow:hidden;
  z-index:1;
}
.grid-floor{
  position:absolute;
  left:0;right:0;bottom:0;
  width:100%;height:100%;
  display:block;
}
.grid-floor svg{display:block;width:100%;height:100%}
/* the receding horizontal rungs scroll toward the viewer */
.grid-floor .rungs{animation:rung-roll 4.8s linear infinite}
@keyframes rung-roll{from{transform:translateY(0)}to{transform:translateY(34px)}}
/* faint stars above the horizon */
.stars{
  position:absolute;inset:0 0 60% 0;z-index:0;
  background-image:
    radial-gradient(1.4px 1.4px at 12% 22%, rgba(255,255,255,0.8), transparent),
    radial-gradient(1.2px 1.2px at 78% 14%, rgba(45,226,230,0.8), transparent),
    radial-gradient(1.3px 1.3px at 44% 9%, rgba(255,255,255,0.7), transparent),
    radial-gradient(1px 1px at 62% 30%, rgba(255,138,60,0.8), transparent),
    radial-gradient(1.1px 1.1px at 30% 38%, rgba(255,45,149,0.7), transparent),
    radial-gradient(1px 1px at 88% 40%, rgba(255,255,255,0.6), transparent);
}
.scanlines{
  position:fixed;inset:0;z-index:60;pointer-events:none;
  background:repeating-linear-gradient(180deg,rgba(0,0,0,0) 0 2px,rgba(0,0,0,0.10) 2px 3px);
  mix-blend-mode:multiply;opacity:.5;
}

/* ---------- layout shell ---------- */
.wrap{
  position:relative;z-index:2;
  max-width:1320px;margin:0 auto;
  padding:24px clamp(14px,3vw,40px) 64px;
  width:100%;
}

/* top band: title + system status, compact so the KPIs land in view */
.topbar{
  display:flex;flex-wrap:wrap;gap:16px;
  align-items:flex-end;justify-content:space-between;
  margin-bottom:18px;min-width:0;
}
.brand{min-width:0}
.brand .kicker{
  font-family:'Audiowide',sans-serif;
  letter-spacing:.32em;font-size:11px;text-transform:uppercase;
  color:var(--cyan);text-shadow:var(--glow-cy);margin:0 0 6px;
}
.brand h1{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(26px,4.4vw,46px);line-height:.98;margin:0;
  letter-spacing:.02em;
  background:linear-gradient(92deg,#ff8a3c 0%,#ff2d95 42%,#2de2e6 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 2px 10px rgba(255,45,149,0.4));
  overflow-wrap:break-word;
}
.brand .sub{color:var(--dim);font-size:13px;margin-top:6px}
.statuschip{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;
  min-width:0;
}
.chip{
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.08em;
  padding:7px 12px;border-radius:999px;
  border:1px solid var(--line);
  background:var(--pane2);
  color:var(--ink);white-space:nowrap;
  backdrop-filter:blur(6px);
}
.chip b{color:var(--cyan);text-shadow:var(--glow-cy)}
.chip .dot{display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--cyan);box-shadow:var(--glow-cy);margin-right:6px;vertical-align:middle;
  animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ---------- KPI neon readouts ---------- */
.kpis{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;margin-bottom:18px;
}
.kpi{
  position:relative;min-width:0;
  padding:16px 16px 14px;border-radius:14px;
  background:linear-gradient(180deg,rgba(40,18,74,0.72),rgba(16,7,36,0.78));
  border:1px solid var(--line);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.03), 0 10px 30px rgba(0,0,0,0.4);
  overflow:hidden;
}
.kpi::before{ /* top neon edge */
  content:"";position:absolute;left:0;right:0;top:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--c,#ff2d95),transparent);
  box-shadow:0 0 10px var(--c,#ff2d95);
}
.kpi .label{
  font-family:'Orbitron',sans-serif;font-size:10.5px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:var(--dim);
  display:flex;align-items:center;gap:8px;min-width:0;
}
.kpi .label .ic{flex:0 0 auto;color:var(--c,#ff2d95);filter:drop-shadow(0 0 6px var(--c,#ff2d95))}
.kpi .label span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.kpi .val{
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(28px,3vw,38px);line-height:1;margin:10px 0 8px;
  color:var(--c,#ff2d95);
  text-shadow:0 0 16px var(--c,#ff2d95), 0 0 2px rgba(255,255,255,0.5);
  letter-spacing:.01em;
}
.kpi .val small{font-size:.5em;font-weight:700;opacity:.85;margin-left:2px}
.kpi .delta{
  display:inline-flex;align-items:center;gap:5px;
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:999px;
}
.delta.up{color:#9cffd0;background:rgba(45,226,134,0.12);border:1px solid rgba(45,226,134,0.4)}
.delta.down{color:#ffb0c8;background:rgba(255,45,149,0.12);border:1px solid rgba(255,45,149,0.4)}
.delta.flat{color:var(--dim);background:rgba(181,154,214,0.1);border:1px solid rgba(181,154,214,0.3)}
.kpi .vs{color:var(--dim);font-size:11px;margin-left:8px;letter-spacing:.01em}

/* ---------- main grid: chart | side ---------- */
.main{
  display:grid;
  grid-template-columns:minmax(0,1.7fr) minmax(0,1fr);
  gap:14px;
}
.panel{
  position:relative;min-width:0;
  border-radius:16px;
  background:linear-gradient(180deg,rgba(40,18,74,0.6),rgba(13,6,32,0.72));
  border:1px solid var(--line);
  box-shadow:0 14px 40px rgba(0,0,0,0.45), inset 0 0 0 1px rgba(255,255,255,0.03);
  backdrop-filter:blur(8px);
  padding:16px clamp(14px,2vw,20px);
  overflow:hidden;
}
.panel-h{
  display:flex;align-items:baseline;justify-content:space-between;gap:12px;
  margin-bottom:12px;min-width:0;
}
.panel-h h2{
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:14px;
  letter-spacing:.1em;text-transform:uppercase;margin:0;
  color:var(--ink);flex:1 1 auto;min-width:0;
  overflow-wrap:anywhere;word-break:break-word;hyphens:auto;
}
.panel-h .tag{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:.12em;
  color:var(--cyan);text-shadow:var(--glow-cy);white-space:nowrap;flex:0 0 auto}

/* synthwave trend chart */
.chartbox{position:relative;width:100%}
.chart{display:block;width:100%;height:auto}
.legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;min-width:0}
.legend i{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--dim);min-width:0}
.legend i b{display:inline-block;width:18px;height:3px;border-radius:2px;flex:0 0 auto}

.col-side{display:flex;flex-direction:column;gap:14px;min-width:0}

/* donut split (Voice vs LINE) */
.donutwrap{display:flex;align-items:center;gap:16px;min-width:0;flex-wrap:wrap}
.donut{flex:0 0 auto;width:128px;height:128px;position:relative}
.donut svg{width:128px;height:128px;display:block}
.donut .center{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
}
.donut .center .n{font-family:'Orbitron',sans-serif;font-weight:900;font-size:24px;
  color:var(--cyan);text-shadow:var(--glow-cy);line-height:1}
.donut .center .t{font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;margin-top:3px}
.splitlist{flex:1 1 140px;min-width:0;display:flex;flex-direction:column;gap:10px}
.splitrow{min-width:0}
.splitrow .top{display:flex;justify-content:space-between;gap:8px;font-size:12.5px;min-width:0}
.splitrow .top .nm{display:inline-flex;align-items:center;gap:7px;min-width:0;overflow:hidden}
.splitrow .top .nm b{width:9px;height:9px;border-radius:2px;flex:0 0 auto}
.splitrow .top .nm span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.splitrow .top .pc{font-family:'Orbitron',sans-serif;font-weight:700;flex:0 0 auto}
.bar{height:7px;border-radius:4px;background:rgba(255,255,255,0.06);margin-top:6px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:4px}

/* handoff "needs a look" list */
.handoff{display:flex;flex-direction:column;gap:9px}
.hrow{
  display:flex;align-items:center;gap:11px;min-width:0;
  padding:10px 12px;border-radius:11px;
  background:rgba(20,8,42,0.55);
  border:1px solid rgba(255,45,149,0.16);
}
.hrow .pri{flex:0 0 auto;width:8px;height:34px;border-radius:3px}
.hbody{min-width:0;flex:1 1 auto}
.hbody .line1{display:flex;align-items:center;gap:8px;min-width:0}
.hbody .nm{font-weight:700;font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.hbody .reason{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;margin-top:2px}
.badge{
  flex:0 0 auto;font-family:'Orbitron',sans-serif;font-size:9.5px;font-weight:700;
  letter-spacing:.08em;padding:3px 8px;border-radius:999px;white-space:nowrap;
  border:1px solid currentColor;
}
.b-wait{color:var(--orange)}
.b-vip{color:var(--mag)}
.b-fail{color:#ff6b6b}
.b-new{color:var(--cyan)}
.hrow .when{flex:0 0 auto;font-family:'Orbitron',sans-serif;font-size:11px;color:var(--dim);white-space:nowrap}

/* today's AI highlights: compact neon stat rows (on-brand owner readout) */
.hlist{display:flex;flex-direction:column;gap:9px}
.hl{
  display:flex;align-items:center;gap:11px;min-width:0;
  padding:10px 12px;border-radius:11px;
  background:rgba(20,8,42,0.55);
  border:1px solid rgba(255,45,149,0.16);
}
.hl-ic{
  flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;
  width:30px;height:30px;border-radius:9px;
  color:var(--c,#ff2d95);
  background:color-mix(in srgb,var(--c,#ff2d95) 16%,transparent);
  border:1px solid color-mix(in srgb,var(--c,#ff2d95) 45%,transparent);
  filter:drop-shadow(0 0 6px var(--c,#ff2d95));
}
.hl-label{
  flex:1 1 auto;min-width:0;font-size:12.5px;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.hl-val{
  flex:0 0 auto;font-family:'Orbitron',sans-serif;font-weight:900;font-size:18px;
  color:var(--c,#ff2d95);text-shadow:0 0 12px var(--c,#ff2d95);white-space:nowrap;
}
.hl-val small{font-family:'Sarabun',sans-serif;font-weight:600;font-size:11px;
  color:var(--dim);margin-left:5px;text-shadow:none}

.foot{
  margin-top:18px;display:flex;flex-wrap:wrap;gap:10px 18px;
  align-items:center;justify-content:space-between;min-width:0;
  font-size:11.5px;color:var(--dim);
}
.foot .pill{font-family:'Orbitron',sans-serif;letter-spacing:.1em;font-size:10px;
  border:1px solid var(--line);border-radius:999px;padding:5px 11px;white-space:nowrap}

:focus-visible{outline:2px solid var(--cyan);outline-offset:3px;border-radius:6px}

/* ---------- responsive ---------- */
@media(max-width:1080px){
  .main{grid-template-columns:minmax(0,1fr)}
  .kpis{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media(max-width:640px){
  .wrap{padding:18px 14px 48px}
  .topbar{flex-direction:column;align-items:stretch}
  .statuschip{justify-content:flex-start}
  .kpis{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
  .kpi .val{font-size:26px}
  .grid-lane{height:44vh}
  .sun{top:30%}
  .donutwrap{justify-content:center}
}
@media(max-width:380px){
  .kpis{grid-template-columns:minmax(0,1fr)}
}

/* ---------- reduced motion: freeze everything, show final state ---------- */
@media(prefers-reduced-motion:reduce){
  .grid-floor .rungs{animation:none}
  .chip .dot{animation:none}
  *{animation-duration:0s !important;transition:none !important}
}
</style>
</head>

<!-- fixed synthwave stage -->

  <div class="sun"></div>

      </div>
      <div class="chartbox">
        <svg class="chart" id="chart" viewBox="0 0 720 300" preserveAspectRatio="xMidYMid meet" role="img" aria-label="กราฟเส้นแสดงสายเข้าและการจองรายชั่วโมง"></svg>
      </div>
      <div class="legend">
        <i><b style="background:#2de2e6;box-shadow:0 0 8px #2de2e6"></b>สายเข้า</i>
        <i><b style="background:#ff2d95;box-shadow:0 0 8px #ff2d95"></b>การจอง</i>
      </div>
    </div>

    <!-- side column -->
    <div class="col-side">

      <!-- Voice vs LINE donut -->
      <div class="panel">
        <div class="panel-h"><h2>ช่องทางติดต่อ</h2><span class="tag">VOICE / LINE</span></div>
        <div class="donutwrap">
          <div class="donut">
            <svg viewBox="0 0 120 120" id="donut" role="img" aria-label="สัดส่วนช่องทาง Voice และ LINE"></svg>
            <div class="center">
              <span class="n" id="donut-n"></span>
              <span class="t">สายทั้งหมด</span>
            </div>
          </div>
          <div class="splitlist" id="splitlist"></div>
        </div>
      </div>

      <!-- today's AI highlights -->
      <div class="panel hl-panel">
        <div class="panel-h"><h2 id="hl-title"></h2><span class="tag" id="hl-tag"></span></div>
        <div class="hlist" id="hlist"></div>
      </div>

    </div>
  </section>

  <!-- handoff list (full width) -->
  <section class="panel" style="margin-top:14px">
    <div class="panel-h">
      <h2>ต้องให้คนดู - คิวส่งต่อ</h2>
      <span class="tag" id="handoff-count"></span>
    </div>
    <div class="handoff" id="handoff"></div>
  </section>

  <footer class="foot">
    <div class="statuschip" id="foot-pills" style="justify-content:flex-start"></div>
    <span id="foot-note"></span>
  </footer>

</main>

<!-- ===================== RENDER ===================== -->
<script>
(function(){
  const $ = (s,r=document)=>r.querySelector(s);
  const esc = s => String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const NS = "http://www.w3.org/2000/svg";
  const el = (t,a={})=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};

  /* ---- icons (inline svg paths, 24-box) ---- */
  const ICON = {
    phone:'<path d="M6.6 10.8a14 14 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.25 11 11 0 0 0 3.5.56 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11 11 0 0 0 .56 3.5 1 1 0 0 1-.25 1z"/>',
    cal:'<path d="M7 2v2M17 2v2M3 8h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
    bot:'<path d="M12 3v3M8 9h8a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3v-4a3 3 0 0 1 3-3zM9.5 14h.01M14.5 14h.01" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
    bolt:'<path d="M13 2 4 14h6l-1 8 9-12h-6z"/>',
    moon:'<path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5z"/>',
  };
  const D = DATA;

  /* ---- synthwave perspective grid floor (vanishing point at top center) ---- */
  (function gridFloor(){
    const svg=$('#gridsvg'), W=1000, H=560;
    const vpx=W/2, vpy=-30;            // vanishing point above the box (horizon at y=0)
    const defs=el('defs');
    defs.innerHTML=
      `<linearGradient id="gv" x1="0" y1="0" x2="0" y2="1">
         <stop offset="0" stop-color="#2de2e6" stop-opacity="0.05"/>
         <stop offset="0.4" stop-color="#2de2e6" stop-opacity="0.55"/>
         <stop offset="1" stop-color="#ff2d95" stop-opacity="0.85"/>
       </linearGradient>
       <filter id="gg" x="-10%" y="-10%" width="120%" height="120%">
         <feGaussianBlur stdDeviation="1.4"/></filter>`;
    svg.appendChild(defs);
    // horizon glow line
    svg.appendChild(el('rect',{x:0,y:0,width:W,height:2,fill:"#2de2e6",opacity:0.7,filter:"url(#gg)"}));
    // converging verticals (rails) from horizon to the bottom edge, fanned wide
    const g=el('g',{stroke:"url(#gv)","stroke-width":2,fill:"none",filter:"url(#gg)"});
    const rails=17, spread=2.7;        // spread > 1 fans the base beyond the box edges
    for(let i=0;i<=rails;i++){
      const t=i/rails;                  // 0..1 across
      const baseX=(t*spread - (spread-1)/2)*W;   // wide base, clipped by the lane
      g.appendChild(el('line',{x1:vpx,y1:0,x2:baseX,y2:H}));
    }
    svg.appendChild(g);
    // horizontal rungs, spaced by perspective (closer near horizon), animated group
    const rg=el('g',{class:"rungs",stroke:"url(#gv)","stroke-width":2,fill:"none",filter:"url(#gg)"});
    const rungs=14;
    for(let i=1;i<=rungs;i++){
      const t=i/rungs;
      const y=Math.pow(t,2.1)*H;        // ease so lines bunch toward the horizon
      rg.appendChild(el('line',{x1:0,y1:y,x2:W,y2:y}));
    }
    // one extra rung below the box so the scroll-loop has no visible gap
    rg.appendChild(el('line',{x1:0,y1:H+34,x2:W,y2:H+34}));
    svg.appendChild(rg);
  })();

  /* brand */
  $('#kicker').textContent = D.brand.kicker;
  $('#title').textContent  = D.brand.title;
  $('#sub').textContent    = D.brand.sub;
  $('#statuschip').innerHTML = D.brand.status.map(s=>
    `<span class="chip"><span class="dot"></span>${esc(s.label)} <b>${esc(s.value)}</b></span>`).join('');

  /* KPIs */
  $('#kpis').innerHTML = D.kpis.map(k=>{
    const cls = k.dir==='up'?'up':k.dir==='down'?'down':'flat';
    const arrow = k.dir==='up'?'&#9650;':k.dir==='down'?'&#9660;':'&#9644;';
    return `<article class="kpi" style="--c:${esc(k.color)}">
      <div class="label"><svg class="ic" width="15" height="15" viewBox="0 0 24 24" fill="currentColor">${ICON[k.icon]||''}</svg><span>${esc(k.label)}</span></div>
      <div class="val">${esc(k.value)}<small>${esc(k.unit||'')}</small></div>
      <div><span class="delta ${cls}">${arrow} ${esc(k.delta)}</span><span class="vs">${esc(k.vs)}</span></div>
    </article>`;
  }).join('');

  /* peak note + handoff count + footer */
  $('#peaknote').textContent = D.trend.peakNote;
  $('#handoff-count').textContent = D.handoff.length + " รายการ";
  $('#foot-pills').innerHTML = D.footer.pills.map(p=>`<span class="chip">${esc(p)}</span>`).join('');
  $('#foot-note').textContent = D.footer.note;

  /* today's highlights (replaces old photo accent) */
  $('#hl-title').textContent = D.highlights.title;
  $('#hl-tag').textContent   = D.highlights.tag;
  $('#hlist').innerHTML = D.highlights.rows.map(r=>
    `<div class="hl" style="--c:${esc(r.color)}">
       <span class="hl-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">${ICON[r.icon]||''}</svg></span>
       <span class="hl-label">${esc(r.label)}</span>
       <span class="hl-val">${esc(r.value)}<small>${esc(r.unit||'')}</small></span>
     </div>`).join('');

  /* ---- synthwave trend chart ---- */
  (function chart(){
    const svg = $('#chart');
    const W=720,H=300, padL=44,padR=16,padT=18,padB=34;
    const iw=W-padL-padR, ih=H-padT-padB;
    const t=D.trend, n=t.labels.length;
    const X=i=> padL + (n<=1?0:(i/(n-1))*iw);
    const Y=v=> padT + (1-v)*ih;

    // defs: glow filter + gradients
    const defs=el('defs');
    defs.innerHTML =
      `<filter id="ng" x="-30%" y="-30%" width="160%" height="160%">
         <feGaussianBlur stdDeviation="4.5" result="b"/>
         <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
       </filter>
       <linearGradient id="fillCalls" x1="0" y1="0" x2="0" y2="1">
         <stop offset="0" stop-color="#2de2e6" stop-opacity="0.34"/>
         <stop offset="1" stop-color="#2de2e6" stop-opacity="0"/>
       </linearGradient>
       <linearGradient id="fillBook" x1="0" y1="0" x2="0" y2="1">
         <stop offset="0" stop-color="#ff2d95" stop-opacity="0.30"/>
         <stop offset="1" stop-color="#ff2d95" stop-opacity="0"/>
       </linearGradient>`;
    svg.appendChild(defs);

    // horizon gridlines (cyan, fading) - the chart sits "over the grid"
    for(let g=0; g<=4; g++){
      const yy = padT + (g/4)*ih;
      svg.appendChild(el('line',{x1:padL,y1:yy,x2:W-padR,y2:yy,
        stroke:"rgba(45,226,230,0.16)","stroke-width":1}));
      svg.appendChild(el('text',{x:padL-8,y:yy+4,"text-anchor":"end",
        fill:"#c0a6e6","font-size":11,"font-family":"Orbitron, sans-serif"})).textContent = (100-g*25);
    }
    // perspective verticals (subtle, magenta) receding feel
    t.labels.forEach((lb,i)=>{
      const x=X(i);
      svg.appendChild(el('line',{x1:x,y1:padT,x2:x,y2:padT+ih,
        stroke:"rgba(255,45,149,0.07)","stroke-width":1}));
      svg.appendChild(el('text',{x:x,y:H-12,"text-anchor":"middle",
        fill:"#c0a6e6","font-size":11,"font-family":"Orbitron, sans-serif"})).textContent = lb;
    });

    function path(arr,close){
      let d="";
      arr.forEach((v,i)=>{ d += (i?` L`:`M`)+` ${X(i).toFixed(1)} ${Y(v).toFixed(1)}`; });
      if(close) d += ` L ${X(n-1).toFixed(1)} ${(padT+ih).toFixed(1)} L ${X(0).toFixed(1)} ${(padT+ih).toFixed(1)} Z`;
      return d;
    }
    // area fills
    svg.appendChild(el('path',{d:path(t.calls,true),fill:"url(#fillCalls)",stroke:"none"}));
    svg.appendChild(el('path',{d:path(t.bookings,true),fill:"url(#fillBook)",stroke:"none"}));
    // glowing neon lines
    svg.appendChild(el('path',{d:path(t.calls,false),fill:"none",stroke:"#2de2e6",
      "stroke-width":2.6,"stroke-linejoin":"round","stroke-linecap":"round",filter:"url(#ng)"}));
    svg.appendChild(el('path',{d:path(t.bookings,false),fill:"none",stroke:"#ff2d95",
      "stroke-width":2.6,"stroke-linejoin":"round","stroke-linecap":"round",filter:"url(#ng)"}));
    // node dots on peaks
    [["calls","#2de2e6"],["bookings","#ff2d95"]].forEach(([key,col])=>{
      const arr=t[key]; let pi=0; arr.forEach((v,i)=>{if(v>arr[pi])pi=i;});
      svg.appendChild(el('circle',{cx:X(pi),cy:Y(arr[pi]),r:4.5,fill:col,filter:"url(#ng)"}));
      svg.appendChild(el('circle',{cx:X(pi),cy:Y(arr[pi]),r:1.8,fill:"#fff"}));
    });
  })();

  /* ---- donut (Voice vs LINE) ---- */
  (function donut(){
    const svg=$('#donut'), cx=60,cy=60,r=46,sw=15;
    const C=2*Math.PI*r;
    svg.appendChild(el('circle',{cx,cy,r,fill:"none",stroke:"rgba(255,255,255,0.07)","stroke-width":sw}));
    const defs=el('defs');
    defs.innerHTML=`<filter id="dg" x="-40%" y="-40%" width="180%" height="180%">
       <feGaussianBlur stdDeviation="2.6" result="b"/>
       <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
    svg.appendChild(defs);
    let off=0;
    D.split.segments.forEach(seg=>{
      const len=(seg.pct/100)*C;
      const c=el('circle',{cx,cy,r,fill:"none",stroke:seg.color,"stroke-width":sw,
        "stroke-dasharray":`${len} ${C-len}`,"stroke-dashoffset":-off,
        transform:`rotate(-90 ${cx} ${cy})`,"stroke-linecap":"butt",filter:"url(#dg)"});
      svg.appendChild(c);
      off += len;
    });
    $('#donut-n').textContent = D.split.total;
    $('#splitlist').innerHTML = D.split.segments.map(s=>
      `<div class="splitrow">
        <div class="top"><span class="nm"><b style="background:${esc(s.color)};box-shadow:0 0 8px ${esc(s.color)}"></b><span>${esc(s.name)}</span></span><span class="pc">${esc(s.pct)}%</span></div>
        <div class="bar"><i style="width:${esc(s.pct)}%;background:${esc(s.color)};box-shadow:0 0 8px ${esc(s.color)}"></i></div>
      </div>`).join('');
  })();

  /* ---- handoff list ---- */
  $('#handoff').innerHTML = D.handoff.map(h=>
    `<div class="hrow">
      <span class="pri" style="background:${esc(h.pri)};box-shadow:0 0 8px ${esc(h.pri)}"></span>
      <div class="hbody">
        <div class="line1">
          <span class="nm">${esc(h.name)}</span>
          <span class="badge ${esc(h.cls)}">${esc(h.badge)}</span>
        </div>
        <span class="reason">${esc(h.reason)}</span>
      </div>
      <span class="when">${esc(h.when)}</span>
    </div>`).join('');
})();
</script>
</body>
</html>
