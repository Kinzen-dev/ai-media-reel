<!-- TEMPLATE: The Atelier Lift | ARCHETYPE: ELEVATOR building-floors vertical navigation | REF: building cross-section / elevator UX, floor-selector nav | WHEN TO USE: a portfolio/case-study set where each "floor" is a self-contained chapter and the nav itself should feel architectural | SWAP: edit the FLOORS data array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Atelier Lift</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;800&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* ============================================================
     THE ATELIER LIFT - elevator / building cross-section nav
     Palette (blueprint / architectural):
       --ground   #0d1b2a  deep blueprint navy (page ground)
       --panel    #10243a  building panel fill
       --line     #2f5070  blueprint line / hatch stroke
       --paper    #e8eef4  near-white architectural label paper
       --muted    #88a4bd  dimmed label
       --accent   #ff5a3c  elevator CAR + active indicator (single accent)
       --accent2  #ffd166  floor indicator readout glow
     ============================================================ */
  :root{
    --ground:#0d1b2a; --panel:#10243a; --panel2:#0b1a2c;
    --line:#2f5070; --line-soft:#1d3450;
    --paper:#e8eef4; --muted:#88a4bd;
    --accent:#ff5a3c; --accent-d:#c93c24; --accent2:#ffd166;
    --rail:18vw;
    --ease:cubic-bezier(.76,.01,.2,1);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:var(--ground);
    color:var(--paper);
    font-family:"Space Grotesk",system-ui,sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* faint blueprint grid behind everything */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background-image:
      linear-gradient(rgba(47,80,112,.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(47,80,112,.10) 1px, transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(ellipse 120% 90% at 60% 40%, #000 50%, transparent 100%);
  }

  .app{position:fixed; inset:0; display:flex; z-index:1}

  /* =================== BUILDING CROSS-SECTION (the nav) =================== */
  .building{
    flex:0 0 var(--rail);
    min-width:240px; max-width:340px;
    height:100%;
    position:relative;
    background:linear-gradient(180deg,#0c1c2e,#0a1828);
    border-right:1px solid var(--line-soft);
    display:flex; flex-direction:column;
  }
  .building__top{
    padding:18px 18px 12px;
    border-bottom:1px dashed var(--line-soft);
  }
  .brand{
    font-family:"Archivo",sans-serif; font-weight:800;
    font-size:15px; letter-spacing:.02em; line-height:1;
  }
  .brand b{color:var(--accent)}
  .brand__sub{
    font-family:"Space Mono",monospace; font-size:10px;
    color:var(--muted); letter-spacing:.18em; text-transform:uppercase;
    margin-top:7px;
  }

  /* the shaft + floors region: an SVG diagram overlaid by clickable buttons */
  .shaft{position:relative; flex:1 1 auto; min-height:0; padding:10px 14px 16px}
  .shaftSvg{position:absolute; inset:10px 14px 16px; width:auto; height:auto}
  .shaftSvg svg{width:100%; height:100%; display:block; overflow:visible}

  .floors{
    position:relative; z-index:2;
    height:100%;
    display:flex; flex-direction:column-reverse; /* floor 1 at bottom */
    gap:0;
  }
  .floor{
    flex:1 1 0; min-height:0;
    display:flex; align-items:center; gap:11px;
    width:100%; text-align:left;
    background:transparent; border:none; cursor:pointer;
    color:var(--muted);
    padding:0 6px 0 44px; /* leave room for shaft on left */
    position:relative;
    font-family:inherit;
    transition:color .35s var(--ease);
  }
  .floor + .floor{border-bottom:1px solid var(--line-soft)} /* slab line between floors */
  .floor__num{
    font-family:"Space Mono",monospace; font-weight:700;
    font-size:12px; letter-spacing:.04em;
    color:var(--muted);
    width:30px; flex:0 0 auto;
    transition:color .35s var(--ease);
  }
  .floor__body{min-width:0}
  .floor__name{
    font-family:"Archivo",sans-serif; font-weight:600;
    font-size:13.5px; line-height:1.1; letter-spacing:.01em;
    color:#b9cbdc;
    transition:color .35s var(--ease);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .floor__tag{
    font-family:"Space Mono",monospace; font-size:9.5px;
    letter-spacing:.14em; text-transform:uppercase;
    color:var(--muted); margin-top:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .floor:hover .floor__name{color:#fff}
  .floor:hover .floor__num{color:var(--paper)}
  .floor.is-active .floor__name{color:#fff}
  .floor.is-active .floor__num{color:var(--accent)}
  .floor.is-active .floor__tag{color:var(--accent2)}
  .floor:focus-visible{outline:none}
  .floor:focus-visible .floor__name{
    color:#fff;
    text-decoration:underline; text-underline-offset:3px;
    text-decoration-color:var(--accent2);
  }

  .building__foot{
    padding:11px 18px 16px;
    border-top:1px dashed var(--line-soft);
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  .indicator{
    font-family:"Space Mono",monospace;
    display:flex; align-items:center; gap:8px;
  }
  .indicator__chev{display:flex; flex-direction:column; line-height:.5; font-size:9px; color:var(--muted)}
  .indicator__readout{
    background:#06101c; border:1px solid var(--line-soft);
    border-radius:5px; padding:4px 9px;
    color:var(--accent2);
    font-weight:700; font-size:18px; letter-spacing:.05em;
    box-shadow:inset 0 0 12px rgba(255,209,102,.18), 0 0 0 1px rgba(255,209,102,.06);
    min-width:46px; text-align:center;
  }
  .lift-btns{display:flex; flex-direction:column; gap:6px}
  .lift-btn{
    width:26px; height:22px; border-radius:5px;
    background:var(--panel); border:1px solid var(--line-soft);
    color:var(--muted); cursor:pointer;
    display:grid; place-items:center;
    transition:.2s var(--ease);
  }
  .lift-btn:hover{color:var(--accent); border-color:var(--accent)}
  .lift-btn:focus-visible{outline:2px solid var(--accent2); outline-offset:2px}
  .lift-btn svg{width:11px; height:11px}

  /* =================== FLOOR CONTENT (right side) =================== */
  .deck{
    flex:1 1 auto; min-width:0; position:relative;
    overflow:hidden;
  }
  .floorView{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    padding:clamp(22px,3.4vw,52px) clamp(22px,3.6vw,60px);
    opacity:0; visibility:hidden;
    transform:translateY(var(--enter,26px));
    transition:opacity .5s var(--ease), transform .55s var(--ease), visibility .55s;
    pointer-events:none;
  }
  .floorView.is-current{
    opacity:1; visibility:visible; transform:translateY(0);
    pointer-events:auto;
    transition-delay:.06s;
  }
  .fv__head{
    display:flex; align-items:flex-end; justify-content:space-between;
    gap:24px; flex-wrap:wrap;
    border-bottom:1px solid var(--line-soft);
    padding-bottom:16px; margin-bottom:clamp(16px,2vw,26px);
  }
  .fv__floorlabel{
    font-family:"Space Mono",monospace; font-size:11px;
    letter-spacing:.22em; text-transform:uppercase; color:var(--accent2);
    display:flex; align-items:center; gap:9px;
  }
  .fv__floorlabel .dot{width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 10px var(--accent)}
  .fv__title{
    font-family:"Archivo",sans-serif; font-weight:800;
    font-size:clamp(28px,4.6vw,58px); line-height:.98; letter-spacing:-.02em;
    margin-top:10px;
  }
  .fv__title em{font-style:normal; color:var(--accent)}
  .fv__meta{
    text-align:right; font-family:"Space Mono",monospace;
    font-size:11px; color:var(--muted); letter-spacing:.06em; line-height:1.7;
    min-width:140px;
  }
  .fv__meta b{color:var(--paper); font-weight:700}

  .fv__body{flex:1 1 auto; min-height:0; display:grid; gap:clamp(16px,2vw,26px)}
  /* default layout: media stage + side notes */
  .fv__grid{
    display:grid; gap:clamp(14px,1.8vw,24px);
    grid-template-columns:minmax(0,1.55fr) minmax(0,1fr);
    min-height:0;
  }
  .stage{
    position:relative; border-radius:14px; overflow:hidden;
    background:var(--panel2); border:1px solid var(--line-soft);
    min-height:0;
  }
  .stage::after{ /* corner blueprint ticks */
    content:""; position:absolute; inset:8px; pointer-events:none;
    border:1px dashed rgba(232,238,244,.12); border-radius:8px;
  }
  /* LANDSCAPE media: contain via object-fit so a wide asset never crops weird */
  .stage img,.stage video{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .stage--contain{background:#06101c}
  .stage--contain img,.stage--contain video{object-fit:contain}
  .stage__cap{
    position:absolute; left:12px; bottom:12px; right:12px; z-index:3;
    font-family:"Space Mono",monospace; font-size:10.5px; letter-spacing:.08em;
    color:#cfe; text-shadow:0 1px 6px #000;
    display:flex; align-items:center; gap:8px;
    background:linear-gradient(transparent, rgba(6,16,28,.0));
  }
  .stage__cap .pip{padding:2px 7px; border-radius:20px; background:rgba(255,90,60,.9); color:#fff; font-weight:700; letter-spacing:.1em}
  .playbadge{
    position:absolute; top:12px; right:12px; z-index:4;
    font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.1em;
    color:#06101c; background:var(--accent2); padding:3px 9px; border-radius:20px; font-weight:700;
  }

  .sidecol{display:flex; flex-direction:column; gap:clamp(12px,1.6vw,18px); min-height:0}
  .note{
    background:var(--panel); border:1px solid var(--line-soft);
    border-radius:12px; padding:16px 17px;
  }
  .note h4{
    font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.18em;
    text-transform:uppercase; color:var(--accent2); margin-bottom:9px;
  }
  .note p{font-size:14px; line-height:1.55; color:#cdd9e5}
  .specs{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .spec{
    background:var(--panel); border:1px solid var(--line-soft);
    border-radius:11px; padding:13px 14px;
  }
  .spec .k{font-family:"Space Mono",monospace; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted)}
  .spec .v{font-family:"Archivo",sans-serif; font-weight:700; font-size:21px; margin-top:5px; color:#fff}
  .spec .v small{font-size:12px; color:var(--muted); font-weight:500}

  /* thumbnail strip variant (lobby floor) */
  .thumbs{display:grid; grid-template-columns:repeat(2,1fr); gap:clamp(12px,1.6vw,20px); min-height:0}
  .thumb{
    position:relative; border-radius:13px; overflow:hidden;
    border:1px solid var(--line-soft); background:var(--panel2);
    aspect-ratio:16/10; min-height:0;
  }
  .thumb img,.thumb video{width:100%; height:100%; object-fit:cover; display:block; transition:transform .6s var(--ease)}
  .thumb:hover img,.thumb:hover video{transform:scale(1.05)}
  .thumb__lab{
    position:absolute; left:11px; bottom:10px; right:11px; z-index:2;
    font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.05em;
    color:#fff; text-shadow:0 1px 6px #000;
  }
  .thumb__lab .t{font-family:"Archivo",sans-serif; font-weight:700; font-size:14px; display:block}
  .thumb__grad{position:absolute; inset:0; background:linear-gradient(transparent 45%, rgba(6,16,28,.82)); z-index:1}

  /* audio floor */
  .audioRow{
    display:flex; align-items:center; gap:16px;
    background:var(--panel); border:1px solid var(--line-soft);
    border-radius:13px; padding:14px 16px;
  }
  .audioRow .wf{flex:1 1 auto; min-width:0; height:54px; border-radius:8px; overflow:hidden; background:#06101c; border:1px solid var(--line-soft)}
  .audioRow .wf img{width:100%; height:100%; object-fit:cover; display:block; opacity:.92; filter:hue-rotate(165deg) saturate(1.2) brightness(1.1)}
  .audioRow .meta{flex:0 0 auto}
  .audioRow .meta .t{font-family:"Archivo",sans-serif; font-weight:700; font-size:15px}
  .audioRow .meta .s{font-family:"Space Mono",monospace; font-size:10px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-top:3px}
  .playbtn{
    flex:0 0 auto; width:44px; height:44px; border-radius:50%;
    background:var(--accent); border:none; color:#fff; cursor:pointer;
    display:grid; place-items:center; box-shadow:0 6px 18px rgba(255,90,60,.4);
    transition:.2s var(--ease);
  }
  .playbtn:hover{transform:scale(1.07)}
  .playbtn:focus-visible{outline:2px solid var(--accent2); outline-offset:3px}
  .playbtn svg{width:16px; height:16px}

  .fv__foot{
    margin-top:auto; padding-top:14px;
    display:flex; align-items:center; gap:14px; flex-wrap:wrap;
    font-family:"Space Mono",monospace; font-size:11px; color:var(--muted); letter-spacing:.05em;
  }
  .fv__foot .cta{
    font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:13px; letter-spacing:.02em;
    color:#fff; text-decoration:none;
    background:var(--accent); padding:10px 18px; border-radius:9px;
    transition:.2s var(--ease);
  }
  .fv__foot .cta:hover{background:var(--accent-d)}
  .fv__foot .cta:focus-visible{outline:2px solid var(--accent2); outline-offset:3px}
  .fv__foot .arrows{margin-left:auto; opacity:.8}

  /* =================== MOBILE: collapse to top floor-strip =================== */
  .stripWrap{display:none}
  @media (max-width:860px){
    body{overflow:auto}
    .app{position:relative; flex-direction:column; min-height:100vh}
    .building{display:none}
    .stripWrap{
      display:block; position:sticky; top:0; z-index:30;
      background:linear-gradient(180deg,#0b1a2c,#0a1726);
      border-bottom:1px solid var(--line-soft);
      box-shadow:0 8px 24px rgba(0,0,0,.4);
    }
    .stripHead{display:flex; align-items:center; justify-content:space-between; padding:11px 15px 6px}
    .stripHead .brand{font-size:14px}
    .stripReadout{
      font-family:"Space Mono",monospace; font-weight:700; font-size:15px;
      color:var(--accent2); background:#06101c; border:1px solid var(--line-soft);
      padding:3px 11px; border-radius:6px; letter-spacing:.05em;
    }
    .strip{
      display:flex; gap:8px; overflow-x:auto; padding:6px 15px 12px;
      scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    .strip::-webkit-scrollbar{display:none}
    .sbtn{
      scroll-snap-align:center; flex:0 0 auto;
      display:flex; align-items:center; gap:8px;
      background:var(--panel); border:1px solid var(--line-soft);
      border-radius:9px; padding:8px 12px; cursor:pointer;
      color:#b9cbdc; font-family:inherit;
      transition:.25s var(--ease);
    }
    .sbtn .n{font-family:"Space Mono",monospace; font-weight:700; font-size:12px; color:var(--muted)}
    .sbtn .nm{font-family:"Archivo",sans-serif; font-weight:600; font-size:13px; white-space:nowrap}
    .sbtn.is-active{border-color:var(--accent); background:rgba(255,90,60,.14)}
    .sbtn.is-active .n{color:var(--accent)}
    .sbtn.is-active .nm{color:#fff}
    .sbtn:focus-visible{outline:2px solid var(--accent2); outline-offset:2px}

    .deck{position:relative; overflow:visible}
    .floorView{
      position:relative; inset:auto; opacity:1; visibility:visible; transform:none;
      pointer-events:auto; display:none; padding:18px 16px 30px;
    }
    .floorView.is-current{display:flex; transform:none}
    .fv__grid{grid-template-columns:1fr}
    .thumbs{grid-template-columns:1fr}
    .fv__head{flex-direction:column; align-items:flex-start; gap:8px}
    .fv__meta{text-align:left; min-width:0}
    /* landscape assets letterboxed on phone, never portrait-cropped */
    .stage{min-height:200px; aspect-ratio:16/9}
    .stage img,.stage video{object-fit:contain; background:#06101c}
    .specs{grid-template-columns:1fr 1fr}
    .audioRow{flex-wrap:wrap}
    .audioRow .wf{flex-basis:100%; order:3}
  }
  /* phones (<=640px): hard guarantee that NO landscape asset cover-crops.
     Every media surface is letterboxed (contain) on its own dark plate. */
  @media (max-width:640px){
    .stage{min-height:190px; aspect-ratio:16/9; background:#06101c}
    .stage img,.stage video{object-fit:contain}
    .thumb{aspect-ratio:16/9; background:#06101c}
    .thumb img,.thumb video{object-fit:contain}
  }
  @media (max-width:420px){
    .specs{grid-template-columns:1fr}
    .fv__title{font-size:30px}
  }

  /* reduced motion: car jumps instantly, no view slide */
  @media (prefers-reduced-motion:reduce){
    *{transition-duration:.001ms !important; animation-duration:.001ms !important}
    .floorView{transform:none !important}
  }
</style>
</head>
<body>

<div class="app" id="app">

  <!-- ===== MOBILE FLOOR-STRIP (horizontal) ===== -->
  <div class="stripWrap" aria-hidden="false">
    <div class="stripHead">
      <div class="brand">THE ATELIER <b>LIFT</b></div>
      <div class="stripReadout" id="stripReadout">G</div>

    <div class="strip" id="strip" role="tablist" aria-label="Floor selector"></div>

  <!-- ===== BUILDING CROSS-SECTION (desktop nav) ===== -->
  <nav class="building" aria-label="Building floor navigation">
    <div class="building__top">
      <div class="brand">THE ATELIER <b>LIFT</b></div>
      <div class="brand__sub">Cross-section nav</div>
    </div>

    <div class="shaft">
      <!-- blueprint diagram: shaft, cables, hatched floors, elevator car -->
      <div class="shaftSvg" aria-hidden="true">
        <svg viewBox="0 0 120 600" preserveAspectRatio="none" id="bpsvg">
          <defs>
            <pattern id="hatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
              <line x1="0" y1="0" x2="0" y2="7" stroke="#2f5070" stroke-width="1" opacity="0.5"/>
            </pattern>
            <linearGradient id="carGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#ff6a4d"/>
              <stop offset="1" stop-color="#c93c24"/>
            </linearGradient>
          </defs>
          <!-- outer wall -->
          <rect x="2" y="2" width="116" height="596" fill="none" stroke="#2f5070" stroke-width="1.4"/>
          <!-- ground hatch under building -->
          <rect x="2" y="588" width="116" height="10" fill="url(#hatch)"/>
          <!-- elevator shaft -->
          <rect x="14" y="6" width="34" height="586" fill="#08131f" stroke="#1d3450" stroke-width="1"/>
          <!-- hoist cables -->
          <line x1="25" y1="6" x2="25" y2="592" stroke="#1d3450" stroke-width="1"/>
          <line x1="37" y1="6" x2="37" y2="592" stroke="#1d3450" stroke-width="1"/>
          <!-- slab lines (5 floors) -->
          <g id="slabs" stroke="#2f5070" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"></g>
          <!-- room hatch on the right side of each floor -->
          <rect x="52" y="6" width="62" height="586" fill="url(#hatch)" opacity="0.35"/>
          <!-- elevator CAR (moves) -->
          <g id="car">
            <rect x="16" y="0" width="30" height="0" rx="2" fill="url(#carGrad)" stroke="#ffd166" stroke-width="1.2"/>
            <line id="carDoor" x1="31" y1="0" x2="31" y2="0" stroke="#7a1f10" stroke-width="1.2"/>
          </g>
          <!-- car position tick on shaft -->
          <circle id="carTick" cx="9" cy="0" r="3.4" fill="#ff5a3c"/>
        </svg>
      </div>

      <!-- clickable floor buttons aligned to the diagram (floor 1 at bottom) -->
      <div class="floors" id="floors" role="tablist" aria-orientation="vertical" aria-label="Floors"></div>
    </div>

    <div class="building__foot">
      <div class="indicator" title="Current floor">
        <span class="indicator__chev" id="dirChev"><span>&#9650;</span><span>&#9660;</span></span>
        <span class="indicator__readout" id="readout">G</span>
      </div>
      <div class="lift-btns">
        <button class="lift-btn" id="upBtn" aria-label="Lift up">
          <svg viewBox="0 0 12 12" fill="none"><path d="M6 2.5 10 8H2z" fill="currentColor"/></svg>
        </button>
        <button class="lift-btn" id="downBtn" aria-label="Lift down">
          <svg viewBox="0 0 12 12" fill="none"><path d="M6 9.5 2 4h8z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== FLOOR CONTENT DECK ===== -->
  <main class="deck" id="deck" aria-live="polite"></main>

</div>

<script>
(function(){
  "use strict";
  const reduce = window.matchMedia("(prefers-reduced-motion:reduce)").matches;
  const N = FLOORS.length;
  let current = 0;

  const deck = document.getElementById("deck");
  const floorsEl = document.getElementById("floors");
  const stripEl = document.getElementById("strip");
  const readout = document.getElementById("readout");
  const stripReadout = document.getElementById("stripReadout");
  const dirChev = document.getElementById("dirChev");

  const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
  const floorCode = i => i === 0 ? "G" : String(i+1).padStart(2,"0");
  const titleHTML = arr => arr.map((seg,i)=> i%2 ? `<em>${esc(seg)}</em>` : esc(seg)).join("");

  /* ---------- build floor view (right side) ---------- */
  function mediaStage(m){
    const contain = m.contain ? " stage--contain" : "";
    if(m.type === "video"){
      const audio = m.hasAudio ? `<span class="playbadge">TAP FOR SOUND</span>` : "";
      return `<div class="stage${contain}" data-stage>
        ${audio}
        <video data-vid muted loop playsinline preload="metadata" poster="${esc(m.poster)}" ${m.hasAudio?'data-audio="1"':''}>
          <source src="${esc(m.src)}" type="video/mp4">
        </video>
        <div class="stage__cap"><span class="pip">${esc(m.pip)}</span>${esc(m.cap)}</div>
      </div>`;
    }
    return `<div class="stage${contain}">
      <img src="${esc(m.src)}" alt="${esc(m.cap)}" loading="lazy" decoding="async">
      <div class="stage__cap"><span class="pip">${esc(m.pip)}</span>${esc(m.cap)}</div>
    </div>`;
  }
  function specsHTML(specs){
    return `<div class="specs">${specs.map(s=>`
      <div class="spec"><div class="k">${esc(s.k)}</div><div class="v">${esc(s.v)}${s.s?`<small>${esc(s.s)}</small>`:""}</div></div>`).join("")}</div>`;
  }
  function headHTML(f){
    return `<div class="fv__head">
      <div>
        <div class="fv__floorlabel"><span class="dot"></span>${esc(f.floorLabel)}</div>
        <h1 class="fv__title">${titleHTML(f.title)}</h1>
      </div>
      <div class="fv__meta">${f.meta.map((m,i)=> i===0?`<b>${esc(m)}</b>`:esc(m)).join("<br>")}</div>
    </div>`;
  }
  function footHTML(f, idx){
    const next = (idx+1)%N;
    return `<div class="fv__foot">
      <span>FLOOR ${esc(floorCode(idx))} / ${esc(String(N).padStart(2,"0"))}</span>
      <a class="cta" href="#" data-goto="${next}">${esc(f.cta)}</a>
      <span class="arrows">USE &#9650; &#9660; KEYS</span>
    </div>`;
  }

  function viewHTML(f, idx){
    let body = "";
    if(f.layout === "lobby"){
      body = `<div class="fv__body">
        <div class="note"><h4>How it works</h4><p>${esc(f.intro)}</p></div>
        <div class="thumbs">${f.thumbs.map((t,k)=>`
          <button class="thumb" data-goto="${k+1}" aria-label="Open floor ${k+2}">
            ${t.type==="video"
              ? `<video data-thumbvid muted loop playsinline preload="none" poster="${esc(t.poster)}"><source src="${esc(t.src)}" type="video/mp4"></video>`
              : `<img src="${esc(t.src)}" alt="${esc(t.t)}" loading="lazy" decoding="async">`}
            <div class="thumb__grad"></div>
            <div class="thumb__lab"><span class="t">${esc(t.t)}</span>${esc(t.s)}</div>
          </button>`).join("")}
        </div>
      </div>`;
    } else if(f.layout === "audio"){
      body = `<div class="fv__body">
        <div class="note"><h4>${esc(f.note.h)}</h4><p>${esc(f.note.p)}</p></div>
        <div style="display:flex;flex-direction:column;gap:12px">
          ${f.tracks.map((t,k)=>`
          <div class="audioRow">
            <button class="playbtn" data-aplay="${k}" aria-label="Play ${esc(t.title)}">
              <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5v11l9-5.5z"/></svg>
            </button>
            <div class="meta"><div class="t">${esc(t.title)}</div><div class="s">${esc(t.sub)}</div></div>
            <div class="wf"><img src="${esc(t.wave)}" alt="" loading="lazy"></div>
            <audio data-aud="${k}" src="${esc(t.src)}" preload="none"></audio>
          </div>`).join("")}
        </div>
      </div>`;
    } else {
      body = `<div class="fv__body"><div class="fv__grid">
        ${mediaStage(f.media)}
        <div class="sidecol">
          <div class="note"><h4>${esc(f.note.h)}</h4><p>${esc(f.note.p)}</p></div>
          ${specsHTML(f.specs)}
        </div>
      </div></div>`;
    }
    return `<section class="floorView" id="view-${esc(f.id)}" data-idx="${idx}" role="tabpanel" aria-label="${esc(f.name)} floor">
      ${headHTML(f)}
      ${body}
      ${footHTML(f, idx)}
    </section>`;
  }

  /* ---------- build building cross-section buttons ---------- */
  function buildNav(){
    floorsEl.innerHTML = FLOORS.map((f,idx)=>`
      <button class="floor" data-idx="${idx}" role="tab" aria-selected="${idx===0}" id="tab-${f.id}" aria-controls="view-${f.id}">
        <span class="floor__num">${esc(floorCode(idx))}</span>
        <span class="floor__body">
          <span class="floor__name">${esc(f.name)}</span>
          <span class="floor__tag">${esc(f.tag)}</span>
        </span>
      </button>`).join("");

    stripEl.innerHTML = FLOORS.map((f,idx)=>`
      <button class="sbtn" data-idx="${idx}" role="tab" aria-selected="${idx===0}">
        <span class="n">${esc(floorCode(idx))}</span><span class="nm">${esc(f.name)}</span>
      </button>`).join("");

    deck.innerHTML = FLOORS.map((f,idx)=>viewHTML(f,idx)).join("");

    // SVG slab lines (4 dividers between 5 floors) on the room side
    const slabs = document.getElementById("slabs");
    let s = "";
    for(let i=1;i<N;i++){
      const y = 6 + (586/N)*i;
      s += `<line x1="2" y1="${y.toFixed(1)}" x2="118" y2="${y.toFixed(1)}"/>`;
    }
    slabs.innerHTML = s;
  }

  /* ---------- move elevator car in SVG ---------- */
  const carRect = () => document.querySelector("#car rect");
  const carDoor = () => document.getElementById("carDoor");
  const carTick = () => document.getElementById("carTick");
  function placeCar(idx){
    const top = 6, span = 586, fh = span/N;
    // floor 0 at bottom -> invert
    const slot = (N-1-idx);
    const yTop = top + slot*fh;
    const pad = 6;
    const r = carRect(), d = carDoor(), t = carTick();
    if(!r) return;
    const carY = yTop + pad, carH = fh - pad*2;
    const cy = carY + carH/2;
    if(reduce){
      r.setAttribute("y", carY.toFixed(1)); r.setAttribute("height", carH.toFixed(1));
      d.setAttribute("y1", carY.toFixed(1)); d.setAttribute("y2", (carY+carH).toFixed(1));
      t.setAttribute("cy", cy.toFixed(1));
    } else {
      r.style.transition = "y .6s cubic-bezier(.76,.01,.2,1), height .6s cubic-bezier(.76,.01,.2,1)";
      d.style.transition = r.style.transition;
      t.style.transition = "cy .6s cubic-bezier(.76,.01,.2,1)";
      requestAnimationFrame(()=>{
        r.setAttribute("y", carY.toFixed(1)); r.setAttribute("height", carH.toFixed(1));
        d.setAttribute("y1", carY.toFixed(1)); d.setAttribute("y2", (carY+carH).toFixed(1));
        t.setAttribute("cy", cy.toFixed(1));
      });
    }
  }

  /* ---------- media control: only current floor plays ---------- */
  function stopAllMedia(){
    deck.querySelectorAll("video[data-vid]").forEach(v=>{ try{v.pause(); v.muted=true;}catch(e){} });
    deck.querySelectorAll("audio[data-aud]").forEach(a=>{ try{a.pause(); a.currentTime=0;}catch(e){} });
    // reset audio play buttons
    deck.querySelectorAll(".playbtn[data-aplay]").forEach(b=> b.dataset.playing="0");
  }
  function playCurrentVideo(idx){
    const view = deck.querySelector(`.floorView[data-idx="${idx}"]`);
    if(!view) return;
    const v = view.querySelector("video[data-vid]");
    if(v){ v.muted = true; const p = v.play(); if(p&&p.catch) p.catch(()=>{}); }
  }

  /* ---------- go to floor ---------- */
  function go(idx, opts){
    idx = ((idx % N) + N) % N;
    const dir = idx > current ? "up" : idx < current ? "down" : "same";
    current = idx;

    // views
    deck.querySelectorAll(".floorView").forEach(v=>{
      const vi = +v.dataset.idx;
      v.classList.toggle("is-current", vi===idx);
      // set enter direction so new floor slides from the side the car came from
      v.style.setProperty("--enter", vi===idx ? (dir==="down" ? "-26px" : "26px") : "0px");
    });

    // nav active states
    floorsEl.querySelectorAll(".floor").forEach(b=>{
      const on = +b.dataset.idx===idx; b.classList.toggle("is-active", on);
      b.setAttribute("aria-selected", on); if(on) b.setAttribute("tabindex","0"); else b.setAttribute("tabindex","-1");
    });
    stripEl.querySelectorAll(".sbtn").forEach(b=>{
      const on = +b.dataset.idx===idx; b.classList.toggle("is-active", on); b.setAttribute("aria-selected", on);
    });

    // readouts
    readout.textContent = floorCode(idx);
    stripReadout.textContent = floorCode(idx);
    dirChev.innerHTML = dir==="up" ? `<span style="color:var(--accent)">&#9650;</span><span>&#9660;</span>`
                      : dir==="down" ? `<span>&#9650;</span><span style="color:var(--accent)">&#9660;</span>`
                      : `<span>&#9650;</span><span>&#9660;</span>`;

    placeCar(idx);
    stopAllMedia();
    playCurrentVideo(idx);

    // scroll active strip btn into view on mobile
    const sb = stripEl.querySelector(`.sbtn[data-idx="${idx}"]`);
    if(sb && sb.scrollIntoView) sb.scrollIntoView({inline:"center", block:"nearest", behavior: reduce?"auto":"smooth"});

    if(opts && opts.focus){
      const tab = floorsEl.querySelector(`.floor[data-idx="${idx}"]`);
      if(tab) tab.focus();
    }
  }

  /* ---------- events ---------- */
  buildNav();

  floorsEl.addEventListener("click", e=>{
    const b = e.target.closest(".floor"); if(b) go(+b.dataset.idx);
  });
  stripEl.addEventListener("click", e=>{
    const b = e.target.closest(".sbtn"); if(b) go(+b.dataset.idx);
  });
  document.getElementById("upBtn").addEventListener("click", ()=> go(current+1));
  document.getElementById("downBtn").addEventListener("click", ()=> go(current-1));

  // deck delegated: data-goto links + thumbnails + stage audio tap + audio rows
  deck.addEventListener("click", e=>{
    const goLink = e.target.closest("[data-goto]");
    if(goLink){ e.preventDefault(); go(+goLink.dataset.goto); return; }

    // tap stage to unmute avatar audio
    const stage = e.target.closest("[data-stage]");
    if(stage){
      const v = stage.querySelector("video[data-audio]");
      if(v){
        if(v.muted){ v.muted=false; v.play&&v.play().catch(()=>{}); }
        else { v.muted=true; }
        return;
      }
    }

    // audio rows (penthouse)
    const ap = e.target.closest(".playbtn[data-aplay]");
    if(ap){
      const k = ap.dataset.aplay;
      const view = ap.closest(".floorView");
      const aud = view.querySelector(`audio[data-aud="${k}"]`);
      const playing = ap.dataset.playing === "1";
      // stop siblings
      view.querySelectorAll("audio[data-aud]").forEach(a=>{ a.pause(); });
      view.querySelectorAll(".playbtn[data-aplay]").forEach(b=> b.dataset.playing="0");
      if(!playing && aud){ aud.currentTime=0; aud.play().then(()=> ap.dataset.playing="1").catch(()=>{}); }
    }
  });

  // keyboard: arrows ride the lift; home/end jump
  window.addEventListener("keydown", e=>{
    if(["INPUT","TEXTAREA"].includes((e.target.tagName||""))) return;
    if(e.key==="ArrowUp"){ e.preventDefault(); go(current+1, {focus:true}); }
    else if(e.key==="ArrowDown"){ e.preventDefault(); go(current-1, {focus:true}); }
    else if(e.key==="Home"){ e.preventDefault(); go(0, {focus:true}); }
    else if(e.key==="End"){ e.preventDefault(); go(N-1, {focus:true}); }
  });

  // pause media when tab hidden
  document.addEventListener("visibilitychange", ()=>{ if(document.hidden) stopAllMedia(); else playCurrentVideo(current); });

  // initial paint: place car after layout so SVG has size
  requestAnimationFrame(()=> requestAnimationFrame(()=> go(0)) );
  window.addEventListener("resize", ()=> placeCar(current));
})();
</script>
</body>
</html>
