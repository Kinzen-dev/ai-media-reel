<!-- TEMPLATE: Lot 01 The Evening Star | ARCHETYPE: fine-auction catalogue raisonne lot (page-turning) | REF: Sotheby's / Christie's printed lot-page typography + 2025-26 immersive maison + museum wall-label | WHEN TO USE: founder-led studio / boutique house / single-product maison that wants a collectible, fine-auction register | SWAP: edit the CATALOGUE object at top of the script -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lot 01 . The Evening Star . Vesperwerk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Space+Mono:wght@400;700&family=Noto+Serif+Thai:wght@400;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{ box-sizing:border-box; }
  figure,figcaption,h2,h3,p,ol,ul{ margin:0; }
  :root{
    --cream:#faf7f1;
    --paper:#f4eee3;
    --ink:#2e2a26;
    --ink-soft:#6a5f52;
    --gold:#a8802f;
    --gold-lt:#c09a4a;
    --gold-dk:#8a6526;
    --wall:#241f1b;
    --room:#191512;
    --cream-on-dark:#ece3d5;
    --dim-on-dark:#a9998529;
    --fx:cubic-bezier(.2,.66,.16,1);
    --serif:'Playfair Display', Georgia, 'Times New Roman', serif;
    --mono:'Space Mono', ui-monospace, 'Courier New', monospace;
    --thai:'Noto Serif Thai', 'Playfair Display', serif;
  }
  html{ background:var(--room); }
  body{
    margin:0;
    font-family:var(--serif);
    color:var(--cream-on-dark);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  /* the visible screen: pinned to the viewport, itself never scrolls. real document
     scroll happens on .scroll-track behind it; a scroll listener maps scroll position
     to the current plate and drives the same flip animation (see script, bottom). */
  .pinned-shell{
    position:fixed; inset:0; height:100dvh;
    display:flex; flex-direction:column;
    background:
      radial-gradient(120% 120% at 50% 32%, #26211c 0%, #191512 60%, #120f0c 100%);
    z-index:1;
  }
  .scroll-track{ position:relative; width:100%; z-index:0; }
  a{ color:inherit; }
  button{ font-family:inherit; color:inherit; background:none; border:none; cursor:pointer; }
  :focus-visible{ outline:2px solid var(--gold-lt); outline-offset:3px; border-radius:2px; }

  /* ------------------------------ masthead ------------------------------ */
  .masthead{
    flex:0 0 auto;
    display:flex; align-items:center; justify-content:space-between;
    gap:16px;
    padding:clamp(12px,2vh,20px) clamp(16px,4vw,40px);
    border-bottom:1px solid rgba(168,128,47,.24);
  }
  .brand{ display:flex; align-items:center; gap:12px; text-decoration:none; min-width:0; }
  .brand-star{ width:26px; height:26px; flex:0 0 auto; display:block; filter:drop-shadow(0 1px 2px rgba(0,0,0,.4)); }
  .brand-star svg{ width:100%; height:100%; display:block; }
  .brand-lines{ display:flex; flex-direction:column; min-width:0; line-height:1.05; }
  .wordmark{
    font-weight:600; letter-spacing:.24em; font-size:clamp(15px,2.1vw,19px);
    color:var(--cream-on-dark); white-space:nowrap;
  }
  .brand-sub{
    font-family:var(--mono); font-size:9px; letter-spacing:.34em; text-transform:uppercase;
    color:var(--gold-lt); opacity:.72; margin-top:3px; white-space:nowrap;
  }
  .plate-index{ display:flex; align-items:center; gap:clamp(4px,1vw,10px); flex-wrap:nowrap; }
  .pi{
    position:relative; padding:6px clamp(5px,1vw,9px);
    font-family:var(--serif); font-size:clamp(13px,1.7vw,17px); letter-spacing:.06em;
    color:rgba(236,227,213,.5); transition:color .3s ease;
  }
  .pi::after{
    content:""; position:absolute; left:50%; bottom:0; transform:translateX(-50%) scaleX(0);
    width:70%; height:2px; background:var(--gold); transition:transform .35s var(--fx); transform-origin:center;
  }
  .pi:hover{ color:var(--cream-on-dark); }
  .pi.on{ color:var(--gold-lt); }
  .pi.on::after{ transform:translateX(-50%) scaleX(1); }

  /* ------------------------------ stage ------------------------------ */
  .catalogue{
    flex:1 1 auto; min-height:0; position:relative;
    display:flex; align-items:center; justify-content:center;
    padding:clamp(10px,3vh,30px) clamp(14px,4.5vw,54px);
    perspective:2400px;
    perspective-origin:50% 44%;
  }
  .book{
    position:relative;
    width:min(94vw, 1080px);
    height:min(74vh, 648px);
    transform-style:preserve-3d;
  }
  .page{
    position:absolute; inset:0;
    transform-style:preserve-3d;
    transform-origin:left center;
    transform:rotateY(0deg);
    transition:transform .64s var(--fx);
    will-change:transform;
  }
  .page.no-anim{ transition:none !important; }
  .face{
    position:absolute; inset:0;
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    overflow:hidden;
    border-radius:3px;
  }
  .recto{
    background:var(--cream);
    color:var(--ink);
    box-shadow:
      0 26px 60px -26px rgba(0,0,0,.72),
      0 2px 0 rgba(255,255,255,.5) inset,
      -14px 0 26px -20px rgba(0,0,0,.45) inset;
  }
  .verso{
    transform:rotateY(180deg);
    background:
      radial-gradient(120% 120% at 30% 30%, #f6f0e5 0%, #ece3d3 100%);
    display:grid; place-items:center;
    box-shadow:0 26px 60px -26px rgba(0,0,0,.6);
  }
  .verso-mark{ text-align:center; opacity:.5; }
  .verso-mark .vm-star{ width:44px; height:44px; margin:0 auto 14px; display:block; opacity:.7; }
  .verso-mark .vm-star svg{ width:100%; height:100%; }
  .verso-mark span{ display:block; font-family:var(--mono); font-size:10px; letter-spacing:.4em; color:var(--gold-dk); }
  /* crease shadow during a page turn */
  .sheen{
    position:absolute; inset:0; pointer-events:none; opacity:0;
    background:linear-gradient(100deg, rgba(0,0,0,.42) 0%, rgba(0,0,0,.14) 22%, rgba(0,0,0,0) 46%);
    backface-visibility:hidden; -webkit-backface-visibility:hidden;
    z-index:5;
  }
  .page.flipping .sheen{ animation:crease .64s var(--fx); }
  @keyframes crease{ 0%{opacity:0} 42%{opacity:1} 100%{opacity:0} }

  /* ------------------------------ sheet scaffold ------------------------------ */
  .sheet{ position:absolute; inset:0; display:flex; flex-direction:column; padding:clamp(20px,3.4vw,46px); }
  .sheet-head{ flex:0 0 auto; margin-bottom:clamp(10px,1.6vh,18px); }
  .sheet-eyebrow{
    display:flex; align-items:center; gap:12px;
    font-family:var(--mono); font-size:10px; letter-spacing:.34em; text-transform:uppercase;
    color:var(--gold-dk);
  }
  .sheet-eyebrow .roman{ color:var(--gold); font-weight:700; }
  .sheet-eyebrow .er-rule{ flex:1 1 auto; height:1px; background:linear-gradient(90deg, rgba(168,128,47,.5), rgba(168,128,47,0)); min-width:0; }
  .sheet-title{
    font-family:var(--serif); font-weight:500; letter-spacing:.01em;
    font-size:clamp(26px,4.6vw,44px); line-height:1.02; margin:8px 0 0;
    color:var(--ink);
  }
  .sheet-title em{ font-style:italic; color:var(--gold-dk); }
  .sheet-body{ flex:1 1 auto; min-height:0; overflow:auto; padding-right:2px; }
  .sheet-body::-webkit-scrollbar{ width:6px; }
  .sheet-body::-webkit-scrollbar-thumb{ background:rgba(168,128,47,.4); border-radius:3px; }

  /* ------------------------------ PLATE I : the lot ------------------------------ */
  .recto.plate-lot{
    background:
      radial-gradient(120% 96% at 50% 40%, #2f2823 0%, #241f1b 46%, #171310 100%);
    color:var(--cream-on-dark);
    box-shadow:
      0 26px 60px -26px rgba(0,0,0,.8),
      0 0 0 1px rgba(168,128,47,.14) inset,
      0 2px 0 rgba(255,255,255,.05) inset,
      -14px 0 30px -18px rgba(0,0,0,.7) inset;
  }
  .plate-lot-inner{ position:relative; flex:1 1 auto; min-height:0; display:flex; flex-direction:column; justify-content:center; }
  .lot-wrap{ height:100%; display:grid; grid-template-columns:1.02fr .98fr; align-items:center; gap:clamp(18px,4vw,58px); padding:clamp(18px,3vw,40px); }
  .frame-stage{ display:flex; flex-direction:column; align-items:center; gap:clamp(14px,2.4vh,26px); min-width:0; }
  .spot{
    position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(46% 44% at 34% 42%, rgba(214,188,132,.16) 0%, rgba(214,188,132,0) 60%);
    opacity:0; transition:opacity 1.2s ease;
  }
  .frame{
    position:relative;
    width:clamp(188px, 34vmin, 318px);
    aspect-ratio:5/6;
    padding:clamp(9px,1.5vmin,15px);
    border-radius:2px;
    background:linear-gradient(140deg,#775722 0%,#c7a24f 26%,#a8802f 50%,#d4b163 74%,#7a5a24 100%);
    box-shadow:
      0 2px 1px rgba(255,240,205,.35) inset,
      0 -3px 3px rgba(0,0,0,.42) inset,
      0 30px 60px -22px rgba(0,0,0,.82),
      0 6px 18px rgba(0,0,0,.55);
    transition:box-shadow .55s ease, transform .55s ease;
  }
  .frame:hover, .frame:focus-within{
    box-shadow:
      0 2px 1px rgba(255,240,205,.5) inset,
      0 -3px 3px rgba(0,0,0,.42) inset,
      0 44px 84px -26px rgba(0,0,0,.9),
      0 8px 22px rgba(0,0,0,.62),
      0 0 60px -6px rgba(214,180,110,.34);
    transform:translateY(-2px);
  }
  .mat{
    position:relative; height:100%; border-radius:1px;
    background:radial-gradient(120% 120% at 50% 42%, #fbf7f0 0%, #efe7d8 100%);
    box-shadow:
      0 2px 5px rgba(0,0,0,.28) inset,
      0 0 0 1px rgba(120,96,44,.18) inset;
    display:grid; place-items:center; padding:14%;
    overflow:hidden;
  }
  .star-plate{ width:80%; max-width:170px; display:block; filter:drop-shadow(0 3px 6px rgba(120,88,30,.28)); }
  .star-plate svg{ width:100%; height:100%; display:block; }
  .glint{
    position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(66deg, rgba(255,255,255,0) 42%, rgba(255,255,255,.55) 50%, rgba(255,255,255,0) 58%);
    transform:translateX(-130%); opacity:0;
  }
  .frame:hover .glint, .frame:focus-within .glint{ animation:glint 1.1s var(--fx); }
  @keyframes glint{ 0%{transform:translateX(-130%);opacity:0} 20%{opacity:.9} 100%{transform:translateX(130%);opacity:0} }

  .wall-label{
    text-align:center; max-width:min(92%,420px);
    padding:11px 16px 12px;
    background:linear-gradient(180deg, rgba(250,247,241,.06), rgba(250,247,241,.03));
    border:1px solid rgba(168,128,47,.3);
    border-radius:2px;
  }
  .wl-lot{ font-family:var(--mono); font-weight:700; font-size:11px; letter-spacing:.34em; color:var(--gold-lt); }
  .wl-rest{ font-family:var(--mono); font-size:10.5px; letter-spacing:.28em; text-transform:uppercase; color:var(--cream-on-dark); opacity:.86; }
  .lot-note{ min-width:0; }
  .note-eyebrow{ font-family:var(--mono); font-size:10px; letter-spacing:.34em; text-transform:uppercase; color:var(--gold-lt); margin:0 0 14px; }
  .note-body{
    font-family:var(--serif); font-weight:400; font-size:clamp(18px,2.5vw,27px); line-height:1.5; margin:0;
    color:var(--cream-on-dark); letter-spacing:.005em;
  }
  .note-body .drop{ font-family:var(--serif); font-weight:600; }
  .lot-cta{ display:flex; flex-wrap:wrap; gap:12px; margin-top:clamp(20px,3vh,30px); }
  .btn{
    font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase;
    padding:13px 22px; border-radius:2px; transition:all .3s ease; white-space:nowrap;
  }
  .btn.gold{ background:var(--gold); color:#1c1712; border:1px solid var(--gold); }
  .btn.gold:hover{ background:var(--gold-lt); border-color:var(--gold-lt); transform:translateY(-1px); }
  .btn.ghost{ border:1px solid rgba(168,128,47,.55); color:var(--gold-lt); }
  .btn.ghost:hover{ border-color:var(--gold-lt); background:rgba(168,128,47,.1); }

  /* ------------------------------ PLATE II : provenance ------------------------------ */
  .prov-intro{ font-size:clamp(14px,1.7vw,16px); line-height:1.6; color:var(--ink-soft); max-width:62ch; margin:0 0 clamp(12px,2vh,20px); }
  .prov{ display:grid; gap:0; }
  .prov-item{ display:grid; grid-template-columns:auto 1fr auto; gap:clamp(12px,2vw,24px); align-items:start; padding:clamp(13px,2.2vh,20px) 0; border-top:1px solid rgba(120,96,44,.24); min-width:0; }
  .prov-item:last-child{ border-bottom:1px solid rgba(120,96,44,.24); }
  .prov-mark{ font-family:var(--serif); font-weight:600; font-size:clamp(20px,2.6vw,28px); color:var(--gold); line-height:1; padding-top:2px; }
  .prov-txt{ min-width:0; }
  .prov-label{ font-family:var(--serif); font-weight:600; font-size:clamp(16px,2vw,21px); color:var(--ink); margin:0 0 6px; letter-spacing:.005em; }
  .prov-body{ font-size:clamp(13.5px,1.55vw,15.5px); line-height:1.62; color:var(--ink-soft); margin:0; max-width:64ch; }
  .prov-year{ font-family:var(--mono); font-size:10px; letter-spacing:.28em; color:var(--gold-dk); white-space:nowrap; padding-top:5px; }

  /* ------------------------------ PLATE III : the work ------------------------------ */
  .work-wrap{ display:grid; grid-template-columns:1.25fr 1fr; gap:clamp(18px,3vw,40px); align-items:center; height:100%; min-height:0; }
  .photo-frame{
    position:relative; width:100%; aspect-ratio:16/10; border-radius:2px; overflow:hidden;
    background:#211c18;
    display:grid; place-items:center;
    box-shadow:0 18px 40px -20px rgba(0,0,0,.5), 0 0 0 1px rgba(120,96,44,.3);
    padding:10px;
  }
  .photo-frame img{ max-width:100%; max-height:100%; width:auto; height:auto; object-fit:contain; display:block; border-radius:1px; }
  .work-cap{ min-width:0; }
  .cap-fig{ font-family:var(--mono); font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--gold-dk); }
  .cap-title{ font-family:var(--serif); font-weight:600; font-size:clamp(22px,3vw,32px); color:var(--ink); margin:10px 0 4px; line-height:1.05; }
  .cap-medium{ font-family:var(--serif); font-style:italic; font-size:clamp(13px,1.6vw,15.5px); color:var(--gold-dk); display:block; margin-bottom:14px; }
  .cap-body{ font-size:clamp(14px,1.7vw,16px); line-height:1.66; color:var(--ink-soft); margin:0; max-width:52ch; }

  /* ------------------------------ PLATE IV : condition report ------------------------------ */
  .cond-intro{ font-family:var(--mono); font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:var(--gold-dk); margin:0 0 clamp(10px,1.6vh,16px); }
  .conds{ list-style:none; margin:0; padding:0; display:grid; gap:0; }
  .cond{ display:grid; grid-template-columns:auto 1fr auto; gap:clamp(12px,2vw,22px); align-items:baseline; padding:clamp(12px,2vh,18px) 0; border-top:1px solid rgba(120,96,44,.24); min-width:0; }
  .cond:last-child{ border-bottom:1px solid rgba(120,96,44,.24); }
  .cond-no{ font-family:var(--mono); font-size:10px; letter-spacing:.24em; text-transform:uppercase; color:var(--gold); white-space:nowrap; padding-top:3px; }
  .cond-txt{ min-width:0; }
  .cond-name{ font-family:var(--serif); font-weight:600; font-size:clamp(17px,2.2vw,23px); color:var(--ink); margin:0 0 5px; }
  .cond-body{ font-size:clamp(13.5px,1.55vw,15.5px); line-height:1.6; color:var(--ink-soft); margin:0; max-width:60ch; }
  .cond-grade{ font-family:var(--mono); font-size:9.5px; letter-spacing:.2em; text-transform:uppercase; color:#1c1712; background:rgba(168,128,47,.18); border:1px solid rgba(168,128,47,.5); padding:4px 9px; border-radius:2px; white-space:nowrap; align-self:center; }

  /* ------------------------------ PLATE V : sale information ------------------------------ */
  .sale-wrap{ display:grid; grid-template-columns:1.1fr .9fr; gap:clamp(20px,3.4vw,48px); height:100%; align-content:center; min-height:0; }
  .sale-about{ min-width:0; align-self:center; }
  .sale-about p{ font-family:var(--serif); font-size:clamp(16px,2.1vw,22px); line-height:1.56; color:var(--ink); margin:0; }
  .epigraph{
    font-family:var(--thai); font-weight:400; font-size:clamp(15px,1.9vw,20px);
    line-height:1.5; color:var(--gold-dk); margin:clamp(16px,2.6vh,24px) 0 0;
    padding-top:16px; border-top:1px solid rgba(120,96,44,.3); letter-spacing:normal;
  }
  .sale-enq{ min-width:0; align-self:center; display:flex; flex-direction:column; gap:14px; }
  .enq-eyebrow{ font-family:var(--mono); font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--gold-dk); margin:0; }
  .email{ font-family:var(--serif); font-weight:500; font-size:clamp(16px,2.3vw,23px); color:var(--ink); text-decoration:none; word-break:break-word; border-bottom:1px solid rgba(168,128,47,.5); padding-bottom:3px; align-self:flex-start; transition:color .3s ease, border-color .3s ease; }
  .email:hover{ color:var(--gold-dk); border-color:var(--gold); }
  .place{ font-family:var(--mono); font-size:11px; letter-spacing:.16em; color:var(--ink-soft); margin:0; }
  .estimate{ display:flex; align-items:center; gap:12px; margin-top:4px; }
  .est-label{ font-family:var(--mono); font-size:10px; letter-spacing:.26em; text-transform:uppercase; color:var(--ink-soft); }
  .est-rule{ flex:1 1 auto; height:1px; background:linear-gradient(90deg, var(--gold) 0%, rgba(168,128,47,.15) 100%); min-width:14px; }
  .est-val{ font-family:var(--serif); font-style:italic; font-size:clamp(14px,1.8vw,17px); color:var(--gold-dk); }
  .btn.sale{ align-self:flex-start; margin-top:6px; }
  .colo{ grid-column:1 / -1; display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-top:clamp(14px,2.4vh,22px); padding-top:16px; border-top:1px solid rgba(120,96,44,.24); min-width:0; }
  .colo-star{ width:20px; height:20px; flex:0 0 auto; }
  .colo-star svg{ width:100%; height:100%; }
  .wordmark.sm{ color:var(--ink); font-size:14px; letter-spacing:.2em; }
  .colo-meta{ font-family:var(--mono); font-size:10px; letter-spacing:.16em; color:var(--ink-soft); min-width:0; }

  /* ------------------------------ page corners ------------------------------ */
  .corner{
    position:absolute; bottom:0; width:clamp(58px,7vw,78px); height:clamp(58px,7vw,78px);
    z-index:60; display:grid; place-items:center;
    transition:opacity .3s ease;
  }
  .corner.prev{ left:0; }
  .corner.next{ right:0; }
  .corner::before{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(135deg, rgba(168,128,47,.28), rgba(168,128,47,0) 62%);
    opacity:0; transition:opacity .3s ease;
  }
  .corner.next::before{ background:linear-gradient(225deg, rgba(168,128,47,.28), rgba(168,128,47,0) 62%); }
  .corner:hover::before{ opacity:1; }
  .chev{ width:13px; height:13px; border-top:2px solid var(--gold-lt); border-right:2px solid var(--gold-lt); display:block; }
  .corner.next .chev{ transform:rotate(45deg); margin-right:6px; }
  .corner.prev .chev{ transform:rotate(-135deg); margin-left:6px; }
  .corner[disabled]{ opacity:.22; cursor:default; pointer-events:none; }

  /* ------------------------------ deck / colophon ------------------------------ */
  .deck{
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:clamp(9px,1.6vh,14px) clamp(16px,4vw,40px);
    border-top:1px solid rgba(168,128,47,.24);
    min-width:0;
  }
  .colophon{ font-family:var(--mono); font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--gold-dk); margin:0; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .hint{ font-family:var(--mono); font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; color:rgba(236,227,213,.42); margin:0; white-space:nowrap; flex:0 0 auto; }

  /* ------------------------------ entrance ritual ------------------------------ */
  body.entering .plate-lot .spot{ animation:spotUp 1.5s ease .2s both; }
  body.entering .plate-lot .frame{ animation:frameUp 1.35s var(--fx) .35s both; }
  body.entering .plate-lot .wall-label{ animation:labelPress 1s ease 1.0s both; }
  body.entering .plate-lot .lot-note{ animation:noteIn 1s ease 1.25s both; }
  @keyframes spotUp{ from{opacity:0} to{opacity:1} }
  @keyframes frameUp{ from{opacity:0; transform:translateY(14px) scale(.97)} to{opacity:1; transform:translateY(0) scale(1)} }
  @keyframes labelPress{ from{opacity:0; letter-spacing:.5em; filter:blur(1px)} to{opacity:1; filter:blur(0)} }
  @keyframes noteIn{ from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

  /* ------------------------------ mobile ------------------------------ */
  @media (max-width:820px){
    .lot-wrap{ grid-template-columns:1fr; }
    .work-wrap{ grid-template-columns:1fr; align-content:center; gap:clamp(14px,3vw,24px); }
    .sale-wrap{ grid-template-columns:1fr; gap:clamp(14px,3vw,24px); }
    .brand-sub{ display:none; }
  }
  @media (max-width:640px){

<body>

<script>
/* ============================================================================
   CATALOGUE  -  all copy lives here; edit this object to re-skin the lot.
   (Vesperwerk canonical copy mirrored verbatim. No em or en dashes anywhere.)
   ========================================================================== */
const CATALOGUE = {

/* Vesperwerk mark: eight-point vesper star, two-facet antique gold (facet colors kept). */
const STAR = `<svg viewBox="0 0 200 200" role="img" aria-label="Vesperwerk star"><g transform="translate(100,100)"><g><polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/><polygon points="0,-86 11,0 0,0" fill="#8a6526"/></g><g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="#8a6526"/><polygon points="0,-86 11,0 0,0" fill="#c09a4a"/></g><g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/><polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/></g><g transform="rotate(270)"><polygon points="0,-64 -9.5,0 0,0" fill="#8a6526"/><polygon points="0,-64 9.5,0 0,0" fill="#c09a4a"/></g><g transform="rotate(45)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g><g transform="rotate(135)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g><g transform="rotate(225)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g><g transform="rotate(315)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g></g></svg>`;

/* -------------------------------- renderers -------------------------------- */
function sheetHead(p){
  return `<div class="sheet-head">
    <div class="sheet-eyebrow"><span class="roman">PLATE ${p.num}</span><span class="er-rule"></span><span>Lot 01</span></div>
    <h2 class="sheet-title">${p.title}</h2>
  </div>`;
}

function renderLot(){
  const c = CATALOGUE;
  return `<div class="plate-lot-inner">
    <div class="spot" aria-hidden="true"></div>
    <div class="lot-wrap">
      <div class="frame-stage">
        <figure class="frame" tabindex="0" aria-label="Framed plate: the Evening Star device">
          <div class="mat"><div class="star-plate">${STAR}</div></div>
          <span class="glint" aria-hidden="true"></span>
        </figure>
        <figcaption class="wall-label">
          <span class="wl-lot">${c.lotLabel.lot}</span><span class="wl-rest">${c.lotLabel.rest}</span>
        </figcaption>
      </div>
      <div class="lot-note">
        <p class="note-eyebrow">Catalogue note</p>
        <p class="note-body">${c.positioning}</p>
        <div class="lot-cta">
          <button class="btn gold" data-go="4">${c.ctaPrimary}</button>
          <button class="btn ghost" data-go="2">${c.ctaSecondary}</button>
        </div>
      </div>
    </div>
  </div>`;
}

function renderProvenance(p){
  const items = p.entries.map((e,i)=>`
    <div class="prov-item">
      <span class="prov-mark" aria-hidden="true">${["I","II","III"][i]}</span>
      <div class="prov-txt">
        <p class="prov-label">${e.label}</p>
        <p class="prov-body">${e.body}</p>
      </div>
      <span class="prov-year">${e.year}</span>
    </div>`).join("");
  return `${sheetHead(p)}<div class="sheet-body">
    <p class="prov-intro">${p.intro}</p>
    <div class="prov">${items}</div>
  </div>`;
}

function renderWork(p){
  return `${sheetHead(p)}<div class="sheet-body">
    <div class="work-wrap">
      <figure class="photo-frame">
        <img src="${p.img}" alt="${p.alt}" loading="lazy" decoding="async">
      </figure>
      <figcaption class="work-cap">
        <span class="cap-fig">${p.fig}</span>
        <h3 class="cap-title">${p.workTitle}</h3>
        <span class="cap-medium">${p.medium}</span>
        <p class="cap-body">${p.body}</p>
      </figcaption>

}

function renderCondition(p){
  const notes = p.notes.map(n=>`
    <li class="cond">
      <span class="cond-no">${n.no}</span>
      <div class="cond-txt">
        <p class="cond-name">${n.name}</p>
        <p class="cond-body">${n.body}</p>
      </div>
      <span class="cond-grade">${n.grade}</span>
    </li>`).join("");
  return `${sheetHead(p)}<div class="sheet-body">
    <p class="cond-intro">${p.intro}</p>

  </div>`;
}

function renderSale(p){
  return `${sheetHead(p)}<div class="sheet-body">
    <div class="sale-wrap">
      <div class="sale-about">
        <p>${p.about}</p>
        <p class="epigraph" lang="th">${p.epigraph}</p>
      </div>
      <div class="sale-enq">
        <p class="enq-eyebrow">Enquiries</p>
        <a class="email" href="mailto:${p.enquiries}">${p.enquiries}</a>
        <p class="place">${p.place}</p>
        <div class="estimate">
          <span class="est-label">Estimate</span><span class="est-rule"></span><span class="est-val">${p.estimate}</span>
        </div>
        <a class="btn gold sale" href="mailto:${p.enquiries}">${CATALOGUE.ctaPrimary}</a>
      </div>
      <div class="colo">
        <span class="colo-star" aria-hidden="true">${STAR}</span>
        <span class="wordmark sm">${CATALOGUE.wordmark}</span>
        <span class="colo-meta">${p.copyright}</span>
      </div>
    </div>
  </div>`;
}

function renderPlate(p){
  if(p.type==="lot") return renderLot();
  if(p.type==="provenance") return renderProvenance(p);
  if(p.type==="work") return renderWork(p);
  if(p.type==="condition") return renderCondition(p);
  if(p.type==="sale") return renderSale(p);
  return "";
}

/* -------------------------------- build DOM -------------------------------- */
const book = document.getElementById("book");
const N = CATALOGUE.plates.length;

CATALOGUE.plates.forEach((p,i)=>{
  const page = document.createElement("div");
  page.className = "page";
  page.dataset.i = i;
  page.innerHTML =
    `<div class="face recto ${p.type==="lot"?"plate-lot":""}">
        <div class="sheet">${renderPlate(p)}</div>
     </div>
     <div class="face verso" aria-hidden="true">
        <div class="verso-mark"><span class="vm-star">${STAR}</span><span>VESPERWERK . VW/26</span></div>
     </div>
     <div class="sheen" aria-hidden="true"></div>`;
  book.appendChild(page);
});

/* plate index */
const pindex = document.getElementById("plateIndex");
CATALOGUE.plates.forEach((p,i)=>{
  const b = document.createElement("button");
  b.className = "pi"; b.dataset.go = i;
  b.setAttribute("aria-label", `Plate ${p.num}, ${p.title}`);
  b.innerHTML = `<span class="pi-num">${p.num}</span>`;
  pindex.appendChild(b);
});

const pages   = Array.from(book.querySelectorAll(".page"));
const piBtns  = Array.from(pindex.querySelectorAll(".pi"));
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const colophon= document.getElementById("colophon");

/* -------------------------------- flip engine -------------------------------- */
const mqMobile = matchMedia("(max-width:640px)");
const mqRM     = matchMedia("(prefers-reduced-motion: reduce)");
let cur = 0, navLock = false;
let mobile = mqMobile.matches;
let rm = mqRM.matches;

function updateHeader(){
  piBtns.forEach((b,i)=>{
    const on = i===cur;
    b.classList.toggle("on", on);
    b.setAttribute("aria-current", on ? "true" : "false");
  });
  prevBtn.disabled = cur===0;
  nextBtn.disabled = cur===N-1;
  const nn = String(cur+1).padStart(2,"0");
  colophon.textContent = `CATALOGUE VW/26 . PLATE ${nn} OF 05 . SET IN PLAYFAIR AND MONO`;
}

function restDesktop(){
  pages.forEach((p,i)=>{
    p.classList.remove("flipping");
    p.style.transform  = (i<cur) ? "rotateY(-180deg)" : "rotateY(0deg)";
    p.style.visibility = (i===cur) ? "visible" : "hidden";
    p.style.zIndex     = (i<cur) ? String(i) : String(100-i);
  });
}
function positionMobile(){
  pages.forEach((p,i)=>{
    p.style.transform  = `translateX(${(i-cur)*100}%)`;
    p.style.visibility = "visible";
    p.style.zIndex     = String(100 - Math.abs(i-cur));
  });
}
function relayout(){
  mobile = mqMobile.matches;
  rm = mqRM.matches;
  document.documentElement.classList.toggle("rm", rm);
  if(mobile) positionMobile(); else restDesktop();
  updateHeader();
}

function onEnd(el, cb){
  let done = false;
  const fin = ()=>{ if(done) return; done = true; el.removeEventListener("transitionend", h); cb(); };
  const h = (e)=>{ if(e.propertyName==="transform") fin(); };
  el.addEventListener("transitionend", h);
  setTimeout(fin, 780);
}

function flipOne(dir){
  return new Promise((res)=>{
    const from = cur, to = from + dir;
    if(to<0 || to>=N){ res(); return; }
    if(dir>0){
      const mv = pages[from], rev = pages[to];
      rev.style.visibility="visible"; rev.style.transform="rotateY(0deg)"; rev.style.zIndex=String(100-to);
      mv.style.visibility="visible"; mv.style.zIndex="300";
      mv.classList.add("flipping");
      requestAnimationFrame(()=>{ mv.style.transform="rotateY(-180deg)"; });
      onEnd(mv, ()=>{ mv.classList.remove("flipping"); cur=to; restDesktop(); updateHeader(); res(); });
    } else {
      const mv = pages[to], leaving = pages[from];
      leaving.style.visibility="visible"; leaving.style.transform="rotateY(0deg)"; leaving.style.zIndex=String(100-from);
      mv.classList.add("no-anim");
      mv.style.visibility="visible";
      mv.style.transform="rotateY(-180deg)";
      mv.style.zIndex="300";
      void mv.offsetWidth;
      mv.classList.remove("no-anim");
      mv.classList.add("flipping");
      requestAnimationFrame(()=>{ mv.style.transform="rotateY(0deg)"; });
      onEnd(mv, ()=>{ mv.classList.remove("flipping"); cur=to; restDesktop(); updateHeader(); res(); });
    }
  });
}

async function go(t){
  t = Math.max(0, Math.min(N-1, t));
  if(t===cur || navLock) return;
  if(rm){ cur=t; mobile?positionMobile():restDesktop(); updateHeader(); return; }
  if(mobile){
    navLock=true; cur=t; positionMobile(); updateHeader();
    setTimeout(()=>{ navLock=false; }, 500);
    return;
  }
  navLock=true;
  const dir = t>cur ? 1 : -1;
  while(cur!==t){ await flipOne(dir); }
  navLock=false;
}

/* -------------------------------- scroll-driven plates --------------------------------
   .scroll-track behind the pinned shell is 5 tall virtual segments, one per plate.
   A scroll listener maps document scroll position to a plate index and replays the
   same go()/flipOne() flip already used by click and keyboard navigation, so any
   scroll (wheel, trackpad, touch drag, or a programmatic scrollTo) turns the page. */
const SEG_VH = 2; /* segment height, in viewport-heights, per plate */
const scrollTrack = document.getElementById("scrollTrack");
let segH = 0;

function computeSegH(){
  segH = Math.max(1, Math.round(window.innerHeight * SEG_VH));
  scrollTrack.style.height = (segH * N) + "px";
}

function computeSegment(){
  const maxScroll = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
  const y = window.scrollY || document.documentElement.scrollTop || 0;
  const progress = Math.min(1, Math.max(0, y / maxScroll));
  return Math.round(progress * (N - 1));
}

function scrollToSegment(i){
  i = Math.max(0, Math.min(N - 1, i));
  window.scrollTo({ top: i * segH, behavior: rm ? "auto" : "smooth" });
}

async function resyncFromScroll(){
  const target = computeSegment();
  if(target === cur) return;
  if(navLock){ setTimeout(resyncFromScroll, 120); return; }
  await go(target);
  resyncFromScroll(); /* scroll may have moved further while that flip was animating */
}

let scrollTicking = false;
window.addEventListener("scroll", ()=>{
  if(scrollTicking) return;
  scrollTicking = true;
  requestAnimationFrame(()=>{ scrollTicking = false; resyncFromScroll(); });
}, { passive:true });

/* -------------------------------- inputs -------------------------------- */
document.addEventListener("click",(e)=>{
  const g = e.target.closest("[data-go]");
  if(g){ e.preventDefault(); scrollToSegment(parseInt(g.dataset.go,10)); return; }
  const s = e.target.closest("[data-step]");
  if(s){ e.preventDefault(); scrollToSegment(cur + parseInt(s.dataset.step,10)); }
});

/* wheel: forward the delta to the real document scroll (the listener above does the
   flip); the only special case left is letting an unfinished inner .sheet-body panel
   scroll first, same protection as before. */
window.addEventListener("wheel",(e)=>{
  const sb = e.target.closest(".sheet-body, .plate-lot-inner");
  if(sb && sb.scrollHeight > sb.clientHeight){
    const atTop    = sb.scrollTop <= 0;
    const atBottom = Math.ceil(sb.scrollTop + sb.clientHeight) >= sb.scrollHeight;
    if((e.deltaY < 0 && !atTop) || (e.deltaY > 0 && !atBottom)) return;
  }
  e.preventDefault();
  window.scrollBy({ top:e.deltaY, left:0, behavior:"auto" });
},{ passive:false });

window.addEventListener("keydown",(e)=>{
  const k=e.key;
  if(k==="ArrowRight"||k==="ArrowDown"||k==="PageDown"){ e.preventDefault(); scrollToSegment(cur+1); }
  else if(k==="ArrowLeft"||k==="ArrowUp"||k==="PageUp"){ e.preventDefault(); scrollToSegment(cur-1); }
  else if(k==="Home"){ e.preventDefault(); scrollToSegment(0); }
  else if(k==="End"){ e.preventDefault(); scrollToSegment(N-1); }
  else if(k===" " && document.activeElement===document.body){ e.preventDefault(); scrollToSegment(cur+1); }
  else if(/^[1-5]$/.test(k)){ scrollToSegment(parseInt(k,10)-1); }
});

/* resize / media changes: recompute the segment map, then realign scroll to cur so
   a mid-catalogue resize does not jump the visible plate. */
let rT;
function onResize(){
  clearTimeout(rT);
  rT = setTimeout(()=>{
    computeSegH();
    relayout();
    window.scrollTo({ top: cur*segH, behavior:"auto" });
  }, 120);
}
window.addEventListener("resize", onResize);
if(mqMobile.addEventListener){ mqMobile.addEventListener("change", relayout); mqRM.addEventListener("change", relayout); }

/* inject star into masthead brand */
document.querySelector(".brand-star").innerHTML = STAR;

/* -------------------------------- init -------------------------------- */
computeSegH();
relayout();
if(!rm){ requestAnimationFrame(()=>{ document.body.classList.add("entering"); }); }
</script>
