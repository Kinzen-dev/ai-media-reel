<!-- TEMPLATE: Vesperwerk Bangkok Atlas | ARCHETYPE: The Atlas (a hand-drawn city you navigate by the evening star) | REF: Herb Lester / Anderson Design Group hand-drawn city-map cartography + pannable map registers | WHEN TO USE: studio/agency site that maps its offer as geography, one framed hand-drawn city instead of stacked sections | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vesperwerk - Bangkok Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Noto+Serif+Thai:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#2e2a26; --ink2:#4a443c; --gold:#a8802f; --goldL:#c09a4a; --goldD:#8a6526;
  --cream:#f3ecd9; --paper:#efe6cf; --paper2:#e9dfc6;
  --teal:#4a6a70; --tealD:#3a565b; --tealL:#6b8b8f;
  --pw:0px; --railh:56px;
}
*{box-sizing:border-box}
html,body{margin:0; overflow-x:hidden; background:var(--cream); color:var(--ink);
  font-family:'Cormorant Garamond',Georgia,serif; -webkit-font-smoothing:antialiased;}
:focus-visible{outline:2px solid var(--gold); outline-offset:3px}
#track{width:100%}

/* ---------- STAGE + WORLD (the map camera) ---------- */
.stage{position:fixed; inset:0; overflow:hidden; touch-action:pan-y; cursor:grab;
  background:radial-gradient(130% 100% at 50% 30%, #f7f1e2 0%, var(--cream) 46%, #e7dcc2 100%);}
.stage.grabbing{cursor:grabbing}
.world{position:absolute; left:0; top:0; width:1600px; height:1040px; transform-origin:0 0;
  will-change:transform; transition:transform .95s cubic-bezier(.62,.02,.2,1);}
.rm .world{transition:none}
svg.scene{width:1600px; height:1040px; display:block; opacity:0; transition:opacity .4s ease}
.ready svg.scene{opacity:1}

/* ---------- INK / GOLD / RIVER LINEWORK (self-drawing) ---------- */
.ink,.gold,.rivbank,.riv,.riverline,.vink,.wave{fill:none; stroke-linecap:round; stroke-linejoin:round;
  stroke-dasharray:1 1.02; stroke-dashoffset:1}
.ink{stroke:var(--ink)}
.sw1{stroke-width:3.4} .sw2{stroke-width:2.4} .sw3{stroke-width:1.7} .sw4{stroke-width:1.1}
.gold{stroke:var(--gold); stroke-width:1.8}
.rivbank{stroke:#6b5f4a; stroke-width:126; opacity:.5}
.riv{stroke:var(--teal); stroke-width:118}
.riverline{stroke:var(--tealL); stroke-width:1.6; opacity:.7}
.wave{stroke:var(--tealD); stroke-width:1.6; opacity:.55}
.grid{stroke:var(--ink); stroke-width:.8; opacity:.07}

/* fills */
.paint{opacity:0}
.f-paper{fill:#efe6cf} .f-paper2{fill:#e7dcc2} .f-teal{fill:var(--teal)}
.f-gold{fill:var(--gold)} .f-goldL{fill:var(--goldL)} .f-ink{fill:var(--ink)}
.f-night{fill:#2b3550} .f-cream{fill:#f6f0e2} .f-mint{fill:#e6efe6} .f-red{fill:#9c4b39}
.node{fill:var(--gold)} .halo{fill:var(--gold); opacity:.16}

/* labels + lettering */
.lbl{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:19px; letter-spacing:.2em;
  fill:var(--ink); transition:fill .3s ease; paint-order:stroke; stroke:#f3ecd9; stroke-width:3px}
.lbl.sm{font-size:15px; letter-spacing:.16em}
.tiny{font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12px; letter-spacing:.01em; fill:#7a6f5c}
.dirl{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:17px; letter-spacing:.1em; fill:var(--goldD)}
.numl{font-family:'Playfair Display',serif; font-weight:600; font-size:13px; fill:var(--goldD)}

/* ---------- ROOMS (district openers) ---------- */
.room{cursor:pointer}
.hit{fill:transparent; pointer-events:all}
.lift{transition:transform .35s cubic-bezier(.3,.7,.2,1); transform-box:fill-box; transform-origin:center bottom}
.room:hover .lift,.room:focus-visible .lift,.landmark:hover .lift,.landmark:focus-visible .lift{transform:translateY(-5px) scale(1.035)}
.rm .lift{transition:none}
.focusring{fill:none; stroke:var(--gold); stroke-width:1.6; stroke-dasharray:5 7; rx:14;
  opacity:0; transition:opacity .35s; pointer-events:none}
.room:hover .focusring{opacity:.5}
.room.is-active .focusring{opacity:.95}
.room:focus{outline:none}
.room:focus-visible .focusring{opacity:.95; stroke-width:2.2}
.room:hover .lbl,.room:focus-visible .lbl,.room.is-active .lbl{fill:var(--goldD)}
.room{transition:opacity .55s ease}
.focused #rooms .room:not(.is-active){opacity:.4}
.focused #rooms .room:not(.is-active):hover,
.focused #rooms .room:not(.is-active):focus-visible{opacity:.82}
.focused #landmarks,.focused #decolabels{opacity:.32; transition:opacity .55s ease}
.rm .room,.rm #landmarks{transition:none}
.landmark{cursor:default}

/* ---------- NIGHT-CALL ROUTE ---------- */
.routeglow{fill:none; stroke:var(--goldL); stroke-width:8; stroke-linecap:round; opacity:0;
  stroke-dasharray:2 8}
.route{fill:none; stroke:var(--gold); stroke-width:3; stroke-linecap:round; stroke-dasharray:2 8; opacity:0}
.comet{fill:none; stroke:#f6e19a; stroke-width:5.5; stroke-linecap:round;
  stroke-dasharray:0.05 2; stroke-dashoffset:0.1; opacity:0}
.comet-glow{fill:none; stroke:#faedc0; stroke-width:11; stroke-linecap:round;
  stroke-dasharray:0.035 2; stroke-dashoffset:0.11; opacity:0}
.route-node{fill:var(--gold)} .route-halo{fill:var(--gold); opacity:.2}
.landring{fill:none; stroke:var(--goldL); stroke-width:2.4; opacity:0;
  transform-box:fill-box; transform-origin:center}
.landring.go{animation:landpulse .85s cubic-bezier(.2,.6,.3,1) 1.5s both}
@keyframes landpulse{0%{opacity:0; transform:scale(.3)}22%{opacity:.85}100%{opacity:0; transform:scale(2.3)}}
.route,.routeglow,.comet,.comet-glow,.route-node,.route-halo,.landring{pointer-events:none}

/* ---------- COMPASS ---------- */
.compass{cursor:pointer}
.compass .hit{fill:transparent}
.cring{fill:none; stroke:var(--ink); stroke-width:1.6}
.cring.g{stroke:var(--gold); stroke-width:1.2; opacity:.85}
.ctick{stroke:var(--ink); stroke-width:1.4}
.cletter{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:16px; letter-spacing:.06em; fill:var(--goldD)}
.cglint{opacity:0; transform-box:fill-box; transform-origin:center}
.compass:hover .cring.g,.compass:focus-visible .cring.g{opacity:1; stroke-width:1.8}
.compass:focus{outline:none}
.compass:focus-visible .cring{stroke:var(--gold)}

/* ---------- DRAW / FADE ANIMATIONS ---------- */
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes fin{from{opacity:0}to{opacity:1}}
@keyframes routein{from{opacity:0; stroke-dashoffset:130}to{opacity:1; stroke-dashoffset:0}}
@keyframes routeglowin{from{opacity:0}to{opacity:.5}}
@keyframes glint{0%{opacity:0; transform:scale(.25)}45%{opacity:.95}100%{opacity:0; transform:scale(1.75)}}
@keyframes travel{0%{opacity:0; stroke-dashoffset:0.1}12%{opacity:1}84%{opacity:1}100%{opacity:0; stroke-dashoffset:-1.05}}
@keyframes travelg{0%{opacity:0; stroke-dashoffset:0.11}12%{opacity:.55}84%{opacity:.55}100%{opacity:0; stroke-dashoffset:-1.06}}
.play .ink,.play .gold,.play .vink,.play .riverline{animation:draw .62s ease forwards}
.play .rivbank,.play .riv{animation:draw .72s ease forwards}
.play .wave,.play .grid{animation:fin .5s ease forwards}
.play .paint{animation:fin .55s ease forwards}
.play .l1{animation-delay:0s} .play .l2{animation-delay:.42s} .play .l3{animation-delay:.82s}
.play .l4{animation-delay:1.18s} .play .l5{animation-delay:1.55s}
.play .route{animation:routein .95s ease 1.35s both}
.play .routeglow{animation:routeglowin .95s ease 1.35s both}
.play .cglint{animation:glint 1s ease 2.05s both}
.comet.go{animation:travel 1.65s cubic-bezier(.42,0,.5,1) both}
.comet-glow.go{animation:travelg 1.65s cubic-bezier(.42,0,.5,1) both}
/* fully-drawn / reduced-motion resting state */
.drawn .ink,.drawn .gold,.drawn .vink,.drawn .riverline,.drawn .rivbank,.drawn .riv{stroke-dashoffset:0}
.drawn .paint,.drawn .wave,.drawn .grid{opacity:1}
.drawn .route{opacity:1; stroke-dashoffset:0}
.drawn .routeglow{opacity:.42; stroke-dashoffset:0}
.drawn .comet,.drawn .comet-glow,.drawn .cglint{opacity:0}

/* ---------- CARTOUCHE (map-title plate, hero) ---------- */
.cartouche{position:fixed; left:22px; bottom:22px; z-index:32; width:min(400px,42vw);
  transition:opacity .5s ease}
.cart-frame{position:relative; background:linear-gradient(180deg,#f6f0e2,#ece1c7);
  border:1.5px solid var(--ink); border-radius:3px; padding:20px 22px 16px;
  box-shadow:0 2px 6px rgba(46,42,38,.12), 0 16px 40px rgba(46,42,38,.15), inset 0 0 0 3px rgba(46,42,38,.06);}
.cart-frame:before{content:""; position:absolute; inset:5px; border:1px solid rgba(46,42,38,.35); border-radius:2px; pointer-events:none}
.cart-corner{position:absolute; width:13px; height:13px; border:1.4px solid var(--gold); opacity:.85}
.cc1{left:9px; top:9px; border-right:0; border-bottom:0}
.cc2{right:9px; top:9px; border-left:0; border-bottom:0}
.cc3{left:9px; bottom:9px; border-right:0; border-top:0}
.cc4{right:9px; bottom:9px; border-left:0; border-top:0}
.cart-home{display:flex; align-items:center; gap:11px; background:none; border:0; padding:2px 0 0; cursor:pointer; color:var(--ink)}
.cart-home .ic-star{width:28px; height:28px; flex:0 0 auto}
.wordmark{font-family:'Playfair Display',serif; font-weight:600; letter-spacing:.24em; font-size:22px; line-height:1}
.cart-rule{height:1px; background:linear-gradient(90deg,var(--gold),rgba(168,128,47,0)); margin:12px 0 11px}
.cart-pos{font-size:17px; line-height:1.48; color:#3c372f; margin:0 0 12px; max-width:34ch}
.cart-motto{font-family:'Noto Serif Thai',serif; font-weight:400; font-size:15.5px; line-height:1.5;
  color:var(--goldD); margin:0 0 12px}
.cart-ctas{display:flex; gap:9px; flex-wrap:wrap; margin-bottom:12px}
.cta{font-family:'Cormorant Garamond',serif; font-size:15.5px; font-weight:600; letter-spacing:.02em;
  padding:8px 15px; border-radius:2px; border:1px solid var(--ink); background:transparent; color:var(--ink);
  cursor:pointer; min-width:0; transition:background .25s,color .25s,border-color .25s}
.cta.pri{background:var(--ink); color:var(--cream)}
.cta:hover{background:var(--gold); border-color:var(--gold); color:#241f14}
.cart-foot{font-family:'Cormorant Garamond',serif; font-style:italic; font-size:12.5px; letter-spacing:.04em;
  color:#8a7f6c; margin:0; padding-top:10px; border-top:1px solid rgba(46,42,38,.2)}

/* ---------- DISTRICT NAV (chips) ---------- */
.toolbar{position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:38;
  display:flex; align-items:center; gap:2px; padding:6px 8px; max-width:calc(100vw - 32px);
  background:rgba(246,240,226,.92); backdrop-filter:blur(7px);
  border:1px solid rgba(46,42,38,.2); border-radius:999px; overflow-x:auto; scrollbar-width:none;
  box-shadow:0 1px 3px rgba(46,42,38,.1), 0 10px 28px rgba(46,42,38,.12)}
.toolbar::-webkit-scrollbar{display:none}
.chip{position:relative; flex:0 0 auto; font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:600;
  letter-spacing:.02em; padding:6px 14px; border-radius:999px; border:1px solid transparent; background:transparent;
  color:var(--ink); cursor:pointer; white-space:nowrap; opacity:.72; transition:opacity .2s,background .2s,color .2s}
.chip:after{content:""; position:absolute; left:12px; right:12px; bottom:3px; height:5px; opacity:0; transition:opacity .2s;
  background:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='6' viewBox='0 0 60 6'><path d='M2 4 Q15 1 30 4 T58 3' fill='none' stroke='%23a8802f' stroke-width='2' stroke-linecap='round'/></svg>") center/100% 100% no-repeat}
.chip:hover{opacity:1}
.chip:hover:after,.chip:focus-visible:after{opacity:.9}
.chip.active{background:var(--ink); color:var(--cream); opacity:1}
.chip.active:after{opacity:0}

/* ---------- LEGEND CARD ---------- */
.legend{position:fixed; top:0; right:0; height:100svh; width:min(418px,36vw); z-index:36;
  background:linear-gradient(180deg,#f4eddd,#ece1c7);
  border-left:1.5px solid var(--ink); box-shadow:-22px 0 54px rgba(46,42,38,.14);
  transform:translateX(101%); transition:transform .8s cubic-bezier(.62,.02,.2,1);
  padding:52px 34px 30px; overflow:auto; overscroll-behavior:contain}
.legend.open{transform:none}
.rm .legend{transition:none}
.legend:before{content:""; position:absolute; left:13px; top:13px; bottom:13px; width:1px; background:rgba(46,42,38,.22)}
.legend:after{content:""; position:absolute; right:13px; top:13px; bottom:13px; width:1px; background:rgba(46,42,38,.12)}
.art{display:none}
.art.active{display:block; animation:artin .5s ease}
@keyframes artin{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:none}}
.rm .art.active{animation:none}
.ahead{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; min-width:0}
.aidx{font-family:'Cormorant Garamond',serif; font-size:12.5px; letter-spacing:.28em; text-transform:uppercase;
  color:var(--goldD); font-weight:600}
.close{width:34px; height:34px; border-radius:50%; border:1px solid rgba(46,42,38,.3); background:transparent;
  color:var(--ink); font-size:19px; line-height:1; cursor:pointer; flex:0 0 auto; transition:background .25s,color .25s}
.close:hover{background:var(--ink); color:var(--cream)}
.vig{margin:8px 0 4px}
.vig svg{width:88px; height:56px; overflow:visible; display:block}
.vink{stroke:var(--ink); stroke-width:2}
.vink.vg{stroke:var(--gold)}
.rm .vink{stroke-dashoffset:0}
.play .art.active .vink{animation:draw .6s ease .06s forwards}
.kick{display:block; font-size:12.5px; letter-spacing:.24em; text-transform:uppercase; color:var(--goldD); font-weight:600; margin-top:6px}
.art h2{font-family:'Playfair Display',serif; font-weight:600; font-size:clamp(25px,3.2vw,32px); letter-spacing:.01em; margin:5px 0 0; line-height:1.1}
.body,.about{font-size:clamp(17px,2.2vw,20px); line-height:1.55; margin:15px 0 0; color:#3c372f}
.note{font-size:14.5px; font-style:italic; color:#857a68; margin-top:11px}
.prin{list-style:none; padding:0; margin:16px 0 0; counter-reset:p}
.prin li{padding:13px 0; border-top:1px solid rgba(46,42,38,.16); counter-increment:p}
.prin li:first-child{border-top:0}
.prin li:before{content:counter(p,decimal-leading-zero); display:block; font-family:'Playfair Display',serif; color:var(--goldD); font-size:12.5px; letter-spacing:.14em}
.pt{display:block; font-family:'Playfair Display',serif; font-weight:600; font-size:18px; margin:2px 0 2px}
.pb{display:block; font-size:16px; line-height:1.45; color:#3c372f}
.email{display:inline-block; margin:16px 0 4px; font-family:'Playfair Display',serif; font-size:clamp(17px,2.2vw,21px);
  color:var(--ink); text-decoration:none; border-bottom:2px solid var(--gold); padding-bottom:2px; transition:color .25s}
.email:hover{color:var(--gold)}
.pmeta{font-size:15px; color:#6f6555; margin:6px 0 0}
.lfoot{display:flex; align-items:center; gap:10px; margin-top:24px; padding-top:15px; border-top:1px solid rgba(46,42,38,.16)}
.lfoot .ic-star{width:20px; height:20px; flex:0 0 auto}
.lfoot span{font-family:'Playfair Display',serif; letter-spacing:.2em; font-size:13.5px}
.lfoot small{margin-left:auto; color:#8a7f6c; font-size:12.5px}
/* pinned clinic photograph (letterboxed, never cropped) */
.pinned{position:relative; margin:16px 0 2px}
.pinned .frame{background:#efe6cf; border:1px solid rgba(46,42,38,.4); padding:8px; border-radius:2px;
  box-shadow:0 8px 20px rgba(46,42,38,.16); transform:rotate(-1.4deg)}
.pinned .win{aspect-ratio:16/10; background:#221f1b; border-radius:1px; overflow:hidden; display:flex}
.pinned img{width:100%; height:100%; object-fit:contain; display:block}
.pinned .pin{position:absolute; left:50%; top:-7px; transform:translateX(-50%); width:16px; height:16px; z-index:2}
.pinned figcaption{font-family:'Cormorant Garamond',serif; font-style:italic; font-size:13px; color:#7a6f5c; text-align:center; margin-top:7px; letter-spacing:.06em}

/* ---------- HINT ---------- */
.hint{position:fixed; bottom:20px; right:24px; z-index:31; font-family:'Cormorant Garamond',serif;
  font-style:italic; font-size:13.5px; letter-spacing:.03em; color:#7a6f5c; pointer-events:none;
  display:flex; align-items:center; gap:7px; transition:opacity .5s ease}
.hint svg{width:22px; height:14px}
.cardopen .hint{opacity:0}

/* ---------- MOBILE ---------- */
@media(max-width:640px){
  .stage{cursor:default}
  /* map labels are unreadable at overview scale on a phone; promote the district
     tab-nav as the primary path instead - bolder bar, and every chip shows its
     hand-drawn underline at rest so it reads as a tap target */
  .toolbar{top:auto; bottom:0; left:0; transform:none; max-width:100%; width:100%;
    border-radius:14px 14px 0 0; border-left:0; border-right:0; border-bottom:0; justify-content:flex-start; padding:9px 12px;
    background:rgba(243,236,222,.98); box-shadow:0 -9px 28px rgba(46,42,38,.2)}
  .chip{font-size:16px; padding:8px 15px; opacity:.9}
  .chip:after{opacity:.42}
  .chip.active{opacity:1}
  .chip.active:after{opacity:0}
  .cartouche{left:12px; right:12px; bottom:calc(var(--railh) + var(--cart-gap,12px)); width:auto; max-width:none}
  .cart-frame{padding:14px 16px 12px}
  .wordmark{font-size:18px; letter-spacing:.2em}
  .cart-home .ic-star{width:23px; height:23px}
  .cart-pos{font-size:14.5px; max-width:none; margin-bottom:8px}
  .cart-motto{font-size:14px; margin-bottom:0}
  .cart-ctas,.cart-foot{display:none}
  .cardopen .cartouche{opacity:0; pointer-events:none}
  .hint{display:none}
  .legend{top:auto; bottom:var(--railh); left:0; right:0; width:auto; height:52svh; transform:translateY(103%);
    border-left:0; border-top:1.5px solid var(--ink); border-radius:14px 14px 0 0; padding:20px 20px 22px;
    box-shadow:0 -18px 42px rgba(46,42,38,.18)}
  .legend:before,.legend:after{display:none}
}

@media (prefers-reduced-motion: reduce){
  .world{transition:none!important}
  .legend,.chip,.art.active,.close,.cta,.email,.room,.landmark,.lbl,.lift,.cartouche,.hint,.focusring{transition:none!important; animation:none!important}
}
</style>
</head>
<body>
<div id="track"></div>

<div class="stage" id="stage">
  <div class="world" id="world">
    <svg class="scene" id="scene" viewBox="0 0 1600 1040" preserveAspectRatio="xMidYMid meet" role="img"
         aria-label="A hand-drawn atlas of a stylized Bangkok. The Chao Phraya river curves through cream paper. Districts stand for the studio's work: a temple-and-signal quarter for AI Systems, a bridgeworks for Product Engineering, a river market for Commerce, a pinned clinic for the Yimwhan case with a gold night-call route arcing across the whole city, a pilgrim path of four shrines for the studio's approach, and the studio's own building crowned by the vesper star. A gold compass rose sits at the northeast corner.">
      <defs>
        <symbol id="vstar" viewBox="0 0 200 200">
          <g transform="translate(100,100)">
            <g><polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/><polygon points="0,-86 11,0 0,0" fill="#8a6526"/></g>
            <g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="#8a6526"/><polygon points="0,-86 11,0 0,0" fill="#c09a4a"/></g>
            <g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/><polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/></g>
            <g transform="rotate(270)"><polygon points="0,-64 -9.5,0 0,0" fill="#8a6526"/><polygon points="0,-64 9.5,0 0,0" fill="#c09a4a"/></g>
            <g transform="rotate(45)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
            <g transform="rotate(135)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
            <g transform="rotate(225)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
            <g transform="rotate(315)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
          </g>
        </symbol>
      </defs>

      <!-- ============ MAP FACE + NEATLINE ============ -->
      <rect class="f-paper paint l1" x="24" y="24" width="1552" height="992" rx="3"/>
      <rect class="ink sw2 l1" x="24" y="24" width="1552" height="992" rx="3" fill="none"/>
      <rect class="ink sw4 l1" x="36" y="36" width="1528" height="968" rx="2" fill="none"/>
      <path class="gold l2" d="M40 58 h20 M40 58 v20 M1560 58 h-20 M1560 58 v20 M40 982 h20 M40 982 v-20 M1560 982 h-20 M1560 982 v-20"/>

      <!-- graticule -->

function buildChips(){

  DATA.spokes.forEach((sp,i)=>{

    b.className='chip'; b.dataset.go=i; b.textContent=sp.label;
    bar.appendChild(b);

/* =========================================================================
   CAMERA + STATE
   ========================================================================= */
const WORLD = {w:1600, h:1040}, FRAME = 660, MAXZOOM = 1.9;
const world = document.getElementById('world');
const stage = document.getElementById('stage');
const legend = document.getElementById('legend');
const cartoucheEl = document.getElementById('cartouche');
const rootEl = document.documentElement;
const arts  = ()=>document.querySelectorAll('.art');
const chips = ()=>document.querySelectorAll('.chip');
const rooms = document.querySelectorAll('.room');

let RM = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const state = { i:0, closed:true };
let cam = {s:1, tx:0, ty:0};
let dragging=false, sx=0, sy=0, startCam=null;

const isMobile = ()=> window.matchMedia('(max-width:640px)').matches;
const cardW = ()=> Math.min(418, Math.round(window.innerWidth*0.36));
const railH = ()=> isMobile()? 56 : 0;
const sheetH= ()=> Math.round(window.innerHeight*0.52);
const stopPx= ()=> window.innerHeight;

function layout(focus, open){
  const sw=window.innerWidth, sh=window.innerHeight, mob=isMobile();
  let availX0=0, availY0=0, availW=sw, availH=sh - railH();
  if(mob){
    availH = open ? (sh - sheetH() - railH()) : (sh - railH());
  } else if(open){
    availW = sw - cardW();
  }
  let s, tx, ty;
  if(!focus){
    s = Math.min(availW/WORLD.w, availH/WORLD.h) * 0.95;
    tx = availX0 + (availW - s*WORLD.w)/2;
    if(mob){
      // on mobile the cartouche plate sits fixed below the map; split the leftover height
      // into three even bands (above map, map-to-card, card-to-rail) so rest state reads
      // as one composed poster instead of a map floating over a dead void
      const cartH = cartoucheEl ? cartoucheEl.getBoundingClientRect().height : 0;
      const mapH = s*WORLD.h;
      const gap = Math.max(12, (sh - railH() - mapH - cartH) / 3);
      rootEl.style.setProperty('--cart-gap', gap.toFixed(1)+'px');
      ty = availY0 + gap;
    } else {
      ty = availY0 + (availH - s*WORLD.h) * 0.5;
    }
  } else {
    s = Math.min(availW/FRAME, availH/FRAME, MAXZOOM);
    tx = availX0 + availW/2 - s*focus.x;
    ty = availY0 + availH/2 - s*focus.y;
  }
  return {s, tx, ty};
}
function applyTransform(t){
  world.style.transform = 'translate('+t.tx.toFixed(1)+'px,'+t.ty.toFixed(1)+'px) scale('+t.s.toFixed(4)+')';
}
function setCam(t, animate){
  world.style.transition = (animate && !RM) ? '' : 'none';
  applyTransform(t); cam = {s:t.s, tx:t.tx, ty:t.ty};
}
function clampPan(tx,ty,s){
  const sw=window.innerWidth, sh=window.innerHeight, pad=110;
  const W=s*WORLD.w, H=s*WORLD.h;
  if(W<=sw) tx=(sw-W)/2; else tx=Math.min(pad, Math.max(sw-W-pad, tx));
  if(H<=sh) ty=(sh-H)/2; else ty=Math.min(pad, Math.max(sh-H-pad, ty));
  return [tx,ty];
}

function showArticle(i){
  arts().forEach(a=>{ const on=(+a.dataset.i===i);
    a.classList.toggle('active',on); a.setAttribute('aria-hidden', on?'false':'true'); });
}
function setActiveRoom(key){ rooms.forEach(r=> r.classList.toggle('is-active', r.dataset.key===key)); }
function updateChips(i){
  chips().forEach(c=>{ const on=(+c.dataset.go===i);
    c.classList.toggle('active',on);
    if(on) c.setAttribute('aria-current','true'); else c.removeAttribute('aria-current'); });
}

let cometKey='';
function fireComet(){
  if(RM) return;
  ['comet-glow','comet','landring'].forEach(cl=>{
    const p=document.querySelector('.'+cl); if(!p) return;
    p.classList.remove('go'); void p.getBBox(); p.classList.add('go');
  });
}

function render(){
  const sp = DATA.spokes[state.i];
  const open = !state.closed;
  legend.classList.toggle('open', open);
  rootEl.classList.toggle('cardopen', open);
  rootEl.style.setProperty('--railh', railH()+'px');
  if(open) showArticle(state.i);
  if(!dragging) setCam(layout(open? sp.focus:null, open), true);
  setActiveRoom(open && sp.focus ? sp.key : null);
  rootEl.classList.toggle('focused', open && !!sp.focus);
  updateChips(state.i);
  const ck = (open && sp.key==='work') ? 'work' : '';
  if(ck && ck!==cometKey) fireComet();
  cometKey = ck;
}

/* =========================================================================
   NAVIGATION  (document scroll drives the camera; scroll-only = full tour)
   ========================================================================= */
function goTo(i){
  i = Math.max(0, Math.min(DATA.spokes.length-1, i));
  state.i=i; state.closed=(i===0);
  window.scrollTo({ top:i*stopPx(), behavior: RM?'auto':'smooth' });
  render();
}
let ticking=false;
function onScroll(){
  if(ticking) return; ticking=true;
  requestAnimationFrame(()=>{
    ticking=false;
    const i=Math.max(0, Math.min(DATA.spokes.length-1, Math.round(window.scrollY/stopPx())));
    const closed=(i===0);
    if(i!==state.i || closed!==state.closed){ state.i=i; state.closed=closed; render(); }
  });
}
function sizeTrack(){ document.getElementById('track').style.height=(DATA.spokes.length*window.innerHeight)+'px'; }

/* =========================================================================
   WIRING
   ========================================================================= */
function wire(){
  document.getElementById('homeBtn').addEventListener('click', ()=> goTo(0));
  document.getElementById('toolbar').addEventListener('click', e=>{
    const b=e.target.closest('[data-go]'); if(b) goTo(+b.dataset.go);
  });
  document.querySelector('.cart-ctas').addEventListener('click', e=>{
    const b=e.target.closest('[data-go]'); if(b) goTo(+b.dataset.go);
  });
  document.getElementById('articles').addEventListener('click', e=>{
    if(e.target.closest('.close')){ goTo(0); return; }
  });
  rooms.forEach(r=>{
    r.addEventListener('click', ()=> goTo(+r.dataset.go));
    r.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); goTo(+r.dataset.go); } });
  });
  const comp=document.getElementById('compass');
  comp.addEventListener('click', ()=> goTo(0));
  comp.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); goTo(0); } });

  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('keydown', e=>{
    if(e.key==='Escape'){ goTo(0); }
    else if(e.key==='ArrowDown'||e.key==='PageDown'){ e.preventDefault(); goTo(state.i+1); }
    else if(e.key==='ArrowUp'||e.key==='PageUp'){ e.preventDefault(); goTo(state.i-1); }
  });

  /* free-pan drag (only meaningful when zoomed into a district) */
  stage.addEventListener('pointerdown', e=>{
    if(e.target.closest('.room,.compass,.cartouche,.toolbar,.legend,button,a')) return;
    dragging=true; sx=e.clientX; sy=e.clientY; startCam={...cam};
    world.style.transition='none'; stage.classList.add('grabbing');
    try{ stage.setPointerCapture(e.pointerId); }catch(_){}
  });
  stage.addEventListener('pointermove', e=>{
    if(!dragging) return;
    let [tx,ty]=clampPan(startCam.tx+(e.clientX-sx), startCam.ty+(e.clientY-sy), cam.s);
    applyTransform({s:cam.s,tx,ty}); cam.tx=tx; cam.ty=ty;
  });
  const endDrag=()=>{ if(dragging){ dragging=false; stage.classList.remove('grabbing'); } };
  window.addEventListener('pointerup', endDrag);
  window.addEventListener('pointercancel', endDrag);

  window.addEventListener('resize', ()=>{ sizeTrack(); render(); });
}

/* =========================================================================
   BOOT
   ========================================================================= */
function boot(){
  buildArticles();
  buildChips();
  sizeTrack();
  wire();

  // normalise draw lengths on every self-drawing stroke
  document.querySelectorAll('.ink,.gold,.rivbank,.riv,.riverline,.vink,.route,.routeglow,.comet,.comet-glow')
    .forEach(el=> el.setAttribute('pathLength','1'));

  if(RM){
    rootEl.classList.add('rm','drawn','ready');
    state.i=0; state.closed=true; render();
  } else {
    rootEl.classList.add('play');
    requestAnimationFrame(()=> rootEl.classList.add('ready'));
    state.i=0; state.closed=true; render();
    setTimeout(fireComet, 1750);   // first call travels the route once the map settles
  }
  // web fonts can change the cartouche's measured height after first paint; resync the
  // mobile rest-state gap (no transition) once fonts finish so it never jumps visibly
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(()=>{ if(state.closed) setCam(layout(null,false), false); });
  }

  const mq=window.matchMedia('(prefers-reduced-motion: reduce)');
  (mq.addEventListener? mq.addEventListener.bind(mq,'change') : mq.addListener.bind(mq))(e=>{
    RM=e.matches; rootEl.classList.toggle('rm',RM);
    if(RM){ rootEl.classList.remove('play'); rootEl.classList.add('drawn'); }
    render();
  });
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', boot);
else boot();
</script>
