<style>
:root{

        <div class="fword">${B.word}</div>
        <div class="fth" lang="th">${B.thaiName}</div>
        <div class="colo">
          <div class="en">${F.colophonEn}</div>
          <div class="th" lang="th">${F.colophonTh}</div>
        </div>
      </div>
      <div class="fbase lbl">
        <span>${B.city}</span>
        <span>${F.copyright}</span>
      </div>
    </footer>`;

  document.getElementById("app").innerHTML =
    bar + `<main id="main">` + hero + services + work + approach + about + contact + `</main>` + foot;

  /* reveal below-the-fold sections; honor prefers-reduced-motion fully */
  const RM = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const rvs = Array.from(document.querySelectorAll(".rv"));
  if (RM || !("IntersectionObserver" in window)) {
    rvs.forEach(e=>e.classList.add("in"));
  } else {
    const below = [];
    rvs.forEach(e=>{
      if (e.getBoundingClientRect().top < window.innerHeight * .96) e.classList.add("in");
      else below.push(e);
    });
    const io = new IntersectionObserver((es)=>{
      es.forEach(x=>{ if (x.isIntersecting){ x.target.classList.add("in"); io.unobserve(x.target); } });
    }, { threshold:.12, rootMargin:"0px 0px -36px 0px" });
    below.forEach(e=>io.observe(e));
  }
})();
</script>
</body>
</html>
