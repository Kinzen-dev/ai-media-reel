<style>

  *{ box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; overflow-x:clip; }
  body{

  .mono{ font-family:var(--mono); }

  /* ---------- repo shell + gutter graph ---------- */
  .repo{
    position:relative;
    max-width:860px;
    margin:0 auto;
    padding:44px 40px 70px 84px;
  }
  .graph{
    position:absolute;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:visible;
  }
  .gpath{ fill:none; stroke:var(--gold); stroke-linecap:round; stroke-linejoin:round; }
  .gpath--main{ stroke-width:2.4; }
  .gpath--branch{ stroke-width:2.1; stroke:var(--gold-lt); }
  .gpath--tail{ stroke-width:2; stroke:var(--line2); stroke-dasharray:2 7; }
  .node{
    fill:var(--gold);
    stroke:var(--cream);
    stroke-width:2.4;
    transform-box:fill-box;
    transform-origin:center;
  }
  .node--merge{ fill:var(--sage); stroke:var(--cream); }
  .node--root{ fill:var(--cream); stroke:var(--gold); stroke-width:2.8; }

  html.anim .node.landed{
    opacity:1; transform:scale(1);
    transition:opacity .38s ease, transform .5s cubic-bezier(.34,1.56,.64,1);
  }
  .node.pulse{ animation:nodePulse .6s ease; }
  @keyframes nodePulse{
    0%{ transform:scale(1); }
    40%{ transform:scale(1.85); }
    100%{ transform:scale(1); }

  .stream{ position:relative; z-index:1; }

  .hud{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.02em;

    display:inline-flex;
    align-items:center;
    gap:.55em;
    padding:6px 12px;
    border:1px solid var(--line2);
    border-radius:100px;
    background:rgba(255,253,248,.7);
    margin-bottom:26px;
    max-width:100%;

  .hud b{ color:var(--gold-dk); font-weight:700; }
  .hud .dot{ color:var(--line2); }
  .hud .caret{
    width:7px; height:13px; background:var(--gold);
    display:inline-block; border-radius:1px;
    animation:blink 1.15s steps(1) infinite;
  }

  .subject{

  @media (hover:hover){
    .diff{
      position:absolute;
      top:2.4rem;
      right:0;
      width:min(300px, 58%);
      z-index:6;
      opacity:0;
      transform:translateY(-6px);
      pointer-events:none;
      transition:opacity .22s ease, transform .22s ease;

     RENDER
     ========================================================================== */
  const STAR = '<svg class="star" viewBox="0 0 200 200" role="img" aria-label="Vesperwerk star"><g transform="translate(100,100)"><g><polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/><polygon points="0,-86 11,0 0,0" fill="#8a6526"/></g><g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="#8a6526"/><polygon points="0,-86 11,0 0,0" fill="#c09a4a"/></g><g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/><polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/></g><g transform="rotate(270)"><polygon points="0,-64 -9.5,0 0,0" fill="#8a6526"/><polygon points="0,-64 9.5,0 0,0" fill="#c09a4a"/></g><g transform="rotate(45)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g><g transform="rotate(135)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g><g transform="rotate(225)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g><g transform="rotate(315)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g></g></svg>';

  const esc = (s) => String(s).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
  const barPlus = (ins) => '+'.repeat(Math.max(3, Math.min(14, Math.round(ins/40))));

  function subjectHTML(c){
    if(c.type === 'merge') return '<span class="ct ct-merge">merge:</span> ' + esc('pull request #001 from feature/yimwhan-ai');
    return '<span class="ct ct-'+c.type+'">'+esc(c.type)+'</span>: ' + esc(c.subject);
  }

  function diffstatHTML(c){
    if(c.merged){
      return '<div class="diffstat diffstat--merge"><span class="chip-merged">MERGED</span> <span>2 parents joined into '+esc(REPO.branch)+'</span></div>';
    }
    const fileWord = c.files === 1 ? 'file' : 'files';
    return '<div class="diffstat">'
      + '<span class="dnum" data-count="'+c.files+'">0</span> '+fileWord+' changed, '
      + '<span class="dnum" data-count="'+c.ins+'">0</span> insertions(+) '
      + '<span class="dbar">'+barPlus(c.ins)+'</span></div>';
  }

  function bodyHTML(c){
    if(c.kind === 'root'){
      return '<p class="body body--lead">'+esc(c.body)+'</p>'
        + '<div class="cta">'
        + '<a class="btn btn--primary" href="'+esc(REPO.ctaPrimary.href)+'">'+esc(REPO.ctaPrimary.label)+'</a>'
        + '<a class="btn btn--ghost" href="'+esc(REPO.ctaSecondary.href)+'" data-scroll>'+esc(REPO.ctaSecondary.label)+'</a>'
        + '</div>';
    }
    if(c.kind === 'approach'){
      let li = c.principles.map(p =>
        '<li><span class="p-plus">+</span><span class="p-title">'+esc(p[0])+'</span><span class="p-body">'+esc(p[1])+'</span></li>'
      ).join('');
      return '<ol class="principles">'+li+'</ol>';
    }
    if(c.kind === 'contact'){
      return '<a class="email" href="mailto:'+esc(c.contact.email)+'">'+esc(c.contact.email)+'</a>'
        + '<div class="loc">'+esc(c.contact.loc)+'</div>';
    }
    let html = c.body ? '<p class="body">'+esc(c.body)+'</p>' : '';
    if(c.artifact){
      html += '<figure class="artifact">'
        + '<figcaption class="artifact-bar"><span class="fname">'+esc(c.artifact.name)+'</span><span class="fmeta">'+esc(c.artifact.meta)+'</span></figcaption>'
        + '<div class="artifact-frame"><img src="'+esc(c.artifact.src)+'" alt="'+esc(c.artifact.alt)+'" loading="lazy" decoding="async"></div>'
        + '</figure>';
    }
    return html;
  }

  function commitHTML(c, i){
    const rootExtra = c.kind === 'root'
      ? '<div class="hud" id="hud"><span>HEAD</span> <b>'+esc(REPO.branch)+'</b> <span class="dot">.</span> <span id="hudN" data-count="'+COMMITS.length+'">0</span> commits <span class="dot">.</span> 1 branch <span class="caret" aria-hidden="true"></span></div>'
        + '<div class="lockup">'+STAR+'<span class="wordmark">'+esc(REPO.wordmark)+'</span></div>'
        + '<p class="epigraph" lang="th">'+esc(REPO.epigraph)+'</p>'
      : '';

    const refs = c.refs ? '<span class="refs '+c.refs.cls+'">'+esc(c.refs.text)+'</span>' : '';
    const mergedChip = c.merged ? '<span class="chip-merged">MERGED</span>' : '';

    return '<article class="commit'+(c.kind==='root'?' commit--root':'')+'" id="c-'+c.hash+'" data-i="'+i+'" data-lane="'+c.lane+'" data-kind="'+(c.kind||c.type)+'">'
      + rootExtra
      + '<div class="commit-head">'
      +   '<button class="hash" data-hash="'+c.hash+'" aria-label="Commit '+c.hash+', jump to this commit">'+(document.documentElement.classList.contains('anim') && i>0 ? '' : c.hash)+'</button>'
      +   '<span class="subject">'+subjectHTML(c)+'</span>'
      +   refs + mergedChip
      + '</div>'
      + '<div class="meta">Author: '+esc(c.author)+' <span class="sep">.</span> Date: '+esc(c.date)+'</div>'
      + diffstatHTML(c)
      + bodyHTML(c)
      + '<div class="diff" role="note"><div class="diff-h">diff . '+esc(c.subject)+'</div>'
      +   '<div class="dl dl-minus">- '+esc(c.diff[0])+'</div>'
      +   '<div class="dl dl-plus">+ '+esc(c.diff[1])+'</div></div>'
      + '</article>';
  }

  const stream = document.getElementById('stream');
  stream.innerHTML = COMMITS.map(commitHTML).join('');

  /* ==========================================================================
     GRAPH + MOTION
     ========================================================================== */
  const repo = document.getElementById('repo');
  const svg = repo.querySelector('.graph');
  const mainPath = svg.querySelector('.gpath--main');
  const branchPath = svg.querySelector('.gpath--branch');
  const tailPath = svg.querySelector('.gpath--tail');
  const gnodes = svg.querySelector('.gnodes');
  const commitEls = Array.from(stream.querySelectorAll('.commit'));
  const NS = 'http://www.w3.org/2000/svg';

  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const anim = document.documentElement.classList.contains('anim');
  const landed = new Set();

  let firstFeature = commitEls.findIndex(el => el.dataset.lane === 'feature');
  let lastFeature = -1;
  commitEls.forEach((el,i)=>{ if(el.dataset.lane === 'feature') lastFeature = i; });
  const forkParent = firstFeature - 1;
  const mergeIdx = commitEls.findIndex(el => el.dataset.kind === 'merge');

  function buildGraph(first){
    const cs = getComputedStyle(repo);
    const gutter = parseFloat(cs.paddingLeft) || 60;
    const mainX = gutter * 0.36;
    const featureX = gutter * 0.76;
    const nodeR = Math.max(4.2, Math.min(6, gutter * 0.085));
    const rRect = repo.getBoundingClientRect();
    const W = repo.clientWidth;
    const H = repo.offsetHeight;

    const ys = commitEls.map(el => {
      const h = el.querySelector('.commit-head').getBoundingClientRect();
      return h.top - rRect.top + h.height / 2;
    });
    const xs = commitEls.map(el => el.dataset.lane === 'feature' ? featureX : mainX);

    svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
    svg.setAttribute('width', W);
    svg.setAttribute('height', H);

    const top = ys[0], bot = ys[ys.length - 1];
    mainPath.setAttribute('d', 'M ' + mainX + ' ' + top + ' L ' + mainX + ' ' + bot);
    tailPath.setAttribute('d', 'M ' + mainX + ' ' + bot + ' L ' + mainX + ' ' + (bot + 34));

    let bD = '';
    if(firstFeature > -1 && forkParent > -1){
      const fy0 = ys[forkParent], fy1 = ys[firstFeature];
      bD += 'M ' + mainX + ' ' + fy0 + ' C ' + mainX + ' ' + ((fy0+fy1)/2) + ', ' + featureX + ' ' + ((fy0+fy1)/2) + ', ' + featureX + ' ' + fy1 + ' ';
      bD += 'L ' + featureX + ' ' + ys[lastFeature] + ' ';
      const my0 = ys[lastFeature], my1 = ys[mergeIdx];
      bD += 'M ' + featureX + ' ' + my0 + ' C ' + featureX + ' ' + ((my0+my1)/2) + ', ' + mainX + ' ' + ((my0+my1)/2) + ', ' + mainX + ' ' + my1;
    }
    branchPath.setAttribute('d', bD);

    // nodes
    gnodes.textContent = '';
    commitEls.forEach((el,i) => {
      const c = document.createElementNS(NS, 'circle');
      const kind = el.dataset.kind;
      let r = nodeR, cls = 'node';
      if(kind === 'merge'){ r = nodeR * 1.5; cls += ' node--merge'; }
      if(el.classList.contains('commit--root')){ cls += ' node--root'; }
      if(landed.has(i)) cls += ' landed';
      c.setAttribute('cx', xs[i]);
      c.setAttribute('cy', ys[i]);
      c.setAttribute('r', r);
      c.setAttribute('class', cls);
      c.setAttribute('id', 'node-' + i);
      gnodes.appendChild(c);
    });

    // entrance line draw (first build, anim only)
    [mainPath, branchPath].forEach(p => {
      p.style.transition = '';
      if(first && anim && p.getTotalLength){
        const len = p.getTotalLength();
        p.style.strokeDasharray = len;
        p.style.strokeDashoffset = len;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          p.style.transition = 'stroke-dashoffset 1.5s cubic-bezier(.4,0,.1,1)';
          p.style.strokeDashoffset = '0';
        }));
      } else {
        p.style.strokeDasharray = '';
        p.style.strokeDashoffset = '';
      }
    });
  }

  function resolveHash(el, finalHash){
    if(reduce){ el.textContent = finalHash; return; }
    const hex = '0123456789abcdef';
    const dur = 460, start = performance.now();
    function tick(now){
      const p = (now - start) / dur;
      if(p >= 1){ el.textContent = finalHash; return; }
      const lock = Math.floor(p * finalHash.length);
      let s = '';
      for(let i=0;i<finalHash.length;i++){ s += i < lock ? finalHash[i] : hex[(Math.random()*16)|0]; }
      el.textContent = s;
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function countUp(el, target){
    if(reduce || target === 0){ el.textContent = target; return; }
    const dur = 620, start = performance.now();
    function tick(now){
      const p = Math.min(1, (now - start) / dur);
      el.textContent = Math.round(p * target);
      if(p < 1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  function land(i){
    if(landed.has(i)) return;
    landed.add(i);
    const el = commitEls[i];
    el.classList.add('landed');
    const node = document.getElementById('node-' + i);
    if(node) node.classList.add('landed');
    const hashEl = el.querySelector('.hash');
    const finalHash = hashEl.dataset.hash;
    if(i === 0){
      hashEl.textContent = finalHash;
      el.querySelectorAll('[data-count]').forEach(s => { s.textContent = s.dataset.count; });
    } else {
      resolveHash(hashEl, finalHash);
      el.querySelectorAll('.dnum[data-count]').forEach(s => countUp(s, +s.dataset.count));
    }
  }

  // hash click => pulse node + scroll to commit
  stream.querySelectorAll('.hash').forEach(btn => {
    btn.addEventListener('click', () => {
      const el = btn.closest('.commit');
      const i = +el.dataset.i;
      const node = document.getElementById('node-' + i);
      if(node && !reduce){ node.classList.remove('pulse'); void node.getBBox(); node.classList.add('pulse'); setTimeout(()=>node.classList.remove('pulse'), 640); }
      el.scrollIntoView({ behavior: reduce ? 'auto' : 'smooth', block: 'center' });
    });
  });
  // "See our work" smooth scroll
  const scrollBtn = stream.querySelector('[data-scroll]');
  if(scrollBtn){
    scrollBtn.addEventListener('click', (e) => {
      e.preventDefault();
      const t = document.querySelector(scrollBtn.getAttribute('href'));
      if(t) t.scrollIntoView({ behavior: reduce ? 'auto' : 'smooth', block: 'center' });
    });
  }

  // boot
  buildGraph(true);

  const hudN = document.getElementById('hudN');
  if(!anim){
    commitEls.forEach((_, i) => land(i));
    if(hudN) hudN.textContent = COMMITS.length;
  } else {
    land(0);
    if(hudN) countUp(hudN, COMMITS.length);
    if('IntersectionObserver' in window){
      const io = new IntersectionObserver((entries) => {
        entries.forEach(e => {
          if(e.isIntersecting){ land(+e.target.dataset.i); io.unobserve(e.target); }
        });
      }, { rootMargin: '0px 0px -12% 0px', threshold: 0.18 });
      commitEls.forEach((el, i) => { if(i > 0) io.observe(el); });
    } else {
      commitEls.forEach((_, i) => land(i));
    }
  }

  // relayout after fonts + images + resize (idempotent, preserves landed state)
  let t;
  function relayout(){ clearTimeout(t); t = setTimeout(() => buildGraph(false), 120); }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(() => buildGraph(false)); }
  window.addEventListener('load', () => buildGraph(false));
  window.addEventListener('resize', relayout);
  const cimg = stream.querySelector('.artifact-frame img');
  if(cimg && !cimg.complete){ cimg.addEventListener('load', () => buildGraph(false)); }
  </script>
</body>
</html>
