<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vesperwerk : The Ledger of Works</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,500&family=Noto+Serif+Thai:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#faf7f1;
  --ink:#2e2a26;
  --ink-body:rgba(46,42,38,.88);
  --ink-soft:rgba(46,42,38,.60);
  --ink-hair:rgba(46,42,38,.28);
  --ink-faint:rgba(46,42,38,.14);
  --gold:#a8802f;
  --gold-lite:#c09a4a;
  --gold-dark:#8a6526;
  --etch-dur:.95s;
  --body-dur:.72s;
  --med-dur:.72s;
}
*{box-sizing:border-box}
html,body{margin:0}
html{scroll-behavior:auto}
body{
  background-color:var(--paper);
  background-image:repeating-linear-gradient(90deg, rgba(46,42,38,.018) 0 1px, transparent 1px 5px);
  color:var(--ink);
  font-family:'Cormorant Garamond',serif;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(125% 105% at 50% -8%, transparent 52%, rgba(46,42,38,.07) 100%);
  mix-blend-mode:multiply;
}
img{max-width:100%}

/* ===== HUD (engineering honesty) ===== */
.hud{
  position:fixed;top:0;left:0;z-index:50;margin:clamp(8px,1.6vw,16px);
  font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  font-size:.62rem;letter-spacing:.09em;color:var(--ink-soft);
  background:rgba(250,247,241,.84);backdrop-filter:blur(2px);
  border:1px solid var(--ink-hair);padding:.42em .72em;
  display:flex;gap:.5em;align-items:center;white-space:nowrap;
}
.hud .sep{color:var(--gold)}

/* ===== folio-turn page corner ===== */
.folio-turn{
  position:fixed;right:0;bottom:0;z-index:50;
  width:clamp(66px,9vw,94px);height:clamp(66px,9vw,94px);
  border:0;background:transparent;cursor:pointer;padding:0;
}
.folio-turn svg{width:100%;height:100%;display:block;transition:transform .35s cubic-bezier(.2,.8,.2,1);filter:drop-shadow(0 4px 10px rgba(46,42,38,.28))}
.folio-turn:hover svg,.folio-turn:focus-visible svg{transform:translate(-3px,-3px)}
.folio-turn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.folio-turn::after{
  content:'Next folio';position:absolute;right:100%;bottom:36%;margin-right:8px;white-space:nowrap;
  font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:.56rem;letter-spacing:.14em;text-transform:uppercase;
  color:var(--ink-soft);background:rgba(250,247,241,.92);padding:.28em .55em;border:1px solid var(--ink-hair);
  opacity:0;transform:translateX(6px);transition:opacity .3s,transform .3s;pointer-events:none;
}
.folio-turn:hover::after,.folio-turn:focus-visible::after{opacity:1;transform:none}
@keyframes flap{0%{transform:translate(0,0)}42%{transform:translate(-8px,-8px)}100%{transform:translate(-3px,-3px)}}
.folio-turn.flip svg{animation:flap .46s ease}

/* ===== plate / book ===== */
.wrap{padding:clamp(10px,2.4vw,30px);position:relative;z-index:2}
.book{
  max-width:1140px;margin:0 auto;padding:clamp(18px,3.4vw,44px);
  border:3px double var(--ink-hair);position:relative;
  background-image:repeating-linear-gradient(0deg, transparent 0 31px, rgba(46,42,38,.05) 31px 32px);
}

/* ===== masthead / title page ===== */
#masthead{
  text-align:center;position:relative;
  padding:clamp(6px,2vw,22px) 0 clamp(20px,3vw,32px);
  border-bottom:1px solid var(--ink-hair);
}
.medallion{width:clamp(184px,42vw,226px);margin:0 auto clamp(10px,2vw,16px)}
.medallion svg{width:100%;height:auto;display:block;overflow:visible}
.masthead-line{
  position:relative;display:inline-block;padding-bottom:13px;
  font-family:'Cormorant Garamond',serif;text-transform:uppercase;
  letter-spacing:.3em;font-size:clamp(.62rem,1.6vw,.76rem);color:var(--ink-soft);
}
.masthead-line .dot{color:var(--gold);margin:0 .55em}
.mrule{position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:min(320px,86%);height:2px}
.mrule line{stroke:var(--ink-hair);stroke-width:1}
.wordmark{
  font-family:'Playfair Display',serif;font-weight:600;letter-spacing:.18em;
  font-size:clamp(1.55rem,7vw,3.3rem);color:var(--ink);
  margin:clamp(12px,2vw,18px) 0 0;line-height:1;
}

/* ===== ledger entry ===== */
.entry{
  display:grid;grid-template-columns:minmax(0,clamp(74px,12vw,124px)) minmax(0,1fr);
  gap:clamp(16px,3vw,40px);
  padding:clamp(26px,4vw,46px) 0;
  border-top:1px solid var(--ink-hair);
  position:relative;scroll-margin-top:14px;
}
.entry:first-of-type{border-top:0}
.rail{text-align:right;padding-right:clamp(12px,2vw,22px);border-right:1px solid var(--ink-hair);min-width:0}
.rail-lab,.rail-date{display:block;font-family:'Cormorant Garamond',serif;text-transform:uppercase;letter-spacing:.24em;font-size:.6rem;color:var(--ink-soft)}
.folio-num{display:block;font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(1.5rem,3vw,2.1rem);color:var(--gold);line-height:1.05;margin:.12em 0}
.main{min-width:0}
.ehead{position:relative}
.led-h{font-family:'Playfair Display',serif;font-weight:500;font-style:italic;font-size:clamp(1.4rem,3.4vw,2.15rem);line-height:1.16;margin:0;color:var(--ink)}
.led-sub{font-family:'Cormorant Garamond',serif;font-style:italic;text-transform:uppercase;letter-spacing:.2em;font-size:.82rem;color:var(--ink-soft);margin-top:.35rem}
.led-body{font-size:clamp(1.06rem,1.5vw,1.28rem);line-height:32px;margin:.5rem 0 0;color:var(--ink-body);max-width:60ch}

/* the ONE gold rule per entry = the heading flourish */
.flourish{display:block;width:min(260px,74%);height:auto;margin:.75rem 0 .1rem}
.flourish [data-etch]{fill:none;stroke:var(--gold);stroke-width:var(--fw,1.3);stroke-linecap:round;stroke-linejoin:round;transition:stroke-width .3s ease}
.entry:hover .flourish [data-etch]{--fw:2.1}

/* line items + memos */
.items,.memos{margin-top:1.1rem;display:flex;flex-direction:column}
.line-item,.memo{
  display:grid;grid-template-columns:minmax(0,46px) minmax(0,1fr);
  gap:clamp(12px,2vw,26px);padding:clamp(14px,2vw,20px) 0;position:relative;align-items:start;
}
.item-rule{position:absolute;left:0;right:0;bottom:0;height:2px;width:100%}
.item-rule line{stroke:var(--ink-hair);stroke-width:1}
.item-no,.memo-no{font-family:'Playfair Display',serif;font-weight:600;color:var(--gold);font-size:clamp(1rem,1.8vw,1.24rem);line-height:1.3}
.item-title,.memo-title{font-family:'Playfair Display',serif;font-weight:500;font-size:clamp(1.05rem,1.9vw,1.32rem);margin:0 0 .22rem;color:var(--ink)}
.item-body,.memo-body{font-size:clamp(1rem,1.4vw,1.16rem);line-height:1.5;color:var(--ink-body);margin:0;max-width:56ch}

/* tipped-in plate (work) */
.plate{margin:1.4rem 0 0;max-width:min(560px,100%)}
.plate-mat{background:#fffdf8;border:1px solid var(--ink-hair);box-shadow:0 1px 0 rgba(46,42,38,.1),0 12px 26px -16px rgba(46,42,38,.55);padding:clamp(8px,1.5vw,14px)}
.plate-mat img{display:block;width:100%;height:auto;border:1px solid var(--ink-faint)}
.plate figcaption{font-family:'Cormorant Garamond',serif;font-style:italic;text-transform:uppercase;letter-spacing:.16em;font-size:.66rem;color:var(--ink-soft);margin-top:.6rem;text-align:center}

/* buttons */
.cta{display:flex;gap:14px;flex-wrap:wrap;margin-top:1.15rem}
.btn{position:relative;display:inline-block;font-family:'Cormorant Garamond',serif;text-transform:uppercase;letter-spacing:.18em;font-size:.74rem;color:var(--ink);text-decoration:none;padding:.72em 1.35em;border:1px solid var(--ink-hair);transition:border-color .3s,color .3s}
.btn--p{border-color:var(--ink)}
.btn::after{content:'';position:absolute;left:1.35em;right:1.35em;bottom:.5em;height:1px;background:var(--gold);transform:scaleX(0);transform-origin:left;transition:transform .35s ease}
.btn:hover,.btn:focus-visible{color:var(--ink)}
.btn:hover::after,.btn:focus-visible::after{transform:scaleX(1)}
.btn:focus-visible{outline:2px solid var(--gold);outline-offset:3px}

/* contact */
.contact{margin-top:1.1rem;display:flex;flex-direction:column;gap:.35rem}
.contact-mail{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.1rem,2vw,1.4rem);color:var(--ink);text-decoration:none;border-bottom:1px solid var(--gold);align-self:flex-start;padding-bottom:2px;word-break:break-word}
.contact-mail:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
.contact-place{font-family:'Cormorant Garamond',serif;text-transform:uppercase;letter-spacing:.22em;font-size:.68rem;color:var(--ink-soft)}

/* Thai epigraph */
.epigraph{text-align:center;padding:clamp(26px,4vw,44px) clamp(8px,3vw,20px);border-top:1px solid var(--ink-hair);border-bottom:1px solid var(--ink-hair);margin-top:clamp(20px,3vw,30px)}
.epi-thai{font-family:'Noto Serif Thai','Cormorant Garamond',serif;font-size:clamp(1.1rem,2.4vw,1.5rem);line-height:1.5;color:var(--ink)}

/* footer */
.foot{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:clamp(10px,2vw,22px);padding:clamp(22px,3.4vw,34px) 0 clamp(4px,1vw,8px);text-align:center}
.foot-star{width:26px;height:26px;display:inline-block;line-height:0}
.foot-star svg{width:100%;height:100%;display:block}
.foot-word{font-family:'Playfair Display',serif;font-weight:600;letter-spacing:.2em;font-size:1rem;color:var(--ink)}
.foot-meta{font-family:'Cormorant Garamond',serif;text-transform:uppercase;letter-spacing:.2em;font-size:.68rem;color:var(--ink-soft)}

/* medallion strokes */
.medallion [data-etch]{fill:none}
.s-out{stroke:var(--ink-soft);stroke-width:.55}
.s-mid{stroke:var(--ink-soft);stroke-width:.62}
.s-den{stroke:var(--ink);stroke-width:.8}
.m-circ{stroke:var(--ink-hair);stroke-width:.8;fill:none}
.m-rim{stroke:var(--gold);stroke-width:1.3;fill:none}
.ring-text{fill:var(--ink-soft);font-family:'Cormorant Garamond',serif;text-transform:uppercase;letter-spacing:2px;font-weight:500}

/* ===== engraving mechanics (draw-on) ===== */
[data-etch]{stroke-dasharray:1;stroke-dashoffset:1;transition:stroke-dashoffset var(--etch-dur,.9s) ease var(--d,0s)}
.medallion [data-etch]{transition-duration:var(--med-dur,.72s);transition-timing-function:cubic-bezier(.3,.72,.32,1)}
:root.reveal #masthead [data-etch]{stroke-dashoffset:0}
.entry.drawn [data-etch]{stroke-dashoffset:0}

.rise{opacity:0;transform:translateY(10px);transition:opacity var(--body-dur,.72s) ease var(--d,0s),transform var(--body-dur,.72s) ease var(--d,0s)}
:root.reveal #masthead .rise,.entry.drawn .rise{opacity:1;transform:none}
.fade{opacity:0;transition:opacity .8s ease var(--d,0s)}
:root.reveal #masthead .fade{opacity:1}
.rise-star{opacity:0;transform:scale(.55);transform-box:fill-box;transform-origin:center;transition:opacity .8s ease var(--d,0s),transform .9s cubic-bezier(.2,.8,.2,1) var(--d,0s)}
:root.reveal #masthead .rise-star{opacity:1;transform:none}

/* fully-etched static state (reduced-motion) */
:root.etched [data-etch]{stroke-dashoffset:0!important;transition:none!important}
:root.etched .rise,:root.etched .rise-star{opacity:1!important;transform:none!important;transition:none!important}
:root.etched .fade{opacity:1!important;transition:none!important}

@media (max-width:640px){
  .entry{grid-template-columns:1fr;gap:10px}
  .rail{text-align:left;border-right:0;border-bottom:1px solid var(--ink-hair);padding:0 0 9px;display:flex;gap:11px;align-items:baseline}
  .folio-num{margin:0;font-size:1.5rem}
  .rail-date{margin-left:auto}
  .medallion{width:55vw}
  .wordmark{letter-spacing:.16em}
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.001ms!important}
  html{scroll-behavior:auto!important}
}
</style>
</head>
<body>
<div class="hud" aria-hidden="true"><span id="hud-folio">FOLIO 01</span><span class="sep">/</span><span id="hud-strokes">STROKES 0</span><span class="sep">/</span><span>EST 2026</span></div>

<button class="folio-turn" id="folioTurn" type="button" aria-label="Turn to the next folio and replay its engraving">
  <svg viewBox="0 0 100 100" aria-hidden="true">
    <defs><linearGradient id="pgrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffdf8"/><stop offset="1" stop-color="#efe8da"/></linearGradient></defs>
    <path d="M100 52 Q 66 56 54 100 L100 100 Z" fill="rgba(46,42,38,.18)"/>
    <path d="M100 46 Q 60 52 46 100 L100 100 Z" fill="url(#pgrad)" stroke="#a8802f" stroke-width="1.1"/>
    <path d="M100 46 Q 74 74 46 100" fill="none" stroke="#c09a4a" stroke-width="1.4"/>
    <path d="M70 74 l8 8 8 -8" fill="none" stroke="#8a6526" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
</button>

<main class="wrap"><div class="book" id="book"></div></main>

<script>
/* =====================================================================
   DATA  -  edit this object to swap all copy. Nothing below needs touching.
   ===================================================================== */
const DATA = {
  masthead:{ folio:'No. 001', place:'Bangkok', est:'Est. 2026', wordmark:'VESPERWERK' },
  entries:[
    { id:'top',      folio:'01', folioNum:'01', date:'Anno MMXXVI', kind:'hero',     heading:'An independent software and AI studio.' },
    { id:'services', folio:'02', folioNum:'02', date:'MMXXVI',      kind:'services', heading:'Services rendered' },
    { id:'work',     folio:'03', folioNum:'03', date:'MMXXVI',      kind:'work',     heading:'Selected work', sub:'Yimwhan AI' },
    { id:'approach', folio:'04', folioNum:'04', date:'MMXXVI',      kind:'approach', heading:'Approach' },
    { id:'contact',  folio:'05', folioNum:'05', date:'MMXXVI',      kind:'about',    heading:'Colophon' }
  ],
  hero:{ lede:'We architect, build, and operate production systems for businesses that cannot afford them to fail.' },
  services:[
    { title:'AI Systems', body:'Voice agents, LLM assistants, and the evaluation infrastructure that keeps them honest. AI that answers like your best employee, in production, around the clock.' },
    { title:'Product Engineering', body:'Full-stack product engineering from architecture to operations: event-driven backends, modern web frontends, and infrastructure that scales without drama.' },
    { title:'Commerce and Platforms', body:'Deep Shopify and LINE platform work: storefronts, admin apps, integrations, and the messaging rails Southeast Asian commerce runs on.' }
  ],
  work:{ body:'An AI voice and LINE assistant for dental clinics in Thailand. It answers after-hours calls, books and reschedules appointments, and hands off to staff the moment a human matters. In production at live clinics.', caption:'Plate No. 03 : Yimwhan, in production at live clinics' },
  approach:[
    { title:'Architecture first', body:'We design the system before we write the code.' },
    { title:'Production-worthy', body:'Demos impress; production endures. We build for the second one.' },
    { title:'Scope discipline', body:'The most valuable thing we tell clients is what not to build.' },
    { title:'Senior hands', body:'No juniors learning on your budget. Founder-led, senior hands on every line.' }
  ],
  about:'Vesperwerk takes its name from the evening star: the first light you can navigate by. We are a founder-led studio in Bangkok building software for businesses across Asia and beyond.',
  contact:{ email:'kittipong.k@vesperwerk.com', place:'Bangkok, Thailand' },
  epigraph:'ดาวประจำเมือง : แสงแรกที่ใช้นำทางยามค่ำ',
  footer:{ place:'Bangkok, Thailand', copy:'(c) 2026 Vesperwerk' }
};

/* =====================================================================
   Deterministic hand-jitter (seeded once, stable across loads -> not
   runtime randomness). Powers the burin wobble baked into path data.
   ===================================================================== */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* eight-point vesper star, two-facet gold, baked to scale k (no CSS/attr transform conflict) */
function starGroups(k){
  const arms=[
    {rot:0,   L:86, w:11,  a:'#c09a4a', b:'#8a6526'},
    {rot:180, L:86, w:11,  a:'#8a6526', b:'#c09a4a'},
    {rot:90,  L:64, w:9.5, a:'#c09a4a', b:'#8a6526'},
    {rot:270, L:64, w:9.5, a:'#8a6526', b:'#c09a4a'},
    {rot:45,  L:44, w:7.5, a:'#c09a4a', b:'#8a6526'},
    {rot:135, L:44, w:7.5, a:'#c09a4a', b:'#8a6526'},
    {rot:225, L:44, w:7.5, a:'#8a6526', b:'#c09a4a'},
    {rot:315, L:44, w:7.5, a:'#8a6526', b:'#c09a4a'}
  ];
  return arms.map(m=>{
    const L=(m.L*k).toFixed(2), w=(m.w*k).toFixed(2);
    return '<g transform="rotate('+m.rot+')"><polygon points="0,-'+L+' -'+w+',0 0,0" fill="'+m.a+'"/><polygon points="0,-'+L+' '+w+',0 0,0" fill="'+m.b+'"/></g>';
  }).join('');
}

/* the copperplate medallion: radial burin guilloche around the vesper star */
function buildMedallion(){
  const R=mulberry32(0x56455350);
  const cx=200, cy=200;
  let s='';
  const circ=(r,cls,d)=>'<circle class="'+cls+'" data-etch pathLength="1" cx="200" cy="200" r="'+r+'" style="--d:'+d+'s"/>';
  s+=circ(150,'m-rim',.05);
  s+=circ(126,'m-circ',.1);
  s+=circ(122,'m-circ',.12);
  s+=circ(100,'m-circ',.14);
  s+=circ(96,'m-circ',.16);
  s+=circ(62,'m-circ',.18);
  s+=circ(52,'m-circ',.2);
  function band(count,r1,r2,cls,dBase,dSpan,wob){
    let o='';
    for(let i=0;i<count;i++){
      const a=(i/count)*Math.PI*2 + (R()-0.5)*0.02;
      const rr1=r1+(R()-0.5)*1.6, rr2=r2+(R()-0.5)*1.6;
      const x1=cx+rr1*Math.cos(a), y1=cy+rr1*Math.sin(a);
      const x2=cx+rr2*Math.cos(a), y2=cy+rr2*Math.sin(a);
      const mx=(x1+x2)/2 + Math.cos(a+Math.PI/2)*(R()-0.5)*wob;
      const my=(y1+y2)/2 + Math.sin(a+Math.PI/2)*(R()-0.5)*wob;
      const d=(dBase+(i/count)*dSpan).toFixed(3);
      o+='<path class="'+cls+'" data-etch pathLength="1" d="M'+x1.toFixed(2)+' '+y1.toFixed(2)+' Q '+mx.toFixed(2)+' '+my.toFixed(2)+' '+x2.toFixed(2)+' '+y2.toFixed(2)+'" style="--d:'+d+'s"/>';
    }
    return o;
  }
  s+=band(120,127,148,'s-out',0.18,0.55,2.4);
  s+=band(72,63,95,'s-mid',0.5,0.42,2.0);
  s+=band(36,53.5,61,'s-den',0.72,0.3,0.8);
  s+='<path id="ringpath" d="M200 88 A112 112 0 1 1 199.99 88" fill="none"/>';
  s+='<text class="ring-text fade" style="--d:1s" font-size="10.4"><textPath href="#ringpath" startOffset="0" textLength="700" lengthAdjust="spacing">VESPERWERK  .  INDEPENDENT SOFTWARE STUDIO  .  BANGKOK  .  ANNO MMXXVI</textPath></text>';
  s+='<g transform="translate(200,200)"><g class="rise-star" style="--d:.86s">'+starGroups(0.5)+'</g></g>';
  return '<svg viewBox="0 0 400 400" role="img" aria-label="Vesperwerk engraved copperplate medallion" style="overflow:visible">'+s+'</svg>';
}

/* the single gold rule per entry = the drawn heading flourish */
function flourish(){
  return '<svg class="flourish" viewBox="0 0 260 18" preserveAspectRatio="xMidYMid meet" aria-hidden="true">'+
    '<path data-etch pathLength="1" d="M6 9 Q 60 7.4 114 9"/>'+
    '<path data-etch pathLength="1" d="M254 9 Q 200 10.6 146 9"/>'+
    '<path data-etch pathLength="1" d="M118 9 L130 3.6 L142 9 L130 14.4 Z"/>'+
    '<path data-etch pathLength="1" d="M113 9 h-4 M147 9 h4"/>'+
  '</svg>';
}
function inkRule(d){
  return '<svg class="item-rule" viewBox="0 0 100 2" preserveAspectRatio="none" aria-hidden="true"><line data-etch pathLength="1" x1="0" y1="1" x2="100" y2="1" style="--d:'+d+'s"/></svg>';
}

function renderEntry(e){
  const head='<div class="ehead">'+
    '<h2 class="led-h rise" style="--d:.06s">'+e.heading+'</h2>'+
    (e.sub?'<div class="led-sub rise" style="--d:.14s">'+e.sub+'</div>':'')+
    flourish()+
  '</div>';
  let main='';
  if(e.kind==='hero'){
    main='<p class="led-body rise" style="--d:.42s">'+DATA.hero.lede+'</p>'+
      '<div class="cta rise" style="--d:.62s">'+
        '<a class="btn btn--p" href="#contact">Start a conversation</a>'+
        '<a class="btn" href="#work">See our work</a>'+
      '</div>';
  } else if(e.kind==='services'){
    main='<div class="items">'+DATA.services.map((s,i)=>{
      const d1=(0.30+i*0.12).toFixed(2), d2=(0.34+i*0.12).toFixed(2), d3=(0.42+i*0.12).toFixed(2);
      return '<div class="line-item">'+
        '<span class="item-no rise" style="--d:'+d1+'s">02.'+(i+1)+'</span>'+
        '<div class="item-main">'+
          '<h3 class="item-title rise" style="--d:'+d2+'s">'+s.title+'</h3>'+
          '<p class="item-body rise" style="--d:'+d3+'s">'+s.body+'</p>'+
        '</div>'+ inkRule(d1)+
      '</div>';
    }).join('')+'</div>';
  } else if(e.kind==='work'){
    main='<p class="led-body rise" style="--d:.42s">'+DATA.work.body+'</p>'+
      '<figure class="plate rise" style="--d:.6s">'+
        '<div class="plate-mat"><img src="../assets/flux-clinic-4k.png" alt="Yimwhan AI dental clinic interior, in production" loading="lazy" decoding="async" width="1600" height="900"></div>'+
        '<figcaption>'+DATA.work.caption+'</figcaption>'+
      '</figure>';
  } else if(e.kind==='approach'){
    const rn=['i','ii','iii','iv'];
    main='<div class="memos">'+DATA.approach.map((m,i)=>{
      const d1=(0.30+i*0.10).toFixed(2), d2=(0.34+i*0.10).toFixed(2), d3=(0.42+i*0.10).toFixed(2);
      return '<div class="memo">'+
        '<span class="memo-no rise" style="--d:'+d1+'s">'+rn[i]+'</span>'+
        '<div class="memo-main">'+
          '<h3 class="memo-title rise" style="--d:'+d2+'s">'+m.title+'</h3>'+
          '<p class="memo-body rise" style="--d:'+d3+'s">'+m.body+'</p>'+
        '</div>'+ inkRule(d1)+
      '</div>';
    }).join('')+'</div>';
  } else if(e.kind==='about'){
    main='<p class="led-body rise" style="--d:.42s">'+DATA.about+'</p>'+
      '<div class="contact rise" style="--d:.6s">'+
        '<a class="contact-mail" href="mailto:'+DATA.contact.email+'">'+DATA.contact.email+'</a>'+
        '<span class="contact-place">'+DATA.contact.place+'</span>'+
      '</div>';
  }
  return '<section class="entry entry--'+e.kind+'" id="'+e.id+'" data-folio="'+e.folioNum+'">'+
    '<div class="rail"><span class="rail-lab">Fol.</span><span class="folio-num">'+e.folio+'</span><span class="rail-date">'+e.date+'</span></div>'+
    '<div class="main">'+head+main+'</div>'+
  '</section>';
}

function render(){
  const book=document.getElementById('book');
  const masthead='<div id="masthead">'+
    '<div class="medallion">'+buildMedallion()+'</div>'+
    '<div class="masthead-line rise" style="--d:1.02s">'+
      '<span>'+DATA.masthead.folio+'</span><span class="dot">.</span><span>'+DATA.masthead.place+'</span><span class="dot">.</span><span>'+DATA.masthead.est+'</span>'+
      '<svg class="mrule" viewBox="0 0 400 2" preserveAspectRatio="none" aria-hidden="true"><line data-etch pathLength="1" x1="0" y1="1" x2="400" y2="1" style="--d:1.1s"/></svg>'+
    '</div>'+
    '<h1 class="wordmark rise" style="--d:1.2s">'+DATA.masthead.wordmark+'</h1>'+
  '</div>';
  const entriesHTML=DATA.entries.map(renderEntry).join('');
  const epi='<div class="epigraph"><span class="epi-thai">'+DATA.epigraph+'</span></div>';
  const foot='<footer class="foot">'+
    '<span class="foot-star"><svg viewBox="-100 -100 200 200" aria-hidden="true">'+starGroups(0.95)+'</svg></span>'+
    '<span class="foot-word">'+DATA.masthead.wordmark+'</span>'+
    '<span class="foot-meta">'+DATA.footer.place+'</span>'+
    '<span class="foot-meta">'+DATA.footer.copy+'</span>'+
  '</footer>';
  book.innerHTML=masthead+entriesHTML+epi+foot;
}

/* =====================================================================
   Engraving orchestration: entrance ritual, scroll choreography,
   engineering-honesty HUD, folio-turn replay. Fully gated for reduced-motion.
   ===================================================================== */
function init(){
  render();
  const root=document.documentElement;
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  const entries=[...document.querySelectorAll('.entry')];
  const hero=document.querySelector('.entry--hero');
  const mast=document.getElementById('masthead');
  const hudFolio=document.getElementById('hud-folio');
  const hudStrokes=document.getElementById('hud-strokes');
  const btn=document.getElementById('folioTurn');
  const countEtch=el=>el.querySelectorAll('[data-etch]').length;
  const counted=new WeakSet();
  let drawn=0;
  const setStrokes=n=>{hudStrokes.textContent='STROKES '+n.toLocaleString('en-US');};
  function addDrawn(el){ if(counted.has(el))return; counted.add(el); drawn+=countEtch(el); setStrokes(drawn); }

  // FOLIO readout follows scroll (text only, safe under reduced-motion)
  let ticking=false;
  function updFolio(){
    const mid=innerHeight*0.4; let cur=entries[0];
    for(const e of entries){ if(e.getBoundingClientRect().top<=mid) cur=e; }
    hudFolio.textContent='FOLIO '+((cur&&cur.dataset.folio)||'01');
  }
  addEventListener('scroll',()=>{ if(ticking)return; ticking=true; requestAnimationFrame(()=>{ticking=false; updFolio();}); },{passive:true});

  // folio-turn: jump to next entry, replay its etch at 3x
  function flap(){ if(reduced)return; btn.classList.add('flip'); setTimeout(()=>btn.classList.remove('flip'),470); }
  function replay(el){
    if(reduced)return;
    el.style.setProperty('--etch-dur','0.32s');
    el.style.setProperty('--body-dur','0.26s');
    if(el.classList.contains('drawn')){ el.classList.remove('drawn'); void el.offsetWidth; }
    el.classList.add('drawn'); addDrawn(el);
    setTimeout(()=>{ el.style.removeProperty('--etch-dur'); el.style.removeProperty('--body-dur'); },900);
  }
  btn.addEventListener('click',()=>{
    let target=null;
    for(const e of entries){ if(e.getBoundingClientRect().top>60){ target=e; break; } }
    if(!target){ scrollTo({top:0,behavior:reduced?'auto':'smooth'}); flap(); return; }
    target.scrollIntoView({behavior:reduced?'auto':'smooth',block:'start'});
    flap(); replay(target);
  });

  if(reduced){
    root.classList.add('etched');
    entries.forEach(e=>{ e.classList.add('drawn'); counted.add(e); });
    setStrokes(document.querySelectorAll('[data-etch]').length);
    updFolio();
    return;
  }

  setStrokes(0);
  const io=new IntersectionObserver(es=>{
    es.forEach(en=>{ if(en.isIntersecting){ const t=en.target; if(!t.classList.contains('drawn')){ t.classList.add('drawn'); addDrawn(t); } io.unobserve(t); } });
  },{threshold:0.15,rootMargin:'0px 0px -10% 0px'});
  entries.filter(e=>e!==hero).forEach(e=>io.observe(e));

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    root.classList.add('reveal');
    setTimeout(()=>{ mast.querySelectorAll('[data-etch]').forEach(()=>{}); drawn+=mast.querySelectorAll('[data-etch]').length; setStrokes(drawn); },900);
    setTimeout(()=>{ hero.classList.add('drawn'); addDrawn(hero); },1450);
  }));
  updFolio();
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
</body>
