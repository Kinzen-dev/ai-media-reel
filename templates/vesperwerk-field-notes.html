<!-- TEMPLATE: Vesperwerk Field Notes | ARCHETYPE: stapled pocket field logbook (dated entries on ruled pages) | REF: fieldnotesbrand.com + engineering lab-notebook + warm analog stationery | WHEN TO USE: a warm, human studio / portfolio / product story that courts approachable buyers (Thai SMB owners who find luxury registers cold) | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vesperwerk Field Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=Courier+Prime:wght@400;700&family=Sarabun:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================== TOKENS ============================== */
  :root{
    --kraft:#c9a86a;         /* cover board */
    --kraft-d:#b8975a;       /* cover board shade */
    --kraft-dd:#a5854a;      /* cover board deep */
    --ink:#2e2a26;           /* warm ink text */
    --ink-soft:#5b5348;      /* secondary ink */
    --gold:#a8802f;          /* antique gold */
    --gold-l:#c09a4a;        /* facet light */
    --gold-d:#8a6526;        /* facet dark */
    --cream:#faf7f1;         /* ruled page */
    --cream-2:#f3efe4;       /* page edge */
    --rule:#c7d0d8;          /* faint blue-grey ruling */
    --rule-2:#dfe4e8;        /* fainter ruling */
    --margin:#c69a58;        /* page margin line */
    --desk-1:#7c6b50;
    --desk-2:#665639;
    --desk-3:#514228;
    --rp:32px;               /* ruling pitch (also body line-height) */
    --paper-sh:0 1px 0 rgba(255,255,255,.5), 0 18px 34px rgba(40,30,14,.34), 0 3px 8px rgba(40,30,14,.22);
  }

  /* ============================== RESET ============================== */
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
  body{
    font-family:'Spectral',Georgia,'Times New Roman',serif;
    color:var(--ink);
    background:
      radial-gradient(130% 100% at 50% -8%, var(--desk-1) 0%, var(--desk-2) 52%, var(--desk-3) 100%);
    background-attachment:fixed;
    overflow-x:hidden;
    min-height:100vh;
    line-height:var(--rp);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  body::before{
    /* faint desk grain */
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
    background:repeating-linear-gradient(115deg, rgba(255,255,255,.03) 0 2px, rgba(0,0,0,.03) 2px 4px);
    mix-blend-mode:soft-light;
  }
  img{max-width:100%;display:block}
  a{color:inherit}
  :focus-visible{outline:2.5px solid var(--gold);outline-offset:3px;border-radius:3px}

  .th{font-family:'Sarabun',sans-serif;line-height:1.5;letter-spacing:normal}

  /* ============================== SHELL ============================== */
  .wrap{position:relative;z-index:1;max-width:100%;padding:0 clamp(16px,4vw,40px) 64px}
  .deskline{
    max-width:1180px;margin:0 auto;padding:26px 4px 8px;
    display:flex;align-items:center;gap:12px;color:rgba(255,248,232,.72);
    font-family:'Courier Prime',monospace;font-size:12px;letter-spacing:.28em;text-transform:uppercase;line-height:1.4;
  }
  .deskline .dl-star{width:16px;height:16px;flex:0 0 auto}
  .deskline .dl-rule{flex:1 1 auto;min-width:0;height:1px;background:linear-gradient(90deg,rgba(255,248,232,.4),rgba(255,248,232,0))}

  /* ============================== HERO BOOK ============================== */
  .stage{max-width:1180px;margin:0 auto;padding:8px 0 12px;display:flex;justify-content:center}

  /* mobile-first: the book is a stacked, already-open column */
  .book{
    position:relative;width:100%;max-width:560px;
    display:flex;flex-direction:column;gap:16px;
  }
  .cover{position:relative;width:100%;min-width:0}
  .cover-front{display:none}   /* outer cover only used in the desktop flip */

  /* the inside cover face = kraft title board */
  .cover-inside{
    position:relative;width:100%;min-width:0;border-radius:9px;overflow:hidden;
    background:
      radial-gradient(120% 90% at 25% 10%, #d3b578 0%, var(--kraft) 42%, var(--kraft-d) 100%);
    box-shadow:var(--paper-sh);
    padding:30px 26px 24px;
    border:1px solid rgba(120,86,30,.25);
  }
  .cover-inside::after{ /* board fibre + edge darkening */
    content:"";position:absolute;inset:0;pointer-events:none;border-radius:9px;
    background:
      repeating-linear-gradient(96deg, rgba(90,60,16,.05) 0 3px, rgba(255,240,200,.04) 3px 6px),
      radial-gradient(140% 120% at 50% 120%, rgba(70,44,10,.22), rgba(70,44,10,0) 55%);
    mix-blend-mode:multiply;
  }
  .cover-inside > *{position:relative;z-index:2}
  .star{display:block}
  .star.big{width:76px;height:76px;transform:rotate(-9deg);opacity:.94;mix-blend-mode:multiply;margin:0 0 12px}
  .wordmark{
    margin:0;font-family:'Playfair Display',serif;font-weight:600;color:var(--ink);
    font-size:clamp(25px,6.6vw,38px);letter-spacing:.18em;line-height:1.04;
    white-space:nowrap;
  }
  .substamp{
    margin:12px 0 0;font-family:'Courier Prime',monospace;font-size:11.5px;letter-spacing:.24em;
    text-transform:uppercase;color:rgba(46,42,38,.72);line-height:1.5;
    display:inline-block;padding:4px 9px;border:1.5px solid rgba(46,42,38,.34);border-radius:3px;
    transform:rotate(-1.3deg);
  }
  .epigraph{
    margin:20px 0 0;max-width:34ch;color:rgba(46,42,38,.82);font-size:15px;
    padding-left:12px;border-left:2px solid rgba(168,128,47,.6);
  }
  .cover-note{
    margin:16px 0 0;font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.16em;
    text-transform:uppercase;color:rgba(46,42,38,.55);line-height:1.5;
  }

  /* ---- a ruled cream page ---- */
  .page{
    position:relative;width:100%;min-width:0;border-radius:9px;overflow:hidden;
    background:var(--cream);
    box-shadow:var(--paper-sh);
    border:1px solid rgba(120,86,30,.16);
  }
  .page::before{ /* horizontal ruling */
    content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
    background-image:repeating-linear-gradient(to bottom,
      transparent 0, transparent calc(var(--rp) - 1px),
      var(--rule) calc(var(--rp) - 1px), var(--rule) var(--rp));
    background-position:0 43px;opacity:.85;
  }
  .page::after{ /* left margin rule */
    content:"";position:absolute;top:0;bottom:0;left:44px;width:2px;z-index:0;
    background:rgba(198,154,88,.7);
  }
  .page-body{position:relative;z-index:2;padding:24px 26px 30px 62px;min-width:0}

  /* ---- stamp ---- */
  .entry-stamp{position:relative;z-index:3}
  .stamp{
    display:inline-flex;flex-direction:column;align-items:center;gap:1px;
    padding:7px 13px 9px;border:2.5px solid rgba(46,42,38,.62);border-radius:5px;
    color:rgba(46,42,38,.78);background:transparent;transform:rotate(var(--rot,-4deg));
    box-shadow:inset 0 0 0 1px rgba(46,42,38,.12);
  }
  .stamp .s-lab{font-family:'Courier Prime',monospace;font-size:9px;letter-spacing:.34em;line-height:1}
  .stamp .s-no{font-family:'Playfair Display',serif;font-weight:700;font-size:26px;line-height:1;letter-spacing:.06em}
  .stamp .s-sub{font-family:'Courier Prime',monospace;font-size:8.5px;letter-spacing:.2em;line-height:1.1}

  /* ---- entry text ---- */
  .entry-title{
    margin:10px 0 2px;font-family:'Playfair Display',serif;font-weight:600;
    font-size:clamp(22px,5.6vw,30px);line-height:1.14;color:var(--ink);position:relative;min-width:0;
  }
  .ul{display:block;width:min(240px,66%);height:11px;margin-top:1px;overflow:visible}
  .ul path{fill:none;stroke:var(--gold);stroke-width:2.4;stroke-linecap:round;stroke-dasharray:320;stroke-dashoffset:320;transition:stroke-dashoffset .8s ease .12s}
  .lines{margin:14px 0 0;font-size:16px;color:var(--ink);max-width:52ch}
  .ln{display:block;opacity:0;transform:translateY(8px);transition:opacity .5s ease,transform .5s ease;transition-delay:calc(var(--i,0)*88ms + .05s)}
  .is-written .ln{opacity:1;transform:none}
  .is-written .ul path{stroke-dashoffset:0}

  /* ---- reply card (CTA, entry 001) ---- */
  .reply{
    position:relative;margin:22px 0 4px;max-width:340px;
    background:linear-gradient(180deg,#fffdf8,#f4eee1);border:1px solid rgba(120,86,30,.2);border-radius:5px;
    padding:20px 20px 18px;transform:rotate(-1.4deg);
    box-shadow:0 8px 18px rgba(40,30,14,.2),0 1px 0 rgba(255,255,255,.7) inset;
  }
  .clip{position:absolute;top:-16px;left:22px;width:24px;height:52px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.28))}
  .reply-lab{margin:0 0 12px;font-family:'Courier Prime',monospace;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-soft)}
  .btn{
    display:inline-block;font-family:'Playfair Display',serif;font-weight:600;font-size:16px;letter-spacing:.02em;
    color:var(--cream);background:linear-gradient(180deg,#3a352d,#2a2621);text-decoration:none;
    padding:11px 20px;border-radius:4px;border:1px solid #211d18;box-shadow:0 4px 12px rgba(0,0,0,.24);
    transition:transform .18s ease,box-shadow .18s ease;
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 9px 18px rgba(0,0,0,.28)}
  .lnk{display:inline-block;margin-left:14px;font-size:14.5px;color:var(--gold-d);text-decoration:none;
    border-bottom:1.5px solid rgba(138,101,38,.5);padding-bottom:1px}
  .lnk:hover{border-bottom-color:var(--gold-d)}

  /* ---- doodle in the margin ---- */
  .doodle{position:relative;margin:16px 0 0;width:150px;height:60px;max-width:100%}
  .doodle path{fill:none;stroke:var(--ink);stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:640;stroke-dashoffset:640;transition:stroke-dashoffset 1s ease .2s;opacity:.72}
  .doodle .accent{stroke:var(--gold)}
  .is-written .doodle path{stroke-dashoffset:0}
  .doodle-cap{margin:2px 0 0;font-family:'Courier Prime',monospace;font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)}

  /* ---- polaroid (case, entry 005) ---- */
  .polaroid{
    margin:20px 0 6px;width:min(340px,100%);background:#fdfaf3;padding:12px 12px 40px;
    border-radius:2px;transform:rotate(var(--rot,-3deg));position:relative;
    box-shadow:0 10px 22px rgba(40,30,14,.3),0 1px 0 rgba(255,255,255,.8) inset;
  }
  .pol-img{position:relative;width:100%;aspect-ratio:3/2;background:#171310;overflow:hidden;border-radius:1px}
  .pol-img img{width:100%;height:100%;object-fit:contain}
  .pol-cap{margin:10px 2px 0;font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.1em;color:var(--ink-soft);text-align:center}
  .tag{display:inline-block;margin:2px 0 0;font-family:'Courier Prime',monospace;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-d)}
  .tape{position:absolute;width:74px;height:24px;background:linear-gradient(180deg,rgba(226,214,186,.62),rgba(210,196,162,.5));
    box-shadow:0 1px 3px rgba(0,0,0,.14);}
  .tape.tl{top:-11px;left:-16px;transform:rotate(-38deg)}
  .tape.br{bottom:28px;right:-16px;transform:rotate(-38deg)}

  /* ---- principles checklist (entry 006) ---- */
  .checks{margin:16px 0 0;list-style:none;padding:0;display:grid;gap:14px}
  .chk{display:flex;gap:14px;align-items:flex-start;min-width:0}
  .cbx{flex:0 0 auto;width:28px;height:28px;margin-top:2px}
  .cbx path{fill:none;stroke-linecap:round;stroke-linejoin:round}
  .cbx .box{stroke:var(--ink);stroke-width:2;stroke-dasharray:110;stroke-dashoffset:110;transition:stroke-dashoffset .6s ease .1s}
  .cbx .tick{stroke:var(--gold);stroke-width:3;stroke-dasharray:56;stroke-dashoffset:56;transition:stroke-dashoffset .5s ease .5s}
  .is-written .cbx .box{stroke-dashoffset:0}
  .is-written .cbx .tick{stroke-dashoffset:0}
  .chk-txt{min-width:0}
  .chk-h{font-family:'Playfair Display',serif;font-weight:600;font-size:17px;color:var(--ink)}
  .chk-b{font-size:15px;color:var(--ink-soft)}

  /* ---- about + contact + footer (entry 007) ---- */
  .contact{margin:20px 0 0;font-size:16px}
  .contact .clab{font-family:'Courier Prime',monospace;font-size:10.5px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);display:block;margin-bottom:2px}
  .email{
    font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(18px,4.4vw,23px);color:var(--ink);
    text-decoration:none;display:inline-block;position:relative;padding-bottom:6px;word-break:break-word;
    border-bottom:2px solid var(--gold);
  }
  .email::after{content:"";position:absolute;left:0;right:0;bottom:1px;height:2px;background:var(--gold);opacity:.75}
  .email:hover{color:var(--gold-d)}
  .place{margin:12px 0 0;font-size:15px;color:var(--ink-soft)}
  .foot{
    margin:26px 0 0;padding-top:18px;border-top:1px dashed rgba(120,86,30,.4);
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;min-width:0;
  }
  .foot .star{width:26px;height:26px;flex:0 0 auto}
  .foot .fw{font-family:'Playfair Display',serif;font-weight:600;letter-spacing:.18em;font-size:15px}
  .foot .fmeta{font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.12em;color:var(--ink-soft)}
  .pencil{
    margin:20px 0 0;font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.06em;
    color:rgba(46,42,38,.42);transform:rotate(-.6deg);
  }

  /* ============================== LOG (entries 002-007) ============================== */
  .log{max-width:760px;margin:0 auto;padding:40px 0 0;display:flex;flex-direction:column;gap:30px}
  .entry{
    position:relative;transition:transform .28s ease,box-shadow .28s ease;
  }
  .entry .page{scroll-margin-top:24px}
  .entry:hover{transform:translateY(-4px)}
  .entry:hover .page{box-shadow:0 1px 0 rgba(255,255,255,.5),0 26px 46px rgba(40,30,14,.42),0 5px 12px rgba(40,30,14,.28)}

  /* staples down the left binding of every ruled page */
  .staples{position:absolute;top:0;bottom:0;left:20px;width:16px;z-index:4;display:flex;flex-direction:column;justify-content:space-evenly;pointer-events:none;padding:34px 0}
  .staple{width:16px;height:5px;border-radius:2px;position:relative;
    background:linear-gradient(180deg,#f2f2f0,#b7b8b6 45%,#8f908d);
    box-shadow:0 1px 1px rgba(0,0,0,.28),0 0 0 .5px rgba(0,0,0,.12)}
  .staple::before,.staple::after{content:"";position:absolute;top:100%;width:3px;height:4px;background:#9a9b98;border-radius:0 0 1px 1px}
  .staple::before{left:1px}.staple::after{right:1px}

  .entry-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;min-width:0}
  .entry-head .entry-title{flex:1 1 auto;min-width:0}

  /* ============================== TAB INDEX (signature nav) ============================== */
  /* mobile-first: a bottom strip */
  .tabs{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    display:flex;justify-content:center;gap:6px;flex-wrap:nowrap;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(50,41,26,0),rgba(46,38,24,.9) 40%);
  }
  .tab{
    flex:0 0 auto;text-decoration:none;font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.1em;
    color:var(--ink);background:var(--cream-2);border:1px solid rgba(120,86,30,.4);border-radius:5px;
    padding:6px 8px;min-width:34px;text-align:center;line-height:1;transition:background .2s,color .2s,transform .2s;
    box-shadow:0 2px 5px rgba(0,0,0,.25);
  }
  .tab:hover{transform:translateY(-2px)}
  .tab.active{background:var(--gold);color:#fff8ec;border-color:var(--gold-d)}
  .tab .t-dot{display:none}

  /* ============================== DESKTOP SPREAD (>=821px) ============================== */
  @media (min-width:821px){
    .stage{padding:6px 0 18px;perspective:2000px;perspective-origin:52% 42%}
    .book{
      width:min(1040px,94vw);max-width:none;height:min(602px,66vh);
      display:block;transform-style:preserve-3d;margin:0 auto;
    }
    /* left slot backing (kraft board seen before the cover lands) */
    .book::before{
      content:"";position:absolute;left:0;top:0;width:50%;height:100%;border-radius:10px 3px 3px 10px;
      background:radial-gradient(120% 100% at 30% 10%,#c9a86a,#a5854a);
      box-shadow:var(--paper-sh);
    }
    /* right slot = Entry 001 page, static, revealed as the cover lifts */
    .page-leaf{
      position:absolute;right:0;top:0;width:50%;height:100%;z-index:2;
      border-radius:3px 10px 10px 3px;
    }
    .page-leaf .page{height:100%;border-radius:3px 10px 10px 3px}
    .page-leaf .page-body{padding:30px 40px 30px 66px;height:100%;overflow:hidden}

    /* the flipping cover occupies the right slot when closed */
    .cover{
      position:absolute;left:50%;top:0;width:50%;height:100%;z-index:6;
      transform-origin:left center;transform:rotateY(0deg) translateZ(3px);
      transform-style:preserve-3d;
      transition:transform 2.1s cubic-bezier(.66,.02,.24,1);
    }
    .book.is-open .cover{transform:rotateY(-178deg) translateZ(3px)}

    .cover-front,.cover-inside{
      position:absolute;inset:0;height:100%;width:100%;
      backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:3px 10px 10px 3px;
      padding:0;display:flex;flex-direction:column;justify-content:center;
    }
    /* outer cover (visible while closed) */
    .cover-front{
      display:flex;align-items:center;text-align:center;padding:34px;
      background:radial-gradient(120% 100% at 70% 12%,#d3b578,var(--kraft) 44%,var(--kraft-d) 100%);
      box-shadow:var(--paper-sh);
    }
    .cf-inner{margin:auto;position:relative;z-index:2}
    .cf-emboss{display:flex;justify-content:center}
    .cf-emboss .star{width:120px;height:120px;opacity:.26;mix-blend-mode:multiply;transform:rotate(-8deg)}
    .cf-word{margin:18px 0 0;font-family:'Playfair Display',serif;font-weight:600;letter-spacing:.26em;font-size:30px;color:rgba(46,42,38,.9)}
    .cf-sub{margin:12px 0 0;font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:rgba(46,42,38,.6)}
    .cf-no{position:absolute;top:-10px;right:-6px;font-family:'Courier Prime',monospace;font-size:11px;letter-spacing:.18em;color:rgba(46,42,38,.5);transform:rotate(-3deg)}
    .cover-front::after{content:"";position:absolute;inset:0;border-radius:3px 10px 10px 3px;pointer-events:none;
      background:radial-gradient(140% 120% at 50% 120%,rgba(70,44,10,.24),rgba(70,44,10,0) 55%);mix-blend-mode:multiply}

    /* inner cover (visible when open, the title board) */
    .cover-inside{
      transform:rotateY(180deg);align-items:flex-start;justify-content:center;
      padding:40px 40px 34px;border-radius:10px 3px 3px 10px;overflow:hidden;
    }
    .cover-inside::after{border-radius:10px 3px 3px 10px}
    .star.big{width:104px;height:104px}
    .wordmark{font-size:38px}
    .epigraph{font-size:15.5px}

    /* the spine staples sit in the centre gutter over the open spread */
    .spine{
      position:absolute;left:calc(50% - 9px);top:0;bottom:0;width:18px;z-index:8;
      display:flex;flex-direction:column;justify-content:space-evenly;padding:70px 0;pointer-events:none;
    }
    .spine .staple{width:18px;height:6px}

    .log{padding-top:58px;gap:34px}
    .entry-head .doodle{margin-top:0}

    /* tab index -> right edge vertical strip */
    .tabs{
      left:auto;right:14px;top:50%;bottom:auto;transform:translateY(-50%);
      flex-direction:column;justify-content:flex-start;gap:8px;padding:0;background:none;
    }
    .tab{
      display:flex;align-items:center;gap:7px;min-width:0;padding:8px 11px 8px 12px;
      border-radius:4px 8px 8px 4px;box-shadow:0 3px 8px rgba(0,0,0,.28);
    }
    .tab .t-dot{display:block;width:6px;height:6px;border-radius:50%;background:rgba(120,86,30,.4)}
    .tab.active .t-dot{background:#fff3d8}
  }

  @media (min-width:821px) and (max-width:980px){
    .book{height:min(560px,64vh)}
    .wordmark{font-size:32px}
    .cover-inside{padding:30px 28px}
    .page-leaf .page-body{padding:24px 28px 24px 58px}
  }

  /* the spine staples only render in the desktop spread */
  .spine{display:none}
  @media (min-width:821px){.spine{display:flex}}

  /* ============================== REDUCED MOTION ============================== */
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
    html{scroll-behavior:auto}
    .ln{opacity:1 !important;transform:none !important}
    .ul path,.doodle path,.cbx .box,.cbx .tick{stroke-dashoffset:0 !important}
    .stamp{opacity:1 !important}
    .entry:hover{transform:none !important}
    .btn:hover{transform:none !important}
  }
</style>
</head>
<body>

<!-- reusable SVG defs: roughen (rubber-stamp ink) + the vesper star symbol -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <defs>
    <filter id="roughen" x="-15%" y="-15%" width="130%" height="130%">

<script>

/* ======================================================================
   Render helpers
   ====================================================================== */
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const linesHTML = arr => arr.map((t,i)=>`<span class="ln" style="--i:${i}">${esc(t)}</span>`).join('');
const ul = () => `<svg class="ul" viewBox="0 0 240 11" preserveAspectRatio="none" aria-hidden="true"><path d="M2,7 C42,3 82,10 122,6 S202,3 238,7"/></svg>`;

const stamp = e => `
  <div class="entry-stamp">
    <div class="stamp" style="--rot:${(-6 + (parseInt(e.no,10)%3)*2.4).toFixed(1)}deg">
      <span class="s-lab">ENTRY</span>
      <span class="s-no">${esc(e.no)}</span>
      <span class="s-sub">${esc(e.sub)}</span>
    </div>
  </div>`;

const doodleSVG = kind => {
  if(kind==='wave') return `<svg class="doodle" viewBox="0 0 150 60" aria-hidden="true">
    <path class="accent" d="M6,30 C13,9 21,51 29,30 C37,9 45,51 53,30 C61,12 69,48 77,30 C85,9 93,51 101,30 C109,14 117,46 125,30 C131,18 138,42 144,30"/></svg>`;
  if(kind==='truss') return `<svg class="doodle" viewBox="0 0 150 60" aria-hidden="true">
    <path d="M8,48 L142,48 M8,48 L27,14 L46,48 L65,14 L84,48 L103,14 L122,48 L141,14 M27,14 L141,14"/>
    <path class="accent" d="M8,48 L8,14 L27,14"/></svg>`;
  if(kind==='awning') return `<svg class="doodle" viewBox="0 0 150 60" aria-hidden="true">
    <path d="M10,16 L140,16 M14,16 L20,42 M136,16 L130,42 M20,42 q10,13 20,0 q10,13 20,0 q10,13 20,0 q10,13 20,0 q10,13 20,0"/>
    <path class="accent" d="M75,16 L69,42 M105,16 L99,42"/></svg>`;
  return '';
};

function renderNote(e){
  return `
    ${stamp(e)}
    <h2 class="entry-title">${esc(e.title)}${ul()}</h2>
    <div class="lines">${linesHTML(e.lines)}</div>
    <div class="reply">
      <span class="clip" aria-hidden="true"><svg viewBox="0 0 24 52"><path d="M17,7 L17,38 a6.5,6.5 0 0 1 -13,0 L4,13 a4,4 0 0 1 8,0 L12,36" fill="none" stroke="#b6babf" stroke-width="3" stroke-linecap="round"/><path d="M17,7 L17,38 a6.5,6.5 0 0 1 -13,0 L4,13 a4,4 0 0 1 8,0 L12,36" fill="none" stroke="#eef0f2" stroke-width="1" stroke-linecap="round"/></svg></span>

      <a class="lnk" href="#e005">${esc(e.cta.secondary)}</a>

}

function renderService(e){

    <div class="staples" aria-hidden="true"><span class="staple"></span><span class="staple"></span></div>

      <div class="entry-head">

          <h2 class="entry-title">${esc(e.title)}${ul()}</h2>

function renderCase(e){

    <div class="staples" aria-hidden="true"><span class="staple"></span><span class="staple"></span></div>

}

    <div class="staples" aria-hidden="true"><span class="staple"></span><span class="staple"></span></div>
    <div class="page-body">
      <div class="entry-head">
        <div style="min-width:0;flex:1 1 auto"><h2 class="entry-title">${esc(e.title)}${ul()}</h2></div>

/* ---- title board (open cover inner face) ---- */
document.getElementById('titleboard').innerHTML = `
  <svg class="star big" style="filter:url(#roughen)" aria-label="Vesperwerk star"><use href="#vstar"></use></svg>
  <h1 class="wordmark">${esc(DATA.brand.wordmark)}</h1>
  <span class="substamp">${esc(DATA.brand.substamp)}</span>
  <p class="epigraph th">${esc(DATA.brand.epigraphTh)}</p>
  <p class="cover-note">${esc(DATA.brand.coverNote)}</p>`;

/* ---- hero note (Entry 001) ---- */
document.getElementById('hero-note').innerHTML = renderNote(DATA.entries[0]);

/* ---- log entries 002-007 ---- */
const renderers = { service:renderService, case:renderCase, principles:renderPrinciples, about:renderAbout };
const logEl = document.getElementById('log');
logEl.innerHTML = DATA.entries.slice(1).map(e=>`
  <article class="entry" id="${e.id}" data-entry>
    <div class="page">${renderers[e.kind](e)}</div>
  </article>`).join('');

/* ---- tab index ---- */
document.getElementById('tabs').innerHTML = DATA.entries.map((e,i)=>`
  <a class="tab${i===0?' active':''}" href="#${e.id}" data-tab="${e.id}" aria-label="Go to entry ${e.no}">
    <span>${e.no}</span><span class="t-dot" aria-hidden="true"></span>
  </a>`).join('');

/* ======================================================================
   Motion  -  entrance ritual (cover lifts, entries write themselves).
   All reveals are CSS transitions triggered by classes: no rAF loop.
   ====================================================================== */
(function(){
  const RM   = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const wide = window.matchMedia('(min-width:821px)').matches;
  const book = document.getElementById('book');
  const hero = document.getElementById('e001');
  const flow = Array.from(document.querySelectorAll('#log .entry'));
  const openBook = () => book.classList.add('is-open');

  if(RM){
    openBook();
    document.querySelectorAll('.entry').forEach(el=>el.classList.add('is-written'));
  } else {
    if(wide){
      setTimeout(openBook, 160);
      setTimeout(()=>hero.classList.add('is-written'), 1150);
    } else {
      openBook();
      setTimeout(()=>hero.classList.add('is-written'), 260);
    }
    const io = new IntersectionObserver((ents)=>{
      ents.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('is-written'); io.unobserve(en.target); } });
    }, { threshold:0.18, rootMargin:'0px 0px -8% 0px' });
    flow.forEach(el=>io.observe(el));
  }

  /* active tab tracking */
  const tabById = id => document.querySelector('.tab[data-tab="'+id+'"]');
  const all = Array.from(document.querySelectorAll('.entry'));
  const setActive = id => document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===id));
  const tio = new IntersectionObserver((ents)=>{
    ents.forEach(en=>{ if(en.isIntersecting) setActive(en.target.id); });
  }, { threshold:0, rootMargin:'-45% 0px -45% 0px' });
  all.forEach(el=>tio.observe(el));

  /* smooth in-page nav (first tab -> top) */
  document.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click', ev=>{
      const id = t.dataset.tab;
      const target = document.getElementById(id);
      if(!target) return;
      ev.preventDefault();
      const behavior = RM ? 'auto' : 'smooth';
      if(id==='e001'){ window.scrollTo({top:0, behavior}); }
      else { target.scrollIntoView({behavior, block:'start'}); }
    });
  });
})();
</script>
