<!-- TEMPLATE: Vesperwerk Grand Ascenseur | ARCHETYPE: brass Art Deco elevator ride through the maison | REF: Rosewood Hotel Georgia (Ste Marie) + TWA Hotel signage (Pentagram) + Lando Norris (OFF+BRAND) | WHEN TO USE: heritage / luxury / founder-led studio site where scroll should feel like a cinematic ride between floors | SWAP: edit the DATA array at top -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Vesperwerk - Grand Ascenseur</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Josefin+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+Thai:wght@400;500&display=swap');

  :root{
    --ink:#241f1b;
    --ink-2:#2b2620;
    --ink-3:#191510;
    --brass:#a8802f;
    --brass-lt:#c09a4a;
    --brass-hi:#e6c878;
    --brass-dk:#8a6526;
    --cream:#faf7f1;
    --cream-2:#efe8da;
    --amber:#c8963c;
  }

  *{box-sizing:border-box;}
  html{scroll-snap-type:y proximity;scroll-behavior:auto;-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:
      radial-gradient(120% 80% at 50% -10%, #322b23 0%, var(--ink) 46%, var(--ink-3) 100%);
    color:var(--cream);
    font-family:'Cormorant Garamond',Georgia,serif;
    overflow-x:hidden;
    min-height:100vh;
  }
  img{max-width:100%;display:block;}
  a{color:inherit;}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}
  :focus-visible{outline:2px solid var(--brass-hi);outline-offset:3px;border-radius:3px;}

  /* ============ CROWN (fixed sunburst + star) ============ */
  .crown{
    position:fixed;top:0;left:50%;transform:translateX(-50%);
    width:min(92vw,760px);height:220px;z-index:40;pointer-events:none;
    display:flex;flex-direction:column;align-items:center;
  }
  .crown__star{width:52px;margin-top:8px;filter:drop-shadow(0 2px 10px rgba(200,150,60,.35));}
  .crown__star svg{width:100%;height:auto;display:block;}
  .crown__fan{width:100%;height:auto;margin-top:-6px;overflow:visible;}

  /* ============ SIDE DIAL (desktop floor indicator) ============ */
  .dial{
    position:fixed;right:10px;top:50%;transform:translateY(-50%);
    z-index:70;display:flex;align-items:center;gap:2px;
    padding:12px 10px;border-radius:14px;
    background:linear-gradient(160deg, rgba(42,36,29,.86), rgba(20,17,13,.9));
    border:1px solid rgba(168,128,47,.42);
    box-shadow:0 18px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(230,200,120,.14);
    backdrop-filter:blur(3px);
  }
  .dial__gauge{width:88px;height:auto;overflow:visible;}
  .dial__arc{fill:none;stroke:rgba(168,128,47,.5);stroke-width:1.4;}
  .dial__tick{stroke:var(--brass-dk);stroke-width:1.6;}
  .dial__tick.on{stroke:var(--brass-hi);stroke-width:2.4;}
  .dial__needle{stroke:var(--brass-hi);stroke-width:2.6;stroke-linecap:round;
    filter:drop-shadow(0 0 4px rgba(230,200,120,.55));}
  .dial__hub{fill:var(--brass-lt);stroke:var(--brass-dk);stroke-width:1.2;}
  .dial__col{display:flex;flex-direction:column;gap:6px;}

  .fbtn{
    width:34px;height:32px;display:flex;align-items:center;justify-content:center;
    font-family:'Josefin Sans',sans-serif;font-weight:500;font-size:.82rem;letter-spacing:.06em;
    color:var(--brass-lt);border:1px solid rgba(168,128,47,.4);border-radius:8px;
    background:linear-gradient(180deg, rgba(60,50,38,.6), rgba(30,25,19,.6));
    transition:color .25s, box-shadow .25s, border-color .25s, background .25s;
    position:relative;
  }
  .fbtn:hover{color:var(--cream);border-color:rgba(200,154,74,.75);}
  .fbtn.lit{
    color:var(--ink-3);border-color:var(--brass-hi);
    background:linear-gradient(180deg, var(--brass-hi), var(--brass));
    box-shadow:0 0 14px rgba(230,200,120,.6), inset 0 1px 0 rgba(255,255,255,.4);
  }
  .fbtn.arrive{animation:ding .6s ease;}
  .fbtn.tick{animation:tick .28s ease;}
  @keyframes ding{
    0%{box-shadow:0 0 0 rgba(230,200,120,0);}
    30%{box-shadow:0 0 22px 4px rgba(230,200,120,.95);}
    100%{box-shadow:0 0 14px rgba(230,200,120,.6);}
  }
  @keyframes tick{0%{color:var(--brass-lt);}40%{color:var(--brass-hi);}100%{color:var(--brass-lt);}}

  /* ============ TOP BAR (mobile floor indicator) ============ */
  .topbar{
    display:none;position:fixed;top:0;left:0;right:0;z-index:70;
    padding:6px 8px 7px;
    background:linear-gradient(180deg, rgba(20,17,13,.96), rgba(30,25,19,.82));
    border-bottom:1px solid rgba(168,128,47,.4);
  }
  .topbar__strip{position:relative;height:3px;margin:2px 12px 8px;border-radius:2px;
    background:linear-gradient(90deg, rgba(168,128,47,.25), rgba(168,128,47,.45));}
  .topbar__needle{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;
    left:calc(6px + var(--p,0) * (100% - 12px));transform:translate(-50%,-50%);
    background:radial-gradient(circle at 40% 35%, var(--brass-hi), var(--brass));
    box-shadow:0 0 10px rgba(230,200,120,.8);transition:none;}
  .topbar__row{display:flex;justify-content:space-between;gap:4px;}
  .tdot{
    flex:1 1 0;min-width:0;height:26px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Josefin Sans',sans-serif;font-size:.72rem;letter-spacing:.04em;
    color:var(--brass-lt);border:1px solid rgba(168,128,47,.34);
    background:rgba(40,33,26,.5);transition:color .2s,background .2s,border-color .2s;
  }
  .tdot.lit{color:var(--ink-3);border-color:var(--brass-hi);
    background:linear-gradient(180deg,var(--brass-hi),var(--brass));}
  .tdot.arrive{animation:ding .6s ease;}

  /* ============ WIPE (diagonal transition panel) ============ */
  .wipe{position:fixed;inset:0;z-index:35;overflow:hidden;pointer-events:none;}
  .wipe__panel{
    position:absolute;top:-10%;left:-70%;width:130%;height:120%;
    transform:translateX(-160%) skewX(-11deg);
    background:linear-gradient(90deg, rgba(25,21,16,.0) 0%, var(--ink-3) 8%, var(--ink) 92%, rgba(25,21,16,0) 100%);
    border-right:2px solid var(--brass-hi);
    box-shadow:6px 0 30px rgba(0,0,0,.6), 2px 0 12px rgba(230,200,120,.35);
    will-change:transform;
  }
  .wipe__panel.run{animation:wipe .42s cubic-bezier(.7,.02,.28,1) forwards;}
  .wipe__panel.express{animation:wipe .5s cubic-bezier(.62,0,.2,1) forwards;}
  @keyframes wipe{
    0%{transform:translateX(-165%) skewX(-11deg);}
    100%{transform:translateX(165%) skewX(-11deg);}
  }

  /* ============ CAB RAIL (bottom, counterweight) ============ */
  .rail{position:fixed;left:0;right:0;bottom:0;height:26px;z-index:42;pointer-events:none;}
  .rail::before{content:'';position:absolute;left:16px;right:16px;top:11px;height:2px;
    background:linear-gradient(90deg, rgba(168,128,47,.15), rgba(200,154,74,.6), rgba(168,128,47,.15));}
  .rail__weight{position:absolute;top:12px;width:12px;height:12px;border-radius:50%;
    left:calc(16px + (1 - var(--p,0)) * (100% - 32px));transform:translate(-50%,-50%);
    background:radial-gradient(circle at 38% 32%, var(--brass-hi), var(--brass-dk));
    box-shadow:0 0 8px rgba(230,200,120,.55);}
  .rail__label{position:absolute;right:18px;bottom:2px;font-family:'Josefin Sans',sans-serif;
    font-size:.56rem;letter-spacing:.28em;color:rgba(200,154,74,.55);text-transform:uppercase;}

  /* ============ ENTRANCE GATES ============ */
  .entrance{position:fixed;inset:0;z-index:60;overflow:hidden;pointer-events:none;}
  .gate{position:absolute;top:0;bottom:0;width:54vw;
    background:
      linear-gradient(var(--amber-dir, to right), transparent 60%, rgba(168,128,47,.10) 86%, rgba(200,150,60,.26) 100%),
      repeating-linear-gradient(45deg, rgba(200,154,74,.5) 0 1.6px, transparent 1.6px 26px),
      repeating-linear-gradient(-45deg, rgba(200,154,74,.5) 0 1.6px, transparent 1.6px 26px);
  }
  .gate--l{left:0;transform:translateX(-70%);animation:gate-l 2s cubic-bezier(.66,0,.2,1) .35s forwards;--amber-dir:to right;}
  .gate--r{right:0;transform:translateX(70%);animation:gate-r 2s cubic-bezier(.66,0,.2,1) .35s forwards;--amber-dir:to left;}
  .gate--l::after{content:'';position:absolute;right:0;top:0;bottom:0;width:7px;
    background:linear-gradient(90deg, rgba(138,101,38,.7), var(--brass-lt), rgba(138,101,38,.7));}
  .gate--r::after{content:'';position:absolute;left:0;top:0;bottom:0;width:7px;
    background:linear-gradient(90deg, rgba(138,101,38,.7), var(--brass-lt), rgba(138,101,38,.7));}
  @keyframes gate-l{from{transform:translateX(-70%);}to{transform:translateX(-102%);}}
  @keyframes gate-r{from{transform:translateX(70%);}to{transform:translateX(102%);}}

  /* ============ ROOMS ============ */
  main{position:relative;z-index:1;}
  .room{
    min-height:100vh;min-height:100svh;scroll-snap-align:start;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:154px 176px 56px 28px;position:relative;
  }
  .room__num{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Playfair Display',serif;font-weight:600;
    font-size:clamp(9rem,34vw,26rem);line-height:.8;color:transparent;
    -webkit-text-stroke:1.4px rgba(200,154,74,.16);pointer-events:none;user-select:none;
    z-index:0;letter-spacing:-.02em;
  }
  .kicker{font-family:'Josefin Sans',sans-serif;font-weight:500;font-size:.72rem;
    letter-spacing:.36em;text-transform:uppercase;color:var(--brass-lt);}
  .rule{height:1px;width:64px;margin:14px 0;
    background:linear-gradient(90deg, var(--brass-hi), rgba(168,128,47,0));}

  /* -- Lobby plaque -- */
  .plaque{position:relative;z-index:2;max-width:640px;width:100%;
    padding:38px 40px;border-radius:6px;text-align:center;
    background:linear-gradient(160deg, var(--cream), var(--cream-2));
    color:var(--ink);
    border:1px solid rgba(138,101,38,.5);
    box-shadow:0 30px 60px rgba(0,0,0,.5),
      inset 0 0 0 1px rgba(255,255,255,.5),
      inset 0 0 0 6px rgba(168,128,47,.12);
  }
  .plaque::before{content:'';position:absolute;inset:9px;border:1px solid rgba(168,128,47,.4);border-radius:3px;pointer-events:none;}
  .wordmark{font-family:'Playfair Display',serif;font-weight:600;
    font-size:clamp(1.7rem,5.4vw,2.7rem);letter-spacing:.22em;color:var(--ink);
    text-indent:.22em;}
  .lede{font-size:clamp(1.05rem,2.3vw,1.32rem);line-height:1.5;color:#4a4038;margin:6px auto 20px;max-width:52ch;}
  .cta-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-bottom:26px;}
  .btn{font-family:'Josefin Sans',sans-serif;font-weight:500;font-size:.82rem;
    letter-spacing:.14em;text-transform:uppercase;text-decoration:none;
    padding:12px 22px;border-radius:3px;transition:transform .2s,box-shadow .2s,background .2s;}
  .btn--solid{background:linear-gradient(180deg,var(--brass),var(--brass-dk));color:var(--cream);
    box-shadow:0 8px 18px rgba(138,101,38,.4);}
  .btn--solid:hover{transform:translateY(-2px);box-shadow:0 12px 24px rgba(138,101,38,.55);}
  .btn--ghost{background:transparent;color:var(--brass-dk);border:1px solid var(--brass-dk);}
  .btn--ghost:hover{background:rgba(168,128,47,.12);}
  .directory{border-top:1px solid rgba(138,101,38,.3);padding-top:16px;text-align:left;}
  .directory__title{font-family:'Josefin Sans',sans-serif;font-size:.64rem;letter-spacing:.34em;
    text-transform:uppercase;color:var(--brass-dk);display:block;margin-bottom:8px;text-align:center;}
  .dir-line{display:flex;align-items:baseline;gap:14px;width:100%;padding:6px 4px;
    border-bottom:1px dotted rgba(138,101,38,.28);color:var(--ink);text-align:left;
    transition:background .2s,padding-left .2s;}
  .dir-line:last-child{border-bottom:none;}
  .dir-line:hover{background:rgba(168,128,47,.1);padding-left:10px;}
  .dir-line b{font-family:'Josefin Sans',sans-serif;font-weight:600;font-size:.82rem;letter-spacing:.12em;
    color:var(--brass-dk);min-width:34px;}
  .dir-line span{font-family:'Cormorant Garamond',serif;font-size:1.08rem;min-width:0;}

  /* -- Service card -- */
  .service{position:relative;z-index:2;display:flex;gap:38px;align-items:center;
    max-width:940px;width:100%;}
  .service>*{min-width:0;}
  .card{flex:1 1 380px;min-width:0;padding:32px 34px;border-radius:5px;
    background:linear-gradient(160deg, var(--cream), var(--cream-2));color:var(--ink);
    border:1px solid rgba(138,101,38,.5);
    box-shadow:0 26px 52px rgba(0,0,0,.48), inset 0 0 0 5px rgba(168,128,47,.12);position:relative;}
  .card::before{content:'';position:absolute;inset:8px;border:1px solid rgba(168,128,47,.36);border-radius:3px;pointer-events:none;}
  .card__title{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(1.7rem,3.4vw,2.3rem);
    margin:8px 0 0;color:var(--ink);line-height:1.05;}
  .card__copy{font-size:clamp(1.02rem,2vw,1.2rem);line-height:1.52;color:#4a4038;margin:2px 0 0;}
  .motif{flex:1 1 300px;min-width:0;display:flex;align-items:center;justify-content:center;
    padding:10px;}
  .motif-svg{width:100%;height:auto;max-width:340px;filter:drop-shadow(0 4px 14px rgba(0,0,0,.4));}

  /* -- Penthouse / Selected work -- */
  .work{position:relative;z-index:2;display:flex;gap:44px;align-items:center;
    max-width:960px;width:100%;}
  .work>*{min-width:0;}
  .porthole{flex:0 0 auto;width:min(38vw,320px);aspect-ratio:1/1;border-radius:50%;
    padding:12px;background:conic-gradient(from 210deg, var(--brass-dk), var(--brass-lt), var(--brass-hi), var(--brass-dk));
    box-shadow:0 26px 54px rgba(0,0,0,.55);}
  .porthole__inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--ink-3);
    border:2px solid rgba(25,21,16,.8);display:flex;align-items:center;justify-content:center;}
  .porthole__inner img{width:100%;height:100%;object-fit:contain;}
  .work .card{flex:1 1 360px;}
  .tag{display:inline-block;margin-top:14px;font-family:'Josefin Sans',sans-serif;font-size:.66rem;
    letter-spacing:.2em;text-transform:uppercase;padding:6px 12px;border-radius:2px;
    background:rgba(168,128,47,.16);color:var(--brass-dk);border:1px solid rgba(138,101,38,.4);}

  /* -- Approach house-rules -- */
  .rules{position:relative;z-index:2;max-width:900px;width:100%;
    display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px;}
  .rule-card{padding:24px 26px;border-radius:5px;min-width:0;
    background:linear-gradient(160deg, rgba(48,40,31,.94), rgba(28,23,17,.94));
    border:1px solid rgba(168,128,47,.4);position:relative;
    box-shadow:inset 0 0 0 4px rgba(168,128,47,.08), 0 18px 36px rgba(0,0,0,.4);}
  .rule-card::before{content:'';position:absolute;inset:7px;border:1px solid rgba(168,128,47,.22);border-radius:3px;}
  .rule-card b{display:block;font-family:'Playfair Display',serif;font-weight:600;font-size:1.28rem;
    color:var(--brass-hi);margin-bottom:6px;}
  .rule-card p{margin:0;font-size:1.08rem;line-height:1.48;color:var(--cream-2);}
  .rule-num{position:absolute;top:14px;right:18px;font-family:'Josefin Sans',sans-serif;
    font-size:.72rem;letter-spacing:.2em;color:rgba(200,154,74,.5);}

  /* -- Rooftop -- */
  .room--rooftop{background:linear-gradient(180deg, #100d0a 0%, #1c1712 40%, var(--ink) 100%);}
  .room--rooftop::before{content:'';position:absolute;top:0;left:0;right:0;height:46%;
    background:
      radial-gradient(2px 2px at 20% 30%, rgba(250,247,241,.8), transparent),
      radial-gradient(1.5px 1.5px at 70% 22%, rgba(250,247,241,.6), transparent),
      radial-gradient(1.5px 1.5px at 48% 44%, rgba(250,247,241,.5), transparent),
      radial-gradient(2px 2px at 84% 40%, rgba(230,200,120,.7), transparent),
      radial-gradient(160% 90% at 50% -20%, rgba(200,150,60,.16), transparent 60%);
    pointer-events:none;z-index:0;}
  .rooftop{position:relative;z-index:2;max-width:660px;width:100%;text-align:center;}
  .about{font-family:'Cormorant Garamond',serif;font-size:clamp(1.2rem,2.7vw,1.6rem);
    line-height:1.5;color:var(--cream);margin:18px auto 0;max-width:54ch;}
  .thai{font-family:'Noto Serif Thai',serif;font-weight:400;font-size:.98rem;
    line-height:1.5;letter-spacing:normal;color:var(--brass-lt);margin:22px 0 4px;}
  .contact{margin-top:26px;}
  .contact a{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,3vw,1.7rem);
    color:var(--brass-hi);text-decoration:none;border-bottom:1px solid rgba(200,154,74,.4);
    padding-bottom:2px;}
  .contact a:hover{color:var(--cream);border-color:var(--cream);}
  .contact .place{display:block;margin-top:8px;font-family:'Josefin Sans',sans-serif;
    font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--brass-lt);}
  .foot{margin-top:38px;padding-top:22px;border-top:1px solid rgba(168,128,47,.28);
    display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;
    font-family:'Josefin Sans',sans-serif;font-size:.68rem;letter-spacing:.16em;
    text-transform:uppercase;color:var(--brass-lt);}
  .foot__star{width:22px;height:22px;flex:0 0 auto;}
  .foot__star svg{width:100%;height:100%;}
  .foot b{font-weight:500;letter-spacing:.24em;color:var(--cream);}

  /* ============ RESPONSIVE ============ */
  @media (max-width:640px){
    .crown{top:44px;height:150px;width:96vw;}
    .crown__star{width:40px;}
    .dial{display:none;}
    .topbar{display:block;}
    .wipe__panel{transform:translateX(-160%);border-right-width:2px;}
    .wipe__panel.run,.wipe__panel.express{animation-name:wipe-h;}
    @keyframes wipe-h{0%{transform:translateX(-165%);}100%{transform:translateX(165%);}}
    .room{padding:126px 16px 60px;}
    .room__num{font-size:clamp(8rem,58vw,15rem);}
    .plaque{padding:26px 20px;}
    .service{flex-direction:column;gap:22px;}
    .card{flex:1 1 auto;width:100%;padding:24px 22px;}
    .motif{order:-1;padding:0;}
    .motif-svg{max-width:260px;}
    .work{flex-direction:column;gap:26px;}
    .porthole{width:min(64vw,240px);}
    .rules{grid-template-columns:1fr;gap:14px;}
    .rule-card{padding:20px 20px;}
  }
  @media (max-width:380px){
    .tdot{font-size:.64rem;height:24px;}
    .fbtn{width:30px;}
  }

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto !important;}
    .gate--l{transform:translateX(-102%) !important;animation:none !important;}
    .gate--r{transform:translateX(102%) !important;animation:none !important;}
    .glint{display:none !important;}
    .wipe__panel{display:none !important;}
    .dial__needle,.topbar__needle,.rail__weight{transition:none !important;}
    .fbtn.arrive,.fbtn.tick,.tdot.arrive{animation:none !important;}
  }
</style>
</head>
<body>

<header class="crown" aria-hidden="true">
  <div class="crown__star" id="crownStar"></div>
  <svg class="crown__fan" id="crownFan" viewBox="0 0 760 200" aria-hidden="true"></svg>
</header>

<nav class="topbar" aria-label="Floor indicator">
  <div class="topbar__strip"><span class="topbar__needle" id="topNeedle"></span></div>
  <div class="topbar__row" id="topRow"></div>
</nav>

<aside class="dial" aria-label="Floor indicator">
  <svg class="dial__gauge" id="dialGauge" viewBox="38 40 82 184" aria-hidden="true"></svg>
  <div class="dial__col" id="dialCol"></div>
</aside>

<div class="wipe" aria-hidden="true"><div class="wipe__panel" id="wipePanel"></div></div>

<div class="rail" aria-hidden="true">
  <span class="rail__weight" id="railWeight"></span>
  <span class="rail__label">Cab I</span>
</div>

<div class="entrance" aria-hidden="true">
  <div class="gate gate--l"></div>
  <div class="gate gate--r"></div>
</div>

<main id="floors"></main>

<script>
/* ============================================================
   DATA - edit here to swap all content (Vesperwerk canonical)
   ============================================================ */
const STAR_SVG = `<svg viewBox="0 0 200 200" role="img" aria-label="Vesperwerk star">
  <g transform="translate(100,100)">
    <g><polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/><polygon points="0,-86 11,0 0,0" fill="#8a6526"/></g>
    <g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="#8a6526"/><polygon points="0,-86 11,0 0,0" fill="#c09a4a"/></g>
    <g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/><polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/></g>

/* ============================================================
   Motif line-drawings (brass) per service floor
   ============================================================ */
function motifSVG(kind){
  if(kind==='wave'){
    let bars='';
    for(let i=0;i<30;i++){
      const x=10+i*10;
      const h=8+50*Math.abs(Math.sin(i*0.72))*(0.45+0.55*Math.abs(Math.cos(i*0.34)));
      bars+=`<line x1="${x}" y1="${60-h/2}" x2="${x}" y2="${60+h/2}" stroke-linecap="round"/>`;
    }
    return `<svg class="motif-svg" viewBox="0 0 320 120" aria-hidden="true">
      <line x1="0" y1="60" x2="320" y2="60" stroke="#8a6526" stroke-width="1" opacity=".35"/>
      <g stroke="#c09a4a" stroke-width="2.4">${bars}</g></svg>`;
  }
  if(kind==='beams'){
    return `<svg class="motif-svg" viewBox="0 0 320 170" aria-hidden="true">
      <g stroke="#c09a4a" stroke-width="1.7" fill="none" stroke-linejoin="round">
        <path d="M52 118 L160 150 L160 66 L52 34 Z"/>
        <path d="M160 150 L268 118 L268 34 L160 66 Z"/>
        <path d="M52 34 L160 4 L268 34 L160 66 Z"/>
        <line x1="52" y1="76" x2="160" y2="108"/>
        <line x1="160" y1="108" x2="268" y2="76"/>
        <line x1="106" y1="19" x2="106" y2="134"/>
        <line x1="214" y1="19" x2="214" y2="134"/>
        <line x1="52" y1="34" x2="160" y2="108" opacity=".55"/>
        <line x1="268" y1="34" x2="160" y2="108" opacity=".55"/>
      </g></svg>`;
  }
  if(kind==='awning'){
    let stripes='';
    for(let i=0;i<=7;i++){ const x=20+i*40; stripes+=`<line x1="${x}" y1="40" x2="${x}" y2="96"/>`; }
    let scallop='M20 96';
    for(let i=0;i<7;i++){ scallop+=' q20 22 40 0'; }
    return `<svg class="motif-svg" viewBox="0 0 320 140" aria-hidden="true">
      <g stroke="#c09a4a" stroke-width="1.8" fill="none" stroke-linejoin="round">
        <line x1="16" y1="40" x2="304" y2="40"/>
        <line x1="20" y1="40" x2="20" y2="96"/>
        <line x1="300" y1="40" x2="300" y2="96"/>
        ${stripes}
        <path d="${scallop}"/>
        <line x1="150" y1="16" x2="150" y2="40"/>
        <path d="M132 16 L168 16 L160 6 L140 6 Z"/>
      </g></svg>`;
  }
  return '';
}

/* ============================================================
   Build fixed chrome
   ============================================================ */
const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const NF = FLOORS.length;              // number of floors
const HUB_X = 104, HUB_Y = 132;        // dial hub
const A_MIN = -54, A_SPAN = 108;       // needle angle range (lobby -54 .. rooftop +54)
const angleFor = i => A_MIN + (i/(NF-1))*A_SPAN;
function dialPoint(r,deg){ const a=deg*Math.PI/180; return [HUB_X - r*Math.cos(a), HUB_Y - r*Math.sin(a)]; }

// crown star + sunburst fan
document.getElementById('crownStar').innerHTML = STAR_SVG;
(function buildFan(){
  const N=27, apexX=380, apexY=8;
  let rays='', mask='<rect x="0" y="0" width="760" height="200" fill="black"/>';
  for(let i=0;i<N;i++){
    const t=i/(N-1), ang=(-80+t*160)*Math.PI/180;
    const L=118+66*Math.cos(ang);
    const x2=apexX+L*Math.sin(ang), y2=apexY+L*Math.cos(ang);
    rays+=`<line x1="${apexX}" y1="${apexY}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"/>`;
    mask+=`<line x1="${apexX}" y1="${apexY}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="white" stroke-width="2.4"/>`;
  }
  const anim = REDUCED ? '' :
    `<animateTransform attributeName="gradientTransform" type="translate" from="-1 0" to="1 0" dur="5.4s" repeatCount="indefinite"/>`;
  document.getElementById('crownFan').innerHTML = `
    <defs>
      <mask id="rayMask" maskUnits="userSpaceOnUse" x="0" y="0" width="760" height="200">${mask}</mask>
      <linearGradient id="glintGrad" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#faf7f1" stop-opacity="0"/>
        <stop offset="0.5" stop-color="#fff3d4" stop-opacity="0.95"/>
        <stop offset="1" stop-color="#faf7f1" stop-opacity="0"/>
        ${anim}
      </linearGradient>
    </defs>
    <g stroke="#a8802f" stroke-width="1.5" opacity="0.9">${rays}</g>
    <rect class="glint" x="0" y="0" width="760" height="200" fill="url(#glintGrad)" mask="url(#rayMask)" opacity="0.85"/>`;
})();

// side dial gauge (ticks, arc, needle)
(function buildDial(){
  let arc='M';
  for(let d=A_MIN; d<=A_MIN+A_SPAN+0.01; d+=4){ const p=dialPoint(95,d); arc+=`${p[0].toFixed(1)} ${p[1].toFixed(1)} L`; }
  arc=arc.slice(0,-1);
  let ticks='';
  for(let i=0;i<NF;i++){
    const a=angleFor(i), p1=dialPoint(84,a), p2=dialPoint(99,a);
    ticks+=`<line class="dial__tick" data-tick="${i}" x1="${p1[0].toFixed(1)}" y1="${p1[1].toFixed(1)}" x2="${p2[0].toFixed(1)}" y2="${p2[1].toFixed(1)}"/>`;
  }
  document.getElementById('dialGauge').innerHTML =
    `<path class="dial__arc" d="${arc}"/>${ticks}
     <line class="dial__needle" id="needle" x1="${HUB_X}" y1="${HUB_Y}" x2="${HUB_X-82}" y2="${HUB_Y}"/>
     <circle class="dial__hub" cx="${HUB_X}" cy="${HUB_Y}" r="5"/>`;
})();

}
document.getElementById('floors').innerHTML = FLOORS.map(roomHTML).join('');

/* ============================================================
   Indicator engine (needle, counterweight, wipes, express ride)
   ============================================================ */
const rooms=[...document.querySelectorAll('.room')];
const needle=document.getElementById('needle');
const topNeedle=document.getElementById('topNeedle');
const railWeight=document.getElementById('railWeight');
const ticks=[...document.querySelectorAll('.dial__tick')];
const dialBtns=[...document.querySelectorAll('.fbtn')];
const topBtns=[...document.querySelectorAll('.tdot')];
const wipePanel=document.getElementById('wipePanel');

let current=0, riding=false, ready=false, needleRAF=0;

function setNeedle(angle){
  if(needle) needle.setAttribute('transform',`rotate(${angle} ${HUB_X} ${HUB_Y})`);
  const p=(angle-A_MIN)/A_SPAN;
  topNeedle.style.setProperty('--p',p);
  railWeight.style.setProperty('--p',p);
}
function lightButtons(i){
  dialBtns.forEach(b=>b.classList.toggle('lit', +b.dataset.ride===i));
  topBtns.forEach(b=>b.classList.toggle('lit', +b.dataset.ride===i));
  ticks.forEach((t,k)=>t.classList.toggle('on', k===i));
}
function flashArrive(i){
  const d=dialBtns.find(b=>+b.dataset.ride===i), t=topBtns[i];
  [d,t].forEach(el=>{ if(!el) return; el.classList.remove('arrive'); void el.offsetWidth; el.classList.add('arrive'); });
}
function playWipe(cls){
  if(REDUCED) return;
  wipePanel.classList.remove('run','express'); void wipePanel.offsetWidth;
  wipePanel.classList.add(cls);
}
function setActive(i,opts){
  opts=opts||{};
  if(i===current && !opts.force){ return; }
  const prev=current; current=i;
  lightButtons(i);
  if(REDUCED){ setNeedle(angleFor(i)); return; }
  if(riding && !opts.fromRide) return;          // express owns visuals
  if(ready && !opts.silent && prev!==i) playWipe('run');
}

// continuous needle + counterweight from scroll (non-reduced only)
let ticking=false;
function updateContinuous(){
  if(riding) return;
  const max=Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
  const p=Math.min(1, Math.max(0, window.scrollY / max));
  setNeedle(A_MIN + p*A_SPAN);
}
function onScroll(){
  if(REDUCED) return;
  if(!ticking){ ticking=true; requestAnimationFrame(()=>{ updateContinuous(); ticking=false; }); }
}

// active room detection via center band (both modes)
const io=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{ if(e.isIntersecting){ setActive(+e.target.dataset.idx); } });
},{ rootMargin:'-50% 0px -50% 0px', threshold:0 });
rooms.forEach(r=>io.observe(r));

// express ride
function tweenNeedle(a0,a1,dur){
  cancelAnimationFrame(needleRAF);
  const start=performance.now();
  const ease=k=>k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
  function frame(t){
    const k=Math.min(1,(t-start)/dur);
    setNeedle(a0+(a1-a0)*ease(k));
    if(k<1) needleRAF=requestAnimationFrame(frame);
  }
  needleRAF=requestAnimationFrame(frame);
}
function rideTo(i){
  i=Math.max(0,Math.min(NF-1,i));
  if(REDUCED){
    window.scrollTo(0, rooms[i].offsetTop);
    setActive(i,{fromRide:true}); flashArrive(i);
    return;
  }
  if(riding) return;
  riding=true;
  const a0=angleFor(current), a1=angleFor(i);
  const lo=Math.min(current,i), hi=Math.max(current,i), steps=hi-lo;
  playWipe('express');
  tweenNeedle(a0,a1,500);
  // detent tick per intermediate floor as the needle passes
  for(let k=lo+1;k<hi;k++){
    const frac=Math.abs(angleFor(k)-a0)/(Math.abs(a1-a0)||1);
    setTimeout(()=>{
      const d=dialBtns.find(b=>+b.dataset.ride===k), tb=topBtns[k];
      [d,tb].forEach(el=>{ if(!el) return; el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick'); });
    }, frac*480);
  }
  // reposition behind the covering wipe
  setTimeout(()=>{ window.scrollTo(0, rooms[i].offsetTop); }, 230);
  const done=()=>{
    wipePanel.removeEventListener('animationend', done);
    riding=false;
    setActive(i,{fromRide:true,silent:true});
    flashArrive(i);
  };
  wipePanel.addEventListener('animationend', done);
}

// delegated ride clicks (buttons, directory, secondary CTA)
document.addEventListener('click',(e)=>{
  const t=e.target.closest('[data-ride]');
  if(!t) return;
  e.preventDefault();
  rideTo(+t.dataset.ride);
});

/* ============================================================
   Init
   ============================================================ */
lightButtons(0);
if(REDUCED){ setNeedle(angleFor(0)); }
else{
  setNeedle(A_MIN);
  window.addEventListener('scroll', onScroll, { passive:true });
  window.addEventListener('resize', onScroll, { passive:true });
  updateContinuous();
}
// enable wipes only after the entrance settles, so the first IO pass is silent
setTimeout(()=>{ ready=true; }, REDUCED?0:1200);
</script>
