<!-- TEMPLATE: The Jeweled Vitrine | ARCHETYPE: WebGL museum-vitrine luxury studio site | REF: GQ x Audemars Piguet "The Extraordinary Lab" (Immersive Garden, Awwwards SOTM), jewelry-house vitrine product films | WHEN TO USE: high-end studio, atelier, or product house wanting one hero object suspended under museum glass | SWAP: edit the DATA object at top of the script -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Vesperwerk: an independent software and AI studio, presented as a jeweled object under museum glass.">
<title>Vesperwerk / The Jeweled Vitrine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&family=Noto+Serif+Thai:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --room:#17130f;
    --room-deep:#0b0805;
    --gold:#a8802f;
    --gold-lt:#c09a4a;
    --gold-dk:#8a6526;
    --gold-br:#d8b566;
    --cream:#faf7f1;
    --cream-dim:rgba(250,247,241,.66);
    --cream-faint:rgba(250,247,241,.42);
    --warm:#ffe6b0;
    --line:rgba(192,154,74,.22);
    --ease:cubic-bezier(.22,.61,.36,1);
    --serif:"Cormorant Garamond",Georgia,serif;
    --display:"Playfair Display",Georgia,serif;
    --mono:"Space Mono",ui-monospace,monospace;
    --thai:"Noto Serif Thai","Cormorant Garamond",serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden}
  html{scroll-behavior:smooth}
  body{
    background:
      radial-gradient(135% 105% at 62% 38%, #22190f 0%, var(--room) 42%, var(--room-deep) 100%);
    color:var(--cream);
    font-family:var(--serif);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    min-height:100vh;
  }
  /* museum vignette */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:7;
    background:radial-gradient(120% 90% at 62% 42%, transparent 44%, rgba(6,4,2,.55) 100%);
    mix-blend-mode:multiply;
  }
  a{color:inherit}
  img{max-width:100%;display:block}
  ::selection{background:rgba(192,154,74,.32);color:#fff}

  /* ============ THE STAGE (fixed vitrine) ============ */
  .stage{position:fixed;inset:0;z-index:0;overflow:hidden}
  .pool{
    position:absolute;top:44%;left:62%;
    width:82vh;height:82vh;transform:translate(-50%,-50%);
    background:radial-gradient(circle at 50% 42%,
      rgba(255,220,158,.30) 0%,
      rgba(255,196,124,.14) 24%,
      rgba(180,132,70,.05) 46%,
      transparent 64%);
    filter:blur(6px);
    opacity:0;transition:opacity 1.6s var(--ease);
    pointer-events:none;
  }
  .floor{
    position:absolute;left:62%;bottom:8%;transform:translateX(-50%);
    width:44vh;height:16vh;
    background:radial-gradient(ellipse at 50% 50%, rgba(255,206,140,.22), transparent 70%);
    filter:blur(10px);opacity:0;transition:opacity 1.8s var(--ease);pointer-events:none;
  }
  .ready .pool{opacity:1}
  .ready .floor{opacity:1}

  .vitrine-wrap{
    position:absolute;top:50%;left:62%;transform:translate(-50%,-50%);
    width:min(46vw,540px);height:min(78vh,700px);
    touch-action:none;cursor:grab;
  }
  .vitrine-wrap:active{cursor:grabbing}
  #gl{display:block;width:100%;height:100%}
  .static-star{position:absolute;inset:0;display:none;align-items:center;justify-content:center}
  .static-star svg{width:100%;height:100%;max-height:100%}

  /* implied glass case */
  .vitrine-glass{position:absolute;inset:-2% -6% -4% -6%;pointer-events:none;border-radius:6px}
  .vitrine-glass::before{
    content:"";position:absolute;inset:0;border-radius:6px;
    border:1px solid rgba(192,154,74,.14);
    box-shadow:inset 0 40px 90px rgba(255,232,190,.05), inset 0 -30px 80px rgba(0,0,0,.4);
    opacity:0;transition:opacity 1.8s var(--ease) .3s;
  }
  .vitrine-glass::after{
    content:"";position:absolute;inset:0;border-radius:6px;
    background:linear-gradient(116deg, transparent 38%, rgba(255,247,232,.05) 49%, transparent 60%);
    opacity:0;transition:opacity 1.8s var(--ease) .5s;
  }
  .ready .vitrine-glass::before,.ready .vitrine-glass::after{opacity:1}
  .plinth{
    position:absolute;left:62%;bottom:9%;transform:translateX(-50%);
    width:min(40vw,420px);height:1px;
    background:linear-gradient(90deg,transparent,rgba(192,154,74,.35),transparent);
    opacity:0;transition:opacity 1.8s var(--ease) .6s;
  }
  .ready .plinth{opacity:1}

  /* object placard near the case base */
  .placard{
    position:absolute;left:62%;bottom:4.4%;transform:translateX(-50%);
    text-align:center;opacity:0;transition:opacity 1.4s var(--ease) 1.1s;
    pointer-events:none;
  }
  .ready .placard{opacity:1}
  .placard .p-name{font-family:var(--mono);font-size:.62rem;letter-spacing:.34em;color:var(--gold-lt);text-transform:uppercase}
  .placard .p-sub{font-family:var(--serif);font-style:italic;font-size:.92rem;color:var(--cream-faint);margin-top:2px}

  /* ============ CHAPTER INDEX (right edge) ============ */
  .chapter-index{
    position:fixed;top:50%;right:clamp(14px,2.6vw,44px);transform:translateY(-50%);
    z-index:6;list-style:none;margin:0;padding:0;
  }
  .chapter-index li{display:flex;align-items:center;gap:.6rem;justify-content:flex-end;padding:.42rem 0;cursor:pointer}
  .ci-dot{width:6px;height:6px;border-radius:50%;border:1px solid var(--gold-dk);background:transparent;flex:0 0 auto;transition:all .5s var(--ease)}
  .ci-txt{font-family:var(--mono);font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--cream-faint);text-align:right;transition:color .5s var(--ease);white-space:nowrap;min-width:0}
  .ci-txt b{font-weight:400;color:var(--gold-lt);margin-right:.5em}
  .chapter-index li:hover .ci-txt,.chapter-index li:focus-visible .ci-txt{color:var(--cream-dim)}
  .chapter-index li.is-active .ci-dot{background:var(--gold-lt);border-color:var(--gold-br);box-shadow:0 0 10px rgba(216,181,102,.6)}
  .chapter-index li.is-active .ci-txt{color:var(--cream)}
  .chapter-index li:focus-visible{outline:1px solid var(--gold);outline-offset:4px;border-radius:2px}

  /* ============ HONESTY PLATE ============ */
  .honesty{
    position:fixed;left:clamp(14px,2.6vw,40px);bottom:clamp(14px,2.6vw,30px);
    z-index:6;font-family:var(--mono);font-size:.58rem;letter-spacing:.16em;
    color:var(--cream-faint);text-transform:uppercase;
    border-left:1px solid var(--line);padding-left:.7rem;
  }
  .honesty b{color:var(--gold-lt);font-weight:400}

  /* ============ CAUSTIC GLINT (click signature) ============ */
  .caustic{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:0;overflow:hidden}
  .caustic span{
    position:absolute;top:-30%;left:-40%;width:60%;height:160%;
    background:linear-gradient(74deg, transparent 42%, rgba(255,240,205,.42) 50%, transparent 58%);
    filter:blur(2px);transform:translateX(-60vw) rotate(6deg);
  }
  .caustic.flash{animation:caustic 900ms var(--ease) forwards}
  @keyframes caustic{
    0%{opacity:0}
    12%{opacity:1}
    100%{opacity:0;}
  }
  .caustic.flash span{animation:sweep 900ms var(--ease) forwards}
  @keyframes sweep{from{transform:translateX(-60vw) rotate(6deg)}to{transform:translateX(190vw) rotate(6deg)}}

  /* ============ CHAPTERS ============ */
  .chapters{position:relative;z-index:2}
  .chapter{min-height:100vh;display:flex;align-items:center;padding:12vh 0}
  .plate{
    margin-left:clamp(22px,7vw,120px);
    max-width:min(88vw,460px);min-width:0;
  }
  .kicker{display:flex;align-items:baseline;gap:.8rem;margin-bottom:1.6rem}
  .kicker .k-num{font-family:var(--display);font-size:1.1rem;color:var(--gold-lt);letter-spacing:.1em}
  .kicker .k-txt{font-family:var(--mono);font-size:.64rem;letter-spacing:.34em;text-transform:uppercase;color:var(--cream-faint)}
  .rule{height:1px;background:linear-gradient(90deg,var(--gold-dk),transparent);margin:1.1rem 0;max-width:180px}
  .overline{font-family:var(--mono);font-size:.62rem;letter-spacing:.36em;text-transform:uppercase;color:var(--gold-lt);margin-bottom:1.1rem}

  .wordmark{
    font-family:var(--display);font-weight:600;
    font-size:clamp(2.4rem,6.4vw,5rem);letter-spacing:.2em;line-height:1;
    color:var(--cream);margin:0 0 .3rem;
    text-shadow:0 1px 0 rgba(0,0,0,.55), 0 -1px 0 rgba(255,240,210,.05);
  }
  .descriptor{font-family:var(--mono);font-size:.66rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-lt);min-height:1em}
  .descriptor .caret{color:var(--cream-faint)}
  .lede{font-family:var(--serif);font-size:clamp(1.12rem,1.5vw,1.4rem);line-height:1.5;color:var(--cream-dim);margin:1.7rem 0 0;max-width:38ch}

  .cta-row{display:flex;flex-wrap:wrap;gap:.9rem;margin-top:2.2rem}
  .btn{
    font-family:var(--mono);font-size:.62rem;letter-spacing:.24em;text-transform:uppercase;
    padding:.85rem 1.5rem;border:1px solid var(--gold);color:var(--cream);
    background:transparent;cursor:pointer;text-decoration:none;transition:all .4s var(--ease);
    display:inline-flex;align-items:center;gap:.6rem;
  }
  .btn.primary{background:var(--gold);color:#1c150a;border-color:var(--gold-br)}
  .btn.primary:hover{background:var(--gold-br)}
  .btn:hover{border-color:var(--gold-br);color:#fff;box-shadow:0 0 24px rgba(168,128,47,.22)}
  .btn:focus-visible{outline:2px solid var(--gold-br);outline-offset:3px}

  /* engraved list (services, principles) */
  .entry{padding:1.5rem 0;border-top:1px solid var(--line)}
  .entry:first-of-type{border-top:none;padding-top:.4rem}
  .entry .e-head{display:flex;align-items:baseline;gap:.8rem;margin-bottom:.5rem}
  .entry .e-idx{font-family:var(--mono);font-size:.66rem;color:var(--gold-lt);letter-spacing:.14em;flex:0 0 auto}
  .entry .e-name{font-family:var(--display);font-weight:500;font-size:clamp(1.2rem,2vw,1.55rem);color:var(--cream);letter-spacing:.01em;min-width:0}
  .entry .e-body{font-family:var(--serif);font-size:1.06rem;line-height:1.55;color:var(--cream-dim);max-width:44ch}

  .ch-title{font-family:var(--display);font-weight:500;font-size:clamp(1.7rem,3vw,2.5rem);color:var(--cream);letter-spacing:.02em;margin:0 0 1.3rem;line-height:1.1}

  /* mounted photograph (the case, chapter III) */
  .case .plate{max-width:min(90vw,500px)}
  .mount{
    background:#f3ecdf;padding:14px 14px 44px;
    box-shadow:0 30px 70px rgba(0,0,0,.5), 0 0 0 1px rgba(192,154,74,.2);
    margin-bottom:1.6rem;position:relative;
  }
  .mount .frame{aspect-ratio:16/9;background:#100c08;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .mount .frame img{width:100%;height:100%;object-fit:contain}
  .mount figcaption{
    position:absolute;left:14px;right:14px;bottom:14px;
    font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;
    color:#6b5734;display:flex;justify-content:space-between;gap:1rem;
  }
  .mount figcaption span{min-width:0}

  /* final museum label (Thai epigraph, chapter V) */
  .final-label{
    background:#f3ecdf;color:#2a2016;padding:2.1rem 2rem 1.9rem;margin:2rem 0;
    box-shadow:0 24px 60px rgba(0,0,0,.5), 0 0 0 1px rgba(192,154,74,.25);
    max-width:100%;
  }
  .final-label .fl-cap{font-family:var(--mono);font-size:.58rem;letter-spacing:.3em;text-transform:uppercase;color:#8a6526;margin-bottom:1rem}
  .final-label .fl-thai{font-family:var(--thai);font-weight:500;font-size:clamp(1.25rem,2.4vw,1.7rem);line-height:1.5;letter-spacing:normal;color:#221a10}
  .final-label .fl-star{width:26px;height:26px;margin-bottom:1rem;opacity:.9}

  .contact-line{font-family:var(--serif);font-size:1.14rem;color:var(--cream-dim);margin-top:1.6rem}
  .contact-line a{color:var(--gold-lt);text-decoration:none;border-bottom:1px solid var(--line);transition:border-color .3s var(--ease)}
  .contact-line a:hover{border-color:var(--gold-br)}
  .contact-line a:focus-visible{outline:2px solid var(--gold-br);outline-offset:3px}

  .footer{display:flex;align-items:center;gap:1rem;margin-top:2.6rem;padding-top:1.6rem;border-top:1px solid var(--line);flex-wrap:wrap}
  .footer svg{width:24px;height:24px;flex:0 0 auto}
  .footer .f-mark{font-family:var(--display);font-weight:600;letter-spacing:.22em;color:var(--cream);font-size:.95rem}
  .footer .f-meta{font-family:var(--mono);font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-faint);margin-left:auto;text-align:right;min-width:0}

  /* ============ MOBILE (<=640): scrolling single column, static jewel hero ============ */
  @media (max-width:640px){
    body{background:radial-gradient(150% 90% at 50% 22%, #22190f 0%, var(--room) 44%, var(--room-deep) 100%)}
    .stage{position:absolute;top:0;left:0;right:0;height:100svh;z-index:0}
    .pool{top:34%;left:50%;width:118vw;height:118vw}
    .floor{left:50%;bottom:auto;top:56%;width:70vw;height:22vh}
    .vitrine-wrap{top:34%;left:50%;width:min(74vw,340px);height:min(46svh,340px);cursor:default}
    .plinth{left:50%;bottom:auto;top:58%;width:64vw}
    .placard{display:none}
    #gl{display:none}
    .static-star{display:flex}

    .chapters{z-index:2}
    .chapter{min-height:auto;padding:0;display:block}
    .chapter.hero-ch{min-height:100svh;display:flex;align-items:flex-end}
    .plate{margin:0;padding:2.4rem 6vw;max-width:100%}
    .hero-ch .plate{
      padding-bottom:8vh;
      background:linear-gradient(to top, rgba(11,8,5,.92) 0%, rgba(11,8,5,.7) 60%, transparent 100%);
    }
    .chapter:not(.hero-ch){background:linear-gradient(to bottom, rgba(11,8,5,.4), rgba(11,8,5,.86) 18%)}
    .chapter:not(.hero-ch) .plate{padding-top:3.4rem;padding-bottom:3.4rem}
    .lede{max-width:100%}
    .wordmark{font-size:clamp(1.9rem,9.2vw,2.6rem);letter-spacing:.08em}
    .descriptor{letter-spacing:.2em;font-size:.6rem}

    .chapter-index{top:auto;bottom:42px;right:50%;transform:translateX(50%);flex-direction:row;display:flex;gap:.1rem;padding:.3rem .55rem;background:rgba(11,8,5,.55);border-radius:22px;backdrop-filter:blur(4px)}
    .chapter-index li{padding:.25rem .35rem;gap:.28rem}
    .ci-txt b{margin-right:0}
    .ci-txt span{display:none}
    .honesty{bottom:14px;left:12px;font-size:.5rem;background:rgba(11,8,5,.55);padding:.35rem .55rem .35rem .7rem;border-radius:4px;backdrop-filter:blur(4px)}
  }

  /* ============ REDUCED MOTION: static everywhere, no rAF, plain cuts ============ */
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    #gl{display:none}
    .static-star{display:flex}
    .pool,.floor,.vitrine-glass::before,.vitrine-glass::after,.plinth,.placard{opacity:1;transition:none}
    .caustic{display:none}
    *{animation-duration:.001s !important;transition-duration:.001s !important}
  }
</style>
</head>
<body>

  <!-- ========= FIXED STAGE: the jeweled star under museum glass ========= -->
  <div class="stage" id="stage" aria-hidden="true">
    <div class="pool"></div>
    <div class="floor"></div>
    <div class="vitrine-wrap" id="vwrap">
      <canvas id="gl"></canvas>
      <div class="static-star" id="staticStar">
        <svg viewBox="0 0 200 246" preserveAspectRatio="xMidYMid meet" role="img" aria-label="The Vesper star, an eight-point antique-gold jewel">
          <defs>
            <radialGradient id="jv-pool" cx="50%" cy="42%" r="60%">
              <stop offset="0" stop-color="#5c4620"/>
              <stop offset="40%" stop-color="#241a0e"/>
              <stop offset="100%" stop-color="#0c0906" stop-opacity="0"/>
            </radialGradient>
            <!-- four antique-gold facet tones: lit -> mid -> shadow -> deep shadow -->
            <linearGradient id="jv-hi" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#c09a4a"/><stop offset="100%" stop-color="#906a2b"/>
            </linearGradient>
            <linearGradient id="jv-mid" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#a8802f"/><stop offset="100%" stop-color="#7a5a22"/>
            </linearGradient>
            <linearGradient id="jv-lo" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#6a4d1e"/><stop offset="100%" stop-color="#3f2f15"/>
            </linearGradient>
            <linearGradient id="jv-deep" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#423013"/><stop offset="100%" stop-color="#201708"/>
            </linearGradient>
            <radialGradient id="jv-core" cx="50%" cy="50%" r="50%">
              <stop offset="0" stop-color="#1c1408" stop-opacity=".6"/>
              <stop offset="68%" stop-color="#1c1408" stop-opacity=".26"/>
              <stop offset="100%" stop-color="#1c1408" stop-opacity="0"/>
            </radialGradient>
            <filter id="jv-soft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="0.6"/></filter>
            <filter id="jv-blur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3.4"/></filter>
          </defs>

          <!-- backdrop pool + soft warm light pooled on the plinth beneath -->
          <ellipse cx="100" cy="118" rx="94" ry="94" fill="url(#jv-pool)"/>
          <ellipse cx="100" cy="205" rx="50" ry="8" fill="#c9a24e" opacity=".16" filter="url(#jv-blur)"/>

          <!-- eight faceted points, each split into two halves shaded to ONE warm key from the upper left -->
          <g transform="translate(100,112)">
            <g><polygon points="0,-86 -11,0 0,0" fill="url(#jv-hi)"/><polygon points="0,-86 11,0 0,0" fill="url(#jv-lo)"/></g>
            <g transform="rotate(45)"><polygon points="0,-44 -7.5,0 0,0" fill="url(#jv-hi)"/><polygon points="0,-44 7.5,0 0,0" fill="url(#jv-deep)"/></g>
            <g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="url(#jv-mid)"/><polygon points="0,-64 9.5,0 0,0" fill="url(#jv-deep)"/></g>
            <g transform="rotate(135)"><polygon points="0,-44 -7.5,0 0,0" fill="url(#jv-lo)"/><polygon points="0,-44 7.5,0 0,0" fill="url(#jv-lo)"/></g>
            <g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="url(#jv-deep)"/><polygon points="0,-86 11,0 0,0" fill="url(#jv-lo)"/></g>
            <g transform="rotate(225)"><polygon points="0,-44 -7.5,0 0,0" fill="url(#jv-deep)"/><polygon points="0,-44 7.5,0 0,0" fill="url(#jv-hi)"/></g>
            <g transform="rotate(270)"><polygon points="0,-64 -9.5,0 0,0" fill="url(#jv-lo)"/><polygon points="0,-64 9.5,0 0,0" fill="url(#jv-hi)"/></g>
            <g transform="rotate(315)"><polygon points="0,-44 -7.5,0 0,0" fill="url(#jv-hi)"/><polygon points="0,-44 7.5,0 0,0" fill="url(#jv-mid)"/></g>
          </g>

          <!-- recessed darker core where the facets meet -->
          <ellipse cx="100" cy="112" rx="20" ry="20" fill="url(#jv-core)"/>

          <!-- warm rim highlight on the lit upper-left edges only (no white) -->
          <g transform="translate(100,112)" fill="none" stroke="#e8ca86" stroke-width="1.3" stroke-linecap="round" opacity=".5" filter="url(#jv-soft)">
            <line x1="0" y1="-86" x2="-9" y2="-15"/>
            <g transform="rotate(45)"><line x1="0" y1="-44" x2="-6.1" y2="-7.9"/></g>
            <g transform="rotate(225)"><line x1="0" y1="-44" x2="6.1" y2="-7.9"/></g>
            <g transform="rotate(270)"><line x1="0" y1="-64" x2="7.8" y2="-11.5"/></g>
            <g transform="rotate(315)"><line x1="0" y1="-44" x2="-6.1" y2="-7.9"/></g>
          </g>
        </svg>
      </div>
      <div class="vitrine-glass"></div>
    </div>
    <div class="plinth"></div>
    <div class="placard">
      <div class="p-name">OBJECT 001</div>
      <div class="p-sub">The Vesper Star, antique gold, eight points</div>
    </div>
  </div>

  <!-- ========= CHAPTER INDEX ========= -->
  <ul class="chapter-index" id="chapterIndex" aria-label="Chapters"></ul>

  <!-- ========= HONESTY PLATE ========= -->
  <div class="honesty" id="honesty"><b>OBJ 001</b> / booting / DPR 2.0 / WEBGL</div>

  <!-- ========= CAUSTIC GLINT ========= -->
  <div class="caustic" id="caustic" aria-hidden="true"><span></span></div>

  <!-- ========= CHAPTERS ========= -->
  <main class="chapters" id="chapters"></main>

<script type="module">
/* =====================================================================
   DATA  ---  edit this object to reskin the whole exhibit.
   ===================================================================== */
const DATA = {
  wordmark: "VESPERWERK",

const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

function buildIndex(){
  const ul = document.getElementById('chapterIndex');
  ul.innerHTML = DATA.chapters.map((c,i)=>`
    <li data-i="${i}" tabindex="0" role="button" aria-label="Go to chapter ${c.roman}, ${c.name}">
      <span class="ci-txt"><b>${c.roman}</b><span>${c.name}</span></span>
      <span class="ci-dot"></span>
    </li>`).join('');
  const go = (i)=>{
    const el = document.getElementById('ch-'+i);
    if(el) el.scrollIntoView({behavior: RM ? 'auto':'smooth', block:'start'});
  };
  ul.querySelectorAll('li').forEach(li=>{
    li.addEventListener('click', ()=>go(+li.dataset.i));
    li.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); go(+li.dataset.i);} });
  });
  document.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>go(+b.dataset.goto)));
}

buildChapters();

/* active-chapter observer (drives the index highlight) */
const items = [...document.querySelectorAll('#chapterIndex li')];
function setActive(i){ items.forEach((li,k)=>li.classList.toggle('is-active', k===i)); }
setActive(0);
{
  const secs = [...document.querySelectorAll('.chapter')];
  const io = new IntersectionObserver((ents)=>{
    ents.forEach(e=>{ if(e.isIntersecting) setActive(+e.target.dataset.i); });
  }, { rootMargin:'-45% 0px -45% 0px', threshold:0 });
  secs.forEach(s=>io.observe(s));
}

/* typewriter descriptor (motion only) */
(function typewriter(){
  const el = document.getElementById('typed');
  const full = DATA.descriptor;
  if(RM){ el.textContent = full; return; }
  el.innerHTML = '<span class="caret">|</span>';
  let i = 0;
  setTimeout(function step(){
    if(i <= full.length){
      el.innerHTML = full.slice(0,i) + '<span class="caret">'+(i<full.length?'|':'')+'</span>';
      i++;
      setTimeout(step, 34);
    }
  }, 620);
})();

/* =====================================================================
   WEBGL VITRINE  (desktop, motion-ok only)
   ===================================================================== */
const honestyEl = document.getElementById('honesty');
const stage = document.getElementById('stage');
const isMobile = matchMedia('(max-width:640px)').matches;

function supportsWebGL(){
  try{ const c=document.createElement('canvas'); return !!(window.WebGLRenderingContext && (c.getContext('webgl2')||c.getContext('webgl'))); }
  catch(e){ return false; }
}
const USE_WEBGL = !RM && !isMobile && supportsWebGL();

function staticMode(reason){
  document.getElementById('gl').style.display='none';
  document.getElementById('staticStar').style.display='flex';
  document.body.classList.add('ready');
  const dpr = Math.min(window.devicePixelRatio||1,2).toFixed(1);
  honestyEl.innerHTML = `<b>OBJ 001</b> / STATIC PLATE / DPR ${dpr} / SVG`;
}

if(!USE_WEBGL){
  staticMode('fallback');
} else {
  initWebGL().catch(()=>staticMode('error'));
}

async function initWebGL(){
  const THREE = await import('three');
  const canvas = document.getElementById('gl');
  const wrap = document.getElementById('vwrap');

  let renderer;
  try{
    renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true, powerPreference:'high-performance', preserveDrawingBuffer:true });
  }catch(e){ staticMode('ctx'); return; }
  if(!renderer.getContext()){ staticMode('ctx'); return; }

  const DPR = Math.min(window.devicePixelRatio||1, 2);
  renderer.setPixelRatio(DPR);
  renderer.setSize(wrap.clientWidth, wrap.clientHeight, false);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.06;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, wrap.clientWidth/wrap.clientHeight, 0.1, 100);
  camera.position.set(0,0,7.4);
  camera.lookAt(0,0,0);

  /* ---- warm gradient environment so the gold reads as metal ---- */
  function envTexture(){
    const c=document.createElement('canvas'); c.width=128; c.height=128;
    const x=c.getContext('2d');
    const g=x.createLinearGradient(0,0,0,128);
    g.addColorStop(0,'#4a3a22'); g.addColorStop(.44,'#1c150d'); g.addColorStop(.58,'#26190d'); g.addColorStop(1,'#080604');
    x.fillStyle=g; x.fillRect(0,0,128,128);
    const r=x.createRadialGradient(64,34,2,64,34,60);
    r.addColorStop(0,'#f6e0a6'); r.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=r; x.fillRect(0,0,128,128);
    const t=new THREE.CanvasTexture(c);
    t.mapping=THREE.EquirectangularReflectionMapping;
    t.colorSpace=THREE.SRGBColorSpace;
    return t;
  }
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const envRT = pmrem.fromEquirectangular(envTexture());
  scene.environment = envRT.texture;

  /* ---- the eight-point vesper star as an extruded, beveled jewel ---- */
  function starShape(){
    const tips=[90,46,66,46,90,46,66,46]; // top clockwise: vertical, diag, horizontal, diag ...
    const inner=15;
    const sh=new THREE.Shape();
    for(let i=0;i<8;i++){
      const aT=-Math.PI/2 + i*(Math.PI/4);
      const rT=tips[i];
      const xt=Math.cos(aT)*rT, yt=Math.sin(aT)*rT;
      const aI=aT+Math.PI/8;
      const xi=Math.cos(aI)*inner, yi=Math.sin(aI)*inner;
      if(i===0) sh.moveTo(xt,yt); else sh.lineTo(xt,yt);
      sh.lineTo(xi,yi);
    }
    sh.closePath();
    return sh;
  }
  const geo = new THREE.ExtrudeGeometry(starShape(), {
    depth:24, bevelEnabled:true, bevelThickness:9, bevelSize:6.5, bevelSegments:3, steps:1
  });
  geo.center();
  geo.scale(0.02,0.02,0.02);
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    color:0xa8802f, metalness:0.86, roughness:0.30,
    emissive:0x241703, emissiveIntensity:0.35, envMapIntensity:1.15
  });
  const jewel = new THREE.Mesh(geo, mat);
  const group = new THREE.Group();
  group.add(jewel);
  scene.add(group);

  /* ---- in-scene glow pool behind the jewel (blooms on click) ---- */
  function radialTex(){
    const c=document.createElement('canvas'); c.width=256;c.height=256;
    const x=c.getContext('2d');
    const g=x.createRadialGradient(128,128,4,128,128,128);
    g.addColorStop(0,'rgba(255,224,168,.9)'); g.addColorStop(.35,'rgba(255,196,120,.35)'); g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g; x.fillRect(0,0,256,256);
    const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
  }
  const poolMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(6.4,6.4),
    new THREE.MeshBasicMaterial({ map:radialTex(), transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0 })
  );
  poolMesh.position.set(0,-0.1,-1.6);
  scene.add(poolMesh);

  /* ---- lighting: ambient + a warm key (the museum light) + fill + rim ---- */
  scene.add(new THREE.AmbientLight(0x2a2013, 0.55));
  const baseKey = new THREE.Vector3(1.6, 2.5, 4.4);
  const keyLight = new THREE.PointLight(0xffe7bb, 2.2, 0, 0); // decay 0 -> stable intensity
  keyLight.position.copy(baseKey);
  scene.add(keyLight);
  const fill = new THREE.PointLight(0x5c4a2c, 0.9, 0, 0);
  fill.position.set(-4,-1.4,3);
  scene.add(fill);
  const rim = new THREE.DirectionalLight(0xfff2d6, 0.7);
  rim.position.set(-2,3,-4);
  scene.add(rim);

  /* ---- interaction state ---- */
  const idleSpin = (Math.PI*2)/90;   // one turn per 90 seconds
  const spin = { y:0, vy:idleSpin, xTarget:0.14 };
  const drag = { on:false, lx:0, ly:0, vy:0, moved:0 };
  const lightTarget = baseKey.clone();
  let reveal = 0.16;   // entrance ritual eases toward 1 (jewel already lit at frame 0)
  let bloom = 0;       // click bloom, decays

  const caustic = document.getElementById('caustic');
  function triggerBloom(){
    bloom = 1;
    if(!RM){
      caustic.classList.remove('flash'); void caustic.offsetWidth; caustic.classList.add('flash');
    }
  }
  caustic.addEventListener('animationend', ()=>caustic.classList.remove('flash'));

  function onMove(e){
    const r = stage.getBoundingClientRect();
    const nx = ((e.clientX - r.left)/r.width)*2 - 1;
    const ny = ((e.clientY - r.top)/r.height)*2 - 1;
    lightTarget.x = baseKey.x + nx*1.9;
    lightTarget.y = baseKey.y - ny*1.4;
    if(drag.on){
      const dx = e.clientX - drag.lx, dy = e.clientY - drag.ly;
      spin.y += dx*0.0075;
      spin.xTarget = clamp(spin.xTarget - dy*0.0042, -0.35, 0.6);
      drag.vy = dx*0.0075*60;
      drag.moved += Math.abs(dx)+Math.abs(dy);
      drag.lx = e.clientX; drag.ly = e.clientY;
    }
  }
  wrap.addEventListener('pointerdown', e=>{
    drag.on=true; drag.lx=e.clientX; drag.ly=e.clientY; drag.moved=0; drag.vy=0;
    try{ wrap.setPointerCapture(e.pointerId); }catch(_){}
  });
  window.addEventListener('pointermove', onMove);
  window.addEventListener('pointerup', ()=>{
    if(!drag.on) return;
    drag.on=false;
    if(drag.moved < 6) triggerBloom();
    else spin.vy = clamp(drag.vy, -0.7, 0.7);
  });

  /* ---- resize ---- */
  function resize(){
    const w = wrap.clientWidth, h = wrap.clientHeight;
    renderer.setSize(w,h,false);
    camera.aspect = w/h; camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);

  /* ---- render loop with fps + pause on hidden ---- */
  let raf = 0, last = performance.now();
  let fpsAcc = 0, fpsFrames = 0, fpsShown = 60;
  const DPRtxt = DPR.toFixed(1);

  function frame(now){
    raf = requestAnimationFrame(frame);
    const dt = Math.min(0.05, (now-last)/1000); last = now;

    if(!drag.on){
      spin.vy += (idleSpin - spin.vy)*0.02;
      spin.y  += spin.vy*dt;
    }
    group.rotation.y = spin.y;
    group.rotation.x += (spin.xTarget - group.rotation.x)*0.08;

    keyLight.position.x += (lightTarget.x - keyLight.position.x)*0.06;
    keyLight.position.y += (lightTarget.y - keyLight.position.y)*0.06;

    reveal += (1 - reveal)*0.035;
    bloom  *= 0.9;
    const keyBase = 0.55 + 2.1*reveal;
    keyLight.intensity = keyBase + bloom*4.5;
    mat.emissiveIntensity = 0.30 + bloom*0.7;
    poolMesh.material.opacity = 0.45*reveal + bloom*0.55;
    poolMesh.scale.setScalar(1 + bloom*0.45);

    renderer.render(scene, camera);

    // fps
    fpsAcc += dt; fpsFrames++;
    if(fpsAcc >= 0.5){
      fpsShown = Math.round(fpsFrames/fpsAcc);
      honestyEl.innerHTML = `<b>OBJ 001</b> / ${fpsShown} FPS / DPR ${DPRtxt} / WEBGL`;
      fpsAcc = 0; fpsFrames = 0;
    }
  }

  function start(){ if(!raf){ last = performance.now(); raf = requestAnimationFrame(frame); } }
  function stop(){ if(raf){ cancelAnimationFrame(raf); raf = 0; } }

  document.addEventListener('visibilitychange', ()=>{ document.hidden ? stop() : start(); });
  // pause if the stage ever leaves the viewport (defensive; it is fixed on desktop)
  new IntersectionObserver((e)=>{ e[0].isIntersecting ? start() : stop(); }, {threshold:0}).observe(stage);

  // context loss -> graceful static fallback
  canvas.addEventListener('webglcontextlost', (e)=>{ e.preventDefault(); stop(); staticMode('lost'); }, false);

  // render the FIRST frame immediately so a scroll=0 capture shows the lit jewel
  renderer.render(scene, camera);
  document.body.classList.add('ready');
  start();
}
</script>
