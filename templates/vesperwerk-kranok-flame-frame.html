<!-- TEMPLATE: Kranok Flame Frame | ARCHETYPE: Living ornamental frame (lai kranok flame-curl) | REF: Lai kranok temple pediment survey (Fine Arts Dept) . Thai pediment composition | WHEN TO USE: heritage or craft-luxury studio site wanting an authored gold ornament frame that breathes like embers and densifies toward the read section | SWAP: edit the DATA object at top of the script -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vesperwerk . Kranok Flame Frame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Cormorant+Garamond:wght@400;500;600&family=Noto+Serif+Thai:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f6f0e2; --cream-2:#efe7d4; --ink:#2a2621;
    --gold:#a8802f; --ember:#c09a4a; --gold-deep:#8a6526;
    --mono:ui-monospace,"SFMono-Regular",Menlo,"Cascadia Mono",monospace;
    --serif:"Cormorant Garamond",Georgia,serif;
    --display:"Playfair Display",Georgia,serif;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box}
  html,body{overflow-x:hidden}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0; color:var(--ink); font-family:var(--serif); font-weight:400;
    background:radial-gradient(125% 85% at 50% -6%, #faf6ec 0%, var(--cream) 52%, #f0e8d6 100%);
    background-attachment:fixed;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  img{max-width:100%}
  a{color:inherit}
  ::selection{background:rgba(168,128,47,.22)}

  /* ---------- kranok curl base styling ---------- */
  @keyframes breathe{ 0%,100%{opacity:var(--lo,.5)} 50%{opacity:var(--hi,.95)} }
  @keyframes strikeFlare{
    0%{filter:brightness(1)}
    5%{filter:brightness(2.3) saturate(1.3) drop-shadow(0 0 7px rgba(192,154,74,.85))}
    16%{filter:brightness(1.1) saturate(1.05) drop-shadow(0 0 2px rgba(192,154,74,.2))}
    34%{filter:brightness(1.8) saturate(1.2) drop-shadow(0 0 5px rgba(192,154,74,.55))}
    58%{filter:brightness(1.05) drop-shadow(0 0 0 rgba(192,154,74,0))}
    100%{filter:brightness(1)}
  }
  .kranok-curl{
    fill:none; stroke:var(--gold); stroke-width:1.1;
    stroke-linecap:round; stroke-linejoin:round;
    vector-effect:non-scaling-stroke;
    opacity:var(--lo,.5);
    animation:breathe var(--dur,4.4s) var(--bd,0s) ease-in-out infinite;
    transition:stroke .45s var(--ease);
  }
  .kranok-curl.ember{ stroke:var(--ember) }
  .kranok-spine{
    fill:none; stroke:var(--gold); stroke-width:.75;
    stroke-linecap:round; opacity:.4; vector-effect:non-scaling-stroke;
    animation:breathe var(--dur,5s) var(--bd,0s) ease-in-out infinite;
    transition:stroke .45s var(--ease);
  }
  .kranok-rule{ fill:none; stroke:var(--gold); stroke-width:1; opacity:.32; vector-effect:non-scaling-stroke }

  /* density follows focus */
  .extras{ opacity:0; transition:opacity .85s ease }
  [data-frame].is-focus .extras{ opacity:1 }
  .base{ transition:opacity .85s ease }
  [data-frame]:not(.is-focus) .cluster .base,
  [data-frame]:not(.is-focus) .panel-orn .base,
  [data-frame]:not(.is-focus) .margin-curl .base,
  [data-frame]:not(.is-focus) .lone-curl .base{ opacity:.5 }

  /* hover / focus catch: ember wave through the cluster (stroke, staggered) */
  .cluster:hover .kranok-curl, .cluster:hover .kranok-spine,
  .cluster:focus-visible .kranok-curl, .cluster:focus-visible .kranok-spine{
    stroke:var(--ember);
    transition-delay:calc(var(--i,0) * 42ms);
  }
  .cluster:hover, .cluster:focus-visible{ --lo:.72; --hi:1; outline:none }

  /* entrance strike: four corners flicker-brighten in sequence, then the apex crowns */
  #heroFrame.strike .cluster{ animation:strikeFlare .95s var(--sd,0s) both }
  #heroFrame.strike .apex svg{ animation:strikeFlare 1.1s 1.06s both }

  /* ---------- layout scaffolding ---------- */
  main{display:block}
  section{position:relative}
  .wrap{max-width:1180px; margin:0 auto; padding:0 clamp(20px,5vw,80px)}
  .kicker{
    font-family:var(--mono); font-size:.68rem; letter-spacing:.26em;
    text-transform:uppercase; color:var(--gold); display:block;
  }
  .section-head{ text-align:center; max-width:640px; margin:0 auto clamp(30px,5vw,54px) }
  .section-title{
    font-family:var(--display); font-weight:500; color:var(--ink);
    font-size:clamp(1.55rem,3.4vw,2.55rem); line-height:1.12; margin:.5em 0 0;
    letter-spacing:.01em; text-wrap:balance;
  }

  /* ---------- HERO ---------- */
  .hero{
    --inset:clamp(26px,3.6vw,54px);
    min-height:92vh; display:flex; align-items:center; justify-content:center;
    padding:clamp(56px,9vh,92px) clamp(20px,5vw,64px); isolation:isolate;
  }
  .frame-rule{
    position:absolute; inset:var(--inset); border:1px solid var(--gold);
    opacity:.5; pointer-events:none; z-index:0; border-radius:2px;
  }
  .cluster{
    position:absolute; width:clamp(120px,17vw,208px); height:clamp(120px,17vw,208px);
    overflow:visible; z-index:1; pointer-events:auto;
  }
  .cluster[data-corner="tl"]{ top:calc(var(--inset) - 26px); left:calc(var(--inset) - 26px) }
  .cluster[data-corner="tr"]{ top:calc(var(--inset) - 26px); right:calc(var(--inset) - 26px) }
  .cluster[data-corner="bl"]{ bottom:calc(var(--inset) - 26px); left:calc(var(--inset) - 26px) }
  .cluster[data-corner="br"]{ bottom:calc(var(--inset) - 26px); right:calc(var(--inset) - 26px) }
  .apex{
    position:absolute; top:calc(var(--inset) - 42px); left:50%;
    transform:translateX(-50%); width:clamp(84px,10vw,126px);
    z-index:1; pointer-events:none;
  }
  .apex svg{ width:100%; height:auto; display:block; overflow:visible }

  .hero-inner{
    position:relative; z-index:3; max-width:min(740px,92%); margin:0 auto;
    text-align:center; display:flex; flex-direction:column; align-items:center;
    gap:clamp(15px,2.4vh,26px); padding:clamp(18px,4vw,40px);
  }
  .mark{ margin-bottom:clamp(-10px,-1vh,-5px) }
  .mark .star{ width:clamp(34px,4.4vw,50px); height:auto; display:block }
  .wordmark{
    font-family:var(--display); font-weight:600;
    font-size:clamp(1.85rem,6.6vw,4.55rem); letter-spacing:.17em;
    color:var(--ink); margin:0; line-height:1; padding-left:.17em;
    min-width:0; max-width:100%;
  }
  .positioning{
    font-family:var(--serif); font-weight:500;
    font-size:clamp(1.06rem,2.1vw,1.5rem); line-height:1.5;
    color:var(--ink); max-width:44ch; margin:0; text-wrap:balance;
  }
  .cta-row{ display:flex; flex-wrap:wrap; gap:clamp(14px,2vw,26px); align-items:baseline; justify-content:center; margin-top:clamp(2px,.8vh,8px) }
  .cta{
    font-family:var(--serif); font-size:clamp(1rem,1.5vw,1.16rem);
    letter-spacing:.02em; text-decoration:none; line-height:1;
    transition:color .32s var(--ease),border-color .32s var(--ease),background .32s var(--ease);
  }
  .cta-primary{ color:var(--ink); border:1px solid var(--gold); padding:.62em 1.45em; border-radius:2px }
  .cta-primary:hover{ color:var(--cream); background:var(--gold) }
  .cta-secondary{ color:var(--ink); border-bottom:1px solid var(--gold); padding:.15em 0 .25em }
  .cta-secondary:hover{ color:var(--gold) }
  .signature-label{
    font-family:var(--mono); font-size:clamp(.6rem,1.2vw,.72rem);
    letter-spacing:.2em; color:var(--gold); background:transparent;
    border:1px solid rgba(168,128,47,.55); padding:.55em .9em; border-radius:2px;
    cursor:pointer; margin-top:clamp(4px,1vh,10px);
    transition:color .32s var(--ease),border-color .32s var(--ease),background .32s var(--ease);
    max-width:100%; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .signature-label:hover{ color:var(--ember); border-color:var(--ember); background:rgba(192,154,74,.08) }

  /* ---------- SERVICES ---------- */
  .services{ padding:clamp(64px,10vh,128px) 0 }
  .panels{
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:clamp(20px,2.6vw,42px);
  }
  .panel{
    min-width:0; text-align:center; padding-top:clamp(16px,2vw,24px);
    border-top:1px solid rgba(168,128,47,.42); display:flex; flex-direction:column; align-items:center;
  }
  .panel-orn{ display:block; height:clamp(56px,7vw,78px); width:auto; margin:0 auto clamp(14px,2vw,22px); overflow:visible }
  .panel-orn.garland-orn{ width:100%; height:auto; max-height:62px }
  .panel-title{ font-family:var(--display); font-weight:500; font-size:clamp(1.3rem,2vw,1.62rem); color:var(--ink); margin:0 0 .55em; letter-spacing:.01em }
  .panel-body{ font-family:var(--serif); font-size:clamp(1.04rem,1.5vw,1.18rem); line-height:1.58; color:var(--ink); margin:0; max-width:34ch; text-wrap:pretty }

  /* ---------- CASE (ritual center) ---------- */
  .case{ padding:clamp(40px,7vh,90px) 0 clamp(64px,10vh,120px) }
  .case-frame{
    --inset:clamp(18px,2.6vw,40px);
    position:relative; padding:clamp(30px,5vw,72px); isolation:isolate;
  }
  .case-inner{
    position:relative; z-index:3;
    display:grid; grid-template-columns:1.05fr 1fr;
    gap:clamp(24px,4vw,56px); align-items:center;
  }
  .case-media{ min-width:0 }
  .mat{ background:var(--cream); border:1px solid var(--gold); padding:clamp(8px,1.1vw,14px); border-radius:2px; box-shadow:0 1px 0 rgba(168,128,47,.25) }
  .mat-inner{ position:relative; aspect-ratio:16/9; overflow:hidden; background:var(--cream-2); border:1px solid rgba(168,128,47,.35) }
  .mat-inner img{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; display:block }
  .case-text{ min-width:0 }
  .case-title{ font-family:var(--display); font-weight:600; font-size:clamp(2rem,4vw,3rem); line-height:1.05; color:var(--ink); margin:.35em 0 .5em; letter-spacing:.01em }
  .case-body{ font-family:var(--serif); font-size:clamp(1.1rem,1.7vw,1.28rem); line-height:1.6; color:var(--ink); margin:0; max-width:42ch; text-wrap:pretty }
  .epigraph{
    font-family:"Noto Serif Thai",var(--serif); font-weight:400;
    font-size:clamp(1.05rem,2.4vw,1.55rem); line-height:1.55; letter-spacing:0;
    color:var(--gold-deep); text-align:center; margin:clamp(28px,4.5vw,46px) auto 0; max-width:min(94%,720px);
  }

  /* ---------- PRINCIPLES ---------- */
  .principles{ padding:clamp(64px,10vh,128px) 0 }
  .principle-list{ list-style:none; max-width:760px; margin:0 auto; padding:0; display:flex; flex-direction:column; gap:clamp(24px,3.2vw,42px) }
  .principle{ display:flex; gap:clamp(14px,2vw,28px); align-items:flex-start }
  .margin-curl{ width:clamp(36px,4.2vw,48px); height:auto; flex:0 0 auto; overflow:visible; margin-top:-6px }
  .p-num{ font-family:var(--mono); font-size:.78rem; letter-spacing:.14em; color:var(--gold); flex:0 0 auto; margin-top:.5em }
  .p-text{ min-width:0 }
  .p-title{ font-family:var(--display); font-weight:500; font-size:clamp(1.25rem,2vw,1.6rem); color:var(--ink); margin:0 0 .3em; letter-spacing:.01em }
  .p-body{ font-family:var(--serif); font-size:clamp(1.06rem,1.5vw,1.2rem); line-height:1.55; color:var(--ink); margin:0; text-wrap:pretty }

  /* ---------- ABOUT ---------- */
  .about{ padding:clamp(40px,7vh,80px) 0 }
  .about-inner{ max-width:660px; margin:0 auto; text-align:center }
  .about-body{ font-family:var(--serif); font-weight:500; font-size:clamp(1.22rem,2.4vw,1.72rem); line-height:1.55; color:var(--ink); margin:.7em 0 0; text-wrap:balance }

  /* ---------- CONTACT (quietest moment) ---------- */
  .contact{ padding:clamp(56px,9vh,112px) 0 clamp(48px,7vh,88px); text-align:center }
  .lone-curl{ width:clamp(58px,9vw,90px); height:auto; margin:0 auto clamp(18px,2.5vw,30px); display:block; overflow:visible }
  .contact-email{ font-family:var(--display); font-weight:500; font-size:clamp(1.5rem,4.4vw,3rem); color:var(--ink); text-decoration:none; letter-spacing:.01em; display:inline-block; border-bottom:1px solid transparent; transition:color .32s var(--ease),border-color .32s var(--ease); max-width:100%; overflow-wrap:break-word }
  .contact-email:hover{ color:var(--gold); border-color:var(--gold) }
  .contact-loc{ display:block; font-family:var(--mono); font-size:.72rem; letter-spacing:.22em; text-transform:uppercase; color:var(--gold); margin-top:clamp(16px,2.4vw,24px) }

  /* ---------- FOOTER ---------- */
  .site-footer{ border-top:1px solid rgba(168,128,47,.4); max-width:1180px; margin:0 auto; padding:clamp(28px,4vw,44px) clamp(20px,5vw,80px); display:flex; flex-wrap:wrap; gap:14px 32px; align-items:center; justify-content:space-between }
  .footer-mark{ display:flex; align-items:center; gap:14px }
  .footer-mark .star{ width:24px; height:24px; display:block }
  .footer-word{ font-family:var(--display); font-weight:600; letter-spacing:.2em; font-size:1rem; color:var(--ink) }
  .footer-meta{ font-family:var(--mono); font-size:.7rem; letter-spacing:.14em; color:var(--ink); opacity:.72; display:flex; gap:18px; flex-wrap:wrap }
  .colophon{ flex-basis:100%; text-align:center; font-family:var(--mono); font-size:.66rem; letter-spacing:.16em; color:var(--gold); opacity:.85; margin-top:6px }

  /* ---------- focus-visible ---------- */
  a:focus-visible, button:focus-visible{ outline:2px solid var(--gold); outline-offset:3px; border-radius:2px }

  /* ---------- responsive ---------- */
  @media(max-width:860px){
    .panels{ grid-template-columns:1fr; max-width:460px; margin:0 auto; gap:clamp(30px,6vw,44px) }
    .case-inner{ grid-template-columns:1fr; gap:clamp(22px,5vw,34px) }
    .case-text{ text-align:center }
    .case-body{ margin:0 auto }
  }
  @media(max-width:640px){
    .hero{ --inset:16px; min-height:90vh; padding:clamp(70px,12vh,110px) 16px }
    .frame-rule{ inset:16px 0; border-left:none; border-right:none; border-radius:0 }
    .cluster{ width:clamp(118px,42vw,186px); height:clamp(118px,42vw,186px); pointer-events:none }
    .cluster[data-corner="tl"]{ top:2px; left:0 }
    .cluster[data-corner="tr"]{ top:2px; right:0 }
    .cluster[data-corner="bl"]{ bottom:2px; left:0 }
    .cluster[data-corner="br"]{ bottom:2px; right:0 }
    .apex{ top:-4px; width:clamp(70px,20vw,96px) }
    .case-frame{ --inset:12px; padding:clamp(54px,15vw,74px) 6px }
    .case-frame .frame-rule{ inset:12px 0 }
    .case-frame .cluster{ width:clamp(92px,30vw,132px); height:auto }
    .principle{ gap:14px }
    .footer-meta{ gap:12px }
    .signature-label{ font-size:.56rem; letter-spacing:.1em; padding:.55em .7em }
  }

  /* ---------- reduced motion: full density, still, no rAF, no flicker ---------- */
  @media(prefers-reduced-motion:reduce){
    *{ animation:none !important }
    .kranok-curl{ opacity:.9 !important }
    .kranok-spine{ opacity:.4 !important }
    .extras{ opacity:1 !important; transition:none !important }
    .base{ opacity:1 !important; transition:none !important }
    #heroFrame.strike .cluster, #heroFrame.strike .apex svg{ filter:none !important }
  }
</style>
</head>
<body>
<main>
  <!-- HERO : four-corner living kranok frame -->
  <section class="hero" id="heroFrame" data-frame>
    <div class="frame-rule" aria-hidden="true"></div>
    <div class="apex" aria-hidden="true"><svg data-kranok="apex" viewBox="0 0 140 112" preserveAspectRatio="xMidYMax meet"></svg></div>
    <svg class="cluster" data-kranok="cluster" data-corner="tl" data-count="16" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet" style="--sd:0s" aria-hidden="true"></svg>
    <svg class="cluster" data-kranok="cluster" data-corner="tr" data-count="15" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet" style="--sd:.28s" aria-hidden="true"></svg>
    <svg class="cluster" data-kranok="cluster" data-corner="br" data-count="15" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet" style="--sd:.56s" aria-hidden="true"></svg>
    <svg class="cluster" data-kranok="cluster" data-corner="bl" data-count="15" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet" style="--sd:.84s" aria-hidden="true"></svg>

    <div class="hero-inner">
      <div class="mark" id="heroMark" aria-hidden="true"></div>
      <h1 class="wordmark">VESPERWERK</h1>
      <p class="positioning" id="heroPos"></p>
      <div class="cta-row">
        <a class="cta cta-primary" id="ctaPrimary" href="#contact"></a>
        <a class="cta cta-secondary" id="ctaSecondary" href="#case"></a>
      </div>
      <button class="signature-label" id="sigLabel" type="button" aria-label="Replay the kranok strike animation">LAI KRANOK . 4 CLUSTERS . <span id="curlCount">--</span> CURLS (true)</button>
    </div>
  </section>

  <!-- SERVICES : three panels, each a distinct kranok variant -->
  <section class="services" id="services" data-frame>
    <div class="wrap">
      <div class="section-head">
        <span class="kicker">Services</span>
        <h2 class="section-title">What we build</h2>
      </div>
      <div class="panels" id="panels"></div>
    </div>
  </section>

  <!-- CASE : the densest frame on the page, the ritual center -->
  <section class="case" id="case" data-frame>
    <div class="wrap">
      <div class="case-frame">
        <div class="frame-rule" aria-hidden="true"></div>
        <svg class="cluster" data-kranok="cluster" data-corner="tl" data-count="20" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
        <svg class="cluster" data-kranok="cluster" data-corner="tr" data-count="19" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
        <svg class="cluster" data-kranok="cluster" data-corner="br" data-count="20" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
        <svg class="cluster" data-kranok="cluster" data-corner="bl" data-count="19" viewBox="0 0 240 240" preserveAspectRatio="xMidYMid meet" aria-hidden="true"></svg>
        <div class="case-inner">
          <div class="case-media">
            <div class="mat">
              <div class="mat-inner"><img id="caseImg" loading="lazy" decoding="async" alt=""></div>
            </div>
          </div>
          <div class="case-text">
            <span class="kicker" id="caseKicker"></span>
            <h2 class="case-title" id="caseTitle"></h2>
            <p class="case-body" id="caseBody"></p>
          </div>
        </div>
      </div>
      <p class="epigraph" id="epigraph" lang="th"></p>
    </div>
  </section>

  <!-- PRINCIPLES : four single-curl marginal ornaments -->
  <section class="principles" id="approach" data-frame>
    <div class="wrap">
      <div class="section-head">
        <span class="kicker">Approach</span>
        <h2 class="section-title">How we work</h2>
      </div>
      <ol class="principle-list" id="principleList"></ol>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about" id="about" data-frame>
    <div class="wrap">
      <div class="about-inner">
        <span class="kicker">About</span>
        <p class="about-body" id="aboutBody"></p>
      </div>
    </div>
  </section>

  <!-- CONTACT : one perfect lone curl, the quietest moment -->
  <section class="contact" id="contact" data-frame>
    <div class="wrap">
      <svg class="lone-curl" data-kranok="single" data-scale="0.82" data-k="contact" viewBox="0 0 92 130" preserveAspectRatio="xMidYMax meet" aria-hidden="true"></svg>
      <a class="contact-email" id="contactEmail" href="#"></a>
      <span class="contact-loc" id="contactLoc"></span>
    </div>
  </section>
</main>

<footer class="site-footer">
  <div class="footer-mark">
    <span id="footMark" aria-hidden="true"></span>
    <span class="footer-word">VESPERWERK</span>
  </div>
  <div class="footer-meta">
    <span id="footLoc"></span>
    <span id="footCopy"></span>
  </div>
  <div class="colophon" id="colophon"></div>
</footer>

<script>
/* =========================================================================
   DATA  ( edit here to reuse this template for another brand )
   ========================================================================= */
const DATA = {
  wordmark: "VESPERWERK",
  positioning: "An independent software and AI studio. We architect, build, and operate production systems for businesses that cannot afford them to fail.",
  ctaPrimary: "Start a conversation",
  ctaSecondary: "See our work",
  services: [

      body: "Voice agents, LLM assistants, and the evaluation infrastructure that keeps them honest. AI that answers like your best employee, in production, around the clock." },
    { title: "Product Engineering", variant: "nak",

    { title: "Commerce and Platforms", variant: "garland",
      body: "Deep Shopify and LINE platform work: storefronts, admin apps, integrations, and the messaging rails Southeast Asian commerce runs on." }
  ],
  caseStudy: {

    epigraph: "ดาวประจำเมือง : แสงแรกที่ใช้นำทางยามค่ำ"

    { n: "01", title: "Architecture first", body: "We design the system before we write the code." },
    { n: "02", title: "Production-worthy", body: "Demos impress; production endures. We build for the second one." },
    { n: "03", title: "Scope discipline", body: "The most valuable thing we tell clients is what not to build." },
    { n: "04", title: "Senior hands", body: "No juniors learning on your budget. Founder-led, senior hands on every line." }
  ],
  about: "Vesperwerk takes its name from the evening star: the first light you can navigate by. We are a founder-led studio in Bangkok building software for businesses across Asia and beyond.",
  contact: { email: "kittipong.k@vesperwerk.com", location: "Bangkok, Thailand" },
  footer: { location: "Bangkok, Thailand", copyright: "(c) 2026 Vesperwerk", colophon: "ornament: authored svg . fire: opacity, not particles" }

/* =========================================================================
   STAR mark ( inline, facet colors preserved )
   ========================================================================= */
const STAR_SVG = `<svg class="star" viewBox="0 0 200 200" role="img" aria-label="Vesperwerk star">
  <g transform="translate(100,100)">
    <g><polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/><polygon points="0,-86 11,0 0,0" fill="#8a6526"/></g>
    <g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="#8a6526"/><polygon points="0,-86 11,0 0,0" fill="#c09a4a"/></g>
    <g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/><polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/></g>
    <g transform="rotate(270)"><polygon points="0,-64 -9.5,0 0,0" fill="#8a6526"/><polygon points="0,-64 9.5,0 0,0" fill="#c09a4a"/></g>
    <g transform="rotate(45)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
    <g transform="rotate(135)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
    <g transform="rotate(225)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
    <g transform="rotate(315)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
  </g>
</svg>`;

/* =========================================================================
   KRANOK curl library  ( authored path grammar: broad base, tapering
   flame tail, hooked tip / spiral eye - drawn once, instanced with
   organic variation, never mirror-stamped )
   ========================================================================= */
const P = {
  // main hooked flame ( tua ) - broad base, sweeps up, tip curls to a spiral eye
  flame:  "M0 0C-13 -27 -19 -57 -10 -84C-3 -107 17 -119 34 -112C50 -105 55 -87 46 -77C39 -70 28 -71 25 -80C22 -88 31 -92 35 -85C33 -66 33 -45 24 -31C16 -18 7 -8 0 0Z",
  // slim tapering flame tongue ( kranok tail )
  tongue: "M0 0C-6 -22 -6 -50 3 -74C8 -88 18 -95 26 -92C16 -78 10 -55 9 -31C9 -18 4 -8 0 0Z",
  // small fiddlehead hook ( ta-oi subsidiary curl )
  hook:   "M0 0C-3 -13 -1 -28 9 -35C18 -41 27 -35 26 -26C25 -19 19 -16 15 -20C12 -23 14 -28 18 -27",
  // structural naga curl ( tighter, more upright shoulder )
  nak:    "M0 0C-2 -26 -12 -44 -9 -70C-6 -92 8 -101 21 -96C34 -91 36 -76 28 -69C21 -63 12 -66 12 -74C12 -82 20 -84 24 -79C18 -58 20 -34 12 -18C8 -10 4 -4 0 0Z",
  // inner accent line ( the engraved second stroke )
  spine:  "M2 -6C-5 -29 -8 -56 -1 -80C6 -99 20 -108 32 -100"
};

/* deterministic seeded RNG so the frame ( and the true curl count ) is stable */
function hashStr(s){ let h=2166136261>>>0; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function lerp(a,b,t){ return a+(b-a)*t; }

function curlStyle(rnd, i, loBase, hiBase, durBase, bdBase){
  const lo=(loBase+rnd()*0.18).toFixed(2);
  const hi=(hiBase+rnd()*0.12).toFixed(2);
  const dur=(durBase+rnd()*2.6).toFixed(2);
  const bd=(bdBase+rnd()*2.4).toFixed(2);
  return `--i:${i};--lo:${lo};--hi:${hi};--dur:${dur}s;--bd:${bd}s`;
}
function path(cls, d, tf, style){ return `<path class="${cls}" d="${d}" transform="${tf}" style="${style}"/>`; }

const CORNERS = {
  tl:{ px:26,  py:26,  a0:50,  a1:200 },
  tr:{ px:214, py:26,  a0:160, a1:310 },
  br:{ px:214, py:214, a0:250, a1:400 },
  bl:{ px:26,  py:214, a0:-20, a1:130 }
};

/* corner spray: families fan along the two frame edges from the corner,
   graduated in scale, jittered, mixing flame / tongue / hook */
function buildCluster(svg){
  const corner = svg.dataset.corner;
  const N = +svg.dataset.count || 12;
  const cfg = CORNERS[corner] || CORNERS.tl;
  const rnd = mulberry32(hashStr(corner + "#" + N));
  const baseA=[], exA=[];
  const extraStart = Math.ceil(N * 0.6);
  for(let i=0;i<N;i++){
    const t = N>1 ? i/(N-1) : 0;
    const ang = lerp(cfg.a0, cfg.a1, t) + (rnd()*2-1)*7;
    const r = 4 + t*22 + rnd()*4;
    const s = (0.98 - 0.5*Math.abs(t-0.42)) * (0.82 + rnd()*0.36);
    // flames and tongues sweep one consistent direction around the corner
    // ( kranok grammar ); only the subsidiary hooks may counter-curl and nest
    const sel = i % 3;
    let d = P.tongue, spine = false;
    if(sel===0){ d = P.flame; spine = true; }
    else if(sel===2){ d = P.hook; }
    const flip = (d === P.hook && rnd() > 0.5) ? -1 : 1;
    const tf = `translate(${cfg.px} ${cfg.py}) rotate(${ang.toFixed(1)}) translate(0 ${(-r).toFixed(1)}) scale(${(s*flip).toFixed(3)} ${s.toFixed(3)})`;
    const style = curlStyle(rnd, i, 0.4, 0.85, 3.4, 1.8);
    let frag = "";
    if(spine) frag += path("kranok-spine", P.spine, tf, style);
    frag += path("kranok-curl", d, tf, style);
    (i >= extraStart ? exA : baseA).push(frag);
  }
  svg.innerHTML = `<g class="base">${baseA.join("")}</g><g class="extras">${exA.join("")}</g>`;
}

/* kranok sam tua : three tongues fanned from one base, hooks nested between */
function buildSamTua(svg){
  const cx=80, base=88, rnd=mulberry32(hashStr("samtua"));
  const b=[], ex=[];
  [{rot:-24,s:0.6},{rot:0,s:0.74},{rot:24,s:0.6}].forEach((it,i)=>{
    const tf = `translate(${cx} ${base}) rotate(${it.rot}) scale(${it.s})`;
    const st = curlStyle(rnd, i, 0.5, 0.9, 3.8, 0.5);
    b.push(path("kranok-spine", P.spine, tf, st) + path("kranok-curl", P.tongue, tf, st));
  });
  [-13,13].forEach((rot,i)=>{
    const tf = `translate(${cx} ${base}) rotate(${rot}) translate(0 -5) scale(0.42)`;
    ex.push(path("kranok-curl", P.hook, tf, curlStyle(rnd, i, 0.45, 0.88, 3.6, 1.1)));
  });
  svg.innerHTML = `<g class="base">${b.join("")}</g><g class="extras">${ex.join("")}</g>`;
}

/* structural nak curl : bold centre + two flanking angular curls */
function buildNak(svg){
  const cx=80, base=88, rnd=mulberry32(hashStr("nak"));
  const b=[], ex=[];
  const tfC = `translate(${cx} ${base}) scale(0.8)`;
  b.push(path("kranok-spine", P.spine, tfC, "") + path("kranok-curl", P.nak, tfC, curlStyle(rnd,0,0.5,0.92,4.0,0.6)));
  [[-34,-1],[34,1]].forEach((f,i)=>{
    const tf = `translate(${cx} ${base}) rotate(${f[0]}) scale(${(0.5*f[1]).toFixed(2)} 0.5)`;
    b.push(path("kranok-curl", P.nak, tf, curlStyle(rnd,i+1,0.46,0.88,4.4,1.0)));
  });
  [[-16,-1],[16,1]].forEach((f,i)=>{
    const tf = `translate(${cx} ${base}) rotate(${f[0]}) translate(0 -4) scale(${(0.36*f[1]).toFixed(2)} 0.36)`;
    ex.push(path("kranok-curl", P.hook, tf, curlStyle(rnd,i,0.44,0.86,3.8,1.4)));
  });
  svg.innerHTML = `<g class="base">${b.join("")}</g><g class="extras">${ex.join("")}</g>`;
}

/* market garland : a running row of small alternating curls on a hairline */
function buildGarland(svg){
  const base=54, n=9, rnd=mulberry32(hashStr("garland"));
  const b=[], ex=[];
  for(let i=0;i<n;i++){
    const x = 24 + i*((400-48)/(n-1));
    const d = i%3===0 ? P.flame : P.tongue;
    const s = (i%3===0 ? 0.34 : 0.26) * (0.9 + rnd()*0.2);
    const rot = (i%2 ? 9 : -9) + (rnd()*2-1)*5;
    const tf = `translate(${x.toFixed(1)} ${base}) rotate(${rot.toFixed(1)}) scale(${s.toFixed(3)})`;
    const st = curlStyle(rnd, i, 0.46, 0.88, 3.6, 0.4);
    (i%3===1 ? ex : b).push(path("kranok-curl", d, tf, st));
  }
  svg.innerHTML = `<path class="kranok-rule" d="M10 ${base} H390"/><g class="base">${b.join("")}</g><g class="extras">${ex.join("")}</g>`;
}

/* single marginal curl ( principles ) / lone curl ( contact ) */
function buildSingle(svg){
  const s = +svg.dataset.scale || 0.6;
  const rnd = mulberry32(hashStr("single#" + (svg.dataset.k || "")));
  const tf = `translate(46 120) scale(${s})`;
  const b = path("kranok-spine", P.spine, tf, "") + path("kranok-curl", P.flame, tf, curlStyle(rnd,0,0.5,0.92,3.8,0.5));
  const tfE = `translate(46 120) rotate(26) translate(0 -8) scale(${(s*0.5).toFixed(2)})`;
  const ex = path("kranok-curl", P.hook, tfE, curlStyle(rnd,1,0.45,0.88,4.2,1.4));
  svg.innerHTML = `<g class="base">${b}</g><g class="extras">${ex}</g>`;
}

/* pediment finial ( apex ) : one upright flame with two small side tongues.
   the main flame carries the page's single resting ember note ( crown of the axis ) */
function buildApex(svg){
  const b=[];
  const tf = `translate(70 104) scale(0.66)`;
  b.push(path("kranok-spine", P.spine, tf, "") + path("kranok-curl ember", P.flame, tf, "--i:0;--lo:0.55;--hi:0.98;--dur:4s;--bd:1.6s"));
  [[-28,-1],[28,1]].forEach((f,i)=>{
    const tf2 = `translate(70 104) rotate(${f[0]}) scale(${(0.42*f[1]).toFixed(2)} 0.42)`;
    b.push(path("kranok-curl", P.tongue, tf2, `--i:${i+1};--lo:0.45;--hi:0.9;--dur:4.4s;--bd:${(1.9+i*0.3).toFixed(2)}s`));
  });
  svg.innerHTML = `<g class="base">${b.join("")}</g>`;
}

function initKranok(root){
  root.querySelectorAll("[data-kranok]").forEach(svg=>{
    switch(svg.dataset.kranok){
      case "cluster": buildCluster(svg); break;
      case "samtua":  buildSamTua(svg); break;
      case "nak":     buildNak(svg); break;
      case "garland": buildGarland(svg); break;
      case "single":  buildSingle(svg); break;
      case "apex":    buildApex(svg); break;
    }
  });
}

/* =========================================================================
   RENDER content from DATA
   ========================================================================= */
function el(id){ return document.getElementById(id); }

function render(){
  el("heroMark").innerHTML = STAR_SVG;
  el("footMark").innerHTML = STAR_SVG;
  el("heroPos").textContent = DATA.positioning;

  const cp = el("ctaPrimary"); cp.textContent = DATA.ctaPrimary; cp.href = "mailto:" + DATA.contact.email;
  const cs = el("ctaSecondary"); cs.textContent = DATA.ctaSecondary;

  const vmap = {
    "sam-tua": { k:"samtua",  vb:"0 0 160 96",  cls:"" },
    "nak":     { k:"nak",     vb:"0 0 160 96",  cls:"" },
    "garland": { k:"garland", vb:"0 0 400 70",  cls:" garland-orn" }
  };
  el("panels").innerHTML = DATA.services.map(s=>{
    const v = vmap[s.variant];
    return `<article class="panel">
      <svg class="panel-orn${v.cls}" data-kranok="${v.k}" viewBox="${v.vb}" preserveAspectRatio="xMidYMax meet" aria-hidden="true"></svg>
      <h3 class="panel-title">${s.title}</h3>

  el("caseKicker").textContent = DATA.caseStudy.kicker;

  el("epigraph").textContent = DATA.caseStudy.epigraph;

  el("principleList").innerHTML = DATA.principles.map((p,i)=>`<li class="principle">
      <svg class="margin-curl" data-kranok="single" data-scale="0.5" data-k="p${i}" viewBox="0 0 92 130" preserveAspectRatio="xMidYMax meet" aria-hidden="true"></svg>
      <span class="p-num">${p.n}</span>
      <div class="p-text"><h3 class="p-title">${p.title}</h3><p class="p-body">${p.body}</p></div>
    </li>`).join("");

  el("aboutBody").textContent = DATA.about;
  const ce = el("contactEmail"); ce.textContent = DATA.contact.email; ce.href = "mailto:" + DATA.contact.email;
  el("contactLoc").textContent = DATA.contact.location;
  el("footLoc").textContent = DATA.footer.location;
  el("footCopy").textContent = DATA.footer.copyright;
  el("colophon").textContent = DATA.footer.colophon;
}

/* =========================================================================
   BOOT
   ========================================================================= */
(function boot(){
  const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  render();
  initKranok(document);

  // true curl count : count the rendered curl paths inside the four hero clusters
  const trueCount = document.querySelectorAll("#heroFrame .cluster .kranok-curl").length;
  el("curlCount").textContent = trueCount;

  // density follows focus : the section most in view grows its frame
  const frames = Array.from(document.querySelectorAll("[data-frame]"));
  const ratios = new Map();
  frames.forEach(f=>ratios.set(f, 0));
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>ratios.set(e.target, e.intersectionRatio));
    let best=null, bv=-1;
    frames.forEach(f=>{ const r=ratios.get(f)||0; if(r>bv){ bv=r; best=f; } });
    frames.forEach(f=>f.classList.toggle("is-focus", f===best));
  }, { threshold:[0,0.12,0.28,0.45,0.65,0.85,1] });
  frames.forEach(f=>io.observe(f));
  // ensure the hero reads dense at scroll=0 immediately
  const heroFrame = el("heroFrame");
  heroFrame.classList.add("is-focus");

  // entrance strike : corners catch like a struck match, then settle to breath
  function strike(){
    if(reduce) return;
    heroFrame.classList.remove("strike");
    void heroFrame.offsetWidth;   // restart the sequence
    heroFrame.classList.add("strike");
  }
  if(!reduce){ setTimeout(strike, 140); }

  // clicking the corner label replays the signature strike ( keyboard accessible button )
  el("sigLabel").addEventListener("click", strike);
})();
</script>
