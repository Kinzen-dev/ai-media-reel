<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Vesperwerk : Lai Rot Nam Gilding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@400;500&family=Noto+Serif+Thai:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============ lacquer ground ============ */
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow-x:clip}
html{-webkit-text-size-adjust:100%}
body{
  background:
    radial-gradient(130% 90% at 50% -6%, #1e1811 0%, #16120d 52%, #110d09 100%) fixed,
    #16120d;
  color:#d9cbaa;
  font:400 16px/1.65 'Inter',system-ui,sans-serif;
  min-height:100vh;
}
/* one hairline reflection across the wet lacquer */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(107deg, rgba(224,188,114,0) 46.6%, rgba(224,188,114,.045) 50%, rgba(224,188,114,0) 53.4%);
}
::selection{background:#a8802f;color:#16120d}
img{max-width:100%;height:auto;display:block}
a{color:inherit}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:2px solid #e0bc72;outline-offset:3px;border-radius:2px}
h1,h2,h3{font-weight:500}
.track{letter-spacing:.22em;margin-right:-.22em}

/* ============ gold leaf ============ */
.lt{
  background:
    repeating-linear-gradient(115deg, rgba(255,246,214,.16) 0 1px, rgba(255,246,214,0) 1px 23px),
    repeating-linear-gradient(115deg, rgba(56,36,7,.22) 0 1px, rgba(56,36,7,0) 1px 47px),
    linear-gradient(112deg,#8a6526 0%,#c09a4a 17%,#a8802f 34%,#e0bc72 50%,#a8802f 65%,#8a6526 83%,#b6924a 100%);
  -webkit-background-clip:text;background-clip:text;
  color:transparent;-webkit-text-fill-color:transparent;
  display:inline-block;max-width:100%;
}
.g-gold .k-fill{fill:#c09a4a}
.g-gold .k-fill2{fill:#a8802f}
.g-gold .k-line{stroke:#b6924a;fill:none}
.sg .k-fill{fill:#c09a4a}
.sg .k-fill2{fill:#a8802f}
.sg .k-line{stroke:#b6924a;fill:none}

/* ============ gild machinery: resist under, gold masked over ============ */
.gild{position:relative;display:inline-block;max-width:100%}
.gild>.g-resist{display:block;color:#6b5a33;opacity:.55;pointer-events:none;user-select:none}
.gild>.g-gold{position:absolute;inset:0}
/* resist copies must stay yellow-gum brown, never gold-clipped */
.g-resist .lt{background:none;color:#6b5a33;-webkit-text-fill-color:#6b5a33}
.g-resist .k-fill,.g-resist .k-fill2{fill:none;stroke:#6b5a33;stroke-width:1.1}
.g-resist .k-line{stroke:#6b5a33;fill:none}
.g-resist .star-svg polygon{fill:none;stroke:#6b5a33;stroke-width:2}
.g-resist .star-svg .seams{display:none}
.g-gold,.sg{
  -webkit-mask-image:linear-gradient(115deg,#000 0%,#000 42%,rgba(0,0,0,0) 62%);
  mask-image:linear-gradient(115deg,#000 0%,#000 42%,rgba(0,0,0,0) 62%);
  -webkit-mask-size:260% 100%;mask-size:260% 100%;
  -webkit-mask-repeat:no-repeat;mask-repeat:no-repeat;
  -webkit-mask-position:0 0;mask-position:0 0;
}

/* ============ hero ============ */
.hero{
  --fi:clamp(14px,2.6vw,34px);
  position:relative;min-height:100svh;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(var(--fi) + 76px) 24px calc(var(--fi) + 64px);
  text-align:center;
}
.frame{position:absolute;inset:var(--fi);pointer-events:none;z-index:1}
.frame>.g-resist,.frame>.g-gold{position:absolute;inset:0;opacity:1}
.frame>.g-resist{opacity:.5}
.fl{position:absolute;border-radius:2px}
.fl-a{inset:0}.fl-b{inset:7px}
.g-gold .fl-a{border:1px solid rgba(192,154,74,.75)}
.g-gold .fl-b{border:1px solid rgba(168,128,47,.35)}
.g-resist .fl-a{border:1px solid rgba(107,90,51,.55)}
.g-resist .fl-b{border:1px solid rgba(107,90,51,.25)}
.fc{position:absolute;width:clamp(40px,6vw,72px);height:clamp(40px,6vw,72px)}
.fc svg{width:100%;height:100%;display:block}
.fc.tl{top:-2px;left:-2px}
.fc.tr{top:-2px;right:-2px;transform:scaleX(-1)}
.fc.br{bottom:-2px;right:-2px;transform:scale(-1,-1)}
.fc.bl{bottom:-2px;left:-2px;transform:scaleY(-1)}
.fdia{position:absolute;width:14px;height:14px}
.fdia svg{width:100%;height:100%;display:block}
.fdt{top:0;left:50%;transform:translate(-50%,-50%)}
.fdb{bottom:0;left:50%;transform:translate(-50%,50%)}

.topbar{
  position:absolute;z-index:6;
  top:calc(var(--fi) + 12px);
  left:calc(var(--fi) + clamp(48px,6vw,96px));
  right:calc(var(--fi) + clamp(48px,6vw,96px));
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.topbar>*{min-width:0}
.brandline{display:inline-flex;align-items:center;gap:10px;font:500 11px/1 'Inter',sans-serif;color:#c09a4a}
.brandline .star-svg{flex:none}
.brandline .bw{font-family:'Playfair Display',serif;font-weight:500;font-size:12.5px;letter-spacing:.24em;margin-right:-.24em;white-space:nowrap}
#regild{
  display:inline-flex;align-items:center;gap:7px;flex:none;
  padding:9px 14px;border:1px solid rgba(192,154,74,.55);border-radius:2px;
  font:500 10.5px/1 'Inter',sans-serif;letter-spacing:.22em;color:#c09a4a;
  background:rgba(22,18,13,.4);
}
#regild:hover{background:rgba(168,128,47,.14);border-color:#c09a4a}

.hero-core{position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;max-width:760px}
.overline{font:500 10.5px/1 'Inter',sans-serif;letter-spacing:.34em;margin-right:-.34em;color:#9c7d3a;margin-bottom:26px;white-space:nowrap}
.hero-star{margin-bottom:24px}
.hero-star .star-svg{display:block;width:clamp(98px,15vh,138px);height:auto}
.hero-star>.g-gold{filter:drop-shadow(0 0 32px rgba(192,154,74,.35))}
.wordmark{font-family:'Playfair Display',serif;font-weight:500;font-size:clamp(26px,4.2vw,54px);line-height:1.15;margin-bottom:18px}
.positioning{font-size:clamp(15px,1.3vw,18px);line-height:1.7;max-width:620px;margin-bottom:30px}
.cta-row{display:inline-flex;flex-wrap:wrap;justify-content:center;gap:12px}
.cta-row>*{min-width:0}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:15px 26px;border-radius:2px;text-decoration:none;
  font:500 12px/1 'Inter',sans-serif;letter-spacing:.2em;text-transform:uppercase;
}
.btn-solid{
  color:#231807;border:1px solid #8a6526;
  background:
    repeating-linear-gradient(115deg, rgba(255,246,214,.16) 0 1px, rgba(255,246,214,0) 1px 21px),
    linear-gradient(112deg,#8a6526 0%,#c09a4a 22%,#e0bc72 50%,#a8802f 74%,#8a6526 100%);
  background-size:150% 100%;background-position:0 0;
  box-shadow:0 8px 28px rgba(168,128,47,.22);
}
.btn-solid:hover{background-position:60% 0}
.btn-ghost{color:#c09a4a;border:1px solid rgba(192,154,74,.5);background:transparent}
.btn-ghost:hover{background:rgba(168,128,47,.12);border-color:#c09a4a}
.scrollcue{
  position:absolute;z-index:4;left:50%;transform:translateX(-50%);
  bottom:calc(var(--fi) + 20px);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  font:500 9.5px/1 'Inter',sans-serif;letter-spacing:.32em;margin-right:0;color:#8a6526;
}
.scrollcue i{display:block;width:1px;height:24px;background:linear-gradient(#a8802f,rgba(168,128,47,0))}
#flecks{position:absolute;inset:0;z-index:5;pointer-events:none;overflow:hidden}
.fleck{
  position:absolute;width:4px;height:7px;border-radius:1px;opacity:0;
  background:linear-gradient(115deg,#e0bc72,#a8802f);
}

/* ============ sections / lacquer panels ============ */
main{position:relative;z-index:1}
.sect{padding:clamp(56px,9vh,96px) 22px 0}
.wrap{max-width:1120px;margin:0 auto}
.wrap>*{min-width:0}
.slabel{
  display:flex;align-items:center;gap:18px;max-width:520px;margin:0 auto clamp(30px,4.5vw,46px);
  font:500 11px/1 'Inter',sans-serif;letter-spacing:.32em;color:#9c7d3a;text-transform:uppercase;
}
.slabel i{flex:1;min-width:0;height:1px;background:linear-gradient(90deg,rgba(168,128,47,0),rgba(168,128,47,.5))}
.slabel i:last-child{background:linear-gradient(90deg,rgba(168,128,47,.5),rgba(168,128,47,0))}
.slabel span{flex:none;margin-right:-.32em}
.panel{
  position:relative;border-radius:4px;
  background:linear-gradient(158deg,#1e1811 0%,#171208 62%,#14100a 100%);
  border:1px solid rgba(168,128,47,.22);
  box-shadow:inset 0 1px 0 rgba(224,188,114,.07), inset 0 0 44px rgba(0,0,0,.35), 0 24px 48px rgba(0,0,0,.45);
}
.cream{
  display:block;
  background:linear-gradient(#f7f0df,#efe5cd);color:#2e2a26;border-radius:2px;
  border:1px solid rgba(138,101,38,.4);padding:16px 18px;
  font-size:14.5px;line-height:1.7;text-align:left;
}
.grid{display:grid;gap:20px}
.grid>*{min-width:0}
.svc-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
.svc{padding:34px 26px 26px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px}
.svc>*{min-width:0}
.emb{width:clamp(64px,6vw,82px);height:auto;display:block}
.ptitle{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(19px,1.7vw,23px);line-height:1.3}
.svc .cream{width:100%}

/* work cartouche */
.work-panel{max-width:880px;margin:0 auto;padding:clamp(26px,5vw,50px);text-align:center}
.cartouche{position:absolute;inset:10px;pointer-events:none;border-radius:3px}
.cartouche .fl-a{inset:0;border:1px solid rgba(192,154,74,.6)}
.cartouche .fl-b{inset:5px;border:1px solid rgba(168,128,47,.3)}
.cartouche .fc{width:34px;height:34px}
.work-title{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(26px,3.2vw,38px);line-height:1.2;margin:6px 0 18px}
.work-kicker{font:500 10.5px/1 'Inter',sans-serif;letter-spacing:.3em;margin-right:-.3em;color:#9c7d3a;text-transform:uppercase}
.miniature{margin:22px auto 20px;max-width:640px}
.mini-frame{
  background:#0d0a06;padding:clamp(10px,1.8vw,16px);
  border:1px solid rgba(192,154,74,.45);border-radius:2px;
  box-shadow:inset 0 0 26px rgba(0,0,0,.6);
}
.mini-frame img{width:100%;height:auto;border:1px solid rgba(192,154,74,.3)}
.mini-cap{margin-top:12px;font:500 10px/1.5 'Inter',sans-serif;letter-spacing:.24em;color:#8a6526;text-transform:uppercase}
.work-panel .cream{max-width:640px;margin:0 auto}

/* approach seals */
.ap-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
.ap{padding:26px 20px 24px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.ap>*{min-width:0}
.sealring{
  position:relative;display:inline-flex;align-items:center;justify-content:center;
  width:64px;height:64px;border-radius:50%;border:1.5px solid;
}
.sealring::after{content:"";position:absolute;inset:4px;border:1px solid;border-radius:50%;opacity:.6;border-color:inherit}
.g-gold .sealring{border-color:#b6924a}
.g-resist .sealring{border-color:#6b5a33}
.sealn{font-family:'Playfair Display',serif;font-weight:600;font-size:21px;line-height:1}
.ap h3{font-family:'Playfair Display',serif;font-weight:600;font-size:17.5px;line-height:1.35}
.ap p{font-size:13.5px;line-height:1.65;color:#cbbd9c}

/* about */
.about-wrap{max-width:680px;margin:0 auto;text-align:center}
.dia-solo{display:inline-block;width:16px}
.dia-solo svg{width:100%;height:auto;display:block}
.about-txt{font-family:'Playfair Display',serif;font-weight:500;font-size:clamp(17px,1.7vw,21px);line-height:1.75;color:#e0d4b4}

/* contact / maker's mark */
.maker{max-width:760px;margin:0 auto;padding:clamp(28px,5vw,46px);display:flex;align-items:center;gap:clamp(24px,4vw,44px)}
.maker>*{min-width:0}
.maker-star{flex:none}
.maker-star .star-svg{display:block;width:clamp(72px,8vw,96px);height:auto}
.maker-col{text-align:left;display:flex;flex-direction:column;gap:10px}
.email{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(17px,2.1vw,24px);line-height:1.35;text-decoration:none;overflow-wrap:anywhere}
.email:hover{text-decoration:underline;text-underline-offset:4px;text-decoration-color:rgba(192,154,74,.6)}
.city{font:500 11px/1.5 'Inter',sans-serif;letter-spacing:.26em;color:#9c7d3a;text-transform:uppercase}
.thai{font-family:'Noto Serif Thai',serif;font-weight:500;font-size:15.5px;line-height:1.6;letter-spacing:normal}
.contact-cta{margin-top:8px}

/* colophon + footer */
.colophon{
  margin:clamp(56px,9vh,90px) auto 0;padding:0 22px;text-align:center;
  font:400 11px/1.7 'Inter',sans-serif;letter-spacing:.13em;color:#6b5a33;
}
footer{
  margin-top:34px;padding:34px 22px 44px;text-align:center;
  border-top:1px solid rgba(168,128,47,.18);position:relative;z-index:1;
}
.foot-in{display:flex;flex-direction:column;align-items:center;gap:12px}
.foot-in>*{min-width:0}
.foot-mark{font-family:'Playfair Display',serif;font-weight:500;font-size:13px;letter-spacing:.24em;margin-right:-.24em}
.foot-meta{font:400 11.5px/1.8 'Inter',sans-serif;letter-spacing:.08em;color:#8a7a55}

/* polishing light */
#sheen{
  position:fixed;left:0;top:0;width:520px;height:520px;margin:-260px 0 0 -260px;
  border-radius:50%;pointer-events:none;z-index:60;opacity:0;
  background:radial-gradient(closest-side,rgba(255,222,150,.17),rgba(255,200,110,.06) 46%,rgba(255,200,110,0) 72%);
  mix-blend-mode:overlay;will-change:transform;transition:opacity .5s ease;
}
@media (pointer:coarse){#sheen{display:none}}

/* ============ motion (fully gated) ============ */
@media (prefers-reduced-motion: no-preference){
  html{scroll-behavior:smooth}
  /* hero ritual: resist beat, then the diagonal settle */
  .ritual .g-gold,.ritual .sg{
    animation:settle calc(var(--dur,1.1s)*var(--spd,1)) cubic-bezier(.55,.06,.28,.99) calc(var(--del,0s)*var(--spd,1)) both;
  }
  @keyframes settle{
    from{-webkit-mask-position:110% 0;mask-position:110% 0}
    to{-webkit-mask-position:0 0;mask-position:0 0}
  }
  .fleck{animation:fleckfall var(--ft,1.2s) ease-in var(--fd,0s) both}
  @keyframes fleckfall{
    0%{opacity:0;transform:translate(0,-18px) rotate(var(--fr,0deg))}
    18%{opacity:.95}
    100%{opacity:0;transform:translate(var(--fx,0px),26px) rotate(calc(var(--fr,0deg) + 140deg))}
  }
  /* scroll gilding: veiled until the section enters */
  .veil .g-gold,.veil .sg{-webkit-mask-position:110% 0;mask-position:110% 0}
  .veil.in .g-gold,.veil.in .sg{
    -webkit-mask-position:0 0;mask-position:0 0;
    transition:-webkit-mask-position 1.15s cubic-bezier(.55,.06,.28,.99) var(--gd,0s),
               mask-position 1.15s cubic-bezier(.55,.06,.28,.99) var(--gd,0s);
  }
  .veil .panelv{opacity:0;transform:translateY(26px)}
  .veil.in .panelv{
    opacity:1;transform:none;
    transition:opacity .85s ease var(--gd,0s),transform .95s cubic-bezier(.2,.65,.2,1) var(--gd,0s);
  }
  .btn-solid{transition:background-position .6s ease}
  #regild,.btn-ghost{transition:background-color .25s ease,border-color .25s ease}
}
@media (prefers-reduced-motion: reduce){
  #sheen{display:none}
  .fleck{display:none}
}

/* ============ responsive ============ */
@media (max-width:1023px){
  .ap-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
}
@media (max-width:820px){
  .svc-grid{grid-template-columns:1fr}
  .svc{padding:30px 22px 22px}
}
@media (max-width:640px){
  .ap-grid{grid-template-columns:1fr}
  .maker{flex-direction:column;text-align:center}
  .maker-col{text-align:center;align-items:center}
  .positioning{font-size:15px}
  .brandline .bw{font-size:11px}
  #regild{padding:8px 11px;letter-spacing:.16em}
  .sect{padding-left:16px;padding-right:16px}
}
</style>
</head>

<script>
/* =====================================================================
   DATA : all page content lives here. Edit this array to reskin.

const DATA = {

  },

};

/* ============ the vesper star (inline, facet colors kept) ============ */
const ARMS = [[0,86,11],[180,86,11],[90,64,9.5],[270,64,9.5],[45,44,7.5],[135,44,7.5],[225,44,7.5],[315,44,7.5]];
function star(size,sfx){
  let facets="",sil="";
  for(const [rot,len,half] of ARMS){
    const ll=[0,90,45,135].includes(rot);
    facets+='<g transform="rotate('+rot+')"><polygon points="0,'+(-len)+' '+(-half)+',0 0,0" fill="'+(ll?'#c09a4a':'#8a6526')+'"/><polygon points="0,'+(-len)+' '+half+',0 0,0" fill="'+(ll?'#8a6526':'#c09a4a')+'"/></g>';
    sil+='<g transform="rotate('+rot+')"><polygon points="0,'+(-len)+' '+(-half)+',0 '+half+',0"/></g>';
  }
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 200 200" class="star-svg" aria-hidden="true">'
    +'<defs><pattern id="sm'+sfx+'" width="17" height="17" patternTransform="rotate(115)" patternUnits="userSpaceOnUse">'
    +'<path d="M0 0H17" stroke="rgba(255,244,206,.3)" stroke-width="1"/></pattern>'
    +'<mask id="mk'+sfx+'"><g fill="#fff" transform="translate(100,100)">'+sil+'</g></mask></defs>'
    +'<g transform="translate(100,100)">'+facets+'</g>'
    +'<rect class="seams" width="200" height="200" fill="url(#sm'+sfx+')" mask="url(#mk'+sfx+')" opacity=".45"/>'
    +'</svg>';
}

/* ============ kranok linework (hand-authored flame curls) ============ */
const CORNER =
 '<svg viewBox="0 0 90 90" aria-hidden="true">'

  return '<span class="gild '+(cls||'')+'"'+(vars?' style="'+vars+'"':'')+'>'
    +'<span class="g-resist" aria-hidden="true">'+html+'</span>'
    +'<span class="g-gold">'+html+'</span></span>';
}

/* ============ behaviour ============ */
(function(){
  const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const hero = document.querySelector('.hero');

  /* loose leaf flecks settling at the wipe's trailing edge */
  function flecks(spd){
    if(RM) return;
    const c = document.getElementById('flecks');
    c.innerHTML = '';
    for(let i=0;i<14;i++){
      const s = document.createElement('i');
      s.className = 'fleck';
      s.style.left = (18+Math.random()*64)+'%';
      s.style.top = (20+Math.random()*55)+'%';
      s.style.setProperty('--fd', ((.4+Math.random()*1.2)*spd).toFixed(2)+'s');
      s.style.setProperty('--ft', ((.9+Math.random()*.7)*spd).toFixed(2)+'s');
      s.style.setProperty('--fr', (Math.random()*360|0)+'deg');
      s.style.setProperty('--fx', (Math.random()*40-20|0)+'px');
      c.appendChild(s);
    }
    setTimeout(function(){ c.innerHTML=''; }, 3200*spd);
  }

  /* entrance ritual: resist beat, then gold settles diagonally */
  if(!RM){
    hero.style.setProperty('--spd','1');
    hero.classList.add('ritual');
    flecks(1);

    /* scroll gilding: veil each section, settle on entry */
    const io = new IntersectionObserver(function(es){
      es.forEach(function(en){
        if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); }
      });
    },{threshold:.16});
    document.querySelectorAll('.veilable').forEach(function(sec){
      sec.classList.add('veil');
      let i = 0;
      sec.querySelectorAll('.gild,.sg,.panelv').forEach(function(g){
        g.style.setProperty('--gd',(i*.13).toFixed(2)+'s'); i++;
      });
      io.observe(sec);
    });

    /* cursor as polishing light (fine pointers only, no idle rAF loop) */
    if(matchMedia('(pointer:fine)').matches){
      const sheen = document.getElementById('sheen');
      let sx=0, sy=0, raf=0;
      addEventListener('pointermove', function(e){
        sx=e.clientX; sy=e.clientY;
        if(!raf){
          raf = requestAnimationFrame(function(){
            raf=0;
            sheen.style.transform='translate3d('+sx+'px,'+sy+'px,0)';
            sheen.style.opacity='1';
          });
        }
      },{passive:true});
      document.documentElement.addEventListener('pointerleave', function(){ sheen.style.opacity='0'; });
    }
  }

  /* REGILD: replay the ritual at 2x (instant when reduced motion) */
  document.getElementById('regild').addEventListener('click', function(){
    if(RM) return;
    hero.style.setProperty('--spd','.5');
    hero.classList.remove('ritual');
    void hero.offsetWidth;
    hero.classList.add('ritual');
    flecks(.5);
  });
})();
