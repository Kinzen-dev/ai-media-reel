<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vesperwerk . Manual Page</title>
<script>
  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    document.documentElement.classList.add('anim');

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif+Thai:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf7f1;
    --paper-2:#f4efe4;
    --ink:#34302a;
    --ink-strong:#2b2721;
    --ink-soft:#6d665c;
    --gold:#a8802f;
    --gold-lt:#c09a4a;
    --gold-dk:#8a6526;
    --rule:rgba(43,39,33,.20);
    --rule-gold:rgba(168,128,47,.55);
    --sh-bg:#1e1c18;
    --sh-bg2:#171512;
    --sh-ink:#e7e0cf;
    --sh-dim:rgba(231,224,207,.34);
    --sh-gold:#cba152;
    --sh-green:#a8b072;
    --measure:66ch;
    --bar-h:44px;
    --foot-h:38px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  html{-webkit-text-size-adjust:100%;overflow-x:clip}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Newsreader",Georgia,"Times New Roman",serif;
    font-size:17px;
    line-height:1.62;
    overflow-x:clip;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  ::selection{background:rgba(168,128,47,.24)}
  .mono{font-family:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
  .serif{font-family:"Newsreader",Georgia,serif}

  a{color:inherit}
  a:focus-visible,.flag:focus-visible,input:focus-visible,.cta a:focus-visible{
    outline:2px solid var(--gold);outline-offset:3px;border-radius:1px;
  }

  /* ============ RUNNING HEAD (troff literal) + apropos ============ */
  .head{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(#faf7f1,#f6f1e7);
    border-top:1px solid transparent;border-bottom:1px solid transparent;
  }
  .head::before,.head::after{
    content:"";position:absolute;left:0;right:0;height:1px;
    background:var(--gold);opacity:.85;transform-origin:left center;
  }
  .head::before{top:0}
  .head::after{bottom:0}
  .anim .head::before{animation:draw .7s cubic-bezier(.2,.7,.2,1) both .05s}
  .anim .head::after{animation:draw .7s cubic-bezier(.2,.7,.2,1) both .18s}
  .head-inner{
    max-width:960px;margin:0 auto;
    display:flex;align-items:center;gap:14px 22px;flex-wrap:wrap;
    min-height:var(--bar-h);padding:6px clamp(20px,6vw,84px);
  }
  .running-head{
    flex:1 1 420px;min-width:0;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    font-family:"JetBrains Mono",monospace;
    font-size:clamp(9px,1.7vw,12px);
    letter-spacing:.16em;text-transform:uppercase;
    color:var(--gold);font-weight:500;white-space:nowrap;
  }
  .running-head .rh-cell{min-width:0;overflow:hidden;text-overflow:ellipsis}
  .running-head .rh-cell.mid{color:var(--ink-soft);letter-spacing:.22em}
  .apropos{
    flex:0 1 260px;min-width:0;
    display:flex;align-items:baseline;gap:8px;
    font-family:"JetBrains Mono",monospace;
  }
  .apropos label{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft);white-space:nowrap;
  }
  .apropos .ap-field{
    flex:1 1 auto;min-width:0;display:flex;align-items:baseline;gap:6px;
    border-bottom:1px solid var(--rule);
  }
  .apropos .prompt-glyph{color:var(--gold);font-size:12px}
  .apropos input{
    flex:1 1 auto;min-width:0;width:100%;
    border:0;background:transparent;color:var(--ink);
    font-family:inherit;font-size:13px;letter-spacing:.02em;
    padding:4px 0;
  }
  .apropos input::placeholder{color:#a79f92}
  .ap-count{font-size:10.5px;color:var(--ink-soft);white-space:nowrap;letter-spacing:.06em;min-width:0}

  /* ============ SHEET / DOC ============ */
  #doc{
    max-width:960px;margin:0 auto;
    padding:clamp(26px,4.4vw,54px) clamp(20px,6vw,84px) calc(var(--foot-h) + 64px);
  }
  .sec{margin:0 0 clamp(38px,5.2vw,60px);scroll-margin-top:calc(var(--bar-h) + 26px)}
  html.anim{scroll-behavior:smooth}
  .sec.dim{opacity:.16;filter:saturate(.4)}
  .sec{transition:opacity .3s ease, filter .3s ease}

  .sec-head{
    display:flex;align-items:center;gap:.72em;
    margin:0 0 .95em;scroll-margin-top:72px;
  }
  .star{display:block;flex:none}
  .star-sm{width:15px;height:15px;transform:translateY(.5px)}
  .star-lg{width:44px;height:44px}
  .sec-num{
    font-family:"JetBrains Mono",monospace;font-weight:700;
    color:var(--gold);font-size:.86em;letter-spacing:.02em;
  }
  h2.sec-name{
    margin:0;font-family:"Newsreader",serif;font-weight:600;
    font-size:clamp(.82rem,2.1vw,.98rem);
    letter-spacing:.2em;text-transform:uppercase;color:var(--ink-strong);
    white-space:nowrap;
  }
  .sec-rule{flex:1 1 auto;min-width:0;height:1px;background:var(--rule-gold);opacity:.7}

  .sec-body{padding-left:clamp(0px,2.4vw,30px)}

  /* ---- NAME ---- */
  .name-block{}
  .wordmark-row{display:flex;align-items:center;gap:16px;margin:2px 0 .55em}
  .wordmark{
    font-family:"Playfair Display",serif;font-weight:600;
    font-size:clamp(30px,7.4vw,58px);line-height:.98;
    letter-spacing:.2em;color:var(--ink-strong);
    padding-left:.2em;white-space:nowrap;
  }
  .anim .wordmark{clip-path:inset(0 100% 0 0);animation:typeset 1.05s cubic-bezier(.2,.72,.15,1) both .32s}
  .anim .wordmark-row .star-lg{opacity:0;animation:fadein .7s ease both .18s}
  .name-line{
    margin:0;max-width:var(--measure);
    text-align:justify;hyphens:auto;-webkit-hyphens:auto;
    text-indent:0;
  }
  .anim .name-line{opacity:0;animation:fadein .8s ease both .78s}
  .cmd-name{color:var(--gold-dk);font-weight:500;font-size:.9em;letter-spacing:.01em}
  .colon{color:var(--gold);font-family:"JetBrains Mono",monospace;padding:0 .12em}
  .name-desc{font-size:1.06em}

  /* ---- SYNOPSIS ---- */
  .synopsis{
    margin:0;font-family:"JetBrains Mono",monospace;
    font-size:clamp(12.5px,2.5vw,15px);line-height:2;
    letter-spacing:.01em;color:var(--ink);
    overflow-wrap:anywhere;
  }
  .synopsis .cmd-name2{color:var(--gold-dk);font-weight:700}
  .synopsis .dim-tail{color:var(--ink-soft)}
  .syn-grp{white-space:nowrap}
  .flag{
    position:relative;color:var(--ink-strong);
    text-decoration:none;cursor:help;
    border-bottom:1px dotted transparent;
    padding:1px 1px 0;border-radius:1px;
  }
  .flag:hover,.flag:focus-visible{
    color:var(--gold-dk);text-decoration:underline;text-underline-offset:3px;
    text-decoration-thickness:1px;
  }
  .flag::after{
    content:attr(data-gloss);
    display:none;
    position:absolute;left:0;bottom:calc(100% + 9px);z-index:30;
    width:max-content;max-width:min(240px,66vw);
    background:var(--sh-bg);color:var(--sh-ink);
    font-family:"Newsreader",serif;font-style:italic;font-size:13px;
    letter-spacing:0;line-height:1.4;text-transform:none;font-weight:400;
    padding:8px 11px;border-radius:3px;border:1px solid rgba(168,128,47,.5);
    box-shadow:0 12px 30px -14px rgba(30,28,24,.7);
    pointer-events:none;white-space:normal;
  }
  .flag::before{
    content:"";display:none;
    position:absolute;left:14px;bottom:calc(100% + 3px);z-index:31;
    border:6px solid transparent;border-top-color:var(--sh-bg);
  }
  .flag:hover::after,.flag:focus-visible::after{display:block;animation:tipin .17s ease both}
  .flag:hover::before,.flag:focus-visible::before{display:block;animation:fadein .17s ease both}
  .flag.flag--r::after{left:auto;right:0}
  .flag.flag--r::before{left:auto;right:14px}
  .anim .synopsis .flag{opacity:0;animation:stamp .5s cubic-bezier(.2,.8,.2,1) both;animation-delay:calc(.72s + var(--i,0)*.1s)}

  /* ---- DESCRIPTION ---- */
  .desc-list{margin:0}
  .desc-item{margin:0 0 1.5em;padding-left:0}
  .desc-flag{
    display:flex;align-items:baseline;gap:.7em;flex-wrap:wrap;margin:0 0 .28em;
  }
  .desc-flag .flag{
    font-family:"JetBrains Mono",monospace;font-size:.92em;font-weight:500;
    color:var(--gold-dk);
  }
  .desc-title{
    font-family:"Newsreader",serif;font-weight:500;font-style:italic;
    color:var(--ink-soft);font-size:.95em;letter-spacing:.01em;
  }
  .desc-body{
    margin:0;max-width:var(--measure);
    text-align:justify;hyphens:auto;-webkit-hyphens:auto;
  }

  /* ---- EXAMPLES (the single dark block) ---- */
  .ex-lead{margin:0 0 1.1em;max-width:var(--measure);text-align:justify;hyphens:auto;color:var(--ink-soft);font-style:italic;font-size:.98em}
  .shell{
    position:relative;background:linear-gradient(160deg,var(--sh-bg),var(--sh-bg2));
    border:1px solid rgba(168,128,47,.42);border-radius:5px;
    box-shadow:0 26px 54px -30px rgba(30,28,24,.62), inset 0 1px 0 rgba(255,246,224,.04);
    overflow:hidden;
  }
  .shell-bar{
    display:flex;align-items:center;gap:8px;
    padding:8px 13px;border-bottom:1px solid rgba(231,224,207,.12);
    font-family:"JetBrains Mono",monospace;font-size:10.5px;
    letter-spacing:.18em;text-transform:uppercase;color:var(--sh-dim);
  }
  .shell-bar .dot{width:7px;height:7px;border-radius:50%;flex:none}
  .shell-bar .dot.g{background:#b3924a}
  .shell-bar .dot.m{background:#5c564a}
  .shell-bar .title{margin-left:6px}
  .shell-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .shell-body{
    padding:16px clamp(14px,3vw,22px) 18px;
    font-family:"JetBrains Mono",monospace;
    font-size:clamp(12px,2.5vw,13.5px);line-height:1.85;
    color:var(--sh-ink);min-width:0;
  }
  .cmd-line{white-space:pre-wrap;overflow-wrap:break-word;margin-bottom:.5em}
  .prompt{color:var(--sh-gold);font-weight:700;margin-right:.5em}
  .cmd-typed{color:var(--sh-ink)}
  .caret{display:inline-block;width:.62ch;color:var(--sh-gold);font-weight:700}
  .anim .shell:not(.done) .caret{animation:blink 1.05s steps(1) infinite}
  .out-line{white-space:nowrap;color:var(--sh-ink)}
  .ln{display:flex;align-items:baseline;gap:.55em}
  .ln-text{flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .leader{
    flex:1 1 auto;min-width:1.4em;align-self:center;
    height:0;border-bottom:1px dotted var(--sh-dim);transform:translateY(-.14em);
  }
  .ln-tail{flex:none;color:var(--sh-dim)}
  .tag{flex:none;font-weight:700;letter-spacing:.01em}
  .tag-ok{color:var(--sh-gold)}
  .tag-svc{color:var(--gold-lt)}
  .tag-status{color:var(--sh-green)}
  .ln-quote{display:block;white-space:normal;color:#cfc7b2;font-style:normal}
  .q-mark{color:var(--sh-gold);font-weight:700;margin-right:.15em}
  .out-line{transition:opacity .28s ease}
  .shell.pending .out-line{opacity:0}
  .shell.pending .out-line.show{opacity:1}
  .anim .out-line.fin.show .tag-status{animation:stampTag .55s cubic-bezier(.2,.8,.2,1) both .12s}
  .scroll-hint{
    display:none;position:absolute;right:9px;bottom:9px;
    font-family:"JetBrains Mono",monospace;font-size:9.5px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--sh-dim);
    padding:3px 7px;border:1px solid rgba(231,224,207,.2);border-radius:3px;
    background:rgba(23,21,18,.7);pointer-events:none;
  }
  .shell.has-overflow .scroll-hint{display:block}

  .fig{margin:1.4em 0 0;max-width:640px}
  .fig-plate{
    background:var(--sh-bg2);padding:8px;border:1px solid var(--rule-gold);
    border-radius:3px;box-shadow:0 16px 34px -26px rgba(30,28,24,.5);
  }
  .fig-plate img{display:block;width:100%;height:auto;border-radius:1px}
  .fig-cap{
    margin:.55em 0 0;font-size:.86em;font-style:italic;color:var(--ink-soft);
    letter-spacing:.01em;
  }

  /* ---- STANDARDS ---- */
  .std-intro{margin:0 0 1.15em;max-width:var(--measure);text-align:justify;hyphens:auto;font-style:italic;color:var(--ink-soft)}
  .std-item{
    display:flex;gap:clamp(12px,2.4vw,22px);align-items:baseline;
    padding:.72em 0;border-top:1px solid var(--rule);
  }
  .std-item:last-child{border-bottom:1px solid var(--rule)}
  .std-id{
    flex:none;width:4.4em;min-width:0;
    font-family:"JetBrains Mono",monospace;font-size:.78em;font-weight:700;
    letter-spacing:.06em;color:var(--gold);padding-top:.15em;
  }
  .std-body{min-width:0}
  .std-title{
    display:block;font-family:"Newsreader",serif;font-weight:600;
    color:var(--ink-strong);letter-spacing:.03em;margin-bottom:.05em;
  }
  .std-text{max-width:var(--measure)}

  /* ---- SEE ALSO ---- */
  .about{margin:0 0 1.05em;max-width:var(--measure);text-align:justify;hyphens:auto;font-size:1.04em}
  .refs{
    margin:0 0 1.2em;font-family:"JetBrains Mono",monospace;
    font-size:12.5px;letter-spacing:.03em;color:var(--ink-soft);
    overflow-wrap:anywhere;
  }
  .refs .rk{color:var(--gold-dk);text-transform:uppercase;letter-spacing:.16em;font-size:11px;margin-right:.6em}
  .refs a{color:var(--gold-dk);text-decoration:underline;text-underline-offset:2px}
  .refs a.manref:hover,.refs a.manref:focus-visible{color:var(--gold);text-decoration-thickness:1.5px}
  #about-block{scroll-margin-top:calc(var(--bar-h) + 30px)}
  .about.ref-lit{animation:refLit 1.4s ease}
  @keyframes refLit{0%{background:rgba(168,128,47,.30)}100%{background:transparent}}
  .cta{display:flex;flex-wrap:wrap;gap:12px 16px;align-items:center;margin:0 0 1.3em}
  .cta a{
    font-family:"JetBrains Mono",monospace;font-size:12.5px;letter-spacing:.04em;
    text-decoration:none;
  }
  .cta-primary{
    display:inline-flex;align-items:center;gap:.5em;
    background:var(--ink-strong);color:var(--paper);
    padding:10px 16px;border-radius:3px;
    box-shadow:0 12px 26px -18px rgba(43,39,33,.7);
    transition:transform .18s ease, background .18s ease;
  }
  .cta-primary::before{content:"$";color:var(--gold-lt);font-weight:700}
  .anim .cta-primary:hover{transform:translateY(-1px);background:#221f19}
  .cta-secondary{
    color:var(--gold-dk);border-bottom:1px dotted var(--rule-gold);padding-bottom:2px;
  }
  .cta-secondary:hover{border-bottom-style:solid}
  .i18n{
    margin:0 0 1.1em;display:flex;align-items:baseline;gap:.8em;flex-wrap:wrap;
    padding-top:1em;border-top:1px solid var(--rule);
  }
  .i18n-tag{
    flex:none;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--gold);padding-top:.2em;
  }
  .thai{
    font-family:"Noto Serif Thai",serif;font-weight:400;
    font-size:1.02em;line-height:1.5;color:var(--ink-strong);
    letter-spacing:normal;
  }
  .colophon{
    margin:1.4em 0 0;font-family:"JetBrains Mono",monospace;
    font-size:11px;letter-spacing:.12em;color:var(--ink-soft);
    text-transform:lowercase;
  }

  /* ============ RUNNING FOOTER ============ */
  .foot{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    height:var(--foot-h);
    background:linear-gradient(#f6f1e7,#f2ece0);
    border-top:1px solid var(--gold);
    font-family:"JetBrains Mono",monospace;
    font-size:clamp(9px,1.6vw,11px);letter-spacing:.14em;text-transform:uppercase;
    color:var(--gold);
  }
  .foot-inner{
    max-width:960px;margin:0 auto;height:100%;
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
    padding:0 clamp(20px,6vw,84px);
  }
  .foot .fc{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .foot .foot-c{color:var(--ink-soft);letter-spacing:.24em}
  .foot .foot-c b{color:var(--gold-dk);font-weight:700}
  .foot .pageno{display:inline-block;min-width:1ch;text-align:center}
  .anim .pageno.flip{animation:flip .4s ease}
  .foot .foot-r{text-align:right}

  /* ---- reveal (scroll typeset-in) ---- */
  .anim .reveal{opacity:0;transform:translateY(12px)}
  .anim .reveal.in{opacity:1;transform:none;transition:opacity .66s cubic-bezier(.2,.7,.2,1), transform .66s cubic-bezier(.2,.7,.2,1)}

  /* ---- keyframes ---- */
  @keyframes draw{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @keyframes typeset{from{clip-path:inset(0 100% 0 0)}to{clip-path:inset(0 0 0 0)}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes stamp{0%{opacity:0;transform:translateY(6px) scale(.96)}60%{opacity:1}100%{opacity:1;transform:none}}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes flip{0%{transform:rotateX(90deg);opacity:.2}100%{transform:rotateX(0);opacity:1}}
  @keyframes tipin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  @keyframes stampTag{0%{transform:scale(1.16);text-shadow:0 0 12px rgba(168,176,114,.75)}100%{transform:none;text-shadow:0 0 0 rgba(168,176,114,0)}}

  mark.hit{background:rgba(168,128,47,.28);color:inherit;border-radius:1px;padding:0 .5px;box-shadow:0 1px 0 rgba(168,128,47,.5)}

  /* ============ RESPONSIVE ============ */
  @media (max-width:680px){
    body{font-size:16px}
    .name-line,.desc-body,.about,.std-text,.std-intro,.name-desc,.ex-lead{text-align:left;hyphens:manual}
    .sec-body{padding-left:0}
    .running-head{flex-basis:100%;font-size:9.5px}
    .apropos{flex-basis:100%}
    .wordmark{letter-spacing:.16em}
    .head-inner{gap:6px 22px}
    .sec{scroll-margin-top:132px}
  }
  @media (max-width:680px){
    .shell-body{padding-left:13px;padding-right:13px;font-size:11.8px;line-height:1.95}
    .ln{gap:.42em}
    .leader{min-width:.7em}
  }
  @media (max-width:400px){
    #doc{padding-left:18px;padding-right:18px}
    .head-inner{padding-left:18px;padding-right:18px}
    .foot-inner{padding-left:18px;padding-right:18px}
    .running-head{letter-spacing:.1em}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important}
    .reveal{opacity:1 !important;transform:none !important}
    .wordmark{clip-path:none !important}
    .name-line,.wordmark-row .star-lg{opacity:1 !important}
  }
</style>
</head>
<body>

<!-- inline star mark (facet colors preserved) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <symbol id="vw-star" viewBox="0 0 200 200">
    <g transform="translate(100,100)">
      <g><polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/><polygon points="0,-86 11,0 0,0" fill="#8a6526"/></g>
      <g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="#8a6526"/><polygon points="0,-86 11,0 0,0" fill="#c09a4a"/></g>
      <g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/><polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/></g>
      <g transform="rotate(270)"><polygon points="0,-64 -9.5,0 0,0" fill="#8a6526"/><polygon points="0,-64 9.5,0 0,0" fill="#c09a4a"/></g>
      <g transform="rotate(45)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
      <g transform="rotate(135)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
      <g transform="rotate(225)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
      <g transform="rotate(315)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
    </g>
  </symbol>
</svg>

<header class="head">
  <div class="head-inner">
    <div class="running-head" aria-hidden="true">
      <span class="rh-cell">VESPERWERK(1)</span>
      <span class="rh-cell mid">User Commands</span>
      <span class="rh-cell">VESPERWERK(1)</span>
    </div>
    <form class="apropos" role="search" onsubmit="return false">
      <label for="ap">apropos</label>
      <span class="ap-field">
        <span class="prompt-glyph" aria-hidden="true">&gt;</span>
        <input id="ap" type="text" autocomplete="off" spellcheck="false"
               placeholder="search the manual" aria-label="apropos: search the manual page by keyword">
      </span>
      <span class="ap-count" id="apCount" aria-live="polite"></span>
    </form>
  </div>
</header>

<main id="doc"></main>

<footer class="foot">
  <div class="foot-inner">
    <span class="fc foot-l">Vesperwerk 2026 . BKK</span>
    <span class="fc foot-c">- <b class="pageno" id="pageno">1</b> -</span>
    <span class="fc foot-r">VESPERWERK(1)</span>
  </div>
</footer>

<script>
/* ============================================================
   DATA  -  the entire manual page. Swap here, nothing else.
   ============================================================ */
const DATA = {
  meta:{
    colophon:'formatted 2026 . troff sends regards . all flags stable'
  },
  name:{
    wordmark:'VESPERWERK',
    lead:'vesperwerk',
    desc:'An independent software and AI studio. We architect, build, and operate production systems for businesses that cannot afford them to fail.'
  },
  synopsis:{
    prefix:'vesperwerk',
    flags:[
      {flag:'--ai-systems',          gloss:'voice agents and the evals that keep them honest'},
      {flag:'--product-engineering', gloss:'architecture to operations, without the drama'},
      {flag:'--commerce-platforms',  gloss:'Shopify and LINE, the rails SEA commerce runs on'},
      {flag:'--production-worthy',   gloss:'built for the second demo: the one in production'}
    ],
    tail:'...'
  },
  description:[
    {flag:'--ai-systems',          title:'AI Systems',
     body:'Voice agents, LLM assistants, and the evaluation infrastructure that keeps them honest. AI that answers like your best employee, in production, around the clock.'},
    {flag:'--product-engineering', title:'Product Engineering',
     body:'Full-stack product engineering from architecture to operations: event-driven backends, modern web frontends, and infrastructure that scales without drama.'},
    {flag:'--commerce-platforms',  title:'Commerce and Platforms',
     body:'Deep Shopify and LINE platform work: storefronts, admin apps, integrations, and the messaging rails Southeast Asian commerce runs on.'}
  ],
  examples:{
    lead:'A single deployment, printed exactly as it ran. No slideshow, no staging smoke and mirrors.',
    command:'vesperwerk --deploy yimwhan-ai --channels voice,line --after-hours on',
    output:[
      {t:'ok',     text:'provisioning yimwhan-ai',        tail:'done'},
      {t:'svc',    tag:'voice', text:'after-hours call handler', tail:'listening'},
      {t:'svc',    tag:'line',  text:'LINE assistant',           tail:'connected'},
      {t:'quote',  text:'An AI voice and LINE assistant for dental clinics in Thailand.'},
      {t:'quote',  text:'It answers after-hours calls, books and reschedules appointments,'},
      {t:'quote',  text:'and hands off to staff the moment a human matters.'},
      {t:'status', text:'in production at live clinics', tail:'OK'}
    ],
    prompt:'$',
    img:'../assets/flux-clinic-4k.png',
    alt:'Mint and wood dental clinic interior, Yimwhan AI in production',
    cap:'Figure 1. yimwhan-ai in production. A live dental clinic, Bangkok.'
  },
  standards:{
    intro:'vesperwerk conforms to the following practice standards. Deviations are logged, never silent.',
    items:[
      {id:'STD-1', title:'Architecture first',  body:'We design the system before we write the code.'},
      {id:'STD-2', title:'Production-worthy',   body:'Demos impress; production endures. We build for the second one.'},
      {id:'STD-3', title:'Scope discipline',    body:'The most valuable thing we tell clients is what not to build.'},
      {id:'STD-4', title:'Senior hands',        body:'No juniors learning on your budget. Founder-led, senior hands on every line.'}
    ]
  },
  seealso:{
    about:'Vesperwerk takes its name from the evening star: the first light you can navigate by. We are a founder-led studio in Bangkok building software for businesses across Asia and beyond.',
    refs:['apropos(1)','bangkok(7)'],
    email:'kittipong.k@vesperwerk.com',
    ctaPrimary:'Start a conversation',
    ctaSecondary:'See our work',
    thai:'ดาวประจำเมือง : แสงแรกที่ใช้นำทางยามค่ำ'
  }
};

/* ============================================================
   BUILD
   ============================================================ */
const anim = document.documentElement.classList.contains('anim');
const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const STAR = '<svg class="star star-sm" aria-hidden="true"><use href="#vw-star"/></svg>';

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function secHead(num,name){
  return `<div class="sec-head">${STAR}<span class="sec-num">${num}</span>`+
         `<h2 class="sec-name">${name}</h2><span class="sec-rule"></span></div>`;
}
function flagSpan(f,gloss,cls){
  return `<span class="flag${cls?' '+cls:''}" tabindex="0" role="button" `+
         `data-gloss="${esc(gloss)}" aria-label="flag ${esc(f)}: ${esc(gloss)}">${esc(f)}</span>`;
}

function buildName(){
  return `<section class="sec" id="sec-name" data-i="1" data-key="name synopsis title studio ai software">`+
    secHead('1','NAME')+
    `<div class="sec-body"><div class="name-block">`+
      `<div class="wordmark-row"><svg class="star star-lg" aria-hidden="true"><use href="#vw-star"/></svg>`+
      `<div class="wordmark">${esc(DATA.name.wordmark)}</div></div>`+
      `<p class="name-line"><span class="cmd-name">${esc(DATA.name.lead)}</span>`+
      `<span class="colon">:</span> <span class="name-desc hl">${esc(DATA.name.desc)}</span></p>`+
    `</div></section>`;
}
function buildSynopsis(){
  const flags = DATA.synopsis.flags.map((f,i)=>{
    const cls = i===DATA.synopsis.flags.length-1 ? 'flag--r' : '';
    return `<span class="syn-grp">[<span style="--i:${i}" class="flag${cls?' '+cls:''}" tabindex="0" role="button" `+
           `data-gloss="${esc(f.gloss)}" aria-label="flag ${esc(f.flag)}: ${esc(f.gloss)}">${esc(f.flag)}</span>]</span>`;
  }).join(' ');
  return `<section class="sec" id="sec-synopsis" data-i="2">`+
    secHead('2','SYNOPSIS')+
    `<div class="sec-body"><p class="synopsis">`+
      `<span class="cmd-name2">${esc(DATA.synopsis.prefix)}</span> ${flags} `+
      `<span class="dim-tail">${esc(DATA.synopsis.tail)}</span></p></div></section>`;
}
function buildDescription(){
  const items = DATA.description.map(d=>{
    const syn = DATA.synopsis.flags.find(f=>f.flag===d.flag);
    return `<div class="desc-item reveal"><div class="desc-flag">${flagSpan(d.flag, syn?syn.gloss:d.title)}`+
    `<span class="desc-title">${esc(d.title)}</span></div>`+
    `<p class="desc-body hl">${esc(d.body)}</p></div>`;
  }).join('');
  return `<section class="sec" id="sec-description" data-i="3">`+
    secHead('3','DESCRIPTION')+
    `<div class="sec-body"><div class="desc-list">${items}</div></div></section>`;
}
function buildExamples(){
  const e = DATA.examples;
  const out = e.output.map(o=>{
    if(o.t==='quote'){
      return `<div class="out-line ln-quote"><span class="q-mark">&gt;</span> ${esc(o.text)}</div>`;
    }
    const tag = o.t==='ok' ? '[ok]' : o.t==='status' ? '[status]' : '['+esc(o.tag)+']';
    const cls = o.t==='ok' ? 'tag-ok' : o.t==='status' ? 'tag-status' : 'tag-svc';
    return `<div class="out-line ln"><span class="tag ${cls}">${tag}</span>`+
           `<span class="ln-text">${esc(o.text)}</span><span class="leader"></span>`+
           `<span class="ln-tail">${esc(o.tail)}</span></div>`;
  }).join('');
  const search = (e.command+' '+e.output.map(o=>o.text+' '+(o.tail||'')).join(' ')+' yimwhan dental clinic voice line appointments production').toLowerCase();
  return `<section class="sec" id="sec-examples" data-i="4" data-key="${esc(search)}">`+
    secHead('4','EXAMPLES')+
    `<div class="sec-body"><p class="ex-lead">${esc(e.lead)}</p>`+
    `<div class="shell reveal" id="shell">`+
      `<div class="shell-bar" aria-hidden="true"><span class="dot g"></span><span class="dot m"></span>`+
      `<span class="title">yimwhan-ai . deploy log</span></div>`+
      `<div class="shell-scroll"><div class="shell-body">`+
        `<div class="cmd-line"><span class="prompt">${esc(e.prompt)}</span>`+
        `<span class="cmd-typed">${esc(e.command)}</span><span class="caret">_</span></div>`+
        out+
      `</div></div>`+
      `<span class="scroll-hint">scroll</span>`+
    `</div>`+
    `<figure class="fig reveal"><div class="fig-plate">`+
    `<img src="${e.img}" alt="${esc(e.alt)}" loading="lazy" decoding="async"></div>`+
    `<figcaption class="fig-cap">${esc(e.cap)}</figcaption></figure>`+
    `</div></section>`;
}
function buildStandards(){
  const items = DATA.standards.items.map(s=>
    `<div class="std-item reveal"><div class="std-id">${esc(s.id)}</div>`+
    `<div class="std-body"><span class="std-title">${esc(s.title)}</span>`+
    `<span class="std-text hl">${esc(s.body)}</span></div></div>`
  ).join('');
  return `<section class="sec" id="sec-standards" data-i="5">`+
    secHead('5','STANDARDS')+
    `<div class="sec-body"><p class="std-intro">${esc(DATA.standards.intro)}</p>${items}</div></section>`;
}
function buildSeeAlso(){
  const s = DATA.seealso;
  /* SEE ALSO refs are real in-page cross-nav: apropos(1) focuses the search,
     bangkok(7) jumps to the about block (the "founder-led studio in Bangkok" entry) */
  const refMap = { 'apropos(1)':{href:'#ap',data:'apropos'}, 'bangkok(7)':{href:'#about-block',data:'bangkok'} };
  const refsHtml = s.refs.map(r=>{
    const m = refMap[r];
    return m ? `<a class="manref" href="${m.href}" data-ref="${m.data}">${esc(r)}</a>` : esc(r);
  }).join(' . ');
  return `<section class="sec" id="sec-seealso" data-i="6" data-key="about contact email bangkok thai epigraph">`+
    secHead('6','SEE ALSO')+
    `<div class="sec-body">`+
    `<p class="about hl reveal" id="about-block">${esc(s.about)}</p>`+
    `<p class="refs reveal"><span class="rk">refs</span>${refsHtml} . `+
    `<a href="mailto:${s.email}">${esc(s.email)}</a></p>`+
    `<div class="cta reveal"><a class="cta-primary" href="mailto:${s.email}">${esc(s.ctaPrimary)}</a>`+
    `<a class="cta-secondary" href="#sec-examples">${esc(s.ctaSecondary)}</a></div>`+
    `<p class="i18n reveal"><span class="i18n-tag">i18n</span>`+
    `<span class="thai" lang="th">${esc(s.thai)}</span></p>`+
    `<p class="colophon reveal">${esc(DATA.meta.colophon)}</p>`+
    `</div></section>`;
}

document.getElementById('doc').innerHTML =
  buildName()+buildSynopsis()+buildDescription()+buildExamples()+buildStandards()+buildSeeAlso();

/* store searchable text + highlightable originals */
const sections = [...document.querySelectorAll('.sec')];
sections.forEach(sec=>{
  const extra = sec.dataset.key ? ' '+sec.dataset.key : '';
  sec.dataset.search = (sec.textContent+extra).toLowerCase().replace(/\s+/g,' ');
});
const hlEls = [...document.querySelectorAll('.hl')];
hlEls.forEach(el=>{ el.dataset.orig = el.textContent; });

/* ============================================================
   APROPOS  -  real live filter + highlight
   ============================================================ */
const apInput = document.getElementById('ap');
const apCount = document.getElementById('apCount');
function markup(text,q){
  const lower=text.toLowerCase();let out='';let i=0;
  while(true){
    const idx=lower.indexOf(q,i);
    if(idx<0){out+=esc(text.slice(i));break;}
    out+=esc(text.slice(i,idx))+'<mark class="hit">'+esc(text.slice(idx,idx+q.length))+'</mark>';
    i=idx+q.length;
  }
  return out;
}
function runApropos(){
  const q = apInput.value.trim().toLowerCase();
  let matches=0;
  sections.forEach(sec=>{
    const hit = !q || sec.dataset.search.includes(q);
    sec.classList.toggle('dim', !!q && !hit);
    if(hit && q) matches++;
  });
  hlEls.forEach(el=>{
    if(q && el.dataset.orig.toLowerCase().includes(q)) el.innerHTML = markup(el.dataset.orig,q);
    else el.textContent = el.dataset.orig;
  });
  apCount.textContent = q ? (matches ? matches+' of '+sections.length+' sections' : 'no match') : '';
  if(q && matches) scrollToFirstMatch();
}
/* live: bring the first surviving (undimmed) section under the running head */
const headEl = document.querySelector('.head');
function scrollToFirstMatch(){
  const first = sections.find(sec=>!sec.classList.contains('dim'));
  if(!first) return;
  const off = headEl.offsetHeight + 16;
  const top = first.getBoundingClientRect().top;
  if(top < off || top > window.innerHeight*0.55){
    window.scrollTo({ top: window.scrollY + top - off, behavior: reduce ? 'auto' : 'smooth' });
  }
}
apInput.addEventListener('input', runApropos);
apInput.addEventListener('keydown', e=>{ if(e.key==='Escape'){ apInput.value=''; runApropos(); apInput.blur(); } });

/* SEE ALSO cross-nav refs: apropos(1) focuses the search; bangkok(7) jumps + lights the about block */
document.querySelectorAll('.manref').forEach(a=>{
  a.addEventListener('click', e=>{
    if(a.dataset.ref === 'apropos'){
      e.preventDefault();
      window.scrollTo({ top:0, behavior: reduce ? 'auto' : 'smooth' });
      setTimeout(()=>apInput.focus(), reduce ? 0 : 280);
    } else if(a.dataset.ref === 'bangkok'){
      const t = document.getElementById('about-block');
      if(t){ t.classList.remove('ref-lit'); void t.offsetWidth; t.classList.add('ref-lit'); }
    }
  });
});

/* ============================================================
   REVEAL + PAGE NUMERAL + EXAMPLES EXECUTION
   ============================================================ */
const pageno = document.getElementById('pageno');
let curPage = 1;
function setPage(n){
  if(n===curPage) return;
  curPage=n; pageno.textContent=n;
  if(anim && !reduce){ pageno.classList.remove('flip'); void pageno.offsetWidth; pageno.classList.add('flip'); }
}

const shell = document.getElementById('shell');
let shellDone = false;
function runShell(){
  if(shellDone) return; shellDone=true;
  const cmd = DATA.examples.command;
  const typed = shell.querySelector('.cmd-typed');
  const lines = [...shell.querySelectorAll('.out-line')];
  let i=0;
  (function typeCmd(){
    typed.textContent = cmd.slice(0,i); i++;
    if(i<=cmd.length){ setTimeout(typeCmd, 15+Math.random()*24); }
    else { setTimeout(()=>printLines(0), 340); } /* beat: process starts */
  })();
  function printLines(n){
    if(n>=lines.length){ shell.classList.add('done'); checkOverflow(); return; }
    const line = lines[n];
    line.classList.add('show');
    if(n===lines.length-1) line.classList.add('fin');
    /* deploy-log cadence: provisioning holds, verbatim quote flows, payoff gets a held beat */
    const out = DATA.examples.output;
    const cur = out[n] && out[n].t, nxt = out[n+1] && out[n+1].t;
    let d = 190;
    if(cur==='ok') d = 430;
    else if(cur==='quote' && nxt==='quote') d = 120;
    if(nxt==='status') d = 520;
    setTimeout(()=>printLines(n+1), d);
  }
}

if(anim && !reduce){
  /* prep shell for typing: blank command, hide output */
  shell.classList.add('pending');
  shell.querySelector('.cmd-typed').textContent = '';

  /* reveal observer (staggered, line-group by line-group) */
  const revO = new IntersectionObserver((ents)=>{
    ents.forEach(ent=>{
      if(!ent.isIntersecting) return;
      const items = [...ent.target.querySelectorAll('.reveal')];
      items.forEach((el,k)=> setTimeout(()=>el.classList.add('in'), k*90));
      revO.unobserve(ent.target);
    });
  },{threshold:0.18, rootMargin:'0px 0px -8% 0px'});
  sections.forEach(s=>revO.observe(s));

  /* shell execution on entry */
  const exO = new IntersectionObserver((ents)=>{
    ents.forEach(ent=>{ if(ent.isIntersecting){ runShell(); exO.disconnect(); } });
  },{threshold:0.35});
  exO.observe(shell);
} else {
  document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));
  shellDone = true;
  shell.classList.add('done');
}

/* active section -> footer page numeral (deterministic reading cursor) */
let pageTick = false;
function updatePage(){
  pageTick = false;
  const cursor = window.scrollY + 140;
  let n = 1;
  for(const s of sections){
    if(s.offsetTop <= cursor) n = parseInt(s.dataset.i,10); else break;
  }
  setPage(n);
}
window.addEventListener('scroll', ()=>{
  if(!pageTick){ pageTick = true; requestAnimationFrame(updatePage); }
}, {passive:true});
window.addEventListener('load', updatePage);
updatePage();

/* shell horizontal overflow affordance */
function checkOverflow(){
  const sc = shell.querySelector('.shell-scroll');
  shell.classList.toggle('has-overflow', sc.scrollWidth > sc.clientWidth + 2);
}
window.addEventListener('resize', checkOverflow, {passive:true});
window.addEventListener('load', checkOverflow);
setTimeout(checkOverflow, 400);
</script>
