<!-- TEMPLATE: Vesperwerk One Light | ARCHETYPE: wow-through-absence, two-color restraint with one living star | REF: ET Studio + REF Digital + printer's-ornament tradition | WHEN TO USE: restraint-as-luxury studio / agency site where the message defines the design and a single gold accent is the only color event | SWAP: edit the DATA object at top of the script -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vesperwerk - One Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Serif+Thai:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ===================== TWO COLOURS ONLY ======================
     ink + cream are the ground; GOLD is the page's single colour event. */
  :root{
    --ink:#2e2a26;
    --cream:#faf7f1;
    --gold:#a8802f;
    --gold-lite:#c09a4a;
    --gold-deep:#8a6526;

    --star-x: clamp(20px, 5vw, 84px);
    --star-w: clamp(22px, 3vw, 34px);
    --pad-l: clamp(64px, 14vw, 200px);
    --pad-r: clamp(24px, 12vw, 180px);
    --measure: 40rem;

    /* modular scale (perfect fourth-ish) */
    --t-micro: 0.72rem;
    --t-small: 0.86rem;
    --t-body: 1.18rem;
    --t-lead: 1.5rem;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; overflow-x:clip; }
  html{ scroll-behavior:smooth; background:var(--cream); }
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:"EB Garamond", Georgia, "Times New Roman", serif;
    font-size:var(--t-body);
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    hanging-punctuation:first;
    font-kerning:normal;
    font-feature-settings:"kern" 1, "liga" 1;
  }
  ::selection{ background:rgba(168,128,47,0.16); color:var(--ink); }
  a{ color:inherit; }
  :focus-visible{ outline:2px solid var(--gold); outline-offset:4px; border-radius:1px; }
  button:focus:not(:focus-visible){ outline:none; }

  /* ===================== LAYOUT ===================== */
  .page{
    padding-left:var(--pad-l);
    padding-right:var(--pad-r);
    padding-top:clamp(4rem, 9vh, 6.5rem);
    padding-bottom:clamp(5rem, 12vh, 9rem);
    max-width:100%;
  }
  .section{
    max-width:var(--measure);
    scroll-margin-top:clamp(2rem, 8vh, 6rem);
    padding-block:clamp(6.5rem, 15vh, 12rem);
  }
  .section--hero{ padding-top:0; padding-bottom:clamp(7rem, 16vh, 12rem); }

  /* ===================== HAIRLINE RULES ===================== */
  .rule{
    height:1px; width:100%; border:0; margin:0;
    background:var(--ink); opacity:0.24;
    transition:background .9s ease, opacity .9s ease;
  }
  .rule--hero{ margin:clamp(1.4rem,3vh,2.2rem) 0 clamp(2rem,4vh,3rem); max-width:14rem; }
  .rule--top{ margin-bottom:clamp(1.6rem,3.5vh,2.6rem); }
  .section.is-lit .rule{ background:var(--gold); opacity:0.55; }

  /* ===================== HERO ===================== */
  .brandline{ }
  .wordmark{
    font-family:"Playfair Display", Georgia, serif;
    font-weight:600;
    font-size:clamp(1.05rem, 1.6vw, 1.4rem);
    letter-spacing:0.22em;
    margin:0;
    text-indent:0.11em; /* optical: balance the tracked caps against the left margin */
  }
  .thai{
    font-family:"Noto Serif Thai", "EB Garamond", serif;
    font-weight:400;
    font-size:clamp(0.9rem, 1.4vw, 1.02rem);
    line-height:1.45;
    letter-spacing:0;
    margin:0.75rem 0 0;
    opacity:0.82;
  }
  .statement{
    font-family:"Playfair Display", Georgia, serif;
    font-weight:500;
    font-size:clamp(1.9rem, 4.2vw, 3.55rem);
    line-height:1.1;
    letter-spacing:-0.006em;
    margin:0;
    max-width:27ch;
    text-wrap:pretty;
    overflow-wrap:break-word;
  }
  .statement .word{ display:inline; }
  .cta{
    display:flex; align-items:center; flex-wrap:wrap;
    gap:0 1.15rem;
    margin-top:clamp(2.2rem, 5vh, 3.4rem);
  }
  .cta > *{ min-width:0; }
  .cta-link{
    font-variant:all-small-caps;
    letter-spacing:0.16em;
    font-size:var(--t-small);
    text-decoration:none;
    color:var(--ink);
    opacity:0.72;
    transition:color .35s ease, opacity .35s ease;
  }
  .cta-link:hover{ color:var(--gold); opacity:1; }
  .cta-sep{
    width:1px; height:0.95em; background:var(--ink); opacity:0.3;
    display:inline-block;
  }

  /* ===================== SHARED TYPOGRAPHY ===================== */
  .eyebrow{
    font-variant:all-small-caps;
    letter-spacing:0.24em;
    font-size:var(--t-small);
    color:var(--ink);
    opacity:0.6;
    margin:0 0 clamp(1.4rem,3vh,2.4rem);
  }
  .dropcap{ overflow:hidden; }
  .dropcap::first-letter{
    float:left;
    font-family:"Playfair Display", Georgia, serif;
    font-weight:500;
    font-size:3.5em;
    line-height:0.78;
    padding:0.02em 0.09em 0 0;
    color:var(--ink);
    transition:color .9s ease;
  }
  .section.is-lit .dropcap::first-letter{ color:var(--gold); }

  /* ---- Services ---- */
  .services{ list-style:none; margin:0; padding:0; }
  .service{ margin-bottom:clamp(2.6rem, 6vh, 4.2rem); }
  .service:last-child{ margin-bottom:0; }
  .service-num{
    display:block;
    font-family:"Playfair Display", Georgia, serif;
    font-size:var(--t-small);
    letter-spacing:0.28em;
    opacity:0.5;
    margin-bottom:0.45rem;
  }
  .service-title{
    font-family:"Playfair Display", Georgia, serif;
    font-weight:500;
    font-size:clamp(1.55rem, 3vw, 2.35rem);
    line-height:1.08;
    letter-spacing:-0.004em;
    margin:0 0 0.7rem;
  }
  .service-body{ margin:0; max-width:36rem; text-wrap:pretty; }

  /* ---- Work ---- */
  .work-title{
    font-family:"Playfair Display", Georgia, serif;
    font-weight:500;
    font-size:clamp(2rem, 4.4vw, 3.4rem);
    line-height:1.05;
    letter-spacing:-0.006em;
    margin:0 0 clamp(1.1rem,2.5vh,1.8rem);
  }
  .work-body{ margin:0; max-width:38rem; font-size:1.22rem; text-wrap:pretty; }

  /* ---- Approach ---- */
  .approach{ margin:0; padding:0; }
  .principle{
    display:block;
    padding-left:clamp(1.2rem, 4vw, 3rem);
    margin-bottom:clamp(1.6rem, 3.5vh, 2.6rem);
  }
  .principle:last-child{ margin-bottom:0; }
  .principle-lead{
    font-variant:all-small-caps;
    letter-spacing:0.1em;
    font-size:1.12rem;
    color:var(--ink);
    margin:0 0 0.15rem;
  }
  .principle-body{ margin:0; opacity:0.9; max-width:34rem; text-wrap:pretty; }

  /* ---- About / Contact ---- */
  .about{ margin:0 0 clamp(2.2rem,5vh,3.4rem); max-width:36rem; font-size:1.22rem; text-wrap:pretty; }
  .colophon{ display:flex; flex-direction:column; gap:0.55rem; }
  .colophon > *{ min-width:0; }
  .email{
    font-size:1.22rem;
    color:var(--ink);
    text-decoration:underline;
    text-decoration-thickness:1px;
    text-underline-offset:0.22em;
    text-decoration-color:rgba(46,42,38,0.5);
    width:max-content;
    max-width:100%;
    overflow-wrap:anywhere;
    transition:text-decoration-color .35s ease, color .35s ease;
  }
  .email:hover{ color:var(--gold); text-decoration-color:var(--gold); }
  .place{ margin:0; font-variant:all-small-caps; letter-spacing:0.14em; font-size:var(--t-small); opacity:0.6; }

  /* ===================== FOOTER ===================== */
  .footer{
    margin-left:var(--pad-l); margin-right:var(--pad-r);
    max-width:var(--measure);
    padding-top:clamp(2.2rem,5vh,3.4rem);
    padding-bottom:clamp(3rem,7vh,5rem);
  }
  .footer .rule{ margin-bottom:clamp(1.6rem,3.5vh,2.4rem); }
  .footer-brand{
    font-family:"Playfair Display", Georgia, serif;
    font-weight:600; font-size:1rem; letter-spacing:0.22em;
    margin:0 0 0.5rem;
  }
  .footer-meta{ margin:0; font-size:var(--t-small); opacity:0.6; letter-spacing:0.04em; }
  .honesty{
    margin:1.4rem 0 0;
    font-family:ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    font-size:var(--t-micro);
    letter-spacing:0.02em;
    opacity:0.5;
  }

  /* ===================== THE ONE STAR ===================== */
  .star{
    position:fixed; top:0; left:var(--star-x);
    width:var(--star-w); height:var(--star-w);
    padding:0; margin:0; border:0; background:none; cursor:pointer;
    z-index:6; will-change:transform;
    filter:drop-shadow(0 1px 2px rgba(138,101,38,0.18));
  }
  .star svg{ display:block; width:100%; height:100%; }
  .star svg .facet{ transition:filter .5s ease; }
  .star.glint svg{ animation:glint 0.8s ease; }
  @keyframes glint{
    0%{ filter:brightness(1) saturate(1); }
    35%{ filter:brightness(1.42) saturate(1.15); }
    100%{ filter:brightness(1) saturate(1); }
  }

  /* ===================== THE MARGIN RAIL - the star's track =====================
     A whisper hairline down the left margin, on the star's own axis, with one
     waypoint tick per section. The star rides this rail; the tick beside the lit
     section warms to the star's gold. Ink hairline + gold family only -> still 1 colour. */
  .rail{
    position:fixed; top:0; bottom:0;
    /* A transparent 26px lane centred on the star axis so the wider ticks stay
       CONTAINED (no element overflow-x). The visible line is a centred 1px
       background; its faintness is background alpha, NOT element opacity, so
       the tick children keep their own opacity instead of being multiplied down. */
    left:calc(var(--star-x) + var(--star-w) / 2);
    width:26px; margin-left:-13px;
    z-index:5; pointer-events:none;
    background:linear-gradient(rgba(46,42,38,0.28), rgba(46,42,38,0.28)) center / 1px 100% no-repeat;
    -webkit-mask-image:linear-gradient(to bottom, transparent 0, #000 7%, #000 93%, transparent 100%);
            mask-image:linear-gradient(to bottom, transparent 0, #000 7%, #000 93%, transparent 100%);
  }
  .rail-tick{
    position:absolute; left:50%;
    width:20px; height:2px;
    transform:translate(-50%,-50%);
    background:var(--ink); opacity:0.55;
    transition:background .9s ease, opacity .9s ease, width .6s ease;
  }
  .rail-tick.is-lit-tick{ background:var(--gold); opacity:0.9; width:24px; }

  /* ===================== RIGHT-MARGIN INK INDEX ===================== */
  .index{
    position:fixed; right:var(--star-x); top:50%;
    transform:translateY(-50%);
    display:flex; flex-direction:column; align-items:flex-end;
    gap:0.95rem; z-index:6;
  }
  .index a{
    font-variant:all-small-caps;
    letter-spacing:0.2em;
    font-size:var(--t-micro);
    text-decoration:none;
    color:var(--ink);
    opacity:0.42;
    transition:opacity .4s ease, color .4s ease;
  }
  .index a:hover{ opacity:0.85; }
  .index a.is-active{ opacity:1; color:var(--gold); }

  /* ===================== ENTRANCE RITUAL (opacity only) ===================== */
  .js .section--hero .brandline,
  .js .section--hero .rule--hero,
  .js .section--hero .statement .word,
  .js .section--hero .cta,
  .js .rail,
  .js .star{ opacity:0; }

  .ready .section--hero .brandline{ opacity:1; transition:opacity .85s ease .55s; }
  .ready .section--hero .rule--hero{ opacity:0.24; transition:opacity .85s ease .8s; }
  .ready .rail{ opacity:1; transition:opacity 1.05s ease .32s; }
  .ready .star{ opacity:1; transition:opacity .95s ease .22s; }
  .ready .section--hero .statement .word{
    opacity:1;
    transition:opacity .55s ease;
    transition-delay:calc(0.95s + var(--i) * 42ms);
  }
  .ready .section--hero .cta{ opacity:1; transition:opacity .9s ease 1.7s; }

  /* ===================== MOBILE ===================== */
  @media (max-width:720px){
    .index{ display:none; }
    :root{ --pad-l: 60px; --pad-r: 22px; --star-x: 22px; }
    .statement{ max-width:100%; }
    .statement .hero-br{ display:none; }
    .rule--hero{ max-width:9rem; }
  }
  @media (max-width:420px){
    :root{ --pad-l: 56px; --star-x: 20px; }
    .dropcap::first-letter{ font-size:3em; }
  }

  /* ===================== REDUCED MOTION = FINAL STATE ===================== */
  @media (prefers-reduced-motion:reduce){
    html{ scroll-behavior:auto; }
    .js .section--hero .brandline,
    .js .section--hero .rule--hero,
    .js .section--hero .statement .word,
    .js .section--hero .cta,
    .js .star{ opacity:1 !important; transition:none !important; }
    .js .rail{ opacity:1 !important; transition:none !important; }
    .ready .section--hero .rule--hero{ opacity:0.24 !important; }
    .rule, .dropcap::first-letter, .star, .index a, .rail, .rail-tick{ transition:none !important; }
    .star.glint svg{ animation:none !important; }
  }
</style>
<script>document.documentElement.classList.add('js');</script>
</head>
<body>
<script>
/* =========================================================================
   DATA - swap the copy here. Everything on the page renders from this object.
   ========================================================================= */
const DATA = {
  wordmark: "VESPERWERK",
  thai: "ดาวประจำเมือง : แสงแรกที่ใช้นำทางยามค่ำ",
  hero: {
    statement: "An independent software and AI studio. We architect, build, and operate production systems for businesses that cannot afford them to fail.",
    cta: [
      { label: "Start a conversation", href: "#contact" },
      { label: "See our work", href: "#work" }
    ]
  },
  services: {
    eyebrow: "Services",
    items: [
      { num: "I", title: "AI Systems", body: "Voice agents, LLM assistants, and the evaluation infrastructure that keeps them honest. AI that answers like your best employee, in production, around the clock." },
      { num: "II", title: "Product Engineering", body: "Full-stack product engineering from architecture to operations: event-driven backends, modern web frontends, and infrastructure that scales without drama." },
      { num: "III", title: "Commerce and Platforms", body: "Deep Shopify and LINE platform work: storefronts, admin apps, integrations, and the messaging rails Southeast Asian commerce runs on." }
    ]
  },
  work: {
    eyebrow: "Selected Work",
    title: "Yimwhan AI",
    body: "An AI voice and LINE assistant for dental clinics in Thailand. It answers after-hours calls, books and reschedules appointments, and hands off to staff the moment a human matters. In production at live clinics."
  },
  approach: {
    eyebrow: "Approach",
    items: [
      { lead: "Architecture first", body: "We design the system before we write the code." },
      { lead: "Production-worthy", body: "Demos impress; production endures. We build for the second one." },
      { lead: "Scope discipline", body: "The most valuable thing we tell clients is what not to build." },
      { lead: "Senior hands", body: "No juniors learning on your budget. Founder-led, senior hands on every line." }
    ]
  },
  contact: {
    eyebrow: "About",
    about: "Vesperwerk takes its name from the evening star: the first light you can navigate by. We are a founder-led studio in Bangkok building software for businesses across Asia and beyond.",
    email: "kittipong.k@vesperwerk.com",
    place: "Bangkok, Thailand"
  },
  footer: {
    wordmark: "VESPERWERK",
    place: "Bangkok, Thailand",
    copy: "(c) 2026 Vesperwerk",
    honesty: "this page contains: 1 color, 0 images, 1 star"
  },
  index: [
    { id: "hero", label: "Hero" },
    { id: "services", label: "Services" },
    { id: "work", label: "Work" },
    { id: "approach", label: "Approach" },
    { id: "contact", label: "Contact" }
  ]
};

/* The single star mark, inlined from ../assets/vesperwerk-star.svg (facet colours kept). */
const STAR_SVG = `
<svg viewBox="0 0 200 200" role="img" aria-label="Vesperwerk star" focusable="false">
  <g transform="translate(100,100)">
    <g>
      <polygon class="facet" points="0,-86 -11,0 0,0" fill="#c09a4a"/>
      <polygon class="facet" points="0,-86 11,0 0,0" fill="#8a6526"/>
    </g>
    <g transform="rotate(180)">
      <polygon class="facet" points="0,-86 -11,0 0,0" fill="#8a6526"/>
      <polygon class="facet" points="0,-86 11,0 0,0" fill="#c09a4a"/>
    </g>
    <g transform="rotate(90)">
      <polygon class="facet" points="0,-64 -9.5,0 0,0" fill="#c09a4a"/>
      <polygon class="facet" points="0,-64 9.5,0 0,0" fill="#8a6526"/>
    </g>
    <g transform="rotate(270)">
      <polygon class="facet" points="0,-64 -9.5,0 0,0" fill="#8a6526"/>
      <polygon class="facet" points="0,-64 9.5,0 0,0" fill="#c09a4a"/>
    </g>
    <g transform="rotate(45)">
      <polygon class="facet" points="0,-44 -7.5,0 0,0" fill="#c09a4a"/>
      <polygon class="facet" points="0,-44 7.5,0 0,0" fill="#8a6526"/>
    </g>
    <g transform="rotate(135)">
      <polygon class="facet" points="0,-44 -7.5,0 0,0" fill="#c09a4a"/>
      <polygon class="facet" points="0,-44 7.5,0 0,0" fill="#8a6526"/>
    </g>
    <g transform="rotate(225)">
      <polygon class="facet" points="0,-44 -7.5,0 0,0" fill="#8a6526"/>
      <polygon class="facet" points="0,-44 7.5,0 0,0" fill="#c09a4a"/>
    </g>
    <g transform="rotate(315)">
      <polygon class="facet" points="0,-44 -7.5,0 0,0" fill="#8a6526"/>
      <polygon class="facet" points="0,-44 7.5,0 0,0" fill="#c09a4a"/>
    </g>
  </g>
</svg>`;

/* =========================================================================
   RENDER
   ========================================================================= */
const esc = (s) => String(s).replace(/[&<>]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" }[c]));

/* Desktop rag: break AFTER these word tokens so the display measure stacks on strong
   words (sentence one lands on "studio."; the tail closes on "them to fail."). The tokens
   are the space-split units of DATA.hero.statement (the nbsp-glued phrases count as one).
   Hidden below 720px (.hero-br { display:none }) so the narrow column wraps naturally. */
const HERO_BREAKS = new Set([1, 3, 6, 9, 12, 15]);
function heroStatementHTML(text){
  const words = text.split(" ");
  return words.map((w,i) => {
    const tail = i < words.length-1 ? " " : "";
    const brk = HERO_BREAKS.has(i) ? '<br class="hero-br" aria-hidden="true">' : "";
    return `<span class="word" style="--i:${i}">${esc(w)}${tail}</span>${brk}`;
  }).join("");
}

function servicesHTML(){
  return DATA.services.items.map(s => `
    <li class="service">
      <span class="service-num">${esc(s.num)}</span>
      <h2 class="service-title">${esc(s.title)}</h2>
      <p class="service-body dropcap">${esc(s.body)}</p>
    </li>`).join("");
}

function approachHTML(){
  return DATA.approach.items.map(p => `
    <div class="principle">
      <p class="principle-lead">${esc(p.lead)}</p>
      <p class="principle-body">${esc(p.body)}</p>
    </div>`).join("");
}

function indexHTML(){
  return DATA.index.map(it => `<a href="#${it.id}" data-target="${it.id}">${esc(it.label)}</a>`).join("");
}

function render(){
  const html = `
    <div class="rail" aria-hidden="true">${DATA.index.map((_, i) => `<span class="rail-tick" data-tick="${i}"></span>`).join("")}</div>
    <button class="star" type="button" aria-label="Move the star to the next section">${STAR_SVG}</button>
    <nav class="index" aria-label="Section index">${indexHTML()}</nav>

    <main class="page">
      <section class="section section--hero" id="hero">
        <div class="brandline section-anchor">
          <p class="wordmark">${esc(DATA.wordmark)}</p>
          <p class="thai" lang="th">${esc(DATA.thai)}</p>
        </div>
        <hr class="rule rule--hero">
        <h1 class="statement">${heroStatementHTML(DATA.hero.statement)}</h1>
        <p class="cta">
          <a class="cta-link" href="${DATA.hero.cta[0].href}">${esc(DATA.hero.cta[0].label)}</a>
          <span class="cta-sep" aria-hidden="true"></span>
          <a class="cta-link" href="${DATA.hero.cta[1].href}">${esc(DATA.hero.cta[1].label)}</a>
        </p>
      </section>

      <section class="section" id="services">
        <p class="eyebrow section-anchor">${esc(DATA.services.eyebrow)}</p>
        <ol class="services">${servicesHTML()}</ol>
      </section>

      <section class="section" id="work">
        <hr class="rule rule--top">
        <p class="eyebrow section-anchor">${esc(DATA.work.eyebrow)}</p>
        <h2 class="work-title">${esc(DATA.work.title)}</h2>
        <p class="work-body dropcap">${esc(DATA.work.body)}</p>
      </section>

      <section class="section" id="approach">
        <p class="eyebrow section-anchor">${esc(DATA.approach.eyebrow)}</p>
        <div class="approach">${approachHTML()}</div>
      </section>

      <section class="section" id="contact">
        <p class="eyebrow section-anchor">${esc(DATA.contact.eyebrow)}</p>
        <p class="about dropcap">${esc(DATA.contact.about)}</p>
        <div class="colophon">
          <a class="email" href="mailto:${esc(DATA.contact.email)}">${esc(DATA.contact.email)}</a>
          <p class="place">${esc(DATA.contact.place)}</p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <hr class="rule">
      <p class="footer-brand">${esc(DATA.footer.wordmark)}</p>
      <p class="footer-meta">${esc(DATA.footer.place)}</p>
      <p class="footer-meta">${esc(DATA.footer.copy)}</p>
      <p class="honesty">${esc(DATA.footer.honesty)}</p>
    </footer>`;
  document.body.insertAdjacentHTML("afterbegin", html);
}

/* =========================================================================
   THE LIVING STAR - bookmark of light
   ========================================================================= */
function init(){
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const star = document.querySelector(".star");
  const starSvg = star.querySelector("svg");
  const order = DATA.index.map(i => i.id);
  const sections = order.map(id => document.getElementById(id));
  const indexLinks = Array.from(document.querySelectorAll(".index a"));
  const ticks = Array.from(document.querySelectorAll(".rail-tick"));

  let activeId = null; // set on first frame so the initial section actually lights
  let currentY = null; // px from viewport top (centre of star)

  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));

  function anchorRect(section){
    return (section.querySelector(".section-anchor") || section).getBoundingClientRect();
  }

  // The vertical band the star (and the rail's waypoint ticks) live within.
  function band(){
    return {
      top: Math.max(140, window.innerHeight * 0.16),
      bottom: Math.min(window.innerHeight - 90, window.innerHeight * 0.84)
    };
  }

  function targetY(section){
    const r = anchorRect(section);
    const b = band();
    return clamp(r.top + 18, b.top, b.bottom);
  }

  // Space the waypoint ticks evenly across the star's travel band, so the hero
  // tick sits exactly where the resting star lands (band.top) at scroll=0.
  function layoutTicks(){
    if(!ticks.length) return;
    const b = band();
    const span = b.bottom - b.top;
    const step = ticks.length > 1 ? span / (ticks.length - 1) : 0;
    ticks.forEach((t, i) => { t.style.top = (b.top + step * i) + "px"; });
  }

  function pickActive(){
    const line = window.innerHeight * 0.42;
    let best = sections[0], bestD = Infinity;
    for(const s of sections){
      const r = s.getBoundingClientRect();
      if(r.top <= line && r.bottom >= line) return s;
      const d = Math.min(Math.abs(r.top - line), Math.abs(r.bottom - line));
      if(d < bestD){ bestD = d; best = s; }
    }
    return best;
  }

  function setActive(section){
    if(!section || section.id === activeId) return;
    activeId = section.id;
    const idx = order.indexOf(activeId);
    sections.forEach(s => s.classList.toggle("is-lit", s === section));
    indexLinks.forEach(a => a.classList.toggle("is-active", a.dataset.target === activeId));
    ticks.forEach((t, i) => t.classList.toggle("is-lit-tick", i === idx));
  }

  function placeStar(y){
    const half = star.offsetHeight / 2 || 16;
    star.style.transform = "translateY(" + (y - half) + "px)";
  }

  // Initial lit state (hero) so the gold whisper shows at scroll=0, and lay the rail's
  // waypoint ticks down the travel band so the resting star sits on the top tick.
  layoutTicks();
  setActive(sections[0]);
  window.addEventListener("resize", layoutTicks, { passive:true });

  function glint(){
    if(reduced) return;
    starSvg.parentElement.classList.remove("glint");
    void starSvg.getBoundingClientRect();
    starSvg.parentElement.classList.add("glint");
  }
  starSvg.parentElement.addEventListener("animationend", () => star.classList.remove("glint"));

  // --- inverted navigation: the star leads, the page follows ---
  function goTo(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.scrollIntoView({ behavior: reduced ? "auto" : "smooth", block: "start" });
  }
  star.addEventListener("click", () => {
    const i = order.indexOf(activeId);
    const next = order[(i + 1) % order.length];
    goTo(next);
    glint();
    if(reduced){ // no rAF: jump the bookmark now
      setActive(document.getElementById(next));
    }
  });
  star.addEventListener("mouseenter", glint);
  indexLinks.forEach(a => a.addEventListener("click", (e) => {
    e.preventDefault();
    goTo(a.dataset.target);
    if(reduced) setActive(document.getElementById(a.dataset.target));
  }));

  if(reduced){
    // No rAF, no glide: the bookmark jumps section to section via observation.
    const io = new IntersectionObserver((entries) => {
      const active = pickActive();
      setActive(active);
      placeStar(targetY(active));
    }, { threshold: [0, 0.25, 0.5, 0.75, 1], rootMargin: "-30% 0px -30% 0px" });
    sections.forEach(s => io.observe(s));
    const settle = () => { const a = pickActive(); setActive(a); placeStar(targetY(a)); };
    settle();
    window.addEventListener("resize", settle, { passive:true });
    window.addEventListener("scroll", () => { const a = pickActive(); setActive(a); placeStar(targetY(a)); }, { passive:true });
    return;
  }

  // --- smooth interpolation loop ---
  function frame(){
    const active = pickActive();
    setActive(active);
    const t = targetY(active);
    if(currentY === null) currentY = t;
    else currentY += (t - currentY) * 0.14;
    placeStar(currentY);
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

/* =========================================================================
   BOOT + entrance ritual
   ========================================================================= */
render();
init();
requestAnimationFrame(() => requestAnimationFrame(() => {
  document.documentElement.classList.add("ready");
}));
// safety: never leave the hero hidden if a transition event is missed
setTimeout(() => document.documentElement.classList.add("ready"), 2600);
</script>
</body>
</html>
