<html lang="en">
<head>

<title>Vesperwerk : an independent software and AI studio, woven</title>

<style>
:root{
  --cream:#f5efe2;
  --ground:#ebe1cc;
  --ink:#2e2a26;
  --gold:#a8802f;
  --gold-hi:#c09a4a;
  --gold-dk:#8a6526;
  --indigo:#37415c;
  --mono:"SF Mono", ui-monospace, Menlo, Consolas, "Liberation Mono", monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}
html,body{overflow-x:hidden}
body{
  background:
    repeating-linear-gradient(0deg, rgba(46,42,38,.028) 0 1px, transparent 1px 3px),
    var(--ground);
  color:var(--ink);
  font-family:'Newsreader', Georgia, 'Times New Roman', serif;
  font-size:1.05rem;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block}
a{color:inherit}
button{font:inherit;color:inherit}
a:focus-visible, button:focus-visible{outline:2px solid var(--gold-hi);outline-offset:3px}

/* ---- the loom: fixed vertical warp of gold hairlines ---- */
#warp{
  position:fixed; top:0; bottom:0; left:50%;
  transform:translateX(-50%);
  width:min(1180px,100vw);
  z-index:2; pointer-events:none;
  overflow:hidden;
}
.end{
  position:absolute; top:0; bottom:0; width:1px;
  background:linear-gradient(180deg, rgba(168,128,47,.34), rgba(168,128,47,.22) 45%, rgba(168,128,47,.36));
  opacity:.75;
}
.end.hi{
  width:1px;
  background:linear-gradient(180deg, rgba(192,154,74,.5), rgba(192,154,74,.34) 50%, rgba(192,154,74,.52));
}

main{position:relative; z-index:1}

/* ---- the cloth: a bolt with selvage edges ---- */
.cloth{
  max-width:1180px; margin:0 auto; position:relative;
  background:
    repeating-linear-gradient(0deg, rgba(46,42,38,.032) 0 1px, transparent 1px 3px),
    var(--cream);
  box-shadow: 0 0 0 1px rgba(168,128,47,.28), 0 22px 70px rgba(46,42,38,.14);
}
.cloth::before,.cloth::after{
  content:""; position:absolute; top:0; bottom:0; width:7px;
  background:repeating-linear-gradient(0deg,
    rgba(168,128,47,.55) 0 7px, transparent 7px 11px,
    rgba(46,42,38,.45) 11px 13px, transparent 13px 19px);
  opacity:.8;
}
.cloth::before{left:-15px}
.cloth::after{right:-15px}
@media (max-width:1240px){ .cloth::before,.cloth::after{display:none} }

/* ---- weft bands (picks) ---- */
.pick{width:100%}
.ink{
  background:
    repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px),
    var(--ink);
  color:var(--cream);
}
.mono{font-family:var(--mono)}
.mband{display:block;width:100%;height:100%}
.motif{height:56px}
.starband{height:150px}
.hero,.panel{overflow:hidden;position:relative}
.panel{padding:0 0 30px}
section{scroll-margin-top:10px}

/* top band */
.topband{
  display:flex; align-items:center; gap:14px;
  padding:11px 28px;
  border-bottom:1px solid rgba(192,154,74,.35);
}
.topband>*{min-width:0}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--cream)}
.bname{font-family:'Playfair Display',serif;font-weight:500;font-size:.82rem;letter-spacing:.22em}
.nav{margin-left:auto;display:flex;gap:20px;min-width:0}
.nav a{
  font-family:var(--mono);font-size:.64rem;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(245,239,226,.85);text-decoration:none;padding:4px 0;
}
.nav a{transition:color .2s ease}
.nav a:hover{color:var(--gold-hi)}
::selection{background:rgba(168,128,47,.28)}
.shuttle{
  display:flex;align-items:center;gap:8px;
  margin-left:18px;
  background:transparent;border:1px solid rgba(192,154,74,.55);
  color:var(--gold-hi);padding:6px 12px;cursor:pointer;
  font-family:var(--mono);font-size:.6rem;letter-spacing:.18em;
}
.shuttle{transition:border-color .2s ease,background .2s ease}
.shuttle:hover{border-color:var(--gold-hi);background:rgba(192,154,74,.12)}
.shuttle svg{flex:none;transition:transform .3s cubic-bezier(.2,.7,.3,1)}
.shuttle:hover svg{transform:translateX(4px)}
.shuttle:active svg{transform:translateX(9px)}

/* wordmark band */
.wordband{padding:clamp(34px,6vh,60px) 28px 16px;text-align:center}
.overline{
  font-family:var(--mono);font-size:.66rem;letter-spacing:.34em;margin-right:-.34em;
  color:var(--gold-dk);margin-bottom:16px;text-transform:uppercase;
}
.wm{
  font-family:'Playfair Display',serif;font-weight:500;
  font-size:clamp(1.9rem,6vw,5rem);
  letter-spacing:.22em;margin-right:-.22em;
  line-height:1.08;
}

/* positioning band */
.posband{padding:28px 28px 34px;text-align:center}
.lead{
  font-size:clamp(1.1rem,1.9vw,1.42rem);
  line-height:1.5;max-width:52ch;margin:0 auto;
  color:#3a342c;text-wrap:balance;
}
.ctas{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-top:24px}
.ctas>*{min-width:0}
.btn{
  font-family:var(--mono);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;
  text-decoration:none;transition:background .2s ease,color .2s ease,border-color .2s ease;
}
.btn.pri{background:var(--ink);color:var(--cream);border:1px solid var(--gold);padding:13px 26px}
.btn.pri:hover{color:var(--gold-hi);border-color:var(--gold-hi)}
.btn.sec{color:var(--ink);border-bottom:1px solid var(--gold);padding:13px 6px}
.btn.sec:hover{color:var(--gold-dk);border-bottom-color:var(--gold-hi)}

/* hairline strip */
.hairstrip{
  height:18px;
  background:
    repeating-linear-gradient(90deg, rgba(168,128,47,.7) 0 16px, transparent 16px 26px) 50% 50% / 100% 3px no-repeat,
    linear-gradient(rgba(168,128,47,.4),rgba(168,128,47,.4)) 50% 3px / 100% 1px no-repeat,
    linear-gradient(rgba(168,128,47,.4),rgba(168,128,47,.4)) 50% calc(100% - 3px) / 100% 1px no-repeat;
}

/* kicker bands */
.kickband{display:flex;align-items:center;gap:16px;padding:24px 28px 14px}
.kickband>*{min-width:0}
.kickband::before,.kickband::after{content:"";flex:1;height:1px;background:rgba(168,128,47,.5)}
.kick{
  font-family:var(--mono);font-size:.66rem;letter-spacing:.3em;margin-right:-.3em;text-transform:uppercase;
  color:var(--gold-dk);white-space:nowrap;
}

/* service blocks */
.svc{position:relative}
.svc::after{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(90deg, transparent 15%, rgba(192,154,74,.12) 50%, transparent 85%);
  opacity:0;transition:opacity .25s ease;
}
.svc:hover::after{opacity:1}
.reserve{padding:26px 28px 36px}
.svcres{
  display:grid;grid-template-columns:250px 1fr;gap:6px 48px;
  max-width:1020px;margin:0 auto;
}
.svcres>*{min-width:0}
.si .lbl{
  display:block;font-family:var(--mono);font-size:.62rem;letter-spacing:.26em;
  color:var(--gold-dk);margin-bottom:8px;
}
.si h3{font-family:'Playfair Display',serif;font-weight:600;font-size:1.4rem;line-height:1.2}
.svcres p{max-width:60ch;color:#48423a;padding-top:26px}

/* work / picture band */
.picture{padding:10px;background:
  repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px), var(--ink);}
.frame{position:relative;overflow:hidden;aspect-ratio:2.3/1}
.frame img{width:100%;height:100%;object-fit:cover;filter:sepia(.15) saturate(.88) contrast(.98)}
.weaveOverlay{
  position:absolute;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg, rgba(46,42,38,.15) 0 1px, transparent 1px 3px),
    repeating-linear-gradient(90deg, rgba(245,239,226,.05) 0 1px, transparent 1px 9px),
    radial-gradient(120% 100% at 50% 50%, transparent 55%, rgba(46,42,38,.28) 100%);
}
.workres{
  display:grid;grid-template-columns:250px 1fr;gap:6px 48px;
  max-width:1020px;margin:0 auto;
}
.workres>*{min-width:0}
.workres p{max-width:62ch;color:#48423a;padding-top:26px}

/* approach ribbons */
.ribbon{
  display:grid;grid-template-columns:44px 235px 1fr;gap:2px 26px;align-items:baseline;
  padding:15px 28px;margin-bottom:6px;
  border-left:5px solid var(--gold-dk);
  border-top:1px solid rgba(192,154,74,.35);
  transition:border-color .2s ease;
}
.ribbon>*{min-width:0}
.ribbon .rn{font-family:var(--mono);font-size:.7rem;color:var(--gold-hi);letter-spacing:.14em}
.ribbon .rt{font-family:'Playfair Display',serif;font-weight:600;font-size:1.12rem;color:var(--cream)}
.ribbon .rc{color:rgba(245,239,226,.84);font-size:.98rem}
.ribbon:hover{border-left-color:var(--gold-hi)}

/* about */
.aboutres{text-align:center;padding:26px 28px 40px}
.aboutp{
  font-style:italic;font-size:1.14rem;line-height:1.6;
  max-width:46ch;margin:14px auto 0;color:#3a342c;text-wrap:balance;
}

/* contact + selvage */
.contactres{text-align:center;padding:26px 28px 26px}
.ch{font-family:'Playfair Display',serif;font-weight:600;font-size:clamp(1.5rem,3.2vw,2.5rem)}
.city{font-family:var(--mono);font-size:.66rem;letter-spacing:.26em;margin-right:-.26em;color:var(--gold-dk);margin-top:12px;text-transform:uppercase}
.emailband{
  text-align:center;padding:26px 20px;position:relative;
  background:
    repeating-linear-gradient(90deg, rgba(168,128,47,.14) 0 1px, transparent 1px 12px),
    repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0 1px, transparent 1px 3px),
    var(--ink);
  color:var(--cream);
  transition:box-shadow .2s ease;
}
.emailband:hover{box-shadow:inset 0 0 0 1px rgba(192,154,74,.5)}
.email{
  font-family:var(--mono);letter-spacing:.14em;color:var(--gold-hi);
  font-size:clamp(.78rem,2.6vw,1.02rem);text-decoration:none;
  border-bottom:1px solid rgba(192,154,74,.5);padding-bottom:3px;
  overflow-wrap:anywhere;
}
.email:hover{color:#d8b268;border-bottom-color:#d8b268}
.tallyband{text-align:center;padding:22px 28px 6px}
#tally{font-size:.64rem;letter-spacing:.22em;color:var(--gold-dk);text-transform:uppercase}
.epiband{text-align:center;padding:8px 28px 26px}
.thai{
  font-family:'Noto Sans Thai','Thonburi',system-ui,sans-serif;
  font-size:.95rem;line-height:1.7;letter-spacing:normal;
  color:rgba(46,42,38,.78);
}
.fringe{
  height:30px;
  background:repeating-linear-gradient(90deg,
    rgba(168,128,47,.85) 0 2px, transparent 2px 6px,
    rgba(46,42,38,.65) 6px 8px, transparent 8px 13px);
  -webkit-mask-image:linear-gradient(180deg,#000 0%,#000 30%,transparent 100%);
  mask-image:linear-gradient(180deg,#000 0%,#000 30%,transparent 100%);
}

/* footer: off the cut edge */
.off{text-align:center;padding:42px 20px 54px}
.off svg{margin:0 auto}
.fname{font-family:'Playfair Display',serif;font-weight:500;font-size:.85rem;letter-spacing:.24em;margin:12px 0 8px;padding-left:.24em}
.fmeta{font-family:var(--mono);font-size:.62rem;letter-spacing:.2em;color:rgba(46,42,38,.62);margin-top:5px;text-transform:uppercase}

/* ================= MOTION ================= */
@media (prefers-reduced-motion: no-preference){
  html{scroll-behavior:smooth}

  /* hero entrance: bands shuttle in from alternating sides, ikat blur resolves */
  .weave .hpick{
    animation-duration:calc(.6s * var(--wv,1));
    animation-delay:calc(var(--hd,0s) * var(--wv,1));
    animation-timing-function:cubic-bezier(.2,.7,.3,1);
    animation-fill-mode:both;
  }
  .weave .hpick.fromL{animation-name:shutL}
  .weave .hpick.fromR{animation-name:shutR}
  @keyframes shutL{
    0%{transform:translateX(-104%);filter:blur(0)}
    55%{filter:blur(3px) saturate(1.3)}
    78%{transform:translateX(.7%);filter:blur(1.2px)}
    100%{transform:none;filter:none}
  }
  @keyframes shutR{
    0%{transform:translateX(104%);filter:blur(0)}
    55%{filter:blur(3px) saturate(1.3)}
    78%{transform:translateX(-.7%);filter:blur(1.2px)}
    100%{transform:none;filter:none}
  }
  /* the star registers last: a small gold glint */
  .weave .starG{animation:glint 1s ease calc(1.45s * var(--wv,1)) both}
  @keyframes glint{
    0%{filter:brightness(1)}
    45%{filter:brightness(1.55) drop-shadow(0 0 6px rgba(192,154,74,.85))}
    100%{filter:brightness(1)}
  }

  /* scroll choreography: same 400ms beat for every section */
  html.js .panel .pick{
    transition:
      transform .42s cubic-bezier(.18,.8,.26,1.18) var(--d,0s),
      opacity .36s ease var(--d,0s),
      filter .42s ease var(--d,0s),
      translate .18s ease 0s;
  }
  html.js .panel:not(.in) .pick{opacity:0;filter:blur(2.5px)}
  html.js .panel:not(.in) .pick.fromL{transform:translateX(-46px)}
  html.js .panel:not(.in) .pick.fromR{transform:translateX(46px)}

  /* fingers checking the cloth: bands separate 1px on hover */
  .svc .pick{transition:translate .18s ease}
  .svc:hover .pick:nth-child(odd){translate:0 -1px}
  .svc:hover .pick:nth-child(even){translate:0 1px}
  .ribbon{transition:border-color .2s ease, translate .18s ease}
  .ribbon:hover{translate:0 -1px}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
  html{scroll-behavior:auto}
}

/* ================= RESPONSIVE ================= */
@media (max-width:900px){
  .svcres,.workres{grid-template-columns:1fr;gap:10px}
  .svcres p,.workres p{padding-top:0}
  .ribbon{grid-template-columns:44px 1fr}
  .ribbon .rc{grid-column:2}
}
@media (max-width:640px){
  .nav{display:none}
  .shuttle{margin-left:auto}
  .topband{padding:10px 16px}
  .wordband{padding:26px 16px 12px}
  .posband{padding:22px 16px 28px}
  .reserve{padding:22px 16px 30px}
  .kickband{padding:20px 16px 12px}
  .ribbon{padding:14px 16px}
  .contactres{padding:22px 16px}
  .tallyband,.epiband{padding-left:16px;padding-right:16px}
  .starband{height:118px}
  .motif{height:46px}
  .frame{aspect-ratio:16/10}
  .picture{padding:7px}
}
</style>

/* ================= SVG builders ================= */

    '<feTurbulence type="turbulence" baseFrequency="0.012 0.55" numOctaves="2" seed="'+seed+'" result="n"/>' +
    '<feDisplacementMap in="SourceGraphic" in2="n" scale="3.2" xChannelSelector="R" yChannelSelector="G"/></filter>';

function wtDef(id){

    '<rect width="5" height="1" fill="rgba(245,239,226,0.055)"/></pattern>';
}

/* authored mudmee motifs: real ikat geometry (diamond lattices, keys, stepped repeats) */
var PATTERNS = {
  /* wave-diamond, for voice */
  wave: function(id){
    return '<pattern id="pt-'+id+'" width="46" height="56" patternUnits="userSpaceOnUse">' +
      '<path d="M0 28 Q5.75 16 11.5 28 T23 28 T34.5 28 T46 28" fill="none" stroke="#a8802f" stroke-width="1.1" opacity="0.75"/>' +

  },
  /* interlocking-key, for engineering */
  key: function(id){
    return '<pattern id="pt-'+id+'" width="42" height="56" patternUnits="userSpaceOnUse">' +
      '<path d="M3 43 V13 H31 V31 H15 V23 H23" fill="none" stroke="#c09a4a" stroke-width="2.2"/>' +
      '<rect x="34" y="24" width="7" height="7" fill="#37415c" stroke="#a8802f" stroke-width="0.8"/>' +
      '<rect x="18" y="47" width="6" height="6" fill="none" stroke="#a8802f" stroke-width="1"/>' +
      '<rect x="18" y="3" width="6" height="6" fill="none" stroke="#a8802f" stroke-width="1"/>' +
      '</pattern>';
  },
  /* stepped-chevron, for commerce */
  chevron: function(id){
    return '<pattern id="pt-'+id+'" width="36" height="56" patternUnits="userSpaceOnUse">' +
      '<path d="M0 46 L18 20 L36 46" fill="none" stroke="#c09a4a" stroke-width="3"/>' +
      '<path d="M0 54 L18 28 L36 54" fill="none" stroke="#37415c" stroke-width="3" stroke-dasharray="6 4"/>' +
      '<path d="M0 36 L18 10 L36 36" fill="none" stroke="#a8802f" stroke-width="2" stroke-dasharray="4 4"/>' +
      '</pattern>';
  },
  /* diamond-grid lattice, hero star band */
  lattice: function(id){
    return '<pattern id="pt-'+id+'" width="48" height="50" patternUnits="userSpaceOnUse">' +
      '<path d="M24 3 L45 25 L24 47 L3 25 Z" fill="none" stroke="#a8802f" stroke-width="1.1" opacity="0.85"/>' +
      '<path d="M24 15 L34 25 L24 35 L14 25 Z" fill="#37415c" opacity="0.9"/>' +
      '<circle cx="24" cy="25" r="1.5" fill="#c09a4a"/>' +
      '<circle cx="0" cy="0" r="1.2" fill="#c09a4a" opacity="0.7"/><circle cx="48" cy="0" r="1.2" fill="#c09a4a" opacity="0.7"/>' +
      '<circle cx="0" cy="50" r="1.2" fill="#c09a4a" opacity="0.7"/><circle cx="48" cy="50" r="1.2" fill="#c09a4a" opacity="0.7"/>' +
      '</pattern>';
  }
};

function motifBand(kind, h, seed, extra){
  uid++;
  var id = 'm' + uid;
  return '<svg class="mband" viewBox="0 0 1440 '+h+'" preserveAspectRatio="xMidYMid slice" aria-hidden="true" focusable="false">' +
    '<defs>' + dyeDef(id, seed) + PATTERNS[kind](id) + wtDef(id) + '</defs>' +
    '<rect width="1440" height="'+h+'" fill="#2e2a26"/>' +
    '<g filter="url(#dye-'+id+')">' +
      '<rect width="1440" height="'+h+'" fill="url(#pt-'+id+')"/>' +
      '<rect y="2" width="1440" height="1" fill="#c09a4a" opacity="0.55"/>' +
      '<rect y="'+(h-3)+'" width="1440" height="1" fill="#c09a4a" opacity="0.55"/>' +
    '</g>' +
    (extra || '') +
    '<rect width="1440" height="'+h+'" fill="url(#wt-'+id+')"/>' +
    '</svg>';
}

/* hero band: lattice + indigo medallion + the star, woven in */
function heroBand(){
  var medallion =
    '<g><polygon points="720,12 810,75 720,138 630,75" fill="#37415c" stroke="#c09a4a" stroke-width="1.6"/>' +
    '<polygon points="720,24 792,75 720,126 648,75" fill="none" stroke="#a8802f" stroke-width="1" opacity="0.8"/>' +
    '<g class="starG" transform="translate(720,75) scale(0.56)">'+STAR_CORE+'</g></g>';
  return motifBand('lattice', 150, 3, medallion);
}

var SHUTTLE_ICON =
  '<svg viewBox="0 0 48 14" width="32" height="10" aria-hidden="true" focusable="false">' +
  '<path d="M2 7 Q12 1 24 1 Q36 1 46 7 Q36 13 24 13 Q12 13 2 7 Z" fill="none" stroke="#c09a4a" stroke-width="1.5"/>' +
  '<circle cx="24" cy="7" r="2" fill="#c09a4a"/></svg>';

/* ================= RENDER ================= */
function pick(i, cls, inner, tag){
  var t = tag || 'div';
  var dir = (i % 2) ? 'fromR' : 'fromL';
  return '<'+t+' class="pick '+dir+' '+cls+'" style="--d:'+(i*70)+'ms">'+inner+'</'+t+'>';
}

var H = '';

/* HERO (its own keyframed weave, class .weave) */
H += '<section class="hero weave" id="top" aria-label="Vesperwerk">';
H += '<div class="pick hpick fromL topband ink" style="--hd:0s">' +
     '<a class="brand" href="#top">'+star(18)+'<span class="bname">'+DATA.brand.name+'</span></a>' +
     '<nav class="nav" aria-label="Sections">' +
       DATA.nav.map(function(n){ return '<a href="'+n[1]+'">'+n[0]+'</a>'; }).join('') +
     '</nav>' +
     '<button class="shuttle" type="button" aria-label="Shuttle: replay the hero weave at double speed">'+SHUTTLE_ICON+'<span>SHUTTLE</span></button>' +
     '</div>';
H += '<div class="pick hpick fromR wordband" style="--hd:.16s">' +
     '<p class="overline">'+DATA.brand.est+'</p>' +
     '<h1 class="wm">'+DATA.brand.name+'</h1></div>';
H += '<div class="pick hpick fromL starband" style="--hd:.32s">'+heroBand()+'</div>';
H += '<div class="pick hpick fromR posband" style="--hd:.5s">' +
     '<p class="lead">'+DATA.hero.positioning+'</p>' +
     '<div class="ctas">' +
       '<a class="btn pri" href="'+DATA.hero.ctaPrimary.href+'">'+DATA.hero.ctaPrimary.label+'</a>' +
       '<a class="btn sec" href="'+DATA.hero.ctaSecondary.href+'">'+DATA.hero.ctaSecondary.label+'</a>' +
     '</div></div>';
H += '<div class="pick hpick fromL hairstrip" style="--hd:.66s" aria-hidden="true"></div>';
H += '</section>';

/* SERVICES: three woven motif panels */
H += '<section class="panel" id="services" aria-labelledby="svt">';
H += pick(0, 'kickband', '<span class="kick" id="svt">Services</span>');
var seeds = [7, 13, 21];
DATA.services.forEach(function(s, i){
  var a = 1 + i*2, b = 2 + i*2;
  H += '<div class="svc">' +
    pick(a, 'motif', motifBand(s.motif, 56, seeds[i])) +
    pick(b, 'reserve svcres',
      '<div class="si"><span class="lbl mono">S.0'+(i+1)+'</span><h3>'+s.title+'</h3></div>' +
      '<p>'+s.copy+'</p>') +
    '</div>';
});
H += '</section>';

/* SELECTED WORK: the widest woven picture-band */
H += '<section class="panel" id="work" aria-labelledby="wkt">';
H += pick(0, 'kickband', '<span class="kick" id="wkt">'+DATA.work.kicker+'</span>');
H += pick(1, 'picture',
     '<div class="frame"><img src="'+DATA.work.image+'" alt="'+DATA.work.alt+'" loading="lazy" decoding="async">' +
     '<div class="weaveOverlay" aria-hidden="true"></div></div>');
H += pick(2, 'reserve workres',
     '<div class="si"><span class="lbl mono">'+DATA.work.label.toUpperCase()+'</span><h3>'+DATA.work.title+'</h3></div>' +
     '<p>'+DATA.work.copy+'</p>');
H += '</section>';

/* APPROACH: four narrow ribbon bands */
H += '<section class="panel" id="approach" aria-labelledby="apt">';
H += pick(0, 'kickband', '<span class="kick" id="apt">Approach</span>');
DATA.approach.forEach(function(p, i){
  H += pick(1+i, 'ribbon ink',
    '<span class="rn">0'+(i+1)+'</span><h3 class="rt">'+p.title+'</h3><p class="rc">'+p.copy+'</p>');
});
H += '</section>';

/* ABOUT */
H += '<section class="panel" id="about" aria-labelledby="abt">';
H += pick(0, 'kickband', '<span class="kick" id="abt">About</span>');
H += pick(1, 'aboutres', star(26) + '<p class="aboutp">'+DATA.about+'</p>');
H += '</section>';

/* CONTACT + SELVAGE: the cloth's finished edge */
H += '<section class="panel" id="contact" aria-labelledby="ct">';
H += pick(0, 'kickband', '<span class="kick" id="ct">Contact</span>');
H += pick(1, 'contactres',
     '<h2 class="ch">'+DATA.contact.heading+'</h2>' +
     '<p class="city">'+DATA.contact.city+'</p>');
H += pick(2, 'emailband', '<a class="email" href="mailto:'+DATA.contact.email+'">'+DATA.contact.email+'</a>');
H += '</section>';

H += '<section class="panel selvage" aria-label="Selvage">';
H += pick(0, 'tallyband', '<span class="mono" id="tally"></span>');
H += pick(1, 'epiband', '<p class="thai" lang="th">'+DATA.epigraph+'</p>');
H += pick(2, 'fringe', '');
H += '</section>';

document.getElementById('cloth').innerHTML = H;

document.getElementById('off').innerHTML =
  star(22) +
  '<p class="fname">'+DATA.brand.name+'</p>' +
  '<p class="fmeta">'+DATA.footer.city+'</p>' +
  '<p class="fmeta">'+DATA.footer.legal+'</p>';

/* ================= WARP: fixed gold hairlines, true count ================= */
var ends = 0;
function buildWarp(){
  var layer = document.getElementById('warp');
  layer.textContent = '';
  var w = Math.min(1180, window.innerWidth);
  var xs = [];
  if (window.innerWidth <= 640){
    xs = [Math.round(w*0.15), Math.round(w*0.5), Math.round(w*0.85)];
  } else {
    var sp = 12, n = Math.floor(w / sp);
    for (var i = 1; i <= n; i++) xs.push(Math.round((i - 0.5) * sp));
  }
  var frag = document.createDocumentFragment();
  xs.forEach(function(x, i){
    var d = document.createElement('div');
    d.className = 'end' + (i % 6 === 0 ? ' hi' : '');
    d.style.left = x + 'px';
    frag.appendChild(d);
  });
  layer.appendChild(frag);
  ends = xs.length;
  updateTally();
}

/* weaver's tally: true counts of rendered elements */
function updateTally(){
  var picks = document.querySelectorAll('.pick').length;
  var el = document.getElementById('tally');
  if (el) el.textContent = 'WARP ' + ends + ' ENDS . WEFT ' + picks + ' PICKS . LOOM CSS';
}
buildWarp();

var rsT;
window.addEventListener('resize', function(){
  clearTimeout(rsT);
  rsT = setTimeout(buildWarp, 200);
});

/* ================= SCROLL LOOM: same beat every section ================= */
var panels = Array.prototype.slice.call(document.querySelectorAll('.panel'));
function resolveAll(){ panels.forEach(function(p){ p.classList.add('in'); }); }

if (RMQ.matches || !('IntersectionObserver' in window)){
  resolveAll();
} else {
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if (e.isIntersecting){
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -6% 0px' });
  panels.forEach(function(p){ io.observe(p); });
}
if (RMQ.addEventListener){
  RMQ.addEventListener('change', function(e){ if (e.matches) resolveAll(); });
}

/* ================= SHUTTLE: replay the hero weave at 2x ================= */
var hero = document.querySelector('.hero');
document.querySelector('.shuttle').addEventListener('click', function(){
  if (RMQ.matches) return; /* reduced motion: already resolved, jump instantly */
  hero.classList.remove('weave');
  void hero.offsetWidth;
  hero.style.setProperty('--wv', '0.5');
  hero.classList.add('weave');
});
})();
</script>
