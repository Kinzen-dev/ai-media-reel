<!-- TEMPLATE: The Passport | ARCHETYPE: paged-artifact passport booklet (visa pages, entry stamps, MRZ, guilloche security) | REF: passport/booklet security design + visa stamp heraldry + paged 3D page-turn navigation | WHEN TO USE: a founder-led studio or heritage brand that wants its offer to read as a document you are issued and page through | SWAP: edit the DATA object at top of the script -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vesperwerk . The Passport</title>
<meta name="description" content="Vesperwerk is an independent software and AI studio in Bangkok. We architect, build, and operate production systems for businesses that cannot afford them to fail.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+Thai:wght@400;500;600&family=Roboto+Mono:wght@400;500;700&family=Sacramento&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THE PASSPORT - Vesperwerk issued as a booklet you page through.
   Desktop: real 3D two-page spread with leaves turning at the spine.
   Mobile: single half-spread deck, swipe/scroll turns.
   Scroll lives on the DOCUMENT (a tall spacer); the book stage is
   fixed and pinned. Scroll, arrows, keyboard and swipe all advance.
   ============================================================ */
:root{
  --navy:#1d2233; --navy-2:#171b29; --navy-3:#12151f;
  --gold:#a8802f; --gold-lt:#c9a24a; --gold-hi:#e7cd86; --gold-dk:#8a6526; --gold-pale:#d8c48a;
  --cream:#f5efe0; --cream-2:#ece1c9; --cream-edge:#e3d6ba;
  --ink:#2e2a26; --ink-soft:#6a5f52; --ink-faint:#9a8d78;
  --red:#b23a2e; --sage:#657153; --stgold:#9c7a2c;
  --bw:960px; --bh:640px; --pw:480px;
  --mcw:380px; --mch:520px;
  --guilloche:none; --grain:none;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
html{background:#0c0e16}
body{
  font-family:'EB Garamond',Georgia,serif;
  color:var(--ink);
  background:
    radial-gradient(120% 100% at 50% 38%, #262c40 0%, #171c2b 46%, #0c0e16 100%);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
#spacer{width:1px;pointer-events:none}

/* ---------- scene ---------- */
.scene{
  position:fixed; inset:0; z-index:1;
  display:grid; place-items:center;
  overflow:hidden;
}
.vignette{
  position:absolute; inset:0; pointer-events:none; z-index:5;
  background:
    radial-gradient(70% 62% at 50% 42%, transparent 40%, rgba(6,8,14,.55) 100%);
  mix-blend-mode:multiply;
}
.shimmer{
  position:absolute; inset:0; pointer-events:none; z-index:4;
  opacity:0; transition:opacity .5s ease;
  background:radial-gradient(180px 180px at var(--sx,50%) var(--sy,45%),
     rgba(231,205,134,.16), transparent 68%);
  mix-blend-mode:soft-light;
}

/* ---------- desktop book ---------- */
.stage{
  position:relative;
  width:var(--bw); height:var(--bh);
  perspective:2400px; perspective-origin:50% 44%;
  transform-style:preserve-3d;
}
.book{
  position:relative; width:var(--bw); height:var(--bh);
  transform-style:preserve-3d;
  will-change:transform;
  box-shadow:0 34px 46px rgba(0,0,0,.55), 0 6px 14px rgba(0,0,0,.42);
}
.leaf{
  position:absolute; top:0; left:var(--pw);
  width:var(--pw); height:var(--bh);
  transform-origin:left center;
  transform-style:preserve-3d;
  will-change:transform;
}
.face{
  position:absolute; inset:0;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  overflow:hidden;
  border-radius:3px 10px 10px 3px;
}
.face.back{ transform:rotateY(180deg); border-radius:10px 3px 3px 10px; }

/* fore-edges: gilt page block + stamps peeking */
.fore{
  position:absolute; top:5%; height:90%; width:12px; z-index:1;
  background:repeating-linear-gradient(180deg,#e9dcbf 0 1.5px,#c9b892 1.5px 3px);
  pointer-events:none;
}
.fore--r{ right:-11px; border-radius:0 4px 4px 0;
  background:repeating-linear-gradient(180deg,#eaddc0 0 1.5px,#c9b892 1.5px 3px);
  box-shadow:inset -2px 0 4px rgba(0,0,0,.25); }
.fore--l{ left:-11px; border-radius:4px 0 0 4px;
  background:repeating-linear-gradient(180deg,#e4d6b6 0 1.5px,#c3b18a 1.5px 3px);
  box-shadow:inset 2px 0 4px rgba(0,0,0,.25); }
.fore .tick{ position:absolute; right:2px; width:7px; height:5px; border-radius:1px; opacity:.7 }
.fore .tick.a{ top:26%; background:var(--red) }
.fore .tick.b{ top:48%; background:var(--stgold) }
.fore .tick.c{ top:70%; background:var(--sage) }

/* ---------- cream page ---------- */
.face--cream{ background:var(--cream); }
.paper{
  position:absolute; inset:0; z-index:0;
  background:
    linear-gradient(90deg, var(--cream-2), var(--cream) 12%, var(--cream) 88%, var(--cream-2)),
    var(--cream);
}
.paper::after{
  content:""; position:absolute; inset:0;
  background:var(--grain); background-size:120px 120px;
  opacity:.05; mix-blend-mode:multiply;
}
.guilloche{
  position:absolute; inset:0; z-index:1; pointer-events:none;
  background-image:var(--guilloche); background-size:190px 190px;
  opacity:.5; mix-blend-mode:multiply;
  -webkit-mask-image:linear-gradient(#000,#000);
}
.gutter{
  position:absolute; top:0; bottom:0; width:20%; z-index:2; pointer-events:none;
}
.face--L .gutter{ right:0; background:linear-gradient(90deg,transparent, rgba(58,44,20,.20)); }
.face--R .gutter{ left:0; background:linear-gradient(270deg,transparent, rgba(58,44,20,.20)); }
.pinlight{
  position:absolute; inset:0; z-index:2; pointer-events:none;
  background:radial-gradient(120% 80% at 50% 8%, rgba(255,251,240,.5), transparent 46%);
  mix-blend-mode:screen; opacity:.5;
}
.shade{
  position:absolute; inset:0; z-index:8; pointer-events:none; opacity:0;
  /* hairline page-curl shadow hard against the gutter + a soft turn wash, so a
     turning leaf reads as paper bending into the spine rather than a flat plane */
  background:
    linear-gradient(90deg, rgba(0,0,0,.55) 0, rgba(0,0,0,0) 2.4%),
    linear-gradient(90deg, rgba(0,0,0,.30), rgba(0,0,0,0) 55%);
}
.face--L .shade{ background:
    linear-gradient(270deg, rgba(0,0,0,.55) 0, rgba(0,0,0,0) 2.4%),
    linear-gradient(270deg, rgba(0,0,0,.30), rgba(0,0,0,0) 55%); }
.folio{
  position:absolute; bottom:14px; z-index:5;
  font-family:'Roboto Mono',monospace; font-size:10px; letter-spacing:.14em;
  color:var(--ink-faint);
}
.face--L .folio{ left:26px } .face--R .folio{ right:26px }

.page-body{
  position:absolute; inset:0; z-index:4;
  padding:min(6.2%,42px);
  display:flex; flex-direction:column;
  min-width:0;
}

/* ---------- cover ---------- */
.face--cover{
  background:
    radial-gradient(130% 120% at 50% 16%, #262c42 0%, var(--navy) 44%, var(--navy-2) 78%, var(--navy-3) 100%);
  border-radius:3px 12px 12px 3px;
}
.face--cover::after{
  content:""; position:absolute; inset:0; opacity:.5; mix-blend-mode:soft-light;
  background:var(--grain); background-size:120px 120px;
}
.cover-body{ position:absolute; inset:0; z-index:2;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:8% 10%; }
.cover-frame{
  position:absolute; inset:22px; border:1px solid rgba(201,162,74,.45);
  border-radius:6px;
  box-shadow:inset 0 0 0 4px rgba(201,162,74,.10), inset 0 0 0 5px rgba(201,162,74,.28);
  z-index:1; pointer-events:none;
}
.cover-frame::after{
  content:""; position:absolute; inset:7px; border:1px solid rgba(201,162,74,.22); border-radius:3px;
}
.cover-top,.cover-bottom{
  font-family:'Roboto Mono',monospace; font-size:clamp(8px,1.05vw,12px);
  letter-spacing:.42em; text-indent:.42em;
  color:var(--gold-lt);
}
.cover-top{ margin-bottom:auto }
.cover-bottom{ margin-top:auto }
.cover-emblem{ position:relative; width:min(26%,148px); aspect-ratio:1; margin:2px auto 20px;
  filter:drop-shadow(0 2px 1px rgba(0,0,0,.6)) drop-shadow(0 -1px 0 rgba(231,205,134,.4)); }
.cover-emblem .star .foil-lt{ fill:var(--gold-hi) }
/* a single specular glint travels the foil star as the passport is issued (load) */
.cover-emblem::after{
  content:""; position:absolute; inset:-14%; z-index:3; pointer-events:none;
  mix-blend-mode:screen;
  background:linear-gradient(114deg,
    transparent 40%, rgba(255,246,216,0) 46%, rgba(255,247,220,.9) 50%, rgba(255,246,216,0) 54%, transparent 60%);
  transform:translateX(-115%);
  animation:foilSweep 1.5s cubic-bezier(.35,.1,.2,1) .85s 1 both;
}
@keyframes foilSweep{
  0%{ transform:translateX(-115%); opacity:0 }
  18%{ opacity:1 }
  82%{ opacity:1 }
  100%{ transform:translateX(115%); opacity:0 }
}
.is-reduced .cover-emblem::after{ display:none }
@media (prefers-reduced-motion: reduce){ .cover-emblem::after{ display:none } }
.cover-word{
  font-family:'Playfair Display',serif; font-weight:600;
  font-size:clamp(20px,3.5vw,40px); letter-spacing:.24em; text-indent:.24em;
  background:linear-gradient(180deg,#f3dfa4,#c9a24a 42%,#8a6526 62%,#e7cd86);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  filter:drop-shadow(0 1px 0 rgba(0,0,0,.5)) drop-shadow(0 -1px 0 rgba(247,225,164,.35));
}
.cover-sub{
  margin-top:14px; font-style:italic; color:rgba(216,196,138,.82);
  font-size:clamp(11px,1.3vw,15px); letter-spacing:.06em;
}
.cover-chip{
  width:44px; height:32px; margin:24px auto 0; border-radius:5px;
  background:linear-gradient(135deg,#d8c48a,#8a6526);
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.35);
  position:relative; opacity:.9;
}
.cover-chip::before{ content:""; position:absolute; inset:6px 8px;
  background:
   linear-gradient(90deg,transparent 45%,rgba(20,20,20,.5) 45% 55%,transparent 55%),
   linear-gradient(0deg,transparent 40%,rgba(20,20,20,.5) 40% 60%,transparent 60%);
}

/* ---------- shared type ---------- */
.star{ width:100%; height:100%; display:block }
.star .foil-lt{ fill:var(--gold-lt) } .star .foil-dk{ fill:var(--gold-dk) }
.lbl{
  font-family:'Roboto Mono',monospace; font-size:10px; letter-spacing:.26em;
  text-transform:uppercase; color:var(--ink-faint);
}
.rule{ height:1px; background:linear-gradient(90deg,transparent,rgba(138,101,38,.5),transparent); border:0; margin:0; }
.sig{ font-family:'Sacramento',cursive; color:var(--gold-dk); font-size:30px; line-height:.7; }
.mrz{
  font-family:'Roboto Mono',monospace; font-weight:500;
  letter-spacing:.06em; color:#3b352c;
  background:linear-gradient(180deg,#efe5cd,#e7dabc);
  border-top:1px solid rgba(138,101,38,.35); border-bottom:1px solid rgba(138,101,38,.35);
  padding:9px 4px; border-radius:3px; overflow:hidden;
}
.mrz div{ white-space:nowrap; font-size:clamp(9px,1.15vw,13px); line-height:1.5; }

/* ---------- identity spread ---------- */
.idL{ position:relative; height:100%; display:flex; flex-direction:column; align-items:center; text-align:center; }
.watermark{ position:absolute; inset:0; display:grid; place-items:center; z-index:0; opacity:.08; }
.watermark .star{ width:74%; }
.idL .crest{ width:84px; aspect-ratio:1; margin-top:6px; z-index:1;
  filter:drop-shadow(0 2px 2px rgba(80,60,20,.3)); }
.motto-en{ margin-top:14px; z-index:1;
  font-family:'Roboto Mono',monospace; font-size:11px; letter-spacing:.24em; color:var(--gold-dk); }
.motto-th{ margin-top:12px; z-index:1;
  font-family:'Noto Serif Thai',serif; font-weight:500; line-height:1.45;
  font-size:clamp(15px,2vw,21px); color:var(--ink); max-width:24ch; }
.idL .spacer{ flex:1 }
.issue-grid{ z-index:1; width:100%; display:grid; grid-template-columns:1fr 1fr; gap:12px 18px;
  border-top:1px solid rgba(138,101,38,.3); padding-top:16px; margin-top:auto; text-align:left; }
.issue-grid dt{ font-family:'Roboto Mono',monospace; font-size:9px; letter-spacing:.2em; color:var(--ink-faint); }
.issue-grid dd{ margin:2px 0 0; font-family:'Playfair Display',serif; font-size:18px; color:var(--ink); }

.idR{ height:100%; display:flex; flex-direction:column; }
.idR .top-fields{ display:grid; grid-template-columns:auto auto 1fr; gap:6px 20px; align-items:end; }
.idR .top-fields .v{ font-family:'Playfair Display',serif; font-size:20px; }
.bearer-label{ margin-top:26px }
.bearer{ margin-top:10px; font-size:clamp(17px,2.3vw,24px); line-height:1.42;
  font-style:italic; color:#3d372e; }
.idR .sign{ margin-top:18px; display:flex; align-items:flex-end; gap:14px; }
.idR .sign .line{ flex:1; border-bottom:1px solid rgba(138,101,38,.5); padding-bottom:4px; }
.idR .sign .sig{ transform:rotate(-3.5deg); transform-origin:0 100%; margin-bottom:-2px; }
.idR .fill{ flex:1 }
/* an engraved endorsement earns the space under the signature: a faint intaglio
   seal + hairline rule + microtext, so the lower page reads as issued, not empty */
.idR .official{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:11px; text-align:center; }
.idR .official .off-seal{ width:64px; height:64px; opacity:.11; }
.idR .official .off-rule{ width:56%; height:1px;
  background:linear-gradient(90deg,transparent,rgba(138,101,38,.55),transparent); }
.idR .official .off-micro{ margin:0; max-width:32ch; text-transform:uppercase;
  font-family:'Roboto Mono',monospace; font-size:9px; letter-spacing:.2em; line-height:1.65; color:var(--ink-faint); }
.idR .mrz{ margin-top:auto }

/* ---------- visa spreads ---------- */
.visaL{ height:100%; display:flex; flex-direction:column; }
.visa-top{ display:flex; justify-content:space-between; align-items:baseline; }
.visa-top .k{ font-family:'Playfair Display',serif; font-weight:700; font-size:clamp(22px,3vw,34px);
  letter-spacing:.16em; color:var(--gold-dk); }
.visa-arch{ margin-top:4px; text-align:center;
  font-family:'Roboto Mono',monospace; font-size:10px; letter-spacing:.3em; color:var(--ink-soft); }
.visa-portrait{ position:relative; width:112px; height:132px; margin:20px auto 4px;
  border:1px solid rgba(138,101,38,.55); border-radius:3px; overflow:hidden;
  display:grid; place-items:center; background:linear-gradient(180deg,#efe6cf,#e6d9ba); }
.visa-portrait .g{ position:absolute; inset:0; background-image:var(--guilloche); background-size:150px;
  opacity:.7; mix-blend-mode:multiply; }
.visa-portrait .star{ width:64%; position:relative; opacity:.9;
  filter:drop-shadow(0 1px 1px rgba(80,60,20,.35)); }
.visa-cat{ text-align:center; margin-top:12px;
  font-family:'Playfair Display',serif; font-size:clamp(16px,2vw,21px); letter-spacing:.04em; }
.visa-fields{ margin:16px 0 0; display:grid; grid-template-columns:1fr 1fr; gap:11px 16px; }
.visa-fields dt{ font-family:'Roboto Mono',monospace; font-size:9px; letter-spacing:.16em; color:var(--ink-faint); }
.visa-fields dd{ margin:2px 0 0; font-size:15px; color:var(--ink); }
.visaL .mrz{ margin-top:auto }

.visaR{ height:100%; display:flex; flex-direction:column; position:relative; }
.stamp-zone{ position:relative; height:44%; display:grid; place-items:center; }
.cond-label{ text-align:center }
.cond-copy{ margin-top:12px; font-size:clamp(16px,2.1vw,21px); line-height:1.5; color:#3d372e; }
.cond-foot{ margin-top:auto; display:flex; justify-content:space-between; align-items:flex-end; }
.cond-foot .stamp-mini{ width:74px; height:74px; opacity:.9; transform:rotate(-9deg) }
.cond-foot .sig{ transform:rotate(-2.5deg); transform-origin:0 100%; margin-top:8px; }

/* ---------- stamps (svg) ---------- */
.stamp{ opacity:0; mix-blend-mode:multiply; }
.stamp svg{ display:block; width:100%; height:100% }
.ink-red .ink{ stroke:var(--red); color:var(--red) }
.ink-sage .ink{ stroke:var(--sage); color:var(--sage) }
.ink-gold .ink{ stroke:var(--stgold); color:var(--stgold) }
.stamp .arc{ font-family:'Roboto Mono',monospace; font-weight:500; letter-spacing:.14em; }
.stamp-circle{ width:min(58%,190px); aspect-ratio:1 }
.stamp-rect{ width:min(72%,240px); aspect-ratio:220/150 }
.stamp-river{ width:min(60%,196px); aspect-ratio:1 }
.stamp-bleed{ position:absolute; inset:0; filter:blur(1.4px); opacity:.28 }

/* thud animation */
.face.is-open .stamp{ animation:thud .5s cubic-bezier(.2,1.5,.4,1) both; }
.face.is-open .stamp{ animation-delay:var(--d,0s) }
@keyframes thud{
  0%{ opacity:0; transform:scale(1.42) rotate(calc(var(--jr,0deg) - 10deg)); filter:blur(2.2px) }
  55%{ opacity:1; transform:scale(.97) rotate(calc(var(--jr,0deg) + 1.5deg)); filter:blur(.2px) }
  100%{ opacity:1; transform:scale(1) rotate(var(--jr,0deg)); filter:blur(0) }
}

/* ---------- entry stamps (yimwhan) ---------- */
.entryL{ height:100%; display:flex; flex-direction:column; }
.entry-head{ text-align:left }
.entry-title{ margin-top:6px; font-family:'Playfair Display',serif; font-size:clamp(22px,2.8vw,30px); }
.entry-copy{ margin-top:10px; font-size:clamp(14px,1.7vw,17px); line-height:1.5; color:#403a30; max-width:44ch; }
.stamp-field{ position:relative; flex:1; margin-top:8px; }
.rstamp{ position:absolute; width:41%; aspect-ratio:1; mix-blend-mode:multiply; opacity:0;
  --jr:0deg; }
.rstamp.a{ left:2%; top:4%; --jr:-9deg; --d:.02s } .rstamp.a .ring{ border-color:var(--red); color:var(--red) }
.rstamp.b{ right:4%; top:26%; --jr:7deg; --d:.14s } .rstamp.b .ring{ border-color:var(--stgold); color:var(--stgold) }
.rstamp.c{ left:16%; bottom:2%; --jr:-4deg; --d:.26s } .rstamp.c .ring{ border-color:var(--red); color:var(--red) }
.face.is-open .rstamp{ animation:thud .5s cubic-bezier(.2,1.5,.4,1) both; animation-delay:var(--d) }
.ring{ position:absolute; inset:0; border:2.5px solid; border-radius:50%; text-align:center;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-family:'Roboto Mono',monospace; box-shadow:inset 0 0 0 4px transparent, inset 0 0 0 5px currentColor; }
.ring::before{ content:""; position:absolute; inset:9px; border:1px solid currentColor; border-radius:50%; opacity:.7 }
.ring .yr{ font-size:12px; letter-spacing:.14em; opacity:.85 }
.ring .lb{ font-weight:700; font-size:clamp(11px,1.5vw,15px); letter-spacing:.08em; margin:3px 0; }
.ring .sb{ font-size:9px; letter-spacing:.1em; opacity:.8 }

/* ---------- clinic photo page ---------- */
.photoR{ height:100%; display:flex; flex-direction:column; }
.photo-frame{ position:relative; flex:1; min-height:0; margin:2px 0 12px;
  background:#22252e; border:1px solid rgba(138,101,38,.4);
  display:grid; place-items:center; overflow:hidden; border-radius:2px; }
.photo-frame img{ max-width:100%; max-height:100%; width:auto; height:auto; object-fit:contain; display:block; }
.photo-frame .corner{ position:absolute; width:20px; height:20px; border:2px solid var(--gold-pale); opacity:.75 }
.corner.tl{ top:7px; left:7px; border-right:0; border-bottom:0 }
.corner.tr{ top:7px; right:7px; border-left:0; border-bottom:0 }
.corner.bl{ bottom:7px; left:7px; border-right:0; border-top:0 }
.corner.br{ bottom:7px; right:7px; border-left:0; border-top:0 }
.photo-over{ position:absolute; right:-6px; bottom:-6px; width:96px; height:96px; opacity:0;
  mix-blend-mode:multiply; --jr:-12deg; }
.face.is-open .photo-over{ animation:thud .5s cubic-bezier(.2,1.5,.4,1) both; animation-delay:.18s }
.photo-cap{ font-family:'EB Garamond',serif; font-style:italic; color:#443c30; font-size:15px }
.photo-perf{ margin-top:8px; font-family:'Roboto Mono',monospace; font-size:9px; letter-spacing:.24em;
  color:var(--ink-faint); border-top:1px dashed rgba(138,101,38,.45); padding-top:8px; }

/* ---------- endorsements ---------- */
.endorse{ height:100%; display:flex; flex-direction:column; gap:6px; }
.endorse-head{ margin-bottom:8px }
.endo{ display:flex; gap:16px; align-items:flex-start; padding:14px 0; border-top:1px solid rgba(138,101,38,.28); }
.endo:first-of-type{ border-top:0 }
.endo .seal{ flex:0 0 auto; width:64px; height:64px; opacity:0; mix-blend-mode:multiply; --jr:-6deg; }
.face.is-open .endo .seal{ animation:thud .5s cubic-bezier(.2,1.5,.4,1) both; }
.endo:nth-of-type(1) .seal{ animation-delay:.04s } .endo:nth-of-type(2) .seal{ animation-delay:.16s; --jr:5deg }
.endo .txt{ min-width:0 }
.endo .t{ font-family:'Playfair Display',serif; font-size:clamp(17px,2vw,21px); }
.endo .d{ margin-top:5px; font-size:15px; line-height:1.45; color:#433c30; }

/* ---------- back cover spread ---------- */
.backL{ height:100%; display:flex; flex-direction:column; }
.about-copy{ margin-top:12px; font-size:clamp(16px,2.1vw,21px); line-height:1.5; color:#3d372e; }

/* pointer discipline: stage passes through except real controls on the

.stage,.mstage{ pointer-events:none }

}

function hypo(cx,cy,A,B,D,steps){ let p=''; for(let i=0;i<=steps;i++){ const t=i/steps*2*Math.PI;

}
function makeGrain(){

      <div><dt>VALIDITY</dt><dd>PERPETUAL</dd></div>
      <div><dt>STATUS</dt><dd>IN PRODUCTION</dd></div>
    </dl>
    <div class="mrz"><div>${mrzEsc(sv.mrz)}</div></div>
  </div>`; }

function visa_R(sv){ let s; if(sv.kind==='circle')s=stampCircle(sv); else if(sv.kind==='rect')s=stampRect(sv); else s=stampRiver(sv);
  return `
  <div class="visaR">
    <div class="stamp-zone">${s}</div>
    <div class="lbl cond-label">CONDITIONS OF ENTRY</div>
    <div class="cond-copy">${sv.copy}</div>
    <div class="cond-foot">
      <div><div class="lbl">ENDORSING OFFICER</div><div class="sig">V. Werk</div></div>
      <div class="stamp-mini">${STAR}</div>
    </div>
  </div>`; }

function entry_L(){ const w=DATA.work; const cls=['a','b','c'];
  const stamps=w.stamps.map((s,i)=>`
    <div class="rstamp ${cls[i]}"><div class="ring"><span class="yr">${s.yr}</span><span class="lb">${s.lb}</span><span class="sb">${s.sb}</span></div></div>`).join('');
  return `
  <div class="entryL">
    <div class="lbl entry-head">SELECTED WORK . ENTRY RECORD</div>
    <div class="entry-title">${w.title}</div>
    <div class="entry-copy">${w.copy}</div>
    <div class="stamp-field">${stamps}</div>
  </div>`; }

function photo_R(){ const w=DATA.work; return `
  <div class="photoR">
    <div class="lbl">ATTACHED PHOTOGRAPH</div>
    <div class="photo-frame">
      <img src="${w.photo}" alt="Dental clinic in production, Bangkok" loading="lazy" decoding="async">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      ${overStamp()}
    </div>
    <div class="photo-cap">${w.caption}</div>
    <div class="photo-perf">PHOTOGRAPH . DO NOT REMOVE</div>
  </div>`; }

function endo_page(items,head){
  const rows=items.map(p=>`
    <div class="endo">${seal(p.n)}<div class="txt"><div class="t">${p.t}</div><div class="d">${p.d}</div></div></div>`).join('');
  return `<div class="endorse">${head?`<div class="lbl endorse-head">OFFICIAL ENDORSEMENTS</div>`:''}${rows}</div>`; }

function back_L(){ return `
  <div class="backL">
    <div class="lbl">ABOUT THE BEARER</div>
    <div class="about-copy">${DATA.about}</div>
    <div class="c-city">${DATA.contact.city}</div>
    <div class="crest">${STAR}</div>
  </div>`; }

function back_R(){ return `
  <div class="backR">
    <div class="lbl">ENTRY GRANTED . CONTACT THE ISSUING OFFICE</div>
    <a class="cta" href="mailto:${DATA.contact.email}" style="margin-top:12px">Start a conversation</a>
    <a class="email-emboss" href="mailto:${DATA.contact.email}">${DATA.contact.email}</a>
    <button class="see-work" id="seeWork">See our work</button>
    <div class="spacer"></div>
    <div class="colophon">${DATA.colophon}</div>
    <div class="footer-mark"><span class="star-wrap">${STAR}</span><b>VESPERWERK</b> . ${DATA.contact.city} . ${DATA.footer}</div>
  </div>`; }

/* face registry (linear order = cover, then 7 spreads x 2) */
const BODY = {
  cover:{ type:'cover' },
  s1L:{ type:'cream', side:'L', folio:'i',  html:id_L },
  s1R:{ type:'cream', side:'R', folio:'ii', html:id_R },
  s2L:{ type:'cream', side:'L', folio:'01', html:()=>visa_L(DATA.services[0]) },
  s2R:{ type:'cream', side:'R', folio:'02', html:()=>visa_R(DATA.services[0]) },
  s3L:{ type:'cream', side:'L', folio:'03', html:()=>visa_L(DATA.services[1]) },
  s3R:{ type:'cream', side:'R', folio:'04', html:()=>visa_R(DATA.services[1]) },
  s4L:{ type:'cream', side:'L', folio:'05', html:()=>visa_L(DATA.services[2]) },
  s4R:{ type:'cream', side:'R', folio:'06', html:()=>visa_R(DATA.services[2]) },
  s5L:{ type:'cream', side:'L', folio:'07', html:entry_L },
  s5R:{ type:'cream', side:'R', folio:'08', html:photo_R },
  s6L:{ type:'cream', side:'L', folio:'09', html:()=>endo_page(DATA.principles.slice(0,2),true) },
  s6R:{ type:'cream', side:'R', folio:'10', html:()=>endo_page(DATA.principles.slice(2,4),false) },
  bcL:{ type:'cream', side:'L', folio:'11', html:back_L },
  bcR:{ type:'cream', side:'R', folio:'12', html:back_R },
};
const ORDER = ['cover','s1L','s1R','s2L','s2R','s3L','s3R','s4L','s4R','s5L','s5R','s6L','s6R','bcL','bcR'];

function makeFaceEl(id){
  const spec=BODY[id]; const el=document.createElement('div');
  el.dataset.fid=id;
  if(spec.type==='cover'){ el.className='face face--cover'; el.innerHTML=coverHTML(); return el; }
  el.className='face face--cream face--'+spec.side;
  el.innerHTML=
    '<div class="paper"></div><div class="guilloche"></div><div class="gutter"></div><div class="pinlight"></div>'+
    '<div class="page-body">'+spec.html()+'</div>'+
    '<div class="folio">'+(spec.folio||'')+'</div><div class="shade"></div>';
  return el;
}
function makeNavyEl(){ const el=document.createElement('div'); el.className='face face--navy'; return el; }

/* ============================================================
   STATE + LAYOUT
   ============================================================ */
const mqMobile = matchMedia('(max-width:760px)');
const mqReduce = matchMedia('(prefers-reduced-motion: reduce)');
let mode = mqMobile.matches ? 'm' : 'd';
let reduce = mqReduce.matches;
if(reduce) document.documentElement.classList.add('is-reduced');

const scene=document.getElementById('scene');
const holder=document.getElementById('stageHolder');
const spacer=document.getElementById('spacer');
const shimmer=document.getElementById('shimmer');
const hint=document.getElementById('hint');
const indName=document.getElementById('indName');
const indCount=document.getElementById('indCount');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');

let leaves=[], mpages=[], bookEl=null, mstageEl=null, lastShift=null;
let bookW=960,bookH=640,pageW=480, mcw=380,mch=520;
let spacerH=1;
const DESK_SPREADS=7;                 // k in [1..7]
const MOB_LAST=ORDER.length-1;        // 14
let entranceStart=performance.now(), entranceDone=reduce, entranceProg=reduce?1:0;
const ENT_HOLD=320, ENT_DUR=1900;   /* beat on the foil cover, then a weighted swing */
let lastSettled=-1;
let mouseX=0.5, mouseY=0.44, shimmerOn=false;

document.documentElement.style.setProperty('--guilloche', makeGuilloche());
document.documentElement.style.setProperty('--grain', makeGrain());

function buildStructure(){
  holder.innerHTML=''; leaves=[]; mpages=[]; bookEl=null; mstageEl=null; lastShift=null;
  if(mode==='d'){
    const stage=document.createElement('div'); stage.className='stage';
    const book=document.createElement('div'); book.className='book'; bookEl=book;
    for(let i=0;i<8;i++){
      const leaf=document.createElement('div'); leaf.className='leaf';
      const frontId=ORDER[2*i]; const backId=ORDER[2*i+1];
      const front=makeFaceEl(frontId); front.classList.add('front');
      const back = backId? makeFaceEl(backId) : makeNavyEl(); back.classList.add('back');
      leaf.appendChild(front); leaf.appendChild(back);
      book.appendChild(leaf);
      leaves.push({el:leaf, front, back, index:i, shades:[front.querySelector('.shade'),back.querySelector('.shade')].filter(Boolean)});
    }
    const foreR=document.createElement('div'); foreR.className='fore fore--r';
    foreR.innerHTML='<span class="tick a"></span><span class="tick b"></span><span class="tick c"></span>';
    const foreL=document.createElement('div'); foreL.className='fore fore--l';
    book.appendChild(foreL); book.appendChild(foreR);
    stage.appendChild(book); holder.appendChild(stage);
  } else {
    const mstage=document.createElement('div'); mstage.className='mstage'; mstageEl=mstage;
    ORDER.forEach((id,i)=>{
      const p=makeFaceEl(id); p.classList.add('mpage'); p.style.zIndex=String(ORDER.length-i);
      mstage.appendChild(p);
      mpages.push({el:p, index:i, shade:p.querySelector('.shade')});
    });
    holder.appendChild(mstage);
  }
  bindInFace();
  layout();
}

function bindInFace(){
  const sw=document.getElementById('seeWork');
  if(sw) sw.addEventListener('click',()=>goToSpread(5));
}

function layout(){
  const vw=window.innerWidth, vh=window.innerHeight;
  if(mode==='d'){
    bookH=Math.min(vh*0.80, 660); bookW=bookH*1.44;
    const maxW=vw*0.94; if(bookW>maxW){ bookW=maxW; bookH=bookW/1.44; }
    pageW=bookW/2;
    document.documentElement.style.setProperty('--bw',bookW+'px');
    document.documentElement.style.setProperty('--bh',bookH+'px');
    document.documentElement.style.setProperty('--pw',pageW+'px');
    const perTurn=vh*0.9; spacerH=vh + (DESK_SPREADS-1)*perTurn;
  } else {
    mcw=Math.min(vw*0.90, 420); mch=Math.min(mcw*1.42, vh*0.84);
    document.documentElement.style.setProperty('--mcw',mcw+'px');
    document.documentElement.style.setProperty('--mch',mch+'px');
    const perTurn=vh*0.82; spacerH=vh + (MOB_LAST-1)*perTurn;
  }
  spacer.style.height=spacerH+'px';
}

/* ============================================================
   RENDER LOOP
   ============================================================ */
function scrollProgress(){
  const scrollable=Math.max(1, spacerH - window.innerHeight);
  return clamp(window.scrollY/scrollable, 0, 1);
}
function setOpen(faceEls){
  document.querySelectorAll('.face.is-open').forEach(f=>f.classList.remove('is-open'));
  void document.body.offsetWidth;
  faceEls.forEach(f=>{ if(f) f.classList.add('is-open'); });
}
function renderDesktop(k){
  const shift=-(pageW/2)*(1-clamp(k,0,1));
  if(shift!==lastShift){ lastShift=shift; bookEl.style.transform='translateX('+shift+'px)'; }
  for(const lf of leaves){
    let prog=clamp(k-lf.index,0,1);
    if(reduce) prog=prog>=0.5?1:0;
    if(prog===lf.prog) continue;   /* memo: settled leaves cost nothing per frame */
    lf.prog=prog;
    lf.el.style.transform='rotateY('+(-180*prog)+'deg)';
    let z; if(prog<=0.001) z=20-lf.index; else if(prog>=0.999) z=20+lf.index; else z=60;
    lf.el.style.zIndex=String(z);
    const o=reduce?0:(Math.sin(prog*Math.PI)*0.6);
    lf.shades.forEach(s=>s.style.opacity=o.toFixed(3));
  }
  const sp=clamp(Math.round(k),1,DESK_SPREADS);
  if(sp!==lastSettled){
    lastSettled=sp;
    setOpen([leaves[sp-1] && leaves[sp-1].back, leaves[sp] && leaves[sp].front]);
    indName.textContent=SPREAD_NAMES[sp-1];
    indCount.textContent=String(sp).padStart(2,'0')+' / 0'+DESK_SPREADS;
    prevBtn.disabled=(sp<=1); nextBtn.disabled=(sp>=DESK_SPREADS);
  }
}
function renderMobile(mi){
  for(const mp of mpages){
    let prog=clamp(mi-mp.index,0,1);
    if(reduce) prog=prog>=0.5?1:0;
    if(prog===mp.prog) continue;
    mp.prog=prog;
    mp.el.style.transform='rotateY('+(-180*prog)+'deg)';
    let z; if(prog<=0.001) z=20-mp.index; else if(prog>=0.999) z=20+mp.index; else z=60;
    mp.el.style.zIndex=String(z);
    if(mp.shade) mp.shade.style.opacity=reduce?0:(Math.sin(prog*Math.PI)*0.5).toFixed(3);
  }
  const si=clamp(Math.round(mi),1,MOB_LAST);
  if(si!==lastSettled){
    lastSettled=si;
    setOpen([mpages[si] && mpages[si].el]);
    const spr=Math.max(1,Math.ceil(si/2));
    indName.textContent=SPREAD_NAMES[clamp(spr-1,0,SPREAD_NAMES.length-1)];
    indCount.textContent=String(si).padStart(2,'0')+' / '+MOB_LAST;
    prevBtn.disabled=(si<=1); nextBtn.disabled=(si>=MOB_LAST);
  }
}
function frame(now){
  if(!entranceDone){
    let t=(now-entranceStart-ENT_HOLD)/ENT_DUR;
    if(t<0) t=0;
    if(t>=1){ t=1; entranceDone=true; }
    entranceProg=easeInOutCubic(t);
  }
  const p=scrollProgress();
  if(mode==='d'){
    const k = entranceDone ? (1 + p*(DESK_SPREADS-1)) : entranceProg;
    renderDesktop(k);
  } else {
    const mi = entranceDone ? (1 + p*(MOB_LAST-1)) : entranceProg;
    renderMobile(mi);
  }
  if(shimmerOn && !reduce){
    shimmer.style.setProperty('--sx',(mouseX*100).toFixed(1)+'%');
    shimmer.style.setProperty('--sy',(mouseY*100).toFixed(1)+'%');
  }
  requestAnimationFrame(frame);
}

/* ============================================================
   NAV: scroll / keyboard / swipe / arrows
   ============================================================ */
function currentIndex(){
  const p=scrollProgress();
  if(mode==='d') return Math.round(entranceDone?(1+p*(DESK_SPREADS-1)):1);
  return Math.round(entranceDone?(1+p*(MOB_LAST-1)):1);
}
function yForTarget(target){
  const scrollable=Math.max(1, spacerH-window.innerHeight);
  if(mode==='d'){ const pp=clamp((target-1)/(DESK_SPREADS-1),0,1); return pp*scrollable; }
  const pp=clamp((target-1)/(MOB_LAST-1),0,1); return pp*scrollable;
}
let tween=null;
function smoothTo(y){
  if(tween) cancelAnimationFrame(tween);
  const start=window.scrollY, dist=y-start, t0=performance.now(), dur=reduce?0:600;
  if(dur===0){ window.scrollTo(0,y); return; }
  (function step(now){
    const t=clamp((now-t0)/dur,0,1); const e=1-Math.pow(1-t,3);
    window.scrollTo(0, start+dist*e);
    if(t<1) tween=requestAnimationFrame(step);
  })(t0);
}
function nav(delta){ const max=(mode==='d')?DESK_SPREADS:MOB_LAST;
  const next=clamp(currentIndex()+delta,1,max); smoothTo(yForTarget(next)); dismissHint(); }
function goToSpread(sp){
  if(mode==='d'){ smoothTo(yForTarget(clamp(sp,1,DESK_SPREADS))); }
  else { smoothTo(yForTarget(clamp(sp*2-1,1,MOB_LAST))); }
  dismissHint();
}
prevBtn.addEventListener('click',()=>nav(-1));
nextBtn.addEventListener('click',()=>nav(1));
window.addEventListener('keydown',e=>{
  if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){ e.preventDefault(); nav(1); }
  else if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){ e.preventDefault(); nav(-1); }
  else if(e.key==='Home'){ e.preventDefault(); smoothTo(0); }
  else if(e.key==='End'){ e.preventDefault(); smoothTo(yForTarget((mode==='d')?DESK_SPREADS:MOB_LAST)); }
});
let tsx=0,tsy=0,tst=0;
window.addEventListener('touchstart',e=>{ const t=e.changedTouches[0]; tsx=t.clientX; tsy=t.clientY; tst=Date.now(); },{passive:true});
window.addEventListener('touchend',e=>{ const t=e.changedTouches[0]; const dx=t.clientX-tsx, dy=t.clientY-tsy;
  if(Math.abs(dx)>52 && Math.abs(dx)>Math.abs(dy)*1.4 && (Date.now()-tst)<600){ nav(dx<0?1:-1); }
},{passive:true});

let hintGone=false;
function dismissHint(){ if(hintGone) return; hintGone=true; hint.style.opacity='0'; }
window.addEventListener('scroll',()=>{ if(window.scrollY>20) dismissHint(); },{passive:true});
window.addEventListener('mousemove',e=>{
  if(reduce) return;
  mouseX=e.clientX/window.innerWidth; mouseY=e.clientY/window.innerHeight;
  if(!shimmerOn){ shimmerOn=true; shimmer.style.opacity='1'; }
});

/* resize + mode switch */
let rT=null;
window.addEventListener('resize',()=>{
  clearTimeout(rT);
  rT=setTimeout(()=>{
    const nm=mqMobile.matches?'m':'d';
    if(nm!==mode){ mode=nm; lastSettled=-1; buildStructure(); }
    else layout();
  },160);
});

/* boot */
buildStructure();
requestAnimationFrame(frame);
if(reduce){ hint.textContent='USE THE ARROWS OR SCROLL TO PAGE THROUGH'; }
</script>
</body>
</html>
