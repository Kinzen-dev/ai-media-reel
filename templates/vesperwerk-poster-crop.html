<!-- TEMPLATE: Vesperwerk Poster Crop | ARCHETYPE: Continental poster-scale crop (one giant letterform re-crops per section) | REF: Swiss/Continental poster tradition (A2-SW, HK), Studio Feixen bold-type homepages | WHEN TO USE: a founder-led studio site that wants a single audacious typographic signature and a scroll-linked reveal | SWAP: edit the DATA object at the top of the script -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vesperwerk : Software and AI Studio, Bangkok</title>
<meta name="description" content="Vesperwerk is an independent software and AI studio in Bangkok. We architect, build, and operate production systems for businesses that cannot afford them to fail.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --charcoal:#241f1b;
    --charcoal-2:#1c1815;
    --gold:#a8802f;
    --gold-lite:#c09a4a;
    --gold-dark:#8a6526;
    --cream:#faf7f1;
    --cream-dim:rgba(250,247,241,.62);
    --line:rgba(192,154,74,.32);
    --serif:"Playfair Display",Georgia,"Times New Roman",serif;
    --sans:"Inter",-apple-system,"Helvetica Neue",Arial,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,"SFMono-Regular",Menlo,monospace;
    --pad:clamp(14px,2vw,24px);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{overflow-x:clip;scroll-behavior:auto;background:var(--charcoal)}
  body{
    background:var(--charcoal);
    color:var(--cream);
    font-family:var(--sans);
    font-size:16px;line-height:1.5;
    overflow-x:clip;
    -webkit-font-smoothing:antialiased;
  }
  img,svg{display:block;max-width:100%}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  a{color:inherit;text-decoration:none}
  .min0,.copy>*,.svc,.appr{min-width:0}
  ::selection{background:var(--gold);color:var(--charcoal)}

  /* ---------- fixed stage : the one transformed plate ---------- */
  .stage{position:fixed;inset:0;overflow:hidden;z-index:0;background:var(--charcoal)}
  #plate{
    position:absolute;top:0;left:0;
    width:4300px;height:2100px;max-width:none;
    transform-origin:0 0;
    will-change:transform;
    backface-visibility:hidden;
  }
  #plate text{font-family:var(--serif);font-weight:600}

  /* ---------- atmosphere overlays (static, cheap) ---------- */
  .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(130% 120% at 50% 42%,transparent 40%,rgba(12,10,8,.55) 100%)}
  .grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.42;mix-blend-mode:soft-light;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    background-size:180px 180px}

  /* ---------- fixed cream corner label ---------- */
  .corner{
    position:fixed;top:0;left:0;z-index:20;
    max-width:min(90vw,360px);
    padding:clamp(12px,1.6vw,18px) clamp(14px,1.8vw,22px) clamp(11px,1.4vw,15px);
    background:linear-gradient(155deg,rgba(28,24,20,.94),rgba(24,20,17,.86));
    border-right:1px solid var(--line);
    border-bottom:1px solid var(--line);
    box-shadow:0 18px 46px -26px rgba(0,0,0,.9);
    animation:stamp .7s cubic-bezier(.2,.72,.24,1.18) both;
  }
  @keyframes stamp{from{opacity:0;transform:translate(-6px,-6px) scale(1.05)}to{opacity:1;transform:none}}
  .mark{display:flex;align-items:center;gap:9px}
  .mark svg{width:17px;height:17px;flex:0 0 auto}
  .wordmark{font-family:var(--serif);font-weight:600;font-size:clamp(13px,1.35vw,16px);
    letter-spacing:.24em;color:var(--cream);white-space:nowrap}
  nav{display:flex;flex-wrap:wrap;gap:2px 14px;margin-top:11px}
  nav button{
    font-family:var(--sans);font-size:10.5px;font-weight:500;letter-spacing:.16em;
    text-transform:uppercase;color:var(--cream-dim);padding:2px 0;position:relative;
    transition:color .25s;
  }
  nav button::after{content:"";position:absolute;left:0;right:100%;bottom:0;height:1px;
    background:var(--gold-lite);transition:right .3s ease}
  nav button:hover,nav button:focus-visible{color:var(--cream)}
  nav button.is-active{color:var(--gold-lite)}
  nav button.is-active::after{right:0}
  .micro{margin-top:10px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;
    color:rgba(192,154,74,.82);font-variant-numeric:tabular-nums;white-space:nowrap}

  /* ---------- scroll sections ---------- */
  main{position:relative;z-index:10}
  section{position:relative;min-height:100svh;min-height:100vh}
  .copy{position:absolute;z-index:11}

  .plate-card{
    background:linear-gradient(160deg,rgba(28,24,20,.9),rgba(22,19,16,.95));
    border:1px solid var(--line);
    box-shadow:0 26px 60px -34px rgba(0,0,0,.95);
    padding:clamp(18px,2vw,26px);
  }
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--gold-lite);display:flex;align-items:center;gap:9px;margin-bottom:14px}
  .eyebrow::before{content:"";width:22px;height:1px;background:var(--gold);flex:0 0 auto}

  /* hero positioning (bottom right) */
  #s0 .copy{right:clamp(20px,4vw,58px);bottom:clamp(28px,6vh,64px);
    width:min(430px,80vw);text-align:right}
  .lede{font-family:var(--serif);font-weight:500;font-size:clamp(19px,2.05vw,25px);
    line-height:1.32;color:var(--cream)}
  .cta{display:flex;gap:12px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:.08em;
    padding:11px 18px;border:1px solid var(--gold);color:var(--cream);
    transition:background .25s,color .25s}
  .btn.primary{background:var(--gold);color:var(--charcoal)}
  .btn:hover,.btn:focus-visible{background:var(--gold-lite);color:var(--charcoal);border-color:var(--gold-lite)}
  .hint{margin-top:16px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--cream-dim)}

  /* services (right column, 3 blocks in the negative space beside the E) */
  #s1 .copy{right:clamp(20px,4vw,64px);top:50%;transform:translateY(-50%);width:min(452px,52vw)}
  .svc{display:grid;grid-template-columns:auto 1fr;gap:0 16px;padding:16px 0;
    border-top:1px solid var(--line)}
  .svc:last-child{border-bottom:1px solid var(--line)}
  .svc-n{font-family:var(--mono);font-size:11px;color:var(--gold-lite);letter-spacing:.1em;
    padding-top:5px}
  .svc-t{font-family:var(--serif);font-weight:600;font-size:clamp(17px,1.5vw,20px);color:var(--cream)}
  .svc-d{font-size:13.5px;line-height:1.5;color:var(--cream-dim);margin-top:6px}

  /* work (case card on the right, beside the K) */
  #s2 .copy{right:clamp(20px,4vw,64px);top:50%;transform:translateY(-50%);width:min(440px,52vw)}
  .work-media{width:100%;aspect-ratio:16/9;overflow:hidden;background:#100d0b;
    border:1px solid var(--line);margin-bottom:16px}
  .work-media img{width:100%;height:100%;object-fit:cover}
  .work-t{font-family:var(--serif);font-weight:600;font-size:clamp(22px,2.1vw,28px);color:var(--cream)}
  .work-tag{display:inline-block;font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--gold-lite);border:1px solid var(--line);
    padding:4px 9px;margin-left:10px;vertical-align:middle}
  .work-d{font-size:14px;line-height:1.6;color:var(--cream-dim);margin-top:12px}

  /* approach (4 principles riding the star point) */
  #s3 .copy{right:clamp(20px,5vw,86px);top:50%;transform:translateY(-50%);width:min(430px,50vw)}
  .appr{display:grid;grid-template-columns:auto 1fr;gap:0 15px;padding:13px 0;
    border-bottom:1px solid var(--line)}
  .appr:first-of-type{border-top:1px solid var(--line)}
  .appr-n{font-family:var(--mono);font-size:11px;color:var(--gold-lite);padding-top:4px}
  .appr-t{font-family:var(--serif);font-weight:600;font-size:clamp(16px,1.45vw,19px);color:var(--cream)}
  .appr-d{font-size:13px;line-height:1.5;color:var(--cream-dim);margin-top:4px}

  /* contact (whole-word reveal payoff : centered block below the mark) */
  #s4 .copy{left:50%;transform:translateX(-50%);bottom:clamp(30px,7vh,72px);
    width:min(720px,92vw);text-align:center}
  .about{font-family:var(--serif);font-weight:500;font-size:clamp(16px,1.65vw,20px);
    line-height:1.5;color:var(--cream);max-width:56ch;margin:0 auto 20px}
  .thai{font-family:var(--serif);font-size:clamp(15px,1.5vw,18px);line-height:1.5;
    color:var(--gold-lite);margin-bottom:22px}
  .contact-row{display:flex;flex-wrap:wrap;gap:10px 26px;justify-content:center;align-items:center;
    margin-bottom:20px}
  .contact-row a{font-family:var(--mono);font-size:13px;letter-spacing:.04em;color:var(--cream);
    border-bottom:1px solid var(--line);padding-bottom:2px}
  .contact-row a:hover,.contact-row a:focus-visible{color:var(--gold-lite);border-color:var(--gold-lite)}
  .contact-row span{font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--cream-dim)}
  .foot{display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
    padding-top:16px;border-top:1px solid var(--line);
    font-family:var(--sans);font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--cream-dim)}
  .foot svg{width:14px;height:14px}
  .foot .fw{font-family:var(--serif);font-weight:600;letter-spacing:.22em;color:var(--cream)}

  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}

  /* ================= MOBILE : re-authored, bottom cards ================= */
  @media (max-width:700px){
    .corner{max-width:calc(100vw - 0px)}
    .wordmark{letter-spacing:.2em;font-size:13px}
    nav{gap:2px 11px}
    nav button{font-size:9.5px;letter-spacing:.13em}
    #s0 .copy,#s1 .copy,#s2 .copy,#s3 .copy,#s4 .copy{
      left:12px;right:12px;bottom:14px;top:auto;transform:none;width:auto;text-align:left}
    #s0 .copy{text-align:left}
    .cta{justify-content:flex-start}
    #s1 .copy,#s2 .copy,#s3 .copy,#s4 .copy{
      background:linear-gradient(160deg,rgba(28,24,20,.9),rgba(20,17,14,.96));
      border:1px solid var(--line);padding:16px 15px;border-radius:2px;
      max-height:70svh;overflow:auto}
    #s0 .copy{background:linear-gradient(160deg,rgba(28,24,20,.82),rgba(20,17,14,.9));
      border:1px solid var(--line);padding:16px 15px;border-radius:2px}
    .lede{font-size:18px}
    .about{text-align:left;margin:0 0 16px}
    .thai{text-align:left}
    .contact-row{justify-content:flex-start}
    .foot{justify-content:flex-start}
    .work-t{font-size:22px}
  }

  @media (prefers-reduced-motion:reduce){
    .corner{animation:none}
    #plate{transition:none}
  }
</style>
</head>
<body>
  <div class="stage" aria-hidden="true">
    <svg id="plate" viewBox="0 0 4300 2100" role="img" aria-label="Giant cropped letterforms of the word WERK with the Vesperwerk star">
      <defs>
        <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
          <stop offset="0" stop-color="#6f4f1c"/>
          <stop offset="0.34" stop-color="#a8802f"/>
          <stop offset="0.62" stop-color="#a8802f"/>
          <stop offset="1" stop-color="#cea75a"/>
        </linearGradient>
      </defs>
      <!-- the word WERK, one giant lockup, letters at authored x positions -->
      <g fill="url(#gold)">
        <text x="120" y="1650" font-size="1000">W</text>
        <text x="1300" y="1650" font-size="1000">E</text>
        <text x="2050" y="1650" font-size="1000">R</text>
        <text x="3000" y="1650" font-size="1000">K</text>
      </g>
      <!-- vesper star, two-facet antique gold, hovering above the word -->
      <g transform="translate(1900,470) scale(5)">
        <g><polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/><polygon points="0,-86 11,0 0,0" fill="#8a6526"/></g>
        <g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="#8a6526"/><polygon points="0,-86 11,0 0,0" fill="#c09a4a"/></g>
        <g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/><polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/></g>
        <g transform="rotate(270)"><polygon points="0,-64 -9.5,0 0,0" fill="#8a6526"/><polygon points="0,-64 9.5,0 0,0" fill="#c09a4a"/></g>
        <g transform="rotate(45)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
        <g transform="rotate(135)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
        <g transform="rotate(225)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
        <g transform="rotate(315)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
      </g>
    </svg>
  </div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <header class="corner">
    <div class="mark">
      <svg viewBox="0 0 200 200" aria-hidden="true"><g transform="translate(100,100)">
        <g><polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/><polygon points="0,-86 11,0 0,0" fill="#8a6526"/></g>
        <g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="#8a6526"/><polygon points="0,-86 11,0 0,0" fill="#c09a4a"/></g>
        <g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/><polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/></g>
        <g transform="rotate(270)"><polygon points="0,-64 -9.5,0 0,0" fill="#8a6526"/><polygon points="0,-64 9.5,0 0,0" fill="#c09a4a"/></g>
        <g transform="rotate(45)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
        <g transform="rotate(135)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
        <g transform="rotate(225)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
        <g transform="rotate(315)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
      </g></svg>
      <span class="wordmark">VESPERWERK</span>
    </div>
    <nav id="nav" aria-label="Section crops"></nav>
    <div class="micro" id="micro">CROP 01 / 05 &nbsp;&middot;&nbsp; SCALE 1.0x</div>
  </header>

  <main>
    <section id="s0" data-i="0">
      <div class="copy">
        <h1 class="lede" id="lede"></h1>
        <div class="cta">
          <button class="btn primary" data-go="4" id="cta1"></button>
          <button class="btn" data-go="2" id="cta2"></button>
        </div>
        <div class="hint" id="hint">Scroll : the crop is the story</div>
      </div>
    </section>

    <section id="s1" data-i="1">
      <div class="copy plate-card">
        <div class="eyebrow">Services</div>
        <div id="svc-list"></div>
      </div>
    </section>

    <section id="s2" data-i="2">
      <div class="copy plate-card">
        <div class="eyebrow">Selected work</div>
        <div class="work-media"><img id="work-img" alt="" loading="lazy" decoding="async"></div>
        <div><span class="work-t" id="work-t"></span><span class="work-tag" id="work-tag"></span></div>
        <p class="work-d" id="work-d"></p>
      </div>
    </section>

    <section id="s3" data-i="3">
      <div class="copy plate-card">
        <div class="eyebrow">Approach</div>
        <div id="appr-list"></div>
      </div>
    </section>

    <section id="s4" data-i="4">
      <div class="copy plate-card">
        <div class="eyebrow" style="justify-content:center">About Vesperwerk</div>
        <p class="about" id="about"></p>
        <p class="thai" id="thai"></p>
        <div class="contact-row">
          <a id="email" href="#"></a>
          <span id="loc"></span>
        </div>
        <div class="foot">
          <svg viewBox="0 0 200 200" aria-hidden="true"><g transform="translate(100,100)">
            <g><polygon points="0,-86 -11,0 0,0" fill="#c09a4a"/><polygon points="0,-86 11,0 0,0" fill="#8a6526"/></g>
            <g transform="rotate(180)"><polygon points="0,-86 -11,0 0,0" fill="#8a6526"/><polygon points="0,-86 11,0 0,0" fill="#c09a4a"/></g>
            <g transform="rotate(90)"><polygon points="0,-64 -9.5,0 0,0" fill="#c09a4a"/><polygon points="0,-64 9.5,0 0,0" fill="#8a6526"/></g>
            <g transform="rotate(270)"><polygon points="0,-64 -9.5,0 0,0" fill="#8a6526"/><polygon points="0,-64 9.5,0 0,0" fill="#c09a4a"/></g>
            <g transform="rotate(45)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
            <g transform="rotate(135)"><polygon points="0,-44 -7.5,0 0,0" fill="#c09a4a"/><polygon points="0,-44 7.5,0 0,0" fill="#8a6526"/></g>
            <g transform="rotate(225)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
            <g transform="rotate(315)"><polygon points="0,-44 -7.5,0 0,0" fill="#8a6526"/><polygon points="0,-44 7.5,0 0,0" fill="#c09a4a"/></g>
          </g></svg>
          <span class="fw">VESPERWERK</span>
          <span id="foot-loc"></span>
          <span id="foot-copy"></span>
        </div>
      </div>
    </section>
  </main>

  <script>
  /* ============================ DATA (swap here) ============================ */
  const DATA = {
    wordmark:"VESPERWERK",
    nav:[
      {label:"Hero",i:0},{label:"Services",i:1},{label:"Work",i:2},
      {label:"Approach",i:3},{label:"Contact",i:4}
    ],
    hero:{
      positioning:"An independent software and AI studio. We architect, build, and operate production systems for businesses that cannot afford them to fail.",
      ctaPrimary:"Start a conversation",
      ctaSecondary:"See our work",
      hint:"Scroll : the crop is the story"
    },
    services:[
      {n:"01",t:"AI Systems",d:"Voice agents, LLM assistants, and the evaluation infrastructure that keeps them honest. AI that answers like your best employee, in production, around the clock."},
      {n:"02",t:"Product Engineering",d:"Full-stack product engineering from architecture to operations: event-driven backends, modern web frontends, and infrastructure that scales without drama."},
      {n:"03",t:"Commerce and Platforms",d:"Deep Shopify and LINE platform work: storefronts, admin apps, integrations, and the messaging rails Southeast Asian commerce runs on."}
    ],
    work:{
      tag:"In production",
      t:"Yimwhan AI",
      d:"An AI voice and LINE assistant for dental clinics in Thailand. It answers after-hours calls, books and reschedules appointments, and hands off to staff the moment a human matters. In production at live clinics.",
      img:"../assets/flux-clinic.png",
      alt:"Interior of a dental clinic in mint and warm wood tones"
    },
    approach:[
      {n:"01",t:"Architecture first",d:"We design the system before we write the code."},
      {n:"02",t:"Production-worthy",d:"Demos impress; production endures. We build for the second one."},
      {n:"03",t:"Scope discipline",d:"The most valuable thing we tell clients is what not to build."},
      {n:"04",t:"Senior hands",d:"No juniors learning on your budget. Founder-led, senior hands on every line."}
    ],
    about:"Vesperwerk takes its name from the evening star: the first light you can navigate by. We are a founder-led studio in Bangkok building software for businesses across Asia and beyond.",
    contact:{
      email:"kittipong.k@vesperwerk.com",
      location:"Bangkok, Thailand",
      thai:"ดาวประจำเมือง : แสงแรกที่ใช้นำทางยามค่ำ"
    },
    footer:{location:"Bangkok, Thailand", copy:"(c) 2026 Vesperwerk"}
  };

  /* ==================== CROP KEYFRAMES (artboard coords) ====================
     Each crop = a focus rect {cx,cy,fw,fh}. At render we cover-fit it into the
     viewport (scale = max(vw/fw, vh/fh)) and translate its center to the viewport
     centre. One transformed element (#plate). Authored per breakpoint. */
  const CROPS_DESKTOP = [
    {cx:1500,cy:1150,fw:560,fh:600},    /* 0 hero    : giant E interior, bleeds edges   */
    {cx:1980,cy:1290,fw:1600,fh:1000},  /* 1 services: E on the left, blocks in the void */
    {cx:3450,cy:1290,fw:1500,fh:1100},  /* 2 work    : the K, diagonal leg, card right   */
    {cx:1900,cy:430, fw:1150,fh:1000},  /* 3 approach: the star point                    */
    {cx:1890,cy:1000,fw:4100,fh:2300}   /* 4 contact : whole word revealed, centered     */
  ];
  const CROPS_MOBILE = [
    {cx:1470,cy:1250,fw:300, fh:640},   /* 0 hero    : E stem + counter, portrait bleed  */
    {cx:1600,cy:1250,fw:900, fh:1500},  /* 1 services                                    */
    {cx:3330,cy:1200,fw:1000,fh:1500},  /* 2 work                                        */
    {cx:1900,cy:500, fw:900, fh:1350},  /* 3 approach                                     */
    {cx:1890,cy:1150,fw:3900,fh:8500}   /* 4 contact : whole word, width-bound, centered */
  ];

  /* ============================ populate copy ============================ */
  (function fill(){
    document.getElementById("lede").textContent = DATA.hero.positioning;
    document.getElementById("cta1").textContent = DATA.hero.ctaPrimary;
    document.getElementById("cta2").textContent = DATA.hero.ctaSecondary;
    document.getElementById("hint").textContent = DATA.hero.hint;

    const nav = document.getElementById("nav");
    DATA.nav.forEach(n=>{
      const b=document.createElement("button");
      b.textContent=n.label; b.dataset.i=n.i;
      b.setAttribute("aria-label","Jump to "+n.label+" crop");
      nav.appendChild(b);
    });

    const svc=document.getElementById("svc-list");
    DATA.services.forEach(s=>{
      const el=document.createElement("div"); el.className="svc";
      el.innerHTML='<div class="svc-n">'+s.n+'</div><div class="min0"><div class="svc-t"></div><div class="svc-d"></div></div>';
      el.querySelector(".svc-t").textContent=s.t;
      el.querySelector(".svc-d").textContent=s.d;
      svc.appendChild(el);
    });

    const img=document.getElementById("work-img");
    img.src=DATA.work.img; img.alt=DATA.work.alt;
    document.getElementById("work-t").textContent=DATA.work.t;
    document.getElementById("work-tag").textContent=DATA.work.tag;
    document.getElementById("work-d").textContent=DATA.work.d;

    const ap=document.getElementById("appr-list");
    DATA.approach.forEach(a=>{
      const el=document.createElement("div"); el.className="appr";
      el.innerHTML='<div class="appr-n">'+a.n+'</div><div class="min0"><div class="appr-t"></div><div class="appr-d"></div></div>';
      el.querySelector(".appr-t").textContent=a.t;
      el.querySelector(".appr-d").textContent=a.d;
      ap.appendChild(el);
    });

    document.getElementById("about").textContent=DATA.about;
    document.getElementById("thai").textContent=DATA.contact.thai;
    const em=document.getElementById("email");
    em.textContent=DATA.contact.email; em.href="mailto:"+DATA.contact.email;
    document.getElementById("loc").textContent=DATA.contact.location;
    document.getElementById("foot-loc").textContent=DATA.footer.location;
    document.getElementById("foot-copy").textContent=DATA.footer.copy;
  })();

  /* ============================ crop engine ============================ */
  const plate=document.getElementById("plate");
  const micro=document.getElementById("micro");
  const navBtns=[...document.querySelectorAll("#nav button")];
  const RM=matchMedia("(prefers-reduced-motion: reduce)").matches;
  const N=CROPS_DESKTOP.length;

  let VW=innerWidth, VH=innerHeight, CROPS=CROPS_DESKTOP, MINS=1;

  function metrics(){
    VW=window.innerWidth; VH=window.innerHeight;
    CROPS = matchMedia("(max-width:700px)").matches ? CROPS_MOBILE : CROPS_DESKTOP;
    MINS = Math.min.apply(null, CROPS.map(c=>Math.max(VW/c.fw, VH/c.fh)));
  }
  const clamp=(v,a,b)=>v<a?a:v>b?b:v;
  const lerp=(a,b,t)=>a+(b-a)*t;
  const smooth=t=>t*t*(3-2*t);

  function cropAt(seq){
    const i=clamp(Math.floor(seq),0,N-1);
    if(i>=N-1) return CROPS[N-1];
    const a=CROPS[i], b=CROPS[i+1], t=smooth(seq-i);
    return {cx:lerp(a.cx,b.cx,t),cy:lerp(a.cy,b.cy,t),fw:lerp(a.fw,b.fw,t),fh:lerp(a.fh,b.fh,t)};
  }
  function render(seq, offx, offy){
    const c=cropAt(seq);
    const s=Math.max(VW/c.fw, VH/c.fh);
    const tx=VW/2 - c.cx*s + (offx||0);
    const ty=VH/2 - c.cy*s + (offy||0);
    plate.style.transform="translate3d("+tx.toFixed(2)+"px,"+ty.toFixed(2)+"px,0) scale("+s.toFixed(4)+")";
    return s;
  }
  let lastLabel="";
  function label(seq, s){
    const idx=clamp(Math.round(seq),0,N-1);
    const disp=(s/MINS);
    const str="CROP "+String(idx+1).padStart(2,"0")+" / 05  ·  SCALE "+disp.toFixed(1)+"x";
    if(str!==lastLabel){ micro.textContent=str; lastLabel=str; }
    navBtns.forEach((b,k)=>b.classList.toggle("is-active", k===idx));
  }

  function maxScroll(){ return Math.max(1, document.documentElement.scrollHeight - VH); }
  function targetSeq(){ return clamp(window.scrollY / maxScroll() * (N-1), 0, N-1); }

  /* ---------------- reduced motion : IntersectionObserver jumps ---------------- */
  if(RM){
    metrics();
    let curIdx=0;
    const setIdx=(i)=>{ curIdx=i; const s=render(i,0,0); label(i,s); };
    setIdx(0);
    const secs=[...document.querySelectorAll("section")];
    const io=new IntersectionObserver((entries)=>{
      let best=null;
      entries.forEach(e=>{ if(e.isIntersecting && (!best||e.intersectionRatio>best.intersectionRatio)) best=e; });
      if(best){ const i=+best.target.dataset.i; if(i!==curIdx) setIdx(i); }
    },{threshold:[.2,.4,.6,.8]});
    secs.forEach(s=>io.observe(s));
    const jump=(i)=>window.scrollTo(0, i/(N-1)*maxScroll());
    navBtns.forEach(b=>b.addEventListener("click",()=>jump(+b.dataset.i)));
    document.querySelectorAll("[data-go]").forEach(b=>b.addEventListener("click",()=>jump(+b.dataset.go)));
    let rt; addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(()=>{metrics();setIdx(curIdx);},150)},{passive:true});
  } else {
  /* ---------------- full motion : one rAF loop ---------------- */
    metrics();
    const st={seq:targetSeq(), px:0, py:0};
    let ptx=0, pty=0;
    let entering = window.scrollY < 8;
    let eStart=0;
    const ENTER_MS=1800;
    const easeOutBack=t=>{const c1=1.70158,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);};

    // pointer parallax (few px, screen space)
    addEventListener("pointermove",(e)=>{
      if(e.pointerType==="touch") return;
      ptx=(e.clientX/VW-0.5)*-22;
      pty=(e.clientY/VH-0.5)*-15;
    },{passive:true});
    addEventListener("pointerleave",()=>{ptx=0;pty=0;});

    let running=true;
    function loop(now){
      if(!running) return;
      let enterOff=0;
      if(entering){
        if(!eStart) eStart=now;
        let t=(now-eStart)/ENTER_MS;
        if(t>=1){ t=1; entering=false; st.seq=targetSeq(); }
        else st.seq=0;
        enterOff=(1-easeOutBack(clamp(t,0,1)))*(VW*0.85);
      }else{
        st.seq += (targetSeq()-st.seq)*0.16;
      }
      st.px += (ptx-st.px)*0.08;
      st.py += (pty-st.py)*0.08;
      const s=render(st.seq, st.px+enterOff, st.py);
      label(st.seq, s);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
    document.addEventListener("visibilitychange",()=>{
      if(document.hidden){ running=false; }
      else if(!running){ running=true; requestAnimationFrame(loop); }
    });

    // nav / cta : fast confident glide (scroll tween)
    let tween=null;
    const easeInOut=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
    function glideTo(i){
      const from=window.scrollY, to=i/(N-1)*maxScroll(), start=performance.now(), dur=680;
      if(tween) cancelAnimationFrame(tween);
      (function step(n){
        let t=clamp((n-start)/dur,0,1);
        window.scrollTo(0, from+(to-from)*easeInOut(t));
        if(t<1) tween=requestAnimationFrame(step); else tween=null;
      })(start);
    }
    const stopTween=()=>{ if(tween){cancelAnimationFrame(tween);tween=null;} };
    ["wheel","touchstart","keydown"].forEach(ev=>addEventListener(ev,stopTween,{passive:true}));
    navBtns.forEach(b=>b.addEventListener("click",()=>glideTo(+b.dataset.i)));
    document.querySelectorAll("[data-go]").forEach(b=>b.addEventListener("click",()=>glideTo(+b.dataset.go)));

    let rt; addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(metrics,150)},{passive:true});
  }
  </script>
</body>
</html>
