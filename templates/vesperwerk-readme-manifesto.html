<style>

  }
  *{box-sizing:border-box;}
  html,body{max-width:100%;overflow-x:hidden;}
  html{font-size:15px;background:var(--cream);-webkit-text-size-adjust:100%;}
  body{

  }

  .status .true{color:var(--gold-dk);}
  .toggle{
    flex:none;position:relative;overflow:hidden;
    font-family:var(--mono);font-size:.82rem;font-weight:500;
    color:var(--ink);background:transparent;
    border:1px solid var(--hair);border-radius:3px;
    padding:.34rem .7rem;cursor:pointer;
    letter-spacing:.02em;line-height:1;
    transition:border-color .18s ease,background .18s ease,color .18s ease;
    white-space:nowrap;
  }
  .toggle .brk{color:var(--gold);}
  .toggle:hover{border-color:var(--gold);background:rgba(168,128,47,.07);}
  .toggle:active{transform:translateY(1px);}
  .toggle[aria-pressed="true"]{border-color:var(--gold);background:rgba(168,128,47,.10);color:var(--gold-dk);}
  /* one-time flip advertisement: a gold underline sweep after the doc settles */
  .toggle::after{
    content:"";position:absolute;left:0;bottom:0;height:2px;width:100%;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    transform:translateX(-101%);opacity:0;pointer-events:none;
  }
  .toggle.advertise::after{animation:tgSweep 1.1s ease 1 both;}
  @keyframes tgSweep{
    0%{transform:translateX(-101%);opacity:0;}
    18%{opacity:1;}
    82%{opacity:1;}
    100%{transform:translateX(101%);opacity:0;}
  }

  /* ---------- page column ---------- */
  .page{width:100%;padding:0 var(--pad);}
  .doc{width:min(100%,var(--col));margin:0 auto;position:relative;}
  .doc::before{
    content:"";position:absolute;top:1.6rem;bottom:1.6rem;left:-1.15rem;width:1px;
    background:linear-gradient(var(--hair),rgba(168,128,47,.28),var(--hair));
  }
  #rendered{padding:2.43rem 0 1.2rem;}
  #raw{padding:2.43rem 0 1.2rem;display:none;}
  [data-view="raw"] #rendered{display:none;}
  [data-view="raw"] #raw{display:block;}
  .js-anim [data-view="raw"] #raw{animation:viewIn .26s ease both;}
  .js-anim [data-view="rendered"] #rendered{animation:viewIn .26s ease both;}
  @keyframes viewIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}

  /* ---------- block reveal scaffold ---------- */
  .block{position:relative;margin:1.62rem 0;}
  .block .peek{display:none;}
  .block .resolved{position:relative;z-index:1;}
  .js-anim .block .peek{
    display:block;position:absolute;inset:0;z-index:2;
    opacity:1;transition:opacity .34s ease;pointer-events:none;overflow:hidden;
  }
  .js-anim .block .peek pre{
    margin:0;font-family:var(--mono);font-size:.9rem;line-height:var(--line);
    color:var(--faint);white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;
  }
  .js-anim .block .resolved{opacity:0;transform:translateY(7px);
    transition:opacity .5s ease .12s,transform .5s ease .12s;}
  .js-anim .block.in .peek{opacity:0;}
  .js-anim .block.in .resolved{opacity:1;transform:none;}
  /* H1 is the signature: always visible, ghost handled separately */
  .js-anim .block[data-kind="h1"] .peek{display:none;}
  .js-anim .block[data-kind="h1"] .resolved{opacity:1;transform:none;}

  /* ---------- markdown comment (bilingual epigraph) ---------- */

  .md-comment .ctext{color:var(--muted);}

  .t-fence{color:var(--gold-dk);font-weight:500;}
  .t-fm{color:var(--gold);letter-spacing:.3ch;}
  .t-hash{color:var(--gold);font-weight:500;}
  .t-htext{color:var(--ink);font-weight:500;}
  .t-q{color:var(--gold);font-weight:500;}
  .t-key{color:var(--gold-dk);}
  .t-colon{color:var(--gold);}
  .t-mk{color:var(--gold);}
  .t-lt{color:var(--ink);}
  .t-url{color:var(--gold-dk);}
  .t-bold{font-weight:700;}

  /* ---------- colophon ---------- */
  .stars{text-align:center;color:var(--faint);letter-spacing:.8ch;margin:2.6rem 0 1.1rem;font-size:.9rem;}
  .colophon{
    width:min(100%,var(--col));margin:0 auto;padding:0 var(--pad) 3rem;
    text-align:center;color:var(--muted);font-size:.8rem;letter-spacing:.02em;

  /* ---------- mobile ---------- */
  @media (max-width:640px){
    html{font-size:13px;}
    :root{--col:42ch;--pad:1.05rem;}
    .doc::before{display:none;}
    .bar{gap:1.2ch;padding-top:.55rem;padding-bottom:.55rem;}
    .status{white-space:normal;overflow:visible;font-size:.78rem;}
    .doc-h1{gap:.4ch;}
    .doc-h1 .wordmark{font-size:clamp(1.9rem,10vw,2.4rem);}
    .h1-ghost{font-size:1.2rem;top:-.5rem;}
    .js-anim .doc-h1 .h1-ghost{animation-name:ghostDissolveSm;}
    .doc-p{max-width:none;}
    .fig-frame img{max-height:52vh;}
    .frontmatter{padding:1.2rem 1rem;}
  }
  @keyframes ghostDissolveSm{
    0%{opacity:.85;transform:translateY(.85rem);letter-spacing:.02em;}
    60%{opacity:.46;}
    100%{opacity:.28;transform:none;letter-spacing:.06em;}
  }

  /* ---------- reduced motion ---------- */
  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:none !important;}
    .h1-ghost{opacity:.28 !important;filter:none !important;}
    .block .resolved{opacity:1 !important;transform:none !important;}
    .block .peek{display:none !important;}
    .toggle{transition:none !important;}
  }
</style>

/* ===================== helpers ===================== */
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function slug(s){return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
function isThai(s){return /[฀-๿]/.test(s);}

function inline(raw){
  var s = esc(raw);
  s = s.replace(/`([^`]+)`/g,'<code class="ic">$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');
  return s;
}

/* inline highlighter for raw/peek views (keeps the marks visible) */
function inlineHL(raw){
  var e = esc(raw);
  e = e.replace(/(\[)([^\]]*)(\])(\()([^)]*)(\))/g,
    '<span class="t-mk">[</span><span class="t-lt">$2</span><span class="t-mk">]</span><span class="t-mk">(</span><span class="t-url">$5</span><span class="t-mk">)</span>');
  e = e.replace(/(\*\*)([^*]+)(\*\*)/g,
    '<span class="t-mk">**</span><span class="t-bold">$2</span><span class="t-mk">**</span>');
  return e;
}
function hl(line){
  if(line === '') return '';
  if(/^\s*<!--/.test(line)){
    var thai = isThai(line) ? ' thai' : '';
    return '<span class="t-com'+thai+'">'+esc(line)+'</span>';
  }
  if(/^```/.test(line)) return '<span class="t-fence">'+esc(line)+'</span>';
  if(/^---\s*$/.test(line)) return '<span class="t-fm">'+esc(line)+'</span>';
  var h = line.match(/^(#{1,6})(\s+)(.*)$/);
  if(h) return '<span class="t-hash">'+h[1]+'</span>'+h[2]+'<span class="t-htext">'+esc(h[3])+'</span>';
  if(/^>\s?/.test(line)){
    var r = line.replace(/^>\s?/,'');
    return '<span class="t-q">&gt;</span> '+inlineHL(r);
  }
  if(/^!\[/.test(line)){
    var im = line.match(/^!\[([^\]]*)\]\(([^)]*)\)\s*$/);
    if(im) return '<span class="t-mk">![</span><span class="t-lt">'+esc(im[1])+'</span><span class="t-mk">](</span><span class="t-url">'+esc(im[2])+'</span><span class="t-mk">)</span>';
  }
  var k = line.match(/^([A-Za-z0-9_-]+)(:)(\s+)(.*)$/);
  if(k) return '<span class="t-key">'+k[1]+'</span><span class="t-colon">:</span>'+k[3]+inlineHL(k[4]);
  return inlineHL(line);
}

/* ===================== block renderers ===================== */
function renderComment(ln){
  var m = ln.match(/<!--\s*([\s\S]*?)\s*-->/);
  var t = m ? m[1] : '';
  var thai = isThai(t) ? ' thai' : '';
  return '<div class="md-comment"><span class="cmk">&lt;!--</span> <span class="ctext'+thai+'">'+esc(t)+'</span> <span class="cmk">--&gt;</span></div>';
}
function renderHeading(level, text){
  if(level === 1){
    var id1 = slug(text);
    return '<h1 id="'+id1+'" class="doc-h1">'
      + '<span class="h1-ghost" aria-hidden="true"># '+esc(text)+'</span>'
      + '<span class="hash" aria-hidden="true">#</span>'
      + '<span class="wordmark">'+esc(text)+'</span>'
      + '<a class="anchor" href="#'+id1+'" aria-label="Link to '+esc(text)+'">#</a></h1>';
  }
  var id = slug(text);
  var hashes = level === 2 ? '##' : '###';
  return '<h'+level+' id="'+id+'" class="doc-h'+level+'">'
    + '<span class="hash" aria-hidden="true">'+hashes+'</span>'
    + '<span class="htext">'+esc(text)+'</span>'
    + '<a class="anchor" href="#'+id+'" aria-label="Link to '+esc(text)+'">#</a></h'+level+'>';
}
function renderPara(lines){
  var joined = lines.join(' ');
  var cls = /mailto:/.test(joined) ? 'doc-p doc-cta' : 'doc-p';
  return '<p class="'+cls+'">'+inline(joined)+'</p>';
}
function qline(t){
  var idx = t.indexOf(': ');
  if(idx > 0){
    return '<span class="q-mk" aria-hidden="true">&gt;</span>'
      + '<strong class="q-name">'+esc(t.slice(0,idx))+'</strong><span class="q-sep">:</span> '
      + esc(t.slice(idx+2));
  }
  return '<span class="q-mk" aria-hidden="true">&gt;</span>'+inline(t);
}
function renderQuote(lines){
  var inner = lines.map(function(l){
    var t = l.replace(/^>\s?/,'');
    return '<span class="q-line">'+qline(t)+'</span>';
  }).join('');
  return '<blockquote class="doc-quote">'+inner+'</blockquote>';
}
function codeLine(l){
  var m = l.match(/^(\s*)([A-Za-z0-9_-]+)(:)(.*)$/);
  if(m) return m[1]+'<span class="y-key">'+esc(m[2])+'</span><span class="y-colon">:</span><span class="y-val">'+esc(m[4])+'</span>';
  return esc(l);
}
function renderCode(cb, lang){
  var inner = cb.slice(1, cb.length-1);
  var body = inner.map(codeLine).join('\n');
  return '<div class="codeblock"><div class="code-bar">'
    + '<span class="code-lang">'+esc(lang||'code')+'</span>'
    + '<span class="code-dot">README.md</span></div>'
    + '<pre class="code-pre"><code>'+body+'</code></pre></div>';
}
function renderImage(ln){
  var m = ln.match(/^!\[([^\]]*)\]\(([^)]*)\)/);
  var alt = m ? m[1] : '', src = m ? m[2] : '';
  return '<figure class="doc-fig">'
    + '<figcaption class="fig-syntax" aria-hidden="true"><span class="t-mk">![</span>'+esc(alt)+'<span class="t-mk">](</span>'+esc(src)+'<span class="t-mk">)</span></figcaption>'
    + '<div class="fig-frame"><img src="'+esc(src)+'" alt="'+esc(alt)+'" loading="lazy" decoding="async"></div>'
    + '</figure>';
}
function renderFront(fm){
  var mid = fm.slice(1, fm.length-1);
  var rows = mid.map(function(l){
    var m = l.match(/^([A-Za-z0-9_-]+):\s*(.*)$/);
    if(!m) return '';
    var k = m[1], v = m[2], vhtml = esc(v);
    if(k === 'contact') vhtml = '<a href="mailto:'+esc(v)+'">'+esc(v)+'</a>';
    return '<div class="fm-row"><span class="fm-key">'+esc(k)+'</span><span class="fm-colon">:</span> <span class="fm-val">'+vhtml+'</span></div>';
  }).join('');
  return '<div class="frontmatter">'
    + '<div class="fm-delim" aria-hidden="true">---</div>'
    + '<div class="fm-brand">'+DATA.star+'<span class="fm-mark">Vesperwerk</span></div>'
    + rows
    + '<div class="fm-delim" aria-hidden="true">---</div></div>';
}

/* ===================== parser ===================== */
function parse(lines){
  var blocks = [], i = 0;
  while(i < lines.length){
    var ln = lines[i];
    if(ln.trim() === ''){ i++; continue; }
    if(/^\s*<!--/.test(ln)){ blocks.push({kind:'comment', raw:[ln], html:renderComment(ln)}); i++; continue; }
    if(/^---\s*$/.test(ln)){
      var fm = [ln]; i++;
      while(i < lines.length && !/^---\s*$/.test(lines[i])){ fm.push(lines[i]); i++; }
      if(i < lines.length){ fm.push(lines[i]); i++; }
      blocks.push({kind:'frontmatter', raw:fm, html:renderFront(fm)});
      continue;
    }
    if(/^```/.test(ln)){
      var cb = [ln]; var lang = ln.replace(/^```/,'').trim(); i++;
      while(i < lines.length && !/^```/.test(lines[i])){ cb.push(lines[i]); i++; }
      if(i < lines.length){ cb.push(lines[i]); i++; }
      blocks.push({kind:'code', raw:cb, html:renderCode(cb, lang)});
      continue;
    }
    var hm = ln.match(/^(#{1,3})\s+(.*)$/);
    if(hm){ blocks.push({kind:'h'+hm[1].length, raw:[ln], html:renderHeading(hm[1].length, hm[2])}); i++; continue; }
    if(/^!\[/.test(ln)){ blocks.push({kind:'image', raw:[ln], html:renderImage(ln)}); i++; continue; }
    if(/^>\s?/.test(ln)){
      var q = [];
      while(i < lines.length && /^>\s?/.test(lines[i])){ q.push(lines[i]); i++; }
      blocks.push({kind:'quote', raw:q.slice(), html:renderQuote(q)});
      continue;
    }
    var p = [];
    while(i < lines.length && lines[i].trim() !== '' &&
          !/^(#{1,3}\s|>\s?|```|!\[|---\s*$|\s*<!--)/.test(lines[i])){ p.push(lines[i]); i++; }
    blocks.push({kind:'para', raw:p.slice(), html:renderPara(p)});
  }
  return blocks;
}

/* ===================== build the DOM ===================== */
var SRC = DATA.source;
var LINES = SRC.length;
var renderedEl = document.getElementById('rendered');
var rawEl = document.getElementById('raw');
var statusEl = document.getElementById('status');
var toggle = document.getElementById('toggle');
var tgLabel = toggle.querySelector('.tg-label');
var reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;

/* rendered view */
var blocks = parse(SRC);
var frag = document.createDocumentFragment();
blocks.forEach(function(b){
  var sec = document.createElement('section');
  sec.className = 'block';
  sec.setAttribute('data-kind', b.kind);
  var peek = b.raw.map(hl).join('\n');
  sec.innerHTML = '<div class="peek" aria-hidden="true"><pre>'+peek+'</pre></div>'
    + '<div class="resolved">'+b.html+'</div>';
  frag.appendChild(sec);
});
renderedEl.appendChild(frag);

/* raw view */
var rawFrag = document.createDocumentFragment();
SRC.forEach(function(ln, idx){
  var row = document.createElement('div');
  row.className = 'rawrow' + (ln === '' ? ' blank' : '');
  row.innerHTML = '<span class="ln">'+(idx+1)+'</span><span class="rawcode">'+hl(ln)+'</span>';
  rawFrag.appendChild(row);
});
rawEl.appendChild(rawFrag);

/* ===================== status line ===================== */
var st = { count: 0, phase: 'rendering' };
function gridCol(){ return matchMedia('(max-width:640px)').matches ? '42ch' : '80ch'; }
function renderStatus(){
  var v = document.documentElement.getAttribute('data-view') || 'rendered';
  var verb = (v === 'raw') ? 'SOURCE' : (st.phase === 'rendering' ? 'RENDERING' : 'RENDERED');
  statusEl.innerHTML = '<span class="live">'+verb+'</span> README.md . '
    + st.count + ' LINES . GRID ' + gridCol() + ' <span class="true">(true)</span>';
}

/* ===================== view toggle ===================== */
function setView(v){
  document.documentElement.setAttribute('data-view', v);
  var raw = (v === 'raw');
  toggle.setAttribute('aria-pressed', raw ? 'true' : 'false');
  tgLabel.textContent = raw ? 'VIEW RENDERED' : 'VIEW SOURCE';
  renderStatus();
}
toggle.addEventListener('click', function(){
  var cur = document.documentElement.getAttribute('data-view') || 'rendered';
  setView(cur === 'raw' ? 'rendered' : 'raw');
});
document.addEventListener('keydown', function(e){
  if(e.defaultPrevented || e.metaKey || e.ctrlKey || e.altKey) return;
  var tag = (e.target && e.target.tagName) || '';
  if(tag === 'INPUT' || tag === 'TEXTAREA') return;
  if(e.key === 'v' || e.key === 'V'){
    var cur = document.documentElement.getAttribute('data-view') || 'rendered';
    setView(cur === 'raw' ? 'rendered' : 'raw');
  }
});
document.documentElement.setAttribute('data-view', 'rendered');

/* ===================== reveal + entrance ===================== */
window.addEventListener('resize', renderStatus);

if(reduce){
  Array.prototype.forEach.call(document.querySelectorAll('.block'), function(el){ el.classList.add('in'); });
  st.count = LINES; st.phase = 'rendered';
  renderStatus();
}else{
  document.documentElement.classList.add('js-anim');
  renderStatus();

  var allBlocks = Array.prototype.slice.call(document.querySelectorAll('.block'));

  /* line-by-line parse cascade on first paint: blocks already in view resolve in
     sequence, like a parser reaching each line; everything below reveals on scroll */
  var vh = window.innerHeight || document.documentElement.clientHeight;
  var initial = [], deferred = [];
  allBlocks.forEach(function(el){
    if(el.getBoundingClientRect().top < vh * 0.9) initial.push(el); else deferred.push(el);
  });
  var STEP = 85;
  initial.forEach(function(el, k){
    setTimeout(function(){ el.classList.add('in'); }, 90 + k * STEP);
  });

  /* IntersectionObserver reveals each remaining block as the parser "reaches" it */
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); }
    });
  }, { rootMargin: '0px 0px -8% 0px', threshold: 0.08 });
  deferred.forEach(function(el){ io.observe(el); });

  /* count the true line total up during the entrance (single, self-terminating rAF) */
  var start = null, DUR = 1400;
  function step(ts){
    if(start === null) start = ts;
    var p = Math.min(1, (ts - start) / DUR);
    var e = 1 - Math.pow(1 - p, 3);
    st.count = Math.round(e * LINES);
    st.phase = p < 1 ? 'rendering' : 'rendered';
    renderStatus();
    if(p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);

  /* advertise the view-source flip once, after the doc has settled */
  var settleT = Math.max(DUR, 90 + initial.length * STEP) + 260;
  setTimeout(function(){ toggle.classList.add('advertise'); }, settleT);
}
</script>
</body>
</html>
