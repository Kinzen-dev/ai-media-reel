<!-- TEMPLATE: Vesperwerk Trailer Cut | ARCHETYPE: The Trailer - rhythm as the design system | REF: studio trailer-cut act structure + Codrops cinematic-scroll pacing (Nov 2025) | WHEN TO USE: a brand or product story that wants a movie-trailer spine, where edit tempo per act carries the hierarchy | SWAP: edit the TRAILER data object at top of the script -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vesperwerk - Trailer Cut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Serif+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14110c;          /* cold-open ink */
    --ink-2:#2e2a26;        /* brand ink, text on cream */
    --cream:#faf7f1;        /* warm white ground */
    --cream-2:#f0e9dc;      /* softer cream */
    --gold:#a8802f;         /* antique gold */
    --gold-l:#c09a4a;       /* light facet */
    --gold-d:#8a6526;       /* dark facet */
    --on-ink-soft:rgba(240,233,220,.60);
    --on-cream-soft:rgba(46,42,38,.58);
    --hair-ink:rgba(46,42,38,.16);
    --hair-cream:rgba(250,247,241,.20);
    --ease:cubic-bezier(.22,.61,.36,1);
    --ease-out:cubic-bezier(.16,1,.3,1);
  }

  *{ box-sizing:border-box; }
  /* the document itself is the film: scroll + snap live on the root so page
     scroll (real users, keyboard, and programmatic scroll) walks the acts */
  html{
    scroll-snap-type:y mandatory;
    scroll-behavior:auto;
    -webkit-overflow-scrolling:touch;
  }
  html,body{ margin:0; }
  body{
    background:var(--ink);
    color:var(--cream);
    font-family:"IBM Plex Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:clip;            /* clip lateral drift; the page scrolls vertically */
  }
  img{ max-width:100%; display:block; }
  a{ color:inherit; }
  button{ font:inherit; color:inherit; cursor:pointer; }

  /* ============ SCROLL REEL (the film) ============ */
  #reel{ display:block; }
  .frame{
    position:relative;
    min-height:100svh;
    scroll-snap-align:start;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:clamp(28px,6vw,90px) clamp(20px,5vw,72px);
    background:var(--bg);
    color:var(--fg);
    overflow:hidden;
  }
  .frame[data-tone="dark"]{ --bg:var(--ink); --fg:var(--cream); --soft:var(--on-ink-soft); --hair:var(--hair-cream); }
  .frame[data-tone="light"]{ --bg:var(--cream); --fg:var(--ink-2); --soft:var(--on-cream-soft); --hair:var(--hair-ink); }

  /* subtle cinematic vignette on the dark frames */
  .frame[data-tone="dark"]::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(120% 90% at 50% 42%, transparent 52%, rgba(0,0,0,.42) 100%);
  }

  /* per-frame slate label (act marker) */
  .slate{
    font-size:11px; letter-spacing:.42em; text-transform:uppercase;
    color:var(--gold); font-weight:600;
    display:inline-flex; gap:.9em; align-items:center;
  }
  .slate::before{ content:""; width:26px; height:1px; background:var(--gold); opacity:.7; }

  /* ============ CHROME: flash / hud / replay ============ */
  .flash{
    position:fixed; inset:0; z-index:90; pointer-events:none;
    background:var(--cream); opacity:0;
  }
  html.motion .flash.cut{ animation:flashcut .14s steps(1,end); }
  @keyframes flashcut{ 0%{opacity:0} 20%{opacity:.92} 55%{opacity:.28} 100%{opacity:0} }

  .hud{
    position:fixed; top:0; left:0; right:0; z-index:60;
    display:flex; justify-content:space-between; align-items:center;
    padding:16px clamp(16px,4vw,34px);
    font-size:10.5px; letter-spacing:.34em; text-transform:uppercase;
    color:#fff; mix-blend-mode:difference;
    pointer-events:none; opacity:0; transition:opacity .5s var(--ease);
  }
  body.started .hud{ opacity:1; }
  .hud .r{ display:inline-flex; gap:.8em; align-items:center; }
  .hud .dot{ width:6px; height:6px; border-radius:50%; background:#fff; }

  .replay{
    position:fixed; left:clamp(14px,3.5vw,30px); bottom:clamp(16px,4vw,30px);
    z-index:70;
    display:inline-flex; align-items:center; gap:.7em;
    padding:10px 16px 10px 13px;
    font-size:10.5px; letter-spacing:.28em; text-transform:uppercase; font-weight:500;
    color:var(--cream);
    background:rgba(20,17,12,.78);
    border:1px solid rgba(168,128,47,.7);
    border-radius:999px;
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
    transition:border-color .3s, background .3s, transform .3s var(--ease);
  }
  .replay:hover{ border-color:var(--gold-l); background:rgba(20,17,12,.92); }
  .replay:active{ transform:scale(.96); }
  .replay .tri{ width:0; height:0; border-left:7px solid var(--gold-l); border-top:5px solid transparent; border-bottom:5px solid transparent; }

  :where(a,button,[tabindex]):focus-visible{
    outline:2px solid var(--gold-l); outline-offset:3px;
  }

  /* ============ TITLE FRAME (cold open -> sting -> title) ============ */
  .title-frame{ text-align:center; }
  .stage{ position:relative; width:100%; max-width:880px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:0; }

  .prod-slug{
    font-size:clamp(9px,2.6vw,10.5px); letter-spacing:.46em; text-transform:uppercase; color:var(--gold);
    max-width:100%; text-align:center; opacity:0;
  }
  .cold-line{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:min(88vw,720px); margin:0;
    font-family:"Playfair Display",serif; font-style:italic; font-weight:400;
    font-size:clamp(1.35rem,3.4vw,2.35rem); line-height:1.4; color:var(--cream);
    opacity:0;
  }
  .title-core{ display:flex; flex-direction:column; align-items:center; gap:clamp(16px,2.4vw,28px); opacity:1; }
  .star-wrap{ width:clamp(58px,9vw,88px); opacity:0; transform:scale(1.45); filter:drop-shadow(0 3px 13px rgba(168,128,47,.22)); }
  .star-wrap svg{ width:100%; height:auto; display:block; }
  /* one-shot gold bloom: the star's own drop-shadow flares at the sting, decays through the
     title cut. Filter is paint-time only, so it never adds scrollable overflow. */
  html.motion .title-frame:is([data-phase="sting"],[data-phase="title"],[data-phase="resolved"]) .star-wrap{
    animation:stingbloom .9s var(--ease-out) both;
  }
  @keyframes stingbloom{
    0%{ filter:drop-shadow(0 0 0 rgba(192,154,74,0)) drop-shadow(0 3px 13px rgba(168,128,47,.22)); }
    22%{ filter:drop-shadow(0 0 26px rgba(192,154,74,.85)) drop-shadow(0 0 58px rgba(192,154,74,.45)); }
    100%{ filter:drop-shadow(0 0 0 rgba(192,154,74,0)) drop-shadow(0 3px 13px rgba(168,128,47,.22)); }
  }
  .wordmark{
    margin:0; font-family:"Playfair Display",serif; font-weight:600;
    font-size:clamp(2.3rem,8.4vw,6rem); line-height:.96; letter-spacing:.22em;
    text-indent:.22em; color:var(--cream); opacity:0;
  }
  .logline{
    margin:0; max-width:640px;
    font-family:"Playfair Display",serif; font-weight:400;
    font-size:clamp(1rem,2.05vw,1.4rem); line-height:1.5; color:var(--on-ink-soft);
    opacity:0;
  }
  .scroll-cue{
    position:absolute; left:50%; bottom:clamp(18px,4.5vh,44px); transform:translateX(-50%);
    font-size:10px; letter-spacing:.4em; text-transform:uppercase; color:var(--on-ink-soft);
    display:inline-flex; flex-direction:column; align-items:center; gap:7px; opacity:0;
  }
  .scroll-cue i{ width:1px; height:26px; background:linear-gradient(var(--gold),transparent); display:block; }

  /* entrance phase visibility (only under .motion; default resolved) */
  html.motion .title-frame[data-phase="cold"] .title-core{ opacity:0; pointer-events:none; }
  html.motion .title-frame[data-phase="cold"] .cold-line{ opacity:1; transition:opacity .3s var(--ease); }

  html.motion .title-frame[data-phase="sting"] .cold-line{ opacity:0; }
  html.motion .title-frame[data-phase="sting"] .title-core{ opacity:1; }
  html.motion .title-frame[data-phase="sting"] .star-wrap{ opacity:1; transform:scale(1); transition:opacity .05s steps(1,end), transform .18s var(--ease-out); }

  html.motion .title-frame[data-phase="title"] .title-core{ opacity:1; }
  html.motion .title-frame[data-phase="title"] .star-wrap{ opacity:1; transform:scale(1); }
  html.motion .title-frame[data-phase="title"] .wordmark{ opacity:1; transition:opacity .06s steps(1,end); }

  /* resolved state: everything settled (also the non-motion default) */
  .prod-slug,.title-core,.star-wrap,.wordmark,.logline,.scroll-cue{ opacity:1; transform:none; }
  html.motion .title-frame:not([data-phase="resolved"]) .prod-slug,
  html.motion .title-frame:not([data-phase="resolved"]) .logline,
  html.motion .title-frame:not([data-phase="resolved"]) .scroll-cue{ opacity:0; }
  html.motion .title-frame[data-phase="resolved"] .prod-slug{ transition:opacity .6s var(--ease) .1s; }
  html.motion .title-frame[data-phase="resolved"] .logline{ transition:opacity .7s var(--ease) .12s; }
  html.motion .title-frame[data-phase="resolved"] .scroll-cue{ transition:opacity .7s var(--ease) .4s; }

  /* ============ ACT ONE (slow: generous holds, long dissolves) ============ */
  .act1{ text-align:center; }
  .act1 .wrap{ max-width:900px; display:flex; flex-direction:column; align-items:center; gap:clamp(26px,4vw,46px); min-width:0; }
  .act1 .big{
    margin:0; font-family:"Playfair Display",serif; font-weight:500;
    font-size:clamp(1.9rem,5.4vw,4.1rem); line-height:1.14; letter-spacing:.005em;
    color:var(--fg); max-width:15ch;
  }
  .act1 .big .accent{ color:var(--gold); font-style:italic; }
  .act1 .rule{ width:min(60vw,340px); height:1px; background:var(--gold); transform-origin:center; }

  /* dissolve mechanic (act 1 interiors) */
  html.motion .dissolve .d{ opacity:0; filter:blur(7px); transform:translateY(10px); }
  html.motion .dissolve.in .d{ opacity:1; filter:blur(0); transform:none; transition:opacity .6s var(--ease), filter .6s var(--ease), transform .6s var(--ease); }
  html.motion .dissolve .d:nth-child(2){ transition-delay:.14s; }
  html.motion .dissolve .rule{ transform:scaleX(0); }
  html.motion .dissolve.in .rule{ transform:scaleX(1); transition:transform 1.1s var(--ease-out) .18s; }

  /* ============ ACT TWO (fast: rapid-cut services montage) ============ */
  .svc{ justify-content:flex-start; padding-top:clamp(66px,11vh,120px); }
  .svc .montage-top{
    width:100%; max-width:1120px; margin:0 auto;
    display:flex; justify-content:space-between; align-items:center; gap:16px;
    font-size:10.5px; letter-spacing:.34em; text-transform:uppercase; color:var(--soft);
  }
  .svc .ticks{ display:flex; gap:5px; align-items:center; }
  .svc .ticks i{ width:2px; height:9px; background:currentColor; opacity:.35; display:block; }
  .svc .ticks i.on{ opacity:1; background:var(--gold); height:13px; }

  .svc .body{
    width:100%; max-width:1120px; margin:auto 0;
    display:grid; grid-template-columns:1.35fr 1fr; gap:clamp(22px,4vw,60px); align-items:center;
    min-width:0;
  }
  .svc .pull{
    margin:0; font-family:"Playfair Display",serif; font-weight:800; font-style:italic;
    font-size:clamp(2.6rem,7.5vw,6rem); line-height:.9; letter-spacing:-.01em;
    color:var(--fg); min-width:0; overflow-wrap:normal; hyphens:none;
  }
  .svc .pull b{ color:var(--gold); font-weight:800; }
  .svc .side{ min-width:0; display:flex; flex-direction:column; gap:16px; }
  .svc .no{ font-size:12px; letter-spacing:.3em; color:var(--gold); font-weight:600; }
  .svc .name{
    font-family:"Playfair Display",serif; font-weight:600; font-size:clamp(1.15rem,2.4vw,1.7rem);
    line-height:1.1; letter-spacing:.01em;
  }
  .svc .copy{ font-size:clamp(.82rem,1.15vw,.95rem); line-height:1.62; color:var(--soft); max-width:42ch; }
  .svc .take{
    display:inline-flex; align-items:center; gap:.7em; margin-top:2px;
    font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:var(--soft);
  }
  .svc .take b{ color:var(--gold); }
  .svc .take .swap{ display:none; }

  /* hover / focus = alternate take: hard invert flip of the whole frame */
  html.motion .svc{ transition:background .09s steps(2,end), color .09s steps(2,end); }
  .svc:hover, .svc:focus-within{ background:var(--fg); color:var(--bg); }
  .svc:hover .pull, .svc:focus-within .pull{ color:var(--bg); }
  .svc:hover .copy, .svc:focus-within .copy{ color:var(--bg); opacity:.72; }
  .svc:hover .montage-top, .svc:focus-within .montage-top{ color:var(--bg); opacity:.6; }
  .svc:hover .take, .svc:focus-within .take{ color:var(--bg); opacity:.66; }
  .svc:hover .take .keep, .svc:focus-within .take .keep{ display:none; }
  .svc:hover .take .swap, .svc:focus-within .take .swap{ display:inline; }
  .svc .flip-catch{ position:absolute; inset:0; z-index:1; } /* keyboard/hover target, transparent */
  .svc .body{ position:relative; z-index:2; }
  .svc .montage-top{ position:relative; z-index:2; }

  /* ============ ACT THREE (grand: one-sheet poster, slow push-in) ============ */
  .onesheet{ background:var(--cream); color:var(--ink-2); justify-content:flex-start; padding-block:clamp(30px,6vh,70px); }
  .poster{
    width:min(94vw,720px); margin:0 auto;
    display:flex; flex-direction:column; align-items:center; text-align:center;
    border:1px solid var(--hair-ink);
    padding:clamp(20px,3.4vw,40px) clamp(18px,3vw,44px) clamp(18px,2.6vw,30px);
    background:linear-gradient(180deg,#fdfbf6,#f6f1e6);
    min-width:0;
  }
  .poster .presents{ font-size:10.5px; letter-spacing:.46em; text-transform:uppercase; color:var(--gold); }
  .poster .genre{ margin:14px 0 0; font-size:clamp(.8rem,1.5vw,.95rem); letter-spacing:.02em; color:var(--on-cream-soft); max-width:44ch; line-height:1.55; }

  .poster-art{
    width:min(100%, calc(42svh * 16 / 9));
    aspect-ratio:16/9; margin:clamp(16px,2.5vw,26px) auto;
    background:#0d0b08; overflow:hidden; position:relative;
    box-shadow:0 24px 60px -30px rgba(20,17,12,.6);
  }
  .poster-art img{ width:100%; height:100%; object-fit:cover; object-position:50% 46%; }
  .poster-art::after{ content:""; position:absolute; inset:0; box-shadow:inset 0 0 0 1px rgba(20,17,12,.35); pointer-events:none; }
  html.motion .onesheet .poster-art img{ transform:scale(1.12); }
  html.motion .onesheet.in .poster-art img{ transform:scale(1); transition:transform 1.9s var(--ease-out); }

  .poster .p-title{
    margin:2px 0 0; font-family:"Playfair Display",serif; font-weight:800;
    font-size:clamp(2.5rem,8.4vw,5.2rem); line-height:.92; letter-spacing:.02em; color:var(--ink-2);
  }
  .poster .tagline{
    margin:clamp(12px,2vw,18px) auto 0; max-width:32ch;
    font-family:"Playfair Display",serif; font-style:italic; font-weight:500;
    font-size:clamp(1.02rem,2.2vw,1.5rem); line-height:1.36; color:var(--ink-2);
  }
  .poster .dedication{
    margin:12px auto 0; max-width:34ch;
    font-family:"Noto Serif Thai","Playfair Display",serif; font-weight:500;
    font-size:clamp(.92rem,1.7vw,1.12rem); line-height:1.5; color:var(--gold-d);
  }
  .poster .stamp{
    margin-top:clamp(14px,2.2vw,20px);
    display:inline-flex; align-items:center; gap:.7em;
    font-size:10.5px; letter-spacing:.32em; text-transform:uppercase; color:var(--gold);
    padding:7px 15px; border:1px solid var(--gold); border-radius:999px;
  }
  .billing{
    margin-top:clamp(18px,2.6vw,26px); padding-top:clamp(14px,2vw,20px);
    border-top:1px solid var(--hair-ink); width:100%;
    display:flex; flex-direction:column; gap:5px; align-items:center;
  }
  .billing .line{
    font-size:clamp(8.5px,1vw,10px); letter-spacing:.06em; line-height:1.5;
    color:var(--on-cream-soft); max-width:60ch;
    font-variant:small-caps; text-transform:lowercase;
  }
  .billing .line b{ color:var(--ink-2); font-weight:600; letter-spacing:.1em; }
  .billing .tiny{ font-size:8px; letter-spacing:.16em; color:rgba(46,42,38,.42); text-transform:none; font-variant:normal; margin-top:4px; }

  /* ============ RELEASE CARD (end title) ============ */
  .release{ background:var(--ink); color:var(--cream); text-align:center; }
  .release .rwrap{ display:flex; flex-direction:column; align-items:center; gap:clamp(18px,2.6vw,30px); max-width:760px; min-width:0; }
  .release .kicker{
    margin:0; font-family:"Playfair Display",serif; font-weight:700;
    font-size:clamp(2rem,6.4vw,4.4rem); line-height:1.02; letter-spacing:.04em; color:var(--cream);
  }
  .release .kicker span{ color:var(--gold); white-space:nowrap; }
  .release .mark{ display:flex; align-items:center; gap:14px; }
  .release .mark .s{ width:34px; }
  .release .mark .w{ font-family:"Playfair Display",serif; font-weight:600; letter-spacing:.24em; text-indent:.24em; font-size:1.05rem; }
  .release .email{
    font-family:"Playfair Display",serif; font-style:italic; font-weight:500;
    font-size:clamp(1.2rem,3.4vw,2.1rem); color:var(--gold-l); text-decoration:none;
    border-bottom:1px solid rgba(192,154,74,.4); padding-bottom:3px;
    transition:border-color .3s, color .3s;
  }
  .release .email:hover{ color:var(--cream); border-color:var(--cream); }
  .release .ctas{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  .btn{
    display:inline-flex; align-items:center; gap:.6em;
    font-size:11px; letter-spacing:.24em; text-transform:uppercase; font-weight:600;
    padding:15px 26px; border-radius:999px; text-decoration:none;
    transition:transform .3s var(--ease), background .3s, color .3s, border-color .3s;
  }
  .btn.primary{ background:var(--gold); color:var(--ink); }
  .btn.primary:hover{ background:var(--gold-l); transform:translateY(-2px); }
  .btn.ghost{ border:1px solid rgba(240,233,220,.34); color:var(--cream); }
  .btn.ghost:hover{ border-color:var(--gold-l); color:var(--gold-l); }
  .release .foot{
    margin-top:clamp(20px,4vh,44px);
    display:flex; flex-wrap:wrap; gap:8px 18px; justify-content:center; align-items:center;
    font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--on-ink-soft);
  }
  .release .foot .s{ width:15px; }
  .release .foot b{ color:var(--cream); font-weight:600; letter-spacing:.24em; }

  /* ============ RESPONSIVE ============ */
  @media (max-width:820px){
    .svc .body{ grid-template-columns:1fr; gap:20px; text-align:left; }
    .svc{ justify-content:center; padding-top:clamp(64px,12vh,120px); }
    .svc .pull{ font-size:clamp(2.4rem,13vw,4.6rem); }
    .poster-art{ width:100%; }
  }
  @media (max-width:640px){
    html{ scroll-snap-type:y proximity; }   /* gentler on phones, never traps tall stacks */
    .frame{ min-height:100svh; }
    .act1 .big{ max-width:18ch; }
    .hud{ letter-spacing:.24em; font-size:9.5px; }
    .prod-slug{ letter-spacing:.36em; }
  }
  @media (max-width:380px){
    .svc .pull{ font-size:clamp(2.2rem,12vw,3.8rem); }
  }

  /* ============ REDUCED MOTION (plain instant frames, scrolled normally) ============ */
  @media (prefers-reduced-motion:reduce){
    html{ scroll-snap-type:none; scroll-behavior:auto; }
    .frame *, .frame{ animation:none !important; transition:none !important; }
    .flash{ display:none !important; }
    .star-wrap{ transform:none !important; opacity:1 !important; }
    .cold-line{ display:none !important; }
    .onesheet .poster-art img{ transform:none !important; }
    .dissolve .d{ opacity:1 !important; filter:none !important; transform:none !important; }
  }
</style>
</head>
<body>

  <div class="flash" id="flash" aria-hidden="true"></div>

  <div class="hud" aria-hidden="true">
    <span class="l">Vesperwerk &middot; Trailer Cut</span>
    <span class="r"><span class="dot"></span><span id="actLabel">Title</span></span>
  </div>

  <button class="replay" id="replay" type="button" aria-label="Replay the trailer intro">
    <span class="tri" aria-hidden="true"></span>Replay Trailer
  </button>

  <main id="reel"></main>

<script>
/* =====================================================================
   DATA  -  edit this object to re-cut the trailer for any brand/story.
   Copy mirrors the Vesperwerk canonical spec verbatim.
   ===================================================================== */
const TRAILER = {
  coldOpen: "Somewhere in your business is a system that cannot afford to fail.",
  brand: "VESPERWERK",
  productionSlug: "A Vesperwerk Production",
  logline: "An independent software and AI studio. We architect, build, and operate production systems for businesses that cannot afford them to fail.",

  act1: [
    { slate:"Act One &middot; Origin",
      html:'Vesperwerk takes its name from <span class="accent">the evening star</span>: the first light you can navigate by.' },
    { slate:"Act One &middot; The Studio",

/* ---------- render the reel from DATA ---------- */
function render(){
  const T = TRAILER;
  const acts = [];

  /* TITLE FRAME (holds cold open -> sting -> title) */
  acts.push(`
    <section class="frame title-frame" data-tone="dark" data-cut data-act="Title" id="titleFrame" data-phase="resolved">
      <div class="stage">
        <p class="cold-line">&ldquo;${T.coldOpen}&rdquo;</p>
        <div class="title-core">
          <span class="prod-slug">${T.productionSlug}</span>
          <span class="star-wrap">${starSVG()}</span>
          <h1 class="wordmark">${T.brand}</h1>
          <p class="logline">${T.logline}</p>
        </div>
      </div>
      <span class="scroll-cue">scroll<i></i></span>
    </section>`);

  /* ACT ONE - two slow dissolve holds */
  T.act1.forEach(a=>{
    acts.push(`
    <section class="frame act1 dissolve" data-tone="light" data-act="Act I">
      <div class="wrap">
        <span class="slate d">${a.slate}</span>
        <p class="big d">${a.html}</p>
        <span class="rule"></span>
      </div>
    </section>`);
  });

  /* ACT TWO - rapid-cut services montage */
  const total = T.services.length;
  T.services.forEach((s,i)=>{
    const ticks = T.services.map((_,k)=>`<i class="${k<=i?'on':''}"></i>`).join('');
    acts.push(`
    <section class="frame svc" data-tone="${s.tone}" data-cut data-act="Act II" tabindex="0" aria-label="Service ${s.no}: ${s.name}">
      <span class="flip-catch" aria-hidden="true"></span>
      <div class="montage-top">
        <span>Montage &middot; ${String(i+1).padStart(2,'0')} / ${String(total).padStart(2,'0')}</span>
        <span class="ticks">${ticks}</span>
      </div>
      <div class="body">
        <h2 class="pull">${s.pull}</h2>
        <div class="side">
          <span class="no">${s.no}</span>
          <span class="name">${s.name}</span>
          <p class="copy">${s.copy}</p>
          <span class="take"><span class="keep">Take 01 &middot; hover for the alternate take</span><span class="swap"><b>Take 02</b> &middot; alternate cut</span></span>
        </div>
      </div>
    </section>`);
  });

  /* ACT THREE - one-sheet poster */
  const os = T.oneSheet;
  const billing = T.principles.map(p=>`<span class="line"><b>${p.name}</b> . ${p.line}</span>`).join('');
  acts.push(`
    <section class="frame onesheet" data-tone="light" data-cut data-act="Act III">
      <div class="poster">
        <span class="presents">${os.presents}</span>
        <p class="genre">${os.genre}</p>
        <div class="poster-art"><img src="${os.keyArt}" alt="Yimwhan AI - dental clinic key art" loading="lazy" decoding="async"></div>
        <h2 class="p-title">${os.title}</h2>
        <p class="tagline">${os.tagline}</p>
        <p class="dedication">${os.dedication}</p>
        <span class="stamp">${os.stamp}</span>
        <div class="billing">
          <span class="line"><b>Vesperwerk</b> presents a founder-led production</span>
          ${billing}
          <span class="tiny">${TRAILER.honesty}</span>
        </div>
      </div>
    </section>`);

  /* RELEASE CARD */
  const r = T.release;
  acts.push(`
    <section class="frame release" data-tone="dark" data-cut data-act="Release">
      <div class="rwrap">
        <div class="mark"><span class="s">${starSVG()}</span><span class="w">${T.brand}</span></div>
        <h2 class="kicker">${r.kicker}</h2>
        <a class="email" href="mailto:${r.email}">${r.email}</a>
        <div class="ctas">
          <a class="btn primary" href="mailto:${r.email}">${r.ctaPrimary}</a>
          <a class="btn ghost" href="#work" data-goto="onesheet">${r.ctaSecondary}</a>
        </div>
        <div class="foot">
          <span class="s">${starSVG()}</span>
          <b>${T.brand}</b>
          <span>${r.location}</span>
          <span>${r.copyright}</span>
        </div>
      </div>
    </section>`);

  document.getElementById('reel').innerHTML = acts.join('');
}

/* ---------- behavior ---------- */
(function(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const html = document.documentElement;
  if(!reduce) html.classList.add('motion');

  render();

  const flash  = document.getElementById('flash');
  const replay = document.getElementById('replay');
  const title  = document.getElementById('titleFrame');
  const actLabel = document.getElementById('actLabel');
  const onesheet = document.querySelector('.onesheet');

  /* -- flash beat (the cut) -- */
  let lastFlash = 0;
  function fireFlash(){
    if(reduce) return;
    const now = performance.now();
    if(now - lastFlash < 190) return;
    lastFlash = now;
    flash.classList.remove('cut');
    void flash.offsetWidth;          /* reflow to restart animation */
    flash.classList.add('cut');
  }

  /* -- entrance sequence: cold open -> sting -> title -- */
  let timers = [];
  let introPlaying = false;
  function clearTimers(){ timers.forEach(clearTimeout); timers = []; }

  function playIntro(){
    if(reduce){ title.setAttribute('data-phase','resolved'); document.body.classList.add('started'); return; }
    clearTimers();
    introPlaying = true;
    window.scrollTo({ top:0, behavior:'auto' });
    document.body.classList.remove('started');
    title.setAttribute('data-phase','cold');
    timers.push(setTimeout(()=>{ title.setAttribute('data-phase','sting'); fireFlash(); }, 1300));
    timers.push(setTimeout(()=>{ title.setAttribute('data-phase','title'); fireFlash(); }, 1720));
    timers.push(setTimeout(()=>{
      title.setAttribute('data-phase','resolved');
      document.body.classList.add('started');
      introPlaying = false;
    }, 2120));
  }
  function resolveNow(){
    if(!introPlaying) return;
    clearTimers();
    introPlaying = false;
    title.setAttribute('data-phase','resolved');
    document.body.classList.add('started');
  }

  /* user scroll interrupts the intro */
  ['wheel','touchstart','keydown'].forEach(ev=>{
    window.addEventListener(ev, ()=>{ if(introPlaying) resolveNow(); }, { passive:true });
  });
  window.addEventListener('scroll', ()=>{ if(introPlaying && window.scrollY > 4) resolveNow(); }, { passive:true });

  /* -- active-frame detection: HUD label, act cuts, dissolves, push-in -- */
  let current = title;
  const io = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{
      if(!e.isIntersecting) return;
      const el = e.target;
      el.classList.add('in');                    /* trigger dissolve / push-in */
      if(actLabel) actLabel.textContent = el.dataset.act || '';
      if(el !== current){
        if(el.hasAttribute('data-cut') && document.body.classList.contains('started')) fireFlash();
        current = el;
      }
    });
  }, { root:null, rootMargin:'-45% 0px -45% 0px', threshold:0 });
  document.querySelectorAll('.frame').forEach(f=>io.observe(f));

  /* replay control */
  replay.addEventListener('click', playIntro);

  /* "See our work" jumps to the one-sheet */
  const workBtn = document.querySelector('[data-goto="onesheet"]');
  if(workBtn && onesheet){
    workBtn.addEventListener('click', (ev)=>{ ev.preventDefault(); onesheet.scrollIntoView({ behavior: reduce?'auto':'smooth' }); });
  }

  /* kick off */
  playIntro();
})();
</script>
