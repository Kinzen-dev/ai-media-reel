<style>
  :root{
    --vellum:#f4eee0;
    --ink:#2e2a26;
    --gold:#a8802f;
    --rule:rgba(46,42,38,.35);

  }
  *{box-sizing:border-box;min-width:0}
  html,body{margin:0;padding:0}
  body{
    background:var(--vellum);color:var(--ink);
    font:400 17px/1.65 "EB Garamond",Georgia,serif;

    overflow-x:hidden;
  }
  ::selection{background:var(--ink);color:var(--vellum)}

  /* blind-emboss plate mark around the viewport: two hairlines, zero blur */
  .platemark{position:fixed;inset:12px;pointer-events:none;z-index:60;border:1px solid #e3dac3}
  .platemark::before{content:"";position:absolute;inset:-2px;border:1px solid #fcf9f0}

  a{color:inherit}

  .wordmark{

  .orn{display:block;width:200px;max-width:70%;height:14px;margin:12px auto 0}

/* =========================================================================
   Engraving toolkit
   ========================================================================= */
const NS = "http://www.w3.org/2000/svg";
const INK = "#2e2a26", VELLUM = "#f4eee0", GOLD = "#a8802f";

function E(name, attrs, parent){
  const el = document.createElementNS(NS, name);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(el);
  return el;
}
function T(parent, x, y, str, attrs){
  const t = E("text", Object.assign({x:x, y:y, fill:INK, "font-family":"'EB Garamond',Georgia,serif"}, attrs||{}), parent);
  t.textContent = str;
  return t;
}
function rng(seed){
  return function(){
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function rayStarPath(cx, cy, r, n, inner){
  let d = "";
  for (let i = 0; i < 2*n; i++){
    const rad = (i % 2) ? r*inner : r;
    const a = Math.PI*i/n - Math.PI/2;
    d += (i ? "L" : "M") + (cx+rad*Math.cos(a)).toFixed(2) + " " + (cy+rad*Math.sin(a)).toFixed(2) + " ";
  }
  return d + "Z";
}
/* Bayer-style magnitude classes 1..6 */
function drawMag(parent, cx, cy, m){
  if (m === 0)      E("path", {d: rayStarPath(cx,cy,7.5,8,.45), fill:INK}, parent);
  else if (m === 1) E("path", {d: rayStarPath(cx,cy,5.6,8,.45), fill:INK}, parent);
  else if (m === 2) E("path", {d: rayStarPath(cx,cy,4.3,6,.5),  fill:INK}, parent);
  else E("circle", {cx:cx, cy:cy, r:[2.5,1.7,1.05][m-3], fill:INK}, parent);
}
function addHatch(svg, id, angle, gap, sw){
  const defs = svg.querySelector("defs") || E("defs", {}, svg);
  const p = E("pattern", {id:id, width:gap, height:gap, patternUnits:"userSpaceOnUse", patternTransform:"rotate("+angle+")"}, defs);
  E("line", {x1:gap/2, y1:-1, x2:gap/2, y2:gap+1, stroke:INK, "stroke-width":sw}, p);
  return defs;
}
function hair(a){ return {stroke:INK, fill:"none", "vector-effect":"non-scaling-stroke", ...a}; }

/* graduated degree-tick frame between two rects (band = plate edge scale) */
function tickFrame(parent, x, y, w, h, band, numerals){
  E("rect", hair({x:x-band, y:y-band, width:w+2*band, height:h+2*band, "stroke-width":1.8}), parent);
  E("rect", hair({x:x, y:y, width:w, height:h, "stroke-width":.9}), parent);
  const g = E("g", hair({"stroke-width":.55, "stroke-opacity":.85}), parent);
  const step = 10, major = 50;
  for (let px = 0; px <= w; px += step){
    const M = px % major === 0;
    E("line", {x1:x+px, y1:y,   x2:x+px, y2:y-(M?band:5),   ...(M?{"stroke-width":.85}:{})}, g);
    E("line", {x1:x+px, y1:y+h, x2:x+px, y2:y+h+(M?band:5), ...(M?{"stroke-width":.85}:{})}, g);
    if (numerals && px % 100 === 0 && px > 0 && px < w){
      const v = ((px/10)*2) % 360;
      T(parent, x+px+3, y-4.5,   v+"°", {"font-size":7.5, "fill-opacity":.85});
      T(parent, x+px+3, y+h+9.5, v+"°", {"font-size":7.5, "fill-opacity":.85});
    }
  }
  for (let py = 0; py <= h; py += step){
    const M = py % major === 0;
    E("line", {x1:x,   y1:y+py, x2:x-(M?band:5),   y2:y+py, ...(M?{"stroke-width":.85}:{})}, g);
    E("line", {x1:x+w, y1:y+py, x2:x+w+(M?band:5), y2:y+py, ...(M?{"stroke-width":.85}:{})}, g);
  }
}
function goldStar(parent, cx, cy, size){
  E("use", {href:"#vstar", x:cx-size/2, y:cy-size/2, width:size, height:size}, parent);
}
const ORN = '<svg class="orn" viewBox="0 0 220 14" aria-hidden="true">'
  + '<line x1="4" y1="7" x2="92" y2="7" stroke="#2e2a26" stroke-width="1" opacity=".55"/>'
  + '<circle cx="98" cy="7" r="1.3" fill="#2e2a26"/>'
  + '<path d="M110 1.5 115.5 7 110 12.5 104.5 7 Z" fill="none" stroke="#2e2a26" stroke-width="1"/>'
  + '<circle cx="122" cy="7" r="1.3" fill="#2e2a26"/>'
  + '<line x1="128" y1="7" x2="216" y2="7" stroke="#2e2a26" stroke-width="1" opacity=".55"/></svg>';

/* =========================================================================
   HERO : full-viewport engraved plate
   ========================================================================= */
function buildHero(){
  const sky = document.getElementById("sky");
  sky.setAttribute("viewBox", "0 0 1440 900");
  addHatch(sky, "sky-hatch", 28, 5.2, .9);
  addHatch(sky, "sky-hatch2", -18, 4.4, .7);
  const defs = sky.querySelector("defs");
  const clip = E("clipPath", {id:"sky-clip"}, defs);
  E("rect", {x:84, y:72, width:1272, height:756}, clip);

  /* graduated plate frame */
  tickFrame(sky, 84, 72, 1272, 756, 14, true);

  /* coordinate net : declination arcs + right-ascension lines, clipped */
  const grat = E("g", {"clip-path":"url(#sky-clip)", stroke:INK, "stroke-opacity":.3, fill:"none"}, sky);
  const gc = {x:720, y:3460};
  for (let r = 2650; r <= 3350; r += 115)
    E("circle", {cx:gc.x, cy:gc.y, r:r, "stroke-width":.8, "vector-effect":"non-scaling-stroke"}, grat);
  for (let a = -12; a <= 12; a += 3){
    const rad = a*Math.PI/180;
    E("line", {x1:gc.x, y1:gc.y, x2:gc.x+3450*Math.sin(rad), y2:gc.y-3450*Math.cos(rad),
               "stroke-width":.75, "vector-effect":"non-scaling-stroke"}, grat);
  }
  /* ecliptic */
  const ecl = E("g", {"clip-path":"url(#sky-clip)"}, sky);
  E("path", hair({d:"M 70 660 A 2300 2300 0 0 1 1370 292", "stroke-width":1.1,
                  "stroke-dasharray":"7 5", "stroke-opacity":.55}), ecl);
  T(ecl, 1188, 328, "ECLIPTICA", {"font-size":11, "letter-spacing":"3", "fill-opacity":.6,
    transform:"rotate(-12 1188 328)"});

  /* magnitude-scaled star field (seeded, deterministic) */
  const R = rng(20260702);
  const field = E("g", {"clip-path":"url(#sky-clip)"}, sky);
  const cum = [2,5,11,25,57,103];
  let placed = 0, guard = 0;
  while (placed < 150 && guard++ < 900){
    const x = 100 + R()*1240, y = 88 + R()*724;
    if (y > 768 && x < 590) continue;                       /* keep the legend strip clear */
    const dx = x-860, dy = y-470;
    if (dx*dx + dy*dy < 120*120) continue;                  /* keep the figure heart clear */
    const roll = R()*103;
    let m = 5; for (let i = 0; i < 6; i++){ if (roll < cum[i]){ m = i; break; } }
    drawMag(field, x, y, m);
    placed++;
  }

  /* constellation VESPERA : dashed connect-the-stars figure */
  const V = DATA.vespera;
  const pos = {"@": V.alpha};
  V.stars.forEach(s => pos[s[0]] = [s[1], s[2]]);
  const lines = E("g", hair({"stroke-width":.9, "stroke-dasharray":"2.5 5", "stroke-opacity":.85}), sky);
  V.lines.forEach(l => {
    const a = pos[l[0]], b = pos[l[1]];
    E("line", {x1:a[0], y1:a[1], x2:b[0], y2:b[1]}, lines);
  });

  /* the engraved winged figure : one coherent scalloped wing silhouette,
     hatch fill + heavy outline + rachis lines, finer-hatched covert row above */
  const wings = E("g", {}, sky);
  const WB = [876, 470];
  function dirPt(angDeg, r){
    const a = angDeg*Math.PI/180;
    return [WB[0]+r*Math.cos(a), WB[1]+r*Math.sin(a)];
  }
  function wingRow(g, n, angLo, angHi, rMax, rMin, hatch, ow){
    const angs = [], rads = [];
    for (let i = 0; i <= n; i++){
      const t = i/n;                               /* t=0 bottom horizontal long, t=1 top steep short */
      angs.push(angLo + (angHi-angLo)*t);
      rads.push(rMax - (rMax-rMin)*Math.pow(t, 1.12));
    }
    /* notches sit between rounded feather-tip lobes */
    const notches = [dirPt(angLo-2, rads[0]*.86)];
    for (let i = 0; i < n; i++)
      notches.push(dirPt((angs[i]+angs[i+1])/2, Math.min(rads[i], rads[i+1])*.86));
    notches.push(dirPt(angHi+3, rads[n]*.8));
    const RB = dirPt(angLo+2, 40), RT = dirPt(angHi-2, 36);
    let d = "M "+RB[0].toFixed(1)+" "+RB[1].toFixed(1);
    const m0 = [(RB[0]+notches[0][0])/2, (RB[1]+notches[0][1])/2 + rMax*.05];
    d += " Q "+m0[0].toFixed(1)+" "+m0[1].toFixed(1)+" "+notches[0][0].toFixed(1)+" "+notches[0][1].toFixed(1);
    for (let i = 0; i <= n; i++){                  /* one convex lobe per feather, peak at its tip */
      const c = dirPt(angs[i], rads[i]*1.22);
      d += " Q "+c[0].toFixed(1)+" "+c[1].toFixed(1)+" "+notches[i+1][0].toFixed(1)+" "+notches[i+1][1].toFixed(1);
    }
    const mT = [(RT[0]+notches[n+1][0])/2, (RT[1]+notches[n+1][1])/2];
    d += " Q "+mT[0].toFixed(1)+" "+mT[1].toFixed(1)+" "+RT[0].toFixed(1)+" "+RT[1].toFixed(1)+" Z";
    E("path", {d:d, fill:VELLUM}, g);                        /* occlude what lies beneath */
    E("path", {d:d, fill:"url(#"+hatch+")", stroke:INK, "stroke-width":ow, "stroke-linejoin":"round"}, g);
    for (let i = 0; i <= n; i++){                            /* rachis lines : root to each feather tip */
      const rt = dirPt(angs[i], 48), tip = dirPt(angs[i], rads[i]*1.02);
      E("line", {x1:rt[0], y1:rt[1], x2:tip[0], y2:tip[1], stroke:INK,
                 "stroke-width":1.05, "vector-effect":"non-scaling-stroke"}, g);
      if (i < n){                                            /* separation lines toward each notch */
        const nn = notches[i+1], rn = dirPt((angs[i]+angs[i+1])/2, 46);
        E("line", {x1:rn[0], y1:rn[1], x2:nn[0], y2:nn[1], stroke:INK, "stroke-width":.65,
                   "stroke-opacity":.8, "vector-effect":"non-scaling-stroke"}, g);
      }
    }
  }
  function wing(g){
    wingRow(g, 7, -4, -70, 330, 165, "sky-hatch", 1.9);       /* primaries */
    wingRow(g, 5, -8, -64, 176, 102, "sky-hatch2", 1.4);      /* coverts   */
  }
  wing(E("g", {}, wings));
  wing(E("g", {transform:"translate(1720,0) scale(-1,1)"}, wings));

  /* principal stars + Bayer letters */
  const prin = E("g", {}, sky);
  V.stars.forEach(s => {
    E("path", {d: rayStarPath(s[1], s[2], 8, 8, .45), fill:INK}, prin);
    T(prin, s[1]+14, s[2]-10, s[0], {"font-size":16, "font-style":"italic", "fill-opacity":.85});
  });

  /* alpha Vesperae : engraved ray corona + the gold two-facet mark */
  const alpha = E("g", {}, sky);
  for (let k = 0; k < 24; k++){
    const a = k/24*Math.PI*2;
    const r2 = 122 + (k % 3 === 0 ? 14 : 0);
    E("line", hair({x1:860+98*Math.cos(a), y1:470+98*Math.sin(a),
                    x2:860+r2*Math.cos(a), y2:470+r2*Math.sin(a),
                    "stroke-width":.8, "stroke-opacity":.7}), alpha);
  }
  goldStar(alpha, 860, 470, 196);
  E("rect", {x:860-58, y:606, width:116, height:22, fill:VELLUM}, alpha);
  T(alpha, 860, 622, "α Vesperae", {"font-size":15.5, "font-style":"italic",
    "text-anchor":"middle", "fill-opacity":.9});

  /* plate title, magnitude legend, plate number */
  const tw = 300;
  E("rect", {x:720-tw/2, y:80, width:tw, height:18, fill:VELLUM}, sky);
  T(sky, 720, 93, DATA.brand.plateTitle, {"font-size":11.5, "letter-spacing":"4", "text-anchor":"middle", "fill-opacity":.85});

  const leg = E("g", {}, sky);
  E("rect", {x:96, y:772, width:492, height:52, fill:VELLUM}, leg);
  T(leg, 110, 790, "MAGNITVDINES", {"font-size":11, "letter-spacing":"2.5", "fill-opacity":.85});
  for (let i = 0; i < 6; i++){
    const cx = 122 + i*52;
    drawMag(leg, cx, 806, i);
    T(leg, cx, 823, String(i+1), {"font-size":10, "font-style":"italic", "text-anchor":"middle", "fill-opacity":.8});
  }
  E("line", hair({x1:446, y1:796, x2:446, y2:816, "stroke-width":.7, "stroke-opacity":.5}), leg);
  goldStar(leg, 470, 805, 26);
  T(leg, 492, 809.5, "vesperis", {"font-size":11.5, "font-style":"italic", "fill-opacity":.85});
  T(sky, 1344, 812, "Tab. I.", {"font-size":15, "font-style":"italic", "text-anchor":"end", "fill-opacity":.85});

  /* mobile recomposition : crop to the figure's heart, never a shrunken full plate */
  function fitSky(){
    const m = window.innerWidth <= 640;
    sky.setAttribute("viewBox", m ? "540 100 640 780" : "0 0 1440 900");
    sky.setAttribute("preserveAspectRatio", m ? "xMidYMid slice" : "xMidYMid meet");
  }
  window.addEventListener("resize", fitSky);
  fitSky();
}

/* =========================================================================
   Service vignettes : Tabula I (voice waves) II (armillary) III (orbits)
   ========================================================================= */
function vigWaves(svg){
  svg.setAttribute("viewBox", "0 0 360 240");
  addHatch(svg, "v1-hatch", 32, 4.8, .8);
  E("circle", {cx:84, cy:120, r:17, fill:"url(#v1-hatch)", stroke:INK, "stroke-width":1.2}, svg);
  E("path", {d: rayStarPath(84,120,10,8,.45), fill:INK}, svg);
  [34,62,90,118,148].forEach((r,i) => {
    const c = Math.cos(64*Math.PI/180), s = Math.sin(64*Math.PI/180);
    E("path", hair({d:"M "+(84+r*c)+" "+(120-r*s)+" A "+r+" "+r+" 0 0 1 "+(84+r*c)+" "+(120+r*s),
      "stroke-width": i%2 ? .8 : 1.15, ...(i%2 ? {"stroke-dasharray":"1.5 4"} : {})}), svg);
  });
  [[206,58,4],[254,148,5],[306,92,4],[322,186,5],[232,212,5],[184,26,5],[338,40,5]]
    .forEach(p => drawMag(svg, p[0], p[1], p[2]));
}
function vigArmillary(svg){
  svg.setAttribute("viewBox", "0 0 360 240");
  addHatch(svg, "v2-hatch", 24, 4.6, .8);
  const cx = 180, cy = 122;
  E("circle", hair({cx:cx, cy:cy, r:84, "stroke-width":1.6}), svg);
  E("ellipse", hair({cx:cx, cy:cy, rx:84, ry:26, "stroke-width":.8, "stroke-dasharray":"1.5 3.5"}), svg);
  const tilt = E("g", {transform:"rotate(-23 "+cx+" "+cy+")"}, svg);
  E("ellipse", {cx:cx, cy:cy, rx:84, ry:19, fill:"url(#v2-hatch)", stroke:INK, "stroke-width":1}, tilt);
  E("ellipse", {cx:cx, cy:cy, rx:84, ry:8, fill:VELLUM, stroke:INK, "stroke-width":.8}, tilt);
  E("line", hair({x1:cx, y1:cy-104, x2:cx, y2:cy+104, "stroke-width":1.4}), tilt);
  E("circle", {cx:cx, cy:cy-104, r:3.5, fill:INK}, tilt);
  E("circle", {cx:cx, cy:cy+104, r:3.5, fill:INK}, tilt);
  E("ellipse", hair({cx:cx, cy:cy, rx:30, ry:84, "stroke-width":1}), svg);
  [[58,38,4],[304,52,5],[314,192,4],[46,192,5],[330,120,5]].forEach(p => drawMag(svg, p[0], p[1], p[2]));
}
function vigOrbits(svg){
  svg.setAttribute("viewBox", "0 0 360 240");
  const cx = 180, cy = 122;
  E("ellipse", hair({cx:cx, cy:cy, rx:112, ry:40, "stroke-width":1.1, transform:"rotate(24 "+cx+" "+cy+")"}), svg);
  E("ellipse", hair({cx:cx, cy:cy, rx:112, ry:40, "stroke-width":1.1, transform:"rotate(-24 "+cx+" "+cy+")"}), svg);
  const ports = [[80,77],[280,77],[280,167],[80,167]];
  const routes = E("g", hair({"stroke-width":.8, "stroke-dasharray":"2 4", "stroke-opacity":.8}), svg);
  for (let i = 0; i < 4; i++){
    const a = ports[i], b = ports[(i+1)%4];
    E("line", {x1:a[0], y1:a[1], x2:b[0], y2:b[1]}, routes);
  }
  ports.forEach(p => E("path", {d: rayStarPath(p[0], p[1], 6, 8, .45), fill:INK}, svg));
  E("path", {d: rayStarPath(cx, cy, 8, 8, .45), fill:INK}, svg);
  [[130,52,5],[236,192,5],[124,192,5],[242,52,5],[330,116,5],[30,128,5]].forEach(p => drawMag(svg, p[0], p[1], p[2]));
}

/* =========================================================================
   TABULA IV : Yimwhan featured constellation plate (connect-the-stars tooth)
   ========================================================================= */
function buildDens(){
  const svg = document.getElementById("dens");
  svg.setAttribute("viewBox", "0 0 640 520");
  const defs = E("defs", {}, svg);
  const clip = E("clipPath", {id:"dens-clip"}, defs);
  E("rect", {x:30, y:28, width:580, height:464}, clip);
  tickFrame(svg, 30, 28, 580, 464, 12, false);

  const grat = E("g", {"clip-path":"url(#dens-clip)", stroke:INK, "stroke-opacity":.28, fill:"none"}, svg);
  const gc = {x:320, y:2050};
  for (let r = 1600; r <= 2010; r += 82)
    E("circle", {cx:gc.x, cy:gc.y, r:r, "stroke-width":.8, "vector-effect":"non-scaling-stroke"}, grat);
  for (let a = -9; a <= 9; a += 4.5){
    const rad = a*Math.PI/180;
    E("line", {x1:gc.x, y1:gc.y, x2:gc.x+2100*Math.sin(rad), y2:gc.y-2100*Math.cos(rad),
               "stroke-width":.75, "vector-effect":"non-scaling-stroke"}, grat);
  }

  const R = rng(4104);
  const field = E("g", {"clip-path":"url(#dens-clip)"}, svg);
  for (let i = 0; i < 60; i++){
    const x = 44 + R()*552, y = 42 + R()*420;
    drawMag(field, x, y, 3 + Math.floor(R()*3));
  }

  const W = DATA.work, pts = W.points;
  const cxm = pts.reduce((s,p) => s+p[0], 0)/pts.length;
  const cym = pts.reduce((s,p) => s+p[1], 0)/pts.length;
  let d = "";
  pts.forEach((p,i) => d += (i ? "L" : "M") + p[0] + " " + p[1] + " ");
  E("path", hair({d:d+"Z", "stroke-width":.9, "stroke-dasharray":"2.5 5", "stroke-opacity":.85}), svg);
  pts.forEach((p,i) => {
    if (i === W.alphaIndex){
      for (let k = 0; k < 16; k++){
        const a = k/16*Math.PI*2;
        E("line", hair({x1:p[0]+22*Math.cos(a), y1:p[1]+22*Math.sin(a),
                        x2:p[0]+30*Math.cos(a), y2:p[1]+30*Math.sin(a),
                        "stroke-width":.7, "stroke-opacity":.7}), svg);
      }
      goldStar(svg, p[0], p[1], 42);
    } else {
      E("path", {d: rayStarPath(p[0], p[1], 5.2 + ((i*7)%3)*1.1, 8, .45), fill:INK}, svg);
    }
    const vx = p[0]-cxm, vy = p[1]-cym, n = Math.hypot(vx,vy) || 1;
    T(svg, p[0]+vx/n*(i===W.alphaIndex?34:21), p[1]+vy/n*(i===W.alphaIndex?34:21)+4, W.labels[i],
      {"font-size":13.5, "font-style":"italic", "text-anchor":"middle", "fill-opacity":.85});
  });

  E("rect", {x:320-118, y:462, width:236, height:18, fill:VELLUM}, svg);
  T(svg, 320, 475, "CONSTELLATIO DENTIS", {"font-size":11, "letter-spacing":"3", "text-anchor":"middle", "fill-opacity":.85});
  T(svg, 596, 478, "Tab. IV.", {"font-size":13, "font-style":"italic", "text-anchor":"end", "fill-opacity":.85});
}

/* =========================================================================
   APPROACH : construction figure of the eight-point mark, engraved facets
   ========================================================================= */
function buildRose(){
  const svg = document.getElementById("rose");
  svg.setAttribute("viewBox", "0 0 440 440");
  addHatch(svg, "rose-hatch", 24, 4.5, .8);
  const c = 220;
  [172,128,76].forEach(r =>
    E("circle", hair({cx:c, cy:c, r:r, "stroke-width":.8, "stroke-dasharray":"1.5 4", "stroke-opacity":.75}), svg));
  [0,45,90,135].forEach(a =>
    E("line", hair({x1:c-186, y1:c, x2:c+186, y2:c, "stroke-width":.55, "stroke-opacity":.5,
                    transform:"rotate("+a+" "+c+" "+c+")"}), svg));
  const dims = {V:[170,21.7], H:[126.5,18.8], D:[87,14.8]};
  [0,45,90,135,180,225,270,315].forEach(a => {
    const t = (a % 90 === 0) ? (a % 180 === 0 ? dims.V : dims.H) : dims.D;
    const L = t[0], hw = t[1], flip = a >= 180;
    const g = E("g", {transform:"translate("+c+","+c+") rotate("+a+")"}, svg);
    const left  = "0,"+(-L)+" "+(-hw)+",0 0,0";
    const right = "0,"+(-L)+" "+hw+",0 0,0";
    E("polygon", {points: flip ? right : left,  fill:VELLUM, stroke:INK, "stroke-width":1.1, "stroke-linejoin":"round"}, g);
    E("polygon", {points: flip ? left : right, fill:"url(#rose-hatch)", stroke:INK, "stroke-width":1.1, "stroke-linejoin":"round"}, g);
    E("circle", {cx:0, cy:-L, r:1.8, fill:INK}, g);
  });
  E("circle", {cx:c, cy:c, r:2.6, fill:INK}, svg);
}

/* =========================================================================
   Populate copy from DATA + reveal choreography
   ========================================================================= */
function shead(id, num, title){
  document.getElementById(id).innerHTML =
    '<p class="snum">'+num+'</p><h2>'+title+'</h2>'+ORN;
}
function build(){
  const B = DATA.brand;
  document.getElementById("wordmark").textContent = B.wordmark;
  document.getElementById("positioning").textContent = B.positioning;
  document.getElementById("ctas").innerHTML =
    '<a class="btn primary" href="'+B.ctaPrimary.href+'">'+B.ctaPrimary.label+'</a>'
    + '<a class="btn" href="'+B.ctaSecondary.href+'">'+B.ctaSecondary.label+'</a>';
  document.getElementById("imprint").textContent = B.imprint;

  shead("shead-services", DATA.services.num, DATA.services.title);
  const plates = document.getElementById("plates");
  DATA.services.items.forEach((s,i) => {
    const art = document.createElement("article");
    art.className = "plate reveal";
    art.style.transitionDelay = (i*90)+"ms";
    art.innerHTML = '<div class="plate-inner"><p class="tab">'+s.tab+'</p>'
      + '<div class="vig"><svg aria-hidden="true"></svg></div>'
      + '<h3>'+s.name+'</h3><p class="desc">'+s.desc+'</p></div>';
    plates.appendChild(art);
    [vigWaves, vigArmillary, vigOrbits][i](art.querySelector("svg"));
  });

  shead("shead-work", DATA.work.num, DATA.work.title);
  document.getElementById("dens-cap").textContent = DATA.work.figureCaption;
  document.getElementById("work-copy").innerHTML =
    ORN + '<p class="lbl">In productione</p><h3>'+DATA.work.name+'</h3><p>'+DATA.work.desc+'</p>';
  buildDens();

  shead("shead-approach", DATA.approach.num, DATA.approach.title);
  document.getElementById("rose-cap").textContent = DATA.approach.figCaption;
  const cols = [document.getElementById("notes-left"), document.getElementById("notes-right")];
  DATA.approach.notes.forEach((n,i) => {
    const div = document.createElement("div");
    div.className = "note";
    div.innerHTML = '<p class="nn">'+n.nn+'</p><h3>'+n.name+'</h3><p>'+n.desc+'</p>';
    cols[i < 2 ? 0 : 1].appendChild(div);
  });
  buildRose();

  shead("shead-about", DATA.about.num, DATA.about.title);
  document.getElementById("about-body").textContent = DATA.about.body;

  shead("shead-contact", DATA.contact.num, DATA.contact.title);
  document.getElementById("contact-inner").innerHTML =
    '<p style="margin:0 0 14px"><a class="email" href="mailto:'+DATA.contact.email+'">'+DATA.contact.email+'</a></p>'
    + '<p class="city">'+DATA.contact.city+'</p>'
    + '<a class="btn primary" href="mailto:'+DATA.contact.email+'">'+B.ctaPrimary.label+'</a>';

  document.getElementById("f-word").textContent = B.wordmark;
  document.getElementById("f-city").textContent = DATA.footer.city;
  document.getElementById("colophon").textContent = DATA.footer.colophon;
  document.getElementById("f-copy").textContent = DATA.footer.copyright;

  buildHero();

  /* reveal on scroll; prefers-reduced-motion shows final state immediately */
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  const targets = document.querySelectorAll(".reveal");
  if (reduced || !("IntersectionObserver" in window)){
    targets.forEach(el => el.classList.add("in"));
  } else {
    const io = new IntersectionObserver(entries => {
      entries.forEach(en => { if (en.isIntersecting){ en.target.classList.add("in"); io.unobserve(en.target); } });
    }, {threshold:.12, rootMargin:"0px 0px -8% 0px"});
    targets.forEach(el => io.observe(el));
  }
}
build();
</script>
