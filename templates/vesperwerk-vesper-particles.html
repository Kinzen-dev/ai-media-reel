<style>

    --gold:#a8802f; --gold-hi:#c09a4a; --gold-soft:#caa25a;
    --cream:#faf7f1; --cream-dim:#d9d2c6;
    --ink:#2e2a26;

    --serif:"Playfair Display",Georgia,serif;

  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  html,body{width:100%;overflow-x:hidden}
  body{
    background:var(--indigo);
    color:var(--cream);
    font-family:var(--sans);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100svh;
    position:relative;
  }

  /* ---------- fixed living field ---------- */
  #field{
    position:fixed; inset:0; width:100%; height:100%;
    z-index:0; display:block; touch-action:pan-y;
  }

  /* ---------- nav ---------- */
  #nav{
    position:fixed; top:0; left:0; right:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;

  .brand{display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--cream); min-width:0}

    text-shadow:0 1px 18px rgba(8,6,16,.7);
  }
  .nav-cta{
    font-family:var(--mono); font-size:.7rem; letter-spacing:.16em; text-transform:uppercase;
    color:var(--gold-hi); text-decoration:none; white-space:nowrap;
    border:1px solid rgba(200,160,80,.4); border-radius:999px;
    padding:9px 16px; transition:background .3s,border-color .3s,color .3s;

  .sec{

  }

    font-family:var(--mono); font-size:.7rem; letter-spacing:.34em; text-transform:uppercase;

  }
  .overline::before{content:""; width:26px; height:1px; background:var(--gold)}
  .sec--center .overline{justify-content:center}

  h1.wordmark{
    font-family:var(--serif); font-weight:600;
    font-size:clamp(2.4rem,10.5vw,6.6rem); line-height:.98;

  @keyframes cue{0%,100%{opacity:.35;transform:translate(-50%,0)}50%{opacity:.8;transform:translate(-50%,5px)}}

  @media (prefers-reduced-motion: reduce){

    h1.wordmark{transition:none !important; letter-spacing:.24em; opacity:1}

    .scroll-cue{animation:none}
  }
  @media (prefers-reduced-motion: no-preference){
    html{scroll-behavior:smooth}
  }
</style>

<script>
/* =====================================================================
   VESPER FIELD - one living Canvas2D particle world that carries the
   whole site. Formations morph on scroll; cursor bends the field;
   click = nova; hold = attract. Honest adaptive-quality HUD.
   ===================================================================== */
(function(){
  "use strict";
  const canvas = document.getElementById('field');
  const ctx = canvas.getContext('2d', { alpha:false });
  const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- config ----
  const CFG = {
    spring:0.05, damp:0.86,
    repelR:132, repel:1600, repelMax:7,
    attractR2:230*230, attract:0.0065,
    novaR:960, novaStr:30,
    dot:4.8, dprCap:2,
    breathe:0.006
  };

  let W = innerWidth, H = innerHeight, dpr = 1;
  const N = (innerWidth <= 640) ? 900 : 2200;
  let activeN = N;
  const Nfloor = Math.max(520, Math.floor(N * 0.45));

  // ---- particle state (typed arrays) ----
  const x = new Float32Array(N), y = new Float32Array(N);
  const vx = new Float32Array(N), vy = new Float32Array(N);
  const type = new Uint8Array(N);            // 1 = cream highlight particle
  const ambient = new Uint8Array(N);         // 1 = ambient dust (never joins a glyph)
  const ph = new Float32Array(N), sp = new Float32Array(N); // twinkle
  const targetsX = [], targetsY = [], starMask = [];
  for (let c = 0; c < 5; c++){ targetsX.push(new Float32Array(N)); targetsY.push(new Float32Array(N)); starMask.push(new Uint8Array(N)); }

  // deterministic per-particle spreads (stable identity across chapters)
  const gold1 = i => (i * 0.6180339887 + 0.11) % 1;
  const gold2 = i => (i * 0.7548776662 + 0.37) % 1;
  const gold3 = i => (i * 0.5698402909 + 0.71) % 1;
  const hash  = i => ((i * 2654435761) >>> 0);

  for (let i = 0; i < N; i++){
    type[i] = (gold2(i) < 0.18) ? 1 : 0;
    ambient[i] = ((hash(i) % 100) < 18) ? 1 : 0;
    ph[i] = gold3(i) * 6.2831853;
    sp[i] = 1.4 + gold1(i) * 2.4;
  }

  // ---- sprites (soft glow via radial gradient, drawn with 'lighter') ----
  function makeSprite(stops){
    const s = 64, c = document.createElement('canvas'); c.width = c.height = s;
    const g = c.getContext('2d');
    const grd = g.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    stops.forEach(st => grd.addColorStop(st[0], st[1]));
    g.fillStyle = grd; g.fillRect(0, 0, s, s);
    return c;
  }
  const spriteGold = makeSprite([[0,'rgba(250,228,172,1)'],[0.16,'rgba(230,186,110,0.78)'],[0.5,'rgba(180,132,60,0.14)'],[1,'rgba(150,110,44,0)']]);
  const spriteBright = makeSprite([[0,'rgba(255,252,247,1)'],[0.18,'rgba(240,210,150,0.8)'],[0.5,'rgba(210,168,96,0.16)'],[1,'rgba(190,150,84,0)']]);

  // ---- offscreen rasterizer for silhouette sampling ----
  const off = document.createElement('canvas');
  const octx = off.getContext('2d', { willReadFrequently:true });
  function rasterize(w, h, drawFn, step){
    w = Math.max(8, Math.round(w)); h = Math.max(8, Math.round(h));
    off.width = w; off.height = h;
    octx.clearRect(0, 0, w, h);
    octx.fillStyle = '#fff'; octx.strokeStyle = '#fff';
    octx.lineJoin = 'round'; octx.lineCap = 'round';
    drawFn(octx, w, h);
    const data = octx.getImageData(0, 0, w, h).data;
    const pts = [];
    for (let yy = 0; yy < h; yy += step){
      const row = yy * w;
      for (let xx = 0; xx < w; xx += step){
        if (data[(row + xx) * 4 + 3] > 110) pts.push([xx, yy]);
      }
    }
    return pts;
  }
  function shapeRaster(cx, cy, bw, bh, drawFn, step, weight, bright, lineFn){
    const pts = rasterize(bw, bh, drawFn, step);
    const ox = cx - bw/2, oy = cy - bh/2;
    const cloud = pts.map(p => [ox + p[0], oy + p[1]]);
    let lines = null;
    if (lineFn){ lines = lineFn(bw, bh).map(poly => poly.map(p => [ox + p[0], oy + p[1]])); }
    return { cloud, weight, bright:!!bright, lines };
  }
  function shapePoints(cloud, weight, bright, lines){ return { cloud, weight, bright:!!bright, lines:lines || null }; }

  // ---- shape draw functions (local box coords) ----
  const STAR_DIRS = [
    [0,-1,86,11],[0,1,86,11],[-1,0,64,9.5],[1,0,64,9.5],
    [0.7071,-0.7071,44,7.5],[0.7071,0.7071,44,7.5],[-0.7071,0.7071,44,7.5],[-0.7071,-0.7071,44,7.5]
  ];
  function drawStarLocal(o, bw, bh, R){
    const cx = bw/2, cy = bh/2, s = R/86;
    o.fillStyle = '#fff';
    for (const d of STAR_DIRS){
      const ux = d[0], uy = d[1], L = d[2], hw = d[3];
      const px = -uy, py = ux;
      const tx = cx + ux*L*s, ty = cy + uy*L*s;
      const b1x = cx + px*hw*s, b1y = cy + py*hw*s;
      const b2x = cx - px*hw*s, b2y = cy - py*hw*s;
      o.beginPath(); o.moveTo(tx, ty); o.lineTo(b1x, b1y); o.lineTo(b2x, b2y); o.closePath(); o.fill();
    }
    o.beginPath(); o.arc(cx, cy, R*0.16, 0, 6.2831853); o.fill();
  }
  function waveCurve(bw, bh){
    const pts = [], n = 66, mid = bh/2, x0 = bw*0.06, x1 = bw*0.94, cycles = 3;
    for (let i = 0; i <= n; i++){
      const u = i/n, env = Math.pow(Math.sin(u*Math.PI), 0.6);
      pts.push([x0 + (x1-x0)*u, mid - Math.sin(u*Math.PI*2*cycles) * bh*0.40 * env]);
    }
    return pts;
  }
  function drawWave(o, bw, bh){
    // bold oscilloscope trace, bell-modulated amplitude - unmistakable voice waveform
    o.strokeStyle = '#fff'; o.lineWidth = Math.max(5, bw*0.05); o.lineJoin = 'round'; o.lineCap = 'round';
    const pts = waveCurve(bw, bh);
    o.beginPath(); o.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length; i++) o.lineTo(pts[i][0], pts[i][1]);
    o.stroke();
  }
  function beamVerts(bw, bh){
    // isometric unit cube -> 8 screen vertices, centred in the box
    const cx = bw/2, cy = bh/2, s = Math.min(bw,bh)*0.30, W2 = s*0.866, H2 = s*0.5, Zh = s;
    const v = (gx,gy,gz)=>[cx + (gx-gy)*W2, cy + (gx+gy)*H2 - gz*Zh];
    return [ v(0,0,0), v(1,0,0), v(1,1,0), v(0,1,0), v(0,0,1), v(1,0,1), v(1,1,1), v(0,1,1) ];
  }
  const CUBE_EDGES = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  function drawBeam(o, bw, bh){
    // bold isometric structural frame - unmistakable engineered 3D lattice
    o.strokeStyle = '#fff'; o.lineWidth = Math.max(5, bw*0.055); o.lineJoin = 'round'; o.lineCap = 'round';
    const V = beamVerts(bw, bh);
    for (const e of CUBE_EDGES){ o.beginPath(); o.moveTo(V[e[0]][0], V[e[0]][1]); o.lineTo(V[e[1]][0], V[e[1]][1]); o.stroke(); }
  }
  function drawShop(o, bw, bh){
    o.strokeStyle = '#fff'; o.fillStyle = '#fff'; o.lineWidth = Math.max(4, bw*0.04);
    const m = bw*0.14, left = m, right = bw - m, top = bh*0.46, bottom = bh - m*0.7;
    o.beginPath(); o.rect(left, top, right-left, bottom-top); o.stroke();          // body
    const dw = (right-left)*0.26, dh = (bottom-top)*0.56;
    o.beginPath(); o.rect(bw/2 - dw/2, bottom - dh, dw, dh); o.stroke();           // door
    const ay1 = top, ay0 = bh*0.24;
    o.beginPath(); o.moveTo(left-4, ay1); o.lineTo(right+4, ay1);
    o.lineTo(right - bw*0.05, ay0); o.lineTo(left + bw*0.05, ay0); o.closePath(); o.stroke(); // awning
    const ns = 5;
    for (let i = 0; i < ns; i++){
      const xa = left + (right-left)*(i/ns), xb = left + (right-left)*((i+1)/ns), r = (xb-xa)/2;
      o.beginPath(); o.arc((xa+xb)/2, ay1, r, 0, Math.PI); o.stroke();
    }
  }
  function drawPhone(o, bw, bh){
    o.strokeStyle = '#fff'; o.lineCap = 'round';
    const cx = bw*0.44, cy = bh*0.62;
    o.lineWidth = bw*0.15;
    o.beginPath(); o.arc(cx, cy, bw*0.25, Math.PI*0.14, Math.PI*0.86); o.stroke();  // handset
    o.lineWidth = Math.max(3, bw*0.03);
    const rX = bw*0.74, rY = bh*0.26;
    for (let k = 1; k <= 3; k++){ o.beginPath(); o.arc(rX, rY, k*bw*0.07, -Math.PI*0.12, Math.PI*0.52); o.stroke(); }
  }
  function drawTooth(o, bw, bh){
    o.strokeStyle = '#fff'; o.lineWidth = Math.max(4, bw*0.055); o.lineJoin = 'round'; o.lineCap = 'round';
    const cx = bw/2, topY = bh*0.16, midY = bh*0.5, botY = bh*0.9, lx = bw*0.24, rx = bw*0.76;
    o.beginPath();
    o.moveTo(lx, midY);
    o.bezierCurveTo(lx - bw*0.05, topY, cx - bw*0.02, topY, cx, midY*0.72);
    o.bezierCurveTo(cx + bw*0.02, topY, rx + bw*0.05, topY, rx, midY);
    o.bezierCurveTo(rx + bw*0.02, midY + bh*0.12, rx - bw*0.02, botY, cx + bw*0.13, botY);
    o.bezierCurveTo(cx + bw*0.06, midY + bh*0.2, cx + bw*0.02, midY + bh*0.2, cx, midY + bh*0.16);
    o.bezierCurveTo(cx - bw*0.02, midY + bh*0.2, cx - bw*0.06, midY + bh*0.2, cx - bw*0.13, botY);
    o.bezierCurveTo(lx + bw*0.02, botY, lx - bw*0.02, midY + bh*0.12, lx, midY);
    o.closePath(); o.stroke();
  }
  function drawRing(o, bw, bh){
    o.strokeStyle = '#fff'; o.lineWidth = Math.max(3, bw*0.035);
    const r = bw/2 - o.lineWidth*1.4;
    o.beginPath(); o.arc(bw/2, bh/2, r, 0, 6.2831853); o.stroke();
    o.fillStyle = '#fff'; o.beginPath(); o.arc(bw/2 + r, bh/2, Math.max(4, bw*0.04), 0, 6.2831853); o.fill();
  }

  // ---- constellation hairlines: vertex polylines per glyph (local box coords, matched to the draw fns) ----
  function waveLines(bw, bh){ return [ waveCurve(bw, bh) ]; }
  function beamLines(bw, bh){
    const V = beamVerts(bw, bh), out = [];
    for (const e of CUBE_EDGES) out.push([V[e[0]], V[e[1]]]);
    return out;
  }
  function shopLines(bw, bh){
    const m = bw*0.14, left = m, right = bw - m, top = bh*0.46, bottom = bh - m*0.7;
    const dw = (right-left)*0.26, dh = (bottom-top)*0.56, ay1 = top, ay0 = bh*0.24;
    const body = [[left,top],[right,top],[right,bottom],[left,bottom],[left,top]];
    const awning = [[left-4,ay1],[right+4,ay1],[right - bw*0.05,ay0],[left + bw*0.05,ay0],[left-4,ay1]];
    const door = [[bw/2-dw/2,bottom],[bw/2-dw/2,bottom-dh],[bw/2+dw/2,bottom-dh],[bw/2+dw/2,bottom]];
    return [body, awning, door];
  }
  function starLines(bw, bh, R){
    const cx = bw/2, cy = bh/2, s = R/86, out = [];
    for (const d of STAR_DIRS) out.push([[cx,cy],[cx + d[0]*d[2]*s, cy + d[1]*d[2]*s]]);
    return out;
  }
  function ringLines(bw, bh){
    const lw = Math.max(3, bw*0.035), r = bw/2 - lw*1.4, seg = 46, poly = [];
    for (let k = 0; k <= seg; k++){ const a = k/seg*6.2831853; poly.push([bw/2 + Math.cos(a)*r, bh/2 + Math.sin(a)*r]); }
    return [poly];
  }
  function toothLines(bw, bh){
    const cx = bw/2, topY = bh*0.16, midY = bh*0.5, botY = bh*0.9, lx = bw*0.24, rx = bw*0.76;
    const seg = (p0,c1,c2,p1,n)=>bezierCloud(p0,c1,c2,p1,n);
    let poly = [[lx, midY]];
    poly = poly.concat(seg([lx,midY],[lx-bw*0.05,topY],[cx-bw*0.02,topY],[cx,midY*0.72],10));
    poly = poly.concat(seg([cx,midY*0.72],[cx+bw*0.02,topY],[rx+bw*0.05,topY],[rx,midY],10));
    poly = poly.concat(seg([rx,midY],[rx+bw*0.02,midY+bh*0.12],[rx-bw*0.02,botY],[cx+bw*0.13,botY],10));
    poly = poly.concat(seg([cx+bw*0.13,botY],[cx+bw*0.06,midY+bh*0.2],[cx+bw*0.02,midY+bh*0.2],[cx,midY+bh*0.16],8));
    poly = poly.concat(seg([cx,midY+bh*0.16],[cx-bw*0.02,midY+bh*0.2],[cx-bw*0.06,midY+bh*0.2],[cx-bw*0.13,botY],8));
    poly = poly.concat(seg([cx-bw*0.13,botY],[lx+bw*0.02,botY],[lx-bw*0.02,midY+bh*0.12],[lx,midY],10));
    return [poly];
  }
  function horizonLineAbs(narrow){
    const y0 = H*(narrow ? 0.76 : 0.74), x0 = W*0.05, x1 = W*0.95, n = Math.max(60, Math.round(W/(narrow?6:5))), poly = [];
    for (let i = 0; i <= n; i++){
      const xf = i/n, xx = x0 + (x1-x0)*xf, yy = y0 + Math.sin(xf*Math.PI*2)*7 + Math.sin(xf*Math.PI*6 + 1)*3;
      poly.push([xx, yy]);
    }
    return [poly];
  }

  function bezierCloud(p0, p1, p2, p3, n){
    const pts = [];
    for (let k = 0; k <= n; k++){
      const t = k/n, mt = 1-t, a = mt*mt*mt, b = 3*mt*mt*t, c = 3*mt*t*t, d = t*t*t;
      pts.push([a*p0[0]+b*p1[0]+c*p2[0]+d*p3[0], a*p0[1]+b*p1[1]+c*p2[1]+d*p3[1]]);
    }
    return pts;
  }
  function horizonCloud(narrow){
    const pts = [], y0 = H*(narrow ? 0.76 : 0.74), x0 = W*0.05, x1 = W*0.95, n = Math.max(60, Math.round(W/(narrow?6:5)));
    for (let i = 0; i <= n; i++){
      const xf = i/n, xx = x0 + (x1-x0)*xf;
      const yy = y0 + Math.sin(xf*Math.PI*2)*7 + Math.sin(xf*Math.PI*6 + 1)*3;
      for (let r = 0; r < 3; r++) pts.push([xx, yy + (r-1)*6 + (gold2(i*3+r)-0.5)*3]);
    }
    return pts;
  }

  // ---- per-chapter formation layout ----
  function chapterShapes(c){
    const U = Math.min(W, H), narrow = W <= 640;
    if (c === 0){
      const R = U * 0.30, box = R*2 + 18;
      return [ shapeRaster(W*0.5, H*(narrow?0.42:0.44), box, box,
        (o,bw,bh)=>drawStarLocal(o,bw,bh,R), Math.max(3, Math.round(box/170)), 1, false,
        (bw,bh)=>starLines(bw,bh,R)) ];
    }
    if (c === 1){
      const gx = narrow ? 0.5 : 0.72, gy = [0.30, 0.52, 0.74], gs = U*(narrow?0.17:0.15);
      return [
        shapeRaster(W*gx, H*gy[0], gs*1.35, gs, drawWave, 2, 1/3, false, waveLines),
        shapeRaster(W*gx, H*gy[1], gs*1.3, gs*1.3, drawBeam, 2, 1/3, false, beamLines),
        shapeRaster(W*gx, H*gy[2], gs*1.3, gs, drawShop, 2, 1/3, false, shopLines)
      ];
    }
    if (c === 2){
      const px = W*(narrow?0.5:0.66), py = H*(narrow?0.27:0.32);
      const tx = W*(narrow?0.5:0.72), ty = H*(narrow?0.66:0.70);
      const ps = U*(narrow?0.17:0.15);
      const phone = shapeRaster(px, py, ps*1.3, ps*1.3, drawPhone, 2, 0.3, false);
      const tooth = shapeRaster(tx, ty, ps*1.05, ps*1.4, drawTooth, 2, 0.5, false, toothLines);
      const c1 = [px + (narrow?0:-U*0.02), py + (ty-py)*0.35];
      const c2 = [tx + (narrow?0:-U*0.16), py + (ty-py)*0.72];
      const p0 = [px, py + ps*0.5], p3 = [tx, ty - ps*0.55];
      const path = shapePoints(bezierCloud(p0, c1, c2, p3, 150), 0.2, false, [ bezierCloud(p0, c1, c2, p3, 26) ]);
      return [phone, path, tooth];
    }
    if (c === 3){
      const box = U*(narrow?0.2:0.16);
      const xs = narrow ? [0.30,0.70,0.30,0.70] : [0.34,0.66,0.34,0.66];
      const ys = narrow ? [0.38,0.38,0.66,0.66] : [0.40,0.40,0.68,0.68];
      return xs.map((xf,i)=> shapeRaster(W*xf, H*ys[i], box, box, drawRing, 2, 0.25, false, ringLines));
    }
    // chapter 4 - horizon + one burning star
    const narrow4 = W <= 640;
    const sR = U*0.058, sbox = sR*2 + 14;
    const star = shapeRaster(W*0.5, H*(narrow4?0.28:0.30), sbox, sbox,
      (o,bw,bh)=>drawStarLocal(o,bw,bh,sR), 2, 0.18, true, (bw,bh)=>starLines(bw,bh,sR));
    const horizon = shapePoints(horizonCloud(narrow4), 0.82, false, horizonLineAbs(narrow4));
    return [horizon, star];
  }

  const chapterLines = [null, null, null, null, null];
  function computeAllTargets(){
    for (let c = 0; c < 5; c++){
      const shapes = chapterShapes(c);
      const tX = targetsX[c], tY = targetsY[c], bm = starMask[c];
      let total = 0; for (const s of shapes) total += s.weight;
      const cum = []; let acc = 0; for (const s of shapes){ acc += s.weight; cum.push(acc); }
      for (let i = 0; i < N; i++){
        if (ambient[i]){
          tX[i] = (gold1(i*3 + c*7) * 1.08 - 0.04) * W;
          tY[i] = (gold3(i*5 + c*11) * 1.08 - 0.04) * H;
          bm[i] = 0; continue;
        }
        const f = gold1(i) * total;
        let pick = 0; while (pick < cum.length - 1 && cum[pick] < f) pick++;
        const sh = shapes[pick], cl = sh.cloud;
        if (!cl.length){ tX[i] = W/2; tY[i] = H/2; bm[i] = 0; continue; }
        const p = cl[hash(i) % cl.length];
        tX[i] = p[0] + (gold2(i) - 0.5) * 1.8;
        tY[i] = p[1] + (gold3(i) - 0.5) * 1.8;
        bm[i] = sh.bright ? 1 : 0;
      }
      const lns = [];
      for (const s of shapes){ if (s.lines){ for (const poly of s.lines) lns.push(poly); } }
      chapterLines[c] = lns;
    }
  }

  // ---- active target pointers ----
  let curTX = targetsX[0], curTY = targetsY[0], curBright = starMask[0], curLines = null;
  let activeChapter = 0, settle = 0;
  function setActiveTargets(c){ curTX = targetsX[c]; curTY = targetsY[c]; curBright = starMask[c]; curLines = chapterLines[c]; }

  // ---- background gradient ----
  let grad = null;
  function buildGradient(){
    grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0.00, '#181627');
    grad.addColorStop(0.52, '#221d33');
    grad.addColorStop(0.80, '#372833');
    grad.addColorStop(0.92, '#7c4a27');
    grad.addColorStop(1.00, '#b06a2c');
  }

  // ---- sizing ----
  function resize(){
    W = innerWidth; H = innerHeight;
    dpr = Math.min(window.devicePixelRatio || 1, CFG.dprCap);
    canvas.width = Math.round(W * dpr); canvas.height = Math.round(H * dpr);
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildGradient();
    computeAllTargets();
    setActiveTargets(activeChapter);   // re-point curLines at the freshly rebuilt geometry
  }

  // ---- interaction state ----
  let mx = -9999, my = -9999, pointerInside = false, pointerSpeed = 0;
  let holding = false, touchDown = false, downTime = 0, downX = 0, downY = 0;
  let lastMoveX = 0, lastMoveY = 0, hasLastMove = false;
  let novaGlow = 0, forceMeter = 0;

  function nova(cx, cy){
    novaGlow = 1;
    for (let i = 0; i < activeN; i++){
      const dx = x[i] - cx, dy = y[i] - cy, d = Math.sqrt(dx*dx + dy*dy) + 1;
      if (d < CFG.novaR){
        const k = 1 - d / CFG.novaR, imp = k*k*CFG.novaStr + 2;
        vx[i] += dx/d * imp; vy[i] += dy/d * imp;
      }
    }
  }

  const isInteractive = t => t && t.closest && t.closest('a,button,input,label,figure');

  window.addEventListener('pointermove', e => {
    if (e.pointerType === 'touch') return;
    if (hasLastMove) pointerSpeed = Math.hypot(e.clientX - lastMoveX, e.clientY - lastMoveY);
    lastMoveX = e.clientX; lastMoveY = e.clientY; hasLastMove = true;
    mx = e.clientX; my = e.clientY; pointerInside = true;
  }, { passive:true });
  window.addEventListener('pointerdown', e => {
    downTime = performance.now(); downX = e.clientX; downY = e.clientY;
    holding = true; touchDown = (e.pointerType === 'touch');
    if (!touchDown){ mx = e.clientX; my = e.clientY; pointerInside = true; }
  }, { passive:true });
  window.addEventListener('pointerup', e => {
    const dt = performance.now() - downTime;
    const dist = Math.hypot(e.clientX - downX, e.clientY - downY);
    holding = false;
    if (dt < 240 && dist < 12 && !isInteractive(e.target)) nova(e.clientX, e.clientY);
  }, { passive:true });
  window.addEventListener('pointercancel', () => { holding = false; }, { passive:true });
  canvas.addEventListener('pointerleave', () => { pointerInside = false; mx = -9999; my = -9999; }, { passive:true });

  // ---- HUD ----
  const hP = document.getElementById('hP'), hF = document.getElementById('hF'),
        hC = document.getElementById('hC'), hForce = document.getElementById('hForce');
  const NAMES = DATA.chapters;
  function hudChapter(c){ hC.textContent = 'CH ' + String(c).padStart(2,'0') + ' ' + NAMES[c]; }

  // ---- chapter detection ----
  const sections = () => Array.prototype.slice.call(document.querySelectorAll('section.sec'));
  let SECS = [], needChapter = true;
  function updateChapter(){
    const vc = H / 2; let best = 0, bd = 1e9;
    for (let i = 0; i < SECS.length; i++){
      const r = SECS[i].getBoundingClientRect(), c = r.top + r.height/2, d = Math.abs(c - vc);
      if (d < bd){ bd = d; best = i; }
    }
    if (best !== activeChapter){ activeChapter = best; setActiveTargets(best); hudChapter(best); }
  }
  window.addEventListener('scroll', () => { needChapter = true; }, { passive:true });

  // ---- draw one frame ----
  function draw(t){
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    ctx.globalCompositeOperation = 'lighter';
    const base = CFG.dot, emph = settle, narrowNow = W <= 640;
    for (let i = 0; i < activeN; i++){
      const hi = curBright[i] || type[i];
      const spr = hi ? spriteBright : spriteGold;
      const tw = 1 + 0.32 * Math.sin(t * sp[i] + ph[i]);
      let sz, a;
      if (ambient[i]){
        sz = base * tw * 0.66;
        a = narrowNow ? 0.2 : 0.27;                                  // dim dusk drifters
      } else {
        sz = base * tw * (hi ? 1.45 : 1.0) * (0.86 + 0.16 * emph);   // formation swells as it settles
        a = (hi ? 0.6 : 0.44) + emph * (hi ? 0.28 : 0.42);           // formation brightens once condensed
        if (narrowNow) a = Math.min(0.96, a * 1.14);                 // keep glyphs legible behind mobile copy
      }
      ctx.globalAlpha = a;
      ctx.drawImage(spr, x[i] - sz, y[i] - sz, sz*2, sz*2);
    }
    ctx.globalAlpha = 1;
    drawHairlines();
    ctx.globalCompositeOperation = 'source-over';
  }
  function drawHairlines(){
    if (!curLines || !curLines.length) return;
    const la = RM ? 0.52 : settle * (1 - Math.min(1, novaGlow * 1.5)) * 0.5;   // fade during morphs + novas
    if (la <= 0.02) return;
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = la;
    ctx.strokeStyle = 'rgba(206,172,102,0.92)';
    ctx.lineWidth = 1.1; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    for (const poly of curLines){
      if (poly.length < 2) continue;
      ctx.beginPath(); ctx.moveTo(poly[0][0], poly[0][1]);
      for (let k = 1; k < poly.length; k++) ctx.lineTo(poly[k][0], poly[k][1]);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // ---- fps + adaptive quality ----
  let fps = 60, fpsFrames = 0, fpsLast = performance.now(), lowStart = 0, last = performance.now();
  function hudNums(){ hP.textContent = 'P ' + activeN; hF.textContent = 'FPS ' + Math.round(fps); hForce.textContent = 'FORCE ' + forceMeter.toFixed(1); }

  // ---- main loop ----
  let rafId = 0, hidden = false;
  function frame(now){
    if (hidden){ rafId = 0; return; }
    rafId = requestAnimationFrame(frame);
    const t = now * 0.001;

    fpsFrames++;
    if (now - fpsLast >= 250){
      fps = fpsFrames * 1000 / (now - fpsLast); fpsFrames = 0; fpsLast = now;
      if (fps < 45){
        if (lowStart === 0) lowStart = now;
        else if (now - lowStart > 2000 && activeN > Nfloor){
          activeN = Math.max(Nfloor, Math.floor(activeN * 0.75)); lowStart = 0;
        }
      } else lowStart = 0;
      hudNums();
    }
    if (needChapter){ updateChapter(); needChapter = false; }

    novaGlow *= 0.94;
    const attracting = holding && !touchDown && (now - downTime > 200);
    const R2 = CFG.repelR * CFG.repelR;

    for (let i = 0; i < activeN; i++){
      let ax = (curTX[i] - x[i]) * CFG.spring;
      let ay = (curTY[i] - y[i]) * CFG.spring;
      ax += Math.sin(t * 0.5 + ph[i]) * CFG.breathe;
      ay += Math.cos(t * 0.42 + ph[i]) * CFG.breathe;
      if (pointerInside){
        const dx = x[i] - mx, dy = y[i] - my, d2 = dx*dx + dy*dy;
        if (d2 < R2 && d2 > 0.01){
          const d = Math.sqrt(d2);
          let push = CFG.repel / d2; if (push > CFG.repelMax) push = CFG.repelMax;
          ax += dx/d * push; ay += dy/d * push;
        }
      }
      if (attracting){
        const dx = mx - x[i], dy = my - y[i], d2 = dx*dx + dy*dy;
        if (d2 < CFG.attractR2){ ax += dx * CFG.attract; ay += dy * CFG.attract; }
      }
      const nvx = (vx[i] + ax) * CFG.damp, nvy = (vy[i] + ay) * CFG.damp;
      vx[i] = nvx; vy[i] = nvy; x[i] += nvx; y[i] += nvy;
    }

    // formation arrival -> drives two-tier emphasis + hairline reveal (sampled, cheap)
    let sd = 0, sc = 0;
    for (let i = 0; i < activeN; i += 9){
      if (ambient[i]) continue;
      const dx = curTX[i] - x[i], dy = curTY[i] - y[i]; sd += dx*dx + dy*dy; sc++;
    }
    const md = Math.sqrt(sd / Math.max(1, sc));
    const arrived = md < 24 ? 1 : (md > 96 ? 0 : (96 - md) / 72);
    settle += (arrived - settle) * 0.06;

    const spd = pointerInside ? Math.min(pointerSpeed * 0.02, 0.6) : 0;
    pointerSpeed *= 0.82;
    let ft = novaGlow + (attracting ? 0.5 : 0) + spd; if (ft > 1.2) ft = 1.2;
    forceMeter += (ft - forceMeter) * 0.15;

    draw(t);
  }

  document.addEventListener('visibilitychange', () => {
    hidden = document.hidden;
    if (!hidden && !RM && !rafId){ last = performance.now(); fpsLast = performance.now(); fpsFrames = 0; rafId = requestAnimationFrame(frame); }
  });

  // ---- reduced motion: static formation per chapter, no rAF ----
  let rmChapter = 0;
  function placeAndDraw(c){
    setActiveTargets(c);
    const tX = targetsX[c], tY = targetsY[c];
    for (let i = 0; i < activeN; i++){ x[i] = tX[i]; y[i] = tY[i]; }
    settle = 1;                        // static render is fully condensed: full brightness + hairlines
    draw(0);
  }

  // ---- boot ----
  function initParticles(){
    for (let i = 0; i < N; i++){
      x[i] = (gold1(i) * 1.6 - 0.3) * W;
      y[i] = (gold3(i) * 1.6 - 0.3) * H;
      vx[i] = (gold2(i) - 0.5) * 2; vy[i] = (gold1(i) - 0.5) * 2;
    }
  }

  function start(){
    SECS = sections();
    resize();
    hP.textContent = 'P ' + activeN;
    hudChapter(0);

    if (RM){
      hF.textContent = 'FPS --'; hForce.textContent = 'FORCE 0.0';
      computeAllTargets();
      activeChapter = 0; placeAndDraw(0);
      const io = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting){
            const c = +e.target.dataset.ch;
            rmChapter = c; activeChapter = c; placeAndDraw(c); hudChapter(c);
          }
        });
      }, { threshold: 0.5 });
      SECS.forEach(s => io.observe(s));
      document.body.classList.add('loaded');
    } else {
      initParticles();
      setActiveTargets(0);
      updateChapter();
      last = performance.now(); fpsLast = performance.now();
      rafId = requestAnimationFrame(frame);
      requestAnimationFrame(() => document.body.classList.add('loaded'));
    }
  }

  // debounced resize
  let rt = 0;
  window.addEventListener('resize', () => {
    clearTimeout(rt);
    rt = setTimeout(() => {
      resize();
      SECS = sections();
      if (RM){ placeAndDraw(rmChapter); }
      else { needChapter = true; }
    }, 180);
  });

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>
