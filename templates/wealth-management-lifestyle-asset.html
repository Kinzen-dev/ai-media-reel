<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Lifestyle Asset</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DATA-DRIVEN: all swappable copy lives in the JS DATA object
     at the bottom of <body>. Visual tokens below.
     ============================================================ */
  :root{
    --canvas:#f6f4ef;      /* near-white warm paper */
    --canvas-2:#efece4;    /* faint vignette edge */
    --ink:#1a1714;         /* near-black ink */
    --ink-soft:#5c554c;    /* muted ink */
    --hair:#d8d2c6;        /* hairline rule */
    --gold:#b08642;        /* warm metallic accent */
    --gold-bright:#e6c884; /* highlight */
    --gold-deep:#7a5a23;   /* shadow */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--canvas);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    min-height:100vh;
  }
  /* soft radial warmth on the canvas */
  body::before{
    content:"";
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(120% 90% at 50% 38%, #fdfcf9 0%, #f6f4ef 46%, #ece8df 100%);
  }

  /* ---------- NAV (minimal) ---------- */
  .nav{
    position:relative;z-index:5;
    display:flex;align-items:center;justify-content:space-between;
    padding:26px clamp(20px,5vw,64px);
  }
  .brand{
    font-family:'Fraunces',serif;
    font-weight:500;
    font-size:19px;
    letter-spacing:.02em;
    color:var(--ink);
    display:flex;align-items:center;gap:11px;
  }
  .brand .mark{
    width:9px;height:9px;border-radius:50%;
    background:linear-gradient(140deg,#e6c884,#b08642 55%,#7a5a23);
    box-shadow:0 0 0 1px rgba(176,134,66,.35), 0 1px 4px rgba(122,90,35,.35);
    flex:0 0 auto;
  }
  .nav-links{
    display:flex;align-items:center;gap:clamp(18px,2.4vw,40px);
    font-size:14px;
  }
  .nav-links a{
    color:var(--ink-soft);text-decoration:none;letter-spacing:.01em;
    transition:color .25s ease;
  }
  .nav-links a:hover,.nav-links a:focus-visible{color:var(--ink)}
  .nav-links .sep{width:1px;height:16px;background:var(--hair)}
  .nav-cta{
    color:var(--ink)!important;font-weight:500;
    border:1px solid var(--hair);
    padding:8px 16px;border-radius:30px;
    transition:border-color .25s ease,background .25s ease;
  }
  .nav-cta:hover,.nav-cta:focus-visible{border-color:var(--gold);background:rgba(176,134,66,.06)}
  a:focus-visible,button:focus-visible{
    outline:2px solid var(--gold);outline-offset:3px;border-radius:4px;
  }

  /* ---------- HERO ---------- */
  .hero{
    position:relative;z-index:2;
    min-height:calc(100vh - 92px);
    display:grid;
    grid-template-columns:1fr;
    align-items:center;
    padding:0 clamp(20px,5vw,64px) clamp(30px,5vh,60px);
  }
  .hero-inner{
    display:grid;
    grid-template-columns:minmax(0,1.05fr) minmax(0,.95fr);
    align-items:center;
    gap:clamp(24px,4vw,72px);
    max-width:1280px;margin:0 auto;width:100%;
  }

  /* copy column */
  .copy{max-width:560px}
  .eyebrow{
    display:inline-flex;align-items:center;gap:10px;
    font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--gold-deep);font-weight:500;margin-bottom:26px;
  }
  .eyebrow::before{
    content:"";width:26px;height:1px;background:var(--gold);display:inline-block;
  }
  .headline{
    font-family:'Fraunces',serif;
    font-weight:400;
    font-size:clamp(38px,6.2vw,76px);
    line-height:1.02;
    letter-spacing:-.018em;
    color:var(--ink);
    margin-bottom:24px;
  }
  .headline em{
    font-style:italic;font-weight:400;
    color:var(--gold-deep);
  }
  .sub{
    font-size:clamp(15px,1.4vw,18px);
    color:var(--ink-soft);
    max-width:42ch;
    margin-bottom:38px;
    line-height:1.6;
  }
  /* ghost CTA */
  .cta-row{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .ghost-cta{
    appearance:none;cursor:pointer;
    font-family:'Inter',sans-serif;font-size:15px;font-weight:500;letter-spacing:.01em;
    color:var(--ink);background:transparent;
    border:1px solid var(--ink);
    padding:15px 34px;border-radius:40px;
    display:inline-flex;align-items:center;gap:12px;
    transition:color .3s ease,border-color .3s ease,background .3s ease,padding .3s ease;
  }
  .ghost-cta .arrow{transition:transform .3s ease}
  .ghost-cta:hover,.ghost-cta:focus-visible{
    border-color:var(--gold);color:var(--gold-deep);background:rgba(176,134,66,.05);
  }
  .ghost-cta:hover .arrow{transform:translateX(4px)}
  .cta-note{font-size:13px;color:var(--ink-soft);letter-spacing:.01em}

  /* stage column (object) */
  .stage{
    position:relative;
    display:flex;align-items:center;justify-content:center;
    min-height:min(74vh,640px);
  }
  .object-wrap{
    position:relative;
    width:clamp(260px,34vw,460px);
    aspect-ratio:1/1;
    display:flex;align-items:center;justify-content:center;
    will-change:transform;
  }
  .object-svg{width:100%;height:100%;overflow:visible;display:block}
  /* soft contact shadow under the floating object */
  .object-shadow{
    position:absolute;
    left:50%;bottom:7%;
    width:54%;height:42px;
    transform:translateX(-50%);
    background:radial-gradient(ellipse at center, rgba(40,30,12,.20) 0%, rgba(40,30,12,0) 70%);
    filter:blur(3px);
    z-index:-1;
    will-change:transform,opacity;
  }
  /* drifting metallic halo behind the object */
  .object-halo{
    position:absolute;inset:-12% -12% -12% -12%;
    border-radius:50%;
    background:radial-gradient(circle at 42% 38%, rgba(230,200,132,.30) 0%, rgba(230,200,132,0) 58%);
    z-index:-1;
    pointer-events:none;
  }
  /* faint trade-confidence rule under stage on desktop */
  .quiet-strip{
    position:absolute;left:0;right:0;bottom:clamp(8px,3vh,28px);
    z-index:3;
    display:flex;justify-content:center;
    pointer-events:none;
  }
  .quiet-strip .inner{
    max-width:1280px;width:100%;margin:0 auto;
    padding:0 clamp(20px,5vw,64px);
    display:flex;align-items:center;gap:clamp(22px,4vw,56px);
    color:var(--ink-soft);font-size:12.5px;letter-spacing:.02em;
    border-top:1px solid var(--hair);padding-top:18px;
    flex-wrap:wrap;
  }
  .quiet-strip .inner strong{
    font-family:'Fraunces',serif;font-weight:500;color:var(--ink);
    font-size:14px;letter-spacing:0;margin-right:8px;
  }
  .quiet-strip .dot{width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.7}

  /* ---------- FLOAT ANIMATION ---------- */
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(-1.2deg)}
    50%{transform:translateY(-16px) rotate(1.2deg)}
  }
  @keyframes shadowPulse{
    0%,100%{transform:translateX(-50%) scale(1);opacity:.55}
    50%{transform:translateX(-50%) scale(.84);opacity:.32}
  }
  @keyframes shimmer{
    0%{transform:translate(0,0)}
    50%{transform:translate(2.5%,-2%)}
    100%{transform:translate(0,0)}
  }
  .object-wrap{animation:float 7s ease-in-out infinite}
  .object-shadow{animation:shadowPulse 7s ease-in-out infinite}
  .spec-move{animation:shimmer 9s ease-in-out infinite;transform-origin:center}

  /* ---------- RESPONSIVE: stack + center on phones ---------- */
  @media (max-width:880px){
    .hero{min-height:auto;padding-top:8px}
    .hero-inner{
      grid-template-columns:1fr;
      gap:clamp(8px,3vh,28px);
      text-align:center;
    }
    /* object FIRST and centered on mobile, headline below */
    .stage{order:-1;min-height:min(46vh,360px);margin-top:6px}
    .object-wrap{width:clamp(210px,62vw,320px)}
    .copy{margin:0 auto}
    .eyebrow{margin-bottom:18px}
    .eyebrow::before{display:none}
    .sub{margin-left:auto;margin-right:auto;margin-bottom:30px}
    .cta-row{justify-content:center}
    .quiet-strip{position:static;margin-top:30px}
    .quiet-strip .inner{justify-content:center;text-align:center}
  }
  @media (max-width:560px){
    .nav-links a:not(.nav-cta){display:none}
    .nav-links .sep{display:none}
    .headline{font-size:clamp(34px,9vw,46px)}
  }

  /* ---------- REDUCED MOTION: show final state, kill rAF + keyframes ---------- */
  @media (prefers-reduced-motion:reduce){
    .object-wrap,.object-shadow,.spec-move{animation:none!important}
    .ghost-cta .arrow{transition:none}
    *{scroll-behavior:auto!important}
  }
</style>
</head>
<body>

  <nav class="nav" aria-label="Primary">
    <a class="brand" href="#" id="brandSlot">
      <span class="mark" aria-hidden="true"></span>
      <span data-bind="brand">Aurelis</span>
    </a>
    <div class="nav-links">
      <a href="#" data-bind="nav0">Manage</a>
      <a href="#" data-bind="nav1">Invest</a>
      <a href="#" data-bind="nav2">Private</a>
      <span class="sep" aria-hidden="true"></span>
      <a href="#" class="nav-cta" data-bind="navcta">Sign in</a>
    </div>
  </nav>

  <main class="hero">
    <div class="hero-inner">

      <!-- COPY -->
      <div class="copy">
        <span class="eyebrow" data-bind="eyebrow">Private wealth, quietly held</span>
        <h1 class="headline" id="headline"><!-- injected --></h1>
        <p class="sub" data-bind="sub"></p>
        <div class="cta-row">
          <button class="ghost-cta" id="cta" type="button">
            <span data-bind="cta">Begin a conversation</span>
            <span class="arrow" aria-hidden="true">&#8594;</span>
          </button>
          <span class="cta-note" data-bind="ctanote">By invitation, no obligation</span>
        </div>
      </div>

      <!-- STAGE: the floating precious object (inline SVG, gradient-shaded) -->
      <div class="stage">
        <div class="object-wrap" id="objectWrap" role="img" aria-label="A floating gold coin against a near-white canvas">
          <span class="object-halo" aria-hidden="true"></span>
          <span class="object-shadow" id="objectShadow" aria-hidden="true"></span>
          <svg class="object-svg" viewBox="0 0 400 400" aria-hidden="true">
            <defs>
              <!-- main coin body: warm metallic sphere/coin -->
              <radialGradient id="coinFace" cx="38%" cy="32%" r="78%">
                <stop offset="0%"  stop-color="#fbeec2"/>
                <stop offset="22%" stop-color="#ecd193"/>
                <stop offset="50%" stop-color="#c89b4e"/>
                <stop offset="78%" stop-color="#9a7330"/>
                <stop offset="100%" stop-color="#6f5121"/>
              </radialGradient>
              <!-- rim ring -->
              <linearGradient id="rim" x1="20%" y1="10%" x2="80%" y2="95%">
                <stop offset="0%"  stop-color="#f4e0a6"/>
                <stop offset="38%" stop-color="#bd8f44"/>
                <stop offset="62%" stop-color="#8a6526"/>
                <stop offset="100%" stop-color="#d8b975"/>
              </linearGradient>
              <!-- inner bevel -->
              <radialGradient id="bevel" cx="50%" cy="50%" r="50%">
                <stop offset="74%" stop-color="#000000" stop-opacity="0"/>
                <stop offset="92%" stop-color="#5a4115" stop-opacity=".55"/>
                <stop offset="100%" stop-color="#3c2c0e" stop-opacity=".75"/>
              </radialGradient>
              <!-- specular highlight -->
              <radialGradient id="spec" cx="50%" cy="50%" r="50%">
                <stop offset="0%"  stop-color="#ffffff" stop-opacity=".92"/>
                <stop offset="40%" stop-color="#fff3d2" stop-opacity=".45"/>
                <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
              </radialGradient>
              <!-- engraved monogram gradient -->
              <linearGradient id="engrave" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%"  stop-color="#6e511f"/>
                <stop offset="50%" stop-color="#8c6a2c"/>
                <stop offset="100%" stop-color="#caa153"/>
              </linearGradient>
              <radialGradient id="lower" cx="50%" cy="86%" r="55%">
                <stop offset="0%" stop-color="#ffe9b0" stop-opacity=".30"/>
                <stop offset="100%" stop-color="#ffe9b0" stop-opacity="0"/>
              </radialGradient>
            </defs>

            <!-- outer rim -->
            <circle cx="200" cy="200" r="172" fill="url(#rim)"/>
            <!-- thin dark separation -->
            <circle cx="200" cy="200" r="156" fill="#5e451a"/>
            <!-- coin face -->
            <circle cx="200" cy="200" r="150" fill="url(#coinFace)"/>
            <!-- reeded edge ticks -->
            <g stroke="#7a5a23" stroke-width="2" opacity=".45">
              <!-- generated ticks via dasharray ring -->
              <circle cx="200" cy="200" r="164" fill="none" stroke="#8a6526"
                      stroke-width="9" stroke-dasharray="2 6" opacity=".55"/>
            </g>
            <!-- inner engraved ring -->
            <circle cx="200" cy="200" r="124" fill="none" stroke="url(#engrave)"
                    stroke-width="2.4" opacity=".8"/>
            <circle cx="200" cy="200" r="116" fill="none" stroke="#fbeec2"
                    stroke-width="1" opacity=".35"/>
            <!-- warm reflected light at the base -->
            <circle cx="200" cy="200" r="150" fill="url(#lower)"/>
            <!-- engraved monogram -->
            <text x="200" y="200" text-anchor="middle" dominant-baseline="central"
                  font-family="Fraunces, serif" font-weight="500"
                  font-size="118" fill="url(#engrave)"
                  id="coinMark" opacity=".92">A</text>
            <!-- subtle highlight on the monogram top -->
            <text x="200" y="198" text-anchor="middle" dominant-baseline="central"
                  font-family="Fraunces, serif" font-weight="500"
                  font-size="118" fill="#fff6dc" opacity=".18"
                  id="coinMarkHi">A</text>
            <!-- bevel darkening at the rim -->
            <circle cx="200" cy="200" r="150" fill="url(#bevel)"/>
            <!-- moving specular highlight (drifts under shimmer) -->
            <g class="spec-move">
              <ellipse cx="150" cy="130" rx="78" ry="56" fill="url(#spec)"
                       transform="rotate(-26 150 130)"/>
              <ellipse cx="252" cy="262" rx="40" ry="20" fill="#fff3d2" opacity=".22"
                       transform="rotate(-26 252 262)"/>
            </g>
          </svg>
        </div>
      </div>

    </div>

    <!-- quiet confidence strip (no charts, just restrained proof) -->
    <div class="quiet-strip" aria-label="Highlights">
      <div class="inner">
        <span><strong data-bind="stat0v">$4.8B</strong><span data-bind="stat0l">stewarded across families</span></span>
        <span class="dot" aria-hidden="true"></span>
        <span><strong data-bind="stat1v">1971</strong><span data-bind="stat1l">tending the long horizon</span></span>
        <span class="dot" aria-hidden="true"></span>
        <span><strong data-bind="stat2v">By referral</strong><span data-bind="stat2l">a deliberately small book</span></span>
      </div>
    </div>
  </main>

<script>
/* ============================================================
   DATA  - swap everything here. No other edits needed.
   Keep copy free of em/en dashes (use hyphen-with-spaces).
   "headline" supports <em>...</em> for the gold italic phrase.
   "coinMark" is the single character engraved on the object.
   ============================================================ */
const DATA = {
  brand:    "Aurelis",
  coinMark: "A",
  nav: ["Manage", "Invest", "Private"],
  navcta:  "Sign in",
  eyebrow: "Private wealth, quietly held",
  headline:'Wealth that <em>keeps its</em> composure',
  sub:     "We do not chase the market. We hold a steady line for a small number of families, across decades and generations, with patience as the strategy.",
  cta:     "Begin a conversation",
  ctanote: "By invitation, no obligation",
  stats: [
    { v:"$4.8B",      l:"stewarded across families" },
    { v:"1971",       l:"tending the long horizon" },
    { v:"By referral", l:"a deliberately small book" }
  ]
};

/* ---- bind ---- */
(function bind(){
  const set = (k,html)=>{ document.querySelectorAll('[data-bind="'+k+'"]').forEach(n=>{ html?n.innerHTML=html:0; }); };
  document.title = DATA.brand + " - private wealth";
  set('brand', DATA.brand);
  DATA.nav.forEach((t,i)=>set('nav'+i, t));
  set('navcta', DATA.navcta);
  set('eyebrow', DATA.eyebrow);
  document.getElementById('headline').innerHTML = DATA.headline;
  set('sub', DATA.sub);
  set('cta', DATA.cta);
  set('ctanote', DATA.ctanote);
  DATA.stats.forEach((s,i)=>{ set('stat'+i+'v', s.v); set('stat'+i+'l', s.l); });
  const cm = document.getElementById('coinMark'), cmh = document.getElementById('coinMarkHi');
  if(cm) cm.textContent = DATA.coinMark;
  if(cmh) cmh.textContent = DATA.coinMark;
  const wrap = document.getElementById('objectWrap');
  if(wrap) wrap.setAttribute('aria-label', 'A floating gold coin engraved with the letter ' + DATA.coinMark + ', the mark of ' + DATA.brand);
})();

/* ---- subtle pointer parallax on the floating object (desktop, motion-allowed) ---- */
(function parallax(){
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const fine   = window.matchMedia('(pointer: fine)').matches;
  if(reduce || !fine) return;            // honor reduced-motion + skip touch

  const wrap   = document.getElementById('objectWrap');
  const shadow = document.getElementById('objectShadow');
  if(!wrap) return;

  let tx=0, ty=0, cx=0, cy=0, raf=null, active=false;

  function onMove(e){
    const w = window.innerWidth, h = window.innerHeight;
    tx = (e.clientX / w - 0.5);          // -0.5 .. 0.5
    ty = (e.clientY / h - 0.5);
    if(!active){ active=true; loop(); }
  }
  function loop(){
    cx += (tx - cx) * 0.06;
    cy += (ty - cy) * 0.06;
    // layer the parallax ON TOP of the CSS float keyframe via a CSS var translate.
    // We translate the wrap a few px; the float animation still runs on the element,
    // so we apply parallax to an inner transform-free offset using translate3d on the
    // wrap's style without clobbering the keyframe (keyframe drives transform, so we
    // nudge via margin-free translate on a wrapper-safe property: use CSS custom prop).
    wrap.style.setProperty('--px', (cx * 18).toFixed(2) + 'px');
    wrap.style.setProperty('--py', (cy * 14).toFixed(2) + 'px');
    if(shadow){
      shadow.style.setProperty('--sx', (cx * 26).toFixed(2) + 'px');
    }
    if(Math.abs(tx-cx) > 0.001 || Math.abs(ty-cy) > 0.001){
      raf = requestAnimationFrame(loop);
    } else { active=false; }
  }
  window.addEventListener('mousemove', onMove, {passive:true});
})();
</script>

<style>
  /* parallax offset composited via translate on a NON-animated child layer
     so it never fights the float keyframe (keyframe owns .object-wrap transform).
     We instead translate the SVG + shadow by the custom props set in JS. */
  .object-svg{ transform: translate(var(--px,0px), var(--py,0px)); transition:transform .05s linear; }
  .object-shadow{ margin-left: var(--sx,0px); }
  @media (prefers-reduced-motion:reduce){
    .object-svg{ transform:none!important; }
    .object-shadow{ margin-left:0!important; }
  }
</style>
</body>
</html>
